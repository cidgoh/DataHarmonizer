id: https://sis.agr.gc.ca/cansis/nsdb/slc/v3.2/index.html
name: NSDBSLCv3_2
title: Soil Landscapes of Canada version 3.2
description: "SLC version 3.2 is the latest revision of the Soil Landscapes of Canada,\
  \ which was developed by Agriculture and Agri-Food Canada to provide information\
  \ about the country's agricultural soils at the provincial and national levels.\
  \  SLC v3.2 replaces SLC v3.1.1.\nThe Polygon Attribute Table (PAT) provides the\
  \ linkage between geographic locations (polygons) and soil landscape attributes\
  \ in the associated database tables.\nThe Land Area Table (LAT) contains attributes\
  \ of the polygon, and attributes which apply to the entire landscape represented\
  \ by that polygon.  \nArea values for the SLC polygons were calculated using the\
  \ HYDRO coverage.  When unioned with the SLC coverage, it provides land, fresh water\
  \ and ocean water values for each landscape polygon. All values are in hectares.\n\
  The Component Table describes each of the individual soil and landscape features\
  \ which comprise the polygon (i.e. the components of the polygon).   \r\nEach component\
  \ includes its estimated extent, slope, stoniness, and local surface form class,\
  \ as well as a link to the soil attributes provided in the \r\nSoil Name and \r\n\
  Soil Layer tables.\nThe Component Rating Table (CRT) contains soil and landform\
  \ suitability ratings that apply to individual components within a polygon.  These\
  \ ratings are generated from the contents of the Soil Names Table (SNT) and Soil\
  \ Layers Table (SLT).\nThe national SLCv3.2 coverage includes a new Landscape Segmentation\
  \ Table for the agricultural portion of Canada, which identifies the main landform\
  \ and slope combinations within each SLC polygon, and the representative soils found\
  \ within each of the associated landform positions (landscape segments).\nThis table\
  \ identifies the predominant landforms found within each SLC polygon, and the percentage\
  \ of the polygon occupied by each landform.\nThis table defines a set of 84 landscape\
  \ segments; four segments for each of 21 landform types.  Each segment in each of\
  \ the 21 landforms has a characteristic slope, slope length, and relative extent\
  \ within the landform.  The structure of this table is shown below.\nThis table\
  \ contains attributes which apply to entire EcoDistricts."
version: '3.2'
license: ''
in_language: en
imports:
  - 'linkml:types'
prefixes: {}
default_prefix: ''
classes: {}
enums:
  NSDBSLC_SLOPE:
    name: SLOPE
    title: Slope Gradient
    description: 'SLOPE contains categorized slope gradient (in percent) of polygon
      components for the low end of range (Shields, 1982). First used in SLC 3.0.
      Identical class definitions to version 1.0 but "Not Applicable" code differs.'
    permissible_values:
      A:
        title: Little or none
        description: 'Little or no slope: 0 - 3 % gradient.'
      B:
        title: Gentle
        description: 'Gentle slopes: 4 - 9 % gradient.'
      C:
        title: Moderate
        description: 'Moderate slopes: 10 - 15 % gradient.'
      D:
        title: Steep
        description: 'Steep slopes:  16 - 30 % gradient.'
      E:
        title: Extremely steep
        description: 'Extremely steep slopes:  31 - 60% gradient.'
      F:
        title: Excessively steep
        description: 'Excessively steep slopes: &gt; 60% gradient.'
      '-':
        title: n/a
        description: Not applicable (water).
  NSDBSLC_STONE:
    name: STONE
    title: Surface Stoniness
    description: "This field indicates the stoniness of the soil surface. Surface\
      \ stoniness will impact a soil's agricultural capabilities. First used in SLC\
      \ 3.0."
    permissible_values:
      N:
        title: None
        description: The soil surface  is nonstony.
      S:
        title: Slightly Stony
        description: The soil surface is slightly to moderately stony.
      V:
        title: Very Stony
        description: The soil surface is very to excessively stony.
      U:
        title: Unknown
        description: The soil surface stoniness is either unknown or not applicable.
  NSDBSLC_LOCSF:
    name: LOCSF
    title: Local Surface Form
    description: "Identifies the local surface form of a polygon component. Descriptions\
      \ define classes of local physical surface forms (assemblage of slopes) or recurring\
      \ patterns of forms which occur at the earth's surface. When applied to consolidated\
      \ materials, form refers to the product of their modification by geological\
      \ processes. (ref: ECSS, 1987; NWWG, 1987)."
    permissible_values:
      D:
        title: Dissected
        description: A dissected (or gullied) pattern providing external drainage
          for an area.
      H:
        title: Hummocky (or irregular)
        description: A very complex sequence of slopes extending from somewhat rounded
          concavities (or swales) of various sizes to irregular conical knolls (or
          knobs) and short discontinuous ridges; there is a general lack of concordance
          between knolls and swales. Slopes are generally 4-70%. Examples are hummocky
          moraines and hummocky fluvioglacial landforms.
      I:
        title: Inclined
        description: A sloping, unidirectional surface with a generally constant slope
          unbroken by marked irregularity or gullies; a weakly developed dissected
          pattern provides external drainage for the local area. Slopes are 2-70%;
          the form of inclined slopes is not related to the initial mode of origin
          of the underlying material.
      K:
        title: Knoll and kettle
        description: A chaotic sequence of knolls and kettles (or sloughs), which
          occupies 15-20% of an area and has no external drainage. Slopes are generally
          &gt;3%. Examples are morainal plains and hill lands.
      L:
        title: Level
        description: A flat or very gently sloping, unidirectional surface with a
          generally constant slope unbroken by marked elevations and depressions.
          Slopes are generally
      M:
        title: Rolling
        description: A very regular sequence of moderate slopes extending from rounded
          and, in some places, confined concave depressions to broad, rounded convexities
          producing a wavelike pattern of moderate relief. Slope gradients are generally
          >5% but may be less. This surface form is usually controlled by the underlying
          bedrock.
      R:
        title: Ridged
        description: A long, narrow elevation of the surface, usually sharp crested
          with steep sides; ridges may be parallel, subparallel, or intersecting.
          Examples are eskers, crevasse fillings, washboard moraines and some drumlins.
      S:
        title: Steep
        description: "Erosional slopes of greater than 70% (35\xB0), present on both\
          \ consolidated and unconsolidated materials.  The form of a steep erosional\
          \ slope on unconsolidated materials is not related to the initial mode of\
          \ origin of the underlying material.  An example is an escarpment."
      T:
        title: Terraced
        description: Scarp face and the horizontal or gently inclined surface (or
          tread) above it. An example is an alluvial terrace.
      U:
        title: Undulating
        description: A very regular sequence of gentle slopes that extends from rounded
          and, in some places, confined concavities to broad, rounded convexities
          producing a wavelike pattern of low local relief. Slope length is generally
          less than 0.8 km and the dominant gradient of slopes is usually 2-5%. The
          terrain lacks an external drainage pattern. Examples are some ground moraines
          and lacustrine material of varying textures.
      B04:
        title: Domed bog
        description: A large bog (diameter usually >500 m) with a convex surface rising
          several metres above the surrounding terrain. The centre usually drains
          in all directions; small crescentic pools commonly form around the highest
          point; a concentric pattern is formed if the highest point is in the centre,
          while an eccentric pattern is formed if the highest point is off-centre.
          Peat development is usually >3 m.
      B05:
        title: Polygonal peat plateau bog
        description: A perennially frozen bog rising approximately 1 m above the surrounding
          fen. The surface is relatively flat, scored by a polygonal pattern of trenches
          that developed over ice wedges. The permafrost and ice wedges developed
          in peat originally deposited in a nonpermafrost environment.
      B07:
        title: Peat plateau bog
        description: A bog composed of perennially frozen peat rising abruptly about
          1 m from the surrounding unfrozen fen. The surface is relatively flat and
          even, and commonly covers large areas. The peat was originally deposited
          in a nonpermafrost environment and is associated in many places with collapse
          scar bogs or fens.
      B09:
        title: Atlantic plateau bog
        description: A bog with a flat to undulating surface raised above the surrounding
          terrain. The bog edges commonly slope steeply downwards to the mineral soil
          terrain. Large pools scattered on the bog reach depths of 2-4 m.
      B13:
        title: Basin bog
        description: A bog situated in a basin with essentially closed drainage which
          receives water from precipitation and runoff from the immediate surroundings.
          The surface of the bog is flat with peat generally deepest at the centre.
      B14:
        title: Flat bog
        description: A bog having a flat, featureless surface and occurring in broad,
          poorly defined depressions. The depth of peat is generally uniform.
      B15:
        title: String bog
        description: A pattern of narrow (2-3 m wide), low (1 m.
      B16:
        title: Blanket bog
        description: A bog consisting of extensive peat deposits that occur more or
          less uniformly over gently sloping hills and valleys. The peat thickness
          is usually
      B18:
        title: Slope bog
        description: A bog occurring in areas of high rainfall on appreciably sloping
          land surfaces. The bog is fed by rainwater and by water draining from other
          nutrient-poor peatlands. The peat may exceed 1 m in thickness.
      B19:
        title: Veneer bog
        description: A bog occurring on gently sloping terrain underlain by generally
          discontinuous permafrost. Although drainage is predominantly below the surface,
          overland flow occurs in poorly defined drainways during peak runoff. Peat
          thickness is usually
      B20:
        title: Lowland polygon bog
        description: "A bog with flat-topped or convex peat surfaces (often referred\
          \ to as 'high-centre polygons') separated by trenches over ice wedges that\
          \ form a polygonal pattern when viewed from above. The peat was deposited\
          \ in a permafrost environment as shown by internal structures."
      F01:
        title: Northern ribbed fen
        description: "A fen with parallel, low peat ridges ('strings') alternating\
          \ with wet hollows or shallow pools, oriented across the major slope at\
          \ right angles to water movement. The depth of peat is >1 m."
      F07:
        title: Shore fen
        description: A fen with an anchored surface mat that forms the shore of a
          pond or lake. The rooting zone is affected by the water of the lake at both
          normal and flood levels.
      F11:
        title: Slope fen
        description: A fen occurring mainly on slow-draining, nutrient-enriched seepage
          slopes. Pools are usually absent, but wet seepage tracks may occur. Peat
          thickness is usually
      F13:
        title: Horizontal fen
        description: A fen with a gently sloping, featureless surface. This fen occupies
          broad, often ill-defined depressions and may interconnect with other fens.
          Peat accumulation is generally uniform.
      S01:
        title: Stream swamp
        description: A swamp occurring along the banks of permanent or semipermanent
          streams. The high water table is maintained by the level of water in the
          stream. The swamp is seasonally inundated with subsequent sediment deposition.
      S04:
        title: Basin swamp
        description: A swamp developed in a topographically defined basin where water
          derived locally may be augmented by drainage from other parts of the watershed.
          Accumulation of well-decomposed peat is shallow (
      M06:
        title: Stream marsh
        description: A marsh occupying shorelines, bars, stream beds, or islands in
          continuously flowing watercourses. The marsh is subject to prolonged annual
          flooding and is commonly covered by thick layers of sediments.
      M11:
        title: Shallow basin marsh
        description: A marsh occurring in a uniformly shallow marsh depression or
          swale, having a gradual gradient from the edge to the deepest portion; the
          marsh edge may be poorly defined. Water levels fluctuate rapidly.
      M14:
        title: Shore marsh
        description: A marsh occupying the contact zone between high and low water
          marks bordering semipermanent or permanent lakes. The marsh,usually found
          along protected shorelines, behind barrier beaches in lagoons, on islands,
          or in embayments, is subject to flooding by a rise in lake levels, wind
          waves, or surface runoff.
