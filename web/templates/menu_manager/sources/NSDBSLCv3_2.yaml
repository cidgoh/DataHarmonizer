                  riau sous-jacent."
              K:
                title: En bosses et creux
                description: "S\xE9rie tr\xE8s chaotique de bosses et de creux (ou\
                  \ d\xE9pressions) qui occupent 15-20% d'une r\xE9gion, n'a pas de\
                  \ drainage vers l'ext\xE9rieur; les pentes sont g\xE9n\xE9ralement\
                  \ >3 %; ex., plaines morainiques et collines."
              L:
                title: Plan
                description: "Surface unidirectionnelle plane ou l\xE9g\xE8rement\
                  \ en pente \xE0 inclinaison g\xE9n\xE9ralement constante, non bris\xE9\
                  e par des \xE9l\xE9vations et des d\xE9pressions marqu\xE9es; les\
                  \ pentes sont g\xE9n\xE9ralement"
              M:
                title: "Valonn\xE9"
                description: "S\xE9quence tr\xE8s r\xE9guli\xE8re de pentes moyennes\
                  \ qui s'\xE9tirent entre des d\xE9pressions arrondies et, par endroit,\
                  \ confin\xE9es et concaves, et de larges convexit\xE9s arrondies,\
                  \ ce qui conf\xE8re au paysage une allure de vagues de hauteur moyenne;\
                  \ les gradients de pentes sont g\xE9n\xE9ralement >5 %, mais peuvent\
                  \ y \xEAtre inf\xE9rieurs; ce model\xE9 est g\xE9n\xE9ralement ma\xEE\
                  tris\xE9 par le substratum rocheux sous-jacent."
              R:
                title: "\xC0 cr\xEAtes"
                description: "Longue et \xE9troite \xE9l\xE9vation de la surface \xE0\
                  \ cr\xEAte nettement pointue et versants abrupts; les cr\xEAtes\
                  \ peuvent \xEAtre parall\xE8les, quasi parall\xE8les ou se croiser;\
                  \ ex., eskers, remplissages de crevasses, moraines bossel\xE9es,\
                  \ certains drumlins."
              S:
                title: "Escarp\xE9"
                description: "Pentes d'\xE9rosion de plus de 70 % (35\xB0), se trouvent\
                  \ sur des mat\xE9riaux consolid\xE9s ou non consolid\xE9s; la forme\
                  \ d'une pente d'\xE9rosion escarp\xE9e sur mat\xE9riaux non consolid\xE9\
                  s n'est pas li\xE9e \xE0 l'origine des mat\xE9riaux sous-jacents;\
                  \ ex., escarpements."
              T:
                title: En terrasses
                description: "Paroi de l'escarpement et surface horizontale ou l\xE9\
                  g\xE8rement inclin\xE9e qui se trouve au-dessus; ex., terrasse alluviale."
              U:
                title: "Ondul\xE9"
                description: "S\xE9quence tr\xE8s r\xE9guli\xE8re de pentes douces\
                  \ qui s'\xE9tirent entre des concavit\xE9s arrondies et, par endroits\
                  \ confin\xE9es, et de grandes convexit\xE9s arrondies, ce qui produit\
                  \ un paysage peu accident\xE9, en vagues; la longueur des pentes\
                  \ est g\xE9n\xE9ralement de moins de 0,8 km et le gradient dominant\
                  \ des pentes est g\xE9n\xE9ralement de 2-5 % (de 1 \xE0 3\xB0);\
                  \ aucune configuration de drainage externe; ex., certaines moraines\
                  \ de fond, mat\xE9riau lacustre de diverses textures."
              B04:
                title: "Bog bomb\xE9"
                description: "Bog important (diam\xE8tre g\xE9n\xE9ralement >500 m)\
                  \ \xE0 surface convexe qui s'\xE9l\xE8ve de plusieurs m\xE8tres\
                  \ au-dessus du terrain avoisinant; le drainage en surface rayonne\
                  \ \xE0 partir du centre dans toutes les directions; de petits \xE9\
                  tangs en forme de croissant se forment g\xE9n\xE9ralement pr\xE8\
                  s du point le plus haut; si le point le plus \xE9lev\xE9 est au\
                  \ centre, les \xE9tangs forment une configuration concentrique ou,\
                  \ dans le cas contraire, excentrique; l'\xE9paisseur du d\xE9p\xF4\
                  t de tourbe est g\xE9n\xE9ralement >3 m."
              B05:
                title: Bog polygonal de plateau tourbeux
                description: "Bog gel\xE9 en permanence s'\xE9levant d'environ 1 m\
                  \ au-dessus du fen avoisinant; la surface est relativement plane\
                  \ et marqu\xE9e par une structure polygonale de tranch\xE9es qui\
                  \ se sont form\xE9es au-dessus des coins de glace; le perg\xE9lisol\
                  \ et les coins de glace se sont form\xE9s dans une tourbe qui s'est\
                  \ accumul\xE9e dans un milieu qui n'\xE9tait pas gel\xE9 en permanence."
              B07:
                title: Bog de plateau tourbeux
                description: "Bog compos\xE9 de tourbe gel\xE9e en permanence qui\
                  \ s'\xE9l\xE8ve de fa\xE7on abrupte d'environ 1 m au-dessus du fen\
                  \ adjacent non gel\xE9; la surface est relativement plane et r\xE9\
                  guli\xE8re et couvre g\xE9n\xE9ralement de vastes \xE9tendues; la\
                  \ tourbe a \xE9t\xE9 d\xE9pos\xE9e \xE0 l'origine en milieu non\
                  \ perg\xE9lisol\xE9 et est associ\xE9e \xE0 de nombreux endroits\
                  \ \xE0 des bogs ou des fens effondr\xE9s."
              B09:
                title: Bog de plateau de l&#39;Atlantique
                description: "Bog \xE0 surface plane \xE0 ondul\xE9e qui domine le\
                  \ terrain adjacent, les bordures du bog descendent en g\xE9n\xE9\
                  ral en pente abrupte vers le terrain \xE0 sol min\xE9ral; de larges\
                  \ \xE9tangs qui pars\xE8ment le bog atteignent une profondeur de\
                  \ 2-4 m."
              B13:
                title: Bog de bassin
                description: "Bog situ\xE9 dans un bassin dont le drainage est essentiellement\
                  \ ferm\xE9; il est aliment\xE9 en eau par les pr\xE9cipitations\
                  \ et le ruissellement des environs imm\xE9diats; la surface du bog\
                  \ est plane, mais la tourbe est g\xE9n\xE9ralement la plus \xE9\
                  paisse au centre."
              B14:
                title: Bog plat
                description: "Bog \xE0 surface plane et sans relief qui appara\xEE\
                  t dans de vastes d\xE9pressions mal d\xE9finies; la profondeur des\
                  \ d\xE9p\xF4ts de tourbe est g\xE9n\xE9ralement uniforme."
              B15:
                title: "Bog structur\xE9"
                description: "Configuration d'\xE9troites (2-3 m de largeur) cr\xEA\
                  tes basses (1 m."
              B16:
                title: Bog en couverture
                description: "Bog compos\xE9 de d\xE9p\xF4ts tourbeux consid\xE9rables\
                  \ recouvrant \xE0 peu pr\xE8s uniform\xE9ment des collines et des\
                  \ vall\xE9es \xE0 pentes douces; l'\xE9paisseur de la tourbe est\
                  \ g\xE9n\xE9ralement"
              B18:
                title: "Bog inclin\xE9"
                description: "Bog apparaissant dans les r\xE9gions \xE0 pr\xE9cipitation\
                  \ \xE9lev\xE9e sur des pentes assez abruptes, et qui est aliment\xE9\
                  \ par les eaux de pluie et l'eau provenant d'autres tourbi\xE8res\
                  \ pauvres en \xE9l\xE9ments nutritifs; l'\xE9paisseur de la tourbe\
                  \ peut d\xE9passer 1 m."
              B19:
                title: "Bog en plaqu\xE9"
                description: "Bog se formant sur un terrain en pente douce recouvrant\
                  \ du perg\xE9lisol g\xE9n\xE9ralement discontinu; bien que le drainage\
                  \ soit essentiellement souterrain, l'\xE9coulement superficiel a\
                  \ lieu dans des chenaux mal d\xE9finis au cours du ruissellement\
                  \ de pointe; l'\xE9paisseur de la tourbe est g\xE9n\xE9ralement"
              B20:
                title: Bog de polygone de basse terre
                description: "Bog \xE0 surface tourbeuses convexes ou planes s\xE9\
                  par\xE9es par des tranch\xE9es correspondant \xE0 des coins de glace\
                  \ qui forment une figuration polygonale en surface; la tourbe a\
                  \ \xE9t\xE9 d\xE9pos\xE9e \xE0 l'origine en milieu non perg\xE9\
                  lisol\xE9."
              F01:
                title: "Fen c\xF4tel\xE9 du nord"
                description: "Fen ayant de basses cr\xEAtes tourbeuses parall\xE8\
                  les ('c\xF4tes') qui alternent avec des d\xE9pressions humides ou\
                  \ des \xE9tangs peu profonds, orient\xE9s en travers de la pente\
                  \ principale, \xE0 angle droit par rapport au mouvement de l'eau;\
                  \ l'\xE9paisseur de la tourbe est >1 m."
              F07:
                title: Fen de rivage
                description: "Fen ayant un tapis superficiel ancr\xE9 qui forme la\
                  \ rive d'un \xE9tang ou d'un lac; la zone d'enracinement est touch\xE9\
                  e par les eaux du lac au niveau normal ou de crue."
              F11:
                title: "Fen inclin\xE9"
                description: "Fen se trouvant essentiellement sur des pentes d'infiltration\
                  \ \xE0 drainage lent, enrichies en \xE9l\xE9ments nutritifs; il\
                  \ n'y a g\xE9n\xE9ralement pas d'\xE9tangs, mais parfois des traces\
                  \ d'infiltration; l'\xE9paisseur du d\xE9p\xF4t de tourbe est g\xE9\
                  n\xE9ralement"
              F13:
                title: Fen horizontal
                description: "Fen ayant une surface \xE0 pente tr\xE8s l\xE9g\xE8\
                  re, sans accident de terrain; ce fen occupe le fond de vastes d\xE9\
                  pressions souvent mal d\xE9finies et peut \xEAtre reli\xE9 \xE0\
                  \ d'autres fens; l'accumulation de tourbe est g\xE9n\xE9ralement\
                  \ uniforme."
              S01:
                title: "Mar\xE9cage de ruisseau"
                description: "Mar\xE9cage qui se trouvent le long des rives de cours\
                  \ d'eau permanents ou semi-permanents; la surface de saturation\
                  \ reste \xE9lev\xE9e sous l'effet du niveau des eaux dans le cours\
                  \ d'eau; le mar\xE9cage est inond\xE9 en saison et subit donc des\
                  \ accumulations r\xE9guli\xE8res de s\xE9diments."
              S04:
                title: "Mar\xE9cage de bassin"
                description: "Mar\xE9cage confin\xE9 \xE0 des bassins d\xE9finis par\
                  \ la topographie o\xF9 les eaux du drainage provenant d'autres portions\
                  \ du bassin versant peuvent s'ajouter \xE0 l'eau de provenance locale;\
                  \ l'accumulation de tourbes bien d\xE9compos\xE9es est peu \xE9\
                  paisse ("
              M06:
                title: Marais de ruisseau
                description: "Marais occupant les rivages, les cordons littoraux,\
                  \ le lit des cours d'eau ou des \xEEles situ\xE9es dans les cours\
                  \ d'eau \xE0 \xE9coulement continu; le marais est sujet \xE0 des\
                  \ inondations annuelles prolong\xE9es et est souvent couvert d'\xE9\
                  paisses couches de s\xE9diments."
              M11:
                title: Marais de bassin peu profond
                description: "Marais qui se trouve dans une d\xE9pression ou un creux\
                  \ uniform\xE9ment peu profond, \xE0 pente graduelle entre le rebord\
                  \ de la d\xE9pression et sa partie la plus profonde; la lisi\xE8\
                  re du marais peut \xEAtre mal d\xE9limit\xE9e; les niveaux d'eau\
                  \ fluctuent rapidement."
              M14:
                title: Marais de rivage
                description: "Marais occupant la zone de contact entre les laisses\
                  \ de haute mer et de basse mer en bordure de lacs permanents ou\
                  \ semi-permanents; on retrouve habituellement ce type de marais\
                  \ le long des rives abrit\xE9es, dans des lagunes derri\xE8re les\
                  \ cordons littoraux, sur des \xEEles ou dans des baies; le marais\
                  \ est sujet \xE0 des inondations caus\xE9es par la hausse des niveaux\
                  \ des lacs, par des vagues, par le vent ou par le ruissellement\
                  \ de surface."
