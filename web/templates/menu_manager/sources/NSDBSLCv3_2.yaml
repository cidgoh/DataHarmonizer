        description: 'Excessively steep slopes: &gt; 60% gradient.'
  NSDBSLC_LF_SEGMENT:
    name: LF_SEGMENT
    title: Landform Segment Class (Position)
    description: Each landform is defined as having four segments, representing the
      upper slope, mid slope, lower slope and depression positions. This code identifies
      the position of the landform segment.
    permissible_values:
      U:
        title: Upper
        description: Landform segment is found in the upper slope position of the
          landform.
      M:
        title: Middle
        description: Landform segment is found in the mid slope position of the landform.
      L:
        title: Lower
        description: Landform segment is found in the lower slope position of the
          landform.
      D:
        title: Depression
        description: Landform segment is found in the depression position of the landform.
  NSDBSLC_CROPPED:
