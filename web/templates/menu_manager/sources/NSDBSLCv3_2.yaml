extensions:
  locales:
    tag: locales
    value:
      fr:
        id: https://sis.agr.gc.ca/siscan/nsdb/slc/v3.2/index.html
        name: NSDBSLCv3_2
        version: '3.2'
        in_language: fr
        description: "La table des attributs de polygone (PAT) fournit le lien entre\
          \ les emplacements g\xE9ographiques (polygones) et les attributs de p\xE9\
          do-paysage dans les bases de donn\xE9es associ\xE9es.\nLa table de paysage\
          \ (LAT) contient les attributs du polygone, ainsi que les attributs qui\
          \ s'appliquent au paysage entier repr\xE9sent\xE9 par ce polygone. Toutes\
          \ les superficies sont exprim\xE9es en hectares.\nLa table des composantes\
          \ d&eacute;crit les sols et paysages qui sont les composantes d&rsquo;un\
          \ polygone.  Noter que les composantes ne  d&eacute;crivent que la portion\
          \ terre du polygone.\nLa table de classification des composantes (CRT) renferme\
          \ les classes d'aptitude du sol et du relief qui s'appliquent \xE1 chaque\
          \ composante d'un polygone. Ces classes sont \xE9tablies \xE1 partir du\
          \ contenu du tableau des noms (SNT) et du tableau des couches de sol (SLT).\n\
          La couverture nationale de la version 3.2 du PPC comprend \xE9galement une\
          \ nouvelle table des segments du paysage pour la portion agricole du Canada,\
          \ laquelle indique les principaux reliefs trouv\xE9 \xE0 l'int\xE9rieur\
          \ de chaque polygones du PPC, ainsi que les composantes des sols que l'on\
          \ s'attend de trouver dans chacun des quatre segments de relief.  Chaque\
          \ polygone national de la version 3.2 du PPC associ\xE9 \xE0 des donn\xE9\
          es sur le sol a un relief dominant, et certains polygones complexes du PPC\
          \ peuvent aussi avoir un deuxi\xE8me ou un troisi\xE8me relief important.\n\
          Cette table identifie les reliefs pr\xE9dominants au sein de chaque polygone\
          \ des PPC, et le pourcentage du polygone occup\xE9e par chaque relief.\n\
          La table de segmentation du relief (LST) de la version 3.2 du PPC contient\
          \ des valeurs pr\xE9d\xE9finies concernant la pente, la longueur de la pente\
          \ et l'\xE9tendue relative de chaque segment pour chacun des 21 types de\
          \ reliefs actuellement d\xE9finis. D'autres recherches permettraient de\
          \ pr\xE9ciser les attributs actuels des segments de relief et d'accro\xEE\
          tre le nombre de types de reliefs. Le format actuel de la LST permet l'application\
          \ de ces \xE9ventuelles mises \xE0 jour sous forme de colonnes ou de dossiers\
          \ suppl\xE9mentaires.\nCette table contient les attributs qui s'appliquent\
          \ \xE0 l'ensemble  \xE9codistricts ."
        enums:
          NSDBSLC_SLOPE:
            permissible_values:
              A:
                title: Rien ou presque rien
                description: Rien ou presque rien (0 - 3 %).
              B:
                title: Faibles
                description: Pentes faibles (4 - 9 %).
              C:
                title: "Mod\xE9r\xE9es"
                description: "Pentes mod\xE9r\xE9es (10 - 15 %)."
              D:
                title: Raides
                description: Pentes raides (16 - 30 %).
              E:
                title: "Tr\xE8s raides"
                description: "Pentes tr\xE8s raides (31 - 60 %)."
              F:
                title: "Extr\xEAmement raides"
                description: "Pentes extr\xEAmement fortes (> 60 %)."
              '-':
                title: n/a
                description: "Ne s'applique pas (eau)."
          NSDBSLC_STONE:
            permissible_values:
              N:
                title: Non pierreux
                description: La surface du sol est non pierreux.
              S:
                title: "L\xE9g\xE8rement pierreux"
                description: "La surface du sol est de l\xE9g\xE8rement \xE0 mod\xE9\
                  r\xE9ment pierreux."
              V:
                title: "Tr\xE8s pierreux"
                description: "La surface du sol est de tr\xE8s \xE0 excessivement\
                  \ pierreux."
              U:
                title: Inconnu
                description: "La surface du sol est de pierrosit\xE9 inconnu ou ne\
                  \ s'applique pas."
          NSDBSLC_LOCSF:
            permissible_values:
              D:
                title: "Diss\xE9qu\xE9"
                description: "Terrain diss\xE9qu\xE9 (ou ravin\xE9) assurant un drainage\
                  \ vers l'ext\xE9rieur d'une zone donn\xE9e."
              H:
                title: "Bossel\xE9 (ou irr\xE9gulier)"
                description: "S\xE9rie tr\xE8s complexe de pentes dont les toits varient\
                  \ de concavit\xE9s l\xE9g\xE8rement arrondies (ou d\xE9pressions)\
                  \ de diverses tailles \xE0 des collines coniques irr\xE9guli\xE8\
                  res (ou buttes) et \xE0 de courtes cr\xEAtes discontinues; il y\
