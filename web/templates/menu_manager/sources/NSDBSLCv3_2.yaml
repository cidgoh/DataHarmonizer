                  \ les bosses; les pentes varient de 4-70 %; exemples : moraine mammelonn\xE9\
                  e, d\xE9p\xF4t fluvio-glaciaire mammelonn\xE9."
              I:
                title: "Inclin\xE9"
                description: "Surface unidirectionnelle \xE0 inclinaison g\xE9n\xE9\
                  ralement constante, non bris\xE9e par des ravins ou des irr\xE9\
                  gularit\xE9s marqu\xE9es; terrain peu marqu\xE9, permet le drainage\
