  NSDBSLC_LF_TYPE:
    name: LF_TYPE
    title: Landform Type Class
    description: This one character code identifies the type of landform.
    permissible_values:
      H:
        title: Hummocky (or irregular)
        description: Hummocky or irregular type of landform.
      I:
        title: Inclined and dissected
        description: Inclined and dissected type of landform.
      L:
        title: Level
        description: 'Type of landform: Level.'
      M:
        title: Rolling
        description: 'Type of landform: Rolling.'
      R:
        title: Ridged
        description: 'Type of landform: Ridged.'
      S:
        title: Steep
        description: 'Type of landform: Steep.'
      T:
