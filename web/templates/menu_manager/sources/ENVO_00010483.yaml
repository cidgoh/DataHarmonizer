        title: particulate matter in a hydrosphere
        description: Waterborne particulate matter which is part of a hydrosphere.
      'ENVO:01001652':
        text: 'ENVO:01001652'
        meaning: 'ENVO:01001652'
        title: atmospheric aerosol
        description: An aerosol that is suspended in an atmosphere.
      'ENVO:01001820':
        text: 'ENVO:01001820'
        meaning: 'ENVO:01001820'
        title: cultured organic material
      'ENVO:01001821':
        text: 'ENVO:01001821'
        meaning: 'ENVO:01001821'
        title: hydrothermally-influenced sediment
        description: Sediment through which hydrothermally modified fluids flow, altering
          its properties through interaction with their own.
      'ENVO:01001841':
        text: 'ENVO:01001841'
        meaning: 'ENVO:01001841'
        title: volcanic soil
        description: An andosol which derives its silica content from glass and tephra
          ejected during a volcanic eruption.
      'ENVO:01001845':
        text: 'ENVO:01001845'
        meaning: 'ENVO:01001845'
        title: hoar
        description: Frost which is composed of interlocking ice crystals formed by
          vapour transfer (sublimation followed by deposition) of water vapour on
          some surface.
      'ENVO:01001846':
        text: 'ENVO:01001846'
        meaning: 'ENVO:01001846'
        title: depth hoar
        description: Depth hoar is associated with very fast crystal growth under
          large temperature gradients. Sometimes a layer of depth hoar forms just
          above, and may assist in identifying the summer surface. The low density
          and low strength of depth hoar can make it difficult to retrieve unbroken
          core sections during coring, and can complicate estimates of accumulation
          by microwave remote sensing. Layers of depth hoar also increase the likelihood
          of avalanching. This is one way in which firn formation may begin. Depth
          hoar is similar in physical origin to crevasse hoar.
      'ENVO:01001847':
        text: 'ENVO:01001847'
        meaning: 'ENVO:01001847'
        title: hoarfrost
      'ENVO:01001848':
        text: 'ENVO:01001848'
        meaning: 'ENVO:01001848'
        title: rime
        description: Rime is denser and harder than hoarfrost, but lighter, softer,
          and less transparent than glaze. Rime is composed essentially of discrete
          ice granules and has densities as low as 0.2-0.3 g cm-3. Glaze is generally
          continuous but with some air pockets and has much higher densities. Factors
          that favor rime formation are small drop size, slow accretion, a high degree
          of supercooling, and rapid dissipation of latent heat of fusion. The opposite
          effects favor glaze formation. Both rime and glaze occur when supercooled
          water drops strike an object at a temperature below freezing. Such formation
          on terrestrial objects constitutes an ice storm; on aircraft, it is called
          aircraft icing (where rime is known as rime ice). Either rime or glaze may
          form on snow crystals, droxtals, or other ice particles in the atmosphere.
          When such a deposit is wholly or chiefly of rime, snow pellets result; when
          most or all of the deposit is glaze, ordinary hail or ice pellets result.
          The alternating clear and opaque layers of some hailstones represent glaze
          and rime, deposited under varying conditions around the growing hailstone.
      'ENVO:01001849':
        text: 'ENVO:01001849'
        meaning: 'ENVO:01001849'
        title: glaze
      'ENVO:01001850':
        text: 'ENVO:01001850'
        meaning: 'ENVO:01001850'
        title: frost
        description: 'In British usage, a day on which the minimum temperature at
          the level of the ground or on the tops of low, close-growing vegetation
          falls to -0.9C (30.4F) or below (also called a "day with ground frost").  In
          more general usage, "frost" can refer to the condition that exists when
          the temperature of the Earth''s surface and Earthbound objects fall below
          the melting point of water (0 degrees Celsius or 32 degrees Fahrenheit).
          Depending upon the actual values of ambient-air temperature, dewpoint, and
          the temperature attained by surface objects, frost may occur in a variety
          of forms. These include a general freeze, hoarfrost (or white frost), and
          dry freeze (or black frost). If a frost period is sufficiently severe to
          end the growing season (or delay its beginning), it is commonly referred
          to as a killing frost.'
      'ENVO:01001869':
        text: 'ENVO:01001869'
        meaning: 'ENVO:01001869'
        title: fracking liquid
        description: A liquid environmental material which is composed primarily of
          water ammended with thickening agents and proppants.
      'ENVO:01001876':
        text: 'ENVO:01001876'
        meaning: 'ENVO:01001876'
        title: graupel
        description: Often indistinguishable from very small soft hail except for
          the size convention that hail must have a diameter greater than 5 mm. Sometimes
          distinguished by shape into conical, hexagonal, and lump (irregular) graupel.
      'ENVO:01001882':
        text: 'ENVO:01001882'
        meaning: 'ENVO:01001882'
        title: surface hoar
        description: When buried by snowfall, surface hoar may be considered depth
          hoar. The crystals formed by surface hoar are usually leaf-, fern- or plate-shaped
          and facetted. Two types of surface hoar are the fernlike ice crystals deposited
          directly on a snow surface and the hoarfrost that has grown primarily in
          two dimensions, as on a window or other smooth surface.
      'ENVO:01001883':
        text: 'ENVO:01001883'
        meaning: 'ENVO:01001883'
        title: hoar crystal
        description: A water ice crystal which is a part of a deposit of hoarfrost
          and which only grows by desublimation.
      'ENVO:02000004':
        text: 'ENVO:02000004'
        meaning: 'ENVO:02000004'
        title: nesting material
        description: Nesting material is an animal habitation consisting of matierals
          used to cushion, insulate and protect the young of the organism. The adult
          will use the material to form a protective structure to house and raise
          their young. Nests are built primarily by birds, but also by mammals, fish,
          insects and reptiles.
      'ENVO:02000008':
        text: 'ENVO:02000008'
        meaning: 'ENVO:02000008'
        title: cell culture
        description: A cell culture is a growth of cells in vitro in an artificial
          medium for experimental research.
