      'ENVO:00002008':
        text: 'ENVO:00002008'
        meaning: 'ENVO:00002008'
        title: dust
        description: Dust occurs in and may be deposited from the atmosphere.
      'ENVO:00002010':
        text: 'ENVO:00002010'
        meaning: 'ENVO:00002010'
        title: saline water
        description: "The threshold salt concentration for classifying water as saline\
          \ varies, but typically begins at about 1,000 to 3,000 parts salt per million\
          \ parts water or 0.1\u20130.3% salt by weight."
      'ENVO:00002011':
        text: 'ENVO:00002011'
        meaning: 'ENVO:00002011'
        title: fresh water
        description: The lower bound of solute concentration required for water to
          be considered freshwater is variable, but is always less than that of seawater,
          and often cited as less than 1 gram of solutes per 1 litre of water.
      'ENVO:00002012':
        text: 'ENVO:00002012'
        meaning: 'ENVO:00002012'
        title: hypersaline water
        description: The average salinity of sea water is assumed to be around 35,000
          ppm, equivalent to 35 grams of salt per one liter (or kilogram) of water.
      'ENVO:00002013':
        text: 'ENVO:00002013'
        meaning: 'ENVO:00002013'
        title: igneous rock
        description: Rock formed from molten magma.
      'ENVO:00002014':
        text: 'ENVO:00002014'
        meaning: 'ENVO:00002014'
        title: plutonic rock
        description: An igneous rock that results from the crystallization of a magma
          below the surface of the Earth.
      'ENVO:00002015':
        text: 'ENVO:00002015'
        meaning: 'ENVO:00002015'
        title: volcanic rock
        description: "Due to the general suggestion that volcanic rock simply comes\
          \ from a volcanic process, it's not immediately clear whether this is interchangeable\
          \ with igneous rock."
      'ENVO:00002016':
        text: 'ENVO:00002016'
        meaning: 'ENVO:00002016'
        title: sedimentary rock
        description: A rock formed by deposition of either clastic sediments, organic
          matter, or chemical precipitates (evaporites), followed by compaction of
          the particulate matter and cementation during diagenesis.
      'ENVO:00002017':
        text: 'ENVO:00002017'
        meaning: 'ENVO:00002017'
        title: metamorphic rock
        description: "A rock formed by subjecting any rock type (including previously-formed\
          \ metamorphic rock) to different temperature and pressure conditions than\
          \ those in which the original rock was formed. These temperatures and pressures\
          \ are always higher than those at the Earth's surface and must be sufficiently\
          \ high so as to change the original minerals into other mineral types or\
          \ else into other forms of the same minerals (e.g. by recrystallisation)."
      'ENVO:00002018':
