        meaning: 'ENVO:00003071'
        title: grass silage
      'ENVO:00003081':
        text: 'ENVO:00003081'
        meaning: 'ENVO:00003081'
        title: metal contaminated soil
        description: Soil which has elevated concentrations of metals.
      'ENVO:00003082':
        text: 'ENVO:00003082'
        meaning: 'ENVO:00003082'
        title: enriched soil
        description: This could be demoted to an inferred class if issues with double
