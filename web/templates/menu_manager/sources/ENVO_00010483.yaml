      'ENVO:00000003':
        text: 'ENVO:00000003'
        meaning: 'ENVO:00000003'
        title: mine tailing
        description: Mine tailings are the materials left over after the process of
          separating the valuable fraction from the uneconomic fraction (gangue) of
          an ore.
      'ENVO:00000134':
        text: 'ENVO:00000134'
        meaning: 'ENVO:00000134'
        title: permafrost
        description: Ice is not always present, as may be in the case of nonporous
          bedrock, but it frequently occurs and it may be in amounts exceeding the
          potential hydraulic saturation of the ground material.
      'ENVO:00000194':
        text: 'ENVO:00000194'
        meaning: 'ENVO:00000194'
        title: scree
        description: Broken rock that appears at the bottom of crags, mountain cliffs
          or valley shoulders.
      'ENVO:00000338':
        text: 'ENVO:00000338'
        meaning: 'ENVO:00000338'
        title: vomit material
        description: 'ENVO bodily fluid classes differ from UBERON''s treatment of
          bodily fluids. UBERON refers to the substance itself ("S"). We assert that
          UBERON''s classes are the primary compositional component of the terms in
          ENVO ("S material"). Use of the ENVO terms is typically recommended when
          you wish to indicate that there may be other materials intermixed with S.'
      'ENVO:00000546':
        text: 'ENVO:00000546'
        meaning: 'ENVO:00000546'
        title: lake sediment
        description: Lake sediment is sediment which covers the bottom of a lake.
          Lake sediments are comprised mainly of clastic material (sediment of clay,
          silt, and sand sizes), organic debris, chemical precipitates, or combinations
          of these.
      'ENVO:00001995':
        text: 'ENVO:00001995'
        meaning: 'ENVO:00001995'
        title: rock
        description: From https://en.wikipedia.org/wiki/ [A mineral] is different
          from a rock, which can be an aggregate of minerals or non-minerals and does
          not have a specific chemical composition. The exact definition of a mineral
          is under debate, especially with respect to the requirement a valid species
          be abiogenic, and to a lesser extent with regards to it having an ordered
          atomic structure.
      'ENVO:00001998':
        text: 'ENVO:00001998'
        meaning: 'ENVO:00001998'
        title: soil
        description: '''In engineering terms, soil is referred to as regolith, or
          loose rock material that lies above the ''solid geology''. Soil is commonly
          referred to as "earth" or "dirt"; technically, the term "dirt" should be
          restricted to displaced soil.'' https://en.wikipedia.org/wiki/Soil


          " The upper limit of soil is the boundary between soil and air, shallow
          water, live plants, or plant materials that have not begun to decompose.
          Areas are not considered to have soil if the surface is permanently covered
          by water too deep (typically more than 2.5 meters) for the growth of rooted
          plants.


          The lower boundary that separates soil from the nonsoil underneath is most
          difficult to define. Soil consists of horizons near the Earth''s surface
          that, in contrast to the underlying parent material, have been altered by
          the interactions of climate, relief, and living organisms over time. Commonly,
          soil grades at its lower boundary to hard rock or to earthy materials virtually
          devoid of animals, roots, or other marks of biological activity. For purposes
          of classification, the lower boundary of soil is arbitrarily set at 200
          cm."  Soil taxonomy, 2nd Ed., quoted in http://www.nrcs.usda.gov/wps/portal/nrcs/detail/soils/edu/?cid=nrcs142p2_054280'
      'ENVO:00002001':
        text: 'ENVO:00002001'
        meaning: 'ENVO:00002001'
        title: waste water
        description: Water that has been adversely affected in quality by anthropogenic
          influence.
      'ENVO:00002003':
        text: 'ENVO:00002003'
        meaning: 'ENVO:00002003'
        title: fecal material
        description: "This is distinct from classes such as http://purl.obolibrary.org/obo/UBERON_0001988\
          \ in that it refers to the environmental material composed primarily of\
          \ feces rather than 'just' feces."
      'ENVO:00002005':
        text: 'ENVO:00002005'
        meaning: 'ENVO:00002005'
        title: air
        description: 'The mixture of gases (roughly (by molar content/volume: 78%
          nitrogen, 20.95% oxygen, 0.93% argon, 0.038% carbon dioxide, trace amounts
          of other gases, and a variable amount (average around 1%) of water vapor)
          that surrounds the planet Earth.'
      'ENVO:00002006':
        text: 'ENVO:00002006'
        meaning: 'ENVO:00002006'
        title: liquid water
        description: An environmental material primarily composed of dihydrogen oxide
          in its liquid form.
      'ENVO:00002007':
        text: 'ENVO:00002007'
        meaning: 'ENVO:00002007'
        title: sediment
        description: Sediment is typically deposited on the bed or bottom of a body
