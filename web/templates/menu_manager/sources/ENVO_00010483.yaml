      'FOODON:03400143':
        text: 'FOODON:03400143'
        meaning: 'FOODON:03400143'
        title: fruit or fruit product (us cfr)
        description: Fruit in all forms; includes fruit juices and fruit juice drinks,
          fruit butters, jellies, preserves, and related products.
      'FOODON:03400147':
        text: 'FOODON:03400147'
        meaning: 'FOODON:03400147'
        title: milk or milk product analog (us cfr)
        description: Food product having functional characteristics similar to milk
          or milk products, including cream product analogs, margarine, and milk analogs.
          Certain alternate ingredients are substituted for those components that
          are responsible for specific functional properties.
      'FOODON:03400148':
        text: 'FOODON:03400148'
        meaning: 'FOODON:03400148'
        title: milk or milk product (us cfr)
        description: Milk in all forms, milk-based beverage, cultured milk product,
          or milk or milk product analog. Index infant formula under *MEAL REPLACEMENT*.
      'FOODON:03400155':
        text: 'FOODON:03400155'
        meaning: 'FOODON:03400155'
        title: fruit butter, jelly, preserve or related product (us cfr)
        description: Semisolid or jelled food prepared from fruit or fruit juice and
          other ingredients prescribed for the individual products (21 CFR 150).
      'FOODON:03400164':
        text: 'FOODON:03400164'
        meaning: 'FOODON:03400164'
        title: dairy product (us cfr)
        description: Milk, a product derived from milk, or a dairy product analog;
          includes cheese and frozen dairy desserts. [FDA CFSAN 1995]
      'FOODON:03400187':
        text: 'FOODON:03400187'
        meaning: 'FOODON:03400187'
        title: natural cheese (us cfr)
        description: 'Cheese made from milk or milk components, such as cream, by
          the following process: (1) produce curd through coagulation of milk by bacterial
          action and/or enzymes and/or acidification and draining of whey. (2) For
          cured cheese only: cure the curd. Excludes products made through further
          processing, such as comminuting (see *CHEESE PRODUCT*).'
      'FOODON:03400188':
        text: 'FOODON:03400188'
        meaning: 'FOODON:03400188'
        title: confectionery (us cfr)
        description: Candy or other food product made with sweeteners and frequently
          containing nuts, fruits, starches, flavorings and other foods (21 CFR 170.3(n)(9).
          [FDA CFSAN 1995]
      'FOODON:03400204':
        text: 'FOODON:03400204'
        meaning: 'FOODON:03400204'
        title: candy (us cfr)
        description: Food product prepared by heating a mixture of sweeteners and
          other optional ingredients according to the specific formula for each subgroup.
      'FOODON:03400209':
        text: 'FOODON:03400209'
        meaning: 'FOODON:03400209'
        title: fruit jelly (us cfr)
        description: Jelled product made from one or more fruit juices and optional
          ingredients. Includes both fruit jelly, which may be sweetened with nutritive
          carbohydrate sweeteners, (21 CFR 150.140), and artificially sweetened fruit
          jelly (21 CFR 150.141). The finished fruit jelly must have a soluble solid
          content of no less than 65% and the ratio by weight of the fruit ingredient
          to sweetener in the starting mixture must be no less than 45:55. Artificially
          sweetened fruit jelly must contain no less than 55% fruit ingredient by
          weight.
      'FOODON:03400213':
        text: 'FOODON:03400213'
        meaning: 'FOODON:03400213'
        title: fudge (us cfr)
        description: Soft candy prepared by boiling milk, sugar, salt and optional
          ingredients to the soft-ball stage (238 degrees F.).
      'FOODON:03400231':
        text: 'FOODON:03400231'
        meaning: 'FOODON:03400231'
        title: margarine (us cfr)
        description: Food product having functional characteristics similar to those
          of butter; it is in plastic form or liquid emulsion and contains not less
          than 80% fat whose origin is vegetable or rendered animal carcass fats or
          a mixture of these as well as other optional ingredients specified by 21
          CFR 166.110.
      'FOODON:03400257':
        text: 'FOODON:03400257'
        meaning: 'FOODON:03400257'
        title: fruit or vegetable product (us cfr)
        description: Fruits and vegetables in all forms. [FDA CFSAN 1995]
      'FOODON:03400289':
        text: 'FOODON:03400289'
        meaning: 'FOODON:03400289'
        title: USA agency food product type
        description: 'LanguaL curation note: This term is for CLASSIFICATION ONLY;
          DO NOT USE term in indexing. Use a more precise narrower term.'
      'FOODON:03400293':
        text: 'FOODON:03400293'
        meaning: 'FOODON:03400293'
        title: soft candy (us cfr)
        description: Candy prepared by cooking a mixture of water, sugars and optional
          ingredients to a temperature of 250 degrees F. or less.
      'FOODON:03400294':
        text: 'FOODON:03400294'
        meaning: 'FOODON:03400294'
        title: butter product analog (us cfr)
        description: A food product having functional characteristics similar to a
          butter product; it may be nutritionally equivalent or inferior to the product
          it purports to resemble.
      'FOODON:03400352':
        text: 'FOODON:03400352'
        meaning: 'FOODON:03400352'
        title: international agency food product type
        description: 'LanguaL curation note: This term is for CLASSIFICATION ONLY;
          DO NOT USE term in indexing. Use a more precise narrower term.'
      'FOODON:03400356':
        text: 'FOODON:03400356'
        meaning: 'FOODON:03400356'
        title: European Union agency food product type
        description: 'LanguaL curation note: This term is for CLASSIFICATION ONLY;
          DO NOT USE term in indexing. Use a more precise narrower term.'
      'FOODON:03400361':
        text: 'FOODON:03400361'
        meaning: 'FOODON:03400361'
        title: agency food product type
        description: "This class is designed to hold 3rd party food classification\
          \ schemes which are being mapped to FoodOn classes using the 'has member'\
          \ relation. The two hierarchies are not melded into a subclass polyhierarchy\
          \ because of possible logical inconsistencies in the agency schemes. The\
          \ hierarchies of agency schemes are as true to their agency representation\
          \ as possible."
      'FOODON:03400643':
        text: 'FOODON:03400643'
        meaning: 'FOODON:03400643'
        title: Codex Alimentarius classification of food and feed commodities
        description: 'LanguaL curation note: This term is for CLASSIFICATION ONLY;
          DO NOT USE term in indexing. Use a more precise narrower term.'
      'FOODON:03400644':
        text: 'FOODON:03400644'
        meaning: 'FOODON:03400644'
        title: a.  primary food commodities of plant origin (ccpr)
        description: 'LanguaL curation note: This term is for CLASSIFICATION ONLY;
          DO NOT USE term in indexing. Use a more precise narrower term.'
      'FOODON:03400650':
        text: 'FOODON:03400650'
        meaning: 'FOODON:03400650'
        title: 02  vegetables (ccpr)
        description: 'Vegetables are foods derived from many different kinds of plants
          mostly annual and usually cultivated, commonly known by custom and tradition
          as "vegetables".

          In several countries, some of these commodities grown on large areas are
          distinguished as "field crops" or arable crops e.g. sugar beet. For the
          sake of convenience in this guide such crops are classified under Type 2
          Vegetables.

          Exposure to pesticides is dependent on the particular part of the plant
          used for food and the growing practices.

          Vegetables may be consumed in whole or in part and in the form of fresh,
          dried or processed foods.'
      'FOODON:03400680':
        text: 'FOODON:03400680'
        meaning: 'FOODON:03400680'
        title: 015  pulses (vd) (ccpr)
        description: 'Pulses are derived from the mature seeds naturally or artificially
          dried, of leguminous plants known as beans (dry) and peas (dry).

          The seeds in the pods are protected from most pesticides applied during
          the growing season except pesticides which show a systemic action. The dried
          beans and peas however are often exposed to post-harvest treatments.

          The dry pulses are consumed after processing or household cooking.'
      'FOODON:03400777':
        text: 'FOODON:03400777'
        meaning: 'FOODON:03400777'
        title: eurofir food classification
        description: 'LanguaL curation note: This term is for CLASSIFICATION ONLY;
          DO NOT USE term in indexing. Use a more precise narrower term.'
      'FOODON:03400801':
        text: 'FOODON:03400801'
        meaning: 'FOODON:03400801'
        title: seafood or related product (eurofir)
        description: "The group includes marine or freshwater fish, molluscs, crustaceans,\
          \ and other fauna such as reptiles, insects or frogs not in the \x93Meats\x94\
          \ group. The group also includes seafood product analogs and seafood-based\
          \ sausage or luncheon meat as well as such products as squid ink and clam\
          \ juice."
      'FOODON:03400803':
        text: 'FOODON:03400803'
        meaning: 'FOODON:03400803'
        title: seafood product (eurofir)
        description: "Includes fish offal; a food product whose predominant constituent\
          \ is fish (e.g. dried and salted fish, smoked fish, canned fish, pickled\
          \ fish, restructured fish and fish analogues, surimi; fish paste, p\xE2\
          t\xE9)."
      'FOODON:03400840':
        text: 'FOODON:03400840'
        meaning: 'FOODON:03400840'
        title: beverage (non-milk) (eurofir)
        description: Alcoholic or non-alcoholic beverage; excludes milk and milk-based
          beverages.
      'FOODON:03400842':
        text: 'FOODON:03400842'
        meaning: 'FOODON:03400842'
        title: non alcoholic beverage (eurofir)
        description: Beverage containing no more than 0.5% alcohol; it may be flavoured,
          sweetened or carbonated; includes soft drinks and steeped beverages; excludes
          milk in all forms, fruit juices and vegetable juices.
      'FOODON:03400845':
        text: 'FOODON:03400845'
        meaning: 'FOODON:03400845'
        title: coffee, tea, cocoa or infusion (eurofir)
        description: 'LanguaL curation note: Renamed from *COFFEE, TEA, COCOA (EUROFIR)*
          (LanguaL 2010).'
      'FOODON:03400852':
        text: 'FOODON:03400852'
        meaning: 'FOODON:03400852'
        title: miscellaneous food product (eurofir)
        description: 'LanguaL curation note: Use for foods and ingredients that could
          not fit into any of the above classes.'
      'FOODON:03400861':
        text: 'FOODON:03400861'
        meaning: 'FOODON:03400861'
        title: prepared food product (eurofir)
        description: This subgroup includes multicomponent meals, sauces, retail salads,
          desserts, soups, snacks and other foods where similarity of the product
          type is more significant than the source of the principal ingredient(s).
      'FOODON:03400865':
        text: 'FOODON:03400865'
        meaning: 'FOODON:03400865'
        title: soup (eurofir)
        description: A liquid food made by simmering meat, poultry, seafood or vegetables,
          being clear or thickened to the consistency of a thin puree or having milk
          or cream added, and often containing pieces of solid food such as meat,
          shellfish, pasta or vegetables. Soup takes precedence over other food products.
          Examples are egg and lemon soup, oxtail soup, fish soup, rice soup, lentil
          soup, minestrone, cherry soup.
      'FOODON:03400874':
        text: 'FOODON:03400874'
        meaning: 'FOODON:03400874'
        title: GS1 Global Product Classification (GPC)
        description: 'The Global System 1 (GS1) Global Product Classification (GPC)
          is a system that gives buyers and sellers a common language for grouping
          products in the same way, everywhere in the world.$br/$

          The GS1 GPC classification in facet A is currently updated based on June
          2017 release of GS1 GPC Standard for Food/Beverage/Tobacco, except for codes
          pertaining to tobacco. See the GS1 site for details [https://www.gs1.org/standards/gpc].'
      'FOODON:03400960':
        text: 'FOODON:03400960'
        meaning: 'FOODON:03400960'
        title: 50220000 - cereal/grain/pulse products (gs1 gpc)
      'FOODON:03400969':
