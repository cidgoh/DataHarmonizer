        description: An avian egg food product having chicken eggs or derivatives
          as a defining ingredient.
      'FOODON:00001276':
        text: 'FOODON:00001276'
        meaning: 'FOODON:00001276'
        title: apple cider (alcoholic)
        description: Cider, hard apple cider, or hard cider in the US, is an alcoholic
          beverage made from the fermented juice of apples.
      'FOODON:00001277':
