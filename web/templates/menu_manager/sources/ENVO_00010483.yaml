id: http://purl.obolibrary.org/obo/ENVO_
name: ENVO_00010483
title: environmental material
description: 'Everything under this parent must be a mass noun (i.e. not countable).
  All subclasses are to be understood as being composed primarily of the named entity,
  rather than restricted to that entity. For example, "ENVO:water" is to be understood
  as "environmental material composed primarly of some CHEBI:water".'
version: http://purl.obolibrary.org/obo/envo/releases/2025-10-20/envo.owl
license: ''
in_language: en
