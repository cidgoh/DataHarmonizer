      'ENVO:02000044':
        text: 'ENVO:02000044'
        meaning: 'ENVO:02000044'
        title: siliceous ooze
        description: 'Siliceous ooze is a marine sediment composed of the debris of
          plankton with silica shells, such as diatoms and radiolaria. This ooze is
          limited to areas with high biological productivity, such as the polar oceans,
          and upwelling zones near the equator. The least common type of sediment,
          it covers only 15% of the ocean floor. It accumulates at a slower rate than
          calcareous ooze: 0.2-1 cm / 1000 yr.'
      'ENVO:02000045':
        text: 'ENVO:02000045'
        meaning: 'ENVO:02000045'
        title: red clay
        description: 'Red clay, also known as pelagic clay, accumulates in the deepest
          and most remote areas of the ocean. Containing less than 30% biogenic material,
          its composition is a varied mix of very fine quartz and clay minerals, authigenic
          deposits precipitated directly from seawater, and micrometeorites. Though
          called "red" because it sometimes takes the color of oxidized iron minerals,
          it is usually brownish in color. Its ultimate origin is uncertain, but red
          clay seems to be mostly derived from distant rivers, and windblown dust.
          Covering 38% of the ocean floor, it accumulates more slowly than any other
          sediment type, at only 0.1-0.5 cm / 1000 yr.'
      'ENVO:02000046':
        text: 'ENVO:02000046'
        meaning: 'ENVO:02000046'
        title: calcareous ooze
        description: "Calcareous ooze is a marine sediment composed primarily of the\
          \ shells--also known as tests--of foraminifera, coccolithophores, and pteropods.\
          \ This is the most common pelagic sediment by area, covering 48% of the\
          \ world ocean's floor. This type of ooze is limited to depths above the\
          \ Carbonate Compensation Depth at time of burial. It accumulates more rapidly\
          \ than any other pelagic sediment type, with a rate that varies from 0.3\
          \ - 5 cm / 1000 yr."
      'ENVO:02000047':
        text: 'ENVO:02000047'
        meaning: 'ENVO:02000047'
        title: animal feed
        description: Most animal feed is from plants but some is of animal origin.
          Fodder refers particularly to food given to the animals (including plants
          cut and carried to them), rather than that which they forage for themselves.
          It includes hay, straw, silage, compressed and pelleted feeds, oils and
          mixed rations, and also sprouted grains and legumes.
      'ENVO:02000048':
        text: 'ENVO:02000048'
        meaning: 'ENVO:02000048'
        title: contaminated animal feed
        description: Contaminated animal feed is an animal feed that has become contaminated
          with or come contact with microorganisms or toxic chemicals.
      'ENVO:02000053':
