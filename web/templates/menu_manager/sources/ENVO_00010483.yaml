        description: Orange juice that has not undergone pasteurization.
      'FOODON:00001278':
        text: 'FOODON:00001278'
        meaning: 'FOODON:00001278'
        title: cake food product
        description: A food that is usually sweet and often baked. Cakes normally
          combine some kind of flour, a sweetening agent (commonly sugar), a binding
          agent (generally egg, though gluten  or starch  are often used by lacto-vegetarians
          and vegans), fats (usually butter, shortening, or margarine, although a
          fruit puree such as applesauce is sometimes substituted to avoid using fat),
          a liquid (milk, water or fruit juice), flavors and some form of leavening
          agent (such as yeast or baking powder), though many cakes lack these ingredients
          and instead rely on air bubbles in the dough to expand and cause the cake
          to rise. Cake is often frosted with buttercream  or marzipan, and finished
          with piped borders and crystallized fruit.
      'FOODON:00001279':
        text: 'FOODON:00001279'
        meaning: 'FOODON:00001279'
        title: cake icing food product
      'FOODON:00001280':
