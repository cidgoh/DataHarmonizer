      'ENVO:00002228':
        text: 'ENVO:00002228'
        meaning: 'ENVO:00002228'
        title: pond water
      'ENVO:00002229':
        text: 'ENVO:00002229'
        meaning: 'ENVO:00002229'
        title: arenosol
        description: Arenosols are sandy soils, including both soils developed in
          residual sands after in situ weathering of usually quartz-rich sediments
          or rock, and soils developed in recently deposited sands such as dunes in
          deserts and beach lands.
      'ENVO:00002230':
        text: 'ENVO:00002230'
        meaning: 'ENVO:00002230'
        title: anthrosol
        description: Anthrosols comprise soils that have been modified profoundly
          through human activities, such as addition of organic materials or household
          wastes, irrigation and cultivation.
      'ENVO:00002231':
        text: 'ENVO:00002231'
        meaning: 'ENVO:00002231'
        title: alisol
        description: Alisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Alisols have a low base
          saturation at certain depths and high-activity clays throughout the argic
          horizon. They lack the albeluvic tonguing as in Albeluvisols. They occur
          predominantly in humid tropical, humid subtropical and warm temperate regions.
      'ENVO:00002232':
        text: 'ENVO:00002232'
        meaning: 'ENVO:00002232'
        title: andosol
        description: Andosols are soils that develop in volcanic ejecta or glasses
          under almost any climate (except under hyperarid climate conditions). However,
          Andosols may also develop in other silicate-rich materials under acid weathering
          in humid and perhumid climates.
      'ENVO:00002233':
        text: 'ENVO:00002233'
        meaning: 'ENVO:00002233'
        title: albeluvisol
        description: Albeluvisols are soils that have, beginning within 1 m of the
          soil surface, a clay illuviation horizon with an irregular or broken upper
          boundary resulting in tonguing of bleached soil material into the illuviation
          horizon.
      'ENVO:00002234':
        text: 'ENVO:00002234'
        meaning: 'ENVO:00002234'
        title: acrisol
        description: Acrisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Acrisols have in certain
          depths a low base saturation and low-activity clays.
      'ENVO:00002235':
        text: 'ENVO:00002235'
        meaning: 'ENVO:00002235'
        title: cambisol
        description: Cambisols combine soils with at least an incipient subsurface
          soil formation. Transformation of parent material is evident from structure
          formation and mostly brownish discoloration, increasing clay percentage,
          and/or carbonate removal.
      'ENVO:00002236':
        text: 'ENVO:00002236'
        meaning: 'ENVO:00002236'
        title: cryosol
        description: Cryosols comprise mineral soils formed in a permafrost environment.
          Where water is present, it occurs primarily in the form of ice. Cryogenic
          processes are the dominant soil-forming processes.
      'ENVO:00002237':
        text: 'ENVO:00002237'
        meaning: 'ENVO:00002237'
        title: chernozem
        description: Chernozems are soils with a thick black surface layer that is
          rich in organic matter.
      'ENVO:00002238':
        text: 'ENVO:00002238'
        meaning: 'ENVO:00002238'
        title: durisol
        description: Durisols are associated mainly with old surfaces in arid and
          semi-arid environments and accommodate very shallow to moderately deep,
          moderately well- to well-drained soils that contain cemented secondary silica
          (SiO2) within 100 cm of the soil surface.
      'ENVO:00002239':
        text: 'ENVO:00002239'
        meaning: 'ENVO:00002239'
        title: calcisol
        description: Calcisols are soils in which there is substantial secondary accumulation
          of lime. Calcisols are common in highly calcareous parent materials and
          widespread in arid and semi-arid environments.
      'ENVO:00002240':
        text: 'ENVO:00002240'
        meaning: 'ENVO:00002240'
        title: kastanozem
        description: Kastanozems are dry grassland soils, among them the zonal soils
          of the short-grass steppe belt, south of the Eurasian tall-grass steppe
          belt with Chernozems. Kastanozems have a similar profile to that of Chernozems
          but the humus-rich surface horizon is thinner and not as dark as that of
          the Chernozems and they show more prominent accumulation of secondary carbonates.
      'ENVO:00002241':
        text: 'ENVO:00002241'
        meaning: 'ENVO:00002241'
        title: leptosol
        description: Leptosols are very shallow soils over continuous rock and soils
          that are extremely gravelly and/or stony. Leptosols are azonal soils and
          particularly common in mountainous regions.
      'ENVO:00002242':
        text: 'ENVO:00002242'
        meaning: 'ENVO:00002242'
        title: lixisol
        description: Lixisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Lixisols have a high base
          saturation and low-activity clays at certain depths.
      'ENVO:00002243':
        text: 'ENVO:00002243'
        meaning: 'ENVO:00002243'
        title: histosol
        description: Histosols comprise soils formed in organic material. These vary
          from soils developed in predominantly moss peat in boreal, arctic and subarctic
          regions, via moss peat, reeds/ sedge peat (fen) and forest peat in temperate
          regions to mangrove peat and swamp forest peat in the humid tropics. Histosols
          are found at all altitudes, but the vast majority occurs in lowlands.
      'ENVO:00002244':
        text: 'ENVO:00002244'
        meaning: 'ENVO:00002244'
        title: gleysol
        description: Gleysols are wetland soils that, unless drained, are saturated
          with groundwater for long enough periods to develop a characteristic gleyic
          colour pattern. This pattern is essentially made up of reddish, brownish
          or yellowish colours at ped surfaces and/or in the upper soil layer or layers,
          in combination with greyish/bluish colours inside the peds and/or deeper
          in the soil.
      'ENVO:00002245':
        text: 'ENVO:00002245'
        meaning: 'ENVO:00002245'
        title: gypsisol
        description: Gypsisols are soils with substantial secondary accumulation of
          gypsum (calcium sulfate). These soils are found in the driest parts of the
          arid climate zone.
      'ENVO:00002246':
        text: 'ENVO:00002246'
        meaning: 'ENVO:00002246'
        title: ferralsol
        description: Ferralsols represent the classical, deeply weathered, red or
          yellow soils of the humid tropics. These soils have diffuse horizon boundaries,
          a clay assemblage dominated by low-activity clays (mainly kaolinite) and
          a high content of sesquioxides.
      'ENVO:00002247':
        text: 'ENVO:00002247'
        meaning: 'ENVO:00002247'
        title: nitisol
        description: Nitisols are deep, well-drained, red, tropical soils with diffuse
          horizon boundaries and a subsurface horizon with more than 30 percent clay
          and moderate to strong angular blocky structure elements that easily fall
          apart into characteristic shiny, polyhedric (nutty) elements. Weathering
          is relatively advanced but Nitisols are far more productive than most other
          red, tropical soils.
      'ENVO:00002248':
        text: 'ENVO:00002248'
        meaning: 'ENVO:00002248'
        title: luvisol
        description: Luvisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Luvisols have high-activity
          clays throughout the argic horizon and a high base saturation at certain
          depths.
      'ENVO:00002249':
        text: 'ENVO:00002249'
        meaning: 'ENVO:00002249'
        title: phaeozem
        description: Phaeozems accommodate soils of relatively wet grassland and forest
          regions in moderately continental climates. Phaeozems are much like Chernozems
          and Kastanozems but are leached more intensively. Consequently, they have
          dark, humus rich surface horizons that, in comparison with Chernozems and
          Kastanozems, are less rich in bases. Phaeozems may or may not have secondary
          carbonates but have a high base saturation in the upper metre of the soil.
      'ENVO:00002250':
        text: 'ENVO:00002250'
        meaning: 'ENVO:00002250'
        title: plinthosol
        description: Plinthosols are soils with plinthite, petroplinthite or pisoliths.
          Plinthite is an Fe-rich (in some cases also Mn-rich), humus-poor mixture
          of kaolinitic clay (and other products of strong weathering such as gibbsite)
          with quartz and other constituents that changes irreversibly to a layer
          with hard nodules, a hardpan or irregular aggregates on exposure to repeated
          wetting and drying. Petroplinthite is a continuous, fractured or broken
          sheet of connected, strongly cemented to indurated nodules or mottles. Pisoliths
          are discrete strongly cemented to indurated nodules. Both petroplinthite
          and pisoliths develop from plinthite by hardening.
      'ENVO:00002251':
        text: 'ENVO:00002251'
        meaning: 'ENVO:00002251'
        title: planosol
        description: Planosols are soils with a light-coloured, surface horizon that
          shows signs of periodic water stagnation and abruptly overlies a dense,
          slowly permeable subsoil with significantly more clay than the surface horizon.
      'ENVO:00002252':
        text: 'ENVO:00002252'
        meaning: 'ENVO:00002252'
        title: solonchak
        description: Solonchaks are soils that have a high concentration of soluble
          salts at some time in the year. Solonchaks are largely confined to the arid
          and semi-arid climate zones and to coastal regions in all climates.
      'ENVO:00002253':
        text: 'ENVO:00002253'
        meaning: 'ENVO:00002253'
        title: umbrisol
        description: Umbrisols are soils in which organic matter has accumulated within
          the mineral surface soil (in most cases with low base saturation) to the
          extent that it significantly affects the behaviour and utilization of the
          soil.
      'ENVO:00002254':
        text: 'ENVO:00002254'
        meaning: 'ENVO:00002254'
        title: vertisol
        description: A soil in which there is a high content of expansive clay known
          as montmorillonite that forms deep cracks in drier seasons or years. Alternate
          shrinking and swelling causes self-mulching, where the soil material consistently
          mixes itself, causing vertisols to have an extremely deep A horizon and
          no B horizon.
      'ENVO:00002255':
        text: 'ENVO:00002255'
        meaning: 'ENVO:00002255'
        title: solonetz
        description: Solonetz are soils with a dense, strongly structured, clayey
          subsurface horizon that has a high proportion of adsorbed Na and/or Mg ions.
          Solonetz that contain free soda (Na2CO3) are strongly alkaline (field pH
          > 8.5).
      'ENVO:00002256':
        text: 'ENVO:00002256'
        meaning: 'ENVO:00002256'
        title: regosol
        description: Regosols form a taxonomic remnant group containing all soils
          that could not be accommodated in any of the other RSGs. In practice, Regosols
          are very weakly developed mineral soils in unconsolidated materials that
          do not have a mollic or umbric horizon, are not very shallow or very rich
          in gravels (Leptosols), sandy (Arenosols) or with fluvic materials (Fluvisols).
          Regosols are extensive in eroding lands, particularly in arid and semi-arid
          areas and in mountainous terrain.
      'ENVO:00002257':
        text: 'ENVO:00002257'
        meaning: 'ENVO:00002257'
        title: podzol
        description: Podzols are soils with a typically ash-grey upper subsurface
          horizon, bleached by loss of organic matter and iron oxides, on top of a
          dark accumulation horizon with brown, reddish or black illuviated humus
          and/or reddish Fe compounds. Podzols occur in humid areas in the boreal
          and temperate zones and locally also in the tropics.
      'ENVO:00002258':
        text: 'ENVO:00002258'
        meaning: 'ENVO:00002258'
        title: loam
        description: Some authorities consider loam to be any soil material that contains
          7 to 27% clay, 28 to 50% silt, and less than 52% sand.
      'ENVO:00002259':
        text: 'ENVO:00002259'
        meaning: 'ENVO:00002259'
        title: agricultural soil
        description: Soil which is part of an ecosystem used for agricultural activities.
      'ENVO:00002260':
        text: 'ENVO:00002260'
        meaning: 'ENVO:00002260'
        title: dune soil
        description: Soil which is part of some dune.
      'ENVO:00002261':
        text: 'ENVO:00002261'
        meaning: 'ENVO:00002261'
        title: forest soil
        description: A portion of soil which is found in a forested area.
      'ENVO:00002262':
        text: 'ENVO:00002262'
        meaning: 'ENVO:00002262'
        title: clay soil
        description: Soil which is primarily composed of clay.
      'ENVO:00002263':
        text: 'ENVO:00002263'
        meaning: 'ENVO:00002263'
        title: garden soil
        description: A portion of soil which is found in a garden.
      'ENVO:00002264':
        text: 'ENVO:00002264'
        meaning: 'ENVO:00002264'
        title: waste material
        description: A material which is not the desired output of a process and which
          is typically the input of a process which removes it from its producer (e.g.
          a disposal process).
      'ENVO:00002266':
        text: 'ENVO:00002266'
        meaning: 'ENVO:00002266'
        title: chicken breeding waste material
      'ENVO:00002267':
        text: 'ENVO:00002267'
        meaning: 'ENVO:00002267'
        title: industrial waste material
        description: Industrial wastes are liquid, solid and gaseous wastes originating
          from the manufacture of specific products.
      'ENVO:00002273':
        text: 'ENVO:00002273'
        meaning: 'ENVO:00002273'
        title: fluvisol
        description: Fluvisols accommodate genetically young, azonal soils in alluvial
          deposits.
      'ENVO:00002274':
        text: 'ENVO:00002274'
        meaning: 'ENVO:00002274'
        title: stagnosol
        description: Stagnosols are soils with a perched water table showing redoximorphic
          features caused by surface water. Stagnosols are periodically wet and mottled
          in the topsoil and subsoil, with or without concretions and/or bleaching.
      'ENVO:00002275':
        text: 'ENVO:00002275'
        meaning: 'ENVO:00002275'
        title: technosol
        description: Technosols are soils whose properties and pedogenesis are dominated
          by their technical origin. They contain a significant amount of artefacts
          (something in the soil recognizably made or extracted from the earth by
          humans), or are sealed by technic hard rock (material created by humans,
          having properties unlike natural rock). They include soils from wastes (landfills,
          sludge, cinders, mine spoils and ashes), pavements with their underlying
          unconsolidated materials, soils with geomembranes and constructed soils
          in human-made materials.
      'ENVO:00002276':
        text: 'ENVO:00002276'
        meaning: 'ENVO:00002276'
        title: animal waste material
      'ENVO:00002869':
        text: 'ENVO:00002869'
        meaning: 'ENVO:00002869'
        title: hay
        description: Hay is grass, legumes or other herbaceous plants that have been
          cut, dried, and stored for use as animal fodder, particularly for grazing
          livestock such as cattle, horses, goats, and sheep.
      'ENVO:00002870':
        text: 'ENVO:00002870'
        meaning: 'ENVO:00002870'
        title: adobe
        description: A natural building material mode from sand, clay, water, and
          some kind of fibrous or organic material (sticks, straw, and/or manure).
      'ENVO:00002871':
        text: 'ENVO:00002871'
        meaning: 'ENVO:00002871'
        title: alluvial soil
        description: Soil which has been eroded and influenced by flowing water and
          redeposited in a non-marine setting.
      'ENVO:00002872':
        text: 'ENVO:00002872'
        meaning: 'ENVO:00002872'
        title: bagasse
        description: The biomass remaining after sugarcane stalks are crushed to extract
          their juice.
      'ENVO:00002873':
        text: 'ENVO:00002873'
        meaning: 'ENVO:00002873'
        title: organic waste material
      'ENVO:00002875':
        text: 'ENVO:00002875'
        meaning: 'ENVO:00002875'
        title: oil contaminated soil
        description: Soil which has elevated concentrations of oil.
      'ENVO:00002982':
        text: 'ENVO:00002982'
        meaning: 'ENVO:00002982'
        title: clay
        description: "This definition is intentionally ambiguous to support the multiple\
          \ thresholds set by different authorities.The distinction between silt and\
          \ clay varies by discipline. Geologists and soil scientists usually consider\
          \ the separation to occur at a particle size of 2 \u03BCm (clays being finer\
          \ than silts), sedimentologists often use 4\u20135 \u03BCm, and colloid\
          \ chemists use 1 \u03BCm. Geotechnical engineers distinguish between silts\
          \ and clays based on the plasticity properties of the soil, as measured\
          \ by the soils' Atterberg limits. ISO 14688 grades clay particles as being\
          \ smaller than 2 \u03BCm and silt particles as being larger. Mixtures of\
          \ sand, silt and less than 40% clay are called loam. Similar mixtures with\
          \ greater than 40% clay are often considered clay soils."
      'ENVO:00002983':
        text: 'ENVO:00002983'
        meaning: 'ENVO:00002983'
        title: fuel oil
        description: Oils having a flash point of approximately 42 degrees Celsius
          and oils burned in cotton or wool-wick burners are not typically considered
          fuel oils. The term fuel oil is also used in a stricter sense to refer only
          to the heaviest commercial fuel that can be obtained from crude oil, i.e.,
          heavier than gasoline and naphtha.
      'ENVO:00002984':
        text: 'ENVO:00002984'
        meaning: 'ENVO:00002984'
        title: petroleum
        description: A naturally occurring flammable liquid consisting of a complex
          mixture of hydrocarbons of various molecular weights and other liquid organic
          compounds, that are found in geologic formations beneath the planetary surfaces.
      'ENVO:00002985':
        text: 'ENVO:00002985'
        meaning: 'ENVO:00002985'
        title: oil
        description: A nonpolar, hydrophobic, and lipophilic material which is a viscous
          liquid at ambient temperatures (about 20 degrees Celsius) or slightly warmer.
      'ENVO:00003030':
        text: 'ENVO:00003030'
        meaning: 'ENVO:00003030'
        title: silage
        description: A fermented, high-moisture forage that can be fed to ruminants.
      'ENVO:00003031':
        text: 'ENVO:00003031'
        meaning: 'ENVO:00003031'
        title: animal manure
        description: 'This is interesting in that the "role" aspect of "waste" is
          (or can be) replaced by another role "fertilizer". Thus, the positioning
          of "manure" under waste may not be totally correct.'
      'ENVO:00003032':
        text: 'ENVO:00003032'
        meaning: 'ENVO:00003032'
        title: fresh animal manure
      'ENVO:00003033':
        text: 'ENVO:00003033'
        meaning: 'ENVO:00003033'
        title: mushroom compost
        description: A compost which generally consists of a combination of wheat
          straw, dried blood, horse manure and ground chalk, composted together and
          is the residual compost waste generated by industrial mushroom production.
      'ENVO:00003044':
        text: 'ENVO:00003044'
        meaning: 'ENVO:00003044'
        title: brine
        description: It is used (now less popular than historically) to preserve vegetables,
          fish, and meat.
      'ENVO:00003045':
        text: 'ENVO:00003045'
        meaning: 'ENVO:00003045'
        title: bacon curing brine
      'ENVO:00003064':
        text: 'ENVO:00003064'
        meaning: 'ENVO:00003064'
        title: drinking water
        description: Drinking water is water which may be consumed by humans with
          no adverse effects on their health.
      'ENVO:00003065':
        text: 'ENVO:00003065'
        meaning: 'ENVO:00003065'
        title: distilled water
      'ENVO:00003071':
