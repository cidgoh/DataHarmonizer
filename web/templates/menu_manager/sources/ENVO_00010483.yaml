      'ENVO:00005744':
        text: 'ENVO:00005744'
        meaning: 'ENVO:00005744'
        title: allotment garden soil
        description: Soil which is part of an allotment garden.
      'ENVO:00005746':
        text: 'ENVO:00005746'
        meaning: 'ENVO:00005746'
        title: savanna soil
        description: A portion of soil which is found in a savanna.
      'ENVO:00005747':
        text: 'ENVO:00005747'
        meaning: 'ENVO:00005747'
        title: compost soil
        description: Soil which is derived from compost.
      'ENVO:00005748':
        text: 'ENVO:00005748'
        meaning: 'ENVO:00005748'
        title: dry soil
        description: Soil which has little to no water content and in which minerals
          and other soluble chemical entities have either bonded or become adsorbed
          to sold particles due to insufficient water availability.
      'ENVO:00005749':
        text: 'ENVO:00005749'
        meaning: 'ENVO:00005749'
        title: farm soil
        description: A portion of soil which is part of a cropland or a rangeland
          biome.
      'ENVO:00005750':
        text: 'ENVO:00005750'
        meaning: 'ENVO:00005750'
        title: grassland soil
        description: A portion of soil which is found in a grassland.
      'ENVO:00005751':
        text: 'ENVO:00005751'
        meaning: 'ENVO:00005751'
        title: jungle soil
        description: Soil which is part of a densely forested area subject to tropical
          climate patterns.
      'ENVO:00005752':
        text: 'ENVO:00005752'
        meaning: 'ENVO:00005752'
        title: sawah soil
        description: Soil which is part of a sawah, a wet or irrigated rice field.
      'ENVO:00005753':
