        meaning: 'FOODON:00001260'
        title: beer beverage
        description: Beer is a fermented cereal beverage resulting from the fermentation
          most commonly of malted barley (though wheat, corn, or rice may included),
          by a yeast, most commonly Saccharomyces cerevisiae, and flavored by dried
          flowers of hops, Humulus lupulus.
      'FOODON:00001261':
        text: 'FOODON:00001261'
        meaning: 'FOODON:00001261'
        title: vegetable food product
        description: 'FAO definition for vegetable: "Vegetables are plants cultivated
          both as field crops and garden crops, both in the open and under glass."
          and also: "Vegetables are grouped according to botanic characteristics as
          follows: leafy or stem vegetables (e.g., cabbage); fruit-bearing vegetables
          (e.g., melons); flower vegetables (e.g., cauliflowers); root, bulb and tuberous
          vegetables (e.g., onion); leguminous vegetables (e.g., green peas); other
          vegetables (e.g., green maize and mushrooms)."'
      'FOODON:00001262':
        text: 'FOODON:00001262'
        meaning: 'FOODON:00001262'
        title: botanical fruit food product
        description: Mature ovary of a plant, with a fleshy part of the carpel that
          develops with the seed to attract animals for aid in dispersal. Botanically,
          nuts are considered fruits.
      'FOODON:00001264':
        text: 'FOODON:00001264'
        meaning: 'FOODON:00001264'
        title: legume food product
        description: A one-celled fruit (pod) usually dehiscing down both sutures,
          and having the seed attached along a ventral suture. (Roubik 1995)
      'FOODON:00001266':
