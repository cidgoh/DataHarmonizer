        meaning: 'FOODON:03420108'
        title: sugar
        description: "A broad term that includes the nutritive sweeteners dextrose,\
          \ fructose, galactose, lactose, maltose and sucrose, which are simple carbohydrates\
          \ with molecules composed of one or two saccharide units. Note that on a\
          \ product label or in a recipe, 'sugar' means *SUCROSE* and should be so\
          \ indexed. Use the broad term *SUGAR* only if the specific sugar used is\
          \ not known or not listed in the vocabulary."
      'FOODON:03420116':
        text: 'FOODON:03420116'
        meaning: 'FOODON:03420116'
        title: food material by organism
        description: 'LanguaL curation note: "e.g. *LEAF*, *ROOT OR TUBER*, *ORGAN
          MEAT*, *MILK* OR *EGG*; it also includes components of parts, such as *CREAM*,
          and extracts, concentrates or isolates, such as *PROTEIN EXTRACT* or *SUGAR*."'
      'FOODON:03420152':
        text: 'FOODON:03420152'
        meaning: 'FOODON:03420152'
        title: carbohydrate extract, concentrate, or isolate
        description: Extract, concentrate or isolate high in sugar, oligosaccharide
          or polysaccharide.
      'FOODON:03420156':
        text: 'FOODON:03420156'
        meaning: 'FOODON:03420156'
        title: brown sugar
        description: Soft sugar whose crystals are covered by a film of refined dark
          syrup that imparts color, flavor, and moisture.
      'FOODON:03420164':
        text: 'FOODON:03420164'
        meaning: 'FOODON:03420164'
        title: animal material
        description: "Langual note: Includes eggs and milk that, although separated\
          \ from the animal, are produced as integral parts and are affected by the\
          \ animal's food intake and metabolism."
      'FOODON:03420228':
        text: 'FOODON:03420228'
        meaning: 'FOODON:03420228'
        title: extract, concentrate or isolate of plant or animal
        description: "Damion Dooley's note: Items in this branch will be merged into\
          \ foodon food product branch."
      'FOODON:03420244':
        text: 'FOODON:03420244'
        meaning: 'FOODON:03420244'
        title: mammalian milk whey
        description: The serum or watery part of milk that is separated from the thicker
          or more coagulable part or curd, espcially in the process of making cheese;
          it contains lactose, minerals and lactalbumin.
      'FOODON:03420307':
        text: 'FOODON:03420307'
        meaning: 'FOODON:03420307'
        title: seed oil
        description: The oil produced by pressing or extracting lipids from plant
          seeds (e.g. grapeseed oil, rapeseed oil, linseed oil) /AM
      'FOODON:03430109':
        text: 'FOODON:03430109'
        meaning: 'FOODON:03430109'
        title: food (liquid, low viscosity)
        description: "Examples are: water, apple juice, sherry, acidophilus milk,\
          \ whipping cream and some heavy liqueurs. The range of low viscosity liquid\
          \ spans sucrose solutions between 0 and 45% solids (viscosity range from\
          \ 1 to 10 centipoise). Prefer 'solid pieces' factor term to 'small particles'\
          \ if both appear in the food."
      'FOODON:03430130':
        text: 'FOODON:03430130'
        meaning: 'FOODON:03430130'
        title: food (liquid)
        description: "Liquids range from water to honey, corresponding to a range\
          \ in viscosity (or apparent viscosity) from 1 to 500 centipoise (viscosity\
          \ is a measure of a liquid's resistance to flow). Products that are pourable\
          \ but have a higher viscosity are *SEMILIQUID*."
      'FOODON:03460177':
        text: 'FOODON:03460177'
        meaning: 'FOODON:03460177'
        title: plant seed or nut food product
        description: 'LanguaL curation note: With the exception of peanut (see *PEANUT
          OR PEANUT BUTTER ADDED*), used when a nut or seed ingredient is the second
          ingredient in order of predominance.'
      'FOODON:03460231':
        text: 'FOODON:03460231'
        meaning: 'FOODON:03460231'
        title: chocolate or cocoa
        description: 'LanguaL curation note: Used when chocolate or cocoa is added
          at any level or when chocolate is used as a coating.'
      'FOODON:03460263':
        text: 'FOODON:03460263'
        meaning: 'FOODON:03460263'
        title: vegetable fat or oil
        description: This is a convenience class inherited from LanguaL
