        title: fermented millet food product
      'FOODON:00001063':
        text: 'FOODON:00001063'
        meaning: 'FOODON:00001063'
        title: millet beer food product
      'FOODON:00001064':
        text: 'FOODON:00001064'
        meaning: 'FOODON:00001064'
        title: bottled beer food product
      'FOODON:00001065':
        text: 'FOODON:00001065'
        meaning: 'FOODON:00001065'
        title: blue cheese food product
        description: 'SIREN DB annotation:

          * solid FOODON:03430151

          * curd FOODON:03420245

          * curing or aging process FOODON:03460253

          * interior mold curing process FOODON:03460331'
      'FOODON:00001067':
        text: 'FOODON:00001067'
        meaning: 'FOODON:00001067'
        title: buttermilk food product
        description: The liquid left over after producing butter from cream during
          the churning process.
      'FOODON:00001069':
        text: 'FOODON:00001069'
        meaning: 'FOODON:00001069'
        title: fermented fruit food product
      'FOODON:00001070':
        text: 'FOODON:00001070'
        meaning: 'FOODON:00001070'
        title: miso food product
        description: 'SIREN DB annotation:

          * semisolid FOODON:03430144

          * fully heat-treated FOODON:03440014

          * seed, skin present, germ present FOODON:03420133

          * fermentation/modification process, multiple component FOODON:03460128

          * salted FOODON:03460173

          * curing or aging process FOODON:03460253

          * preservation by fermentation FOODON:03470104'
      'FOODON:00001071':
        text: 'FOODON:00001071'
        meaning: 'FOODON:00001071'
        title: grape must
        description: Grape pomace components typically comprises between 7 to 23 percent
          of the total weight of must. [https://en.wikipedia.org/wiki/Must]
      'FOODON:00001073':
        text: 'FOODON:00001073'
        meaning: 'FOODON:00001073'
        title: vinegar food product
        description: A liquid produced from the fermentation of ethanol in a process
          that yields its key ingredient, acetic acid.
      'FOODON:00001074':
        text: 'FOODON:00001074'
        meaning: 'FOODON:00001074'
        title: barley malt vinegar
        description: Vinegar is made by malting barley, causing the starch in the
          grain to turn to maltose.
      'FOODON:00001075':
        text: 'FOODON:00001075'
        meaning: 'FOODON:00001075'
        title: mammalian milk (nonfat, dry)
      'FOODON:00001076':
        text: 'FOODON:00001076'
        meaning: 'FOODON:00001076'
        title: sake food product
        description: Sake is a fermented rice beverage resulting from the fermentation
          of rice with the mold Aspergillus oryzae and, in parallel, with the yeast
          Saccharomyces cerevisiae [wikipedia:sake]
      'FOODON:00001077':
        text: 'FOODON:00001077'
        meaning: 'FOODON:00001077'
        title: salt pork meat food product
      'FOODON:00001078':
        text: 'FOODON:00001078'
        meaning: 'FOODON:00001078'
        title: fermented soybean food product
        description: A food product having fermented soyabeans as a defining ingredient
      'FOODON:00001079':
        text: 'FOODON:00001079'
        meaning: 'FOODON:00001079'
        title: food (pickled)
        description: Food material which is preserved by soaking and storing it in
          vinegar or brine.
      'FOODON:00001080':
        text: 'FOODON:00001080'
        meaning: 'FOODON:00001080'
        title: tape kefan food product
      'FOODON:00001081':
        text: 'FOODON:00001081'
        meaning: 'FOODON:00001081'
        title: Bondon cheese food product
        description: "A soft cheese made with cow's milk. It has a creamy paste and\
          \ a greyish-red and downy white penicillin rind and is sometimes foil-wrapped."
      'FOODON:00001082':
        text: 'FOODON:00001082'
        meaning: 'FOODON:00001082'
        title: bitter cheese food product
      'FOODON:00001083':
        text: 'FOODON:00001083'
        meaning: 'FOODON:00001083'
        title: sugar condiment
      'FOODON:00001086':
        text: 'FOODON:00001086'
        meaning: 'FOODON:00001086'
        title: kefir food product
        description: 'A fermented milk drink made from  milk. It is prepared by inoculating
          cow, goat, or sheep''s milk with kefir grains, a combination of bacteria
          and yeasts in a matrix of proteins, lipids, and sugars. This symbiotic matrix
          forms "grains" that resemble cauliflower. Many different bacteria and yeasts
          are found in the kefir grains, which are a complex and highly variable community
          of micro-organisms termed probiotics.'
      'FOODON:00001087':
        text: 'FOODON:00001087'
        meaning: 'FOODON:00001087'
        title: vegetable oil food product
        description: A lipid material derived from plants. Physically, oils are liquid
          at room temperature.
