        title: welding fume
      'ENVO:02000114':
        text: 'ENVO:02000114'
        meaning: 'ENVO:02000114'
        title: paraffin wax fume
      'ENVO:02000115':
        text: 'ENVO:02000115'
        meaning: 'ENVO:02000115'
        title: vanadium fume
        description: Respirable vapor of vanadium.
      'ENVO:02000116':
        text: 'ENVO:02000116'
        meaning: 'ENVO:02000116'
        title: aluminum welding fume
      'ENVO:02000117':
        text: 'ENVO:02000117'
        meaning: 'ENVO:02000117'
        title: natural wax
        description: A wax that is naturally synthesized by a plant or animal.
      'ENVO:02000118':
        text: 'ENVO:02000118'
        meaning: 'ENVO:02000118'
        title: paraffin wax
        description: A white or colourless soft solid derivable from petroleum, coal
          or oil shale, that consists of a mixture of hydrocarbon molecules containing
          between twenty and forty carbon atoms.
      'ENVO:02000119':
        text: 'ENVO:02000119'
        meaning: 'ENVO:02000119'
        title: oil shale
        description: An organic-rich fine-grained sedimentary rock containing kerogen
          from which liquid hydrocarbons called shale oil can be produced.
      'ENVO:02000120':
        text: 'ENVO:02000120'
        meaning: 'ENVO:02000120'
        title: zinc chloride fume
      'ENVO:02000123':
        text: 'ENVO:02000123'
        meaning: 'ENVO:02000123'
        title: paint
        description: Any liquid, liquefiable, or mastic composition that, after application
          to a substrate in a thin layer, converts to a solid film. It is most commonly
          used to protect, color, or provide texture to objects.
      'ENVO:02000124':
        text: 'ENVO:02000124'
        meaning: 'ENVO:02000124'
        title: lead paint
        description: Paint that contains lead.
      'ENVO:02000126':
        text: 'ENVO:02000126'
        meaning: 'ENVO:02000126'
        title: wood ash
        description: the residue powder that is derived from the combustion of wood.
      'ENVO:02000127':
        text: 'ENVO:02000127'
        meaning: 'ENVO:02000127'
        title: coal ash
        description: Ash that is produced from the burning of coal.
      'ENVO:02000128':
        text: 'ENVO:02000128'
        meaning: 'ENVO:02000128'
        title: fly ash
        description: A very fine, powdery material composed mostly of silica made
          from the burning of finely ground coal in a boiler.
      'ENVO:02000129':
        text: 'ENVO:02000129'
        meaning: 'ENVO:02000129'
        title: bottom ash
        description: a coarse, angular ash particle that is too large to be carried
          up into the smoke stacks so it forms in the bottom of the coal furnace.
      'ENVO:02000130':
        text: 'ENVO:02000130'
        meaning: 'ENVO:02000130'
        title: boiler slag
        description: molten bottom ash from slag tap and cyclone type furnaces that
          turns into pellets that have a smooth glassy appearance after it is cooled
          with water.
      'ENVO:02000131':
        text: 'ENVO:02000131'
        meaning: 'ENVO:02000131'
        title: flue gas desulfurization material
        description: a material leftover from the process of reducing sulfur dioxide
          emissions from a coal-fired boiler that can be a wet sludge consisting of
          calcium sulfite or calcium sulfate or a dry powered material that is a mixture
          of sulfites and sulfates.
      'ENVO:02000138':
        text: 'ENVO:02000138'
        meaning: 'ENVO:02000138'
        title: mangrove biome soil
        description: Mangrove soils are typically saline, anoxic, acidic and frequently
          waterlogged.
      'ENVO:02000140':
        text: 'ENVO:02000140'
        meaning: 'ENVO:02000140'
        title: fluid environmental material
        description: An environmental material which is unable to resist shear forces
          and continuously deforms when subject to them.
      'ENVO:03000000':
        text: 'ENVO:03000000'
        meaning: 'ENVO:03000000'
        title: neve
        description: "N\xE9v\xE9 that survives a full season of ablation turns into\
          \ firn."
      'ENVO:03000002':
        text: 'ENVO:03000002'
        meaning: 'ENVO:03000002'
        title: firn
        description: "Firn derives from n\xE9v\xE9 which has survived a full season\
          \ of ablation and has undergone a metamorphic transition."
      'ENVO:03000004':
        text: 'ENVO:03000004'
        meaning: 'ENVO:03000004'
        title: glacial ice
        description: Any water ice that is part of a glacier.
      'ENVO:03000005':
        text: 'ENVO:03000005'
        meaning: 'ENVO:03000005'
        title: erosionally enriched glacial ice
        description: Glacial ice which contains material liberated during a glacial
          erosion process.
      'ENVO:03000007':
        text: 'ENVO:03000007'
        meaning: 'ENVO:03000007'
        title: blue ice
        description: "The blue 'appearance' is to be understood as that within the\
          \ visual range of humans."
      'ENVO:03000021':
        text: 'ENVO:03000021'
        meaning: 'ENVO:03000021'
        title: soot
        description: Particulate environmental material which is composed primarily
          of carbon particles formed through the incomplete combustion of hydrocarbons.
      'ENVO:03000025':
        text: 'ENVO:03000025'
        meaning: 'ENVO:03000025'
        title: erosionally enriched ice
        description: Water ice which contains material liberated during an erosion
          process.
      'ENVO:03000027':
        text: 'ENVO:03000027'
        meaning: 'ENVO:03000027'
        title: powdery snow
        description: Described as having a fluffy appearance.
      'ENVO:03000033':
        text: 'ENVO:03000033'
        meaning: 'ENVO:03000033'
        title: marine sediment
        description: Particles of marine sediment are primarily generated by 1) processes
          in terrestrial systems and transported to the marine realm by the action
          of rivers or aeolian processes (amongst other routes) , 2) marine organisms,
          3) chemical processes in seawater, or 4) cosmogeneous input.
      'ENVO:03000034':
        text: 'ENVO:03000034'
        meaning: 'ENVO:03000034'
        title: shallow marine sediment
        description: Marine sediment soured from either terrestrial systems, marine
          organisms, seawater and or cosmogeneous sources, which is transported through
          the marine water column, and accumulates within shallow regions of the oceanic
          basin close to continents, such as the continental shelf, or continental
          slope.
      'ENVO:03000038':
        text: 'ENVO:03000038'
        meaning: 'ENVO:03000038'
        title: cryoconite deposit
        description: Particulate environmental material which is composed primarily
          of dust, rock, and soot, as well as the microbial communities associated
          with these materials, deposited on an ice mass by an aeolian process.
      'ENVO:03000046':
        text: 'ENVO:03000046'
        meaning: 'ENVO:03000046'
        title: frazil ice
        description: Typically 3 to 4 millimeters in diameter. These new ice classes
          refer to both marine water and fresh water ice. If using this term for annotation,
          use it in conjunction with another envo term to express whether the ice
          is in a marine, freshwater, or other system.
      'ENVO:03000063':
        text: 'ENVO:03000063'
        meaning: 'ENVO:03000063'
        title: new ice
        description: sea ice types include frazil, grease ice, slush, and shuga. These
          new ice classes refer to both marine water and fresh water ice. If using
          this term for annotation, use it in conjunction with another envo term to
          express whether the ice is in a marine, freshwater, or other system.
      'ENVO:03000071':
        text: 'ENVO:03000071'
        meaning: 'ENVO:03000071'
        title: first year ice
        description: Sea ice develops from young ice; thickness from 0.3 to 2 meters
          (1 to 6.6 feet).  Sea ice be subdivided into thin first-year ice (white
          ice), medium first-year ice, and thick first-year ice.  First-year ice is
          distinguished from older ice primarily by having a higher salinity. Undeformed
          first-year ice differs from older ice in that it is smoother and lacks refrozen
          melt ponds. Characteristically level where undisturbed by pressure, but
          where ridges occur, they  distinguished by being larger, more angular, and
          more porous than multiyear ridges.
      'ENVO:03000072':
        text: 'ENVO:03000072'
        meaning: 'ENVO:03000072'
        title: second year ice
        description: Sea ice which is thicker than first year ice, and has survived
          a seasonal melting process.
      'ENVO:03000073':
        text: 'ENVO:03000073'
        meaning: 'ENVO:03000073'
        title: multiyear ice
        description: Sea ice which is thicker than second year ice, and has survived
          more than two seasonal melting process.
      'ENVO:03000075':
        text: 'ENVO:03000075'
        meaning: 'ENVO:03000075'
        title: shuga
        description: These new ice classes refer to both marine water and fresh water
          ice. If using this term for annotation, use it in conjunction with another
          envo term to express whether the ice is in a marine, freshwater, or other
          system.
      'ENVO:03000076':
        text: 'ENVO:03000076'
        meaning: 'ENVO:03000076'
        title: slush ice
        description: These new ice classes refer to both marine water and fresh water
          ice. If using this term for annotation, use it in conjunction with another
          envo term to express whether the ice is in a marine, freshwater, or other
          system.
      'ENVO:03000088':
        text: 'ENVO:03000088'
        meaning: 'ENVO:03000088'
        title: methane-laden permafrost
        description: Other hydrocarbon gasses such as carbon dioxide may also be present.
          These pockets can be sufficently large that the permafrost surface will
          undulate when pressure is applied.
      'ENVO:03000108':
        text: 'ENVO:03000108'
        meaning: 'ENVO:03000108'
        title: slab snow
        description: Snow which is cohesive, hard and overlies weaker snow.
      'ENVO:03000133':
        text: 'ENVO:03000133'
        meaning: 'ENVO:03000133'
        title: agricultural potting mixture
        description: Potting soil can be composed of a wide range of materials in
          varying ratios, often containing little or no actual soil.
      'ENVO:03000137':
        text: 'ENVO:03000137'
        meaning: 'ENVO:03000137'
        title: freezing fog
        description: Freezing fog forms when the air temperature is below freezing
          and the water droplets in the fog become supercooled.
      'ENVO:03000139':
        text: 'ENVO:03000139'
        meaning: 'ENVO:03000139'
        title: ice fog
        description: "The suspended particles may be partly ice crystals 20 to 100\
          \ micron in diameter, but chiefly, especially when dense, droxtals 12-20\
          \ micron in diameter. Ice fog is formed by direct freezing of supercooled\
          \ water droplets with little growth directly from the vapor. It occurs at\
          \ very low temperatures, and usually in clear, calm weather in high latitudes.\
          \ The sun is usually visible and may cause halo phenomena or luminous pillars.\
          \ Ice fog is rare at temperatures warmer than -30 \xB0C, and increases in\
          \ frequency with decreasing temperature until it is almost always present\
          \ at air temperatures of -45 \xB0C in the vicinity of a source of water\
          \ vapor. Such sources are the open water of fast-flowing streams or of the\
          \ sea, herds of animals, volcanoes, and especially products of combustion\
          \ for heating or propulsion. At temperatures warmer than -30 \xB0C, these\
          \ sources can cause steam fog of liquid water droplets, which may turn into\
          \ ice fog when cooled."
      'ENVO:03501252':
        text: 'ENVO:03501252'
        meaning: 'ENVO:03501252'
        title: chicken manure
        description: Poultry manure made of chicken feces.
      'ENVO:03501253':
        text: 'ENVO:03501253'
        meaning: 'ENVO:03501253'
        title: gypsum
        description: A soft sulfate mineral composed of calcium sulfate dihydrate.
      'ENVO:03501259':
        text: 'ENVO:03501259'
        meaning: 'ENVO:03501259'
        title: litter
        description: Environmental material consisting of waste products that have
          been discarded at an unsuitable location.
      'ENVO:03501300':
        text: 'ENVO:03501300'
        meaning: 'ENVO:03501300'
        title: manure
        description: Most manure consists of animal feces; other sources include compost
          and green manure.
      'ENVO:03501302':
        text: 'ENVO:03501302'
        meaning: 'ENVO:03501302'
        title: cork
        description: Plant matter consisting of an impermeable buoyant material, the
          phellem layer of bark tissue.
      'ENVO:03501303':
        text: 'ENVO:03501303'
        meaning: 'ENVO:03501303'
        title: natural-based polymer
        description: Macromolecules that are obtained naturally from plants or animals.
      'ENVO:03501304':
        text: 'ENVO:03501304'
        meaning: 'ENVO:03501304'
        title: cellophane
        description: Cellophane is used for food packaging.
      'ENVO:03501305':
        text: 'ENVO:03501305'
        meaning: 'ENVO:03501305'
        title: pliofilm
        description: Synthetic plastic which is composed of a glossy, moistureproof
          membrane made of rubber hydrochloride.
      'ENVO:03501306':
        text: 'ENVO:03501306'
        meaning: 'ENVO:03501306'
        title: mylar
        description: A polyester film made from stretched polyethylene terephthalate
          (PET).
      'ENVO:03501307':
        text: 'ENVO:03501307'
        meaning: 'ENVO:03501307'
        title: ceramic
        description: A solid environmental material that is hard, brittle, heat-resistant
          and corrosion-resistant, made by shaping and then firing a nonmetallic mineral
          at a high temperature.
      'ENVO:03501324':
        text: 'ENVO:03501324'
        meaning: 'ENVO:03501324'
        title: latex
        description: Latex is made by some plants, but synthetic latexes can be manufactured
          as well.
      'ENVO:03501370':
        text: 'ENVO:03501370'
        meaning: 'ENVO:03501370'
        title: stagnant water
        description: A liquid water which has no current or flow and is susceptible
          to contamination by pathogens or pathogenic vectors.
      'ENVO:03510000':
        text: 'ENVO:03510000'
        meaning: 'ENVO:03510000'
        title: wood dust
        description: Wood dust is typically generated through processes where wood
          is chipped, sawed, turned, drilled or sanded. The chemical composition of
          wood dust depends on the species of tree. Wood dust is not typically produced
          for specific uses. However, it is used commercially for wood composts. The
          primary routes of potential human exposure to wood dust are inhalation and
          dermal contact. It is known to be a human carcinogen.
      'ENVO:03510006':
        text: 'ENVO:03510006'
        meaning: 'ENVO:03510006'
        title: diesel fuel
        description: A liquid fuel used in diesel engines, whose fuel ignition takes
          place, without any spark, as a result of compression of the inlet air mixture
          and then injection of fuel.
      'ENVO:03510007':
        text: 'ENVO:03510007'
        meaning: 'ENVO:03510007'
        title: gasoline
        description: Gasoline consists mostly of organic compounds obtained by the
          fractional distillation of petroleum, enhanced with a variety of additives.
      'ENVO:03510008':
        text: 'ENVO:03510008'
        meaning: 'ENVO:03510008'
        title: diesel exhaust
        description: A gas which results from the incomplete or complete combustion
          of diesel fuel.
      'ENVO:03510009':
        text: 'ENVO:03510009'
        meaning: 'ENVO:03510009'
        title: gasoline exhaust
        description: A gas which results from the complete or incomplete combustion
          of gasoline fuel.
      'ENVO:03510015':
        text: 'ENVO:03510015'
        meaning: 'ENVO:03510015'
        title: xanthan gum
        description: A polysaccharide that functions as an emulsifier, stabilizer,
          and thickener in mixtures.
      'ENVO:03510016':
        text: 'ENVO:03510016'
        meaning: 'ENVO:03510016'
        title: tragacanth
        description: Tragacanth has many uses, including as an emulsifier, thickener,
          stabilizer, and texturant additive for foods, pharmaceuticals, and art materials.
      'ENVO:03510018':
        text: 'ENVO:03510018'
        meaning: 'ENVO:03510018'
        title: resin
        description: A solid or highly viscous plant or synthetic based substance
          that is typically convertible into polymers.
      'ENVO:03510023':
        text: 'ENVO:03510023'
        meaning: 'ENVO:03510023'
        title: shellac
        description: A resin secreted by the female lac bug, which is dissolved in
          alcohol to be used as a brush-on colorant, food glaze, and wood finish.
      'ENVO:03510029':
        text: 'ENVO:03510029'
        meaning: 'ENVO:03510029'
        title: primer (paint)
        description: A paint product which adheres to surfaces and forms a binding
          layer, preparing it to receive paint.
      'ENVO:03510031':
        text: 'ENVO:03510031'
        meaning: 'ENVO:03510031'
        title: oil-based paint
        description: A slow-drying paint that consists of particles of pigment suspended
          in a drying oil, commonly linseed oil.
      'ENVO:03510032':
        text: 'ENVO:03510032'
        meaning: 'ENVO:03510032'
        title: acrylic paint
        description: A water soluble, fast-drying paint made of pigment suspended
          in acrylic polymer emulsion.
      'ENVO:03510033':
        text: 'ENVO:03510033'
        meaning: 'ENVO:03510033'
        title: luminescent paint
        description: A paint that exhibits luminescence, giving off visible light
          through fluorescence, phosphorescence, or radioluminescence.
      'ENVO:03510036':
        text: 'ENVO:03510036'
        meaning: 'ENVO:03510036'
        title: rock dust
        description: Rock dust is widely used in mining to prevent coal dust explosions,
          or in agriculture for organic farming uses.
      'ENVO:03510037':
        text: 'ENVO:03510037'
        meaning: 'ENVO:03510037'
        title: radioactive material
        description: Any material containing unstable atoms that emit ionizing radiation
          as it decays.
      'ENVO:03510038':
        text: 'ENVO:03510038'
        meaning: 'ENVO:03510038'
        title: volume of cyanoacrylate
        description: Cyanoacrylates have industrial, medical, and household uses.
          A strong fast-acting adhesive which is an ester of cyanoacrylic acid.
      'ENVO:03510055':
        text: 'ENVO:03510055'
        meaning: 'ENVO:03510055'
        title: rubber cement
        description: Solvents typically used include acetone, hexane, heptane or toluene.
      'ENVO:03510056':
        text: 'ENVO:03510056'
        meaning: 'ENVO:03510056'
        title: methyl cellulose paste
        description: An environmental material which is 1) composed primarily of methyl
          cellulose and water, and 2) formulated to fix wallpaper to walls.
      'ENVO:03510057':
        text: 'ENVO:03510057'
        meaning: 'ENVO:03510057'
        title: permanent hair dye
        description: An environmental material which is 1) manufactured and 2) primarily
          composed of hydrogen peroxide and ammonia, and 3) when applied to hair,
          can alter the natural hair pigments for 6-8 weeks.
      'ENVO:03510058':
        text: 'ENVO:03510058'
        meaning: 'ENVO:03510058'
        title: pharmaceutical ink
        description: A colorant fluid which is 1) manufactured and 2) composed of
          alcohol, titanium dioxide, and propylene glycol.
      'ENVO:03510060':
        text: 'ENVO:03510060'
        meaning: 'ENVO:03510060'
        title: gel ink
        description: A colorant fluid which is 1) manufactured and 2) composed of
          copper phthalocyanine, iron oxides, water, and biopolymers.
      'ENVO:03510061':
        text: 'ENVO:03510061'
        meaning: 'ENVO:03510061'
        title: soy ink
        description: A colorant fluid which is 1) manufactured and 2) primarily composed
          of soybean oil, as well as pigment, resin, and wax.
      'ENVO:03510062':
        text: 'ENVO:03510062'
        meaning: 'ENVO:03510062'
        title: aqueous inkjet printer ink
        description: A colorant fluid which is 1) manufactured, 2) primarily composed
          of water, as well as glycol, and dye, and 3) intended for use in inkjet
          printers.
      'ENVO:03510064':
        text: 'ENVO:03510064'
        meaning: 'ENVO:03510064'
        title: emissions from petroleum combustion
        description: An environmental material which is composed primarily of gases
          and particles produced by the combustion of petroleum fuels.
      'ENVO:03510065':
        text: 'ENVO:03510065'
        meaning: 'ENVO:03510065'
        title: colorant fluid
        description: A liquid environmental material which 1) contains at least one
          substance which can act as a chemical colorant.
      'ENVO:03510070':
        text: 'ENVO:03510070'
        meaning: 'ENVO:03510070'
        title: toxic waste
        description: Waste which contains toxic components (e.g., heavy metals or
          radiation) which can cause harm to organisms and/or the environment.
      'ENVO:03520007':
        text: 'ENVO:03520007'
        meaning: 'ENVO:03520007'
        title: snow crystal
        description: A water ice crystal which is constituted by water molecules aligned
          in a hexagonal array.
      'ENVO:03600001':
        text: 'ENVO:03600001'
        meaning: 'ENVO:03600001'
        title: chemically contaminated sediment
        description: Sediment which contains some chemical contaminant.
      'ENVO:03600002':
        text: 'ENVO:03600002'
        meaning: 'ENVO:03600002'
        title: cooling water
        description: Cooling water is commonly used for cooling automobile internal
          combustion engines and power stations.
      'ENVO:03600006':
        text: 'ENVO:03600006'
        meaning: 'ENVO:03600006'
        title: food waste
        description: The causes of food waste or loss are numerous and can occur during
          production, processing, distribution, retail and consumption.
      'ENVO:03600007':
        text: 'ENVO:03600007'
        meaning: 'ENVO:03600007'
        title: formation fluid
        description: A fluid environmental material which is contained in geologic
          formations naturally.
      'ENVO:03600009':
        text: 'ENVO:03600009'
        meaning: 'ENVO:03600009'
        title: interstitial water
        description: Liquid water which occurs naturally within the pores of rocks
          and sediments.
      'ENVO:03600013':
        text: 'ENVO:03600013'
        meaning: 'ENVO:03600013'
        title: bituminous sand
        description: An environmental material which consists of either loose sands
          or partially consolidated sandstone, containing a naturally occurring mixture
          of sand, clay, and water, soaked with a dense and extremely viscous form
          of petroleum.
      'ENVO:03600016':
        text: 'ENVO:03600016'
        meaning: 'ENVO:03600016'
        title: saprolite
        description: Rock which is derived from bedrock through chemical weathering
      'ENVO:03600017':
        text: 'ENVO:03600017'
        meaning: 'ENVO:03600017'
        title: slurry
        description: An environmental material which is composed of insoluble solid
          particles suspended in a liquid.
      'ENVO:03600036':
        text: 'ENVO:03600036'
        meaning: 'ENVO:03600036'
        title: pathogen-suppressive soil
        description: The pathogenicity that is suppressed is typically directed towards
          plants, especially crops. Soils are typically classified as pathogen-suppressive
          if a pathogen 1) cannot establish itself or persist, 2) is able to establish
          itself, but causes little or no damage, or 3) is able to establishe itself,
          but only causes disease that does not result in long-term harm.
      'ENVO:03600042':
        text: 'ENVO:03600042'
        meaning: 'ENVO:03600042'
        title: marine lake water
        description: Liquid water which is either part of or was removed from a marine
          lake.
      'ENVO:03600064':
        text: 'ENVO:03600064'
        meaning: 'ENVO:03600064'
        title: microbialite
        description: A sedimentary rock which is made of carbonate mud whose formation
          is mediated by microbes in the benthic zone.
      'ENVO:03600065':
        text: 'ENVO:03600065'
        meaning: 'ENVO:03600065'
        title: spring water
        description: Water which comes from a spring.
      'ENVO:03600081':
        text: 'ENVO:03600081'
        meaning: 'ENVO:03600081'
        title: cloud water
        description: Fresh water which is harvested from cloud.
      'ENVO:03600082':
        text: 'ENVO:03600082'
        meaning: 'ENVO:03600082'
        title: crustal fluid
        description: The presence or absence of fluids exerts a fundamental control
          on rheology.
      'ENVO:03600084':
        text: 'ENVO:03600084'
        meaning: 'ENVO:03600084'
        title: lichen material
        description: An organic material which is derived from lichen mats.
      'ENVO:03605000':
        text: 'ENVO:03605000'
        meaning: 'ENVO:03605000'
        title: periphytic biofilm
        description: Periphytic biofilm coats the submerged surfaces in most bodies
          of water
      'ENVO:03605001':
        text: 'ENVO:03605001'
        meaning: 'ENVO:03605001'
        title: epilithon
        description: Periphyton colonizing rock substrata
      'ENVO:03605002':
        text: 'ENVO:03605002'
        meaning: 'ENVO:03605002'
        title: epipelon
        description: Periphyton colonizing silt substrata
      'ENVO:03605003':
        text: 'ENVO:03605003'
        meaning: 'ENVO:03605003'
        title: epiphyton
        description: Periphyton colonizing surface of aquatic plants
      'ENVO:03605004':
        text: 'ENVO:03605004'
        meaning: 'ENVO:03605004'
        title: epipsammon
        description: Periphyton colonizing sand substrata
      'ENVO:03605005':
        text: 'ENVO:03605005'
        meaning: 'ENVO:03605005'
        title: epixylon
        description: Periphyton colonizing woody substrata
      'ENVO:03605006':
        text: 'ENVO:03605006'
        meaning: 'ENVO:03605006'
        title: stream water
        description: Water which is part of a stream.
      'ENVO:04000007':
        text: 'ENVO:04000007'
        meaning: 'ENVO:04000007'
        title: lake water
        description: Water which is part of a lake.
      'ENVO:04000008':
        text: 'ENVO:04000008'
        meaning: 'ENVO:04000008'
        title: soil organic matter
        description: Organic material in soil, which consists of plant and animal
          residues at various stages of decomposition, cells and tissues of soil organisms,
          and substances synthesized by soil organisms.
      'ENVO:04000012':
        text: 'ENVO:04000012'
        meaning: 'ENVO:04000012'
        title: particulate organic matter
        description: Particulate environmental material which is composed primarily
          of organic material.
      'ENVO:04000013':
        text: 'ENVO:04000013'
        meaning: 'ENVO:04000013'
        title: particulate organic carbon
        description: Particulate organic matter which is composed primarily of carbon.
      'ENVO:04000014':
        text: 'ENVO:04000014'
        meaning: 'ENVO:04000014'
        title: particulate organic nitrogen
        description: Particulate organic matter which is composed primarily of nitrogen.
      'ENVO:06105003':
        text: 'ENVO:06105003'
        meaning: 'ENVO:06105003'
        title: thermoplastic material
        description: An environmental material which is capable of, repeatedly, becoming
          plastic when heated and hardening again when cooled.
      'ENVO:06105016':
        text: 'ENVO:06105016'
        meaning: 'ENVO:06105016'
        title: foamed plastic
        description: A plastic which has a matrix- or sponge-like structure with numerous,
          hollow internal spaces.
      'ENVO:06105101':
        text: 'ENVO:06105101'
        meaning: 'ENVO:06105101'
        title: plastic
        description: '"High molecular mass" can be ambiguous as it does not set a
          threshold for what is considered "high". Here we make no commitment to a
          threshold.'
      'ENVO:06105111':
        text: 'ENVO:06105111'
        meaning: 'ENVO:06105111'
        title: natural plastic
        description: Plastic which is composed primarily of polymers produced by processes
          whose agents do not include humans or their technologies.
      'ENVO:06105112':
        text: 'ENVO:06105112'
        meaning: 'ENVO:06105112'
        title: synthetic plastic
        description: A plastic which is composed primarily of polymers produced by
          a manufacturing process.
      'ENVO:06105205':
        text: 'ENVO:06105205'
        meaning: 'ENVO:06105205'
        title: compacted soil
        description: A soil which has a high bulk density and/or a low porosity. A
          compacted soil has a reduced rate of both water infiltration and drainage
      'ENVO:06105211':
        text: 'ENVO:06105211'
        meaning: 'ENVO:06105211'
        title: runoff
        description: Runoff often gathers debris and solutes from the materials it
          flows over or through, and often flows into a water body.
      'ENVO:06105238':
        text: 'ENVO:06105238'
        meaning: 'ENVO:06105238'
        title: residual water in soil
        description: Liquid water which is present in soils as discontinuous volumnes
          of water in contact with solid and gaseous components of the soil.
      'ENVO:06105268':
        text: 'ENVO:06105268'
        meaning: 'ENVO:06105268'
        title: treated wastewater
        description: Waste water which was converted into an effluent that can be
          either returned to the water cycle with minimal environmental issues or
          reused.
      'ENVO:06105269':
        text: 'ENVO:06105269'
        meaning: 'ENVO:06105269'
        title: desalinated water
        description: Saline water from which minerals have been removed to produce
          fresh water suitable for human consumption or irrigation.
      'ENVO:06105272':
        text: 'ENVO:06105272'
        meaning: 'ENVO:06105272'
        title: loamy sand
        description: Some authorities consider this a soil type, composed of 70-86%
          of sand, 0-30% of silt and 0-15% of clay. Others consider this a soil material
          that contains at the upper limit 85 to 90% sand, and the percentage of silt
          plus 1.5 times the percentage of clay is not less than 15, at the lower
          limit it contains not less than 70 to 85% sand, and the percentage of silt
          plus twice the percentage of clay does not exceed 30.
      'ENVO:06105273':
        text: 'ENVO:06105273'
        meaning: 'ENVO:06105273'
        title: fine sand
        description: 'Thresholds for what particle size is considered "fine" vary
          by region and authority, as well as the tolerance for proportions of other
          particle sizes.'
      'ENVO:06105274':
        text: 'ENVO:06105274'
        meaning: 'ENVO:06105274'
        title: sandy loam
        description: Some authorities consider sandy loam to be a soil composed of
          50-70% sand, 0-50% silt, and 0-20% clay. Others, a soil material that contains
          either 20% or less clay, with a percentage of silt plus twice the percentage
          of clay that exceeds 30, and 52% or more sand; or less than 7% clay, less
          than 50% silt, and between 43% and 52% sand.
      'ENVO:06105275':
        text: 'ENVO:06105275'
        meaning: 'ENVO:06105275'
        title: silty loam
        description: USDA textural classes of soils
      'ENVO:06105276':
        text: 'ENVO:06105276'
        meaning: 'ENVO:06105276'
        title: sandy clay loam
        description: Some authorities consider sandy clay loam to be a soil composed
          of 45-80% sand, 0-28% silt, and 20-35% clay.
      'ENVO:06105277':
        text: 'ENVO:06105277'
        meaning: 'ENVO:06105277'
        title: clay loam
        description: Some authorities consider clay loam to be a soil composed of
          20-45% sand, 15-52% silt, and 27 to 40% clay.
      'ENVO:06105278':
        text: 'ENVO:06105278'
        meaning: 'ENVO:06105278'
        title: silty clay loam
        description: Some authorities consider silty clay loam to be a soil composed
          of 0-20% of sand, 40-73 of silt and 27-40% of clay.
      'ENVO:06105279':
        text: 'ENVO:06105279'
        meaning: 'ENVO:06105279'
        title: sandy clay
        description: 'Some authorities consider sandy clay to be a soil composed of
          45-65% of sand, 0-20% of silt and 35-55% of clay. If the proportion of sand
          exceeds that of clay, it is unclear whether this is still considered clay
          (due to other properties) or whether a new class "clay sand" should be created.'
      'ENVO:06105280':
        text: 'ENVO:06105280'
        meaning: 'ENVO:06105280'
        title: silty clay
        description: 'Some authorities consider this a soil composed of 0-20% of sand,
          40-60% of silt and 40-60% of clay. If the proportion of silt exceeds that
          of clay, it is unclear whether this is still considered clay (due to other
          properties) or whether a new class "clay silt" should be created.'
      'ENVO:1000746':
        text: 'ENVO:1000746'
        meaning: 'ENVO:1000746'
        title: marine mucilage
        description: The formation of marine mucilage is often associated with conditions
          which stress marine microorganisms such as diatoms.
      'ENVO:2000007':
        text: 'ENVO:2000007'
        meaning: 'ENVO:2000007'
        title: biochar
        description: charcoal that is used as a soil amendment.
      'ENVO:2000008':
        text: 'ENVO:2000008'
        meaning: 'ENVO:2000008'
        title: lignite
        description: "It is considered the lowest rank of coal due to its relatively\
          \ low heat content. It has a carbon content around 60\u201370 percent."
      'ENVO:2000009':
        text: 'ENVO:2000009'
        meaning: 'ENVO:2000009'
        title: sub-bitumous coal
      'ENVO:2000010':
        text: 'ENVO:2000010'
        meaning: 'ENVO:2000010'
        title: bitumous coal
        description: a relatively soft coal containing a tarlike substance called
          bitumen or asphalt. It is of higher quality than lignite coal but of poorer
          quality than anthracite. It is an organic sedimentary rock formed by diagenetic
          and sub metamorphic compression of peat bog material.
      'ENVO:2000011':
        text: 'ENVO:2000011'
        meaning: 'ENVO:2000011'
        title: anthracite
        description: A hard, compact variety of coal that has a submetallic luster.
          It has the highest carbon content, the fewest impurities, and the highest
          energy density of all types of coal and is the highest ranking of coal.
      'ENVO:2000044':
        text: 'ENVO:2000044'
        meaning: 'ENVO:2000044'
        title: coke
        description: Coal heated in the absence of air.
      'ENVO:2000045':
        text: 'ENVO:2000045'
        meaning: 'ENVO:2000045'
        title: hydrocarbon-based environmental material
      'FOODON:00001001':
        text: 'FOODON:00001001'
        meaning: 'FOODON:00001001'
        title: orange juice (liquid)
      'FOODON:00001002':
        text: 'FOODON:00001002'
        meaning: 'FOODON:00001002'
        title: food product
        description: 'The FoodOn "food product" class is provided as a branch under
          which new food product categories and food products themselves can be placed.
          Here classes are provided to differentiate a food product by its food composition,
          processing and/or consumption characteristics. This avoids brand name products
          but it may include generic food dish categories. It has a much greater depth
          and polyhierarchy than other agency product type schemes have in an effort
          to group related products together.  The upper level basis of this tree
          originated in the environment ontology (ENVO) and from the US Code of Federal
          Regulations.'
      'FOODON:00001003':
        text: 'FOODON:00001003'
        meaning: 'FOODON:00001003'
        title: fermented agave juice
        description: The juice products which are made from the fermented sap of the
          maguey (agave) plant.
      'FOODON:00001004':
        text: 'FOODON:00001004'
        meaning: 'FOODON:00001004'
        title: fermenting sugar cane juice
        description: This food product type includes food products which are made
          from fermentation of juice extracted from pressed sugarcane.
      'FOODON:00001005':
        text: 'FOODON:00001005'
        meaning: 'FOODON:00001005'
        title: fermenting elaeis palm sap food product
      'FOODON:00001006':
        text: 'FOODON:00001006'
        meaning: 'FOODON:00001006'
        title: mammalian meat food product
        description: A food product made of meat, the skeletal muscle and associated
          fat, and other edible tissues such as organs, livers, skin, brains, bone
          marrow, kidneys, or lungs, of mammals.
      'FOODON:00001007':
        text: 'FOODON:00001007'
        meaning: 'FOODON:00001007'
        title: meat sausage food product
        description: A processed meat food product that is made from a sausage.
      'FOODON:00001008':
        text: 'FOODON:00001008'
        meaning: 'FOODON:00001008'
        title: liver paste
        description: 'SIREN DB annotation:

          * semisolid with smooth consistency FOODON:03430119

          * liver UBERON:0002107'
      'FOODON:00001009':
        text: 'FOODON:00001009'
        meaning: 'FOODON:00001009'
        title: hot dog
        description: A hot dog is a moist sausage of soft, even texture and flavor,
          often made from advanced meat recovery or meat slurry. Most types are fully
          cooked, cured or smoked. It is often placed hot in a special purpose soft,
          sliced hot dog bun.
      'FOODON:00001010':
        text: 'FOODON:00001010'
        meaning: 'FOODON:00001010'
        title: processed meat food product
        description: A processed food product consisting of meat which has been subjected
          to preservation and/or taste altering processes such as grinding, salting,
          curing, fermentation, smoking, and addition of chemical preservatives.
      'FOODON:00001011':
        text: 'FOODON:00001011'
        meaning: 'FOODON:00001011'
        title: milk formula food product
      'FOODON:00001013':
        text: 'FOODON:00001013'
        meaning: 'FOODON:00001013'
        title: cheese food product
        description: Cheese is a food derived from milk that is produced in a wide
          range of flavors, textures, and forms by coagulation of the milk protein
          casein.
      'FOODON:00001014':
        text: 'FOODON:00001014'
        meaning: 'FOODON:00001014'
        title: yogurt food product
        description: The bacteria used to make yogurt are known as yogurt cultures.
          The fermentation of lactose by these bacteria produces lactic acid, which
          acts on milk protein to give yogurt its texture and characteristic tart
          flavor.
      'FOODON:00001015':
        text: 'FOODON:00001015'
        meaning: 'FOODON:00001015'
        title: plant food product
        description: This class includes food products which are derived from or produced
          by a plant.
      'FOODON:00001016':
        text: 'FOODON:00001016'
        meaning: 'FOODON:00001016'
        title: cabbage food product
        description: Cabbage or headed cabbage (comprising several cultivars of Brassica
          oleracea) is a leafy green or purple biennial plant, grown as an annual
          vegetable crop for its dense-leaved heads.
      'FOODON:00001017':
        text: 'FOODON:00001017'
        meaning: 'FOODON:00001017'
        title: commercial yogurt
      'FOODON:00001019':
        text: 'FOODON:00001019'
        meaning: 'FOODON:00001019'
        title: wort food product
        description: The liquid extracted from the mashing process during the brewing
          of beer or whiskey. Wort contains the sugars that will be fermented by the
          brewing yeast to produce alcohol.
      'FOODON:00001020':
        text: 'FOODON:00001020'
        meaning: 'FOODON:00001020'
        title: beer wort food product
      'FOODON:00001021':
        text: 'FOODON:00001021'
        meaning: 'FOODON:00001021'
        title: acifified beer wort food product
      'FOODON:00001023':
        text: 'FOODON:00001023'
        meaning: 'FOODON:00001023'
        title: mammalian milk butter
        description: Cream component produced by churning and containing not less
          than 80% milkfat.
      'FOODON:00001024':
        text: 'FOODON:00001024'
        meaning: 'FOODON:00001024'
        title: pickled cabbage food product
      'FOODON:00001025':
        text: 'FOODON:00001025'
        meaning: 'FOODON:00001025'
        title: camembert cheese food product
      'FOODON:00001027':
        text: 'FOODON:00001027'
        meaning: 'FOODON:00001027'
        title: cheddar cheese food product
      'FOODON:00001028':
        text: 'FOODON:00001028'
        meaning: 'FOODON:00001028'
        title: Brie cheese food product
        description: "A large disc of smooth, soft, even runny cheese made with cow's\
          \ milk."
      'FOODON:00001029':
        text: 'FOODON:00001029'
        meaning: 'FOODON:00001029'
        title: gouda cheese food product
        description: "A hard cow's milk cheese with an almost orange yellow paste.\
          \ Older cheeses are coated in black wax."
      'FOODON:00001031':
        text: 'FOODON:00001031'
        meaning: 'FOODON:00001031'
        title: gorgonzola cheese food product
        description: "A drum of very rich, creamy, pungent blue-veined cow's milk\
          \ cheese. It has a white paste with blue veining and a brined rind. It is\
          \ made in Gorgonzola, near Milan."
      'FOODON:00001032':
        text: 'FOODON:00001032'
        meaning: 'FOODON:00001032'
        title: swiss cheese food product
        description: 'A generic cheese common to many countries for several related
          varieties of cheese  which resemble the Swiss Emmental. Three types of bacteria
          are used in the production of Emmental cheese: Streptococcus salivarius
          subsp. thermophilus, Lactobacillus  (L. helveticus or Lactobacillus delbrueckii
          subsp. bulgaricus), and Propionibacter (P. freudenreichii or P. shermani).
          In a late stage of cheese production, the Propionibacter consumes the lactic
          acid excreted by the other bacteria, and releases carbon dioxide gas, which
          slowly forms the bubbles that develop the eyes. Swiss cheese without eyes
          is known as "blind."'
      'FOODON:00001033':
        text: 'FOODON:00001033'
        meaning: 'FOODON:00001033'
        title: emmenthal cheese
        description: A semi-hard, yellow cheese that has mild flavor that is slightly
          buttery.
      'FOODON:00001035':
        text: 'FOODON:00001035'
        meaning: 'FOODON:00001035'
        title: new zealand cheddar cheese food product
      'FOODON:00001036':
        text: 'FOODON:00001036'
        meaning: 'FOODON:00001036'
        title: pont ieveque cheese food product
        description: "A small, sweetish, soft, square cow's milk cheese from Normandy\
          \ with a yellowish-orange rind."
      'FOODON:00001037':
        text: 'FOODON:00001037'
        meaning: 'FOODON:00001037'
        title: vacherin mont dor cheese food product
        description: "A disc of soft cheese made with cow's milk. It has a soft to\
          \ runny paste and a smooth, pink rind."
      'FOODON:00001038':
        text: 'FOODON:00001038'
        meaning: 'FOODON:00001038'
        title: pork meat food product
        description: A food product made from domestic pig meat (Sus domesticus or
          Sus scrofa scrofa).
      'FOODON:00001039':
        text: 'FOODON:00001039'
        meaning: 'FOODON:00001039'
        title: cured meat food product
        description: A meat that is preserved by the addition of a combination of
          salt, sugar, nitrates  or nitrite and or is smoked.
      'FOODON:00001040':
        text: 'FOODON:00001040'
        meaning: 'FOODON:00001040'
        title: chicken meat food product
        description: A food product that is derived from some chicken meat.
      'FOODON:00001041':
        text: 'FOODON:00001041'
        meaning: 'FOODON:00001041'
        title: cow food product
        description: A food product that is derived from some cow.
      'FOODON:00001045':
        text: 'FOODON:00001045'
        meaning: 'FOODON:00001045'
        title: ice cream food product
        description: A frozen dessert usually made from dairy products, such as milk
          and cream, and often combined with fruits or other ingredients and flavours.
          Most varieties contain sugar, although some are made with other sweeteners.
          In some cases, artificial flavourings  and colourings are used in addition
          to (or in replacement of) the natural ingredients. This mixture is stirred
          slowly while cooling to prevent large ice crystals from forming; the result
          is a smoothly textured ice cream.
      'FOODON:00001046':
        text: 'FOODON:00001046'
        meaning: 'FOODON:00001046'
        title: animal seafood product
        description: A seafood product is a vertebrate or invertibrate organism from
          an aquatic environment.
      'FOODON:00001048':
        text: 'FOODON:00001048'
        meaning: 'FOODON:00001048'
        title: meshanger cheese food product
      'FOODON:00001049':
        text: 'FOODON:00001049'
        meaning: 'FOODON:00001049'
        title: pork chop food product
        description: A cut of meat (a meat chop) cut perpendicularly to the spine
          of the pig and usually containing a rib or part of a vertebra, served as
          an individual portion.
      'FOODON:00001050':
        text: 'FOODON:00001050'
        meaning: 'FOODON:00001050'
        title: tempeh food product
        description: A food product having tempeh as a defining ingredient
      'FOODON:00001051':
        text: 'FOODON:00001051'
        meaning: 'FOODON:00001051'
        title: fermented rice beverage
      'FOODON:00001052':
        text: 'FOODON:00001052'
        meaning: 'FOODON:00001052'
        title: amasake food product
      'FOODON:00001053':
