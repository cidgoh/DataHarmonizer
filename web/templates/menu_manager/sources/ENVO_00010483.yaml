      'FOODON:00001054':
        text: 'FOODON:00001054'
        meaning: 'FOODON:00001054'
        title: fermented fish or seafood food product
      'FOODON:00001055':
        text: 'FOODON:00001055'
        meaning: 'FOODON:00001055'
        title: sea water fish food product
      'FOODON:00001056':
        text: 'FOODON:00001056'
        meaning: 'FOODON:00001056'
        title: flour food product
        description: A food product made from flour.
      'FOODON:00001057':
        text: 'FOODON:00001057'
        meaning: 'FOODON:00001057'
        title: plant fruit food product
        description: A food product derived from plant fruit.
      'FOODON:00001058':
        text: 'FOODON:00001058'
        meaning: 'FOODON:00001058'
        title: fruit extract food product
      'FOODON:00001059':
        text: 'FOODON:00001059'
        meaning: 'FOODON:00001059'
        title: apple juice
        description: 'SIREN DB annotation:

          * liquid, low viscosity, with no visible particles FOODON:03430123

          * fruit, peel present, core, pit or seed present FOODON:03420140'
      'FOODON:00001060':
        text: 'FOODON:00001060'
        meaning: 'FOODON:00001060'
        title: awamori food product
      'FOODON:00001061':
        text: 'FOODON:00001061'
        meaning: 'FOODON:00001061'
        title: bacon food product
        description: Any of certain cuts of meat taken from the sides, belly or back
          of a pig that may be cured and/or smoked.
      'FOODON:00001062':
        text: 'FOODON:00001062'
