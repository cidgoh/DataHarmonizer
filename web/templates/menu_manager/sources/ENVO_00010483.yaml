          or streams saturated with calcium carbonate.
      'ENVO:00005738':
        text: 'ENVO:00005738'
        meaning: 'ENVO:00005738'
        title: foamy environmental material
        description: An environmental material which has the quality of a foam.
      'ENVO:00005739':
        text: 'ENVO:00005739'
        meaning: 'ENVO:00005739'
        title: sea foam
        description: The lifetime of sea foam can vary from only seconds to several
          hours or days. The longer-lasting foam are formed in particular when seawater
          contain higher concentration of dissolved organic matter that derived from
          sources such as algal blooms.
      'ENVO:00005740':
        text: 'ENVO:00005740'
