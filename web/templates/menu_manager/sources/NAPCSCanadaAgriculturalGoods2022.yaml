      '11422':
        title: Fresh vegetables (except potatoes and pulse crops)
        description: This class comprises fresh vegetables, except potatoes and pulse
          crops. Vegetables are temporary crops cultivated principally for human consumption
          both as field crops and garden crops, in the open and under protective cover.
          Certain gramineous and leguminous plants, if harvested while green for their
          green grains or for their green pods (for example, green peas, string beans,
          green maize) are treated as fresh vegetables, but if harvested for their
          dry grains or seeds, are classified as cereals and pulse crops.
        is_a: '114'
