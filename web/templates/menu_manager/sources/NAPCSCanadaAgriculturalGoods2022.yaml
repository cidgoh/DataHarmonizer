              213A:
                title: "Graines, plants v\xE9g\xE9tatifs et sommit\xE9s fleuries de\
                  \ cannabis (y compris les feuilles)"
                description: "Ce groupe comprend les graines viables et plants v\xE9\
                  g\xE9tatifs de cannabis et le cannabis frais et s\xE9ch\xE9 (bourgeons\
                  \ et feuilles), pour usages non m\xE9dical (r\xE9cr\xE9atif, bien-\xEA\
                  tre, mode de vie, spirituel, etc.) et m\xE9dical. Un plant du genre\
                  \ Cannabis d\xE9signe en r\xE8gle g\xE9n\xE9rale trois vari\xE9\
                  t\xE9s, qui sont le cannabis Sativa, le cannabis Indica et le cannabis\
                  \ Ruderalis. Les vari\xE9t\xE9s Sativa et Indica sont le plus souvent\
                  \ utilis\xE9es pour la culture et la multiplication. Les \xE9l\xE9\
                  ments composants de la g\xE9n\xE9tique des diff\xE9rentes vari\xE9\
                  t\xE9s de cannabis sont largement m\xE9lang\xE9s ou clon\xE9s pour\
                  \ cr\xE9er des vari\xE9t\xE9s hybrides de cannabis. Le cannabis\
                  \ comprend divers \xE9l\xE9ments actifs, y compris des cannabino\xEF\
                  des comme le t\xE9trahydrocannabinol (THC) ou la dronabinol, le\
                  \ cannabidiol (CBD) et les terp\xE8nes (compos\xE9s aromatiques\
                  \ ou marqueurs chimiques). Les plants de cannabis dont les sommit\xE9\
                  s fleuries et les feuilles ne contiennent pas plus de 0,3 % p/p\
                  \ (en poids ou poids pour poids) de THC - chanvre industriel - et\
                  \ leurs d\xE9riv\xE9s dont la concentration de THC est d'au plus\
                  \ 10 \xB5g/g, ainsi que les drogues (m\xE9dicaments) sur ordonnance\
                  \ ou les produits pharmaceutiques contenant du cannabis, sont exclus\
                  \ de ce groupe."
              '21311':
                title: "Graines et plants v\xE9g\xE9tatifs de cannabis"
