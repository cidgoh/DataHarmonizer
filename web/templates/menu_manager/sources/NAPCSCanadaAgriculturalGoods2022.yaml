      213A:
        title: Cannabis seeds, vegetative plants and flowering tops (including leaves)
        description: "This group comprises cannabis viable seeds and vegetative plants\
          \ and fresh and dried cannabis (buds and leaves), for non-medical (recreational,\
          \ wellness, lifestyle, spiritual, etc.) and medical uses. A plant of the\
          \ genus Cannabis refers generally to three varieties which are cannabis\
          \ Sativa, cannabis Indica and cannabis Ruderalis. Sativas and Indicas are\
          \ the most commonly used cannabis strains for cultivation and propagation.\
          \ The genetics of the different cannabis strains are widely mixed or cloned\
          \ to create cannabis hybrids. Cannabis contains a number of active elements,\
          \ including cannabinoids such as tetrahydrocannabinol (THC) or dronabinol,\
          \ cannabidiol (CBD) and terpenes (aromatic compounds or chemical markers).\
          \ Cannabis plants containing 0.3% w/w (weight for weight) of THC or less\
          \ in the flowering tops and leaves - industrial hemp - and their derivatives\
          \ with the THC concentration of 10 \xB5g/g or less, as well as prescription\
          \ drugs or pharmaceuticals containing cannabis, are excluded from this group."
      '21311':
        title: Cannabis seeds and vegetative plants
        description: This class comprises cannabis viable seeds and cannabis vegetative
          plants mainly used for planting or sowing, cultivation and propagation of
          cannabis bred to contain cannabinoids, in particular THC (more than 0.3%
          w/w) and CBD, for non-medical (recreational, wellness, lifestyle, spiritual,
          etc.) and medical uses. Cannabis seeds and vegetative plants are commonly
          from three varieties which are cannabis Sativa, cannabis Indica and cannabis
          Ruderalis. Sativas and Indicas are the most commonly used cannabis strains
          for cultivation and propagation. The genetics of the different cannabis
          strains are widely mixed or cloned to create cannabis hybrids.
        is_a: 213A
