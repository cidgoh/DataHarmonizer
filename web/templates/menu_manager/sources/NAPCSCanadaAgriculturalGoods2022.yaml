                  \ v\xE9g\xE9tatifs de cannabis g\xE9n\xE9ralement utilis\xE9s pour\
                  \ le plantage ou l'ensemencement, la culture et la multiplication\
                  \ du cannabis s\xE9lectionn\xE9 pour contenir des cannabino\xEF\
                  des, en particulier le THC (plus de 0,3 % p/p) et le CBD, pour usages\
                  \ non m\xE9dical (r\xE9cr\xE9atif, bien-\xEAtre, mode de vie, spirituel,\
                  \ etc.) et m\xE9dical. Les graines et plants v\xE9g\xE9tatifs de\
                  \ cannabis proviennent g\xE9n\xE9ralement de trois vari\xE9t\xE9\
                  s, qui sont le cannabis Sativa, le cannabis Indica et le cannabis\
                  \ Ruderalis. Les vari\xE9t\xE9s Sativa et Indica sont les plus souvent\
                  \ utilis\xE9es pour la culture et la multiplication. Les \xE9l\xE9\
                  ments composants de la g\xE9n\xE9tique des diff\xE9rentes vari\xE9\
                  t\xE9s de cannabis sont largement m\xE9lang\xE9s ou clon\xE9s pour\
                  \ cr\xE9er des vari\xE9t\xE9s hybrides de cannabis."
