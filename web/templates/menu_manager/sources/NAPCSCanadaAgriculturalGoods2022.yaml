                  \ \xE0 la consommation humaine, tant \xE0 titre de grandes cultures\
                  \ que de cultures de l\xE9gumes, se trouvant dans des champs et\
                  \ des serres. Certaines plantes gramin\xE9es et l\xE9gumineuses,\
                  \ si elles sont r\xE9colt\xE9es pr\xE9cocement pour leurs grains\
                  \ verts ou leurs gousses vertes (par\_exemple, pois verts, haricots\
                  \ d'Espagne, ma\xEFs vert) sont trait\xE9es comme des l\xE9gumes\
                  \ frais, mais si elles sont r\xE9colt\xE9es pour leurs grains secs\
                  \ ou leurs semences, elles sont consid\xE9r\xE9es comme des c\xE9\
                  r\xE9ales et des l\xE9gumineuses de culture."
