        description: The set of actions that define an experiment to assess the effectiveness
          and/or safety of a biopharmaceutical product (food, drug, device, etc.).
          In definition mood, this set of actions is often embodied in a clinical
          trial protocol; in event mood, this designates the aggregate act of applying
          the actions to one or more subjects.
      CNOD:
        title: Condition Node
        description: An instance of Observation of a Condition at a point in time
          that includes any Observations or Procedures associated with that Condition
          as well as links to previous instances of Condition Node for the same Condition
        status: DEPRECATED
      COND:
        title: Condition
        description: 'An observable finding or state that persists over time and tends
          to require intervention or management, and, therefore, distinguished from
          an Observation made at a point in time; may exist before an Observation
          of the Condition is made or after interventions to manage the Condition
          are undertaken. Examples: equipment repair status, device recall status,
          a health risk, a financial risk, public health risk, pregnancy, health maintenance,
          chronic illness'
        status: DEPRECATED
      CASE:
        title: public health case
        description: A public health case is an Observation representing a condition
          or event that has a specific significance for public health. Typically it
          involves an instance or instances of a reportable infectious disease or
          other condition. The public health case can include a health-related event
          concerning a single individual or it may refer to multiple health-related
          events that are occurrences of the same disease or condition of interest
          to public health. An outbreak involving multiple individuals may be considered
          as a type of public health case. A public health case definition (Act.moodCode
          = &quot;definition&quot;) includes the description of the clinical, laboratory,
          and epidemiologic indicators associated with a disease or condition of interest
          to public health. There are case definitions for conditions that are reportable,
          as well as for those that are not. There are also case definitions for outbreaks.
          A public health case definition is a construct used by public health for
          the purpose of counting cases, and should not be used as clinical indications
          for treatment. Examples include AIDS, toxic-shock syndrome, and salmonellosis
          and their associated indicators that are used to define a case.
        status: DEPRECATED
      OUTB:
        title: outbreak
        description: An outbreak represents a series of public health cases. The date
          on which an outbreak starts is the earliest date of onset among the cases
          assigned to the outbreak, and its ending date is the last date of onset
          among the cases assigned to the outbreak.
        status: DEPRECATED
      DGIMG:
        title: diagnostic image
        description: Class for holding attributes unique to diagnostic images.
      GEN:
        title: genomic observation
        description: '**Description:**An observation of genomic phenomena.'
      DETPOL:
        title: determinant peptide
        description: '**Description:**A determinant peptide in a polypeptide as described
          by polypeptide.'
      EXP:
        title: expression level
        description: '**Description:**An expression level of genes/proteins or other
          expressed genomic entities.'
      LOC:
        title: locus
        description: '**Description:**The position of a gene (or other significant
          sequence) on the genome.'
      PHN:
        title: phenotype
        description: '**Description:**A genomic phenomenon that is expressed externally
          in the organism.'
      POL:
        title: polypeptide
        description: '**Description:**A polypeptide resulting from the translation
          of a gene.'
      SEQ:
        title: bio sequence
        description: '**Description:**A sequence of biomolecule like the DNA, RNA,
          protein and the like.'
      SEQVAR:
        title: bio sequence variation
        description: '**Description:**A variation in a sequence as described by BioSequence.'
      INVSTG:
        title: investigation
        description: An formalized inquiry into the circumstances surrounding a particular
          unplanned event or potential event for the purposes of identifying possible
          causes and contributing factors for the event. This investigation could
          be conducted at a local institutional level or at the level of a local or
          national government.
      OBSSER:
        title: observation series
        description: Container for Correlated Observation Sequences sharing a common
          frame of reference. All Observations of the same cd must be comparable and
          relative to the common frame of reference. For example, a 3-channel ECG
          device records a 12-lead ECG in 4 steps (3 leads at a time). Each of the
          separate 3-channel recordings would be in their own &quot;OBSCOR&quot;.
          And, all 4 OBSCOR would be contained in one OBSSER because all the times
          are relative to the same origin (beginning of the recording) and all the
          ECG signals were from a fixed set of electrodes.
      OBSCOR:
        title: correlated observation sequences
        description: "Container for Observation Sequences (Observations whose values\
          \ are contained in LIST&lt;&gt;'s) having values correlated with each other.\
          \ Each contained Observation Sequence LIST&lt;&gt; must be the same length.\
          \ Values in the LIST&lt;&gt;'s are correlated based on index. E.g. the values\
          \ in position 2 in all the LIST&lt;&gt;'s are correlated. This is analogous\
          \ to a table where each column is an Observation Sequence with a LIST&lt;&gt;\
          \ of values, and each row in the table is a correlation between the columns.\
          \ For example, a 12-lead ECG would contain 13 sequences: one sequence for\
          \ time, and a sequence for each of the 12 leads."
      POS:
        title: position
        description: An observation denoting the physical location of a person or
          thing based on a reference coordinate system.
      POSACC:
        title: position accuracy
        description: '**Description:**An observation representing the degree to which
          the assignment of the spatial coordinates, based on a matching algorithm
          by a geocoding engine against a reference spatial database, matches true
          or accepted values.'
      POSCOORD:
        title: position coordinate
        description: '**Description:**An observation representing one of a set of
          numerical values used to determine the position of a place. The name of
          the coordinate value is determined by the reference coordinate system.'
      SPCOBS:
        title: specimen observation
        description: An observation on a specimen in a laboratory environment that
          may affect processing, analysis or result interpretation
      VERIF:
        title: Verification
        description: "An act which describes the process whereby a 'verifying party'\
          \ validates either the existence of the Role attested to by some Credential\
          \ or the actual Vetting act and its details."
      PCPR:
        title: care provision
        description: An Act that of taking on whole or partial responsibility for,
          or attention to, safety and well-being of a subject of care.
      ENC:
        title: encounter
        description: An interaction between a patient and healthcare participant(s)
          for the purpose of providing patient service(s) or assessing the health
          status of a patient. For example, outpatient visit to multiple departments,
          home health support (including physical therapy), inpatient hospital stay,
          emergency room visit, field visit (e.g., traffic accident), office visit,
          occupational therapy, telephone call.
      POLICY:
        title: policy
        description: '**Description:**A mandate, regulation, obligation, requirement,
          rule, or expectation unilaterally imposed by one party on:'
      JURISPOL:
        title: jurisdictional policy
        description: '**Description:**A mandate, regulation, obligation, requirement,
          rule, or expectation unilaterally imposed by a jurisdiction on:'
      ORGPOL:
        title: organizational policy
        description: '**Description:**A mandate, obligation, requirement, rule, or
          expectation unilaterally imposed by an organization on:'
      SCOPOL:
        title: scope of practice policy
        description: '**Description:**An ethical or clinical obligation, requirement,
          rule, or expectation imposed or strongly encouraged by organizations that
          oversee particular clinical domains or provider certification which define
          the boundaries within which a provider may practice and which may have legal
          basis or ramifications on:'
      STDPOL:
        title: standard of practice policy
        description: '**Description:**A requirement, rule, or expectation typically
          documented as guidelines, protocols, or formularies imposed or strongly
          encouraged by an organization that oversees or has authority over the practices
          within a domain, and which may have legal basis or ramifications on:'
      PROC:
        title: procedure
        description: An Act whose immediate and primary outcome (post-condition) is
          the alteration of the physical condition of the subject.
      SBADM:
        title: substance administration
        description: The act of introducing or otherwise applying a substance to the
          subject.
      SBEXT:
        title: Substance Extraction
        description: 'Description: The act of removing a substance from the subject.'
      SPECCOLLECT:
        title: Specimen Collection
        description: A procedure for obtaining a specimen from a source entity.
      REG:
        title: registration
        description: Represents the act of maintaining information about the registration
          of its associated registered subject. The subject can be either an Act or
          a Role, and includes subjects such as lab exam definitions, drug protocol
          definitions, prescriptions, persons, patients, practitioners, and equipment.
      REV:
        title: review
        description: The act of examining and evaluating the subject, usually another
          act. For example, &quot;This prescription needs to be reviewed in 2 months.&quot;
      SPCTRT:
        title: specimen treatment
        description: A procedure or treatment performed on a specimen to prepare it
          for analysis
      SPLY:
        title: supply
        description: Supply orders and deliveries are simple Acts that focus on the
          delivered product. The product is associated with the Supply Act via Participation.typeCode=&quot;product&quot;.
          With general Supply Acts, the precise identification of the Material (manufacturer,
          serial numbers, etc.) is important. Most of the detailed information about
          the Supply should be represented using the Material class. If delivery needs
          to be scheduled, tracked, and billed separately, one can associate a Transportation
          Act with the Supply Act. Pharmacy dispense services are represented as Supply
          Acts, associated with a SubstanceAdministration Act. The SubstanceAdministration
          class represents the administration of medication, while dispensing is supply.
      DIET:
        title: diet
        description: 'Diet services are supply services, with some aspects resembling
          Medication services: the detail of the diet is given as a description of
          the Material associated via Participation.typeCode=&quot;product&quot;.
          Medically relevant diet types may be communicated in the Diet.code attribute
          using domain ActDietCode, however, the detail of the food supplied and the
          various combinations of dishes should be communicated as Material instances.'
        status: DEPRECATED
      STORE:
        title: storage
        description: The act of putting something away for safe keeping. The &quot;something&quot;
          may be physical object such as a specimen, or information, such as observations
          regarding a specimen.
      SUBST:
        title: Substitution
        description: 'Definition: Indicates that the subject Act has undergone or
          should undergo substitution of a type indicated by Act.code.'
      TRFR:
        title: transfer
        description: 'Definition: The act of transferring information without the
          intent of imparting understanding about a topic to the subject that is the
          recipient or holder of the transferred information where the participation
          association must be RCV or HLD.'
      TRNS:
        title: transportation
        description: Transportation is the moving of a payload (people or material)
          from a location of origin to a destination location. Thus, any transport
          service has the three target instances of type payload, origin, and destination,
          besides the targets that are generally used for any service (i.e., performer,
          device, etc.)
      XACT:
        title: financial transaction
        description: A sub-class of Act representing any transaction between two accounts
          whose value is measured in monetary terms.
      _ActClassContainer:
        title: ActClassContainer
      ENTRY:
        title: entry
        description: "This context represents the information acquired and recorded\
          \ for an observation, a clinical statement such as a portion of the patient's\
          \ history or an inference or assertion, or an action that might be intended\
          \ or has actually been performed. This class may represent both the actual\
          \ data describing the observation, inference, or action, and optionally\
          \ the details supporting the clinical reasoning process such as a reference\
          \ to an electronic guideline, decision support system, or other knowledge\
          \ reference."
      ORGANIZER:
        title: organizer
        description: Organizer of entries. Navigational. No semantic content. Knowledge
          of the section code is not required to interpret contained observations.
          Represents a heading in a heading structure, or &quot;organizer tree&quot;.
      _ActContainer:
        title: ActClassContainer
  LOINCActEncounterCode:
    name: LOINCActEncounterCode
    description: Domain provides codes that qualify the ActEncounterClass (ENC)
    status: ACTIVE
    permissible_values:
      AMB:
        title: ambulatory
        description: A comprehensive term for health care provided in a healthcare
          facility (e.g. a practitioneraTMs office, clinic setting, or hospital) on
          a nonresident basis. The term ambulatory usually implies that the patient
          has come to the location and is not assigned to a bed. Sometimes referred
          to as an outpatient encounter.
      EMER:
        title: emergency
        description: "A patient encounter that takes place at a dedicated healthcare\
          \ service delivery location where the patient receives immediate evaluation\
          \ and treatment, provided until the patient can be discharged or responsibility\
          \ for the patient's care is transferred elsewhere (for example, the patient\
          \ could be admitted as an inpatient or transferred to another facility.)"
      FLD:
        title: field
        description: "A patient encounter that takes place both outside a dedicated\
          \ service delivery location and outside a patient's residence. Example locations\
          \ might include an accident site and at a supermarket."
      HH:
        title: home health
        description: Healthcare encounter that takes place in the residence of the
          patient or a designee
      IMP:
        title: inpatient encounter
        description: A patient encounter where a patient is admitted by a hospital
          or equivalent facility, assigned to a location where patients generally
          stay at least overnight and provided with room, board, and continuous nursing
          service.
      ACUTE:
        title: inpatient acute
        description: An acute inpatient encounter.
      NONAC:
        title: inpatient non-acute
        description: "Any category of inpatient encounter except 'acute'"
      OBSENC:
        title: observation encounter
        description: An encounter where the patient usually will start in different
          encounter, such as one in the emergency department (EMER) but then transition
          to this type of encounter because they require a significant period of treatment
          and monitoring to determine whether or not their condition warrants an inpatient
          admission or discharge. In the majority of cases the decision about admission
          or discharge will occur within a time period determined by local, regional
          or national regulation, often between 24 and 48 hours.
      PRENC:
        title: pre-admission
        description: A patient encounter where patient is scheduled or planned to
          receive service delivery in the future, and the patient is given a pre-admission
          account number. When the patient comes back for subsequent service, the
          pre-admission encounter is selected and is encapsulated into the service
          registration, and a new account number is generated.
      SS:
        title: short stay
        description: An encounter where the patient is admitted to a health care facility
          for a predetermined length of time, usually less than 24 hours.
      VR:
        title: virtual
        description: A patient encounter where the patient and the practitioner(s)
          are not in the same physical location. Examples include telephone conference,
          email exchange, robotic surgery, and televideo conference.
  LOINCActMood:
    name: LOINCActMood
    description: "A code distinguishing whether an Act is conceived of as a factual\
      \ statement or in some other manner\u2026"
    status: ACTIVE
    permissible_values:
      _ActMoodCompletionTrack:
        title: ActMoodCompletionTrack
        description: These are moods describing activities as they progress in the
          business cycle, from defined, through planned and ordered to completed.
      _ActMoodPotential:
        title: potential
        description: 'Definition: A possible act.'
        is_a: _ActMoodCompletionTrack
      DEF:
        title: definition
        description: 'Definition: A definition of a kind of act that can occur .'
        is_a: _ActMoodPotential
      PERM:
        title: permission
        description: 'Definition: A kind of act that defines a permission that has
          been granted.'
        is_a: _ActMoodPotential
      SLOT:
        title: resource slot
        description: 'Definition: A kind of act that may occur during the specified
          time period.'
        is_a: _ActMoodPotential
      EVN:
        title: event (occurrence)
        description: 'Definition: An act that actually happens (may be an ongoing
          act or a documentation of a past act).'
        is_a: _ActMoodCompletionTrack
      INT:
        title: intent
        description: 'Definition: An intention or plan for an act.'
        is_a: _ActMoodCompletionTrack
      _ActMoodDesire:
        title: desire
        description: 'Definition: A desire to have an act occur.'
        is_a: INT
      _ActMoodActRequest:
        title: act request
        description: 'Definition: A request (or order) for an act that is part of
          a defined request/fulfillment cycle.'
        is_a: _ActMoodDesire
      ARQ:
        title: appointment request
        description: 'Definition: A request act that is specialized for the appointment
          scheduling request/fulfillment cycle. An appointment request is fulfilled
          only and completely by an appointment (APT), i.e., all that the appointment
          request intends is to create an appointment (the actual act may well not
          happen if that is the professional decision during the appointment).'
        is_a: _ActMoodActRequest
      PERMRQ:
        title: permission request
        description: 'Definition: A request for a permission to perform the act. Typically
          a payer (or possibly a supervisor) is being requested to give permission
          to perform the act. As opposed to the RQO, the requestee is not asked to
          perform or cause to perform the act but only to give the permission.'
        is_a: _ActMoodActRequest
      RQO:
        title: request
        description: 'Definition: A request act that is specialized for an event request/fulfillment
          cycle.'
        is_a: _ActMoodActRequest
      ORD:
        title: request
        description: 'Definition: A request act that is specialized for an event request/fulfillment
          cycle.'
        is_a: _ActMoodActRequest
      PRP:
        title: proposal
        description: 'Definition: A suggestion that an act might be performed. Not
          an explicit request, and professional responsibility may or may not be present.'
        is_a: _ActMoodDesire
      RMD:
        title: recommendation
        description: 'Definition: A suggestion that an act should be performed with
          an acceptance of some degree of professional responsibility for the resulting
          act. Not an explicit request. .'
        is_a: PRP
      PRMS:
        title: promise
        description: 'Definition: A commitment to perform an act (may be either solicited
          or unsolicited). The committer becomes responsible to the other party for
          executing the act, and, as a consequence, the other party may rely on the
          first party to perform or cause to perform the act.'
        is_a: INT
      APT:
        title: appointment
        description: 'Definition: An act that has been scheduled to be performed at
          a specific place and time.'
        is_a: PRMS
      _ActMoodPredicate:
        title: ActMoodPredicate
        description: 'Definition: An act that expresses condition statements for other
          acts.'
      CRT:
        title: criterion
        description: 'Deprecation Comment: This concept This codes should no longer
          be used. Instead, set attribute Act.isCriterionInd to &quot;true&quot; and
          use the desired mood for your criterion.'
        is_a: _ActMoodPredicate
        status: DEPRECATED
      EVN.CRT:
        title: event criterion
        description: 'Deprecation Comment: This concept This codes should no longer
          be used. Instead, set attribute Act.isCriterionInd to &quot;true&quot; and
          use the desired mood for your criterion.'
        is_a: CRT
        status: DEPRECATED
      GOL.CRT:
        title: goal criterion
        description: A criterion expressed over goals (ActMood.GOL).
        is_a: CRT
      INT.CRT:
        title: intent criterion
        description: A criterion expressed over intents (ActMood.INT).
        is_a: CRT
      PRMS.CRT:
        title: promise criterion
        description: A criterion expressed over promises (ActMood.PRMS).
        is_a: INT.CRT
      RQO.CRT:
        title: request criterion
        description: A criterion expressed over requests or orders (ActMood.RQO).
        is_a: INT.CRT
      RSK.CRT:
        title: risk criterion
        description: A criterion expressed over risks (ActMood.RSK).
        is_a: CRT
      EXPEC:
        title: expectation
        description: 'Definition: An act that is considered to have some noteworthy
          likelihood of occurring in the future (has_match = event).'
        is_a: _ActMoodPredicate
      GOL:
        title: Goal
        description: 'Definition: An expectation that is considered to be desirable
          to occur in the future'
        is_a: EXPEC
      RSK:
        title: risk
        description: '**Definition:**An act that may occur in the future and which
          is regarded as undesirable'
        is_a: EXPEC
      OPT:
        title: option
        description: 'Definition: One of a set of acts that specify an option for
          the property values that the parent act may have. Typically used in definitions
          or orders to describe alternatives. An option can only be used as a group,
          that is, all assigned values must be used together. The actual mood of the
          act is the same as the parent act, and they must be linked by an actrelationship
          with type = OPTN.'
        is_a: _ActMoodPredicate
  LOINCActRelationshipFulfills:
    name: LOINCActRelationshipFulfills
    description: "The source act fulfills (in whole or in part) the target act. Source\
      \ act must be in a mood equal or\u2026"
    status: ACTIVE
    permissible_values:
      FLFS:
        title: fulfills
        description: The source act fulfills (in whole or in part) the target act.
          Source act must be in a mood equal or more actual than the target act.
      OCCR:
        title: occurrence
        description: The source act is a single occurrence of a repeatable target
          act. The source and target act can be in any mood on the &quot;completion
          track&quot; but the source act must be as far as or further along the track
          than the target act (i.e., the occurrence of an intent can be an event but
          not vice versa).
        is_a: FLFS
      OREF:
        title: references order
        description: Relates either an appointment request or an appointment to the
          order for the service being scheduled.
        is_a: FLFS
      SCH:
        title: schedules request
        description: Associates a specific time (and associated resources) with a
          scheduling request or other intent.
        is_a: FLFS
  LOINCActRelationshipHasComponent:
    name: LOINCActRelationshipHasComponent
    description: "A collection of sub-services as steps or subtasks performed for\
      \ the source service. Services may be\u2026"
    status: ACTIVE
    permissible_values:
      COMP:
        title: has component
        description: The target act is a component of the source act, with no semantics
          regarding composition or aggregation implied.
      CTRLV:
        title: has control variable
        description: "A relationship from an Act to a Control Variable. For example,\
          \ if a Device makes an Observation, this relates the Observation to its\
          \ Control Variables documenting the device's settings that influenced the\
          \ observation."
        is_a: COMP
      MBR:
        title: has member
        description: The target Acts are aggregated by the source Act. Target Acts
          may have independent existence, participate in multiple ActRelationships,
          and do not contribute to the meaning of the source.
        is_a: COMP
      STEP:
        title: has step
        description: A collection of sub-services as steps or subtasks performed for
          the source service. Services may be performed sequentially or concurrently.
        is_a: MBR
      ARR:
        title: arrival
        description: The relationship that links to a Transportation Act (target)
          from another Act (source) indicating that the subject of the source Act
          entered into the source Act by means of the target Transportation act.
        is_a: STEP
      DEP:
        title: departure
        description: The relationship that links to a Transportation Act (target)
          from another Act (source) indicating that the subject of the source Act
          departed from the source Act by means of the target Transportation act.
        is_a: STEP
      PART:
        title: has part
        description: The source Act is a composite of the target Acts. The target
          Acts do not have an existence independent of the source Act.
        is_a: COMP
  LOINCActRelationshipType:
    name: LOINCActRelationshipType
    description: "A code specifying the meaning and purpose of every ActRelationship\
      \ instance. Each of its values imp\u2026"
    status: ACTIVE
    permissible_values:
      ART:
        title: act relationship type
        description: 'Description: A directed association between a source Act and
          a target Act.'
      _ActClassTemporallyPertains:
        title: ActClassTemporallyPertains
      _ActRelationshipTemporallyPertainsEnd:
        title: ActRelationshipTemporallyPertainsEnd
        description: A relationship that defines the relative time of the end source
          act based on the time of the target act.
      _ActRelationshipTemporallyPertainsStart:
        title: ActRelationshipTemporallyPertainsStart
        description: A relationship that defines the relative time of the start source
          act based on the time of the target act.
      TemporallyPertains:
        title: ActClassTemporallyPertains
      _ActRelationshipAccounting:
        title: ActRelationshipAccounting
        description: Codes that describe the relationship between an Act and a financial
          instrument such as a financial transaction, account or invoice element.
      _ActRelationshipCostTracking:
        title: ActRelationshipCostTracking
        description: Expresses values for describing the relationship relationship
          between an InvoiceElement or InvoiceElementGroup and a billable act.
      CHRG:
        title: has charge
        description: A relationship that provides an ability to associate a financial
          transaction (target) as a charge to a clinical act (source). A clinical
          act may have a charge associated with the execution or delivery of the service.
      COST:
        title: has cost
        description: A relationship that provides an ability to associate a financial
          transaction (target) as a cost to a clinical act (source). A clinical act
          may have an inherit cost associated with the execution or delivery of the
          service.
      _ActRelationshipPosting:
        title: ActRelationshipPosting
        description: Expresses values for describing the relationship between a FinancialTransaction
          and an Account.
      CREDIT:
        title: has credit
        description: A credit relationship ties a financial transaction (target) to
          an account (source). A credit, once applied (posted), may have either a
          positive or negative effect on the account balance, depending on the type
          of account. An asset account credit will decrease the account balance. A
          non-asset account credit will decrease the account balance.
      DEBIT:
        title: has debit
        description: A debit relationship ties a financial transaction (target) to
          an account (source). A debit, once applied (posted), may have either a positive
          or negative effect on the account balance, depending on the type of account.
          An asset account debit will increase the account balance. A non-asset account
          debit will decrease the account balance.
      _ActRelationshipPosts:
        title: ActRelationshipAccounting
        description: Codes that describe the relationship between an Act and a financial
          instrument such as a financial transaction, account or invoice element.
      _ActRelationshipConditional:
        title: ActRelationshipConditional
        description: Specifies under what circumstances (target Act) the source-Act
          may, must, must not or has occurred
      CIND:
        title: has contra-indication
        description: A contraindication is just a negation of a reason, i.e. it gives
          a condition under which the action is not to be done. Both, source and target
          can be any kind of service; target service is in criterion mood. How the
          strength of a contraindication is expressed (e.g., relative, absolute) is
          left as an open issue. The priorityNumber attribute could be used.
      PRCN:
        title: has pre-condition
        description: A requirement to be true before a service is performed. The target
          can be any service in criterion mood. For multiple pre-conditions a conjunction
          attribute (AND, OR, XOR) is applicable.
      RSON:
        title: has reason
        description: 'Description: The reason or rationale for a service. A reason
          link is weaker than a trigger, it only suggests that some service may be
          or might have been a reason for some action, but not that this reason requires/required
          the action to be taken. Also, as opposed to the trigger, there is no strong
          timely relation between the reason and the action. As well as providing
          various types of information about the rationale for a service, the RSON
          act relationship is routinely used between a SBADM act and an OBS act to
          describe the indication for use of a medication. Child concepts may be used
          to describe types of indication.'
      BLOCK:
        title: blocks
        description: 'Definition: The source act is performed to block the effects
          of the target act. This act relationship should be used when describing
          near miss type incidents where potential harm could have occurred, but the
          action described in the source act blocked the potential harmful effects
          of the incident actually occurring.'
      DIAG:
        title: diagnoses
        description: 'Description: The source act is intended to help establish the
          presence of a (an adverse) situation described by the target act. This is
          not limited to diseases but can apply to any adverse situation or condition
          of medical or technical nature.'
      IMM:
        title: immunization against
        description: 'Description: The source act is intented to provide immunity
          against the effects of the target act (the target act describes an infectious
          disease)'
      ACTIMM:
        title: active immunization against
        description: 'Description: The source act is intended to provide active immunity
          against the effects of the target act (the target act describes an infectious
          disease)'
      PASSIMM:
        title: passive immunization against
        description: 'Description: The source act is intended to provide passive immunity
          against the effects of the target act (the target act describes an infectious
          disease).'
      MITGT:
        title: mitigates
        description: The source act removes or lessens the occurrence or effect of
          the target act.
      RCVY:
        title: recovers
        description: 'Definition: The source act is performed to recover from the
          effects of the target act.'
      PRYLX:
        title: prophylaxis of
        description: 'Description: The source act is intended to reduce the risk of
          of an adverse situation to emerge as described by the target act. This is
          not limited to diseases but can apply to any adverse situation or condition
          of medical or technical nature.'
      TREAT:
        title: treats
        description: 'Description: The source act is intended to improve a pre-existing
          adverse situation described by the target act. This is not limited to diseases
          but can apply to any adverse situation or condition of medical or technical
          nature.'
      ADJUNCT:
        title: adjunctive treatment
        description: 'Description: The source act is intended to offer an additional
          treatment for the management or cure of a pre-existing adverse situation
          described by the target act. This is not limited to diseases but can apply
          to any adverse situation or condition of medical or technical nature. It
          is not a requirement that the non-adjunctive treatment is explicitly specified.'
      MTREAT:
        title: maintenance treatment
        description: 'Description: The source act is intended to provide long term
          maintenance improvement or management of a pre-existing adverse situation
          described by the target act. This is not limited to diseases but can apply
          to any adverse situation or condition of medical or technical nature.'
      PALLTREAT:
        title: palliates
        description: 'Description: The source act is intended to provide palliation
          for the effects of the target act.'
      SYMP:
        title: symptomatic relief
        description: 'Description: The source act is intented to provide symptomatic
          relief for the effects of the target act.'
      TRIG:
        title: has trigger
        description: A pre-condition that if true should result in the source Act
          being executed. The target is in typically in criterion mood. When reported
          after the fact (i.e. the criterion has been met) it may be in Event mood.
          A delay between the trigger and the triggered action can be specified.
      _ActRelationshipTemporallyPertains:
        title: ActRelationshipTemporallyPertains
        description: Abstract collector for ActRelationhsip types that relate two
          acts by their timing.
      _ActRelationshipTemporallyPertainsApproximates:
        title: ActRelationshipTemporallyPertainsApproximates
        description: Abstract collector for ActRelationship types that relate two
          acts by their approximate timing.
      ENE:
        title: ends near end
        description: "A relationship in which the source act's effective time ends\
          \ near the end of the target act's effective time. Near is defined separately\
          \ as a time interval."
      ECW:
        title: ends concurrent with
        description: "A relationship in which the source act's effective time ends\
          \ with the end of the target act's effective time."
      CONCURRENT:
        title: concurrent with
        description: "A relationship in which the source act's effective time is the\
          \ same as the target act's effective time."
      SBSECWE:
        title: starts before start of, ends with
        description: The source Act starts before the start of the target Act, and
          ends with the target Act.
      ENS:
        title: ends near start
        description: "A relationship in which the source act's effective time ends\
          \ near the start of the target act's effective time. Near is defined separately\
          \ as a time interval."
      ECWS:
        title: ends concurrent with start of
        description: The source Act ends when the target act starts (i.e. if we say
          &quot;ActOne ECWS ActTwo&quot;, it means that ActOne ends when ActTwo starts,
          therefore ActOne is the source and ActTwo is the target).
      SNE:
        title: starts near end
        description: "A relationship in which the source act's effective time starts\
          \ near the end of the target act's effective time. Near is defined separately\
          \ as a time interval."
      SCWE:
        title: starts concurrent with end of
        description: The source Act starts when the target act ends (i.e. if we say
          &quot;ActOne SCWE ActTwo&quot;, it means that ActOne starts when ActTwo
          ends, therefore ActOne is the source and ActTwo is the target).
      SNS:
        title: starts near start
        description: "A relationship in which the source act's effective time starts\
          \ near the start of the target act's effective time. Near is defined separately\
          \ as a time interval."
      SCW:
        title: starts concurrent with
        description: "A relationship in which the source act's effective time starts\
          \ with the start of the target act's effective time."
      SCWSEBE:
        title: starts with. ends before end of
        description: The source Act starts with.the target Act and ends before the
          end of the target Act.
      SCWSEAE:
        title: starts with, ends after end of
        description: The source Act starts with the target Act, and ends after the
          end of the target Act.
      EAS:
        title: ends after start of
        description: A relationship in which the source act ends after the target
          act starts.
      EAE:
        title: ends after end of
        description: A relationship in which the source act ends after the target
          act ends.
      SASEAE:
        title: starts after start of, ends after end of
        description: The source Act starts after start of the target Act and ends
          after end of the target Act.
      SBEEAE:
        title: contains end of
        description: The source Act contains the end of the target Act.
      SASSBEEAS:
        title: start after start of, contains end of
        description: The source Act start after the start of the target Act, and contains
          the end of the target Act.
      SBSEAE:
        title: contains time of
        description: The source Act contains the time of the target Act.
      SAS:
        title: starts after start of
        description: The source Act starts after the start of the target Act (i.e.
          if we say &quot;ActOne SAS ActTwo&quot;, it means that ActOne starts after
          the start of ActTwo, therefore ActOne is the source and ActTwo is the target).
      SAE:
        title: starts after end of
        description: A relationship in which the source act starts after the target
          act ends.
      DURING:
        title: occurs during
        description: "A relationship in which the source act's effective time is wholly\
          \ within the target act's effective time (including end points, as defined\
          \ in the act's effective times)"
      SASECWE:
        title: starts after start of, ends with
        description: The source Act starts after start of the target Act, and ends
          with the target Act.
      EASORECWS:
        title: ends after or concurrent with start of
        description: "A relationship in which the source act's effective time ends\
          \ after or concurrent with the start of the target act's effective time."
      EAEORECW:
        title: ends after or concurrent with end of
        description: "A relationship in which the source act's effective time ends\
          \ after or concurrent with the end of the target act's effective time."
      INDEPENDENT:
        title: independent of time of
        description: The source Act is independent of the time of the target Act.
      SAEORSCWE:
        title: starts after or concurrent with end of
        description: "A relationship in which the source act's effective time starts\
          \ after or concurrent with the end of the target act's effective time."
      SASORSCW:
        title: starts after or concurrent with start of
        description: "A relationship in which the source act's effective time starts\
          \ after or concurrent with the start of the target act's effective time."
      SBEORSCWE:
        title: starts before or concurrent with end of
        description: "A relationship in which the source act's effective time starts\
          \ before or concurrent with the end of the target act's effective time."
      OVERLAP:
        title: overlaps with
        description: "A relationship in which the source act's effective time overlaps\
          \ the target act's effective time in any way."
      EDU:
        title: ends during
        description: "A relationship in which the source act ends within the target\
          \ act's effective time (including end points, as defined in the act's effective\
          \ times)"
      SBSEASEBE:
        title: contains start of, ends before end of
        description: The source Act contains the start of the target Act, and ends
          before the end of the target Act.
      SBSEAS:
        title: contains start of
        description: The source Act contains the start of the target Act.
      SDU:
        title: starts during
        description: "A relationship in which the source act starts within the target\
          \ act's effective time (including end points, as defined in the act's effective\
          \ times)"
      SBE:
        title: starts before end of
        description: The source Act starts before the end of the target Act (i.e.
          if we say &quot;ActOne SBE ActTwo&quot;, it means that ActOne starts before
          the end of ActTwo, therefore ActOne is the source and ActTwo is the target).
      EBE:
        title: ends before end of
        description: The source Act ends before the end of the target Act (i.e. if
          we say &quot;ActOne EBE ActTwo&quot;, it means that ActOne ends before the
          end of ActTwo, therefore ActOne is the source and ActTwo is the target).
      SBSEBE:
        title: starts before start of, ends before end of
        description: The source Act starts before the start of the target Act, and
          ends before the end of the target Act.
      EBSORECWS:
        title: ends before or concurrent with start of
        description: "A relationship in which the source act's effective time ends\
          \ before or concurrent with the start of the target act's effective time."
      EBS:
        title: ends before start of
        description: A relationship in which the source act ends before the target
          act starts.
      EBEORECW:
        title: ends before or concurrent with end of
        description: "A relationship in which the source act's effective time ends\
          \ before or concurrent with the end of the target act's effective time."
      SBSORSCW:
        title: starts before or concurrent with start of
        description: "A relationship in which the source act's effective time starts\
          \ before or concurrent with the start of the target act's effective time."
      SBS:
        title: starts before start of
        description: A relationship in which the source act begins before the target
          act begins.
      AUTH:
        title: authorized by
        description: A relationship in which the target act authorizes or certifies
          the source act.
      CAUS:
        title: is etiology for
        description: 'Description: An assertion that an act was the cause of another
          act.This is stronger and more specific than the support link. The source
          (cause) is typically an observation, but may be any act, while the target
          may be any act.'
      COMP:
        title: has component
        description: The target act is a component of the source act, with no semantics
          regarding composition or aggregation implied.
      CTRLV:
        title: has control variable
        description: "A relationship from an Act to a Control Variable. For example,\
          \ if a Device makes an Observation, this relates the Observation to its\
          \ Control Variables documenting the device's settings that influenced the\
          \ observation."
      MBR:
        title: has member
        description: The target Acts are aggregated by the source Act. Target Acts
          may have independent existence, participate in multiple ActRelationships,
          and do not contribute to the meaning of the source.
      STEP:
        title: has step
        description: A collection of sub-services as steps or subtasks performed for
          the source service. Services may be performed sequentially or concurrently.
      ARR:
        title: arrival
        description: The relationship that links to a Transportation Act (target)
          from another Act (source) indicating that the subject of the source Act
          entered into the source Act by means of the target Transportation act.
      DEP:
        title: departure
        description: The relationship that links to a Transportation Act (target)
          from another Act (source) indicating that the subject of the source Act
          departed from the source Act by means of the target Transportation act.
      PART:
        title: has part
        description: The source Act is a composite of the target Acts. The target
          Acts do not have an existence independent of the source Act.
      COVBY:
        title: covered by
        description: A relationship in which the source act is covered by or is under
          the authority of a target act. A financial instrument such as an Invoice
          Element is covered by one or more specific instances of an Insurance Policy.
      DRIV:
        title: is derived from
        description: Associates a derived Act with its input parameters. E.G., an
          anion-gap observation can be associated as being derived from given sodium-,
          (potassium-,), chloride-, and bicarbonate-observations. The narrative content
          (Act.text) of a source act is wholly machine-derived from the collection
          of target acts.
      ELNK:
        title: episodeLink
        description: Expresses an association that links two instances of the same
          act over time, indicating that the instance are part of the same episode,
          e.g. linking two condition nodes for episode of illness; linking two encounters
          for episode of encounter.
      EVID:
        title: provides evidence for
        description: "Indicates that the target Act provides evidence in support of\
          \ the action represented by the source Act. The target is not a 'reason'\
          \ for the source act, but rather gives supporting information on why the\
          \ source act is an appropriate course of action. Possible targets might\
          \ be clinical trial results, journal articles, similar successful therapies,\
          \ etc."
      EXACBY:
        title: exacerbated by
        description: '**Description:**The source act is aggravated by the target act.
          (Example &quot;chest pain&quot; EXACBY &quot;exercise&quot;)'
      EXPL:
        title: has explanation
        description: This is the inversion of support. Used to indicate that a given
          observation is explained by another observation or condition.
      INTF:
        title: interfered by
        description: the target act documents a set of circumstances (events, risks)
          which prevent successful completion, or degradation of quality of, the source
          Act.
      ITEMSLOC:
        title: items located
        description: Items located
      LIMIT:
        title: limited by
        description: A relationship that limits or restricts the source act by the
          elements of the target act. For example, an authorization may be limited
          by a financial amount (up to $500). Target Act must be in EVN.CRIT mood.
      META:
        title: has metadata
        description: 'Definition: Indicates that the attributes and associations of
          the target act provide metadata (for example, identifiers, authorship, etc.)
          for the source act.'
      MFST:
        title: is manifestation of
        description: An assertion that a new observation may be the manifestation
          of another existing observation or action. This assumption is attributed
          to the same actor who asserts the manifestation. This is stronger and more
          specific than an inverted support link. For example, an agitated appearance
          can be asserted to be the manifestation (effect) of a known hyperthyroxia.
          This expresses that one might not have realized a symptom if it would not
          be a common manifestation of a known condition. The target (cause) may be
          any service, while the source (manifestation) must be an observation.
      NAME:
        title: assigns name
        description: Used to assign a &quot;name&quot; to a condition thread. Source
          is a condition node, target can be any service.
      OUTC:
        title: has outcome
        description: An observation that should follow or does actually follow as
          a result or consequence of a condition or action (sometimes called &quot;post-conditional&quot;.)
          Target must be an observation as a goal, risk or any criterion. For complex
          outcomes a conjunction attribute (AND, OR, XOR) can be used. An outcome
          link is often inverted to describe an outcome assessment.
      _ActRelationsipObjective:
        title: Act Relationsip Objective
        description: The target act is a desired outcome of the source act. Source
          is any act (typically an intervention). Target must be an observation in
          criterion mood.
      OBJC:
        title: has continuing objective
        description: A desired state that a service action aims to maintain. E.g.,
          keep systolic blood pressure between 90 and 110 mm Hg. Source is an intervention
          service. Target must be an observation in criterion mood.
      OBJF:
        title: has final objective
        description: A desired outcome that a service action aims to meet finally.
          Source is any service (typically an intervention). Target must be an observation
          in criterion mood.
      GOAL:
        title: has goal
        description: "A goal that one defines given a patient's health condition.\
          \ Subsequently planned actions aim to meet that goal. Source is an observation\
          \ or condition node, target must be an observation in goal mood."
      RISK:
        title: has risk
        description: "A noteworthy undesired outcome of a patient's condition that\
          \ is either likely enough to become an issue or is less likely but dangerous\
          \ enough to be addressed."
      PERT:
        title: has pertinent information
        description: This is a very unspecific relationship from one item of clinical
          information to another. It does not judge about the role the pertinent information
          plays.
      PREV:
        title: has previous instance
        description: A relationship in which the target act is a predecessor instance
          to the source act. Generally each of these instances is similar, but no
          identical. In healthcare coverage it is used to link a claim item to a previous
          claim item that might have claimed for the same set of services.
      REFR:
        title: refers to
        description: A relationship in which the target act is referred to by the
          source act. This permits a simple reference relationship that distinguishes
          between the referent and the referee.
      USE:
        title: uses
        description: Indicates that the source act makes use of (or will make use
          of) the information content of the target act.
      REFV:
        title: has reference values
        description: Reference ranges are essentially descriptors of a class of result
          values assumed to be &quot;normal&quot;, &quot;abnormal&quot;, or &quot;critical.&quot;
          Those can vary by sex, age, or any other criterion. Source and target are
          observations, the target is in criterion mood. This link type can act as
          a trigger in case of alarms being triggered by critical results.
      RELVBY:
        title: relieved by
        description: '**Description:**The source act is wholly or partially alleviated
          by the target act. (Example &quot;chest pain&quot; RELVBY &quot;sublingual
          nitroglycerin administration&quot;)'
      SEQL:
        title: is sequel
        description: 'An act relationship indicating that the source act follows the
          target act. The source act should in principle represent the same kind of
          act as the target. Source and target need not have the same mood code (mood
          will often differ). The target of a sequel is called antecedent. Examples
          for sequel relationships are: revision, transformation, derivation from
          a prototype (as a specialization is a derivation of a generalization), followup,
          realization, instantiation.'
      APND:
        title: is appendage
        description: An addendum (source) to an existing service object (target),
          containing supplemental information. The addendum is itself an original
          service object linked to the supplemented service object. The supplemented
          service object remains in place and its content and status are unaltered.
      BSLN:
        title: has baseline
        description: Indicates that the target observation(s) provide an initial reference
          for the source observation or observation group.
      COMPLY:
        title: complies with
        description: '**Description:**The source act complies with, adheres to, conforms
          to, or is permissible under (in whole or in part) the policy, contract,
          agreement, law, conformance criteria, certification guidelines or requirement
          conveyed by the target act.'
      DOC:
        title: documents
        description: The source act documents the target act.
      FLFS:
        title: fulfills
        description: The source act fulfills (in whole or in part) the target act.
          Source act must be in a mood equal or more actual than the target act.
      OCCR:
        title: occurrence
        description: The source act is a single occurrence of a repeatable target
          act. The source and target act can be in any mood on the &quot;completion
          track&quot; but the source act must be as far as or further along the track
          than the target act (i.e., the occurrence of an intent can be an event but
          not vice versa).
      OREF:
        title: references order
        description: Relates either an appointment request or an appointment to the
          order for the service being scheduled.
      SCH:
        title: schedules request
        description: Associates a specific time (and associated resources) with a
          scheduling request or other intent.
      GEN:
        title: has generalization
        description: The generalization relationship can be used to express categorical
          knowledge about services (e.g., amilorid, triamterene, and spironolactone
          have the common generalization potassium sparing diuretic).
      GEVL:
        title: evaluates (goal)
        description: A goal-evaluation links an observation (intent or actual) to
          a goal to indicate that the observation evaluates the goal. Given the goal
          and the observation, a &quot;goal distance&quot; (e.g., goal to observation)
          can be &quot;calculated&quot; and need not be sent explicitly.
      INST:
        title: instantiates (master)
        description: "Used to capture the link between a potential service (&quot;master&quot;\
          \ or plan) and an actual service, where the actual service instantiates\
          \ the potential service. The instantiation may override the master's defaults."
      MOD:
        title: modifies
        description: "Definition: Used to link a newer version or 'snapshot' of a\
          \ business object (source) to an older version or 'snapshot' of the same\
          \ business object (target)."
      MTCH:
        title: matches (trigger)
        description: A trigger-match links an actual service (e.g., an observation
          or procedure that took place) with a service in criterion mood. For example
          if the trigger is &quot;observation of pain&quot; and pain is actually observed,
          and if that pain-observation caused the trigger to fire, that pain-observation
          can be linked with the trigger.
      OPTN:
        title: has option
        description: A relationship between a source Act that provides more detailed
          properties to the target Act.
      RCHAL:
        title: re-challenge
        description: '**Description:**A relationship in which the target act is carried
          out to determine whether an effect attributed to the source act can be recreated.'
      REV:
        title: reverses
        description: A relationship between a source Act that seeks to reverse or
          undo the action of the prior target Act.
      RPLC:
        title: replaces
        description: A replacement source act replaces an existing target act. The
          state of the target act being replaced becomes obselete, but the act is
          typically still retained in the system for historical reference. The source
          and target must be of the same type.
      SUCC:
        title: succeeds
        description: "Definition: A new act that carries forward the intention of\
          \ the original act, but does not completely replace it. The status of the\
          \ predecessor act must be 'completed'. The original act is the target act\
          \ and the successor is the source act."
      UPDT:
        title: updates (condition)
        description: A condition thread relationship specifically links condition
          nodes together to form a condition thread. The source is the new condition
          node and the target links to the most recent node of the existing condition
          thread.
      XCRPT:
        title: Excerpts
        description: The source is an excerpt from the target.
      VRXCRPT:
        title: Excerpt verbatim
        description: The source is a direct quote from the target.
      XFRM:
        title: transformation
        description: Used when the target Act is a transformation of the source Act.
          (For instance, used to show that a CDA document is a transformation of a
          DICOM SR document.)
      SPRT:
        title: has support
        description: Used to indicate that an existing service is suggesting evidence
          for a new observation. The assumption of support is attributed to the same
          actor who asserts the observation. Source must be an observation, target
          may be any service (e.g., to indicate a status post).
      SPRTBND:
        title: has bounded support
        description: A specialization of &quot;has support&quot; (SPRT), used to relate
          a secondary observation to a Region of Interest on a multidimensional observation,
          if the ROI specifies the true boundaries of the secondary observation as
          opposed to only marking the approximate area. For example, if the start
          and end of an ST elevation episode is visible in an EKG, this relation would
          indicate the ROI bounds the &quot;ST elevation&quot; observation -- the
          ROI defines the true beginning and ending of the episode. Conversely, if
          a ROI simply contains ST elevation, but it does not define the bounds (start
          and end) of the episode, the more general &quot;has support&quot; relation
          is used. Likewise, if a ROI on an image defines the true bounds of a &quot;1st
          degree burn&quot;, the relation &quot;has bounded support&quot; is used;
          but if the ROI only points to the approximate area of the burn, the general
          &quot;has support&quot; relation is used.
      SUBJ:
        title: has subject
        description: Relates an Act to its subject Act that the first Act is primarily
          concerned with.
      QUALF:
        title: has qualifier
        description: The target observation qualifies (refines) the semantics of the
          source observation.
      SUMM:
        title: summarized by
        description: An act that contains summary values for a list or set of subordinate
          acts. For example, a summary of transactions for a particular accounting
          period.
      VALUE:
        title: has value
        description: '**Description:**Indicates that the target Act represents the
          result of the source observation Act.'
      CURE:
        title: curative indication
      CURE.ADJ:
        title: adjunct curative indication
      MTGT.ADJ:
        title: adjunct mitigation
      RACT: {}
      SUGG: {}
  LOINCActStatus:
    name: LOINCActStatus
    description: Contains the names (codes) for each of the states in the state-machine
      of the RIM Act class.
    status: ACTIVE
    permissible_values:
      normal:
        title: normal
        description: Encompasses the expected states of an Act, but excludes &quot;nullified&quot;
          and &quot;obsolete&quot; which represent unusual terminal states for the
          life-cycle.
      aborted:
        title: aborted
        description: The Act has been terminated prior to the originally intended
          completion.
        is_a: normal
      active:
        title: active
        description: The Act can be performed or is being performed
        is_a: normal
      cancelled:
        title: cancelled
        description: The Act has been abandoned before activation.
        is_a: normal
      completed:
        title: completed
        description: An Act that has terminated normally after all of its constituents
          have been performed.
        is_a: normal
      held:
        title: held
        description: An Act that is still in the preparatory stages has been put aside.
          No action can occur until the Act is released.
        is_a: normal
      new:
        title: new
        description: An Act that is in the preparatory stages and may not yet be acted
          upon
        is_a: normal
      suspended:
        title: suspended
        description: An Act that has been activated (actions could or have been performed
          against it), but has been temporarily disabled. No further action should
          be taken against it until it is released
        is_a: normal
      nullified:
        title: nullified
        description: "This Act instance was created in error and has been 'removed'\
          \ and is treated as though it never existed. A record is retained for audit\
          \ purposes only."
      obsolete:
        title: obsolete
        description: This Act instance has been replaced by a new instance.
  LOINCContextControl:
    name: LOINCContextControl
    description: "A code that specifies how an ActRelationship or Participation contributes\
      \ to the context of an Act,\u2026"
    status: ACTIVE
    permissible_values:
      _ContextControlAdditive:
        title: ContextControlAdditive
        description: The association adds to the existing context associated with
          the Act. Both this association and any associations propagated from ancestor
          Acts are interpreted as being related to this Act.
      AN:
        title: additive, non-propagating
        description: "The association adds to the existing context associated with\
          \ the Act, but will not propagate to any descendant Acts reached by conducting\
          \ ActRelationships (see contextControlCode). Examples: If an 'Author' Participation\
          \ were marked as &quot;Additive, Non-Propagating&quot; it means that the\
          \ author will be added to the set of author participations that have propagated\
          \ from ancestor Acts for the purpose of this Act. However only the previously\
          \ propagated authors will propagate to any child Acts that allow context\
          \ to be propagated."
      AP:
        title: additive, propagating
        description: "The association adds to the existing context associated with\
          \ the Act, and will propagate to any descendant Acts reached by conducting\
          \ ActRelationships (see contextControlCode). Examples: If an 'Author' Participation\
          \ were marked as &quot;Additive, Propagating&quot; it means that the author\
          \ will be added to the set of author participations that have propagated\
          \ from ancestor Acts, and will itself propagate with the other authors to\
          \ any child Acts that allow context to be propagated."
      _ContextControlNonPropagating:
        title: ContextControlNonPropagating
        description: The association applies only to the current Act and will not
          propagate to any child Acts that are related via a conducting ActRelationship
          (refer to contextConductionInd).
      'ON':
        title: overriding, non-propagating
        description: "The association is added to the existing context associated\
          \ with the Act, but overrides an association with the same typeCode. However,\
          \ this overriding association will not propagate to any descendant Acts\
          \ reached by conducting ActRelationships (see contextControlCode). Examples:\
          \ If an 'Author' Participation were marked as &quot;Overriding, Non-Propagating&quot;\
          \ it means that the author will replace the set of author participations\
          \ that have propagated from ancestor Acts. Furthermore, no author participations\
          \ whatsoever will propagate to any child Acts that allow context to be propagated."
      _ContextControlOverriding:
        title: ContextControlOverriding
        description: The association adds to the existing context associated with
          the Act, but replaces associations propagated from ancestor Acts whose typeCodes
          are the same or more specific.
      OP:
        title: overriding, propagating
        description: "The association is added to the existing context associated\
          \ with the Act, but overrides an association with the same typeCode. This\
          \ overriding association will propagate to any descendant Acts reached by\
          \ conducting ActRelationships (see contextControlCode). Examples: If an\
          \ 'Author' Participation were marked as &quot;Overriding, Propagating&quot;\
          \ it means that the author will replace the set of author participations\
          \ that have propagated from ancestor Acts, and will itself be the only author\
          \ to propagate to any child Acts that allow context to be propagated."
      _ContextControlPropagating:
        title: ContextControlPropagating
        description: The association propagates to any child Acts that are related
          via a conducting ActRelationship (refer to contextConductionInd).
