  LOINCXEncounterparticipant:
    name: LOINCXEncounterparticipant
    description: 'Clones using this x_domain should have a name "encounterParticipant".'
    status: ACTIVE
    permissible_values:
      ADM:
        title: admitter
        description: The practitioner who is responsible for admitting a patient to
          a patient encounter.
      ATND:
        title: attender
        description: "The practitioner that has responsibility for overseeing a patient's\
          \ care during a patient encounter."
      CON:
        title: consultant
        description: An advisor participating in the service by performing evaluations
          and making recommendations.
      DIS:
        title: discharger
        description: The practitioner who is responsible for the discharge of a patient
          from a patient encounter.
      REF:
        title: referrer
        description: A person having referred the subject of the service to the performer
          (referring physician). Typically, a referring physician will receive a report.
  LOINCXInformationrecipient:
    name: LOINCXInformationrecipient
    description: Used to represent participant(s) who should receive a copy of a document.
    status: ACTIVE
    permissible_values:
      PRCP:
        title: primary information recipient
        description: Information recipient to whom an act statement is primarily directed.
          E.g., a primary care provider receiving a discharge letter from a hospitalist,
          a health department receiving information on a suspected case of infectious
          disease. Multiple of these participations may exist on the same act without
          requiring that recipients be ranked as primary vs. secondary.
      TRC:
        title: tracker
        description: A secondary information recipient, who receives copies (e.g.,
          a primary care provider receiving copies of results as ordered by specialist).
  LOINCXInformationrecipientrole:
    name: LOINCXInformationrecipientrole
    description: Used to represent the role(s) of those who should receive a copy
      of a document.
    status: ACTIVE
    permissible_values:
      ASSIGNED:
        title: assigned entity
        description: "An agent role in which the agent is an Entity acting in the\
          \ employ of an organization. The focus is on functional role on behalf of\
          \ the organization, unlike the Employee role where the focus is on the 'Human\
          \ Resources' relationship between the employee and the organization."
      CAREGIVER:
        title: caregiver
        description: A person responsible for the primary care of a patient at home.
      GUAR:
        title: guarantor
        description: A person or organization (player) that serves as a financial
          guarantor for another person or organization (scoper).
      PROV:
        title: healthcare provider
        description: An Entity (player) that is authorized to provide health care
          services by some authorizing agency (scoper).
      PRS:
        title: personal relationship
        description: Links two entities with classCode PSN (person) in a personal
          relationship. The character of the relationship must be defined by a PersonalRelationshipRoleType
          code. The player and scoper are determined by PersonalRelationshipRoleType
          code as well.
  LOINCXServiceeventperformer:
    name: LOINCXServiceeventperformer
    description: 'Clones using this x_domain should have a name "performer".'
    status: ACTIVE
    permissible_values:
      PPRF:
        title: primary performer
        description: The principal or primary performer of the act.
      PRF:
        title: performer
        description: 'Definition: A person, non-person living subject, organization
          or device that who actually and principally carries out the action. Device
          should only be assigned as a performer in circumstances where the device
          is performing independent of human intervention. Need not be the principal
          responsible actor.'
      SPRF:
        title: secondary performer
        description: 'A person assisting in an act through his substantial presence
          and involvement This includes: assistants, technicians, associates, or whatever
          the job titles may be.'
