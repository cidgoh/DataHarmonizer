id: https://terminology.hl7.org/en/valuesets-cda.html
name: LOINCValuesetsCda
title: LOINC ValuesetsCda Value Sets
description: "CDA Value Sets defined and maintained by HL7 as part of the CDA family\
  \ of Standards, and published in the International CDA r2 Base Standard.  \n   \
  \ Please note that all of these value sets at this time are drawn from the masters\
  \ published in the HL7 Version 3 International Standard through the coremif."
version: null
license: ''
in_language: en
imports:
  - 'linkml:types'
prefixes:
  LOINC: https://loinc.org/
default_prefix: LOINC
classes: {}
enums:
  LOINCActClass:
    name: LOINCActClass
    description: "A code specifying the major type of Act that this Act-instance represents.\n\
      \      \n      Constraints:\n The cl\u2026"
    status: ACTIVE
    permissible_values:
      ACT:
        title: act
        description: A record of something that is being done, has been done, can
          be done, or is intended or requested to be done.
      _ActClassRecordOrganizer:
        title: record organizer
        description: Used to group a set of acts sharing a common context. Organizer
          structures can nest within other context structures - such as where a document
          is contained within a folder, or a folder is contained within an EHR extract.
      COMPOSITION:
        title: composition
        description: A context representing a grouped commitment of information to
          the EHR. It is considered the unit of modification of the record, the unit
          of transmission in record extracts, and the unit of attestation by authorizing
          clinicians.
      DOC:
        title: document
        description: The notion of a document comes particularly from the paper world,
          where it corresponds to the contents recorded on discrete pieces of paper.
          In the electronic world, a document is a kind of composition that bears
          resemblance to their paper world counter-parts. Documents typically are
          meant to be human-readable.
      DOCCLIN:
        title: clinical document
        description: 'A clinical document is a documentation of clinical observations
          and services, with the following characteristics:'
      CDALVLONE:
        title: CDA Level One clinical document
        description: A clinical document that conforms to Level One of the HL7 Clinical
          Document Architecture (CDA)
      CONTAINER:
        title: record container
        description: 'Description: Container of clinical statements. Navigational.
          No semantic content. Knowledge of the section code is not required to interpret
          contained observations. Represents a heading in a heading structure, or
          &quot;container tree&quot;.'
      CATEGORY:
        title: category
        description: A group of entries within a composition or topic that have a
          common characteristic - for example, Examination, Diagnosis, Management
          OR Subjective, Objective, Analysis, Plan.
      DOCBODY:
        title: document body
        description: A context that distinguishes the body of a document from the
          document header. This is seen, for instance, in HTML documents, which have
          discrete &lt;head&gt; and &lt;body&gt; elements.
      DOCSECT:
        title: document section
        description: A context that subdivides the body of a document. Document sections
          are typically used for human navigation, to give a reader a clue as to the
          expected content. Document sections are used to organize and provide consistency
          to the contents of a document body. Document sections can contain document
          sections and can contain entries.
      TOPIC:
        title: topic
        description: A group of entries within a composition that are related to a
          common clinical theme - such as a specific disorder or problem, prevention,
          screening and provision of contraceptive services.
      EXTRACT:
        title: extract
        description: This context represents the part of a patient record conveyed
          in a single communication. It is drawn from a providing system for the purposes
          of communication to a requesting process (which might be another repository,
          a client application or a middleware service such as an electronic guideline
          engine), and supporting the faithful inclusion of the communicated data
          in the receiving system.
      EHR:
        title: electronic health record
        description: A context that comprises all compositions. The EHR is an extract
          that includes the entire chart.
      FOLDER:
        title: folder
        description: 'A context representing the high-level organization of an extract
          e.g. to group parts of the record by episode, care team, clinical specialty,
          clinical condition, or source application. Internationally, this kind of
          organizing structure is used variably: in some centers and systems the folder
          is treated as an informal compartmentalization of the overall health record;
          in others it might represent a significant legal portion of the EHR relating
          to the originating enterprise or team.'
      GROUPER:
        title: grouper
        description: 'Definition: An ACT that organizes a set of component acts into
          a semantic grouping that share a particular context such as timeframe, patient,
          etc.'
      CLUSTER:
        title: Cluster
        description: '**Description:**An ACT that organizes a set of component acts
          into a semantic grouping that have a shared subject. The subject may be
          either a subject participation (SBJ), subject act relationship (SUBJ), or
          child participation/act relationship types.'
      ACCM:
        title: accommodation
        description: An accommodation is a service provided for a Person or other
          LivingSubject in which a place is provided for the subject to reside for
          a period of time. Commonly used to track the provision of ward, private
          and semi-private accommodations for a patient.
      ACCT:
        title: account
        description: A financial account established to track the net result of financial
          acts.
      ACSN:
        title: accession
        description: A unit of work, a grouper of work items as defined by the system
          performing that work. Typically some laboratory order fulfillers communicate
          references to accessions in their communications regarding laboratory orders.
          Often one or more specimens are related to an accession such that in some
          environments the accession number is taken as an identifier for a specimen
          (group).
      ADJUD:
        title: financial adjudication
        description: A transformation process where a requested invoice is transformed
          into an agreed invoice. Represents the adjudication processing of an invoice
          (claim). Adjudication results can be adjudicated as submitted, with adjustments
          or refused.
      CACT:
        title: control act
        description: An act representing a system action such as the change of state
          of another act or the initiation of a query. All control acts represent
          trigger events in the HL7 context. ControlActs may occur in different moods.
      ACTN:
        title: action
        description: Sender asks addressee to do something depending on the focal
          Act of the payload. An example is &quot;fulfill this order&quot;. Addressee
          has responsibilities to either reject the message or to act on it in an
          appropriate way (specified by the specific receiver responsibilities for
          the interaction).
      INFO:
        title: information
        description: "Sender sends payload to addressee as information. Addressee\
          \ does not have responsibilities beyond serving addressee's own interest\
          \ (i.e., read and memorize if you see fit). This is equivalent to an FYI\
          \ on a memo."
      STC:
        title: state transition control
        description: 'Description: Sender transmits a status change pertaining to
          the focal act of the payload. This status of the focal act is the final
          state of the state transition. This can be either a request or an event,
          according to the mood of the control act.'
      CNTRCT:
        title: contract
        description: An agreement of obligation between two or more parties that is
          subject to contractual law and enforcement.
      FCNTRCT:
        title: financial contract
        description: A contract whose value is measured in monetary terms.
      COV:
        title: coverage
        description: 'When used in the EVN mood, this concept means with respect to
          a covered party:'
      CONC:
        title: concern
        description: 'Definition: A worry that tends to persist over time and has
          as its subject a state or process. The subject of the worry has the potential
          to require intervention or management.'
      HCASE:
        title: public health case
        description: A public health case is a Concern about an observation or event
          that has a specific significance for public health. The creation of a PublicHealthCase
          initiates the tracking of the object of concern. The decision to track is
          related to but somewhat independent of the underlying event or observation.
      OUTBR:
        title: outbreak
        description: An Outbreak is a concern resulting from a series of public health
          cases.
      CONS:
        title: consent
        description: The Consent class represents informed consents and all similar
          medico-legal transactions between the patient (or his legal guardian) and
          the provider. Examples are informed consent for surgical procedures, informed
          consent for clinical trials, advanced beneficiary notice, against medical
          advice decline from service, release of information agreement, etc.
      CONTREG:
        title: container registration
        description: An Act where a container is registered either via an automated
          sensor, such as a barcode reader, or by manual receipt
      CTTEVENT:
        title: clinical trial timepoint event
        description: An identified point during a clinical trial at which one or more
          actions are scheduled to be performed (definition mood), or are actually
          performed (event mood). The actions may or may not involve an encounter
          between the subject and a healthcare professional.
      DISPACT:
        title: disciplinary action
        description: An action taken with respect to a subject Entity by a regulatory
          or authoritative body with supervisory capacity over that entity. The action
          is taken in response to behavior by the subject Entity that body finds to
          be undesirable.
      EXPOS:
        title: exposure
        description: An interaction between entities that provides opportunity for
          transmission of a physical, chemical, or biological agent from an exposure
          source entity to an exposure target entity.
      AEXPOS:
        title: acquisition exposure
        description: 'Description:'
      TEXPOS:
        title: transmission exposure
        description: 'Description:'
      INC:
        title: incident
        description: An event that occurred outside of the control of one or more
          of the parties involved. Includes the concept of an accident.
      INFRM:
        title: inform
        description: The act of transmitting information and understanding about a
          topic to a subject where the participation association must be SBJ.
      INVE:
        title: invoice element
        description: Represents concepts related to invoice processing in health care
      LIST:
        title: working list
        description: Working list collects a dynamic list of individual instances
          of Act via ActRelationship which reflects the need of an individual worker,
          team of workers, or an organization to manage lists of acts for many different
          clinical and administrative reasons. Examples of working lists include problem
          lists, goal lists, allergy lists, and to-do lists.
      MPROT:
        title: monitoring program
        description: An officially or unofficially instituted program to track acts
          of a particular type or categorization.
      OBS:
        title: observation
        description: '**Description:**An act that is intended to result in new information
          about a subject. The main difference between Observations and other Acts
          is that Observations have a value attribute. The code attribute of Observation
          and the value attribute of Observation must be considered in combination
          to determine the semantics of the observation.'
      _ActClassROI:
        title: ActClassROI
        description: Regions of Interest (ROI) within a subject Act. Primarily used
          for making secondary observations on a subset of a subject observation.
          The relationship between a ROI and its referenced Act is specified through
          an ActRelationship of type &quot;subject&quot; (SUBJ), which must always
          be present.
      ROIBND:
        title: bounded ROI
        description: A Region of Interest (ROI) specified for a multidimensional observation,
          such as an Observation Series (OBSSER). The ROI is specified using a set
          of observation criteria, each delineating the boundary of the region in
          one of the dimensions in the multidimensional observation. The relationship
          between a ROI and its referenced Act is specified through an ActRelationship
          of type subject (SUBJ), which must always be present. Each of the boundary
          criteria observations is connected with the ROI using ActRelationships of
          type &quot;has component&quot; (COMP). In each boundary criterion, the Act.code
          names the dimension and the Observation.value specifies the range of values
          inside the region. Typically the bounded dimension is continuous, and so
          the Observation.value will be an interval (IVL) data type. The Observation.value
          need not be specified if the respective dimension is only named but not
          constrained. For example, an ROI for the QT interval of a certain beat in
          ECG Lead II would contain 2 boundary criteria, one naming the interval in
          time (constrained), and the other naming the interval in ECG Lead II (only
          named, but not constrained).
      ROIOVL:
        title: overlay ROI
        description: A Region of Interest (ROI) specified for an image using an overlay
          shape. Typically used to make reference to specific regions in images, e.g.,
          to specify the location of a radiologic finding in an image or to specify
          the site of a physical finding by &quot;circling&quot; a region in a schematic
          picture of a human body. The units of the coordinate values are in pixels.
          The origin is in the upper left hand corner, with positive X values going
          to the right and positive Y values going down. The relationship between
          a ROI and its referenced Act is specified through an ActRelationship of
          type &quot;subject&quot; (SUBJ), which must always be present.
      _SubjectPhysicalPosition:
        title: subject physical position
        description: The spatial relationship of a subject whether human, other animal,
          or plant, to a frame of reference such as gravity or a collection device.
      _SubjectBodyPosition:
        title: subject body position
        description: Contains codes for defining the observed, physical position of
          a subject, such as during an observation, assessment, collection of a specimen,
          etc. ECG waveforms and vital signs, such as blood pressure, are two examples
          where a general, observed position typically needs to be noted.
        status: DEPRECATED
      LLD:
        title: left lateral decubitus
        description: Lying on the left side.
        status: DEPRECATED
      PRN:
        title: prone
        description: Lying with the front or ventral surface downward; lying face
          down.
        status: DEPRECATED
      RLD:
        title: right lateral decubitus
        description: Lying on the right side.
        status: DEPRECATED
      SFWL:
        title: "Semi-Fowler's"
        description: A semi-sitting position in bed with the head of the bed elevated
          approximately 45 degrees.
        status: DEPRECATED
      SIT:
        title: sitting
        description: Resting the body on the buttocks, typically with upper torso
          erect or semi erect.
        status: DEPRECATED
      STN:
        title: standing
        description: "To be stationary, upright, vertical, on one's legs."
        status: DEPRECATED
      SUP:
        title: supine
        description: 'Deprecation Comment: This concept has been deprecated because
          it does not describe a type of Act (as it should in the ActClass code system),
          but rather encodes the result or value of an observation. The same code
          has been added to the ObservationValue code system.'
        status: DEPRECATED
      RTRD:
        title: reverse trendelenburg
        description: Lying on the back, on an inclined plane, typically about 30-45
          degrees with head raised and feet lowered.
        status: DEPRECATED
      TRD:
        title: trendelenburg
        description: Lying on the back, on an inclined plane, typically about 30-45
          degrees, with head lowered and feet raised.
        status: DEPRECATED
      _ImagingSubjectOrientation:
        title: imaging subject orientation
        description: A code specifying qualitatively the spatial relation between
          imaged object and imaging film or detector.
      ALRT:
        title: detected issue
        description: An observation identifying a potential adverse outcome as a result
          of an Act or combination of Acts.
      BATTERY:
        title: battery
        description: 'Definition: An observation that is composed of a set of observations.
          These observations typically have a logical or practical grouping for generally
          accepted clinical or functional purposes, such as observations that are
          run together because of automation. A battery can define required and optional
          component observations and, in some cases, will define complex rules that
          determine whether or not a particular observation is made. BATTERY is a
          constraint on the Observation class in that it is understood to always be
          composed of component observations.'
      CLNTRL:
        title: clinical trial
        description: The set of actions that define an experiment to assess the effectiveness
          and/or safety of a biopharmaceutical product (food, drug, device, etc.).
          In definition mood, this set of actions is often embodied in a clinical
          trial protocol; in event mood, this designates the aggregate act of applying
          the actions to one or more subjects.
      CNOD:
        title: Condition Node
        description: An instance of Observation of a Condition at a point in time
          that includes any Observations or Procedures associated with that Condition
          as well as links to previous instances of Condition Node for the same Condition
        status: DEPRECATED
      COND:
        title: Condition
        description: 'An observable finding or state that persists over time and tends
          to require intervention or management, and, therefore, distinguished from
          an Observation made at a point in time; may exist before an Observation
          of the Condition is made or after interventions to manage the Condition
          are undertaken. Examples: equipment repair status, device recall status,
          a health risk, a financial risk, public health risk, pregnancy, health maintenance,
          chronic illness'
        status: DEPRECATED
      CASE:
        title: public health case
        description: A public health case is an Observation representing a condition
          or event that has a specific significance for public health. Typically it
          involves an instance or instances of a reportable infectious disease or
          other condition. The public health case can include a health-related event
          concerning a single individual or it may refer to multiple health-related
          events that are occurrences of the same disease or condition of interest
          to public health. An outbreak involving multiple individuals may be considered
          as a type of public health case. A public health case definition (Act.moodCode
          = &quot;definition&quot;) includes the description of the clinical, laboratory,
          and epidemiologic indicators associated with a disease or condition of interest
          to public health. There are case definitions for conditions that are reportable,
          as well as for those that are not. There are also case definitions for outbreaks.
          A public health case definition is a construct used by public health for
          the purpose of counting cases, and should not be used as clinical indications
          for treatment. Examples include AIDS, toxic-shock syndrome, and salmonellosis
          and their associated indicators that are used to define a case.
        status: DEPRECATED
      OUTB:
        title: outbreak
        description: An outbreak represents a series of public health cases. The date
          on which an outbreak starts is the earliest date of onset among the cases
          assigned to the outbreak, and its ending date is the last date of onset
          among the cases assigned to the outbreak.
        status: DEPRECATED
      DGIMG:
        title: diagnostic image
        description: Class for holding attributes unique to diagnostic images.
      GEN:
        title: genomic observation
        description: '**Description:**An observation of genomic phenomena.'
      DETPOL:
        title: determinant peptide
        description: '**Description:**A determinant peptide in a polypeptide as described
          by polypeptide.'
      EXP:
        title: expression level
        description: '**Description:**An expression level of genes/proteins or other
          expressed genomic entities.'
      LOC:
        title: locus
        description: '**Description:**The position of a gene (or other significant
          sequence) on the genome.'
      PHN:
        title: phenotype
        description: '**Description:**A genomic phenomenon that is expressed externally
          in the organism.'
      POL:
        title: polypeptide
        description: '**Description:**A polypeptide resulting from the translation
          of a gene.'
      SEQ:
        title: bio sequence
        description: '**Description:**A sequence of biomolecule like the DNA, RNA,
          protein and the like.'
      SEQVAR:
        title: bio sequence variation
        description: '**Description:**A variation in a sequence as described by BioSequence.'
      INVSTG:
        title: investigation
        description: An formalized inquiry into the circumstances surrounding a particular
          unplanned event or potential event for the purposes of identifying possible
          causes and contributing factors for the event. This investigation could
          be conducted at a local institutional level or at the level of a local or
          national government.
      OBSSER:
        title: observation series
        description: Container for Correlated Observation Sequences sharing a common
          frame of reference. All Observations of the same cd must be comparable and
          relative to the common frame of reference. For example, a 3-channel ECG
          device records a 12-lead ECG in 4 steps (3 leads at a time). Each of the
          separate 3-channel recordings would be in their own &quot;OBSCOR&quot;.
          And, all 4 OBSCOR would be contained in one OBSSER because all the times
          are relative to the same origin (beginning of the recording) and all the
          ECG signals were from a fixed set of electrodes.
      OBSCOR:
        title: correlated observation sequences
        description: "Container for Observation Sequences (Observations whose values\
          \ are contained in LIST&lt;&gt;'s) having values correlated with each other.\
          \ Each contained Observation Sequence LIST&lt;&gt; must be the same length.\
          \ Values in the LIST&lt;&gt;'s are correlated based on index. E.g. the values\
          \ in position 2 in all the LIST&lt;&gt;'s are correlated. This is analogous\
          \ to a table where each column is an Observation Sequence with a LIST&lt;&gt;\
          \ of values, and each row in the table is a correlation between the columns.\
          \ For example, a 12-lead ECG would contain 13 sequences: one sequence for\
          \ time, and a sequence for each of the 12 leads."
      POS:
        title: position
        description: An observation denoting the physical location of a person or
          thing based on a reference coordinate system.
      POSACC:
        title: position accuracy
        description: '**Description:**An observation representing the degree to which
          the assignment of the spatial coordinates, based on a matching algorithm
          by a geocoding engine against a reference spatial database, matches true
          or accepted values.'
      POSCOORD:
        title: position coordinate
        description: '**Description:**An observation representing one of a set of
          numerical values used to determine the position of a place. The name of
          the coordinate value is determined by the reference coordinate system.'
      SPCOBS:
        title: specimen observation
        description: An observation on a specimen in a laboratory environment that
          may affect processing, analysis or result interpretation
      VERIF:
        title: Verification
        description: "An act which describes the process whereby a 'verifying party'\
          \ validates either the existence of the Role attested to by some Credential\
          \ or the actual Vetting act and its details."
      PCPR:
        title: care provision
        description: An Act that of taking on whole or partial responsibility for,
          or attention to, safety and well-being of a subject of care.
      ENC:
        title: encounter
        description: An interaction between a patient and healthcare participant(s)
          for the purpose of providing patient service(s) or assessing the health
          status of a patient. For example, outpatient visit to multiple departments,
          home health support (including physical therapy), inpatient hospital stay,
          emergency room visit, field visit (e.g., traffic accident), office visit,
          occupational therapy, telephone call.
      POLICY:
        title: policy
        description: '**Description:**A mandate, regulation, obligation, requirement,
          rule, or expectation unilaterally imposed by one party on:'
      JURISPOL:
        title: jurisdictional policy
        description: '**Description:**A mandate, regulation, obligation, requirement,
          rule, or expectation unilaterally imposed by a jurisdiction on:'
      ORGPOL:
        title: organizational policy
        description: '**Description:**A mandate, obligation, requirement, rule, or
          expectation unilaterally imposed by an organization on:'
      SCOPOL:
        title: scope of practice policy
        description: '**Description:**An ethical or clinical obligation, requirement,
          rule, or expectation imposed or strongly encouraged by organizations that
          oversee particular clinical domains or provider certification which define
          the boundaries within which a provider may practice and which may have legal
          basis or ramifications on:'
      STDPOL:
        title: standard of practice policy
        description: '**Description:**A requirement, rule, or expectation typically
          documented as guidelines, protocols, or formularies imposed or strongly
          encouraged by an organization that oversees or has authority over the practices
          within a domain, and which may have legal basis or ramifications on:'
      PROC:
        title: procedure
        description: An Act whose immediate and primary outcome (post-condition) is
          the alteration of the physical condition of the subject.
      SBADM:
        title: substance administration
        description: The act of introducing or otherwise applying a substance to the
          subject.
      SBEXT:
        title: Substance Extraction
        description: 'Description: The act of removing a substance from the subject.'
      SPECCOLLECT:
        title: Specimen Collection
        description: A procedure for obtaining a specimen from a source entity.
      REG:
        title: registration
        description: Represents the act of maintaining information about the registration
          of its associated registered subject. The subject can be either an Act or
          a Role, and includes subjects such as lab exam definitions, drug protocol
          definitions, prescriptions, persons, patients, practitioners, and equipment.
      REV:
        title: review
        description: The act of examining and evaluating the subject, usually another
          act. For example, &quot;This prescription needs to be reviewed in 2 months.&quot;
      SPCTRT:
        title: specimen treatment
        description: A procedure or treatment performed on a specimen to prepare it
          for analysis
      SPLY:
        title: supply
        description: Supply orders and deliveries are simple Acts that focus on the
          delivered product. The product is associated with the Supply Act via Participation.typeCode=&quot;product&quot;.
          With general Supply Acts, the precise identification of the Material (manufacturer,
          serial numbers, etc.) is important. Most of the detailed information about
          the Supply should be represented using the Material class. If delivery needs
          to be scheduled, tracked, and billed separately, one can associate a Transportation
          Act with the Supply Act. Pharmacy dispense services are represented as Supply
          Acts, associated with a SubstanceAdministration Act. The SubstanceAdministration
          class represents the administration of medication, while dispensing is supply.
      DIET:
        title: diet
        description: 'Diet services are supply services, with some aspects resembling
          Medication services: the detail of the diet is given as a description of
          the Material associated via Participation.typeCode=&quot;product&quot;.
          Medically relevant diet types may be communicated in the Diet.code attribute
          using domain ActDietCode, however, the detail of the food supplied and the
          various combinations of dishes should be communicated as Material instances.'
        status: DEPRECATED
      STORE:
        title: storage
        description: The act of putting something away for safe keeping. The &quot;something&quot;
          may be physical object such as a specimen, or information, such as observations
          regarding a specimen.
      SUBST:
        title: Substitution
        description: 'Definition: Indicates that the subject Act has undergone or
          should undergo substitution of a type indicated by Act.code.'
      TRFR:
        title: transfer
        description: 'Definition: The act of transferring information without the
          intent of imparting understanding about a topic to the subject that is the
          recipient or holder of the transferred information where the participation
          association must be RCV or HLD.'
      TRNS:
        title: transportation
        description: Transportation is the moving of a payload (people or material)
          from a location of origin to a destination location. Thus, any transport
          service has the three target instances of type payload, origin, and destination,
          besides the targets that are generally used for any service (i.e., performer,
          device, etc.)
      XACT:
        title: financial transaction
        description: A sub-class of Act representing any transaction between two accounts
          whose value is measured in monetary terms.
      _ActClassContainer:
        title: ActClassContainer
      ENTRY:
        title: entry
        description: "This context represents the information acquired and recorded\
          \ for an observation, a clinical statement such as a portion of the patient's\
          \ history or an inference or assertion, or an action that might be intended\
          \ or has actually been performed. This class may represent both the actual\
          \ data describing the observation, inference, or action, and optionally\
          \ the details supporting the clinical reasoning process such as a reference\
          \ to an electronic guideline, decision support system, or other knowledge\
          \ reference."
      ORGANIZER:
        title: organizer
        description: Organizer of entries. Navigational. No semantic content. Knowledge
          of the section code is not required to interpret contained observations.
          Represents a heading in a heading structure, or &quot;organizer tree&quot;.
      _ActContainer:
        title: ActClassContainer
      DOCCNTNT: {}
      DOCLIST: {}
      DOCLSTITM: {}
      DOCPARA: {}
      DOCTBL: {}
      LINKHTML: {}
      LOCALATTR: {}
      LOCALMRKP: {}
      ordered: {}
      REFR: {}
      TBLCOL: {}
      TBLCOLGP: {}
      TBLDATA: {}
      TBLHDR: {}
      TBLROW: {}
      tbody: {}
      tfoot: {}
      thead: {}
      unordered: {}
  LOINCActClassClinicalDocument:
    name: LOINCActClassClinicalDocument
    description: "A clinical document is a documentation of clinical observations\
      \ and services, with the following ch\u2026"
    status: ACTIVE
    permissible_values:
      DOCCLIN:
        title: clinical document
        description: 'A clinical document is a documentation of clinical observations
          and services, with the following characteristics:'
      CDALVLONE:
        title: CDA Level One clinical document
        description: A clinical document that conforms to Level One of the HL7 Clinical
          Document Architecture (CDA)
        is_a: DOCCLIN
  LOINCActClassDocument:
    name: LOINCActClassDocument
    description: Specialization of Act to add the characteristics unique to document
      management services.
    status: ACTIVE
    permissible_values:
      DOC:
        title: document
        description: The notion of a document comes particularly from the paper world,
          where it corresponds to the contents recorded on discrete pieces of paper.
          In the electronic world, a document is a kind of composition that bears
          resemblance to their paper world counter-parts. Documents typically are
          meant to be human-readable.
      DOCCLIN:
        title: clinical document
        description: 'A clinical document is a documentation of clinical observations
          and services, with the following characteristics:'
        is_a: DOC
      CDALVLONE:
        title: CDA Level One clinical document
        description: A clinical document that conforms to Level One of the HL7 Clinical
          Document Architecture (CDA)
        is_a: DOCCLIN
  LOINCActClassObservation:
    name: LOINCActClassObservation
    description: "**Description:**An act that is intended to result in new information\
      \ about a subject. The main diff\u2026"
    status: ACTIVE
    permissible_values:
      OBS:
        title: observation
        description: '**Description:**An act that is intended to result in new information
          about a subject. The main difference between Observations and other Acts
          is that Observations have a value attribute. The code attribute of Observation
          and the value attribute of Observation must be considered in combination
          to determine the semantics of the observation.'
      _ActClassROI:
        title: ActClassROI
        description: Regions of Interest (ROI) within a subject Act. Primarily used
          for making secondary observations on a subset of a subject observation.
          The relationship between a ROI and its referenced Act is specified through
          an ActRelationship of type &quot;subject&quot; (SUBJ), which must always
          be present.
        is_a: OBS
      ROIBND:
        title: bounded ROI
        description: A Region of Interest (ROI) specified for a multidimensional observation,
          such as an Observation Series (OBSSER). The ROI is specified using a set
          of observation criteria, each delineating the boundary of the region in
          one of the dimensions in the multidimensional observation. The relationship
          between a ROI and its referenced Act is specified through an ActRelationship
          of type subject (SUBJ), which must always be present. Each of the boundary
          criteria observations is connected with the ROI using ActRelationships of
          type &quot;has component&quot; (COMP). In each boundary criterion, the Act.code
          names the dimension and the Observation.value specifies the range of values
          inside the region. Typically the bounded dimension is continuous, and so
          the Observation.value will be an interval (IVL) data type. The Observation.value
          need not be specified if the respective dimension is only named but not
          constrained. For example, an ROI for the QT interval of a certain beat in
          ECG Lead II would contain 2 boundary criteria, one naming the interval in
          time (constrained), and the other naming the interval in ECG Lead II (only
          named, but not constrained).
        is_a: _ActClassROI
      ROIOVL:
        title: overlay ROI
        description: A Region of Interest (ROI) specified for an image using an overlay
          shape. Typically used to make reference to specific regions in images, e.g.,
          to specify the location of a radiologic finding in an image or to specify
          the site of a physical finding by &quot;circling&quot; a region in a schematic
          picture of a human body. The units of the coordinate values are in pixels.
          The origin is in the upper left hand corner, with positive X values going
          to the right and positive Y values going down. The relationship between
          a ROI and its referenced Act is specified through an ActRelationship of
          type &quot;subject&quot; (SUBJ), which must always be present.
        is_a: _ActClassROI
      _SubjectPhysicalPosition:
        title: subject physical position
        description: The spatial relationship of a subject whether human, other animal,
          or plant, to a frame of reference such as gravity or a collection device.
        is_a: OBS
      _SubjectBodyPosition:
        title: subject body position
        description: Contains codes for defining the observed, physical position of
          a subject, such as during an observation, assessment, collection of a specimen,
          etc. ECG waveforms and vital signs, such as blood pressure, are two examples
          where a general, observed position typically needs to be noted.
        is_a: _SubjectPhysicalPosition
        status: DEPRECATED
      LLD:
        title: left lateral decubitus
        description: Lying on the left side.
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      PRN:
        title: prone
        description: Lying with the front or ventral surface downward; lying face
          down.
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      RLD:
        title: right lateral decubitus
        description: Lying on the right side.
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      SFWL:
        title: "Semi-Fowler's"
        description: A semi-sitting position in bed with the head of the bed elevated
          approximately 45 degrees.
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      SIT:
        title: sitting
        description: Resting the body on the buttocks, typically with upper torso
          erect or semi erect.
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      STN:
        title: standing
        description: "To be stationary, upright, vertical, on one's legs."
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      SUP:
        title: supine
        description: 'Deprecation Comment: This concept has been deprecated because
          it does not describe a type of Act (as it should in the ActClass code system),
          but rather encodes the result or value of an observation. The same code
          has been added to the ObservationValue code system.'
        is_a: _SubjectBodyPosition
        status: DEPRECATED
      RTRD:
        title: reverse trendelenburg
        description: Lying on the back, on an inclined plane, typically about 30-45
          degrees with head raised and feet lowered.
        is_a: SUP
        status: DEPRECATED
      TRD:
        title: trendelenburg
        description: Lying on the back, on an inclined plane, typically about 30-45
          degrees, with head lowered and feet raised.
        is_a: SUP
        status: DEPRECATED
      _ImagingSubjectOrientation:
        title: imaging subject orientation
        description: A code specifying qualitatively the spatial relation between
          imaged object and imaging film or detector.
        is_a: _SubjectPhysicalPosition
      ALRT:
        title: detected issue
        description: An observation identifying a potential adverse outcome as a result
          of an Act or combination of Acts.
        is_a: OBS
      BATTERY:
        title: battery
        description: 'Definition: An observation that is composed of a set of observations.
          These observations typically have a logical or practical grouping for generally
          accepted clinical or functional purposes, such as observations that are
          run together because of automation. A battery can define required and optional
          component observations and, in some cases, will define complex rules that
          determine whether or not a particular observation is made. BATTERY is a
          constraint on the Observation class in that it is understood to always be
          composed of component observations.'
        is_a: OBS
      CLNTRL:
        title: clinical trial
        description: The set of actions that define an experiment to assess the effectiveness
          and/or safety of a biopharmaceutical product (food, drug, device, etc.).
          In definition mood, this set of actions is often embodied in a clinical
          trial protocol; in event mood, this designates the aggregate act of applying
          the actions to one or more subjects.
        is_a: OBS
      CNOD:
        title: Condition Node
        description: An instance of Observation of a Condition at a point in time
          that includes any Observations or Procedures associated with that Condition
          as well as links to previous instances of Condition Node for the same Condition
        is_a: OBS
        status: DEPRECATED
      COND:
        title: Condition
        description: 'An observable finding or state that persists over time and tends
          to require intervention or management, and, therefore, distinguished from
          an Observation made at a point in time; may exist before an Observation
          of the Condition is made or after interventions to manage the Condition
          are undertaken. Examples: equipment repair status, device recall status,
          a health risk, a financial risk, public health risk, pregnancy, health maintenance,
          chronic illness'
        is_a: OBS
        status: DEPRECATED
      CASE:
        title: public health case
        description: A public health case is an Observation representing a condition
          or event that has a specific significance for public health. Typically it
          involves an instance or instances of a reportable infectious disease or
          other condition. The public health case can include a health-related event
          concerning a single individual or it may refer to multiple health-related
          events that are occurrences of the same disease or condition of interest
          to public health. An outbreak involving multiple individuals may be considered
          as a type of public health case. A public health case definition (Act.moodCode
          = &quot;definition&quot;) includes the description of the clinical, laboratory,
          and epidemiologic indicators associated with a disease or condition of interest
          to public health. There are case definitions for conditions that are reportable,
          as well as for those that are not. There are also case definitions for outbreaks.
          A public health case definition is a construct used by public health for
          the purpose of counting cases, and should not be used as clinical indications
          for treatment. Examples include AIDS, toxic-shock syndrome, and salmonellosis
          and their associated indicators that are used to define a case.
        is_a: COND
        status: DEPRECATED
      OUTB:
        title: outbreak
        description: An outbreak represents a series of public health cases. The date
          on which an outbreak starts is the earliest date of onset among the cases
          assigned to the outbreak, and its ending date is the last date of onset
          among the cases assigned to the outbreak.
        is_a: CASE
        status: DEPRECATED
      DGIMG:
        title: diagnostic image
        description: Class for holding attributes unique to diagnostic images.
        is_a: OBS
      GEN:
        title: genomic observation
        description: '**Description:**An observation of genomic phenomena.'
        is_a: OBS
      DETPOL:
        title: determinant peptide
        description: '**Description:**A determinant peptide in a polypeptide as described
          by polypeptide.'
        is_a: GEN
      EXP:
        title: expression level
        description: '**Description:**An expression level of genes/proteins or other
          expressed genomic entities.'
        is_a: GEN
      LOC:
        title: locus
        description: '**Description:**The position of a gene (or other significant
          sequence) on the genome.'
        is_a: GEN
      PHN:
        title: phenotype
        description: '**Description:**A genomic phenomenon that is expressed externally
          in the organism.'
        is_a: GEN
      POL:
        title: polypeptide
        description: '**Description:**A polypeptide resulting from the translation
          of a gene.'
        is_a: GEN
      SEQ:
        title: bio sequence
        description: '**Description:**A sequence of biomolecule like the DNA, RNA,
          protein and the like.'
        is_a: GEN
      SEQVAR:
        title: bio sequence variation
        description: '**Description:**A variation in a sequence as described by BioSequence.'
        is_a: GEN
      INVSTG:
        title: investigation
        description: An formalized inquiry into the circumstances surrounding a particular
          unplanned event or potential event for the purposes of identifying possible
          causes and contributing factors for the event. This investigation could
          be conducted at a local institutional level or at the level of a local or
          national government.
        is_a: OBS
      OBSSER:
        title: observation series
        description: Container for Correlated Observation Sequences sharing a common
          frame of reference. All Observations of the same cd must be comparable and
          relative to the common frame of reference. For example, a 3-channel ECG
          device records a 12-lead ECG in 4 steps (3 leads at a time). Each of the
          separate 3-channel recordings would be in their own &quot;OBSCOR&quot;.
          And, all 4 OBSCOR would be contained in one OBSSER because all the times
          are relative to the same origin (beginning of the recording) and all the
          ECG signals were from a fixed set of electrodes.
        is_a: OBS
      OBSCOR:
        title: correlated observation sequences
        description: "Container for Observation Sequences (Observations whose values\
          \ are contained in LIST&lt;&gt;'s) having values correlated with each other.\
          \ Each contained Observation Sequence LIST&lt;&gt; must be the same length.\
          \ Values in the LIST&lt;&gt;'s are correlated based on index. E.g. the values\
          \ in position 2 in all the LIST&lt;&gt;'s are correlated. This is analogous\
          \ to a table where each column is an Observation Sequence with a LIST&lt;&gt;\
          \ of values, and each row in the table is a correlation between the columns.\
          \ For example, a 12-lead ECG would contain 13 sequences: one sequence for\
          \ time, and a sequence for each of the 12 leads."
        is_a: OBSSER
      POS:
        title: position
        description: An observation denoting the physical location of a person or
          thing based on a reference coordinate system.
        is_a: OBS
      POSACC:
        title: position accuracy
        description: '**Description:**An observation representing the degree to which
          the assignment of the spatial coordinates, based on a matching algorithm
          by a geocoding engine against a reference spatial database, matches true
          or accepted values.'
        is_a: POS
      POSCOORD:
        title: position coordinate
        description: '**Description:**An observation representing one of a set of
          numerical values used to determine the position of a place. The name of
          the coordinate value is determined by the reference coordinate system.'
        is_a: POS
      SPCOBS:
        title: specimen observation
        description: An observation on a specimen in a laboratory environment that
          may affect processing, analysis or result interpretation
        is_a: OBS
      VERIF:
        title: Verification
        description: "An act which describes the process whereby a 'verifying party'\
          \ validates either the existence of the Role attested to by some Credential\
          \ or the actual Vetting act and its details."
        is_a: OBS
  LOINCActClassRoot:
    name: LOINCActClassRoot
    description: "A record of something that is being done, has been done, can be\
      \ done, or is intended or requested t\u2026"
    status: ACTIVE
    permissible_values:
      ACT:
        title: act
        description: A record of something that is being done, has been done, can
          be done, or is intended or requested to be done.
      _ActClassRecordOrganizer:
        title: record organizer
        description: Used to group a set of acts sharing a common context. Organizer
          structures can nest within other context structures - such as where a document
          is contained within a folder, or a folder is contained within an EHR extract.
      COMPOSITION:
        title: composition
        description: A context representing a grouped commitment of information to
          the EHR. It is considered the unit of modification of the record, the unit
          of transmission in record extracts, and the unit of attestation by authorizing
          clinicians.
      DOC:
        title: document
        description: The notion of a document comes particularly from the paper world,
          where it corresponds to the contents recorded on discrete pieces of paper.
          In the electronic world, a document is a kind of composition that bears
          resemblance to their paper world counter-parts. Documents typically are
          meant to be human-readable.
      DOCCLIN:
        title: clinical document
        description: 'A clinical document is a documentation of clinical observations
          and services, with the following characteristics:'
      CDALVLONE:
        title: CDA Level One clinical document
        description: A clinical document that conforms to Level One of the HL7 Clinical
          Document Architecture (CDA)
      CONTAINER:
        title: record container
        description: 'Description: Container of clinical statements. Navigational.
          No semantic content. Knowledge of the section code is not required to interpret
          contained observations. Represents a heading in a heading structure, or
          &quot;container tree&quot;.'
      CATEGORY:
        title: category
        description: A group of entries within a composition or topic that have a
          common characteristic - for example, Examination, Diagnosis, Management
          OR Subjective, Objective, Analysis, Plan.
      DOCBODY:
        title: document body
        description: A context that distinguishes the body of a document from the
          document header. This is seen, for instance, in HTML documents, which have
          discrete &lt;head&gt; and &lt;body&gt; elements.
      DOCSECT:
        title: document section
        description: A context that subdivides the body of a document. Document sections
          are typically used for human navigation, to give a reader a clue as to the
          expected content. Document sections are used to organize and provide consistency
          to the contents of a document body. Document sections can contain document
          sections and can contain entries.
      TOPIC:
        title: topic
        description: A group of entries within a composition that are related to a
          common clinical theme - such as a specific disorder or problem, prevention,
          screening and provision of contraceptive services.
      EXTRACT:
        title: extract
        description: This context represents the part of a patient record conveyed
          in a single communication. It is drawn from a providing system for the purposes
          of communication to a requesting process (which might be another repository,
          a client application or a middleware service such as an electronic guideline
          engine), and supporting the faithful inclusion of the communicated data
          in the receiving system.
      EHR:
        title: electronic health record
        description: A context that comprises all compositions. The EHR is an extract
          that includes the entire chart.
      FOLDER:
        title: folder
        description: 'A context representing the high-level organization of an extract
          e.g. to group parts of the record by episode, care team, clinical specialty,
          clinical condition, or source application. Internationally, this kind of
          organizing structure is used variably: in some centers and systems the folder
          is treated as an informal compartmentalization of the overall health record;
          in others it might represent a significant legal portion of the EHR relating
          to the originating enterprise or team.'
      GROUPER:
        title: grouper
        description: 'Definition: An ACT that organizes a set of component acts into
          a semantic grouping that share a particular context such as timeframe, patient,
          etc.'
      CLUSTER:
        title: Cluster
        description: '**Description:**An ACT that organizes a set of component acts
          into a semantic grouping that have a shared subject. The subject may be
          either a subject participation (SBJ), subject act relationship (SUBJ), or
          child participation/act relationship types.'
      ACCM:
        title: accommodation
        description: An accommodation is a service provided for a Person or other
          LivingSubject in which a place is provided for the subject to reside for
          a period of time. Commonly used to track the provision of ward, private
          and semi-private accommodations for a patient.
      ACCT:
        title: account
        description: A financial account established to track the net result of financial
          acts.
      ACSN:
        title: accession
        description: A unit of work, a grouper of work items as defined by the system
          performing that work. Typically some laboratory order fulfillers communicate
          references to accessions in their communications regarding laboratory orders.
          Often one or more specimens are related to an accession such that in some
          environments the accession number is taken as an identifier for a specimen
          (group).
      ADJUD:
        title: financial adjudication
        description: A transformation process where a requested invoice is transformed
          into an agreed invoice. Represents the adjudication processing of an invoice
          (claim). Adjudication results can be adjudicated as submitted, with adjustments
          or refused.
      CACT:
        title: control act
        description: An act representing a system action such as the change of state
          of another act or the initiation of a query. All control acts represent
          trigger events in the HL7 context. ControlActs may occur in different moods.
      ACTN:
        title: action
        description: Sender asks addressee to do something depending on the focal
          Act of the payload. An example is &quot;fulfill this order&quot;. Addressee
          has responsibilities to either reject the message or to act on it in an
          appropriate way (specified by the specific receiver responsibilities for
          the interaction).
      INFO:
        title: information
        description: "Sender sends payload to addressee as information. Addressee\
          \ does not have responsibilities beyond serving addressee's own interest\
          \ (i.e., read and memorize if you see fit). This is equivalent to an FYI\
          \ on a memo."
      STC:
        title: state transition control
        description: 'Description: Sender transmits a status change pertaining to
          the focal act of the payload. This status of the focal act is the final
          state of the state transition. This can be either a request or an event,
          according to the mood of the control act.'
      CNTRCT:
        title: contract
        description: An agreement of obligation between two or more parties that is
          subject to contractual law and enforcement.
      FCNTRCT:
        title: financial contract
        description: A contract whose value is measured in monetary terms.
      COV:
        title: coverage
        description: 'When used in the EVN mood, this concept means with respect to
          a covered party:'
      CONC:
        title: concern
        description: 'Definition: A worry that tends to persist over time and has
          as its subject a state or process. The subject of the worry has the potential
          to require intervention or management.'
      HCASE:
        title: public health case
        description: A public health case is a Concern about an observation or event
          that has a specific significance for public health. The creation of a PublicHealthCase
          initiates the tracking of the object of concern. The decision to track is
          related to but somewhat independent of the underlying event or observation.
      OUTBR:
        title: outbreak
        description: An Outbreak is a concern resulting from a series of public health
          cases.
      CONS:
        title: consent
        description: The Consent class represents informed consents and all similar
          medico-legal transactions between the patient (or his legal guardian) and
          the provider. Examples are informed consent for surgical procedures, informed
          consent for clinical trials, advanced beneficiary notice, against medical
          advice decline from service, release of information agreement, etc.
      CONTREG:
        title: container registration
        description: An Act where a container is registered either via an automated
          sensor, such as a barcode reader, or by manual receipt
      CTTEVENT:
        title: clinical trial timepoint event
        description: An identified point during a clinical trial at which one or more
          actions are scheduled to be performed (definition mood), or are actually
          performed (event mood). The actions may or may not involve an encounter
          between the subject and a healthcare professional.
      DISPACT:
        title: disciplinary action
        description: An action taken with respect to a subject Entity by a regulatory
          or authoritative body with supervisory capacity over that entity. The action
          is taken in response to behavior by the subject Entity that body finds to
          be undesirable.
      EXPOS:
        title: exposure
        description: An interaction between entities that provides opportunity for
          transmission of a physical, chemical, or biological agent from an exposure
          source entity to an exposure target entity.
      AEXPOS:
        title: acquisition exposure
        description: 'Description:'
      TEXPOS:
        title: transmission exposure
        description: 'Description:'
      INC:
        title: incident
        description: An event that occurred outside of the control of one or more
          of the parties involved. Includes the concept of an accident.
      INFRM:
        title: inform
        description: The act of transmitting information and understanding about a
          topic to a subject where the participation association must be SBJ.
      INVE:
        title: invoice element
        description: Represents concepts related to invoice processing in health care
      LIST:
        title: working list
        description: Working list collects a dynamic list of individual instances
          of Act via ActRelationship which reflects the need of an individual worker,
          team of workers, or an organization to manage lists of acts for many different
          clinical and administrative reasons. Examples of working lists include problem
          lists, goal lists, allergy lists, and to-do lists.
      MPROT:
        title: monitoring program
        description: An officially or unofficially instituted program to track acts
          of a particular type or categorization.
      OBS:
        title: observation
        description: '**Description:**An act that is intended to result in new information
          about a subject. The main difference between Observations and other Acts
          is that Observations have a value attribute. The code attribute of Observation
          and the value attribute of Observation must be considered in combination
