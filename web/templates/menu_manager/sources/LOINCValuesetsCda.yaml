  LOINCXActclassdocumententryact:
    name: LOINCXActclassdocumententryact
    description: "The set of Act class codes allowed for the ACT class clone in the\
      \ CDA Clinical Statement model. The\u2026"
    status: ACTIVE
    permissible_values:
      ACCM:
        title: accommodation
        description: An accommodation is a service provided for a Person or other
          LivingSubject in which a place is provided for the subject to reside for
          a period of time. Commonly used to track the provision of ward, private
          and semi-private accommodations for a patient.
      ACSN:
        title: accession
        description: A unit of work, a grouper of work items as defined by the system
          performing that work. Typically some laboratory order fulfillers communicate
          references to accessions in their communications regarding laboratory orders.
          Often one or more specimens are related to an accession such that in some
          environments the accession number is taken as an identifier for a specimen
          (group).
      ACT:
        title: act
        description: A record of something that is being done, has been done, can
          be done, or is intended or requested to be done.
      AEXPOS:
        title: acquisition exposure
        description: 'Description:'
      CONS:
        title: consent
        description: The Consent class represents informed consents and all similar
          medico-legal transactions between the patient (or his legal guardian) and
          the provider. Examples are informed consent for surgical procedures, informed
          consent for clinical trials, advanced beneficiary notice, against medical
          advice decline from service, release of information agreement, etc.
      CONTREG:
        title: container registration
        description: An Act where a container is registered either via an automated
          sensor, such as a barcode reader, or by manual receipt
      CTTEVENT:
        title: clinical trial timepoint event
        description: An identified point during a clinical trial at which one or more
          actions are scheduled to be performed (definition mood), or are actually
          performed (event mood). The actions may or may not involve an encounter
          between the subject and a healthcare professional.
      DISPACT:
        title: disciplinary action
        description: An action taken with respect to a subject Entity by a regulatory
          or authoritative body with supervisory capacity over that entity. The action
          is taken in response to behavior by the subject Entity that body finds to
          be undesirable.
      EXPOS:
        title: exposure
        description: An interaction between entities that provides opportunity for
          transmission of a physical, chemical, or biological agent from an exposure
          source entity to an exposure target entity.
      INC:
        title: incident
        description: An event that occurred outside of the control of one or more
          of the parties involved. Includes the concept of an accident.
      INFRM:
        title: inform
        description: The act of transmitting information and understanding about a
          topic to a subject where the participation association must be SBJ.
      LIST:
        title: working list
        description: Working list collects a dynamic list of individual instances
          of Act via ActRelationship which reflects the need of an individual worker,
          team of workers, or an organization to manage lists of acts for many different
          clinical and administrative reasons. Examples of working lists include problem
          lists, goal lists, allergy lists, and to-do lists.
      MPROT:
        title: monitoring program
        description: An officially or unofficially instituted program to track acts
          of a particular type or categorization.
      PCPR:
        title: care provision
        description: An Act that of taking on whole or partial responsibility for,
          or attention to, safety and well-being of a subject of care.
      REG:
        title: registration
        description: Represents the act of maintaining information about the registration
          of its associated registered subject. The subject can be either an Act or
          a Role, and includes subjects such as lab exam definitions, drug protocol
          definitions, prescriptions, persons, patients, practitioners, and equipment.
      REV:
        title: review
        description: The act of examining and evaluating the subject, usually another
          act. For example, &quot;This prescription needs to be reviewed in 2 months.&quot;
      SPCTRT:
        title: specimen treatment
        description: A procedure or treatment performed on a specimen to prepare it
          for analysis
      STORE:
        title: storage
        description: The act of putting something away for safe keeping. The &quot;something&quot;
          may be physical object such as a specimen, or information, such as observations
          regarding a specimen.
      TEXPOS:
        title: transmission exposure
        description: 'Description:'
      TRFR:
        title: transfer
        description: 'Definition: The act of transferring information without the
          intent of imparting understanding about a topic to the subject that is the
          recipient or holder of the transferred information where the participation
          association must be RCV or HLD.'
      TRNS:
        title: transportation
        description: Transportation is the moving of a payload (people or material)
          from a location of origin to a destination location. Thus, any transport
          service has the three target instances of type payload, origin, and destination,
          besides the targets that are generally used for any service (i.e., performer,
          device, etc.)
  LOINCXActclassdocumententryorganizer:
    name: LOINCXActclassdocumententryorganizer
    description: No description
    status: ACTIVE
    permissible_values:
      BATTERY:
        title: battery
        description: 'Definition: An observation that is composed of a set of observations.
          These observations typically have a logical or practical grouping for generally
          accepted clinical or functional purposes, such as observations that are
          run together because of automation. A battery can define required and optional
          component observations and, in some cases, will define complex rules that
          determine whether or not a particular observation is made. BATTERY is a
          constraint on the Observation class in that it is understood to always be
          composed of component observations.'
      CLUSTER:
        title: Cluster
        description: '**Description:**An ACT that organizes a set of component acts
          into a semantic grouping that have a shared subject. The subject may be
          either a subject participation (SBJ), subject act relationship (SUBJ), or
          child participation/act relationship types.'
  LOINCXActmooddocumentobservation:
    name: LOINCXActmooddocumentobservation
    description: Used to enumerate the moods that an observation can take within the
      body of a clinical document.
    status: ACTIVE
    permissible_values:
      APT:
        title: appointment
        description: 'Definition: An act that has been scheduled to be performed at
          a specific place and time.'
      ARQ:
        title: appointment request
        description: 'Definition: A request act that is specialized for the appointment
          scheduling request/fulfillment cycle. An appointment request is fulfilled
          only and completely by an appointment (APT), i.e., all that the appointment
          request intends is to create an appointment (the actual act may well not
          happen if that is the professional decision during the appointment).'
      DEF:
        title: definition
        description: 'Definition: A definition of a kind of act that can occur .'
      EVN:
        title: event (occurrence)
        description: 'Definition: An act that actually happens (may be an ongoing
          act or a documentation of a past act).'
      GOL:
        title: Goal
        description: 'Definition: An expectation that is considered to be desirable
          to occur in the future'
      INT:
        title: intent
        description: 'Definition: An intention or plan for an act.'
      PRMS:
        title: promise
        description: 'Definition: A commitment to perform an act (may be either solicited
          or unsolicited). The committer becomes responsible to the other party for
          executing the act, and, as a consequence, the other party may rely on the
          first party to perform or cause to perform the act.'
      PRP:
        title: proposal
        description: 'Definition: A suggestion that an act might be performed. Not
          an explicit request, and professional responsibility may or may not be present.'
      RQO:
        title: request
        description: 'Definition: A request act that is specialized for an event request/fulfillment
          cycle.'
      RSK:
        title: risk
        description: '**Definition:**An act that may occur in the future and which
          is regarded as undesirable'
  LOINCXActrelationshipdocument:
    name: LOINCXActrelationshipdocument
    description: Used to enumerate the relationships between two clinical documents
      for document management.
    status: ACTIVE
    permissible_values:
      APND:
        title: is appendage
        description: An addendum (source) to an existing service object (target),
          containing supplemental information. The addendum is itself an original
          service object linked to the supplemented service object. The supplemented
          service object remains in place and its content and status are unaltered.
      RPLC:
        title: replaces
        description: A replacement source act replaces an existing target act. The
          state of the target act being replaced becomes obselete, but the act is
          typically still retained in the system for historical reference. The source
          and target must be of the same type.
      XFRM:
        title: transformation
        description: Used when the target Act is a transformation of the source Act.
          (For instance, used to show that a CDA document is a transformation of a
          DICOM SR document.)
  LOINCXActrelationshipentry:
    name: LOINCXActrelationshipentry
    description: Used to enumerate the relationships between a CDA section and its
      contained entries.
    status: ACTIVE
    permissible_values:
      COMP:
        title: has component
        description: The target act is a component of the source act, with no semantics
          regarding composition or aggregation implied.
      DRIV:
        title: is derived from
        description: Associates a derived Act with its input parameters. E.G., an
          anion-gap observation can be associated as being derived from given sodium-,
          (potassium-,), chloride-, and bicarbonate-observations. The narrative content
          (Act.text) of a source act is wholly machine-derived from the collection
          of target acts.
  LOINCXActrelationshipentryrelationship:
    name: LOINCXActrelationshipentryrelationship
    description: Used to enumerate the relationships between two CDA entries.
    status: ACTIVE
    permissible_values:
      CAUS:
        title: is etiology for
        description: 'Description: An assertion that an act was the cause of another
          act.This is stronger and more specific than the support link. The source
          (cause) is typically an observation, but may be any act, while the target
          may be any act.'
      COMP:
        title: has component
        description: The target act is a component of the source act, with no semantics
          regarding composition or aggregation implied.
      GEVL:
        title: evaluates (goal)
        description: A goal-evaluation links an observation (intent or actual) to
          a goal to indicate that the observation evaluates the goal. Given the goal
          and the observation, a &quot;goal distance&quot; (e.g., goal to observation)
          can be &quot;calculated&quot; and need not be sent explicitly.
      MFST:
        title: is manifestation of
        description: An assertion that a new observation may be the manifestation
          of another existing observation or action. This assumption is attributed
          to the same actor who asserts the manifestation. This is stronger and more
          specific than an inverted support link. For example, an agitated appearance
          can be asserted to be the manifestation (effect) of a known hyperthyroxia.
          This expresses that one might not have realized a symptom if it would not
          be a common manifestation of a known condition. The target (cause) may be
          any service, while the source (manifestation) must be an observation.
      REFR:
        title: refers to
        description: A relationship in which the target act is referred to by the
          source act. This permits a simple reference relationship that distinguishes
          between the referent and the referee.
      RSON:
        title: has reason
        description: 'Description: The reason or rationale for a service. A reason
          link is weaker than a trigger, it only suggests that some service may be
          or might have been a reason for some action, but not that this reason requires/required
          the action to be taken. Also, as opposed to the trigger, there is no strong
          timely relation between the reason and the action. As well as providing
          various types of information about the rationale for a service, the RSON
          act relationship is routinely used between a SBADM act and an OBS act to
          describe the indication for use of a medication. Child concepts may be used
          to describe types of indication.'
      SAS:
        title: starts after start of
        description: The source Act starts after the start of the target Act (i.e.
          if we say &quot;ActOne SAS ActTwo&quot;, it means that ActOne starts after
          the start of ActTwo, therefore ActOne is the source and ActTwo is the target).
      SPRT:
        title: has support
        description: Used to indicate that an existing service is suggesting evidence
          for a new observation. The assumption of support is attributed to the same
          actor who asserts the observation. Source must be an observation, target
          may be any service (e.g., to indicate a status post).
      SUBJ:
        title: has subject
        description: Relates an Act to its subject Act that the first Act is primarily
          concerned with.
      XCRPT:
        title: Excerpts
        description: The source is an excerpt from the target.
  LOINCXActrelationshipexternalreference:
    name: LOINCXActrelationshipexternalreference
    description: Used to enumerate the relationships between a CDA entry and an externally
      referenced act.
    status: ACTIVE
    permissible_values:
      ELNK:
        title: episodeLink
        description: Expresses an association that links two instances of the same
          act over time, indicating that the instance are part of the same episode,
          e.g. linking two condition nodes for episode of illness; linking two encounters
          for episode of encounter.
      REFR:
        title: refers to
        description: A relationship in which the target act is referred to by the
          source act. This permits a simple reference relationship that distinguishes
          between the referent and the referee.
      RPLC:
        title: replaces
        description: A replacement source act replaces an existing target act. The
          state of the target act being replaced becomes obselete, but the act is
          typically still retained in the system for historical reference. The source
          and target must be of the same type.
      SPRT:
        title: has support
        description: Used to indicate that an existing service is suggesting evidence
          for a new observation. The assumption of support is attributed to the same
          actor who asserts the observation. Source must be an observation, target
          may be any service (e.g., to indicate a status post).
      SUBJ:
        title: has subject
        description: Relates an Act to its subject Act that the first Act is primarily
          concerned with.
      XCRPT:
        title: Excerpts
        description: The source is an excerpt from the target.
  LOINCXBasicconfidentialitykind:
    name: LOINCXBasicconfidentialitykind
    description: "Description:\n Used to enumerate the typical confidentiality constraints\
      \ placed upon a clinical d\u2026"
    status: ACTIVE
    permissible_values:
      N:
        title: normal
        description: "Privacy metadata indicating the level of protection required\
          \ to safeguard personal and healthcare information, which if disclosed without\
          \ authorization, would present a considerable risk of harm to an individual's\
          \ reputation and sense of privacy."
      R:
        title: restricted
        description: "Privacy metadata indicating the level of protection required\
          \ to safeguard potentially stigmatizing information, which if disclosed\
          \ without authorization, would present a high risk of harm to an individual's\
          \ reputation and sense of privacy."
      V:
        title: very restricted
        description: "Privacy metadata indicating the level of protection required\
          \ under atypical cicumstances to safeguard potentially damaging or harmful\
          \ information, which if disclosed without authorization, would (1) present\
          \ an extremely high risk of harm to an individual's reputation, sense of\
          \ privacy, and possibly safety; or (2) impact an individual's or organization's\
          \ legal matters."
  LOINCXDocumentactmood:
    name: LOINCXDocumentactmood
    description: Used to enumerate the moods that an act can take within the body
      of a clinical document.
    status: ACTIVE
    permissible_values:
      APT:
        title: appointment
        description: 'Definition: An act that has been scheduled to be performed at
          a specific place and time.'
      ARQ:
        title: appointment request
        description: 'Definition: A request act that is specialized for the appointment
          scheduling request/fulfillment cycle. An appointment request is fulfilled
          only and completely by an appointment (APT), i.e., all that the appointment
          request intends is to create an appointment (the actual act may well not
          happen if that is the professional decision during the appointment).'
      DEF:
        title: definition
        description: 'Definition: A definition of a kind of act that can occur .'
      EVN:
        title: event (occurrence)
        description: 'Definition: An act that actually happens (may be an ongoing
          act or a documentation of a past act).'
      INT:
        title: intent
        description: 'Definition: An intention or plan for an act.'
      PRMS:
        title: promise
        description: 'Definition: A commitment to perform an act (may be either solicited
          or unsolicited). The committer becomes responsible to the other party for
          executing the act, and, as a consequence, the other party may rely on the
          first party to perform or cause to perform the act.'
      PRP:
        title: proposal
        description: 'Definition: A suggestion that an act might be performed. Not
          an explicit request, and professional responsibility may or may not be present.'
      RQO:
        title: request
        description: 'Definition: A request act that is specialized for an event request/fulfillment
          cycle.'
      RSK:
        title: risk
        description: '**Definition:**An act that may occur in the future and which
          is regarded as undesirable'
