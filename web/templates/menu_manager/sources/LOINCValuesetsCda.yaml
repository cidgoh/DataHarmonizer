  LOINCHumanLanguage:
    name: LOINCHumanLanguage
    description: Codes for the representation of the names of human languages.
    status: RETIRED
  LOINCManufacturerModelNameExample:
    name: LOINCManufacturerModelNameExample
    description: "An example value set representing the ManufacturerModelName concept\
      \ domain used  to convey a coded \u2026"
    status: ACTIVE
    permissible_values:
      examplemodel1:
        title: example model name 1
        description: an example coded name for a device
      examplemodel2:
        title: example model name 2
        description: an example coded name for a device
  LOINCParticipationPhysicalPerformer:
    name: LOINCParticipationPhysicalPerformer
    description: "A person who actually and principally carries out the action. Need\
      \ not be the principal responsible\u2026"
    status: ACTIVE
    permissible_values:
      PRF:
        title: performer
        description: 'Definition: A person, non-person living subject, organization
          or device that who actually and principally carries out the action. Device
          should only be assigned as a performer in circumstances where the device
          is performing independent of human intervention. Need not be the principal
          responsible actor.'
      DIST:
        title: distributor
        description: Distributes material used in or generated during the act.
        is_a: PRF
      PPRF:
        title: primary performer
        description: The principal or primary performer of the act.
        is_a: PRF
      SPRF:
        title: secondary performer
        description: 'A person assisting in an act through his substantial presence
          and involvement This includes: assistants, technicians, associates, or whatever
          the job titles may be.'
        is_a: PRF
  LOINCParticipationSignature:
    name: LOINCParticipationSignature
    description: "A code specifying whether and how the participant has attested his\
      \ participation through a signatur\u2026"
    status: ACTIVE
    permissible_values:
      I:
        title: intended
        description: The particpant intends to provide a signature.
      S:
        title: signed
        description: Signature has been affixed, either written on file, or electronic
          (incl. digital) signature in Participation.signatureText.
      X:
        title: required
        description: A signature for the service is required of this actor.
  LOINCParticipationTargetLocation:
    name: LOINCParticipationTargetLocation
    description: "The facility where the service is done. May be a static building\
      \ (or room therein) or a moving loca\u2026"
    status: ACTIVE
    permissible_values:
      LOC:
        title: location
        description: The facility where the service is done. May be a static building
          (or room therein) or a moving location (e.g., ambulance, helicopter, aircraft,
          train, truck, ship, etc.)
      DST:
        title: destination
        description: The destination for services. May be a static building (or room
          therein) or a movable facility (e.g., ship).
        is_a: LOC
      ELOC:
        title: entry location
        description: A location where data about an Act was entered.
        is_a: LOC
      ORG:
        title: origin
        description: The location of origin for services. May be a static building
          (or room therein) or a movable facility (e.g., ship).
        is_a: LOC
      RML:
        title: remote
        description: Some services take place at multiple concurrent locations (e.g.,
          telemedicine, telephone consultation). The location where the principal
          performing actor is located is taken as the primary location (LOC) while
          the other location(s) are considered &quot;remote.&quot;
        is_a: LOC
      VIA:
        title: via
        description: For services, an intermediate location that specifies a path
          between origin an destination.
        is_a: LOC
  LOINCParticipationTargetSubject:
    name: LOINCParticipationTargetSubject
    description: "The principle target that the service acts on. E.g. the patient\
      \ in physical examination, a specimen\u2026"
    status: ACTIVE
    permissible_values:
      SBJ:
        title: subject
        description: The principle target on which the action happens.
      SPC:
        title: specimen
        description: The subject of non-clinical (e.g. laboratory) observation services
          is a specimen.
        is_a: SBJ
  LOINCParticipationType:
    name: LOINCParticipationType
    description: "A code specifying the meaning and purpose of every Participation\
      \ instance. Each of its values impli\u2026"
    status: ACTIVE
    permissible_values:
      PART:
        title: Participation
        description: Indicates that the target of the participation is involved in
          some manner in the act, but does not qualify how.
      _ParticipationAncillary:
        title: ParticipationAncillary
        description: Participations related, but not primary to an act. The Referring,
          Admitting, and Discharging practitioners must be the same person as those
          authoring the ControlAct event for their respective trigger events.
        is_a: PART
      ADM:
        title: admitter
        description: The practitioner who is responsible for admitting a patient to
          a patient encounter.
        is_a: _ParticipationAncillary
      ATND:
        title: attender
        description: "The practitioner that has responsibility for overseeing a patient's\
          \ care during a patient encounter."
        is_a: _ParticipationAncillary
      CALLBCK:
        title: callback contact
        description: A person or organization who should be contacted for follow-up
          questions about the act in place of the author.
        is_a: _ParticipationAncillary
      CON:
        title: consultant
        description: An advisor participating in the service by performing evaluations
          and making recommendations.
        is_a: _ParticipationAncillary
      DIS:
        title: discharger
        description: The practitioner who is responsible for the discharge of a patient
          from a patient encounter.
        is_a: _ParticipationAncillary
      ESC:
        title: escort
        description: Only with Transportation services. A person who escorts the patient.
        is_a: _ParticipationAncillary
      REF:
        title: referrer
        description: A person having referred the subject of the service to the performer
          (referring physician). Typically, a referring physician will receive a report.
        is_a: _ParticipationAncillary
      _ParticipationInformationGenerator:
        title: ParticipationInformationGenerator
        description: Parties that may or should contribute or have contributed information
          to the Act. Such information includes information leading to the decision
          to perform the Act and how to perform the Act (e.g., consultant), information
          that the Act itself seeks to reveal (e.g., informant of clinical history),
          or information about what Act was performed (e.g., informant witness).
        is_a: PART
      AUT:
        title: author (originator)
        description: 'Definition: A party that originates the Act and therefore has
          responsibility for the information given in the Act and ownership of this
          Act.'
        is_a: _ParticipationInformationGenerator
      INF:
        title: informant
        description: "A source of reported information (e.g., a next of kin who answers\
          \ questions about the patient's history). For history questions, the patient\
          \ is logically an informant, yet the informant of history questions is implicitly\
          \ the subject."
        is_a: _ParticipationInformationGenerator
      TRANS:
        title: Transcriber
        description: An entity entering the data into the originating system. The
          data entry entity is collected optionally for internal quality control purposes.
          This includes the transcriptionist for dictated text transcribed into electronic
          form.
        is_a: _ParticipationInformationGenerator
      ENT:
        title: data entry person
        description: A person entering the data into the originating system. The data
          entry person is collected optionally for internal quality control purposes.
          This includes the transcriptionist for dictated text.
        is_a: TRANS
      WIT:
        title: witness
        description: Only with service events. A person witnessing the action happening
          without doing anything. A witness is not necessarily aware, much less approves
          of anything stated in the service event. Example for a witness is students
          watching an operation or an advanced directive witness.
        is_a: _ParticipationInformationGenerator
      NOTARY:
        title: notary
        description: The entity (person or organization) who legally attests that
          the information present in the Act is a true replica of an original.
        is_a: _ParticipationInformationGenerator
      CST:
        title: custodian
        description: An entity (person, organization or device) that is in charge
          of maintaining the information of this act (e.g., who maintains the report
          or the master service catalog item, etc.).
        is_a: PART
      DIR:
        title: direct target
        description: Target participant that is substantially present in the act and
          which is directly involved in the action (includes consumed material, devices,
          etc.).
        is_a: PART
      ALY:
        title: analyte
        description: The target of an Observation action. Links an observation to
          a Role whose player is the substance or most specific component entity (material,
          micro-organism, etc.) being measured within the subject.
        is_a: DIR
      BBY:
        title: baby
        description: In an obstetric service, the baby.
        is_a: DIR
      CAT:
        title: catalyst
        description: The catalyst of a chemical reaction, such as an enzyme or a platinum
          surface. In biochemical reactions, connects the enzyme with the molecular
          interaction
        is_a: DIR
      CSM:
        title: consumable
        description: Participant material that is taken up, diminished, altered, or
          disappears in the act.
        is_a: DIR
      TPA:
        title: therapeutic agent
        description: Something incorporated in the subject of a therapy service to
          achieve a physiologic effect (e.g., heal, relieve, provoke a condition,
          etc.) on the subject. In an administration service the therapeutic agent
          is a consumable, in a preparation or dispense service, it is a product.
          Thus, consumable or product must be specified in accordance with the kind
          of service.
        is_a: CSM
      DEV:
        title: device
        description: Participant used in performing the act without being substantially
          affected by the act (i.e. durable or inert with respect to that particular
          service).
        is_a: DIR
      NRD:
        title: non-reuseable device
        description: A device that changes ownership due to the service, e.g., a pacemaker,
          a prosthesis, an insulin injection equipment (pen), etc. Such material may
          need to be restocked after he service.
        is_a: DEV
      RDV:
        title: reusable device
        description: A device that does not change ownership due to the service, i.e.,
          a surgical instrument or tool or an endoscope. The distinction between reuseable
          and non-reuseable must be made in order to know whether material must be
          re-stocked.
        is_a: DEV
      DON:
        title: donor
        description: 'In some organ transplantation services and rarely in transfusion
          services a donor will be a target participant in the service. However, in
          most cases transplantation is decomposed in three services: explantation,
          transport, and implantation. The identity of the donor (recipient) is often
          irrelevant for the explantation (implantation) service.'
        is_a: DIR
      EXPAGNT:
        title: ExposureAgent
        description: 'Description: The entity playing the associated role is the physical
          (including energy), chemical or biological substance that is participating
          in the exposure. For example in communicable diseases, the associated playing
          entity is the disease causing pathogen.'
        is_a: DIR
      EXPART:
        title: ExposureParticipation
        description: '**Description:**Direct participation in an exposure act where
          it is unknown that the participant is the source or subject of the exposure.
          If the participant is known to be the contact of an exposure then the SBJ
          participation type should be used. If the participant is known to be the
          source then the EXSRC participation type should be used.'
        is_a: DIR
      EXPTRGT:
        title: ExposureTarget
        description: 'Description: The entity playing the associated role is the target
          (contact) of exposure.'
        is_a: EXPART
      EXSRC:
        title: ExposureSource
        description: '**Description:**The entity playing the associated role is the
          source of exposure.'
        is_a: EXPART
      PRD:
        title: product
        description: Participant material that is brought forth (produced) in the
          act (e.g., specimen in a specimen collection, access or drainage in a placement
          service, medication package in a dispense service). It does not matter whether
          the material produced had existence prior to the service, or whether it
          is created in the service (e.g., in supply services the product is taken
          from a stock).
        is_a: DIR
      SBJ:
        title: subject
        description: The principle target on which the action happens.
        is_a: DIR
      SPC:
        title: specimen
        description: The subject of non-clinical (e.g. laboratory) observation services
          is a specimen.
        is_a: SBJ
      IND:
        title: indirect target
        description: Target that is not substantially present in the act and which
          is not directly affected by the act, but which will be a focus of the record
          or documentation of the act.
        is_a: PART
      BEN:
        title: beneficiary
        description: Target on behalf of whom the service happens, but that is not
          necessarily present in the service. Can occur together with direct target
          to indicate that a target is both, as in the case where the patient is the
          indirect beneficiary of a service rendered to a family member, e.g. counseling
          or given home care instructions. This concept includes a participant, such
          as a covered party, who derives benefits from a service act covered by a
          coverage act.
        is_a: IND
      CAGNT:
        title: causative agent
        description: 'Definition: A factor, such as a microorganism, chemical substance,
          or form of radiation, whose presence, excessive presence, or (in deficiency
          diseases) relative absence is essential, in whole or in part, for the occurrence
          of a condition.'
        is_a: IND
      COV:
        title: coverage target
        description: The target participation for an individual in a health care coverage
          act in which the target role is either the policy holder of the coverage,
          or a covered party under the coverage.
        is_a: IND
      GUAR:
        title: guarantor party
        description: The target person or organization contractually recognized by
          the issuer as a participant who has assumed fiscal responsibility for another
          personaTMs financial obligations by guaranteeing to pay for amounts owed
          to a particular account
        is_a: IND
      HLD:
        title: holder
        description: Participant who posses an instrument such as a financial contract
          (insurance policy) usually based on some agreement with the author.
        is_a: IND
      RCT:
        title: record target
        description: The record target indicates whose medical record holds the documentation
          of this act. This is especially important when the subject of a service
          is not the patient himself.
        is_a: IND
      RCV:
        title: receiver
        description: The person (or organization) who receives the product of an Act.
        is_a: IND
      IRCP:
        title: information recipient
        description: "A party, who may or should receive or who has recieved the Act\
          \ or subsequent or derivative information of that Act. Information recipient\
          \ is inert, i.e., independent of mood.&quot; Rationale: this is a generalization\
          \ of a too diverse family that the definition can't be any more specific,\
          \ and the concept is abstract so one of the specializations should be used."
        is_a: PART
      NOT:
        title: ugent notification contact
        description: An information recipient to notify for urgent matters about this
          Act. (e.g., in a laboratory order, critical results are being called by
          phone right away, this is the contact to call; or for an inpatient encounter,
          a next of kin to notify when the patient becomes critically ill).
        is_a: IRCP
      PRCP:
        title: primary information recipient
        description: Information recipient to whom an act statement is primarily directed.
          E.g., a primary care provider receiving a discharge letter from a hospitalist,
          a health department receiving information on a suspected case of infectious
          disease. Multiple of these participations may exist on the same act without
          requiring that recipients be ranked as primary vs. secondary.
        is_a: IRCP
      REFB:
        title: Referred By
        description: A participant (e.g. provider) who has referred the subject of
          an act (e.g. patient).
        is_a: IRCP
      REFT:
        title: Referred to
        description: The person who receives the patient
        is_a: IRCP
      TRC:
        title: tracker
        description: A secondary information recipient, who receives copies (e.g.,
          a primary care provider receiving copies of results as ordered by specialist).
        is_a: IRCP
      LOC:
        title: location
        description: The facility where the service is done. May be a static building
          (or room therein) or a moving location (e.g., ambulance, helicopter, aircraft,
          train, truck, ship, etc.)
        is_a: PART
      DST:
        title: destination
        description: The destination for services. May be a static building (or room
          therein) or a movable facility (e.g., ship).
        is_a: LOC
      ELOC:
        title: entry location
        description: A location where data about an Act was entered.
        is_a: LOC
      ORG:
        title: origin
        description: The location of origin for services. May be a static building
          (or room therein) or a movable facility (e.g., ship).
        is_a: LOC
      RML:
        title: remote
        description: Some services take place at multiple concurrent locations (e.g.,
          telemedicine, telephone consultation). The location where the principal
          performing actor is located is taken as the primary location (LOC) while
          the other location(s) are considered &quot;remote.&quot;
        is_a: LOC
      VIA:
        title: via
        description: For services, an intermediate location that specifies a path
          between origin an destination.
        is_a: LOC
      PRF:
        title: performer
        description: 'Definition: A person, non-person living subject, organization
          or device that who actually and principally carries out the action. Device
          should only be assigned as a performer in circumstances where the device
          is performing independent of human intervention. Need not be the principal
          responsible actor.'
        is_a: PART
      DIST:
        title: distributor
        description: Distributes material used in or generated during the act.
        is_a: PRF
      PPRF:
        title: primary performer
        description: The principal or primary performer of the act.
        is_a: PRF
      SPRF:
        title: secondary performer
        description: 'A person assisting in an act through his substantial presence
          and involvement This includes: assistants, technicians, associates, or whatever
          the job titles may be.'
        is_a: PRF
      RESP:
        title: responsible party
        description: The person or organization that has primary responsibility for
          the act. The responsible party is not necessarily present in an action,
          but is accountable for the action through the power to delegate, and the
          duty to review actions with the performing actor after the fact. This responsibility
          may be ethical, legal, contractual, fiscal, or fiduciary in nature.
        is_a: PART
      VRF:
        title: verifier
        description: A person who verifies the correctness and appropriateness of
          the service (plan, order, event, etc.) and hence takes on accountability.
        is_a: PART
      AUTHEN:
        title: authenticator
        description: A verifier who attests to the accuracy of an act, but who does
          not have privileges to legally authenticate the act. An example would be
          a resident physician who sees a patient and dictates a note, then later
          signs it. Their signature constitutes an authentication.
        is_a: VRF
      LA:
        title: legal authenticator
        description: A verifier who legally authenticates the accuracy of an act.
          An example would be a staff physician who sees a patient and dictates a
          note, then later signs it. Their signature constitutes a legal authentication.
        is_a: VRF
  LOINCROIOverlayShape:
    name: LOINCROIOverlayShape
    description: Shape of the region on the object being referenced
    status: ACTIVE
    permissible_values:
      CIRCLE:
        title: circle
        description: A circle defined by two (column,row) pairs. The first point is
          the center of the circle and the second point is a point on the perimeter
          of the circle.
      ELLIPSE:
        title: ellipse
        description: An ellipse defined by four (column,row) pairs, the first two
          points specifying the endpoints of the major axis and the second two points
          specifying the endpoints of the minor axis.
      POINT:
        title: point
        description: A single point denoted by a single (column,row) pair, or multiple
          points each denoted by a (column,row) pair.
      POLY:
        title: polyline
        description: A series of connected line segments with ordered vertices denoted
          by (column,row) pairs; if the first and last vertices are the same, it is
          a closed polygon.
  LOINCRoleClass:
    name: LOINCRoleClass
    description: "This table includes codes for the Role class hierarchy. The values\
      \ in this hierarchy, represent a R\u2026"
    status: ACTIVE
    permissible_values:
      ROL:
        title: role
        description: Corresponds to the Role class
      _RoleClassAssociative:
        title: RoleClassAssociative
        description: A general association between two entities that is neither partitive
          nor ontological.
        is_a: ROL
      _RoleClassMutualRelationship:
        title: RoleClassMutualRelationship
        description: A relationship that is based on mutual behavior of the two Entities
          as being related. The basis of such relationship may be agreements (e.g.,
          spouses, contract parties) or they may be de facto behavior (e.g. friends)
          or may be an incidental involvement with each other (e.g. parties over a
          dispute, siblings, children).
        is_a: _RoleClassAssociative
      _RoleClassRelationshipFormal:
        title: RoleClassRelationshipFormal
        description: A relationship between two entities that is formally recognized,
          frequently by a contract or similar agreement.
        is_a: _RoleClassMutualRelationship
      AFFL:
        title: affiliate
        description: Player of the Affiliate role has a business/professional relationship
          with scoper. Player and scoper may be persons or organization. The Affiliate
          relationship does not imply membership in a group, nor does it exist for
          resource scheduling purposes.
        is_a: _RoleClassRelationshipFormal
      AGNT:
        title: agent
        description: An entity (player) that acts or is authorized to act on behalf
          of another entity (scoper).
        is_a: _RoleClassRelationshipFormal
      ASSIGNED:
        title: assigned entity
        description: "An agent role in which the agent is an Entity acting in the\
          \ employ of an organization. The focus is on functional role on behalf of\
          \ the organization, unlike the Employee role where the focus is on the 'Human\
          \ Resources' relationship between the employee and the organization."
        is_a: AGNT
      COMPAR:
        title: commissioning party
        description: An Entity that is authorized to issue or instantiate permissions,
          privileges, credentials or other formal/legal authorizations.
        is_a: ASSIGNED
      SGNOFF:
        title: signing authority or officer
        description: The role of a person (player) who is the officer or signature
          authority for of a scoping entity, usually an organization (scoper).
        is_a: ASSIGNED
      CON:
        title: contact
        description: A person or an organization (player) which provides or receives
          information regarding another entity (scoper). Examples; patient NOK and
          emergency contacts; guarantor contact; employer contact.
        is_a: AGNT
      ECON:
        title: emergency contact
        description: An entity to be contacted in the event of an emergency.
        is_a: CON
      NOK:
        title: next of kin
        description: An individual designated for notification as the next of kin
          for a given entity.
        is_a: CON
      GUARD:
        title: guardian
        description: Guardian of a ward
        is_a: AGNT
      CIT:
        title: citizen
        description: Citizen of apolitical entity
        is_a: _RoleClassRelationshipFormal
      COVPTY:
        title: covered party
        description: A role class played by a person who receives benefit coverage
          under the terms of a particular insurance policy. The underwriter of that
          policy is the scoping entity. The covered party receives coverage because
          of some contractual or other relationship with the holder of that policy.
        is_a: _RoleClassRelationshipFormal
      CLAIM:
        title: claimant
        description: 'Description: A role played by a party making a claim for coverage
          under a policy or program. A claimant must be either a person or organization,
          or a group of persons or organizations. A claimant is not a named insured
          or a program eligible.'
        is_a: COVPTY
      NAMED:
        title: named insured
        description: 'Description: A role played by a party to an insurance policy
          to which the insurer agrees to indemnify for losses, provides benefits for,
          or renders services. A named insured may be either a person, non-person
          living subject, or an organization, or a group of persons, non-person living
          subjects, or organizations.'
        is_a: COVPTY
      DEPEN:
        title: dependent
        description: 'Description: A role played by a person covered under a policy
          or program based on an association with a subscriber, which is recognized
          by the policy holder.'
        is_a: NAMED
      INDIV:
        title: individual
        description: 'Description: A role played by a party covered under a policy
          as the policy holder. An individual may be either a person or an organization.'
        is_a: NAMED
      SUBSCR:
        title: subscriber
        description: 'Description: A role played by a person covered under a policy
          based on association with a sponsor who is the policy holder, and whose
          association may provide for the eligibility of dependents for coverage.'
        is_a: NAMED
      PROG:
        title: program eligible
        description: 'Description: A role played by a party that meets the eligibility
          criteria for coverage under a program. A program eligible may be either
          a person, non-person living subject, or an organization, or a group of persons,
          non-person living subjects, or organizations.'
        is_a: COVPTY
      CRINV:
        title: clinical research investigator
        description: A role played by a provider, always a person, who has agency
          authority from a Clinical Research Sponsor to direct the conduct of a clinical
          research trial or study on behalf of the sponsor.
        is_a: _RoleClassRelationshipFormal
      CRSPNSR:
        title: clinical research sponsor
        description: A role played by an entity, usually an organization, that is
          the sponsor of a clinical research trial or study. The sponsor commissions
          the study, bears the expenses, is responsible for satisfying all legal requirements
          concerning subject safety and privacy, and is generally responsible for
          collection, storage and analysis of the data generated during the trial.
          No scoper is necessary, as a clinical research sponsor undertakes the role
          on its own authority and declaration. Clinical research sponsors are usually
          educational or other research organizations, government agencies or biopharmaceutical
          companies.
        is_a: _RoleClassRelationshipFormal
      EMP:
        title: employee
        description: A relationship between a person or organization and a person
          or organization formed for the purpose of exchanging work for compensation.
          The purpose of the role is to identify the type of relationship the employee
          has to the employer, rather than the nature of the work actually performed.
          (Contrast with AssignedEntity.)
        is_a: _RoleClassRelationshipFormal
      MIL:
        title: military person
        description: A role played by a member of a military service. Scoper is the
          military service (e.g. Army, Navy, Air Force, etc.) or, more specifically,
          the unit (e.g. Company C, 3rd Battalion, 4th Division, etc.)
        is_a: EMP
      GUAR:
        title: guarantor
        description: A person or organization (player) that serves as a financial
          guarantor for another person or organization (scoper).
        is_a: _RoleClassRelationshipFormal
      INVSBJ:
        title: Investigation Subject
        description: An entity that is the subject of an investigation. This role
          is scoped by the party responsible for the investigation.
        is_a: _RoleClassRelationshipFormal
      CASEBJ:
        title: Case Subject
        description: A person, non-person living subject, or place that is the subject
          of an investigation related to a notifiable condition (health circumstance
          that is reportable within the applicable public health jurisdiction)
        is_a: INVSBJ
      RESBJ:
        title: research subject
        description: '**Definition:**Specifies the administrative functionality within
          a formal experimental design for which the ResearchSubject role was established.'
        is_a: INVSBJ
      LIC:
        title: licensed entity
        description: A relationship in which the scoper certifies the player ( e.
          g. a medical care giver, a medical device or a provider organization) to
          perform certain activities that fall under the jurisdiction of the scoper
          (e.g., a health authority licensing healthcare providers, a medical quality
          authority certifying healthcare professionals).
        is_a: _RoleClassRelationshipFormal
      NOT:
        title: notary public
        is_a: LIC
      PROV:
        title: healthcare provider
        description: An Entity (player) that is authorized to provide health care
          services by some authorizing agency (scoper).
        is_a: LIC
      PAT:
        title: patient
        description: A Role of a LivingSubject (player) as an actual or potential
          recipient of health care services from a healthcare provider organization
          (scoper).
        is_a: _RoleClassRelationshipFormal
      PAYEE:
        title: payee
        description: The role of an organization or individual designated to receive
          payment for a claim against a particular coverage. The scoping entity is
          the organization that is the submitter of the invoice in question.
        is_a: _RoleClassRelationshipFormal
      PAYOR:
        title: invoice payor
        description: The role of an organization that undertakes to accept claims
          invoices, assess the coverage or payments due for those invoices and pay
          to the designated payees for those invoices. This role may be either the
          underwriter or a third-party organization authorized by the underwriter.
          The scoping entity is the organization that underwrites the claimed coverage.
        is_a: _RoleClassRelationshipFormal
      POLHOLD:
        title: policy holder
        description: A role played by a person or organization that holds an insurance
          policy. The underwriter of that policy is the scoping entity.
        is_a: _RoleClassRelationshipFormal
      QUAL:
        title: qualified entity
        description: An entity (player) that has been recognized as having certain
          training/experience or other characteristics that would make said entity
          an appropriate performer for a certain activity. The scoper is an organization
          that educates or qualifies entities.
        is_a: _RoleClassRelationshipFormal
      SPNSR:
        title: coverage sponsor
        description: A role played by an entity, usually an organization that is the
          sponsor of an insurance plan or a health program. A sponsor is the party
          that is ultimately accountable for the coverage by employment contract or
          by law. A sponsor can be an employer, union, government agency, or association.
          Fully insured sponsors establish the terms of the plan and contract with
          health insurance plans to assume the risk and to administer the plan. Self-insured
          sponsors delegate coverage administration, but not risk, to third-party
          administrators. Program sponsors designate services to be covered in accordance
          with statute. Program sponsors may administer the coverage themselves, delegate
          coverage administration, but not risk to third-party administrators, or
          contract with health insurance plans to assume the risk and administrator
          a program. Sponsors qualify individuals who may become
        is_a: _RoleClassRelationshipFormal
      STD:
        title: student
        description: A role played by an individual who is a student of a school,
          which is the scoping entity.
        is_a: _RoleClassRelationshipFormal
      UNDWRT:
        title: underwriter
        description: A role played by a person or an organization. It is the party
          that
        is_a: _RoleClassRelationshipFormal
      CAREGIVER:
        title: caregiver
        description: A person responsible for the primary care of a patient at home.
        is_a: _RoleClassMutualRelationship
      PRS:
        title: personal relationship
        description: Links two entities with classCode PSN (person) in a personal
          relationship. The character of the relationship must be defined by a PersonalRelationshipRoleType
          code. The player and scoper are determined by PersonalRelationshipRoleType
          code as well.
        is_a: _RoleClassMutualRelationship
      SELF:
        title: self
        description: 'The &quot;same&quot; roleclass asserts an identity between playing
          and scoping entities: that they are in fact instances of the same entity
          and, in the case of discrepancies (e.g different DOB, gender), that one
          or both are in error.'
        is_a: _RoleClassMutualRelationship
      _RoleClassPassive:
        title: RoleClassPassive
        description: An association for a playing Entity that is used, known, treated,
          handled, built, or destroyed, etc. under the auspices of the scoping Entity.
          The playing Entity is passive in these roles (even though it may be active
          in other roles), in the sense that the kinds of things done to it in this
          role happen without an agreement from the playing Entity.
        is_a: _RoleClassAssociative
      ACCESS:
        title: access
        description: A role in which the playing entity (material) provides access
          to another entity. The principal use case is intravenous (or other bodily)
          access lines that preexist and need to be referred to for medication routing
          instructions.
        is_a: _RoleClassPassive
      ADJY:
        title: adjacency
        description: A physical association whereby two Entities are in some (even
          lose) spatial relationship with each other such that they touch each other
          in some way.
        is_a: _RoleClassPassive
      CONC:
        title: connection
        description: An adjacency of two Entities held together by a bond which attaches
          to each of the two entities.
        is_a: ADJY
      BOND:
        title: molecular bond
        description: A connection between two atoms of a molecule.
        is_a: CONC
      CONY:
        title: continuity
        description: A connection between two regional parts.
        is_a: CONC
      ADMM:
        title: Administerable Material
        description: A material (player) that can be administered to an Entity (scoper).
        is_a: _RoleClassPassive
      BIRTHPL:
        title: birthplace
        description: Relates a place (playing Entity) as the location where a living
          subject (scoping Entity) was born.
        is_a: _RoleClassPassive
      DEATHPLC:
        title: place of death
        description: 'Definition: Relates a place (playing Entity) as the location
          where a living subject (scoping Entity) died.'
        is_a: _RoleClassPassive
      DST:
        title: distributed material
        description: A material (player) distributed by a distributor (scoper) who
          functions between a manufacturer and a buyer or retailer.
        is_a: _RoleClassPassive
      RET:
        title: retailed material
        description: Material (player) sold by a retailer (scoper), who also give
          advice to prospective buyers.
        is_a: DST
      EXLOC:
        title: event location
        description: A role played by a place at which the location of an event may
          be recorded.
        is_a: _RoleClassPassive
      SDLOC:
        title: service delivery location
        description: A role played by a place at which services may be provided.
        is_a: EXLOC
      DSDLOC:
        title: dedicated service delivery location
        description: A role of a place (player) that is intended to house the provision
          of services. Scoper is the Entity (typically Organization) that provides
          these services. This is not synonymous with &quot;ownership.&quot;
        is_a: SDLOC
      ISDLOC:
        title: incidental service delivery location
        description: A role played by a place at which health care services may be
          provided without prior designation or authorization.
        is_a: SDLOC
      EXPR:
        title: exposed entity
        description: A role played by an entity that has been exposed to a person
          or animal suffering a contagious disease, or with a location from which
          a toxin has been distributed. The player of the role is normally a person
          or animal, but it is possible that other entity types could become exposed.
          The role is scoped by the source of the exposure, and it is quite possible
          for a person playing the role of exposed party to also become the scoper
          a role played by another person. That is to say, once a person has become
          infected, it is possible, perhaps likely, for that person to infect others.
        is_a: _RoleClassPassive
      HLD:
        title: held entity
        description: Entity that is currently in the possession of a holder (scoper),
          who holds, or uses it, usually based on some agreement with the owner.
        is_a: _RoleClassPassive
      HLTHCHRT:
        title: health chart
        description: The role of a material (player) that is the physical health chart
          belonging to an organization (scoper).
        is_a: _RoleClassPassive
      IDENT:
        title: identified entity
        description: A role in which the scoping entity designates an identifier for
          a playing entity.
        is_a: _RoleClassPassive
      MANU:
        title: manufactured product
        description: Scoped by the manufacturer
        is_a: _RoleClassPassive
      THER:
        title: therapeutic agent
        description: A manufactured material (player) that is used for its therapeutic
          properties. The manufacturer is the scoper.
        is_a: MANU
      MNT:
        title: maintained entity
        description: An entity (player) that is maintained by another entity (scoper).
          This is typical role held by durable equipment. The scoper assumes responsibility
          for proper operation, quality, and safety.
        is_a: _RoleClassPassive
      OWN:
        title: owned entity
        description: An Entity (player) for which someone (scoper) is granted by law
          the right to call the material (player) his own. This entitles the scoper
          to make decisions about the disposition of that material.
        is_a: _RoleClassPassive
      RGPR:
        title: regulated product
        description: A product regulated by some governmentatl orgnization. The role
          is played by Material and scoped by Organization.
        is_a: _RoleClassPassive
      TERR:
        title: territory of authority
        description: Relates a place entity (player) as the region over which the
          scoper (typically an Organization) has certain authority (jurisdiction).
          For example, the Calgary Regional Health Authority (scoper) has authority
          over the territory &quot;Region 4 of Alberta&quot; (player) in matters of
          health.
        is_a: _RoleClassPassive
      USED:
        title: used entity
        description: '**Description:**An entity (player) that is used by another entity
          (scoper)'
        is_a: _RoleClassPassive
      WRTE:
        title: warranted product
        description: A role a product plays when a guarantee is given to the purchaser
          by the seller (scoping entity) stating that the product is reliable and
          free from known defects and that the seller will repair or replace defective
          parts within a given time limit and under certain conditions.
        is_a: _RoleClassPassive
      _RoleClassOntological:
        title: RoleClassOntological
        description: "A relationship in which the scoping Entity defines or specifies\
          \ what the playing Entity is. Thus, the player's &quot;being&quot; (Greek:\
          \ ontos) is specified."
        is_a: ROL
      EQUIV:
        title: equivalent entity
        description: 'Description: Specifies the player Entity (the equivalent Entity)
          as an Entity that is considered to be equivalent to a reference Entity (scoper).
          The equivalence is in principle a symmetric relationship, however, it is
          expected that the scoper is a reference entity which serves as reference
          entity for multiple different equivalent entities.'
        is_a: _RoleClassOntological
      SAME:
        title: same
        description: The &quot;same&quot; role asserts an identity between playing
          and scoping entities, i.e., that they are in fact two records of the same
          entity instance, and, in the case of discrepancies (e.g different DOB, gender),
          that one or both are in error.
        is_a: EQUIV
      SUBY:
        title: subsumed by
        description: Relates a prevailing record of an Entity (scoper) with another
          record (player) that it subsumes.
        is_a: EQUIV
      GEN:
        title: has generalization
        description: Relates a specialized material concept (player) to its generalization
          (scoper).
        is_a: _RoleClassOntological
      GRIC:
        title: has generic
        description: A special link between pharmaceuticals indicating that the target
          (scoper) is a generic for the source (player).
        is_a: GEN
      INST:
        title: instance
        description: An individual piece of material (player) instantiating a class
          of material (scoper).
        is_a: _RoleClassOntological
      SUBS:
        title: subsumer
        description: An entity that subsumes the identity of another. Used in the
          context of merging documented entity instances. Both the player and scoper
          must have the same classCode.
        is_a: _RoleClassOntological
        status: DEPRECATED
      _RoleClassPartitive:
        title: RoleClassPartitive
        description: An association between two Entities where the playing Entity
          is considered in some way &quot;part&quot; of the scoping Entity, e.g.,
          as a member, component, ingredient, or content. Being &quot;part&quot; in
          the broadest sense of the word can mean anything from being an integral
          structural component to a mere incidental temporary association of a playing
          Entity with a (generally larger) scoping Entity.
        is_a: ROL
      CONT:
        title: content
        description: Relates a material as the content (player) to a container (scoper).
          Unlike ingredients, the content and a container remain separate (not mixed)
          and the content can be removed from the container. A content is not part
          of an empty container.
        is_a: _RoleClassPartitive
      EXPAGTCAR:
        title: exposure agent carrier
        description: An exposure agent carrier is an entity that is capable of conveying
          an exposure agent from one entity to another. The scoper of the role must
          be the exposure agent (e.g., pathogen).
        is_a: _RoleClassPartitive
      EXPVECTOR:
        title: exposure vector
        description: 'Description: A vector is a living subject that carries an exposure
          agent. The vector does not cause the disease itself, but exposes targets
          to the exposure agent. A mosquito carrying malaria is an example of a vector.
          The scoper of the role must be the exposure agent (e.g., pathogen).'
        is_a: EXPAGTCAR
      FOMITE:
        title: fomite
        description: 'Description: A fomite is a non-living entity that is capable
          of conveying exposure agent from one entity to another. A doorknob contaminated
          with a Norovirus is an example of a fomite. Anyone touching the doorknob
          would be exposed to the virus. The scoper of the role must be the exposure
          agent (e.g., pathogen).'
        is_a: EXPAGTCAR
      INGR:
        title: ingredient
        description: Relates a component (player) to a mixture (scoper). E.g., Glucose
          and Water are ingredients of D5W, latex may be an ingredient in a tracheal
          tube.
        is_a: _RoleClassPartitive
      ACTI:
        title: active ingredient
        description: 'Definition: a therapeutically active ingredient (player) in
          a mixture (scoper), where the mixture is typically a manufactured pharmaceutical.
          It is unknown if the quantity of such an ingredient is expressed precisely
          in terms of the playing ingredient substance, or, if it is specified in
          terms of a closely related substance (active moiety or reference substance).'
        is_a: INGR
      ACTIB:
        title: active ingredient - basis of strength
        description: 'Description:  Active ingredient, where the ingredient substance
          (player) is itself the &quot;basis of strength&quot;, i.e., where the Role.quantity
          specifies exactly the quantity of the player substance in the medicine formulation.'
        is_a: ACTI
      ACTIM:
        title: active ingredient - moiety is basis of strength
        description: "Description: Active ingredient, where not the ingredient substance\
          \ (player), but itaTMs active moiety is the &quot;basis of strength&quot;,\
          \ i.e., where the Role.quantity specifies the quantity of the player substance's\
          \ active moiety in the medicine formulation."
        is_a: ACTI
      ACTIR:
        title: active ingredient - reference substance is basis of strength
        description: "Description: Active ingredient, where not the ingredient substance\
          \ (player) but another reference substance with the same active moiety,\
          \ is the &quot;basis of strength&quot;, i.e., where the Role.quantity specifies\
          \ the quantity of a reference substance, similar but different from the\
          \ player substance's in the medicine formulation."
        is_a: ACTI
      ADJV:
        title: adjuvant
        description: A component (player) added to enhance the action of an active
          ingredient (scoper) (in the manner of a catalyst) but which has no active
          effect in and of itself. Such ingredients are significant in defining equivalence
          of products in a way that inactive ingredients are not.
        is_a: INGR
      ADTV:
        title: additive
        description: An ingredient (player) that is added to a base (scoper), that
          amounts to a minor part of the overall mixture.
        is_a: INGR
      BASE:
        title: base
        description: A base ingredient (player) is what comprises the major part of
          a mixture (scoper). E.g., Water in most i.v. solutions, or Vaseline in salves.
          Among all ingredients of a material, there should be only one base. A base
          substance can, in turn, be a mixture.
        is_a: INGR
      CNTM:
        title: contaminant ingredient
        description: "An ingredient whose presence is not intended but may not be\
          \ reasonably avoided given the circumstances of the mixture's nature or\
          \ origin."
        is_a: INGR
      IACT:
        title: inactive ingredient
        description: An ingredient which is not considered therapeutically active,
          e.g., colors, flavors, stabilizers, or preservatives, fillers, or structural
          components added to an active ingredient in order to facilitate administration
          of the active ingredient but without being considered therapeutically active.
          An inactive ingredient need not be biologically inert, e.g., might be active
          as an allergen or might have a pleasant taste, but is not an essential constituent
          delivering the therapeutic effect.
        is_a: INGR
      COLR:
        title: color additive
        description: A substance (player) influencing the optical aspect of material
          (scoper).
        is_a: IACT
      FLVR:
        title: flavor additive
        description: A substance (player) added to a mixture (scoper) to make it taste
          a certain way. In food the use is obvious, in pharmaceuticals flavors can
          hide disgusting taste of the active ingredient (important in pediatric treatments).
        is_a: IACT
      PRSV:
        title: preservative
        description: A substance (player) added to a mixture (scoper) to prevent microorganisms
          (fungi, bacteria) to spoil the mixture.
        is_a: IACT
      STBL:
        title: stabilizer
        description: A stabilizer (player) added to a mixture (scoper) in order to
          prevent the molecular disintegration of the main substance.
        is_a: IACT
      MECH:
        title: mechanical ingredient
        description: An ingredient (player) of a medication (scoper) that is inseparable
          from the active ingredients, but has no intended chemical or pharmaceutical
          effect itself, but which may have some systemic effect on the patient.
        is_a: INGR
      LOCE:
        title: located entity
        description: Relates an entity (player) to a location (scoper) at which it
          is present in some way. This presence may be limited in time.
        is_a: _RoleClassPartitive
      STOR:
        title: stored entity
        description: Relates an entity (player) (e.g. a device) to a location (scoper)
          at which it is normally found or stored when not used.
        is_a: LOCE
      MBR:
        title: member
        description: A role played by an entity that is a member of a group. The group
          provides the scope for this role.
        is_a: _RoleClassPartitive
      PART:
        title: part
        description: 'Definition:  an association between two Entities where the playing
          Entity (the part) is a component of the whole (scoper) in the sense of an
          integral structural component, that is distinct from other parts in the
          same whole, has a distinct function in the whole, and, as an effect, the
          full integrity of the whole depends (to some degree) on the presence of
          this part, even though the part may often be separable from the whole.'
        is_a: _RoleClassPartitive
      ACTM:
        title: active moiety
        description: The molecule or ion that is responsible for the intended pharmacological
          action of the drug substance, excluding those appended or associated parts
          of the molecule that make the molecule an ester, salt (including a salt
          with hydrogen or coordination bonds), or other noncovalent derivative (such
          as a complex, chelate, or clathrate).
        is_a: PART
      SPEC:
        title: specimen
        description: A role played by a material entity that is a specimen for an
          act. It is scoped by the source of the specimen.
        is_a: _RoleClassPartitive
      ALQT:
        title: aliquot
        description: A portion (player) of an original or source specimen (scoper)
          used for testing or transportation.
        is_a: SPEC
      ISLT:
        title: isolate
        description: A microorganism that has been isolated from other microorganisms
          or a source matrix.
        is_a: SPEC
      CHILD:
        title: child
        description: The player of the role is a child of the scoping entity, in a
          generic sense.
      CRED:
        title: credentialed entity
        description: A role played by an entity that receives credentials from the
          scoping entity.
      NURPRAC:
        title: nurse practitioner
      NURS:
        title: nurse
      PA:
        title: physician assistant
      PHYS:
        title: physician
