        description: A person or an organization (player) which provides or receives
          information regarding another entity (scoper). Examples; patient NOK and
          emergency contacts; guarantor contact; employer contact.
      ECON:
        title: emergency contact
        description: An entity to be contacted in the event of an emergency.
      NOK:
        title: next of kin
        description: An individual designated for notification as the next of kin
