          to which the insurer agrees to indemnify for losses, provides benefits for,
          or renders services. A named insured may be either a person, non-person
          living subject, or an organization, or a group of persons, non-person living
          subjects, or organizations.'
        is_a: COVPTY
      DEPEN:
        title: dependent
        description: 'Description: A role played by a person covered under a policy
          or program based on an association with a subscriber, which is recognized
          by the policy holder.'
        is_a: NAMED
      INDIV:
        title: individual
        description: 'Description: A role played by a party covered under a policy
          as the policy holder. An individual may be either a person or an organization.'
        is_a: NAMED
      SUBSCR:
        title: subscriber
        description: 'Description: A role played by a person covered under a policy
          based on association with a sponsor who is the policy holder, and whose
          association may provide for the eligibility of dependents for coverage.'
        is_a: NAMED
      PROG:
        title: program eligible
        description: 'Description: A role played by a party that meets the eligibility
          criteria for coverage under a program. A program eligible may be either
          a person, non-person living subject, or an organization, or a group of persons,
          non-person living subjects, or organizations.'
        is_a: COVPTY
      CRINV:
        title: clinical research investigator
        description: A role played by a provider, always a person, who has agency
          authority from a Clinical Research Sponsor to direct the conduct of a clinical
          research trial or study on behalf of the sponsor.
        is_a: _RoleClassRelationshipFormal
      CRSPNSR:
        title: clinical research sponsor
        description: A role played by an entity, usually an organization, that is
          the sponsor of a clinical research trial or study. The sponsor commissions
          the study, bears the expenses, is responsible for satisfying all legal requirements
          concerning subject safety and privacy, and is generally responsible for
          collection, storage and analysis of the data generated during the trial.
          No scoper is necessary, as a clinical research sponsor undertakes the role
          on its own authority and declaration. Clinical research sponsors are usually
          educational or other research organizations, government agencies or biopharmaceutical
          companies.
        is_a: _RoleClassRelationshipFormal
      EMP:
        title: employee
        description: A relationship between a person or organization and a person
          or organization formed for the purpose of exchanging work for compensation.
          The purpose of the role is to identify the type of relationship the employee
          has to the employer, rather than the nature of the work actually performed.
          (Contrast with AssignedEntity.)
        is_a: _RoleClassRelationshipFormal
      MIL:
        title: military person
        description: A role played by a member of a military service. Scoper is the
          military service (e.g. Army, Navy, Air Force, etc.) or, more specifically,
          the unit (e.g. Company C, 3rd Battalion, 4th Division, etc.)
        is_a: EMP
      GUAR:
        title: guarantor
        description: A person or organization (player) that serves as a financial
          guarantor for another person or organization (scoper).
        is_a: _RoleClassRelationshipFormal
      INVSBJ:
        title: Investigation Subject
        description: An entity that is the subject of an investigation. This role
          is scoped by the party responsible for the investigation.
        is_a: _RoleClassRelationshipFormal
      CASEBJ:
        title: Case Subject
        description: A person, non-person living subject, or place that is the subject
          of an investigation related to a notifiable condition (health circumstance
          that is reportable within the applicable public health jurisdiction)
        is_a: INVSBJ
      RESBJ:
        title: research subject
        description: '**Definition:**Specifies the administrative functionality within
          a formal experimental design for which the ResearchSubject role was established.'
        is_a: INVSBJ
      LIC:
        title: licensed entity
        description: A relationship in which the scoper certifies the player ( e.
          g. a medical care giver, a medical device or a provider organization) to
          perform certain activities that fall under the jurisdiction of the scoper
          (e.g., a health authority licensing healthcare providers, a medical quality
          authority certifying healthcare professionals).
        is_a: _RoleClassRelationshipFormal
      NOT:
        title: notary public
        is_a: LIC
      PROV:
        title: healthcare provider
        description: An Entity (player) that is authorized to provide health care
          services by some authorizing agency (scoper).
        is_a: LIC
      PAT:
        title: patient
        description: A Role of a LivingSubject (player) as an actual or potential
          recipient of health care services from a healthcare provider organization
          (scoper).
        is_a: _RoleClassRelationshipFormal
      PAYEE:
        title: payee
        description: The role of an organization or individual designated to receive
          payment for a claim against a particular coverage. The scoping entity is
          the organization that is the submitter of the invoice in question.
        is_a: _RoleClassRelationshipFormal
      PAYOR:
        title: invoice payor
        description: The role of an organization that undertakes to accept claims
          invoices, assess the coverage or payments due for those invoices and pay
          to the designated payees for those invoices. This role may be either the
          underwriter or a third-party organization authorized by the underwriter.
          The scoping entity is the organization that underwrites the claimed coverage.
        is_a: _RoleClassRelationshipFormal
      POLHOLD:
        title: policy holder
        description: A role played by a person or organization that holds an insurance
          policy. The underwriter of that policy is the scoping entity.
        is_a: _RoleClassRelationshipFormal
      QUAL:
        title: qualified entity
        description: An entity (player) that has been recognized as having certain
          training/experience or other characteristics that would make said entity
          an appropriate performer for a certain activity. The scoper is an organization
          that educates or qualifies entities.
        is_a: _RoleClassRelationshipFormal
      SPNSR:
        title: coverage sponsor
        description: A role played by an entity, usually an organization that is the
          sponsor of an insurance plan or a health program. A sponsor is the party
          that is ultimately accountable for the coverage by employment contract or
          by law. A sponsor can be an employer, union, government agency, or association.
          Fully insured sponsors establish the terms of the plan and contract with
          health insurance plans to assume the risk and to administer the plan. Self-insured
          sponsors delegate coverage administration, but not risk, to third-party
          administrators. Program sponsors designate services to be covered in accordance
          with statute. Program sponsors may administer the coverage themselves, delegate
          coverage administration, but not risk to third-party administrators, or
          contract with health insurance plans to assume the risk and administrator
          a program. Sponsors qualify individuals who may become
        is_a: _RoleClassRelationshipFormal
      STD:
        title: student
        description: A role played by an individual who is a student of a school,
          which is the scoping entity.
        is_a: _RoleClassRelationshipFormal
      UNDWRT:
        title: underwriter
        description: A role played by a person or an organization. It is the party
          that
        is_a: _RoleClassRelationshipFormal
      CAREGIVER:
        title: caregiver
        description: A person responsible for the primary care of a patient at home.
        is_a: _RoleClassMutualRelationship
      PRS:
        title: personal relationship
        description: Links two entities with classCode PSN (person) in a personal
          relationship. The character of the relationship must be defined by a PersonalRelationshipRoleType
          code. The player and scoper are determined by PersonalRelationshipRoleType
          code as well.
        is_a: _RoleClassMutualRelationship
      SELF:
        title: self
        description: 'The &quot;same&quot; roleclass asserts an identity between playing
          and scoping entities: that they are in fact instances of the same entity
          and, in the case of discrepancies (e.g different DOB, gender), that one
          or both are in error.'
        is_a: _RoleClassMutualRelationship
      _RoleClassPassive:
        title: RoleClassPassive
        description: An association for a playing Entity that is used, known, treated,
          handled, built, or destroyed, etc. under the auspices of the scoping Entity.
          The playing Entity is passive in these roles (even though it may be active
          in other roles), in the sense that the kinds of things done to it in this
          role happen without an agreement from the playing Entity.
        is_a: _RoleClassAssociative
      ACCESS:
        title: access
        description: A role in which the playing entity (material) provides access
          to another entity. The principal use case is intravenous (or other bodily)
          access lines that preexist and need to be referred to for medication routing
          instructions.
        is_a: _RoleClassPassive
      ADJY:
        title: adjacency
        description: A physical association whereby two Entities are in some (even
          lose) spatial relationship with each other such that they touch each other
          in some way.
        is_a: _RoleClassPassive
      CONC:
        title: connection
        description: An adjacency of two Entities held together by a bond which attaches
          to each of the two entities.
        is_a: ADJY
      BOND:
        title: molecular bond
        description: A connection between two atoms of a molecule.
        is_a: CONC
      CONY:
        title: continuity
        description: A connection between two regional parts.
        is_a: CONC
      ADMM:
        title: Administerable Material
        description: A material (player) that can be administered to an Entity (scoper).
        is_a: _RoleClassPassive
      BIRTHPL:
        title: birthplace
        description: Relates a place (playing Entity) as the location where a living
          subject (scoping Entity) was born.
        is_a: _RoleClassPassive
      DEATHPLC:
        title: place of death
        description: 'Definition: Relates a place (playing Entity) as the location
          where a living subject (scoping Entity) died.'
        is_a: _RoleClassPassive
      DST:
        title: distributed material
        description: A material (player) distributed by a distributor (scoper) who
          functions between a manufacturer and a buyer or retailer.
        is_a: _RoleClassPassive
      RET:
        title: retailed material
        description: Material (player) sold by a retailer (scoper), who also give
          advice to prospective buyers.
        is_a: DST
      EXLOC:
        title: event location
        description: A role played by a place at which the location of an event may
          be recorded.
        is_a: _RoleClassPassive
      SDLOC:
        title: service delivery location
        description: A role played by a place at which services may be provided.
        is_a: EXLOC
      DSDLOC:
        title: dedicated service delivery location
        description: A role of a place (player) that is intended to house the provision
          of services. Scoper is the Entity (typically Organization) that provides
          these services. This is not synonymous with &quot;ownership.&quot;
        is_a: SDLOC
      ISDLOC:
        title: incidental service delivery location
        description: A role played by a place at which health care services may be
          provided without prior designation or authorization.
        is_a: SDLOC
      EXPR:
        title: exposed entity
        description: A role played by an entity that has been exposed to a person
          or animal suffering a contagious disease, or with a location from which
          a toxin has been distributed. The player of the role is normally a person
          or animal, but it is possible that other entity types could become exposed.
          The role is scoped by the source of the exposure, and it is quite possible
          for a person playing the role of exposed party to also become the scoper
          a role played by another person. That is to say, once a person has become
          infected, it is possible, perhaps likely, for that person to infect others.
        is_a: _RoleClassPassive
      HLD:
        title: held entity
        description: Entity that is currently in the possession of a holder (scoper),
          who holds, or uses it, usually based on some agreement with the owner.
        is_a: _RoleClassPassive
      HLTHCHRT:
        title: health chart
        description: The role of a material (player) that is the physical health chart
          belonging to an organization (scoper).
        is_a: _RoleClassPassive
      IDENT:
        title: identified entity
        description: A role in which the scoping entity designates an identifier for
          a playing entity.
        is_a: _RoleClassPassive
      MANU:
        title: manufactured product
        description: Scoped by the manufacturer
        is_a: _RoleClassPassive
      THER:
        title: therapeutic agent
        description: A manufactured material (player) that is used for its therapeutic
          properties. The manufacturer is the scoper.
        is_a: MANU
      MNT:
        title: maintained entity
        description: An entity (player) that is maintained by another entity (scoper).
          This is typical role held by durable equipment. The scoper assumes responsibility
          for proper operation, quality, and safety.
        is_a: _RoleClassPassive
      OWN:
        title: owned entity
        description: An Entity (player) for which someone (scoper) is granted by law
          the right to call the material (player) his own. This entitles the scoper
          to make decisions about the disposition of that material.
        is_a: _RoleClassPassive
      RGPR:
        title: regulated product
        description: A product regulated by some governmentatl orgnization. The role
          is played by Material and scoped by Organization.
        is_a: _RoleClassPassive
      TERR:
        title: territory of authority
        description: Relates a place entity (player) as the region over which the
          scoper (typically an Organization) has certain authority (jurisdiction).
          For example, the Calgary Regional Health Authority (scoper) has authority
          over the territory &quot;Region 4 of Alberta&quot; (player) in matters of
          health.
        is_a: _RoleClassPassive
      USED:
        title: used entity
        description: '**Description:**An entity (player) that is used by another entity
          (scoper)'
        is_a: _RoleClassPassive
      WRTE:
        title: warranted product
        description: A role a product plays when a guarantee is given to the purchaser
          by the seller (scoping entity) stating that the product is reliable and
          free from known defects and that the seller will repair or replace defective
          parts within a given time limit and under certain conditions.
        is_a: _RoleClassPassive
      _RoleClassOntological:
        title: RoleClassOntological
        description: "A relationship in which the scoping Entity defines or specifies\
          \ what the playing Entity is. Thus, the player's &quot;being&quot; (Greek:\
          \ ontos) is specified."
        is_a: ROL
      EQUIV:
        title: equivalent entity
        description: 'Description: Specifies the player Entity (the equivalent Entity)
          as an Entity that is considered to be equivalent to a reference Entity (scoper).
          The equivalence is in principle a symmetric relationship, however, it is
          expected that the scoper is a reference entity which serves as reference
          entity for multiple different equivalent entities.'
        is_a: _RoleClassOntological
      SAME:
        title: same
        description: The &quot;same&quot; role asserts an identity between playing
          and scoping entities, i.e., that they are in fact two records of the same
          entity instance, and, in the case of discrepancies (e.g different DOB, gender),
          that one or both are in error.
        is_a: EQUIV
      SUBY:
        title: subsumed by
        description: Relates a prevailing record of an Entity (scoper) with another
          record (player) that it subsumes.
        is_a: EQUIV
      GEN:
        title: has generalization
        description: Relates a specialized material concept (player) to its generalization
          (scoper).
        is_a: _RoleClassOntological
      GRIC:
        title: has generic
        description: A special link between pharmaceuticals indicating that the target
          (scoper) is a generic for the source (player).
        is_a: GEN
      INST:
        title: instance
        description: An individual piece of material (player) instantiating a class
          of material (scoper).
        is_a: _RoleClassOntological
      SUBS:
        title: subsumer
        description: An entity that subsumes the identity of another. Used in the
          context of merging documented entity instances. Both the player and scoper
          must have the same classCode.
        is_a: _RoleClassOntological
        status: DEPRECATED
      _RoleClassPartitive:
        title: RoleClassPartitive
        description: An association between two Entities where the playing Entity
          is considered in some way &quot;part&quot; of the scoping Entity, e.g.,
          as a member, component, ingredient, or content. Being &quot;part&quot; in
          the broadest sense of the word can mean anything from being an integral
          structural component to a mere incidental temporary association of a playing
          Entity with a (generally larger) scoping Entity.
        is_a: ROL
      CONT:
        title: content
        description: Relates a material as the content (player) to a container (scoper).
          Unlike ingredients, the content and a container remain separate (not mixed)
          and the content can be removed from the container. A content is not part
          of an empty container.
        is_a: _RoleClassPartitive
      EXPAGTCAR:
        title: exposure agent carrier
        description: An exposure agent carrier is an entity that is capable of conveying
          an exposure agent from one entity to another. The scoper of the role must
          be the exposure agent (e.g., pathogen).
        is_a: _RoleClassPartitive
      EXPVECTOR:
        title: exposure vector
        description: 'Description: A vector is a living subject that carries an exposure
          agent. The vector does not cause the disease itself, but exposes targets
          to the exposure agent. A mosquito carrying malaria is an example of a vector.
          The scoper of the role must be the exposure agent (e.g., pathogen).'
        is_a: EXPAGTCAR
      FOMITE:
        title: fomite
        description: 'Description: A fomite is a non-living entity that is capable
          of conveying exposure agent from one entity to another. A doorknob contaminated
          with a Norovirus is an example of a fomite. Anyone touching the doorknob
          would be exposed to the virus. The scoper of the role must be the exposure
          agent (e.g., pathogen).'
        is_a: EXPAGTCAR
      INGR:
        title: ingredient
        description: Relates a component (player) to a mixture (scoper). E.g., Glucose
          and Water are ingredients of D5W, latex may be an ingredient in a tracheal
          tube.
        is_a: _RoleClassPartitive
      ACTI:
        title: active ingredient
        description: 'Definition: a therapeutically active ingredient (player) in
          a mixture (scoper), where the mixture is typically a manufactured pharmaceutical.
          It is unknown if the quantity of such an ingredient is expressed precisely
          in terms of the playing ingredient substance, or, if it is specified in
          terms of a closely related substance (active moiety or reference substance).'
        is_a: INGR
      ACTIB:
        title: active ingredient - basis of strength
        description: 'Description:  Active ingredient, where the ingredient substance
          (player) is itself the &quot;basis of strength&quot;, i.e., where the Role.quantity
          specifies exactly the quantity of the player substance in the medicine formulation.'
        is_a: ACTI
      ACTIM:
        title: active ingredient - moiety is basis of strength
        description: "Description: Active ingredient, where not the ingredient substance\
          \ (player), but itaTMs active moiety is the &quot;basis of strength&quot;,\
          \ i.e., where the Role.quantity specifies the quantity of the player substance's\
          \ active moiety in the medicine formulation."
        is_a: ACTI
      ACTIR:
        title: active ingredient - reference substance is basis of strength
        description: "Description: Active ingredient, where not the ingredient substance\
          \ (player) but another reference substance with the same active moiety,\
          \ is the &quot;basis of strength&quot;, i.e., where the Role.quantity specifies\
          \ the quantity of a reference substance, similar but different from the\
          \ player substance's in the medicine formulation."
        is_a: ACTI
      ADJV:
        title: adjuvant
        description: A component (player) added to enhance the action of an active
          ingredient (scoper) (in the manner of a catalyst) but which has no active
          effect in and of itself. Such ingredients are significant in defining equivalence
          of products in a way that inactive ingredients are not.
        is_a: INGR
      ADTV:
        title: additive
        description: An ingredient (player) that is added to a base (scoper), that
          amounts to a minor part of the overall mixture.
        is_a: INGR
      BASE:
        title: base
        description: A base ingredient (player) is what comprises the major part of
          a mixture (scoper). E.g., Water in most i.v. solutions, or Vaseline in salves.
          Among all ingredients of a material, there should be only one base. A base
          substance can, in turn, be a mixture.
        is_a: INGR
      CNTM:
        title: contaminant ingredient
        description: "An ingredient whose presence is not intended but may not be\
          \ reasonably avoided given the circumstances of the mixture's nature or\
          \ origin."
        is_a: INGR
      IACT:
        title: inactive ingredient
        description: An ingredient which is not considered therapeutically active,
          e.g., colors, flavors, stabilizers, or preservatives, fillers, or structural
          components added to an active ingredient in order to facilitate administration
          of the active ingredient but without being considered therapeutically active.
          An inactive ingredient need not be biologically inert, e.g., might be active
          as an allergen or might have a pleasant taste, but is not an essential constituent
          delivering the therapeutic effect.
        is_a: INGR
      COLR:
        title: color additive
        description: A substance (player) influencing the optical aspect of material
          (scoper).
        is_a: IACT
      FLVR:
        title: flavor additive
        description: A substance (player) added to a mixture (scoper) to make it taste
          a certain way. In food the use is obvious, in pharmaceuticals flavors can
          hide disgusting taste of the active ingredient (important in pediatric treatments).
        is_a: IACT
      PRSV:
        title: preservative
        description: A substance (player) added to a mixture (scoper) to prevent microorganisms
          (fungi, bacteria) to spoil the mixture.
        is_a: IACT
      STBL:
        title: stabilizer
        description: A stabilizer (player) added to a mixture (scoper) in order to
          prevent the molecular disintegration of the main substance.
        is_a: IACT
      MECH:
        title: mechanical ingredient
        description: An ingredient (player) of a medication (scoper) that is inseparable
          from the active ingredients, but has no intended chemical or pharmaceutical
          effect itself, but which may have some systemic effect on the patient.
        is_a: INGR
      LOCE:
        title: located entity
        description: Relates an entity (player) to a location (scoper) at which it
          is present in some way. This presence may be limited in time.
        is_a: _RoleClassPartitive
      STOR:
        title: stored entity
        description: Relates an entity (player) (e.g. a device) to a location (scoper)
          at which it is normally found or stored when not used.
        is_a: LOCE
      MBR:
        title: member
        description: A role played by an entity that is a member of a group. The group
          provides the scope for this role.
        is_a: _RoleClassPartitive
      PART:
        title: part
        description: 'Definition:  an association between two Entities where the playing
          Entity (the part) is a component of the whole (scoper) in the sense of an
          integral structural component, that is distinct from other parts in the
          same whole, has a distinct function in the whole, and, as an effect, the
          full integrity of the whole depends (to some degree) on the presence of
          this part, even though the part may often be separable from the whole.'
        is_a: _RoleClassPartitive
      ACTM:
        title: active moiety
        description: The molecule or ion that is responsible for the intended pharmacological
          action of the drug substance, excluding those appended or associated parts
          of the molecule that make the molecule an ester, salt (including a salt
          with hydrogen or coordination bonds), or other noncovalent derivative (such
          as a complex, chelate, or clathrate).
        is_a: PART
      SPEC:
        title: specimen
        description: A role played by a material entity that is a specimen for an
          act. It is scoped by the source of the specimen.
        is_a: _RoleClassPartitive
      ALQT:
        title: aliquot
        description: A portion (player) of an original or source specimen (scoper)
          used for testing or transportation.
        is_a: SPEC
      ISLT:
        title: isolate
        description: A microorganism that has been isolated from other microorganisms
          or a source matrix.
        is_a: SPEC
  LOINCRoleClassServiceDeliveryLocation:
