  LOINCEntityDeterminer:
    name: LOINCEntityDeterminer
    description: "EntityDeterminer in natural language grammar is the class of words\
      \ that comprises articles, demonst\u2026"
    status: ACTIVE
    permissible_values:
      INSTANCE:
        title: specific
        description: '**Description:**A determiner that specifies that the Entity
          object represents a particular physical thing (as opposed to a universal,
          kind, or class of physical thing).'
      GROUP:
        title: specific group
        description: A determiner that specifies that the Entity object represents
          a particular collection of physical things (as opposed to a universal, kind,
          or class of physical thing). While the collection may resolve to having
          only a single individual (or even no individuals), the potential should
          exist for it to cover multiple individuals.
        is_a: INSTANCE
      KIND:
        title: described
        description: '**Description:**A determiner that specifies that the Entity
          object represents a universal, kind or class of physical thing (as opposed
          to a particular thing).'
      GROUPKIND:
        title: described group
        description: A determiner that specifies that the Entity object represents
          a universal, kind or class of collections physical things. While the collection
          may resolve to having only a single individual (or even no individuals),
          the potential should exist for it to cover multiple individuals.
        is_a: KIND
      QUANTIFIED_KIND:
        title: described quantified
        description: The described quantified determiner indicates that the given
          Entity is taken as a general description of a specific amount of a thing.
          For example, QUANTIFIED_KIND of syringe (quantity = 3,) stands for exactly
          three syringes.
        is_a: KIND
        status: DEPRECATED
  LOINCEntityDeterminerDetermined:
    name: LOINCEntityDeterminerDetermined
    description: "The described determiner is used to indicate that the given Entity\
      \ is taken as a general descriptio\u2026"
    status: ACTIVE
    permissible_values:
      KIND:
