      DSDLOC:
        title: dedicated service delivery location
        description: A role of a place (player) that is intended to house the provision
          of services. Scoper is the Entity (typically Organization) that provides
          these services. This is not synonymous with &quot;ownership.&quot;
        is_a: SDLOC
      ISDLOC:
        title: incidental service delivery location
        description: A role played by a place at which health care services may be
          provided without prior designation or authorization.
        is_a: SDLOC
  LOINCRoleClassSpecimen:
    name: LOINCRoleClassSpecimen
    description: "A role played by a material entity that is a specimen for an act.\
      \ It is scoped by the source of the\u2026"
    status: ACTIVE
    permissible_values:
      SPEC:
        title: specimen
        description: A role played by a material entity that is a specimen for an
          act. It is scoped by the source of the specimen.
      ALQT:
        title: aliquot
        description: A portion (player) of an original or source specimen (scoper)
          used for testing or transportation.
        is_a: SPEC
      ISLT:
        title: isolate
        description: A microorganism that has been isolated from other microorganisms
          or a source matrix.
        is_a: SPEC
  LOINCRoleStatus:
    name: LOINCRoleStatus
    description: "Codes representing the defined possible states of an Role, as defined\
      \ by the Role class state machi\u2026"
    status: ACTIVE
    permissible_values:
      normal:
        title: normal
        description: "The 'typical' state. Excludes &quot;nullified&quot; which represents\
          \ the termination state of a Role instance that was created in error."
      active:
        title: active
        description: The state representing the fact that the Entity is currently
          active in the Role.
        is_a: normal
      cancelled:
        title: cancelled
        description: The terminal state resulting from cancellation of the role prior
          to activation.
        is_a: normal
      pending:
        title: pending
        description: The state representing that fact that the role has not yet become
          active.
        is_a: normal
      suspended:
        title: suspended
        description: The state that represents a suspension of the Entity playing
          the Role. This state is arrived at from the &quot;active&quot; state.
        is_a: normal
      terminated:
        title: terminated
        description: The state representing the successful termination of the Role.
        is_a: normal
      nullified:
        title: nullified
        description: The state representing the termination of a Role instance that
          was created in error.
  LOINCRoleStatusActive:
    name: LOINCRoleStatusActive
    description: The state representing the fact that the Entity is currently active
      in the Role.
    status: ACTIVE
    permissible_values:
      active:
        title: active
        description: The state representing the fact that the Entity is currently
          active in the Role.
  LOINCServiceDeliveryLocationRoleType:
    name: LOINCServiceDeliveryLocationRoleType
    description: "A role of a place that further classifies the setting (e.g., accident\
      \ site, road side, work site, c\u2026"
    status: ACTIVE
    permissible_values:
      _DedicatedServiceDeliveryLocationRoleType:
        title: DedicatedServiceDeliveryLocationRoleType
        description: A role of a place that further classifies a setting that is intended
          to house the provision of services.
      _DedicatedClinicalLocationRoleType:
        title: DedicatedClinicalLocationRoleType
        description: A role of a place that further classifies the clinical setting
          (e.g., cardiology clinic, primary care clinic, rehabilitation hospital,
          skilled nursing facility) in which care is delivered during an encounter.
      DX:
        title: Diagnostics or therapeutics unit
        description: A practice setting where diagnostic procedures or therapeutic
          interventions are performed
      CVDX:
        title: Cardiovascular diagnostics or therapeutics unit
        description: A practice setting where cardiovascular diagnostic procedures
          or therapeutic interventions are performed (e.g., cardiac catheterization
          lab, echocardiography suite)
      CATH:
        title: Cardiac catheterization lab
      ECHO:
        title: Echocardiography lab
      GIDX:
        title: Gastroenterology diagnostics or therapeutics lab
