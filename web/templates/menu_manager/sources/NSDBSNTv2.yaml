          NSDB_MDEP1:
            permissible_values:
              ANTH:
                title: "Mat\xE9riaux anthropiques"
                description: "Mat\xE9riaux modifi\xE9s par l'homme, y compris ceux\
                  \ qui sont associ\xE9s \xE0 l'exploitation mini\xE8re et \xE0 l'\xE9\
                  limination des d\xE9chets; ils comprennent les accumulations de\
                  \ mat\xE9riaux qui proviennent de l'activit\xE9 humaine et les mat\xE9\
                  riaux g\xE9ologiques modifi\xE9s artificiellement de telle sorte\
                  \ que leurs propri\xE9t\xE9s physiques (structure, coh\xE9sion,\
                  \ compaction) ont \xE9t\xE9 consid\xE9rablement alt\xE9r\xE9es;\
                  \ ex., d\xE9charges, tas de d\xE9blais, mines \xE0 ciel ouvert,\
                  \ zones nivel\xE9es et irrigu\xE9es."
              COLL:
                title: Colluvial
                description: "S\xE9diments massifs \xE0 moyennement bien stratifi\xE9\
                  s, non tri\xE9s \xE0 mal tri\xE9s, \xE0 granulom\xE9trie variable\
                  \ (des argiles ou blocs qui ont atteint leur position actuelle par\
                  \ mouvement direct engendr\xE9 par la gravit\xE9); il y a des d\xE9\
                  placements lents comme le creep et la solifluction ainsi que des\
                  \ mouvements rapides comme les coul\xE9es boueuses."
              EOLI:
                title: "\xC9olien"
                description: "Mat\xE9riaux \xE9oliens d\xE9pos\xE9s par le vent :\
                  \ d\xE9p\xF4ts uniformes de sable tr\xE8s fin et de limon."
              FLEO:
                title: "Fluvio-\xE9olien"
                description: "Fluvio-\xE9olien"
              FLLC:
                title: Fluvio-lacustre
                description: Fluvio-lacustre
              FLUV:
                title: Fluviatile
                description: "Ces s\xE9diments sont g\xE9n\xE9ralement compos\xE9\
                  s de gravier et de sable, avec une faible proportion de limon et\
                  \ rarement d'argile. Les graviers sont typiquement arrondis et les\
                  \ interstices sont remplis de sable."
              FNPT:
                title: Tourbe de carex
                description: "Ces d\xE9p\xF4ts consistent en tourbe de carex, d\xE9\
                  riv\xE9 principalement de carex avec des inclusions de tiges d'arbustes\
                  \ partiellement d\xE9compos\xE9es, form\xE9s dans un environnement\
                  \ eutrophique d\xFB \xE0 l'intime association du mat\xE9riau avec\
                  \ des eaux riches en min\xE9raux."
              FOPT:
                title: "Tourbe de for\xEAt"
                description: "Cette classe est utilis\xE9e pour les \xE9tendues recouvertes\
                  \ de tourbe foresti\xE8re ou remplies de tourbe foresti\xE8re avec\
                  \ une nappe phr\xE9atique \xE0 la surface ou au-dessus de la surface\
                  \ de la tourbe. Les mat\xE9riaux tourbeux dominants sont des tourbes\
                  \ de for\xEAt ou de fen m\xE9siques \xE0 humiques qui sont minces\
                  \ \xE0 profonds, et qui ont \xE9t\xE9 form\xE9s dans un environnement\
                  \ eutrophique r\xE9sultant d'un fort \xE9coulement des eaux provenant\
                  \ du pourtour ou d'autres sources min\xE9rales."
              GLFL:
                title: Glacio-fluviatile
                description: "Detris transport\xE9s par les glaciers, puis tri\xE9\
                  s et d\xE9pos\xE9s par les cours d'eau de fonte. Les d\xE9p\xF4\
                  ts sont stratifi\xE9s et se pr\xE9sentent sous forme de plaines\
                  \ d'\xE9pandage fluvio glaciaire, de deltas, de kames, d'eskers\
                  \ et de terrasses de harne. Voir aussi drift glaciare et till."
              GLLC:
                title: Glacio-lacustre
                description: "Utiliser l\xE0 o\xF9 il est clair que les mat\xE9riaux\
                  \ lacustres ont \xE9t\xE9 d\xE9pos\xE9s au contact d'un glacier.\
                  \ Une des caract\xE9ristiques suivantes doit \xEAtre pr\xE9sente\
                  \ : \r\n\r\nDes kettles ou une surface par ailleurs irr\xE9guli\xE8\
                  re qui n'est pas simplement le r\xE9sultat de tassement et de compactage\
                  \ normaux dans le limon, ni le r\xE9sultat de chenaux d'\xE9coulement\r\
                  \nsouterrain.\r\nDes structures d'affaissement r\xE9sultant de la\
                  \ perte de support due \xE0 la fonte du support de glace.\r\nLa\
                  \ pr\xE9sence de nombreux blocs glaciels (pierres transport\xE9\
                  es par la glace flottante) dans les limons lacustres."
              GLMA:
                title: Glacio-marin
                description: Glacio-marin
              LACU:
                title: "S\xE9diments lacustres"
                description: "S\xE9diment compos\xE9 g\xE9n\xE9ralement d'argile,\
                  \ de limon et de sable fin stratifi\xE9s et d\xE9pos\xE9s au fond\
                  \ du lac ou de sable stratifi\xE9 et moyennement bien tri\xE9 et\
                  \ de mat\xE9riaux plus grossiers qui ont \xE9t\xE9 transport\xE9\
                  s et d\xE9pos\xE9s par les vagues sur la plage ou dans la zone littorale;\
                  \ il s'agit de mat\xE9riaux en suspension qui ont \xE9t\xE9 d\xE9\
                  pos\xE9s dans des masses d'eau douce ou se sont accumul\xE9s \xE0\
                  \ leurs marges sous l'effet des vagues; ex., s\xE9diments lacustres\
                  \ et plages."
              LATL:
                title: Till lacustre
                description: Till lacustre
              MARI:
                title: "D\xE9p\xF4ts marins"
                description: "D\xE9p\xF4ts non consolid\xE9s d'argile, de limon, de\
                  \ sable ou de gravier, bien \xE0 moyennement bien tri\xE9s et bien\
                  \ \xE0 moyennement bien stratifi\xE9s (renfermant par endroits des\
                  \ coquillages); ces mat\xE9riaux d'abord en suspension, se sont\
                  \ d\xE9pos\xE9s dans des masses d'eau sal\xE9e ou saum\xE2tre ou\
                  \ se sont accumul\xE9s \xE0 la lisi\xE8re de celles-ci sous l'effet\
                  \ de ph\xE9nom\xE8nes littoraux comme l'action des vagues et de\
                  \ la d\xE9rive littorale; les d\xE9p\xF4ts non fossilif\xE8res peuvent\
                  \ \xEAtre consid\xE9r\xE9s comme des d\xE9p\xF4ts marins s'ils sont\
                  \ situ\xE9s en un endroit que l'on peut raisonnablement consid\xE9\
                  rer comme ayant \xE9t\xE9 recouvert d'eau sal\xE9e \xE0 l'\xE9poque\
                  \ o\xF9 ces d\xE9p\xF4ts se sont form\xE9s."
              RESD:
                title: "S\xE9diments r\xE9siduels"
                description: "Mat\xE9riau de sol min\xE9ral non consolid\xE9, m\xE9\
                  t\xE9oris\xE9 ou partiellement alt\xE9r\xE9 qui s'accumule par d\xE9\
                  sint\xE9gration sur place du substratum rocheux."
              SAPR:
                title: Saprolithe
                description: "Ce mat\xE9riau consiste en roc alt\xE9r\xE9 et contient\
                  \ une forte proportion de limons et d'argiles r\xE9siduels, form\xE9\
                  s par alt\xE9ration, principalement par l'alt\xE9ration chimique.\r\
                  \n\r\nLe roc demeure dans un \xE9tat coh\xE9rent, la relation entre\
                  \ les grains n'est pas d\xE9rang\xE9e et aucun mouvement par gravit\xE9\
                  \ n'appara\xEEt. Le processus est pr\xE9sum\xE9 \xEAtre \xE0 actif.\r\
                  \nExemple: roche pourrie \xE0 noyaux de pierre."
              SEPT:
                title: "Tourbe s\xE9dimentaire"
                description: "La terre coprog\xE8ne est compos\xE9e de d\xE9bris de\
                  \ plantes aquatiques modifi\xE9es par des animaux aquatiques. En\
                  \ suspension aqueuse, elle devient l\xE9g\xE8rement visqueuse; elle\
                  \ est plastique mais non collante; elle se r\xE9tracte au s\xE9\
                  chage pour former des mottes difficiles \xE0 r\xE9humidifier et\
                  \ qui ont souvent tendance \xE0 se fissurer le long de plans horizontaux.\
                  \ Elle a peu ou pas de fragments v\xE9g\xE9taux identifiables \xE0\
                  \ l'oeil nu, un indice au pyrophosphate de 5 ou plus et une luminosit\xE9\
                  \ de couleur inf\xE9rieure \xE0 5 \xE0 l'\xE9tat sec."
              SPPT:
                title: Tourbe de sphaigne
