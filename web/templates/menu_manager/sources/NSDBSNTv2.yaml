id: https://sis.agr.gc.ca/cansis/nsdb/soil/v2/snt/index.html
name: NSDBSNTv2
title: Soil Name Table (SNT)
description: "The Soil Name Table (SNT) describes the general physical and chemical\
  \ characteristics for all of the soils identified in a geographic region.  \nSoil\
  \ Order, Great Group and Subgroup are listed, along with attributes such as mode\
  \ of deposition, and drainage class."
version: '2'
license: ''
in_language: en
imports:
  - 'linkml:types'
prefixes: {}
default_prefix: ''
classes: {}
enums:
  NSDB_PROVINCE:
    name: PROVINCE
    title: Province Code
    description: A two-character province code used as part of a link to the CanSIS
      NAMES and LAYERS tables.
    permissible_values:
      AB:
        title: Alberta
      BC:
        title: British Columbia
      MB:
        title: Manitoba
      NB:
        title: New Brunswick
      NL:
        title: Newfoundland and Labrador
      NT:
        title: Northwest Territories
      NS:
        title: Nova Scotia
      NU:
        title: Nunavut
      'ON':
        title: Ontario
      PE:
        title: Prince Edward Island
      QC:
        title: Quebec
      SK:
        title: Saskatchewan
      YT:
        title: Yukon
  NSDB_KIND:
    name: KIND
    title: Kind of Surface Material
    description: Identifies the kind of surface soil, rock outcrop or other material
      (feature). First used in SLC 3.0.
    permissible_values:
      M:
        title: Mineral
        description: The soil material is primarily composed of mineral particles.
      O:
        title: Organic
        description: The soil material is primarily composed of organic particles.
      N:
        title: True Non-soil
        description: This is a true non-soil (e.g. airport or lake).
      U:
        title: Unclassified
        description: This material was not classified due to an absence of information
          or an unusual situation, such as rockland or an extremely shallow soil.
  NSDB_WATERTBL:
    name: WATERTBL
    title: Water Table Characteristics
    description: Indicates the presence of a water table at a depth of 100cm, and
      identifies its temporal characteristics.
    permissible_values:
      YB:
        title: Always
        description: The water table is always present in the soil.
      YG:
        title: Growing season
        description: The water table is present in the soil during the growing season.
      YN:
        title: Non growing season
        description: The water table is present in the soil during the non growing
          season.
      YU:
        title: Unspecified period
        description: The water table is present in the soil during an unspecified
          period.
      'NO':
        title: Never
        description: The water table is not present in the soil at any time.
      '-':
        title: Not applicable
        description: Not applicable.
  NSDB_ROOTRESTRI:
    name: ROOTRESTRI
    title: Soil layer that restricts root growth
    description: 'Indicates the soil layer that restricts root growth. "-" indicates
      "not applicable". Layers are numbered 0 if no restricting layer is present.
      Numbers 1-9 indicate that the layer is restrictive and this number can be linked
      to the LAYER_NO field in the SLT.'
    permissible_values:
      '0':
        title: No root restricting layer
        description: The growth of plant roots is not restricted by any soil layer.
      '1':
        title: First layer
        description: The growth of plant roots is restricted by the first (uppermost)
          layer.
      '2':
        title: Second layer
        description: The growth of plant roots is restricted by the second layer.
      '3':
        title: Third layer
        description: The growth of plant roots is restricted by the third layer.
      '4':
        title: Fourth layer
        description: The growth of plant roots is restricted by the fourth layer.
      '5':
        title: Fifth layer
        description: The growth of plant roots is restricted by the fifth layer.
      '6':
        title: Sixth layer
        description: The growth of plant roots is restricted by the sixth layer.
      '7':
        title: Seventh layer
        description: The growth of plant roots is restricted by the seventh layer.
      '8':
        title: Eighth layer
        description: The growth of plant roots is restricted by the eighth layer.
      '9':
        title: Ninth layer
        description: The growth of plant roots is restricted by the ninth layer.
      '-':
        title: Not applicable
        description: Non-applicable (e.g. rock, ice).
  NSDB_RESTR_TYPE:
    name: RESTR_TYPE
    title: Type of root restricting layer
    description: Indicates the type of soil in the root restricting layer.
    permissible_values:
      UN:
        title: Undifferentiated
        description: Undifferentiated
      BN:
        title: Solonetzic
        description: Solonetzic B horizon
      SA:
        title: Salinity
        description: Salinity (conductivity &gt; 4 dS/m)
      CT:
        title: Compact Till
        description: Compact (Basal) Till
      OR:
        title: Ortstein
        description: Ortstein horizon
      FP:
        title: Fragipan
        description: Fragipan
      LI:
        title: Lithic
        description: Lithic (consolidated bedrock)
      CR:
        title: Cryic
        description: Cryic (frozen) horizon
      DU:
        title: Duric
        description: Duric horizon
      PL:
        title: Placic
        description: Placic horizon
      '-':
        title: n/a
        description: Not Applicable
  NSDB_DRAINAGE:
    name: DRAINAGE
    title: Soil Drainage Class
    description: Indicates the type of drainage found within a soil profile. First
      used in SLC 3.0. Identical classes to drainage in SLC 1.0, but codes differ.
    permissible_values:
      VR:
        title: Very rapidly drained
        description: Water is removed from the soil very rapidly in relation to supply.
          Excess water flows downward very rapidly if underlying material is pervious.
          There may be very rapid subsurface flow during heavy rainfall provided there
          is a steep gradient. Soils have very low available water storage capacity
          (usually less than 2.5 cm) within the control section and are usually coarse
          textured, or shallow, or both. Water source is precipitation.
      R:
        title: Rapidly drained
        description: Water is removed from the soil rapidly in relation to supply.
          Excess water flows downward if underlying material is pervious. Subsurface
          flow may occur on steep gradients during heavy rainfall. Soils have low
          available water storage capacity (2.5-4 cm) within the control section,
          and are usually coarse textured, or shallow, or both. Water source is precipitation.
      W:
        title: Well drained
        description: Water is removed from the soil readily but not rapidly. Excess
          water flows downward readily into underlying pervious material or laterally
          as subsurface flow. Soils have intermediate available water storage capacity
          (4-5 cm) within the control section, and are generally intermediate in texture
          and depth. Water source is precipitation. On slopes subsurface flow may
          occur for short durations, but additions are equaled by losses.
      MW:
        title: Moderately well drained
        description: Water is removed from the soil somewhat slowly in relation to
          supply. Excess water is removed somewhat slowly due to low perviousness,
          shallow water table, lack of gradient, or some combination of these. Soils
          have intermediate to high water storage capacity (5-6 cm) within the control
          section and are usually medium to fined textured. Precipitation is the dominant
          water source in medium to fine textured soils; precipitation and significant
          additions by subsurface flow are necessary in coarse textured soils.
      I:
        title: Imperfectly drained
        description: Water is removed from the soil sufficiently slowly in relation
          to supply, to keep the soil wet for a significant part of the growing season.
          Excess water moves slowly downward if precipitation is the major supply.
          If subsurface water or groundwater, or both, is the main source, the flow
          rate may vary but the soil remains wet for a significant part of the growing
          season. Precipitation is the main source if available water storage capacity
          is high; contribution by subsurface flow or groundwater flow, or both, increases
          as available water storage capacity decreases. Soils have a wide range in
          available water supply, texture, and depth, and are gleyed phases of well
          drained subgroups.
      P:
        title: Poorly drained
        description: Water is removed so slowly in relation to supply that the soil
          remains wet for a comparatively large part of the time the soil is not frozen.
          Excess water is evident in the soil for a large part of the time. Subsurface
          flow or groundwater flow, or both, in addition to precipitation are the
          main water sources; there may also be a perched water table, with precipitation
          exceeding evapotranspiration. Soils have a wide range in available water
          storage capacity, texture, and depth, and are gleyed subgroups, Gleysols,
          and Organic soils.
      VP:
        title: Very poorly drained
        description: Water is removed from the soil so slowly that the water table
          remains at or on the surface for the greater part of the time the soil is
          not frozen. Excess water is present in the soil for the greater part of
          the time. Groundwater flow and subsurface flow are the major water sources.
          Precipitation is less important except where there is a perched water table
          with precipitation exceeding evapotranspiration. Soils have a wide range
          in available water storage capacity, texture, and depth, and are either
          Gleysolic or Organic.
      '-':
        title: Not applicable
        description: Drainage not applicable (rock, ice, etc)
