          contain interstitial sand.
      FNPT:
        title: Fen Peat
        description: These deposits consist of sedge peat derived primarily from sedges
          with inclusions of partially decayed stems of shrubs formed in a eutrophic
          environment due to the close association of the material with mineral-rich
          waters.
      FOPT:
        title: Forest Peat
        description: This class is used for forest peatcovered or forest peat-filled
          areas where the water table is at or above the peat surface. The dominant
          peat materials are shallow to deep mesic to humic forest and fen peat formed
          in a eutrophic environment resulting from strong water movement from the
          margins or other mineral sources.
      GLFL:
        title: Glaciofluvial
        description: Material moved by glaciers and subsequently sorted and deposited
          by streams flowing from the melting ice. The deposits are stratified and
          may occur in the form of outwash plains, deltas, kames eskers, and kame
          terraces. See also glacial drift and till.
      GLLC:
        title: Glaciolacustrine
        description: "Used where there is evidence that the lacustrine materials were\
          \ deposited in contact with glacial ice. One of the following characteristics\
          \ must be present:\r\n\r\nkettles or an otherwise irregular surface that\
          \ is neither simply the result of normal settling and compaction in silt\
          \ nor the result of piping\r\nslump structures resulting from loss of support\
          \ caused by melting of retaining ice\r\npresence of numerous ice-rafted\
          \ stones in the lacustrine silts."
      GLMA:
        title: Glaciomarine
        description: Glaciomarine
      LACU:
        title: Lacustrine
        description: Sediment, generally consisting of either stratified fine sand,
          silt, and clay deposited on the lake bed, or moderately-well sorted, stratified
          sand and coarse materials that consist of near lake shore or beach deposits.
          These materials have either settled from suspension in bodies of standing
          fresh water or accumulated at their margins through wave action.
      LATL:
        title: Lacustro-Till
        description: Lacustro-Till
      MARI:
        title: Marine
        description: Unconsolidated deposits of clay, silt, sand, or gravel that are
          well to moderately well sorted and well to moderately well stratified (in
          some places containing shells). The deposits have settled from suspension
          in salt or brackish water bodies or have accumulated at their margins through
          shoreline processes such as wave action and longshore drift. Nonfossiliferous
          deposits may be judged marine if they are located in an area that may reasonably
          be considered to have contained salt water at the time the deposits were
          formed.
      RESD:
        title: Residual
        description: Unconsolidated, weathered, or partly weathered mineral soil material
          that accumulates by in situ disintegration of bedrock.
      SAPR:
        title: Saprolite
        description: "This material is rock and contains a high proportion of residual\
          \ silts and clays formed by alteration, chiefly by chemical weathering.\r\
          \n\r\nThe rock remains in a coherent state, interstitial grain relationships\
          \ are undisturbed, and no downhill movement due to gravity has occurred.\
          \ The process is assumed to be active.\r\nExamples: rotten rock containing\
          \ corestones."
      SEPT:
        title: Sedimentary Peat
        description: Coprogenous earth is composed of aquatic plant debris modified
          by aquatic animals. It makes slightly viscous water suspensions and is slightly
          plastic but not sticky. The material shrinks upon drying to form clods that
          are difficult to rewet and commonly crack along horizontal planes. It has
          very few or no plant fragments recognizable to the naked eye, a pyrophosphate
          index of 5 or more, and a dry color value of less than 5.
      SPPT:
        title: Sphagnum Peat
        description: These deposits consist of sphagnum or forest peat formed in an
          ombrotrophic environment caused by the slightly elevated nature of the bog.
          They tend to be disassociated from nutrient-rich ground water or surrounding
          mineral soils.
      TILL:
        title: Till (Morainal)
        description: 'Morainal material (till) deposited by glacial ice: a mixture
          of boulders, sand, silt, and clay.'
      UNDM:
        title: Undifferentiated mineral
        description: A sequence of more than three types of genetic mineral materials
          outcropping on a steep erosional escarpment. This complex class is to be
          used where units relating to individual genetic materials cannot be delimited
          separately at the scale of mapping. It may include colluvium derived from
          the various genetic materials and resting upon the scarp slope.
      UNDO:
        title: Undifferentiated organic
        description: A layered sequence of more than three undifferentiated types
          of organic material (>30% organic matter by weight).
      VOLC:
        title: Volcanic
        description: Volcanic pumice and ash.
      RKUD:
        title: Undifferentiated
        description: Bedrock, undifferentiated
      RKIA:
        title: Igneous, acidic
        description: Igneous, acidic bedrock (dominantly granite)
      RKIB:
        title: Igneous, basic
        description: Igneous, basic bedrock (dominantly basalt)
      RKIC:
        title: Igneous, basic coarse
        description: Igneous, basic coarse bedrock (coarse grained basalts)
      RKIF:
        title: Igneous, basic fine grained
        description: Igneous, basic fine grained bedrock (dominantly andesites)
      RKCA:
        title: Calcareous
        description: Calcareous bedrock (dominantly sandstone and shale)
      RKLS:
        title: Limestone
        description: Limestone bedrock (limestone and dolomite)
      RKSH:
        title: Shale
        description: Shale bedrock
      RKSS:
        title: Sandstone
        description: Sandstone bedrock
      RKSM:
        title: Siltstone and mudstone
        description: Siltstone and mudstone bedrock
      RKSP:
        title: Schist and phyllite
        description: Schist and phyllite bedrock
      RKSA:
        title: Slate
        description: Slate bedrock
      RKQU:
        title: Quartzite
        description: Quartzite bedrock
      RKGN:
        title: Gneiss
        description: Gneiss bedrock
      '-':
        title: Not Applicable
        description: Not Applicable
  NSDB_MDEP3:
    name: MDEP3
    title: Mode of deposition - third
    description: The mode of deposition of the third underlying parent material. First
      used in SLC 3.0
    permissible_values:
      ANTH:
        title: Anthropogenic
        description: Materials modified by people,including those associated with
          mineral exploitation and waste disposal. They include materials deposited
          as a result of human activities or geological materials modified artificially
          so that their physical properties (structure, cohesion, compaction) have
          been drastically altered. Examples are areas of landfill, spoil heaps, open-pit
          mines and levelled irrigated areas.
      COLL:
        title: Colluvial
        description: Massive to moderately-well stratified, nonsorted to poorly sorted
          sediments with any range of particle sizes from clay to boulders that have
          reached their present position only by direct, gravity-induced movement.
          Processes include slow displacements such as creep and solifluction and
          rapid movements such as earth flows.
      EOLI:
        title: Eolian
        description: 'Eolian material deposited by wind: uniform deposit of very fine
          sand and silt.'
      FLEO:
        title: Fluvioeolian
