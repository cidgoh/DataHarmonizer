  NASIS_toughness_class:
    name: NASIS_toughness_class
    title: Toughness Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=847
    permissible_values:
      high:
        description: Can reduce the soil specimen diameter at or near the plastic
          limit to 3mm by exertion of >20 newtons force.
      low:
        description: Can reduce the soil specimen diameter at or near the plastic
          limit to 3mm by exertion of <8 newtons force.
      medium:
        description: Can reduce the soil specimen diameter at or near the plastic
          limit to 3mm by exertion of 8 to 20 newtons force.
    description: 'Toughness is related to plasticity. Table 3-17 contains a set of
      classes. The classes are based on the relative force necessary to form with
      the fingers a roll 3 mm in diameter of < 2 mm soil material at a water content
      near the plastic limit (test D 2488 in ASTM, 1984). Reference: Soil Survey Manual.'
  NASIS_transect_cert_status:
