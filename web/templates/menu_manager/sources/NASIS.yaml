  NASIS_wind_erodibility_group:
    name: NASIS_wind_erodibility_group
    title: Wind Erodibility Group
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=898
    permissible_values:
      '1':
        description: Surface texture - Very fine sand, fine sand, sand or coarse sand.
          Percent aggregates - 1 to 7. Wind erodibility index - 160 to 310 t/a/yr,
          use 220 as average.
      '2':
        description: Surface texture - Loamy very fine sand, loamy fine sand, loamy
          sand, loamy coarse sand; very fine sandy loam and silt loam with 5 or less
          percent clay and 25 or less percent very fine sand; and sapric soil materials
          (as defined in Soil Taxonomy); except Folists. Percent aggregates - 10.
          Wind erodibility index - 134 t/a/yr.
      '3':
        description: Surface texture - Very fine sandy loam, fine sandy loam, sandy
          loam, coarse sandy loam, and noncalcareous silt loam that has 20 to 50 percent
          very fine sand and 5 to 12 percent clay. Percent aggregates - 25. Wind Erodibility
          Index - 86 t/a/yr.
      '4':
        description: Surface texture - Clay, silty clay, noncalcareous clay loam that
          has more than 35 percent clay, and noncalcareous silty clay loam that has
          more than 35 percent clay. All of these do not have sesquic, parasesquic,
          ferritic, ferruginous, or kaolinitic mineralogy (high iron oxide content).
          Percent aggregates - 25. Wind erodibility index - 86 t/a/yr.
      4L:
        description: Surface texture - Calcareous loam, calcareous silt loam, calcareous
          silt, calcareous sandy clay, calcareous sandy clay loam, calcareous clay
          loam and calcareous silty clay loam. Percent aggregates - 25. Wind Erodibility
          Index - 86 t/a/yr.
      '5':
        description: Surface texture - Noncalcareous loam that has less than 20 percent
          clay; noncalcareous silt loam with 12 to 20 percent clay; noncalcareous
          sandy clay loam; noncalcareous sandy clay; and hemic materials (as defined
          in Soil Taxonomy). Percent aggregates - 40. Wind Erodibility Index - 56
          t/a/yr.
      '6':
        description: Surface texture - Noncalcareous loam and silt loam that have
          more than 20 percent clay; noncalcareous clay loam and noncalcareous silty
          clay loam that has less than 35 percent clay; silt loam that has parasesquic,
          ferritic, or kaolinitic mineralogy (high iron oxide content). Percent aggregates
          - 45. Wind Erodibility Index - 48 t/a/yr.
      '7':
        description: Surface texture - Noncalcareous silt; noncalcareous silty clay,
          noncalcareous silty clay loam, and noncalcareous clay that have sesquic,
          parasesquic, ferritic, ferruginous, or kaolinitic mineralogy (high content
          of iron oxide) and are Oxisols or Ultisols; and fibric material (as defined
          in Soil Taxonomy). Percent aggregates - 50. Wind Erodibility Index - 48
          t/a/yr.
      '8':
        description: Soils not susceptible to wind erosion due to rock and pararock
          fragments at the surface and/or wetness; and Folists
    description: 'This is a set of classes given integer designations from 1 through
      8, based on compositional properties of the surface horizon that are considered
      to affect susceptibility to wind erosion. Texture, presence of carbonate, and
      the degree of decomposition of organic soils are the major criteria. Reference:
      Soil Survey Manual'
  NASIS_wind_erodibility_index:
    name: NASIS_wind_erodibility_index
    title: Wind Erodibility Index
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=899
    permissible_values:
      '0':
        description: Soils not susceptible to wind erosion due to coarse fragments
          on the surface or wetness.
      '38':
        description: Silt, noncalcareous silty clay loam that has less than 35 percent
          clay content, and fibric organic soil material. Dry soil aggregates more
          than .84 mm are more than 50 percent by weight.
      '48':
        description: Noncalcareous loam and silt loam that has more than 20 percent
          clay content or noncalcareous clay loam that has less than 35 percent clay
          content. Dry soil aggregates more than .84 mm are 45 to 50 percent by weight.
      '56':
        description: Noncalcareous loam and silt loam that has less than 20 percent
          clay content or sandy clay loam, sandy clay, and hemic organic soil materials.
          Dry soil aggregates more than .84 mm are 40 to 45 percent by weight.
      '86':
        description: Very fine sandy loam, fine sandy loam, sandy loam, coarse sandy
          loam, or ash material. Clay, silty clay, noncalcareous clay loam, or noncalcareous
          silty clay loam that has more than 35 percent clay content. Calcareous loam
          and silt loam or calcareous clay loam and silty clay loam. Dry soil aggregates
          more than .84 mm are 25 to 40 percent by weight.
      '134':
        description: Loamy very fine sand, loamy fine sand, loamy sand, loamy coarse
          sand, or sapric organic soil material. Dry soil aggregates more than .84
          mm are 10 to 25 percent by weight.
      '160':
        description: Very fine sand, fine sand, sand, or coarse sand. Dry soil aggregates
          more than .84 mm are 7 to 10 percent by weight.
      '180':
        description: Very fine sand, fine sand, sand, or coarse sand. Dry soil aggregates
          more than .84 mm are 5 to 7 percent by weight.
      '220':
        description: Very fine sand, fine sand, sand, or coarse sand. Dry soil aggregates
          more than .84 mm area 3 to 5 percent by weight.
      '250':
        description: Very fine sand, fine sand, sand, or coarse sand. Dry soil aggregates
          more than .84 mm are 1 percent by weight.
      '310':
        description: Very fine sand, fine sand, sand, or coarse sand. Dry soil aggregates
          more than .84 mm are 1 percent by weight.
    description: 'Associated with each wind erodibility group is a wind erodibility
      index in tons per acre per year. The wind erodibility index is the theoretical,
      long-term amount of soil lost per year through wind erosion. It is based on
      the assumption that the soil is bare, lacks a surface crust, occurs in an unsheltered
      position, and is subject to the weather at Garden City, Kansas. Reference: Soil
      Survey Manual'
