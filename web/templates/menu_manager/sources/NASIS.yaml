  NASIS_drainage_class:
    name: NASIS_drainage_class
    title: Drainage Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=157
    permissible_values:
      excessively:
        description: drained Water is removed very rapidly. The occurrence of internal
          free water commonly is very rare or very deep. The soils are commonly coarse-textured
          and have very high hydraulic conductivity or are very shallow. Soil Survey
          Manual, Chapter 3.
      somewhat excessively:
        description: drained Water is removed from the soil rapidly. Internal free
          water occurrence commonly is very rare or very deep. The soils are commonly
          coarse-textured and have high saturated hydraulic conductivity or are very
          shallow. Soil Survey Manual, Chapter 3.
      well:
        description: drained Water is removed from the soil readily but not rapidly.
          Internal free water occurrence commonly is deep or very deep; annual duration
          is not specified. Water is available to plants throughout most of the growing
          season in humid regions. Wetness does not inhibit growth of roots for significant
          periods during most growing seasons. The soils are mainly free of the deep
          to redoximorphic features that are related to wetness. Soil Survey Manual,
          Chapter 3.
      moderately well:
        description: drained Water is removed from the soil somewhat slowly during
          some periods of the year. Internal free water occurrence commonly is moderately
          deep and transitory through permanent. The soils are wet for only a short
          time within the rooting depth during the growing season, but long enough
          that most mesophytic crops are affected. They commonly have a moderately
          low or lower saturated hydraulic conductivity in a layer within the upper
          1 m, periodically receive high rainfall, or both. Soil Survey Manual, Chapter
          3.
      somewhat poorly:
        description: 'drained Water is removed slowly so that the soil is wet at a
          shallow depth for significant periods during the growing season. The occurrence
          of internal free water commonly is shallow to moderately deep and transitory
          to permanent. Wetness markedly restricts the growth of mesophytic crops,
          unless artificial drainage is provided. The soils commonly have one or more
          of the following characteristics: low or very low saturated hydraulic conductivity,
          a high water table, additional water from seepage, or nearly continuous
          rainfall. Soil Survey Manual, Chapter 3.'
      poorly:
        description: drained Water is removed so slowly that the soil is wet at shallow
          depths periodically during the growing season or remains wet for long periods.
          The occurrence of internal free water is shallow or very shallow and common
          or persistent. Free water is commonly at or near the surface long enough
          during the growing season so that most mesophytic crops cannot be grown,
          unless the soil is artificially drained. The soil, however, is not continuously
          wet directly below plow-depth. Free water at shallow depth is usually present.
          This water table is commonly the result of low or very low saturated hydraulic
          conductivity of nearly continuous rainfall, or of a combination of these.
          Soil Survey Manual, Chapter 3.
      very poorly:
        description: drained Water is removed from the soil so slowly that free water
          remains at or very near the ground surface during much of the growing season.
          The occurrence of internal free water is very shallow and persistent or
          permanent. Unless the soil is artificially drained, most mesophytic crops
          cannot be grown. The soils are commonly level or depressed and frequently
          ponded. If rainfall is high or nearly continuous, slope gradients may be
          greater. Soil Survey Manual, Chapter 3.
      subaqueous:
        description: Free water is above the soil surface. The occurrence of internal
          free water is permanent and there is a positive water potential at the soil
          surface for more than 21 hours of each day. The soils have a peraquic soil
          moisture regime.
    description: Natural drainage class refers to the frequency and duration of wet
      periods under conditions similar to those under which the soil developed. Alteration
      of the water regime by man, either through drainage or irrigation, is not a
      consideration unless the alterations have significantly changed the morphology
      of the soil. Soil Survey Manual, Chapter 3.
  NASIS_drainage_pattern:
    name: NASIS_drainage_pattern
    title: Drainage Pattern
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=159
    permissible_values:
      annular:
        description: A drainage pattern in which subsequent streams follow a roughly
          circular or concentric path along a belt of weak rocks, resembling in plan
          view, a ring-like pattern where the bedrock joints or fracturing control
          the parallel tributaries. It is best displayed in streams draining a maturely
          dissected granitic or sedimentary structural dome or basin where erosion
          has exposed rimming sedimentary strata of greatly varying degrees of hardness,
          as in the Red Valley which nearly encircles the domal structure of the Black
          Hills, SD.
      artificial:
        description: Human-made networks of drainage structures (ditches, canals,
          etc.) built primarily to lower or control the local water table in low lying,
          flat topography such as glacial lakebeds, broad flood plains, low coastal
          plains, or marshes most commonly in humid climates. (Irrigation ditches
          found in arid and semiarid climates, which bring water into the fields,
          should not be confused with drainage structures).
      centripetal:
        description: A drainage pattern in which the streams converge inward toward
          a central depression; generally indicative of a structural basin, volcanic
          crater, caldera, breached dome, bolson, or the end of an eroded anticline
          or syncline.
      dendritic:
        description: A common drainage pattern in which the tributaries join the gently
          curving mainstream at acute angles, resembling in plan view the branching
          habit of an oak or chestnut tree; it is produced where a consequent stream
          receives several tributaries which in turn are fed by smaller tributaries.
          It indicates streams flowing across horizontal rock strata and homogenous
          soil typified by the landforms of soft sedimentary rocks, volcanic tuff,
          old dissected coastal plains, or complex crystalline rocks offering uniform
          resistance to erosion.
      deranged:
        description: A distinctively disordered drainage pattern of nonintegrated
          streams which indicates a complete lack of underlying structural and bedrock
          control, resulting from a relatively young landscape having a flat or undulating
          topographic surface and a high water table. It is characterized by relatively
          few, irregular streams with few, short tributaries, that flow into and out
          of depressions containing swamps, bogs, marshes, ponds, or lakes; interstream
          areas are swampy. Regional streams may meander through the area but do not
          influence its drainage. These drainage patterns commonly occur on young,
          thick till plains, end moraines, flood plains, and coastal plains.
      karst:
        description: A drainage pattern that lacks an integrated drainage system associated
          with soluble rocks with little or no surface drainage but a considerable
          underground, internal drainage system; characteristic of karst landscapes
          underlain by limestone, gypsum or salt.
      parallel:
        description: A drainage pattern in which the streams and their tributaries
          are regularly spaced and flow parallel or subparallel to one another and
          tributaries characteristically join the mainstream at approximately the
          same angle, over a considerable area. It is indicative of a region having
          a pronounced, uniform slope and a homogeneous lithology and rock structure,
          such as young coastal plains and large basalt flows.
      pinnate:
        description: A variation of the dendritic drainage pattern in which the main
          stream receives many closely spaced, subparallel tributaries that join it
          at slightly acute angles upstream, resembling in plan a feather. They typically
          form on steep slopes with soils that have a high silt content, such as loess
          landscapes or fine-textured flood plains.
      radial:
        description: A drainage pattern in which consequent streams radiate or diverge
          outward, like the spokes of a wheel from a high central area.; a major collector
          stream is usually found in a curvilinear alignment around the bottom of
          the elevated topographic feature. It is best developed on the slopes of
          a young domal structure, a volcanic cone, or isolated hills (erosional remnant).
      rectangular:
        description: A drainage pattern in which the tributaries join the main streams
          at right-angles, and exhibit sections of approximately the same length which
          form rectangular shapes; it is indicative of streams following prominent
          bedrock fault, joint, or foliation systems that break the rocks into rectangular
          blocks. It is more irregular than the trellis drainage pattern, as the side
          streams are not perfectly parallel and not necessarily as conspicuously
          elongated, and secondary tributaries need not be present. The stronger or
          more harsh the pattern, the thinner the soil cover. These patterns commonly
          form in slate, schist, and gneiss, in resistive sandstone in arid climates,
          or in sandstone in humid climates if little soil has developed.
      thermokarst:
        description: Drainage patterns that form polygonal and hexagonal shapes with
          streams that may connect rounded depressions, exhibiting a beaded appearance;
          developed in poorly drained, fine-grained sediments and in organic materials
          in regions of permafrost. Freezing causes many cracks to develop; thawing
          causes slumping, settlement, and depressions. This type of drainage pattern
          with its associated hexagons and beaded ponds indicates the existence or
          previous presence of permafrost conditions.
      trellis:
        description: A drainage pattern characterized by parallel main streams intersected
          at, or nearly at, right angles by their tributaries, which in turn are fed
          by elongated secondary tributaries and short gullies parallel to the main
          streams, resembling, in plan view, the stems of a vine on a trellis. This
          pattern indicates marked bedrock structural control rather than a type of
          bedrock and usually indicates in which the main parallel channels follow
          the strike of the beds. It is commonly developed where the beveled edges
          of alternating hard and soft rocks outcrop in parallel belts, as in titled,
          interbedded sedimentary rocks in a rejuvenated folded-mountain region or
          in a maturely dissected belted coastal plain of tilted strata.
    description: 'The arrangement of drainage channels on the land surface; also called
      drainage network. Reference: Field Book for Describing and Sampling Soils v
      3.0, Sep 2012'
  NASIS_dsp_site_type:
    name: NASIS_dsp_site_type
    title: Dsp Site Type
