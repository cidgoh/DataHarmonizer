  NASIS_ak_crown_class:
    name: NASIS_ak_crown_class
    title: Ak Crown Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=6
    permissible_values:
      codominant:
        description: Trees large-crowned at the general level of the forest canopy,
          receiving direct sunlight from above and partly from the sides. Crowns somewhat
          smaller than dominants but healthy and vigorous. From AK SITE 4.0.
      dominant:
        description: Trees with wide crowns above the level of the forest canopy,
          receiving sunlight from above and partly from the sides. From AK SITE 4.0.
      open grown:
        description: Trees generally growing in open without any nearby surrounding
          trees, receiving direct sunlight from above and the sides. From AK SITE
          4.0.
      relict:
        description: Usually either dominant or tall, open crown class trees that
          are signigicantly older than the main stand. From AK SITE 4.0.
      intermediate or suppressed:
        description: Trees overtopped by large trees and receiving no full, direct
          sunlight from above or the sides. From AK SITE 4.0.
      unknown: {}
    description: Added for NASIS 7.2. It is a system used to describe additional crown
      classes used specifically in Alaska. Originated in the AK SITE application.
      This domain is only used in Alaska.
