  NASIS_h2o2_30_percent:
    name: NASIS_h2o2_30_percent
    title: H2O2 30 Percent
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=260
    permissible_values:
      none:
        description: No sign of bubbles of any size.
      slight:
        description: A slight reaction would yield few very fine and fine (0.5-2 mm)
          sized gas bubbles.
      moderate:
        description: A moderate reaction would yield common very fine, fine, or medium
          (0.5-5 mm) sized gas bubbles.
      strong:
        description: A strong reaction would yield many fine to coarse (1-10 mm) sized
          gas bubbles.
      violent:
        description: A violent reaction would yield many very coarse (10 mm)sized
          gas bubbles.
    description: The purpose of this test is to determine the presences of reduced
      sulfides in subaqueous soils and any sulfuric acid potential if oxidized or
      exposed to air. Added for use in describing Subaqueous soils. Done in 7.4.1
  NASIS_harvest_skidding_method:
    name: NASIS_harvest_skidding_method
    title: Harvest Skidding Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=261
    permissible_values:
      hand falling and tractor skidding:
        description: rubber-tired or tracked
      hand falling and animal skidding:
        description: horse, mule, other
      hand falling and aerial skidding:
        description: full or partial suspension of logs
      mechanized falling and tractor skidding:
        description: feller-buncher or equivalent
      mechanized falling cut to length forwarder:
        description: logs fully suspended, ground-based
      unknown:
        description: unknown harvest method used
  NASIS_hgm_class:
    name: NASIS_hgm_class
    title: Hgm Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=262
    permissible_values:
      riverine:
        description: Riverine wetlands occur in flood plains and riparian corridors
          in association with stream channels. Dominant water sources are often overbank
          flow from the channel or subsurface hydraulic connections between the stream
          channel and wetlands. However, sources may be interflow and return flow
          from adjacent uplands, occasional overland flow from adjacent uplands, tributary
          inflow, and precipitation. At their headwater, RIVERINE wetlands often are
          replaced by SLOPE or DEPRESSIONAL wetlands where the channel morphology
          may disappear. They may intergrade with poorly drained flats or uplands.
          Perennial flow in the channel is not a requirement.
      depressional:
        description: Depressional wetlands occur in topographic depressions. Dominant
          water sources are precipitation, ground water discharge, and both interflow
          and overland flow from adjacent uplands. The direction of flow is normally
          from the surrounding uplands toward the center of the depression. Elevation
          contours are closed, thus allowing the accumulation of surface water. Depressional
          wetlands may have any combination of inlets and outlets or lack them completely.
          Dominant hydrodynamics are vertical fluctuations, primarily seasonal. Depressional
          wetlands may lose water through intermittent or perennial drainage from
          an outlet, by evapotranspiration and, if they are not receiving ground water
          discharge, may slowly contribute to ground water. Peat deposits may develop
          in depressional wetlands. Prairie potholes are a common example of depressional
          wetlands.
      slope:
        description: Slope wetlands normally are found where there is a discharge
          of ground water to the land surface. They normally occur on sloping land;
          elevation gradients may range from steep hillsides to slight slopes. Slope
          wetlands are usually incapable of depressional storage because they lack
          the necessary closed contours. Principal water sources are usually ground
          water return flow and interflow from surrounding uplands, as well as precipitation.
          Hydrodynamics are dominated by downslope unidirectional water flow. Slope
          wetlands can occur in nearly flat landscapes if ground water discharge is
          a dominant source to the wetland surface. Slope wetlands lose water primarily
          by saturation subsurface and surface flows and by evapotranspiration. SLOPE
          wetlands may develop channels, but the channels serve only to convey water
          away from the SLOPE wetland. Fens are a common example of slope wetlands.
      mineral soil flats:
        description: Mineral soils flats are most common on interfluves, extensive
          relic lake bottoms, or large historic flood plain terraces where the main
          source of water is precipitation. They receive no ground water discharge,
          which distinguishes them from DEPRESSIONAL and SLOPE wetlands. Dominant
          hydrodynamics are vertical fluctuations. Mineral soil flats lose water by
          evapotranspiration, saturation overland flow, and seepage to underlying
          ground water. They are distinguished from flat upland areas by their poor
          vertical drainage, often due to spodic horizons and hardpans, and low lateral
          drainage, usually due to low hydraulic gradients. Mineral soil flats that
          accumulate peat can eventually become the class ORGANIC SOIL FLATS. Pine
          flatwoods with hydric soils are a common example of MINERAL SOIL FLAT wetlands.
      organic soil flats:
        description: Organic soil flats , or extensive peatlands, differ from mineral
          soil flats , in part because their elevation and topography are controlled
          by vertical accretion of organic matter. They occur commonly on flat interfluves,
          but may also be located where depressions have become filled with peat to
          form a relatively large flat surface. Water source is dominated by precipitation,
          while water loss is by saturation overland flow and seepage to underlying
          ground water. Raised bogs share many of these characteristics, but may be
          considered a separate class because of their convex upward form and distinct
          edaphic conditions for plants. Portions of the Everglades and northern Minnesota
          peatlands are common examples of organic soil flat wetlands.
      estuarine fringe:
        description: Estuarine fringe wetlands occur along coasts and estuaries and
          are under the influence of sea level. They intergrade landward with Riverine
          wetlands where tidal currents diminish and riverflow becomes the dominant
          water source. Additional water sources may be ground water discharge and
          precipitation. The interface between the estuarine fringe and Riverine classes
          is where bidirectional flows from tides dominate over unidirectional ones
          controlled by flood plain slope of Riverine wetlands. Because estuarine
          fringe wetlands frequently flood and water table elevations are controlled
          mainly by sea surface elevation, estuarine fringe wetlands seldom dry for
          significant periods. estuarine fringe wetlands lose water by tidal exchange,
          by saturated overland flow to tidal creek channels, and by evapotranspiration.
          Organic matter normally accumulates in higher elevation marsh areas where
          flooding is less frequent and the wetlands are isolated from shoreline wave
          erosion by intervening areas of low marsh. Spartina alterniflora salt marshes
          are common examples of estuarine fringe wetlands.
      lacustrine fringe:
        description: Lacustrine fringe wetlands are adjacent to lakes where the water
          elevation of the lake maintains the water table in the wetland. In some
          cases, these wetlands consist of a floating mat attached to land. Additional
          sources of water are precipitation and ground water discharge, the latter
          dominating where lacustrine fringe wetlands intergrade with uplands or SLOPE
          wetlands. Surface water flow is bidirectional, usually controlled by water-level
          fluctuations such as seiches in the adjoining lake. Lacustrine fringe wetlands
          are indistinguishable from depressional wetlands where the size of the lake
          becomes so small relative to fringe wetlands that the lake is incapable
          of stabilizing water tables. Lacustrine fringe wetlands lose water by flow
          returning to the lake after flooding, by saturation surface flow, and by
          evapotranspiration. Organic matter normally accumulates in areas sufficiently
          protected from shoreline wave erosion. Unimpounded marshes bordering the
          Great Lakes are a common example of lacustrine fringe wetlands.
    description: 'The major classes of the Hydrogeomorphic Wetland Classification
      System. Reference: Hydrogeomorphic Wetland Classification System: An Overview
      and Modification to Better Meet the Needs of the Natural Resources Conservation
      Service Technical Note No. 190-8-76'
  NASIS_hillslope_profile:
    name: NASIS_hillslope_profile
    title: Hillslope Profile
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=264
    permissible_values:
      summit:
        description: The topographically highest hillslope position of a hillslope
          profile and exhibiting a nearly level (planar or only slightly convex) surface.
      shoulder:
        description: The hillslope position that forms the uppermost inclined surface
          near the top of a hillslope. If present, it comprises the transition zone
          from backslope to summit. The surface is dominantly convex in profile and
          erosional in origin.
      backslope:
        description: The hillslope profile position that forms the steepest and generally
          linear, middle portion of the slope. In profile, backslopes are commonly
          bounded by a convex shoulder above and a concave footslope below. They may
          or may not include cliff segments (i.e. free faces). Backslopes are commonly
          erosional forms produced by mass movement, colluvial action, and running
          water.
      footslope:
        description: The hillslope position that forms the inner, gently inclined
          surface at the base of a hillslope. In profile, footslopes are commonly
          concave. It is a transition zone between upslope sites of erosion and transport
          (shoulder, backslope) and downslope sites of deposition (toeslope).
      toeslope:
        description: The hillslope position that forms the gently inclined surface
          at the base of a hillslope. Toeslopes in profile are commonly gentle and
          linear, and are constructional surfaces forming the lower part of a hill-slope
          continuum that grades to valley or closed- depression floors.
    description: The two dimensional slope segments of a hillslope that have similar
      geometric, erosional, or depositional characteristics.
  NASIS_horizon_feature_kind:
    name: NASIS_horizon_feature_kind
    title: Horizon Feature Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=265
    permissible_values:
      argillic tongues:
        title: Tongues
        description: of argillic material Tongues of argillic material Small areas
          or lobes of argillic material that dip down (interfinger) more than 5 cm
          into nonargillic material. Reference the Field Book for Describing and Sampling
          Soils, Schoeneberger, et al, 2012.
      albic tongues:
        title: Tongues
        description: of albic material Tongues of albic material Small areas or lobes
          of albic material that dip down (interfinger) more than 5 cm into nonalbic
          material. Reference the Field Book for Describing and Sampling Soils, Schoeneberger,
          et al, 2012.
      krotovinas:
        description: Filled faunal burrows.
      lamina:
        description: The thinnest recognizable layer (commonly < 1 cm thick) of original
          deposition in a sediment or sedimentary rock, differing from other layers
          in color, composition, or particle size. Several laminae constitute a bed.
      hydrophobic layer:
        description: Either a surface or subsurface layer that repels water (e.g.
          dry organic materials, scorch layers in chapparell, etc.).
      stone line:
        description: A concentration of rock fragments resulting from erosional lag.
      ice wedge cast:
        description: A vertical, often trans-horizon, wedge-shaped or irregular form
          caused by infilling of a cavity resulting from the melting of an ice wedge;
          commonly stratified.
      lamellae:
        description: Thin (e.g., > 0.5 cm), pedogenically formed plates or intermittant
          layers. Reference the Field Book for Describing and Sampling Soils, Schoeneberger,
          et al, 2012.
      ice:
        description: Water in solid state.
      percent ironstone nodules:
        status: obsolete
      percent plinthite:
        status: obsolete
      percent of profile occupied by this horizon:
        status: obsolete
      percent of pedon occupied by this horizon:
        title: Percent of the pedon occupied by this horizon
        status: obsolete
    description: 'The special type of soil feature found in a horizon. Reference:
      Field Book for Describing and Sampling Soils v 3.0, Sep 2012 (Special Features).'
  NASIS_horizon_type:
    name: NASIS_horizon_type
    title: Horizon Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=266
    permissible_values:
      dry organic:
        description: Typically a thin surface layer of non-saturated organic soil
          material, sometimes referred to as duff layers, commonly occurs in forested
          soils. These horizons have a representative horizon texture group containing
          the terms spm, mpm, or hpm. They exclude all horizons from components in
          the Histosols order, those containing the folis or histic terms in the taxonomic
          subgroup, those containing the histels term in the taxonomic suborder, or
          those containing the histoturbels term in the taxonomic great group. Soil
          Survey Staff. 2022. Keys to Soil Taxonomy, 13th ed. USDA-Natural Resources
          Conservation Service.
      other:
        description: Horizon is derived from something other than dry organic materials.
          This is not limited to, but includes saturated organic materials, mineral
          soil materials, rock, water, ice, etc...
    description: Identifies if the horizon is an unsaturated non-folistic organic
      layer.
