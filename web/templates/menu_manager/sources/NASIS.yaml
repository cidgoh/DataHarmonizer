  NASIS_reference_yield_rank:
    name: NASIS_reference_yield_rank
    title: Reference Yield Rank
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=451
    permissible_values:
      '1':
        description: Reference quadrat 1 is located in a low-yielding area which represents
          the low-yielding situations commonly encountered on the site (avoid bare
          or nearly bare quadrats).
      '2':
        description: Reference quadrat 2 is located in an area which represents the
          midpoint between Reference 1 and Reference 3.
      '3':
        description: Reference quadrat 3 is located in an area which represents the
          midpoint between Reference 1 and Reference 5.
      '4':
        description: Reference quadrat 4 is located in an area which represents the
          midpoint between Reference 3 and Reference 5.
      '5':
        description: Reference quadrat 5 is located in a high-yielding area which
          represents the high- yielding situations commonly encountered on the site,
          excluding unusually dense patches of vegetation which would have a rare
          chance of being sampled.
  NASIS_report_format:
    name: NASIS_report_format
    title: Report Format
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=452
    permissible_values:
      html: {}
      txt: {}
      xml: {}
    description: The format in which a NASIS report is delivered to the user. HTML,
      Text, or XML.
  NASIS_reproduction_abundance_class:
    name: NASIS_reproduction_abundance_class
    title: Reproduction Abundance Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=453
    permissible_values:
      none:
        description: No reproduction occurring.
      light:
        description: An occasional sprout or seedling. More than 20 feet apart.
      medium:
        description: Sprouts or seedlings 6 to 20 feet apart.
      heavy:
        description: Sprouts or seedlings 5 feet or less apart.
  NASIS_reproduction_source:
    name: NASIS_reproduction_source
    title: Reproduction Source
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=454
    permissible_values:
      coppice:
        description: Regeneration by sprouting from roots or suckers of a previous
          tree that was cut or otherwise removed.
      direct seeded:
        description: Regeneration is the result of seeds being placed in the soil
          by human hands or mechanical means.
      planted:
        description: Regeneration by planting of seedlings or saplings.
      naturally seeded:
        description: Regeneration is the result of seeds being produced by nearby
          plants and seeds falling in place, or moved by wind or animals.
  NASIS_resource_retention_class:
    name: NASIS_resource_retention_class
    title: Resource Retention Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=455
    permissible_values:
      class 1:
        description: Interconnected persistent plant cover or dense bunchgrasses and
          surrounding round interpatch areas <30cm.
      class 2:
        description: Persistent plants interconnected and surrounding round/oval interpatch
          areas >30 cm.
      class 3:
        description: Persistent plant patches fragmented by elongated interpatch areas
          that are bounded in the plot.
      class 4:
        description: Persistent plant patches fragmented by elongated interpatch areas
          that cross through the plot.
      class 5:
        description: Interpatch areas interconnected and crossing the plot in several
          directions; isolated persistent plant patches.
      class 6:
        description: Interpatch areas interconnected; scattered or no persistent plants.
    description: 'Resource retention is a measure of patch structure that relates
      to the potential for erosion and resource redistribution as controlled by vegetation.
      It also provides a description of the grass fragmentation pattern. The classes
      can be applied to vegetation fragmentation in plant communities dominated by
      shrubs and trees, but plot size and bare ground sizes may need to be adjusted.
      Reference: Soil Change Guide: Procedures for Soil Survey and Resource Inventory
      v 1.1'
  NASIS_restriction_kind:
    name: NASIS_restriction_kind
    title: Restriction Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=456
    permissible_values:
      abrupt textural change:
        description: This term is NOT the same as the identically named soil characteristic
          defined in Soil Taxonomy. It is characterized by an increase of 20 percent
          or more clay content (absolute) within a vertical distance of 7.5 cm or
          less. The increase in clay content can occur anywhere in the soil profile.
          It is root restrictive.
      petrocalcic: {}
      densic material:
        description: Material underlying a densic contact as defined in Soil Taxonomy.
          The material is virtually continuous within the limits of a pedon. Cracks
          that can be penetrated by roots are 10 cm or more apart. The material is
          relatively unaltered and has a noncemented rupture resistance class. Commonly,
          the material is earthy material such as till, volcanic mudflows, and mechanically
          compacted materials, but noncemented rocks can be densic materials if they
          are dense or resistance enough to keep roots from entering, except in cracks.
      duripan: {}
      petroferric: {}
      fragipan: {}
      petrogypsic: {}
      permafrost: {}
      plinthite: {}
      bedrock, lithic:
        title: Lithic bedrock
        description: Material underlying a Lithic Contact as defined in Soil Taxonomy.
          The material is virtually continuous within the limits of a pedon. Cracks
          that can be penetrated by roots are 10 cm or more apart. When moist, hand
          digging with a spade is impractical although the material may be chipped
          or scratched. Rupture resistance class is at least strongly cemented. Commonly,
          the material is indurated.
      natric: {}
      ortstein: {}
      bedrock, paralithic:
        title: Paralithic bedrock
        description: Material underlying a Paralithic Contact as defined in Soil Taxonomy.
          The material is virtually continuous within the limits of a pedon. Cracks
          that can be penetrated by roots are 10 cm or more apart. Rupture resistance
          is extremely weakly cemented to moderately cemented. Commonly, the material
          is partially weathered bedrock or weakly consolidated bedrock such as sandstone,
          siltstone or shale.
      placic: {}
      salic: {}
      strongly contrasting textural stratification:
        description: '1) The same as "strongly contrasting particle-size classes"
          described in the Keys to Soil Taxonomy except that the thickness requirement
          of 12.5 cm or more for each of the contrasting particle-size classes is
          waived. The term is applied to the entire soil profile not just the particle-size
          control section. In the context of how it is to be used for identifying
          a kind of restriction, it is root restrictive. 2) Stratified soil textures
          that differ significantly enough as to restrict the movement of water and
          air through the soil, or that provide an unfavorable root environment. It
          is in all cases root restrictive.'
      sulfuric: {}
      bedrock, densic:
        title: Densic bedrock
        description: 'This is composed of non-cemented material that is commonly or
          locally referred to as "bedrock". It meets the criteria of "densic materials"
          as defined in Soil Taxonomy.'
      cemented horizon:
        description: Cemented earthy material that does not meet the criteria for
          any other specificly defined types. This material does not slake in water.
      manufactured layer:
        description: An artificial, root-limiting layer beneath the soil surface consisting
          of nearly continuous, human-manufactured materials whose purpose is to form
          an impervious barrier. The materials used to make the layer impervious include
          geotextile liners, asphalt, concrete, rubber, and plastic.
      undefined:
        status: obsolete
    description: 'Identify any root-limiting/restrictive layers within the soil profile.
      Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_rhi_annual_production:
    name: NASIS_rhi_annual_production
    title: Rhi Annual Production
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=458
    permissible_values:
      none to slight:
        description: Exceeds 80% of potential production.
      slight to moderate:
        description: 60 to 80% of potential production
      moderate:
        description: 40 to 60% of potential production.
      moderate to extreme:
        description: 20 to 40% of potential production.
      extreme to total:
        description: Less than 20% of potential production.
  NASIS_rhi_bare_ground:
    name: NASIS_rhi_bare_ground
    title: Rhi Bare Ground
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=459
    permissible_values:
      none to slight:
        description: Amount and size of bare areas nearly totally match that expected
          for the site.
      slight to moderate:
        description: Slightly to moderately higher than expected for the site. Bare
          areas are small and rarely connected.
      moderate:
        description: Moderately higher than expected for the site. Bare areas are
          of moderate size and sporadically connected.
      moderate to extreme:
        description: Moderately to much higher than expected for the site. Bare areas
          are large and occasionally connected.
      extreme to total:
        description: Much higher than expected for the site. Bare areas are large
          and generally connected.
  NASIS_rhi_compaction_layer:
    name: NASIS_rhi_compaction_layer
    title: Rhi Compaction Layer
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=460
    permissible_values:
      none to slight:
        description: None to minimal; not restrictive to water movement and root penetration.
      slight to moderate:
        description: Rarely present or is thin and weakly restrictive to water movement
          and root penetration.
      moderate:
        description: Moderately wide-spread; moderately restricts water movement and
          root penetration.
      moderate to extreme:
        description: Widespread; greatly restricts water movement and root penetration.
      extreme to total:
        description: Extensive; severely restricts water movement and root penetration.
  NASIS_rhi_erosion_resistance:
    name: NASIS_rhi_erosion_resistance
    title: Rhi Erosion Resistance
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=461
    permissible_values:
      none to slight:
        description: Matches that expected for the site. Surface soil is stabilized
          by organic matter decomposition products and/or a biological crust.
      slight to moderate:
        description: Some reduction in soil surface stability in plant interspaces
          or slight reduction throughout the site. Stabilizing agents reduced below
          expected.
      moderate:
        description: Significantly reduced in at least half of the plant canopy interspaces,
          or moderately reduced throughout the site.
      moderate to extreme:
        description: Significantly reduced in most plant canopy interspaces and moderately
          reduced beneath plant canopies. Stabilizing agents present only in isolated
          patches.
      extreme to total:
        description: Extremely reduced throughout the site. Biological stabilization
          agents including organic matter and biological crusts virtually absent.
  NASIS_rhi_functional_struct_groups:
    name: NASIS_rhi_functional_struct_groups
    title: Rhi Functional Struct Groups
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=462
    permissible_values:
      none to slight:
        description: F/S groups and number of species in each group closely match
          that expected for the site.
      slight to moderate:
        description: Number of F/S groups slightly reduced; and/or relative dominance
          of F/S groups has been modified from that expected for the site; and/or
          number of species within F/S groups slightly reduced.
      moderate:
        description: Number of F/S groups moderately reduced; and/or one or more sub-dominant
          F/S groups replaced by F/S groups not expected for the site; and/or number
          of species within F/S groups moderately reduced.
      moderate to extreme:
        description: Number of F/S groups reduced; and/or one dominant group and/or
          one or more sub- dominant groups replaced by F/S groups not expected for
          the site; and/or number of species within F/S groups significantly reduced.
      extreme to total:
        description: Number of F/S groups greatly reduced; and/or relative dominance
          of F/S groups has been dramatically altered; and/or number of species within
          F/S groups dramatically reduced.
  NASIS_rhi_gullies:
    name: NASIS_rhi_gullies
    title: Rhi Gullies
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=463
    permissible_values:
      none to slight:
        description: Drainages are represented as natural stable channels; no signs
          of erosion with vegetation common.
      slight to moderate:
        description: Uncommon with vegetation stabilizing the bed and slopes; no signs
          of active headcuts, nickpoints, or bed erosion.
      moderate:
        description: Moderate in number with indications of active erosion; vegetation
          is intermittent on slopes and/or bed. Occasional headcuts may be present.
      moderate to extreme:
        description: Moderate to common with indications of active erosion; vegetation
          is intermittent on slopes and/or bed. Headcuts are active; down-cutting
          is not apparent.
      extreme to total:
        description: Common with indications of active erosion and down-cutting; vegetation
          is infrequent on slopes and/or bed. Nickpoints and headcuts are numerous
          and active.
  NASIS_rhi_infiltration_runoff:
    name: NASIS_rhi_infiltration_runoff
    title: Rhi Infiltration Runoff
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=464
    permissible_values:
      none to slight:
        description: Infiltration and run-off are equal to that expected for the site.
          Plant cover (distribution and amount) adequate for site protection.
      slight to moderate:
        description: Infiltration is slightly to moderately affected by minor changes
          in plant community composition and/or distribution. Plant cover changes
          have only a minor effect on infiltration.
      moderate:
        description: Infiltration is moderately reduced due to adverse changes in
          plant community composition and/or distribution. Plant cover changes negatively
          affect infiltration.
      moderate to extreme:
        description: Infiltration is greatly decreased due to adverse changes in plant
          community composition and/or distribution. Detrimental plant cover changes
          have occurred.
      extreme to total:
        description: Infiltration is severely decreased due to adverse changes in
          plant community composition and/or distribution. Adverse plant cover changes
          have occurred.
  NASIS_rhi_invasive_plants:
    name: NASIS_rhi_invasive_plants
    title: Rhi Invasive Plants
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=465
    permissible_values:
      none to slight:
        description: Rarely present on the site.
      slight to moderate:
        description: Present primarily on disturbed areas pf the site.
      moderate:
        description: Scattered through-out the site.
      moderate to extreme:
        description: Common through-out the site.
      extreme to total:
        description: Dominate the site.
  NASIS_rhi_litter_amount:
    name: NASIS_rhi_litter_amount
    title: Rhi Litter Amount
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=466
    permissible_values:
      none to slight:
        description: Amount is what is expected for the site potential and weather.
      slight to moderate:
        description: Slightly more or less relative to site potential and weather.
      moderate:
        description: Moderately more or less relative to site potential and weather.
      moderate to extreme:
        description: Greatly reduced or increased relative to site potential and weather.
      extreme to total:
        description: Largely absent or dominant relative to site potential and weather.
  NASIS_rhi_litter_movement:
    name: NASIS_rhi_litter_movement
    title: Rhi Litter Movement
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=467
    permissible_values:
      none to slight:
        description: Matches that expected for the site with a fairly uniform distribution
          of litter.
      slight to moderate:
        description: Slightly to moderately more than expected for the site with only
          small size classes of litter being displaced.
      moderate:
        description: Moderate to small size classes of litter have been displaced.
          Moderate movement of smaller size classes in scattered concentrations around
          obstructions and in depressions.
      moderate to extreme:
        description: Moderate to extreme; loosely concentrated near obstructions.
      extreme to total:
        description: Extreme; concentrated around obstructions. Most size classes
          of litter have been displaced.
  NASIS_rhi_pedestals_terracettes:
    name: NASIS_rhi_pedestals_terracettes
    title: Rhi Pedestals Terracettes
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=468
    permissible_values:
      none to slight:
        description: Current or past evidence of pedestalled plants or rocks as expected
          for the site. Terracettes absent or uncommon.
      slight to moderate:
        description: Active pedestalling or terracette formation is rare; some evidence
          of past pedestal formation, especially in water-flow patterns and/or on
          exposed slopes.
      moderate:
        description: Slight active pedestalling; most pedestals are in flow paths
          and interspaces and/or on exposed slopes. Occasional terracettes present.
      moderate to extreme:
        description: Moderate active pedestalling; terra-cettes common. Some rocks
          and plants are pedestalled with occasional exposed roots.
      extreme to total:
        description: Abundant active pedestalling and numerous terracettes. Many rocks
          and plants are pedestalled; exposed plant roots are common.
  NASIS_rhi_plant_mortality:
    name: NASIS_rhi_plant_mortality
    title: Rhi Plant Mortality
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=469
    permissible_values:
      none to slight:
        description: Plant mortality and decadence matches that expected for the site.
      slight to moderate:
        description: Slight plant mortality and/or decadence.
      moderate:
        description: Some dead and/or decadent plants are present.
      moderate to extreme:
        description: Dead and/or decadent plants are somewhat common.
      extreme to total:
        description: Dead and/or decadent plants are common.
  NASIS_rhi_reproductive_capability:
    name: NASIS_rhi_reproductive_capability
    title: Rhi Reproductive Capability
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=470
    permissible_values:
      none to slight:
        description: Capability to produce seed or vegetative tillers is not limited
          relative to recent climatic conditions.
      slight to moderate:
        description: Capability to produce seed or vegetative tillers is only slightly
          limited relative to recent climatic conditions.
      moderate:
        description: Capability to produce seed or vegetative tillers is somewhat
          limited relative to recent climatic conditions.
      moderate to extreme:
        description: Capability to produce seed or vegetative tillers is greatly reduced
          relative to recent climatic conditions.
      extreme to total:
        description: Capability to produce seed or vegetative tillers is severely
          reduced relative to recent climatic conditions.
  NASIS_rhi_rills:
    name: NASIS_rhi_rills
    title: Rhi Rills
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=471
    permissible_values:
      none to slight:
        description: Current or past formation or rills as expected for the site.
      slight to moderate:
        description: No recent formation of rills; old rills have blunted or muted
          features.
      moderate:
        description: Active rill formation is slight at infrequent intervals, mostly
          in exposed areas.
      moderate to extreme:
        description: Rill formation is moderately active and well defined throughout
          most of the area.
      extreme to total:
        description: Rill formation is severe and well defined throughout most of
          the area.
  NASIS_rhi_soil_surf_degradation:
    name: NASIS_rhi_soil_surf_degradation
    title: Rhi Soil Surf Degradation
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=472
    permissible_values:
      none to slight:
        description: Soil surface horizon intact. Soil structure and organic matter
          content match that expected for the site.
      slight to moderate:
        description: Some soil loss has occurred and/or soil structure shows signs
          of degradation, especially in plant interspaces.
      moderate:
        description: Moderate soil loss or degradation in plant interspaces with some
          degradation beneath plant canopies. Soil structure is degraded and soil
          organic matter content is significantly reduced.
      moderate to extreme:
        description: Soil loss or degradation severe throughout site. Minimal differences
          in soil organic matter content and structure of surface and subsurface layers.
      extreme to total:
        description: Soil surface horizon absent. Soil structure near surface is similar
          to or more degraded than that in subsurface horizons. No distin-guishable
          difference in subsurface organic matter content.
  NASIS_rhi_summary:
    name: NASIS_rhi_summary
    title: Rhi Summary
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=473
    permissible_values:
      none to slight: {}
      slight to moderate: {}
      moderate: {}
      moderate to extreme: {}
      extreme to total: {}
  NASIS_rhi_water_flow_patterns:
    name: NASIS_rhi_water_flow_patterns
    title: Rhi Water Flow Patterns
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=474
    permissible_values:
      none to slight:
        description: Matches what is expected for the site; minimal evidence of past
          or current soil deposition or erosion.
      slight to moderate:
        description: Matches what is expected for the site; some evidence of minor
          erosion. Flow patterns are stable and short.
      moderate:
        description: Nearly matches what is expected for the site; erosion is minor
          with some instability and deposition.
      moderate to extreme:
        description: More numerous than expected; deposition and cut areas common;
          occasionally connected.
      extreme to total:
        description: Extensive and numerous; unstable with active erosion; usually
          connected.
  NASIS_rhi_wind_scour_areas:
    name: NASIS_rhi_wind_scour_areas
    title: Rhi Wind Scour Areas
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=475
    permissible_values:
      none to slight:
        description: Matches what is expected for the site.
      slight to moderate:
        description: Infrequent and few.
      moderate:
        description: Occasionally present.
      moderate to extreme:
        description: Commonly present
      extreme to total:
        description: Extensive
  NASIS_ring_configuration:
    name: NASIS_ring_configuration
    title: Ring Configuration
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=476
    permissible_values:
      single ring: {}
      double ring: {}
    description: The ring setup used in some soil water/moisture measuring methods.
      Either a single ring or a double ring.
  NASIS_root_quantity_class:
    name: NASIS_root_quantity_class
    title: Root Quantity Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=477
    permissible_values:
      few:
        description: (less than 1) Less than 1 per unit area.
      common:
        description: (1 to 4) 1 to 4 per unit area.
      many:
        description: (5 or more) 5 or more per unit area.
      very few:
        description: (less than 0.2) Less than 0.2 per unit area.
      moderately few:
        description: (0.2 to less than 1) Equal to or more than 0.2 to less than 1.0
          per unit area.
    description: 'The number of roots, as a class, per unit area. Reference: Field
      Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_roots_location:
    name: NASIS_roots_location
    title: Roots Location
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=478
    permissible_values:
      in cracks: {}
      top of horizon:
        title: In mat at top of horizon
      between peds: {}
      around fragments:
        title: Matted around rock fragments
      throughout: {}
    description: 'Identify where roots occur. Note: Describing a root mat at the top
      of a horizon rather than at the bottom or within the horizon flags the horizon
      that restricts root growth. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
