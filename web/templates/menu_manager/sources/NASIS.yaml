      block lava:
        description: fragments Lava having a surface of angular blocks; it is similar
          to `a`a lava but the fragments are larger and more regular in shape, somewhat
          smoother, and less vesicular. Compare - `a`a lava, pahoehoe lava, pillow
          lava.
      pillow lava:
        description: fragments A general term for lava displaying pillow structure
          (discontinuous, close-fitting, bun- shaped or ellipsoidal masses, generally
          < 1 m in diameter); considered to have formed in a subaqueous environment;
          such lava is usually basaltic or andesitic. Compare - `a`a lava, block lava,
          pahoehoe lava.
      volcanic, unspecified:
        title: Volcanic rock fragments
      sandstone, glauconitic:
        title: Glauconitic sandstone fragments
      tripoli:
        description: fragments A light-colored, porous, friable, siliceous (largely
          chalcedonic) sedimentary rock, which occurs in powdery or earthy masses
          that result from the weathering of siliceous limestone. It has a harsh,
          rough feel and is used to polish metals and stones.
      gneiss, hornblende:
        title: Hornblende gneiss fragments
      metasiltstone:
        description: fragments
      gneiss, migmatitic:
        title: Migmatitic gneiss fragments
      gneiss, muscovite-biotite:
        title: Muscovite-biotite gneiss fragments
      schist, graphitic:
        title: Graphitic schist fragments
      slate, sulfidic:
        title: Sulfidic slate fragments
      gneiss, biotite:
        title: Biotite gneiss fragments
      gneiss, granodioritic:
        title: Granodioritic gneiss fragments
      granitoid:
        description: fragments a) In the IUGS classification, a preliminary term for
          (for field use) for a plutonic rock with Q (quartz) between 20 and 40 (%).
          b) A general term for all phaneritic igneous rocks (mineral crystals visible
          unaided and all about the same size) dominated by quartz and feldspars.
      bauxite:
        description: fragments An off-white to dark red brown weathered detritus or
          rock composed of aluminum oxides (mainly gibbsite with some boehmite and
          diaspore), iron hydroxides, silica, silt, and especially clay minerals.
          Bauxite originates in tropical and subtropical environments as highly weathered
          residue from carbonate or silicate rocks and can occur in concretionary,
          earthy, pisolitic or oolitic forms. SW & GG
      limestone, coral:
        title: Coral limestone
        description: fragments An informal term for massive limestone composed primarily
          of coral and coral fragments commonly associated with marine islands or
          coral reefs in tropical or subtropical waters. Compare - coral island. SW
      anhydrite, rock:
        title: Rock anhydrite
        description: fragments A sedimentary rock (evaporite) composed chiefly of
          mineral anhydrite (anhydrous CaSO4); The rock is generally massive, cryptocrystalline,
          and may exhibit rhythmic sedimentation (rhymites). Compare - rock gypsum,
          rock halite. SW
      halite, rock:
        title: Rock halite
        description: fragments A sedimentary rock (evaporite) composed primarily of
          halite (NaCl). SW
      lignite:
        description: fragments A brownish-black carbon-rich deposit that is a metamorphic
          intermediate between peat and sub-bituminous coal . Dry lignite typically
          contains 60-70 % carbon. SW & GG
      novaculite:
        description: A dense, extremely finely grained, even-textured, siliceous,
          sedimentary rock similar to chert. It is hard, white to grayish-black in
          color, translucent on thin edges, has a dull to waxy luster, and displays
          smooth conchoidal fracture when broken. Novaculite principally occurs in
          the Marathon Uplift of Texas and Ouachita Mountains of Arkansas and Oklahoma
          where it forms erosion resistant ridges. Novaculite appears to form from
          chert recrystallization with microcrystalline quartz dominant over cryptocrystalline
          chalcedony. At the Ouachita Mountains type occurrence, novaculite formed
          by low- grade, thermal metamorphism of bedded chert. Novaculite is commercially
          quarried as a whetstone or oilstone. Compare - chert. GG & SW
      siltite:
        description: fragments A compact, weakly metamorphosed rock formed by alteration
          of siltstone, mudstone, or silty shale. Siltite is more indurated than mudstone
          or shale and lacks either shale fissility or slate-like cleavage. Siltite
          differs from argillite in that silt-size grains (0.002 to 0.062 mm) rather
          than clay-size (<0.002 mm) dominate the matrix. Siltite differs from siltstone,
          mudstone, or shale in that it exhibits very low to low grade metamorphic
          or diagenetic layer silicate and feldspar alteration to sericite, chlorite,
          and albite (subgreenschist to greenschist metamorphic facies) (Maxwell,
          1973; Kidder, 1987).
      schist, biotite:
        title: Biotite schist
        description: fragments A strongly foliated crystalline rock formed by dynamic
          metamorphism that has well- developed parallelism of more than 50 percent
          of the minerals present, primarily biotite.
      schist, muscovite:
        title: Muscovite schist
        description: fragments A strongly foliated crystalline rock formed by dynamic
          metamorphism that has well- developed parallelism of more than 50 percent
          of the minerals present, primarily muscovite.
      mica:
        description: fragments A group of monoclinic phyllosilicate minerals with
          perfect basal cleavage that splits into thin elastic laminae and range from
          colorless to black. Large crystals of mica are referred to as a mica book.
      limonite:
        description: "A general 'field' term for various brown to yellowish brown,\
          \ amorphous- to- cryptocrystalline hydrous ferric oxides that are an undetermined\
          \ mixture of goethite, hematite, and lepidocrocite formed by weathering\
          \ and iron oxidation from iron-bearing, rocks and minerals. SW & GG"
      schist, sericite:
        title: Sericite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily sericite. A fine-grained muscovite
      gypsum crystals:
        title: Gypsum crystal fragments
      fanglomerate:
        description: fragments
      diatomite fragments:
        description: A light-colored, soft, siliceous sedimentary rock (generally
          consolidated) consisting chiefly of opaline diatom frustules deposited in
          a lacustrine or marine environment. Diatomite has a number of uses owing
          to its high surface area, absorptive capacity, and relative chemical stability
          but the term is generally reserved for deposits of actual or potential commercial
          value.
