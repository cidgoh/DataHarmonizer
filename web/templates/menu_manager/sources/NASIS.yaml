      pre-plant tillage deeper than 4 inches:
        description: A system with deep pre-plant tillage.
      post-harvest tillage deeper than 4 inches:
        description: A system that does not include deep pre-plant tillage but does
          include deep post- harvest tillage.
      both pre-plant and post- harvest tillage:
        title: Both Pre-Plant and
        description: Post-Harvest Tillage A system that includes both deep pre-plant
          tillage and deep post-harvest tillage.
      continuous no till:
        description: No tillage for the duration of the rotation.
      conservation tillage:
        description: A conservation tillage system including ridge till, strip till,
          and mulch till
      conventional tillage:
        description: no tillage for the duration of the rotation
      unknown: {}
