    description: The direction from the equator to a point on the ground. N or S
  NASIS_layer_type:
    name: NASIS_layer_type
    title: Layer Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=315
    permissible_values:
      horizon:
        description: The layer represents a morphological soil horizon.
      reporting layer:
        description: The layer represents some segment of the soil profile other than
          a whole morphological soil horizon, e.g. a portion of a morphological horizon.
      true layer:
        description: A layer which may or may not be a diagnostic horizon. The LIMS
          only requires that the true layer have depths.
        status: obsolete
    description: Restricted to either a horizon or a reporting layer. i.e. horizons
      grouped into a single layer for laboratory analysis.
  NASIS_legend_certification_status:
    name: NASIS_legend_certification_status
    title: Legend Certification Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=316
    permissible_values:
      not for distribution:
        description: Data in the legend object, including some mapunits, correlation
          notes, or area overlaps, have been created but are not fully populated or
          the data are preliminary and incomplete. The data are subject to major changes.
          A legend with this status should not be interpreted, exported, or used by
          other applications. Note that this certification status applies to only
          the legend object.
      not certified:
        description: The data in the legend object, including mapunits, correlation
          notes, and area overlaps, have been created and have been appropriately
          populated, but data have not been reviewed or certified. These are advance
          data, subject to change. Note that this certification status applies to
          only the legend object.
      partly certified:
        description: The data in the legend object, including mapunits, correlation
          notes, and area overlaps, have been appropriately populated and the data
          have been reviewed. At least some of the data elements have been certified
          for use in specific applications. Other data elements in the object have
          advance data, subject to change. Note that this certification status applies
          to only the legend object.
      certified:
        description: The data in the legend object, including mapunits, correlation
          notes, and area overlaps, have been appropriately populated, reviewed, and
          certified for general use. Note, that this certification status applies
          to only the legend object.
    description: Indicates the degreee to which an object is ready to be used for
      its intended purpose.
  NASIS_legend_land_category:
    name: NASIS_legend_land_category
    title: Legend Land Category
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=317
    permissible_values:
      native american land:
        description: Non-federal acres of tribal owned or Indian Trust land in the
          soil survey area. This category includes Alaska Native Lands and Hawaiian
          Homelands.
      bureau of land management:
        description: Federal acres in the soil survey area administered by the Bureau
          of Land Management.
      census water:
        description: Bodies of water larger than 40 acres, and perennial streams wider
          than 1/8 mile.
      u.s. forest service:
        description: Federal acres in the soil survey area administered by the U.
          S. Forest Service.
      national park service:
        description: Federal acres in the soil survey area administered by the National
          Park Service.
      other non-federal land:
        description: Non-federal acres in the soil survey area, other than Native
          American Land.
      other federal land:
        description: All federal acres in the soil survey area not covered by specific
          categories. This includes military reservations, national refuges, etc.
    description: A generalized class of land ownership with the exception of Census
      Water (water bodies greater than 40 acres in size are their own land kind no
      matter the ownership).
  NASIS_legend_mapunit_text_kind:
    name: NASIS_legend_mapunit_text_kind
    title: Legend Mapunit Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=318
    permissible_values:
      edit notes:
        description: Text entries that describe what changes were made to the data
          and why those changes were made.
      certification statements:
        description: Text entries related to certification of this legend. For example,
          statements of prior survey and legend-wide join statements.
      correlation notes:
        description: Text entries related to correlation concerns that affect the
          entire legend.
      miscellaneous notes:
        description: Text entries not relate to any of the other choices.
    description: The kind of text note used to record additional information about
      the legend mapunit in the aggregated data.
  NASIS_legend_suitability_for_use:
    name: NASIS_legend_suitability_for_use
    title: Legend Suitability For Use
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=319
    permissible_values:
      not current:
        description: The legend has been completely replaced by another legend for
          the survey area. Typically this legend has an out-of-date operational soil
          survey status and another survey legend completely covers the geographic
          area served by this legend.
      current for part of area:
        description: The legend is up-to-date for only part of the geographic area
          it covers. Another legend is up-to-date for the remaining area. Typically
          occurs where an update survey is on- going in a survey area or where a more
          recent survey covers part of the geographic area.
      current wherever mapped:
        description: The legend is up-to-date wherever it has been mapped in the survey
          area. If the survey area is completely mapped, the legend applies over the
          entire geographic area. If the mapping is on-going, the legend is up-to-date
          where mapping has been completed.
    description: Defines the classes of suitability or geographic extent to which
      a legend may be applied.
  NASIS_legend_text_kind:
    name: NASIS_legend_text_kind
    title: Legend Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=320
    permissible_values:
      correlation notes:
        description: Text entries related to correlation concerns that affect the
          entire legend.
      miscellaneous notes:
        description: Text entries not relate to any of the other choices.
      certification statements:
        description: Text entries related to certification of this legend. For example,
          statements of prior survey and legend-wide join statements.
      edit notes:
        description: Text entries that describe what changes were made to the data
          and why those changes were made.
      mou:
        title: Memorandum of understanding Text entries that include the text of the
          original MOU for the survey and any amendments to the MOU.
      field reviews:
        description: Text entries related to initial, progress, and final field reviews.
          For example, the general text part of a progress field review that applies
          to the entire legend.
      nontechnical description:
        status: obsolete
      s5 description:
        title: SOI5 description
        status: obsolete
    description: The kind of text note used to record additional information about
      the legend in the aggregated data.
  NASIS_logical_data_type_nasis:
    name: NASIS_logical_data_type_nasis
    title: Logical Data Type Nasis
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=321
    permissible_values:
      binary: {}
      boolean: {}
      choice: {}
      datetime:
        title: Date/Time
      esri geometry - line:
        title: ESRI Geometry Line
      esri geometry - point:
        title: ESRI Geometry Point
      esri geometry - polygon:
        title: ESRI Geometry Polygon
      float: {}
      integer: {}
      money: {}
      narrative text: {}
      string: {}
      edit setup: {}
      evaluation: {}
      property: {}
      query: {}
      rule: {}
      guid: {}
      xml: {}
      calculation: {}
      report: {}
      file reference: {}
      sql geometry: {}
      hyperlink: {}
      unknown: {}
      yes/no:
        description: Added to for Pedon PC 6.3 system. The Pedon PC 6.3 system is
          based on the Microsoft Access physical data types. Yes/No is used instead
          of Boolean.
    description: "The heirarchy of database data types begins with the Logical data\
      \ type. A piece of data may either be a member of a logical data type (TRUE)\
      \ or not a member (FALSE). i.e. A data element holding the value 3.4 is numeric,\
      \ but not an integer. Therefore, it is a member of the Logical data type Float\
      \ and cannot be a member of the Logical data type Integer. Most Logical data\
      \ types have more than one Physical data type in them. The Logical data type\
      \ Integer, for example, has as physical data types, smallint, int, largeint,\
      \ etc. NASIS has additional Logical data types that don't occur in other systems.\
      \ Such as the Edit/Setup Logical data type."
  NASIS_longitude_direction:
    name: NASIS_longitude_direction
    title: Longitude Direction
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=323
    permissible_values:
      east:
        description: Longitude east of Greenwich (the Prime Meridian or origin). (Snyder,
          J.P., 1982, Map Projections Used by the USGS)
      west:
        description: Longitude west of Greenwich (the Prime Meridian or origin). (Snyder,
          J.P., 1982, Map Projections Used by the USGS)
    description: The direction from the Prime Meridian, a.k.a. the Greenwich Meridian,
      to the point on the ground. E or W
  NASIS_manner_of_failure:
    name: NASIS_manner_of_failure
    title: Manner Of Failure
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=324
    permissible_values:
      brittle:
        description: The specimen retains its size and shape (no deformation) until
          it rupture abruptly into subunits or fragments. (SSM)
      deformable:
        description: The specimen can be compressed to half its original thickness
          without rupture. Radial cracks may appear and extend inward less than half
          the radius normal to compression. (SSM)
      moderately fluid:
        description: After exerting full compression, most of the specimen flows through
          the fingers; a small residue remains in the palm of the hand. The approximate
          equivalent n-value is 1 to 2. (Pons and Zonneveld, 1965)
      moderately smeary:
        description: At failure, the specimen changes suddenly to fluid, the fingers
          skid, and the soil smears. Afterward, some free water can be seen on the
          fingers. (SSM)
      nonfluid:
        description: None of the specimen flows through the fingers after exerting
          full compression. (SSM) The approximate equivalent n-value is less than
          0.7. (Pons and Zonneveld, 1965)
      nonsmeary:
        description: At failure, the specimen does not change suddenly to a fluid,
          the fingers do not skid, and no smearing occurs. (SSM)
      semideformable:
        description: Deformation occurs prior to rupture. Cracks develop and the specimen
          ruptures before compression to half its original thickness. (SSM)
      slightly fluid:
        description: After exerting full compression, some of the specimen flows through
          the fingers, but most remains in the palm of the hand. The approximate equivalent
          n-value is 0.7 to 1. (Pons and Zonneveld, 1965)
      strongly smeary:
        description: At failure, the specimen suddenly changes to fluid, the fingers
          skid, the soil smears, and is very slippery. Afterward, free water is easily
          seen on the fingers. (SSM)
      very fluid:
        description: Under very gentle pressure most of the specimen flows through
          the fingers like a slightly viscous fluid; very little or no residue remains
          in the palm of the hand. (SSM) The approximate equivalent n-value is equal
          to or greater than 2. (Pons and Zonneveld, 1965)
      weakly smeary:
        description: At failure, the specimen changes suddenly to fluid, the fingers
          skid, and the soil smears. Afterward, little or no free water remains on
          the fingers. (SSM)
      smeary:
        status: obsolete
      strongly fluid:
        status: obsolete
    description: 'The rate of change and the physical condition soil attains when
      subjected to compression. Soil samples are either moist or wetter when evaluated
      for manner of failure. Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012'
  NASIS_map_finish_method:
    name: NASIS_map_finish_method
    title: Map Finish Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=325
    permissible_values:
      manual:
        description: The soil layer was done by manually inking or scribing the soil
          lines.
      digital:
        description: The map finishing job used the digital soil data layer.
    description: The method used to complete a map finishing project in a soil survey.
      The map finishing was accomplished either done by hand, manually, or done by
      a computer program, digitally.
  NASIS_mapunit_hel_class:
    name: NASIS_mapunit_hel_class
    title: Mapunit Hel Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=326
    permissible_values:
      highly erodible:
        description: land
      potentially highly erodible:
        description: land
      not highly erodible:
        description: land
    description: No longer used.
  NASIS_mapunit_kind:
    name: NASIS_mapunit_kind
    title: Mapunit Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=327
    permissible_values:
      association:
        description: Two or more dissimilar soils that occur in a regularly repeating
          pattern that could have been separated at the scale of field mapping, but
          were not separated due to the intended purpose of the survey.
      consociation:
        description: At least seventy-five percent (75%) of the map unit is within
          the range of the soil providing the name of the unit, and closely similar
          soils.
      undifferentiated group:
        description: Two or more similar soils that are not always geographically
          associated, and are mapped together due to them having the same or very
          similar use and management concerns.
      complex:
        description: Two or more dissimilar soils that occur in a regularly repeating
          pattern, that cannot be separated at the scale of field mapping.
    description: The general type of mapunit falls into. i.e. Complex, Association,
      Consociation, or Undifferentiated.
  NASIS_mapunit_selection_criteria:
    name: NASIS_mapunit_selection_criteria
    title: Mapunit Selection Criteria
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=328
    permissible_values:
      mapunit status: {}
      selected set: {}
  NASIS_mapunit_status:
    name: NASIS_mapunit_status
    title: Mapunit Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=329
    permissible_values:
      provisional:
        description: A map unit used by the soil survey office leader, but that has
          not been officially approved for use.
      approved:
        description: A map unit on the current, signed field review report for the
          respective geographic area.
      correlated:
        description: A map unit on the signed final correlation document.
      additional:
        description: A map unit that has been used in the past, but that has since
          been combined with another map unit.
    description: One of four stages that a mapunit goes through prior to publication.
  NASIS_mapunit_text_kind:
    name: NASIS_mapunit_text_kind
    title: Mapunit Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=330
    permissible_values:
      nontechnical description:
        description: Map unit descriptions converted from SSSD and downloaded to FOCS.
      correlation notes:
        description: Text entries about correlation concerns related to this mapunit,
          not including mapunit name or status changes.
      miscellaneous notes:
        description: Text entries not related to any of the other choices.
      certification statements:
        description: Text entries related to certification of mapunits.
      edit notes:
        description: Text entries that describe what changes were made to the data
          and why those changes were made.
      map unit description:
        description: Map unit descriptions typically used in a descriptive legend.
      s5 description:
        title: SOI5 description
        status: obsolete
    description: The kind of text note used to record additional information about
      the mapunit in the aggregated data.
  NASIS_mapunit_type:
    name: NASIS_mapunit_type
    title: Mapunit Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=331
    permissible_values:
      mlra map unit:
        description: A map unit that is designed to cover the full conceptual extent
          of the map unit across multiple Non-MLRA soil survey areas and their legends.
      non-mlra map unit:
        description: A map unit that is specific to an individual Non-MLRA soil survey
          area and its legend.
      STATSGO map unit:
        description: A map unit that is designed for STATSGO level data.
      land resource area land resource region map unit:
        description: A map unit that is designed to cover the full conceptual extent
          of the land resource region across the whole of the Land Resource Area.
      land resource area major land resource area map unit:
        description: A map unit that is designed to cover the full conceptual extent
          of the major land resource area across the whole of the Land Resource Area.
      land resource area land resource unit map unit:
        description: A map unit that is designed to cover the full conceptual extent
          of the land resource unit across the whole of the Land Resource Area.
    description: This domain is a list of the different types of map units. Will be
      useful in stratifying projects. Will be only in the Map Unit table, but will
      also be part of the lineage in the Legend Map Unit and Project Map Unit tables.
      Initially will have the following types. Non-MLRA Map Unit, MLRA Map Unit, and
      STATSGO Map Unit.
  NASIS_marsh_health:
    name: NASIS_marsh_health
    title: Marsh Health
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=332
    permissible_values:
      healthy marsh:
        description: Healthy natural condition of Marsh.
      degraded marsh tide restricted:
        description: Degraded marsh where the tide is restricted.
      degraded drowned marsh:
        description: Degraded marsh where the marsh is drowning.
      marsh restoration site:
        description: The site was restored to its natural condition.
      thin layer placement:
        description: "Thin-layer placement of sediment. A strategy to restore or maintain\
          \ a tidal marsh's elevation relative to sea level."
    description: Marsh health status.
  NASIS_marsh_type:
    name: NASIS_marsh_type
    title: Marsh Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=333
    permissible_values:
      high marsh:
        description: A tidal marsh zone located above the Mean Highwater Mark(MHW)
          which, in contrast to the low marsh zone, is inundated infrequently during
          periods of extreme high tide and storm surge associated with coastal storms.
      low marsh:
        description: It is characterized as being flooded daily. The water of the
          low marsh is shallow, silt laden, salty, and warm.
      brackish marsh:
        description: Tidal marshes having salinities below 18 ppt. but greater than
          0.5 ppt.
    description: Type of marsh.
