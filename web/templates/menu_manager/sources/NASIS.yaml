          for the species being counted.
  NASIS_plant_moisture_state:
    name: NASIS_plant_moisture_state
    title: Plant Moisture State
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=419
    permissible_values:
      fresh (green) weights:
        description: Moisture content of the plant material is as it was at the time
          of observation. No drying of the plant material has occurred prior to weighing.
      air-dry weights:
        description: Plant material was air dried prior to weighing.
      oven dry weights:
        description: Plant material was dried in an oven prior to weighing.
      not specified:
        description: No indication of moisture content was noted.
  NASIS_plant_nativity:
    name: NASIS_plant_nativity
