      V:
        description: 'V horizon can be defined as: Mineral horizons that have formed
          at the soil surface, or below a layer of rock fragments (e.g., desert pavement)
          or a physical or biological crust in arid environments. They are recognized
          by the predominance of vesicular pores indicating a soil morphology that
          drastically reduces or prevents the infiltration of rainfall, and air exchange
          with the atmosphere. They are unvegetated and appear with unbroken massive
          structural morphology that is often very friable when moist, slightly hard
          to very hard when dry, but not cemented. They have no or only very weak
          secondary structural aggregates. V horizons are often lighter in color (higher
          value) and lower in organic carbon than the horizon below it.'
