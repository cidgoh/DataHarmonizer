      Proposed to be added to the Plot_Grazing_Use table as a choice field. Used only
      in Alaska. Down the road, this difference between frequency of use and impact
      of a specific frequency may become more widely accepted and that might mean
      the state specific impact class would be converted to a nationally used impact
      class.
