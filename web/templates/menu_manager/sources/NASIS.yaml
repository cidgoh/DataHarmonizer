  NASIS_pvsf_kind:
    name: NASIS_pvsf_kind
    title: Pvsf Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=440
    permissible_values:
      silica coats: {}
      clay bridges: {}
      gibbsite coats: {}
      slickensides (pedogenic):
        description: Shrink-swell shear features (e.g. grooves, striations, glossy
          surfaces) on pedo- structure faces; (e.g. wedges, bowls).
      carbonate coats: {}
      organic stains: {}
      pressure faces: {}
      silt coats: {}
      skeletans: {}
      clay films: {}
      sand coats: {}
      organoargillans: {}
      slickensides (geogenic):
        description: Vertical/oblique, roughly planar shear face resulting from external
          stress (e.g. faults, mass movement blocks); (e.g. grooves, striations).
      gypsum coats: {}
      crack fills (shrink swell related):
        description: When these soils display cracking to the surface and experience
          heavy rainfall events, surface and near-surface soil is often transported
          deeper in the soil profile. Once cracks close upon wetting (swelling) they
          often display multiple matrix colors. The previously cracked areas in each
          horizon will contain darker transported surface or near-surface material.
          (Richard Reid)
      skeletans over cutans:
