  NASIS_color_chroma:
    name: NASIS_color_chroma
    title: Color Chroma
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=64
    permissible_values:
      '1': {}
      '2': {}
      '3': {}
      '4': {}
      '6': {}
      '8': {}
      '0':
        status: obsolete
      '5':
        status: obsolete
      '7':
        status: obsolete
    description: 'Chroma is the relative purity or strength of the spectral color.
      Chroma indicates the degree of saturation of neutral gray by the spectral color.
      The scales of chroma for soils extend from /0 for neutral colors to a chroma
      of /8 as the strongest expression of color used for soils. In Munsell Color
      Charts, the color chips are arranged horizontally by increasing chroma from
      left to right on the color card. Reference: Soil Survey Manual, Agricultural
      Handbook No. 18, Soil Survey Staff, USDA, Natural Resources Conservation Service.
      The notation for chroma consists of numbers beginning at 0 for neutral trays,
      and increasing at equal intervals to a maximum of about 20, which is never really
      approached in soil. For absolute achromatic colors (pure grays, white, and black),
      which have zero chroma and no hue, the letter N (neutral) takes the place of
      a hue designation. Reference: Munsell SOIL-COLOR Charts, produced by Munsell
      Color. Reference: Munsell Soil-Color Charts. Munsell Color company.'
  NASIS_color_hue:
    name: NASIS_color_hue
    title: Color Hue
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=65
    permissible_values:
      10R: {}
      10YR: {}
      2.5Y: {}
      2.5YR: {}
      5B: {}
      5BG: {}
      5G: {}
      5GY: {}
      5Y: {}
      5YR: {}
      7.5YR: {}
      N: {}
      7.5R: {}
      5R: {}
      10B: {}
      10BG: {}
      10G: {}
      10GY: {}
      10Y: {}
      5PB: {}
      7.5Y:
        status: obsolete
    description: 'Hue is a measure of the chromatic composition of light that reaches
      the eye. The Munsell system is based on five principal hues: red (R), yellow
      (Y), green (G), blue (B), and purple (P). Five intermediate hues representing
      midpoints between each pair of principal hues complete the 10 major hue names
      used to describe the notation. The intermediate hues are yellow-red (YR), green-yellow
      (GY), blue-green (BG), purple-blue (PB), and red-purple (RP). Each of the 10
      major hues is divided into four segments of equal visual steps, which are designated
      by numerical values applied as prefixes to the symbol for the hue name. Four
      equally spaced steps of the adjacent yellow-red (YR) hue are identified as 2.5YR,
      5YR, 7.5YR, and 10YR respectively. The standard chart for soil has separate
      hue cards from 10R through 5Y. Reference: Soil Survey Manual, Agricultural Handbook
      No. 18, Soil Survey Staff, USDA, Natural Resources Conservation Service. The
      symbol for hue is the letter abbreviation of the color of the rainbow(R for
      red, YR for Yellow-Red, Y for Yellow) preceded by numbers from 0 to 10. Within
      each letter range, the hue becomes more yellow and less red as the numbers increase.
      The middle of the letter range is at 5; the zero point coincides with the 10
      point of the next redder hue. Thus 5YR is in the middle of the yellow-red hue,
      which extends from 10R (zero YR) to 10YR (zero Y). Reference: Munsell SOIL-COLOR
      Charts, produced by Munsell Color. Reference: Munsell Soil-Color Charts. Munsell
      Color company.'
  NASIS_color_moisture_status:
    name: NASIS_color_moisture_status
    title: Color Moisture Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=67
    permissible_values:
      dry:
        description: The soil specimen is sufficiently dry such that further drying
          does not change the color.
      moist:
        description: The soil specimen is sufficiently moist such that further additions
          of water do not change the color.
    description: 'The general moisture condition of the soil described; e.g., moist.
      (Not to be confused with Soil Water State.) Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
  NASIS_color_physical_state:
    name: NASIS_color_physical_state
    title: Color Physical State
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=68
    permissible_values:
      interior:
        description: This is the color of the interior of a ped if the ped can be
          broken easily and does not crumble into small amounts of soil.
      exterior:
        description: This is the color of the exterior of an unbroken ped.
      crushed:
        description: "This is the color of crushed soil material and usually applies\
          \ to dry samples. It is important to record the color of an unshaded portion\
          \ of the sample. This is often referred to 'crushed and smoothed'. The smoothing\
          \ is done to reduce the amount of shading done by other soil particles."
      oxidized:
        description: The soil specimen has been exposed to the atmosphere allowing
          for any color change of the reduced matrix.
      broken face:
        description: The color of the soil is recorded for a surface broken through
          a ped if a ped can be broken as a unit.
      rubbed:
        description: This is the color of rubbed soil material and usually applies
          to moist samples.
      reduced:
        description: The color of the soil specimen is read prior to exposure to the
          atmosphere.
      variegated:
        description: Three color pattern that is too intricate (banded or patchy)
          with numerous diverse colors to credibly identify dominant matrix colors
          (e.g., foliated felsic crystalline saprolite).
      dithionite-citrate pretreated:
        status: obsolete
      after ignition:
        status: obsolete
      pyrophosphate extract:
        status: obsolete
    description: 'Reference: Soil Survey Manual, Agricultural Handbook No. 18, Soil
      Survey Staff, USDA, Natural Resources Conservation Service.'
  NASIS_color_value:
    name: NASIS_color_value
    title: Color Value
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=69
    permissible_values:
      '2': {}
      '2.5': {}
      '3': {}
      '4': {}
      '5': {}
      '6': {}
      '7': {}
      '8': {}
      '8.5': {}
      '9': {}
      '9.5': {}
    description: 'Value indicates the degree of lightness or darkness of a color in
      relation to a neutral gray scale. On a neutral gray (achromatic) scale, value
      extends from pure black (0/) to pure white (10/). The value notation is a measure
      of the amount of light that reaches the eye under standard lighting conditions.
      Gray is perceived as about halfway between black and white and has a value notation
      of 5/. The actual amount of light that reaches the eye is related logarithmically
      to color value. Lighter colors are indicated by numbers between 5/ and 10/;
      darker colors are indicated by numbers from 5/ to 0/. These values may be designated
      for either achromatic or chromatic conditions. Thus, a card of the color chart
      for soil has a series of chips arranged vertically to show equal steps from
      the lightest to the darkest shades of that hue. Reference: Soil Survey Manual,
      Agricultural Handbook No. 18, Soil Survey Staff, USDA, Natural Resources Conservation
      Service. The notation for value consists of numbers from 0, for absolute black,
      to 10, for absolute white. Thus a color of value 5 is visually midway between
      absolute white and absolute black. One of value 6 is slightly less dark, 60
      percent of the way from black to white, and midway between values of 5 and 7.
      Reference: Munsell SOIL-COLOR Charts, produced by Munsell Color. Reference:
      Munsell Soil-Color Charts. Munsell Color company.'
  NASIS_column_alignment:
    name: NASIS_column_alignment
    title: Column Alignment
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=70
