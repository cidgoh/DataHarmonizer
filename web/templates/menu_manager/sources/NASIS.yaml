  NASIS_species_condition:
    name: NASIS_species_condition
    title: Species Condition
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=553
    permissible_values:
      good:
        description: Leaves (or needles) are normal in color and growth. Small amounts
          of dead wood (top, branches, and twigs) occur within the live crowns. Evidence
          of disease, insect, and climatic damage is limited. Little or no evidence
          of suppression or stagnation.
      fair:
        description: Leaves (or needles) are normal in color and growth. Substantial
          amounts of dead wood (top, branches, and twigs) occur within the live crowns.
          Evidence of disease, insect, and climatic damage is obvious. There is evidence
          of suppression or stagnation. Current-year growth obviously less than normal
          for the species.
      poor:
        description: Leaves (or needles) are very abnormal in color and growth. Very
          large amounts of dead wood (top, branches, and twigs) occur within the live
          crowns. Evidence of extensive disease, insect, and climatic damage is obvious.
          There is evidence of severe suppression or stagnation. Current-year growth
          is negligible.
      dead:
        description: Plants in the row are dead.
      none: {}
