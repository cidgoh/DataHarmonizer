  NASIS_transect_protocol:
    name: NASIS_transect_protocol
    title: Transect Protocol
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=850
    permissible_values:
      belt transect:
        description: 'Used to detect changes in species with low cover or density.
          Reference: Monitoring Manual, Vol I, pg 30-33.'
      canopy cover class:
        description: 'Used for cover, frequency, and composition. Referenences: Sampling
          Vegetation Attributes, Ch V-D, pg 55-63; National Vegetation Classification
          Standard, Version 2, pg. 24-26.'
      comparative yield:
        description: 'Used for production and composition. Reference: Sampling Vegetation
          Attributes, Ch V-L, pg 116-122.'
      density method:
        description: 'Used for precise estimates of species richness. References:
          Monitoring Manual, Vol II, Ch 10, pg 57-60; Sampling Vegetation Attributes,
          Ch V-I, pg 94-101.'
      double weight sampling:
        description: Used for composition and production. Used for herbivore carrying
          capacity estimates and ecosystem energy flow.
      dry weight rank:
        description: 'Used for composition, frequency, and production. Reference:
          Sampling Vegetation Attributes, Ch V-C, pg 50-54.'
      frequency:
        description: Used for frequency and cover.
      gap intercept:
        description: 'Used for wind erosion and exotic plant invasion risk, and for
          soil water erosion risk and water infiltration. References: Monitoring Manual,
          Vol I, pg 16-22; NRI Rangeland Training Videos; Sampling Vegetation Attributes,
          Ch V-E, pg 64-69.'
      harvest method:
        description: Used for composition and production. Used for herbivore carrying
          capacity estimates and ecosystem energy flow.
      line intercept:
        description: 'Used for cover and composition (by cover). Reference: Sampling
          Vegetation Attributes, Ch V-E, pg 64-69.'
      line point intercept:
        description: 'Used for soil erosion risk, water infiltration, and changes
          in species composition or cover. References: Monitoring Manual, Vol I, pg
          9-15. Monitoring Manual, Vol II, Ch 15, pg 79-82; NRI Rangeland Training
          Videos.'
      nested frequency:
        description: Used for frequency and cover.
      ocular estimate:
        description: Used only in low intensity inventories.
      sociability class:
        description: 'Used to define horizontal structure or dispersion of a species
          within a plot. Reference: Mueller-Dombois and Ellenberg 1974, Aims and Methods
          of Vegetation Ecology.'
      standing biomass: {}
      step gap:
        description: 'Used for wind erosion and exotic plant invasion risk, and for
          soil water erosion risk and water infiltration. Reference: Monitoring Manual,
          Vol I, pg 17.'
      step point:
        description: 'Used for cover and composition. Reference: Sampling Vegetation
          Attributes, Ch V-F, pg 70-77.'
      weight unit estimate:
        description: 'Used for herbivore carrying capacity estimates and ecosystem
          energy flow. Reference: National Range and Pasture Handbook, Ch 4, 600-0401[c](1).'
      dry weight rank/comparative yield:
        description: A combination of Dry Weight Rank and Comparative Yield protocols.
      releve method:
        description: 'Used to determine canopy cover, vertical and horizontal structure.
          References: Barbour et.al 1987, Terrestrial Plant Ecology, Second Edition,
          Chapter 9; California Native Plant Society 2007, Relev protocol; Minnesota
          Department of Natural Resources 2007, A handbook for collecting vegetation
          plot data in Minnesota: The relev method.'
      plant species richness: {}
      daubenmire method: {}
      point intercept: {}
      tree density: {}
      stem count: {}
      continuous line intercept: {}
    description: 'References:Sampling Vegetation Attributes, Ch V-J, V-K, pg 102-115.
      Reference: Sampling Vegetation Attributes, Ch V-B, pg 37-49.'
