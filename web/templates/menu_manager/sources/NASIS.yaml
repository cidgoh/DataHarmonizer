  NASIS_classification_type:
    name: NASIS_classification_type
    title: Classification Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=62
    permissible_values:
      correlated:
        description: The current official taxonomic classification and taxon name
