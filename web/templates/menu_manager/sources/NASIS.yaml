  NASIS_microrelief_kind:
    name: NASIS_microrelief_kind
    title: Microrelief Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=343
    permissible_values:
      microhigh:
        description: A generic microrelief term applied to slightly elevated areas
          relative to the adjacent ground surface; differences in relief range from
          several centimeters to several meters; cross sectional profiles can be simple
          or complex and generally consist of gently rounded, convex tops with gently
          sloping sides.
      microlow:
        description: A generic microrelief term applied to slightly lower areas relative
          to the adjacent ground surface; differences in relief range from several
          centimeters to several meters; ; cross sectional profiles can be simple
          or complex and generally consist of subdued, concave, open or closed depressions
          with gently sloping sides.
      microslope:
        description: A generic Microrelief term applied to areas of nominal surface
          relief (slightly sloping to level), relative to the adjacent ground surface;
          differences in overall local relief range from several centimeters to several
          meters. Cross-sectional profiles can be simple or complex and generally
          consist of low and gently rounded, convex tops (microhigh) with gently sloping
          to level sides (microslope), and depressional low areas (microlow). Microslopes
          commonly constitute the majority of the land surface area in gilgai and
          other settings with microrelief. SW.
      microdepression:
        description: refer to micro-low
        status: obsolete
      microknoll:
        description: refer to micro-high.
        status: obsolete
      other:
        description: (specified in notes)
        status: obsolete
    description: (1) slight variations in the height of a land surface that are too
      small to delineate on a topographic or soils map at commonly used scales (1:24000
      or 1:15840); (2) differences in ground-surface height, measured over distances
      of meters; (3) A vertical change in relief typically measured in centimeters.
