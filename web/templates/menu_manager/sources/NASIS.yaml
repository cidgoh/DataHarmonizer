  NASIS_field_monitor:
    name: NASIS_field_monitor
    title: Field Monitor
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=215
    permissible_values:
      yield monitor:
        description: Yield monitors typically provide a periodic report of yield during
          harvest. The operator can usually select the amount of data that is collected
          (e.g. 1, 2 or 3 second intervals).
      gridded testing:
        description: the practice of taking small samples at equal distances across
          a given acreage.
      electromagnetic survey:
        description: An Electromagnetic survey relies on the response of the ground
          to variations in electric and magnetic forces due to the presence of conducting
          materials. A primary field is induced by passing an alternating current
          through a coil placed over the ground.
      drone imagery:
        description: A drone survey refers to the use of an unmanned aerial vehicle
          (UAV), to capture aerial data with downward-facing sensors, such as RGB
          or multispectral cameras, and LIDAR payloads.
      plant color scan:
        description: The use of color imagery to estimate nutrient content in plant
          leaves. It is also used to determine many common types of plant diseases.
      ground penetrating radar:
        description: A geophysical method that uses radar pulses to image the subsurface.
          It is a non- intrusive method of surveying the sub-surface to investigate
          underground anomalies.
      weather station:
        description: Electronic devices that measures atmospheric data (moisture,
          temperature etc).
      moisture sensor:
        description: Electronic devices used to measure the amount of water content
          in the soil.
    description: Common types of precision monitoring methods.
