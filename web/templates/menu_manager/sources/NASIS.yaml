      the pedon in the point data.
  NASIS_pedon_type:
    name: NASIS_pedon_type
    title: Pedon Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=404
    permissible_values:
      TUD pedon:
        description: Pedon described is not the Official Series Description (OSD)
          but is the typical pedon for the taxonomic unit description (TUD) in a published
          Soil Survey Area.
      not classified to current taxon name:
        description: 'Pedon description is not a taxadjunct, but does not classify
          or correlate to the current taxon name, or description is not complete enough
          to classify to a taxon at time of visit. "Unnamed" or any taxon name may
          be assigned until the pedon description is completed, classified, or corrected
          in the future.'
      classifies to current taxon name, full description:
        description: Pedon description classifies to current taxon name , and supports
          full population of aggregate component data.
      OSD pedon:
        description: Pedon described is the typical pedon for the Official Series
          Description (OSD).
      taxadjunct to the series:
        description: Pedon description does not classify the same as current taxon
          name for the Official Series Description (OSD), but uses the current taxon
          name for the OSD. May be suitable for supporting aggregate component data.
      classifies to current taxon name, brief description:
        description: Pedon description classifies to current taxon name, but description
          is too brief to fully populate aggregate component data.
      miscellaneous area:
        description: Miscellaneous areas are classified and described as non-soil,
          such as Beaches, Badland, Rock outcrop, and Urban land.
      map unit inclusion:
        description: Pedon described represents a minor component (inclusion) in the
          map unit.
        status: obsolete
      within range of map unit:
        description: Pedon described is within the range in characteristics of the
          named taxonomic unit for the map unit.
        status: obsolete
      representative pedon for component:
        description: Pedon described is representative for the map unit component,
          but is not for the Official Series Description or Taxonomic Unit Description.
        status: obsolete
    description: The type of pedon in relation to its status in the survey or project.
      I.e. TUD, OSD, can be classified, etc.
  NASIS_pending_action:
    name: NASIS_pending_action
    title: Pending Action
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=405
    permissible_values:
      add: {}
      change: {}
      delete: {}
    description: "The reason for the change to the record in the metadata. Adding\
      \ a new record, a change to an existing record, or the record should be deleted\
      \ from the metadata. In reality, no record is ever tagged as 'delete' because\
      \ if it shouldn't be in the metadata for that system is is removed ASAP to avoid\
      \ confusion."
  NASIS_pending_status:
    name: NASIS_pending_status
    title: Pending Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=406
    permissible_values:
      approved: {}
      pending: {}
      rejected: {}
    description: The state at which the record is in if it is a new or changed record.
      Or, if it is rejected. In reality, no record is ever tagged as rejected because
      if the record is rejected it is removed ASAP to avoid confusion. This record
      is made null whenever a system is deployed and a new working copy of the next
      version of the system is created.
  NASIS_penetration_orientation:
    name: NASIS_penetration_orientation
    title: Penetration Orientation
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=407
    permissible_values:
      horizontal:
        description: Penetrometer blade inserted horizontally into soil specimen.
      vertical:
        description: Penetrometer blade inserted vertically into soil specimen.
    description: The orientation of the penetrometer used to determine the Penetration
      Resistance Class.C171
  NASIS_penetration_resistance:
    name: NASIS_penetration_resistance
    title: Penetration Resistance
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=408
    permissible_values:
      extremely high:
        description: =>8 MPa resistance.
      extremely low:
        description: <0.01 MPa resistance.
      high:
        description: 2 to <4 MPa resistance.
      low:
        description: 0.1 to <1.0 MPa resistance.
      moderate:
        description: 1 to <2 MPa resistance.
      very high:
        description: 4 to <8 MPa resistance.
      very low:
        description: 0.01 to <0.1 MPa resistance.
    description: 'The relative ability of soil in a confined (field) state to resist
      penetration by a rigid object of specified size. Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
  NASIS_penetrometer_spring_type:
    name: NASIS_penetrometer_spring_type
    title: Penetrometer Spring Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=409
    permissible_values:
      lee: {}
      original: {}
      jones 11: {}
      jones 323: {}
    description: 'Each spring type spans only a part of the range of penetration resistance
      possible in soils; various springs are needed to span all Penetration Resistance
      Classes. Reference: Field Book for Describing and Sampling Soils v 3.0, Sep
      2012'
  NASIS_penetrometer_tip_type:
    name: NASIS_penetrometer_tip_type
    title: Penetrometer Tip Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=410
    permissible_values:
      rod:
        description: Fat ended rod; 6.4 mm diameter.
      foot:
        description: 25 mm diameter foot attached.
    description: "The geometry of the 'foot' of the penetrometer being used to determine\
      \ the Penetration Resistance Classes."
  NASIS_permeability_class:
    name: NASIS_permeability_class
    title: Permeability Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=411
    permissible_values:
      very slow:
        description: 0.01 to <0.42 um/sec, or 0.0015 to <0.06 in/hr
      slow:
        description: 0.42 to <1.41 um/sec, or 0.06 to <0.2 in/hr
      moderately slow:
        description: 1.41 to <4.23 um/sec, or 0.2 to <0.6 in/hr
      moderate:
        description: 4.23 to <14.1 um/sec, or 0.6 to <2 in/hr
      moderately rapid:
        description: 14.1 to <42.34 um/sec, or 2.0 to <6.0 in/hr
      rapid:
        description: 42.34 to <141.14 um/sec, or 6.0 to <20 in/hr
      very rapid:
        description: =>141.14 um/sec, or =>20 in/hr
      impermeable:
        description: <0.01 um/sec or < 0.0015 in/hr
    description: "The qualitative sense describes a soil's capacity to transmit fluids,\
      \ including water, or gases. No quantitative measure is implied. Reference:\
      \ Field Book for Describing and Sampling Soils v 3.0, Sep 2012"
