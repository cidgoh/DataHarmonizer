  NASIS_effervescence_agent:
    name: NASIS_effervescence_agent
    title: Effervescence Agent
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=193
    permissible_values:
      hcl, unspecified:
        description: Hydrogen chloride of unspecified concentration.
      hcl, 1n:
        title: HCl,
        description: 1 normal 1 normal hydrogen chloride.
      hcl, 3n:
        title: HCl,
        description: 3 normal 3 normal hydrogen chloride.
      hcl, 6n:
        title: HCL,
        description: 6 normal 6 normal hydrogen chloride solution.
      hydrogen peroxide, 3-4%:
        title: Hydrogen peroxide,
        description: 3 to 4 percent Hydrogen peroxide, 3 to 4 percent concentration.
        status: obsolete
      hydrogen peroxide, unspecified:
        description: Hydrogen peroxide of unspecified concentration.
        status: obsolete
    description: 'Chemical agent used when various elements or compounds that effervesce
      are suspected in the soil. Not used when Mn is suspected. Reference: Field Book
      for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_effervescence_agent_mn:
    name: NASIS_effervescence_agent_mn
    title: Effervescence Agent Mn
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=194
    permissible_values:
      hydrogen peroxide, 3-4%:
        title: Hydrogen peroxide,
        description: 3 to 4 percent Hydrogen peroxide, 3 to 4 percent concentration.
      hydrogen peroxide, unspecified:
        description: Hydrogen peroxide of unspecified concentration.
    description: 'Chemical agent used when Mn is suspected in the soil. Reference:
      Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_effervescence_class:
    name: NASIS_effervescence_class
    title: Effervescence Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=195
    permissible_values:
      very slight:
        title: Very
        description: slightly effervescent Few bubbles seen. (SSM)
      slight:
        title: Slightly effervescent Bubbles readily seen. (SSM)
      strong:
        title: Strongly effervescent Bubbles form low foam. (SSM)
      violent:
        title: Violently effervescent Thick foam forms quickly. (SSM)
      none:
        title: Noneffervescent No bubbles seen. (SSM)
    description: 'The gaseous response (seen as bubbles) of soil to applied HCl (carbonate
      test), H2O2 (MnO2 test), or other chemicals. Commonly, approximately 1 N HCl
      is used for carbonate test. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
  NASIS_effort_type:
    name: NASIS_effort_type
    title: Effort Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=196
    permissible_values:
      NRCS conservation planning:
        description: NRCS conservation planning for programs.
      DSP program Dynamic Soil Properties Dynamic soils property project recorded in NASIS.: {}
      DSP4SH Dynamic soil properties for soil health Dynamic soils property project recorded for soil health.: {}
      other:
        description: Type of effort not describe in other terms.
    description: 'The type of effort: conservation planning, DSP program or DSP4SH.'
  NASIS_elec_cond_method:
    name: NASIS_elec_cond_method
    title: Elec Cond Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=197
    permissible_values:
      ec meter, 1:1 water:
        description: Either a pocket or desktop model.
      ec meter, saturated paste:
        description: Either a pocket or desktop model.
      salinity probe:
        description: 4 electrode method, either in a side-by-side or vertical arrangement
      colormetric:
        status: obsolete
      electromagnetic induction:
        description: e.g. EM38 meter
        status: obsolete
    description: Field method used to determine the electrical conductivity of the
      soil.
  NASIS_erosion_accelerated_kind:
    name: NASIS_erosion_accelerated_kind
    title: Erosion Accelerated Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=198
    permissible_values:
      water erosion sheet:
        title: Sheet erosion
        description: The more or less uniform removal of soil from an area without
          the development of conspicuous water channels. (SSM)
      water erosion rill:
        title: Rill erosion Rill erosion
        description: is the removal of soil through the cutting of many small, but
          conspicuous channels where runoff concentrates. The channels are shallow
          enough that they can be obliterated with normal tillage operations. (SSM)
      water erosion gully:
        title: Gully erosion Gully erosion
        description: is the consequence of water that cuts down into the soil along
          the line of water concentration and flow. The resulting channels cannot
          be obliterated by ordinary tillage operations. (SSM)
      water erosion tunnel:
        title: Tunnel erosion
        description: The removal of soil by the formation of subsurface tunnels (often
          referred to as piping). Free water enters the soil through macropores such
          as large desiccation cracks or rodent burrows. The tunnels tend to enlarge
          and coelesce.
      wind erosion:
        description: Deflation by wind.
      landslip erosion highly deformed:
        title: Highly deforming landslip erosion
        status: obsolete
      landslip erosion slightly deformed:
        title: Slightly deforming landslip erosion
        status: obsolete
      water erosion:
        description: Soil removal by running water.
        status: obsolete
      wind and water erosion:
        status: obsolete
    description: 'Type of detachment and removal of surface soil particles that is
      largely affected by human activity. Reference: Part 618 National Soil Survey
      Handbook. The specific type of water or wind erosion that is causing erosion
      to move at rate visible to the eye. Reference: Field Book for Describing and
      Sampling Soils v 3.0, Sep 2012'
  NASIS_erosion_class:
    name: NASIS_erosion_class
    title: Erosion Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=199
    permissible_values:
      '0':
        title: None - deposition No apparent erosion has occurred. Deposition of soil
          sediment removed from other areas may have occurred.
      '1':
        title: Class 1 The soil has lost on the average <25% of the original A and/or
          E horizons, or of the uppermost 20 cm if the original A and/or E horizons
          were less than 20 cm thick. (SSM)
      '2':
        title: Class 2 The soil has lost, on the average, 25 to 75 percent of the
          original A and/or E horizons, or of the uppermost 20 cm if the original
          A and/or E horizons were less than 20 cm thick.
      '3':
        title: Class 3 The soil has lost, on the average, more than 75 percent of
          the original A and/or E horizon, or of the uppermost 20 cm if the original
          A and/or E horizons were less than 20 cm thick. (SSM)
      '4':
        title: Class 4 The soil has lost all of the original A and/or E horizons,
          or the uppermost 20 cm if the original A and/or E horizons were less than
          20 cm thick. Some of the orginal underlying material may have also been
          removed. (SSM)
    description: 'Class of accelerated erosion. Reference: Part 618 National Soil
      Survey Handbook. Estimated % loss of the original, combined A + E horizons or
      the estimated loss of the upper 20 cm (if original, combined A + E horizons
      were <20 cm thick). Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012'
  NASIS_erosion_class_legacy:
    name: NASIS_erosion_class_legacy
    title: Erosion Class Legacy
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=200
    permissible_values:
      moderate or less:
        description: Encompasses erosion classes 1 and 2. Added as a legacy choice
          from the ESIS database when the ESI data (from ESIS) was imported into NASIS.
          Actual definition of this choice is unknown.
      severe or greater:
        description: Encompasses erosion classes 3 and greater. Added as a legacy
          choice from the ESIS database when the ESI data (from ESIS) was imported
          into NASIS. Actual definition of this choice is unknown.
    description: Erosion class brought over from the ESIS database when ESI data was
      converted and imported into NASIS.
  NASIS_evaluation_type:
    name: NASIS_evaluation_type
    title: Evaluation Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=201
    permissible_values:
      ArbitraryCurve: {}
      ArbitraryLinear: {}
      Beta: {}
      Crisp: {}
      Gauss: {}
      Linear: {}
      PI: {}
      Sigmoid: {}
      Trapezoid: {}
      Triangle: {}
      IsNull: {}
    description: 'An evaluation is some test that will be applied to the data returned
      from a property to determine the truth of some proposition. Evaluations can
      be either fuzzy (returning any value between 0 and 1) or crisp (returning only
      0 or 1). Reference: Chapter 21, NASIS User Guide.'
  NASIS_excavation_difficulty_class:
    name: NASIS_excavation_difficulty_class
    title: Excavation Difficulty Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=202
    permissible_values:
      low:
        description: Excavations can be made with a spade using arm-applied pressure
          only. Neither application of impact energy nor application of foot pressure
          is necessary.
      moderate:
        description: Excavation can be accomplished quite easily by application of
          impact energy with a spade or by foot applied pressure.
      high:
        description: Excavation with a spade can be accomplished with difficulty.
          Excavation is easily possible with a full length pick, using an over-the-head
          swing.
      very high:
        description: Excavation with a full length pick using an over-the-head swing
          is moderately to markedly difficult. Excavation is possible in a reasonable
          period of time with a backhoe mounted on a 40 to 60 kW (50-80 hp) tractor.
      extremely high:
        description: Excavation cannot be accomplished in a reasonable time period
          with a backhoe mounted on a 40 to 60 kW (50-80 hp) tractor.
    description: 'Relative class used for soil layers, horizons, pedons, or geologic
      layers and estimate the difficulty of making an excavation into them. Reference:
      Part 618 National Soil Survey Handbook. Excavation difficulty, in most instances,
      is strongly controlled by water state, which should be specified. The relative
      force or energy required to dig soil out of place. Reference: Field Book for
      Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_export_certification_status:
    name: NASIS_export_certification_status
    title: Export Certification Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=203
    permissible_values:
      not certified:
        description: The legend and data mapunits to be included in the export file
          have been appropriately populated, at least in part, but have not been reviewed
          or certified. These are advance data, subject to change. This certification
          applies to the whole export package as a single entity.
      partly certified, all components:
        description: This certification applies to the whole export package as a single
          entity. The legend and data mapunits to be included in the export file have
          been appropriately populated (both major and minor components) and the data
          elements have been reviewed. These datasets are typically exports from on-going
          projects. At least some of the data elements have been certified for use
          in specific applications. Other data elements in the export have advance
          data, subject to change. Both major and minor components are intended for
          interpretation. The components with uncertified data elements may not have
          valid interpretations.
      partly certified, major components:
        description: This certification applies to the whole export package as a single
          entity. The legend and data mapunits to be included in the export file have
          been appropriately populated (major components only) and the data elements
          have been reviewed. Minor components are not intended for interpretation,
          and are populated with only a limited number of data elements. These datasets
          are typically exports from on-going projects. At least some of the data
          elements have been certified for use in specific applications. Other data
          elements in the export have advance data, subject to change. The major components
          with uncertified data elements may not have valid interpretations. Minor
          components are not sufficiently populated to allow valid interpretations.
      certified, all components:
        description: This certification applies to the whole export package as a single
          entity. The legend and data mapunits to be included in the export file have
          been appropriately populated, reviewed, and certified for general use. Both
          major and minor components are fully populated. These datasets are typically
          exports from completed projects. Valid interpretations are available for
          both major and minor components.
      certified, major components:
        description: This certification applies to the whole export package as a single
          entity. The legend and data mapunits to be included in the export file have
          been appropriately populated (major components only). Minor components are
          not intended for interpretation, and are populated with only a limited number
          of data elements. Data have been reviewed and certified for general use.
          These datasets are typically exports from completed projects. Valid interpretations
          are available for major components only.
      certified, minimal data:
        description: This certification applies to the whole export package as a single
          entity. The legend and data mapunits to be included in the export file have
          been populated (major components only). Minor components are not intended
          for interpretation, and are populated with only a limited number of data
          elements. Data have been reviewed and certified for general use. These datasets
          are typically exports from initial soil surveys that were completed years
          ago. Data was originally populated under less stringent standards than are
          in place today, and data have received only a minimum amount of recent updating.
          The data in the export does not have the level of quality and completeness
          equivalent to a recently populated dataset, but it is minimally acceptable
          and certifiable. Valid interpretations are available for all soil map units
          but for major components only, and some interpretations may be marginally
          valid.
      status unknown, record inserted during conversion: {}
      partly certified:
        description: The legend and data mapunits to be included in the export file
          have been appropriately populated and the data have been reviewed. At least
          some of the data elements have been certified for use in specific applications.
          Other data elements in the export have advance data, subject to change.
          This certification applies to the whole export package as a single entity.
        status: obsolete
      fully certified:
        description: The legend and data mapunits to be included in the export file
          have been appropriately populated, reviewed, and certified for general use.
          This certification applies to the whole export package as a single entity.
        status: obsolete
    description: Indicates the degree to which an object is ready to be used for its
      intended purpose.
  NASIS_export_target:
    name: NASIS_export_target
    title: Export Target
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=205
    permissible_values:
      ssurgo:
        description: The traditional ASCII SSURGO export.
      staging server: {}
    description: Destination to which a soil survey exported is intended. Either the
      Soil Data Warehouse or SSURGO (i.e. Soil Data Mart).
  NASIS_extra_moisture_source:
    name: NASIS_extra_moisture_source
    title: Extra Moisture Source
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=206
    permissible_values:
      none:
        description: No substanstial extra moisture is received on the site other
          than natural precipitation.
      irrigation:
        description: Extra moisture is received on the site due to irrigation.
      water table:
        description: Extra moisture is available to plants due to the presence of
          a water table within the root zone.
      position:
        description: Extra moisture is received on the site due to run in from surrounding
          areas - e.g. toeslopes or depressions.
      contour planting:
        description: Extra moisture is held on site due to contour planting reducing
          runoff.
      fog drip:
        description: Extra moisture is received on the site due to the significant
          presence of fog that condenses on vegetation and drips to the ground.
      flooding:
        description: Extra moisture received on the site from streambank overflow
          of nearby streams.
