  NASIS_inundation_type:
    name: NASIS_inundation_type
    title: Inundation Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=308
    permissible_values:
      flooding:
        description: Inundation Type Flooding is the temporary inundation by flowing
          water from any source, such as streams overflowing their banks, runoff from
          adjacent or surrounding slopes, inflow from high tides, or any combination
          of sources. Chapter 3 of the Soil Survey Manual provides additional information.
          Ref NSSH Part 618.31 and Soil Survey Manual Chapter 3.
      ponding:
        description: Inundation Type Ponding is the temporary inundation by standing
          water in a closed depression, including potholes, sloughs, backswamps, playas,
          and ponds. The water is removed only by deep percolation, transpiration,
          evaporation, or by a combination of these processes. Ref. NSSH Part 618.50
      continuous:
        description: Inundation Type Continuous inundation is permanent or nearly
          permanent standing water in a basin or closed depression. This includes
          depressions, lakes, ponds, estuaries, and seas that are inundated for extended
          periods with very few or no periods when the soil is not covered with water.
          The inundation is considered permanent, not temporal, with water on the
          surface more than 21 hours of each day in all years. The water is removed
          only by deep percolation, transpiration, evaporation, tidal flows, or by
          a combination of these processes. Ref NSSH Part 618.13
    description: The types of inundation a component may be subject to.
  NASIS_invading_plants:
    name: NASIS_invading_plants
    title: Invading Plants
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=309
    permissible_values:
      none: {}
      some: {}
      many: {}
  NASIS_irrigation:
    name: NASIS_irrigation
    title: Irrigation
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=310
    permissible_values:
      flood:
        description: Flood (border, basin, other)
      furrow:
        description: Furrow (gated pipe, poly pipe, gated surge, siphon tubes)
      sprinkler:
        description: Sprinkler (center pivot, lateral, solid set sprinklers, moveable
          sprinklers)
      micro:
        description: Micro-irrigation (surface drip, subsurface drip)
      subirrigation:
        description: Subsurface irrigation by drain pipes and control structures.
    description: Irrigation management practice.
  NASIS_land_kind:
    name: NASIS_land_kind
    title: Land Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=311
