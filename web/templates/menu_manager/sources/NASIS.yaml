  NASIS_site_observation_text_kind:
    name: NASIS_site_observation_text_kind
    title: Site Observation Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=526
    permissible_values:
      site observation, formatted:
        description: A formatted note written at the time of describing a site, pedon.
          or horizon. This note may be included into the pedon description report.
      site observation, unformatted:
        description: A free-form note written at the time of describing a site, pedon.
          or horizon.
      miscellaneous notes: {}
      correlation notes: {}
      windows pedon import issue: {}
      installation metadata:
        description: Text note describing the methodology used during installation
          of monitoring equipment.
      instrumentation type:
        description: Text note describing the type of sensor used.
      sensor history:
        description: Text note describing the history of the sensor.
    description: The kind of text note used to record additional information about
      the site observation.
  NASIS_site_text_kind:
    name: NASIS_site_text_kind
    title: Site Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=527
    permissible_values:
      site note, formatted:
        description: A formatted note written at the time of describing a site, pedon.
          or horizon. This note may be included into the pedon description report.
      site note, unformatted:
        description: A free-form note written at the time of describing a site, pedon.
          or horizon.
      miscellaneous notes: {}
      correlation notes: {}
      conversion problem:
        description: Note related to a problem on converting data from PDP system
          to NASIS.
      pedon conversion: {}
      windows pedon import issue: {}
    description: The kind of text note used to record additional information about
      the site.
  NASIS_slope_complexity:
    name: NASIS_slope_complexity
    title: Slope Complexity
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=528
    permissible_values:
      complex:
        description: Groups of slopes that have definite breaks in several different
          directions and in most cases markedly different slope gradients within the
          areas delineated.
      simple:
        description: The surface of the landform consists of fairly uniform slope
          gradients, breaking in dominantly one direction.
    description: 'Describes the relative uniformity (smooth linear or curvilinear=simple
      or S) or irregularity (complex or C) of the ground surface leading downslope
      through the point of interest. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
  NASIS_slope_segment:
    name: NASIS_slope_segment
    title: Slope Segment
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=529
    permissible_values:
      lower third on lower third: {}
      middle third on middle third: {}
      upper third on upper third: {}
      depression in a depression:
        status: obsolete
      drainageway in a drainageway:
        status: obsolete
      depression on a slope on a slope and in a depression:
        status: obsolete
      on a slope:
        description: (unspecified)
        status: obsolete
      on the crest:
        status: obsolete
      on slope and crest on a slope and on the crest:
        status: obsolete
    description: 'Is used in describing segments of long slopes. Describes the relative
      slope location of the area of interest. Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
  NASIS_slope_shape:
    name: NASIS_slope_shape
    title: Slope Shape
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=530
    permissible_values:
      concave:
        description: 'Up & Down Slope: A slope segment of the land surface whose slope
          gradient increases up the slope and decreases down the slope, and runoff
          tends to decelerate as it flows down the slope. In cross-sectional profile,
          the surface bows downward. Across Slope: A lateral slope segment of the
          land surface that bows inward along the contour which causes runoff to concentrate
          towards the middle. From an aerial perspective, the line bows into the slope.'
      convex:
        description: 'Up & Down Slope: A slope segment of the land surface whose slope
          gradient decreases up the slope and increases down the slope, and runoff
          tends to accelerate as it flows down the slope. In cross-sectional profile,
          the surface bows upward. Across Slope: A lateral slope segment of the land
          surface that bows outward along the contour, which causes runoff to spread
          out away from the middle. From an aerial perspective, the line bows out,
          away from the slope.'
      linear:
        description: 'Up & Down Slope: A slope segment of the land surface whos slope
          gradient is approximately constant and across which runoff neither accelerates
          nor decelerates as it flows down the slope. In cross-sectional profile the
          surface appears dominantly as a straight line. Across Slope: A lateral slope
          segment of the land surface that is dominantly a straight line as observed
          along the contour, which causes predominantly parallel surface water flow.'
      undulating:
        status: obsolete
      complex:
        status: obsolete
    description: The geometric, two dimensional profile (shape) of the slope either
      parallel or perpendicular to the elevation contours.
  NASIS_sociability_class:
    name: NASIS_sociability_class
