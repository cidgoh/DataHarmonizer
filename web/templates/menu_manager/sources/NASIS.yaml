  NASIS_stickiness:
    name: NASIS_stickiness
    title: Stickiness
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=560
    permissible_values:
      moderately sticky:
        description: After release of pressure, soil material adheres to both digits
          and tends to stretch slightly rather than pull completely free from either
          digit.
      nonsticky:
        description: After release of pressure, practically no soil material adheres
          to the thumb or forefinger. (SSM)
      slightly sticky:
        description: After release of pressure, soil material adheres perceptible
          to both digits. As the digits are separated, the material tends to come
          off one or the other rather cleanly. The material does not stretch appreciably
          on separation of the digits.
      very sticky:
        description: After release of pressure, soil material adheres so strongly
          to both digits that it stretches decidely when the digits are separated.
          Soil material remains on both digits.
    description: 'The capacity of soil to adhere to other objects. Stickiness is estimated
      at the moisture content that displays the greatest adherence when pressed between
      thumb and forefinger. Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012'
  NASIS_stocking_rate:
    name: NASIS_stocking_rate
    title: Stocking Rate
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=561
    permissible_values:
      low: {}
      medium: {}
      high: {}
  NASIS_stover_managed:
    name: NASIS_stover_managed
    title: Stover Managed
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=562
    permissible_values:
      not applicable:
        description: No stover was present.
      gleaned by livestock:
        description: Livestock is used to glean the left over crop residue.
      mechanically harvested:
        description: Stover is harvested with equipment.
      burned:
        description: The stover is burned.
      herbicide:
        description: Killed with chemical spray.
      not grazed or removed:
        description: The stover is not removed or grazed.
      incorporated with tillage:
        description: Stover is worked into the soil manually or mechanically.
    description: How the stover is managed after harvest.
  NASIS_structure_grade:
    name: NASIS_structure_grade
    title: Structure Grade
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=563
    permissible_values:
      weak:
        description: Individual soil units or aggregates are barely observable in
          place. When gently disturbed, the soil material parts into a mixture of
          whole and broken units and much material that exhibits no planes of weakness.
          (SSM)
      moderate:
        description: Individual soil units or aggregates are well formed and evident
          in undisturbed soil. When disturbed, the soil material parts into a mixture
          of mostly whole units, some broken units, and material not in units. (SSM)
      strong:
        description: Individual soil units or aggregates are distinct in undisturbed
          soil. When removed, the soil material parts mainly into whole units. (SSM)
      structureless:
        description: No individual soil units or aggregates are observable, either
          in place or following disturbance. (SSM)
      weak and moderate:
        status: obsolete
      moderate and strong:
        status: obsolete
      very strong:
        status: obsolete
    description: 'Grade describes the distinctness of units. Criteria are the ease
      of separation into discrete units and the proportion of units that hold together
      when the soil is handled. Reference: Soil Survey Manual.'
  NASIS_structure_size:
    name: NASIS_structure_size
    title: Structure Size
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=564
    permissible_values:
      coarse:
        description: 'Granular: 5 to <10 mm Columnar or prismatic: 50 to <100mm Angular
          or subangular blocky: 20 to <50mm'
      fine:
        description: 'Granular: 1 to <2 mm Columnar or prismatic: 10 to <20 mm Angular
          or subangular blocky: 5 to <10 mm'
      medium:
        description: 'Granular or platy: 2 to <5 mm Columnar or prismatic: 20 to <50
          mm Angular or subangular blocky: 10 to <20 mm'
      thick:
        description: 5 to <10mm
      thin:
        description: 1 to <2mm
      very coarse:
        description: 'Granular: =>10mm Columnar or prismatic: 100 to <500mm Angular
          or subangular blocky: =>50mm'
      very fine:
        description: 'Granular or platy: <1 mm Columnar or prismatic: <10 mm Angular
          or subangular blocky: <5 mm'
      very thick:
        description: =>10mm
      very thin:
        description: <1mm
      extremely coarse:
        description: 'Granular: n/a Columnar or prismatic: =>500mm Angular or subangular
          blocky: n/a'
      coarse and very coarse:
        status: obsolete
      very fine and fine:
        status: obsolete
      fine and medium:
        status: obsolete
      medium and coarse:
        status: obsolete
      extremely fine:
        status: obsolete
      fine to coarse:
        status: obsolete
    description: 'Five classes are employed: very fine, fine, medium, coarse, and
      very coarse. The size limits of the classes differ according to the shape of
      the units. The size limits refer to the smallest dimension of plates, prisms,
      and columns. Reference: Soil Survey Manual.'
  NASIS_structure_type:
    name: NASIS_structure_type
    title: Structure Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=565
    permissible_values:
      angular blocky:
        description: Polyhedrals with faces that intersect at sharp angles (planes).
      cloddy:
        description: Irregular blocks created by artificial disturbance - i.e. tillage
          operations or compaction.
      columnar:
        description: 'Vertically elongated units with rounded tops which commonly
          are "bleached".'
      granular:
        description: Small polyhedrals with curved or very irregular faces.
      massive:
        description: No structural units. Material is a coherent mass (not necessarily
          cemented).
      platy:
        description: Flat or tabular-like units.
      prismatic:
        description: Vertically elongated units with flat tops.
      subangular blocky:
        description: Polyhedrals with sub-rounded and planar faces, lacking sharp
          angles.
      single grain:
        description: No structural units. Material is entirely noncoherent.
      wedge:
        description: Elliptical, interlocking lenses that teminate in acute angles,
          bounded by slickensides; not limited to vertic materials.
      lenticular:
        description: Overlapping lenses oriented parallel to the soil surface which
          are thickest in the middle and thin towards the edges; commonly associated
          with moist soils, texture classes high in silt or very fine sand (e.g.,
          silt loam), and high potential frost action.
      lenticular platy:
        status: obsolete
      blocky:
        status: obsolete
      crumb:
        status: obsolete
    description: 'The basic shape of a structural unit. Reference: Soil Survey Manual.'
  NASIS_suppression_degree:
    name: NASIS_suppression_degree
    title: Suppression Degree
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=566
    permissible_values:
      none:
        description: The crown is completely free to develop.
      slight:
        description: Competition for light from the side has caused the crown to develop
          abnormally.
      moderate:
        description: Side competition and/or overtopping has caused abnormal top development
          and some apparent height loss (up to one-third of total height).
      severe:
        description: Overtopping has resulted in a serious reduction in height growth
          (more than one-third of total height).
  NASIS_surface_water_kind:
    name: NASIS_surface_water_kind
    title: Surface Water Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=567
    permissible_values:
      ponded:
        description: Land surface is temporarily covered by standing water, as in
          a closed depression.
      flooded:
        description: Land surface is temporarily covered by flowing water, as in overbank
          stream flow.
      none observed:
        description: No surface water was observed at the time of field visit.
      permanent:
        description: Lasting (permanent) waterbody overlying subaqueous soils.
    description: A descriptive phrase concerning the occurrence of water on the surface
      of the soil. Most often used when describing subaqueous soils (SAS), but could
      be used in any soil description.
  NASIS_table_collection_replication:
    name: NASIS_table_collection_replication
    title: Table Collection Replication
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=568
    permissible_values:
      selectable for replication:
        description: Table collection is selectable for repliication. Replicated columns
          in the root table should be indicated by setting the in_replication_select_list
          flag.
      auto replication:
        description: Table collection is auto replicated. Do not set any columns in
          the root table, in_replication_select_list flag.
