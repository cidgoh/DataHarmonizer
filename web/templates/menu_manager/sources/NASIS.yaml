  NASIS_concen_redox_boundary:
    name: NASIS_concen_redox_boundary
    title: Concen Redox Boundary
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=74
    permissible_values:
      sharp:
        description: Color changes in <0.1 mm between the feature and the soil matrix;
          change is abrupt even under 10X hand lens.
      clear:
        description: Color changes within 0.1 to <2 mm between the feature and the
          soil matrix; gradation is visible without 10X hand lens.
      diffuse:
        description: Color changes in => 2 mm between the feature and soil matrix;
          gradation is easily visible with 10X hand lens.
    description: 'The gradation between the concentration or redoximorphic feature
      and the adjacent matrix. Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012.'
  NASIS_concen_redox_hardness:
    name: NASIS_concen_redox_hardness
    title: Concen Redox Hardness
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=75
    permissible_values:
      indurated:
        description: Stress applied is greater than or equal 3 joules. (SSM)
      noncoherent:
        description: Stress applied ranges from 0 to 8 newtons. (SSM)
      very weakly coherent:
        description: Stress applied ranges from 20 to 40 newtons. (SSM)
      weakly coherent:
        description: Stress applied ranges from 40 to 80 newtons. (SSM)
      extremely weakly coherent:
        description: Stress applied ranges from 8 to 20 newtons. (SSM)
      moderately coherent:
        description: Stress applied ranges from 80 to 160 newtons. (SSM)
      strongly coherent:
        description: Stress applied ranges from 160 to 800 newtons. (SSM)
      very strongly coherent:
        description: Stress applied ranges from 800 newtons to 3 joules. (SSM)
      noncemented:
        description: Stress applied ranges from 0 to 8 newtons. (SSM)
        status: obsolete
      extremely weakly:
        description: cemented Stress applied ranges from 8 to 20 newtons. (SSM)
        status: obsolete
      very weakly:
        description: cemented Stress applied ranges from 20 to 40 newtons. (SSM)
        status: obsolete
      weakly:
        description: cemented Stress applied ranges from 40 to 80 newtons. (SSM)
        status: obsolete
      moderately:
        description: cemented Stress applied ranges from 80 to 160 newtons. (SSM)
        status: obsolete
      strongly:
        description: cemented Stress applied ranges from 160 to 800 newtons. (SSM)
        status: obsolete
      very strongly:
        description: cemented Stress applied ranges from 800 newtons to 3 joules.
          (SSM)
        status: obsolete
    description: 'The relative force required to crush the concentration or redoximorphic
      feature (use the same classes and criteria as the "Rupture Resistance for Blocks/Peds/Clods-Cementation"
      column); e.g., Strongly Cemented (ST). Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012.'
