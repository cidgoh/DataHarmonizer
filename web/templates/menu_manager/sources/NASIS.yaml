  NASIS_crown_class:
    name: NASIS_crown_class
    title: Crown Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=119
    permissible_values:
      codominant:
        description: "Tree whose crown helps to form the general level of the main\
          \ canopy in even-aged stands or, in uneven-aged stands, the main canopy\
          \ of the tree's immediate neighbors, receiving full light from above and\
          \ comparatively little from the sides."
      dominant:
        description: "Tree whose crown extends above the general level of the main\
          \ canopy of even-aged stands or, in uneven-aged stands, above the crowns\
          \ of the tree's immediate neighbors and receiving full light from above\
          \ and partial light from the sides."
  NASIS_crust_development_class:
    name: NASIS_crust_development_class
    title: Crust Development Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=120
    permissible_values:
      weak:
        description: Physical and salt crusts are fragile and can be disrupted by
          rainfall. Weak physical crusts have a smooth morphology, none to few cyanobacterial
          sheaths, and little or no darkening from cyanobacteria. Poorly developed
          biological crusts have a smooth or dimpled morphology, dense cyanobacterial
          sheaths, and variable darkening from cyanobacteria.
      strong:
        description: Well developed crusts. Physical crusts are usually platy or massive
          and are not disrupted by rainfall. Biological crusts are strongly developed
          with a rugose, pinnacled, or rolling morphology, a diverse biological assemblage
          with two or more groups of organisms, and obvious darkening by cyanobacteria,
          rubbery algae, moss, or lichen.
    description: "The relative strength of a soil's physical or biological crust.\
      \ Either weak or strong."
  NASIS_cryptogam_cover_class_legacy:
    name: NASIS_cryptogam_cover_class_legacy
    title: Cryptogam Cover Class Legacy
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=121
    permissible_values:
      low:
        description: Added as a legacy choice from the ESIS database when the ESI
          data (from ESIS) was imported into NASIS. Actual definition of this choice
          is unknown.
      medium:
        description: Added as a legacy choice from the ESIS database when the ESI
          data (from ESIS) was imported into NASIS. Actual definition of this choice
          is unknown.
      high:
        description: Added as a legacy choice from the ESIS database when the ESI
          data (from ESIS) was imported into NASIS. Actual definition of this choice
          is unknown.
    description: The cryptogram cover class brought over from the ESIS database.
  NASIS_ct_septic_potential:
    name: NASIS_ct_septic_potential
    title: Ct Septic Potential
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=122
    permissible_values:
      extremely low potential:
        description: These soils have severe limitations that are extremely difficult
          to overcome. A permit for absorption field installation may not be issued
          unless the naturally occurring soils meet the minimal requirements outlined
          in the state health code. It is unlikely these soils can be improved sufficiently
          to meet state health code regulations.
      very low potential:
        description: These soils have severe limitations that require extensive design
          and site preparation. A permit for absorption field installation may not
          be issued unless the naturally occurring soils meet the minimal requirements
          outlined in the state health code. It is unlikely these soils can be improved
          sufficiently to meet state health code regulations. The cost factor ranges
          from 4.25x to 6.0x.
      low potential:
        description: These soils have limitations that require extensive design and
          site preparation. The cost factor ranges from 2.5x to 3.5x.
      medium potential:
        description: These soils have significant limitations that are generally overcome
          with commonly applied designs. The cost factor ranges from 2.0x to 2.5x.
      high potential:
        description: These soils have the best combination of characteristics or may
          have limitations that can be easily overcome using standard installation
          practices. The cost factor ranges from 1.0x to 2.0x.
      not rated:
        description: These soils have characteristics that show extreme variability
          from on location to another. The work needed to overcome adverse soil properties
          cannot be estimated.
    description: 'The Soil Potential Ratings for Subsurface Disposal Systems data
      indicates the relative suitability of soils for installing a single family residence
      subsurface disposal system (SSDS), as well as ways those limitations may be
      overcome. Reference: CT_ECO_Resource_Guide_Soils_Potential_SSDS.pdf'
