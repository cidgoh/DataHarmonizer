enums:
  NASIS_aashto_group_classification:
    name: NASIS_aashto_group_classification
    title: Aashto Group Classification
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=1
    permissible_values:
      a-1:
        description: Granular materials (35% or less passing No. 200 sieve), silty
          or clayey gravel and sand.
      a-1-a: {}
      a-1-b: {}
      a-2:
        description: Granular materials (35% or less passing No. 200), silty or clayey
          gravel and sand.
      a-2-4: {}
      a-2-5: {}
      a-2-6: {}
      a-2-7: {}
      a-3:
        description: Granular materials (35% or less passing No. 200), fine sand.
      a-4:
        description: Silt-Clay materials (more than 35% passing NO. 200), silty soils.
      a-5:
        description: Silt-Clay Materials (more than 35% passing No. 200), clayey soils.
      a-6:
        description: Silt-Clay materials (more than 35% passing No. 200) clayey soils.
      a-7:
        description: Silt-Clay materials (more than 35% passing No. 200), clayey soils.
      a-7-5: {}
      a-7-6: {}
      a-8: {}
    description: 'AASHTO Group Classification is a system that classifies soils specifically
      for geotechnical engineering purposes that are related to highway and airfield
      construction. It is based on particle-size distribution and Atterberg limits,
      such as liquid limit and plasticity index. This classification system is covered
      in Standard No. M 145- 82, published by the American Association of State Highway
      and Transportation Officials (AASHTO), and consists of a symbol and a group
      index. The classification is based on that portion of the soil that is smaller
      than 3 inches in diameter. Reference: Part 618 of the National Soil Survey Handbook.
      Reference: This is a classification of soil material for highway and airfield
      construction (Procedure M 145-73 in Am. Assoc. of State Highway and Transportation
      Officials, 1984.'
