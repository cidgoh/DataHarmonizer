          the aid of machinery. All horizons and layers formed in human-transported
          material are indicated by a "caret" prefix (e.g., ^A-^C-Ab-Btb). The "O"
          indicates layers dominated by organic material. Some are saturated with
          water for long periods, or were once saturated but are now artificially
          drained; others have never been saturated.'
