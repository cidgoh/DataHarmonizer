  NASIS_plasticity:
    name: NASIS_plasticity
    title: Plasticity
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=423
    permissible_values:
      moderately plastic:
        description: A roll of soil 4cm long x 4mm diameter supports itself when held
          on end; a 2mm roll does not.
      nonplastic:
        description: A roll of soil 4cm long x 6mm diameter cannot support itself
          when held on end.
      slightly plastic:
        description: A roll of soil 4cm long x 6mm diameter supports itself when held
          on end; a 4mm roll does not.
      very plastic:
        description: A roll of soil 4cm long x 2mm diameter supports itself when held
          on end.
    description: 'The degree to which "puddled" or reworked soil can be permanently
      deformed without rupturing. The evaluation is made by forming a roll (wire)
      of soil at a water content where the maximum plasticity is expressed. Reference:
      Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_plot_protocol:
    name: NASIS_plot_protocol
    title: Plot Protocol
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=424
    permissible_values:
      basal area:
        description: 'Used to determine tree basal area. Reference: Husch et. al.
          2002, Forest Mensuration, 4th ed., Chapter 8, Stand Parameters.'
      crop tree inventory:
        description: Used to determine the composition, quality, condition (age, size,
          health, growth rate, height), and stocking (trees per acre, percent stocking,
          D+ spacing, or basal area) of a stand by inventorying the trees on a quality
          basis (Leave/Cut/Other). Data elements include species, DBH, quality rating,
          age.
      windbreak: {}
      fixed radius:
        description: Used to determine tree diameter, range of diameters, stocking
          rate (trees per acre, percent stocking, D+ spacing, or basal area, stand
          composition, and stand condition (age, health, growth rate, and height)
          by measuring all or some of the trees within a fixed area plot. Data elements
          include species, distance between trees, age, growth rate, tree quality,
          and DBH.
      ocular estimate: {}
      pasture condition score:
        description: 'Used on pastureland to determine how well a pasture is managed
          and management impacts on soil, water, and air quality. Reference: Guide
          to Pasture Condition Scoring; Pasture condition Score Sheet.'
      pasture stick: {}
      rangeland health:
        description: 'Used to assess whether the integrity of ecological processes
          are balanced and sustained. Reference: Interpreting Indicators of Rangeland
          Health, Version 4.'
      releve method:
        description: 'Used to determine canopy cover, vertical and horizontal structure.
          References: Barbour et.al 1987, Terrestrial Plant Ecology, Second Edition,
          Chapter 9; California Native Plant Society 2007, Relev protocol; Minnesota
          Department of Natural Resources 2007, A handbook for collecting vegetation
          plot data in Minnesota: The relev method.'
      site index:
        description: 'Used to determine site index. Reference: National Forestry Manual,
          Exhibit 537-1.'
      variable radius:
        description: Used to determine tree diameter, range of diameters, stocking
          rate (trees per acre, percent stocking, D+ spacing, or basal area, stand
          composition, and stand condition (age, health, growth rate, and height)
          by measuring all or some of the trees within a plot of a radius limit determine
          by tree size. Data elements include species, distance between trees, age,
          growth rate, tree quality, and DBH.
      zig zag:
        description: Used to determine tree diameter, range of diameters, stocking
          rate (trees per acre, percent stocking, D+ spacing, or basal area, stand
          composition, and stand condition (age, health, growth rate, and height)
          by taking individual tree measurements along a designed zig-zag transect.
          Data elements include species, distance between trees, age, growth rate,
          tree quality, and DBH.
      range trend:
        description: Trend is a rating of the direction of change that may be occurring
          on a site by evaluating a site repeatedly and comparing to a baseline of
          information. Trend evaluates, plant health, vigor, composition, erosion,
          soil health, and utilization factors. NRPH 2006.
      forest stand inventory:
        description: Used to determine tree diameter, range of diameters, stocking
          rate (trees per acre, percent stocking, D+ spacing, or basal area, stand
          composition, and stand condition (age, health, growth rate, and height)
          by taking individual tree measurements. Data elements include species, distance
          between trees, tree condition, and DBH.
      weight estimate and ocular reconnaissance: {}
      total harvest: {}
    description: 'The sampling protocol used when the sample site is a plot as opposed
      to a transect sampling protocol. Reference: NFH 636.3'
