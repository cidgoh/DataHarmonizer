  NASIS_basal_area_factor:
    name: NASIS_basal_area_factor
    title: Basal Area Factor
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=32
    permissible_values:
      '5': {}
      '10': {}
      '20': {}
      '30': {}
      '40': {}
      '15': {}
      '25': {}
      '35': {}
      '50': {}
      '60': {}
      '70': {}
      '80': {}
    description: 'The conversion factor used to compute total basal area for the site.
      The value chosen is dependent upon the tool used in the field. If the prism
      tool is used then: The diopter of the prism determines the prisms basal area
      factor (BAF). The most commonly used prisms are those with a BAF between 5 and
      40. The larger the average diameter of the stand to be measured, the larger
      the BAF used. The smaller the average diameter, or the more open the stand,
      the smaller the BAF used. Reference: National Forestry Handbook, 636.35.'
