  NASIS_concentration_kind:
    name: NASIS_concentration_kind
    title: Concentration Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=81
    permissible_values:
      clay bodies: {}
      barite crystals: {}
      barite masses:
        title: Masses of barite
      calcite crystals: {}
      carbonate concretions: {}
      carbonate nodules: {}
      mica flakes, unspecified:
        title: Mica flakes Mica
        description: (undetermined mineralogy) and stable mica pseudomorphs
      gibbsite concretions: {}
      gibbsite nodules: {}
      gypsum crystals, unspecified:
        title: Gypsum crystals
        description: A generic choice that has no implication of crystal type (selenite,
          satin spar, etc.), no connotation of pedogenesis (gypsum crystal clusters),
          and no connotation of inherited minerals (gypsum crystals, geogenic).
      gypsum masses:
        title: Masses
        description: of gypsum Discrete non-cemented gypsum bodies; crystals generally
          not visible.
      gypsum crystal clusters:
        description: A pocket-like cluster of gypsum crystals within a soil matrix
          or groundmass. Generally assumed to be pedogenic accumulations.
      salt crystals: {}
      salt masses: {}
      carbonate masses:
        title: Masses of carbonate
      opal: {}
      silica masses:
        title: Masses of silica
      silica concretions: {}
      durinodes: {}
      worm casts: {}
      insect casts:
        title: Insects casts
      fecal pellets: {}
      plant phytoliths: {}
      root sheaths: {}
      sponge spicules: {}
      shell fragments: {}
      titanium oxide: {}
      diatoms: {}
      glauconite pellets: {}
      carbonate, finely disseminated:
        title: Finely disseminated
        description: carbonates Very small carbonate bodies (e.g. CaCO3) diffused
          within the soil and commonly not visible; may cause the soil to appear as
          though lightly dusted with whitish powder. Generally detected by a positive
          reaction to Effervescence tests.
      salt, finely disseminated:
        title: Finely disseminated
        description: salts Very small salt bodies (e.g. NaCl) diffused within the
          soil and commonly not visible; may cause the soil to appear as though lightly
          dusted with whitish powder. Generally detected by SAR test or by its salty
          taste.
      ortstein nodules: {}
      carbonate root casts:
        description: Branching, often tubular forms of carbonate accumulation that
          are carbonate pseudomorphs of roots. In contrast to cylindrical nodules,
          implicit in this definition is the rhizolithic origin of the feature.
      carbonate bands:
        description: Sheet-like deposits of carbonate usually about one to several
          millimeters thick that form along the bedding planes of finely stratified
          parent material. They are separated by soil with little or no macroscopic
          carbonate.
      carbonate beds:
        description: Similar to bands by accumulating along bedding planes of parent
          material, but differ in size by being a few centimeters to a meter or more
          thick. Beds of carbonate accumulations, which can range from non-cemented
          to indurated, occur below the main zone of pedogenic horizons and preserve
          the original sedimentary structure.
      carbonate laminae:
        description: Thin, individual layers of carbonate that comprise the laminar
          horizon and range from < 1 mm to a few millimeters in thickness. They typically
          parallel one another, but one set may truncate another set at various angles.
      carbonate pisoliths:
        description: Subangular to spheroidal carbonate masses that form within highly
          developed petrocalcic horizons and range from 2 mm to more than 100 mm in
          diameter. They are characterized by concentric banding and an internal structure
          of disrupted laminae, or disrupted concentric banding that may or may not
          have detrital material at their cores.
      carbonate ooliths:
        description: Spheroidal carbonate masses that form within highly developed
          petrocalcic horizons. They are less than 2 mm in diameter and have an internal
          structure of laminae that may or may not have detrital material at their
          cores.
      mica flakes, mixed:
        title: Mixed mica flakes
        description: mica flakes comprised of <75 percent of any individual mica mineral.
      mica flakes, biotite:
        title: Biotite mica flakes
        description: Biotite mica (75 percent of total mica) and stable mica pseudomorphs.
      mica flakes, muscovite:
        title: Muscovite mica flakes
        description: Muscovite mica (75 percent of total mica) and stable mica pseudomorphs
      feldspar minerals:
        description: Discrete angular nodules (fragments) of feldspar
      ferromagnesian minerals:
        description: Ferromagnesian- and magnesium-silicate minerals, such as the
          serpentine minerals (antigorite, chrysotile, and lizardite) plus talc, olivines,
          Mg-rich pyroxenes, and Mg-rich amphiboles, in the fine-earth fraction.
      volcanic glass:
        description: Volcanic glass, glass aggregates, glass-coated grains, and other
          vitric volcaniclastics.
      gypsum, finely disseminated:
        title: Finely disseminated gypsum
        description: "Very small gypsum bodies diffused within the soil layer and\
          \ commonly not visible; may cause the soil to appear as though lightly dusted\
          \ with whitish powder. Generally detected with the use of National Soil\
          \ Survey Lab field kits; a positive reaction to soluble sulfates (SO4\u2014\
          ) in the presence of calcium (Ca++)."
      selenite crystals:
        description: The clear, colorless variety of gypsum, (occasionally brownish
          in color due to impurities) occurring in distinct, transparent to somewhat
          opaque, monoclinic crystals or in large crystalline masses with one primary
          cleavage plane and two poor cleavages that give fragments a skewed, angular
          look.
      satin spar crystals:
        description: A white, translucent, fibrous variety of gypsum, characterized
          by a silky luster; fibrous crystal aggregate includes fine, parallel threads
          that reflect light, resembling satin.
      lime masses:
        title: Masses of lime
        status: obsolete
      dark masses:
        title: Masses of dark accumulation
        status: obsolete
      dark concretions:
        status: obsolete
      dark nodules:
        status: obsolete
      plinthite segregations:
        status: obsolete
      iron masses:
        title: Masses of iron accumulation
        status: obsolete
      iron concretions:
        status: obsolete
      ironstone nodules:
        status: obsolete
      gypsum threads:
        status: obsolete
      carbonate threads:
        status: obsolete
      nonmagnetic shot:
        status: obsolete
      iron-manganese masses:
        title: Masses of iron- manganese accumulation
        status: obsolete
      iron-manganese concretions:
        status: obsolete
      magnetic shot:
        status: obsolete
      clay depletions:
        status: obsolete
      iron depletions:
        status: obsolete
      iron-manganese nodules:
        status: obsolete
      manganese concretions:
        status: obsolete
      manganese nodules:
        status: obsolete
      manganese masses:
        title: Masses of manganese accumulation
        status: obsolete
      oxide masses:
        title: Masses of oxide accumulation
        status: obsolete
      lime concretions:
        status: obsolete
      lime nodules:
        status: obsolete
      worm nodules:
        status: obsolete
    description: 'Identify the composition and the physical state of the concentration
      in the soil. Reference: Field Book for Describing and Sampling Soils v 3.0,
      Sep 2012.'
