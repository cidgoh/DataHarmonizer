  NASIS_rosgen_stream_type:
    name: NASIS_rosgen_stream_type
    title: Rosgen Stream Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=483
    permissible_values:
      A:
        description: Steep, entrenched, cascading, step-pool streams. High energy/debris
          transport associated with depositional soils. Very stable if bedrock or
          boulder-dominated channel.
      B:
        description: Moderately entrenched, moderate gradient, riffle dominated channel
          with infrequently spaced pools. Very stable plan and profile. Stable banks.
      C:
        description: Low gradient, meandering, point bar, riffle/pool, alluvial channels
          with broad, well- defined flood plains.
      D:
        description: Braided channel with longitudinal and transverse bars. Very wide
          channel with eroding banks.
      DA:
        description: Anastomizing (multiple channels) narrow and deep with extensive,
          well-vegetated flood plains and associated wetlands. Very gentle relief
          with highly variable sinuosities and width-to-depth ratios. Very stable
          streambanks.
      E:
        description: Low gradient, meandering riffle/pool stream with low width-to-depth
          ratio and little deposition. Very efficient and stable. High meander width
          ratio.
      F:
        description: Entrenched meandering riffle/pool channel on low gradients with
          high width-to-depth ratio.
      G:
        description: Entrenched gully step-pool and low width-to-depth ratio on moderate
          gradients.
      Aa+:
        description: Very steep, deeply entrenched, debris transport, torrent streams.
    description: "Rosgen Stream Classification System's Classes. Information taken\
      \ from the NRCS National Engineering Handbook, Part 654 Aug 2007."
  NASIS_rule_design:
    name: NASIS_rule_design
    title: Rule Design
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=484
    permissible_values:
      limitation:
        description: The rule is designed in a manner such that the higher the fuzzy
          value, the more limited the soil is for the stated use. The fuzzy values,
          of child-rules, closest to 1 represent the most limiting features and will
          be sorted in descending order.
      suitability:
        description: The rule is designed in a manner such that the higher the fuzzy
          value, the better suited the soil is for the stated use. The fuzzy values,
          of child-rules, closest to 0 represent the most limiting features and will
          be sorted in ascending order.
      class:
        description: The rule is designed to result in the soil being interpreted
          as a member of a discrete class. Reportable features are those with fuzzy
          values closest to 1. The fuzzy values of child-rules will be sorted in descending
          order.
  NASIS_runoff:
    name: NASIS_runoff
    title: Runoff
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=485
