      other forms of irrigation: {}
  NASIS_fl_soil_leaching_potential:
    name: NASIS_fl_soil_leaching_potential
    title: Fl Soil Leaching Potential
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=217
    permissible_values:
      low:
        description: 'Slowest permeability is 0.6 in/hr or less. Soils with a muck/peat
          layer are rated "low".'
      medium:
        description: 'Slowest permeability is between 0.6 and 6.0 in/hr. Soils with
          a mucky layer are rated "medium" unless the soil has a slowest permeability
          of less than 0.6 in/hr. Then the soil is rated "low".'
      high:
        description: Slowest permeability is 6.0 in/hr or more.
    description: 'Factors that determine the soil leaching rating are the soil permeability
      and the occurrence of mucky layers in the upper 80 inches of the soil. General
      classes of HIGH, MEDIUM, LOW are used. Reference: Soil Ratings for Selecting
      Pesticides for Water Quality Goals. Circular 959 in a series of the Soil and
      Water Science Department, Florida Cooperative Extension Service, Institute of
      Food and Agricultural Sciences, University of Florida. Publication Date: April
      1991. Revised: September 2006. Reviewed September 2009. Please visit the EDIS
      web site at http://edis.ifas.ufl.edu.'
  NASIS_fl_soil_runoff_potential:
    name: NASIS_fl_soil_runoff_potential
    title: Fl Soil Runoff Potential
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=218
    permissible_values:
      low:
        description: Soils with a hydrological group of A, and soils with a hydrological
          group of B (in their natural, undrained state) that have a permeability
          of 6.0 in/hr or greater in all of the upper 20 inches of the soil.
      medium:
        description: Soils with a hydrological group of C, and soils with a hydrological
          group of B (in their natural, undrained state) that have a permeability
          of less than 6.0 in/hr within 20 inches of the soil surface. Soils that
          rate low are changed to a rating of medium where the slope is more than
          12 percent.
      high:
        description: Soils with a hydrological group of D in their natural, undrained
          state. Soils that are frequently flooded during the growing season are rated
          high. Soils that rate medium are changed to a rating of high where the slope
          is more than 8 percent.
    description: 'Factors that determine the soil runoff rating are the hydrologic
      group, permeability, and slope. General classes of HIGH, MEDIUM, LOW are used.
      Reference: Soil Ratings for Selecting Pesticides for Water Quality Goals. Circular
      959 in a series of the Soil and Water Science Department, Florida Cooperative
      Extension Service, Institute of Food and Agricultural Sciences, University of
      Florida. Publication Date: April 1991. Revised: September 2006. Reviewed September
      2009. Please visit the EDIS web site at http://edis.ifas.ufl.edu.'
  NASIS_flood_type:
    name: NASIS_flood_type
    title: Flood Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=219
    permissible_values:
      overbank flow:
        description: Inundation as a result of overbank stream flow.
      overland flow:
        description: Inundation due to runoff of water from surrounding or adjacent
          slopes. Water is not concentrated in any form of stream channel.
      tidal:
        description: Inundation as a result of storm surge, wind tides, lunar tides,
          seasonal tides, and daily ocean tides.
      intertidal:
        description: Environment between low and high tides.
      subtidal:
        description: Continuous inundation of subaqueous soil surface.
      non-tidal:
        description: Water not affected by tides.
    description: "Lists the types of flooding. Were originally only the two basic\
      \ types of flooding but with the addition of Wassists and Wassents where a more\
      \ 'permanent' type of flooding is required the third type, 'tidal' flooding\
      \ type was added."
  NASIS_flooding_duration_class:
    name: NASIS_flooding_duration_class
    title: Flooding Duration Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=220
    permissible_values:
      extremely brief:
        description: (0.1 to 4 hours) 0.1 to 4 hours
      very brief:
        description: (4 to 48 hours) 4 hours to 48 hours
      brief:
        description: (2 to 7 days) 2 days to 7 days
      long:
        description: (7 to 30 days) 7 days to 30 days
      very long:
        description: (more than 30 days) More than 30 days
    description: 'The average duration of inundation per flood occurrence is given
      only for the occasional, frequent, and very frequent classes. Part 618 National
      Soil Survey Handbook. Estimation of how long an area typically is flooded during
      a single flood event. Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012'
  NASIS_flooding_frequency_class:
    name: NASIS_flooding_frequency_class
    title: Flooding Frequency Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=221
    permissible_values:
      none:
        description: No reasonable possibility of flooding; near 0 percent chance
          of flooding in any year or less than 1 time in 500 years.
      rare:
        description: Flooding is unlikely but possible under unusual weather conditions;
          1 to 5 percent chance in any year (1 to 5 times in 100 years).
      occasional:
        description: Flooding is expected infrequently, 5 to 50 percent chance in
          any year, (5 to 50 times in 100 years).
      frequent:
        description: Flooding is likely to occur often under usual weather conditions;
          more than 50 percent chance of flooding in any year or more than 50 times
          in 100 years, but less than a 50 percent chance of flooding in all months
          in any year.
      very rare:
        description: Flooding is very unlikely but is possible under unusual weather
          conditions; less than 1 percent chance in any year (less than 1 time in
          100 years, but more than 1 time in 500 years).
      very frequent:
        description: Flooding is likey to occur very often under usual weather conditions;
          more than 50 percent chance in all months of any year.
      common:
        status: obsolete
    description: 'Flooding frequency class indicates the number of times flooding
      occurs over a period of time. Reference: Part 618 National Soil Survey Handbook.
      Estimation of how often, typically, flooding occurs. Reference: Field Book for
      Describing and Sampling Soils v 3.0, Sep 2012'
