  NASIS_cowardin_wetland_subsystem:
    name: NASIS_cowardin_wetland_subsystem
    title: Cowardin Wetland Subsystem
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=101
    permissible_values:
      subtidal:
        description: The substrate is continuously submerged.
      tidal:
        description: The gradient is low and water velocity fluctuates under tidal
          influence. The streambed is mainly mud with occasional patches of sand.
          Oxygen deficits may sometimes occur and the fauna is similar to that in
          the Lower Perennial Subsystem. The floodplain is typically well developed.
      intertidal:
        description: The substrate is exposed and flooded by tides; includes the associated
          splash zone.
      lower perennial:
        description: The gradient is low and water velocity is slow. There is no tidal
          influence, and some water flows throughout the year. The substrate consists
          mainly of sand and mud. Oxygen deficits may sometimes occur, the fauna is
          composed mostly of species that reach their maximum abundance in still water,
          and true planktonic organisms are common. The gradient is lower than that
          of the Upper Perennial Subsystem and the floodplain is well developed.
      upper perennial:
        description: The gradient is high and velocity of the water fast. There is
          no tidal influence and some water flows throughout the year. The substrate
          consists of rock, cobbles, or gravel with occasional patches of sand. The
          natural dissolved oxygen concentration is normally near saturation. The
          fauna is characteristic of running water, and there are few or no planktonic
          forms. The gradient is high compared with that of the Lower Perennial Subsystem,
          and there is very little floodplain development.
      intermittent:
        description: In this Subsystem, the channel contains flowing water for only
          part of the year. When the water is not flowing, it may remain in isolated
          pools or surface water may be absent.
      limnetic:
        description: All deepwater habitats within the Lacustrine System; many small
          Lacustrine Systems have no Limnetic Subsystem.
      littoral:
        description: All wetland habitats in the Lacustrine System. Extends from the
          shoreward boundary of the system to a depth of 2 m (6.6 feet) below low
          water or to the maximum extent of nonpersistent emergents, if these grow
          at depths greater than 2 m.
    description: 'The second tier in the hierarchy of the Cowardin Wetland Classification
      System. Reference: Classification of Wetlands and Deep Water Habitats of the
      United States. FWS/OBS 79/31 December 1979 Reprinted 1992.'
  NASIS_cowardin_wetland_system:
    name: NASIS_cowardin_wetland_system
    title: Cowardin Wetland System
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=102
    permissible_values:
      estuarine:
        description: The Estuarine System consists of deepwater tidal habitats and
          adjacent tidal wetlands that are usually semienclosed by land but have open,
          partly obstructed, or sporadic access to the open ocean, and in which ocean
          water is at least occasionally diluted by freshwater runoff from the land.
          The salinity may be periodically increased above that of the open ocean
          by evaporation. Along some low-energy coastlines there is appreciable dilution
          of sea water. Offshore areas with typical estuarine plants and animals,
          such as red mangroves (Rhizophora mangle) and eastern oysters (Crassostrea
          virginica), are also included in the Estuarine System.
      lacustrine:
        description: 'The Lacustrine System includes wetlands and deepwater habitats
          with all of the following characteristics: (1) situated in a topographic
          depression or a dammed river channel; (2) lacking trees, shrubs, persistent
          emergents, emergent mosses or lichens with greater than 30% areal coverage;
          and (3) total area exceeds 8 ha (20 acres). Similar wetland and deepwater
          habitats totaling less than 8 ha are also included in the Lacustrine System
          if an active wave-formed or bedrock shoreline feature makes up all or part
          of the boundary, or if the water depth in the deepest part of the basin
          exceeds 2 m (6.6 feet) at low water. Lacustrine waters may be tidal or nontidal,
          but oceanderived salinity is always less than 0.5 %.'
      marine:
        description: The Marine System consists of the open ocean overlying the continental
          shelf and its associated high-energy coastline. Marine habitats are exposed
          to the waves and currents of the open ocean and the water regimes are determined
          primarily by the ebb and flow of oceanic tides. Salinities exceed 30 , with
          little or no dilution except outside the mouths of estuaries. Shallow coastal
          indentations or bays without appreciable freshwater inflow, and coasts with
          exposed rocky islands that provide the mainland with little or no shelter
          from wind and waves, are also considered part of the Marine System because
          they generally support typical marine biota.
      palustrine:
        description: 'The Palustrine System includes all nontidal wetlands dominated
          by trees, shrubs, persistent emergents, emergent mosses or lichens, and
          all such wetlands that occur in tidal areas where salinity due to ocean-derived
          salts is below 0.5 %. It also includes wetlands lacking such vegetation,
          but with all of the following four characteristics: (1) area less than 8
          ha (20 acres); (2) active wave-formed or bedrock shoreline features lacking;
          (3) water depth in the deepest part of basin less than 2 m at low water;
          and (4) salinity due to ocean-derived salts less than 0.5 %.'
      riverine:
        description: 'The Riverine System includes all wetlands and deepwater habitats
          contained within a channel, with two exceptions: (1) wetlands dominated
          by trees, shrubs, persistent emergents, emergent mosses, or lichens, and
          (2) habitats with water containing ocean-derived salts in excess of 0.5
          . A channel is "an open conduit either naturally or artificially created
          which periodically or continuously contains moving water, or which forms
          a connecting link between two bodies of standing water" (Langbein and Iseri
          1960:5).'
    description: 'The first tier in the hierarchy of the Cowardin Wetland Classification
      System. Reference: Classification of Wetlands and Deep Water Habitats of the
      United States. FWS/OBS 79/31 December 1979 Reprinted 1992.'
  NASIS_crack_kind:
    name: NASIS_crack_kind
    title: Crack Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=104
    permissible_values:
      reversible crust related:
        description: Very shallow (e.g., 0.1 - 0.5 cm) cracks related to soil crusts;
          derived from raindrop- splash and soil puddling, followed by dewatering/consolidation
          and desiccation; very transient(generally persist less than a few weeks);
          formed by drying from surface down; minimal, seasonal influence on ponded
          infiltration (e.g., rain-drop crust cracks).
      irreversible crust related:
        description: Shallow (e.g., 0.5 - 2 cm)cracks related to soil crusts; derived
          from raindrop-splash and soil puddling, followed by dewatering/consolidation
          and desiccation; seasonally transient (not present year-round nor every
          year); minor influence on ponded infiltration (e.g., freeze-thaw crust and
          associated cracks).
      reversible trans-horizon:
        title: Reversible
        description: trans- horizon Deep vertical cracks that commonly extend across
          more than on soil horizon and may extent to the surface; derived from wetting
          and drying of the soil (e.g.Vertisols, vertic subgroups). These cracks are
          transient (commonly seasonal; close when rewetted), and have a large influence
          on ponded infiltration and Ksat.
      irreversible trans-horizon:
        title: Irreversible
        description: trans- horizon Deep vertical cracks that commonly extend across
          more than on soil horizon and may extent to the surface; derived from original
          dewatering and consolidation of parent materials (e.g., extremely coarse
          subsurface fissures within glacial till; drained polder cracks). These cracks
          are permanent (persist year-round; see Soil Taxonomy), and have a large
          influence on ponded infiltration and Ksat.
    description: 'The dominant type of fissure, also called "Extra-Structural Cracks";
      (Soil Survey Division Staff, 1993) other than those attributed to soil structure.
      Cracks are commonly vertical, subplanar, and polygonal and are the result of
      desiccation, dewatering, or consolidation of earthy material. Cracks are much
      longer and can be much wider than planes that surround soil structural units,
      such as prisms and columns. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012.'
