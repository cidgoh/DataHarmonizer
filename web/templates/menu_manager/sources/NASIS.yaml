  NASIS_miscellaneous_areas:
    name: NASIS_miscellaneous_areas
    title: Miscellaneous Areas
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=345
    permissible_values:
      badland:
        description: Badland is moderately steep to very steep barren land that is
          dissected by many intermittent drainage channels. Ordinarily, the areas
          are not stony. Badland is most common in semiarid and arid regions where
          streams cut into soft geologic material. Local relief generally ranges from
          10 and 200 meters in height. Potential runoff is very high, and erosion
          is active.
      beaches:
        description: Beaches are sandy, gravelly, or cobbly shores that are washed
          and rewashed by waves. The areas may be partly covered with water during
          high tides or storms.
      chutes:
        description: Chutes are elongated areas on steep mountain slopes that lack
          vegetation. The vegetation has been removed by avalanche or mass movement
          activity. Chutes consist of exposed bedrock, rock fragments, and large woody
          debris. Their slopes are parallel to the slope of the mountain, and their
          lengths are at least ten times their widths.
      cinder land:
        description: Cinder land is composed of loose cinders and other scoriaceous
          magmatic ejecta. The water-holding capacity is very low, and trafficability
          is poor.
      dams:
        description: Dams are artificial structures, oriented across a watercourse
          or natural drainage area, for the purpose of impounding or diverting water.
      dumps:
        description: Dumps are areas of smoothed or uneven accumulations or piles
          of waste rock and general refuse. The phase, Dumps, mine, consist of areas
          of waste rock from mines, quarries, and smelters. The component name remains
          Dumps. Some dumps that are closely associated pits are mapped as Dumps-Pits
          complex.
      dune land:
        description: Dune land consists of sand in ridges and intervening troughs
          that shift with the wind.
      glaciers:
        description: Glaciers are large masses of ice that formed, at least in part,
          on land by the compaction and recrystallization of snow. They may be moving
          slowly downslope or outward in all directions because of the stress of their
          own weight; or, they may be retreating or be stagnant. A little earthy material
          may be on or in the ice.
      gullied land:
        description: Gullied land consists of areas where erosion has cut a network
          of V-shaped or U- shaped channels. The areas resemble miniature badlands.
          Generally, gullies are so deep that extensive reshaping is necessary for
          most uses. Small areas can be shown by spot symbols. Phases that indicate
          the kind of material remaining may be useful for some areas.
      lava flows:
        description: Lava flows are areas covered with lava. In most humid regions,
          the flows are of Holcene age; but, in arid and very cold regions, they may
          be older. Most flows have sharp, jagged surfaces, crevices, and angular
          blocks that are characteristic of lava. Others are relatively smooth and
          have a ropy glazed surface. A little earthy material may be in a few rocks
          and sheltered pockets, but the flows are virtually devoid of plants other
          than lichens.
      oil-waste land:
        description: Oil-waste land consists of areas where liquid oily wastes, principally
          of saltwater and oil, have accumulated. It includes slush pits and adjacent
          areas that are affected by the liquid wastes. The land is barren, although
          some of it can be reclaimed at high cost.
      pits:
        description: Pits are open excavations from which soil and commonly underlying
          material have been removed, exposing either rock or other material.
      playas:
        description: Playas are barren flats in closed basins in arid regions. Many
          of the areas are subject to wind erosion, and many are saline, sodic, or
          both. The water table may be near the surface sometimes.
      riverwash:
        description: Riverwash is unstabilized sandy, silty, clayey, or gravelly sediment
          that is flooded, washed, and reworked frequently by rivers.
      rock outcrop:
        description: Rock outcrop consists of exposures of bare bedrock, other than
          lava flows and rock- lined pits. If needed, map units can be named according
          to the kind of rock.
      rubble land:
        description: Rubble land consists of areas of cobbles, stones, and boulders.
          Rubble land is commonly at the base of mountains, but some areas are deposits
          of cobbles, stones, and boulders left on mountainsides by glaciation or
          by periglacial processes. Rubble land has a length that is less than ten
          times the width. A line connecting the widest points of rubble land is perpendicular
          to the slope of the mountain.
      slickens:
        description: Slickens are accumulations of fine-textured material, such as
          that separated in placer mine and ore mill operations. Slickens from ore
          mills consist largely of freshly ground rock that commonly has undergone
          chemical treatment during the milling process. Slickens are usually confined
          in specially constructed basins.
      urban land:
        description: Urban land is land mostly covered by streets, parking lots, buildings,
          and other structures of urban areas.
      water:
        description: Water includes streams, lakes, ponds, and estuaries. These areas
          are covered with water in most years, at least during the period that is
          warm enough for plants to grow. Many areas are covered throughout the year.
      mined land:
        description: Mined land is areas which are significantly altered by mining
          activities. Soil material and rock has been moved into, out of, or within
          the areas designated. Because access to mined land may be limited by permissions
          or hazardous materials, identification of soil components can be difficult
          or impossible. Mined land may also have associated small excavations which
          could be correlated and delineated as pits if needed. NSSH Part 627, Exhibit
          627-1.
      blown-out land:
        description: Blownout land consists of areas from which all or most of the
          soil material has been removed by extreme wind erosion. The areas are generally
          shallow depressions that have flat or irregular floors. In some places the
          floor is a layer of material that is more resistant to wind erosion than
          the removed material or is a layer of pebbles or cobbles. In other places
          the floor may have been formed from exposure of the water table. Areas that
          are covered by water most of the year are mapped as Water. Some areas have
          a few hummocks or small dunes. Few areas of blown-out land are large enough
          to be delineated; small areas can be shown by spot symbols.
        status: obsolete
      cirque land:
        description: Cirque land consists of areas of rock and rubble that are characteristically
          bowl-like and semicircular in shape. The areas have been caused by glacial
          erosion.
        status: obsolete
      gypsum land:
        description: Gypsum land consists of exposures of nearly pure soft gypsum.
          The surface is generally very unstable and erodes easily. Trafficability
          is very poor. Areas of hard gypsum are mapped as Rock outcrop.
        status: obsolete
      salt flats:
        description: Salt flats are undrained flats that have surface deposits of
          crystalline salt overlying stratified, very strongly saline sediment. These
          areas are closed basins in arid regions. The water table may be near the
          surface sometimes.
        status: obsolete
      scoria land:
        description: Scoria land consists of areas of slaglike clinkers, burned shale,
          and fine-grained sandstone which remain after coal beds burn out. (Scoria
          land should not be confused with volcanic slag.)
        status: obsolete
      slickspots:
        description: Slickspots are areas that have a puddled or crusted, very smooth,
          nearly impervious surface. The underlying material is dense and massive.
          The material ranges from extremely acid to very strongly alkaline and from
          sand to clay.
        status: obsolete
      uranium mined land:
        description: Uranium mined land consists of areas where uranium has been mined.
          The areas include the actual mines, shafts, structures, borrow pits, barren
          tailings and waste rock piles, evaporation ponds, and contaminated waste
          yards.
        status: obsolete
    description: A common name for an area of non-soil.
