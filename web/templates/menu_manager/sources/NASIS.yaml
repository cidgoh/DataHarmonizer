        well drained outwash soils with few management limitations.
      : {}
      IIA Group IIA Diverse group of soils, generally groups IA and IB soils that have management limitations.: {}
      IIB Group IIB Poorly drained soils.: {}
      NC:
        description: Generally unproductive soils or miscellaneous areas.
    description: 'Groupings of soils that allow New Hampshire land managers to evaluate
      the relative productivity of soils and to better understand patterns of plant
      succession and how soil and site interactions influence management decisions.
      All soils in New Hampshire have been grouped into one of six categories. Reference:
      Good Forestry in the Granite State: Recommended Voluntary Forest Management
      Practices for New Hampshire.'
  NASIS_nj_farmland_assessment:
    name: NASIS_nj_farmland_assessment
    title: Nj Farmland Assessment
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=353
    permissible_values:
      a:
        description: Very productive farmland - The most desirable soil in the area
          because of high yields and ease of cultivation.
      b:
        description: Good farmland - Desirable soil because yields are generally high
          and the land can be cultivated on a permanent basis.
      c:
        description: Fair farmland - Yields are lower those in soil Group B because
          of shallowness, droughtiness, or excessive moisture. This land can be cultivated
          on a permanent basis.
      d:
        description: Poor farmland - This soil is usually too wet, stony, droughty,
          or otherwise unsuitable for permanent cultivation. Yields are low when cultivated.
      e:
        description: Very poor farmland - This land is often found in pasture or woodlands.
          Yields are ver low because of excessive water, shallowness, stoniness or
          droughtiness.
      f:
        description: Land unsuitable for agriculture - This consists of rock outcrop,
          rough stony land, coastal beaches, and clay pits.
    description: 'Class, based on soil properties and land use, into which all land
      in New Jersey is grouped and ranked for agricultural suitability. Reference:
      New Jersey Farmland Assessment Act - 1964.'
  NASIS_observation_date_kind:
    name: NASIS_observation_date_kind
    title: Observation Date Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=354
    permissible_values:
      actual site observation date:
        description: The date on which the data for a site was actually observed in
          the field.
      entry creation date:
        description: The date on which a particular site observation record was entered
          into the database, either via the program interface or via an import of
          data from an external source.
      monitoring equipment installed:
        description: The date on which monitoring equipment was installed at the site.
    description: The kind of date when the observation was recorded. I.e. date of
      actual description, date description was entered into NASIS, or a little differently,
      the date when monitoring device(s) were installed.
  NASIS_observation_intensity:
    name: NASIS_observation_intensity
    title: Observation Intensity
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=355
    permissible_values:
      quick note:
        description: "General observational note that lists species presence at data\
          \ point. No attempt is made to estimate or collect composition data. Reference:\
          \ This comes from the direction provided to soil scientists in Chapter 23\
          \ of the NASIS User's Guide on vegetation data entry."
      low-intensity:
        description: 'Rapid community characterization intended to formulate patterns
          and relationships across the landscape. This is coarse-level observation
          data typically collected during field reconnaissance by those attempting
          to become familiar with the general features of the landscape, including
          vegetation communities. Reference: Definition formulated from information
          provided in National Ecological Site Handbook (NESH) Section 631, Subpart
          B, 631.11.'
      medium-intensity:
        description: 'Focused data collection typically used to validate ecological
          site concepts. This data is typically collected by an individual trained
          in specialized data collection protocols appropriate for the habitat type.
          Reference: Definition formulated from information provided in National Ecological
          Site Handbook (NESH) Section 631, Subpart B, 631.12.'
      high-intensity:
        description: 'Detailed community characterization that typifies the ecological
          site concept. It should be collected by a well-trained, properly calibrated
          vegetation specialist using data collection protocols appropriate for the
          habitat type. Reference: Definition formulated from information provided
          in National Ecological Site Handbook (NESH) Section 631, Subpart B, 631.13.'
    description: Identifies the intensity level of the vegetation data collected at
      a point.
  NASIS_observation_method:
    name: NASIS_observation_method
    title: Observation Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=356
    permissible_values:
      push tube:
        description: Sample extracted with a push tude, either hand held or hydraulically
          powered. Generally about 2 to 10 cm in diameter.
      shovel slice:
        description: Shovel extracted by means of an undisturbed slice of soil with
          a shovel (sharpshooter, spade) from the side of a small pit. Generally about
          20 x 40cm is size.
      auger, bucket:
        title: Bucket Auger
        description: Sample extracted by means of open, sand, closed, of mud bucket
          auger. Generally 5 to 12 cm diameter.
      auger, screw:
        title: Screw Auger
        description: Sample extracted by means of external thread hand auger, or mechanically
          powered flight auger. Generally 2 to 30 cm diameter.
      pit, small:
        title: Small Pit
        description: Sample extracted from a small hand-dug pit, dug with a shovel
          and/or hand pick. Generally less than 1m x 2m in size.
      trench:
        description: Sample extracted from the wall of a trench or pit dug with the
          aide of a backhoe. Generally larger than 1 x 2m in size.
      cut:
        description: Sample extracted from a relatively large near vertical cut such
          as a roadcut. Generally greater than 4 m in length.
      pit, large or quarry:
        title: Large Pit or Quarry
        description: Sample extracted from a large open pit or large very vertical
          bank, such as borrow pit, quarry, or stream cutbank. Generally greater than
          33 m in length.
      cut, beveled:
        title: Beveled Cut
      vibracore tube:
        description: 'A method of collecting a soil sample by means of a core tube
          driven into the soil by the force of gravity, enhanced by vibration energy.
          The vibrating mechanism of a vibracorer, sometimes called the "vibrahead",
          operates on hydraulic, pneumatic, mechanical or electrical power from an
          external source. When the insertion is completed, the vibracorer is turned
          off, and the tube is withdrawn with the aid of hoist equipment.'
      auger, dutch:
        title: Dutch auger
        description: "An open, strap-sided bucket auger (5-10 cm diam.) with a sharpened\
          \ outer edge and a screw tip with a partial twist; also called a 'mud auger'."
      dive observation:
        description: A visual assessment of undisturbed conditions or site performed
          under water.
      macaulay sampler:
        description: A hollow push tube with a hinged door that is driven into soft
          sediments (e.g., organics) and partially rotated to obtain an undisturbed
          sample.
      video:
        description: Electronically recoded, sequential digital images of a subaqueous
          setting/site.
      permafrost auger:
        description: Sample extracted by means of a permafrost auger. This auger is
          a tool for taking cores in ice and frozen soils. It takes a 7.62 cm (3 inch)
          diameter core and can be used to core several meters by hand and further
          if used with a vehicle mounted drill rig. Used in AK. Added to the list
          in 2016.
    description: 'The sampling device or procedure used to expose/observe the soil
      horizon or layer being described. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
  NASIS_observed_soil_moisture_status:
    name: NASIS_observed_soil_moisture_status
    title: Observed Soil Moisture Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=358
    permissible_values:
      dry:
        description: '>1500 kPa (>15 bar) suction'
      very dry:
        description: Less than 0.35 of the 15 bar water retention.
      moderately dry:
        description: 0.35 to 0.8 of the 15 bar water retention.
      slightly dry:
        description: 0.8 to 1.0 of the 15 bar water retention.
      moist:
        description: =<1500 to 0.01 kPa ( =<15 bar to 0.00001 bar) suction.
      slightly moist:
        description: 15 bar suction to MWR (see SSM p 91).
      moderately moist:
        description: MWR to UWR water content (see SSM p91).
      very moist:
        description: UWR to 0.01 bar suction (see SSM p91).
      wet:
        description: <1.0 kPa, or <0.5 for coarse soils, (<0.01 bar or 0.005 for coarse
          soils) suction.
      wet, non-satiated:
        description: =>0.01 to 1.0 (0.5 for coarse soils) kPA suction, (=>0.00001
          bar to 0.01 bar, 0.005 for coarse soils). Water films are visible, sand
          grains and peds glisten, but no free water is present.
      wet, satiated:
        description: <0.01 kPa (<0.00001 bar) suction; free water present.
      frozen:
        description: Water in a solid state.
      saturation:
        description: from capillary fringe
        status: obsolete
    description: 'Relative estimate the water state of the soil at the time of observation;
      e.g., wet, nonsatiated. Soil temperature must be above 0 degrees C. (Does not
      apply to frozen soil.). Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012'
  NASIS_organic_material_added:
    name: NASIS_organic_material_added
    title: Organic Material Added
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=359
    permissible_values:
      animal manure: {}
      green manure: {}
      other organic material amendments: {}
  NASIS_outflow_chamber_conv_factor:
    name: NASIS_outflow_chamber_conv_factor
    title: Outflow Chamber Conv Factor
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=360
    permissible_values:
      '20': {}
      '105': {}
    description: It is the outflow chamber conversion factor for the Amoozemeter (cm2).
      It is used to calculate the outflow of water per unit of time (Q). The Amoozemeter
      has two chambers. If both chambers are used to measure Ksat than the chamber
      conversion factor 105 cm2 is used. If the small chamber is used, then the conversion
      factor of 20 cm2 is used to calculate outflow (Q).
  NASIS_parent_material_kind:
    name: NASIS_parent_material_kind
    title: Parent Material Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=361
    permissible_values:
      volcanic ash:
        description: Unconsolidated, pyroclastic material less than 2 mm in all dimensions.
      volcanic ash, acidic:
        title: Acidic volcanic ash
      volcanic ash, basic:
        title: Basic volcanic ash
      volcanic ash, basaltic:
        title: Basaltic volcanic ash
      volcanic ash, andesitic:
        title: Andesitic volcanic ash
      cinders:
        description: Uncemented vitric, vesicular, pyroclastic material, more than
          2.0 mm in at least one dimension, with an apparent specific gravity (including
          vesicles) of more than 1.0 and less than 2.0.
      pumice: {}
      scoria:
        description: Vesicular, cindery crust or bomb-sized fragments of such material
          on the surface of andesitic or basaltic lava, the vesicular nature of which
          is due to the escape of volcanic gases before solidification; it is usually
          heavier, darker, and more crystalline than pumice. Synonym - cinder.
      volcanic bombs: {}
      organic, unspecified:
        title: Organic material
      organic, mossy material:
        title: Mossy organic material
      organic, herbaceous material:
        title: Herbaceous organic material
      organic, woody material:
        title: Woody organic material
      marl:
        description: A generic term loosely applied to a variety of materials, most
          of which occur as an earthy, unconsolidated deposit consisting chiefly of
          an intimate mixture of clay and calcium carbonate formed commonly by the
          chemical action of algae mats and organic detritus (periphyton); specifically
          an earthy substance containing 35-65% clay and 65- 35% calcium carbonate
          mud; formed primarily under freshwater lacustrine conditions, but varieties
          associated with more saline environments and higher carbonate contents also
          occur. Compare coastal marl, freshwater marl,
      alluvium:
        description: Unconsolidated clastic material subaerially deposited by running
          water, including gravel, sand, silt, clay, and various mixtures of these.
      beach sand:
        description: Well sorted, sand-sized, clastic material transported, sorted
          and deposited primarily by wave action and deposited in a shore environment.
          Compare - eolian sands.
      colluvium:
        description: Unconsolidated, unsorted earth material being transported or
          deposited on side slopes and/or at the base of slopes by mass movement (e.g.
          direct gravitational action) and by local, unconcentrated runoff.
      coprogenic material: {}
      cryoturbate: {}
      diamicton:
        description: A generic term for any nonlithified, nonsorted or poorly sorted
          sediment that contains a wide range of particle sizes, such as rock fragments
          contained within a fine earth matrix (e.g., till) and used when the genetic
          context of the sediment is uncertain.
      diatomaceous earth:
        description: A layer of soil material (limnic materials) that is composed
          of diatoms. Diatomaceous earth is identified by several diagnostic criteria
          such as moist color value which changes on drying as a result of the irreversible
          shrinkage of organic-matter coats on diatoms and either a moist color value
          of 8 or more and a chroma of 2 or less from a saturated sodium-pyrophosphate
          extract on white chromatographic or filter paper, or a cation-exchange capacity
          of less than 240 cmol (+) per kg organic matter (measured by loss on ignition).
      eolian deposits:
        description: Material transported and deposited by the wind. Includes earth
          materials such as dune sands, sand sheets, loess deposits, and clay (e.g.
          parna).
      estuarine deposits: {}
      drift:
        description: A general term applied to all mineral material (clay, silt, sand,
          gravel, boulders) transported by a glacier and deposited directly by or
          from the ice, or by running water emanating from a glacier. Drift includes
          unstratified material (till) that forms moraines, and stratified deposits
          that form outwash plains, eskers, kames, varves, and glaciofluvial sediments.
          The term is generally applied to Pleistocene glacial deposits in areas that
          no longer contain glaciers.
      glaciofluvial deposits:
        description: Material moved by glaciers and subsequently sorted and deposited
          by streams flowing from the melting ice. The deposits are stratified and
          may occur in the form of outwash plains, valley trains, deltas, kames, eskers,
          and kame terraces.
      glaciolacustrine deposits:
        description: Material ranging from fine clay to sand derived from glaciers
          and deposited in glacial lakes by water originating mainly from the melting
          of glacial ice. Many are bedded or laminated with varves or rhythmites.
      glaciomarine deposits:
        description: Glacially eroded, terrestrially derived sediments (clay, silt,
          sand, and gravel) that accumulated on the ocean floor. Sediments may be
          accumulated as an ice-contact deposit, by fluvial transport, ice-rafting,
          or eolian transport.
      lacustrine deposits:
        description: Clastic sediments and chemical precipitates deposited in lakes.
      loess:
        description: Material transported and deposited by wind and consisting predominantly
          of silt size.
      loess, calcareous:
        title: Calcareous loess
      marine deposits: {}
      mass movement deposits:
        description: Sediment resulting from the dislodgement and downslope transport
          of soil and rock material as a unit under direct gravitational stress. The
          process includes slow displacements such as creep and solifluction, and
          rapid movements such as landslides, rock slides, and falls, earthflows,
          debris flows, and avalanches. Agents of fluid transport (water, ice, air)
          may play an important, if subordinate role in the process.
      mine spoil or earthy fill: {}
      organic, grassy material:
        title: Grassy organic material
      outwash:
        description: '(a) Stratified detritus (chiefly sand and gravel) removed or
          "washed out" from a glacier by melt-water streams and deposited in front
          of or beyond the end moraine or the margin of an active glacier. The coarser
          material is deposited nearer to the ice.'
      pedisediment:
        description: A layer of sediment, eroded from the shoulder and back slope
          of an erosional slope, that lies on and is, or was, being transported across
          a pediment.
      residuum:
        description: Unconsolidated, weathered, or partly weathered mineral material
          that accumulates by disintegration of bedrock in place.
      slope alluvium:
        description: Sediment gradually transported on mountain or hill slopes primarily
          by alluvial processes and characterized by particle sorting. In a profile
          sequence, sediments may be distinguished by differences in size and/or specific
          gravity of coarse fragments and may be separated by stone lines. Sorting
          of rounded or subrounded pebbles or cobbles and burnished peds distinguish
          these materials from unsorted colluvial deposits.
      tephra:
        description: A collective term for all clastic volcanic materials that are
          ejected from a vent during an eruption and transported through the air,
          including ash [volcanic], blocks [volcanic], cinders, lapilli, scoria, and
          pumice. Tephra is a general term which, unlike many volcaniclastic terms,
          does not denote properties of composition, visicularity, or grain size.
      till, ablation:
        title: Ablation till
        description: A general term for loose, relatively permeable material deposited
          during the downwasting of nearly static glacial ice, either contained within
          or accumulated on the surface of the glacier.
      till, basal:
        title: Basal till
        description: Unconsolidated material of mixed composition deposited at the
          base (bottom) of a glacier [ The term emphaizes the e.g. subglacial till.
          Types of basal till include lodgment, melt-out, and flow till.
      till, flow:
        title: Flow till
        description: A till, commonly supraglacial, that is modified and transported
          by plastic mass flow; also spelled flow till. Compare - ablation till, basal
          till, lodgment till, mass-movement till, slump-till, supraglacial melt-out
          till.
      till, lodgment:
        title: Lodgment till
        description: 'A basal till commonly characterized by compact, fissile ("platy")
          structure and containing coarse fragments oriented with their long axes
          generally parallel to the direction of ice movement.'
      till, melt-out:
        title: Melt-out till
        description: Till derived from slow melting of debris-rich stagnant ice buried
          beneath sufficient overburden to inhibit deformation under gravity, thus
          preserving structures derived from the parent ice.
      till, supraglacial:
        title: Supraglacial till
      till, unspecified:
        title: Till
        description: Dominantly unsorted and unstratified drift, generally unconsolidated
          and deposited directly by a glacier without subsequent reworking by meltwater,
          and consisting of a heterogeneous mixture of clay, silt, sand, gravel, stones,
          and boulders; rock fragments of various lithologies are imbedded within
          a finer matrix that can range from clay to sandy loam. Compare - ablation
          till, basal till, flowtill, lodgment till, drift, moraine.
      valley side alluvium: {}
      supraglacial debris-flow:
        title: Supraglacial debris- flow
      till, supraglacial meltout:
        title: Supraglacial meltout till
      backswamp deposits: {}
      overbank deposits: {}
      mudflow deposits: {}
      block glide deposits: {}
      creep deposits:
        description: Sediment resulting from slow mass movement of earth material
          down slopes, caused by gravity but facilitated by saturation with water
          and alternate freezing and thawing.
      debris avalanche deposits:
        description: Sediment resulting from the very rapid and usually sudden sliding
          and flow of incoherent, unsorted mixtures of soil and weathered bedrock.
      debris flow deposits:
        description: Sediment resulting from a mass movement of rock fragments, soil,
          mud, more than half of the particles being larger than sand size.
      debris slide deposits: {}
      earthflow deposits: {}
      lateral spread deposits: {}
      rockfall deposits: {}
      rockfall avalanche deposits: {}
      rotational slide deposits:
        description: An accumlation of sediment resulting from a mass movement and
          a process characterized by a slide in which shearing takes place on a well
          defined, curved shear surface, concave upward, producing a backward rotation
          in the displaced mass.
      scree:
        description: A collective term for an accumulation of coarse rock debris or
          a sheet of coarse debris mantling a slope. Scree is not a synonym of talus,
          as scree includes loose, coarse fragment material on slopes without cliffs.
      soil fall deposits: {}
      talus:
        description: Rock fragments of any size or shape (usually coarse and angular)
          derived from and lying at the base of a cliff or very steep rock slope.
          The accumulated mass of such loose broken rock formed chiefly by falling,
          rolling, or sliding.
      topple deposits: {}
      grus:
        description: The fragmental products of in situ granular disintegration of
          granite and granitic rocks, dominated by inter-crystal disintegration.
      saprolite:
        description: '- (Provisional definition) Soft, friable, isovolumetrically
          weathered bedrock that retains the fabric and structure of the parent rock
          (Colman and Dethier, 1986) exhibiting extensive inter-crystal and intra-crystal
          weathering. In pedology, saprolite was formerly applied to any unconsolidated
          residual material underlying the soil and grading to hard bedrock below.'
      eolian sands:
        description: Material transported and deposited by the wind, dominated by
          particles of sand-size (0.05-2 mm).
      loess, noncalcareous:
        title: Noncalcareous loess
        description: Noncalcareous material transported and deposited by wind and
          consisting predominantly of silt size (0.002-0.05 mm).
      parna:
        description: A term used, especially in southeast Australia, for silt and
          sand-sized aggregates of eolian clay occurring in sheets.
      lahar deposits:
        description: Unconsolidated volcaniclastic material emplaced as mudflows on
          or near the flanks of a volcano.
      lapilli:
        description: Non or slightly vesicular pyroclastics, 2.0 to 76 mm in at least
          one dimension, with an apparent specific gravity of 2.0 or more.
      ash flow (pyroclastic):
        title: Ash flow
        description: A highly heated mixture of volcanic gases and ash, traveling
          down the flank of a volcano or along the surface of the ground; produced
          by the explosive disintegration of viscous lava in a volcanic crater, or
          by the explosive emission of gas-charged ash from a fissure or group of
          fissures. The solid materials contained in a typical ash flow are generally
          unsorted and ordinarily include volcanic dust, pumice, scoria, and blocks
          in addition to ash.
      till, subglacial:
        title: Subglacial till
        description: 'Till deposited in or by the bottom parts of a glacier or ice
          sheet; types include lodgement till, subglacial flow till; synonym (not
          preferred; obsolete): basal till. SW & GM'
      complex landslide deposits:
        description: A category of mass movement processes, associated sediments (complex
          landslide deposit) or resultant landforms characterized by a composite of
          several mass movement processes none of which dominates or leaves a prevailing
          landform. Numerous types of complex landslides can be specified by naming
          the constituent processes evident (e.g. a complex earth spread - earth flow
          landslide). Compare - fall, topple, slide, lateral spread, flow, landslide.
          SW & DV
      debris fall deposits:
        description: The process, associated sediments (debris fall deposit) or resultant
          landform characterized by a rapid type of fall involving the relatively
          free, downslope movement or collapse of detached, unconsolidated material
          which falls freely through the air (lacks an underlying slip face); sediments
          have substantial proportions of both fine earth and coarse fragments; common
          along undercut stream banks. Compare - rock fall, soil fall, landslide.
          SW
      debris spread deposits:
        description: The process, associated sediments (debris spread deposit) or
          resultant landforms characterized by a very rapid type of spread dominated
          by lateral movement in a soil and rock mass resulting from liquefaction
          or plastic flow of underlying materials that may be extruded out between
          intact units; sediments have substantial proportions of both fine earth
          and coarse fragments. Compare - earth spread, rock spread, landslide. SW
          & DV
      debris topple deposits:
        description: The process, associated sediments (debris topple deposit) or
          resultant landform characterized by a localized, very rapid type of topple
          in which large blocks of soil and rock material literally fall over, rotating
          outward over a low pivot point; sediments have substantial proportions of
          both fine earth and coarse fragments. Portions of the original material
          may remain intact, although reoriented, within the resulting debris pile.
          Compare - earth topple, rock topple, landslide. SW
      earth spread deposits:
        description: The process, associated sediments (earth spread deposit) or resultant
          landforms characterized by a very rapid type of spread dominated by lateral
          movement in a soil mass resulting from liquefaction or plastic flow of underlying
          materials that may be extruded out between intact units. Compare - debris
          spread, rock spread, landslide. SW & DV
      earth topple deposits:
        description: The process, associated sediments (earth topple deposit) or resultant
          landform characterized by a localized, very rapid type of topple in which
          large blocks of soil material literally fall over, rotating outward over
          a low pivot point; sediments < 2 mm predominate. Portions of the original
          material may remain intact, although reoriented, within the resulting deposit.
          Compare - debris topple, rock topple, landslide. SW
      fall deposits:
        description: (a) A category of mass movement processes, associated sediments
          (fall deposit), or resultant landforms (e.g., rockfall, debris fall, soil
          fall) characterized by very rapid movement of a mass of rock or earth that
          travels mostly through the air by free fall, leaping, bounding, or rolling,
          with little or no interaction between one moving unit and another. Compare
          - topple, slide, lateral spread, flow, complex landslide, landslide. SW
          & DV; (b) The mass of material moved by a fall. GG
      flow deposits:
        description: A category of mass movement processes, associated sediments (flow
          deposit) and landforms characterized by slow to very rapid downslope movement
          of unconsolidated material which, whether saturated or comparatively dry,
          behaves much as a viscous fluid as it moves. Types of flows can be specified
          based on the dominant particle size of sediments [i.e. debris flow (e.g.,
          lahar), earth flow (creep, mudflow), rock fragment flow (e.g., rockfall
          avalanche), debris avalanche]. Compare - fall, topple, slide, lateral spread,
          complex landslide, landslide. SW & DV
      greensands:
        description: a) An unconsolidated, near-shore marine sediment containing substantial
          amounts of dark greenish glauconite pellets, often mingled with clay or
          sand (quartz may form the dominant constituent); prominent in Cretaceous
          and Tertiary coastal plain strata of New Jersey, Delaware and Maryland;
          has been commercially mined for potassium fertilizer. The term is loosely
          applied to any glauconitic sediment. b) (Not Preferred - use glauconitic
          sandstone) A sandstone consisting of greensand that is commonly poorly cemented,
          and has a greenish color when unweathered but an orange or yellow color
          when weathered. Compare - glauconite pellets. SW
      rock spread deposits:
        description: The process, associated sediments (rock spread deposit) or resultant
          landforms characterized by a very rapid type of spread dominated by lateral
          movement in a rock mass resulting from liquefaction or plastic flow of underlying
          materials that may be extruded out between intact units; rock bodies predominate.
          Compare - debris spread, earth spread, landslide. SW & DV
      rock topple deposits:
        description: The process, associated sediments (rock topple deposit) or resultant
          landform characterized by a localized, very rapid type of fall in which
          large blocks of rock material literally fall over, rotating outward over
          a low pivot point; rock bodies predominate (little fine earth). Portions
          of the original material may remain intact, although reoriented, within
          the resulting deposit. Compare - earth topple, debris topple, landslide.
          SW
      rotational debris slide deposits:
        description: The process, associated sediments (rotational debris slide deposit)
          or resultant landform characterized by an extremely slow to moderately rapid
          type of slide, composed of comparatively dry and largely unconsolidated
          earthy material, portions of which remain largely intact and in which movement
          occurs along a well-defined, concave shear surface and resulting in a backward
          rotation of the displaced mass; sediments have substantial proportions of
          both fine earth and coarse fragments. The landform may be single, successive
          (repeated up and down slope), or multiple (as the number of slide components
          increase). Compare - rotational earth slide, rotational rock slide, translational
          slide, lateral spread, landslide. SW & DV
      rotational earth slide deposits:
        description: The process, associated sediments (rotational earth slide deposit)
          or resultant landform characterized by an extremely slow to moderately rapid
          type of slide, composed of comparatively dry and largely unconsolidated
          earthy material, portions of which remain largely intact and in which movement
          occurs along a well-defined, concave shear surface and resulting in a backward
          rotation of the displaced mass; sediments predominantly fine earth (< 2
          mm). The landform may be single, successive (repeated up and down slope),
          or multiple (as the number of slide components increase). Compare - rotational
          debris slide, rotational rock slide, translational slide, lateral spread,
          landslide. SW & DV
      rotational rock slide deposits:
        description: The process, associated sediments (rotational rock slide deposit)
          or resultant landform characterized by an extremely slow to moderately rapid
          type of slide, composed of comparatively dry and largely consolidated rock
          bodies, portions of which remain largely intact but reoriented, and in which
          movement occurs along a well-defined, concave shear surface and resulting
          in a backward rotation of the displaced mass. The landform may be single,
          successive (repeated up and down slope), or multiple (as the number of slide
          components increase). Compare - rotational debris slide, rotational earth
          slide, translational slide, lateral spread, landslide. SW & DV
      sand flow deposits:
        description: A flow of wet sand, as along banks of noncohesive clean sand
          that is subject to scour and to repeated fluctuations in pore-water pressure
          due to rise and fall of the tide. GG
      slide deposits:
        description: A category of mass movement processes, associated sediments (slide
          deposit) or resultant landforms (e.g., rotational slide, translational slide,
          and snowslide) characterized by a failure of earth, snow, or rock under
          shear stress along one or several surfaces that are either visible or may
          reasonably be inferred. The moving mass may or may not be greatly deformed,
          and movement may be rotational (rotational slide) or planar (translational
          slide). A slide can result from lateral erosion, lateral pressure, weight
          of overlying material, accumulation of moisture, earthquakes, expansion
          owing to freeze-thaw of water in cracks, regional tilting, undermining,
          fire, and human agencies. Compare -fall, topple, lateral spread, flow, complex
          landslide. SW & DV (b) The track of bare rock or furrowed earth left by
          a slide. (c) The mass of material moved in or deposited by a slide. Compare
          - fall, flow, complex landslide, landslide. SW & GG
      slump block:
        description: TheA mass of material torn away as a coherent unit during a landslide;
          a largely intact but displaced and commonly reoriented body of rock or soil.
          SW & GG
      solifluction deposits:
        description: A deposit of nonsorted, water-saturated, locally derived earthy
          material that is moving or has moved downslope, en masse, caused by the
          melting of seasonal frost or permafrost.
      translational slide deposits:
        description: A category of mass movement processes, associated sediments (translational
          slide deposit) or resultant landforms characterized by the extremely slow
          to moderately rapid downslope displacement of comparatively dry soil-rock
          material on a surface (slip face) that is roughly parallel to the general
          ground surface, in contrast to falls topples, and rotational slides. The
          term includes such diverse slide types as translational debris slides, translational
          earth slide, translational rock slide, block glides, and slab or flake slides.
          . Compare - rotational slide, slide, landslide. SW, DV, GG
      translational debris slide deposits:
        description: The process, associated sediments (translational debris slide
          deposit) or resultant landform characterized by an extremely slow to moderately
          rapid type of slide, composed of comparatively dry and largely unconsolidated
          earthy material, portions or blocks of which remain largely intact and in
          which movement occurs along a well- defined, planar slip face roughly parallel
          to the ground surface and resulting in lateral displacement but no rotation
          of the displaced mass; sediments have substantial proportions of both fine
          earth and coarse fragments. The landform may be single, successive (repeated
          up and down slope), or multiple (as the number of slide components increase).
          Compare - translational earth slide, translational rock slide, rotational
          slide lateral spread, landslide. SW & DV
      translational earth slide deposits:
        description: The process, associated sediments (translational earth slide
          deposit) or resultant landform characterized by an extremely slow to moderately
          rapid type of slide, composed of comparatively dry and largely unconsolidated
          earthy material, portions or blocks of which remain largely intact and in
          which movement occurs along a well- defined, planar slip face roughly parallel
          to the ground surface and resulting in lateral displacement but no rotation
          of the displaced mass; sediments predominantly fine earth (< 2 mm). The
          landform may be single, successive (repeated up and down slope), or multiple
          (as the number of slide components increase). Compare translational debris
          slide, translational rock slide, rotational slide, lateral spread, landslide.
          SW & DV
      translational rock slide deposits:
        description: The process, associated sediments (translational rock slide deposit)
          or resultant landform characterized by an extremely slow to moderately rapid
          type of slide, composed of comparatively dry and largely consolidated rock
          bodies, portions or blocks of which remain largely intact and in which movement
          occurs along a well- defined, planar slip face roughly parallel to the ground
          surface and resulting in lateral displacement but no rotation of the displaced
          mass; sediments predominantly fine earth (< 2 mm). The landform may be single,
          successive (repeated up and down slope), or multiple (as the number of slide
          components increase). Compare translational debris slide, translational
          earth slide, rotational slide, lateral spread, landslide. SW & DV
      pyroclastic flow:
        description: A fast density current of pyroclastic material, usually very
          hot, composed of a mixture of gasses and a variety of pyroclastic particles
          (ash, pumice, scoria, lava fragments, etc.); produced by the explosive disintegration
          of viscous lava in a volcanic crater or by the explosive emission of gas-charged
          ash from a fissure and which tends to follow topographic lows (e.g. valleys)
          as it moves; used in a more general sense than ash flow. Compare - pyroclastic
          surge, ash flow, nue ardente, lahar. SW, SN, GG
      pyroclastic surge:
        description: A low density, dilute, turbulent pyroclastic flow, usually very
          hot, composed of a generally unsorted mixture of gases, ash, pumice and
          dense rock fragments that travels across the ground at high speed and less
          constrained by topography than a pyroclastic flow; several types of pyroclastic
          surges can be specified (e.g. base surge, ash-cloud-surge). Compare - pyroclastic
          flow. SW, SN, GG
      fluviomarine deposits:
        description: Stratified materials (clay, silt, sand, or gravel) formed by
          both marine and fluvial processes, resulting from sea level flucuations
          and stream migration (i.e. materials originally deposited in a nearshore
          environment and subsequently reworked by fluvial processes as sea level
          fell, or vice versa as sea level rose).
      mine spoil, coal extraction:
        title: Coal extraction mine spoil
        description: Randomly mixed, earthy materials artificially deposited as a
          result of either surficial or underground coal mining activities.
      mine spoil, metal ore extraction:
        title: Metal ore extraction mine spoil
        description: Randomly mixed, earthy materials artificially deposited as a
          result of either surficial or underground metal-ore mining activities.
      dredge spoils:
        description: Unconsolidated, randomly mixed sediments extracted and deposited
          during dredging and dumping activities (e.g. adjoining the Intracoastal
          Waterway). Dredge spoils lie unconformably upon natural, undisturbed soil
          or regolith and can form anthropogenic landforms (e.g. dredge spoil bank).
      lagoonal deposits:
        description: Sand, silt or clay-sized sediments transported and deposited
          by wind, currents, and storm washover in the relatively low-energy, brackish
          to saline, shallow waters of a lagoon. Compare - marine deposit.
      coastal marl:
        description: An earthy, unconsolidated deposit of gray to buff-colored mud
          of low bulk density (dry) composed primarily of very fine, almost pure calcium
          carbonate formed in subaqueous settings that span freshwater lacustrine
          conditions (e.g. Florida Everglades) to saline intertidal settings (e.g.
          Florida Keys) formed by the chemical action of algal mats and organic detritus
          (periphyton); other marl varieties associated with different environments
          (e.g. freshwater marl, glauconitic marl) also occur. Coastal marl can be
          quite pure or it can be finely disseminated throughout living root mats
          (e.g. mangrove roots) and / or organic soil layers. Compare marl, freshwater
          marl.
      freshwater marl:
        description: 'A soft, grayish to white, earthy or powdery, usually impure
          calcium carbonate precipitated on the bottoms of present-day freshwater
          lakes and ponds largely through the chemical action of algal mats and organic
          detritus, or forming deposits that underlie marshes, swamps, and bogs that
          occupy the sites of former (glacial) lakes. The calcium carbonate may range
          from 90% to less than 30%. Freshwater marl is usually gray; it has been
          used as a fertilizer for acid soils deficient in lime. Syn.: bog lime. Compare
          marl, coastal marl.'
      human-transported material:
        description: Organic or mineral soil material (or any other material that
          can function as a soil material) that has been moved horizontally onto a
          pedon from a source area outside of that pedon by directed human activity,
          usually with the aid of machinery. There has been little or no subsequent
          reworking by wind, gravity, water, or ice. Human transported materials are
          most commonly associated with building sites, mining or dredging operations,
          land fills, or other similar activities that result in the formation of
          a constructional anthropogenic landform.
      bauxite:
        description: An off-white to dark red brown weathered detritus or rock composed
          of aluminum oxides (mainly gibbsite with some boehmite and diaspore), iron
          hydroxides, silica, silt, and especially clay minerals. Bauxite originates
          in tropical and subtropical environments as highly weathered residue from
          carbonate or silicate rocks and can occur in concretionary, earthy, pisolitic
          or oolitic forms. SW & GG
      gypsite:
        description: An earthy gypsum (CaSO4.2H2O) variety that contains various quantities
          (i.e. < 50%) of soil material, silicate clay minerals and sometimes other
          salts (e.g. NaCl); found only in arid or semi-arid regions as secondary
          precipitation concentrations or efflorescence associated with rock gypsum
          or gypsum-bearing strata. Compare rock gypsum, rock anhydrite. SW & GG
      limonite:
        description: "A general 'field' term for various brown to yellowish brown,\
          \ amorphous- to- cryptocrystalline hydrous ferric oxides that are an undetermined\
          \ mixture of goethite, hematite, and lepidocrocite formed by weathering\
          \ and iron oxidation from iron-bearing, rocks and minerals. SW & GG"
      till, proglacial:
        title: Proglacial till
        description: Glacial sediment deposited at the front or in front of the glacier.
      till, proglacial flow:
        title: Proglacial flow till
        description: Glacial sediment deposited in front of the glacier that has been
          redeposited by solifluction.
      till, supraglacial flow:
        title: Supraglacial flow till
        description: Glacial sediment deposited within or above stagnant ice that
          has been redeposited by solifluction.
      till, subglacial flow:
        title: Subglacial flow till
        description: Glacial sediment deposited beneath in, or by the bottom part
          of a glacier that has been redeposited by solifluction.
