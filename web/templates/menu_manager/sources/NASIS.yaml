    description: 'B. The land resource region (LRR) is the highest level of the hierarchy
      and represents broad landscape divisions at a small scale. The major land resource
      area (MLRA) is the second-highest level and generally represents broad landforms
      or a geologic region at a small scale. In many cases, it represents broad areas
      with similar potentials or limitations for use, such as forestland, or areas
      with similar resource limitations, such as arid climate. The third level of
      the hierarchy is the land resource unit (LRU). The land resource unit represents
      related landforms that make up the landscape. Land resource units are defined
      primarily by significant differences between one or two of the resource attributes.
      These differences affect land use and land management decisions at the landscape
      scale. Reference: Part 649 NSSH. Added for NASIS 7.4.1'
