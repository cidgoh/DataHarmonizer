    description: 'All progressive soil correlation decisions and their reasoning are
      recorded in NASIS. Any changes or additions to legends, taxonomic units, or
      map units must be recorded. Significant changes to soil property data and interpretive
      data, such as ecological site designation, farmland classification, land capability
      classification, or crop yields, should also be recorded. The reasons for the
