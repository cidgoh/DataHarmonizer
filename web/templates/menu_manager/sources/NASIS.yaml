    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=531
    permissible_values:
      growing solitarily:
        description: Individual plants exist as scattered single plants.
      small group or clump:
        description: Individual plants exist as a small group or clump of plants.
      small patches:
        description: Plants exist in small pathces.
      large patches:
        description: Plants exist in large patches.
