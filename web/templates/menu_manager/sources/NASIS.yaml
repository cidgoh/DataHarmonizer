  NASIS_vigor_class:
    name: NASIS_vigor_class
    title: Vigor Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=883
    permissible_values:
      excellent:
        description: Large plant size relative to age and environment; stolons and
          rhizomes longer than expected.
      good:
        description: Small decrease in plant size, number and length of stolons and
          rhizomes of some plants. Most plants appear healthy.
      moderate:
        description: Plants with decreased size, number and length of stolons and
          rhizomes are easily recognizable. Plant community may have patches of both
          normal and stressed individuals. Resistance to insects appears to diminish.
      fair:
        description: Majority of plants appear to have decreased size. Stolons and
          rhizomes are significantly shorter and fewer than normal. Many grass species
          become sod-bound.
      poor:
        description: Entire plant community exhibits smaller size. Stolons and runners
          appear dormant, few in number, and small. Increased mortality and absence
          of reproductive success.
