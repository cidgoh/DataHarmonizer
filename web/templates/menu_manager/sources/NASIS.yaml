  NASIS_ponding_duration_class:
    name: NASIS_ponding_duration_class
    title: Ponding Duration Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=428
    permissible_values:
      very brief:
        description: (4 to 48 hours) 4 hours to 48 hours
      brief:
        description: (2 to 7 days) 2 days to 7 days
      long:
        description: (7 to 30 days) 7 days to 30 days
      very long:
        description: (more than 30 days) More than 30 days
    description: 'General class of the average duration, or length of time, of the
      ponding occurrence. Reference: Part 618 National Soil Survey Handbook. General
      estimate of how long, typically, ponding lasts. Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
  NASIS_ponding_frequency_class:
    name: NASIS_ponding_frequency_class
    title: Ponding Frequency Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=429
    permissible_values:
      none:
        description: No reasonable possibility of ponding, near 0 percent chance on
          ponding in any year.
      rare:
        description: Ponding unlikely but possible under unusual weather conditions;
          from nearly 0 to 5 percent chance of ponding in any year, or nearly 0 to
          5 times in 100 years.
      occasional:
        description: Ponding is expected infrequently under usual weather conditions;
          5 to 50 percent chance of ponding in any year, or 5 to 50 times in 100 years.
      frequent:
        description: Ponding is likely to occur under usual weather conditions; more
          than 50 percent chance in any year, or more than 50 times in 100 years.
      common:
        status: obsolete
    description: 'The number of times ponding occurs over a period of time. Reference:
      Part 618 National Soil Survey Handbook. Estimate of how often, typically, ponding
      occurs. Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_pore_continuity_vertical:
    name: NASIS_pore_continuity_vertical
    title: Pore Continuity Vertical
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=430
    permissible_values:
      high:
        description: =>10 cm vertical distance.
      low:
        description: <1 cm vertical distance
      moderate:
        description: 1 to <10 cm vertical distance.
    description: 'The average vertical distance, as a class, through which the minimum
      pore diameter exceeds 0.5 mm. Soil must be moist or wetter. Reference: Field
      Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_pore_quantity_class:
    name: NASIS_pore_quantity_class
    title: Pore Quantity Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=431
    permissible_values:
      few:
        description: (less than 1) Less than 1 per unit area.
      common:
        description: (1 to 4) 1 to 4 per unit area.
      many:
        description: (5 or more) 5 or more per unit area.
    description: 'The quantity, as a class, of the number of pores for each size class
      in a horizontal plane. (NOTE: Typically, this is done across a vertical plane,
      such as a pit face.) Record the average quantity from three to five representative
      unit areas. Reference: Field Book for Describing and Sampling Soils v 3.0, Sep
      2012'
  NASIS_pore_root_size:
