      main KSSL characterization:
        description: One main pedon per soil and condition combination is sampled
          for full characterization by KSSL for intensive tier efforts. This site
          is the central point of a DSP plot that is sampled for full characterization
          by KSSL in an intensive tier effort.
    description: The type of site being sampled for a DSP study.
  NASIS_earth_cover_kind_level_one:
    name: NASIS_earth_cover_kind_level_one
    title: Earth Cover Kind Level One
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=162
    permissible_values:
      artificial cover:
        description: Nonvegetative cover either made or modified by human activity
          and prohibiting or restricting vegetative growth and water penetration.
      barren land:
        description: Nonvegetative natural cover often having a limited capacity to
          support vegetation - including construction sites (<5% vegetated).
      crop cover:
        description: The full cycle, including land preparation and post-harvest residue
          cover of annual or perennial herbaceous plants that are cultivated or harvested,
          or both, for the production of food, feed, oil, and fiber other than wood,
          and excluding hay and pasture.
      grass/herbaceous cover:
        description: Non-woody vegetative cover composed of annual or perennial grasses,
          grass-like plants (sedges/rushes), forbs (including alfalfa and clovers),
          lichens, mosses, and ferns (>75% grass, grass-like, forb cover).
      shrub cover:
        description: Vegetative cover composed of multi-stemmed and single-stemmed
          woody plants that attain a mature height of less than four meters (>50%
          shrub canopy cover).
      tree cover:
        description: Vegetative cover recognized as woody plants which usually have
          one perennial stem, a definitely formed crown of foliage, and a mature height
          of at least four meters (including ornamentals and Christmas trees) (>25%
          tree canopy cover).
      water cover:
        description: Earth covered by water in a fluid state. This includes seasonally
          frozen areas.
      other:
        status: obsolete
      wetlands, drained:
        status: obsolete
      wetlands:
        status: obsolete
    description: 'The primary dominant land cover. Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
  NASIS_earth_cover_kind_level_two:
    name: NASIS_earth_cover_kind_level_two
    title: Earth Cover Kind Level Two
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=163
    permissible_values:
      row crop:
        description: e.g. corn, soybeans, cotton, tomatoes and other truck crops,
          tulips
      close-grown crop:
        description: Wheat, rice, oats, rye, etc.
      rangeland, grassland:
        title: Grassland rangeland
        description: (<10% trees, <20% shrubs) - includes rangeland used for hayland
          - bluestems, mixed midgrasses, shortgrass, etc.
      rangeland, savanna:
        title: Savanna rangeland
        description: 10 to 25% tree cover
      rangeland, shrubby:
        title: Shrubby rangeland
        description: (20 to 50% shrub cover) - sumac, sagebrush, mesquite
      rangeland, tundra:
        title: Tundra rangeland
        description: Dominated by plants and shrubs that are eaten by grazing or browsing
          animals above tree line, as determined by altitude and/or latitude.
      pastureland, tame:
        title: Tame pastureland
        description: Fescues, bromegrass, timothy, lespedeza, etc.
      hayland:
        description: Fescues, bromegrass, timothy, alfalfa, etc.
      marshland:
        description: grass, grass-like plants
      other grass/herbaceous cover:
        description: Other grasses or Graminoids.
      crop trees:
        description: e.g. apples, pecans, date palms, citrus, ornamental nursery stock,
          Christmas trees
      conifers:
        description: Spruce, Douglas-fir, pine, etc.
      hardwoods:
        description: Oak, hickory, elm, aspen, etc.
      intermixed conifers and hardwoods:
        description: e.g. oak-pine mix
      tropical:
        description: Mangrove, royal palm, etc.
      swamp:
        description: shrubs and trees
      other tree cover:
        description: Other trees.
      crop shrubs:
        description: Filbert, blueberry, and ornamentals, etc. as nursery stock
      crop vines:
        description: e.g. grapes, blackberries, raspberries
      native shrubs:
        description: e.g. creosotebush, shrub live oak, sagebrush, mesquite (including
          rangeland with >50% shrub cover)
      other shrub cover:
        description: e.g. kudzu, cacti, yucca
      rock:
        description: Rock cover is dominant.
      sand and gravel:
        description: Surface is predominately sand and gravel.
      culturally induced barren:
        description: saline seeps, mines, quarries, oil-waste, etc.
      permanent snow and ice:
        description: Earth surface is permanently covered by snow and ice.
      other barren:
        description: salt flats, slickspots, mud flats, badlands, etc.; excludes those
          in culturally induced earth cover
      rural transportation:
        description: Highways, railroads, etc.
      urban and built-up:
        description: Cities, towns, farmsteads, industrial sites
    description: 'The secondary dominant land cover. Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
