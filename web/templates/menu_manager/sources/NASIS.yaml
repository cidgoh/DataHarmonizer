  NASIS_physical_crust_subtype:
    name: NASIS_physical_crust_subtype
    title: Physical Crust Subtype
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=414
    permissible_values:
      depositional crust:
        description: Reversibly bonded crusts composed predominantly of primary or
          secondary mineral grains of sediment. They are generally rigid when moist
          or dry. Thickness is variable.
      freeze-thaw crust:
        description: Reversibly bonded crusts composed predominantly of primary or
          secondary mineral grains. They are formed by freeze-thaw cycles, and are
          generally rigid when moist or dry.
      raindrop impact crust:
        description: Reversibly bonded crusts composed predominantly of primary or
          secondary mineral grains that are dispersed and puddled by the impact of
          raindrops on the soil surface. They are generally rigid when moist or dry.
      vesicular crust:
        description: A layer at the soil surface consisting of many unconnected spherical
          or ovoid pores.
      none evident: {}
    description: The specifical physical make up of a physical crust being described.
  NASIS_physical_data_type:
    name: NASIS_physical_data_type
    title: Physical Data Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=415
    permissible_values:
      Bigint Big Integer: {}
      Binary: {}
      Bit: {}
