      of the information. Reference: Part 609 National Soil Survey Handbook.'
  NASIS_correlation_kind:
    name: NASIS_correlation_kind
    title: Correlation Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=91
    permissible_values:
      status change - added:
        description: The map unit has just been added to the Mapunit table for this
          legend - generally with a status of provisional or approved.
      status change - dropped/combined:
        description: 'Documentation for map units that are removed from the list of
          active map units - changed to "additional" status. This would also apply
          to map units that are "combined" with other map units.'
      status change - disapproved:
        description: Documentation as to why a provisional mapunit did not move to
          the approved list, or an approved one did not move to correlated. More study
          is needed to make the correlation decision.
      status change - reinstated:
        description: "Documentation as to why a previously \"dropped\" map unit is\
          \ revived and added to the list of active map units\u2014status generally\
          \ changed from additional to approved or possibly correlated."
      name change:
        description: 'Documentation regarding changing the name on an existing map
          unit. If the status is changed at the same time, the action should be coded
          as "status change."'
      notes to accompany:
        description: Notes designed to be included with either the final correlation
          document or a field review report.
      join statement:
        description: Documentation regarding the joining of this map unit with those
          of surrounding soil survey areas.
      symbol change:
        description: Documentation regarding changing the mapunit symbol on an existing
          unit.
        status: obsolete
    description: Reasons for a correlation decision.
