      W:
        description: Water. This symbol indicates water layers within or beneath the
          soil. The water layer is designated as Wf if it is permanently frozen and
          as W if it is not permanently frozen. The W (or Wf) designation is not used
          for shallow water, ice, or snow above the soil surface.
      L:
        description: Layers dominated by limnic material. Limnic horizons or layers
          include both organic and mineral limnic materials that were either (1) deposited
          in water by precipitation or through the actions of aquatic organisms, such
          as algae and diatoms, or (2) derived from underwater and floating aquatic
          plants and subsequently modified by aquatic animals.
      EC: {}
      B and E:
        description: Horizons that are composed of lamellae that are separated from
