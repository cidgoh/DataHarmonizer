    name: NASIS_dom_use
    title: Dom Use
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=153
    permissible_values:
      crop:
        description: Land used primarily for the production and harvest of annual
          or perennial field, forage, food, fiber, horticultural, orchard, vineyard,
          or energy crops.
      forest:
        description: Land on which the historic and or introduced vegetation is predominantly
          is tree cover managed for production of wood products or nontimber forest
          products.
      range:
        description: Land on which the historic and/or introduced vegetation is predominantly
          grasses, grass-like plants, forbs or shrubs managed as a natural ecosystem.
          Range land may include natural grasslands, savannas, shrublands, tundra,
          alpine communities, marshes and meadows.
      pasture:
        description: Land composed of introduced or domesticated native forage species
          that is used primarily for the production of livestock. Pastures receive
          periodic renovation and cultural treatments, such as tillage, fertilization,
          mowing, weed control, and may be irrigated. Pastures are not in rotation
          with crops.
      developed:
        description: Land occupied by buildings and related facilities used for residences,
          commercial sites, public highways, airports, and open space associated with
          towns and cities.
      water:
        description: Geographic area whose dominant characteristic is open water or
          permanent ice or snow. May include intermingled land, including tidal influenced
          coastal marsh lands.
      associated:
        description: Land associated with farms and ranches that are not purposefully
          managed for food, forage, or fiber and are typically associated with nearby
          production or conservation lands. This could include incidental areas, such
          as idle center pivot corners, odd areas, ditches and watercourses, riparian
          areas, field edges, seasonal and permanent wetlands, and other similar areas.
      other:
        description: Land that is barren, sandy, rocky, or that is impacted by the
          extraction of natural resources, such as minerals, gravel or sand, coal,
          shale, rock, oil, or natural gas.
      farmstead:
        description: Land used for facilities, buildings and equipment.
    description: Land use to be used by planners and modelers at the field and landscape
      level.
