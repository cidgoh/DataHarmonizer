  NASIS_disturbance_type:
    name: NASIS_disturbance_type
    title: Disturbance Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=144
    permissible_values:
      animals, nonrodent:
        title: Nonrodent animals
        description: Disturbance to soil or vegetation due to nonrodent animal activity.
      animals, rodent:
        title: Rodents Disturbance to soil or vegetation due to rodent activity.
      brush management, biological:
        title: Biological brush management
        description: Disturbance to vegetation due to biological brush management.
      brush management, chemical:
        title: Chemical brush management
        description: Disturbance primarily to vegetation due to chemical brush management;
          could also include soil disturbance either from residual chemical activity
          or from the mechanical application method.
      brush management, mechanical:
        title: Mechanical brush management
        description: Disturbance to vegetation and soil due to mechanical brush management.
      construction activities:
        description: Disturbance to soil or vegetation due to any miscellaneous construction
          activities not otherwise specified.
      cryoturbation:
        description: A significant disturbance of the soil due to cryoturbation; this
          is only appropriate on a site that does not experience cryoturbation as
          a normal phenomenon.
      cultivation:
        description: Any human-induced disturbance of the soil surface for the purpose
          of growing a crop.
      drainage:
        description: A permanent drying of the site due to human induced lowering
          of the water table.
      erosion, water:
        title: Water erosion
        description: A significant removal or disturbance of the soil surface due
          to water erosion.
      erosion, wind:
        title: Wind erosion
        description: A significant removal or disturbance of the soil surface due
          to wind erosion.
      fertilizer addition:
        description: A significant change in vegetation composition due to the addition
          of soil nutrients.
      firefighting operations:
        description: Disturbance to the site due to operations incurred while fighting
          or controlling a wildfire.
      forest planting:
        description: Any disturbance of the soil surface for the purpose of planting
          trees.
      hay removal:
        description: The cutting of live vegetation and the removal of the plant material
          for use as forage.
      heavy machinery:
        description: Compaction impact and/or physical damage to vegetation from heavy
          machinery.
      insect damage:
        description: Change in vegetation composition due to insect damage.
      insecticide application:
        description: A significant long-term disturbance of the vegetation due to
          insecticide; this would be secondary reaction to a significant change in
          the insect community.
      land use conversion:
        description: Complete removal of vegetation (especially trees) including root
          wads for conversion to another land use.
      livestock grazing:
        description: Change in vegetation composition due to heavy grazing pressure
          by livestock.
      livestock heavy use:
        description: Disturbance to soil and/or vegetation due to heavy stocking rate
          of livestock.
      livestock tanks/spring development:
        description: Disturbance to soil or vegetation due to use of livestock tanks
          or development of springs.
      livestock walkways:
        description: Disturbance to soil due to the development of livestock walkways.
      mass land movement:
        description: Disturbance to site due to the mass movement of soil (landslide).
      mining equipment operations:
        description: Disturbance to soil or vegetation due to mining equipment operations.
      mowing/clipping:
        description: The cutting of live vegetation and allowing the plant material
          to remain and decompose on site.
      overhead transmission lines:
        description: Disturbance to soil or vegetation due to the construction or
          maintenance of overhead transmission lines.
      plant disease damage:
        description: A significant long-term disturbance of the vegetation composition
          due to plant disease.
      prescribed fire:
        description: Disturbance to the site due to exposure to prescribed fire, either
          ground, canopy, or both; also includes disturbance due to site preparation
          operations.
      recreational foot traffic:
        description: Disturbance to soil or vegetation due to recreational foot traffic.
      recreational vehicles:
        description: Disturbance to soil or vegetation due to recreational vehicles,
          including motorbikes and ATVs.
      roads, dirt:
        title: Dirt roads
        description: Disturbance to site due to the construction of dirt roads.
      roads, gravel:
        title: Gravel roads
        description: Disturbance to site due to the construction of gravel roads.
      roads, paved:
        title: Paved roads
        description: Disturbance to site due to the construction of paved roads.
      salt spray damage:
        description: Chemical disturbance to the soil or vegetation due to abnormal
          exposure to salt spray; this is only appropriate on a site that does not
          experience salt spray as a normal phenomenon.
      seedbed preparation:
        description: Any disturbance of the soil surface for the purpose of planting
          seed.
      site preparation:
        description: Activities primarily for silvicultural objectives and prescription
          to generate a new crop or age class of trees, include slash piling.
      snow/ice damage:
        description: A significant long-term disturbance of the vegetation composition
          or soil due to snow/ice damage; this is only appropriate on a site that
          does not experience snow/ice as a normal phenomenon.
      soil deposition by water:
        description: Disturbance to the vegetation due to an accumulation of soil
          from water movement.
      soil deposition by wind:
        description: Disturbance to the vegetation due to an accumulation of soil
          from wind movement.
      tidal surge/damage:
        description: Chemical or physical disturbance to the soil or vegetation due
          to abnormal exposure to tidal surge; this is only appropriate on a site
          that does not experience tidal surge as a normal phenomenon.
      timber harvest, aerial or suspension:
        description: Timber or tree yarding via log suspension systems that keep one
          or both ends off the ground.
      timber harvest, clear-cut:
        title: Timber harvest,
        description: clear- cut Disturbance to the soil and a significant long-term
          disturbance to the vegetation composition due to the removal of most trees;
          contrast against timber harvest, selective.
      timber harvest, ground- based mechanical:
        title: Timber harvest,
        description: ground-based mechanical Timber or tree yarding via ground-based
          machinery.
      timber harvest, selective:
        description: Disturbance to the soil and a significant long-term disturbance
          to the vegetation composition due to the selective removal of certain trees;
          contrast against timber harvest, clear-cut.
      transported fill material:
        description: Disturbance to the site due the transport and deposition of off-site
          fill.
      underground utilities:
        description: Disturbance of the soil due to the construction and placement
          of underground utilities.
      water flooding/ponding:
        description: Disturbance of the site due to prolonged water exposure from
          flooding or ponding.
      wildfire, canopy:
        title: Canopy wildfire
        description: Disturbance to the site due to exposure to wildfire predominantly
          in the tree canopy.
      wildfire, general:
        title: General wildfire
        description: Disturbance to the site due to exposure to a combination of both
          ground and canopy wildfire.
      wildfire, ground:
        title: Ground wildfire
        description: Disturbance to the site due to exposure to wildfire predominantly
          in the understory.
      wildlife grazing:
        description: Change in vegetation composition due to heavy grazing pressure
          by wildlife.
      wind storm damage:
        description: A significant long-term disturbance of the vegetation composition
          due to wind damage.
      brush management, legacy:
        description: Disturbance of the site and/or plant community due to past brush
          management practice of unknown method as recorded in legacy data.
        status: obsolete
