      bitumen (asphalt):
        description: Brown or black tarlike, bituminous substance consisting mainly
          of hydrocarbons, that is mixed with sand and gravel for cementing, paving,
          road surfaces, etc. also includes fiberglass roofing shingles (Websters,
          2004).
      boiler slag:
        description: Hard black angular particles with a smooth glassy appearance
          that form when molten slag comes in contact with quenching water; a type
          of coal combustion byproduct.
      bottom ash:
        description: Coarse, granular, and porous agglomerated ash particles grey
          to black in color, collected from the bottom of coal furnaces; a type of
          coal combustion byproduct.
      brick:
        description: Shaped block of baked clay used for construction of structures
          or roads (ODES, 1999).
      cardboard:
        description: Thick, cellulosic paper or paste board (Rosenbaum, 2003).
      carpet:
        description: Thick heavy fabric of wool, cotton, or synthetic fibers for covering
          a floor or stairs (Websters, 2004).
      cloth:
        description: Woven, knitted, or pressed fabric of fibrous material such as
          cotton, wool, silk, hair, or synthetic fibers that is used as wearing apparel,
          towels, curtains, etc. (Websters, 2004)
      concrete:
        description: Building material composed of cement, various types of aggregate
          and water in varying proportions according to use (structural supports,
          flooring, road surfaces, etc.); when mixed together the material hardens
          to a rock-like consistency (ODES, 1999).
      debitage:
        description: A waste product (stone chips and flakes) derived from the manufacture
          of stone tools or weapons.
      fly ash:
        description: 2mm or larger agglomerated ash particles, generally light tan
          in color, produced from the combustion of finely ground coal and removed
          from plant exhaust gases a type of coal combustion byproduct. The material
          is commonly collected in large settling basins.
      glass:
        description: Hard, brittle, usually transparent or translucent substance made
          by fusing sand with soda and lime and used primarily for windows and liquid
          containers (OADDT, 2001).
      metal:
        description: Any of various metallic materials used in construction or manufacturing
          structural support, reinforcement, or wire, and composed of, but not limited
          to iron, steel, aluminum and copper. Examples include pieces of rebar, machinery,
          tools, automobile trim, and metallic toys.
      paper:
        description: A material substance made from compacted interlaced fibers of
          rags, wood, orstraw (Rosenbaum, 2003).
      plasterboard:
        description: Paper-coated board with a core of plaster (CaSO4*2H20) used to
          make walls in modern structures (Rosenbaum, 2003).
      plastic:
        description: Any of various nonmetallic compounds, synthetically produced,
          usually from organic compounds by polymerization, which can be molded into
          various forms and hardened or formed into pliable sheets, films, fibers,
          etc. for commercial use as bags, many types of toys, pvc pipe, etc. (Websters,
          2004)
      potsherd:
        description: Broken fragments of pottery, crockery, dishes and ceramics. These
          materials may range in age from modern to prehistoric.
      rubber:
        description: Natural and synthetic materials used for flooring, hoses, tires,
          car moldings, and certain types of garments such as neoprene and latex gloves,
          spandex clothing and some types of footwear.
      treated wood:
        description: Cellulosic post and lumber products treated with preservatives
          and processes to extend the durability of the material and retard decay
          by insects or fungi.
      untreated wood:
        description: Cellulosic post and lumber products that have not been treated
          with preservatives or processes to extend the durability of the material.
      coal combustion byproducts:
        description: A general term for byproducts resulting from the combustion of
          coal.
    description: 'The dominant type(s) of human artifacts present by horizon/layer.
      Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_human_artifact_penetrability:
    name: NASIS_human_artifact_penetrability
    title: Human Artifact Penetrability
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=287
    permissible_values:
      nonpenetrable:
        description: Roots cannot penetrate through the solid parts of the artifact
          or between the component parts of the artifact.
      penetrable:
        description: Roots can penetrate through the solid parts of the artifact or
          between component parts of the artifact.
    description: 'The prevalent relative ease of penetration of artifacts by external
      mechanical force by horizon/layer. Reference: Field Book for Describing and
      Sampling Soils v 3.0, Sep 2012'
  NASIS_human_artifact_persistence:
    name: NASIS_human_artifact_persistence
    title: Human Artifact Persistence
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=288
    permissible_values:
      nonpersistent:
        description: The artifact is susceptible to relatively rapid weathering or
          decay and is expected to be lost from the soil in less than a decade.
      persistent:
        description: The artifact is expected to remain intact in the soil for a decade
          or more.
    description: 'The dominant relative length of time (extent) expected the human
      artifact to remain recognizable. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
  NASIS_human_artifact_safety:
    name: NASIS_human_artifact_safety
    title: Human Artifact Safety
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=289
    permissible_values:
      innocuous artifacts:
        description: Artifacts considered to be harmless to living beings. Examples
          include untreated wood products, iron, bricks, cinder blocks, concrete,
          plastic, glass, rubber, organic fibers, inorganic fibers, unprinted paper
          and cardboard, and some mineral and metal products. Any sharp innocuous
          artifacts can cause injury, but the materials themselves are still considered
          innocuous.
      noxious artifacts:
        description: Artifacts that are potentially harmful or destructive to living
          beings unless dealt with carefully. The harm may be immediate or long-term,
          or through direct or indirect contact. Examples include Arsenic-treated
          wood products, batteries, waste and garbage, radioactive fallout, liquid
          petroleum products, asphalt, coal ash, paper printed with metallic ink,
          and some mineral and metal products.
    description: 'The dominant relative level of chemical safety of artifacts present.
      Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_human_artifact_shape:
    name: NASIS_human_artifact_shape
    title: Human Artifact Shape
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=290
    permissible_values:
      elongated:
        description: One dimension is three times longer than both of the others.
      flat:
        description: One dimension is less than one-third that of both of the others,
          and one dimension is less than three times that of the intermediate dimension.
      irregular:
        description: Characterized by a branching, convoluted form.
      equidimensional:
        description: Dimensions in length, width, and height are approximately similar.
    description: 'The dominant form (shape) of the artifacts by horizon/layer. Reference:
      Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_hydric_condition:
    name: NASIS_hydric_condition
    title: Hydric Condition
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=291
    permissible_values:
      farmable:
        description: under natural conditions Farmable under natural conditions.
      wooded:
        description: under natural conditions Wooded under natural conditions.
      neither:
        description: wooded nor farmable under natural conditions Neither wooded nor
          farmable under natural conditions.
    description: The general land classification a wet soil is in. I.e. Farmable,
      wooded, neither.
  NASIS_hydric_criteria:
    name: NASIS_hydric_criteria
    title: Hydric Criteria
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=292
    permissible_values:
      '1':
        description: All Histels except Folistels, and all Histosols except Folists.
      '2':
        description: 'Soils in Aquic suborders, great groups, or subgroups, Albolls
          suborder, Historthels great group, Histoturbels great group, or Andic, Cumulic,
          Pachic, or Vitrandic subgroups that: (a) Based on the range of characteristics
          for the soil series, will at least in part meet one or more Field Indicators
          of Hydric Soils in the United States, or (b) Show evidence that the soil
          meets the definition of a hydric soil. (Federal Register Doc. 2012-4733
          Filed 2-28-12) [Previous choices of 2a, 2b1, 2b2, and 2b3 have been deleted
          as choices per request of Lenore Vasilas at the behest of the National Technical
          Committee for Hydric Soils.]'
      '3':
        description: Soils that are frequently ponded for long duration or very long
          duration during the growing season.
      '4':
        description: Soils that are frequently flooded for long duration or very long
          duration during the growing season.
    description: One of four general classes or conditions in which a hydric soil
      can fall.
  NASIS_hydric_rating:
    name: NASIS_hydric_rating
    title: Hydric Rating
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=293
    permissible_values:
      'yes':
        description: The soil meets the criteria for hydric soils.
      'no':
        description: The soil does not meet the criteria for hydric soils.
      unranked:
        description: The soil has not yet been determined to either have or not have
          hydric criteria.
    description: 'The rating is whether or not the soil meets the criteria for a hydric
      soil (yes, no) or no determination has been made (unranked). Reference: NSSH
      Part 622.'
  NASIS_hydric_soil_indicator:
    name: NASIS_hydric_soil_indicator
    title: Hydric Soil Indicator
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=294
    permissible_values:
      a1:
        description: Histosol or Histel Classifies as a Histosol (except Folist) or
          as a Histel (except Folistel).
      a2:
        description: Histic Epipedon A histic epipedon underlain by mineral soil material
          with chroma of 2 or less.
      a3:
        description: Black Histic A layer of peat, mucky peat, or muck 20 cm (8 inches)
          or more thick that starts at a depth of less than or equal to 15 cm (6 inches)
          from the soil surface; has hue of 10YR or yellower, value of 3 or less,
          and chroma of 1 or less; and is underlain by mineral soil material with
          chroma of 2 or less.
      a4:
        description: Hydrogen Sulfide A hydrogen sulfide odor at a depth of less than
          or equal to 30 cm (12 inches) from the soil surface.
      a5:
        description: Stratified Layers Several stratified layers startingat a depth
          of less than or equal to 15 cm (6 inches) from the soil surface. At least
          one of the layers has value of 3 or less and chroma of 1 or less, or it
          is muck, mucky peat, peat, or a mucky modified mineral texture. The remaining
          layers have chroma of 2 or less. For any sandy material that constitutes
          the layer with value of 3 or less and chroma of 1 or less, at least 70 percent
          of the visible soil particles must be masked with organic material, viewed
          through a 10x or 15x hand lens. Observed without a hand lens, the particles
          appear to be close to 100 percent masked.
      a6:
        description: Organic Bodies Presence of 2 percent or more organic bodies of
          muck or a mucky modified mineral texture starting at a depth of less than
          or equal to 15 cm (6 inches) from the soil surface.
      a7:
        description: 5 cm Mucky Mineral A layer of mucky modified mineral soil material
          5 cm (2 inches) or more thick, starting at a depth of less than or equal
          to 15 cm (6 inches) from the soil surface.
      a8:
        description: Muck Presence A layer of muck with value of 3 or less and chroma
          of 1 or less, starting at a depth of less than or equal to 15 cm (6 inches)
          from the soil surface.
      a9:
        description: 1 cm Muck A layer of muck 1 cm (0.5 inch) or more thick with
          value of 3 or less and chroma of 1 or less and starting at a depth of less
          than or equal to 15 cm (6 inches) from the soil surface.
      a10:
        description: 2 cm Muck A layer of muck 2 cm (0.75 inch) or more thick with
          value of 3 or less and chroma of 1 or less, starting at a depth of less
          than or equal to 15 cm (6 inches) from the soil surface.
      a11:
        description: 'Depleted Below Dark Surface A layer with a depleted or gleyed
          matrix that has 60 percent or more chroma of 2 or less, starting at a depth
          of less than or equal to 30 cm (12 inches) from the soil surface, and having
          a minimum thickness of either: a. 15 cm (6 inches), or b. 5 cm (2 inches)
          if the 5 cm consists of fragmental soil material. Organic, loamy or clayey
          layer(s) above the depleted or gleyed matrix must have value of 3 or less
          and chroma of 2 or less starting at a depth of less than or equal to 15
          cm (6 inches) from the soil surface and extend to the depleted or gleyed
          matrix. Any sandy material above the depleted or gleyed matrix must have
          value of 3 or less and chroma of 1 or less starting at a depth of less than
          or equal to 15 cm (6 inches) from the soil surface and extend to the depleted
          or gleyed matrix. Viewed through a10x or 15x hand lens, at least 70 percent
          of the visible soil particles must be masked with organic material. Observed
          without a hand lens, the particles appear to be close to 100 percent masked.'
      a12:
        description: Thick Dark Surface A layer at least 15 cm (6 inches) thick with
          a depleted or gleyed matrix that has 60 percent or more chroma of 2 or less
          starting below 30 cm (12 inches) of the surface. The layer(s) above the
          depleted or gleyed matrix and starting at a depth of less than or equal
          to 15 cm (6 inches) from the soil surface must have value of 2.5 or less
          and chroma of 1 or less to a depth of at least 30 cm (12 inches) and value
          of 3 or less and chroma of 1 or less in any remaining layers above the depleted
          or gleyed matrix. In any sandy material above the depleted or gleyed matrix,
          at least 70 percent of the visible soil particles must be masked with organic
          material, viewed through a 10x or 15x hand lens. Observed without a hand
          lens, the particles appear to be close to 100 percent masked.
      a13:
        description: Alaska Gleyed A mineral layer with a dominant hue of N, 10Y,
          5GY, 10GY, 5G, 10G, 5BG, 10BG, 5B, 10B, or 5PB and with value of 4 or more
          in more than 50 percent of the matrix. The layer starts at a depth of less
          than or equal to 30 cm (12 inches) from the mineral surface and is underlain
          at a depth of less than or equal to 1.5 m (60 inches) from the soil surface
          by soil material with hue of 5Y or redder in the same type of parent material.
      a14:
        description: Alaska Redox A mineral layer that has dominant hue of 5Y with
          chroma of 3 or less, or a gleyed matrix, with 10 percent or more distinct
          or prominent redox concentrations occurring as pore linings with value and
          chroma of 4 or more. The layer occurs at a depth of less than or equal to
          30 cm (12 inches) from the soil surface.
      a15:
        description: Alaska Gleyed Pores A mineral layer that has 10 percent or more
          hue of N, 10Y, 5GY, 10GY, 5G, 10G, 5BG, 10BG, 5B, 10B, or 5PB with value
          of 4 or more along root channels or other pores and that starts at a depth
          of less than or equal to 30 cm (12 inches) from the soil surface. The matrix
          has a dominant hue of 5Y or redder.
      a16:
        description: Coast Prairie Redox A layer starting at a depth of less than
          or equal to 15 cm (6 inches) from the soil surface that is at least 10 cm
          (4 inches) thick and has a matrix chroma of 3 or less with 2 percent or
          more distinct or prominent redox concentrations occurring as soft masses
          and/or pore linings.
      s1:
        description: Sandy Mucky Mineral A layer of mucky modified sandy soil material
          5 cm (2 inches) or more thick starting at a depth of less than or equal
          to 15 cm (6 inches) from the soil surface.
      s2:
        description: 2.5 cm Mucky Peat or Peat A layer of mucky peat or peat 2.5 cm
          (1 inch) or more thick with value of 4 or less and chroma of 3 or less,
          starting at a depth of less than or equal to 15 cm (6 inches) from the soil
          surface, and underlain by sandy soil material.
      s3:
        description: 5 cm Mucky Peat or Peat A layer of mucky peat or peat 5 cm (2
          inches) or more thick with value of 3 or less and chroma of 2 or less, starting
          at a depth of less than or equal to 15 cm (6 inches) from the soil surface,
          and underlain by sandy soil material.
      s4:
        description: Sandy Gleyed Matrix A gleyed matrix that occupies 60 percent
          or more of a layer starting at a depth of less than or equal to 15 cm (6
          inches) from the soil surface.
      s5:
        description: Sandy Redox A layer starting at a depth of less than or equal
          to 15 cm (6 inches) from the soil surface that is at least 10 cm (4 inches)
          thick and has a matrix with 60 percent or more chroma of 2 or less and 2
          percent or more distinct or prominent redox concentrations occurring as
          soft masses and/or pore linings.
      s6:
        description: Stripped Matrix A layer starting at a depth of less than or equal
          to 15 cm (6 inches) from the soil surface in which iron-manganese oxides
          and/or organic matter have been stripped from the matrix and the primary
          base color of the soil material has been exposed. The stripped areas and
          translocated oxides and/or organic matter form a faintly contrasting pattern
          of two or more colors with diffuse boundaries. The stripped zones are 10
          percent or more of the volume and are rounded.
      s7:
        description: Dark Surface A layer 10 cm (4 inches) thick, starting at a depth
          of less than or equal to the upper 15 cm (6 inches) from the soil surface,
          with a matrix value 3 of or less and chroma of 1 or less. At least 70 percent
          of the visible soil particles must be masked with organic material, viewed
          through a 10x or 15x hand lens. Observed without a hand lens, the particles
          appear to be close to 100 percent masked. The matrix color of the layer
          directly below the dark layer must have the same colors as those described
          above or any color that has chroma of 2 or less.
      s8:
        description: Polyvalue Below Surface A layer with value of 3 or less and chroma
          of 1 or less starting at a depth of less than or equal to 15 cm (6 inches)
          from the soil surface. At least 70 percent of the visible soil particles
          must be masked with organic material, viewed through a 10x or 15x hand lens.
          Observed without a hand lens, the particles appear to be close to 100 percent
          masked. Directly below this layer, 5 percent or more of the soil volume
          has value of 3 or less and chroma of 1 or less, and the remainder of the
          soil volume has value of 4 or more and chroma of 1 or less to a depth of
          30 cm (12 inches) or to the spodic horizon, whichever is less.
      s9:
        description: Thin Dark Surface A layer 5 cm (2 inches) or more thick, at a
          depth of less than or equal to 15 cm (6 inches) from the soil surface, with
          value of 3 or less and chroma of 1 or less. At least 70 percent of the visible
          soil particles must be masked with organic material, viewed through a 10x
          or 15x hand lens. Observed without a hand lens, the particles appear to
          be close to 100 percent masked. This layer is underlain by a layer or layers
          with value of 4 or less and chroma of 1 or less to a depth of 30 cm (12
          inches) or to the spodic horizon, whichever is less.
      f1:
        description: Loamy Mucky Mineral A layer of mucky modified loamy or clayey
          soil material 10 cm (4 inches) or more thick starting at a depth of less
          than or equal to 15 cm (6 inches) from the soil surface.
      f2:
        description: Loamy Gleyed Matrix A gleyed matrix that occupies 60 percent
          or more of a layer starting at a depth of less than or equal to 30 cm (12
          inches) from the soil surface.
      f3:
        description: 'Depleted Matrix A layer that has a depleted matrix with 60 percent
          or more chroma of 2 or less and that has a minimum thickness of either:
          a. 5 cm (2 inches) if the 5 cm is entirely at a depth of less than or equal
          to 15 cm (6 inches) from the soil surface, or b. 15 cm (6 inches), at a
          depth of less than or equal to 25 cm (10 inches) from the soil surface surface.'
      f6:
        description: 'Redox Dark Surface A layer that is at least 10 cm (4 inches)
          thick, is at a depth of less than or equal to 20 cm (8 inches) of the mineral
          soil surface, and has: a. Matrix value of 3 or less and chroma of 1 or less
          and 2 percent or more distinct or prominent redox concentrations occurring
          as soft masses or pore linings, or b. Matrix value of 3 or less and chroma
          of 2 or less and 5 percent or more distinct or prominent redox concentrations
          occurring as soft masses or pore linings.'
      f7:
        description: 'Depleted Dark Surface Redox depletions with value of 5 or more
          and chroma of 2 or less in a layer that is at least 10 cm (4 inches) thick,
          is at a depth of less than or equal to 20 cm (8 inches) from the mineral
          soil surface, and has: a. Matrix value of 3 or less and chroma of 1 or less
          and 10 percent or more redox depletions, or b. Matrix value of 3 or less
          and chroma of 2 or less and 20 percent or more redox depletions.'
      f8:
        description: Redox Depressions In closed depressions subject to ponding, 5
          percent or more distinct or prominent redox concentrations occurring as
          soft masses or pore linings in a layer that is 5 cm (2 inches) or more thick
          and is at a depth of less than or equal to 10 cm (4 inches) from the soil
          surface.
      f10:
        description: Marl A layer of marl with value of 5 or more and chroma less
          than 2 starting at a depth of less than or equal to 10 cm (4 inches) from
          the soil surface.
      f11:
        description: Depleted Ochric A layer(s) 10 cm (4 inches) or more thick in
          which 60 percent or more of the matrix has value of 4 or more and chroma
          of 1 or less. The layer is at a depth of less than or equal to 25 cm (10
          inches) from the soil surface.
      f12:
        description: Iron-Manganese Masses On flood plains, a layer 10 cm (4 inches)
          or more thick with 40 percent or more chroma of 2 or less and 2 percent
          or more distinct or prominent redox concentrations occurring as soft iron-manganese
          masses with diffuse boundaries. The layer occurs at a depth of less than
          or equal to 20 cm (8 inches) from the soil surface. Iron-manganese masses
          have value and chroma of 3 or less. Most commonly, they are black. The thickness
          requirement is waived if the layer is the mineral surface layer
      f13:
        description: Umbric Surface In depressions and other concave landforms, a
          layer 25 cm (10 inches) or more thick, starting at a depth of less than
          or equal to 15 cm (6 inches) fromthe soil surface, in which the upper 15
          cm (6 inches) has value of 3 or less and chroma of 1 or less and in which
          the lower 10 cm (4 inches) has the same colors as those described above
          or any other color that has chroma of 2 or less.
      f16:
        description: 'High Plains Depressions In closed depressions that are subject
          to ponding, a mineral soil that has chroma of 1 or less to a depth of at
          least 35 cm (13.5 inches) and a layer at least 10 cm (4 inches) thick starting
          at a depth of less than or equal to 35 cm (13.5 inches) from the mineral
          soil that has either: a. 1 percent or more redox concentrations occurring
          as nodules or concretions, or b. Redox concentrations occurring as nodules
          or concretions with distinct or prominent corona.'
      f17:
        description: Delta Ochric A layer 10 cm (4 inches) or more thick in which
          60 percent or more of the matrix has value of 4 or more and chroma of 2
          or less and there are no redox concentrations. This layer occurs at a depth
          of less than or equal to 20 cm (8 inches) of the soil.
      f18:
        description: 'Reduced Vertic In Vertisols and Vertic intergrades, a positive
          reaction to alpha-alpha-dipyridyl that: a. Is the dominant (60 percent or
          more) condition of a layer at least 4 inches thick at a depth of less than
          or equal to (30 cm) 12 inches from the soil surface (or at least 2 inches
          thick at a depth of less than or equal to 15cm (6 inches) of the mineral
          or muck soil surface, b. Occurs for at least 7 continuous days and 28 cumulative
          days, and c. Occurs during a normal or drier season and month (within 16
          to 84 percent of probable precipitation).'
      f19:
        description: Piedmont Flood Plain Soils On flood plains, a mineral layer at
          least 15 cm (6 inches) thick, starting at a depth of less than or equal
          to 25 cm (10 inches) from the soil surface, with a matrix (60 percent or
          more of the volume) chroma of less than 4 and 20 percent or more distinct
          or prominent redox concentrations occurring as soft masses or pore linings.
      f20:
        description: Anomalous Bright Loamy Soils Within 200 meters (656 feet) of
          estuarine marshes or water and within 1 m (3.28 feet) of mean high water,
          a mineral layer at least 10 cm (4 inches) thick, starting at a depth of
          less than or equal to 20 cm (8 inches) from the soil surface, with a matrix
          (60 percent or more of the volume) chroma of less than 5 and 10 percent
          or more distinct or prominent redox concentrations occurring as soft masses
          or pore linings and/or depletions.
      f21:
        description: 'Red Parent Material A layer derived from red parent material
          (see glossary) that is at least 10 cm (4 inches) thick, starting at a depth
          of less than or equal to 25 cm (10 inches) from the soil surface with a
          hue of 7.5YR or redder. The matrix has a value and chroma greater than 2
          and less than or equal to 4. The layer must contain 10 percent or more depletions
          and/or distinct or prominent redox concentrations occurring as soft masses
          or pore linings. Redox depletions should differ in color by having: a.)
          Value one or more higher and chroma one or more lower than the matrix, or
          b.) Value of 4 or more and chroma of 2 or less.'
      f22:
        description: 'Very Shallow Dark Surface In depressions and flood plains subject
          to frequent ponding and/or flooding, one of the following: a. if bedrock
          occurs between 15 cm (6 inches) and 25 cm (10 inches), a layer at least
          15 cm (6 inches) thick starting at a depth of less than or equal to 10 cm
          (4 inches) from the soil surface with value 2.5 or less and chroma 1 or
          less, and the remaining soil to bedrock must have the same colors as above
          or any other color that has a chroma 2 or less. b. if bedrock occurs within
          15 cm (6 inches), more than half of the soil thickness must have value 2.5
          or less and chroma 1 or less, and the remaining soil to bedrock must have
          the same colors as above or any other color that has a chroma 2 or less.'
      s11:
        description: High Chroma Sands In coastal zones and dune-and-swale complexes,
          a layer 2 inches (5 cm) or more thick starting at a depth of less than or
          equal to 4 inches (10 cm) from the soil surface with chroma 4 or less and
          2% or more distinct or prominent redox concentrations.
      s12:
        description: Barrier Islands In the swale prtion of dune-and-swale complexes
          of barrier islands, a layer of muck 1 cm (0.5 inches) or more thick with
          value of 3 or less and chroma of 2 or less and starting at a depth of less
          than or equal to 15 cm (6 inches) from the soil surface.
      f9:
        description: Vernal Pools In closed depressions that are subject to ponding,
          presence of a depleted matrix with 60 percent or more chroma of 2 or less
          in a layer 5 cm (2 inches) thick entirely within the upper 15 cm (6 inches)
          of the soil.
        status: obsolete
    description: 'Reference: Field Indicators of Hydric Soils in the United States
      A Guide for Identifying and Delineating Hydric Soils, Version 7.0, 2010'
  NASIS_hydrologic_group:
    name: NASIS_hydrologic_group
    title: Hydrologic Group
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=300
    permissible_values:
      a:
        description: Soils in this group have low runoff potential when thoroughly
          wet. Water is transmitted freely through the soil.
      b:
        description: Soils in this group have moderately low runoff potential when
          thoroughly wet. Water transmission through the soil is unimpeded.
      c:
        description: Soils in this group have moderately high runoff potential when
          thoroughly wet. Water transmission through the soil is somewhat restricted.
      d:
        description: Soils in this group have high runoff potential when thoroughly
          wet. Water movement through the soil is restricted or very restricted.
      a/d:
        description: These soils have low runoff potential when drained and high runoff
          potential when undrained.
      b/d:
        description: These soils have moderately low runoff potential when drained
          and high runoff potential when undrained.
      c/d:
        description: These soils have moderately high runoff potential when drained
          and high runoff potential when undrained.
    description: 'Refers to soils grouped according to their runoff potential. The
      soil properties that influence this potential are those that affect the minimum
      rate of water infiltration on a bare soil during periods after prolonged wetting
      when the soil is not frozen. These properties include depth to a seasonal high
      water table, the infiltration rate, and depth to a layer that significantly
      restricts the downward movement of water. The slope and the kind of plant cover
      are not considered but are separate factors in predicting runoff. Reference:
      Glossary of Soil Science Terms, 2015.'
  NASIS_hydrology_status:
    name: NASIS_hydrology_status
    title: Hydrology Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=301
    permissible_values:
      unaltered:
        description: The hydrology of the soil has not been significantly altered
          by man.
      drier than natural:
        description: The hydrology has been modified by human activity such that is
          significantly drier than natural. Modifications might include surface drainage
          or protection from flooding.
      wetter than natural:
        description: The hydrology has been modified by human activity such that is
          significantly wetter than natural. Modifications might include irrigation,
          blockage of natural surface water drainage, or activitties that raise local
          zones of saturation.
    description: "Whether or not the site's hydrology has been altered by man and\
      \ if so, in what direction."
  NASIS_hydrometer_method:
    name: NASIS_hydrometer_method
    title: Hydrometer Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=302
    permissible_values:
      shmp dispersible - oven dry:
        description: Sodium Hexametaphosphate Dispersible - oven dry soil
      shmp dispersible - field moist:
        description: Sodium Hexametaphosphate Dispersible - field moist soil.
      shmp dispersible - air dry:
        description: Sodium Hexametaphosphate Dispersible - air-dry soil.
      shmp dispersible - om removal by h2o2:
        description: Sodium Hexametaphosphate Dispersible with Organic Matter Removal
          by Hydrogen Peroxide.
      shmp dispersible - om removal by shc:
        description: Sodium Hexametaphosphate Dispersible with Organic Matter Removal
          by Sodium Hypochlorite.
      shmp dispersible - co3 removal:
        description: Sodium Hexametaphosphate Dispersible with Carbonate Removal.
      shmp dispersible - fe removal:
        description: Sodium Hexametaphosphate Dispersible with Iron Removal.
    description: 'A refined submethod of the hydrometer method used to determine soil
      texture which includes the use of sodium hexametaphosphate to disperse any organic
      matter present in the sample. Reference: Soil Survey Investigation Report No.
      51 version 2. Method 3.2.1.2.1.'
  NASIS_ia_subsoil_k:
    name: NASIS_ia_subsoil_k
    title: Ia Subsoil K
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=303
    permissible_values:
      very low minus:
        description: < 25 ppm
      very low plus:
        description: 25 - 50 ppm
      low:
        description: 50 - 79 ppm
      medium:
        description: 79 - 125 ppm
      high:
        description: '> 125 ppm'
    description: An estimate of the amount of potassium found in the subsoil. Used
      only in Iowa.
  NASIS_ia_subsoil_p:
    name: NASIS_ia_subsoil_p
    title: Ia Subsoil P
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=304
    permissible_values:
      very low:
        description: < 7.5 ppm
      low:
        description: 7.5-13.0 ppm
      medium:
        description: 13.0-22.5 ppm
      high:
        description: '> 22.5 ppm'
    description: An estimate of the amount of phosphorus found in the subsoil. Used
      only in Iowa.
  NASIS_infiltration_test_method:
    name: NASIS_infiltration_test_method
    title: Infiltration Test Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=305
    permissible_values:
      single ring constant head:
        description: Infiltration determined using a single ring configuration and
          contant head of water.
      double ring constant head:
        description: Infiltration determined using a double ring configuration and
          contant head of water.
      single ring falling head:
        description: Infiltration determined using a single ring configuration and
          falling head of water
      double ring falling head:
        description: Infiltration determined using a double ring configuration and
          falling head of water.
      cornell sprinkler infiltrometer:
        description: 'The Cornell Sprinkle Infiltrometer system consists of a portable
          rainfall simulator that is placed onto a single 241-mm (9 1/2") inner diameter
          infiltration ring (Fig. 1) and allows for application of simulated rainfall
          at a wide range of predetermined rates. The apparatus permits the determination
          of several important soil hydrological properties: Time-to-runoff, sorptivity,
          and field-saturated infiltrability. Ref: https://cpb-us-east-1- juc1ugur1qwqqqo4.stackpathdns.com/blogs.cornell.edu/dist/f/5772/files/2015/11/Cornell-
          Sprinkle-Infiltrometer-manual-1xf0snz.pdf'
      mini disk infiltrometer:
        description: Instrument for measuring unsaturated hydraulic conductivity.
    description: Identifies which of the field office infiltration methods (single
      or double ring with a constant or falling head of water) is used to determine
      infiltration rate. Determination is by Soil Survey Office staff in the field,
      not a laboratory method.
