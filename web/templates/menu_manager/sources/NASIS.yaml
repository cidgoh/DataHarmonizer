  NASIS_soil_odor:
    name: NASIS_soil_odor
    title: Soil Odor
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=541
    permissible_values:
      none:
        description: no odor detected
      petrochemical:
        description: The presence (smell) of gaseous or liquid gasoline, oil, creosote,
          etc.
      sulfurous:
        description: Presence of H2S (hydrogen sulfide); rotten eggs; commonly associated
          with strongly reduced soil containing sulfur compounds.
    description: 'Record the Kind and relative Intensity of odor (by horizon) immediately
      after soil is exposed to air. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
  NASIS_soil_odor_intensity:
    name: NASIS_soil_odor_intensity
    title: Soil Odor Intensity
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=542
    permissible_values:
      slight:
        description: Odor is faint (e.g., only detected when some of the sample is
          brought close to the nose).
      moderate:
        description: Odor is readily noticeable at arms length as one handles the
          material (e.g., intermediate intensity); only detected as one starts to
          dig into the sample.
      strong:
        description: Odor is quite intense and readily detected before or immediately
          after the sample is exposed to air.
    description: 'Estimate and record the relative intensity of any odor present.
      Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_soil_redistribution_class:
    name: NASIS_soil_redistribution_class
    title: Soil Redistribution Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=543
    permissible_values:
      class 0:
        description: No evidence of erosion or deposition.
      class 1:
        description: Very slight soil redistribution. No noticeable thinning of the
          soil surface and soil movement occurs within a matrix of vegetated/stable
          soil.
      class 2:
        description: Patchy, slight (<5cm) soil loss and deposition. The soil surface
          is thinned in discrete patches within a matrix of vegetated/stable soil.
          Sediment source may be on or off the plot.
      class 3a:
        description: Extensive, moderate soil loss (<10cm). Noticeable thinning of
          the soil surface across the plot, with or without patches of stable soil
          or sediment accumulation. Patches of stable soil and sediment deposits are
          typically associated with persistent plants.
      class 3b:
        description: Extensive, moderate soil redistribution (<10cm). Sediment deposits
          (<10cm thick) common across the plot from a sediment source off the plot.
          Sediment accumulation can be associated with erosion or redistribution of
          sediments suggesting that soil is currently moving into and out of the plot.
      class 4a:
        description: Extensive, severe erosion (>10cm); little deposition. Plot is
          embedded in an extensive area of erosion.
      class 4b:
        description: Extensive, severe erosion (>10cm) coupled with patchy sediment
          deposition. Plot is embedded in an extensive area of erosion and deposition.
      class 4c:
        description: Extensive, severe sediment deposition (>10cm). Sedimentation
          continuous across plot. May be hard to detect without excavation. Sediments
          originate from off the plot.
    description: 'General class of pattern of resource redistribution used in monitoring
      soil change. Reference: Soil Change Guide: Procedures for Soil Survey and Resource
      Inventory v 1.1'
  NASIS_soil_slippage_potential:
    name: NASIS_soil_slippage_potential
    title: Soil Slippage Potential
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=544
    permissible_values:
      low:
        description: Low potential of slippage.
      medium:
        description: Medium potential of slippage.
      high:
        description: High potential of slippage.
      moderately low:
        description: Moderately low hazzard of slippage.
        status: obsolete
      moderately high:
        description: Moderately high hazard of slippage.
        status: obsolete
    description: 'The hazard that a mass of soil will slip when vegetation is removed,
      soil water is at or near saturation, and other normal practices are applied.
      Reference: National Soil Survey Handbook.'
  NASIS_soil_stability_class:
    name: NASIS_soil_stability_class
    title: Soil Stability Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=545
    permissible_values:
      class 1:
        description: 50% or more of structural integrity lost within 5 seconds of
          insertion in water, or soil is too unstable to sample (falls through sieve).
      class 2:
        description: 50% or more of structural integrity lost within 5 - 30 seconds
          of insertion in water.
      class 3:
        description: More than 50% remains after 300 seconds, and <10% of soil remains
          on sieve after 5 dipping cycles.
      class 4:
        description: More than 50% remains after 300 seconds, and 10 - 25% of soil
          remains after 5 dipping cycles.
      class 5:
        description: More than 50% remains after 300 seconds, and 25 - 75% of soil
          remains after 5 dipping cycles.
      class 6:
        description: More than 50% remains after 300 seconds, and 75 - 100% of soil
          remains after 5 dipping cycles.
    description: 'General class of aggregate stability. Soil aggregate stability is
      widely recognized as a key indicator of soil quality and rangeland health. Reference:
      Soil Aggregate Stability Kit - Joranada.pdf. Soil Survey Manual.'
  NASIS_soil_surface_erosion:
    name: NASIS_soil_surface_erosion
    title: Soil Surface Erosion
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=546
    permissible_values:
      slight: {}
      moderate: {}
      severe: {}
    description: Relative class of soil surface erosion.
  NASIS_soil_survey_area_status:
    name: NASIS_soil_survey_area_status
    title: Soil Survey Area Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=547
    permissible_values:
      out-of-date:
        description: Soil survey area has a published report, but it no longer meets
          user needs; it requires extensive revision, as defined in NSSH Part 610.06.
      published:
        description: Soil survey area has been printed, or otherwise reproduced and
          issued by a Federal or State agency, and meets the current needs of users.
          Publication is defined as a traditional hard copy printed report, CD-ROM,
          web publication, or other media as agreed to by the National Cooperative
          Soil Survey cooperators in the memorandum of understanding.
      nonproject:
        description: Soil survey area has neither the initial mapping complete nor
          a signed correlation document.
      initial:
        description: Soil survey area has a signed Memorandum of Understanding and
          assigned staffing to complete the initial mapping and field documentation
          in 3 to 5 years.
      extensive revision:
        description: Soil Survey area has a published report that requires extensive
          revision, as defined in NSSH Part 610.06. The Director, Soil Survey Division,
          has approved the survey area for updating and republication, and the survey
          area has a signed memorandum of understanding and staffing to complete the
          fieldwork in 2 to 4 years.
      update:
        description: Soil survey area has a published report that requires some degree
          of revision (primarily to soil maps), as defined in NSSH Part 610.06. A
          comprehensive evaluation documents deficiencies for the entire survey area,
          and National Cooperative Soil Survey cooperators have agreed on the evaluation;
          staffing is assigned and other necessary resources are available to complete
          all revisions within 2 years or less.
      update needed:
        description: Soil survey area has a published report that requires some degree
          of revision (primarily to soil maps), as defined in NSSH Part 610.06. A
          comprehensive evaluation documents deficiencies for the entire survey area,
          and National Cooperative Soil Survey cooperators have agreed on the evaluation;
          however available resources do not dictate immediate project activities
          and a change to Maintenance status.
    description: The status at which the soil survey of an area is at at the time
      of record.
