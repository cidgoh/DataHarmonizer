          models
      raster model evaluation:
        description: Documentation gathered to evaluate accuracy or uncertainty of
          predictive models
      soil health sample pedon:
        description: Documentation gathered to support a soil health project.
      forestry data site:
        status: obsolete
      full pedon description:
        status: obsolete
      range data site:
        status: obsolete
    description: The general reason for describing a pedon at the site.
  NASIS_pedon_text_kind:
