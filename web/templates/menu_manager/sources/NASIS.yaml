    name: NASIS_terms_used_in_lieu_of_texture
    title: Terms Used In Lieu Of Texture
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=830
    permissible_values:
      peat:
        description: Slightly decomposed organic material of any thickness that is
          saturated with water for 30 or more cumulative days in normal years (or
          is artificially drained), including that in Histels and Histosols, except
          for Folists.
      gr:
        title: Gravel Gravel
      mpt:
        title: Mucky peat Moderately decomposed organic material of any thickness
          that is saturated with water for 30 or more cumulative days in normal years
          (or is artificially drained), including that in Histels and Histosols, except
          for Folists.
      muck:
        description: Highly decomposed organic material of any thickness that is saturated
          with water for 30 or more cumulative days in normal years (or is artificially
          drained), including that in Histels and Histosols, except for Folists.
      mat:
        title: 'Material "Material" is used only in combination with Compositional
          Texture Modifiers. Such as "Cemented Material" denotes any cemented soil
          material (i.e. duripan, ortstein, petrocalic, petroferric, petrogypsic).
          From Field Book for Describing and Sampling Soils, Version 3.0. This description
          was added for 7.4.1'
