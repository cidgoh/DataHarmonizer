    description: 'A system that classifies mineral and organic mineral soils for engineering
      purposes based on particle-size characteristics, liquid limit, and plasticity
      index. Reference: Part 618 National Soil Survey Handbook. Standard practice
      for classification of soils for engineering purposes (Unified Soil Classification
      System). Reference: ASTM designation D2487 - 92. Reference: This is a classification
      of soil material designed for general construction purposes. It is dependent
      on the particle size distribution of the <75 mm, the liquid limit, and the plasticity
      index and on whether the soil material is high in organic matter (ASTM test
      D 2487, in ASTM, 1984). Reference: This is a classification of soil material
      designed for general construction purposes. It is dependent on the particle
      size distribution of the <75 mm, the liquid limit, and the plasticity index
      and on whether the soil material is high in organic matter (ASTM test D 2487,
      in ASTM, 1984). This subclass is based on research by H. H. Sato and proposed
      in: Sato, H. H. 1971. Interpretation of Index Properties of the Unified Classification
      System for Hawaiian Soils. Unpublished Master of Science thesis. University
      of Hawaii. As proposed, this subclass is only to be used in the islands of the
      state of Hawaii and islands included in the Pacific Island Area. As of 10 Jun
      2016 this subclass is under review.'
