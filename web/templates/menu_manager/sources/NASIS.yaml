          of datetime, example: 2017-01-01 10:11:12.123 Datetime2(?) format: YYYY-MM-DD
          hh:mm:ss[.nnnnnnn] - where n = precision, so datetime2(3) = 2017-01-01 10:11:12.123,
          datetime2(7) = 2017- 01-01 10:11:12.1234567 At some point all of the datetime
