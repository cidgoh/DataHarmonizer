  NASIS_fragment_kind:
    name: NASIS_fragment_kind
    title: Fragment Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=232
    permissible_values:
      sandstone, unspecified:
        title: Sandstone
        description: fragments Sedimentary rock containing dominantly sand-size clastic
          particles.
      arkose:
        description: fragments
      sandstone, calcareous:
        title: Calcareous sandstone fragments
      conglomerate, unspecified:
        title: Conglomerate
        description: fragments A coarse-grained, clastic sedimentary rock composed
          of rounded to subangular rock fragments larger than 2 mm, commonly with
          a matrix of sand and finer material; cements include silica, calcium carbonate,
          and iron oxides. The consolidated equivalent of gravel.
      conglomerate, calcareous:
        title: Calcareous conglomerate fragments
      cinders:
        description: Uncemented vitric, vesicular, pyroclastic material, more than
          2.0 mm in at least one dimension, with an apparent specific gravity (including
          vesicles) of more than 1.0 and less than 2.0. Compare - ash [volcanic],
          block [volcanic], lapilli, tephra.
      pumice:
        description: fragments A light-colored, vesicular, glassy rock commonly having
          the composition of rhyolite. It commonly has a specific gravity of < 1.0
          and is thereby sufficiently buoyant to float on water.
      scoria:
        description: fragments Vesicular, cindery crust or bomb-sized fragments of
          such material on the surface of andesitic or basaltic lava, the vesicular
          nature of which is due to the escape of volcanic gases before solidification;
          it is usually heavier, darker, and more crystalline than pumice. Synonym
          - cinder.
      volcanic bombs: {}
      shale, unspecified:
        title: Shale
        description: fragments Sedimentary rock formed by induration of a clay, silty
          clay, or silty clay loam deposit and having the tendency to split into thin
          layers, i.e., fissility.
      shale, calcareous:
        title: Calcareous shale fragments
      shale, clayey:
        title: Clayey shale fragments
      igneous, unspecified:
        title: Igneous
        description: 'rock fragments Rock formed by solidification from a molten or
          partially molten state; major varieties include plutonic and volcanic rocks.
          Examples: andesite, basalt, granite. Compare - intrusive, extrusive.'
      granite:
        description: fragments
      basalt:
        description: fragments
      andesite:
        description: fragments
      limestone, unspecified:
        title: Limestone
        description: fragments A sedimentary rock consisting chiefly (more than 50
          percent) of calcium carbonate, primarily in the form of calcite. Limestones
          are usually formed by a combination of organic and inorganic processes and
          include chemical and clastic (soluble and insoluble) constituents; many
          contain fossils.
      chalk:
        description: fragments
      marble:
        description: fragments
      dolomite (dolostone):
        title: Dolomite
        description: fragments A carbonate sedimentary rock consisting chiefly (more
          than 50 percent by weight or by areal percentages under the microscope)
          of the mineral dolomite.
      limestone, phosphatic:
        title: Phosphatic limestone fragments
      limestone, arenaceous:
        title: Arenaceous limestone fragments
      limestone, argillaceous:
        title: Argillaceous limestone fragments
      limestone, cherty:
        title: Cherty limestone fragments
      metamorphic, unspecified:
        title: Metamorphic
        description: "rock fragments Rock of any origin altered in mineralogical composition,\
          \ chemical composition, or structure by heat, pressure, and movement at\
          \ depth in the earth's crust. Nearly all such rocks are crystalline. Examples:\
          \ schist, gneiss, quartzite, slate, marble."
      gneiss:
        description: fragments
      serpentinite:
        description: fragments
      schist, unspecified:
        title: Schist fragments
      slate:
        description: fragments
      quartzite:
        description: fragments
      tuff, unspecified:
        title: Tuff
        description: fragments A compacted deposit that is 50 percent or more volcanic
          ash and dust
      tuff, acidic:
        title: Acidic tuff fragments
      tuff, basic:
        title: Basic tuff fragments
      volcanic breccia, unspecified:
        title: Volcanic breccia fragments
      volcanic breccia, acidic:
        title: Acidic volcanic breccia fragments
      volcanic breccia, basic:
        title: Basic volcanic breccia fragments
      tuff breccia:
        description: fragments
      aa lava:
        description: fragments A type of basaltic lava (material) having a rough,
          jagged, clinkery surface and a vesicular interior. Compare - block lava,
          pahoehoe lava, pillow lava.
      pahoehoe lava:
        description: fragments A type of basaltic lava (material) with a characteristically
          smooth, billowy or rope-like surface and vesicular interior. Compare - `a`a
          lava, block lava, pillow lava.
      sedimentary, unspecified:
        title: Sedimentary
        description: 'rock fragments A consolidated deposit of clastic particles,
          chemical precipitates, and organic remains accumulated at or near the surface
          of the earth under "normal" low temperature and pressure conditions. Sedimentary
          rocks include consolidated equivalents of alluvium, colluvium, drift, and
          eolian, lacustrine, marine deposits; e.g., sandstone, siltstone, mudstone,
          clay-stone, shale, conglomerate, limestone, dolomite, coal, etc.'
      siltstone, unspecified:
        title: Siltstone
        description: fragments Sedimentary rock containing dominantly silt-size clastic
          particles.
      siltstone, calcareous:
        title: Calcareous siltstone fragments
      mixed:
        description: rock fragments
      diorite:
        description: fragments
      gabbro:
        description: fragments
      obsidian:
        description: fragments
      rhyolite:
        description: fragments
      hornfels:
        description: fragments
      metaconglomerate:
        description: fragments
      phyllite:
        description: fragments
      wood:
        description: fragments
      charcoal:
        description: fragments
      chert:
        description: fragments A hard, extremely dense or compact, dull to semivitreous,
          cryptocrystalline sedimentary rock, consisting dominantly of interlocking
          crystals of quartz less than about 30 mm in diameter; it may contain amorphous
          silica (opal). It sometimes contains impurities such as calcite, iron oxide,
          or the remains of silicious and other organisms. It has a tough, splintery
          to conchoidal fracture and may be white or variously colored gray, green,
          blue, pink, red, yellow, brown, and black. Chet occurs principally as nodular
          or concretionary segregations in limestones and dolomites.
      coal:
        description: fragments
      graywacke:
        description: fragments
      gypsum, rock:
        title: Rock gypsum
        description: fragments A sedimentary rock (evaporite) composed primarily of
          mineral gypsum (CaSO4.2H2O). The rock is generally massive, ranges from
          coarse crystalline to fine granular, may show disturbed bedding due to hydration
          expansion of parent anhydrite (anhydrous CaSO4), and may exhibit rhythmic
          sedimentation (rhymites). Compare gypsite. GG
      shale, acid:
        title: Acid shale fragments
      lapilli:
        description: Non or slightly vesicular pyroclastics, 2.0 to 76 mm in at least
