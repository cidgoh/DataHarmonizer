  NASIS_cowardin_moist_regime_modifier:
    name: NASIS_cowardin_moist_regime_modifier
    title: Cowardin Moist Regime Modifier
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=96
    permissible_values:
      nontidal:
        description: Though not influenced by oceanic tides, nontidal water regimes
          may be affected by wind or seiches in lakes. Water regimes are defined in
          terms of the growing season, which we equate to the frost-free period (see
          the U.S. Department of Interior National Atlas 1970:110-111 for generalized
          regional delineation). The rest of the year is defined as the dormant season,
          a time when even extended periods of flooding may have little influence
          on the development of plant communities.
      freshwater tidal: {}
      saltwater tidal: {}
    description: 'Moisture regime modifier is an additional refinement to the Cowardin
      Classification System used to more fully describe wetlands and deep water habitats
      at the Class level. Reference: Classification of Wetlands and Deep Water Habitats
      of the United States. FWS/OBS 79/31 December 1979 Reprinted 1992.'
  NASIS_cowardin_wetland_class:
    name: NASIS_cowardin_wetland_class
    title: Cowardin Wetland Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=97
    permissible_values:
      aquatic bed:
        description: The Aquatic Bed class includes wetlands and deepwater habitats
          dominated by plants that grow principally on or below the surface of the
          water for most of the growing season in most years. Water regimes include
          subtidal, irregularly exposed, regularly flooded, permanently flooded, intermittently
          exposed, semipermanently flooded, and seasonally flooded.
      emergent wetland:
        description: The Emergent Wetland class is characterized by erect, rooted,
          herbaceous hydrophytes, excluding mosses and lichens. This vegetation is
          present for most of the growing season in most years. These wetlands are
          usually dominated by perennial plants. All water regimes are included except
          subtidal and irregularly exposed.
      forested wetland:
        description: The Forested Wetland class is characterized by woody vegetation
          that is 6 m tall or taller. All water regimes are included except subtidal.
      moss-lichen wetland:
        description: The Moss-Lichen Wetland class includes areas where mosses or
          lichens cover substrates other than rock and where emergents, shrubs, or
          trees make up less than 30% of the areal cover. The only water regime is
          saturated.
      reef:
        description: The Reef class includes ridge-like or mound-like structures formed
          by the colonization and growth of sedentary invertebrates. Water regimes
          are restricted to subtidal, irregularly exposed, regularly flooded, and
          irregularly flooded.
      rock bottom:
        description: The Rock Bottom class includes all wetlands and deepwater habitats
          with substrates having an areal cover of stones, boulders, or bedrock 75%
          or greater and vegetative cover of less than 30%. Water regimes are restricted
          to subtidal, permanently flooded, intermittently exposed, and semipermanently
          flooded.
      rocky shore:
        description: The Rocky Shore class includes wetland environments characterized
          by bedrock, stones, or boulders which singly or in combination have an areal
          cover of 75% or more and an areal coverage by vegetation of less than 30%.
          Water regimes are restricted to irregularly exposed, regularly flooded,
          irregularly flooded, seasonally flooded, temporarily flooded, and intermittently
          flooded.
      scrub-shrub wetland:
        description: The Scrub-Shrub Wetland class includes areas dominated by woody
          vegetation less than 6 m (20 feet) tall. The species include true shrubs,
          young trees, and trees or shrubs that are small or stunted because of environmental
          conditions. All water regimes except subtidal are included.
      streambed:
        description: The Streambed class includes all wetland contained within the
          Intermittent Subsystem of the Riverine System and all channels of the Estuarine
          System or of the Tidal Subsystem of the Riverine System that are completely
          dewatered at low tide. Water regimes are restricted to irregularly exposed,
          regularly flooded, irregularly flooded, seasonally flooded, temporarily
          flooded, and intermittently flooded.
      unconsolidated bottom:
        description: The Unconsolidated Bottom class includes all wetland and deepwater
          habitats with at least 25% cover of particles smaller than stones, and a
          vegetative cover less than 30%. Water regimes are restricted to subtidal,
          permanently flooded, intermittently exposed, and semipermanently flooded.
      unconsolidated shore:
        description: 'The Unconsolidated Shore class includes all wetland habitats
          having three characteristics: (1) unconsolidated substrates with less than
          75% areal cover of stones, boulders, or bedrock; (2) less than 30% areal
          cover of vegetation other than pioneering plants; and (3) any of the following
          water regimes: irregularly exposed, regularly flooded, irregularly flooded,
          seasonally flooded, temporarily flooded, intermittently flooded, saturated,
          or artificially flooded. Intermittent or intertidal channels of the Riverine
          System and intertidal channels of the Estuarine System are classified as
          Streambed.'
    description: 'The third tier in the hierarchy of the Cowardin Wetland Classification
      System. Reference: Classification of Wetlands and Deep Water Habitats of the
      United States. FWS/OBS 79/31 December 1979 Reprinted 1992.'
  NASIS_cowardin_wetland_subclass:
    name: NASIS_cowardin_wetland_subclass
