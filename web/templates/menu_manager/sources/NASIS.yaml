  NASIS_dmu_certification_status:
    name: NASIS_dmu_certification_status
    title: Dmu Certification Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=148
    permissible_values:
      not for distribution:
        description: The data map unit object has been created, but is not populated
          or the data are preliminary and incomplete. The data are subject to major
          changes. A data mapunit with this status should not be interpreted, exported,
          or used by other applications.
      not certified:
        description: The data in the data map unit object have been created and have
          been appropriately populated, at least in part, but the data have not been
          reviewed or certified. Data in some data elements in these tables may be
          more complete than in others. These are advance data, subject to change.
      partly certified, all components:
        description: The data for both major and minor components in the data mapunit
          object have been appropriately populated and the data have been reviewed.
          These data mapunits are typically associated with on-going projects. At
          least some of the data elements have been certified for use in specific
          applications. Other data elements in the object have advance data, subject
          to change.
      partly certified, major components:
        description: The data for major components in the data mapunit object have
          been appropriately populated. Minor components are not intended for interpretation,
          and are populated with only a limited number of the most significant data
          elements. These data mapunits are typically associated with on-going projects.
          All the data have been reviewed, and at least some of the data elements
          have been certified for use in specific applications. Other data elements
          in the object have advance data, subject to change.
      partly certified, minimal data:
        description: The data for major components in the data mapunit object have
          been populated and meet minimum standards, but some data elements are not
          appropriately populated. Minor components are not intended for interpretation,
          and are populated with only a limited number of the most significant data
          elements. These data mapunits are typically associated with initial soil
          surveys that were initiated years ago but are not yet completed. Data have
          received only a minimum amount of recent updating. The data mapunit does
          not have the level of quality and completeness equivalent to a recently
          populated dataset, but it is minimally acceptable. All the data have been
          reviewed, and at least some of the data elements have been certified for
          use in specific applications. Other data elements in the object are incomplete
          or have advance data, subject to change. Valid interpretations are available
          only for the major components with certified data elements, and some interpretations
          may be marginally valid.
      certified, all components:
        description: The data for both major and minor components in the data mapunit
          object have been appropriately populated, reviewed, and certified for general
          use. Valid interpretations can be generated for all components.
      certified, major components:
        description: The data for major components in the data mapunit object have
          been appropriately populated, reviewed, and certified for general use. Minor
          components are not intended for interpretation, and are populated with only
          a limited number of the most significant data elements. Valid interpretations
          can be generated for major components only.
      certified, minimal data:
        description: The data for major components in the data mapunit object have
          been populated, reviewed, and certified for general use. Minor components
          are not intended for interpretation, and are populated with only a limited
          number of the most significant data elements. These data mapunits are typically
          associated with initial soil surveys that were completed years ago. Data
          was originally populated under less stringent standards than are in place
          today, and data have received only a minimum amount of recent updating.
          The data mapunit does not have the level of quality and completeness equivalent
          to a recently populated dataset, but it is minimally acceptable and certifiable.
          Interpretations can be generated for major components only, and some interpretations
          may be only marginally valid.
      partly certified:
        description: The data in the data map unit object have been appropriately
          populated and the data have been reviewed. At least some of the data elements
          have been certified for use in specific applications. Other data elements
          in the object have advance data, subject to change.
        status: obsolete
      certified:
        description: The data in the data map unit object have been appropriately
          populated, reviewed, and certified for general use.
        status: obsolete
    description: Indicates the degree to which an object is ready to be used for its
      intended purpose.
