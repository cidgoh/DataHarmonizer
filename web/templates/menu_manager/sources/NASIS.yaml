          (or are artificially drained). An example is mucky loam. Excluding live
          roots, the horizon has organic carbon content (by weight) of 5 to < 12 percent
          if the mineral fraction contains no clay; or 12 to < 18 percent if the mineral
          fraction contains 60 percent or more clay; or (5 + (clay percentage multiplied
          by 0.12)) to < (12 + (clay percentage multiplied by 0.10)) if the mineral
