    description: 'Describe the nature of the unconsolidated material (regolith) in
      which the soil is formed. If the soil is derived directly from the underlying
      bedrock (e.g., granite), identify the Parent Material as either grus, saprolite,
      or residuum and then record the appropriate Bedrock - Kind choice. Reference:
      Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_parent_material_modifier:
    name: NASIS_parent_material_modifier
    title: Parent Material Modifier
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=375
    permissible_values:
      clayey:
        description: The soil texture class is clay, sandy clay, or silty clay.
      coarse-loamy:
        description: The material contains less than 18 percent clay and 15 percent
          or more particles that are 0.1 to 75.0 mm in size. The soil texture class
          is loamy very fine sand, very fine sand, or finer.
      coarse-silty:
        description: The material contains less than 18 percent clay and less than
          15 percent particles that are 0.1 to 75.0 mm in size.
      fine-loamy:
        description: The material contains 18 to 35 percent clay and 15 percent or
          more particles that are 0.1 to 75.0 mm in size.
      fine-silty:
        description: The material contains 18 to 35 percent clay and less than 15
          percent particles that are 0.1 to 75.0 mm in size.
      gravelly:
        description: The material contains 15 percent or more rock fragments.
      loamy:
        description: The soil texture class is sandy loam, sandy clay loam, clay loam,
          silt, silt loam, or silty clay loam.
      sandy:
        description: The soil texture class is sand or loamy sand.
      sandy and gravelly:
        description: The soil texture class contains sand or loamy sand, and the material
          contains 15 percent or more rock fragments.
      sandy and silty:
        description: The soil texture class is sand or loamy sand and silt or silt
          loam.
      silty:
        description: The soil texture class is silt or silt loam.
      silty and clayey:
        description: The soil texture class is silt or silt loam and clay, sandy clay,
          or silty clay.
      sandy and loamy:
        description: The soil texture class is sand or loamy sand and sandy loam,
          sandy clay loam, clay loam, silt, silt loam, or silty clay loam.
      loamy and clayey:
        description: The soil texture class is sandy loam, sandy clay loam, clay loam,
          silt, silt loam, or silty clay loam and clay, sandy clay, or silty clay.
      sandy and clayey:
        description: The soil texture class is sand or loamy sand and clay, sandy
          clay, or silty clay.
      coarse textured:
        description: The soil texture is sands (coarse sand, sand, fine sand, very
          fine sand);loamy sands(loamy coarse sand, loamy sand, loamy fine sand, loamy
          very fine sand). SSM table 3.1
      moderately coarse textured:
        description: The soil texture is coarse sandy loam, sandy loam, fine sandy
          loam. From table 3.1 SSM
      medium textured:
        description: The soil texture is very fine sandy loam, loam, silt loam, silt.
          From table 3.1 SSM
      moderately fine textured:
        description: The soil texture is clay loam, sandy clay loam, silty clay loam.
          From table 3.1 SSM
      fine textured:
        description: The soil texture is sandy clay, silty clay, clay. From table
          3.1 SSM
      loamy-skeletal:
        description: The material has a fine-earth fraction with textures finer than
          coarse sand, sand, fine sand, loamy coarse sand, loamy sand, or loamy fine
          sands and contains less than 35 percent clay and 35 percent or more by volume
          rock fragments plus any artifacts with 2mm or large diameter which are both
          cohesive and persistent.
    description: Adjectives that describe the fine earth fraction present in the parent
      material.
  NASIS_parent_material_origin:
    name: NASIS_parent_material_origin
    title: Parent Material Origin
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=377
    permissible_values:
      sandstone, unspecified:
        title: Sandstone
        description: Sedimentary rock containing dominantly sand-size clastic particles.
      arkose: {}
      sandstone, calcareous:
        title: Calcareous sandstone
      interbedded sedimentary:
        description: rock
      limestone, sandstone and shale:
        title: Limestone, sandstone, and shale
      limestone and sandstone: {}
      limestone and shale: {}
      limestone and siltstone: {}
      sandstone and shale: {}
      sandstone and siltstone: {}
      shale and siltstone: {}
      conglomerate, unspecified:
        title: Conglomerate
      conglomerate, calcareous:
        title: Calcareous conglomerate
        description: A coarse-grained, clastic sedimentary rock composed of rounded
          to subangular rock fragments larger than 2 mm, commonly with a matrix of
          sand and finer material; cements include silica, calcium carbonate, and
          iron oxides. The consolidated equivalent of gravel.
      pumice:
        description: A light-colored, vesicular, glassy rock commonly having the composition
          of rhyolite. It commonly has a specific gravity of < 1.0 and is thereby
          sufficiently buoyant to float on water. Compare - scoria, tephra.
      scoria:
        description: Vesicular, cindery crust or bomb-sized fragments of such material
          on the surface of andesitic or basaltic lava, the vesicular nature of which
          is due to the escape of volcanic gases before solidification; it is usually
          heavier, darker, and more crystalline than pumice. Synonym - cinder. Compare
          - pumice, tephra.
      shale, unspecified:
        title: Shale
        description: Sedimentary rock formed by induration of a clay, silty clay,
          or silty clay loam deposit and having the tendency to split into thin layers,
          i.e., fissility.
      shale, calcareous:
        title: Calcareous shale
      shale, clayey:
        title: Clayey shale
      igneous, unspecified:
        title: Igneous rock
      granite: {}
      basalt: {}
      andesite: {}
      limestone, unspecified:
        title: Limestone
        description: A sedimentary rock consisting chiefly (more than 50 percent)
          of calcium carbonate, primarily in the form of calcite. Limestones are usually
          formed by a combination of organic and inorganic processes and include chemical
          and clastic (soluble and insoluble) constituents; many contain fossils.
      chalk: {}
      marble: {}
      dolomite (dolostone):
        title: Dolomite
        description: A carbonate sedimentary rock consisting chiefly (more than 50
          percent by weight or by areal percentages under the microscope) of the mineral
          dolomite.
      limestone, phosphatic:
        title: Phosphatic limestone
      limestone, arenaceous:
        title: Arenaceous limestone
      limestone, argillaceous:
        title: Argillaceous limestone
      limestone, cherty:
        title: Cherty limestone
      metamorphic, unspecified:
        title: Metamorphic
        description: "rock Rock of any origin altered in mineralogical composition,\
          \ chemical composition, or structure by heat, pressure, and movement at\
          \ depth in the earth's crust. Nearly all such rocks are crystalline. Examples:\
          \ schist, gneiss, quartzite, slate, marble."
      gneiss: {}
      serpentinite: {}
      schist, unspecified:
        title: Schist
      slate: {}
      quartzite: {}
      pyroclastic (consolidated):
        title: Pyroclastic rock
      tuff, unspecified:
        title: Tuff
        description: A compacted deposit that is 50 percent or more volcanic ash and
          dust.
      tuff, acidic:
        title: Acidic tuff
      tuff, basic:
        title: Basic tuff
      volcanic breccia, unspecified:
        title: Volcanic breccia
      volcanic breccia, acidic:
        title: Acidic volcanic breccia
      volcanic breccia, basic:
        title: Basic volcanic breccia
      tuff breccia: {}
      aa lava:
        description: A type of lava flow having a rough, jagged, clinkery surface.
          Compare - pahoehoe lava. GG & MA
      pahoehoe lava:
        description: "A type of basaltic lava flow having a smooth, billowy or rope-like\
          \ surface. Compare - a'a lava."
      sedimentary, unspecified:
        title: Sedimentary
        description: 'rock A consolidated deposit of clastic particles, chemical precipitates,
          and organic remains accumulated at or near the surface of the earth under
          "normal" low temperature and pressure conditions. Sedimentary rocks include
          consolidated equivalents of alluvium, colluvium, drift, and eolian, lacustrine,
          marine deposits; e.g., sandstone, siltstone, mudstone, clay-stone, shale,
          conglomerate, limestone, dolomite, coal, etc. Compare - sediment.'
      siltstone, unspecified:
        title: Siltstone
        description: Sedimentary rock containing dominantly silt-size clastic particles.
      siltstone, calcareous:
        title: Calcareous siltstone
      igneous, metamorphic and sedimentary:
        description: rock
      igneous and metamorphic:
        description: rock
      igneous and sedimentary:
        description: rock
      metamorphic and sedimentary:
        description: rock
