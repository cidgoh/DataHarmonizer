        title: Ultramafic rock
      tuff, welded:
        title: Welded tuff
      sandstone, volcanic:
        title: Volcanic sandstone
      volcanic, unspecified:
        title: Volcanic
        description: "rock A generally fine-grained or glassy igneous rock resulting\
          \ from volcanic action at or near the Earth's surface, either ejected explosively\
          \ or extruded as lava. The term includes near-surface intrusions that form\
          \ a part of the volcanic structure."
      volcanic and sedimentary:
        description: rock
      volcanic and metamorphic:
        description: rock
      limestone and dolomite: {}
      granite and gneiss: {}
      sandstone, glauconitic:
        title: Glauconitic sandstone
      gneiss, biotite:
        title: Biotite gneiss
      gneiss, granodioritic:
        title: Granodioritic gneiss
      gneiss, hornblende:
        title: Hornblende gneiss
      metasiltstone: {}
      gneiss, migmatitic:
        title: Migmatitic gneiss
      gneiss, muscovite-biotite:
        title: Muscovite-biotite gneiss
      schist, graphitic:
        title: Graphitic schist
      slate, sulfidic:
        title: Sulfidic slate
      granitoid:
        description: a) In the IUGS classification, a preliminary term for (for field
          use) for a plutonic rock with Q (quartz) between 20 and 40 (%). b) A general
          term for all phaneritic igneous rocks (mineral crystals visible unaided
          and all about the same size) dominated by quartz and feldspars.
      bauxite:
        description: An off-white to dark red brown weathered detritus or rock composed
          of aluminum oxides (mainly gibbsite with some boehmite and diaspore), iron
          hydroxides, silica, silt, and especially clay minerals. Bauxite originates
          in tropical and subtropical environments as highly weathered residue from
          carbonate or silicate rocks and can occur in concretionary, earthy, pisolitic
          or oolitic forms. SW & GG
      limestone, coral:
        title: Coral limestone
        description: An informal term for massive limestone composed primarily of
          coral and coral fragments commonly associated with marine islands or coral
          reefs in tropical or subtropical waters. Compare - coral island. SW
      anhydrite, rock:
        title: Rock anhydrite
        description: A sedimentary rock (evaporite) composed chiefly of mineral anhydrite
          (anhydrous CaSO4); The rock is generally massive, cryptocrystalline, and
          may exhibit rhythmic sedimentation (rhymites). Compare - rock gypsum, rock
          halite. SW
      halite, rock:
        title: Rock halite
        description: A sedimentary rock (evaporite) composed primarily of halite (NaCl).
          SW
      limonite:
        description: "A general 'field' term for various brown to yellowish brown,\
          \ amorphous- to- cryptocrystalline hydrous ferric oxides that are an undetermined\
          \ mixture of goethite, hematite, and lepidocrocite formed by weathering\
          \ and iron oxidation from iron-bearing, rocks and minerals. SW & GG"
      novaculite:
        description: A dense, extremely finely grained, even-textured, siliceous,
          sedimentary rock similar to chert. It is hard, white to grayish-black in
          color, translucent on thin edges, has a dull to waxy luster, and displays
          smooth conchoidal fracture when broken. Novaculite principally occurs in
          the Marathon Uplift of Texas and Ouachita Mountains of Arkansas and Oklahoma
          where it forms erosion resistant ridges. Novaculite appears to form from
          chert recrystallization with microcrystalline quartz dominant over cryptocrystalline
          chalcedony. At the Ouachita Mountains type occurrence, novaculite formed
          by low- grade, thermal metamorphism of bedded chert. Novaculite is commercially
          quarried as a whetstone or oilstone. Compare - chert. GG & SW
      siltite:
        description: A compact, weakly metamorphosed rock formed by alteration of
          siltstone, mudstone, or silty shale. Siltite is more indurated than mudstone
          or shale and lacks either shale fissility or slate-like cleavage. Siltite
          differs from argillite in that silt-size grains (0.002 to 0.062 mm) rather
          than clay-size (<0.002 mm) dominate the matrix. Siltite differs from siltstone,
          mudstone, or shale in that it exhibits very low to low grade metamorphic
          or diagenetic layer silicate and feldspar alteration to sericite, chlorite,
          and albite (subgreenschist to greenschist metamorphic facies) (Maxwell,
          1973; Kidder, 1987).
      schist, biotite:
        title: Biotite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily biotite.
      schist, muscovite:
        title: Muscovite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily muscovite.
      schist, sericite:
        title: Sericite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily sericite. A fine-grained muscovite
      diatomite:
        description: A light-colored, soft, siliceous sedimentary rock consisting
          chiefly of opaline diatom frustules deposited in a lacustrine or marine
          environment. Diatomite has a number of uses owing to its high surface area,
          absorptive capacity, and relative chemical stability but the term is generally
          reserved for deposits of actual or potential commercial value.
      sandstone and claystone: {}
      limestone, sandstone, and mudstone: {}
      sandstone, noncalcareous:
        title: Noncalcareous sandstone
        status: obsolete
      conglomerate, noncalcareous:
        title: Noncalcareous conglomerate
        description: A coarse-grained, clastic sedimentary rock composed of rounded
          to subangular rock fragments larger than 2 mm, commonly with a matrix of
          sand and finer material; cements include silica, calcium carbonate, and
          iron oxides. The consolidated equivalent of gravel.
        status: obsolete
      ejecta-ash:
        description: 'Unconsolidated, pyroclastic material less than 2 mm in all dimensions.
          Commonly called "volcanic ash". Compare - block [volcanic], cinders, lapilli,
          tephra.'
        status: obsolete
      acidic-ash:
        status: obsolete
      basic-ash:
        status: obsolete
      basaltic-ash:
        status: obsolete
      andesitic-ash:
        status: obsolete
      cinders:
        description: Uncemented vitric, vesicular, pyroclastic material, more than
          2.0 mm in at least one dimension, with an apparent specific gravity (including
          vesicles) of more than 1.0 and less than 2.0. Compare - ash [volcanic],
          block [volcanic], lapilli, tephra. KST
        status: obsolete
      volcanic bombs:
        status: obsolete
      shale, noncalcareous:
        title: Noncalcareous shale
        status: obsolete
      igneous, coarse crystal:
        title: Coarse igneous crystal
        status: obsolete
      igneous, basic:
        title: Basic igneous rock
        status: obsolete
      igneous, intermediate:
        title: Intermediate igneous rock
        status: obsolete
      igneous, fine crystal:
        title: Fine igneous crystal
        status: obsolete
      igneous, acid:
        title: Acid igneous rock
        status: obsolete
      igneous, ultrabasic:
        title: Ultrabasic igneous rock
        status: obsolete
      gneiss-acidic:
        status: obsolete
      gneiss-basic:
        status: obsolete
      schist, acidic:
        title: Acidic schist
        status: obsolete
      schist, basic:
        title: Basic schist
        status: obsolete
      marl:
        description: An earthy, unconsolidated deposit consisting chiefly of calcium
          carbonate mixed with clay in approximately equal proportions (35 to 65 percent
          of each); formed primarily under freshwater lacustrine conditions, but varieties
          associated with more saline environments also occur.
        status: obsolete
      glauconite:
        status: obsolete
      siltstone, noncalcareous:
        title: Noncalcareous siltstone
        status: obsolete
      mixed:
        status: obsolete
      mixed-noncalcareous:
        status: obsolete
      mixed-calcareous:
        status: obsolete
      metamorphic, acidic:
        title: Acidic metamorphic rock
        status: obsolete
      schist and phyllite:
        status: obsolete
      metamorphic, basic:
        title: Basic metamorphic rock
        status: obsolete
    description: 'Component Parent Material Origin to convey the source from which
      a Parent Material is derived, predominantly Bedrock - Kind.) Reference: Field
      Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_pci_concentration_areas:
    name: NASIS_pci_concentration_areas
    title: Pci Concentration Areas
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=386
    permissible_values:
      '1':
        description: Livestock concentration areas cover >10% of the pasture; or all
          convey contaminated runoff directly into water channels.
      '2':
        description: Livestock concentration areas and trails cover 5-10% of the pasture;
          most close to water channels and drain into them unbuffered.
      '3':
        description: Isolated livestock concentration areas and trails cover <5% of
          the area; one colose to water channel and drains into it unbuffered.
      '4':
        description: Some livestock trails and one or two small concentration areas.
          Buffere areas between them and water channels.
      '5':
        description: No presence of livestock concentration areas or heavey use areas
          sited or treated to minimize contaminated runoff.
  NASIS_pci_desirable_plants:
    name: NASIS_pci_desirable_plants
    title: Pci Desirable Plants
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=387
    permissible_values:
      '1':
        description: Desirable species make up <20% of the stand. Annual weeds and/or
          woody species dominate.
      '2':
        description: Desirable species make up 20-40% of the stand. Mostly weedy annuals
          and/or woody species present and expanding. Shade is a factor.
      '3':
        description: Desirable species make up 40-60% of the stand. Undesirable broadleaf
          weeds and annual weedy grasses invading. Some woodies.
      '4':
        description: Desirable species make up 60-80% of the stand. Remainder mostly
          intermediates and a few undesirables present.
      '5':
        description: Desirable species exceed 80% of the stand. Scattered intermediates.
  NASIS_pci_ground_cover_residue:
    name: NASIS_pci_ground_cover_residue
    title: Pci Ground Cover Residue
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=388
    permissible_values:
      '1':
        description: No identifiable residue present on soil surface. Or, heavy thatch
          evident (> 1 inch thick).
      '2':
        description: 1-10% covered with dead leaves or stems. Or, thatch 0.5-1 inch
          thick.
      '3':
        description: 10-20% covered with dead residue. Or, slight thatch buildup but
          <0.5 inch thick.
      '4':
        description: 20-30% covered with dead residue. No thatch present.
      '5':
        description: 30-70% covered with dead residue, but no thatch buildup.
  NASIS_pci_gully_erosion:
    name: NASIS_pci_gully_erosion
    title: Pci Gully Erosion
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=389
    permissible_values:
      '1':
        description: Mass movement of soil, rock, plants, and other debris; occurrence
          of landslides, debris avalanches, slumps and earthflow, creep and debris
          torrents. Found in mountainous or very hilly terrain.
      '2':
        description: Gully(s) advancing upslope cutting long channel(s). Revegetation
          difficult without using constructed structures and livestock exclusion;
          continuous gully(s) with many finger- like extensions into the hillside.
      '3':
        description: Gully(s) present with scattered active erosion, vegetation missing
          at heavy use slopes and/or on bed below overfalls. New eroding channels
          present and new overfalls appearing along sides and bed of main channel.
      '4':
        description: Gully(s) present with scattered active erosion, vegetation missing
          at heavy use slopes and/or on bed below overfalls. New eroding channels
          present and new overfalls appearing along sides and bed of main channel.
      '5':
        description: No gullies present; natural drainageways are stable grassed channels.
          Spring or seep fed bare channels are small and stable, often covered with
          overhanging vegetation.
  NASIS_pci_legume_pct_class:
    name: NASIS_pci_legume_pct_class
    title: Pci Legume Pct Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=390
    permissible_values:
      '1':
        description: <10% by weight. Or, greater than 60% of bloating legumes.
      '2':
        description: 10-19% legumes. Or, losing grass, 40-60% spreading legumes.
      '3':
        description: 20-29% legumes.
      '4':
        description: 30-39% legumes.
      '5':
        description: 40-60% legumes. No grass loss; grass may be increasing.
  NASIS_pci_plant_cover:
    name: NASIS_pci_plant_cover
    title: Pci Plant Cover
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=391
    permissible_values:
      '1':
        description: Canopy <50%. Basal area <15%. Photosynthetic area very low. Very
          little plant cover to slow or stop runoff.
      '2':
        description: Canopy 50-75%. Basal area 15-25%. Photosynthetic area low. Vegetal
          retardance to runoff low.
      '3':
        description: Canopy 70-90%. Basal area 25-35%. Most forages grazed close,
          little leaf area to intercept sunlight. Moderate vegetal retardance.
      '4':
        description: Canopy 90-95%. Basal area 35-50%. Spot grazed low and high so
          some loss of photosynthetic potential. Vegetal retardance stil high.
      '5':
        description: Canopy 95-100%. Basal area >50%. Forages maintained in leafy
          condition for best photosynthetic activity. Very thick stand, slow or no
          runoff flows.
  NASIS_pci_plant_diversity:
    name: NASIS_pci_plant_diversity
    title: Pci Plant Diversity
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=392
    permissible_values:
      '1':
        description: One dominant (>75% of DM wt.) forage species. Or, over 5 forage
          species (all <20%) from one dominant functional group, not evenly grazed
          - poorly distributed.
      '2':
        description: Two to five forage species from one dominant functional group
          (>75% of DM wt.). At least one avoided by livestock permitting presence
          of mature seed stalks. Species in patches.
      '3':
        description: Three forage species (each =>20% of DM wt.) from one functional
          group. None avoided. Or, one forage species from each of two functional
          groups, both supply 25- 50% of DM weight.
      '4':
        description: Three or four forage species (each =>20% of DM wt.) with at least
          one being a legume. Well intermixed compatible growth habit, and comparable
          palatability.
      '5':
        description: Four or five forage species representing three functional groups
          (each =>20% of DM wt.) with at least one being a legume. Intermixed well,
          compatible growth habit, and comparable palatability.
  NASIS_pci_plant_vigor:
    name: NASIS_pci_plant_vigor
    title: Pci Plant Vigor
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=393
    permissible_values:
      '1':
        description: No recovery after grazing or pale yellow or brown, or permanent
          wilting, or plant loss due to insects or disease, exercise lot only. Or,
          lodged, dark green overly lush forage. Often avoided by grazers.
      '2':
        description: Recovery after grazing takes 2 or more weeks longer than normal,
          or yellowish-green leaves, or major insect or disease yield loss, or plants
          wilted most of day. Productivity very low.
      '3':
        description: Recovery after grazing takes 1 week longer than normal, or urine/dung
          patches dark green in contrast to rest of plants, or minor insect or disease
          loss, or mid-day plant wilting. Yields regularly below site potential.
      '4':
        description: Recovery after grazing takes 1 to 2 days longer than normal,
          or light green plants among greener urine and dung patches, or minor insect
          or disease damage. No plant wilting. Yields near site potential.
      '5':
        description: "Rapid recovery after grazing. Healthy green color. No signs\
          \ of insect or disease damage. No leaf wilting. Yields at site potential\
          \ for the species adapted to site's soil and climate."
  NASIS_pci_sheet_rill_erosion:
    name: NASIS_pci_sheet_rill_erosion
    title: Pci Sheet Rill Erosion
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=394
    permissible_values:
      '1':
        description: Sheet and rill erosion is active throughout the pasture; rills
          3-8 inches deep at close intervals and/or grazing terracettes are closely
          spaced with some slope slippage.
      '2':
        description: Most sheet and rill erosion confined to steepest terrain of unit;
          well defined rills 0.5-3 inches deep at close intervals and/or grazing terracetes
          present.
      '3':
        description: Most sheet and rill erosion confined to heavy use areas, especially
          in loafing areas and water sites; rills 0.5-3 inches deep. Debris fans at
          downslope edge.
      '4':
        description: No current formation of rills; some evidence of past till formation,
          but are grassed over. Scattered debis dams of litter present occasionally.
      '5':
        description: No evidence of current or past formation of sheet flow or rills.
  NASIS_pci_soil_compaction:
    name: NASIS_pci_soil_compaction
    title: Pci Soil Compaction
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=395
    permissible_values:
      '1':
        description: Infiltration capacity and surface runoff severely affected by
          heavy compaction. Excessive livestock traffic killing plants over wide areas.
          Very hard to push probe into soil without damaging the probe.
      '2':
        description: Infiltration capacity lowered and surface runoff increased due
          to large areas of bare ground and dense compaction layer at the surface.
          Livestock trails common throughout. Off-trail hoof prints common. Hard to
          push probe past compacted layer.
      '3':
        description: Infiltration capacity lowered and surface runoff increased due
          to plant cover loss and soil compaction by livestock hooves. Soil resistant
          to soil probe entry at one or more depths within plow depth.
      '4':
        description: Infiltration capacity lowered and surface runoff increased due
          to reduce vegetal cover/retardance. Probe enters soil easily except at rocks.
          Scattered signs of livestock trails and hoof prints, confined to lanes or
          small, wet areas.
      '5':
        description: Infiltration capacity and surface runoff are equal to that expected
          for an ungrazed meadow; not affected by livestock traffic.
  NASIS_pci_standing_dead_forage:
    name: NASIS_pci_standing_dead_forage
    title: Pci Standing Dead Forage
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=396
    permissible_values:
      '1':
        description: '>25% of air dry weight.'
      '2':
        description: 15-25% of air dry weight.
      '3':
        description: 5-15% of air dry weight.
      '4':
        description: Some present, but <5% of air dry weight.
      '5':
        description: None available to grazing animal.
  NASIS_pci_stream_shore_erosion:
    name: NASIS_pci_stream_shore_erosion
    title: Pci Stream Shore Erosion
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=397
    permissible_values:
      '1':
        description: Streambanks mostly bare and sloughing. No native streambank or
          shoreline vegetation remaining.
      '2':
        description: Streambanks are heavily grazed and trampled all over. Many are
          actively eroding laterally. Little native streambank or shoreline vegetation.
          Bank sloughing common.
      '3':
        description: Streambanks are closely grazed, but few are unstable. Some native
          streamband or shoreline vegetation remaining. Livestock enter only at specific
          points, but heavily used. Remote alternative wate site present.
      '4':
        description: "Streambanks are grazed but stable. Mix of pasture plants and\
          \ native water's edge species. Muddy livestock stream crossing(s) or pond\
          \ entrance(s) not used heavily. Alternative water sites present."
      '5':
        description: Streambanks ungrazed or grazed infrequently. Abundant streamband
          or shore loving vegetation. Gravelly or constructed stable livestock stream
          crossing(s) or watering ramp(s). Or, alternative water sources present and
          close-by.
  NASIS_pci_use_uniformity:
    name: NASIS_pci_use_uniformity
    title: Pci Use Uniformity
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=398
    permissible_values:
      '1':
        description: Little-grazed patches cover over 50% of the pasture. Mosaic pattern
          throughout or identifiable areas of pasture avoided.
      '2':
        description: Little-grazed patches cover 25-50% of the pasture either in a
          mosaic pattern or obvious portion is not frequented.
      '3':
        description: Little-grazed patches cover 10-25% of the pasture either in a
          mosaic pattern or obvious portion is not frequented.
      '4':
        description: Little-grazed patches minor spots where isolated forage species
          is rejected. Urine and dung patches avoided.
      '5':
        description: Rejected areas only at urine and dung patches. No forage species
          rejection.
  NASIS_pci_wind_erosion:
    name: NASIS_pci_wind_erosion
    title: Pci Wind Erosion
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=399
    permissible_values:
      '1':
        description: Blowouts or dunes forming or present.
      '2':
        description: Soil swept from the established pasture being rated causing plant
          death by burial or abrasion.
      '3':
        description: Soil swept from adjacent fields or pasture during seedbed preparation
          and seedling growth to pasture plant death by burial or abrasion.
      '4':
        description: Some vegetative debris windrowed. Some dust deposition from offsite
          source. Minor wind damage to foliage.
      '5':
        description: No visible signs of windblown soil or trash. No wind related
          leaf damage.
  NASIS_pedoderm_class:
    name: NASIS_pedoderm_class
    title: Pedoderm Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=400
    permissible_values:
      bare mineral soil:
        description: Pedoderm is characterized by bare mineral soil and no other class.
      soil aggregates:
        description: Well-formed or distinct structural aggregates at the soil surface
          and no other pedoderm class (well aggregated, but not platy, stable soils).
      rock mulch:
        description: Rock mulch with stable soil; surface soil material trapped and
          protected by closely spaced and partially embedded rock fragments (mostly
          cobbles and larger) or intermingled with bedrock.
      cemented pan:
        description: Cemented pan exposed at surface.
      salt crust:
        description: Salt crust of fine to extremely coarse evaporite crystals or
          visible whitening on the soil surface; may include biological components.
      erosion pavement:
        description: A lag of rock fragments remaining after erosion and removal of
          finer soil material, forming a dense uniform pavement; individual fragments
          may be displaced during runoff events.
      desert pavement:
        description: Desert pavement; a concentration of closely packed and varnished
          rock fragments at the soil surface, embedded in a vesicular crust.
      duff:
        description: Partially and fully decomposed plant and organic matter located
          above the A horizon (a patchy or continuous O horizon).
      biological crust:
        description: Crust is typically composed of one or more functional/structural
          biological groups (cyanobacteria, algae, moss, lichen).
      physical crust:
        description: Crust is usually platy or massive, with no substantial biological
          component.
      chemical crust:
        description: Fine to extremely coarse evaporite crystals or visible whitening
          on the soil surface; may include biological components.
      fire residue:
        description: Ash, glass, or char that remains after a burn.
    description: The type of crust existing at the soil/air or soil/water interface.
      A pedoderm may or may not exist at the pedon location. A soil crust may be exist
      on the site and should be recorded in the site observation table, if it exists.
  NASIS_pedon_cert_status:
    name: NASIS_pedon_cert_status
    title: Pedon Cert Status
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=401
    permissible_values:
      certified:
        description: The pedon has been reviewed and can be used for correlation and
          analysis.
      not certified:
        description: The pedon has been reviewed and it has been determined that the
          pedon should not be used for analysis or correlation decisions.
    description: Whether or not the pedon description is complete enough and represents
      the taxa associated with the named series and so can be used for official purposes.
  NASIS_pedon_purpose:
    name: NASIS_pedon_purpose
    title: Pedon Purpose
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=402
    permissible_values:
      crop yield data site:
        description: Documentation gathered to associate agronomic data collection
          on a particular soil.
      soil survey inventory:
        description: Documentation gathered for general purposes of supporting the
          soil survey inventory.
      research site:
        description: Site where research other than vegetation data is collected or
          repeated measurements are taken. Includes environmental monitoring site
          for precipitation, air/soil temperature or moisture, Snow Survey Snotel
          site.
      ecological site data:
        description: Documentation gathered to associate ecological data collection
          on a particular soil.
      laboratory sampling site:
        description: Location where soil samples and description taken to be analyzed
          by laboratory; should have laboratory analysis results associated with point
          now or in near future.
      technical soil services:
        description: Documentation gathered to provide onsite technical soil services
          to customer.
      wetland determination:
