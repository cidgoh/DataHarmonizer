  NASIS_von_post_humification_scale:
    name: NASIS_von_post_humification_scale
    title: Von Post Humification Scale
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=886
    permissible_values:
      h1:
        description: Completely undecomposed peat which, when squeezed, releases almost
          clear water. Plant remains easily identifiable. No amorphous material present.
      h2:
        description: Almost entirely undecomposed peat which, when squeezed, releases
          clear or yellowish water. Plant remains still easily identifiable. No amorphous
          material present.
      h3:
        description: Very slightly decomposed peat which, when squeezed, releases
          muddy brown water, but from which no peat passes between the fingers. Plant
          remains still identifiable, and no amorphous material present.
      h4:
        description: Slightly decomposed peat which, when squeezed, releases very
          muddy dark water. No peat is passed between the fingers but the plant remains
          are slightly pasty and have lost some of their identifiable features.
      h5:
        description: Moderately decomposed peat which, when squeezed, releases very
          muddy water with a very small amount of amorphous granular peat escaping
          between the fingers. The structure of the plant remains is quite indistinct
          although it is still possible to recognize certain features. The residue
          is very pasty.
      h6:
        description: Moderately highly decomposed peat with a very indistict plant
          structure. When squeezed, about one-third of the peat escapes between the
          fingers. The residue is very pasty but shows the plant structure more distinctly
          than before squeezing.
      h7:
        description: Highly decomposed peat. Contains a lot of amorphous material
          with very faintly recognizable plant structure. When squeezed, about one-half
          of the peat escapes between the fingers. The water, if any is released,
          is very dark and almost pasty.
      h8:
        description: Very highly decomposed peat with a large quantity of amorphous
          material and very indistinct plant structure. When squeezed, about two-thirds
          of the peat escapes between the fingers. A small quantity of pasty water
          may be released. The plant material remaining in the hand consists of residues
          such as roots and fibres that resist decomposition.
      h9:
        description: Practically fully decomposed peat in which there is hardly any
          recognizable plant structure. When squeezed it is a fairly uniform paste.
      h10:
        description: Completely decomposed peat with no discernible plant structure.
          When squeezed, all the wet peat escapes between the fingers.
    description: 'Reference: Ekono. 1981. Report on energy use of peat. Contribution
      to U.N. Conference on New and Renewable Sources of Energy, Nairobi'
  NASIS_vt_septic_system_class_2007:
    name: NASIS_vt_septic_system_class_2007
    title: Vt Septic System Class 2007
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=888
    permissible_values:
      Ia:
        description: This unit is well suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The rapid permeability in the substratum is a concern.
          Backfilling absorption trenches with at least one foot of finer textured
          material or other site modifications may be necessary to slow the percolation
          rate enough to allow for thorough filtering of effluent.
      Ib:
        description: This unit is well suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The rapid permeability in the substratum and slopes greater
          than 20 percent in some areas are concerns. Backfilling absorption trenches
          with at least one foot of finer textured material or other site modifications
          may be necessary to slow the percolation rate enough to allow for thorough
          filtering of effluent. There may be less-sloping areas within the unit that
          are suitable for siting a septic system, or, if feasible, cut and fill site
          modifications may produce an acceptable area within the unit. An erosion
          prevention and sediment control plan is required by the State for construction
          on sites over 20 percent slope.
      Ic:
        description: This unit is well suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. With moderate permeability and slopes less than 20 percent,
          there are few limitations.
      Id:
        description: This unit is well suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. Slopes greater than 20 percent in some areas are a concern.
          There may be less-sloping areas within the unit that are suitable for siting
          a septic system, or, if feasible, cut and fill site modifications may produce
          an acceptable area within the unit. An erosion prevention and sediment control
          plan is required by the State for construction on sites over 20 percent
          slope.
      IIa:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The slow permeability in the substratum is the primary
          concern. Mound system construction and other site modifications may be necessary.
      IIb:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The slow permeability in the substratum and slopes greater
          than 20 percent in some areas are the primary concerns. Mound system construction
          and other site modifications may be necessary. There may be less-sloping
          areas within the unit that are suitable for siting a septic system, or,
          if feasible, cut and fill site modifications may produce an acceptable area
          within the unit. An erosion prevention and sediment control plan is required
          by the State for construction on sites over 20 percent slope.
      IIc:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to bedrock in some areas is the primary concern.
          A significant percentage of this map unit has sufficient soil depth over
          bedrock to accept a range of designs. On-site investigations can help avoid
          areas with limited depth to bedrock. Additional fill material may be needed
          in some areas in order to meet the separation distance requirement between
          the bottom of the leachfield and bedrock.
      IId:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to bedrock and slopes greater than 20 percent
          in some areas are the primary concerns. A significant percentage of this
          map unit has sufficient soil depth over bedrock to accept a range of designs.
          On-site investigations can help avoid areas with limited depth to bedrock.
          Additional fill material may be needed in some areas in order to meet the
          separation distance requirement between the bottom of the leachfield and
          bedrock. There may be less-sloping areas within the unit that are suitable
          for siting a septic system, or, if feasible, cut and fill site modifications
          may produce an acceptable area within the unit. An erosion prevention and
          sediment control plan is required by the State for construction on sites
          over 20 percent slope.
      IIe:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The rapid permeability in the substratum and slopes greater
          than 20 percent are the primary concerns. Backfilling absorption trenches
          and beds with at least one foot of finer textured material, or other site
          modifications, may be necessary to slow the percolation rate enough to allow
          for thorough filtering of effluent. Cut and fill site modifications may
          produce an acceptable area within the unit. An erosion prevention and sediment
          control plan is required by the State for construction on sites over 20
          percent slope
      IIf:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. Slopes greater than 20 percent are the primary concern.
          Cut and fill site modifications may produce an acceptable area within the
          unit. An erosion prevention and sediment control plan is required by the
          State for construction on sites over 20 percent slope.
      IIh:
        description: This unit is moderately suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to the seasonal high water table is the primary
          concern. Mound system construction and other site modifications are often
          necessary. On sloping sites, curtain drains can help lower the water table
          to an acceptable level. In some cases, a detailed, site-specific analysis
          with groundwater level monitoring and determination of induced groundwater
          mounding may be required to establish the suitability of this unit.
      IIIa:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to bedrock is the major limitation. On-site
          investigations are needed to locate areas with sufficient soil depth. A
          significant percentage of the soils in this unit are less than 18 inches
          to bedrock and are not suitable as a site. However, there may be deeper
          areas that are suitable. Additional fill material may be needed in some
          areas in order to meet the separation distance requirement between the bottom
          of the leachfield and bedrock.
      IIIb:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The hazard of flooding and the depth to the seasonal high
          water table are the major limitations. This unit is on floodplains and typically
          includes land in the floodway and the special flood hazard area. Consult
          flood hazard maps prepared by the Federal Emergency Management Agency (FEMA)
          in local town offices for more information. Wastewater systems must be located,
          designed and constructed in a manner that avoids impairment to the system
          and contamination from the system due to flooding. A detailed, site-specific
          analysis with groundwater level monitoring and determination of induced
          groundwater mounding may be required to establish the suitability of this
          unit. Mound system construction and other site modifications are often necessary.
      IIIc:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to the seasonal high water table in association
          with the minimal slope is the major limitation. A detailed, site-specific
          analysis is generally required. On-site groundwater level monitoring and
          determination of induced groundwater mounding is often necessary to establish
          the suitability of this unit. Curtain drains may help lower the water table
          to an acceptable level, however, the minimal slope may prevent their use
          in many areas.
      IIId:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to the seasonal high water table is the major
          limitation. A detailed, site-specific analysis is generally required. On-site
          groundwater level monitoring and determination of induced groundwater mounding
          is often necessary to establish the suitability of this unit. Curtain drains
          may help lower the water table to an acceptable level.
      IIIe:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to the seasonal high water table and slopes
          greater than 20 percent in some areas are the major limitations. A detailed,
          site-specific analysis is generally required. On-site groundwater level
          monitoring and determination of induced groundwater mounding is often necessary
          to establish the suitability of this unit. Curtain drains may help lower
          the water table to an acceptable level. There may be less-sloping areas
          within the unit that are suitable for siting a septic system, or, if feasible,
          cut and fill site modifications may produce an acceptable area within the
          unit. An erosion prevention and sediment control plan is required by the
          State for construction on sites over 20 percent slope.
      IIIf:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The depth to the seasonal high water table and the restricted
          depth to bedrock in some areas are the major limitations. On-site investigations
          can help avoid areas with limited depth to bedrock. Additional fill material
          may be needed in some areas in order to meet the separation distance requirement
          between the bottom of the leachfield and bedrock. A detailed, site-specific
          analysis with groundwater level monitoring and determination of induced
          groundwater mounding may be required to establish the suitability of this
          unit. Mound system construction and other site modifications are often necessary.
          On sloping sites, curtain drains can help lower the water table to an acceptable
          level.
      IVa:
        description: This unit is generally not suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. Excessive soil wetness in association with the minimal
          slope is the limiting condition. Prolonged periods of saturation at or near
          the soil surface do not allow for the proper functioning of septic systems.
      IVb:
        description: This unit is generally not suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. Steep slopes in association with the depth to bedrock
          is the limiting condition. Cut and fill site modifications that reduce the
          slope gradient are difficult to achieve due to the depth to bedrock.
      IVc:
        description: This unit is generally not suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The very shallow to shallow depth to bedrock is the limiting
          condition.
      IVd:
        description: This unit is generally not suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. Steep slopes in association with the slowly permeable
          substratum is the limiting condition. Cut and fill site modifications that
          reduce the slope gradient are not generally effective due to the slowly
          permeable substratum.
      V:
        description: This unit is not rated as a site for soil-based residential wastewater
          disposal systems. Due to the variable nature of the soils, on-site investigations
          are needed to determine their suitability.
      IIIg:
        description: This unit is marginally suited as a site for soil-based residential
          wastewater disposal systems, based on a review by the Natural Resources
          Conservation Service of criteria set forth in the Vermont 2007 Environmental
          Protection Rules. The hazard of flooding is the major limitation. This unit
          is on floodplains and typically includes land in the floodway and the special
          flood hazard area. Consult flood hazard maps prepared by the Federal Emergency
          Management Agency (FEMA) in local town offices for more information. Wastewater
          systems must be located, designed and constructed in a manner that avoids
          impairment to the system and contamination from the system due to flooding.
      IIg:
        description: This unit is moderately suited as a site for on-site waste disposal,
          based on a review by the Natural Resources Conservation Service of criteria
          set forth in the Vermont 2002 Environmental Protection Rules. Flooding from
          surface waters is the primary concern. Locating the septic system on the
          highest part of the floodplain and with the maximum setback from surface
          waters is recommended.
        status: obsolete
    description: 'Redefined classes of allowed septic systems as directed by VT law.
      Reference: Wastewater system and Potable Water Supply Rule - Effective September
      25, 2007.'
