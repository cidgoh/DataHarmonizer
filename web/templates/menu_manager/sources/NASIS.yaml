    description: 'The farmland classification designates map units as prime farmland,
      farmland of statewide importance, farmland of local importance, or farmland
      of unique importance. Soil map units with components of prime farmland are classified
      as: prime where 50 percent or more of the components in the map unit composition
      are prime; of statewide importance where less than 50 percent of the components
      in the map unit are prime but a combination of lands of prime or statewide importance
      is 50 percent or more of the map unit composition; of local importance where
      less than 50 percent of the components in the map unit are of prime or statewide
      importance but the total of land of prime, statewide, and/or local importance
      is 50 percent or more of the map unit composition. All other soil map units
      are shown as not farmland unless they are designated as unique. Reference: Part
      622 National Soil Survey Handbook.'
