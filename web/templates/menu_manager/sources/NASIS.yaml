      limestone and shale: {}
      limestone and siltstone: {}
      sandstone and shale: {}
      sandstone and siltstone: {}
      shale and siltstone: {}
      conglomerate, unspecified:
        title: Conglomerate
      conglomerate, calcareous:
        title: Calcareous conglomerate
        description: A coarse-grained, clastic sedimentary rock composed of rounded
          to subangular rock fragments larger than 2 mm, commonly with a matrix of
          sand and finer material; cements include silica, calcium carbonate, and
          iron oxides. The consolidated equivalent of gravel.
      pumice:
        description: A light-colored, vesicular, glassy rock commonly having the composition
          of rhyolite. It commonly has a specific gravity of < 1.0 and is thereby
          sufficiently buoyant to float on water. Compare - scoria, tephra.
      scoria:
        description: Vesicular, cindery crust or bomb-sized fragments of such material
          on the surface of andesitic or basaltic lava, the vesicular nature of which
          is due to the escape of volcanic gases before solidification; it is usually
          heavier, darker, and more crystalline than pumice. Synonym - cinder. Compare
          - pumice, tephra.
      shale, unspecified:
        title: Shale
        description: Sedimentary rock formed by induration of a clay, silty clay,
          or silty clay loam deposit and having the tendency to split into thin layers,
          i.e., fissility.
      shale, calcareous:
        title: Calcareous shale
      shale, clayey:
        title: Clayey shale
      igneous, unspecified:
        title: Igneous
        description: 'rock Rock formed by cooling and solidification from magma, and
          that has not been changed appreciably by weathering since its formation;
          major varieties include plutonic and volcanic rocks. Examples: andesite,
          basalt, granite. Compare - intrusive, extrusive, metamorphic rock, sedimentary.'
      granite: {}
      basalt: {}
      andesite: {}
      limestone, unspecified:
        title: Limestone
        description: A sedimentary rock consisting chiefly (more than 50 percent)
          of calcium carbonate, primarily in the form of calcite. Limestones are usually
          formed by a combination of organic and inorganic processes and include chemical
          and clastic (soluble and insoluble) constituents; many contain fossils.
      chalk: {}
      marble: {}
      dolomite (dolostone):
        title: Dolomite
        description: A carbonate sedimentary rock consisting chiefly (more than 50
          percent by weight or by areal percentages under the microscope) of the mineral
          dolomite.
      limestone, phosphatic:
        title: Phosphatic limestone
      limestone, arenaceous:
        title: Arenaceous limestone
      limestone, argillaceous:
        title: Argillaceous limestone
      limestone, cherty:
        title: Cherty limestone
      gneiss: {}
      serpentinite: {}
      schist, unspecified:
        title: Schist
      slate: {}
      quartzite: {}
      pyroclastic (consolidated):
        title: Pyroclastic rock
      tuff, unspecified:
        title: Tuff
        description: A compacted deposit that is 50 percent or more volcanic ash and
          dust.
      tuff, acidic:
        title: Acidic tuff
      tuff, basic:
        title: Basic tuff
      volcanic breccia, unspecified:
        title: Volcanic breccia
      volcanic breccia, acidic:
        title: Acidic volcanic breccia
      volcanic breccia, basic:
        title: Basic volcanic breccia
      tuff breccia: {}
      aa lava:
        description: A type of basaltic lava (material) having a rough, jagged, clinkery
          surface and a vesicular interior. Compare - block lava, pahoehoe lava, pillow
          lava.
      pahoehoe lava:
        description: A type of basaltic lava (material) with a characteristically
          smooth, billowy or rope-like surface and vesicular interior. Compare - `a`a
          lava, block lava, pillow lava.
      siltstone, unspecified:
        title: Siltstone
        description: Sedimentary rock containing dominantly silt-size clastic particles.
      siltstone, calcareous:
        title: Calcareous siltstone
      diorite: {}
      gabbro: {}
      obsidian: {}
      rhyolite: {}
      hornfels: {}
      metaconglomerate: {}
      phyllite: {}
      coal: {}
      graywacke: {}
      gypsum, rock:
        title: Rock gypsum
        description: A sedimentary rock (evaporite) composed primarily of mineral
          gypsum (CaSO4.2H2O). The rock is generally massive, ranges from coarse crystalline
          to fine granular, may show disturbed bedding due to hydration expansion
          of parent anhydrite (anhydrous CaSO4), and may exhibit rhythmic sedimentation
          (rhymites). Compare - gypsite. GG
      shale, acid:
        title: Acid shale
      porcellanite:
        description: An indurated or baked clay or shale with a dull, light-colored,
          cherty appearance, often found in the roof or floor of a burned-out coal
          seam.
      dacite: {}
      latite: {}
      trachyte: {}
      diabase: {}
      granodiorite: {}
      monzonite: {}
      peridotite: {}
      pyroxenite: {}
      syenite: {}
      syenodiorite: {}
      amphibolite: {}
      granofels: {}
      greenstone: {}
      metaquartzite: {}
      metavolcanics: {}
      mylonite: {}
      arenite: {}
      claystone: {}
      mudstone:
        description: a) a blocky or massive, fine-grained sedimentary rock in which
          the proportions of clay and silt are approximately equal b) A general term
          that includes clay, silt, claystone, siltstone, shale, and argillite, and
          that should be used only when the amounts of clay and silt are not known
          or cannot be precisely identified.
      chert:
        description: A hard, extremely dense or compact, dull to semivitreous, cryptocrystalline
          sedimentary rock, consisting dominantly of interlocking crystals of quartz
          less than about 30 mm in diameter; it may contain amorphous silica (opal).
          It sometimes contains impurities such as calcite, iron oxide, or the remains
          of silicious and other organisms. It has a tough, splintery to conchoidal
          fracture and may be white or variously colored gray, green, blue, pink,
          red, yellow, brown, and black. Chet occurs principally as nodular or concretionary
          segregations in limestones and dolomites.
      travertine: {}
      tufa: {}
      ignimbrite: {}
      breccia, non-volcanic:
        title: Non-volcanic breccia
      granulite: {}
      migmatite: {}
      soapstone: {}
      argillite: {}
      orthoquartzite: {}
      anorthosite: {}
      breccia, non-volcanic, acidic:
        title: Acidic Non-volcanic breccia
      breccia, non-volcanic, basic:
        title: Basic Non-volcanic breccia
      fanglomerate: {}
      metasedimentary rock, unspecified:
        title: Metasedimentary rock
      schist, mica:
        title: Mica schist
      quartz-diorite: {}
      quartz-monzonite: {}
      tachylite: {}
      tonalite: {}
      ultramafic, unspecified:
        title: Ultramafic rock
      tuff, welded:
        title: Welded tuff
      sandstone, volcanic:
        title: Volcanic sandstone
      block lava:
        description: "Lava having a surface of angular blocks; it is similar to a'a\
          \ lava but the fragments are larger and more regular in shape, somewhat\
          \ smoother, and less vesicular. Compare - `a`a lava, pahoehoe lava, pillow\
          \ lava."
      pillow lava:
        description: A general term for lava displaying pillow structure (discontinuous,
          close-fitting, bun- shaped or ellipsoidal masses, generally < 1 m in diameter);
          considered to have formed in a subaqueous environment; such lava is usually
          basaltic or andesitic. Compare - `a`a lava, block lava, pahoehoe lava.
      sandstone, glauconitic:
        title: Glauconitic sandstone
      tripoli:
        description: A light-colored, porous, friable, siliceous (largely chalcedonic)
          sedimentary rock, which occurs in powdery or earthy masses that result from
          the weathering of siliceous limestone. It has a harsh, rough feel and is
          used to polish metals and stones.
      gneiss, biotite:
        title: Biotite gneiss
      gneiss, granodioritic:
        title: Granodioritic gneiss
      gneiss, hornblende:
        title: Hornblende gneiss
      metasiltstone: {}
      gneiss, migmatitic:
        title: Migmatitic gneiss
      gneiss, muscovite-biotite:
        title: Muscovite-biotite gneiss
      schist, graphitic:
        title: Graphitic schist
      slate, sulfidic:
        title: Sulfidic slate
      granitoid:
        description: a) In the IUGS classification, a preliminary term for (for field
          use) for a plutonic rock with Q (quartz) between 20 and 40 (%). b) A general
          term for all phaneritic igneous rocks (mineral crystals visible unaided
          and all about the same size) dominated by quartz and feldspars.
      bauxite:
        description: An off-white to dark red brown weathered detritus or rock composed
          of aluminum oxides (mainly gibbsite with some boehmite and diaspore), iron
          hydroxides, silica, silt, and especially clay minerals. Bauxite originates
          in tropical and subtropical environments as highly weathered residue from
          carbonate or silicate rocks and can occur in concretionary, earthy, pisolitic
          or oolitic forms. SW & GG
      limestone, coral:
        title: Coral limestone
        description: An informal term for massive limestone composed primarily of
          coral and coral fragments commonly associated with marine islands or coral
          reefs in tropical or subtropical waters. Compare - coral island. SW
      anhydrite, rock:
        title: Rock anhydrite
        description: A sedimentary rock (evaporite) composed chiefly of mineral anhydrite
          (anhydrous CaSO4); The rock is generally massive, cryptocrystalline, and
          may exhibit rhythmic sedimentation (rhymites). Compare - rock gypsum, rock
          halite. SW
      halite, rock:
        title: Rock halite
        description: A sedimentary rock (evaporite) composed primarily of halite (NaCl).
          SW
      novaculite:
        description: A dense, extremely finely grained, even-textured, siliceous,
          sedimentary rock similar to chert. It is hard, white to grayish-black in
          color, translucent on thin edges, has a dull to waxy luster, and displays
          smooth conchoidal fracture when broken. Novaculite principally occurs in
          the Marathon Uplift of Texas and Ouachita Mountains of Arkansas and Oklahoma
          where it forms erosion resistant ridges. Novaculite appears to form from
          chert recrystallization with microcrystalline quartz dominant over cryptocrystalline
          chalcedony. At the Ouachita Mountains type occurrence, novaculite formed
          by low- grade, thermal metamorphism of bedded chert. Novaculite is commercially
          quarried as a whetstone or oilstone. Compare - chert. GG & SW
      siltite:
        description: A compact, weakly metamorphosed rock formed by alteration of
          siltstone, mudstone, or silty shale. Siltite is more indurated than mudstone
          or shale and lacks either shale fissility or slate-like cleavage. Siltite
          differs from argillite in that silt-size grains (0.002 to 0.062 mm) rather
          than clay-size (<0.002 mm) dominate the matrix. Siltite differs from siltstone,
          mudstone, or shale in that it exhibits very low to low grade metamorphic
          or diagenetic layer silicate and feldspar alteration to sericite, chlorite,
          and albite (subgreenschist to greenschist metamorphic facies) (Maxwell,
          1973; Kidder, 1987).
      schist, biotite:
        title: Biotite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily biotite.
      schist, muscovite:
        title: Muscovite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily muscovite.
      limonite:
        description: "A general 'field' term for various brown to yellowish brown,\
          \ amorphous- to- cryptocrystalline hydrous ferric oxides that are an undetermined\
          \ mixture of goethite, hematite, and lepidocrocite formed by weathering\
          \ and iron oxidation from iron-bearing, rocks and minerals. SW & GG"
      schist, sericite:
        title: Sericite schist
        description: A strongly foliated crystalline rock formed by dynamic metamorphism
          that has well- developed parallelism of more than 50 percent of the minerals
          present, primarily sericite. A fine-grained muscovite
      diatomite:
        description: A light-colored, soft, siliceous sedimentary rock consisting
          chiefly of opaline diatom frustules deposited in a lacustrine or marine
          environment. Diatomite has a number of uses owing to its high surface area,
          absorptive capacity, and relative chemical stability but the term is generally
          reserved for deposits of actual or potential commercial value.
      sandstone, noncalcareous:
        title: Noncalcareous sandstone
        status: obsolete
      interbedded sedimentary:
        description: rock
        status: obsolete
      conglomerate, noncalcareous:
        title: Noncalcareous conglomerate
        description: A coarse-grained, clastic sedimentary rock composed of rounded
          to subangular rock fragments larger than 2 mm, commonly with a matrix of
          sand and finer material; cements include silica, calcium carbonate, and
          iron oxides. The consolidated equivalent of gravel.
        status: obsolete
      ejecta-ash:
        description: 'Unconsolidated, pyroclastic material less than 2 mm in all dimensions.
          Commonly called "volcanic ash". Compare - block [volcanic], cinders, lapilli,
          tephra.'
        status: obsolete
      acidic-ash:
        status: obsolete
      basic-ash:
        status: obsolete
      basaltic-ash:
        status: obsolete
      andesitic-ash:
        status: obsolete
      cinders:
        description: Uncemented vitric, vesicular, pyroclastic material, more than
          2.0 mm in at least one dimension, with an apparent specific gravity (including
          vesicles) of more than 1.0 and less than 2.0. Compare - ash [volcanic],
          block [volcanic], lapilli, tephra. KST
        status: obsolete
      volcanic bombs:
        status: obsolete
      shale, noncalcareous:
        title: Noncalcareous shale
        status: obsolete
      igneous, coarse crystal:
        title: Coarse igneous crystal
        status: obsolete
      igneous, basic:
        title: Basic igneous rock
        status: obsolete
      igneous, intermediate:
        title: Intermediate igneous rock
        status: obsolete
      igneous, fine crystal:
        title: Fine igneous crystal
        status: obsolete
      igneous, acid:
        title: Acid igneous rock
        status: obsolete
      igneous, ultrabasic:
        title: Ultrabasic igneous rock
        status: obsolete
      metamorphic, unspecified:
        title: Metamorphic
        description: "rock - Rock of any origin altered in mineralogical composition,\
          \ chemical composition, or structure by heat, pressure, and movement at\
          \ depth in the earth's crust. Nearly all such rocks are crystalline. Examples:\
          \ schist, gneiss, quartzite, slate, marble."
        status: obsolete
      gneiss-acidic:
        status: obsolete
      gneiss-basic:
        status: obsolete
      schist, acidic:
        title: Acidic schist
        status: obsolete
      schist, basic:
        title: Basic schist
        status: obsolete
      sedimentary, unspecified:
        title: Sedimentary
        description: 'rock A consolidated deposit of clastic particles, chemical precipitates,
          and organic remains accumulated at or near the surface of the earth under
          "normal" low temperature and pressure conditions. Sedimentary rocks include
          consolidated equivalents of alluvium, colluvium, drift, and eolian, lacustrine,
          marine deposits; e.g., sandstone, siltstone, mudstone, clay-stone, shale,
          conglomerate, limestone, dolomite, coal, etc. Compare - sediment.'
        status: obsolete
      marl:
        description: An earthy, unconsolidated deposit consisting chiefly of calcium
          carbonate mixed with clay in approximately equal proportions (35 to 65 percent
          of each); formed primarily under freshwater lacustrine conditions, but varieties
          associated with more saline environments also occur.
        status: obsolete
      glauconite:
        status: obsolete
      siltstone, noncalcareous:
        title: Noncalcareous siltstone
        status: obsolete
      mixed:
        status: obsolete
      mixed-noncalcareous:
        title: Mixed noncalcareous
        status: obsolete
      mixed-calcareous:
        title: Mixed calcareous
        status: obsolete
      mixed-igneous- metamorphic and sedimentary:
        title: Mixed igneous, metamorphic and sedimentary
        status: obsolete
      mixed-igneous and metamorphic:
        title: Mixed igneous and metamorphic
        status: obsolete
      mixed-igneous and sedimentary:
        title: Mixed igneous and sedimentary
        status: obsolete
      mixed-metamorphic and sedimentary:
        title: Mixed metamorphic and sedimentary
        status: obsolete
    description: 'The nature of the continuous hard rock underlying the soil. Reference:
      Field Book for Describing and Sampling Soils v 3.0, Sep 2012.'
  NASIS_biological_crust_type:
    name: NASIS_biological_crust_type
    title: Biological Crust Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=43
    permissible_values:
      algae: {}
      cyanobacteria: {}
      lichen: {}
      liverworts: {}
      moss: {}
      none evident: {}
    description: 'Biological crust types are described, generally, as surface crusts
      with one or more different living biological components. The Field Guide to
      Classify Biological Soil Crusts for Ecological Site Evaluation. N. Pietrasiak,
      PhD. Provides a dichotomous key to different crust types, including biological
      crust types. The biological crust types, as described in the reference, vary
      widely in composition and the effects they have on the ecology of the site.
      Our main interest in differentiating biological crust types is the determination
      of the biological component. i.e. algae, lichen, fungi, bryophytes, etc. Reference:
      Field Guide to Classify Biological Soil Crusts for Ecological Site Evaluation.
      N. Pietrasiak, PhD.'
  NASIS_bottom_type:
    name: NASIS_bottom_type
    title: Bottom Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=44
    permissible_values:
      very stony/bouldery:
        description: 3 to <15 % cover with fragments > 250 mm in size
      stony/bouldery:
        description: 0.1 to <0.1 % of surface cover with fragments > 250 mm in size
      rubbly:
        description: A bottom substantially covered (15 to <50% surface cover) by
          large coarse fragments of various sizes.
      very rubbly:
        description: '>= 50 cover with fragments >250 mm in size.'
      very gravelly/cobbly:
        description: A bottom partially covered by gravel or cobbles (0.1 to <3% surface
          cover).
      fine unconsolidated mineral substrate - fine:
        description: 'Soil surface layer with textures of coarse sandy loam or finer.
          These areas are very fluid muds and / or thin oxidized surface muds. Less
          than 5% cover of rock fragments. Ref: Definitions modified from CMECS Substrate
          Classification (FGDC, 2012).'
      fine unconsolidated mineral substrate - sand:
        description: 'Soil surface layer with textures of loamy very fine sand and
          coarser. These areas are bare sands, thin oxidized surfaces of sands, and
          / or ripple sand bedforms. Less than 5% cover of rock fragments. Ref: Definitions
          modified from CMECS Substrate Classification (FGDC, 2012)'
      coarse unconsolidated mineral substrate - gravel/cobble:
        description: '>= 5% surface cover with fragments 2 to 250 mm in size. Ref:
          Definitions modified from CMECS Substrate Classification (FGDC, 2012)'
      coarse unconsolidated mineral substrate - very gravelly/cobbly:
        description: '5 to 50% surface cover with fragments 2 to 250 mm in size. Ref:
          Definitions modified from CMECS Substrate Classification (FGDC, 2012)'
      coarse unconsolidated mineral substrate - extremely gravelly or cobbly:
        description: '>=50 surface cover with fragments 2 to 250 mm in size. Ref:
          Definitions modified from CMECS Substrate Classification (FGDC, 2012)'
      bedrock:
        description: 'substrate with mostly continuous formations of bedrock that
          cover 50% or more of the substrate surface. Ref: Definitions modified from
          CMECS Substrate Classification (FGDC, 2012)'
      shell substrate:
        description: 'A biogenic substrate that is primarily composed of shells or
          shell particles (clams, mussels, oysters, and or scallops). The shells could
          also consist of non-living mollusks. This substrate could consist of attached
          oysters, mussels, clam beds or scallop beds. Ref: Definitions modified from
          CMECS Substrate Classification (FGDC, 2012)'
      algal substrate:
        description: 'Substrate composed of algae in various states of decomposition
          or growth. Examples include macroalgae and attached sponges. Ref: Definitions
          modified from CMECS Substrate Classification (FGDC, 2012)'
      coral substrate:
        description: 'Non-living coral reefs (or coral particles) constitute this
          benthic substrate; the substrate may or may not be inhabited by live corals.
          Ref: Definitions modified from CMECS Substrate Classification (FGDC, 2012)'
      organic substrate:
        description: 'Substrate is primarily composed of non-living organic material,
          likely a former tidal marsh platform. Ref: Definitions modified from CMECS
          Substrate Classification (FGDC, 2012)'
      sub-aquatic vegetated substrate:
        description: 'A vegetated substrate composed of sub-aquatic species. The vegetated
          coverage should be estimated and the species identified (Zostera, Ruppia,
          Halodule, Halophila, Thalassia, etc.). Ref: Definitions modified from CMECS
          Substrate Classification (FGDC, 2012)'
      worm substrate:
        description: 'A biogenic substrate that is primarily composed of the cemented
          or conglomerated (fine or sandy) tubes of polychaetes or other worm-like
          fauna. Ref: Definitions modified from CMECS Substrate Classification (FGDC,
          2012)'
      anthropogenic substrate:
        description: 'A substrate primarily composed of mineral or manufactured materials
          that were purposefully or accidentally deposited by humans. Examples include
          artificial reefs, dredge deposits, stone or breakwater materials, etc.).
          Ref: Definitions modified from CMECS Substrate Classification (FGDC, 2012)'
      bare mud:
        description: A silty, clayey or organic bottom matrix, with little or no aquatic
          vegetation or algae.
        status: obsolete
      bare sand:
        description: A sandy bottom matrix, with little or no aquatic vegetation or
          algae.
        status: obsolete
      extremely stony/bouldery:
        title: Extreme stony/bouldery A bottom dominated (3 to <15% surface cover)
          by boulders (or stones).
        status: obsolete
      shelly:
        description: A bottom dominated by aquatic shells or shell fragments.
        status: obsolete
      extremely gravelly or cobbly:
        title: Extremely
        description: gravelly/cobbly a bottom dominated (3 to <15% surface cover)
          by gravel or cobbles.
        status: obsolete
      gravelly/cobbly:
        description: A bottom partially covered by gravel or cobbles(0.01 to <0.1%
          surface cover).
        status: obsolete
    description: Describes the general fine earth fraction of the bottom and the amount
      and kind of fragments found on the bottom of lakes, rivers, ponds, tidal zones,
      etc. in conjunction with any subaqueous vegetation present. The bottom types
      in NASIS have been used in coastal SAS mapping. Other types exist and should
      be added as necessary. A formal ecologically based substrate array is found
      in the Coastal and Marine Ecological Classification Standard (Federal Geographic
      Data Committee, 2012).
  NASIS_boundary_distinctness:
    name: NASIS_boundary_distinctness
    title: Boundary Distinctness
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=46
    permissible_values:
      abrupt:
        description: Transitional zone is 0.5 to <2 cm thick.
      clear:
        description: Transitional zone is 2 to <5 cm thick.
      diffuse:
        description: Transitional zone is =>15 cm thick.
      gradual:
        description: Transitional zone is 5 to <15 cm thick.
      very abrupt:
        description: Transitional zone is less than 0.5 cm thick.
    description: 'Distinctness refers to the thickness of the zone within which the
      boundary can be located. The distinctness of a boundary depends partly on the
      degree of contrast between the adjacent layers and partly on the thickness of
      the transitional zone between them. Distinctness is defined in terms of thickness
      of the transitional zone. Reference: Soil Survey Manual'
  NASIS_boundary_topography:
    name: NASIS_boundary_topography
    title: Boundary Topography
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=47
    permissible_values:
      broken:
        description: One or both of the horizons or layers separated by the boundary
          are discontinuous and the boundary is interupted.
      irregular:
        description: The boundary has pockets that are deeper than they are wide.
          (SSM)
      smooth:
        description: The boundary is planar with few or no irregularities. (SSM)
      wavy:
        description: The boundary has undulations in which depressions are wider than
          they are deep. (SSM)
    description: 'Topography refers to the irregularities of the surface that divides
      the horizons. Even though soil layers are commonly seen in vertical section,
      they are three-dimensional. Reference: Soil Survey Manual'
  NASIS_bulk_density_method:
    name: NASIS_bulk_density_method
    title: Bulk Density Method
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=48
    permissible_values:
      compliant cavity:
        description: Sample is collected by excavating a hole or cavity in the layer
          sampled, volume is determined by measuring volume of water needed to fill
          the cavity.
      core, constant volume:
        title: Constant volume core
        description: Sample is collected by pressing a cylinder of known volume into
          the soil until it is full.
      core, variable volume:
        title: Variable volume core
        description: Sample is collected by pressing a cylinder of known dimensions
          into the soil, the space filled by the soil is measured and the volume of
          the sample calculated.
      hydraulic probe:
        description: Sample is collected with a cylinder of known radius by hydraulic
          (machine powered) probed. Depth segments of interest are cut by knife giving
          a known volume of soil sampled.
      ring excavation:
        description: Sample is collected by excavating a hole or cavity within a ring,
          volume is determined by measuring the distance from the top of the ring
          before and after sampling.
      not applicable:
        description: To be used when no bulk density sample is taken, therefore volume
          of the sample cannot be determined.
      macaulay:
        description: A Macaulay peat sampler is pressed into the soil to obtain a
          sample in the form of a half-cylinder core.
      syringe:
        description: The body of a standard syringe is pressed into the soil to obtain
          a mini-core.
      block:
        description: A very sharp knife or other cutting tool is used to take a three-dimensional
          sample (a block or cube) of soil.
      hole saw:
        description: A hole saw tool is used vertically or horizontally to remove
          a core of defined volume from soils with high amounts of roots and fibers.
      vibracore:
        description: A metal vibracore tube (typically aluminum irrigation pipe) is
          vibrated rapidly with a gas or electric vibrating machine, enabling it to
          penetrate saturated soils and extract a core.
      frame excavation:
        description: Sample is collected by excavating a hole or cavity within a square
          frame, volume is determined by measuring the distance from the top of the
          ring before and after sampling.
      can:
        description: Samples are collected using a can or container of known volume
          that is pushed or driven into the soil.
      proximal sensing:
        description: Proximal sensing methods use lidar to measure the volume of a
          soil clod.
      scoop:
        description: Sample is collected by pressing a rectangular scoop with one
          missing side sideways into a profile face. Any space at the top of the sample
          is measured and the volume is calculated.
        status: obsolete
      3D scanner:
        description: "The sample clod's volume is determined by using an optical scanner."
        status: obsolete
      ring(millet):
        description: Sample is collected by excavating a hole or cavity within a ring,
          volume is estimated using millet instead of water.
        status: obsolete
    description: The choices for this domain are methods of obtaining a known volume
      of soil sample for analysis by the lab.
  NASIS_burn_intensity:
    name: NASIS_burn_intensity
