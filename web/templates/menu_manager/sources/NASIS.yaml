  NASIS_fragment_roundness:
    name: NASIS_fragment_roundness
    title: Fragment Roundness
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=243
    permissible_values:
      angular:
        description: Strongly developed faces with sharp edges (SSM).
      subangular:
        description: Detectable flat faces with slightly-rounded corners.
      subrounded:
        description: Detectable flat faces with well-rounded corners (SSM).
      rounded:
        description: Flat faces absent or nearly absent with all corners rounded (SSM).
      well rounded:
        description: Flat faces absent with all corners rounded.
      very angular:
        description: Strongly developed faces with very sharp, broken edges.
    description: 'The relative roundness of coarse fragments present. Reference: Field
      Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_fragment_shape:
    name: NASIS_fragment_shape
    title: Fragment Shape
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=244
    permissible_values:
      flat: {}
      nonflat: {}
    description: 'The relative shape of coarse fragments present. Reference: Field
      Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_gap_kind:
    name: NASIS_gap_kind
    title: Gap Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=245
    permissible_values:
      basal:
        description: The gap observed is the space between the base or stem of two
          live or dead plants, based on the points where the plants emerge from the
          soil surface.
      canopy:
        description: The gap observed is the space between the canopy of two live
          or dead plants, based on a vertical projection from canopy to ground.
  NASIS_geographic_coord_source:
    name: NASIS_geographic_coord_source
    title: Geographic Coord Source
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=246
    permissible_values:
      auto-populated from gps:
        description: Values are auto-populated to the point database via a connection
          to the GPS unit. No manually data entry is involved.
      auto-populated from survey grade gps:
        description: Values are auto-populated to the point database via a connection
          to a survey grade GPS unit. No manually data entry is involved.
      manually entered from gps:
        description: Coordinates were transcribed from those displayed on the GPS
          screen and manually entered into the database. Values may have been written
          on hardcopy forms prior to entering into the database.
      manually entered from post-validation:
        description: Coordinates were transcribed from those displayed on the GPS
          screen and manually entered into the database. Values may have been written
          on hardcopy forms prior to entering into the database. Values were later
          reviewed and either determined to be reasonable, or obvious errors were
          corrected.
      estimated from other source:
        description: Coordinates were interpreted or estimated from some source other
          than a GPS unit. A common source is USGS topographic maps. Other sources
          include PLSS data, point on aerial photo, narrative descriptions, or using
          a GIS to determine location for map.
      unknown:
        description: Source of geographic coordinates is unknown.
      imported from gps:
        description: Geographic coodinate values were imported from a GPS unit using
          the Import GPS Site Data function.
    description: Source or method used to determine the geographic coordinates of
      the sampling site.
  NASIS_geomor_pos_flat:
    name: NASIS_geomor_pos_flat
    title: Geomor Pos Flat
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=247
    permissible_values:
      dip:
        description: A geomorphic component (characteristic piece) of flat plains
          (e.g., lake plain, low coastal plain, low-relief till plain) consisting
          of a shallow and typically closed depression that tends to be an area of
          focused groundwater recharge but not a permanent water body and that lies
          slightly lower and is wetter than the adjacent talf, and favors the accumulation
          of fine sediments and organic materials. SW
      rise:
        description: A geomorphic component of flat plains (e.g., lake plain, low
          coastal plain, low-gradient till plain) consisting of a slightly elevated
          but low, broad area with low slope gradients (e.g. 1-3 % slopes); typically
          a microfeature but can be fairly extensive. Commonly soils on a rise are
          better drained than those on the surrounding talf. Compare - talf. SW
      talf:
        description: A geomorphic component of flat plains (e.g., lake plain, low
          coastal plain, low-gradient till plain) consisting of an essentially flat
          (e.g. 0-1 % slopes) and broad area dominated by closed depressions and a
          non-integrated or poorly integrated drainage system. Precipitation tends
          to pond locally and lateral transport is slow both above and below ground,
          which favors the accumulation of soil organic matter and a retention of
          fine earth sediments; better drained soils are commonly adjacent to drainageways.
          Compare - rise. SW
      flat:
        description: default choice, official choices to be determined later
        status: obsolete
    description: Unique three-dimensional descriptors of parts of landforms or microfeatures
      applied to flat plains.
  NASIS_geomor_pos_hill:
    name: NASIS_geomor_pos_hill
    title: Geomor Pos Hill
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=248
    permissible_values:
      interfluve:
        description: An elevated area between two drainageways that sheds water to
          those drainageways.
      head slope:
        description: The concave surface at the head of a drainageway where the flow
          of water converges downward toward the center and contour lines form concave
          curves.
      nose slope:
        description: The projecting end of an interfluve, where contour lines connecting
          the opposing side slopes form convex curves around the projecting end and
          lines perpendicular to the contours diverge downward. Overland flow of water
          is divergent.
      side slope:
        description: The slope bounding a drainageway and lying between the drainageway
          and the adjacent interfluve. It is generally linear along the slope width
          and overland flow is parallel down the slope.
      base slope:
        description: A geomorphic component of hills consisting of the concave to
          linear slope (perpendicular to the contour) which, regardless of the lateral
          shape is an area that forms an apron or wedge at the bottom of a hillside
          dominated by colluvial and slope wash processes and sediments (e.g., colluvium
          and slope alluvium). Distal base slope sediments commonly grade to, or interfinger
          with, alluvial fills, or gradually thin to form pedisediment over residuum.
          Compare - head slope, side slope, nose slope, interfluve, free face. SW
      crest:
        description: A geomorphic component of hills consisting of the convex slopes
          (perpendicular to the contour) that form the narrow, roughly linear top
          area of a hill, ridge, or other upland where shoulders have converged to
          the extent that little or no summit remains; dominated by erosion, slope
          wash and mass movement processes and sediments (e.g., slope alluvium, creep).
          Commonly, soils on crests are more similar to those on side slopes than
          to soils on adjacent interfluves. Compare - interfluve, head slope, side
          slope, nose slope. SW
      free face:
        description: The part of a hillside or mountainside consisting of an outcrop
          of bare rock (scarp or cliff) that sheds colluvium to slopes below and commonly
          stands more steeply than the angle of repose of the colluvial slope (e.g.
          talus slope) immediately below. SW & GG
      crested hills:
        status: obsolete
    description: "A mappable part of the earth's surface (three dimensional) that\
      \ represents an episode of landscape development of hills."
  NASIS_geomor_pos_mountain:
    name: NASIS_geomor_pos_mountain
    title: Geomor Pos Mountain
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=249
    permissible_values:
      mountaintop:
        description: roughly analogous to the crest or summit);
      mountainflank:
        description: 'the long slope along the sides of mountains which can be further
          subdivided into three portions based on the relative slope location: upper
          third-, middle third-, or lower third mountainflank;'
      mountainbase:
        description: colluvium / slope alluvium apron at the bottom of the mountain;
      mountainflank, upper third:
        title: Upper third
        description: of mountainflank The upper third of the long slope along mountainflank.
      mountainflank, center third:
        title: Center third
        description: of mountainflank The middle third of the long slope along mountainflank.
      mountainflank, lower third:
        title: Lower third
        description: of mountainflank The lower third of the long slope along mountainflank.
      free face:
        description: 'The part of a hillside or mountainside consisting of an outcrop
          of bare rock (scarp or cliff) that sheds colluvium to slopes below and commonly
          stands more steeply than the angle of repose of the colluvial slope (e.g.
          talus slope) immediately below. References: Schoeneberger, P.J. and Wysocki,
          D.A. 2013. (personal communication), National Soil Survey Center, NRCS,
          Lincoln, NE. and Neuendorf, K.K.E., Mehl Jr., J.P., and Jackson, J.A. (ed.)
          2005. Glossary of geology, 5th Ed. American Geological Institute, Alexandria,
          VA. 779 p.'
    description: "A mappable part of the earth's surface (three dimensional) that\
      \ represents an episode of landscape development of mountians. Reference: Schoeneberger,\
      \ P.J. and Wysocki, D.A. 2013. (personal communication), National Soil Survey\
      \ Center, NRCS, Lincoln, NE."
  NASIS_geomor_pos_terrace:
    name: NASIS_geomor_pos_terrace
    title: Geomor Pos Terrace
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=250
    permissible_values:
      riser:
        description: The vertical or steeply sloping surface, commonly one of a series,
          of natural steplike landforms, as those of a glacial stairway or of successive
          stream terraces.
      tread:
        description: The flat or gently sloping surface of natural step-like landforms,
          commonly one of a series, such as successive stream terraces.
    description: "A mappable part of the earth's surface (three dimensional) that\
      \ represent an episode of landscape development of terraces."
  NASIS_grazing_type:
    name: NASIS_grazing_type
    title: Grazing Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=251
    permissible_values:
      continuous grazing:
        description: Grazing is considered continuous when livestock are left to graze
          one area for a long period of time.
      rotational intensive:
        description: Intensive grazing is when livestock graze on small areas of pasture,
          or paddocks, for a very short period.
      rotational simple:
        description: A system with more than one pasture qualifies as rotational.
          A simple system has a few pastures that livestock are rotated through to
          give forage some rest between periods of grazing.
      seasonal:
        description: Only grazed part of the year.
    description: Type of grazing practice.
  NASIS_ground_cover_class:
    name: NASIS_ground_cover_class
    title: Ground Cover Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=252
    permissible_values:
      trace to 1%:
        description: An occassional plant present (trace to 1% ground cover)
      2 to 9%:
        description: Sparsely abundant (2% - 9% ground cover)
      10 to 19%:
        description: Moderately abundant (10% - 19% ground cover)
      20 to 29%:
        description: Abundant (20% - 29% ground cover)
      30% or more:
        description: Very abundant (=> 30% ground cover)
  NASIS_ground_cover_extent:
    name: NASIS_ground_cover_extent
    title: Ground Cover Extent
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=253
    permissible_values:
      none:
        description: No vegetation present as a result of treatment other than tillage
          to prevent plant growth.
      sparse:
        description: Scattered grass and/or weeds, or clean tilled.
      light:
        description: Patchy sod or weeds.
      dense:
        description: Heavy sod.
  NASIS_ground_cover_type:
    name: NASIS_ground_cover_type
    title: Ground Cover Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=254
    permissible_values:
      bare ground:
        description: Exposed bare soil surface with no other ground cover material
          type present.
      bedrock:
        description: Exposed bare soil surface with no other ground cover material
          type present.
      biological crust:
        description: A crust on the soil surface primarily composed of algae, cyanobacteria,
          and/or lichens.
      forb:
        description: An herbaceous, broadleaved flowering plant whose above-ground
          stem does not become woody and persistent.
      grass or grasslike:
        description: Plant material that is a member of the Gramineae (true grasses),
          Cyperaceae (sedges), or Juncaceae (rushes) families.
      litter:
        description: Soil surface is covered by fresh and/or partially decomposed
          plant residue material, including downed wood, that is not attached to a
          rooted plant.
      nonvascular plant:
        description: Plant material composed of mosses, liverworts, hornworts, or
          stemmed lichens.
      shrub or vine or liana: {}
      surface fragments, large:
        title: Large surface fragments
        description: Loose fragments of rock equal to or greater than 3 inches in
          size.
      surface fragments, small:
        title: Small surface fragments
        description: Loose fragments of rock greater than 0.25 and less than 3 inches
          in size.
      tree:
        description: Woody perennial plant species typically over 5m in height at
          maturity.
      water:
        description: The soil surface is covered by standing water.
      embedded litter:
        description: Soil surface is covered by fresh and/or partially decomposed
          plant residue material, including downed wood, that is not attached to a
          rooted plant, but is partially buried or embedded in the soil surface.
        status: obsolete
  NASIS_ground_surface_cover_type:
    name: NASIS_ground_surface_cover_type
    title: Ground Surface Cover Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=255
    permissible_values:
      bare ground:
        description: Exposed bare soil surface with no other ground cover material
          type present.
      bedrock:
        description: Exposed bare soil surface with no other ground cover material
          type present.
      biological crust:
        description: A crust on the soil surface primarily composed of algae, cyanobacteria,
          and/or lichens.
      forb:
        description: An herbaceous, broadleaved flowering plant whose above-ground
          stem does not become woody and persistent.
      grass or grasslike:
        description: Plant material that is a member of the Gramineae (true grasses),
          Cyperaceae (sedges), or Juncaceae (rushes) families.
      litter:
        description: Soil surface is covered by fresh and/or partially decomposed
          plant residue material, including downed wood, that is not attached to a
          rooted plant.
      nonvascular plant:
        description: Plant material composed of mosses, liverworts, hornworts, or
          stemmed lichens.
      shrub or vine or liana: {}
      surface fragments, large:
        title: Large surface fragments
        description: Loose fragments of rock equal to or greater than 3 inches in
          size.
      surface fragments, small:
        title: Small surface fragments
        description: Loose fragments of rock greater than 0.25 and less than 3 inches
          in size.
      tree:
        description: Woody perennial plant species typically over 5m in height at
          maturity.
      water:
        description: The soil surface is covered by standing water.
      downed wood, fine-small:
        title: Fine-small downed wood
        description: Dead, downed wood less than 0.4 inches in diameter. 1 hour fuels.
      downed wood, fine-medium:
        title: Fine-medium downed wood
        description: Dead, downed wood 0.4 to less than 1 inch in diameter. 10 hour
          fuels.
      downed wood, fine-large:
        title: Fine-large downed wood
        description: Dead, downed wood 1 to less than 3 inches in diameter. 100 hour
          fuels.
      downed wood, coarse- small:
        title: Coarse-small downed wood Dead, downed wood 3 to less than 9 inches
          in diameter. 1,000 hour fuels.
      downed wood, coarse-large:
        title: Coarse-large downed wood
        description: Dead, downed wood equal to or greater than 9 inches in diameter.
          10,000 hour fuels.
      tree snags, hard:
        title: Hard tree snags
        description: 'Dead, standing tree trunks that are > 4" in diameter at 4.5
          feet above the ground, and > 6 feet in height; have no evidence of decay;
          and with bark largely intact. Smaller snags count as downed wood.'
      tree snags, soft:
        title: Soft tree snags
        description: 'Dead, standing tree trunks that are > 4" in diameter at 4.5
          feet above the ground, and > 6 feet in height; have no evidence of decay;
          and with bark that has partially or totally sloughed off. Smaller snags
          count as downed wood.'
      embedded litter:
        description: Soil surface is covered by fresh and/or partially decomposed
          plant residue material, including downed wood, that is not attached to a
          rooted plant, but is partially buried or embedded in the soil surface.
        status: obsolete
