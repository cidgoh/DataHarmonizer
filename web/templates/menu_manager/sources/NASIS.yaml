  NASIS_texture_structure_category:
    name: NASIS_texture_structure_category
    title: Texture Structure Category
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=842
    permissible_values:
      '0.01':
        description: Compacted, structureless, clayey or silty materials such as landfill
          caps and liners, lacustrine or marine sediments.
      '0.04':
        description: Soils that are both fine textured (clayey or silty) and unstructured;
          may also include some fine sands.
      '0.12':
        description: Most structured soils from clays through loams; also includes
          unstructured medium and fine sands. The category most frequently applicable
          for agricultural soils.
      '0.36':
        description: Coarse and gravelly sands; may also include highly structured
          or aggregated soils, as well as soils with large and/or numerous cracks
          or macropores.
    description: 'It is the soil macroscopic capillary length parameter (1/cm) that
      is used in the equation to calculate a field Ksat from the quasi-steady infiltration
      rate obtained using the single or double ring method. The parameter and the
      calculation of a field saturated hydraulic conductivity is from Reynolds (2002).
      Reference: Reynolds, W.D., D.E. Elrick, and E.G. Youngs. 2002a. Ring or cylinder
      infiltrometers (vadose zone). p.818-820. In J.H. Dane and G.C. Topp (eds) Methods
      of Soil Analysis: Part 4 physical methods. SSSA No. 5. Soil Science Society
      of America, Inc. Madison, WI.'
  NASIS_tidal_datum:
    name: NASIS_tidal_datum
    title: Tidal Datum
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=843
    permissible_values:
      north american vertical datum of 1988:
        description: Tidal datum is NAVD88 for all subaqueous soil survey projects.
      mean tide level:
        description: Formerly known as Mean Sea Level (MSL), is the average of all
          tidal fluctuation in a given area and represents the land-water interface
          on conventional topographic maps. It is also the datum to which terrestrial
          elevations are normalized.
      mean high water:
        description: It represent typical 24-hour tidal cycles high level.
      mean low water:
        description: It represent typical 24-hour tidal cycles low level.
      mean lower low water:
        description: Is based on lunar cycles that increase the amplitude of tides.
          Nautical charts used for boating are based on Mean Lower Low Water in an
          attempt to represent minimum water depths for navigation.
      mean higher high water:
        description: Is based on lunar cycles that increase the amplitude of tides.
    description: Tidal datums are a reference elevation of sea level, defined in terms
      of a certain phase of a tide. Tidal datums are primarily used to estimate water
      heights and/or depths and determine horizontal boundaries. Tidal datum is NAVD88
      for all subaqueous soil survey projects.
  NASIS_tidal_period:
    name: NASIS_tidal_period
    title: Tidal Period
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=844
    permissible_values:
      incoming: {}
      high: {}
      outgoing: {}
      low: {}
      none:
        description: Site is not affected by tides (e.g. freshwater areas).
    description: 'Record the tidal period (incoming, high, outgoing, low, none) at
      the time of sample extraction. (NOTE: Most freshwater lakes do not exhibit appreciable
      tidal fluctuations.) Reference: Field Book for Describing and Sampling Soils
      v 3.0, Sep 2012'
  NASIS_tillage_system_dom:
