  NASIS_usfs_ground_cover_type:
    name: NASIS_usfs_ground_cover_type
    title: Usfs Ground Cover Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=869
    permissible_values:
      basal forb:
        description: Basal (cross sectional area at or near the ground level) cover
          of forbs.
      basal graminoid:
        description: Basal (cross sectional area at or near the ground level) cover
          of grasses or grass-like plants.
      bare soil (soil particles < 2 mm):
        description: Bare soil, not covered by rock, cryptogams, or organic material.
          Does not include any part of a road (see definition for road).
      basal shrub:
        description: Basal (cross sectional area at or near the ground level) cover
          of shrubs.
      basal tree:
        description: Basal (cross sectional area at or near the ground level) cover
          of trees.
      basal vegetation:
        description: Basal vegetation, not differentiated by life form. For use when
          basal vegetation is not separated into more detailed codes.
      bedrock:
        description: A general term for the rock, usually solid, that underlies soil
          or other unconsolidated, superficial material.
      cryptogams, mosses, and lichens:
        description: For situations where information is not further differentiated.
      cryptogamic crust:
        description: Thin, biotically dominated ground or surface crusts on soil in
          dry rangeland conditions; e.g. crypotgamic curst (algae, lichen, mosses
          or cyanobacteria).
      lichen:
        description: An organism generally recognized as a single plant that consists
          of a fungus and an alga or cyanobacterium living in a symbiotic association.
          For lichen growing on bare soil in dry rangeland conditions see cryptogamic
          crust.
      litter and duff:
        description: Leaf and needle litter, and duff not yet incorporated into the
          decomposed top humus layer. Non-continuous litter is not included (for example,
          scattered needles over soil is classified as BARE.
      moss:
        description: Nonvascular, terrestrial green plant, including mosses, hornworts,
          and liverworts. Always herbaceous. This code does not apply to moss growing
          on bare soil in dry rangeland conditions. For rangeland conditions, see
          cryptogamic crusts.
      non-vascular plant:
        description: Plants or plant-like organisms without specialized water or fluid
          conductive tissue (xylem and phloem). Includes mosses, liverworts, hornworts,
          lichens, algae, and bacterial soil crusts.
      pavement:
        description: A natural, concentration of closely packed and polished stones
          at the soil surface in a desert (may or may not be an erosional lag).
      permanent ice and snow:
        description: Surface area covered by ice and snow at the time of plot measurement,
          considered permanent. For use when permanent ice and snow are not differentiated.
      road:
        description: Improved roads, paved roads, gravel roads, improved dirt roads,
          and off-road vehicle trails regularly maintained or in long-term continuing
          use. Generally constructed using machinery. Includes cutbanks and fills.
      transient ice and snow:
        description: Surface area covered by ice and snow at the time of plot measurement,
          considered transient. For use when permanent ice and snow are not differentiated.
      water:
        description: Where the water table is above the ground surface during the
          growing season, such as streams, bogs, swamps, marshes, and ponds.
      wood:
        description: Woody material, slash, and debris; any woody material, small
          and large woody debris, regardless of depth. Litter and non-continuous litter
          are not included (for example, scattered needles over soil is classified
          as BARE).
