  NASIS_concen_rmf_mottle_contrast:
    name: NASIS_concen_rmf_mottle_contrast
    title: Concen Rmf Mottle Contrast
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=78
    permissible_values:
      distinct:
        description: Colors being compared are on the same Munsell color page and
          differ by >2 to 4 value units and >1 to 4 chroma, or they differ by one
          page and =<2 value and =<1 chroma.
      faint:
        description: Colors being compared are on the same Munsell color page, and
          differ by =<2 value and =<1 chroma.
      prominent:
        description: Colors being compared are on the same Munsell color page and
          differ by >4 units of value or chroma; or they differ by one page with >2
          value units or >1 chroma; or they differ by =>2 pages.
    description: 'The color difference between the redoximorphic feature, concentration,
      or mottle and the dominant matrix color; e.g., Prominent or p. Use table on
      page 2-15 or the chart on page 2-16 of the Reference: Field Book for Describing
      and Sampling Soils v 3.0, Sep 2012'
  NASIS_concen_rmf_mottle_shape:
    name: NASIS_concen_rmf_mottle_shape
    title: Concen Rmf Mottle Shape
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=79
    permissible_values:
      cylindrical:
        description: Elongated, tubular bodies.
      dendritic:
        description: Elongated, tubular, branched bodies.
      spherical:
        description: Irregular or crudely spherical bodies.
      platy:
        description: Relatively thin, tabular sheets.
      threadlike:
        description: Fine to very fine, elongated filaments, generally not dendritic.
      irregular:
        description: Bodies of non-repeating spacing or shape.
      reticulate:
        description: Crudely interlocking bodies with similar spacing.
      cubic:
        description: angular, crudely cube shaped bodies
      lenticular:
        description: Resembling in shape the cross section of a double-convex lens.
      pendular:
        description: Suspended bodies that occur on the undersides of objects, (e.g.,
          pendular gypsum on the bottom of rock fragments).
      rosette-like:
        description: A mineral growth with concentric aggregates resembling rose flowers.
    description: 'The shape of the concentration, redoximorphic feature, or mottle
      (use "Concentrations - Shape" table); page 2-28 in Reference: Field Book for
      Describing and Sampling Soils v 3.0, Sep 2012.'
