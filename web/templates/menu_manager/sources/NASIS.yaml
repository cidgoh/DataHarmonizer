    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=50
    permissible_values:
      low intensity, ground or light surface fire:
        description: grass, fine fuels, minimal tree mortality
      moderate intensity, surface fire:
        description: shrubs, significant tree stand thinning
      high intensity, crown fire:
        description: catastrophic, tree kill
  NASIS_calculation_text_kind:
    name: NASIS_calculation_text_kind
    title: Calculation Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=51
    permissible_values:
      miscellaneous notes:
        description: Text entries not related to any of the other choices.
      edit notes:
        description: Text entries that describe what changes were made to the data,
          and why those changes were made.
    description: The kind of text note used to record additional information about
      the calculation being made.
  NASIS_calculation_type:
    name: NASIS_calculation_type
    title: Calculation Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=52
    permissible_values:
      ? C Calculation A procedure that calculates the value(s) of one or more elements
        from the value(s) of other elements. mnemonic=CALCT_CALCULATE
      : {}
      ? V Validation A procedure the only checks consistency between the values of
        different data elements, and reports any inconsistencies. mnemonic=CALCT_VALIDATE
      : {}
    description: "Calculations in NASIS are of two types; one that incorporates other\
      \ data elements as parameters to calculate a value for a data element that can\
      \ either be measured directly but for some reason was not collected at the time\
      \ of the description or for a data element that can only be inferred, i.e. not\
      \ directly measured. The other type of calculation is a validation. Validations\
      \ use other data elements as input parameters to determine if the value entered\
      \ into NASIS is actually a value that 'makes sense'. A validation usually is\
      \ more complex that just passing the NASIS data element definition, i.e. type,\
      \ range in values, etc. Validations can not be used to catch data errors while\
      \ entering data directly into NASIS or while importing data from another source.\
      \ I.e. spreadsheets. Validations must be run after the data is already in NASIS."
  NASIS_canopy_cover_class:
    name: NASIS_canopy_cover_class
    title: Canopy Cover Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=53
    permissible_values:
      trace: {}
      0.1 to 1%: {}
      1.1 to 2%: {}
      2 to 5%: {}
      6 to 10%: {}
      11 to 25%: {}
      26 to 50%: {}
      51 to 75%: {}
      76 to 95%: {}
      '> 95%': {}
    description: The estimated percent of the ground that is shaded by vegetation
      canopy at midday, expressed as a class.
  NASIS_capability_class:
    name: NASIS_capability_class
    title: Capability Class
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=54
    permissible_values:
      '1':
        description: Soils in Class 1 have few limitations that restrict their use.
      '2':
        description: Soils in Class 2 have some limitations that reduce the choice
          of plants or require moderate conservation practices
      '3':
        description: Soils in Class 3 have severe limitations that reduce the choice
          of plants or require special conservation practices, or both.
      '4':
        description: Soils in Class 4 have very severe limitations that restrict the
          choice of plants, require very careful management, or both
      '5':
        description: Soils in Class 5 have little or no erosion hazard, but have other
          limitations impractical to remove that limit their use.
      '6':
        description: Soils in Class 6 have very severe limitations that make them
          generally unsuited to cultivation and limit their use largely to pasture,
          etc.
      '7':
        description: Soils in Class 7 have very severe limitations that make them
          unsuited to cultivation and that restrict their use to grazing, etc.
      '8':
        description: Soils (and landforms) in Class 8 have limitations that preclude
          their use for commercial plant production and restrict their use.
    description: 'Capability classes are groups of capability subclasses or capability
      units that have the same relative degree of hazard or limitation. The risks
      of soil damage or limitation in use become progressively greater from class
      I to class VIII. Reference: Land-Capability Classification. Ag Handbook 210.'
  NASIS_capability_subclass:
    name: NASIS_capability_subclass
    title: Capability Subclass
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=55
    permissible_values:
      e:
        description: erosion
      w:
        description: excess water
      s:
        description: soil limitations within the rooting zone
      c:
        description: climate condition
    description: 'Subclasses are groups of capability units which have the same major
      conservation problem, such as, Erosion and runoff; Excess water; Root-zone limitations;
      and Climatic limitations. Reference: Land-Capability Classification. Ag Handbook
      210.'
  NASIS_carbonate_dev_stage_cf:
    name: NASIS_carbonate_dev_stage_cf
    title: Carbonate Dev Stage Cf
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=56
    permissible_values:
      I:
        description: Pedongenic carbonate occurs as coats along the underside of some
          coarse fragments in the B horizon. A few fragments may be completely coated.
      II:
        description: Pedogenic carbonate completely coats most coarse fragments in
          the B horizon. Carbonate matrix is continuous between some fragments.
      III:
        description: Pedogenic carbonate entirely engulfs some part of the B horizon
          and it may be cemented. Carbonate coats and pendants may occur above and
          below the engulfed zone.
      IV:
        description: Pedogenic carbonate engulfs and cements part of the B horizon.
          Fine laminae are at the top of the cemented horizon. Carbonate coats and
          pendants may occur above and below teh engulfed zone.
      V:
        description: Pedogenic carbonate engulfs and cements a major part of the B
          horizon. The top of the cemented horizon has >1 cm thick laminae. Some vertical
          fractures may be laminae lined.
      VI:
        description: Pedogenic carbonate engulfs and cements a majority of the B horizon.
          Multiple generations of recemented breccia and laminae exist. Pisoliths
          are present.
    description: 'The class of pedogenic carbonate stage expression in a coarse fragment
      matrix. Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_carbonate_dev_stage_fe:
    name: NASIS_carbonate_dev_stage_fe
    title: Carbonate Dev Stage Fe
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=57
    permissible_values:
      I:
        description: Pedogenic carbonate occurs as few to common fine masses, threads,
          and/or patchy coats in the B horizon.
      II:
        description: Pedogenic carbonate occurs as common, fine to very coarse masses,
          concretions, nodules, and/or continuous coats in the B horizon.
      III:
        description: Pedogenic carbonate entirely engulfs part of the B horizon, and
          it may be cemented. Common to many masses, concretions, or nodules occur
          above or below the engulfed horizon.
      IV:
        description: Pedogenic carbonate engulfs and cements part of the B horizon.
          Fine laminae occur at the top of the cemented horizon. Common to many concretions
          may occur below the engulfed horizon.
      V:
        description: Pedongenic carbonate engulfs and cements a major part of the
          B horizon. The top of the cemented horizon has >1 cm thick laminae. Some
          vertical fractures may be laminae lined.
      VI:
        description: Pedogenic carbonate engulfs and cements a majority of the B horizon.
          Multiple generations of recemented breccia and laminae exist.
    description: 'The class of pedogenic carbonate stage expression in a fine earth
      matrix. Reference: Field Book for Describing and Sampling Soils v 3.0, Sep 2012'
  NASIS_cardinality_nasis:
    name: NASIS_cardinality_nasis
