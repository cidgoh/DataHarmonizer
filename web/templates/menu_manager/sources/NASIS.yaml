  NASIS_human_artifact_cohesion:
    name: NASIS_human_artifact_cohesion
    title: Human Artifact Cohesion
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=284
    permissible_values:
      cohesive:
        description: Artifacts adhere together sufficiently so that they can not be
          easily broken into <2 mm size pieces either by hand or with a simple crushing
          device such as a mortar and pestle.
      noncohesive:
        description: Artifacts are easily broken into <2 mm size pieces either by
          hand or with a simple crushing device such as a mortar and pestle. They
          are similar to pararock fragments and will be incorporated into fine-earth
          fraction of the soil during routine laboratory sample preparation.
    description: 'The dominant relative fragment integrity. Reference: Field Book
      for Describing and Sampling Soils v 3.0, Sep 2012'
