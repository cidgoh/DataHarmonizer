  NASIS_pore_shape:
    name: NASIS_pore_shape
    title: Pore Shape
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=433
    permissible_values:
      interstitial:
        description: Primary packing voids between soil particles (e.g. voids between
          sand grains and rock fragments).
      dendritic tubular:
        description: Cylindrical, elongated, branching voids (e.g. empty root channels).
      tubular:
        description: Cylindrical, elongated voids (e.g. worm tunnels).
      vesicular:
        description: Ovoid to spherical shaped voids (e.g. solidified gaseous bubbles
          concentrated just below a crust).
      irregular:
        description: Non-connected cavities or chambers of various shapes (e.g. vughs).
      filled with coarse material:
        status: obsolete
      void between rock fragments:
        status: obsolete
      interstitial and tubular:
        status: obsolete
      continuous tubular:
        status: obsolete
      discontinuous tubular:
        status: obsolete
      constricted tubular:
        status: obsolete
      vesicular and tubular:
        status: obsolete
      total porosity:
        status: obsolete
    description: 'The dominant form (or type) of pores discernible with a 10X hand
      lens and by the unaided eye. Reference: Field Book for Describing and Sampling
      Soils v 3.0, Sep 2012'
  NASIS_potential_frost_action:
    name: NASIS_potential_frost_action
    title: Potential Frost Action
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=434
    permissible_values:
      none: {}
      low: {}
      moderate: {}
      high: {}
    description: 'Rating of the susceptibility of the soil to upward or lateral movement
      by the formation of segregated ice lenses. It rates the potential for frost
      heave and the subsequent loss of soil strength when the ground thaws. Part 618
      National Soil Survey Handbook. This pertains to the likelihood of upward or
      lateral movement of soil by formation of ice lenses and the subsequent loss
      of soil strength upon thawing. Large scale collapse to form pits is excluded
      and considered under mass movement. Soil temperature, particle size, and the
      pattern of water states are used to make predictions. Reference: Soil Survey
      Manual.'
  NASIS_product_type:
    name: NASIS_product_type
    title: Product Type
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=435
    permissible_values:
      traditional bound manuscript: {}
      three-ring bound manuscript: {}
      web publication:
        description: Manuscript and maps assembled in PDF format and posted on the
          Soil Data Mart.
      interim report: {}
      soil survey report on cd- rom:
        title: Soil Survey Report on CD-ROM
      soil attribute/spatial on cd- rom:
        title: Soil Attribute/Spatial on CD-ROM
    description: The publication condition in which soil survey information is disseminated.
  NASIS_project_text_kind:
    name: NASIS_project_text_kind
    title: Project Text Kind
    see_also: https://www.nrcs.usda.gov/sites/default/files/2025-07/NASIS%207.4.3%20Domains.pdf#page=436
    permissible_values:
      project plan:
        description: Text entry that includes text of the full project plan.
      edit notes:
        description: Text entries that describe what changes were made to the data
          mapunit object, exclusive of the component object, and why those changes
          were made.
      miscellaneous notes:
        description: Text entries not related to any of the other choices.
      project summary:
        description: Text entry that includes text of the conclusions and outcomes
          from the project.
    description: The kind of text note used to record additional information about
      the project.
  NASIS_property_data_type:
