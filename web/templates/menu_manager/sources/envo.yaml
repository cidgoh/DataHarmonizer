id: https://purl.obolibrary.org/obo/envo.owl
name: envo
title: The Environment Ontology
description: ENVO is an ontology which represents knowledge about environments,environmental
  processes, ecosystems, habitats, and related entities
version: '2025-10-20'
license: https://creativecommons.org/publicdomain/zero/1.0/
in_language: en
