      ENVO_01000021:
        title: obsolete mangrove biome
        description: Expressions of the mangrove biome are typically found in tropical
          and sub-tropical tidal areas, in depositional coastal environments where
          fine sediments (often with high organic content) collect in areas protected
          from high energy wave action. A variety of characteristic trees and shrubs
          occur here and are able to withstand a high degree of salinity as well as
          regions of anoxia and frequent tidal inundation. These areas include estuaries
          and marine shorelines.
        status: DEPRECATED
        meaning: 'ENVO:01000021'
      ENVO_01000031:
