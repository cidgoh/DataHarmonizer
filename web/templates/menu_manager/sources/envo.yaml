      ENVO_03501340:
        title: community service centre
        description: A public building in which health, recreation or other public
          services to a local community are provided.
        is_a: ENVO_00000073
        meaning: 'ENVO:03501340'
      ENVO_03501347:
        title: hotel
        description: A building which 1) containing multiple dwellings of pre-furnished
          accomodation and 2) is rented on a short term and/or longer-term basis.
        is_a: ENVO_00000073
        meaning: 'ENVO:03501347'
      ENVO_01000420:
        title: building part
        description: A building part is a construction which is part of a building.
        is_a: ENVO_00000070
        meaning: 'ENVO:01000420'
      ENVO_00003967:
        title: creamery
        description: A creamery is a part of a dairy where cream is separated from
          whole milk.
        is_a: ENVO_01000420
        meaning: 'ENVO:00003967'
      ENVO_01000421:
        title: indoor kitchen
        description: An indoor kitchen is a room or part of a room primarily used  for
          cooking or food preparation, but which may have other funcitons such as
          dining, food storage, dishwashing, or laundry.
        is_a: ENVO_01000420
        meaning: 'ENVO:01000421'
      ENVO_01000426:
        title: room
        description: A building part which is separated from other building parts
          by one or more interior walls and, optionally, outdoor areas by one or more
          exterior walls.
        is_a: ENVO_01000420
        meaning: 'ENVO:01000426'
      ENVO_01000422:
        title: bathroom
        description: A bathroom is a room which contains a washbasin or other fixture,
          such as a shower or bath, used for bathing by humans.
        is_a: ENVO_01000426
        meaning: 'ENVO:01000422'
      ENVO_01000423:
        title: living room
        description: A living room is a room in a human house which is used for social
          and domestic leisure activities.
        is_a: ENVO_01000426
        meaning: 'ENVO:01000423'
      ENVO_01000425:
        title: indoor toilet
        description: An indoor toilet is a room which contains a sanitation fixture
          used primarily for the disposal of human urine and faeces.
        is_a: ENVO_01000426
        meaning: 'ENVO:01000425'
      ENVO_03501265:
        title: public toilet
        description: An indoor toilet that is available for public use.
        is_a: ENVO_01000425
        meaning: 'ENVO:03501265'
      ENVO_03501125:
