      ENVO_02000005:
        title: obsolete livestock-associated habitat
        description: 'Livestock is an animal-associated habitat consisting of any
          domestic or domesticated animal intentionally raised for food or in the
          production of food or raised as stock to produce food or fibre, in an agricultural
          setting or for its labour or pen-raised animals raised on licensed game
          farm operations. Livestock include: bovine animals (including buffalo and
          bison), ovine animals, porcine animals, caprine animals, , poultry, bees,
          equine animals, cervidae animals; animals of the genus Lama; ratites (Emu,
          Ostrich, and Rhea), fish or shellfish in aquaculture facilities, and enclosed
          domesticated rabbits or hares raised for human food or fiber.'
        status: DEPRECATED
        meaning: 'ENVO:02000005'
      ENVO_02000006:
