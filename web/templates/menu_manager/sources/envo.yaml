      ENVO_06105005:
        title: thermoset polymer
        description: A polymer which has been irreversibly hardened by heat-induced
          curing.
        is_a: CHEBI_60027
        meaning: 'ENVO:06105005'
      ENVO_06105122:
        title: biopolymer
        description: A polymer which is the output of a biological process.
