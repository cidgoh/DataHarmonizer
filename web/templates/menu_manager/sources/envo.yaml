        description: Semisolid or jelled food prepared from fruit or fruit juice and
          other ingredients prescribed for the individual products (21 CFR 150).
        is_a: FOODON_03400143
        meaning: 'FOODON:03400155'
      FOODON_03400209:
        title: fruit jelly (us cfr)
        description: Jelled product made from one or more fruit juices and optional
          ingredients. Includes both fruit jelly, which may be sweetened with nutritive
          carbohydrate sweeteners, (21 CFR 150.140), and artificially sweetened fruit
          jelly (21 CFR 150.141). The finished fruit jelly must have a soluble solid
          content of no less than 65% and the ratio by weight of the fruit ingredient
          to sweetener in the starting mixture must be no less than 45:55. Artificially
          sweetened fruit jelly must contain no less than 55% fruit ingredient by
          weight.
        is_a: FOODON_03400155
        meaning: 'FOODON:03400209'
      FOODON_03400188:
        title: confectionery (us cfr)
        description: Candy or other food product made with sweeteners and frequently
          containing nuts, fruits, starches, flavorings and other foods (21 CFR 170.3(n)(9).
          [FDA CFSAN 1995]
        is_a: FOODON_03401270
        meaning: 'FOODON:03400188'
      FOODON_03400204:
        title: candy (us cfr)
        description: Food product prepared by heating a mixture of sweeteners and
          other optional ingredients according to the specific formula for each subgroup.
        is_a: FOODON_03400188
        meaning: 'FOODON:03400204'
      FOODON_03400293:
        title: soft candy (us cfr)
        description: Candy prepared by cooking a mixture of water, sugars and optional
          ingredients to a temperature of 250 degrees F. or less.
        is_a: FOODON_03400204
        meaning: 'FOODON:03400293'
      FOODON_03400213:
        title: fudge (us cfr)
        description: Soft candy prepared by boiling milk, sugar, salt and optional
          ingredients to the soft-ball stage (238 degrees F.).
        is_a: FOODON_03400293
        meaning: 'FOODON:03400213'
      FOODON_03400352:
        title: international agency food product type
        description: Renamed from *PRODUCT TYPE, CODEX ALIMENTARIUS* in LanguaL 2008.
        is_a: FOODON_03400361
        meaning: 'FOODON:03400352'
      FOODON_03400643:
        title: Codex Alimentarius classification of food and feed commodities
        description: "Codex Alimentarius, Volume 2 - 1993, Section 2:  Pesticide Residues\
          \ in Food.\n\nThe Codex Classification of food and animal feed commodities\
          \ moving in trade and the description of the various items and groups of\
          \ food and animal feedstuffs included in the present document have been\
          \ developed by the Codex Committee on Pesticide Residues. It was first adopted\
          \ by the 18th Session of the Codex Alimentarius Commission, (1989).\n\n\
          The Codex Classification includes food commodities and animal feedstuffs\
          \ for which Codex maximum residue limits will not necessarily be established.\
          \ The Classification is intended to be as complete a listing of food commodities\
          \ in trade as possible, classified into groups on the basis of the commodity's\
          \ similar potential for pesticide residues.\n\nThe Classification may also\
          \ be appropriate for other purposes such as setting maximum levels for other\
          \ types of residues or for other contaminants in food. The Codex Classification\
          \ should be consulted in order to obtain a precise description of the food\
          \ or animal feed commodities and, especially, in cases where Codex maximum\
          \ residue limits have been set for groups of food and groups of animal feedstuffs.\
          \ The Codex Classification is intended to promote harmonization of the terms\
          \ used to describe commodities which are subject to maximum residue limits\
          \ and of the approach to grouping commodities with similar potential for\
          \ residue for which a common group maximum residue limit can be set."
        is_a: FOODON_03400352
        meaning: 'FOODON:03400643'
      FOODON_03400644:
        title: a.  primary food commodities of plant origin (ccpr)
        is_a: FOODON_03400643
        meaning: 'FOODON:03400644'
      FOODON_03400650:
        title: 02  vegetables (ccpr)
        description: 'Vegetables are foods derived from many different kinds of plants
          mostly annual and usually cultivated, commonly known by custom and tradition
          as "vegetables".

          In several countries, some of these commodities grown on large areas are
          distinguished as "field crops" or arable crops e.g. sugar beet. For the
          sake of convenience in this guide such crops are classified under Type 2
          Vegetables.

          Exposure to pesticides is dependent on the particular part of the plant
          used for food and the growing practices.

          Vegetables may be consumed in whole or in part and in the form of fresh,
          dried or processed foods.'
        is_a: FOODON_03400644
        meaning: 'FOODON:03400650'
      FOODON_03400680:
        title: 015  pulses (vd) (ccpr)
        description: 'Pulses are derived from the mature seeds naturally or artificially
          dried, of leguminous plants known as beans (dry) and peas (dry).

          The seeds in the pods are protected from most pesticides applied during
          the growing season except pesticides which show a systemic action. The dried
          beans and peas however are often exposed to post-harvest treatments.

          The dry pulses are consumed after processing or household cooking.'
        is_a: FOODON_03400650
        meaning: 'FOODON:03400680'
      FOODON_03400874:
        title: GS1 Global Product Classification (GPC)
        description: 'The Global System 1 (GS1) Global Product Classification (GPC)
          is a system that gives buyers and sellers a common language for grouping
          products in the same way, everywhere in the world.$br/$

          The GS1 GPC classification in facet A is currently updated based on June
          2017 release of GS1 GPC Standard for Food/Beverage/Tobacco, except for codes
          pertaining to tobacco. See the GS1 site for details [https://www.gs1.org/standards/gpc].'
        is_a: FOODON_03400352
        meaning: 'FOODON:03400874'
      FOODON_03400960:
        title: 50220000 - cereal/grain/pulse products (gs1 gpc)
        is_a: FOODON_03400874
        meaning: 'FOODON:03400960'
      FOODON_03400969:
        title: 50221200 - processed cereal products (gs1 gpc)
        is_a: FOODON_03400960
        meaning: 'FOODON:03400969'
      FOODON_03401061:
        title: 50190000 - prepared/preserved foods (gs1 gpc)
        is_a: FOODON_03400874
        meaning: 'FOODON:03401061'
      FOODON_03401095:
        title: 50192900 - pasta/noodles  (gs1 gpc)
        is_a: FOODON_03401061
        meaning: 'FOODON:03401095'
      FOODON_03400356:
        title: European Union agency food product type
        is_a: FOODON_03400361
        meaning: 'FOODON:03400356'
      FOODON_03400777:
        title: eurofir food classification
        is_a: FOODON_03400356
        meaning: 'FOODON:03400777'
      FOODON_03400801:
        title: seafood or related product (eurofir)
        description: "The group includes marine or freshwater fish, molluscs, crustaceans,\
          \ and other fauna such as reptiles, insects or frogs not in the \x93Meats\x94\
          \ group. The group also includes seafood product analogs and seafood-based\
          \ sausage or luncheon meat as well as such products as squid ink and clam\
          \ juice."
        is_a: FOODON_03400777
        meaning: 'FOODON:03400801'
      FOODON_03400803:
        title: seafood product (eurofir)
        description: "Includes fish offal; a food product whose predominant constituent\
          \ is fish (e.g. dried and salted fish, smoked fish, canned fish, pickled\
          \ fish, restructured fish and fish analogues, surimi; fish paste, p\xE2\
          t\xE9)."
        is_a: FOODON_03400801
        meaning: 'FOODON:03400803'
      FOODON_03400840:
        title: beverage (non-milk) (eurofir)
        description: Alcoholic or non-alcoholic beverage; excludes milk and milk-based
          beverages.
        is_a: FOODON_03400777
        meaning: 'FOODON:03400840'
      FOODON_03400842:
        title: non alcoholic beverage (eurofir)
        description: Beverage containing no more than 0.5% alcohol; it may be flavoured,
          sweetened or carbonated; includes soft drinks and steeped beverages; excludes
          milk in all forms, fruit juices and vegetable juices.
        is_a: FOODON_03400840
        meaning: 'FOODON:03400842'
      FOODON_03400845:
        title: coffee, tea, cocoa or infusion (eurofir)
        description: Beverage prepared by extracting flavour and other components
          from food sources by percolation and/or immersion in water, usually at near-boiling
          temperature. The group includes coffee (e.g. instant coffee, coffee and
          chicory essence), tea, herbal tea (e.g. green tea, black tea, tisane), cocoa
          beverage and beverage powder.
        is_a: FOODON_03400842
        meaning: 'FOODON:03400845'
      FOODON_03400852:
        title: miscellaneous food product (eurofir)
        description: EFG group 32, Eurocode-2 group 12.
        is_a: FOODON_03400777
        meaning: 'FOODON:03400852'
      FOODON_03400861:
        title: prepared food product (eurofir)
        description: This subgroup includes multicomponent meals, sauces, retail salads,
          desserts, soups, snacks and other foods where similarity of the product
          type is more significant than the source of the principal ingredient(s).
        is_a: FOODON_03400852
        meaning: 'FOODON:03400861'
      FOODON_03400865:
        title: soup (eurofir)
        description: A liquid food made by simmering meat, poultry, seafood or vegetables,
          being clear or thickened to the consistency of a thin puree or having milk
          or cream added, and often containing pieces of solid food such as meat,
          shellfish, pasta or vegetables. Soup takes precedence over other food products.
          Examples are egg and lemon soup, oxtail soup, fish soup, rice soup, lentil
          soup, minestrone, cherry soup.
        is_a: FOODON_03400861
        meaning: 'FOODON:03400865'
      ENVO_06105003:
        title: thermoplastic material
        description: An environmental material which is capable of, repeatedly, becoming
          plastic when heated and hardening again when cooled.
        is_a: ENVO_00010483
        meaning: 'ENVO:06105003'
      ENVO_06105101:
        title: plastic
        description: An environnmental material which 1) is composed primarily of
          polymers with high molecular mass and 2) once deformed does not spontaneously
          return to its original shape.
        is_a: ENVO_00010483
        meaning: 'ENVO:06105101'
      ENVO_06105112:
        title: synthetic plastic
        description: A plastic which is composed primarily of polymers produced by
          a manufacturing process.
        is_a: ENVO_06105101
        meaning: 'ENVO:06105112'
      ENVO_03501305:
        title: pliofilm
        description: Synthetic plastic which is composed of a glossy, moistureproof
          membrane made of rubber hydrochloride.
        is_a: ENVO_06105112
        meaning: 'ENVO:03501305'
      ENVO_06105016:
        title: foamed plastic
        description: A plastic which has a matrix- or sponge-like structure with numerous,
          hollow internal spaces.
        is_a: ENVO_06105101
        meaning: 'ENVO:06105016'
      ENVO_06105111:
        title: natural plastic
        description: Plastic which is composed primarily of polymers produced by processes
          whose agents do not include humans or their technologies.
        is_a: ENVO_06105101
        meaning: 'ENVO:06105111'
      ENVO_01000281:
        title: layer
        description: A material entity which 1) is spatially continuous, 2) is composed
          of material of comparable thickness, composition, and physical properties,
          and 3) is physically distinct from adjacent portions of environmental material.
        is_a: BFO_0000040
        meaning: 'ENVO:01000281'
      ENVO_01001275:
        title: solid layer
        description: A layer which is primarily composed of some solid material, allowing
          for non-solid parts such as interstitial pockets of gas or liquid.
        is_a: ENVO_01000281
        meaning: 'ENVO:01001275'
      ENVO_01001311:
        title: solid surface layer
        description: A surface layer which is composed primarily of solid environmental
          material.
        is_a: ENVO_01001275
        meaning: 'ENVO:01001311'
      ENVO_01001271:
        title: impermeable surface layer
        description: A surface layer through which liquids or gases cannot pass.
        is_a: ENVO_01001311
        meaning: 'ENVO:01001271'
      ENVO_01000909:
        title: biocrust
        description: A surface layer of a solid environmental material which is formed
          by the presence and activity of photosynthetic microbial assemblages colonising
          it.
        is_a: ENVO_01001311
        meaning: 'ENVO:01000909'
      ENVO_01001181:
        title: rhizoplane
        description: A surface layer which is composed of the external surface of
          a root, together with closely adhering soil particles and debris
        is_a: ENVO_01001311
        meaning: 'ENVO:01001181'
      ENVO_01001503:
        title: glacial surface layer
        description: A solid surface layer which is that part of a glacier in contact
          with a planetary atmosphere, water body, or solid material partially surrounding
          that glacier.
        is_a: ENVO_01001311
        meaning: 'ENVO:01001503'
      ENVO_01001623:
        title: glacial summer surface
        description: A glacial surface layer which is present at the point in time
          where any given part of a glacier reaches its minimum annual mass.
        is_a: ENVO_01001503
        meaning: 'ENVO:01001623'
      ENVO_01001624:
        title: glacial bed
        description: A glacial surface layer which is adjacent to the bedrock or debris
          over which a glacier flows.
        is_a: ENVO_01001503
        meaning: 'ENVO:01001624'
      ENVO_01001542:
        title: ice surface layer
        description: A surface layer which is composed primarily of ice.
        is_a: ENVO_01001311
        meaning: 'ENVO:01001542'
      ENVO_00000328:
        title: vadose zone
        description: An interface layer which 1) is primarily composed of solid materials,
          2) separates the land surface and phreatic zone, and 3) contains groundwater
          at atmospheric pressure.
        is_a: ENVO_01001275
        meaning: 'ENVO:00000328'
      ENVO_00012408:
        title: aquifer
        description: An underground layer of water-bearing permeable rock or unconsolidated
          materials (gravel, sand, silt, or clay) from which groundwater can be usefully
          extracted using a water well.
        is_a: ENVO_01001275
        meaning: 'ENVO:00012408'
      ENVO_01000282:
        title: sedimentary stratum
        description: A solid layer which is composed primarily of sedimentary rock
          or soil.
        is_a: ENVO_01001275
        meaning: 'ENVO:01000282'
      ENVO_01000747:
        title: regolith
        description: A solid layer which is composed primarily of loose, heterogeneous,
          superficial material covering solid rock.
        is_a: ENVO_01001275
        meaning: 'ENVO:01000747'
      ENVO_03600011:
        title: mineral horizon
        description: A soil horizon which is primarily composed of mineral material.
        is_a: ENVO_01001275
        meaning: 'ENVO:03600011'
      ENVO_01001684:
        title: interface layer
        description: A layer which separates two portions of environmental material
          which possess 1) differing compositions, 2) a discontinuity of some property,
          or 3) some derivative of some property in a direction normal to the interface.
        is_a: ENVO_01000281
        meaning: 'ENVO:01001684'
      ENVO_00010504:
        title: surface layer
        description: A layer of some material entity which is adjacent to one or more
          of its external boundaries and directly interacts with its immediate surroundings.
        is_a: ENVO_01001684
        meaning: 'ENVO:00010504'
      ENVO_00000285:
        title: quicksand bed
        description: A bed which is composed of quicksand forming a soft, shifting
          mass that yields easily to pressure.
        is_a: ENVO_00010504
        meaning: 'ENVO:00000285'
      ENVO_01001192:
        title: sediment surface
        description: The surface layer of a mass of sediment.
        is_a: ENVO_00010504
        meaning: 'ENVO:01001192'
      ENVO_01001673:
        title: fluid surface layer
        description: A surface layer which is composed primarily of some liquid or
          gas.
        is_a: ENVO_00010504
        meaning: 'ENVO:01001673'
      ENVO_01001310:
        title: liquid surface layer
        description: A surface layer which is composed primarily of some liquid.
        is_a: ENVO_01001673
        meaning: 'ENVO:01001310'
      ENVO_01001309:
        title: liquid air-water interface layer
        description: A liquid surface layer which is in contact with air.
        is_a: ENVO_01001310
        meaning: 'ENVO:01001309'
      ENVO_01001191:
        title: water surface
        description: The surface layer of a volume of water.
        is_a: ENVO_01001310
        meaning: 'ENVO:01001191'
      ENVO_01001683:
        title: gaseous surface layer
        description: A fluid surface layer which is composed primarily of some gaseous
          material.
        is_a: ENVO_01001673
        meaning: 'ENVO:01001683'
      ENVO_01001672:
        title: frontal surface of a weather front
        description: A gaseous surface layer which is composed of the warmer air mass(es)
          along the horizontal density and temperature discontinuity in a weather
          front.
        is_a: ENVO_01001683
        meaning: 'ENVO:01001672'
      ENVO_01001677:
        title: fluid interface layer
        description: A surface layer which separates two portions of fluid with respect
          to either 1) a discontinuity of some fluid property or 2) some derivative
          of one of these properties in a direction normal to the interface.
        is_a: ENVO_01001684
        meaning: 'ENVO:01001677'
      ENVO_01001679:
        title: fluid front
        description: A fluid interface which separates two fluid masses with differing
          properties.
        is_a: ENVO_01001677
        meaning: 'ENVO:01001679'
      ENVO_01000258:
        title: fluid cline
        description: A fluid front which is 1) thin in comparison to the fluid mass
          it is a part of and 2) across which a property of that fluid mass varies
          greatly over short vertical distance, relative to variation across the entire
          fluid mass.
        is_a: ENVO_01001679
        meaning: 'ENVO:01000258'
      ENVO_00002269:
        title: thermocline
        description: A cline across which temperature changes rapidly.
        is_a: ENVO_01000258
        meaning: 'ENVO:00002269'
      ENVO_00002270:
        title: chemocline
        description: A cline across which the chemical composition of a fluid changes
          rapidly.
        is_a: ENVO_01000258
        meaning: 'ENVO:00002270'
      ENVO_01000071:
        title: oceanic front
        description: An oceanic front is a narrow zone of enhanced horizontal gradients
          of water properties (temperature, salinity, nutrients, etc.) that separates
          broader areas with different water masses or different vertical structure
          (stratification).
        is_a: ENVO_01000258
        meaning: 'ENVO:01000071'
      ENVO_01000084:
        title: estuarine front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000084'
      ENVO_01000085:
        title: plume front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000085'
      ENVO_01000086:
        title: coastal buoyancy current front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000086'
      ENVO_01000087:
        title: tidal mixing front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000087'
      ENVO_01000088:
        title: mid-shelf fronts
        is_a: ENVO_01000071
        meaning: 'ENVO:01000088'
      ENVO_01000089:
        title: shelf-slope/shelf-break front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000089'
      ENVO_01000090:
        title: coastal upwelling front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000090'
      ENVO_01000091:
        title: topographic upwelling front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000091'
      ENVO_01000092:
        title: equatorial upwelling front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000092'
      ENVO_01000093:
        title: boundary current front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000093'
      ENVO_01000094:
        title: subtropical convergence front
        description: A convergence front which is located in a region subject to subtropical
          climate patterns.
        is_a: ENVO_01000071
        meaning: 'ENVO:01000094'
      ENVO_01000095:
        title: marginal ice zone front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000095'
      ENVO_01000096:
        title: water mass front
        is_a: ENVO_01000071
        meaning: 'ENVO:01000096'
      ENVO_01000097:
        title: surface convergence
        is_a: ENVO_01000071
        meaning: 'ENVO:01000097'
      ENVO_03600070:
        title: river plume
        description: An oceanic front in which mixing of river discharge and saline
          seawater occurs.
        is_a: ENVO_01000071
        meaning: 'ENVO:03600070'
      ENVO_01000259:
        title: pycnocline
        description: A cline across which the density of a fluid changes rapidly.
        is_a: ENVO_01000258
        meaning: 'ENVO:01000259'
      ENVO_01001674:
        title: lysocline
        description: A cline across which one or more solid environmental materials
          dissolve into their surrounding fluid.
        is_a: ENVO_01000258
        meaning: 'ENVO:01001674'
      ENVO_01000079:
        title: marine lysocline
        description: The marine lysocline denotes the depth in the ocean below which
          the rate of dissolution of calcite increases dramatically. As water column
          depth and therefore pressure increases, the corresponding calcite saturation
          of seawater decreases and the calcite begins dissolve.
        is_a: ENVO_01001674
        meaning: 'ENVO:01000079'
      ENVO_01001675:
        title: nutricline
        description: A cline across which nutrient content of a fluid changes rapidly.
        is_a: ENVO_01000258
        meaning: 'ENVO:01001675'
      ENVO_01001680:
        title: gaseous front
        description: A fluid front which is composed primarily of gaseous material
          and separates at least two gaseous masses.
        is_a: ENVO_01001679
        meaning: 'ENVO:01001680'
      ENVO_01001681:
        title: weather front
        description: A gaseous front which separates two masses of air with different
          densities and is a principal cause of meteorological phenomena.
        is_a: ENVO_01001680
        meaning: 'ENVO:01001681'
      ENVO_01001698:
        title: polar front
        description: A weather front which separates air masses of tropical and polar
          origin.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001698'
      ENVO_01001706:
        title: cold front
        description: A weather front which is nonoccluded and  which moves in the
          direction of the warmer air mass it is adjacent to, such that colder air
          will occupy the site where warmer air was previously present.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001706'
      ENVO_01001718:
        title: secondary cold front
        description: A cold front which forms behind a frontal cyclone and within
          a cold air mass with an appreciable horizontal temperature gradient.
        is_a: ENVO_01001706
        meaning: 'ENVO:01001718'
      ENVO_01001707:
        title: warm front
        description: A weather front which is nonoccluded and which moves in the direction
          of the colder air mass it is adjacent to, such that warmer air will occupy
          the site where colder air was previously present.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001707'
      ENVO_01001708:
        title: anafront
        description: A weather front at which warm air is ascending to high altitudes
          along the frontal surface.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001708'
      ENVO_01001709:
        title: katafront
        description: A weather front at which warm air is descending to lower altitudes
          along the frontal surface.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001709'
      ENVO_01001710:
        title: intertropical front
        description: A weather front which exists in an equatorial trough separating
          the air of the Northern and Southern Hemispheres of an astronomical body.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001710'
      ENVO_01001713:
        title: upper front
        description: A weather front which is part of a mass of upper air.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001713'
      ENVO_01001714:
        title: occluded front
        description: A weather front which separates air behind a cold front from
          air ahead of a warm front.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001714'
      ENVO_01001715:
        title: cold occluded front
        description: An occluded front which is adjacent to a cold front 1) that is
          moving away from the coldest air in the vicinity,  2) where the neighbouring
          cold front undercuts the neighbouring warm front in the occulsion zone,
          and 3) where the coldest air in the vicinity replaces less cold air towards
          the surface of the astronomical body.
        is_a: ENVO_01001714
        meaning: 'ENVO:01001715'
      ENVO_01001716:
        title: warm occluded front
        description: An occluded front which is adjacent to a warm front 1) that is
          moving in the direction of the coldest air in the vicinity, 2) where the
          original cold front is forced aloft at the warm front surface, and 3) where
          the coldest air is replaced by less cold air at the surface of the astronomical
          body.
        is_a: ENVO_01001714
        meaning: 'ENVO:01001716'
      ENVO_01001717:
        title: neutral occluded front
        description: An occluded front which is 1) adjacent to a cold and a warm front
          with no appreciable difference between the temperatures of their bordering
          air masses and 2) which creates a pressure trough, a wind-shift line, a
          band of cloudiness, and precipitation at the surface of the astronomical
          body.
        is_a: ENVO_01001714
        meaning: 'ENVO:01001717'
      ENVO_01001745:
        title: quasi-stationary front
        description: A front which shows very little mobility.
        is_a: ENVO_01001681
        meaning: 'ENVO:01001745'
      ENVO_01000544:
        title: boundary layer
        description: A boundary layer is a layer of fluid in the immediate vicinity
          of a bounding surface where the effects of viscosity are significant enough
          to distort the surrounding non-viscous flow.
        is_a: ENVO_01001677
        meaning: 'ENVO:01000544'
      ENVO_01000323:
        title: atmospheric boundary layer
        description: The atmospheric boundary layer is the lowest layer of an atmosphere
          which is strongly influenced by its contact with a planetary surface with
          strong vertical mixing and in which physical quantities such as flow velocity,
          temperature, and moisture display rapid fluctuations (turbulence).
        is_a: ENVO_01000544
        meaning: 'ENVO:01000323'
      ENVO_03501369:
        title: seam surface
        description: An interface layer which is formed where either two parts of
          a material entity or two separate material entities touch or are attached
          to one another along some length.
        is_a: ENVO_01001684
        meaning: 'ENVO:03501369'
      ENVO_01001678:
        title: fluid layer
        description: A layer which is composed primarily of some fluid.
        is_a: ENVO_01000281
        meaning: 'ENVO:01001678'
      ENVO_01000267:
        title: atmosphere
        description: An atmosphere is a layer of gases surrounding a material body
          of sufficient mass that is held in place by the gravity of the body.
        is_a: ENVO_01001678
        meaning: 'ENVO:01000267'
      ENVO_01000810:
        title: planetary atmosphere
        description: An atmosphere which surrounds a planet.
        is_a: ENVO_01000267
        meaning: 'ENVO:01000810'
      ENVO_01000811:
        title: nitrogen-oxygen planetary atmosphere
        description: A planetary atmosphere which is composted primarily of dinitrogen
          and dioxygen gas.
        is_a: ENVO_01000810
        meaning: 'ENVO:01000811'
      ENVO_01000959:
        title: primary atmosphere
        description: "A planetary atmosphere which is formed as a result of the accretion\
          \ of gaseous matter from the accretion disc of the planet's star."
        is_a: ENVO_01000810
        meaning: 'ENVO:01000959'
      ENVO_01000960:
        title: secondary atmosphere
        description: "A planetary atmosphere which has formed as a result of its planet's\
          \ volcanic activity, or by accumulation of material from comet impacts."
        is_a: ENVO_01000810
        meaning: 'ENVO:01000960'
      ENVO_01000961:
        title: tertiary atmosphere
        description: A planetary atmosphere which has formed as a result of biotic
          processes modifying a secondary atmosphere.
        is_a: ENVO_01000810
        meaning: 'ENVO:01000961'
      ENVO_01000543:
        title: atmospheric layer
        description: A layer that is part of the atmosphere.
        is_a: ENVO_01001678
        meaning: 'ENVO:01000543'
      ENVO_01000538:
        title: stratosphere
        description: 'The layer of the atmosphere which is sandwiched between the
          troposphere and mesosphere. Of the energy that reaches the Earth from the
          sun, only 3% is absorbed in the stratosphere, but that includes the vitally
          important process of absorption of ultraviolet radiation by the stratospheric
          ozone layer. The stratosphere is cloudless and dust free, and almost unaffected
          by the turbulent conditions of the underlying level of the atmosphere. (Source:
          WRIGHT)'
        is_a: ENVO_01000543
        meaning: 'ENVO:01000538'
      ENVO_01000539:
        title: mesosphere
        description: "The mesosphere is part of the earth's atmosphere which is between\
          \ the stratosphere and the thermosphere in which temperature decreases with\
          \ altitude to the atmosphere's absolute minimum"
        is_a: ENVO_01000543
        meaning: 'ENVO:01000539'
      ENVO_01000540:
        title: troposphere
        description: "The lowest of the concentric layers of the atmosphere, occurring\
          \ between the Earth's surface and the tropopause. It is the zone where atmospheric\
          \ turbulence is at its greatest and where the bulk of the Earth's weather\
          \ is generated. It contains almost all the water vapour and aerosols and\
          \ three-quarters of the total gaseous mass of the atmosphere. Throughout\
          \ the troposphere temperature decreases with height at a mean rate of 6.5\xB0\
          C/km and the whole zone is capped by either an inversion of temperature\
          \ or an isothermal layer at the tropopause. (Source: WHIT)"
        is_a: ENVO_01000543
        meaning: 'ENVO:01000540'
      ENVO_01000541:
        title: thermosphere
        description: "The thermosphere is a part of the earth's atmosphere that begins\
          \ at about 50 miles (80 kilometers) above the earth's surface, extends to\
          \ outer space, and is characterized by steadily increasing temperature with\
          \ height"
        is_a: ENVO_01000543
        meaning: 'ENVO:01000541'
      ENVO_01000542:
        title: ozone layer
        description: The ozone layer is a layer of gases in the stratosphere which
          contains high concentrations of ozone gas relative to other parts of the
          atmosphere.
        is_a: ENVO_01000543
        meaning: 'ENVO:01000542'
      ENVO_01000545:
        title: ionosphere
        description: "The ionosphere is a layer of the Earth's atmosphere which extends\
          \ from about 60 to 1,000 kilometers above the planetary surface and is ionised\
          \ by solar radiation. It includes the thermosphere and parts of the mesosphere\
          \ and exosphere."
        is_a: ENVO_01000543
        meaning: 'ENVO:01000545'
      ENVO_01000546:
        title: exosphere
        description: "The exosphere is an atmospheric layer where molecules are gravitationally\
          \ bound to a planetary body, but where their density is too low for them\
          \ to behave as a gas by colliding with each other. In the case of bodies\
          \ with substantial atmospheres, such as Earth's atmosphere, the exosphere\
          \ is the uppermost layer, where the atmosphere thins out and merges with\
          \ interplanetary space. It is located directly above the thermosphere."
        is_a: ENVO_01000543
        meaning: 'ENVO:01000546'
      ENVO_01001712:
        title: free atmosphere
        description: An atmospheric layer which 1) is located above the planetary
          boundary layer, 2) in which the effect of friction between moving air masses
          and the planetary surface is negligible, and 3) in which the air is usually
          treated (dynamically) as an ideal fluid.
        is_a: ENVO_01000543
        meaning: 'ENVO:01001712'
      ENVO_03520000:
        title: low atmospheric level
        is_a: ENVO_01000543
        meaning: 'ENVO:03520000'
      ENVO_03520001:
        title: middle atmospheric level
        is_a: ENVO_01000543
        meaning: 'ENVO:03520001'
      ENVO_03520002:
        title: high atmospheric level
        is_a: ENVO_01000543
        meaning: 'ENVO:03520002'
      ENVO_01001273:
        title: liquid layer
        description: A layer which is primarily composed of some liquid material.
        is_a: ENVO_01001678
        meaning: 'ENVO:01001273'
      ENVO_01000325:
        title: aquatic layer
        description: A layer in a water mass, itself composed primarily of water.
        is_a: ENVO_01001273
        meaning: 'ENVO:01000325'
      ENVO_00000038:
        title: lagoon
        description: A sheet of saline water separated from the open sea by sand or
          shingle banks. The sheet of water between an offshore reef, especially of
          coral and mainland. The sheet of water within a ring or horseshoe shaped
          atoll.
        is_a: ENVO_01000325
        meaning: 'ENVO:00000038'
      ENVO_01000326:
        title: deep chlorophyll maximum layer
        description: A subsurface layer in a water body, typically an ocean or lake,
          in which chlorophyll concentrations reach their maximum.
        is_a: ENVO_01000325
        meaning: 'ENVO:01000326'
      ENVO_01000355:
        title: vegetation layer
        description: A layer which is determined by a form of vegetation.
        is_a: ENVO_01000281
        meaning: 'ENVO:01000355'
      ENVO_01000335:
        title: understory
        description: An understory is a layer of plant life which grows below the
          canopy without penetrating it.
        is_a: ENVO_01000355
        meaning: 'ENVO:01000335'
      ENVO_01000336:
        title: shrub layer
        description: A shrub layer is a layer of vegetation in a woodland or forest
          consisting of low, woody vegetation of frutescent form.
        is_a: ENVO_01000355
        meaning: 'ENVO:01000336'
      ENVO_01000337:
        title: herb and fern layer
        description: A herb and fern layer is a layer of a forest or woodland which
          is composed of all vascular plant life that are one metre or less in height.
        is_a: ENVO_01000355
        meaning: 'ENVO:01000337'
      ENVO_01000338:
        title: litter layer
        is_a: ENVO_01000355
        meaning: 'ENVO:01000338'
      ENVO_01001242:
        title: canopy
        description: A vegetation layer which is formed by a collection of individual
          plant crowns, themselves constituting part of the aboveground portion of
          a plant community.
        is_a: ENVO_01000355
        meaning: 'ENVO:01001242'
      ENVO_01001274:
        title: material isosurface
        description: A layer throughout which one or more qualities (e.g. pressure,
          temperature, velocity, density) maintain an approximately constant value.
        is_a: ENVO_01000281
        meaning: 'ENVO:01001274'
      ENVO_01001696:
        title: isothermal surface
        description: A material isosurface within which temperature is approximately
          constant.
        is_a: ENVO_01001274
        meaning: 'ENVO:01001696'
      ENVO_01001694:
        title: isohaline surface
        description: A material isosurface within which salinity is approximately
          constant.
        is_a: ENVO_01001274
        meaning: 'ENVO:01001694'
      ENVO_01001695:
        title: isopycnal surface
        description: A material isosurface within which density is approximately constant.
        is_a: ENVO_01001274
        meaning: 'ENVO:01001695'
      ENVO_01001693:
        title: isobaric surface
        description: A material isosurface within which pressure is approximately
          constant.
        is_a: ENVO_01001274
        meaning: 'ENVO:01001693'
      ENVO_01001697:
        title: atmospheric isobaric surface
        description: An isobaric surface that is part of an atmosphere.
        is_a: ENVO_01001693
        meaning: 'ENVO:01001697'
      ENVO_06105266:
        title: soil layer
        description: A layer that is composed primarily of soil.
        is_a: ENVO_01000281
        meaning: 'ENVO:06105266'
      ENVO_03600030:
        title: soil horizon
        description: A soil layer which is parallel to the soil surface and which
          has roughly homogenous physical, chemical and biological properties relative
          to the soil layers above or beneath it.
        is_a: ENVO_06105266
        meaning: 'ENVO:03600030'
      ENVO_03600018:
        title: organic horizon
        description: A soil horizon which is composed primarily of organic matter.
        is_a: ENVO_03600030
        meaning: 'ENVO:03600018'
      ENVO_00003074:
        title: manufactured product
        description: A material entity that has been processed by humans or their
          technology in any way, including intermediate products as well as final
          products.
        is_a: BFO_0000040
        meaning: 'ENVO:00003074'
      ENVO_01001816:
        title: biomaterial containment unit
        description: A manufactured product which has been designed to contain a mass
          of biomaterial.
        is_a: ENVO_00003074
        meaning: 'ENVO:01001816'
      ENVO_00010622:
        title: vivarium
        description: A vivarium is an enclosure for keeping and raising organisms
          for observation or research. Often, a portion of the ecosystem for a particular
          species is simulated on a smaller scale, with controls for environmental
          conditions.
        is_a: ENVO_01001816
        meaning: 'ENVO:00010622'
      ENVO_00000349:
        title: terrarium
        description: A terrarium is a vivarium which simulates a terrestrial environment.
        is_a: ENVO_00010622
        meaning: 'ENVO:00000349'
      ENVO_00002196:
        title: aquarium
        description: An aquarium is a vivarium which simulates the submerged portions
          of an aquatic environment
        is_a: ENVO_00010622
        meaning: 'ENVO:00002196'
      ENVO_00002197:
        title: saline water aquarium
        description: A saline water aquarium is an aquarium which contains saline
          water as its primary ecological medium.
        is_a: ENVO_00002196
        meaning: 'ENVO:00002197'
      ENVO_00002198:
        title: fresh water aquarium
        description: A fresh water aquarium is an aquarium which contains fresh water
          as its primary ecological medium.
        is_a: ENVO_00002196
        meaning: 'ENVO:00002198'
      ENVO_01000619:
        title: closed ecological system
        description: A closed ecological system is a vivarium which does not rely
          on matter exchange with any part outside the system.
        is_a: ENVO_00010622
        meaning: 'ENVO:01000619'
      ENVO_01000620:
        title: mesocosm
        description: A mesocosm is a vivarium that is embedded within a natural environment
          and is used to place a relatively small part of that environment under experimental
          control for the purposes of scientific investigation.
        is_a: ENVO_00010622
        meaning: 'ENVO:01000620'
      ENVO_01000621:
        title: microcosm
        description: A microcosm is a vivarium within which a simple ecosystem is
          artificially established and used to simulate and predict the behaviour
          of natural ecosystems under controlled conditions.
        is_a: ENVO_00010622
        meaning: 'ENVO:01000621'
      ENVO_00002123:
        title: bioreactor
        description: A biomaterial containment unit which is capable of 1) containing
          a mass of environmental material which hosts an active collection of organisms
          and 2) maintaining conditions which are conducive to one or more metabolic
          activities of the organisms it contains.
        is_a: ENVO_01001816
        meaning: 'ENVO:00002123'
      ENVO_00002124:
        title: anaerobic bioreactor
        description: A bioreactor in which the contained material is not oxygenated
          (i.e. void of biologically consequential free oxygen)
        is_a: ENVO_00002123
        meaning: 'ENVO:00002124'
      ENVO_00002125:
        title: anaerobic dechlorinating bioreactor
        description: A device or system that supports a biologically active environment.
          A vessel in which is carried out a chemical process which involves organisms
          or biochemically active substances derived from such organisms. This process
          can either be aerobic or anaerobic.
        is_a: ENVO_00002124
        meaning: 'ENVO:00002125'
      ENVO_00002211:
        title: thermophilic anaerobic methanogenic reactor
        description: An anaerobic biorector which uses elevated temperatures and appropriate
          chemical substrates to support the production of methane by microbial communities.
        is_a: ENVO_00002124
        meaning: 'ENVO:00002211'
      ENVO_00002213:
        title: anaerobic sludge blanket reactor
        description: An anaerobic bioreactor which is capable of treating wastewater
          through the action of methanogenic microbes which form a blanket of sludge
          due to the upward flow in the reactor.
        is_a: ENVO_00002124
        meaning: 'ENVO:00002213'
      ENVO_00002126:
        title: aerobic bioreactor
        description: A bioreactor in which the contained material is well-oxygenated.
        is_a: ENVO_00002123
        meaning: 'ENVO:00002126'
      ENVO_00002210:
        title: aerobic sulfide-oxidizing bioreactor
        description: An aerobic bioreactive which contains microbial communities capable
          of sulfide oxidation.
        is_a: ENVO_00002126
        meaning: 'ENVO:00002210'
      ENVO_00002152:
        title: biofilter
        description: A bioreactor which captures and, through the biological processes
          maintained in the medium it contains, degrades pollutants.
        is_a: ENVO_00002123
        meaning: 'ENVO:00002152'
      ENVO_00002153:
        title: compost biofilter
        description: A biofilter which contains compost and avails of the microbial
          communities within it to degrade pollutants.
        is_a: ENVO_00002152
        meaning: 'ENVO:00002153'
      ENVO_03600010:
        title: membrane bioreactor
        description: A bioreactor which has a membrane as a part
        is_a: ENVO_00002123
        meaning: 'ENVO:03600010'
      ENVO_03600077:
        title: photobioreactor
        description: A bioreactor which utilizes a light source to cultivate phototrophic
          microorganisms.
        is_a: ENVO_00002123
        meaning: 'ENVO:03600077'
      ENVO_01001817:
        title: biomaterial culturing unit
        description: A biomaterial containment unit which is designed to allow the
          growth and propagation of the biomaterial it contains.
        is_a: ENVO_01001816
        meaning: 'ENVO:01001817'
      ENVO_01001818:
        title: enrichment culturing unit
        description: A biomaterial culturing unit which is designed to promote the
          growth of selected cell populations (often at the expense of others) within
          a community by altering the conditions of the environment within its confines.
        is_a: ENVO_01001817
        meaning: 'ENVO:01001818'
      ENVO_01001822:
        title: active enrichment culturing unit
        description: An enrichment culturing unit which contains environmental material
          bearing ecological assemblages undergoing selection through experimentally
          imposed conditions.
        is_a: ENVO_01001818
        meaning: 'ENVO:01001822'
      ENVO_01001825:
        title: active anaerobic enrichment culturing unit
        description: An active enrichment culturing unit which contains environmental
          material maintained under conditions with no free oxygen.
        is_a: ENVO_01001822
        meaning: 'ENVO:01001825'
      ENVO_01001826:
        title: active sulphate-reducing enrichment culturing unit
        description: An active enrichment culturing unit which contains environmental
          material maintained under conditions that favour the reduction of sulphate.
        is_a: ENVO_01001825
        meaning: 'ENVO:01001826'
      ENVO_01001819:
        title: cell culturing unit
        description: A biomaterial culturing unit which is designed to promote the
          growth and propagation of cells in an artificial medium.
        is_a: ENVO_01001817
        meaning: 'ENVO:01001819'
      ENVO_00002183:
        title: oil tank
        description: A manufactured container within which oil or other petrochemical
          products are stored and which these products are usually transported to
          end users or further storage facilities.
        is_a: ENVO_00003074
        meaning: 'ENVO:00002183'
      ENVO_00002874:
        title: air conditioning unit
        description: A manufactuered product which is capable of removing heat and
          controlling the humidity of the air within a site.
        is_a: ENVO_00003074
        meaning: 'ENVO:00002874'
      ENVO_00003893:
        title: cosmetic product
        description: A manufactured product which has been formulated to modifying
          the appearance of external human anatomical parts.
        is_a: ENVO_00003074
        meaning: 'ENVO:00003893'
      ENVO_00003894:
        title: face cream product
        description: A cosmetic product which has been formulated 2) to have a viscous,
          fatty, liquid consistency resembling the fat-rich component of milk and
          2) to be applied to human facial skin to modify its appearance or functioning.
        is_a: ENVO_00003893
        meaning: 'ENVO:00003894'
      ENVO_00003895:
        title: paper product
        description: A product which is composed primarily of paper.
        is_a: ENVO_00003074
        meaning: 'ENVO:00003895'
      ENVO_00003896:
        title: currency note
        description: A paper product which is used as legal tender in economic or
          other monetary trasactions.
        is_a: ENVO_00003895
        meaning: 'ENVO:00003896'
      ENVO_01001887:
        title: letter paper
        description: A paper product which has been manufactured to facilitate the
          writing of letters.
        is_a: ENVO_00003895
        meaning: 'ENVO:01001887'
      ENVO_03501217:
        title: tissue paper
        description: A paper product which is thin translucent paper.
        is_a: ENVO_00003895
        meaning: 'ENVO:03501217'
      ENVO_03501256:
        title: sheet of paper
        description: A paper product which is a thin sheet material made of processed
          cellulose fibres.
        is_a: ENVO_00003895
        meaning: 'ENVO:03501256'
      ENVO_00003968:
        title: air filter
        description: An air filter is a device that removes some substance from air.
        is_a: ENVO_00003074
        meaning: 'ENVO:00003968'
      ENVO_01001120:
        title: animal manure product
        description: A product which is composed primarily of animal manure that has
          been heat treated and packaged as a product for commercial or consumer use.
        is_a: ENVO_00003074
        meaning: 'ENVO:01001120'
      ENVO_00010621:
        title: medical instrument
        description: A manufactured product which has been designed for use in one
          or more medical procedures.
        is_a: ENVO_00003074
        meaning: 'ENVO:00010621'
      ENVO_02000000:
        title: hypodermic needle
        description: A hypodermic needle is a medical instrument made from a hollow
          needle. It is commonly used with a syringe to inject substances into the
          body of an organism.
        is_a: ENVO_00010621
        meaning: 'ENVO:02000000'
      ENVO_01000457:
        title: masonry unit
        description: A masonry unit is a solid piece of material, usually with a regular
          shape, used as a component in the construction of buildings. Masonry units
          are usually composed of brick, stone, marble, granite, travertine, limestone,
          cast stone, concrete block, glass block, stucco, tile, or cob.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000457'
      ENVO_01000456:
        title: concrete masonry unit
        description: A concrete masonry unit is a large, rectangular masonry unit
          primarily composed of concrete.
        is_a: ENVO_01000457
        meaning: 'ENVO:01000456'
      ENVO_01000475:
        title: brick
        description: A brick is a masonry unit which is composed of kneaded clay-bearing
          soil, expanded clay aggregate, sand and lime, or concrete material, fire-hardened
          or air-dried.
        is_a: ENVO_01000457
        meaning: 'ENVO:01000475'
      ENVO_01000501:
        title: burnt brick
        description: A burnt brick is a brick which has been dried at an elvated temperature
          in a kiln, furnace, or with similar technology .
        is_a: ENVO_01000475
        meaning: 'ENVO:01000501'
      ENVO_01000502:
        title: unburnt brick
        description: An unburnt brick is a brick which has been air dried rather than
          dried at an elvated temperature in a kiln, furnace, or with similar technology
          .
        is_a: ENVO_01000475
        meaning: 'ENVO:01000502'
      ENVO_01000507:
        title: iron sheet
        description: An iron sheet is a mass of iron which has been forged into a
          roughly planar form of less than 6 millimetres in thickness.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000507'
      ENVO_01000514:
        title: tile
        description: A tile is a manufactured piece of hard-wearing material such
          as ceramic, stone, metal, or even glass, generally used for covering roofs,
          floors, walls, showers, or other objects such as tabletops. Alternatively,
          tile can sometimes refer to similar units made from lightweight materials
          such as perlite, wood, and mineral wool, typically used for wall and ceiling
          applications.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000514'
      ENVO_01000989:
        title: plumbing fixture
        description: An exchangeable device which can be connected to a plumbing system
          to deliver and drain water.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000989'
      ENVO_01000516:
        title: toilet fixture
        description: A fixture which is used primarily for the collection and, in
          some cases, disposal of human urine and feces.
        is_a: ENVO_01000989
        meaning: 'ENVO:01000516'
      ENVO_01000519:
        title: latrine
        description: A latrine is a toilet which is of simple construction (relative
          to a flush or chemical toilet) and typically intended for communal use.
        is_a: ENVO_01000516
        meaning: 'ENVO:01000519'
      ENVO_01000517:
        title: pit latrine
        description: A pit latrine is a latrine which is constructed by digging a
          hole in the ground.
        is_a: ENVO_01000519
        meaning: 'ENVO:01000517'
      ENVO_01000523:
        title: pit latrine with slab floor
        description: A pit latrine with a slab floor is a pit latrine which has a
          latrine slab as a floor.
        is_a: ENVO_01000517
        meaning: 'ENVO:01000523'
      ENVO_01000530:
        title: ventilated improved pit latrine
        description: "A ventilated improved pit latrine is a pit latrine which includes\
          \ a vent pipe fitted to the pit with a flyscreen covering the pipe's outlet.\
          \ Air currents moving across the outlet of the vent pipe create a vaccum\
          \ which draws odors out of the latrine's superstructure."
        is_a: ENVO_01000517
        meaning: 'ENVO:01000530'
      ENVO_01000535:
        title: pour-flush pit latrine
        description: A pit latrine which includes a water seal (U-trap or siphon)
          used over one or two offset pits instead of a plain hole or seat. Water
          is manually poured through the trap to flush excreta into the latrine pit.
        is_a: ENVO_01000517
        meaning: 'ENVO:01000535'
      ENVO_01000527:
        title: flush toilet fixture
        description: A toilet fixture which uses water to flush liquid and solid excreta
          into a sewage containment or processing facility through a drainpipe.
        is_a: ENVO_01000516
        meaning: 'ENVO:01000527'
      ENVO_01000534:
        title: pour-flush toilet fixture
        description: A flush toilet fixture into which water is manually poured to
          dispose of excreta.
        is_a: ENVO_01000527
        meaning: 'ENVO:01000534'
      ENVO_01000528:
        title: dry toilet fixture
        description: A toilet fixture which uses little to no water; excreta is removed
          manually or composted in situ.
        is_a: ENVO_01000516
        meaning: 'ENVO:01000528'
      ENVO_01000550:
        title: composting toilet
        description: A composting toilet fixture is a dry toilet fixture in which
          managed, aerobic decomposition converts human excreta into organic matter
          suitable for the fertilisation or amendment of soils.
        is_a: ENVO_01000528
        meaning: 'ENVO:01000550'
      ENVO_01000529:
        title: chemical toilet fixture
        description: A chemical toilet fixture is a toilet fixture which uses chemicals
          to deodorise and treat excreta which is stored in the fixture.
        is_a: ENVO_01000516
        meaning: 'ENVO:01000529'
      ENVO_01000990:
        title: sink fixture
        description: A plumbing fixture which is bowl-shaped and used for washing
          hands, dishwashing, and other purposes.
        is_a: ENVO_01000989
        meaning: 'ENVO:01000990'
      ENVO_01000991:
        title: bathtub fixture
        description: A plumbing fixture which may serve as a container for water in
          which humans or other animals may bathe.
        is_a: ENVO_01000989
        meaning: 'ENVO:01000991'
      ENVO_01000992:
        title: shower fixture
        description: A plumbing fixture within which a human or other animal may bathe
          under a spray of water.
        is_a: ENVO_01000989
        meaning: 'ENVO:01000992'
      ENVO_03501218:
        title: toilet bowl
        description: A plumbing fixture which is bowl-shaped, part of a toilet fixture,
          and capable of contain human waste until it is disposed of.
        is_a: ENVO_01000989
        meaning: 'ENVO:03501218'
      ENVO_01000520:
        title: latrine slab
        description: A latrine slab is a  broad, flat, thick piece of solid material
          (typically stone or concrete) used as the floor of a latrine and which includes
          a hole through which excreta are deposited into a latrine pit.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000520'
      ENVO_01000566:
        title: lamp
        description: A lamp is an object which generates heat, light, or any other
          form of radiation.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000566'
      ENVO_01000561:
        title: paraffin lamp
        description: A paraffin lamp is a type of lighting device which burns paraffin
          to generate light and heat.
        is_a: ENVO_01000566
        meaning: 'ENVO:01000561'
      ENVO_01000562:
        title: flat-wick lamp
        description: A flat-wick lamp is a simple type of paraffin lamp, which burns
          paraffin drawn up through a wick by capillary action.
        is_a: ENVO_01000561
        meaning: 'ENVO:01000562'
      ENVO_01000563:
        title: central-draught lamp
        description: A central-draught lamp is a paraffin lamp which burns a parrafin
          saturated, tubular wick contained between two structural tubes and supplied
          with oxygen by a central draught of air through the innermost of these tube.
        is_a: ENVO_01000561
        meaning: 'ENVO:01000563'
      ENVO_01000564:
        title: mantle lamp
        description: A mantle lamp is a central-draught lamp which includes a pear-shaped,
          fabric mesh containing thorium or other rare-earth salts placed over the
          burner. On first use the fabric burns away and the rare-earth salts are
          converted to oxides, leaving a very fragile structure which incandesces
          (glows brightly) upon exposure to the heat of the burner flame.
        is_a: ENVO_01000563
        meaning: 'ENVO:01000564'
      ENVO_01000572:
        title: electric lamp
        description: An electric lamp is a lamp which produces light from electricity.
        is_a: ENVO_01000566
        meaning: 'ENVO:01000572'
      ENVO_01000573:
        title: battery-powered electric lamp
        description: A battery-powered electric lamp is an electric lamp which draws
          its power from a device composed of two or more electrochemical cells that
          convert stored chemical energy into electrical energy.
        is_a: ENVO_01000572
        meaning: 'ENVO:01000573'
      ENVO_01000574:
        title: candle
        description: A candle is a lamp composed of a wax within which an ignitable
          wick is embedded.
        is_a: ENVO_01000566
        meaning: 'ENVO:01000574'
      ENVO_01000597:
        title: pressure lamp
        description: A pressure lamp is a portable paraffin or oil lamp in which fuel
          is forced up into the mantle or burner by air pressure in the reservoir,
          which can be increased by pumping with a plunger.
        is_a: ENVO_01000566
        meaning: 'ENVO:01000597'
      ENVO_01000565:
        title: lantern
        description: A lantern is a portable device or mounted fixture comprising
          a light source protected by a translucent case.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000565'
      ENVO_01000567:
        title: paraffin lantern
        description: A paraffin lantern is a lantern which houses a parrafin lamp
          in a structure of soldered or crimped-together sheet metal stampings and
          glass or other translucent material.
        is_a: ENVO_01000565
        meaning: 'ENVO:01000567'
      ENVO_01000568:
        title: tubular paraffin lantern
        description: A tubular paraffin lantern is a paraffin lantern which includes
          metal tubes in its casing that direct air to the burning wick.
        is_a: ENVO_01000567
        meaning: 'ENVO:01000568'
      ENVO_01000570:
        title: hot-blast paraffin lantern
        description: A hot-blast paraffin lantern is a tubular paraffin lantern which
          collects hot air from the top of the lantern globe and circulates it, through
          metal tubes, to the burning wick.
        is_a: ENVO_01000568
        meaning: 'ENVO:01000570'
      ENVO_01000571:
        title: cold-blast paraffin lantern
        description: A cold-blast paraffin lantern is a tubular paraffin lantern which
          collects cool air from around the top of the lantern globe and circulates
          it, through metal tubes, to the burning wick.
        is_a: ENVO_01000568
        meaning: 'ENVO:01000571'
      ENVO_01000569:
        title: dead flame paraffin lantern
        description: A dead-flame paraffin lantern is a paraffin lantern which has
          a wick housed in a glass globe with airflow channelled upwards by vents
          below the burning wick and an open chimney above it.
        is_a: ENVO_01000567
        meaning: 'ENVO:01000569'
      ENVO_01000577:
        title: radio device
        description: A device capable of receiving and/or transmitting information
          encoded in electromagnetic radiation through wave modulation.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000577'
      ENVO_01000578:
        title: cassette player
        description: A cassette deck is a device capable of playing and recording
          audio compact cassettes.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000578'
      ENVO_01000579:
        title: television set
        description: A television set is a device that combines a tuner, display,
          and loudspeakers for the purpose of converting digital or analog information
          signals into moving images and sound.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000579'
      ENVO_01000580:
        title: telephone
        description: A telephone is a telecommunications device which converts sound
          into electronic signals suitable for transmission via cables or other transmission
          media, and reconverts such signals into sound waves.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000580'
      ENVO_01000581:
        title: mobile phone
        description: A mobile phone is a telephone which transmits sound information
          to a mobile phone network via radio transmissions.
        is_a: ENVO_01000580
        meaning: 'ENVO:01000581'
      ENVO_01000582:
        title: landline telephone
        description: A landline telephone is a telephone which is connected to a telephone
          network with wires through which electronic signals are carried.
        is_a: ENVO_01000580
        meaning: 'ENVO:01000582'
      ENVO_01000583:
        title: refrigerator
        description: A refrigerator is a device which consists of a thermally insulated
          compartment and a mechanical, chemical, or electronic heat pump that transfers
          heat from the inside of the fridge to its external environment such that
          the inside of the fridge is cooled to a temperature below the ambient temperature
          of the room
        is_a: ENVO_00003074
        meaning: 'ENVO:01000583'
      ENVO_01000587:
        title: piece of furniture
        description: A piece of furniture is a movable object intended to support
          various human activities such as seating (e.g., chairs, stools and sofas)
          and sleeping (e.g., beds).
        is_a: ENVO_00003074
        meaning: 'ENVO:01000587'
      ENVO_01000584:
        title: table
        description: A table is a form of furniture with a flat horizontal upper surface
          used to support objects, for storage, show, and/or manipulation.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000584'
      ENVO_01000585:
        title: desk
        description: A desk is a table which is intended for information-manipulation
          tasks, including writing and use of interactive electronics.
        is_a: ENVO_01000584
        meaning: 'ENVO:01000585'
      ENVO_01000586:
        title: chair
        description: A chair is a piece of furniture with a raised surface commonly
          used to seat a single person.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000586'
      ENVO_01000589:
        title: bench
        description: A bench is a piece of furniture, on which several people may
          sit at the same time.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000589'
      ENVO_01000588:
        title: sofa
        description: A sofa is a bench which is partially or entirely upholstered,
          and often fitted with springs and tailored cushions.
        is_a: ENVO_01000589
        meaning: 'ENVO:01000588'
      ENVO_01000590:
        title: mattress
        description: A mattress is a mass of material which is able to cushion and
          support a reclining body and is used as or on a bed.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000590'
      ENVO_01000591:
        title: bed frame
        description: A bed frame is a piece of furniture which is used to position
          a mattress and bed base and may include a means of supporting a canopy.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000591'
      ENVO_01000592:
        title: bed base
        description: A bed base is a piece of furniture which supports a mattress.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000592'
      ENVO_01000593:
        title: framed bed
        description: A framed bed is a piece of furniture which is composed of a mattress
          supported by a bed base and held in place by a bed frame.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000593'
      ENVO_01000594:
        title: cabinet
        description: A cabinet is a roughly cuboidal piece of furniture which is used
          to store miscellaneous items in compartments accessible through doors or
          drawers.
        is_a: ENVO_01000587
        meaning: 'ENVO:01000594'
      ENVO_01000595:
        title: cupboard
        description: A cupboard is a cabinet which is used indoors to store household
          objects such as food, crockery, textiles and liquor, and to protect them
          from dust and dirt
        is_a: ENVO_01000594
        meaning: 'ENVO:01000595'
      ENVO_01000596:
        title: clock
        description: A clock is an instrument which may indicate, keep, and/or co-ordinate
          time.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000596'
      ENVO_01000610:
        title: motor
        description: A motor is a machine designed to convert one or more forms of
          energy into mechanical energy.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000610'
      ENVO_01000604:
        title: vehicle
        description: A vehicle is a mobile machine which transports people or cargo.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000604'
      ENVO_01000601:
        title: motor vehicle
        description: A motor vehicle is a vehicle which is propelled by an engine
          or motor and that does not operate on rails.
        is_a: ENVO_01000604
        meaning: 'ENVO:01000601'
      ENVO_01000602:
        title: truck
        description: A truck is a motor vehicle which, as its primary funcion, transports
          cargo rather than human passangers.
        is_a: ENVO_01000601
        meaning: 'ENVO:01000602'
      ENVO_01000603:
        title: water truck
        description: A water truck is a truck which transports water.
        is_a: ENVO_01000602
        meaning: 'ENVO:01000603'
      ENVO_01000971:
        title: food truck
        description: A truck which is equipped to cook and sell food.
        is_a: ENVO_01000602
        meaning: 'ENVO:01000971'
      ENVO_01000605:
        title: car
        description: A car is a wheeled motor vehicle used primarily for the transportation
          of human passengers. Most definitions of the term specify that cars are
          designed to run primarily on roads, to have seating for one to eight people,
          to typically have four wheels, and to be constructed principally for the
          transport of people rather than goods.
        is_a: ENVO_01000601
        meaning: 'ENVO:01000605'
      ENVO_01000612:
        title: taxicab
        description: A taxicab is a car which may be hired, along with its operator,
          to transport passengers between locations of their choosing.
        is_a: ENVO_01000605
        meaning: 'ENVO:01000612'
      ENVO_01000609:
        title: motor boat
        description: A motor boat is a boat which is propelled by a motor.
        is_a: ENVO_01000601
        meaning: 'ENVO:01000609'
      ENVO_01000611:
        title: bus
        description: A bus is a road vehicle designed to carry many passengers.
        is_a: ENVO_01000601
        meaning: 'ENVO:01000611'
      ENVO_03501112:
        title: public bus
        description: A bus which is part of public infrastructure.
        is_a: ENVO_01000611
        meaning: 'ENVO:03501112'
      ENVO_01000615:
        title: motorcycle
        description: A motorcycle is a two- or three-wheeled motor vehicle.
        is_a: ENVO_01000601
        meaning: 'ENVO:01000615'
      ENVO_01000616:
        title: motorscooter
        description: "A scooter or motor scooter is a motorcycle with step-through\
          \ frame and a platform for the rider's feet."
        is_a: ENVO_01000615
        meaning: 'ENVO:01000616'
      ENVO_03501103:
        title: ambulance
        description: A motor vehicle which is equipped with medical equipment and
          can be used to transport humans to treatment facilities.
        is_a: ENVO_01000601
        meaning: 'ENVO:03501103'
      ENVO_03501157:
        title: mobile intensive care ambulance
        description: An ambulance which is equiped to enable intensive care service
          provision.
        is_a: ENVO_03501103
        meaning: 'ENVO:03501157'
      ENVO_01000606:
        title: cart
        description: A cart is a vehicle which has two wheels and is designed to transport
          human passengers or cargo.
        is_a: ENVO_01000604
        meaning: 'ENVO:01000606'
      ENVO_01000607:
        title: animal-drawn cart
        description: An animal-drawn cart is a cart which is attached to one or more
          working or draught animals.
        is_a: ENVO_01000606
        meaning: 'ENVO:01000607'
      ENVO_01000613:
        title: watercraft
        description: A watercraft is a vehicle which is able to travel on or through
          water.
        is_a: ENVO_01000604
        meaning: 'ENVO:01000613'
      ENVO_01000608:
        title: boat
        description: A boat is a watercraft of any size which is able to float or
          plane on water.
        is_a: ENVO_01000613
        meaning: 'ENVO:01000608'
      ENVO_03501104:
        title: recreational cruise ship
        description: A boat which provides short-term residential and entertainment
          facilities to passengers.
        is_a: ENVO_01000608
        meaning: 'ENVO:03501104'
      ENVO_03501325:
        title: transport boat
        description: A boat which is used to transport cargo or carry passengers.
        is_a: ENVO_01000608
        meaning: 'ENVO:03501325'
      ENVO_03501105:
        title: merchant vessel
        description: A transport boat which can be hired.
        is_a: ENVO_03501325
        meaning: 'ENVO:03501105'
      ENVO_03501100:
        title: ferry
        description: A merchant vessel which is used to carry passengers, vehicles,
          or cargo across a body of water.
        is_a: ENVO_03501105
        meaning: 'ENVO:03501100'
      ENVO_03501113:
        title: public ferry
        description: A ferry which is owned by a government or other form of public
          representation.
        is_a: ENVO_03501100
        meaning: 'ENVO:03501113'
      ENVO_01000614:
        title: bicycle
        description: A bicycle is a human-powered, pedal-driven, single-track vehicle,
          having two wheels attached to a frame, one behind the other.
        is_a: ENVO_01000604
        meaning: 'ENVO:01000614'
      ENVO_01001488:
        title: aircraft
        description: A vehicle which is able to travel through air in an atmosphere.
        is_a: ENVO_01000604
        meaning: 'ENVO:01001488'
      ENVO_03501349:
        title: airplane
        description: An aircraft which 1) has fixed wings and 2) is propelled by a
          thrust from a jet engine, propeller, or rocket engine.
        is_a: ENVO_01001488
        meaning: 'ENVO:03501349'
      ENVO_01003000:
        title: spacecraft
        description: A vehicle designed to fly in outer space.
        is_a: ENVO_01000604
        meaning: 'ENVO:01003000'
      ENVO_03600050:
        title: space station
        description: A spacecraft which is capable of supporting a human crew in orbit
          for an extended period of time.
        is_a: ENVO_01003000
        meaning: 'ENVO:03600050'
      ENVO_03501107:
        title: train
        description: A vehicle which locomotes using rails and consists of a series
          of connected compartments used to transport passengers or cargo.
        is_a: ENVO_01000604
        meaning: 'ENVO:03501107'
      ENVO_03501108:
        title: passenger train
        description: A train which is capable of and used for passenger transport.
        is_a: ENVO_03501107
        meaning: 'ENVO:03501108'
      ENVO_03501114:
        title: public train
        description: A train which is owned by a government or other form of public
          representation.
        is_a: ENVO_03501107
        meaning: 'ENVO:03501114'
      ENVO_03600051:
        title: train car
        description: A vehicle which is used for carrying cargo or passengers on a
          rail transport system.
        is_a: ENVO_01000604
        meaning: 'ENVO:03600051'
      ENVO_01000625:
        title: manufactured cage
        description: A manufactured structure made of interspaced structural elements
          such as metal or wooden bars or wires held together such that they may be
          used to confine, contain, or protect something.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000625'
      ENVO_01000922:
        title: animal cage
        description: A manufactured cage which may be used to confine, contain, or
          protect an animal.
        is_a: ENVO_01000625
        meaning: 'ENVO:01000922'
      ENVO_01000865:
        title: electric power system
        description: An electric power system is a network of electrical components
          used to supply, transfer and use electric power.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000865'
      ENVO_01000866:
        title: photovoltaic system
        description: A photovoltaic system is a power system designed to supply usable
          solar power by means of photovoltaics. It consists of an arrangement of
          several components, including solar panels to absorb and convert sunlight
          into electricity, a solar inverter to change the electric current from DC
          to AC, as well as mounting, cabling and other electrical accessories to
          set up a working system.
        is_a: ENVO_01000865
        meaning: 'ENVO:01000866'
      ENVO_01000867:
        title: solar panel array
        description: A group of solar panels, typically belonging to the same photovoltaic
          system, arranged to maximise interception of solar radiation.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000867'
      ENVO_01000873:
        title: ballast tank
        description: A ballast tank is a compartment within a boat, ship or other
          floating structure that holds water, which is used as ballast to provide
          stability for a vessel.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000873'
      ENVO_01000911:
        title: automated teller machine
        description: An electronic telecommunications device that enables the customers
          of a financial institution to perform financial transactions, particularly
          cash withdrawal, without the need for a human cashier, clerk or bank teller.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000911'
      ENVO_01000938:
        title: hot tub
        description: A manufactured product which may hold a volume of heated water
          suitable for one or more humans to bathe in, usually for the purposes of
          hydrotherapy or pleasure.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000938'
      ENVO_01000975:
        title: animal trap
        description: A manufactured product which is designed to catch and hold animals.
        is_a: ENVO_00003074
        meaning: 'ENVO:01000975'
      ENVO_01000976:
        title: pitfall trap
        description: An animal trap which consists of a container set flush with the
          ground such that animals moving along the ground may fall in and be available
          for examination or collection.
        is_a: ENVO_01000975
        meaning: 'ENVO:01000976'
      ENVO_01000977:
        title: dry pitfall trap
        description: A pitfall trap in which a glass, plastic, or metal container
          devoid of accumulations of any liquid is used to contain any animal that
          falls inside.
        is_a: ENVO_01000976
        meaning: 'ENVO:01000977'
      ENVO_01000978:
        title: wet pitfall trap
        description: A pitfall trap in which the container used to hold trapped animals
          is filled with a liquid solution formulated to hold, kill, and preserve
          any animal or animals which falls within it.
        is_a: ENVO_01000976
        meaning: 'ENVO:01000978'
      ENVO_02000001:
        title: textile
        description: A textile is a manufactured product comprised of a network of
          natural or artificial fibers (often referred to as thread or yarn).
        is_a: ENVO_00003074
        meaning: 'ENVO:02000001'
      ENVO_02000002:
        title: bedclothing
        description: Bedclothing is a textile covering used on a bed as a sheet, blanket,
          or pillowcase.
        is_a: ENVO_02000001
        meaning: 'ENVO:02000002'
      ENVO_02000058:
        title: cloth
        description: A textile comprised of a pliable material made usually by weaving,
          felting, or knitting natural or synthetic fibers and filaments.
        is_a: ENVO_02000001
        meaning: 'ENVO:02000058'
      ENVO_02000043:
        title: biological product
        description: A biological product is an environmental substrate comprised
          of any virus, therapeutic serum, toxin, antitoxin, or analogous product
          available to prevent, treat or cure diseases or injuries in man.
        is_a: ENVO_00003074
        meaning: 'ENVO:02000043'
      ENVO_02000052:
        title: umbrella
        description: A canopy designed to protect against precipitation or sunlight.
        is_a: ENVO_00003074
        meaning: 'ENVO:02000052'
      ENVO_03501208:
        title: air vent
        description: A manufactured product consisting of a duct opening which allows
          air to circulate.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501208'
      ENVO_03501210:
        title: control panel
        description: A manufactured product consisting of a panel on which control
          or monitoring instruments are set.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501210'
      ENVO_03501211:
        title: door handle
        description: A manufactured product consisting of a handle used to open or
          close a door.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501211'
      ENVO_03501214:
        title: locker
        description: A manufactured product which is a storage compartment with a
          lock.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501214'
      ENVO_03501219:
        title: window
        description: A manufactured product which is composed of one or more glass
          or other transparent or semi-transparent materials set inside a frame, and
          installed in wall, door, roof or vehicle surfaces to allow the passage of
          light, and sometimes air.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501219'
      ENVO_03501220:
        title: door
        description: A manufactured product which is composed of a hinged, sliding,
          or revolving barrier which is installed at the entrance to a building, room,
          vehicle, or in the framework of a cabinet.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501220'
      ENVO_03501251:
        title: vacuum cleaner
        description: A device that causes suction in order to remove debris from surfaces.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501251'
      ENVO_03501254:
        title: water tank
        description: A container for storing water.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501254'
      ENVO_03501260:
        title: sewing table
        description: A manufactured product consisting of a table or desk used for
          sewing.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501260'
      ENVO_03501261:
        title: wheel
        description: A manufactured product consisting of a  disk-shaped material
          that rotates around an axle bearing placed through a hole in its center.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501261'
      ENVO_03501262:
        title: tray
        description: A manufactured product consisting of a  shallow platform designed
          for the carrying of items.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501262'
      ENVO_03501263:
        title: hand tool
        description: A manufactured product which has been designed to 1) allow a
          human to do work more efficiently and 2) be used in a hand-held fashion.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501263'
      ENVO_03501264:
        title: squeegee
        description: A tool with a flat, smooth rubber blade, used to remove or control
          the flow of liquid on a flat surface.
        is_a: ENVO_03501263
        meaning: 'ENVO:03501264'
      ENVO_03501267:
        title: peeler
        description: A hand tool used to remove the outer layer of vegetables and
          fruit, consisting of a handle attached to a metal blade with a slot with
          a sharp edge.
        is_a: ENVO_03501263
        meaning: 'ENVO:03501267'
      ENVO_03501289:
        title: wrench
        description: A hand tool for making rotational adjustments.
        is_a: ENVO_03501263
        meaning: 'ENVO:03501289'
      ENVO_03501327:
        title: utensil
        description: A hand tool for domestic use, especially in the kitchen.
        is_a: ENVO_03501263
        meaning: 'ENVO:03501327'
      ENVO_03501330:
        title: cup
        description: A utensil which is a hand-sized container with an open top.
        is_a: ENVO_03501327
        meaning: 'ENVO:03501330'
      ENVO_03501353:
        title: eating utensil
        description: A utensil used for consuming food.
        is_a: ENVO_03501327
        meaning: 'ENVO:03501353'
      ENVO_03501328:
        title: fork
        description: An eating utensil with spikes used to put solid food into the
          mouth, or to hold food down while cutting.
        is_a: ENVO_03501353
        meaning: 'ENVO:03501328'
      ENVO_03501329:
        title: spoon
        description: An eating utensil with a scooped end and a long handle.
        is_a: ENVO_03501353
        meaning: 'ENVO:03501329'
      ENVO_03501346:
        title: chopstick
        description: An eating utensil which is a thin stick used in equal length
          pairs to manipulate food and bring it into a mouth.
        is_a: ENVO_03501353
        meaning: 'ENVO:03501346'
      ENVO_03501266:
        title: pump
        description: A device that moves fluids (liquids or gases), or sometimes slurries,
          by mechanical action.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501266'
      ENVO_03501268:
        title: pallet
        description: A manufactured product which is a flat transport structure that
          supports goods in a stable fashion while being lifted and/or moved.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501268'
      ENVO_03501269:
        title: packaging machine
        description: A device used in packaging operations.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501269'
      ENVO_03501283:
        title: conveyor belt
        description: A device consisting of a continuous flexible band moved by a
          series of rollers to transport objects or material from one place to another.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501283'
      ENVO_03501284:
        title: dryer
        description: A device designed to remove water or humidity.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501284'
      ENVO_03501285:
        title: clothes dryer
        description: A dryer that is used to remove moisture from textiles.
        is_a: ENVO_03501284
        meaning: 'ENVO:03501285'
      ENVO_03501291:
        title: broiler
        description: A part of an oven or a small stove used to broil food.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501291'
      ENVO_03501292:
        title: tote bin
        description: A portable, box-type industrial storage product used for the
          storage and handling or parts and materials, that may collapse to conserve
          space when not in use.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501292'
      ENVO_03501293:
        title: tote bag
        description: A large bag with parallel handles that emerge from the sides
          of its pouch.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501293'
      ENVO_03501298:
        title: stable bandage
        description: A bandage wrap used on the lower legs of a horse.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501298'
      ENVO_03501310:
        title: switch
        description: A device which can connect, disconnect, or divert current in
          an electrical circuit.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501310'
      ENVO_03501213:
        title: light switch
        description: A switch which turns a light on or off.
        is_a: ENVO_03501310
        meaning: 'ENVO:03501213'
      ENVO_03501215:
        title: nurse call button
        description: A switch which allows patients in health care settings to alert
          a nurse or other health care staff member.
        is_a: ENVO_03501310
        meaning: 'ENVO:03501215'
      ENVO_03501326:
        title: bottle
        description: A container which is typically made of glass or plastic and having
          a tapered neck, used primarily for holding liquids.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501326'
      ENVO_03501354:
        title: steel
        description: A manufactured product which is an alloy of iron and which typically
          contains a few tenths of a percent of carbon.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501354'
      ENVO_03501216:
        title: stainless steel
        description: Steel which is composed primarily of a corrosion resistant alloy
          of iron and chromium.
        is_a: ENVO_03501354
        meaning: 'ENVO:03501216'
      ENVO_03501357:
        title: manufacturing equipment
        description: A manufactured product which is capable of some manufacturing
          process.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501357'
      ENVO_03501364:
        title: packaging equipment
        description: A manufacturing equipment piece which is used to package material.
        is_a: ENVO_03501357
        meaning: 'ENVO:03501364'
      ENVO_03501359:
        title: equipment frame
        description: A manufactured product which is a structural system on which
          equipment components are mounted.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501359'
      ENVO_03501360:
        title: equipment leg
        description: A manufactured product which positions a piece of equipment above
          a surface.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501360'
      ENVO_03501363:
        title: conveyor belt component
        description: A manufactured product which is 1) an endless belt of flexible
          material stretched between two drums; 2) conveys material between drum locations.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501363'
      ENVO_03501368:
        title: conveyor roller
        description: A manufactured product which is a cylindrical (or approximately
          cylindrical) item used under a heavy object to facilitate moving it.
        is_a: ENVO_00003074
        meaning: 'ENVO:03501368'
      ENVO_03510002:
        title: automatic transmission fluid
        description: Fluid used for valve operation, brake band friction, and gear
          lubrication within an automatic vehicle transmission.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510002'
      ENVO_03510004:
        title: hydraulic fluid
        description: A medium by which power is transferred in hydraulic machinery.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510004'
      ENVO_03510001:
        title: brake fluid
        description: A hydraulic fluid which is 1) used in hydraulic brake and hydraulic
          clutch applications in vehicles to amplify braking force and 2) composed
          primarily of ethylene glycol, polyglycols, silicone fluids, and isobutyl
          alcohol.
        is_a: ENVO_03510004
        meaning: 'ENVO:03510001'
      ENVO_03510005:
        title: motor oil
        description: A lubricant for internal combustion engines which 1) reduces
          friction and wear 2) cleans the engine 3) neutralizes acids 4) improves
          sealing of piston rings, and 5) cools the engine.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510005'
      ENVO_03510010:
        title: dye
        description: A coloured substance that chemically bonds to the substrate to
          which it is being applied
        is_a: ENVO_00003074
        meaning: 'ENVO:03510010'
      ENVO_03510011:
        title: leather dye
        description: Pigments carried by solvents or water which are applied to leather
          to be absorbed into the pores of the leather to deposit coloration.
        is_a: ENVO_03510010
        meaning: 'ENVO:03510011'
      ENVO_03510012:
        title: paper dye
        description: Dyes used for the coloration or brightening of paper.
        is_a: ENVO_03510010
        meaning: 'ENVO:03510012'
      ENVO_03510013:
        title: textile dye
        description: Dyes utilized for coloring textiles such as wool or cellulose
          fibers.
        is_a: ENVO_03510010
        meaning: 'ENVO:03510013'
      ENVO_03510014:
        title: India ink
        description: A black or colored ink which is 1) used for writing, printing,
          and drawing and 2) made from fine soot (lampblack) and water.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510014'
      ENVO_03510017:
        title: fountain pen ink
        description: Water based ink intended for use with fountain ink pens.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510017'
      ENVO_03510021:
        title: varnish
        description: A clear transparent hard protective film or finish, primarily
          used for wood finishing applications.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510021'
      ENVO_03510022:
        title: resin (gum) varnish
        description: A varnish containing a natural, plant- or insect-derived substance
          dissolved in a solvent, called spirit varnish or solvent varnish.
        is_a: ENVO_03510021
        meaning: 'ENVO:03510022'
      ENVO_03510030:
        title: vitreous enamel
        description: A smooth, durable vitreous coating which is made by fusing powdered
          glass to a substrate.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510030'
      ENVO_03510034:
        title: turpentine
        description: A fluid obtained by the distillation of resin harvested from
          living trees, primarily used as a solvent.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510034'
      ENVO_03510035:
        title: naphtha
        description: A flammable liquid hydrocarbon mixture produced from natural
          gas condensates, petroleum distillates, and the distillation of coal tar
          and peat.
        is_a: ENVO_00003074
        meaning: 'ENVO:03510035'
      ENVO_03600005:
        title: electrical switch
        description: A manufactured product which is capable of connecting or disconnecting
          the conducting path in an electrical circuit, interrupting the electric
          current or diverting it from one conductor to another.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600005'
      ENVO_03600022:
        title: vinasse
        description: A manufactured product which is formed as a liquid byproduct
          generated during the rectification and distillation of ethanol.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600022'
      ENVO_03600019:
        title: sugarcane vinasse
        description: Vinasse which is produced during the rectification and distillation
          of ethanol from sugar cane.
        is_a: ENVO_03600022
        meaning: 'ENVO:03600019'
      ENVO_03600040:
        title: fermentation starter
        description: A manufactured product which assists starting a fermentation
          process which is intended to prepare foods and alcoholic drinks.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600040'
      ENVO_03600045:
        title: plant pot
        description: A manufactured product which is designed to function as a container
          for growing plants.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600045'
      ENVO_03600046:
        title: processed tobacco
        description: A manufactured product which is produced by curing, subsequent
          aging, slow oxidation and degradation of carotenoids in tobacco leaves.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600046'
      ENVO_03600049:
        title: smokeless tobacco
        description: Processed tobacco which has been treated for use by placing it
          between the gum and cheek or lip, chewed, or sniffed, but not smoked.
        is_a: ENVO_03600046
        meaning: 'ENVO:03600049'
      ENVO_03600048:
        title: shower curtain
        description: A manufactured product which is composed of flexible material
          and is intended to be hung such that it impedes the spray of water between
          a shower fixture and the rest of a room.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600048'
      ENVO_03600052:
        title: water tap
        description: A manufactured product which is controls the flow of water.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600052'
      ENVO_03600060:
        title: touchscreen
        description: A manufactured product which is used to give input or control
          to an information processing system by touching a display screen with a
          special stylus or one or more fingers.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600060'
      ENVO_03600079:
        title: shredder
        description: A manufactured product which is used for cutting crops, vegetables,
          wood, metal, paper documents, etc into small pieces.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600079'
      ENVO_03600085:
        title: buoy
        description: A manufactured product which floats in water and can be used
          a navigational marker among other purposes.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600085'
      ENVO_03600086:
        title: water filter
        description: A manufactured product which is used to remove contaminants from
          water impeding the flow of particles or solutes.
        is_a: ENVO_00003074
        meaning: 'ENVO:03600086'
      ENVO_2000000:
        title: chemical product
        description: A manufactured product that is some mixture of chemicals created
          through some chemical engineering process
        is_a: ENVO_00003074
        meaning: 'ENVO:2000000'
      ENVO_2000001:
        title: creosote
        description: The portion of chemical products obtained by the distillation
          of a tar that remains heavier than water, notably useful for its anti-septic
          and preservative properties
        is_a: ENVO_2000000
        meaning: 'ENVO:2000001'
      ENVO_03510019:
        title: cleaning agent
        description: A liquid, powder, spray, or granule used to remove dirt, including
          dust, stains, bad smells, and clutter on surfaces.
        is_a: ENVO_2000000
        meaning: 'ENVO:03510019'
      ENVO_03510020:
        title: degreaser
        description: A cleaning agent which 1) contains organic solvents and 2) dissolves
          oils and fats for the removal of grease.
        is_a: ENVO_03510019
        meaning: 'ENVO:03510020'
      ENVO_03510024:
        title: lacquer
        description: A category of hard and potentially shiny (clear or colored) finishes
          which can be applied to materials including wood or metal.
        is_a: ENVO_2000000
        meaning: 'ENVO:03510024'
      ENVO_03510025:
        title: paint thinner
        description: 'A solvent that can dissolve paint and reduce viscosity of paint
          or "thin" it.'
        is_a: ENVO_2000000
        meaning: 'ENVO:03510025'
      ENVO_03510026:
        title: acrylic paint medium
        description: A liquid, gel, or paste that can be mixed into acrylic paint
          to alter paint consistency and properties.
        is_a: ENVO_03510025
        meaning: 'ENVO:03510026'
      ENVO_03510027:
        title: enamel thinner
        description: A paint thinner specific for altering the viscosity of enamel
          paints.
        is_a: ENVO_03510025
        meaning: 'ENVO:03510027'
      ENVO_03510028:
        title: oil paint thinner
        description: A solvent used to thin oil-based paints or clean up after their
          use.
        is_a: ENVO_03510025
        meaning: 'ENVO:03510028'
      ENVO_03510040:
        title: stain
        description: A preparation with dye or pigment used to deposit coloration
          to a substrate.
        is_a: ENVO_2000000
        meaning: 'ENVO:03510040'
      ENVO_03510041:
        title: wood stain
        description: A stain which has colorants dissolved and/or suspended in a vehicle
          or solvent, used to add color to wood.
        is_a: ENVO_03510040
        meaning: 'ENVO:03510041'
      ENVO_06105115:
        title: fishing gear
        description: A manufactured product which is used for fishing.
        is_a: ENVO_00003074
        meaning: 'ENVO:06105115'
      ENVO_06105117:
        title: abandoned fishing gear
        description: Fishing gear which is not under the control of or maintained
          by its custodian.
        is_a: ENVO_06105115
        meaning: 'ENVO:06105117'
      ENVO_06105116:
        title: discarded fishing gear
        description: Abandoned fishing gear which was intentionally left unmaintained
          and uncontrolled by its custodian.
        is_a: ENVO_06105117
        meaning: 'ENVO:06105116'
      ENVO_06105118:
        title: lost fishing gear
        description: Abandoned fishing gear which was unintentionally left unmaintained
          and uncontrolled by its custodian.
        is_a: ENVO_06105117
        meaning: 'ENVO:06105118'
      OBI_0000968:
        title: device
        description: A material entity that is designed to perform a function in a
          scientific investigation, but is not a reagent.
        is_a: ENVO_00003074
        meaning: 'OBI:0000968'
      OBI_0000967:
        title: container
        description: A device that can be used to restrict the location of material
          entities over time
        is_a: OBI_0000968
        meaning: 'OBI:0000967'
      PO_0025131:
        title: plant anatomical entity
        description: An anatomical entity that is or was part of a plant.
        is_a: BFO_0000040
        meaning: 'PO:0025131'
      PO_0025161:
        title: portion of plant substance
        description: A portion of organism substance that is or was part of a plant.
        is_a: PO_0025131
        meaning: 'PO:0025161'
      PO_0000022:
        title: plant cuticle
        description: A portion of plant substance (PO:0025161) composed of cutin (PO:0025385),
          a polyester matrix of hydroxy- and hydroxy epoxy fatty acids C16 and C18
          chains, embedded and overlayed with cuticular wax (PO:0025386) and forming
          a layer on the surface of a plant epidermis (PO:0005679).
        is_a: PO_0025161
        meaning: 'PO:0000022'
      PO_0025385:
        title: cutin
        description: A portion of plant substance (PO:0025161) that is the inner layer
          of a plant cuticle (PO:0000022), and is composed of a polyester matrix of
          hydroxy- and hydroxy epoxy fatty acid C16 and C18 chains.
        is_a: PO_0025161
        meaning: 'PO:0025385'
      PO_0025387:
        title: plant cuticle proper
        description: A portion of plant substance (PO:0025161) that is the inner layer
          of a plant cuticle (PO:0000022), composed primarily of cutin (PO:0025385),
          embedded and overlayed with cuticular wax (PO:0025386).
        is_a: PO_0025161
        meaning: 'PO:0025387'
      PO_0025386:
        title: cuticular wax
        description: A portion of plant substance (PO:0025161) comprised predominantly
          of very long chain aliphatic lipids and is part of a plant cuticle (PO:0000022).
        is_a: PO_0025161
        meaning: 'PO:0025386'
      PO_0025538:
        title: plant sap
        description: A portion of plant substance (PO:0025161) that is an aqueous
          solution that can be transported through the apoplast (GO:0048046) or symplast
          (GO:0055044).
        is_a: PO_0025161
        meaning: 'PO:0025538'
      PO_0025603:
        title: plant resin
        description: A portion of plant substance (PO:0025161) that consists of a
          complex mixture of organic aromatic compounds such as mono-, sesqui-, and
          diterpenoids.
        is_a: PO_0025161
        meaning: 'PO:0025603'
      PO_0009011:
        title: plant structure
        description: A plant anatomical entity (PO:0025131) that is, or was, part
          of a plant, or was derived from a part of a plant.
        is_a: PO_0025131
        meaning: 'PO:0009011'
      PO_0000003:
        title: whole plant
        description: A plant structure (PO:0005679) which is a whole organism.
        is_a: PO_0009011
        meaning: 'PO:0000003'
      ENVO_01000413:
        title: old plant
        description: A whole plant which is relatively old
        is_a: PO_0000003
        meaning: 'ENVO:01000413'
      ENVO_01000414:
        title: young plant
        description: A whole plant which is relatively young.
        is_a: PO_0000003
        meaning: 'ENVO:01000414'
      FOODON_03411013:
        title: plant used for producing extract or concentrate
        is_a: PO_0000003
        meaning: 'FOODON:03411013'
      FOODON_03411048:
        title: carbohydrate-producing plant
        is_a: FOODON_03411013
        meaning: 'FOODON:03411048'
      FOODON_03411009:
        title: polysaccharide-producing plant
        is_a: FOODON_03411048
        meaning: 'FOODON:03411009'
      FOODON_03411016:
        title: starch-producing plant
        is_a: FOODON_03411009
        meaning: 'FOODON:03411016'
      FOODON_03412344:
        title: devils tongue plant
        is_a: FOODON_03411016
        meaning: 'FOODON:03412344'
      FOODON_03412637:
        title: konjac plant
        is_a: FOODON_03412344
        meaning: 'FOODON:03412637'
      PO_0009007:
        title: portion of plant tissue
        description: A plant structure (PO:0009011) that consists predominantly of
          similarly specialized plant cells (PO:0009002) of one or more types.
        is_a: PO_0009011
        meaning: 'PO:0009007'
      PO_0005679:
        title: plant epidermis
        description: A portion of plant tissue (PO:0009007) composed of plant epidermal
          cells (PO:0004013) that develops from the protoderm (PO:0006210) and covers
          the surface of a plant structure (PO:0009011).
        is_a: PO_0009007
        meaning: 'PO:0005679'
      PO_0006035:
        title: shoot system epidermis
        description: A portion of plant epidermis (PO:0005679) that is part of a shoot
          system (PO:0009006) and arises from the meristem L1 layer (PO:0009020).
        is_a: PO_0005679
        meaning: 'PO:0006035'
      PO_0000112:
        title: shoot axis epidermis
        description: A portion of shoot system epidermis (PO:0006035) that is part
          of a shoot axis (PO:0025029).
        is_a: PO_0006035
        meaning: 'PO:0000112'
      PO_0025157:
        title: phyllome epidermis
        description: A portion of shoot system epidermis (PO:0006035) that is part
          of a phyllome (PO:0006001).
        is_a: PO_0006035
        meaning: 'PO:0025157'
      PO_0006016:
        title: leaf epidermis
        description: A portion of phyllome epidermis (PO:0025157) that is part of
          a leaf (PO:0025034).
        is_a: PO_0025157
        meaning: 'PO:0006016'
      PO_0006036:
        title: root epidermis
        description: A portion of plant epidermis (PO:0005679) that is part of a root
          (PO:0009005).
        is_a: PO_0005679
        meaning: 'PO:0006036'
      PO_0009013:
        title: portion of meristem tissue
        description: A portion of plant tissue (PO:0009007) in which plant cells (PO:0009002)
          have retained their embryonic characteristics, or have reverted to them
          secondarily, and that divide to produce new cells that can undergo differentiation
          to form mature tissues, i.e. they have a capacity for morphogenesis and
          growth.
        is_a: PO_0009007
        meaning: 'PO:0009013'
      PO_0000225:
        title: peripheral zone
        description: A portion of meristem tissue (PO:0009013) which is the organogenic
          region of the meristem, characterized by higher rates of cell division.
        is_a: PO_0009013
        meaning: 'PO:0000225'
      PO_0025127:
        title: primordium
        description: A portion of meristem tissue (PO:0009013) that has as parts protoderm
          (PO:0006210) and sub-epidermal meristematic tissue and is committed to the
          development of a particular plant structure (PO:0009011).
        is_a: PO_0009013
        meaning: 'PO:0025127'
      PO_0005029:
        title: root primordium
        description: A primordium (PO:0025127) that develops from a root anlagen (PO:0025433)
          and is committed to the development of a root (PO:0009005).
        is_a: PO_0025127
        meaning: 'PO:0005029'
      PO_0025128:
        title: phyllome primordium
        description: A primordium (PO:0025127) that develops from a phyllome anlagen
          (PO:0025430) and is part of a shoot apex (PO:0000037) and is committed to
          the development of a phyllome (PO:0006001).
        is_a: PO_0025127
        meaning: 'PO:0025128'
      PO_0025433:
        title: root anlagen
        description: A portion of meristem tissue (PO:0009013) that is committed to
          the development of a root primordium (PO:0005029).
        is_a: PO_0009013
        meaning: 'PO:0025433'
      PO_0006210:
        title: protoderm
        description: A portion of meristem tissue (PO:0009013) that is the outer layer
          of an apical meristem (PO:0020144), or the outer layer of a plant embryo
          proper (PO:0000001), and gives rise to a portion of epidermis (PO:0005679).
        is_a: PO_0009013
        meaning: 'PO:0006210'
      PO_0009020:
        title: meristem L1 layer
        description: A portion of meristem tissue (PO:0009013) that is the outermost
          layer of a shoot apical meristem (PO:0020148) and gives rise to a shoot
          system epidermis (PO:0006035).
        is_a: PO_0009013
        meaning: 'PO:0009020'
      PO_0006079:
        title: shoot system meristem
        description: A portion of meristem tissue (PO:0009013) that is part of a shoot
          system (PO:0009006).
        is_a: PO_0009013
        meaning: 'PO:0006079'
      PO_0020148:
        title: shoot apical meristem
        description: A shoot system meristem (PO:0006079) formed at the apex of the
          shoot axis (PO:0025029), including those originating from an axillary bud
          meristem (PO:0000232).
        is_a: PO_0006079
        meaning: 'PO:0020148'
      PO_0020144:
        title: apical meristem
        description: A maximal portion of meristem tissue (PO:0009013) located at
          a shoot apex (PO:0000037) or root tip (PO:0000025).
        is_a: PO_0009013
        meaning: 'PO:0020144'
      PO_0025430:
        title: phyllome anlagen
        description: A portion of meristem tissue (PO:0009013) that is part of a peripheral
          zone (PO:0000225) of a shoot apical meristem (PO:0020148) and will give
          rise to a phyllome primordium (PO:0025128).
        is_a: PO_0009013
        meaning: 'PO:0025430'
      PO_0009002:
        title: plant cell
        description: A cell which is a plant structure (PO:0009011).
        is_a: PO_0009011
        meaning: 'PO:0009002'
      PO_0025606:
        title: native plant cell
        description: "A plant cell (PO:0009002) that is either part of a multicellular\
          \ whole plant (PO:0000003) 'in vivo' or a unicellular organism 'in natura'\
          \ (i.e. part of a natural environment)."
        is_a: PO_0009002
        meaning: 'PO:0025606'
      PO_0004010:
        title: meristematic cell
        description: A native plant cell (PO:0025606) synthesizing protoplasm and
          producing new cells by division and with only a primary cell wall.
        is_a: PO_0025606
        meaning: 'PO:0004010'
      PO_0025496:
        title: multi-tissue plant structure
        description: A plant structure (PO:0009011) that has as parts two or more
          portions of plant tissue (PO:0009007) of at least two different types and
          which through specific morphogenetic processes forms a single structural
          unit demarcated by primarily bona-fide boundaries from other structural
          units of different types.
        is_a: PO_0009011
        meaning: 'PO:0025496'
      PO_0009008:
        title: plant organ
        description: A multi-tissue plant structure (PO:0025496) that is a functional
          unit, is a proper part of a whole plant (PO:0000003), and includes portions
          of plant tissue (PO:0009007) of at least two different types that derive
          from a common developmental path.
        is_a: PO_0025496
        meaning: 'PO:0009008'
      PO_0006001:
        title: phyllome
        description: A lateral plant organ (PO:0009008) produced by a shoot apical
          meristem (PO:0020148).
        is_a: PO_0009008
        meaning: 'PO:0006001'
      PO_0025034:
        title: leaf
        description: A phyllome (PO:0006001) that is not associated with a reproductive
          structure.
        is_a: PO_0006001
        meaning: 'PO:0025034'
      PO_0025004:
        title: plant axis
        description: An axial plant organ (PO:0009008).
        is_a: PO_0009008
        meaning: 'PO:0025004'
      PO_0009005:
        title: root
        description: A plant axis (PO:0025004) that lacks shoot axis nodes (PO:0005004)
          and usually grows indeterminately.
        is_a: PO_0025004
        meaning: 'PO:0009005'
      PO_0025029:
        title: shoot axis
        description: A plant axis (PO:0025004) that is part of a shoot system (PO:0009006).
        is_a: PO_0025004
        meaning: 'PO:0025029'
      PO_0000037:
        title: shoot axis apex
        description: A shoot axis (PO:0025029) that is the most distal part of a shoot
          system (PO:0009006) and has as parts a shoot apical meristem (PO:0020148)
          and the youngest primordia (PO:0025127).
        is_a: PO_0025029
        meaning: 'PO:0000037'
      PO_0025497:
        title: collective plant structure
        description: A plant structure (PO:0009011) that is a proper part of a whole
          plant (PO:0000003) and includes two or more adjacent plant organs (PO:0009008)
          or adjacent cardinal organ parts (PO:0025001), along with any associated
          portions of plant tissue (PO:0009007).
        is_a: PO_0009011
        meaning: 'PO:0025497'
      PO_0025007:
        title: collective plant organ structure
        description: A collective plant structure (PO:0025497) that is a proper part
          of a whole plant (PO:0000003), and is composed of two or more adjacent plant
          organs (PO:0009008) and the associated portions of plant tissue (PO:0009007).
        is_a: PO_0025497
        meaning: 'PO:0025007'
      PO_0025025:
        title: root system
        description: A collective plant organ structure (PO:0025007) that produces
          root meristems (PO:0006085), the plant structures (PO:0009011) that arise
          from them and the parts thereof.
        is_a: PO_0025007
        meaning: 'PO:0025025'
      PO_0009006:
        title: shoot system
        description: A collective plant organ structure (PO:0025007) that produces
          shoot-borne portions of meristem tissue (PO:0009013) and the plant structures
          (PO:0009011) that arise from them.
        is_a: PO_0025007
        meaning: 'PO:0009006'
      ENVO_03500005:
        title: anthropogenic litter
        description: A material entity which has been discarded outside waste management
          systems by humans or their technologies.
        is_a: BFO_0000040
        meaning: 'ENVO:03500005'
      ENVO_03600061:
        title: shipwreck
        description: "Anthropogenic litter which consists of an abandoned ship's remains."
        is_a: ENVO_03500005
        meaning: 'ENVO:03600061'
      ENVO_06105124:
        title: coastal anthropogenic litter
        description: Anthropogenic litter which is present in a coastal environment.
        is_a: ENVO_03500005
        meaning: 'ENVO:06105124'
      NCBITaxon_1:
        title: root
        is_a: BFO_0000040
        meaning: 'NCBITaxon:1'
      NCBITaxon_131567:
        title: cellular organisms
        is_a: NCBITaxon_1
        meaning: 'NCBITaxon:131567'
      OBI_0000047:
        title: processed material
        description: Is a material entity that is created or changed during material
          processing.
        is_a: BFO_0000040
        meaning: 'OBI:0000047'
      UBERON_0000465:
        title: material anatomical entity
        description: Anatomical entity that has mass.
        is_a: BFO_0000040
        meaning: 'UBERON:0000465'
      UBERON_0000061:
        title: anatomical structure
        description: "Material anatomical entity that is a single connected structure\
          \ with inherent 3D shape generated by coordinated expression of the organism's\
          \ own genome."
        is_a: UBERON_0000465
        meaning: 'UBERON:0000061'
      FAO_0000001:
        title: fungal structure
        description: An anatomical structure that forms all or part of a fungus.
        is_a: UBERON_0000061
        meaning: 'FAO:0000001'
      UBERON_0004121:
        title: ectoderm-derived structure
        description: An anatomical structure that develops (entirely or partially)
          from the ectoderm.
        is_a: UBERON_0000061
        meaning: 'UBERON:0004121'
      UBERON_0000014:
        title: zone of skin
        description: Any portion of the organ that covers that body and consists of
          a layer of epidermis and a layer of dermis.
        is_a: UBERON_0004121
        meaning: 'UBERON:0000014'
      UBERON_0012180:
        title: head or neck skin
        description: A zone of skin that is part of a craniocervical region.
        is_a: UBERON_0000014
        meaning: 'UBERON:0012180'
      UBERON_0001084:
        title: skin of head
        description: A zone of skin that is part of a head [Automatically generated
          definition].
        is_a: UBERON_0012180
        meaning: 'UBERON:0001084'
      UBERON_1000021:
        title: skin of face
        description: A zone of skin that is part of the face.
        is_a: UBERON_0001084
        meaning: 'UBERON:1000021'
      UBERON_0001085:
        title: skin of trunk
        description: A zone of skin that is part of a trunk [Automatically generated
          definition].
        is_a: UBERON_0000014
        meaning: 'UBERON:0001085'
      UBERON_0001418:
        title: skin of thorax
        description: A zone of skin that is part of a thorax [Automatically generated
          definition].
        is_a: UBERON_0001085
        meaning: 'UBERON:0001418'
      UBERON_8480025:
        title: skin of clavicle region
        description: A zone of skin that is above the clavicle zone in the pectoral
          girdle region.
        is_a: UBERON_0000014
        meaning: 'UBERON:8480025'
      UBERON_0015474:
        title: axilla skin
        description: A zone of skin that is part of a axilla.
        is_a: UBERON_8480025
        meaning: 'UBERON:0015474'
      UBERON_0000022:
        title: feather
        description: One of the epidermal growths that form the distinctive outer
          covering, or plumage, on birds. Feathers are formed in tiny follicles in
          the epidermis, or outer skin layer, that produce keratin proteins.
        is_a: UBERON_0004121
        meaning: 'UBERON:0000022'
      UBERON_0002097:
        title: skin of body
        description: The organ covering the body that consists of the dermis and epidermis.
        is_a: UBERON_0004121
        meaning: 'UBERON:0002097'
      UBERON_0002067:
        title: dermis
        description: The dermis is a layer of skin between the epidermis (with which
          it makes up the skin) and subcutaneous tissues, and is composed of two layers,
          the papillary and reticular dermis[WP].
        is_a: UBERON_0004121
        meaning: 'UBERON:0002067'
      UBERON_0000019:
        title: camera-type eye
        description: An organ of sight that includes the camera-type eyeball and supporting
          structures such as the lacrimal apparatus, the conjunctiva, the eyelid.
        is_a: UBERON_0004121
        meaning: 'UBERON:0000019'
      UBERON_0000965:
        title: lens of camera-type eye
        description: Transparent part of camera-type eye that helps to refract light
          to be focused on the retina.
        is_a: UBERON_0004121
        meaning: 'UBERON:0000965'
      UBERON_0000966:
        title: retina
        description: The retina is the innermost layer or coating at the back of the
          eyeball, which is sensitive to light and in which the optic nerve terminates.
        is_a: UBERON_0004121
        meaning: 'UBERON:0000966'
      UBERON_0003072:
        title: optic cup
        description: Multi-tissue structure that is comprised of neural and non-neural
          epithelial layers which will form the retina and retinal pigmented epithelium
          of the mature eye[ZFA]. double walled structured formed by expansion and
          invagination of the distal end of the optic vesicle that develops into the
          pigmented and sensory layers of the retina while the mouth of the optic
          cup eventually forms the pupil of the eye[MP].
        is_a: UBERON_0004121
        meaning: 'UBERON:0003072'
      UBERON_0000078:
        title: mixed ectoderm/mesoderm/endoderm-derived structure
        description: An anatomical structure that develops from the ectoderm, mesoderm
          and endoderm.
        is_a: UBERON_0004121
        meaning: 'UBERON:0000078'
      UBERON_0011215:
        title: central nervous system cell part cluster
        description: A multi cell part structure that is part of a central nervous
          system.
        is_a: UBERON_0004121
        meaning: 'UBERON:0011215'
      UBERON_0000125:
        title: neural nucleus
        description: A spatially aggregated collection of nerve cell bodies in the
          CNS, consisting of one or more subpopulations that share cell type, chemical
          phenotype, and connections, and including nearby cells that share the same
          cell type, chemical phenotype, and connections. (CUMBO).
        is_a: UBERON_0011215
        meaning: 'UBERON:0000125'
      UBERON_0002308:
        title: nucleus of brain
        description: A neural nucleus that is part of the brain.
        is_a: UBERON_0000125
        meaning: 'UBERON:0002308'
      UBERON_0006569:
        title: diencephalic nucleus
        description: A nucleus of brain that is part of a diencephalon.
        is_a: UBERON_0002308
        meaning: 'UBERON:0006569'
      UBERON_0006568:
        title: hypothalamic nucleus
        description: A nucleus of brain that is part of a hypothalamus.
        is_a: UBERON_0006569
        meaning: 'UBERON:0006568'
      UBERON_0009663:
        title: telencephalic nucleus
        description: A nucleus of brain that is part of a telencephalon.
        is_a: UBERON_0002308
        meaning: 'UBERON:0009663'
      UBERON_0002020:
        title: gray matter
        description: A nervous system structure composed primarily of nerve cell bodies
          (somas). May also include dendrites and the initial unmyelinated portion
          of axons.
        is_a: UBERON_0011215
        meaning: 'UBERON:0002020'
      UBERON_0003528:
        title: brain gray matter
        description: A gray matter that is part of a brain [Automatically generated
          definition].
        is_a: UBERON_0002020
        meaning: 'UBERON:0003528'
      UBERON_0019264:
        title: gray matter of forebrain
        is_a: UBERON_0003528
        meaning: 'UBERON:0019264'
      UBERON_0019269:
        title: gray matter of diencephalon
        is_a: UBERON_0019264
        meaning: 'UBERON:0019269'
      UBERON_0010225:
        title: thalamic complex
        description: A nuclear complex which in mammals consists of four parts, the
          hypothalamus, epithalamus, ventral thalamus, and dorsal thalamus[WP,modified].
        is_a: UBERON_0019269
        meaning: 'UBERON:0010225'
      UBERON_0011300:
        title: gray matter of telencephalon
        description: A portion of gray matter that is part of a telencephalon.
        is_a: UBERON_0019264
        meaning: 'UBERON:0011300'
      UBERON_0007245:
        title: nuclear complex of neuraxis
        description: Gray matter of the central nervous system which is a collection
          of clustered nuclei.
        is_a: UBERON_0002020
        meaning: 'UBERON:0007245'
      UBERON_0000349:
        title: limbic system
        description: "A set of midline structures surrounding the brainstem of the\
          \ mammalian brain, originally described anatomically, e.g., hippocampal\
          \ formation, amygdala, hypothalamus, cingulate cortex. Although the original\
          \ designation was anatomical, the limbic system has come to be associated\
          \ with the system in the brain subserving emotional functions. As such,\
          \ it is very poorly defined and doesn't correspond closely to the anatomical\
          \ meaning any longer. [BirnLex]."
        is_a: UBERON_0004121
        meaning: 'UBERON:0000349'
      UBERON_0000955:
        title: brain
        description: The brain is the center of the nervous system in all vertebrate,
          and most invertebrate, animals. Some primitive animals such as jellyfish
          and starfish have a decentralized nervous system without a brain, while
          sponges lack any nervous system at all. In vertebrates, the brain is located
          in the head, protected by the skull and close to the primary sensory apparatus
          of vision, hearing, balance, taste, and smell[WP].
        is_a: UBERON_0004121
        meaning: 'UBERON:0000955'
      UBERON_0008823:
        title: neural tube derived brain
        description: A brain that develops_from a neural tube.
        is_a: UBERON_0000955
        meaning: 'UBERON:0008823'
      UBERON_0001017:
        title: central nervous system
        description: 'The central nervous system is the core nervous system that serves
          an integrating and coordinating function. In vertebrates it consists of
          the neural tube derivatives: the brain and spinal cord. In invertebrates
          it includes central ganglia plus nerve cord.'
        is_a: UBERON_0004121
        meaning: 'UBERON:0001017'
      UBERON_0001801:
        title: anterior segment of eyeball
        description: Any of the parts of the eye that lie in front of, or ventral
          to, the lens (inclusive).
        is_a: UBERON_0004121
        meaning: 'UBERON:0001801'
      UBERON_0005426:
        title: lens vesicle
        description: Portion of tissue that gives rise to the lens.
        is_a: UBERON_0004121
        meaning: 'UBERON:0005426'
      UBERON_0001802:
        title: posterior segment of eyeball
        description: Any of the parts of the eye that lie in back of, or dorsal to,
          the lens (but not inclusive).
        is_a: UBERON_0004121
        meaning: 'UBERON:0001802'
      UBERON_0019207:
        title: chorioretinal region
        description: The part of the eye that consists of both the retina and the
          optic choroid.
        is_a: UBERON_0004121
        meaning: 'UBERON:0019207'
      UBERON_0010371:
        title: ecto-epithelium
        description: Epithelium composed of cells that develops from the ectoderm[FMA,modified].
        is_a: UBERON_0004121
        meaning: 'UBERON:0010371'
      UBERON_0007376:
        title: outer epithelium
        description: The epidermis is the entire outer epithelial layer of an animal,
          it may be a single layer that produces an extracellular material (e.g. the
          cuticle of arthropods) or a complex stratified squamous epithelium, as in
          the case of many vertebrate species[GO].
        is_a: UBERON_0010371
        meaning: 'UBERON:0007376'
      UBERON_0001003:
        title: skin epidermis
        description: The outer epithelial layer of the skin that is superficial to
          the dermis.
        is_a: UBERON_0007376
        meaning: 'UBERON:0001003'
      UBERON_0001049:
        title: neural tube
        description: "In the developing vertebrate, the neural tube is the embryo's\
          \ precursor to the central nervous system, which comprises the brain and\
          \ spinal cord. The neural groove gradually deepens as the neural folds become\
          \ elevated, and ultimately the folds meet and coalesce in the middle line\
          \ and convert the groove into a closed tube, the neural tube or neural canal\
          \ (which strictly speaking is the center of the neural tube), the ectodermal\
          \ wall of which forms the rudiment of the nervous system. [WP,unvetted]."
        is_a: UBERON_0010371
        meaning: 'UBERON:0001049'
      UBERON_0015808:
        title: eye epithelium
        description: An epithelium that is part of a camera-type eye.
        is_a: UBERON_0010371
        meaning: 'UBERON:0015808'
      UBERON_0001778:
        title: ciliary epithelium
        description: A double layer covering the ciliary body that produces aqueous
          humor.
        is_a: UBERON_0015808
        meaning: 'UBERON:0001778'
      UBERON_0001803:
        title: epithelium of lens
        description: A layer of epithelial cells that is part of the eye.
        is_a: UBERON_0015808
        meaning: 'UBERON:0001803'
      UBERON_0002506:
        title: iris epithelium
        description: An epithelium that is part of a iris [Automatically generated
          definition].
        is_a: UBERON_0015808
        meaning: 'UBERON:0002506'
      UBERON_0005638:
        title: anterior chamber epithelium
        description: An epithelium that is part of a anterior chamber of eyeball.
        is_a: UBERON_0015808
        meaning: 'UBERON:0005638'
      UBERON_0011272:
        title: embryonic skin basal layer
        is_a: UBERON_0010371
        meaning: 'UBERON:0011272'
      UBERON_0003075:
        title: neural plate
        description: A region of embryonic ectodermal cells that lie directly above
          the notochord. During neurulation, they change shape and produce an infolding
          of the neural plate (the neural fold) that then seals to form the neural
          tube[XAO]. The earliest recognizable dorsal ectodermal primordium of the
          central nervous system present near the end of gastrulation before infolding
          to form the neural keel; consists of a thickened pseudostratified epithelium[ZFA].
        is_a: UBERON_0010371
        meaning: 'UBERON:0003075'
      UBERON_0009610:
        title: forebrain neural plate
        description: A neural plate that develops_from a future forebrain.
        is_a: UBERON_0003075
        meaning: 'UBERON:0009610'
      UBERON_0005062:
        title: neural fold
        description: One of the two elevated edges of the neural groove[GO,MP].
        is_a: UBERON_0010371
        meaning: 'UBERON:0005062'
      UBERON_0003071:
        title: eye primordium
        description: Portion of tissue that is part of the anterior neural keel and
          will form the optic vesicle[ZFA]. A paired ectodermal placode that becomes
          invaginated to form the embryonic lens vesicles.
        is_a: UBERON_0010371
        meaning: 'UBERON:0003071'
      UBERON_0003911:
        title: choroid plexus epithelium
        description: The epithelial component of the choroid plexus. Consists of cuboidal
          epithelial cells surrounding a core of capillaries and loose connective
          tissue.
        is_a: UBERON_0010371
        meaning: 'UBERON:0003911'
      UBERON_0004274:
        title: lateral ventricle choroid plexus epithelium
        description: A choroid plexus epithelium that is part of a lateral ventricle
          [Automatically generated definition].
        is_a: UBERON_0003911
        meaning: 'UBERON:0004274'
      UBERON_0005656:
        title: lens vesicle epithelium
        description: An epithelium that is part of a lens vesicle.
        is_a: UBERON_0010371
        meaning: 'UBERON:0005656'
      UBERON_0007383:
        title: enveloping layer of ectoderm
        description: Outermost layer of cells surrounding the embryo.
        is_a: UBERON_0010371
        meaning: 'UBERON:0007383'
      UBERON_0011642:
        title: oral epithelium from ectoderm
        description: An epithelium that develops_from a ectoderm and is part of a
          oral epithelium.
        is_a: UBERON_0010371
        meaning: 'UBERON:0011642'
      UBERON_0014703:
        title: anal membrane ectodermal component
        description: A unilaminar epithelium that develops_from a ectoderm and is
          part of a anal region.
        is_a: UBERON_0010371
        meaning: 'UBERON:0014703'
      UBERON_0019204:
        title: skin epithelium
        description: Any region of epithelium that is part of a skin region.
        is_a: UBERON_0010371
        meaning: 'UBERON:0019204'
      UBERON_0003386:
        title: smooth muscle of eye
        description: 'Any of the striated muscles that move the eye and include: superior
          rectus, inferior rectus, medial rectus, lateral rectus, superior oblique,
          inferior oblique, retractor bulbi.'
        is_a: UBERON_0004121
        meaning: 'UBERON:0003386'
      UBERON_0001605:
        title: ciliary muscle
        description: "The ciliary muscle is a ring of smooth muscle in the middle\
          \ layer of the eye that controls the eye's accommodation for viewing objects\
          \ at varying distances and regulates the flow of aqueous humour through\
          \ Schlemm's canal. [WP,unvetted]."
        is_a: UBERON_0003386
        meaning: 'UBERON:0001605'
      UBERON_0004234:
        title: iris smooth muscle
        description: A portion of smooth muscle tissue that is part of a iris [Automatically
          generated definition].
        is_a: UBERON_0003386
        meaning: 'UBERON:0004234'
      UBERON_0001775:
        title: ciliary body
        description: The thickened portion of the vascular tunic, which lies between
          the choroid and the iris, composed of ciliary muscle and ciliary processes.
        is_a: UBERON_0004121
        meaning: 'UBERON:0001775'
      UBERON_0001769:
        title: iris
        description: The adjustable membrane, composed of the stroma and pigmented
          epithelium, located just in front of the crystalline lens within the eye.
        is_a: UBERON_0004121
        meaning: 'UBERON:0001769'
      UBERON_0010313:
        title: neural crest-derived structure
        description: An anatomical structure that develops from the neural crest.
        is_a: UBERON_0004121
        meaning: 'UBERON:0010313'
      UBERON_0001708:
        title: jaw skeleton
        description: Subdivision of skeleton which includes upper and lower jaw skeletons.
        is_a: UBERON_0010313
        meaning: 'UBERON:0001708'
      UBERON_0011156:
        title: facial skeleton
        description: Subdivision of skull that consists of the facial bones.
        is_a: UBERON_0010313
        meaning: 'UBERON:0011156'
      UBERON_0003278:
        title: skeleton of lower jaw
        description: "A subdivision of the skeleton that corresponds to the lower\
          \ part of the mouth. The lower jaw skeleton includes the following elements,\
          \ when present: lower jaw teeth, the mandible and other lower jaw bones,\
          \ and Meckel's cartilage."
        is_a: UBERON_0010313
        meaning: 'UBERON:0003278'
      UBERON_0002443:
        title: choroidal blood vessel
        description: A blood vessel that is part of a choroid [Automatically generated
          definition].
        is_a: UBERON_0010313
        meaning: 'UBERON:0002443'
      UBERON_0003585:
        title: dermis connective tissue
        description: A portion of connective tissue that is part of a dermis [Automatically
          generated definition].
        is_a: UBERON_0010313
        meaning: 'UBERON:0003585'
      UBERON_0003426:
        title: dermis adipose tissue
        description: An adipose tissue that is part of a dermis [Automatically generated
          definition].
        is_a: UBERON_0003585
        meaning: 'UBERON:0003426'
      UBERON_0003462:
        title: facial bone
        description: A bone that is part of a facial skeleton [Automatically generated
          definition].
        is_a: UBERON_0010313
        meaning: 'UBERON:0003462'
      UBERON_0012360:
        title: bone of jaw
        description: A bone element that is part of a jaw region.
        is_a: UBERON_0003462
        meaning: 'UBERON:0012360'
      UBERON_0004768:
        title: bone of lower jaw
        description: 'Any bone that is part of the lower jaw skeleton. This includes
          (when present): the dentary/mandible, the articular, the splenial, the suprangular.'
        is_a: UBERON_0012360
        meaning: 'UBERON:0004768'
      UBERON_0003501:
        title: retina blood vessel
        description: A blood vessel that is part of a retina [Automatically generated
          definition].
        is_a: UBERON_0010313
        meaning: 'UBERON:0003501'
      UBERON_0003511:
        title: iris blood vessel
        description: A blood vessel that is part of a iris [Automatically generated
          definition].
        is_a: UBERON_0010313
        meaning: 'UBERON:0003511'
      UBERON_0014387:
        title: mesenchyme derived from neural crest
        description: Mesenchyme that develops_from the neural crest[Automatically
          generated definition].
        is_a: UBERON_0010313
        meaning: 'UBERON:0014387'
      UBERON_0007213:
        title: mesenchyme derived from head neural crest
        description: Mesenchyme that develops_from a cranial neural crest.
        is_a: UBERON_0014387
        meaning: 'UBERON:0007213'
      UBERON_0003314:
        title: eye mesenchyme
        description: Mesenchyme that is part of a developing camera-type eye.
        is_a: UBERON_0007213
        meaning: 'UBERON:0003314'
      UBERON_0009920:
        title: optic neural crest
        is_a: UBERON_0007213
        meaning: 'UBERON:0009920'
      UBERON_0010258:
        title: mesenchyme from rhombencephalic neural crest
        description: Mesenchyme that develops_from a rhombencephalon neural crest.
        is_a: UBERON_0007213
        meaning: 'UBERON:0010258'
      UBERON_0010259:
        title: 1st arch mesenchyme from neural crest
        description: Mesenchyme that develops_from a neural crest and is part of a
          1st arch mesenchyme.
        is_a: UBERON_0010258
        meaning: 'UBERON:0010259'
      UBERON_0010252:
        title: 1st arch mandibular mesenchyme from neural crest
        description: Mesenchyme that develops_from a neural crest and is part of a
          1st arch mandibular mesenchyme.
        is_a: UBERON_0010259
        meaning: 'UBERON:0010252'
      UBERON_0010336:
        title: mandibular process mesenchyme from neural crest
        description: Mesenchyme that develops_from a neural crest and is part of a
          mandibular process mesenchyme.
        is_a: UBERON_0010258
        meaning: 'UBERON:0010336'
      UBERON_0010359:
        title: pharyngeal arch mesenchyme from neural crest
        description: Mesenchyme that develops_from a neural crest and is part of a
          entire pharyngeal arch associated mesenchyme.
        is_a: UBERON_0014387
        meaning: 'UBERON:0010359'
      UBERON_0010321:
        title: skeletal element of eye region
        description: A skeletal element that is part of a orbital region.
        is_a: UBERON_0010313
        meaning: 'UBERON:0010321'
      UBERON_0006311:
        title: chamber of eyeball
        description: A segment of the eyeball that is filled with refractive media.
        is_a: UBERON_0004121
        meaning: 'UBERON:0006311'
      UBERON_0001766:
        title: anterior chamber of eyeball
        description: The space in the eye, filled with aqueous humor, and bounded
          anteriorly by the cornea and a small portion of the sclera and posteriorly
          by a small portion of the ciliary body, the iris, and part of the crystalline
          lens.
        is_a: UBERON_0006311
        meaning: 'UBERON:0001766'
      UBERON_0001799:
        title: vitreous chamber of eyeball
        description: The chamber in the eyeball enclosing the vitreous humor, bounded
          anteriorly by the lens and ciliary body and posteriorly by the posterior
          wall of the eyeball[BTO,modified].
        is_a: UBERON_0006311
        meaning: 'UBERON:0001799'
      UBERON_0001768:
        title: uvea
        description: The pigmented middle of the three concentric layers that make
          up an eye, consisting of the iris, ciliary body and choroid[WP,edited].
        is_a: UBERON_0004121
        meaning: 'UBERON:0001768'
      UBERON_0011892:
        title: anterior uvea
        description: Front (ventral) portion of the vascular, pigmentary, or middle
          coat of the eye, including the ciliary body and the iris.
        is_a: UBERON_0004121
        meaning: 'UBERON:0011892'
      UBERON_0004128:
        title: optic vesicle
        description: The optic vesicle is the evagination of neurectoderm that precedes
          formation of the optic cup[GO]. Portion of tissue that is comprised of neuroepitheium
          which has pinched off from the anterior neural keel and will form the optic
          cup[ZFA].
        is_a: UBERON_0004121
        meaning: 'UBERON:0004128'
      UBERON_0010427:
        title: ciliary processes
        description: The ciliary processes are formed by the inward folding of the
          various layers of the choroid, i.e. , the choroid proper and the lamina
          basalis, and are received between corresponding foldings of the suspensory
          ligament of the lens.
        is_a: UBERON_0004121
        meaning: 'UBERON:0010427'
      UBERON_0002346:
        title: neurectoderm
        description: Embryonic ectoderm that gives rise to nervous tissue.
        is_a: UBERON_0004121
        meaning: 'UBERON:0002346'
      UBERON_0001798:
        title: vitreous body
        description: Gelatinous mucoid tissue that is composed of vitreous humor and
          fills the cavity behind the crystalline lens of the eye and in front of
          the retina[MP,modified].
        is_a: UBERON_0004121
        meaning: 'UBERON:0001798'
      UBERON_0010230:
        title: eyeball of camera-type eye
        description: The core globe-shaped component of the camera-type eye.
        is_a: UBERON_0004121
        meaning: 'UBERON:0010230'
      UBERON_0003947:
        title: brain ventricle/choroid plexus
        description: The brain ventricles or their associated choroid plexuses.
        is_a: UBERON_0004121
        meaning: 'UBERON:0003947'
      UBERON_0001886:
        title: choroid plexus
        description: A network formed by blood vessels and the tela choroidea which
          secretes CSF into the ventricular spaces.
        is_a: UBERON_0003947
        meaning: 'UBERON:0001886'
      UBERON_0002307:
        title: choroid plexus of lateral ventricle
        description: Part of choroid plexus contained in the lateral ventricle.
        is_a: UBERON_0001886
        meaning: 'UBERON:0002307'
      UBERON_0004086:
        title: brain ventricle
        description: One of the system of communicating cavities in the brain that
          are continuous with the central canal of the spinal cord, that like it are
          derived from the medullary canal of the embryo, that are lined with an epithelial
          ependyma, and that contain a serous fluid.
        is_a: UBERON_0003947
        meaning: 'UBERON:0004086'
      UBERON_0002285:
        title: telencephalic ventricle
        description: A brain ventricle that is part of a telencephalon. In mammals
          and species with an evaginated telencephalon, this is one of a pair of lateral
          structures, one in each hemisphere.
        is_a: UBERON_0004086
        meaning: 'UBERON:0002285'
      UBERON_0002616:
        title: regional part of brain
        description: Anatomical divisons of the brain according to one or more criteria,
          e.g. cytoarchitectural, gross anatomy. Parts may be contiguous in 3D or
          not, e.g., basal ganglia.
        is_a: UBERON_0004121
        meaning: 'UBERON:0002616'
      UBERON_0001890:
        title: forebrain
        description: The most anterior region of the brain including both the telencephalon
          and diencephalon.
        is_a: UBERON_0002616
        meaning: 'UBERON:0001890'
      UBERON_0001893:
        title: telencephalon
        description: Part of the forebrain consisting of paired olfactory bulbs and
          cerebral hemispheres.
        is_a: UBERON_0002616
        meaning: 'UBERON:0001893'
      UBERON_0001894:
        title: diencephalon
        description: The division of the forebrain that develops from the foremost
          primary cerebral vesicle.
        is_a: UBERON_0002616
        meaning: 'UBERON:0001894'
      UBERON_0001898:
        title: hypothalamus
        description: A specialized brain region of the ventral diencephalon arising
          near the end of the segmentation period; the embryonic hypothalamic region
          will give rise to the posterior pituitary gland as well as a number of brain
          nuclei. [ZFA]. One of the most important functions of the hypothalamus is
          to link the nervous system to the endocrine system via the pituitary gland
          (hypophysis).[Wikipedia].
        is_a: UBERON_0002616
        meaning: 'UBERON:0001898'
      UBERON_0002271:
        title: periventricular zone of hypothalamus
        is_a: UBERON_0004121
        meaning: 'UBERON:0002271'
      UBERON_0002342:
        title: neural crest
        description: A specialized region of ectoderm found between the neural ectoderm
          (neural plate) and non-neural ectoderm and composed of highly migratory
          pluripotent cells that delaminate in early embryonic development from the
          dorsal neural tube and give rise to an astounding variety of differentiated
          cell types[MP].
        is_a: UBERON_0004121
        meaning: 'UBERON:0002342'
      UBERON_0003852:
        title: rhombencephalon neural crest
        description: A neural crest that has_potential_to_developmentally_contribute_to
          a hindbrain.
        is_a: UBERON_0002342
        meaning: 'UBERON:0003852'
      UBERON_0003056:
        title: pre-chordal neural plate
        description: The portion of neural plate anterior to the mid-hindbrain junction.
        is_a: UBERON_0004121
        meaning: 'UBERON:0003056'
      UBERON_0003099:
        title: cranial neural crest
        description: Neural crest cells (NCCs) originating in the anterior part of
          the developing embryo and residing between the mid-diencephalon and the
          forming hindbrain; cranial NCCs migrate dorsolaterally to form the craniofacial
          mesenchyme that differentiates into various craniofacial cartilages and
          bones, cranial neurons, glia, and connective tissues of the face; these
          cells enter the pharyngeal pouches and arches where they give rise to thymic
          cells, bones of the middle ear and jaw (mandible), and the odontoblasts
          of the tooth primordia; like their counterparts in the trunk, cranial NCCs
          also contribute to the developing peripheral nervous system, along with
          the pigmented cell (i.e. melanocyte) lineage.
        is_a: UBERON_0004121
        meaning: 'UBERON:0003099'
      UBERON_0007098:
        title: mandibular neural crest
        description: Cranial neural crest that migrates into the mandibular arch.
        is_a: UBERON_0003099
        meaning: 'UBERON:0007098'
      UBERON_0003499:
        title: brain blood vessel
        description: A blood vessel that is part of a brain [Automatically generated
          definition].
        is_a: UBERON_0004121
        meaning: 'UBERON:0003499'
      UBERON_0005282:
        title: ventricular system of brain
        is_a: UBERON_0004121
        meaning: 'UBERON:0005282'
      UBERON_0004277:
        title: eye muscle
        description: A muscle that is part of the eye region.
        is_a: UBERON_0004121
        meaning: 'UBERON:0004277'
      UBERON_0011222:
        title: intra-ocular muscle
        is_a: UBERON_0004277
        meaning: 'UBERON:0011222'
      UBERON_0001606:
        title: muscle of iris
        is_a: UBERON_0011222
        meaning: 'UBERON:0001606'
      UBERON_0004731:
        title: neuromere
        description: A transverse unitary subdivision of the neural tube that shares
          a common dorsoventral structure (floor, basal, alar, and roof plates), but
          each having differential molecular identities and fates; they comprise the
          secondary prosencephalon, diencephalon (prosomeres), the midbrain (mesomeres),
          and the hindbrain (rhombomeres).
        is_a: UBERON_0004121
        meaning: 'UBERON:0004731'
      UBERON_0014775:
        title: prosomere
        description: A neuromere that is part of the presumptive forebrain.
        is_a: UBERON_0004731
        meaning: 'UBERON:0014775'
      UBERON_0004756:
        title: dermal skeletal element
        description: Dermis-derived entity that is made of skeletal tissue.
        is_a: UBERON_0004121
        meaning: 'UBERON:0004756'
      UBERON_0004906:
        title: ectodermal part of digestive tract
        description: A portion of the gut that is derived from ectoderm.
        is_a: UBERON_0004121
        meaning: 'UBERON:0004906'
      UBERON_0005281:
        title: ventricular system of central nervous system
        description: A set of structures containing cerebrospinal fluid in the brain.
          It is continuous with the central canal of the spinal cord[WP].
        is_a: UBERON_0004121
        meaning: 'UBERON:0005281'
      UBERON_0005289:
        title: tela choroidea of telencephalic ventricle
        description: Tela chorioidea that lines the telencephalic ventricle.
        is_a: UBERON_0004121
        meaning: 'UBERON:0005289'
      UBERON_0036661:
        title: wall of ventricular system of brain
        is_a: UBERON_0004121
        meaning: 'UBERON:0036661'
      UBERON_0036654:
        title: wall of lateral ventricle
        is_a: UBERON_0036661
        meaning: 'UBERON:0036654'
      UBERON_0036925:
        title: wall of eyeball
        is_a: UBERON_0004121
        meaning: 'UBERON:0036925'
      UBERON_0010314:
        title: structure with developmental contribution from neural crest
        description: An anatomical structure that has some part that develops from
          the neural crest.
        is_a: UBERON_0000061
        meaning: 'UBERON:0010314'
      UBERON_0000948:
        title: heart
        description: A myogenic muscular circulatory organ found in the vertebrate
          cardiovascular system composed of chambers of cardiac muscle. It is the
          primary circulatory organ.
        is_a: UBERON_0010314
        meaning: 'UBERON:0000948'
      UBERON_0011595:
        title: jaw region
        description: A subdivision of the head that corresponds to the jaw skeleton,
          containing both soft tissue, skeleton and teeth (when present). The jaw
          region is divided into upper and lower regions.
        is_a: UBERON_0010314
        meaning: 'UBERON:0011595'
      UBERON_0001710:
        title: lower jaw region
        description: Subdivision of head that consists of the lower jaw skeletal elements
          plus associated soft tissue (skin, lips, muscle)[cjm].
        is_a: UBERON_0010314
        meaning: 'UBERON:0001710'
      UBERON_0002539:
        title: pharyngeal arch
        description: One of a series of paired bulges that develop along the lateral
          walls of the foregut. The pharyngeal arches have developmental contributions
          from endoderm, mesoderm, and neural crest cells and are separated by anterior
          lateral endoderm out-pockets known as pharyngeal pouches.
        is_a: UBERON_0010314
        meaning: 'UBERON:0002539'
      UBERON_0004362:
        title: pharyngeal arch 1
        description: The first of the series of pharyngeal arches that develop into
          jaw bones or their homologs, and their associated nerves and arteries.
        is_a: UBERON_0002539
        meaning: 'UBERON:0004362'
      UBERON_0003129:
        title: skull
        description: Anatomical structure that is part of the head consisting entirely
          of cranium and mandible[WP].
        is_a: UBERON_0010314
        meaning: 'UBERON:0003129'
      UBERON_0003236:
        title: epithelium of lower jaw
        description: An epithelium that is part of a lower jaw [Automatically generated
          definition].
        is_a: UBERON_0010314
        meaning: 'UBERON:0003236'
      UBERON_0003324:
        title: mesenchyme of lower jaw
        description: Mesenchyme that is part of a developing lower jaw [Automatically
          generated definition].
        is_a: UBERON_0010314
        meaning: 'UBERON:0003324'
      UBERON_0006905:
        title: mandibular process mesenchyme
        description: Mesenchyme that is part of a mandibular prominence.
        is_a: UBERON_0010314
        meaning: 'UBERON:0006905'
      UBERON_0010337:
        title: mandibular process mesenchyme from head mesenchyme
        description: Mesenchyme that develops_from a head mesenchyme from mesoderm
          and is part of a mandibular process mesenchyme.
        is_a: UBERON_0006905
        meaning: 'UBERON:0010337'
      UBERON_0009494:
        title: pharyngeal arch mesenchymal region
        description: A portion of mesenchymal tissue associated with an individual
          pharyngeal arch.
        is_a: UBERON_0010314
        meaning: 'UBERON:0009494'
      UBERON_0010042:
        title: 1st arch mesenchyme
        description: Mesenchyme that is part of a pharyngeal arch 1.
        is_a: UBERON_0009494
        meaning: 'UBERON:0010042'
      UBERON_0009584:
        title: 1st arch mandibular mesenchyme
        description: Mesenchyme that is part of a 1st arch mandibular component.
        is_a: UBERON_0010042
        meaning: 'UBERON:0009584'
      UBERON_0010339:
        title: 1st arch mandibular mesenchyme from head mesenchyme
        description: Mesenchyme that develops_from a head mesenchyme from mesoderm
          and is part of a 1st arch mandibular mesenchyme.
        is_a: UBERON_0009584
        meaning: 'UBERON:0010339'
      UBERON_0010341:
        title: 1st arch mesenchyme from head mesenchyme
        description: Mesenchyme that develops_from a head mesenchyme from mesoderm
          and is part of a 1st arch mesenchyme.
        is_a: UBERON_0010042
        meaning: 'UBERON:0010341'
      UBERON_0010046:
        title: entire pharyngeal arch associated mesenchyme
        description: The sum total of mesenchymal tissue in the pharyngeal arch region.
          Pharyngeal mesenchyme is undifferentiated, loose connective tissue derived
          mostly from mesoderm, and also contains ectodermally derived neural crest
          cells.
        is_a: UBERON_0010314
        meaning: 'UBERON:0010046'
      UBERON_0015212:
        title: lateral structure
        description: Any structure that is placed on one side of the left-right axis
          of a bilaterian.
        is_a: UBERON_0000061
        meaning: 'UBERON:0015212'
      UBERON_0001421:
        title: pectoral girdle region
        description: 'An organism subdivision that includes the pectoral girdle skeleton
          and associated soft tissue. Note that this includes both the skeletal elements
          and associated tissues (integument, muscle, etc). Examples: There are only
          two instances in an organism, right and left pectoral girdle regions.'
        is_a: UBERON_0015212
        meaning: 'UBERON:0001421'
      UBERON_0003077:
        title: paraxial mesoderm
        description: The paraxial mesoderm is the mesoderm located bilaterally adjacent
          to the notochord and neural tube[GO].
        is_a: UBERON_0015212
        meaning: 'UBERON:0003077'
      UBERON_0010707:
        title: appendage girdle complex
        description: An organism subdivision that includes both an appendage and its
          associated girdle region. Note that this includes both the skeletal elements
          and associated tissues (integument, muscle, etc).
        is_a: UBERON_0015212
        meaning: 'UBERON:0010707'
      UBERON_0010708:
        title: pectoral complex
        description: Appendage girdle complex that when present, encompasses the pectoral
          appendicular skeleton and the pectoral girdle.
        is_a: UBERON_0010707
        meaning: 'UBERON:0010708'
      UBERON_0010000:
        title: multicellular anatomical structure
        description: An anatomical structure that has more than one cell as a part.
        is_a: UBERON_0000061
        meaning: 'UBERON:0010000'
      UBERON_0000479:
        title: tissue
        description: Multicellular anatomical structure that consists of many cells
          of one or a few types, arranged in an extracellular matrix such that their
          long-range organisation is at least partly a repetition of their short-range
          organisation.
        is_a: UBERON_0010000
        meaning: 'UBERON:0000479'
      UBERON_0005291:
        title: embryonic tissue
        description: A portion of tissue that is part of an embryo.
        is_a: UBERON_0000479
        meaning: 'UBERON:0005291'
      UBERON_0000076:
        title: external ectoderm
        description: The surface (external) layer of ectoderm which begins to proliferate
          shortly after separation from the neuroectoderm.
        is_a: UBERON_0005291
        meaning: 'UBERON:0000076'
      UBERON_0010316:
        title: germ layer / neural crest
        is_a: UBERON_0005291
        meaning: 'UBERON:0010316'
      UBERON_0000923:
        title: germ layer
        description: A layer of cells produced during the process of gastrulation
          during the early development of the animal embryo, which is distinct from
          other such layers of cells, as an early step of cell differentiation. The
          three types of germ layers are the endoderm, ectoderm, and mesoderm.
        is_a: UBERON_0010316
        meaning: 'UBERON:0000923'
      UBERON_0000924:
        title: ectoderm
        description: "Primary germ layer that is the outer of the embryo's three germ\
          \ layers and gives rise to epidermis and neural tissue."
        is_a: UBERON_0000923
        meaning: 'UBERON:0000924'
      UBERON_0009479:
        title: ectoderm of buccopharyngeal membrane
        description: An ectoderm that is part of a buccopharyngeal membrane.
        is_a: UBERON_0000924
        meaning: 'UBERON:0009479'
      UBERON_0000925:
        title: endoderm
        description: Primary germ layer that lies remote from the surface of the embryo
          and gives rise to internal tissues such as gut.
        is_a: UBERON_0000923
        meaning: 'UBERON:0000925'
      UBERON_0009480:
        title: endoderm of buccopharyngeal membrane
        description: An endoderm that is part of a buccopharyngeal membrane.
        is_a: UBERON_0000925
        meaning: 'UBERON:0009480'
      UBERON_0000926:
        title: mesoderm
        description: The middle germ layer of the embryo, between the endoderm and
          ectoderm.
        is_a: UBERON_0000923
        meaning: 'UBERON:0000926'
      UBERON_0004141:
        title: heart tube
        description: An epithelial tube that will give rise to the mature heart.
        is_a: UBERON_0005291
        meaning: 'UBERON:0004141'
      UBERON_0003081:
        title: lateral plate mesoderm
        description: Portion of the middle of the three primary germ layers of the
          embryo that resides on the periphery of the embryo, is continuous with the
          extra-embryonic mesoderm, splits into two layers enclosing the intra-embryonic
          coelom, and gives rise to body wall structures[MP].
        is_a: UBERON_0005291
        meaning: 'UBERON:0003081'
      UBERON_0005256:
        title: trunk mesenchyme
        description: Mesenchyme that is part of a developing trunk.
        is_a: UBERON_0005291
        meaning: 'UBERON:0005256'
      UBERON_0009618:
        title: trunk paraxial mesoderm
        is_a: UBERON_0005256
        meaning: 'UBERON:0009618'
      UBERON_0004140:
        title: primary heart field
        description: A specific region of the lateral mesoderm that will form the
          primary beating heart tube. In mammals the primary heart field gives rise
          to the left ventricle.
        is_a: UBERON_0005291
        meaning: 'UBERON:0004140'
      UBERON_0007005:
        title: cardiogenic splanchnic mesoderm
        description: The splanchnic mesoderm in the cardiogenic region where the heart
          develops; it gives rise to endocardial heart tubes that fuse to form the
          primordial cardiac tube, the heart primordium[web]. Two migratory heart
          primordia that move ventrally during the course of neurulation, and then
          fuse[XAO].
        is_a: UBERON_0005291
        meaning: 'UBERON:0007005'
      UBERON_0003304:
        title: mesoderm blood island
        description: A blood island that is part of a mesoderm.
        is_a: UBERON_0005291
        meaning: 'UBERON:0003304'
      UBERON_0005253:
        title: head mesenchyme
        description: Portion of primordial embryonic connective tissue of the developing
          head, consisting of mesenchymal cells supported in interlaminar jelly, that
          derive mostly from the mesoderm and contribute to head connective tissue,
          bone and musculature in conjunction with cranial neural crest cells.
        is_a: UBERON_0005291
        meaning: 'UBERON:0005253'
      UBERON_0009891:
        title: facial mesenchyme
        description: Mesenchyme that is part of a developing face.
        is_a: UBERON_0005253
        meaning: 'UBERON:0009891'
      UBERON_0034995:
        title: jaw mesenchyme
        description: Mesenchyme that is part of a developing jaw [Automatically generated
          definition].
        is_a: UBERON_0005253
        meaning: 'UBERON:0034995'
      UBERON_0006904:
        title: head mesenchyme from mesoderm
        description: A head mesenchyme that develops_from a mesoderm.
        is_a: UBERON_0005253
        meaning: 'UBERON:0006904'
      UBERON_0036146:
        title: cardiopharyngeal field
        description: An region of the mesoderm that includes anterior lateral mesoderm
          of the first heart field plus contiguous pharyngeal mesoderm that gives
          rise to second-heart-field-derived regions of the heart and branchiomeric
          muscles.
        is_a: UBERON_0005291
        meaning: 'UBERON:0036146'
      UBERON_0009846:
        title: embryonic cloacal epithelium
        description: An epithelium that is part of a embryonic cloaca.
        is_a: UBERON_0005291
        meaning: 'UBERON:0009846'
      UBERON_0004902:
        title: urogenital sinus epithelium
        description: The fetal urogenital sinus (from which the prostate derives)
          is a simple cylinder of stratified basal epithelium, surrounded by mesenchyme
          and positioned between the embryonic bladder and pelvic urethra.
        is_a: UBERON_0009846
        meaning: 'UBERON:0004902'
      UBERON_0009881:
        title: anterior lateral plate mesoderm
        is_a: UBERON_0005291
        meaning: 'UBERON:0009881'
      UBERON_0010360:
        title: pharyngeal arch mesenchyme from head mesenchyme
        description: Mesenchyme that develops_from a head mesenchyme from mesoderm
          and is part of a entire pharyngeal arch associated mesenchyme.
        is_a: UBERON_0005291
        meaning: 'UBERON:0010360'
      UBERON_0000483:
        title: epithelium
        description: 'Portion of tissue, that consists of one or more layers of epithelial
          cells connected to each other by cell junctions and which is underlain by
          a basal lamina. Examples: simple squamous epithelium, glandular cuboidal
          epithelium, transitional epithelium, myoepithelium[CARO].'
        is_a: UBERON_0000479
        meaning: 'UBERON:0000483'
      UBERON_0000490:
        title: unilaminar epithelium
        description: 'Epithelium which consists of a single layer of epithelial cells.
          Examples: endothelium, mesothelium, glandular squamous epithelium.[FMA].'
        is_a: UBERON_0000483
        meaning: 'UBERON:0000490'
      UBERON_0000484:
        title: simple cuboidal epithelium
        description: Unilaminar epithelium that consists of a single layer of cuboidal
          cells.
        is_a: UBERON_0000490
        meaning: 'UBERON:0000484'
      UBERON_0000485:
        title: simple columnar epithelium
        description: 'Unilaminar epithelium, which consists of a single layer of columnar
          cells. Examples: ciliated columnar epithelium, gastric epithelium, microvillus
          columnar epithelium.[FMA].'
        is_a: UBERON_0000490
        meaning: 'UBERON:0000485'
      UBERON_0001277:
        title: intestinal epithelium
        description: Epithelial layer that lines the intestine.
        is_a: UBERON_0000485
        meaning: 'UBERON:0001277'
      UBERON_0003258:
        title: endoderm of foregut
        description: An endoderm that is part of a foregut [Automatically generated
          definition].
        is_a: UBERON_0000490
        meaning: 'UBERON:0003258'
      UBERON_0003260:
        title: endoderm of hindgut
        description: An endoderm that is part of a hindgut [Automatically generated
          definition].
        is_a: UBERON_0000490
        meaning: 'UBERON:0003260'
      UBERON_0009521:
        title: anal membrane endodermal component
        description: An endoderm that is part of a anal region.
        is_a: UBERON_0000490
        meaning: 'UBERON:0009521'
      UBERON_0000486:
        title: multilaminar epithelium
        description: 'Epithelium which consists of more than one layer of epithelial
          cells that may or may not be in contact with a basement membrane. Examples:
          keratinized stratified squamous epithelium, ciliated stratified columnar
          epithelium.[FMA].'
        is_a: UBERON_0000483
        meaning: 'UBERON:0000486'
      UBERON_0004290:
        title: dermomyotome
        description: The bilaminar epithelium formed from the myotome and dermatome.
        is_a: UBERON_0000486
        meaning: 'UBERON:0004290'
      UBERON_0010077:
        title: cuboidal epithelium
        description: An epithelium consisting of cuboidal epithelial cells.
        is_a: UBERON_0000483
        meaning: 'UBERON:0010077'
      UBERON_0012274:
        title: columnar epithelium
        description: An epithelium that consists of columnar epithelial cells. Columnar
          epithelia are epithelial cells whose heights are at least four times their
          width. Columnar epithelia are divided into simple (or unilayered), and the
          rarer stratified (or multi-layered).[WP, modified].
        is_a: UBERON_0000483
        meaning: 'UBERON:0012274'
      UBERON_0000488:
        title: atypical epithelium
        description: Epithelium that consists of epithelial cells not arranged in
          one ore more layers.
        is_a: UBERON_0000483
        meaning: 'UBERON:0000488'
      UBERON_0003914:
        title: epithelial tube
        description: Epithelial tubes transport gases, liquids and cells from one
          site to another and form the basic structure of many organs and tissues,
          with tube shape and organization varying from the single-celled excretory
          organ in Caenorhabditis elegans to the branching trees of the mammalian
          kidney and insect tracheal system.
        is_a: UBERON_0000483
        meaning: 'UBERON:0003914'
      UBERON_0007500:
        title: epithelial tube open at both ends
        description: An epithelial tube open at both ends that allows fluid flow.
        is_a: UBERON_0003914
        meaning: 'UBERON:0007500'
      UBERON_0003350:
        title: epithelium of mucosa
        description: A layer of epithelial cells on the surface of the mucosa.
        is_a: UBERON_0000483
        meaning: 'UBERON:0003350'
      UBERON_0002424:
        title: oral epithelium
        description: An epithelium that is part of the mouth and lines the oral cavity,
          typically stratified squamous, and may be para-, ortho- or non- keratinized.
          Primary barrier between oral environment and deeper tissues.
        is_a: UBERON_0003350
        meaning: 'UBERON:0002424'
      UBERON_0003929:
        title: digestive tract epithelium
        description: An epithelium that lines the lumen of the digestive tract.
        is_a: UBERON_0000483
        meaning: 'UBERON:0003929'
      UBERON_0035037:
        title: jaw epithelium
        is_a: UBERON_0003929
        meaning: 'UBERON:0035037'
      UBERON_0015833:
        title: foregut epithelium
        description: An epithelium that is part of a foregut.
        is_a: UBERON_0003929
        meaning: 'UBERON:0015833'
      UBERON_0003353:
        title: epithelium of hindgut
        description: An epithelium that is part of a hindgut [Automatically generated
          definition].
        is_a: UBERON_0003929
        meaning: 'UBERON:0003353'
      UBERON_0012481:
        title: cloacal epithelium
        description: An epithelium that is part of a cloaca.
        is_a: UBERON_0003929
        meaning: 'UBERON:0012481'
      UBERON_0004808:
        title: gastrointestinal system epithelium
        description: An epithelium that is part of a digestive system [Automatically
          generated definition].
        is_a: UBERON_0000483
        meaning: 'UBERON:0004808'
      UBERON_0007503:
        title: epithelial vesicle
        description: A closed epithelium with a lumen.
        is_a: UBERON_0000483
        meaning: 'UBERON:0007503'
      UBERON_0002329:
        title: somite
        description: Somites are spheres of epithelial cells that form sequentially
          along the anterior-posterior axis of the embryo through mesenchymal to epithelial
          transition of the presomitic mesoderm.
        is_a: UBERON_0007503
        meaning: 'UBERON:0002329'
      UBERON_0005598:
        title: trunk somite
        description: A somite that is part of a trunk.
        is_a: UBERON_0002329
        meaning: 'UBERON:0005598'
      UBERON_0005911:
        title: endo-epithelium
        description: 'Epithelium that derives from the endoderm. Examples: urothelium,
          transitional epithelium of ureter, epithelium of prostatic gland.[FMA].'
        is_a: UBERON_0000483
        meaning: 'UBERON:0005911'
      UBERON_0012275:
        title: meso-epithelium
        description: Epithelium that derives from the mesoderm. [Automatically generated
          definition].
        is_a: UBERON_0000483
        meaning: 'UBERON:0012275'
      UBERON_0004291:
        title: heart rudiment
        description: A cone-like structure that is formed when myocardial progenitor
          cells of the heart field fuse at the midline. The heart rudiment is the
          first structure of the heart tube.
        is_a: UBERON_0012275
        meaning: 'UBERON:0004291'
      UBERON_0004807:
        title: respiratory system epithelium
        description: An epithelium that is part of a respiratory system [Automatically
          generated definition].
        is_a: UBERON_0000483
        meaning: 'UBERON:0004807'
      UBERON_0004909:
        title: epithelium of gonad
        description: An epithelium surrounding a gonad.
        is_a: UBERON_0000483
        meaning: 'UBERON:0004909'
      UBERON_0005157:
        title: epithelial fold
        description: An epithelial sheet bent on a linear axis.
        is_a: UBERON_0000483
        meaning: 'UBERON:0005157'
      UBERON_0019304:
        title: sensory organ epithelium
        is_a: UBERON_0000483
        meaning: 'UBERON:0019304'
      UBERON_0007625:
        title: pigment epithelium of eye
        description: Epithelial layer of the retina, ciliary body, or iris composed
          of cells containing pigment granules.
        is_a: UBERON_0019304
        meaning: 'UBERON:0007625'
      UBERON_0010303:
        title: extraembryonic epithelium
        description: An epithelium that is part of a extraembryonic structure.
        is_a: UBERON_0000483
        meaning: 'UBERON:0010303'
      UBERON_0002384:
        title: connective tissue
        description: Tissue with cells that deposit non-polarized extracellular matrix
          including connective tissue fibers and ground substance.
        is_a: UBERON_0000479
        meaning: 'UBERON:0002384'
      UBERON_0003566:
        title: head connective tissue
        description: A portion of connective tissue that is part of a head [Automatically
          generated definition].
        is_a: UBERON_0002384
        meaning: 'UBERON:0003566'
      UBERON_0004755:
        title: skeletal tissue
        description: A specialized form of connective tissue in which the extracellular
          matrix is firm, providing the tissue with resilience, and/or mineralized
          and that functions in mechanical and structural support.[VSAO].
        is_a: UBERON_0002384
        meaning: 'UBERON:0004755'
      UBERON_0002481:
        title: bone tissue
        description: Skeletal tissue with a collagen-rich extracellular matrix vascularized,
          mineralized with hydroxyapatite and typically including osteocytes located
          in lacunae that communicate with one another by cell processes (in canaliculi).
          Bone is deposited by osteoblasts.
        is_a: UBERON_0004755
        meaning: 'UBERON:0002481'
      UBERON_0003570:
        title: respiratory system connective tissue
        description: A portion of connective tissue that is part of a respiratory
          system [Automatically generated definition].
        is_a: UBERON_0002384
        meaning: 'UBERON:0003570'
      UBERON_0003586:
        title: trunk connective tissue
        description: A portion of connective tissue that is part of a trunk [Automatically
          generated definition].
        is_a: UBERON_0002384
        meaning: 'UBERON:0003586'
      UBERON_0003837:
        title: thoracic segment connective tissue
        description: A portion of connective tissue that is part of a thorax [Automatically
          generated definition].
        is_a: UBERON_0003586
        meaning: 'UBERON:0003837'
      UBERON_0011821:
        title: irregular connective tissue
        description: 'Connective tissue, which consists of a population of connective
          tissue cells, the intercellular matrix of which contains an irregular network
          of collagen and elastic fiber bundles. Examples: areolar tissue, mucoid
          tissue, connective tissue of peritoneum, connective tissue of fibrous pericardium.'
        is_a: UBERON_0002384
        meaning: 'UBERON:0011821'
      UBERON_0011822:
        title: dense irregular connective tissue
        description: 'Irregular connective tissue is an irregular connective tissue,
          the intercellular matrix of which contains a dense irregular network of
          collagen and elastic fiber bundles. Examples: connective tissue of peritoneum,
          connective tissue of fibrous pericardium.'
        is_a: UBERON_0011821
        meaning: 'UBERON:0011822'
      UBERON_0001013:
        title: adipose tissue
        description: Portion of connective tissue composed of adipocytes enmeshed
          in areolar tissue.
        is_a: UBERON_0011822
        meaning: 'UBERON:0001013'
      UBERON_0002190:
        title: subcutaneous adipose tissue
        description: A portion of adipose tissue that is part of the hypodermis, beneath
          the dermis.
        is_a: UBERON_0001013
        meaning: 'UBERON:0002190'
      UBERON_0011825:
        title: loose connective tissue
        description: 'Irregular connective tissue, the intercellular matrix of which
          contains a sparse irregular network of collagen and elastic fiber bundles.
          Examples: areolar tissue, neuroglial tissue, mucoid tissue.'
        is_a: UBERON_0011821
        meaning: 'UBERON:0011825'
      UBERON_0011823:
        title: dense connective tissue
        description: Dense connective tissue is mainly composed of collagen type I.
          Crowded between the collagen fibers are rows of fibroblasts, fiber-forming
          cells, that manufacture the fibers. Dense connective tissue forms strong,
          rope-like structures such as tendons and ligaments. Tendons attach skeletal
          muscles to bones; ligaments connect bones to bones at joints. Ligaments
          are more stretchy and contain more elastic fibers than tendons. Dense connective
          tissue also make up the lower layers of the skin (dermis), where it is arranged
          in sheets.
        is_a: UBERON_0002384
        meaning: 'UBERON:0011823'
      UBERON_0003714:
        title: neural tissue
        description: Portion of tissue in the nervous system which consists of neurons
          and glial cells, and may also contain parts of the vasculature.
        is_a: UBERON_0000479
        meaning: 'UBERON:0003714'
      UBERON_0003104:
        title: mesenchyme
        description: Portion of tissue composed of mesenchymal cells (motile cells
          that develop from epthelia via an epithelial to mesenchymal transition)
          and surrounding extracellular material. Mesenchyme has different embryological
          origins in different metazoan taxa - in many invertebrates it derives in
          whole or part from ectoderm. In vertebrates it derives largely from mesoderm,
          and sometimes the terms are used interchangeably, e.g. lateral plate mesoderm/mesenchyme.
        is_a: UBERON_0000479
        meaning: 'UBERON:0003104'
      UBERON_0010083:
        title: future dermis
        description: Mesenchyme that has the potential to develop into a dermis.
        is_a: UBERON_0003104
        meaning: 'UBERON:0010083'
      UBERON_0007524:
        title: dense mesenchyme tissue
        description: Mesenchyme with little extracellular matrix.
        is_a: UBERON_0003104
        meaning: 'UBERON:0007524'
      UBERON_0005856:
        title: developing mesenchymal condensation
        description: A delimited region of dense mesenchyme within looser mesenchyme.
        is_a: UBERON_0007524
        meaning: 'UBERON:0005856'
      UBERON_0003089:
        title: sclerotome
        description: Ventral somitic compartment that is a precursor of the axial
          skeleton[XAO]. Sclerotomes eventually differentiate into the vertebrae and
          most of the skull. The caudal (posterior) half of one sclerotome fuses with
          the rostral (anterior) half of the adjacent one to form each vertebra. From
          their initial location within the somite, the sclerotome cells migrate medially
          towards the notochord. These cells meet the sclerotome cells from the other
          side to form the vertebral body. From this vertebral body, sclerotome cells
          move dorsally and surround the developing spinal cord, forming the vertebral
          arch[WP].
        is_a: UBERON_0005856
        meaning: 'UBERON:0003089'
      UBERON_0007530:
        title: migrating mesenchyme population
        description: Mesenchymal cells that are migrating.
        is_a: UBERON_0003104
        meaning: 'UBERON:0007530'
      UBERON_0003855:
        title: gonad mesenchyme
        description: Mesenchyme that is part of a developing gonad [Automatically
          generated definition].
        is_a: UBERON_0003104
        meaning: 'UBERON:0003855'
      UBERON_0009503:
        title: mesenchyme of hindgut
        description: Mesenchyme that is part of a developing hindgut.
        is_a: UBERON_0003104
        meaning: 'UBERON:0009503'
      UBERON_0009751:
        title: cardiac mesenchyme
        description: The embryonic connective tissue made up of loosely aggregated
          mesenchymal cells, supported by interlaminar jelly, that gives rise to the
          developing cardiac structures.
        is_a: UBERON_0003104
        meaning: 'UBERON:0009751'
      UBERON_0002385:
        title: muscle tissue
        description: Muscle tissue is a contractile tissue made up of actin and myosin
          fibers[GO].
        is_a: UBERON_0000479
        meaning: 'UBERON:0002385'
      UBERON_0001135:
        title: smooth muscle tissue
        description: Muscle tissue which is unstriated, composed primarily of smooth
          muscle fibers surrounded by a reticulum of collagen and elastic fibers.
          Smooth muscle differs from striated muscle in the much higher actin/myosin
          ratio, the absence of conspicuous sarcomeres and the ability to contract
          to a much smaller fraction of its resting length[GO].
        is_a: UBERON_0002385
        meaning: 'UBERON:0001135'
      UBERON_0004226:
        title: gastrointestinal system smooth muscle
        description: A portion of smooth muscle tissue that is part of a digestive
          system [Automatically generated definition].
        is_a: UBERON_0001135
        meaning: 'UBERON:0004226'
      UBERON_0004221:
        title: intestine smooth muscle
        description: A portion of smooth muscle tissue that is part of a intestine
          [Automatically generated definition].
        is_a: UBERON_0004226
        meaning: 'UBERON:0004221'
      UBERON_0004225:
        title: respiratory system smooth muscle
        description: A portion of smooth muscle tissue that is part of a respiratory
          system [Automatically generated definition].
        is_a: UBERON_0001135
        meaning: 'UBERON:0004225'
      UBERON_0004296:
        title: respiratory system lymphatic vessel smooth muscle
        description: A lymphatic vessel smooth muscle that is part of a respiratory
          system [Automatically generated definition].
        is_a: UBERON_0004225
        meaning: 'UBERON:0004296'
      UBERON_0004297:
        title: respiratory system blood vessel smooth muscle
        description: A blood vessel smooth muscle that is part of a respiratory system
          [Automatically generated definition].
        is_a: UBERON_0004225
        meaning: 'UBERON:0004297'
      UBERON_0004231:
        title: anal region smooth muscle
        description: A portion of smooth muscle tissue that is part of an anal region
          [Automatically generated definition].
        is_a: UBERON_0001135
        meaning: 'UBERON:0004231'
      UBERON_0004232:
        title: lymphatic vessel smooth muscle
        description: A portion of smooth muscle tissue that is part of a lymphatic
          vessel [Automatically generated definition].
        is_a: UBERON_0001135
        meaning: 'UBERON:0004232'
      UBERON_0004237:
        title: blood vessel smooth muscle
        description: Smooth muscle found within, and composing the majority of the
          wall of blood vessels.
        is_a: UBERON_0001135
        meaning: 'UBERON:0004237'
      UBERON_0015783:
        title: smooth muscle layer in fatty layer of subcutaneous tissue
        description: A smooth muscle tissue that is part of a hypodermis.
        is_a: UBERON_0001135
        meaning: 'UBERON:0015783'
      UBERON_0007688:
        title: anlage
        description: Anlagen are populations of contiguous cells, typically arranged
          in one plane, that are morphologically indistinct, but that already correspond
          in extent to a later organ/tissue.
        is_a: UBERON_0000479
        meaning: 'UBERON:0007688'
      UBERON_0005292:
        title: extraembryonic tissue
        description: Portion of tissue that is contiguous with the embryo and is comprised
          of portions of tissue or cells that will not contribute to the embryo.
        is_a: UBERON_0000479
        meaning: 'UBERON:0005292'
      UBERON_0011216:
        title: organ system subdivision
        description: A subdivision of an anatomical system.
        is_a: UBERON_0010000
        meaning: 'UBERON:0011216'
      UBERON_0000010:
        title: peripheral nervous system
        description: A major division of the nervous system that contains nerves which
          connect the central nervous system (CNS) with sensory organs, other organs,
          muscles, blood vessels and glands.
        is_a: UBERON_0011216
        meaning: 'UBERON:0000010'
      UBERON_0000075:
        title: subdivision of skeletal system
        description: Anatomical cluster consisting of the skeletal elements and articular
          elements that are part of an individual subdivision of the organism.
        is_a: UBERON_0011216
        meaning: 'UBERON:0000075'
      UBERON_0011138:
        title: postcranial axial skeletal system
        description: Subdivision of the skeletal system which consists of the postcranial
          axial skeleton plus associated joints.
        is_a: UBERON_0000075
        meaning: 'UBERON:0011138'
      UBERON_0011249:
        title: appendicular skeletal system
        description: Subdivision of the skeletal system which consists of the appendicular
          skeleton plus associated joints.
        is_a: UBERON_0000075
        meaning: 'UBERON:0011249'
      UBERON_0003128:
        title: cranium
        description: Upper portion of the skull that excludes the mandible (when present
          in the organism).
        is_a: UBERON_0000075
        meaning: 'UBERON:0003128'
      UBERON_0010323:
        title: cranial skeletal system
        description: Skeletal subdivision of the head including skull (cranium plus
          mandible), pharyngeal and/or hyoid apparatus.
        is_a: UBERON_0000075
        meaning: 'UBERON:0010323'
      UBERON_0011137:
        title: axial skeletal system
        description: Subdivision of the skeletal system which consists of the axial
          skeleton plus associated joints.
        is_a: UBERON_0000075
        meaning: 'UBERON:0011137'
      UBERON_0011158:
        title: primary subdivision of skull
        description: 'The skull can be divided into two: the neurocranium and the
          facial skeleton.'
        is_a: UBERON_0000075
        meaning: 'UBERON:0011158'
      UBERON_0001434:
        title: skeletal system
        description: Anatomical system that is a multi-element, multi-tissue anatomical
          cluster that consists of the skeleton and the articular system.
        is_a: UBERON_0011216
        meaning: 'UBERON:0001434'
      UBERON_0000383:
        title: musculature of body
        description: The subdivision of the musculoskeletal system that consists of
          all the muscles of the body[VSAO, modified].
        is_a: UBERON_0011216
        meaning: 'UBERON:0000383'
      UBERON_0001015:
        title: musculature
        description: A subdivision of the muscular system corresponding to a subdisivision
          of an organism.
        is_a: UBERON_0011216
        meaning: 'UBERON:0001015'
      UBERON_0004479:
        title: musculature of trunk
        description: Any collection of muscles that is part of a trunk [Automatically
          generated definition].
        is_a: UBERON_0001015
        meaning: 'UBERON:0004479'
      UBERON_0004464:
        title: musculature of thorax
        description: Any collection of muscles that is part of a thorax [Automatically
          generated definition].
        is_a: UBERON_0004479
        meaning: 'UBERON:0004464'
      UBERON_0014793:
        title: musculature of pectoral complex
        description: Any collection of muscles that is part of a pectoral complex.
          The pectoral complex comprises the pectoral girdle and the associated limb
          or fin.
        is_a: UBERON_0001015
        meaning: 'UBERON:0014793'
      UBERON_0004471:
        title: musculature of pectoral girdle
        description: A subdivision of the musculature of the body in the pectoral
          girdle region. Includes pectoral and shoulder muscles.
        is_a: UBERON_0014793
        meaning: 'UBERON:0004471'
      UBERON_0008229:
        title: craniocervical region musculature
        description: Musculature system of the pharyngeal and head regions.
        is_a: UBERON_0001015
        meaning: 'UBERON:0008229'
      UBERON_0004473:
        title: musculature of face
        description: Any collection of muscles that is part of a face.
        is_a: UBERON_0008229
        meaning: 'UBERON:0004473'
      UBERON_0010912:
        title: subdivision of skeleton
        description: Anatomical cluster consisting of the skeletal elements (i.e.
          bone elements, cartilage elements, cartilage condensations) that are part
          of an individual subdivision of the organism. Excludes joints.
        is_a: UBERON_0011216
        meaning: 'UBERON:0010912'
      UBERON_0014477:
        title: thoracic skeleton
        description: Subdivision of skeletal system that consists of all skeletal
          elements in the thoracic region of the trunk. In most vertebrates this is
          the rib cage and sternum.
        is_a: UBERON_0010912
        meaning: 'UBERON:0014477'
      UBERON_0002090:
        title: postcranial axial skeleton
        description: The postcranial subdivision of skeleton structural components
          forming the long axis of the vertebrate body; in Danio, consisting of the
          notochord, vertebrae, ribs, supraneurals, intermuscular bones, and unpaired
          median fins; in human consists of the bones of the vertebral column, the
          thoracic cage and the pelvis[ZFA+FMA].
        is_a: UBERON_0010912
        meaning: 'UBERON:0002090'
      UBERON_0005944:
        title: axial skeleton plus cranial skeleton
        description: Subdivision of skeleton which consists of cranial skeleton, set
          of all vertebrae, set of all ribs and sternum[FMA, modified].
        is_a: UBERON_0010912
        meaning: 'UBERON:0005944'
      UBERON_0002091:
        title: appendicular skeleton
        description: Subdivision of skeleton which which consists of all the skeletal
          elements in in the pectoral and pelvic appendage complexes[cjm].
        is_a: UBERON_0010912
        meaning: 'UBERON:0002091'
      UBERON_0010719:
        title: girdle skeleton
        description: The subdivision of the skeleton of either the pectoral or pelvic
          girdle.
        is_a: UBERON_0010912
        meaning: 'UBERON:0010719'
      UBERON_0007831:
        title: pectoral girdle skeleton
        description: 'A subdivision of a limb or fin skeleton consisting of bones
          which connects the upper limb or fin to the axial skeleton on each side.
          It consists of the clavicle and scapula in humans and, in those species
          with three bones in the pectoral girdle, the coracoid. Some mammalian species
          (e.g. the dog and the horse) have only the scapula. In humans, the only
          joints between the shoulder girdle and axial skeleton are the sternoclavicular
          joints on each side. No joint exists between each scapula and the rib cage;
          instead the muscular connection between the two permits relatively great
          mobility of the shoulder girdle in relation to the pelvic girdle. In those
          species having only the scapula, no joint exists between the forelimb and
          the thorax, the only attachment being muscular[WP]. Examples: There are
          only two instances, right and left pectoral girdle skeletons.'
        is_a: UBERON_0010719
        meaning: 'UBERON:0007831'
      UBERON_0012475:
        title: skeleton of pectoral complex
        description: The collection of all skeletal elements in a pectoral complex
          - i.e. the combination of free limb or fin plus pectoral girdle.
        is_a: UBERON_0010912
        meaning: 'UBERON:0012475'
      UBERON_0002199:
        title: integument
        description: The dermis, epidermis and hypodermis.
        is_a: UBERON_0011216
        meaning: 'UBERON:0002199'
      UBERON_0006558:
        title: lymphatic part of lymphoid system
        description: An organ system subdivision that is a network of vessels capable
          of removing accumulating protein and fluid from the interstitial space and
          returning it to the vascular space. In some species, this network is connected
          to the immune system via lymph nodes and lymphocyte-producing organs, with
          the whole being the lymphoid system.
        is_a: UBERON_0011216
        meaning: 'UBERON:0006558'
      UBERON_0000062:
        title: organ
        description: Anatomical structure that performs a specific function or group
          of functions [WP].
        is_a: UBERON_0010000
        meaning: 'UBERON:0000062'
      UBERON_0002535:
        title: gill
        description: Anatomical surface structure found in many aquatic organisms.
          It is a respiration organ whose function is the extraction of oxygen from
          water and the excretion of carbon dioxide. The microscopic structure of
          a gill is such that it presents a very large surface area to the external
          environment. Gills usually consist of thin filaments of tissue, branches,
          or slender tufted processes which have a highly folded surface to increase
          surface area. A high surface area is crucial to the gas exchange of aquatic
          organisms as water contains only 1/20 parts dissolved Oxygen compared to
          air. With the exception of some aquatic insects, the filaments and lamellae
          (folds) contain blood or coelomic fluid, from which gases are exchanged
          through the thin walls. Oxygen is carried by the blood to other parts of
          the body. Carbon dioxide passes from the blood through the thin gill tissue
          into the water. Gills or gill-like organs, located in different parts of
          the body, are found in various groups of aquatic animals, including mollusks,
          crustaceans, insects, fish, and amphibians.
        is_a: UBERON_0000062
        meaning: 'UBERON:0002535'
      UBERON_0000020:
        title: sense organ
        description: An organ that is capable of transducing sensory stimulus to the
          nervous system.
        is_a: UBERON_0000062
        meaning: 'UBERON:0000020'
      UBERON_0000970:
        title: eye
        description: An organ that detects light.
        is_a: UBERON_0000020
        meaning: 'UBERON:0000970'
      UBERON_0000047:
        title: simple eye
        description: "An eye with one concave chamber. Note that 'simple' does not\
          \ imply a reduced level of complexity or acuity."
        is_a: UBERON_0000970
        meaning: 'UBERON:0000047'
      UBERON_0004765:
        title: skeletal element
        description: Organ consisting of skeletal tissue. Encompasses whole bones,
          fused bones, cartilaginious elements, teeth, dermal denticles.
        is_a: UBERON_0000062
        meaning: 'UBERON:0004765'
      UBERON_0001474:
        title: bone element
        description: Skeletal element that is composed of bone tissue.
        is_a: UBERON_0004765
        meaning: 'UBERON:0001474'
      UBERON_0007914:
        title: bone of craniocervical region
        description: A bone that is part of a craniocervical region.
        is_a: UBERON_0001474
        meaning: 'UBERON:0007914'
      UBERON_0003457:
        title: head bone
        description: A bone that is part of a head [Automatically generated definition].
        is_a: UBERON_0007914
        meaning: 'UBERON:0003457'
      UBERON_0004766:
        title: cranial bone
        description: A bone that is part of a cranium.
        is_a: UBERON_0003457
        meaning: 'UBERON:0004766'
      UBERON_0003463:
        title: trunk bone
        description: A bone that is part of a trunk [Automatically generated definition].
        is_a: UBERON_0001474
        meaning: 'UBERON:0003463'
      UBERON_0003827:
        title: thoracic segment bone
        description: A bone that is part of a thorax [Automatically generated definition].
        is_a: UBERON_0003463
        meaning: 'UBERON:0003827'
      UBERON_0007719:
        title: bone of reproductive organ
        description: A bone that is part of a reproductive organ.
        is_a: UBERON_0001474
        meaning: 'UBERON:0007719'
      UBERON_0010740:
        title: bone of appendage girdle complex
        description: A bone that is part of an appendage girdle complex (i.e. any
          bone in a limb, fin or girdle).
        is_a: UBERON_0001474
        meaning: 'UBERON:0010740'
      UBERON_0007828:
        title: girdle bone/zone
        description: A bone that is part of a appendage girdle region.
        is_a: UBERON_0010740
        meaning: 'UBERON:0007828'
      UBERON_0007829:
        title: pectoral girdle bone
        description: A bone that is part of a pectoral girdle region.
        is_a: UBERON_0007828
        meaning: 'UBERON:0007829'
      UBERON_0010741:
        title: bone of pectoral complex
        description: 'A bone that is part of a pectoral complex. Examples: scapula,
          manus phalanx, any carpal bone, any bone of the pectoral fin.'
        is_a: UBERON_0010740
        meaning: 'UBERON:0010741'
      UBERON_0003103:
        title: compound organ
        description: Anatomical structure that has as its parts two or more multi-tissue
          structures of at least two different types and which through specific morphogenetic
          processes forms a single distinct structural unit demarcated by bona fide
          boundaries from other distinct anatomical structures of different types.
        is_a: UBERON_0000062
        meaning: 'UBERON:0003103'
      UBERON_0000489:
        title: cavitated compound organ
        description: Compound organ that contains one or more macroscopic anatomical
          spaces.
        is_a: UBERON_0003103
        meaning: 'UBERON:0000489'
      UBERON_0015228:
        title: circulatory organ
        description: 'A hollow, muscular organ, which, by contracting rhythmically,
          contributes to the circulation of lymph, blood or analogs. Examples: a chambered
          vertebrate heart; the tubular peristaltic heart of ascidians; the dorsal
          vessel of an insect; the lymoh heart of a reptile.'
        is_a: UBERON_0003103
        meaning: 'UBERON:0015228'
      UBERON_0007100:
        title: primary circulatory organ
        description: A hollow, muscular organ, which, by contracting rhythmically,
          keeps up the circulation of the blood or analogs[GO,modified].
        is_a: UBERON_0015228
        meaning: 'UBERON:0007100'
      UBERON_0003133:
        title: reproductive organ
        description: An organ involved in reproduction.
        is_a: UBERON_0000062
        meaning: 'UBERON:0003133'
      UBERON_0000991:
        title: gonad
        description: Reproductive organ that produces and releases eggs (ovary) or
          sperm (testis).
        is_a: UBERON_0003133
        meaning: 'UBERON:0000991'
      UBERON_0001630:
        title: muscle organ
        description: Organ consisting of a tissue made up of various elongated cells
          that are specialized to contract and thus to produce movement and mechanical
          work[GO].
        is_a: UBERON_0000062
        meaning: 'UBERON:0001630'
      UBERON_0003831:
        title: respiratory system muscle
        description: Any muscle organ that is part of a respiratory system [Automatically
          generated definition].
        is_a: UBERON_0001630
        meaning: 'UBERON:0003831'
      UBERON_0004253:
        title: skin muscle
        description: Any muscle organ that is part of a skin of body [Automatically
          generated definition].
        is_a: UBERON_0001630
        meaning: 'UBERON:0004253'
      UBERON_0014783:
        title: cloacal muscle
        description: Any muscle organ that is part of a cloaca.
        is_a: UBERON_0001630
        meaning: 'UBERON:0014783'
      UBERON_0005177:
        title: trunk region element
        description: An organ or element that part of the trunk region. The trunk
          region can be further subdividied into thoracic (including chest and thoracic
          cavity) and abdominal (including abdomen and pelbis) regions.
        is_a: UBERON_0000062
        meaning: 'UBERON:0005177'
      UBERON_0005181:
        title: thoracic segment organ
        description: An organ that part of the thoracic segment region. This region
          can be further subdividied chest and thoracic cavity regions.
        is_a: UBERON_0005177
        meaning: 'UBERON:0005181'
      UBERON_0005178:
        title: thoracic cavity element
        description: 'An organ or element that is in the thoracic cavity. Examples:
          lung, heart, longus colli.'
        is_a: UBERON_0005181
        meaning: 'UBERON:0005178'
      UBERON_0015410:
        title: heart plus pericardium
        is_a: UBERON_0005178
        meaning: 'UBERON:0015410'
      UBERON_0002075:
        title: viscus
        description: 'An organ that is located within the body cavity (or in its extension,
          in the scrotum); it consists of organ parts that are embryologically derived
          from endoderm, splanchnic mesoderm or intermediate mesoderm; together with
          other organs, the viscus constitutes the respiratory, gastrointestinal,
          urinary, reproductive and immune systems, or is the central organ of the
          cardiovascular system. Examples: heart, lung, esophagus, kidney, ovary,
          spleen.'
        is_a: UBERON_0005177
        meaning: 'UBERON:0002075'
      UBERON_0004177:
        title: hemopoietic organ
        description: Organ that is part of the hematopoietic system.
        is_a: UBERON_0000062
        meaning: 'UBERON:0004177'
      UBERON_0005057:
        title: immune organ
        description: An organ that is part of a immune system [Automatically generated
          definition].
        is_a: UBERON_0000062
        meaning: 'UBERON:0005057'
      UBERON_0013765:
        title: digestive system element
        description: 'Any of the organs or elements that are part of the digestive
          system. Examples: tongue, esophagus, spleen, crop, lunge feeding organ,
          tooth elements.'
        is_a: UBERON_0000062
        meaning: 'UBERON:0013765'
      UBERON_0004111:
        title: anatomical conduit
        description: Any tube, opening or passage that connects two distinct anatomical
          spaces.
        is_a: UBERON_0010000
        meaning: 'UBERON:0004111'
      UBERON_0000025:
        title: tube
        description: Any hollow cylindrical anatomical structure containing a lumen
          through which substances are transported.
        is_a: UBERON_0004111
        meaning: 'UBERON:0000025'
      UBERON_0001555:
        title: digestive tract
        description: A tube extending from the mouth to the anus.
        is_a: UBERON_0000025
        meaning: 'UBERON:0001555'
      ENVO_01001187:
        title: holothurian digestive tract
        description: A digestive tract environment which has its properties and dynamics
          determined by the digestive tract of an echinoderm from the class Holothuroidea.
        is_a: UBERON_0001555
        meaning: 'ENVO:01001187'
      UBERON_0006555:
        title: excretory tube
        description: A tube that is part of a excretory system.
        is_a: UBERON_0000025
        meaning: 'UBERON:0006555'
      UBERON_0000055:
        title: vessel
        description: A tubular structure that contains, conveys body fluid, such as
          blood or lymph.
        is_a: UBERON_0004111
        meaning: 'UBERON:0000055'
      UBERON_0001473:
        title: lymphatic vessel
        description: A vessel that contains or conveys lymph, that originates as an
          interfibrillar or intercellular cleft or space in a tissue or organ, and
          that if small has no distinct walls or walls composed only of endothelial
          cells and if large resembles a vein in structure[BTO].
        is_a: UBERON_0000055
        meaning: 'UBERON:0001473'
      UBERON_0001422:
        title: facial lymphatic vessel
        description: A lymphatic vessel that is part of a face [Automatically generated
          definition].
        is_a: UBERON_0001473
        meaning: 'UBERON:0001422'
      UBERON_0001425:
        title: pectoral lymphatic vessel
        is_a: UBERON_0001473
        meaning: 'UBERON:0001425'
      UBERON_0003456:
        title: respiratory system lymphatic vessel
        description: A lymphatic vessel that is part of a respiratory system [Automatically
          generated definition].
        is_a: UBERON_0001473
        meaning: 'UBERON:0003456'
      UBERON_0001981:
        title: blood vessel
        description: A vessel through which blood circulates in the body.
        is_a: UBERON_0000055
        meaning: 'UBERON:0001981'
      UBERON_0003496:
        title: head blood vessel
        description: A blood vessel that is part of a head [Automatically generated
          definition].
        is_a: UBERON_0001981
        meaning: 'UBERON:0003496'
      UBERON_0003504:
        title: respiratory system blood vessel
        description: A blood vessel that is part of a respiratory system [Automatically
          generated definition].
        is_a: UBERON_0001981
        meaning: 'UBERON:0003504'
      UBERON_3010200:
        title: vasculature of respiratory integument
        description: Blood vessels in respiratory skin.
        is_a: UBERON_0003504
        meaning: 'UBERON:3010200'
      UBERON_0003513:
        title: trunk blood vessel
        description: A blood vessel that is part of a trunk [Automatically generated
          definition].
        is_a: UBERON_0001981
        meaning: 'UBERON:0003513'
      UBERON_0003834:
        title: thoracic segment blood vessel
        description: A blood vessel that is part of a thorax [Automatically generated
          definition].
        is_a: UBERON_0003513
        meaning: 'UBERON:0003834'
      UBERON_0003498:
        title: heart blood vessel
        description: A blood vessel that is part of a heart [Automatically generated
          definition].
        is_a: UBERON_0003834
        meaning: 'UBERON:0003498'
      UBERON_0005985:
        title: coronary vessel
        description: Any of the arteries or veins that supply blood to the heart or
          return blood from the heart muscles to the circulation.
        is_a: UBERON_0000055
        meaning: 'UBERON:0005985'
      UBERON_0000161:
        title: orifice
        description: Anatomical conduit that connects two adjacent body spaces (or
          a body space with the space surrounding the organism)[FMA,modified].
        is_a: UBERON_0004111
        meaning: 'UBERON:0000161'
      UBERON_0000166:
        title: oral opening
        description: The orifice that connects the mouth to the exterior of the body.
        is_a: UBERON_0000161
        meaning: 'UBERON:0000166'
      UBERON_0012464:
        title: cloacal vent
        description: The opening of the cloacal chamber to the outside of the organism.
          Birds maintain a single cloacal opening throughout their lives.
        is_a: UBERON_0000161
        meaning: 'UBERON:0012464'
      UBERON_0036253:
        title: orifice of skull
        is_a: UBERON_0000161
        meaning: 'UBERON:0036253'
      UBERON_0005744:
        title: bone foramen
        description: Anatomical space that is an opening in a bone, usually for passage
          of blood vessels or nerves.
        is_a: UBERON_0004111
        meaning: 'UBERON:0005744'
      UBERON_0013685:
        title: foramen of skull
        description: Anatomical space that is an opening in a bone of the skull.
        is_a: UBERON_0005744
        meaning: 'UBERON:0013685'
      UBERON_0000064:
        title: organ part
        description: A multicellular structure that is a part of an organ.
        is_a: UBERON_0010000
        meaning: 'UBERON:0000064'
      UBERON_0034944:
        title: zone of organ
        is_a: UBERON_0000064
        meaning: 'UBERON:0034944'
      UBERON_0010188:
        title: protuberance
        description: A roughly circular bulge in a surface.
        is_a: UBERON_0034944
        meaning: 'UBERON:0010188'
      UBERON_0013522:
        title: subdivision of tube
        is_a: UBERON_0000064
        meaning: 'UBERON:0013522'
      UBERON_0004921:
        title: subdivision of digestive tract
        description: A proximal-distal subdivision of the digestive tract.
        is_a: UBERON_0013522
        meaning: 'UBERON:0004921'
      UBERON_0000165:
        title: mouth
        description: The proximal portion of the digestive tract, containing the oral
          cavity and bounded by the oral opening. In vertebrates, this extends to
          the pharynx and includes gums, lips, tongue and parts of the palate. Typically
          also includes the teeth, except where these occur elsewhere (e.g. pharyngeal
          jaws) or protrude from the mouth (tusks).
        is_a: UBERON_0004921
        meaning: 'UBERON:0000165'
      UBERON_0000160:
        title: intestine
        description: Segment of the alimentary canal extending from the stomach to
          the anus and, in humans and other mammals, consists of two segments, the
          small intestine and the large intestine.
        is_a: UBERON_0004921
        meaning: 'UBERON:0000160'
      UBERON_0001041:
        title: foregut
        description: Anterior subdivision of a digestive tract.
        is_a: UBERON_0004921
        meaning: 'UBERON:0001041'
      UBERON_0001046:
        title: hindgut
        description: The caudalmost subdivision of a digestive tract.
        is_a: UBERON_0004921
        meaning: 'UBERON:0001046'
      UBERON_0004185:
        title: endodermal part of digestive tract
        description: A portions of the gut that is derived from endoderm.
        is_a: UBERON_0004921
        meaning: 'UBERON:0004185'
      UBERON_0006562:
        title: pharynx
        description: The pharynx is the part of the digestive system immediately posterior
          to the mouth[GO].
        is_a: UBERON_0004921
        meaning: 'UBERON:0006562'
      UBERON_0000162:
        title: cloaca
        description: Common chamber into which the intestines and excretory system
          opens. Arises during development in all vertebrates, but in many it becomes
          subdivided, lost or incorporated into other structures.
        is_a: UBERON_0013522
        meaning: 'UBERON:0000162'
      UBERON_0000163:
        title: embryonic cloaca
        description: Endoderm-lined chamber that develops as pouch-like dilation of
          the caudal end of the hindgut and receives the allantois ventrally and two
          mesonephric ducts laterally; caudally it ends blindly at the cloacal membrane
          formed by the union of proctodeal (anal pit) ectoderm and cloacal endoderm,
          with no intervening mesoderm[MP].
        is_a: UBERON_0000162
        meaning: 'UBERON:0000163'
      UBERON_0035804:
        title: future mouth
        description: The primordial mouth region of the developing head.
        is_a: UBERON_0013522
        meaning: 'UBERON:0035804'
      UBERON_0000930:
        title: stomodeum
        description: Anterior part of the embryonic digestive tract that develops
          into a mouth. The stomodeum includes as parts an invagination of the ectoderm
          and the stomodeal cavity.
        is_a: UBERON_0013522
        meaning: 'UBERON:0000930'
      UBERON_0000060:
        title: anatomical wall
        description: Organ component adjacent to an organ cavity and which consists
          of a maximal aggregate of organ component layers.
        is_a: UBERON_0000064
        meaning: 'UBERON:0000060'
      UBERON_0000328:
        title: gut wall
        description: The wall of the digestive tract. This encompasses all parts of
          the digestive tract with the exception of the lumen (cavity).
        is_a: UBERON_0000060
        meaning: 'UBERON:0000328'
      UBERON_0001262:
        title: wall of intestine
        description: An anatomical wall that is part of a intestine [Automatically
          generated definition].
        is_a: UBERON_0000328
        meaning: 'UBERON:0001262'
      UBERON_0035965:
        title: wall of blood vessel
        is_a: UBERON_0000060
        meaning: 'UBERON:0035965'
      UBERON_0037144:
        title: wall of heart
        description: Wall of organ which has as its parts the endocardium, myocardium
          , epicardium, and the cardiac septum, surrounded by the pericardial sac
          proper and is continuous with the walls of the systemic and pulmonary arterial
          and venous trees.
        is_a: UBERON_0000060
        meaning: 'UBERON:0037144'
      UBERON_0004923:
        title: organ component layer
        description: A part of a wall of an organ that forms a layer.
        is_a: UBERON_0000064
        meaning: 'UBERON:0004923'
      UBERON_0000344:
        title: mucosa
        description: 'A lining of mostly endodermal origin, covered in epithelium,
          which is involved in absorption and secretion. They line various body cavities
          that are exposed to the external environment and internal organs. It is
          at several places continuous with skin: at the nostrils, the lips, the ears,
          the genital area, and the anus. The sticky, thick fluid secreted by the
          mucous membranes and gland is termed mucus. The term mucous membrane refers
          to where they are found in the body and not every mucous membrane secretes
          mucus[WP].'
        is_a: UBERON_0004923
        meaning: 'UBERON:0000344'
      UBERON_0004786:
        title: gastrointestinal system mucosa
        description: A mucosa that is part of a gastrointestinal system.
        is_a: UBERON_0000344
        meaning: 'UBERON:0004786'
      UBERON_0001242:
        title: intestinal mucosa
        description: Mucosal layer that lines the intestine.
        is_a: UBERON_0004786
        meaning: 'UBERON:0001242'
      UBERON_0003729:
        title: mouth mucosa
        description: A mucous membrane that lines the mouth.
        is_a: UBERON_0000344
        meaning: 'UBERON:0003729'
      UBERON_0003343:
        title: mucosa of oral region
        description: A mucosa that is part of a oral opening [Automatically generated
          definition].
        is_a: UBERON_0003729
        meaning: 'UBERON:0003343'
      UBERON_0004785:
        title: respiratory system mucosa
        description: The mucous membrane lining the respiratory tract.
        is_a: UBERON_0000344
        meaning: 'UBERON:0004785'
      UBERON_0012480:
        title: cloacal mucosa
        description: A mucosa that is part of a cloaca [Automatically generated definition].
        is_a: UBERON_0000344
        meaning: 'UBERON:0012480'
      UBERON_0019042:
        title: reproductive system mucosa
        is_a: UBERON_0000344
        meaning: 'UBERON:0019042'
      UBERON_0005388:
        title: photoreceptor array
        description: An array of photoreceptors and any supporting cells found in
          an eye.
        is_a: UBERON_0004923
        meaning: 'UBERON:0005388'
      UBERON_0005283:
        title: tela choroidea
        description: A structure found in the walls of the ventricles of the brain,
          consisting of part of the meninges (pia mater in mammals) plus ependyma[cjm].
        is_a: UBERON_0004923
        meaning: 'UBERON:0005283'
      UBERON_0013754:
        title: integumentary system layer
        description: An organ component layer that is part of a integumental system.
        is_a: UBERON_0004923
        meaning: 'UBERON:0013754'
      UBERON_0002072:
        title: hypodermis
        description: Lowermost layer of the integumentary system in vertebrates. Types
          of cells that are found in the hypodermis are fibroblasts, adipose cells,
          and macrophages. It is derived from the mesoderm, but unlike the dermis,
          it is not derived from the dermatome region of the mesoderm. The hypodermis
          is used mainly for fat storage[WP].
        is_a: UBERON_0013754
        meaning: 'UBERON:0002072'
      UBERON_0005358:
        title: ventricle of nervous system
        description: A layer in the central nervous system that lines system of communicating
          cavities in the brain and spinal cord.
        is_a: UBERON_0004923
        meaning: 'UBERON:0005358'
      UBERON_0004797:
        title: blood vessel layer
        description: 'Any of the tissue layers that comprise a blood vessel. Examples:
          tunica media, tunica adventitia.'
        is_a: UBERON_0004923
        meaning: 'UBERON:0004797'
      UBERON_0005983:
        title: heart layer
        description: The laminar structure of the heart.
        is_a: UBERON_0004923
        meaning: 'UBERON:0005983'
      UBERON_0000063:
        title: organ subunit
        description: A part of an organ that constitutes a distinct modular sub-unit.
          In some cases, the organ may also contain other sub-units of identical or
          similar types, in other cases this may be a distinct entity.
        is_a: UBERON_0000064
        meaning: 'UBERON:0000063'
      UBERON_0004732:
        title: segmental subdivision of nervous system
        description: Any segmental subdivision of a nervous system. Includes metameric
          developmental segments, such as vertebrates neuromeres.
        is_a: UBERON_0000063
        meaning: 'UBERON:0004732'
      UBERON_0004151:
        title: cardiac chamber
        description: A cardiac chamber surrounds an enclosed cavity within the heart.
        is_a: UBERON_0000064
        meaning: 'UBERON:0004151'
      UBERON_0006003:
        title: integumentary adnexa
        description: 'Anatomical structure embedded in or located in the integument
          that is part of the integumental system. Examples: hair, follicles, skin
          glands, claws, nails, feathers.'
        is_a: UBERON_0000064
        meaning: 'UBERON:0006003'
      UBERON_0013703:
        title: integumentary projection
        description: Anatomical projection that is part of the integumentl system.
        is_a: UBERON_0006003
        meaning: 'UBERON:0013703'
      UBERON_0000021:
        title: cutaneous appendage
        description: 'Anatomical projection that protrudes from the skin. Examples:
          hair, nail, feather, claw, hoof, horn, wattle, spur, beak, antler, bristle
          and some scales.'
        is_a: UBERON_0013703
        meaning: 'UBERON:0000021'
      UBERON_0034921:
        title: multi organ part structure
        description: An multicellular anatomical structure that has subparts of multiple
          organs as a part.
        is_a: UBERON_0010000
        meaning: 'UBERON:0034921'
      UBERON_0004905:
        title: articulation
        description: Anatomical cluster that connects two or more adjacent skeletal
          elements or hardened body parts.
        is_a: UBERON_0034921
        meaning: 'UBERON:0004905'
      UBERON_0000982:
        title: skeletal joint
        description: Anatomical cluster that consists of two or more adjacent skeletal
          structures, which may be interconnected by various types of tissue[VSAO].
        is_a: UBERON_0004905
        meaning: 'UBERON:0000982'
      UBERON_0002217:
        title: synovial joint
        description: 'Joint in which the articulating bones or cartilages are connected
          by an articular capsule which encloses a synovial membrane and a synovial
          cavity. Examples: Temporomandibular joint, knee joint.[FMA].'
        is_a: UBERON_0000982
        meaning: 'UBERON:0002217'
      UBERON_0011108:
        title: synovial joint of pectoral girdle
        description: A synovial joint that is part of a pectoral girdle region.
        is_a: UBERON_0002217
        meaning: 'UBERON:0011108'
      UBERON_0011134:
        title: nonsynovial joint
        description: 'Joint in which the articulating bones or cartilages are connected
          by ligaments or fibrocartilage without an intervening synovial cavity. Examples:
          sagittal suture, inferior tibiofibular syndesmosis, costochondral joint,
          pubic symphysis.'
        is_a: UBERON_0000982
        meaning: 'UBERON:0011134'
      UBERON_0008114:
        title: joint of girdle
        description: A skeletal joint that is part of a appendage girdle region.
        is_a: UBERON_0000982
        meaning: 'UBERON:0008114'
      UBERON_0000481:
        title: multi-tissue structure
        description: Anatomical structure that has as its parts two or more portions
          of tissue of at least two different types and which through specific morphogenetic
          processes forms a single distinct structural unit demarcated by bona-fide
          boundaries from other distinct structural units of different types.
        is_a: UBERON_0010000
        meaning: 'UBERON:0000481'
      UBERON_0000073:
        title: regional part of nervous system
        description: Any part or collection of parts of the central or peripheral
          nervous system. Parts may span both CNS and PNS.
        is_a: UBERON_0000481
        meaning: 'UBERON:0000073'
      UBERON_0012361:
        title: internal anal region
        is_a: UBERON_0000481
        meaning: 'UBERON:0012361'
      UBERON_0016887:
        title: entire extraembryonic component
        description: The part of the conceptus that may be lost before birth or will
          be discarded at birth, or when the embryo becomes an independent organism.
        is_a: UBERON_0000481
        meaning: 'UBERON:0016887'
      UBERON_0005498:
        title: primitive heart tube
        description: Multi-tissue structure that arises from the heart rudiment and
          will become the heart tube.
        is_a: UBERON_0000481
        meaning: 'UBERON:0005498'
      UBERON_0000475:
        title: organism subdivision
        description: Anatomical structure which is a subdivision of a whole organism,
          consisting of components of multiple anatomical systems, largely surrounded
          by a contiguous region of integument.
        is_a: UBERON_0010000
        meaning: 'UBERON:0000475'
      UBERON_0011676:
        title: subdivision of organism along main body axis
        description: A major subdivision of an organism that divides an organism along
          its main body axis (typically anterio-posterior axis). In vertebrates, this
          is based on the vertebral column.
        is_a: UBERON_0000475
        meaning: 'UBERON:0011676'
      UBERON_0000033:
        title: head
        description: The head is the anterior-most division of the body [GO].
        is_a: UBERON_0011676
        meaning: 'UBERON:0000033'
      UBERON_0008816:
        title: embryonic head
        description: A head that is part of a embryo.
        is_a: UBERON_0000033
        meaning: 'UBERON:0008816'
      UBERON_0000915:
        title: thoracic segment of trunk
        description: Subdivision of trunk that lies between the head and the abdomen.
        is_a: UBERON_0011676
        meaning: 'UBERON:0000915'
      UBERON_0002100:
        title: trunk
        description: Organism subdivision which is the part of the body posterior
          to the cervical region (or head, when cervical region not present) and anterior
          to the caudal region. Includes the sacrum when present.
        is_a: UBERON_0011676
        meaning: 'UBERON:0002100'
      UBERON_0007811:
        title: craniocervical region
        description: The anteriormost subdivision of the body that includes the head,
          jaws, pharyngeal region and the neck (if present). In vertebrates this is
          the subdivision that includes the cervical vertebrae.
        is_a: UBERON_0000475
        meaning: 'UBERON:0007811'
      UBERON_0000153:
        title: anterior region of body
        is_a: UBERON_0000475
        meaning: 'UBERON:0000153'
      UBERON_0009569:
        title: subdivision of trunk
        is_a: UBERON_0000475
        meaning: 'UBERON:0009569'
      UBERON_0001353:
        title: anal region
        description: The anus and surrounding regions. Encompasses both internal and
          external regions, where present.
        is_a: UBERON_0000475
        meaning: 'UBERON:0001353'
      UBERON_0007823:
        title: appendage girdle region
        description: An organism subdivision that encompasses the region containing
          the pectoral or pelvic girdle. Note that this includes both the skeletal
          elements and associated tissues (integument, muscle, etc).
        is_a: UBERON_0000475
        meaning: 'UBERON:0007823'
      UBERON_0001444:
        title: subdivision of head
        is_a: UBERON_0000475
        meaning: 'UBERON:0001444'
      UBERON_0004088:
        title: orbital region
        description: The subdivision of the face that includes the eye (eyeball plus
          adnexa such as eyelids) and the orbit of the skull and associated parts
          of the face such as the eyebrows, if present.
        is_a: UBERON_0001444
        meaning: 'UBERON:0004088'
      UBERON_0001456:
        title: face
        description: A subdivision of the head that has as parts the layers deep to
          the surface of the anterior surface, including the mouth, eyes, and nose
          (when present). In vertebrates, this includes the facial skeleton and structures
          superficial to the facial skeleton (cheeks, mouth, eyeballs, skin of face,
          etc).
        is_a: UBERON_0001444
        meaning: 'UBERON:0001456'
      UBERON_0013702:
        title: body proper
        description: The region of the organism associated with the visceral organs.
        is_a: UBERON_0000475
        meaning: 'UBERON:0013702'
      UBERON_0013701:
        title: main body axis
        description: A principle subdivision of an organism that includes all structures
          along the primary axis, typically the anterior-posterior axis, from head
          to tail, including structures of the body proper where present (for example,
          ribs), but excluding appendages.
        is_a: UBERON_0000475
        meaning: 'UBERON:0013701'
      UBERON_0000468:
        title: multicellular organism
        description: Anatomical structure that is an individual member of a species
          and consists of more than one cell.
        is_a: UBERON_0010000
        meaning: 'UBERON:0000468'
      UBERON_0000922:
        title: embryo
        description: Anatomical entity that comprises the organism in the early stages
          of growth and differentiation that are characterized by cleavage, the laying
          down of fundamental tissues, and the formation of primitive organs and organ
          systems. For example, for mammals, the process would begin with zygote formation
          and end with birth. For insects, the process would begin at zygote formation
          and end with larval hatching. For plant zygotic embryos, this would be from
          zygote formation to the end of seed dormancy. For plant vegetative embryos,
          this would be from the initial determination of the cell or group of cells
          to form an embryo until the point when the embryo becomes independent of
          the parent plant.
        is_a: UBERON_0000468
        meaning: 'UBERON:0000922'
      UBERON_0000307:
        title: blastula
        description: Organism at the blastula stage - an early stage of embryonic
          development in animals. It is produced by cleavage of a fertilized ovum
          and consists of a spherical layer of around 128 cells surrounding a central
          fluid-filled cavity called the blastocoel. The blastula follows the morula
          and precedes the gastrula in the developmental sequence.
        is_a: UBERON_0000922
        meaning: 'UBERON:0000307'
      UBERON_0007010:
        title: cleaving embryo
        description: Organism at the cleavage stage.
        is_a: UBERON_0000922
        meaning: 'UBERON:0007010'
      UBERON_0000323:
        title: late embryo
        description: An embryo that is at the late embryonic stage; this stage covers
          late steps of the embryogenesis with a fully formed embryo still developing
          before birth or egg hatching.
        is_a: UBERON_0000922
        meaning: 'UBERON:0000323'
      UBERON_0004734:
        title: gastrula
        description: Organism at the gastrula stage.
        is_a: UBERON_0000922
        meaning: 'UBERON:0004734'
      UBERON_0005156:
        title: reproductive structure
        description: Any anatomical structure that is part of the reproductive system.
        is_a: UBERON_0010000
        meaning: 'UBERON:0005156'
      UBERON_0034929:
        title: external soft tissue zone
        description: A region or zone on the surface of an organism that encompasses
          skin and any adnexa, down through muscles and bounded by underlying skeletal
          support structures.
        is_a: UBERON_0010000
        meaning: 'UBERON:0034929'
      UBERON_0009472:
        title: axilla
        description: The axilla is the area directly under the joint where the forelimb
          connects to the shoulder.
        is_a: UBERON_0034929
        meaning: 'UBERON:0009472'
      UBERON_0000467:
        title: anatomical system
        description: Multicellular, connected anatomical structure that has multiple
          organs as parts and whose parts work together to achieve some shared function.
        is_a: UBERON_0000061
        meaning: 'UBERON:0000467'
      UBERON_0002416:
        title: integumental system
        description: Connected anatomical system that forms a barrier between an animal
          and its environment. In vertebrates, the integumental system consists of
          the epidermis, dermis plus associated glands and adnexa such as hair and
          scales. In invertebrates, the integumental system may include cuticle.
        is_a: UBERON_0000467
        meaning: 'UBERON:0002416'
      UBERON_0001016:
        title: nervous system
        description: The nervous system is an organ system containing predominantly
          neuron and glial cells. In bilaterally symmetrical organism, it is arranged
          in a network of tree-like structures connected to a central body. The main
          functions of the nervous system are to regulate and control body functions,
          and to receive sensory input, process this information, and generate behavior
          [CUMBO].
        is_a: UBERON_0000467
        meaning: 'UBERON:0001016'
      UBERON_0005409:
        title: alimentary part of gastrointestinal system
        description: The part of the digestive system that excludes the hepatobiliary
          system.
        is_a: UBERON_0000467
        meaning: 'UBERON:0005409'
      UBERON_0004122:
        title: genitourinary system
        description: Anatomical system that has as its parts the organs concerned
          with the production and excretion of urine and those concerned with reproduction.
        is_a: UBERON_0000467
        meaning: 'UBERON:0004122'
      UBERON_0002390:
        title: hematopoietic system
        description: Anatomical system that is involved in the production of hematopoietic
          cells.
        is_a: UBERON_0000467
        meaning: 'UBERON:0002390'
      UBERON_0002193:
        title: hemolymphoid system
        description: Anatomical cluster consisting of the hematopoietic system and
          the lymphoid system, or its analogs.
        is_a: UBERON_0000467
        meaning: 'UBERON:0002193'
      UBERON_0000990:
        title: reproductive system
        description: Anatomical system that has as its parts the organs concerned
          with reproduction.
        is_a: UBERON_0000467
        meaning: 'UBERON:0000990'
      UBERON_0001004:
        title: respiratory system
        description: Functional system which consists of structures involved in respiration.
        is_a: UBERON_0000467
        meaning: 'UBERON:0001004'
      UBERON_0001007:
        title: digestive system
        description: Anatomical system that has as its parts the organs devoted to
          the ingestion, digestion, and assimilation of food and the discharge of
          residual wastes.
        is_a: UBERON_0000467
        meaning: 'UBERON:0001007'
      UBERON_0001009:
        title: circulatory system
        description: Organ system that passes nutrients (such as amino acids and electrolytes),
          gases, hormones, blood cells, etc. to and from cells in the body to help
          fight diseases and help stabilize body temperature and pH to maintain homeostasis[WP].
        is_a: UBERON_0000467
        meaning: 'UBERON:0001009'
      UBERON_0002204:
        title: musculoskeletal system
        description: Anatomical system that consists of the muscular and skeletal
          systems.
        is_a: UBERON_0000467
        meaning: 'UBERON:0002204'
      UBERON_0004456:
        title: entire sense organ system
        description: Sum of all sensory systems in an organism.
        is_a: UBERON_0000467
        meaning: 'UBERON:0004456'
      UBERON_8450002:
        title: excretory system
        description: An anatomical system that eliminates waste products that arise
          as a result of metabolic activity.
        is_a: UBERON_0000467
        meaning: 'UBERON:8450002'
      UBERON_0001008:
        title: renal system
        description: The renal system in an anatomical system that maintains fluid
          balance and contributes to electrolyte balance, acid/base balance, and disposal
          of nitrogenous waste products.
        is_a: UBERON_8450002
        meaning: 'UBERON:0001008'
      UBERON_0007798:
        title: vascular system
        description: Anatomical system that consists of all blood and lymph vessels.
        is_a: UBERON_0000467
        meaning: 'UBERON:0007798'
      UBERON_0002465:
        title: lymphoid system
        description: The lymphatic system in vertebrates is a network of conduits
          that carry a clear fluid called lymph. It also includes the lymphoid tissue
          through which the lymph travels. Lymphoid tissue is found in many organs,
          particularly the lymph nodes, and in the lymphoid follicles associated with
          the digestive system such as the tonsils. The system also includes all the
          structures dedicated to the circulation and production of lymphocytes, which
          includes the spleen, thymus, bone marrow and the lymphoid tissue associated
          with the digestive system[WP].
        is_a: UBERON_0000467
        meaning: 'UBERON:0002465'
      UBERON_0004535:
        title: cardiovascular system
        description: Anatomical system that has as its parts the heart and blood vessels.
        is_a: UBERON_0000467
        meaning: 'UBERON:0004535'
      UBERON_0011695:
        title: embryonic cardiovascular system
        description: A cardiovascular system that is part of a conceptus.
        is_a: UBERON_0004535
        meaning: 'UBERON:0011695'
      UBERON_0004119:
        title: endoderm-derived structure
        description: An anatomical structure that develops (entirely or partially)
          from the endoderm.
        is_a: UBERON_0000061
        meaning: 'UBERON:0004119'
      UBERON_0000077:
        title: mixed endoderm/mesoderm-derived structure
        description: An anatomical structure that develops from the endoderm and the
          mesoderm.
        is_a: UBERON_0004119
        meaning: 'UBERON:0000077'
      UBERON_0004120:
        title: mesoderm-derived structure
        description: An anatomical structure that develops (entirely or partially)
          from the mesoderm.
        is_a: UBERON_0000061
        meaning: 'UBERON:0004120'
      UBERON_0002099:
        title: cardiac septum
        description: The thin membranous structure between the two heart atria or
          the thick muscular structure between the two heart ventricles.
        is_a: UBERON_0004120
        meaning: 'UBERON:0002099'
      UBERON_0005162:
        title: multi cell part structure
        description: A structure consisting of multiple cell components but which
          is not itself a cell and does not have (complete) cells as a part.
        is_a: UBERON_0000061
        meaning: 'UBERON:0005162'
      UBERON_0000122:
        title: neuron projection bundle
        description: A fasciculated bundle of neuron projections (GO:0043005), largely
          or completely lacking synapses.
        is_a: UBERON_0005162
        meaning: 'UBERON:0000122'
      UBERON_0001021:
        title: nerve
        description: An enclosed, cable-like bundle of axons in the peripheral nervous
          system originating in a nerve root in the central nervous system (or a condensed
          nervous structure) connecting with peripheral structures.
        is_a: UBERON_0000122
        meaning: 'UBERON:0001021'
      UBERON_0003439:
        title: nerve of trunk region
        description: A nerve that is part of the trunk region of the body (not to
          be confused with a nerve trunk).
        is_a: UBERON_0001021
        meaning: 'UBERON:0003439'
      UBERON_0003824:
        title: nerve of thoracic segment
        description: A nerve that is part of a thorax [Automatically generated definition].
        is_a: UBERON_0003439
        meaning: 'UBERON:0003824'
      UBERON_0011779:
        title: nerve of head region
        description: A nerve that is part of a head.
        is_a: UBERON_0001021
        meaning: 'UBERON:0011779'
      UBERON_0000476:
        title: acellular anatomical structure
        description: Anatomical structure that consists of cell parts and cell substances
          and together does not constitute a cell or a tissue.
        is_a: UBERON_0000061
        meaning: 'UBERON:0000476'
      UBERON_0011860:
        title: collection of collagen fibrils
        is_a: UBERON_0000476
        meaning: 'UBERON:0011860'
      UBERON_0011863:
        title: bone collagen fibril
        description: The connective tissue bundles in the extracellular matrix of
          bone tissue that are composed of collagen, and play a role in tissue strength
          and elasticity.
        is_a: UBERON_0011860
        meaning: 'UBERON:0011863'
      UBERON_0005764:
        title: acellular membrane
        description: An acellular anatomical structure that is the bounding layer
          of a anatomical structure.
        is_a: UBERON_0000476
        meaning: 'UBERON:0005764'
      UBERON_0005769:
        title: basement membrane of epithelium
        description: An acellular membrane that is part of the epithelium, lies adjacent
          to the epithelial cells, and is the fusion of the the basal lamina and the
          reticular lamina.
        is_a: UBERON_0005764
        meaning: 'UBERON:0005769'
      UBERON_0015329:
        title: respiratory system basement membrane
        description: A basement membrane of epithelium that is part of a respiratory
          system.
        is_a: UBERON_0005769
        meaning: 'UBERON:0015329'
      UBERON_0005389:
        title: transparent eye structure
        description: A transparent structure that is part of a visual sense organ,
          the function of which is to direct or focus light onto a photoreceptor array.
        is_a: UBERON_0000061
        meaning: 'UBERON:0005389'
      UBERON_0005090:
        title: muscle structure
        description: Muscle structures are contractile cells, tissues or organs that
          are found in multicellular organisms[GO].
        is_a: UBERON_0000061
        meaning: 'UBERON:0005090'
      UBERON_0003037:
        title: septum
        description: A wall, dividing a cavity or structure into smaller ones[WP].
        is_a: UBERON_0000061
        meaning: 'UBERON:0003037'
      UBERON_0003219:
        title: shell septum
        description: Septum that divides the internal chambers (camerae) of the shell
          of a cephalopod, namely nautiloids or ammonoids.
        is_a: UBERON_0003037
        meaning: 'UBERON:0003219'
      UBERON_0006211:
        title: buccopharyngeal membrane
        description: The thin bilaminar membrane derived from the prechordal plate
          that is devoid of mesoderm and formed by the apposition of the stomodeal
          ectoderm with the foregut endoderm; after the embryonic head fold has evolved
          it lies at the caudal limit of the stomodeum, forming a septum between the
          primitive mouth and pharynx; the membrane eventually disappears, and thus
          a communication is established between the mouth and the future pharynx.
        is_a: UBERON_0003037
        meaning: 'UBERON:0006211'
      UBERON_0003102:
        title: surface structure
        description: Anatomical structure that overlaps the outer epithelial layer
          and is adjacent to the space surrounding the organism.
        is_a: UBERON_0000061
        meaning: 'UBERON:0003102'
      UBERON_3000961:
        title: external integument structure
        description: Structures of the dermis, epidermis, glands and pigment cells
          recognizable on the external surfaces of the integument.
        is_a: UBERON_0003102
        meaning: 'UBERON:3000961'
      UBERON_3000972:
        title: head external integument structure
        description: Dermal, epidermal, glandular and pigment structures of the external
          head integument.
        is_a: UBERON_3000961
        meaning: 'UBERON:3000972'
      UBERON_3000977:
        title: body external integument structure
        description: Dermal, epidermal, glandular and pigment structures of the body
          integument.
        is_a: UBERON_3000961
        meaning: 'UBERON:3000977'
      UBERON_0034768:
        title: morphological feature
        description: A part of an organism or organ that is continuous with its surroundings
          and distinguished from its surroundings based on morphology.
        is_a: UBERON_0000061
        meaning: 'UBERON:0034768'
      UBERON_0004529:
        title: anatomical projection
        description: A projection or outgrowth of tissue from a larger body or organ.
        is_a: UBERON_0034768
        meaning: 'UBERON:0004529'
      UBERON_4100000:
        title: skeletal element projection
        description: Anatomical projection that is composed of bone or cartilage tissue.
        is_a: UBERON_0004529
        meaning: 'UBERON:4100000'
      UBERON_0004716:
        title: conceptus
        description: The embryo and its adnexa (appendages or adjunct parts) or associated
          membranes (i.e. the products of conception) The conceptus includes all structures
          that develop from the zygote, both embryonic and extraembryonic. It includes
          the embryo as well as the embryonic part of the placenta and its associated
          membranes - amnion, chorion (gestational sac), and yolk sac[WP].
        is_a: UBERON_0000061
        meaning: 'UBERON:0004716'
      UBERON_0011585:
        title: cell condensation
        description: Anatomical structure that is an aggregation of similar cells
          from which cartilages and bones form, and from which chondrogenesis and
          osteogenesis are initiated during repair and/or regeneration. (Hall and
          Miyake 1995).
        is_a: UBERON_0000061
        meaning: 'UBERON:0011585'
      UBERON_0007651:
        title: anatomical junction
        description: An anatomical structure that connects two structures.
        is_a: UBERON_0000061
        meaning: 'UBERON:0007651'
      UBERON_0006264:
        title: mouth-foregut junction
        description: An anatomical junctions that overlaps the mouth and foregut.
        is_a: UBERON_0007651
        meaning: 'UBERON:0006264'
      UBERON_1100000:
        title: digestive tract junction
        description: An anatomical junction between two parts of the digestive tract.
        is_a: UBERON_0007651
        meaning: 'UBERON:1100000'
      UBERON_8410024:
        title: intestinal junction
        description: An anatomical junction between two parts of the intestine.
        is_a: UBERON_1100000
        meaning: 'UBERON:8410024'
      UBERON_0036215:
        title: anatomical surface region
        description: Material anatomical entity that forms the outermost boundary
          of an anatomical structure.
        is_a: UBERON_0000465
        meaning: 'UBERON:0036215'
      UBERON_0000463:
        title: organism substance
        description: Material anatomical entity in a gaseous, liquid, semisolid or
          solid state; produced by anatomical structures or derived from inhaled and
          ingested substances that have been modified by anatomical structures as
          they pass through the body.
        is_a: UBERON_0000465
        meaning: 'UBERON:0000463'
      UBERON_0000456:
        title: secretion of exocrine gland
        description: A portion of organism substance that is produced by exocrine
          glands.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000456'
      UBERON_0001970:
        title: bile
        description: Vital aqueous secretion of the liver that is formed by hepatocytes
          and modified down stream by absorptive and secretory properties of the bile
          duct epithelium.
        is_a: UBERON_0000456
        meaning: 'UBERON:0001970'
      UBERON_0001836:
        title: saliva
        description: A fluid produced in the oral cavity by salivary glands, typically
          used in predigestion, but also in other functions.
        is_a: UBERON_0000456
        meaning: 'UBERON:0001836'
      UBERON_0001866:
        title: sebum
        description: Fatty lubricant matter secreted by sebaceous glands, and made
          of made of triglyceride oils, wax, squalene, and metabolytes of fat-producing
          cells[BTO,WP].
        is_a: UBERON_0000456
        meaning: 'UBERON:0001866'
      UBERON_0000912:
        title: mucus
        description: Mucus is a bodily fluid consisting of a slippery secretion of
          the lining of the mucous membranes in the body. It is a viscous colloid
          containing antiseptic enzymes (such as lysozyme) and immunoglobulins. Mucus
          is produced by goblet cells in the mucous membranes that cover the surfaces
          of the membranes. It is made up of mucins and inorganic salts suspended
          in water.
        is_a: UBERON_0000456
        meaning: 'UBERON:0000912'
      UBERON_0001089:
        title: sweat
        description: Secretion produced by a sweat gland.
        is_a: UBERON_0000456
        meaning: 'UBERON:0001089'
      UBERON_0002297:
        title: cerumen
        description: The yellow or brown waxy secretions produced by vestigial apocrine
          sweat glands in the external ear canal[MESH].
        is_a: UBERON_0001089
        meaning: 'UBERON:0002297'
      UBERON_0007794:
        title: secretion of serous gland
        description: Any fluid produced by a serous gland.
        is_a: UBERON_0000456
        meaning: 'UBERON:0007794'
      UBERON_0001090:
        title: synovial fluid
        description: Joint fluid is a transudate of plasma that is actively secreted
          by synovial cells.
        is_a: UBERON_0007794
        meaning: 'UBERON:0001090'
      UBERON_0006539:
        title: mammary gland fluid/secretion
        description: A substance that is secreted by a mammary gland. The substance
          may differ depending on phase, with colostrum produced during pregancy/early
          lactation, and milk produced afterwards.
        is_a: UBERON_0000456
        meaning: 'UBERON:0006539'
      UBERON_0001913:
        title: milk
        description: An emulsion of fat globules within a fluid that is secreted by
          the mammary gland during lactation.
        is_a: UBERON_0006539
        meaning: 'UBERON:0001913'
      UBERON_0006314:
        title: bodily fluid
        description: Liquid components of living organisms. includes fluids that are
          excreted or secreted from the body as well as body water that normally is
          not.
        is_a: UBERON_0000463
        meaning: 'UBERON:0006314'
      ENVO_01001188:
        title: holothurian digestive tract contents
        description: A bodily fluid which is present in the digestive tract of a member
          of the Holothuroidea.
        is_a: UBERON_0006314
        meaning: 'ENVO:01001188'
      UBERON_0001796:
        title: aqueous humor of eyeball
        description: A thick watery refractive medium that fills the space between
          the lens and the cornea[WP].
        is_a: UBERON_0006314
        meaning: 'UBERON:0001796'
      UBERON_0000910:
        title: chyme
        description: A semifluid mass of partly digested food expelled by the stomach
          into the duodenum.
        is_a: UBERON_0006314
        meaning: 'UBERON:0000910'
      UBERON_0000179:
        title: haemolymphatic fluid
        description: Circulating fluid that is part of the hemolymphoid system. Blood,
          lymph, interstitial fluid or its analogs.
        is_a: UBERON_0006314
        meaning: 'UBERON:0000179'
      UBERON_0000178:
        title: blood
        description: A fluid that is composed of blood plasma and erythrocytes.
        is_a: UBERON_0000179
        meaning: 'UBERON:0000178'
      UBERON_0001969:
        title: blood plasma
        description: The liquid component of blood, in which erythrocytes are suspended.
        is_a: UBERON_0000179
        meaning: 'UBERON:0001969'
      UBERON_0002391:
        title: lymph
        description: Lymph is the fluid that is formed when interstitial fluid enters
          the conduits of the lymphatic system through lymph capillaries[WP].
        is_a: UBERON_0000179
        meaning: 'UBERON:0002391'
      UBERON_0007779:
        title: transudate
        description: Any bodily fluid that has passed through a membrane such as the
          capillary wall, as a result of unbalanced hydrostatic and osmotic forces.
        is_a: UBERON_0006314
        meaning: 'UBERON:0007779'
      UBERON_0001359:
        title: cerebrospinal fluid
        description: A clear, colorless, bodily fluid, that occupies the subarachnoid
          space and the ventricular system around and inside the brain and spinal
          cord.
        is_a: UBERON_0007779
        meaning: 'UBERON:0001359'
      UBERON_0036244:
        title: secretion of serous membrane
        description: A transudate found in the serous sac.
        is_a: UBERON_0007779
        meaning: 'UBERON:0036244'
      UBERON_0001087:
        title: pleural fluid
        description: Transudate contained in the pleural cavity.
        is_a: UBERON_0036244
        meaning: 'UBERON:0001087'
      UBERON_0000175:
        title: pleural effusion
        description: Pleural effusion is a bodily fluid that is produced in exess
          and accumulates in the pleural cavity, the fluid-filled space that surrounds
          the lungs. Excessive amounts of such fluid can impair breathing by limiting
          the expansion of the lungs during inhalation.
        is_a: UBERON_0001087
        meaning: 'UBERON:0000175'
      UBERON_0000173:
        title: amniotic fluid
        description: Amniotic fluid is a bodily fluid consisting of watery liquid
          surrounding and cushioning a growing fetus within the amnion. It allows
          the fetus to move freely without the walls of the uterus being too tight
          against its body. Buoyancy is also provided. The composition of the fluid
          changes over the course of gestation. Initially, amniotic fluid is similar
          to maternal plasma, mainly water with electrolytes. As the fetus develops,
          proteins, carbohydrates, lipids, phospholipids originating from the lungs,
          fetal cells, and urea are deposited in the fluid.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000173'
      UBERON_0000174:
        title: excreta
        description: A portion of organism substance that is the product of an excretion
          process that will be eliminated from the body. An excretion process is elimination
          by an organism of the waste products that arise as a result of metabolic
          activity.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000174'
      UBERON_0001988:
        title: feces
        description: Portion of semisolid bodily waste discharged through the anus[MW,modified].
        is_a: UBERON_0000174
        meaning: 'UBERON:0001988'
      UBERON_0007109:
        title: meconium
        description: A dark greenish mass that accumulates in the bowel during fetal
          life and is discharged shortly after birth.
        is_a: UBERON_0001988
        meaning: 'UBERON:0007109'
      UBERON_0001088:
        title: urine
        description: Excretion that is the output of a kidney.
        is_a: UBERON_0000174
        meaning: 'UBERON:0001088'
      UBERON_0000911:
        title: chyle
        description: Chyle is a bodily fluid consisting of a milky fluid consisting
          of lymph and emulsified fats; formed in the small intestine during digestion
          of ingested fats.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000911'
      UBERON_0000176:
        title: oronasal secretion
        description: A bodily fluid secreted from the body via the mouth or nose.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000176'
      UBERON_0000177:
        title: pus
        description: Pus is a bodily fluid consisting of a whitish-yellow or yellow
          substance produced during inflammatory responses of the body that can be
          found in regions of pyogenic bacterial infections. Pus is produced from
          the dead and living cells which travel into the intercellular spaces around
          the affected cells.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000177'
      UBERON_0000913:
        title: interstitial fluid
        description: Interstitial fluid is a bodily fluid consisting of a solution
          which bathes and surrounds the cells of multicellular animals. It is the
          main component of the extracellular fluid, which also includes plasma and
          transcellular fluid.
        is_a: UBERON_0000463
        meaning: 'UBERON:0000913'
      UBERON_0036017:
        title: regurgitated substance
        description: A bodily fluid consisting of the contents of the digestive tract
          expulsed through the anterior portion of the digestive tract.
        is_a: UBERON_0000463
        meaning: 'UBERON:0036017'
      UBERON_0000172:
        title: vomit
        description: A bodily fluid consisting of the expulsed contents of the stomach
          disgorged through the mouth or nose that happens as a result of a vomit
          reflex.
        is_a: UBERON_0036017
        meaning: 'UBERON:0000172'
      UBERON_0036016:
        title: honey
        description: A sweet viscid material elaborated out of the nectar of flowers
          in the honey sac of various bees.
        is_a: UBERON_0036017
        meaning: 'UBERON:0036016'
      UBERON_0012112:
        title: ingested food
        description: A substance that is consumed by the organism for food.
        is_a: UBERON_0000463
        meaning: 'UBERON:0012112'
      UBERON_0006312:
        title: ocular refractive media
        description: Body substance in a liquid or semi-solid state in the eyeball
          which serves to refract light.
        is_a: UBERON_0000463
        meaning: 'UBERON:0006312'
      UBERON_0001797:
        title: vitreous humor
        description: A transparent, semigelatinous substance that fills the cavity
          behind the crystalline lens of the eye and in front of the retina.
        is_a: UBERON_0006312
        meaning: 'UBERON:0001797'
      UBERON_0034923:
        title: disconnected anatomical group
        description: Material anatomical entity consisting of multiple anatomical
          structures that are not connected to each other.
        is_a: UBERON_0000465
        meaning: 'UBERON:0034923'
      UBERON_0000477:
        title: anatomical cluster
        description: Anatomical group that has its parts adjacent to one another.
        is_a: UBERON_0034923
        meaning: 'UBERON:0000477'
      UBERON_0006612:
        title: shell
        description: A rigid covering that envelops an object.
        is_a: UBERON_0000477
        meaning: 'UBERON:0006612'
      UBERON_0002049:
        title: vasculature
        description: 'An interconnected tubular multi-tissue structure contains fluid
          that is actively transported around the organism[ZFA]. Examples: vasculature
          of lung, vasculature of face.'
        is_a: UBERON_0000477
        meaning: 'UBERON:0002049'
      UBERON_0004536:
        title: lymph vasculature
        description: A network of blunt ended vessels lacking direct connection to
          the blood vascular system. These vessels collect and drain fluids and macromolecules
          from interstitial spaces throughout the animal. They derive from a subpopulation
          of endothelial cells and have walls that are much thinner than the blood
          carrying vessels. Lymphatic vessels are usually classified as either superficial
          or deep.
        is_a: UBERON_0002049
        meaning: 'UBERON:0004536'
      UBERON_0011363:
        title: cranial lymph vasculature
        description: A lymph vasculature that is part of a head.
        is_a: UBERON_0004536
        meaning: 'UBERON:0011363'
      UBERON_0005629:
        title: vascular plexus
        description: A vascular network formed by frequent anastomoses between the
          blood vessels (arteries or veins) of a part.
        is_a: UBERON_0002049
        meaning: 'UBERON:0005629'
      UBERON_0006876:
        title: vasculature of organ
        description: A vasculature that is part of a organ.
        is_a: UBERON_0002049
        meaning: 'UBERON:0006876'
      UBERON_0002203:
        title: vasculature of eye
        description: Vasculature that is part of the eye region.
        is_a: UBERON_0006876
        meaning: 'UBERON:0002203'
      UBERON_0001776:
        title: optic choroid
        description: Vascular layer containing connective tissue, of the eye lying
          between the retina and the sclera. The choroid provides oxygen and nourishment
          to the outer layers of the retina. Along with the ciliary body and iris,
          the choroid forms the uveal tract[WP].
        is_a: UBERON_0002203
        meaning: 'UBERON:0001776'
      UBERON_0004864:
        title: vasculature of retina
        description: A vasculature that is part of a retina [Automatically generated
          definition].
        is_a: UBERON_0002203
        meaning: 'UBERON:0004864'
      UBERON_0004118:
        title: vasculature of iris
        description: A vasculature that is part of a iris [Automatically generated
          definition].
        is_a: UBERON_0002203
        meaning: 'UBERON:0004118'
      UBERON_0018674:
        title: heart vasculature
        description: An interconnected tubular multi-tissue structure that contains
          fluid that is actively transported around the heart.
        is_a: UBERON_0006876
        meaning: 'UBERON:0018674'
      UBERON_0008998:
        title: vasculature of brain
        description: System pertaining to blood vessels in the brain.
        is_a: UBERON_0006876
        meaning: 'UBERON:0008998'
      UBERON_0004521:
        title: vasculature of muscle organ
        description: A vasculature that is part of a muscle organ [Automatically generated
          definition].
        is_a: UBERON_0006876
        meaning: 'UBERON:0004521'
      UBERON_0004537:
        title: blood vasculature
        description: A vascular network consisting of blood vessels.
        is_a: UBERON_0002049
        meaning: 'UBERON:0004537'
      UBERON_0011362:
        title: cranial blood vasculature
        description: A blood vasculature that is part of a head.
        is_a: UBERON_0004537
        meaning: 'UBERON:0011362'
      UBERON_0002200:
        title: vasculature of head
        description: Vasculature that is part of a head [Automatically generated definition].
        is_a: UBERON_0002049
        meaning: 'UBERON:0002200'
      UBERON_0002201:
        title: vasculature of trunk
        description: A vasculature that is part of a trunk [Automatically generated
          definition].
        is_a: UBERON_0002049
        meaning: 'UBERON:0002201'
      UBERON_0004522:
        title: vasculature of musculoskeletal system
        description: A vasculature that is part of a musculoskeletal system [Automatically
          generated definition].
        is_a: UBERON_0002049
        meaning: 'UBERON:0004522'
      UBERON_0036302:
        title: vasculature of central nervous system plus retina
        is_a: UBERON_0002049
        meaning: 'UBERON:0036302'
      UBERON_0036303:
        title: vasculature of central nervous system
        is_a: UBERON_0036302
        meaning: 'UBERON:0036303'
      UBERON_0008814:
        title: pharyngeal arch system
        description: A transient embryonic complex that comprises the pharyngeal arches,
          bulges of tissues of mesoderm and neural crest derivation through which
          pass nerves and pharyngeal arch arteries. The arches are separated internally
          by pharyngeal pouches, evaginations of foregut endoderm, and externally
          by pharyngeal clefts, invaginations of surface ectoderm. The development
          of the system ends when the stucture it contributes to are forming, which
          may include (depending on species) the thymus, thyroid, parathyroids, maxilla,
          mandible, aortic arch, cardiac outflow tract, external and middle ear[GO,modified].
        is_a: UBERON_0000477
        meaning: 'UBERON:0008814'
      UBERON_0009142:
        title: entire embryonic mesenchyme
        description: Sum total of mesenchyme in the embryo.
        is_a: UBERON_0000477
        meaning: 'UBERON:0009142'
      UBERON_0015203:
        title: non-connected functional system
        description: An anatomical group whose component structures share a common
          function.
        is_a: UBERON_0034923
        meaning: 'UBERON:0015203'
      UBERON_0001032:
        title: sensory system
        description: Anatomical system that overlaps the nervous system and is responsible
          for receiving and processing sensory information.
        is_a: UBERON_0015203
        meaning: 'UBERON:0001032'
      UBERON_0002104:
        title: visual system
        description: The sensory system subserving the sense of vision.
        is_a: UBERON_0001032
        meaning: 'UBERON:0002104'
      UBERON_0002405:
        title: immune system
        description: Anatomical system that protects the body from foreign substances,
          cells, and tissues by producing the immune response and that includes especially
          the thymus, spleen, lymphoid tissue, lymphocytes including the B cells and
          T cells, and antibodies.
        is_a: UBERON_0015203
        meaning: 'UBERON:0002405'
      UBERON_0005423:
        title: developing anatomical structure
        is_a: UBERON_0000465
        meaning: 'UBERON:0005423'
      UBERON_0002050:
        title: embryonic structure
        description: Anatomical structure that is part of an embryo.
        is_a: UBERON_0005423
        meaning: 'UBERON:0002050'
      UBERON_0000164:
        title: primitive urogenital sinus
        description: The ventral part of the cloaca remaining after septation of the
          rectum, which further develops into part of the bladder, part of the prostatic
          part of the male urethra and the urethra and vestibule in females.
        is_a: UBERON_0002050
        meaning: 'UBERON:0000164'
      UBERON_0003064:
        title: intermediate mesoderm
        description: The intermediate mesoderm is located between the lateral mesoderm
          and the paraxial mesoderm. It develops into the kidney and gonads.
        is_a: UBERON_0002050
        meaning: 'UBERON:0003064'
      UBERON_0003080:
        title: anterior neural tube
        is_a: UBERON_0002050
        meaning: 'UBERON:0003080'
      UBERON_0004872:
        title: splanchnic layer of lateral plate mesoderm
        description: Layer of lateral plate mesoderm that forms the circulatory system
          and future gut wall - overlies endoderm[WP].
        is_a: UBERON_0002050
        meaning: 'UBERON:0004872'
      UBERON_0002532:
        title: epiblast (generic)
        description: In amniote animal embryology, the epiblast is a tissue type derived
          either from the inner cell mass in mammals or the blastodisc in birds and
          reptiles. It lies above the hypoblast. In mammalian embryogenesis, the columnar
          cells of the epiblast are adjacent to the trophoblast, while the cuboidal
          cells of the hypoblast are closer to the blastocoele. The epiblast, whilst
          referred to as the primary ectoderm, differentiates to form all three layers
          of the trilaminar germ disc in a process called gastrulation[WP]. The outer
          of the two layers of the blastoderm that form during gastrulation, corresponding
          to primitive ectoderm during gastrulation and to the definitive ectoderm
          after gastrulation[ZFA].
        is_a: UBERON_0002050
        meaning: 'UBERON:0002532'
      UBERON_0005085:
        title: ectodermal placode
        description: An ectodermal placode is a thickening of the ectoderm that is
          the primordium of many structures derived from the ectoderm[GO].
        is_a: UBERON_0002050
        meaning: 'UBERON:0005085'
      UBERON_0002546:
        title: cranial placode
        description: Ectodermal placode that develops in the head into a part of the
          sensory nervous system. With a few exceptions (lens, adenohypophyseal),
          cranial placodes are neurogenic.
        is_a: UBERON_0005085
        meaning: 'UBERON:0002546'
      UBERON_0003073:
        title: lens placode
        description: A thickened portion of ectoderm which serves as the precursor
          to the lens. SOX2 and Pou2f1 are involved in its development[WP].
        is_a: UBERON_0002546
        meaning: 'UBERON:0003073'
      UBERON_0011814:
        title: non-neurogenic ectodermal placode
        description: Ectodermal placode that does not develop into a component of
          the nervous system.
        is_a: UBERON_0005085
        meaning: 'UBERON:0011814'
      UBERON_0006598:
        title: presumptive structure
        description: Portion of embryonic tissue determined by fate mapping to become
          a structure.
        is_a: UBERON_0002050
        meaning: 'UBERON:0006598'
      UBERON_0006596:
        title: presumptive blood
        is_a: UBERON_0006598
        meaning: 'UBERON:0006596'
      UBERON_0006601:
        title: presumptive ectoderm
        description: Presumptive structure of the blastula that will develop into
          ectoderm.
        is_a: UBERON_0006598
        meaning: 'UBERON:0006601'
      UBERON_0006595:
        title: presumptive endoderm
        description: Presumptive structure of the blastula that will develop into
          endoderm.
        is_a: UBERON_0006598
        meaning: 'UBERON:0006595'
      UBERON_0006603:
        title: presumptive mesoderm
        description: Presumptive structure of the blastula that will develop into
          mesoderm.
        is_a: UBERON_0006598
        meaning: 'UBERON:0006603'
      UBERON_0006238:
        title: future brain
        description: The embryonic precursor of the brain.
        is_a: UBERON_0006598
        meaning: 'UBERON:0006238'
      UBERON_0016880:
        title: future nervous system
        description: Primordium that develops into the nervous system.
        is_a: UBERON_0006598
        meaning: 'UBERON:0016880'
      UBERON_0016879:
        title: future central nervous system
        description: Primordium that develops into the central nervous system.
        is_a: UBERON_0006598
        meaning: 'UBERON:0016879'
      UBERON_0005068:
        title: neural rod
        description: A solid rod of neurectoderm derived from the neural keel. The
          neural rod is roughly circular in cross section. Neural rod formation occurs
          during primary neurulation in teleosts[GO]. An intermediate stage in the
          development of the central nervous system present during the segmentation
          period; the neural rod is roughly cylindrical in shape, forms from the neural
          keel, and is not yet hollowed out into the neural tube[ZFIN].
        is_a: UBERON_0016879
        meaning: 'UBERON:0005068'
      UBERON_0007284:
        title: presumptive neural plate
        description: A presumptive structure that has the potential to develop into
          a neural plate.
        is_a: UBERON_0016879
        meaning: 'UBERON:0007284'
      UBERON_0007135:
        title: neural keel
        description: An intermediate stage (between the neural plate and neural rod)
          during the early segmentation period in the morphogenesis of the central
          nervous system primordium; the keel is roughly triangular shaped in cross
          section.
        is_a: UBERON_0016879
        meaning: 'UBERON:0007135'
      UBERON_0007026:
        title: presumptive gut
        is_a: UBERON_0006598
        meaning: 'UBERON:0007026'
      UBERON_0006240:
        title: future forebrain
        description: A presumptive structure that has the potential to develop into
          a forebrain.
        is_a: UBERON_0006598
        meaning: 'UBERON:0006240'
      UBERON_0014371:
        title: future telencephalon
        description: Embryonic structure that gives rise to the telencephalon.
        is_a: UBERON_0006598
        meaning: 'UBERON:0014371'
      UBERON_0006222:
        title: future diencephalon
        description: The foremost region of the future forebrain that develops into
          the diencephalon.
        is_a: UBERON_0006598
        meaning: 'UBERON:0006222'
      UBERON_0003059:
        title: presomitic mesoderm
        description: Unsegmented field of paraxial mesoderm present posterior to the
          most recently formed somite pair, from which somites will form.
        is_a: UBERON_0006598
        meaning: 'UBERON:0003059'
      UBERON_0003061:
        title: blood island
        description: Blood islands are structures in the developing embryo which lead
          to many different parts of the circulatory system. They primarily derive
          from plexuses formed from angioblasts. Within them, vacuoles appear through
          liquefaction of the central part of the syncytium into plasma. The lumen
          of the blood vessels thus formed is probably intracellular. The flattened
          cells at the periphery form the endothelium. The nucleated red blood corpuscles
          develop either from small masses of the original angioblast left attached
          to the inner wall of the lumen or directly from the flat endothelial cells.
          In either case the syncytial mass thus formed projects from and is attached
          to the wall of the vessel. Such a mass is known as a blood island and hemoglobin
          gradually accumulates within it. Later the cells on the surface round up,
          giving the mass a mulberry-like appearance. Then the red blood cells break
          loose and are carried away in the plasma. Such free blood cells continue
          to divide. Blood islands have been seen in the area vasculosa in the omphalomesenteric
          vein and arteries, and in the dorsal aorta[WP, unvetted].
        is_a: UBERON_0006598
        meaning: 'UBERON:0003061'
      UBERON_0007282:
        title: presumptive segmental plate
        description: A presumptive structure that has the potential to develop into
          a presomitic mesoderm.
        is_a: UBERON_0006598
        meaning: 'UBERON:0007282'
      UBERON_0007285:
        title: presumptive paraxial mesoderm
        description: The part of the blastula that has the potential to develop into
          a paraxial mesoderm.
        is_a: UBERON_0006598
        meaning: 'UBERON:0007285'
      UBERON_0003063:
        title: prechordal plate
        description: "A horseshoe-shaped thickening of the endoderm at the cranial\
          \ (rostral) end of the primitive streak formed by the involution of Spemann's\
          \ organizer cells which, together with the notochord, induces the formation\
          \ of the neural plate from the overlying ectodermal cells and contributes\
          \ mesodermal type cells to the surrounding tissue."
        is_a: UBERON_0002050
        meaning: 'UBERON:0003063'
      UBERON_0003068:
        title: axial mesoderm
        description: The axial mesoderm includes the prechordal mesoderm and the chordamesoderm.
          It gives rise to the prechordal plate and to the notochord.
        is_a: UBERON_0002050
        meaning: 'UBERON:0003068'
      UBERON_0034878:
        title: prechordal mesoderm
        description: The area of axial mesoderm that develops into the prechordal
          plate.
        is_a: UBERON_0002050
        meaning: 'UBERON:0034878'
      UBERON_0004139:
        title: cardiogenic plate
        description: The first recognizable structure derived from the heart field.
        is_a: UBERON_0002050
        meaning: 'UBERON:0004139'
      UBERON_0005061:
        title: neural groove
        description: The median dorsal longitudinal groove formed in the embryo by
          the neural plate after the appearance of the neural folds.
        is_a: UBERON_0002050
        meaning: 'UBERON:0005061'
      UBERON_0012314:
        title: embryonic facial prominence
        description: One of five swellings formed during the development of the face.
        is_a: UBERON_0002050
        meaning: 'UBERON:0012314'
      UBERON_0005867:
        title: mandibular prominence
        description: The paired ventral prominences formed by bifurcation of the first
          pharyngeal arches in the embryo; the two prominences unite ventrally and
          fuse to form the mandible and lower lip.
        is_a: UBERON_0012314
        meaning: 'UBERON:0005867'
      UBERON_0007237:
        title: 1st arch mandibular component
        is_a: UBERON_0002050
        meaning: 'UBERON:0007237'
      UBERON_0000478:
        title: extraembryonic structure
        description: A multicellular anatomical structure that is associated with
          an embryo and derived from the zygote from which it develops, but which
          does not contribute to the embryo proper or to structures that are part
          of the same organism after embryogenesis.
        is_a: UBERON_0005423
        meaning: 'UBERON:0000478'
      UBERON_0001048:
        title: primordium
        description: Primordia are populations of contiguous cells that are morphologically
          distinct and already correspond in extent to a later organ/tissue[FBbt,
          Hartenstein, V. (2004)].
        is_a: UBERON_0005423
        meaning: 'UBERON:0001048'
      UBERON_0005564:
        title: gonad primordium
        description: Portion of tissue that gives rise to the immature gonad.
        is_a: UBERON_0001048
        meaning: 'UBERON:0005564'
      UBERON_0003084:
        title: heart primordium
        description: 'Bilateral groups of cells consisting of three rows: one row
          of endocardial precursors medially and two rows of myocardical precursors
          laterally. The two populations fuse at the midline to form the heart rudiment
          or cone.'
        is_a: UBERON_0001048
        meaning: 'UBERON:0003084'
      UBERON_0014903:
        title: primordial vasculature
        description: A portion of tissue that will develop into vasculature.
        is_a: UBERON_0001048
        meaning: 'UBERON:0014903'
      UBERON_0006965:
        title: vascular cord
        description: The vascular cord is the primordial vasculature that will develop
          into blood vessels by the process of tubulogenesis[GO]. The vascular cord
          is composed of angioblast or vascular endothelial cells in a solid linear
          mass called a cord. The cord then undergoes tubulogenesis to form the lumen
          of the vessels[ZFA].
        is_a: UBERON_0005423
        meaning: 'UBERON:0006965'
      UBERON_0010312:
        title: immature eye
        description: Developing anatomical structure that develops into the eyeball
          and associated structures.
        is_a: UBERON_0005423
        meaning: 'UBERON:0010312'
      UBERON_0017650:
        title: developing mesenchymal structure
        description: A mesenchyme-derived anatomical entity undergoing a transtion
          to become another structure.
        is_a: UBERON_0005423
        meaning: 'UBERON:0017650'
      UBERON_0004016:
        title: dermatome
        description: A transitional population of migrating mesenchymal cells that
          derive from somites and that will become dermal cells.
        is_a: UBERON_0017650
        meaning: 'UBERON:0004016'
      UBERON_0016888:
        title: transitional anatomical structure
        description: An embryonic anatomical entity that will turn into one or more
          other anatomical entities, perhaps with other anatomical entities, later
          in development.
        is_a: UBERON_0005423
        meaning: 'UBERON:0016888'
      UBERON_0009145:
        title: pharyngeal region of foregut
        is_a: UBERON_0005423
        meaning: 'UBERON:0009145'
      UBERON_0034925:
        title: anatomical collection
        description: A collection of anatomical structures that are alike in terms
          of their morphology or developmental origin.
        is_a: UBERON_0000465
        meaning: 'UBERON:0034925'
      UBERON_0004288:
        title: skeleton
        description: Anatomical cluster that consists of all the skeletal elements
          (eg., bone, cartilage, and teeth) of the body.
        is_a: UBERON_0034925
        meaning: 'UBERON:0004288'
      UBERON_0004770:
        title: articular system
        description: Anatomical system that consists of all the joints of the body.
        is_a: UBERON_0034925
        meaning: 'UBERON:0004770'
      UBERON_0001062:
        title: anatomical entity
        description: Biological entity that is either an individual member of a biological
          species or constitutes the structural organization of an individual member
          of a biological species.
        is_a: BFO_0000004
        meaning: 'UBERON:0001062'
      UBERON_0000466:
        title: immaterial anatomical entity
        description: Anatomical entity that has no mass.
        is_a: UBERON_0001062
        meaning: 'UBERON:0000466'
      UBERON_0000464:
        title: anatomical space
        description: Non-material anatomical entity of three dimensions, that is generated
          by morphogenetic or other physiologic processes; is surrounded by one or
          more anatomical structures; contains one or more organism substances or
          anatomical structures.
        is_a: UBERON_0000466
        meaning: 'UBERON:0000464'
      UBERON_0002553:
        title: anatomical cavity
        description: 'Anatomical space which contains portions of one or more body
          substances and is bounded by the internal surface of one maximally connected
          anatomical structure. Examples: cranial cavity, pharyngeal recess space,
          nasal cavity, tooth socket, cavity of serous sac, lumen of stomach, lumen
          of artery, fornix of vagina.'
        is_a: UBERON_0000464
        meaning: 'UBERON:0002553'
      UBERON_0013686:
        title: anatomical conduit space
        description: An anatomical space which is the lumen of some anatomical conduit
          and connects two or more spaces together[FMA,modified].
        is_a: UBERON_0000464
        meaning: 'UBERON:0013686'
      UBERON_0010064:
        title: open anatomical space
        description: An anatomical space with at least one opening to another space
          or the exterior.
        is_a: UBERON_0000464
        meaning: 'UBERON:0010064'
      UBERON_0013150:
        title: future brain vesicle
        is_a: UBERON_0010064
        meaning: 'UBERON:0013150'
      UBERON_0009676:
        title: early telencephalic vesicle
        is_a: UBERON_0013150
        meaning: 'UBERON:0009676'
      UBERON_0006284:
        title: early prosencephalic vesicle
        description: Future brain vesicle that gives rise to telencephalic ventricle/lateral
          ventricles and 3rd ventricle.
        is_a: UBERON_0013150
        meaning: 'UBERON:0006284'
      UBERON_0012466:
        title: extraembryonic cavity
        is_a: UBERON_0000464
        meaning: 'UBERON:0012466'
      BFO_0000141:
        title: immaterial entity
        is_a: BFO_0000004
        meaning: 'BFO:0000141'
      BFO_0000006:
        title: spatial region
        is_a: BFO_0000141
        meaning: 'BFO:0000006'
      BFO_0000029:
        title: site
        is_a: BFO_0000141
        meaning: 'BFO:0000029'
      ENVO_01001194:
        title: magnetosphere
        description: "A site in which charged particles are influenced by an astronomical\
          \ body's magnetic field."
        is_a: BFO_0000029
        meaning: 'ENVO:01001194'
      ENVO_01001197:
        title: induced magnetosphere
        description: A magnetosphere which either 1) cannot withstand the pressure
          of the stellar wind interacting with it, thus allowing the stellar wind
          to interact with the ionosphere, atmosphere, or surface of the planet generating
          it or 2) is formed by the interaction of the stellar wind with an astronomical
          body unshielded by its own magnetosphere.
        is_a: ENVO_01001194
        meaning: 'ENVO:01001197'
      ENVO_01001198:
        title: intrinsic magnetosphere
        description: "A magnetosphere which shields the body generating it from the\
          \ stellar wind by withstanding the stellar wind's pressure before it reaches\
          \ the body."
        is_a: ENVO_01001194
        meaning: 'ENVO:01001198'
      ENVO_01001228:
        title: Hill sphere
        description: A site in which the attraction of satellites by gravitation is
          dominated by an astronomical body, bounded by a zero-velocity surface.
        is_a: BFO_0000029
        meaning: 'ENVO:01001228'
      ENVO_01001229:
        title: Lagrangian point
        description: A site in which the combined gravitational pull of the two large
          astronomical bodies is such that a smaller body, affected only by gravity,
          can maintain a stable position relative to those two large bodies and orbit
          with them due to centripetal force.
        is_a: BFO_0000029
        meaning: 'ENVO:01001229'
      BFO_0000140:
        title: continuant fiat boundary
        description: 'b is a continuant fiat boundary = Def. b is an immaterial entity
          that is of zero, one or two dimensions and does not include a spatial region
          as part. (axiom label in BFO2 Reference: [029-001])'
        is_a: BFO_0000141
        meaning: 'BFO:0000140'
      BFO_0000142:
        title: one-dimensional continuant fiat boundary
        is_a: BFO_0000140
        meaning: 'BFO:0000142'
      BFO_0000146:
        title: two-dimensional continuant fiat boundary
        is_a: BFO_0000140
        meaning: 'BFO:0000146'
      ENVO_00000102:
        title: cave entrance
        description: A two-dimensional continuant fiat boundary which is used to demarcate
          the interior from the exterior of a cave.
        is_a: BFO_0000146
        meaning: 'ENVO:00000102'
      ENVO_00000486:
        title: shoreline
        description: A two-dimensional continuant fiat boundary which is located between
          a landmass and a water body.
        is_a: BFO_0000146
        meaning: 'ENVO:00000486'
      ENVO_01001544:
        title: two-dimensional fiat ice surface
        description: An two-dimensional continuant fiat boundary which overlaps the
          surface layer of a mass of ice.
        is_a: BFO_0000146
        meaning: 'ENVO:01001544'
      ENVO_01001545:
        title: two-dimensional fiat water ice surface
        description: A two-dimensional fiat ice surface which overlaps the surface
          layer of a mass of water ice.
        is_a: ENVO_01001544
        meaning: 'ENVO:01001545'
      BFO_0000020:
        title: specifically dependent continuant
        description: "b is a relational specifically dependent continuant = Def. b\
          \ is a specifically dependent continuant and there are n &gt; 1 independent\
          \ continuants c1, \u2026 cn which are not spatial regions are such that\
          \ for all 1  i &lt; j  n, ci  and cj share no common parts, are such that\
          \ for each 1  i  n, b s-depends_on ci at every time t during the course\
          \ of b\u2019s existence (axiom label in BFO2 Reference: [131-004])"
        is_a: BFO_0000002
        meaning: 'BFO:0000020'
      BFO_0000017:
        title: realizable entity
        description: A specifically dependent continuant  that inheres in continuant  entities
          and are not exhibited in full at every time in which it inheres in an entity
          or group of entities. The exhibition or actualization of a realizable entity
          is a particular manifestation, functioning or process that occurs under
          certain circumstances.
        is_a: BFO_0000020
        meaning: 'BFO:0000017'
      BFO_0000023:
        title: role
        description: A realizable entity  the manifestation of which brings about
          some result or end that is not essential to a continuant  in virtue of the
          kind of thing that it is but that can be served or participated in by that
          kind of continuant  in some kinds of natural, social or institutional contexts.
        is_a: BFO_0000017
        meaning: 'BFO:0000023'
      ENVO_01000665:
        title: waste role
        description: A role that is realized in some process wherein the bearer is
          discarded or not utilized further.
        is_a: BFO_0000023
        meaning: 'ENVO:01000665'
      ENVO_06105109:
        title: litter role
        description: A role which 1) inheres in a material entity 2) is realised when
          that entity is discarded outside waste management systems by humans or their
          technologies.
        is_a: BFO_0000023
        meaning: 'ENVO:06105109'
      BFO_0000016:
        title: disposition
        is_a: BFO_0000017
        meaning: 'BFO:0000016'
      BFO_0000034:
        title: function
        is_a: BFO_0000016
        meaning: 'BFO:0000034'
      ENVO_00003076:
        title: glue
        description: A function realised by an environmental material when used to
          bind material entities together.
        is_a: BFO_0000034
        meaning: 'ENVO:00003076'
      OBI_0000401:
        title: environment control function
        description: An environmental control function is a function that regulates
          a contained environment within specified parameter ranges. For example the
          control of light exposure, humidity and temperature.
        is_a: BFO_0000034
        meaning: 'OBI:0000401'
      ENVO_03510066:
        title: chemical colorant
        description: "A function which is realised by a chemical when applied to a\
          \ material, such that it alters the material's colour."
        is_a: BFO_0000034
        meaning: 'ENVO:03510066'
      ENVO_01000452:
        title: environmental disposition
        description: A disposition which is realised by an environmental system or
          system parts thereof.
        is_a: BFO_0000016
        meaning: 'ENVO:01000452'
      ENVO_00000379:
        title: inundation disposition
        description: The disposition of an environmental system to be covered by liquid
          water.
        is_a: ENVO_01000452
        meaning: 'ENVO:00000379'
      ENVO_01000455:
        title: material pooling disposition
        description: The disposition of an environmental system to sequester and store
          some material entity.
        is_a: ENVO_01000452
        meaning: 'ENVO:01000455'
      ENVO_01000453:
        title: carbon pooling disposition
        description: The disposition of an environmental system to sequester and store
          carbon.
        is_a: ENVO_01000455
        meaning: 'ENVO:01000453'
      ENVO_01000454:
        title: carbon dioxide pooling disposition
        description: The disposition of an environment to sequester carbon dioxide,
          subsequently storing the carbon component thereof.
        is_a: ENVO_01000453
        meaning: 'ENVO:01000454'
      ENVO_01001082:
        title: climate
        description: The disposition of an environmental system, particularly those
          influencing atmospheres, to manifest a cyclic pattern of weather over time.
        is_a: ENVO_01000452
        meaning: 'ENVO:01001082'
      ENVO_01001358:
        title: hydroclimate
        description: A climate which is realised through hydrological processes.
        is_a: ENVO_01001082
        meaning: 'ENVO:01001358'
      ENVO_03000140:
        title: tundra climate
        description: "A climate which 1) has a mean temperature for the warmest month\
          \ of less than 10\xB0C (50\xB0F), but higher than 0\xB0C (32\xB0F), 2) is\
          \ not conducive to a permanent surficial cover of snow or ice, and 3) supports\
          \ a tundra ecosystem."
        is_a: ENVO_01001082
        meaning: 'ENVO:03000140'
      ENVO_01001195:
        title: radiation shielding disposition
        description: An environmental disposition which inheres in an entity that
          intercepts, attenuates, or blocks radiation.
        is_a: ENVO_01000452
        meaning: 'ENVO:01001195'
      ENVO_01001196:
        title: cosmic ray shielding disposition
        description: A radiation shielding disposition which inheres in a material
          or immaterial entity which attenuates or blocks cosmic rays.
        is_a: ENVO_01001195
        meaning: 'ENVO:01001196'
      ENVO_2000015:
        title: energy
        description: A disposition which is realized during the execution of work,
          the emission of heat, or the possession of mass.
        is_a: BFO_0000016
        meaning: 'ENVO:2000015'
      ENVO_2000017:
        title: kinetic energy
        description: Energy which is realised through motion.
        is_a: ENVO_2000015
        meaning: 'ENVO:2000017'
      ENVO_2000032:
        title: thermal energy
        description: Kinetic energy which is realised through the microscopic motion
          of particles.
        is_a: ENVO_2000017
        meaning: 'ENVO:2000032'
      ENVO_2000034:
        title: geothermal energy
        description: Thermal energy which propagates through a solid (typically rocky)
          astronomical body.
        is_a: ENVO_2000032
        meaning: 'ENVO:2000034'
      ENVO_01003019:
        title: wave energy
        description: Energy which inheres in a wave and is realised during its propagation.
        is_a: ENVO_2000015
        meaning: 'ENVO:01003019'
      ENVO_01003018:
        title: electromagnetic wave energy
        description: Wave energy which inheres in perpendicular electric and magnetic
          fields and which is realised when they oscillate and propagate.
        is_a: ENVO_01003019
        meaning: 'ENVO:01003018'
      ENVO_2000028:
        title: mechanical wave energy
        description: Wave energy which inheres in an elastic material and is realised
          when a deformational wave passes through that material.
        is_a: ENVO_01003019
        meaning: 'ENVO:2000028'
      ENVO_2000029:
        title: sound wave energy
        description: Mechanical wave energy which is realised when an acoustic wave
          propagates through a material.
        is_a: ENVO_2000028
        meaning: 'ENVO:2000029'
      ENVO_2000033:
        title: wind wave energy
        description: Mechanical wave energy which inheres in an atmosphere and is
          realised during an atmospheric wind.
        is_a: ENVO_2000028
        meaning: 'ENVO:2000033'
      ENVO_06105265:
        title: net shortwave radiation
        description: "Energy which has been absorbed by an astronomical body or its\
          \ parts following that body's irradiation by shortwave radiation from a\
          \ star."
        is_a: ENVO_2000015
        meaning: 'ENVO:06105265'
      ENVO_2000016:
        title: potential energy
        description: Energy possessed by an object because of its position relative
          to other objects, stresses within itself, its electric charge, or other
          factors.
        is_a: ENVO_2000015
        meaning: 'ENVO:2000016'
      ENVO_2000025:
        title: nuclear energy
        description: potential energy that binds nucleons to form the atomic nucleus
          (and nuclear reactions).
        is_a: ENVO_2000016
        meaning: 'ENVO:2000025'
      ENVO_2000020:
        title: electric energy
        description: potential energy due to or stored in electric fields.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000020'
      ENVO_2000021:
        title: magnetic energy
        description: potential energy due to or stored in magnetic fields.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000021'
      ENVO_2000022:
        title: gravitational energy
        description: potential energy due to or stored in gravitational fields.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000022'
      ENVO_2000023:
        title: chemical energy
        description: Potential energy which is stored in chemical bonds and realised
          through reactions which break them..
        is_a: ENVO_2000016
        meaning: 'ENVO:2000023'
      ENVO_2000024:
        title: ionization energy
        description: potential energy that binds an electron to its atom or molecule.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000024'
      ENVO_2000026:
        title: chromodynamic energy
        description: Potential energy due to the energy of the gluon-mediated field
          of the strong force, binding quarks together into hadrons.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000026'
      ENVO_2000027:
        title: elastic energy
        description: potential energy due to the deformation of a material (or its
          container) exhibiting a restorative force.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000027'
      ENVO_2000030:
        title: radiant energy
        description: Potential energy which is stored in the fields of propagated
          by electromagnetic radiation.
        is_a: ENVO_2000016
        meaning: 'ENVO:2000030'
      ENVO_2000035:
        title: stellar radiation energy
        is_a: ENVO_2000030
        meaning: 'ENVO:2000035'
      ENVO_2000031:
        title: rest energy
        description: "potential energy due to an object's rest mass."
        is_a: ENVO_2000016
        meaning: 'ENVO:2000031'
      ENVO_2000018:
        title: mixed potential and kinetic energy
        description: Energy which is the sum of 1) kinetic energy and 2) potential
          energy.
        is_a: ENVO_2000015
        meaning: 'ENVO:2000018'
      ENVO_01003001:
        title: water-holding capacity
        description: A disposition of a material entity which is realised when it
          is saturated with liquid water.
        is_a: BFO_0000016
        meaning: 'ENVO:01003001'
      ENVO_06105304:
        title: water-holding capacity of soil
        description: Water-holding capacity which inheres in some soil.
        is_a: ENVO_01003001
        meaning: 'ENVO:06105304'
      ENVO_06105002:
        title: thermoplasticity
        description: "A disposition inhering in a bearer by virtue of that bearer's\
          \ ability to, repeatedly, become plastic on heating and harden again on\
          \ cooling."
        is_a: BFO_0000016
        meaning: 'ENVO:06105002'
      ENVO_06105004:
        title: thermosetting disposition
        description: A disposition which inheres in materials capable of becoming
          rigid when cured by heating.
        is_a: BFO_0000016
        meaning: 'ENVO:06105004'
      BFO_0000019:
        title: quality
        is_a: BFO_0000020
        meaning: 'BFO:0000019'
      PATO_0001241:
        title: physical object quality
        description: A quality which inheres in a continuant.
        is_a: BFO_0000019
        meaning: 'PATO:0001241'
      PATO_0001018:
        title: physical quality
        description: A quality of a physical entity that exists through action of
          continuants at the physical level of organisation in relation to other entities.
        is_a: PATO_0001241
        meaning: 'PATO:0001018'
      PATO_0001420:
        title: buoyancy
        description: "A physical quality inhering in a bearer by virtue of the bearer's\
          \ disposition to rise or float in a fluid medium such as water or air."
        is_a: PATO_0001018
        meaning: 'PATO:0001420'
      ENVO_01000203:
        title: environmental condition
        description: An environmental condition is a range of a determinate quality
          or combination of qualities that are present in an environmental system.
        is_a: PATO_0001018
        meaning: 'ENVO:01000203'
      ENVO_01000204:
        title: tropical
        description: A tropical condition is an environmental condition in which an
          environmental system receives high yearly solar irradiance per unit area
          and, on Earth, the Sun reaches a subsolar point at least once during the
          solar year. This results in a hot and moist year-round climate at low elevations,
          which have a monthly average temperature above 18 degrees Celsius.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000204'
      ENVO_01000375:
        title: tropical marine condition
        description: A tropical marine condition is a tropical condition in which
          the ocean strongly influences the climate and a wet and dry season occur.
        is_a: ENVO_01000204
        meaning: 'ENVO:01000375'
      ENVO_01000205:
        title: subtropical
        description: A subtropical condition is an environmental condition in which
          an envrionmental system receives more solar irradiance than those with temperate
          conditions, but less than those with tropical conditions. At low elevations,
          this typically results in eight months of the year having average temperatures
          greater than or equal to 10 degrees Celsius with the coldest monthly temperature
          averaging between 2 and 13 degrees Celsius.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000205'
      ENVO_01000207:
        title: mediterranean
        description: A mediterranean condition is a subtropical condition in which
          hot dry summers and winters with moderate to high rainfall.
        is_a: ENVO_01000205
        meaning: 'ENVO:01000207'
      ENVO_01000377:
        title: humid subtropical
        description: A humid subtropical condition is a subtropical condition in which
          an environmental system has hot, humid summers, warm to cool dry winters,
          and average annual precipitation either evenly distributed throughout the
          year or marked by a dry season or drying trend during winter
        is_a: ENVO_01000205
        meaning: 'ENVO:01000377'
      ENVO_01000378:
        title: arid subtropical
        description: An arid subtropical condition is a subtropical condition in which
          an environmental system has an annual average temperature near 18.2 degrees
          Celsius with their coldest month averaging between 2 and 13 degrees Celsius,
          the absence of regular rainfall, and high humidity.
        is_a: ENVO_01000205
        meaning: 'ENVO:01000378'
      ENVO_01000379:
        title: highland subtropical
        description: A highland subtropical condition is a subtropical condition in
          which increased elevation results in mild summers, cooler winters, and,
          in some instances,  snowfall associated with montly temperature averages
          below 22 but above -3 degrees Celsius.
        is_a: ENVO_01000205
        meaning: 'ENVO:01000379'
      ENVO_01000230:
        title: arid
        description: An environmental condition in which annual precipitation is less
          than half of annual potential evapotranspiration.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000230'
      ENVO_01000370:
        title: tundra climatic condition
        description: "An tundra climatic condition is a polar condition in which at\
          \ least one month's average temperature exceeds 0 degrees Celsius."
        is_a: ENVO_01000203
        meaning: 'ENVO:01000370'
      ENVO_01000206:
        title: temperate
        description: A temperate condition is an environmental condition in which
          an environmental system receives less solar irradiance than those with subpolar
          conditions, but greater than those with subtropical conditions.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000206'
      ENVO_01000380:
        title: oceanic temperate
        description: An oceanic temperate condition is a temperate condition which
          is strongly influenced by oceans and oceanic winds. Summers are cool and
          winters are cool, but not cold, and there is little frozen precipitation
          at lower elevations.
        is_a: ENVO_01000206
        meaning: 'ENVO:01000380'
      ENVO_01000381:
        title: continental temperate
        description: A continental temperate condition is a temperate condition which
          is influenced by large land masses. Summers are warm to hot and winters
          are often  long, cold, and snowy.
        is_a: ENVO_01000206
        meaning: 'ENVO:01000381'
      ENVO_01000238:
        title: polar
        description: A polar condition is an environmental condition in which an environmental
          system receives low, yearly solar irradiance per unit area, resulting in
          colder climatic conditions.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000238'
      ENVO_01000354:
        title: ice cap climatic condition
        description: An ice cap climatic condition is a polar condition in which the
          montly average temperature does not exceed 0 degrees Celsius.
        is_a: ENVO_01000238
        meaning: 'ENVO:01000354'
      ENVO_01000251:
        title: subpolar
        description: A subpolar condition is an environmental condition in which an
          environmental system receives low, yearly solar irradiance per unit area
          and is surrounded by large land masses. This results in very cold winters
          with temperatures potentially falling to around -40 degrees Celsius and
          summers which last no more than 3 months of the year with a 24-hour average
          temperature of at least 10 degrees Celsius.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000251'
      ENVO_01000343:
        title: altitudinal condition
        description: An altitudinal condition is an environmental condition in which
          ranges of factors such as temperature, humidity, soil composition, solar
          irradiation, and tree density vary with ranges in altitude.
        is_a: ENVO_01000203
        meaning: 'ENVO:01000343'
      ENVO_01000340:
        title: alpine
        description: An altitudinal condition which inheres in a bearer by virtue
          of the bearer having a monthly mean temperature is less than 10 degrees
          Celsius and being located at altitudes above the tree line and below the
          snowline.
        is_a: ENVO_01000343
        meaning: 'ENVO:01000340'
      ENVO_01000341:
        title: subalpine
        description: An altitudinal condition which inheres in a bearer by virtue
          of the bearer being located at an altitude immediately below the tree line
          of an elevation.
        is_a: ENVO_01000343
        meaning: 'ENVO:01000341'
      ENVO_01000342:
        title: montane
        description: An altitudinal condition which inheres in a bearer by virtue
          of the bearer being located at an altitude between mid-altitude forests
          and the tree line.
        is_a: ENVO_01000343
        meaning: 'ENVO:01000342'
      ENVO_01000345:
        title: upper montane
        description: An upper montane condition is a montane condition in which an
          altitude range falls immediately below the tree line.
        is_a: ENVO_01000342
        meaning: 'ENVO:01000345'
      ENVO_01000346:
        title: lower montane
        description: A lower montane condition is a montane condition in which an
          altitude range falls immediately above mid-altitude forests.
        is_a: ENVO_01000342
        meaning: 'ENVO:01000346'
      ENVO_01000344:
        title: nival
        description: An altitudinal condition which inheres in a bearer by virtue
          of the bearer having extremely limited vegetation cover, silica-enriched
          soils, and ground cover dominated by snow and ice at altitudes above the
          snowline.
        is_a: ENVO_01000343
        meaning: 'ENVO:01000344'
      ENVO_01001081:
        title: environmental variability
        description: A condition which inheres in an environmental system by virtue
          of that system undergoing variation in its composition, the distribution
          of the qualities its components bear, and/or in the processes which occur
          within it and which it participates in.
        is_a: ENVO_01000203
        meaning: 'ENVO:01001081'
      ENVO_01001078:
        title: weather
        description: Environmental variability which inheres in an astronomical body
          part or in outer space.
        is_a: ENVO_01001081
        meaning: 'ENVO:01001078'
      ENVO_01001079:
        title: atmospheric weather
        description: Weather which inheres in an atmosphere.
        is_a: ENVO_01001078
        meaning: 'ENVO:01001079'
      ENVO_01001080:
        title: space weather
        description: Weather which inheres in outer space.
        is_a: ENVO_01001078
        meaning: 'ENVO:01001080'
      ENVO_01001184:
        title: arable
        description: A quality inhereing in a bearer by virtue of the bearer being
          periodically and mechanically manipulated to loosen and mix any soil which
          it has as a part.
        is_a: ENVO_01000203
        meaning: 'ENVO:01001184'
      PATO_0015021:
        title: combustibility
        description: The propensity of a material to undergo combustion. Combustion
          encompasses smouldering and flaming combustion. Combustibility is usually
          applied to solids.
        is_a: PATO_0001018
        meaning: 'PATO:0015021'
      PATO_0015022:
        title: increased combustibility
        description: An increase in combustibility.
        is_a: PATO_0015021
        meaning: 'PATO:0015022'
      ENVO_01001374:
        title: sea state
        description: A physical quality which inheres in a marine water body by virtue
          of the height, wavelength, period, and directional energy flux of its waves
          which evolve into swell through nonlinear dynamics.
        is_a: PATO_0001018
        meaning: 'ENVO:01001374'
      ENVO_01001667:
        title: thalassic
        description: A physical quality inhering in a bearer by virtue of the bearer
          being derived from, part of, or otherwise dependent on the seas or oceans.
        is_a: PATO_0001018
        meaning: 'ENVO:01001667'
      PATO_0000039:
        title: direction
        description: "A physical quality inhering in a bearer by virtue of the bearer's\
          \ orientation in space."
        is_a: PATO_0001018
        meaning: 'PATO:0000039'
      ENVO_01001361:
        title: atmospheric wind direction
        description: A direction which inheres in an atmospheric wind, typically expressed
