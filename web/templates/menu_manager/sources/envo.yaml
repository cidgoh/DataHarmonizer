      BFO_0000031:
        title: generically dependent continuant
        description: 'b is a generically dependent continuant = Def. b is a continuant
          that g-depends_on one or more other entities. (axiom label in BFO2 Reference:
          [074-001])'
        is_a: BFO_0000002
        meaning: 'BFO:0000031'
      IAO_0000030:
        title: information content entity
        description: A generically dependent continuant that is about some thing.
        is_a: BFO_0000031
        meaning: 'IAO:0000030'
      ENVO_02000081:
        title: letter
        description: A written message from one person to another addressed to a person
          or organization.
        is_a: IAO_0000030
        meaning: 'ENVO:02000081'
      IAO_0000033:
        title: directive information entity
        description: An information content entity whose concretizations indicate
          to their bearer how to realize them in a process.
        is_a: IAO_0000030
        meaning: 'IAO:0000033'
      IAO_0000104:
        title: plan specification
        description: A directive information entity with action specifications and
          objective specifications as parts, and that may be concretized as a realizable
          entity that, if realized, is realized in a process in which the bearer tries
          to achieve the objectives by taking the actions specified.
        is_a: IAO_0000033
        meaning: 'IAO:0000104'
      IAO_0000005:
        title: objective specification
        description: A directive information entity that describes an intended process
          endpoint. When part of a plan specification the concretization is realized
          in a planned process in which the bearer tries to effect the world so that
          the process endpoint is achieved.
        is_a: IAO_0000033
        meaning: 'IAO:0000005'
      IAO_0000007:
        title: action specification
        description: A directive information entity that describes an action the bearer
          will take.
        is_a: IAO_0000033
        meaning: 'IAO:0000007'
      IAO_0000027:
        title: data item
        description: An information content entity that is intended to be a truthful
          statement about something (modulo, e.g., measurement precision or other
          systematic errors) and is constructed/acquired by a method which reliably
          tends to produce (approximately) truthful statements.
        is_a: IAO_0000030
        meaning: 'IAO:0000027'
      IAO_0000109:
        title: measurement datum
        description: A measurement datum is an information content entity that is
          a recording of the output of a measurement such as produced by a device.
        is_a: IAO_0000027
        meaning: 'IAO:0000109'
      IAO_0000032:
        title: scalar measurement datum
        description: A scalar measurement datum is a measurement datum that is composed
          of two parts, numerals and a unit label.
        is_a: IAO_0000109
        meaning: 'IAO:0000032'
      IAO_0000582:
        title: time stamped measurement datum
        is_a: IAO_0000109
        meaning: 'IAO:0000582'
      IAO_0000100:
        title: data set
        description: A data item that is an aggregate of other data items of the same
          type that have something in common. Averages and distributions can be determined
          for data sets.
        is_a: IAO_0000027
        meaning: 'IAO:0000100'
      IAO_0000584:
        title: time sampled measurement data set
        description: A data set that is an aggregate of data recording some measurement
          at a number of time points. The time series data set is an ordered list
          of pairs of time measurement data and the corresponding measurement data
          acquired at that time.
        is_a: IAO_0000100
        meaning: 'IAO:0000584'
      IAO_0000308:
        title: figure
        description: An information content entity consisting of a two dimensional
          arrangement of information content entities such that the arrangement itself
          is about something.
        is_a: IAO_0000030
        meaning: 'IAO:0000308'
      IAO_0000101:
        title: image
        description: An image is an affine projection to a two dimensional surface,
          of measurements of some quality of an entity or entities repeated at regular
          intervals across a spatial range, where the measurements are represented
          as color and luminosity on the projected on surface.
        is_a: IAO_0000308
        meaning: 'IAO:0000101'
      BFO_0000003:
        title: occurrent
        description: An entity that has temporal parts and that happens, unfolds or
          develops through time.
        is_a: BFO_0000001
        meaning: 'BFO:0000003'
      BFO_0000015:
        title: process
        description: 'p is a process = Def. p is an occurrent that has temporal proper
          parts and for some time t, p s-depends_on some material entity at t. (axiom
          label in BFO2 Reference: [083-003])'
        is_a: BFO_0000003
        meaning: 'BFO:0000015'
      ENVO_02500000:
        title: environmental system process
        description: A process in which includes the components of an environmental
          system as participants.
        is_a: BFO_0000015
        meaning: 'ENVO:02500000'
      ENVO_01000785:
        title: material extraction process
        description: A planned process during which a portion of environmental material
          is removed from a material entity.
        is_a: ENVO_02500000
        meaning: 'ENVO:01000785'
      ENVO_02000121:
        title: peat extraction
        is_a: ENVO_01000785
        meaning: 'ENVO:02000121'
      ENVO_01001112:
        title: fossilization of organic material
        description: A process during which organic substances are replaced with mineral
          substrances, maintaining part of their anatomical organisation.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001112'
      ENVO_03000008:
        title: compaction process
        description: A physical process during which atoms, molecules, or other consituents
          of a material entity are forced closer together.
        is_a: ENVO_02500000
        meaning: 'ENVO:03000008'
      ENVO_03000101:
        title: solid-phase sintering
        description: A compaction process during which a material entity subjected
          to heat and/or pressure is compacted into a solid mass without undergoing
          melting.
        is_a: ENVO_03000008
        meaning: 'ENVO:03000101'
      ENVO_03000102:
        title: glacial sintering
        description: A sintering process during which snow is compacted into glacial
          ice.
        is_a: ENVO_03000101
        meaning: 'ENVO:03000102'
      ENVO_06105202:
        title: soil compaction process
        description: Soil compaction is a compaction process during which the bulk
          density of soil increases and/or its porosity decreases due to externally
          or internally applied loads.
        is_a: ENVO_03000008
        meaning: 'ENVO:06105202'
      ENVO_03000043:
        title: material transformation process
        description: A process during which a portion of some environmental material
          is converted into a different material or a collection of materials.
        is_a: ENVO_02500000
        meaning: 'ENVO:03000043'
      ENVO_01000723:
        title: melting
        description: Melting is a material transformation process which results in
          the phase transition of a substance from a solid to a liquid.
        is_a: ENVO_03000043
        meaning: 'ENVO:01000723'
      ENVO_01000720:
        title: hydrological melting process
        description: A melting process during which water-based ice, snow, or other
          solid phase water transitions into a liquid phase.
        is_a: ENVO_01000723
        meaning: 'ENVO:01000720'
      ENVO_01000719:
        title: snowmelt
        description: Snowmelt is a hydrological melting process in which water is
          produced by the melting of snow and becomes part of the hydrological surface
          runoff.
        is_a: ENVO_01000720
        meaning: 'ENVO:01000719'
      ENVO_01000721:
        title: icemelt
        description: Icemelt is a hydrological melthing process in which water is
          produced by the melting of ice and becomes part of the hydrological surface
          runoff.
        is_a: ENVO_01000720
        meaning: 'ENVO:01000721'
      ENVO_03000099:
        title: seasonal melting process
        description: A material transformation process during which a material entity
          melts during a warm season.
        is_a: ENVO_01000723
        meaning: 'ENVO:03000099'
      ENVO_01000622:
        title: vaporisation
        description: Vaporisation of an element or compound is process whereby that
          element or compound undergoes a phase transition from the liquid to vapor.
        is_a: ENVO_03000043
        meaning: 'ENVO:01000622'
      ENVO_01000623:
        title: boiling
        description: Boiling is a form of vaporisation which occurs when a liquid
          is heated to a temperature at which the vapor pressure of the liquid is
          equal to the pressure exerted on the liquid by the surrounding environmental
          pressure.
        is_a: ENVO_01000622
        meaning: 'ENVO:01000623'
      ENVO_02500034:
        title: evaporation
        description: Evaporation is a form of vaporisation which occurs when a portion
          of the surface layer of a liquid in contact with a gaseous material, which
          is not saturated with the evaporating substance, vaporises.
        is_a: ENVO_01000622
        meaning: 'ENVO:02500034'
      ENVO_01000704:
        title: hydrological evaporation
        description: Hydrological evaporation is the evaporation of water, generally
          as part of a planetary water cycle.
        is_a: ENVO_02500034
        meaning: 'ENVO:01000704'
      ENVO_09000028:
        title: evaporation of liquid water in soil
        description: The evaporation of a liquid water when measured in soil.
        is_a: ENVO_01000704
        meaning: 'ENVO:09000028'
      ENVO_01001510:
        title: material congelation process
        description: "A material transformation process during which a material's\
          \ viscosity increase either through a reduction in temperature, through\
          \ chemical reactions, or other physical effects."
        is_a: ENVO_03000043
        meaning: 'ENVO:01001510'
      ENVO_01000724:
        title: condensation process
        description: Condensation is a process during which a gas undergoes a phase
          transition into a liquid.
        is_a: ENVO_01001510
        meaning: 'ENVO:01000724'
      ENVO_01000624:
        title: hydrological condensation process
        description: Hydrological condensation is a process in which atmospheric water
          vapour undergoes a phase transition from the gas phase to the liquid phase.
        is_a: ENVO_01000724
        meaning: 'ENVO:01000624'
      ENVO_01000726:
        title: desublimation process
        description: Desublimation is a process in which a portion of some gas undergoes
          a phase transition into a portion of some solid.
        is_a: ENVO_01001510
        meaning: 'ENVO:01000726'
      ENVO_03000055:
        title: desublimation of water vapour into ice
        description: A desublimation process during which water vapour is frozen into
          water ice.
        is_a: ENVO_01000726
        meaning: 'ENVO:03000055'
      ENVO_01000950:
        title: water ice formation process
        description: A material transformation process during which water ice is formed.
        is_a: ENVO_01001510
        meaning: 'ENVO:01000950'
      ENVO_03000044:
        title: sea ice formation process
        description: A material transformation process during which seawater freezes
          into sea ice.
        is_a: ENVO_01000950
        meaning: 'ENVO:03000044'
      ENVO_03000058:
        title: nilas formation process
        description: A sea ice formation process during which new ice crystals freeze
          together, forming nilas, a thin, elastic, continuous, ice sheet of a transparent
          gray color.
        is_a: ENVO_03000044
        meaning: 'ENVO:03000058'
      ENVO_03000059:
        title: young ice formation process
        description: A sea ice formation process during which water freezes to the
          bottom of an existing nilas ice floe creating a thicker ice floe known as
          young ice.
        is_a: ENVO_03000044
        meaning: 'ENVO:03000059'
      ENVO_03000060:
        title: first year ice formation process
        description: A sea ice formation process during which seawater freezes onto
          young ice during the cold season, forming first year ice.
        is_a: ENVO_03000044
        meaning: 'ENVO:03000060'
      ENVO_03000061:
        title: second year ice formation
        description: A sea ice formation process during which seawater freezes onto
          first year ice during the cold season, forming second year sea ice.
        is_a: ENVO_03000044
        meaning: 'ENVO:03000061'
      ENVO_03000062:
        title: multiyear ice formation process
        description: A sea ice formation process during which seawater freezes into
          second year ice during the cold season, forming multiyear ice.
        is_a: ENVO_03000044
        meaning: 'ENVO:03000062'
      ENVO_03000056:
        title: new ice formation process
        description: An ice formation process during which water is frozen into a
          form of new ice such as frazil, grease ice, slush, or shuga.
        is_a: ENVO_01000950
        meaning: 'ENVO:03000056'
      ENVO_03000047:
        title: frazil ice formation
        description: A new ice formation process during which small, needle-like crystals
          consisting of nearly pure fresh water, form due to the freezing of open,
          turbulent, supercooled water.
        is_a: ENVO_03000056
        meaning: 'ENVO:03000047'
      ENVO_03000078:
        title: slush formation process
        description: A new ice formation process in which slush ice is formed.
        is_a: ENVO_03000056
        meaning: 'ENVO:03000078'
      ENVO_03000079:
        title: shuga formation process
        description: A new ice formation process in which shuga is formed.
        is_a: ENVO_03000056
        meaning: 'ENVO:03000079'
      ENVO_01001548:
        title: freezing
        description: A material congelation process during which a liquid turns into
          a solid when its temperature is lowered below its melting point.
        is_a: ENVO_01001510
        meaning: 'ENVO:01001548'
      ENVO_01001549:
        title: freezing of water into water ice
        description: A freezing process during which liquid water is transformed into
          water ice.
        is_a: ENVO_01001548
        meaning: 'ENVO:01001549'
      ENVO_04000000:
        title: adfreezing
        description: Adfreezing is a freezing process during which two objects adhere
          to each other via ice.
        is_a: ENVO_01001548
        meaning: 'ENVO:04000000'
      ENVO_01000727:
        title: sublimation process
        description: Sublimation is a process during which a portion of some solid
          undergoes a phase transition into a portion of some gas.
        is_a: ENVO_03000043
        meaning: 'ENVO:01000727'
      ENVO_01000920:
        title: water ice sublimation process
        description: A sublimation process during which water ice transitions into
          a gaseous state.
        is_a: ENVO_01000727
        meaning: 'ENVO:01000920'
      ENVO_01000840:
        title: thermolysis
        description: A chemical decomposition (the separation of a single chemical
          compound into its two or more elemental parts or to simpler compounds) caused
          by heat.
        is_a: ENVO_03000043
        meaning: 'ENVO:01000840'
      ENVO_01000839:
        title: combustion process
        description: Combustion or burning is a high-temperature exothermic redox
          chemical reaction between a fuel and an oxidant that produces oxidized,
          often gaseous products, in a mixture termed as smoke.
        is_a: ENVO_01000840
        meaning: 'ENVO:01000839'
      ENVO_01000786:
        title: fire
        description: A fire is a process whereby rapid and exothermic oxidation of
          a material through a combustion process releases heat, light, and other
          products.
        is_a: ENVO_01000839
        meaning: 'ENVO:01000786'
      ENVO_01000788:
        title: conflagration
        description: A fire which occurs in a large spatial area poses a risk to human
          life, animal life, health, and/or property.
        is_a: ENVO_01000786
        meaning: 'ENVO:01000788'
      ENVO_01000787:
        title: wildfire
        description: A conflagration which is uncontrolled and combusts material in
          a vegetated area, be it rural or wild.
        is_a: ENVO_01000788
        meaning: 'ENVO:01000787'
      ENVO_01001292:
        title: land fire
        description: A fire which occurs on land, typically consuming a terrestrial
          ecosystem as fuel.
        is_a: ENVO_01000787
        meaning: 'ENVO:01001292'
      ENVO_01000791:
        title: forest fire
        description: A wildfire which occurs in a forest, primarily consuming vegetation
          as fuel.
        is_a: ENVO_01001292
        meaning: 'ENVO:01000791'
      ENVO_01001289:
        title: brush fire
        description: A land fire which consumes low-growing plants such as scrub and
          brush.
        is_a: ENVO_01001292
        meaning: 'ENVO:01001289'
      ENVO_01001290:
        title: bush fire
        description: A land fire which occurs in a large uncleared or sparsely settled
          area (as in Australia) usually scrub-covered or forested.
        is_a: ENVO_01001292
        meaning: 'ENVO:01001290'
      ENVO_03000131:
        title: grass fire
        description: A fire which occurs in a grassland, combusting biomass stored
          in grasses as its primary fuel.
        is_a: ENVO_01001292
        meaning: 'ENVO:03000131'
      ENVO_01001291:
        title: pasture fire
        description: A fire which occurs in a pastureland.
        is_a: ENVO_03000131
        meaning: 'ENVO:01001291'
      ENVO_01001287:
        title: industrial fire
        description: A fire which occurs in an industrial area or building.
        is_a: ENVO_01000786
        meaning: 'ENVO:01001287'
      ENVO_03000122:
        title: planned burn
        description: A fire which is planned and executed deliberately under human
          supervision.
        is_a: ENVO_01000786
        meaning: 'ENVO:03000122'
      ENVO_03000090:
        title: explosion process
        description: A process during which a material entity undergoes a rapid increase
          in volume, releasing gasses and various forms of energy, often including
          thermal, light and sound energy.
        is_a: ENVO_01000839
        meaning: 'ENVO:03000090'
      ENVO_03000091:
        title: permafrost methane explosion
        description: An explosion during which methane-rich gas trapped in permafrost
          combusts.
        is_a: ENVO_03000090
        meaning: 'ENVO:03000091'
      ENVO_01000841:
        title: pyrolysis
        description: A thermolysis process in which organic material is decomposed
          in the absence of oxygen.
        is_a: ENVO_01000840
        meaning: 'ENVO:01000841'
      ENVO_01001654:
        title: aerosol formation process
        description: A material transformation process during which solid or liquid
          particles form and are suspended in a mass of air, thus creating an aerosol.
        is_a: ENVO_03000043
        meaning: 'ENVO:01001654'
      ENVO_01001085:
        title: atmospheric aerosol formation
        description: An aerosol formation process which occurs in an atmosphere.
        is_a: ENVO_01001654
        meaning: 'ENVO:01001085'
      ENVO_01001086:
        title: formation of a solid aerosol in an atmosphere
        description: A process during which an aerosol, consisting of solid particulates
          suspended in a gas, is formed in an atmosphere.
        is_a: ENVO_01001085
        meaning: 'ENVO:01001086'
      ENVO_01001090:
        title: formation of a solid aerosol from gaseous material in an atmosphere
        description: A process during which microscopic solid particulates are formed
          from gaseous materials in an atmosphere.
        is_a: ENVO_01001086
        meaning: 'ENVO:01001090'
      ENVO_01001639:
        title: formation of a solid aerosol from liquid material in an atmosphere
        description: A process during which microscopic solid particulates are formed
          from liquid materials in an atmosphere.
        is_a: ENVO_01001086
        meaning: 'ENVO:01001639'
      ENVO_01001640:
        title: glaciation of water droplets in a cloud
        description: A process during which supercooled water droplets in a cloud
          freeze into ice crystals.
        is_a: ENVO_01001639
        meaning: 'ENVO:01001640'
      ENVO_01001087:
        title: formation of a liquid aerosol in an atmosphere
        description: A process during which an aerosol, consisting of droplets of
          liquid suspended in gas, is formed in an atmosphere.
        is_a: ENVO_01001085
        meaning: 'ENVO:01001087'
      ENVO_01001091:
        title: formation of a liquid aerosol from gaseous material in an atmosphere
        description: A process during which microscopic liquid droplets are formed
          from gaseous materials in an atmosphere.
        is_a: ENVO_01001087
        meaning: 'ENVO:01001091'
      ENVO_01001084:
        title: particulate matter formation process
        description: A process during which microscopic solid or liquid objects are
          formed.
        is_a: ENVO_03000043
        meaning: 'ENVO:01001084'
      ENVO_01001366:
        title: aerosolised particle formation process
        description: A process during which particles suspended in a gaseous medium
          are formed.
        is_a: ENVO_01001084
        meaning: 'ENVO:01001366'
      ENVO_01001372:
        title: aerosolised particle formation event
        description: An aerosol formation process during which the rate of particle
          formation exceeds that which is normally present in the site of its occurrence.
        is_a: ENVO_01001366
        meaning: 'ENVO:01001372'
      ENVO_01001359:
        title: atmospheric aerosolised particle formation event
        description: An aerosol formation event  which occurs in an atmosphere.
        is_a: ENVO_01001372
        meaning: 'ENVO:01001359'
      ENVO_01001612:
        title: material warming process
        description: A process during which the temperature of a portion of environmental
          material is increased, along with the kinetic energy of its constituent
          molecules.
        is_a: ENVO_03000043
        meaning: 'ENVO:01001612'
      ENVO_01001611:
        title: thawing process
        description: A warming process during which the thermal energy in a portion
          of environmental material is sufficient to melt water-based ice or snow.
        is_a: ENVO_01001612
        meaning: 'ENVO:01001611'
      ENVO_01001613:
        title: permafrost thawing process
        description: A thawing process during which permafrost is warmed beyond the
          melting point of water-based ice, snow, or other forms of solid water.
        is_a: ENVO_01001611
        meaning: 'ENVO:01001613'
      ENVO_03000086:
        title: ice-bearing permafrost thawing process
        description: A permafrost thawing process during which water-based ice or
          snow present in permafrost is converted into meltwater.
        is_a: ENVO_01001613
        meaning: 'ENVO:03000086'
      ENVO_01001739:
        title: warming of a fluid
        description: A material warming process during which the thermal energy in
          a volume of fluid increases.
        is_a: ENVO_01001612
        meaning: 'ENVO:01001739'
      ENVO_01001740:
        title: warming of a gas
        description: A process of warming a fluid during which the thermal energy
          in a volume of gas increases.
        is_a: ENVO_01001739
        meaning: 'ENVO:01001740'
      ENVO_01001741:
        title: warming of a liquid
        description: A process of warming a fluid which includes a volume of liquid
          as a participant.
        is_a: ENVO_01001739
        meaning: 'ENVO:01001741'
      ENVO_01001742:
        title: warming of a solid
        description: A material warming process during which the thermal energy in
          a mass of solid material increases.
        is_a: ENVO_01001612
        meaning: 'ENVO:01001742'
      ENVO_01001615:
        title: material cooling process
        description: A process during which the temperature of a portion of environmental
          material is decreased, along with the kinetic energy of its constituent
          molecules.
        is_a: ENVO_03000043
        meaning: 'ENVO:01001615'
      ENVO_01001737:
        title: cooling of a solid
        description: A material cooling process during which a portion of solid environmental
          material loses thermal energy to its surroundings.
        is_a: ENVO_01001615
        meaning: 'ENVO:01001737'
      ENVO_01001738:
        title: cooling of a fluid
        description: A material cooling process during which a portion of fluid environmental
          material loses thermal energy to its surroundings.
        is_a: ENVO_01001615
        meaning: 'ENVO:01001738'
      ENVO_01001735:
        title: cooling of a gas
        description: A material cooling process during which a portion of gaseous
          environmental material loses thermal energy to its surroundings.
        is_a: ENVO_01001738
        meaning: 'ENVO:01001735'
      ENVO_01001736:
        title: cooling of a liquid
        description: A material cooling process during which a portion of liquid environmental
          material loses thermal energy to its surroundings.
        is_a: ENVO_01001738
        meaning: 'ENVO:01001736'
      ENVO_03000003:
        title: nivation
        description: "A material transformation process during which recently precipitated,\
          \ powdery snow transitions into firn or n\xE9v\xE9 through compaction and/or\
          \ through cycles of freezing and thawing."
        is_a: ENVO_03000043
        meaning: 'ENVO:03000003'
      ENVO_03000045:
        title: brine rejection from seawater
        description: A material transformation process during which brine is formed
          due to the expulsion of salt during frazil formation or a seawater freezing
          process.
        is_a: ENVO_03000043
        meaning: 'ENVO:03000045'
      ENVO_06105119:
        title: weathering
        description: A material transformation process during which the properties
          of a material are changed as a result of in situ exposure to atmospheric
          processes.
        is_a: ENVO_03000043
        meaning: 'ENVO:06105119'
      ENVO_06105126:
        title: weathering of plastic
        description: Weathering during which plastic is worn or broken down.
        is_a: ENVO_06105119
        meaning: 'ENVO:06105126'
      ENVO_02500031:
        title: hydrological process
        description: An environmental process which has water - in any of its states
          - as a participant.
        is_a: ENVO_02500000
        meaning: 'ENVO:02500031'
      ENVO_01000982:
        title: water flow process
        description: A material transport process during which a volume of liquid
          water is transported due to a disequilibria in physical forces.
        is_a: ENVO_02500031
        meaning: 'ENVO:01000982'
      ENVO_01001342:
        title: tidal flow process
        description: A water flow process during which movements of water masses caused
          by varying gravitational and rotational forces from astronomical bodies,
          combined with the rotation of the astronomical body containing the water
          mass, cause waters to undergo periodic depth oscillations (tides).
        is_a: ENVO_01000982
        meaning: 'ENVO:01001342'
      ENVO_01001333:
        title: marine tidal flow process
        description: A tidal flow process which occurs in an ocean or sea and during
          which tidal movements generate advective flows, often amplified in velocity
          when moving through an inlet, pass or channel.
        is_a: ENVO_01001342
        meaning: 'ENVO:01001333'
      ENVO_01001339:
        title: diurnal marine tidal flow process
        description: A tidal flow process which occurs once per day in ocean waters
          where a second daily oscillation is blocked by land masses or ocean basin
          geometry.
        is_a: ENVO_01001333
        meaning: 'ENVO:01001339'
      ENVO_01001343:
        title: semi-diurnal marine tidal flow process
        description: A marine tidal flow process which occurs twice per day, resulting
          in two high and two low tides per day, both of roughly equal amplitude.
        is_a: ENVO_01001333
        meaning: 'ENVO:01001343'
      ENVO_02500002:
        title: flooding
        description: A general and temporary condition of partial or complete inundation
          of normally dry land areas from the overflow of inland and/or tidal waters,
          and/or the unusual and rapid accumulation or runoff of surface waters from
          any source. A great flow along a watercourse or a flow causing inundation
          of lands not normally covered by water.
        is_a: ENVO_01000982
        meaning: 'ENVO:02500002'
      ENVO_01000707:
        title: coastal flooding
        description: Coastal flooding is a process in which normally dry, low-lying
          land near a coast is flooded by sea water.
        is_a: ENVO_02500002
        meaning: 'ENVO:01000707'
      ENVO_01000716:
        title: storm surge process
        description: A storm surge process is a coastal flooding process which is
          caused by low pressure weather systems such as tropical cyclones and strong
          extratropical cyclones, the severity of which is affected by the shallowness
          and orientation of the water body relative to storm path, and the timing
          of tides.
        is_a: ENVO_01000707
        meaning: 'ENVO:01000716'
      ENVO_01000708:
        title: riverine flooding
        description: Riverine flooding is a process in which the flow rate of river
          water exceeds the capacity of its channel, thus flooding neighbouring land.
          Bends and meanders in a river channel are particularly disposed to such
          flooding.
        is_a: ENVO_02500002
        meaning: 'ENVO:01000708'
      ENVO_01000709:
        title: flash flooding
        description: Flash flooding is a process in which low-lying land is inundated
          with water for a short period of time and are usually the result of precipitation
          or a breach in the container of a water body.
        is_a: ENVO_02500002
        meaning: 'ENVO:01000709'
      ENVO_01000717:
        title: areal flooding
        description: Areal flooding is a flooding process in which flat or low-lying
          areas become inundated with water due to water input exceeding infiltration,
          evaporation, or run off.
        is_a: ENVO_02500002
        meaning: 'ENVO:01000717'
      ENVO_01000718:
        title: urban flooding
        description: "Urban flooding is a flooding process in which land or property\
          \ in a built environment, particularly in more densely populated areas,\
          \ is inundated due to the rate of water input exceeding that of water drainage\
          \ provided by the environment's drainage systems."
        is_a: ENVO_02500002
        meaning: 'ENVO:01000718'
      ENVO_01001631:
        title: groundwater discharge process
        description: A water flow process during which water flows out of an aquifer.
        is_a: ENVO_01000982
        meaning: 'ENVO:01001631'
      ENVO_01001630:
        title: submarine groundwater discharge process
        description: A water flow process during which fresh or brackish groundwater
          flows from from a landmass into the sea.
        is_a: ENVO_01001631
        meaning: 'ENVO:01001630'
      ENVO_01001632:
        title: groundwater flow
        description: A water flow process during which water is transported through
          an aquifer.
        is_a: ENVO_01000982
        meaning: 'ENVO:01001632'
      ENVO_01001660:
        title: frost action process
        description: A material transport process during which alternate freezing
          and thawing of moisture in soil, rock and other materials results  modifications
          of those materials and in the formation of structures on, or in, the ground.
        is_a: ENVO_01000982
        meaning: 'ENVO:01001660'
      ENVO_01001659:
        title: periglacial process
        description: A frost action process which occurs in cold environments which
          are not part of a glacier.
        is_a: ENVO_01001660
        meaning: 'ENVO:01001659'
      ENVO_01001664:
        title: cryoturbation of soil
        description: A frost action process during which soil is displaced.
        is_a: ENVO_01001660
        meaning: 'ENVO:01001664'
      ENVO_01001661:
        title: frost jacking
        description: A frost action process during which objects embedded in the ground
          are cumulatively displaced upwards.
        is_a: ENVO_01001664
        meaning: 'ENVO:01001661'
      ENVO_01001662:
        title: frost sorting
        description: A frost action process during which the soil particles are differentially
          displaced according to their size ranges.
        is_a: ENVO_01001664
        meaning: 'ENVO:01001662'
      ENVO_01001663:
        title: frost wedging
        description: A frost action process during which the pressure of water freezing
          in cracks, crevices, pores, joints or bedding planes results in the mechanical
          disintegration, splitting or break-up of rock.
        is_a: ENVO_01001664
        meaning: 'ENVO:01001663'
      ENVO_04000001:
        title: frost heaving process
        description: Frost heaving is a process during which an upwards swelling of
          soil occurs due to freezing conditions caused by an increasing presence
          of ice as it grows towards the surface.
        is_a: ENVO_01001664
        meaning: 'ENVO:04000001'
      ENVO_01001666:
        title: glacial run
        description: "A water flow process which comprises a sudden\u2010onset high\u2010\
          magnitude discharge of water and sediment from a glacial source"
        is_a: ENVO_01000982
        meaning: 'ENVO:01001666'
      ENVO_01003007:
        title: percolation of water through soil
        description: Percolation during which water moves through the interstices
          of soil.
        is_a: ENVO_01000982
        meaning: 'ENVO:01003007'
      ENVO_02000122:
        title: peat drainage
        description: A drainage process during which water is transported away from
          peat.
        is_a: ENVO_01000982
        meaning: 'ENVO:02000122'
      ENVO_02500033:
        title: evapotranspiration
        description: "Evapotranspiration is the sum of evaporation and plant transpiration\
          \ from the Earth's land and ocean surface to the atmosphere."
        is_a: ENVO_01000982
        meaning: 'ENVO:02500033'
      ENVO_03000107:
        title: wet snow avalanche
        description: An avalanche during which a suspension of water and snow flows
          down a sloping surface.
        is_a: ENVO_01000982
        meaning: 'ENVO:03000107'
      ENVO_03000127:
        title: acid rainfall
        description: A water-based rainfall process during which water droplets with
          increased acidity fall towards a planetary surface.
        is_a: ENVO_01000982
        meaning: 'ENVO:03000127'
      ENVO_03000146:
        title: water cooling
        description: A material transport process during which liquid water is circulated
          in the vicinity of a heat source in order to absorb thermal energy and transport
          it away form that source.
        is_a: ENVO_01000982
        meaning: 'ENVO:03000146'
      ENVO_02500035:
        title: transpiration
        description: Transpiration is the process of water movement through a plant
          and its evaporation from aerial parts of that plant, such as from leaves
          but also from stems and flowers.
        is_a: ENVO_03000146
        meaning: 'ENVO:02500035'
      ENVO_06105230:
        title: water infiltration
        description: A water flow process during which water occupies the pores or
          interstices of a solid or semi-solid material.
        is_a: ENVO_01000982
        meaning: 'ENVO:06105230'
      ENVO_06105231:
        title: water infiltration into soil
        description: A water infiltration process during which water fills the pore
          space and interstices of soil.
        is_a: ENVO_06105230
        meaning: 'ENVO:06105231'
      ENVO_06105241:
        title: soil drainage
        description: A drainage process during which liquid water is transported away
          from soil.
        is_a: ENVO_01000982
        meaning: 'ENVO:06105241'
      ENVO_01001220:
        title: water accumulation process
        description: A process during which liquid water accumulates in a site, most
          often in some form of container.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001220'
      ENVO_01000634:
        title: volcanic eruption
        description: A volcanic eruption is a process during which lava, tephra (ash,
          lapilli, volcanic bombs and blocks), and assorted gases are expelled from
          a volcanic vent or fissure.
        is_a: ENVO_02500031
        meaning: 'ENVO:01000634'
      ENVO_01000656:
        title: effusive eruption
        description: An effusive eruption is a volcanic eruption during which lava
          flows onto the ground.
        is_a: ENVO_01000634
        meaning: 'ENVO:01000656'
      ENVO_01000655:
        title: explosive eruption
        description: An explosive eruption is a volcanic process in which pressurised
          magma is violently expelled and froths into volcanic ash. Explosive eruptions
          can eject a cloud of rocks, dust, gas, and pyroclastic material  which may
          then collapse, creating a pyroclastic flow of hot volcanic matter.
        is_a: ENVO_01000634
        meaning: 'ENVO:01000655'
      ENVO_01000633:
        title: ecosystem-wide aerobic respiration
        description: A process which consists of all aerobic respiration processes
          instantiated in an ecosystem.
        is_a: ENVO_02500031
        meaning: 'ENVO:01000633'
      ENVO_01000913:
        title: nucleation of cloud condensation
        description: A process during which a solid particle or liquid droplet catalyses
          the condensation of water vapour in an atmosphere.
        is_a: ENVO_02500031
        meaning: 'ENVO:01000913'
      ENVO_01001083:
        title: cloud formation process
        description: A process during which water vapour condensing in the atmosphere
          aggregates into clouds.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001083'
      ENVO_03000017:
        title: glacial ice loss
        description: A process during which the mass of ice constituting a glacier
          decreases.
        is_a: ENVO_02500031
        meaning: 'ENVO:03000017'
      ENVO_01000919:
        title: glacial ice ablation process
        description: An ice loss process which occurs in the low-altitude area of
          a glacier or ice sheet below the firn layer.
        is_a: ENVO_03000017
        meaning: 'ENVO:01000919'
      ENVO_01001656:
        title: glacial retreat
        description: A glacial ice loss process during which the snout (toe) of a
          glacier shrinks following successive years of negative mass balance.
        is_a: ENVO_03000017
        meaning: 'ENVO:01001656'
      ENVO_01001266:
        title: thermal pollution of an aquatic system
        description: A thermal pollution process which occurs in a water body or aquatic
          environment.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001266'
      ENVO_01001618:
        title: ice accumulation process
        description: A material accumulation process during which ice forms in an
          environmental material or an existing accumulation of ice increases in mass.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001618'
      ENVO_03000011:
        title: ice gain
        description: A material accumulation process during which the mass of an existing
          ice mass increases.
        is_a: ENVO_01001618
        meaning: 'ENVO:03000011'
      ENVO_03000029:
        title: glacial ice gain
        description: A process during which the mass of ice constituting a glacier
          increases.
        is_a: ENVO_03000011
        meaning: 'ENVO:03000029'
      ENVO_01001619:
        title: snow and ice accumulation process
        description: A material accumulation process during which a accumulation of
          snow and ice forms or increases in mass.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001619'
      ENVO_01001669:
        title: mariculture process
        description: An aquaculture process during which marine organisms are cultivated
          in the open ocean, an enclosure in the ocean, or in tanks, ponds or raceways
          which are filled with seawater.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001669'
      ENVO_01001670:
        title: open cage mariculture process
        description: A mariculture process during which organisms are cultivated in
          cages which allow the passage of materials such as wastes, pathogens, antibiotics,
          and - should a containment breach occur - cultivated organisms themselves
          to and from the surrounding marine environment.
        is_a: ENVO_01001669
        meaning: 'ENVO:01001670'
      ENVO_01001725:
        title: moist-adiabatic process
        description: An adiabatic process which involves air saturated with water
          vapour and the presence of liquid water.
        is_a: ENVO_02500031
        meaning: 'ENVO:01001725'
      ENVO_02500007:
        title: ecosystem-wide photosynthesis
        description: A process which consists of all photosynthesis processes instantiated
          in an ecosystem.
        is_a: ENVO_02500031
        meaning: 'ENVO:02500007'
      ENVO_03000042:
        title: brine channel formation process
        description: A material accumulation process during which brine droplets,
          trapped between ice crystals formed during seawater freezing, form brine
          channels.
        is_a: ENVO_02500031
        meaning: 'ENVO:03000042'
      ENVO_01000629:
        title: climate change
        description: "The long-term fluctuations in temperature, precipitation, wind,\
          \ and all other aspects of the Earth's climate. External processes, such\
          \ as solar-irradiance variations, variations of the Earth's orbital parameters\
          \ (eccentricity, precession, and inclination), lithosphere motions, and\
          \ volcanic activity, are factors in climatic variation. Internal variations\
          \ of the climate system, e.g., changes in the abundance of greenhouse gases,\
          \ also may produce fluctuations of sufficient magnitude and variability\
          \ to explain observed climate change through the feedback processes interrelating\
          \ the components of the climate system."
        is_a: ENVO_02500000
        meaning: 'ENVO:01000629'
      ENVO_01000630:
        title: acidification of an aquatic environment
        description: Acidification of an aquatic environment is a process whereby
          the pH of an aquatic environment, biome, or water body is lowered.
        is_a: ENVO_02500000
        meaning: 'ENVO:01000630'
      ENVO_01000631:
        title: ocean acidification
        description: Ocean acidification is a process during which the pH of a sea
          or ocean is lowered.
        is_a: ENVO_01000630
        meaning: 'ENVO:01000631'
      ENVO_02500008:
        title: ecosystem-wide respiration
        description: A process which consists of all respiration processes instantiated
          in an ecosystem.
        is_a: ENVO_02500000
        meaning: 'ENVO:02500008'
      ENVO_03000010:
        title: material transport process
        description: A process during which material is displaced from its original
          location and transported either to a new location or back to the original
          location.
        is_a: ENVO_02500000
        meaning: 'ENVO:03000010'
      ENVO_01001093:
        title: tectonic movement
        description: A process during which pieces of a planetary crust and uppermost
          mantle move.
        is_a: ENVO_03000010
        meaning: 'ENVO:01001093'
      ENVO_01001095:
        title: divergent tectonic movement
        description: A process during which pieces of a planetary crust and uppermost
          mantle move away from one another.
        is_a: ENVO_01001093
        meaning: 'ENVO:01001095'
      ENVO_01000728:
        title: tectonic uplift process
        description: A tectonic uplift process is a geomorphologic process in which
          a geological surface shifts upward relative to a datum such as sea-level
          due to forces other than isostatic responses to unloading.
        is_a: ENVO_01001093
        meaning: 'ENVO:01000728'
      ENVO_01001094:
        title: convergent tectonic movement
        description: A process during which pieces of a planetary crust and uppermost
          mantle move towards one another.
        is_a: ENVO_01001093
        meaning: 'ENVO:01001094'
      ENVO_01001102:
        title: tectonic plate subduction
        description: A convergent tectonic movement process during which one plate
          moves under another and is forced or sinks due to gravity into a mantle.
        is_a: ENVO_01001094
        meaning: 'ENVO:01001102'
      ENVO_01001096:
        title: transform tectonic movement
        description: A process during which pieces of a planetary crust and uppermost
          mantle move along each other in a predominantly horizontal manner, either
          in a sinistral (left lateral) or dextral (right lateral) direction.
        is_a: ENVO_01001093
        meaning: 'ENVO:01001096'
      ENVO_03000020:
        title: aeolian transport process
        description: A material transport process during which one or more environmental
          materials are transported by the action of wind.
        is_a: ENVO_03000010
        meaning: 'ENVO:03000020'
      ENVO_03000103:
        title: aeolian transport of snow
        description: An aeolian transport process during which powdery snow is displaced
          and moved.
        is_a: ENVO_03000020
        meaning: 'ENVO:03000103'
      ENVO_01001346:
        title: erosion
        description: An action of exogenic processes (such as water flow or wind)
          which remove environmental material from one location on the surface of
          an astronomical body, transporting it to another location where it is deposited.
        is_a: ENVO_03000010
        meaning: 'ENVO:01001346'
      ENVO_02500028:
        title: planetary erosion
        description: "An action of exogenic processes (such as water flow or wind)\
          \ which remove environmental material from one part of a planet's crust,\
          \ transporting it to another location where it is deposited."
        is_a: ENVO_01001346
        meaning: 'ENVO:02500028'
      ENVO_03000006:
        title: glacial erosion process
        description: An erosion process during which the movement of a glacier across
          a terrestrial surface causes the removal of material from that surface.
        is_a: ENVO_02500028
        meaning: 'ENVO:03000006'
      ENVO_01000682:
        title: glacial abrasion
        description: A glacial abrasion process is an erosional process during which
          debris in the basal ice scrapes along the bed, polishing and gouging the
          underlying rocks, similar to sandpaper on wood.
        is_a: ENVO_03000006
        meaning: 'ENVO:01000682'
      ENVO_01000683:
        title: glacial plucking
        description: Glacial plucking is an erosional process during which pieces
          of bedrock are cracked off due to the mechanical force of a moving glacier.
        is_a: ENVO_03000006
        meaning: 'ENVO:01000683'
      ENVO_01000684:
        title: glacial ice thrusting
        description: Glacial ice thrusting is an erosional process during which a
          moving glacier which has frozen to its bed surges forward and moves large
          sheets of sediment frozen to the glacial mass.
        is_a: ENVO_03000006
        meaning: 'ENVO:01000684'
      ENVO_02500029:
        title: bedrock dissolution
        description: An erosional process in which bedrock is converted from its solid
          form into a solute by the action of some solvent.
        is_a: ENVO_02500028
        meaning: 'ENVO:02500029'
      ENVO_01000706:
        title: soil erosion
        description: "Soil erosion is a process in which exogenic processes remove\
          \ soil from one location on the Earth's crust and transport it to another\
          \ location where it is deposited."
        is_a: ENVO_02500028
        meaning: 'ENVO:01000706'
      ENVO_03000121:
        title: erosion through nivation
        description: An erosion process during which rock or soil is removed or degraded
          due to alternative thawing and freezing of meltwater beneath and at the
          margins of snowbanks.
        is_a: ENVO_02500028
        meaning: 'ENVO:03000121'
      ENVO_01000738:
        title: rock-precursor intrusion process
        description: A process whereby the precursors of rock, such as magma or sedimentary
          particles, fill a fracture in a mass of rock.
        is_a: ENVO_03000010
        meaning: 'ENVO:01000738'
      ENVO_01000657:
        title: igneous intrusion process
        description: A process whereby rising magma cools and solidifies without reaching
          the surface. Instead, the cooled and solidified igneous mass crystallises
          within the crust to form an igneous intrusion.
        is_a: ENVO_01000738
        meaning: 'ENVO:01000657'
      ENVO_01000677:
        title: earthquake
        description: "An earthquake is a process during which energy is released in\
          \ an astronomical body's crust, causing the displacement of crustal parts\
          \ and the generation of seismic waves."
        is_a: ENVO_03000010
        meaning: 'ENVO:01000677'
      ENVO_01000678:
        title: tectonic earthquake
        description: "An earthquake caused by the sudden release of energy accumulated\
          \ in an astronomical body's crust, as the elastic strain placed on constituent\
          \ rock masses causes them to fracture."
        is_a: ENVO_01000677
        meaning: 'ENVO:01000678'
      ENVO_01000679:
        title: megathrust earthquake
        description: "A megathrust earthquake is a tectonic earthquake which occurs\
          \ at subduction zones at destructive plate boundaries (convergent boundaries).\
          \ These interplate earthquakes are the planet's most powerful, with moment\
          \ magnitudes that can exceed 9.0."
        is_a: ENVO_01000678
        meaning: 'ENVO:01000679'
      ENVO_01001770:
        title: foreshock
        description: A tectonic earthquake which precedes the strongest tectonic earthquake
          in a series, linked to the same release of energy in the crust.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001770'
      ENVO_01001771:
        title: mainshock
        description: A tectonic earthquake which 1) is embedded in a series of tectonic
          earthquakes, linked to the same release of energy in the crust and 2) has
          the largest magnitude of the series.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001771'
      ENVO_01001772:
        title: aftershock
        description: A tectonic earthquake which 1) is embedded in a series of tectonic
          earthquakes, linked to the same release of energy in the crust and 2) occurs
          after the mainshock.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001772'
      ENVO_01001774:
        title: blind thrust earthquake
        description: A tectonic earthquake which occurs along a thrust fault which
          does not breach the surface of an astronomical body.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001774'
      ENVO_01001777:
        title: multiplet tectonic earthquake
        description: A tectonic earthquake which has two or more mainshocks of similar
          magnitude, and which originate from the same fracture zone and stress field.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001777'
      ENVO_01001778:
        title: interplate earthquake
        description: A tectonic earthquake which occurs at the boundary between two
          tectonic plates.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001778'
      ENVO_01001779:
        title: intraplate earthquake
        description: A tectonic earthquake which occurs within the interior parts
          of a tectonic plate.
        is_a: ENVO_01000678
        meaning: 'ENVO:01001779'
      ENVO_01000690:
        title: mass wasting
        description: Mass wasting is the geomorphic process by which solid environmental
          material such as soil, sand, regolith, and/or rock move downslope typically
          as a mass, largely under the force of gravity, but frequently affected by
          water and water content as in submarine environments and mudslides.
        is_a: ENVO_03000010
        meaning: 'ENVO:01000690'
      ENVO_01000692:
        title: landslide process
        description: A landslide is a process whereby a large mass of earth and rocks
          moves down a hill or a mountainside.
        is_a: ENVO_01000690
        meaning: 'ENVO:01000692'
      ENVO_01001108:
        title: rockslide process
        description: A rockslide is a process whereby a large mass of rock moves down
          a hill or a mountainside.
        is_a: ENVO_01000692
        meaning: 'ENVO:01001108'
      ENVO_01000700:
        title: sturzstrom
        description: "A sturzstrom is a landslide consisting which has a great amount\
          \ of kinetic energy resulting in greater horizontal movement when compared\
          \ to its initial vertical drop \u2014 as much as 20 or 30 times the vertical\
          \ distance. By contrast a normal landslide will typically travel a horizontal\
          \ distance that is less than twice the distance that the material has fallen."
        is_a: ENVO_01000692
        meaning: 'ENVO:01000700'
      ENVO_01000696:
        title: mass wasting flow
        description: A mass wasting flow is a form of mass wasting during which the
          moving materials behave similarly to a flowing fluid. Water, air and ice
          are often involved in enabling fluidlike motion of the material.
        is_a: ENVO_01000690
        meaning: 'ENVO:01000696'
      ENVO_01000691:
        title: avalanche
        description: A mass wasting flow during which snow rapidly flows down a sloping
          surface.
        is_a: ENVO_01000696
        meaning: 'ENVO:01000691'
      ENVO_03000106:
        title: powdery snow avalanche
        description: An avalanche during which powdery snow rapidly flows down a sloping
          surface.
        is_a: ENVO_01000691
        meaning: 'ENVO:03000106'
      ENVO_01000697:
        title: mudflow
        description: A mudflow is a form of mass wasting which involves very rapid
          to extremely rapid surging flow of debris that has become partially or fully
          liquified by the addition of significant amounts of water to clay-rich source
          material.
        is_a: ENVO_01000696
        meaning: 'ENVO:01000697'
      ENVO_01000699:
        title: lahar
        description: A lahar is a type of mudflow or debris flow composed of a slurry
          of pyroclastic material, rocky debris, and water. The material flows down
          from a volcano, typically along a river valley.
        is_a: ENVO_01000697
        meaning: 'ENVO:01000699'
      ENVO_01000698:
        title: debris flow
        description: A mass wasting flow during which water-laden masses of soil and
          fragmented rock rush down the slopes of elevations, funnel into stream channels,
          entrain objects in their paths, and form thick, muddy deposits on valley
          floors.
        is_a: ENVO_01000696
        meaning: 'ENVO:01000698'
      ENVO_01001875:
        title: debris flow following rainfall
        description: A debris flow which is causally preceded by rainfall.
        is_a: ENVO_01000698
        meaning: 'ENVO:01001875'
      ENVO_01000693:
        title: rockfall
        is_a: ENVO_01000690
        meaning: 'ENVO:01000693'
      ENVO_01000695:
        title: mudslide
        is_a: ENVO_01000690
        meaning: 'ENVO:01000695'
      ENVO_01000917:
        title: ice calving process
        description: A process during which a part of an ice mass breaks away from
          the main mass.
        is_a: ENVO_01000690
        meaning: 'ENVO:01000917'
      ENVO_01001657:
        title: calving of ice onto land
        description: An ice calving process during which a mass of ice falls from
          a larger mass onto land.
        is_a: ENVO_01000917
        meaning: 'ENVO:01001657'
      ENVO_01001658:
        title: calving of ice into water
        description: An ice calving process during which a mass of ice falls from
          a larger mass into a body of water.
        is_a: ENVO_01000917
        meaning: 'ENVO:01001658'
      ENVO_03000030:
        title: glacial ice calving process
        description: A process during which a part of a glacier breaks away from the
          main mass.
        is_a: ENVO_01000917
        meaning: 'ENVO:03000030'
      ENVO_03000031:
        title: iceberg calving process
        description: A process during which a part of a glacier breaks away from the
          main mass as an iceberg.
        is_a: ENVO_03000030
        meaning: 'ENVO:03000031'
      ENVO_03000032:
        title: calving of ice from an iceberg
        description: A process during which a part of an iceberg breaks away from
          the main mass.
        is_a: ENVO_01000917
        meaning: 'ENVO:03000032'
      ENVO_01000916:
        title: rubbish landslide
        description: A mass wasting process during which refuse from human activities,
          usually accumulated at a dumping site, falls down a slope under the force
          of gravity.
        is_a: ENVO_01000690
        meaning: 'ENVO:01000916'
      ENVO_03000105:
        title: slab avalanche
        description: A mass wasting process during which slab snow rapidly moves down
          a sloping surface.
        is_a: ENVO_01000690
        meaning: 'ENVO:03000105'
      ENVO_01000694:
        title: geological subsidence
        description: A material transport process during which a geological surface
          shifts downward relative to a datum such as sea-level.
        is_a: ENVO_03000010
        meaning: 'ENVO:01000694'
      ENVO_01000875:
        title: precipitation process
        description: A precipitation process is a process in which a portion of some
          substance segregates from a material in which that substance or its precursors
          were dissolved or suspended in and settles due to a force such as gravity
          or centrifugal force.
        is_a: ENVO_03000010
        meaning: 'ENVO:01000875'
      ENVO_01000725:
        title: chemical precipitation process
        description: Chemical precipitation is a process in which a portion of some
          solid substance segregates from a material in which that substance or its
          precursors were dissolved in and settles due to a force such as gravity
          or centrifugal force. Segregation may occur due to the solubility limits
          of the precipitating substance being exceeded or due to a chemical reaction
          that forms a solid product from aqueous reagents.
        is_a: ENVO_01000875
        meaning: 'ENVO:01000725'
      ENVO_01000703:
        title: hydrological precipitation process
        description: Hydrological precipitation is a process during which any product
          of the condensation of atmospheric water vapour is pulled to the planetary
          surface by gravity.
        is_a: ENVO_01000875
        meaning: 'ENVO:01000703'
      ENVO_01000895:
        title: snowfall
        description: A hydrological process in which irregular aggregates of snow
          fall to the surface of an astronomical body.
        is_a: ENVO_01000703
        meaning: 'ENVO:01000895'
      ENVO_03400004:
        title: heavy snowfall
        description: Snowfall which has an increased rate.
        is_a: ENVO_01000895
        meaning: 'ENVO:03400004'
      ENVO_03400006:
        title: lake-effect snowfall
        description: Snowfall which 1) is localized, 2) is convective, and 3) occurs
          as a result of a cold, dry air mass absorbing heat and moisture as it flows
          over a lake with warmer waters.
        is_a: ENVO_01000895
        meaning: 'ENVO:03400006'
      ENVO_03400008:
        title: lambing storm
        description: A snowfall which occurs during springtime and is of low intensity.
        is_a: ENVO_01000895
        meaning: 'ENVO:03400008'
      ENVO_01000830:
        title: water-based rainfall
        description: "A hydrological precipitation process in which atmospheric water\
          \ vapour condenses to form droplets of liquid water massive enough to fall\
          \ to a planetary surface due to the planet's gravity."
        is_a: ENVO_01000703
        meaning: 'ENVO:01000830'
      ENVO_01000896:
        title: freezing rainfall
        description: Water-based rainfall which freezes either 1) on impact with a
          surface to form a coating of clear ice (glaze) or 2) after percolating through
          surface layers.
        is_a: ENVO_01000830
        meaning: 'ENVO:01000896'
      ENVO_01000837:
        title: virga
        is_a: ENVO_01000703
        meaning: 'ENVO:01000837'
      ENVO_01000874:
        title: hailfall
        description: A hydrological process during which hail stones fall to the surface
          of an astronomical body.
        is_a: ENVO_01000703
        meaning: 'ENVO:01000874'
      ENVO_03400014:
        title: precipitation of sleet
        description: A hydrological precipitation process during which water falls
          in both liquid and frozen form.
        is_a: ENVO_01000703
        meaning: 'ENVO:03400014'
      ENVO_1000745:
        title: drought
        description: A hydrological precipitation process with a reduced rate relative
          to some historical average, typically resulting in ecosystemic perturbations.
        is_a: ENVO_01000703
        meaning: 'ENVO:1000745'
      ENVO_01000702:
        title: ash fall process
        description: An ash fall process is a process in which volcanic ash formed
          during an explosive volcanic eruption, phreatomagmatic eruption, or during
          material transport in pyroclastic density currents is pulled towards the
          planetary surface by gravity.
        is_a: ENVO_01000875
        meaning: 'ENVO:01000702'
      ENVO_01000729:
        title: atmospheric subsidence
        description: A material transport process during which a mass of air moves
          through an atmosphere towards a planetary surface.
        is_a: ENVO_03000010
        meaning: 'ENVO:01000729'
      ENVO_01001157:
        title: atmospheric escape
        description: "A process during which gases that constitute a planetary atmosphere\
          \ escape that planet's gravitational field and move away into outer space."
        is_a: ENVO_03000010
        meaning: 'ENVO:01001157'
      ENVO_01001158:
        title: hydrodynamic escape
        description: An atmospheric escape process during which atoms that are parts
          of a planetary atmosphere escape into outer space through numerous collisions
          with lighter atoms in that atmosphere.
        is_a: ENVO_01001157
        meaning: 'ENVO:01001158'
      ENVO_01001146:
        title: photoevaporation
        description: A process during which energetic radiation ionises gas and causes
          it to disperse away from the ionising source.
        is_a: ENVO_03000010
        meaning: 'ENVO:01001146'
      ENVO_01001334:
        title: advective transport process
        description: A material transport process during which a volume of material
          is displaced due to a disequilibrium in physical forces and during which
          1) the qualities that inhere in that volume and 2) the processes that are
          unfolding within it are largely unchanged.
        is_a: ENVO_03000010
        meaning: 'ENVO:01001334'
      ENVO_01001533:
        title: mass ice flow
        description: An advective transport process during which a mass of ice is
          transported from one location to another.
        is_a: ENVO_01001334
        meaning: 'ENVO:01001533'
      ENVO_03000012:
        title: glacial transport process
        description: A material transport process during which the snow and ice constituting
          a glacier, and anything contained within it, is transported down a slope
          by gravitation.
        is_a: ENVO_01001533
        meaning: 'ENVO:03000012'
      ENVO_01001747:
        title: mass fluid flow
        description: An advective transport process during which a fluid moves.
        is_a: ENVO_01001334
        meaning: 'ENVO:01001747'
      ENVO_01000981:
        title: mass liquid flow
        description: A process whereby a volume of liquid moves due to a disequilibrium
          of physical forces.
        is_a: ENVO_01001747
        meaning: 'ENVO:01000981'
      ENVO_01000730:
        title: lava flow process
        description: A process in which a volume of lava emitted during an effusive
          eruption moves along a solid surface.
        is_a: ENVO_01000981
        meaning: 'ENVO:01000730'
      ENVO_01000689:
        title: tsunami
        description: A tsunami is a process during which a series of waves is generated
          in a water body, typically an ocean or large lake, by the displacement of
          a large volume of water. Earthquakes, volcanic eruptions and other underwater
          explosions (including detonations of underwater nuclear devices), landslides,
          glacier calvings, meteorite impacts and other disturbances above or below
          water all have the potential to generate a tsunami.
        is_a: ENVO_01000981
        meaning: 'ENVO:01000689'
      ENVO_01000715:
        title: meteotsunami
        description: A meteotsunami is a tsunami caused by atmospheric processes and
          differences in air pressure.
        is_a: ENVO_01000689
        meaning: 'ENVO:01000715'
      ENVO_01000792:
        title: mass gaseous flow
        description: A process whereby a large volume of gas moves due to a disequilibrium
          of physical forces.
        is_a: ENVO_01001747
        meaning: 'ENVO:01000792'
      ENVO_01000793:
        title: atmospheric wind
        is_a: ENVO_01000792
        meaning: 'ENVO:01000793'
      ENVO_01001719:
        title: katabatic wind
        description: An atmospheric wind during which cold atmospheric gas flows downwards
          towards the surface of an astronomical body.
        is_a: ENVO_01000793
        meaning: 'ENVO:01001719'
      ENVO_01001720:
        title: downslope katabatic wind
        description: A katabatic wind during which atmospheric gas flows down the
          slope of an elevation, typically during periods of light larger-scale winds.
        is_a: ENVO_01001719
        meaning: 'ENVO:01001720'
      ENVO_01001722:
        title: foehn wind
        description: A downslope katabatic wind during which warm, dry atmospheric
          gas descends along the lee side of a mountain range as a result of synoptic-scale,
          cross-barrier flow over that range.
        is_a: ENVO_01001720
        meaning: 'ENVO:01001722'
      ENVO_01001744:
        title: drainage wind
        description: A downslope katabatic wind which is generated by the cooling
          of atmospheric gas in contact with terrain surfaces.
        is_a: ENVO_01001720
        meaning: 'ENVO:01001744'
      ENVO_01001746:
        title: glacier wind
        description: A drainage wind which flows along the icy surface of a glacier.
        is_a: ENVO_01001744
        meaning: 'ENVO:01001746'
      ENVO_01001721:
        title: cooling-driven katabatic wind
        description: A katabatic wind which is driven by the cooling and subsequent
          sinking of atmospheric gas masses.
        is_a: ENVO_01001719
        meaning: 'ENVO:01001721'
      ENVO_01001726:
        title: fall wind
        description: A katabatic wind during which the low temperature and increased
          density of a cold mass of atmospheric gas accelerates its descent.
        is_a: ENVO_01001719
        meaning: 'ENVO:01001726'
      ENVO_01001727:
        title: bora
        description: A fall wind which has a source so cold that, when the atmospheric
          gas reaches the lowlands or coast, the dynamic warming is insufficient to
          raise its temperature to the normal level for the region; hence it appears
          as a cold wind.
        is_a: ENVO_01001726
        meaning: 'ENVO:01001727'
      ENVO_01001758:
        title: downdraft
        description: A katabatic wind which is sudden and strong.
        is_a: ENVO_01001719
        meaning: 'ENVO:01001758'
      ENVO_01001751:
        title: downburst
        description: A downdraft which is of high intensity and which spreads radially,
          with high speed, across the planetary surface upon reaching it.
        is_a: ENVO_01001758
        meaning: 'ENVO:01001751'
      ENVO_01001754:
        title: microburst
        description: A downburst during which high winds occur over an area less than
          four kilometres in diameter.
        is_a: ENVO_01001751
        meaning: 'ENVO:01001754'
      ENVO_01001756:
        title: wet microburst
        description: A microburst during which large amounts of rain are generated.
        is_a: ENVO_01001754
        meaning: 'ENVO:01001756'
      ENVO_01001757:
        title: dry microburst
        description: A microburst during which no or very little rain is generated.
        is_a: ENVO_01001754
        meaning: 'ENVO:01001757'
      ENVO_01001755:
        title: macroburst
        description: A downburst during which high winds occur over an area larger
          than four kilometres in diameter.
        is_a: ENVO_01001751
        meaning: 'ENVO:01001755'
      ENVO_01001752:
        title: dry macroburst
        description: A macroburst during which no or very little rain is generated.
        is_a: ENVO_01001755
        meaning: 'ENVO:01001752'
      ENVO_01001753:
        title: wet macroburst
        description: A macroburst during which large amounts of rain are generated.
        is_a: ENVO_01001755
        meaning: 'ENVO:01001753'
      ENVO_01001728:
        title: squall wind
        description: An atmospheric wind which rapidly forms, lasts for a duration
          in the order of minutes, and then rapidly decreases in speed.
        is_a: ENVO_01000793
        meaning: 'ENVO:01001728'
      ENVO_01001730:
        title: jet-effect wind
        description: A wind which is driven by the acceleration of flow through a
          gap, constriction, or channel resulting from large-scale pressure gradient,
          or by Venturi acceleration through a constricting passage.
        is_a: ENVO_01000793
        meaning: 'ENVO:01001730'
      ENVO_01001731:
        title: mountain-gap wind
        description: A jet-effect which passes through a gap, constriction, or channel
          between mountains in a mountain range or between ranges themselves.
        is_a: ENVO_01001730
        meaning: 'ENVO:01001731'
      ENVO_01001732:
        title: slope flow
        description: An atmospheric wind which moves up or down a slope and is driven
          by heating or cooling of that slope.
        is_a: ENVO_01000793
        meaning: 'ENVO:01001732'
      ENVO_01001733:
        title: anabatic wind
        description: An upslope wind driven by heating at the slope surface under
          fair-weather conditions.
        is_a: ENVO_01001732
        meaning: 'ENVO:01001733'
      ENVO_01001750:
        title: straight-line wind
        description: A wind storm during which strong gusts of wind occur, transporting
          atmospheric gas in a linear fashion.
        is_a: ENVO_01000793
        meaning: 'ENVO:01001750'
      ENVO_01001860:
        title: wind gust
        description: An atmospheric wind which 1) has an increased rate relative to
          other winds in the same region and 2) is followed by a lull.
        is_a: ENVO_01000793
        meaning: 'ENVO:01001860'
      ENVO_03000130:
        title: monsoon wind
        description: An atmospheric wind during which air masses over an ocean flow
          towards a land mass, driven by disequilibria between land and ocean surface
          temperatures.
        is_a: ENVO_01000793
        meaning: 'ENVO:03000130'
      ENVO_01000795:
        title: planetary wind
        is_a: ENVO_01000792
        meaning: 'ENVO:01000795'
      ENVO_01000796:
        title: mass plasma flow
        description: A process whereby a large volume of plasma moves due to a disequilibrium
          of physical forces.
        is_a: ENVO_01001747
        meaning: 'ENVO:01000796'
      ENVO_01000794:
        title: stellar wind
        description: A stream of plasma primarily composed of electrons, protons,
          and alpha particles ejected from the upper atmosphere of a star.
        is_a: ENVO_01000796
        meaning: 'ENVO:01000794'
      ENVO_01001748:
        title: cyclonic circulation
        description: "A mass fluid flow which moves  in the same direction as a planet's\
          \ rotation, rotating due to a Coriolis effect."
        is_a: ENVO_01001747
        meaning: 'ENVO:01001748'
      ENVO_01001367:
        title: primary aerosol formation process
        description: A material transport process during which solid or liquid particles
          are directly introduced into a volume of gas.
        is_a: ENVO_03000010
        meaning: 'ENVO:01001367'
      ENVO_01001398:
        title: aerosolisation of dust
        description: A primary aerosol formation process during which dust particles
          are suspended in a gaseous medium.
        is_a: ENVO_01001367
        meaning: 'ENVO:01001398'
      ENVO_01001399:
        title: atmospheric aerosolisation of dust
        description: A process during which dust is aerosolised in an atmosphere.
        is_a: ENVO_01001398
        meaning: 'ENVO:01001399'
      ENVO_01001759:
        title: vibration process
        description: A material transport process during which parts of an elastic
          material oscillate around their positions of equilibrium.
        is_a: ENVO_03000010
        meaning: 'ENVO:01001759'
      ENVO_01001760:
        title: seismic vibration process
        description: A vibration process which occurs in the solid parts of an astronomical
          body as low-frequency acoustic waves pass through them.
        is_a: ENVO_01001759
        meaning: 'ENVO:01001760'
      ENVO_01001761:
        title: volcanic seismic vibration
        description: A seismic vibration process which is caused by a volcanic eruption.
        is_a: ENVO_01001760
        meaning: 'ENVO:01001761'
      ENVO_01001762:
        title: impact-driven seismic vibration
        description: A seismic vibration process which is caused by the impact of
          a solid object on the surface of an astronomical body.
        is_a: ENVO_01001760
        meaning: 'ENVO:01001762'
      ENVO_01001764:
        title: explosion-driven seismic vibration
        description: A seismic vibration process which is caused by an explosion.
        is_a: ENVO_01001760
        meaning: 'ENVO:01001764'
      ENVO_01001765:
        title: mass-wasting-driven seismic vibration
        description: A seismic vibration process which is caused by mass wasting.
        is_a: ENVO_01001760
        meaning: 'ENVO:01001765'
      ENVO_01001766:
        title: collapse-driven seismic vibration
        description: A seismic vibration process which is caused by the collapose
          of a material entity, sending kinetic energy into astronomical body.
        is_a: ENVO_01001760
        meaning: 'ENVO:01001766'
      ENVO_01001769:
        title: earthquake-driven seismic vibration
        description: A seismic vibration process which is caused by an earthquake.
        is_a: ENVO_01001760
        meaning: 'ENVO:01001769'
      ENVO_01003008:
        title: percolation
        description: A material transport process during which a fluid is filtered
          through porous soild or semi-solid materials.
        is_a: ENVO_03000010
        meaning: 'ENVO:01003008'
      ENVO_01003009:
        title: drainage process
        description: A material transport process during which a liquid which is not
          absorbed or otherwise held in place by a material is transported away from
          its location.
        is_a: ENVO_03000010
        meaning: 'ENVO:01003009'
      ENVO_01003010:
        title: convective transport process
        description: A material transport process which arises spontaneously due to
          physical heterogeneities in a portion of a material and forces which act
          throughout its volume.
        is_a: ENVO_03000010
        meaning: 'ENVO:01003010'
      ENVO_01003013:
        title: material diffusion process
        description: A material transport process during which material moves from
          a region of higher concentration to a region of lower concentration.
        is_a: ENVO_03000010
        meaning: 'ENVO:01003013'
      ENVO_02000125:
        title: transportation
        description: A planned process that is the movement of people, animals and
          goods from one location to another.
        is_a: ENVO_03000010
        meaning: 'ENVO:02000125'
      ENVO_03000092:
        title: gas emission process
        description: A material transport process during which a portion of gaseous
          environmental material is transported into the atmosphere.
        is_a: ENVO_03000010
        meaning: 'ENVO:03000092'
      ENVO_03000093:
        title: hydrocarbon gas emission process
        description: A gas emission process during which a portion of hydrocarbon
          gas is transported into the atmosphere.
        is_a: ENVO_03000092
        meaning: 'ENVO:03000093'
      ENVO_01000742:
        title: carbon-bearing gas emission process
        description: A carbon emission process is any environmental process which
          outputs a carbon-bearing gas.
        is_a: ENVO_03000093
        meaning: 'ENVO:01000742'
      ENVO_01000769:
        title: carbon dioxide emission process
        description: A carbon emission process is any environmental process which
          releases carbon dioxide gas into the atmosphere.
        is_a: ENVO_01000742
        meaning: 'ENVO:01000769'
      ENVO_03000094:
        title: methane gas emission process
        description: A hydrocarbon gas emission process during which a portion of
          methane gas is transported into the atmosphere.
        is_a: ENVO_03000093
        meaning: 'ENVO:03000094'
      ENVO_1000747:
        title: exudation of carbohydrates
        description: A process in which carbohydrates are transported from the interior
          of an organism to its surroundings.
        is_a: ENVO_03000010
        meaning: 'ENVO:1000747'
      ENVO_03000009:
        title: material accumulation process
        description: A process during which the mass of one or more materials, present
          within a given site, increases.
        is_a: ENVO_02500000
        meaning: 'ENVO:03000009'
      ENVO_03000054:
        title: depositional process
        description: A process during which material entities are added to a landform
          or to a feature upon the landform.
        is_a: ENVO_03000009
        meaning: 'ENVO:03000054'
      ENVO_03000036:
        title: sedimentation in a water body
        description: A material accumulation process during which solid particles
          are pulled through a water body by gravitation or centrifugal force and
          which ends when they settle on a solid surface.
        is_a: ENVO_03000009
        meaning: 'ENVO:03000036'
      ENVO_01001394:
        title: accumulation of matter on aerosolised particles
        is_a: ENVO_03000009
        meaning: 'ENVO:01001394'
      ENVO_01001856:
        title: liquid accumulation process
        description: A material accumulation process during which the volume of liquid
          entity increases.
        is_a: ENVO_03000009
        meaning: 'ENVO:01001856'
      ENVO_04000015:
        title: carbon sequestration process
        description: A material accumulation process during which atmospheric carbon
          dioxide is captured and stored.
        is_a: ENVO_03000009
        meaning: 'ENVO:04000015'
      ENVO_04000016:
        title: biotic carbon sequestration
        description: A carbon sequestration process during which atmospheric carbon
          dioxide is captured and stored by biological processes.
        is_a: ENVO_04000015
        meaning: 'ENVO:04000016'
      ENVO_04000017:
        title: geological carbon sequestration
        description: A carbon sequestration process during which carbon dioxide is
          stored in underground geological formations.
        is_a: ENVO_04000015
        meaning: 'ENVO:04000017'
      ENVO_04000018:
        title: carbon sequestration by the ocean carbonate system
        description: A carbon sequestration process during which carbon dioxide is
          stored in the carbonate system of an ocean.
        is_a: ENVO_04000015
        meaning: 'ENVO:04000018'
      ENVO_06105021:
        title: adsorption
        description: A material accumulation process during which material adheres
          to a solid or liquid surface.
        is_a: ENVO_03000009
        meaning: 'ENVO:06105021'
      ENVO_06105022:
        title: fouling
        description: A material accumulation process during which material builds
          up on a solid surface such that a function of that surface, or the object
          it is a part of, is impaired.
        is_a: ENVO_03000009
        meaning: 'ENVO:06105022'
      ENVO_06105023:
        title: biofouling
        description: A fouling process during which biological matter accumulates
          on a solid surface.
        is_a: ENVO_06105022
        meaning: 'ENVO:06105023'
      ENVO_03000016:
        title: material decumulation process
        description: A process during which a mass composed of one or more environmental
          materials, present within a given site, decreases.
        is_a: ENVO_02500000
        meaning: 'ENVO:03000016'
      ENVO_01000915:
        title: ice loss process
        description: A material decumulation process during which the mass of an existing
          ice mass decreases in size.
        is_a: ENVO_03000016
        meaning: 'ENVO:01000915'
      ENVO_01000741:
        title: recycling process
        description: A process during which materials deemed as waste are separated
          and converted into a form which can be used as input by the same processes
          which generated them.
        is_a: ENVO_02500000
        meaning: 'ENVO:01000741'
      ENVO_06105300:
        title: wastewater treatment process
        description: A recycling process during which wastewater is treated
        is_a: ENVO_01000741
        meaning: 'ENVO:06105300'
      ENVO_06105301:
        title: desalination process
        description: A recycling process during which the dissolved mineral salts
          in water are removed
        is_a: ENVO_01000741
        meaning: 'ENVO:06105301'
      ENVO_02500003:
        title: atmospheric process
        description: A process which occurs within an atmosphere.
        is_a: ENVO_02500000
        meaning: 'ENVO:02500003'
      ENVO_02500004:
        title: greenhouse effect
        description: A process by which thermal radiation from a planetary surface
          is absorbed by atmospheric greenhouse gases, and is re-radiated in all directions.
          Since part of this re-radiation is back towards the surface and the lower
          atmosphere, it results in an elevation of the average surface temperature
          above what it would be in the absence of the gases.
        is_a: ENVO_02500003
        meaning: 'ENVO:02500004'
      ENVO_01000877:
        title: atmospheric storm
        description: "An atmospheric storm is a process in which a portion of an astronomical\
          \ body's atmosphere is strongly perturbed from its prevaling weather."
        is_a: ENVO_02500003
        meaning: 'ENVO:01000877'
      ENVO_01001294:
        title: convective storm
        description: An atmospheric storm which is generated by the heating and convection
          of moist and unstable air masses.
        is_a: ENVO_01000877
        meaning: 'ENVO:01001294'
      ENVO_01000878:
        title: thunderstorm
        description: An atmospheric storm which occurs in cumulonimbus clouds and
          during which lightning and thunder occur.
        is_a: ENVO_01001294
        meaning: 'ENVO:01000878'
      ENVO_01000879:
        title: rainstorm
        description: An atmospheric storm during which intense rainfall occurs.
        is_a: ENVO_01000877
        meaning: 'ENVO:01000879'
      ENVO_01000882:
        title: icestorm
        description: An atmospheric storm during which freezing rain falls and accumulates
          as ice on exposed surfaces.
        is_a: ENVO_01000877
        meaning: 'ENVO:01000882'
      ENVO_01000880:
        title: hailstorm
        description: An atmospheric storm during which intense hailfall occurs
        is_a: ENVO_01000882
        meaning: 'ENVO:01000880'
      ENVO_01000881:
        title: snowstorm
        description: An atmospheric storm during which intense snowfall occurs.
        is_a: ENVO_01000877
        meaning: 'ENVO:01000881'
      ENVO_01000903:
        title: blizzard
        description: A blizzard is a severe snowstorm during which snowfall is transported
          by strong winds, sustained for several hours.
        is_a: ENVO_01000881
        meaning: 'ENVO:01000903'
      ENVO_03000134:
        title: WMO blizzard
        description: A blizzard which 1) lasts at least 3 hours, 2) combines below
          freezing temperatures and very strong wind, laden with blowing snow.
        is_a: ENVO_01000903
        meaning: 'ENVO:03000134'
      ENVO_03000135:
        title: NSIDC blizzard
        description: A blizzard which has 1) winds of 35 miles per hour (approximately
          56 kilometers per hour), 2) lasts for a period of at least three hours,
          and 3) occurs in extremely cold temperatures.
        is_a: ENVO_01000903
        meaning: 'ENVO:03000135'
      ENVO_03000136:
        title: winter blizzard
        description: A blizzard which occurs in winter.
        is_a: ENVO_01000903
        meaning: 'ENVO:03000136'
      ENVO_03400007:
        title: lake-effect snow storm
        description: A snowstorm during which intense lake-effect snowfall occurs.
        is_a: ENVO_01000881
        meaning: 'ENVO:03400007'
      ENVO_01000904:
        title: ground blizzard
        description: A ground blizzard is a storm during which snow which has settled
          on a planetary surface is resuspended in and transported through its atmosphere
          by strong winds, sustained for several hours.
        is_a: ENVO_01000877
        meaning: 'ENVO:01000904'
      ENVO_01001296:
        title: tropical storm
        description: A an atmospheric storm which originates over tropical or subtropical
          waters and possesses a warm-core, non-frontal synoptic-scale cyclone with
          a low pressure centre, spiral rain bands and strong winds.
        is_a: ENVO_01000877
        meaning: 'ENVO:01001296'
      ENVO_01001297:
        title: cyclone
        description: An atmospheric storm during which a large mass of atmospheric
          gas rotates around a centre of low atmospheric pressure, generating high
          winds which spiral towards that centre.
        is_a: ENVO_01000877
        meaning: 'ENVO:01001297'
      ENVO_01001298:
        title: warm core cyclone
        description: A cyclone which rotates around an area low atmospheric pressure
          with increased temperature.
        is_a: ENVO_01001297
        meaning: 'ENVO:01001298'
      ENVO_01001295:
        title: extra-tropical cyclone
        description: A warm-core cyclone which occurs in the middle and high latitudes,
          primarily drawing energy from horizontal temperature contrasts between atmospheric
          fronts.
        is_a: ENVO_01001298
        meaning: 'ENVO:01001295'
      ENVO_01001729:
        title: nautical squall
        description: 'A storm which is nautical, localised, and of high severity local
          storm considered as a whole: that is, winds and cloud mass and (if any)
          precipitation, thunder and lightning.'
        is_a: ENVO_01000877
        meaning: 'ENVO:01001729'
      ENVO_01001749:
        title: wind storm
        description: An atmospheric storm during which winds flow with increased rates.
        is_a: ENVO_01000877
        meaning: 'ENVO:01001749'
      ENVO_01000898:
        title: atmospheric lightning
        description: A sudden electrostatic discharge which occurs during an electrical
          storm as differentially charged atmospheric entities equalise their charge.
        is_a: ENVO_02500003
        meaning: 'ENVO:01000898'
      ENVO_01000902:
        title: lightning flash
        description: A lightning process during which electrostatic discharge occurs
          within a single cloud or between multiple clouds.
        is_a: ENVO_01000898
        meaning: 'ENVO:01000902'
      ENVO_01000899:
        title: intercloud lightning
        description: A lightning process during which electrostatic discharge occurs
          between at least two clouds.
        is_a: ENVO_01000902
        meaning: 'ENVO:01000899'
      ENVO_01000900:
        title: intracloud lightning
        description: A lightning process during which electrostatic discharge occurs
          within a single cloud.
        is_a: ENVO_01000902
        meaning: 'ENVO:01000900'
      ENVO_01000901:
        title: lightning strike
        description: A lightning process during which electrostatic discharge occurs
          between a cloud and an object on a planetary surface, or a planetary surface
          itself.
        is_a: ENVO_01000898
        meaning: 'ENVO:01000901'
      ENVO_01001365:
        title: atmospheric secondary aerosol formation process
        description: A process during which gas-phase molecules form solid or liquid
          particles that are stable enough to continue growing in size - via the condensation
          or aggregation of other gas-phase molecules - at a greater rate than their
          constituents re-enter gas phase.
        is_a: ENVO_02500003
        meaning: 'ENVO:01001365'
      ENVO_01001401:
        title: haze formation process
        description: An environmental process during which a haze is formed by the
          aerosolisation of solid particles, including natural materials and anthropogenic
          pollutants, in an atmosphere.
        is_a: ENVO_02500003
        meaning: 'ENVO:01001401'
      ENVO_01001403:
        title: haze formation event
        description: A haze formation process which has an increased rate relative
          to that which is usually present in a given site.
        is_a: ENVO_01001401
        meaning: 'ENVO:01001403'
      ENVO_01001795:
        title: ecosystem process
        description: An environmental process either driven by or primarily impacting
          the parts or emergent properties of an ecosystem.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001795'
      ENVO_02500005:
        title: land degradation
        description: A process which diminishes the functioning of an ecosystem located
          on land.
        is_a: ENVO_01001795
        meaning: 'ENVO:02500005'
      ENVO_01000705:
        title: soil degradation
        description: Soil degradation is a process which results in a change in soil
          health status resulting in a diminished capacity of the ecosystem in which
          the soil occurs to provide goods and services for its  beneficiaries.
        is_a: ENVO_02500005
        meaning: 'ENVO:01000705'
      ENVO_02500001:
        title: desertification
        description: A type of land degradation in which terrestrial ecosystem becomes
          increasingly dry, typically losing its bodies of water as well as vegetation
          and wildlife.
        is_a: ENVO_02500005
        meaning: 'ENVO:02500001'
      ENVO_01000852:
        title: coral bleaching process
        description: An environmental process in which coral expels the symbiotic
          algae living in its tissue as a result of stress, causing the coral to turn
          white.
        is_a: ENVO_01001795
        meaning: 'ENVO:01000852'
      ENVO_01001174:
        title: ecosystem decay
        description: A process during which an ecosystem fragment loses its system
          integrity, with many of its resident ecological populations 1) losing their
          habitats, 2) undergoing a loss of functional and phylogenetic diversity,
          and 3) undergoing a subsequent genetic destabilisation through inbreeding.
        is_a: ENVO_01001795
        meaning: 'ENVO:01001174'
      ENVO_01001824:
        title: ecological succession
        description: An ecosystem process during which the species composition of
          an ecosystem gradually changes as species which are more adapted to the
          prevailing conditions in the ecosystem replace those which are less adapted.
        is_a: ENVO_01001795
        meaning: 'ENVO:01001824'
      ENVO_01001827:
        title: climactic ecological succession
        description: An ecological succession process during which 1) organisms in
          ecological communities possess high adaptation to the conditions in the
          ecosystem, 2) participant communities largely fill available niches, 3)
          individual organisms are typically replaced by others of the same species,
          4) a near equilibrium is maintained between gross primary production and
          total respiration and across biogeochemical cycles.
        is_a: ENVO_01001824
        meaning: 'ENVO:01001827'
      ENVO_02500012:
        title: deforestation
        description: An ecosystem process during which the flora and fauna belonging
          to a forest are removed or destroyed.
        is_a: ENVO_01001795
        meaning: 'ENVO:02500012'
      ENVO_01001435:
        title: planned deforestation
        description: Deforestation which is planned and executed by humans.
        is_a: ENVO_02500012
        meaning: 'ENVO:01001435'
      ENVO_02500014:
        title: forest process
        is_a: ENVO_01001795
        meaning: 'ENVO:02500014'
      ENVO_02500015:
        title: forest area expansion
        is_a: ENVO_01001795
        meaning: 'ENVO:02500015'
      ENVO_02500018:
        title: algal bloom process
        description: A process during which the populations in a community of algae
          in a marine or freshwater ecosystem undergo rapid growth, resulting in high
          concentrations of algal cells that occur only periodically and briefly in
          that ecosystem, relative to their concentrations through the majority of
          the planetary orbital period.
        is_a: ENVO_01001795
        meaning: 'ENVO:02500018'
      ENVO_02500021:
        title: algal bloom collapse
        description: A process during which the rapid growth of algal populations
          that result in an algal bloom ceases, and cell densities begin to fall due
          to death, predation, and transport.
        is_a: ENVO_01001795
        meaning: 'ENVO:02500021'
      ENVO_02500022:
        title: algal bloom process phase
        is_a: ENVO_01001795
        meaning: 'ENVO:02500022'
      ENVO_02500024:
        title: accumulation of toxins from algal bloom process
        is_a: ENVO_02500022
        meaning: 'ENVO:02500024'
      ENVO_02500025:
        title: degradation of toxins from algal bloom process
        is_a: ENVO_02500022
        meaning: 'ENVO:02500025'
      ENVO_02500023:
        title: algal production
        description: A process during which the algal cells constituting an algal
          bloom produce biomass from abiotic components during photosynthesis.
        is_a: ENVO_01001795
        meaning: 'ENVO:02500023'
      ENVO_01000870:
        title: ground deformation process
        description: A process in which a solid planetary surface is deformed.
        is_a: ENVO_02500000
        meaning: 'ENVO:01000870'
      ENVO_01000876:
        title: storm
        description: A storm is an environmental process in which an environmental
          system and the processes it participates in are strongly perturbed by external
          forcings. These forcings typically increase the rates of processes unfolding
          in the system, relative to their normal rates.
        is_a: ENVO_02500000
        meaning: 'ENVO:01000876'
      ENVO_01000897:
        title: electrostatic discharge process
        description: A process during which a sudden flow of electricity occurs, often
          accompanied by a visible release of photons, between two electrically charged
          objects due to contact, an electrical short, or dielectric breakdown.
        is_a: ENVO_02500000
        meaning: 'ENVO:01000897'
      ENVO_01001622:
        title: englacial process
        description: An environmental system process which occurs within a glacier
          or ice sheet.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001622'
      ENVO_02500027:
        title: anthropogenic environmental process
        description: An environmental process which is driven by the action of humans.
        is_a: ENVO_02500000
        meaning: 'ENVO:02500027'
      ENVO_01000996:
        title: human-directed construction process
        description: An process during which natural or manufactured materials and
          products are processed and arranged by humans or their technology into structures.
        is_a: ENVO_02500027
        meaning: 'ENVO:01000996'
      ENVO_01001246:
        title: agricultural process
        description: A process during which humans rear animals or plants on land
          for harvest and consumption.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001246'
      ENVO_01001247:
        title: agronomic process
        description: An agricultural process during which humans rear plants on land
          for harvest and consumption.
        is_a: ENVO_01001246
        meaning: 'ENVO:01001247'
      ENVO_01001248:
        title: animal husbandry
        description: An agricultural process during which humans rear animals on land
          for harvest and consumption.
        is_a: ENVO_01001246
        meaning: 'ENVO:01001248'
      ENVO_2000012:
        title: anthropogenic generation of energy
        description: The generation of energy for use by humans
        is_a: ENVO_02500027
        meaning: 'ENVO:2000012'
      ENVO_2000013:
        title: generation of energy from coal
        is_a: ENVO_2000012
        meaning: 'ENVO:2000013'
      ENVO_2000014:
        title: generation of energy from oil
        is_a: ENVO_2000012
        meaning: 'ENVO:2000014'
      ENVO_01000993:
        title: manufacturing process
        description: A planned process during which raw or recycled materials are
          transformed into products for use or sale using labour and machines, tools,
          chemical and biological processing, or formulation.
        is_a: ENVO_02500027
        meaning: 'ENVO:01000993'
      ENVO_01000994:
        title: planetary manufacturing process
        description: A manufacturing process which occurs on a planet.
        is_a: ENVO_01000993
        meaning: 'ENVO:01000994'
      ENVO_01001223:
        title: lumber production process
        description: A process during which wood is processed into beams or planks.
        is_a: ENVO_01000994
        meaning: 'ENVO:01001223'
      ENVO_06105125:
        title: plastic manufacturing process
        description: A manufacturing process which includes plastic as one of its
          specified outputs.
        is_a: ENVO_01000993
        meaning: 'ENVO:06105125'
      ENVO_01001436:
        title: planned environmental usage process
        description: A planned process during which humans access and obtain resources,
          benefits, or services from a natural or anthropised ecosystem.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001436'
      ENVO_01001444:
        title: usage of an environment for transportation
        description: A planned environmental usage process during which an environment
          facilitates the movement of materials and material objects (persons or goods)
          from place to place, typically with the assistance of a vehicle.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001444'
      ENVO_01001437:
        title: mining
        description: A planned environmental usage process during which a non-renewable
          resource such as petroleum, natural gas, or water is extracted from an ecosystem.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001437'
      ENVO_01001433:
        title: terrestrial mining
        description: A land use process during which materials of economic value are
          extracted from a planet, usually from an orebody, lode, vein, seam, reef
          or placer deposit.
        is_a: ENVO_01001437
        meaning: 'ENVO:01001433'
      ENVO_01001438:
        title: quarrying
        description: A mining process during which rock or mineral deposits are extracted
          from the terrestrial surface layers of an astronomical body.
        is_a: ENVO_01001433
        meaning: 'ENVO:01001438'
      ENVO_01001441:
        title: opencast mining
        description: A mining process during which metal ores and minerals that lie
          near the terrestrial surface of an astronomical body are extracted by removing
          the overlying material and breaking and loading the ore.
        is_a: ENVO_01001433
        meaning: 'ENVO:01001441'
      ENVO_01001439:
        title: marine mining
        description: A mining process which occurs in a marine ecosystem.
        is_a: ENVO_01001437
        meaning: 'ENVO:01001439'
      ENVO_01001416:
        title: benthic deep-sea mining
        description: A mining process during which materials are extracted from benthic
          environments deep below the ocean surface, where no stellar radiation reaches..
        is_a: ENVO_01001439
        meaning: 'ENVO:01001416'
      ENVO_01001420:
        title: sea bed mining
        description: A mining process during which materials are extracted from the
          surface, or below the surface, of the ocean floor.
        is_a: ENVO_01001439
        meaning: 'ENVO:01001420'
      ENVO_01001440:
        title: coal mining
        description: A mining process during which coal is extracted from the rocky
          portion of an astronomical body.
        is_a: ENVO_01001437
        meaning: 'ENVO:01001440'
      ENVO_01001449:
        title: usage of an environment for defence
        description: A planned environmental usage process during which an environment
          supports activities which aim to protect citizens or any geographical area
          by preparing for or by using military means to resist the attack of an enemy.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001449'
      ENVO_01001443:
        title: usage of an environment for recreation
        description: A planned environmental usage process during which humans access
          an environment in order to promote the refreshment of their physical and
          psychological health through relaxation and leisure activities.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001443'
      ENVO_01001450:
        title: usage of an environment for industry
        description: A planned environmental usage process during which an environment
          supports manufacturing facilities producing commodities that are sold with
          the expectation of recovering the total cost of production.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001450'
      ENVO_01001445:
        title: usage of an environment for infrastructure and utilities
        description: A planned environmental usage process during which an environment
          supports 1) enterprises concerned with the provision to the public of essentials,
          such as electricity or water or 2) the basic network or foundation of capital
          facilities or community investments which are necessary to support economic
          and community activities.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001445'
      ENVO_01000906:
        title: aquaculture process
        description: A process during which humans rear animals or plants in bodies
          of water for harvest and consumption.
        is_a: ENVO_01001436
        meaning: 'ENVO:01000906'
      ENVO_01001254:
        title: animal aquaculture process
        description: An aquaculture process during which humans rear animals.
        is_a: ENVO_01000906
        meaning: 'ENVO:01001254'
      ENVO_01001249:
        title: crustacean farming process
        description: An aquaculture process during which humans rear crustaceans.
        is_a: ENVO_01001254
        meaning: 'ENVO:01001249'
      ENVO_01001250:
        title: finfish farming process
        description: An aquaculture process during which humans rear finfish.
        is_a: ENVO_01001254
        meaning: 'ENVO:01001250'
      ENVO_01001251:
        title: mollusc farming process
        description: An aquaculture process during which humans rear molluscs.
        is_a: ENVO_01001254
        meaning: 'ENVO:01001251'
      ENVO_01001255:
        title: plant aquaculture process
        description: An aquaculture process during which humans rear plants.
        is_a: ENVO_01000906
        meaning: 'ENVO:01001255'
      ENVO_01001252:
        title: seaweed farming process
        description: An aquaculture process during which humans rear seaweed.
        is_a: ENVO_01001255
        meaning: 'ENVO:01001252'
      ENVO_01001253:
        title: freshwater macrophyte farming process
        description: An aquaculture process during which humans rear freshwater macrophytes.
        is_a: ENVO_01001255
        meaning: 'ENVO:01001253'
      ENVO_01001451:
        title: usage of an environment for business
        description: A planned environmental usage process during which an environment
          supports facilities associated with commerce or the earning of a livelihood
          through means other than manufacturing or the provision of a public service.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001451'
      ENVO_01001431:
        title: land use process
        description: An anthropogenic environmental process which includes all human
          activities undertaken in a natural, semi-natural, or anthropised environment.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001431'
      ENVO_01001432:
        title: forestry
        description: "A land use process during which humans access and manage forest\
          \ ecosystems for 1) the provisioning of wood, forages, water, wildlife,\
          \ and recreation as well as a broad range of other ecosystem services or\
          \ 2) the maintenance of the forest ecosystem's health."
        is_a: ENVO_01001431
        meaning: 'ENVO:01001432'
      ENVO_01001442:
        title: agriculture
        description: A land use process during which terrestrial environments are
          modified such that they can grow crop plants or allow the rearing of animals
          to provide food, fiber, medicines, or other products used by humans.
        is_a: ENVO_01001431
        meaning: 'ENVO:01001442'
      ENVO_01001446:
        title: usage of an environment for residential activity
        description: A planned environmental usage process during which an environment
          supports the settlement and dwelling of a community of humans.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001446'
      ENVO_01001447:
        title: usage of an environment for community and social services
        description: A planned environmental usage process during which an environment
          supports welfare activities organised by the state or a local authority
          and carried out by trained personnel.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001447'
      ENVO_01001448:
        title: usage of an environment for retail activity
        description: A planned environmental usage process during which an environment
          supports the sale of goods to ultimate consumers, usually in small quantities.
        is_a: ENVO_01001436
        meaning: 'ENVO:01001448'
      ENVO_06105113:
        title: fishing
        description: A planned environmental usage process during which any number
          of fish are caught by humans or their technologies.
        is_a: ENVO_01001436
        meaning: 'ENVO:06105113'
      ENVO_01001434:
        title: anthropogenic ecosystem conversion process
        description: A process during which an ecosystem - natural or anthropised
          - is changed by the actions of humans.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001434'
      ENVO_01000952:
        title: anthropisation
        description: A process during which a natural environmental system is altered
          by human action.
        is_a: ENVO_01001434
        meaning: 'ENVO:01000952'
      ENVO_01000743:
        title: land consumption process
        description: A process in which natural ecosystems present over an expanse
          of land are removed and replaced with anthropogenic ecosystems.
        is_a: ENVO_01000952
        meaning: 'ENVO:01000743'
      ENVO_01001429:
        title: land conversion process
        description: An anthropisation process during which terrestrial environments
          - natural or anthropised - or parts thereof are altered to facilitate human
          activities such as agriculture, settlement, or commerce.
        is_a: ENVO_01000743
        meaning: 'ENVO:01001429'
      ENVO_01001430:
        title: agricultural land conversion process
        description: A land conversion process during which terrestrial ecosystems
          are altered to facilitate agricultural activities such as crop cultivation
          or the rearing of livestock.
        is_a: ENVO_01001429
        meaning: 'ENVO:01001430'
      ENVO_01001170:
        title: active ecosystem management process
        description: A process during which an ecosystem, its parts, or the processes
          it participates in are modified by human intervention to accomplish an objective.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001170'
      ENVO_01001171:
        title: conservation-focused active ecosystem management process
        description: An active management process which has the conservation of an
          ecosystem, or a part thereof, as its primary objective.
        is_a: ENVO_01001170
        meaning: 'ENVO:01001171'
      ENVO_01001635:
        title: biodiversity conservation process
        description: A conservation process during which the variability of life -
          from genes to ecosystems - is preserved.
        is_a: ENVO_01001171
        meaning: 'ENVO:01001635'
      ENVO_01001636:
        title: insect conservation process
        description: A biodiversity conservation process during which the variability
          of insect communities, or parts thereof, is preserved.
        is_a: ENVO_01001635
        meaning: 'ENVO:01001636'
      ENVO_01001499:
        title: active agri-ecosystem management process
        description: An active ecosystem management process which targets an agricultural
          ecosystem.
        is_a: ENVO_01001170
        meaning: 'ENVO:01001499'
      ENVO_01001634:
        title: agricultural landscape diversification process
        description: An active agri-ecosystem management process during which the
          variability of land use types or the spatial structure of land under agricultural
          production is increased.
        is_a: ENVO_01001499
        meaning: 'ENVO:01001634'
      ENVO_01001637:
        title: agricultural specialisation process
        description: An active agri-ecosystem management process during which an ecosystem
          is modified for the production of one or a small collection of crops or
          other agricultural products.
        is_a: ENVO_01001499
        meaning: 'ENVO:01001637'
      ENVO_02500032:
        title: planned revegetation
        description: A planned process during which human agents establish plant communities
          in ecosystems which have previously been, partially or wholly, stripped
          of existing plant communities.
        is_a: ENVO_01001170
        meaning: 'ENVO:02500032'
      ENVO_02500011:
        title: afforestation
        description: Establishment of a new forest by seeding or planting of nonforested
          land.
        is_a: ENVO_02500032
        meaning: 'ENVO:02500011'
      ENVO_02500013:
        title: reforestation
        description: The planting of trees in areas in where forests have previously
          been cleared.
        is_a: ENVO_02500032
        meaning: 'ENVO:02500013'
      ENVO_01001260:
        title: waste disposal process
        description: A process during which materials deemed to be waste are transported
          away from a site.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001260'
      ENVO_01001259:
        title: transport of waste to a designated storage site
        description: A process during which materials deemed to be waste are removed
          from a site and transported to another site designated for its storage.
        is_a: ENVO_01001260
        meaning: 'ENVO:01001259'
      ENVO_01001261:
        title: transport of child feces to a designated site
        description: A waste disposal process during which the feces of human children
          is transported to a designated storage site.
        is_a: ENVO_01001259
        meaning: 'ENVO:01001261'
      ENVO_01001262:
        title: transport of household waste to a designated storage site
        description: A process during which materials used in a household and deemed
          to be waste are removed from the housing unit and transported to another
          site designated for its storage.
        is_a: ENVO_01001259
        meaning: 'ENVO:01001262'
      ENVO_01001500:
        title: anthropogenic light pollution
        description: A pollution process during which artificial light with wavelengths
          in the visible spectrum is released into the environment.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001500'
      ENVO_01001866:
        title: well intervention
        description: A planned process during which an oil or gas well is modified.
        is_a: ENVO_02500027
        meaning: 'ENVO:01001866'
      ENVO_01001867:
        title: well stimulation
        description: A well intervention during which the production of an oil or
          gas well is increased by improving the flow of hydrocarbons from the reservoir
          into the well bore.
        is_a: ENVO_01001866
        meaning: 'ENVO:01001867'
      ENVO_01001868:
        title: hydraulic fracturing
        description: A well stimulation technique during which bedrock formations
          are fractured through the injection of pressurized proppant-bearing liquid
          into a well-bore.
        is_a: ENVO_01001867
        meaning: 'ENVO:01001868'
      ENVO_06105108:
        title: littering
        description: An anthropogenic environmental process during which waste is
          improperly disposed of into the environment.
        is_a: ENVO_02500027
        meaning: 'ENVO:06105108'
      ENVO_06105114:
        title: ghost fishing
        description: An anthropogenic environmental process during which abandoned,
          lost, or discarded fishing gear attracts and entangles organisms.
        is_a: ENVO_02500027
        meaning: 'ENVO:06105114'
      ENVO_01001852:
        title: energy transfer process
        description: A process during which one entity loses energy to another entity.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001852'
      ENVO_01001767:
        title: structural collapse process
        description: A process during which the ability of a material entity to maintain
          its internal organisation fails, resulting in deformation and a breakdown
          of that organisation.
        is_a: ENVO_01001852
        meaning: 'ENVO:01001767'
      ENVO_01001768:
        title: cave collapse
        description: A structural collapse process during which the walls of cave
          are unable to support the load placed upon them.
        is_a: ENVO_01001767
        meaning: 'ENVO:01001768'
      ENVO_01001023:
        title: radiation
        description: A process during which energy is emitted or transmitted in the
          form of waves or particles through space or a material medium.
        is_a: ENVO_01001852
        meaning: 'ENVO:01001023'
      ENVO_01001024:
        title: particle radiation
        description: A radiation process during which energy is transmitted or emitted
          by means of fast-moving subatomic particles.
        is_a: ENVO_01001023
        meaning: 'ENVO:01001024'
      ENVO_01001025:
        title: particle beam radiation
        description: A particle radiation process during which subatomic particles
          move in the same direction.
        is_a: ENVO_01001024
        meaning: 'ENVO:01001025'
      ENVO_01001026:
        title: electromagnetic radiation
        description: A radiation process during which waves (or their quanta, photons)
          of the electromagnetic field propagate (radiate) through space carrying
          electromagnetic energy.
        is_a: ENVO_01001023
        meaning: 'ENVO:01001026'
      ENVO_01001211:
        title: stellar radiation
        description: An electromagnetic radiation process during which electromagnetic
          waves or their quanta are emitted from a star.
        is_a: ENVO_01001026
        meaning: 'ENVO:01001211'
      ENVO_01001212:
        title: microwave stellar radiation
        description: A stellar radiation process during which electromagnetic waves
          or their quanta are emitted from a star at wavelengths and frequencies which
          travel exclusively in a line-of-sight fashion and which may produce molecular
          rotation and torsion on contact with matter.
        is_a: ENVO_01001211
        meaning: 'ENVO:01001212'
      ENVO_01001213:
        title: radio wave stellar radiation
        description: A stellar radiation process during which electromagnetic waves
          or their quanta are emitted from a star at wavelengths ranging from millimetre
          to kilometer scales.
        is_a: ENVO_01001211
        meaning: 'ENVO:01001213'
      ENVO_01001214:
        title: infrared stellar radiation
        description: A stellar radiation process during which electromagnetic waves
          or their quanta are emitted from a star when molecules change their rotational-vibrational
          movements, usually at wavelengths between 760 nm and 1 mm.
        is_a: ENVO_01001211
        meaning: 'ENVO:01001214'
      ENVO_01001215:
        title: visible spectrum stellar radiation
        description: A stellar radiation process during which electromagnetic waves
          or their quanta are emitted from a star at wavelengths between 380 nm and
          760 nm.
        is_a: ENVO_01001211
        meaning: 'ENVO:01001215'
      ENVO_01001216:
        title: ultraviolet stellar radiation
        description: A stellar radiation process during which electromagnetic waves
          or their quanta are emitted from a star at wavelengths between 10 nm and
          400 nm.
        is_a: ENVO_01001211
        meaning: 'ENVO:01001216'
      ENVO_01001219:
        title: ionizing stellar radiation
        description: A stellar radiation process during which electromagnetic waves
          or their quanta are emitted from a star with sufficient energy to disrupt
          molecular bonds or alter the electron number of atoms.
        is_a: ENVO_01001211
        meaning: 'ENVO:01001219'
      ENVO_01001217:
        title: X-ray stellar radiation
        description: A stellar radiation process during which penetrating electromagnetic
          radiation is emitted by high-energy electrons as they fall into a lower
          state of energy.
        is_a: ENVO_01001219
        meaning: 'ENVO:01001217'
      ENVO_01001218:
        title: gamma-ray stellar radiation
        description: A stellar radiation process during which penetrating electromagnetic
          radiation is emitted from the radioactive decay (gamma decay) of atomic
          nuclei.
        is_a: ENVO_01001219
        meaning: 'ENVO:01001218'
      ENVO_01001501:
        title: radiation from a manufactured product
        description: An electromagnetic radiation process during which electromagnetic
          waves or their quanta are emitted from a manufactured product.
        is_a: ENVO_01001026
        meaning: 'ENVO:01001501'
      ENVO_01001502:
        title: visible spectrum radiation from a manufactured product
        description: Radiation from a manufactured product during which light between
          the wavelenghts of 380 nm and 760 nm is emitted.
        is_a: ENVO_01001501
        meaning: 'ENVO:01001502'
      ENVO_01001861:
        title: shortwave radiation
        description: An electromagnetic radiation process during which radiant energy
          with wavelengths in the visible, near-ultraviolet, or near-infrared spectra
          is realised.
        is_a: ENVO_01001026
        meaning: 'ENVO:01001861'
      ENVO_01001864:
        title: photosynthetically active radiation
        description: Electromagnetic radidation which involves radiant energy in a
          spectral range (wave band) between 400 to 700 nanometers, that photosynthetic
          organisms are able to use in the process of photosynthesis.
        is_a: ENVO_01001026
        meaning: 'ENVO:01001864'
      ENVO_21001212:
        title: microwave radiation
        description: A radiation process during which electromagnetic waves or their
          quanta are emitted at wavelengths and frequencies which travel exclusively
          in a line-of-sight fashion and which may produce molecular rotation and
          torsion on contact with matter.
        is_a: ENVO_01001026
        meaning: 'ENVO:21001212'
      ENVO_21001213:
        title: radio wave radiation
        description: A radiation process during which electromagnetic waves or their
          quanta are emitted at wavelengths ranging from millimetre to kilometer scales.
        is_a: ENVO_01001026
        meaning: 'ENVO:21001213'
      ENVO_21001214:
        title: infrared radiation
        description: A radiation process during which electromagnetic waves or their
          quanta are emitted when molecules change their rotational-vibrational movements,
          usually at wavelengths between 760 nm and 1 mm.
        is_a: ENVO_01001026
        meaning: 'ENVO:21001214'
      ENVO_01001857:
        title: outgoing longwave radiation
        description: "An infrared radiation process which 1) transmits radiant energy\
          \ has wavelengths between 3.0 and 100 \u03BCm, 2) is emitted from a planet\
          \ and its atmosphere out to space in the form of thermal radiation."
        is_a: ENVO_21001214
        meaning: 'ENVO:01001857'
      ENVO_03500013:
        title: mid-infrared radiation
        description: An infrared radiation during which waves with frequencies between
          30 THz and 120 THz and with wavelengths between 10 micrometers and 2.5 micrometers
          are emitted by a source.
        is_a: ENVO_21001214
        meaning: 'ENVO:03500013'
      ENVO_03500014:
        title: near-infrared radiation
        description: An infrared radiation during which waves with frequencies between
          120 THz and 400 THz and with wavelengths between 2.5 micrometers and 750
          nanometers are emitted by a source.
        is_a: ENVO_21001214
        meaning: 'ENVO:03500014'
      ENVO_03500015:
        title: far-infrared radiation
        description: An infrared radiation which consists of waves with frequencies
          between 300 GHz and 30 THz and with wavelengths between 1 mm and 10 micrometers
          are emitted by a source.
        is_a: ENVO_21001214
        meaning: 'ENVO:03500015'
      ENVO_21001215:
        title: visible spectrum radiation
        description: A radiation process during which electromagnetic waves or their
          quanta are emitted at wavelengths between 380 nm and 760 nm.
        is_a: ENVO_01001026
        meaning: 'ENVO:21001215'
      ENVO_21001216:
        title: ultraviolet radiation
        description: A radiation process during which electromagnetic waves or their
          quanta are emitted at wavelengths between 10 nm and 400 nm.
        is_a: ENVO_01001026
        meaning: 'ENVO:21001216'
      ENVO_21001219:
        title: ionizing radiation
        description: A radiation process during which electromagnetic waves or their
          quanta are emitted with sufficient energy to disrupt molecular bonds or
          alter the electron number of atoms.
        is_a: ENVO_01001026
        meaning: 'ENVO:21001219'
      ENVO_21001217:
        title: X-ray radiation
        description: A radiation process during which penetrating electromagnetic
          radiation is emitted by high-energy electrons as they fall into a lower
          state of energy.
        is_a: ENVO_21001219
        meaning: 'ENVO:21001217'
      ENVO_21001218:
        title: gamma-ray radiation
        description: A radiation process during which penetrating electromagnetic
          radiation is emitted from the radioactive decay (gamma decay) of atomic
          nuclei.
        is_a: ENVO_21001219
        meaning: 'ENVO:21001218'
      ENVO_01001027:
        title: acoustic radiation
        description: A radiation process during which mechanical waves generated by
          oscillations radiate through an environmental material.
        is_a: ENVO_01001023
        meaning: 'ENVO:01001027'
      ENVO_01001566:
        title: infrasound
        description: Sound which is lower in frequency than 20 Hertz, or cycles per
          second.
        is_a: ENVO_01001027
        meaning: 'ENVO:01001566'
      ENVO_03500012:
        title: ultrasound radiation
        description: An acoustic radiation process during which waves that transmit
          sound energy at frequencies above 20 kHz are emitted by a source.
        is_a: ENVO_01001027
        meaning: 'ENVO:03500012'
      ENVO_01001734:
        title: insolation process
        description: A process during which direct stellar radiation interacts with
          a planetary surface.
        is_a: ENVO_01001023
        meaning: 'ENVO:01001734'
      ENVO_01001763:
        title: impact event
        description: An impact event is a collision between material entities, resulting
          in changes in one or both of those entities.
        is_a: ENVO_01001852
        meaning: 'ENVO:01001763'
      ENVO_01001066:
        title: impact between astronomical bodies
        description: An impact event is a collision between astronomical bodies.
        is_a: ENVO_01001763
        meaning: 'ENVO:01001066'
      ENVO_01001067:
        title: meterorite impact
        description: An impact event during which a meteoroid collides with another
          astronomical body.
        is_a: ENVO_01001066
        meaning: 'ENVO:01001067'
      ENVO_01001842:
        title: momentum transfer process
        description: An environmental process during which momentum is transferred
          from one material entity to another.
        is_a: ENVO_01001852
        meaning: 'ENVO:01001842'
      ENVO_01001843:
        title: atmosphere-ocean momentum transfer process
        description: A momentum transfer process which unfolds as winds generate drag
          at the bottom of the atmosphere,coupled to dynamical forcing at the surface
          of the ocean.
        is_a: ENVO_01001842
        meaning: 'ENVO:01001843'
      ENVO_01003014:
        title: irradiation
        description: An energy transfer process during which a material entity receives
          energy through radiation.
        is_a: ENVO_01001852
        meaning: 'ENVO:01003014'
      ENVO_01003015:
        title: irradiation by ionizing radiation
        description: Irradiation during which a material entity receives energy through
          ionizing radiation.
        is_a: ENVO_01003014
        meaning: 'ENVO:01003015'
      ENVO_01003016:
        title: irradiation by non-ionizing radiation
        description: Irradiation during which a material entity receives energy through
          non-ionizing radiation.
        is_a: ENVO_01003014
        meaning: 'ENVO:01003016'
      ENVO_01003017:
        title: irradiation by photosynthetically active radiation
        description: Irradiation during which a material entity receives energy through
          photosynthetically active radiation.
        is_a: ENVO_01003016
        meaning: 'ENVO:01003017'
      ENVO_01001130:
        title: gravitational motion
        description: A process during which one or more entities move along geodesics
          in a region of spacetime that has been sufficiently curved towards an entity
          with sufficient mass and/or energy.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001130'
      ENVO_01001368:
        title: secondary aerosol formation process
        description: An aerosol formation process during which solid or liquid particles
          are either 1) formed in a volume of gas through gas-to-liquid or gas-to-solid
          conversions or 2) increase in size through aggregation with other particles.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001368'
      ENVO_01001373:
        title: secondary atmospheric aerosol formation event
        description: A secondary aerosol formation process which occurs in an atmosphere
          at an increased rate relative to background processes of the same kind.
        is_a: ENVO_01001368
        meaning: 'ENVO:01001373'
      ENVO_01001493:
        title: satellite imaging of a planet
        description: A remote sensing process during which image data about a planet
          is generated by sensors mounted on a satellite.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001493'
      ENVO_01001655:
        title: glacial process
        description: An environmental process which involves glaciers or ice sheets.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001655'
      ENVO_01001723:
        title: adiabatic process
        description: An environmental process during which a system does not thermally
          interact with its surroundings by virtue of a temperature difference between
          them.
        is_a: ENVO_02500000
        meaning: 'ENVO:01001723'
      ENVO_01001724:
        title: dry-adiabatic process
        description: An adiabatic process during which no condensation of water vapor
          occurs and no liquid water is present.
        is_a: ENVO_01001723
        meaning: 'ENVO:01001724'
      ENVO_02500030:
        title: biogeochemical process
        description: A process during which chemicals that are involved in natural
          ecosystem processes are transported or transformed, and which impact the
          activity of biological entities
        is_a: ENVO_02500000
        meaning: 'ENVO:02500030'
      ENVO_02500009:
        title: biogeochemical cycling
        description: A biogeochemical process during which one or more chemical compounds
          are sequentially converted into a series of related compounds in a regularly
          repeating, periodic fashion.
        is_a: ENVO_02500030
        meaning: 'ENVO:02500009'
      ENVO_01001330:
        title: nitrogen cycling
        description: A biogeochemical cycle which has nitrogen-bearing chemical entities
          as participants.
        is_a: ENVO_02500009
        meaning: 'ENVO:01001330'
      ENVO_01001331:
        title: sulfur cycling
        description: A biogeochemical cycle which has sulfur-bearing chemical entities
          as participants.
        is_a: ENVO_02500009
        meaning: 'ENVO:01001331'
      ENVO_01001332:
        title: phosphorous cycling
        description: A biogeochemical cycle which has phosphorous-bearing chemical
          entities as participants.
        is_a: ENVO_02500009
        meaning: 'ENVO:01001332'
      ENVO_02500010:
        title: carbon cycling
        description: A biogeochemical cycle which has carbon-bearing chemical entities
          as participants.
        is_a: ENVO_02500009
        meaning: 'ENVO:02500010'
      ENVO_2000046:
        title: oxygen cycling
        description: A biogeochemical cycle which has oxygen as participant.
        is_a: ENVO_02500009
        meaning: 'ENVO:2000046'
      ENVO_02500036:
        title: environmental pollution
        description: An environmental system process that results in the introduction
          of contaminants into an environment.
        is_a: ENVO_02500000
        meaning: 'ENVO:02500036'
      ENVO_01001265:
        title: thermal pollution
        description: An environmental pollution process during which the temperature
          of an environmental system, or parts thereof, is raised above its natural
          levels.
        is_a: ENVO_02500036
        meaning: 'ENVO:01001265'
      ENVO_01001633:
        title: agricultural pollution
        description: An environmental pollution process during which contaminants
          derived from agricultural activity are released into an environmental system.
        is_a: ENVO_02500036
        meaning: 'ENVO:01001633'
      ENVO_02500037:
        title: air pollution
        description: A pollution process during which particulates or other contaminants
          are released into a portion of air.
        is_a: ENVO_02500036
        meaning: 'ENVO:02500037'
      ENVO_02500038:
        title: soil pollution
        description: A pollution process during which contaminants are released into
          soil.
        is_a: ENVO_02500036
        meaning: 'ENVO:02500038'
      ENVO_02500039:
        title: water pollution
        description: A pollution process during which contaminants are released into
          water.
        is_a: ENVO_02500036
        meaning: 'ENVO:02500039'
      ENVO_02500040:
        title: plastic pollution
        description: A pollution process during which plastic contaminants are released
          into an environmental material.
        is_a: ENVO_02500036
        meaning: 'ENVO:02500040'
      ENVO_02500044:
        title: urban pollution
        description: A pollution process that results in increased levels of pollutants
          in an urban environment.
        is_a: ENVO_02500036
        meaning: 'ENVO:02500044'
      ENVO_03000095:
        title: season generating process
        description: "A process during which the intesity of stellar radiation received\
          \ by a planet's surface varies in a cyclical regime due to the planet's\
          \ orbital motion around the barycentre of a planetary system and/or the\
          \ tilt of its rotational axis relative to its orbital plane."
        is_a: ENVO_02500000
        meaning: 'ENVO:03000095'
      ENVO_03510003:
        title: famine
        description: An environmental system process during which populations have
          reduced access to food, causing increased hunger, malnutrition, and consequent
          mortality.
        is_a: ENVO_02500000
        meaning: 'ENVO:03510003'
      ENVO_06105027:
        title: fragmentation process
        description: An environmental system process during which a material entity
          breaks into pieces or parts.
        is_a: ENVO_02500000
        meaning: 'ENVO:06105027'
      ENVO_06105028:
        title: fragmentation due to weathering
        description: A fragmentation process which is caused by weathering.
        is_a: ENVO_06105027
        meaning: 'ENVO:06105028'
      ENVO_06105120:
        title: entanglement process
        description: An environmental system process during which material entities
          become entrapped, wrapped, twisted, entwined, or otherwise caught in one
          another.
        is_a: ENVO_02500000
        meaning: 'ENVO:06105120'
      ENVO_06105121:
        title: entanglement of organisms in marine debris
        description: An entanglement process during which organisms become entrapped
          in anthropogenic marine debris.
        is_a: ENVO_06105120
        meaning: 'ENVO:06105121'
      ENVO_1000748:
        title: island formation process
        description: A process which results in the formation of an island.
        is_a: ENVO_02500000
        meaning: 'ENVO:1000748'
      OBI_0000011:
        title: planned process
        description: A process that realizes a plan which is the concretization of
          a plan specification.
        is_a: BFO_0000015
        meaning: 'OBI:0000011'
      ENVO_01001492:
        title: satellite imaging
        description: A remote sensing process during which image data about an astronomical
          body or object is generated by sensors mounted on a satellite.
        is_a: OBI_0000011
        meaning: 'ENVO:01001492'
      ENVO_02000007:
        title: tissue culture
        description: Tissue culture is the culture of cells, tissues or organs in
          a nutrient medium under sterile conditions.
        is_a: OBI_0000011
        meaning: 'ENVO:02000007'
      ENVO_01001815:
        title: cell culturing
        description: Cell culturing is the aseptic maintainance and growth of collections
          of cells  outside of an organisms or natural environment in a suitable culture
          medium.
        is_a: ENVO_02000007
        meaning: 'ENVO:01001815'
      ENVO_02000009:
        title: plant tissue culture
        description: Plant tissue culture is the growth or maintenance of plant cells,
          tissues, organs or whole plants in vitro.
        is_a: ENVO_02000007
        meaning: 'ENVO:02000009'
      ENVO_02000010:
        title: organ culture
        description: Organ culture is the aseptic culture of complete living organs
          of animals and plants outside the body in a suitable culture medium. Animal
          organs must be small enough to allow the nutrients in the culture medium
          to penetrate all the cells.
        is_a: ENVO_02000007
        meaning: 'ENVO:02000010'
      ENVO_02000146:
        title: chemical engineering process
        description: A planned process which has the intention of producing, consuming,
          or transforming materials via the execution of chemical reactions.
        is_a: OBI_0000011
        meaning: 'ENVO:02000146'
      ENVO_02000147:
        title: refinement process
        description: A planned material transformation process which takes as input
          a material and removes impurities.
        is_a: ENVO_02000146
        meaning: 'ENVO:02000147'
      ENVO_02000148:
        title: Haber-Bosch process
        description: A chemical engineering process that produces ammonia en masse
          via artificial nitrogen fixation.
        is_a: ENVO_02000146
        meaning: 'ENVO:02000148'
      ENVO_02000149:
        title: hydrogen production process
        description: A chemical engineering process which generates hydrogen gas.
        is_a: ENVO_02000146
        meaning: 'ENVO:02000149'
      ENVO_02500026:
        title: anthropogenic modulatory intervention process
        description: A process during which humans apply technology to alter the magnitude,
          duration, rate, or impact of an environmental process.
        is_a: OBI_0000011
        meaning: 'ENVO:02500026'
      ENVO_01001210:
        title: defence against flooding
        description: A planned process during which an environmental system is modified
          to mitigate or nullify the impacts of flooding.
        is_a: ENVO_02500026
        meaning: 'ENVO:01001210'
      ENVO_02500042:
        title: pollution control
        description: A planned process during which the amount of pollutants released
          into an environmental system is regulated.
        is_a: ENVO_02500026
        meaning: 'ENVO:02500042'
      ENVO_02500041:
        title: environmental monitoring
        description: An process in which environmental parameters and variables are
          continually assayed.
        is_a: OBI_0000011
        meaning: 'ENVO:02500041'
      ENVO_02500043:
        title: pollution monitoring
        description: A monitoring process that assays the level of environmental pollutants
          to determine the presence of effect of environmental pollution.
        is_a: ENVO_02500041
        meaning: 'ENVO:02500043'
      ENVO_06105267:
        title: soil profile characterization
        description: A planned process during which a soil profile is examined and
          the soil horizons that compose it are described.
        is_a: OBI_0000011
        meaning: 'ENVO:06105267'
      PO_0009012:
        title: plant structure development stage
        description: A stage in the life of a plant structure (PO:0009011) during
          which the plant structure undergoes developmental processes.
        is_a: BFO_0000015
        meaning: 'PO:0009012'
      PO_0007033:
        title: whole plant development stage
        description: A plant structure development stage (PO:0009012) that has as
          primary participant a whole plant (PO:0000003).
        is_a: PO_0009012
        meaning: 'PO:0007033'
      PO_0028002:
        title: sporophyte development stage
        description: A whole plant development stage (PO:0007033) that has as primary
          participant a whole plant (PO:0000003) during the interval between fertilization
          (or apogamy) and death.
        is_a: PO_0007033
        meaning: 'PO:0028002'
      PO_0025337:
        title: life of whole plant stage
        description: A maximal whole plant development stage.
        is_a: PO_0007033
        meaning: 'PO:0025337'
      BFO_0000008:
        title: temporal region
        is_a: BFO_0000003
        meaning: 'BFO:0000008'
      BFO_0000038:
        title: one-dimensional temporal region
        is_a: BFO_0000008
        meaning: 'BFO:0000038'
      ENVO_01001641:
        title: glaciation
        description: An interval of time within an ice age and during which temperatures
          fall resulting in planet-wide glacier advances.
        is_a: BFO_0000038
        meaning: 'ENVO:01001641'
      ENVO_01001642:
        title: interglacial
        description: An interval of time within an ice age and during which temperatures
          rise and result in planet-wide glacier retreat.
        is_a: BFO_0000038
        meaning: 'ENVO:01001642'
      ENVO_01001643:
        title: ice age
        description: "A temporal interval during which a planet's surface and atmospheric\
          \ temperatures fall, resulting in the presence or expansion of continental\
          \ and polar ice sheets or alpine glaciers."
        is_a: BFO_0000038
        meaning: 'ENVO:01001643'
      ENVO_01003005:
        title: day
        description: A one-dimensional temporal region which spans the duration an
          astronomical body completes one rotation on its axis.
        is_a: BFO_0000038
        meaning: 'ENVO:01003005'
      ENVO_01003006:
        title: rainy day
        description: A day during which water-based rainfall occurs.
        is_a: ENVO_01003005
        meaning: 'ENVO:01003006'
      ENVO_03000096:
        title: season
        description: A one-dimensional temporal region which is delimited by the occurrence
          of processes which serve as its delimiters.
        is_a: BFO_0000038
        meaning: 'ENVO:03000096'
      ENVO_03000097:
        title: warm season
        description: A season during which the average temperature of a planetary
          part exceeds that of all other seasons it endures during a season generating
          process.
        is_a: ENVO_03000096
        meaning: 'ENVO:03000097'
      ENVO_03000098:
        title: cold season
        description: A season during which the average temperature of a planetary
          part is below that of all other seasons it endures during a season generating
          process.
        is_a: ENVO_03000096
        meaning: 'ENVO:03000098'
      ENVO_03000129:
        title: monsoon season
        description: A season during which changes in atmospheric circulation associated
          with the asymmetric heating of land and sea cause moisture to be brought
          inland by monsoon winds, leading to increased rainfall as moisture-laden
          air rises  and cools over land.
        is_a: ENVO_03000096
        meaning: 'ENVO:03000129'
      ENVO_09200037:
        title: hours of sunshine
        description: A one-dimensional temporal region during which an entity is exposed
          to stellar radiation.
        is_a: BFO_0000038
        meaning: 'ENVO:09200037'
      BFO_0000011:
        title: spatiotemporal region
        is_a: BFO_0000003
        meaning: 'BFO:0000011'
      BFO_0000035:
        title: process boundary
        description: 'p is a process boundary =Def. p is a temporal part of a process
          & p has no proper temporal parts. (axiom label in BFO2 Reference: [084-001])'
        is_a: BFO_0000003
        meaning: 'BFO:0000035'
