        title: multi-species collection of organisms
        description: A collection of organisms that consists of two or more organisms
          from at least two species.
        is_a: PCO_0000000
        meaning: 'PCO:0000029'
      PCO_0000002:
        title: ecological community
        description: A multi-species collection of organisms of at least two different
          species, living in a particular area. Must have at least two populations
          of different species as members.
        is_a: PCO_0000029
        meaning: 'PCO:0000002'
      PCO_1000004:
        title: microbial community
        description: "An ecological community which is composed of co-existing populations\
          \ of microbial organisms that interact, directly or indirectly, such that\
          \ they impact one another's ecological fitness."
        is_a: PCO_0000002
        meaning: 'PCO:1000004'
      PCO_0000051:
        title: multi-species collection of microbes
        description: A multi-species collection of organisms that consists of two
          or more microbes from at least two species.
        is_a: PCO_0000029
        meaning: 'PCO:0000051'
