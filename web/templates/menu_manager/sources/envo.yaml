      CHEBI_59999:
        title: chemical substance
        description: A chemical substance is a portion of matter of constant composition,
          composed of molecular entities of the same type or of different types.
        is_a: CHEBI_24431
        meaning: 'CHEBI:59999'
      CHEBI_60004:
        title: mixture
        description: A mixture is a chemical substance composed of multiple molecules,
          at least two of which are of a different kind.
        is_a: CHEBI_59999
