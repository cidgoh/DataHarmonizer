      CHEBI_78295:
        title: food component
        description: A physiological role played by any substance that is distributed
          in foodstuffs. It includes materials derived from plants or animals, such
          as vitamins or minerals, as well as environmental contaminants.
        is_a: CHEBI_52211
        meaning: 'CHEBI:78295'
      CHEBI_33284:
        title: nutrient
        description: A nutrient is a food component that an organism uses to survive
          and grow.
