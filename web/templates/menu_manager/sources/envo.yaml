      RO_0002577:
        title: system
        description: A material entity consisting of multiple components that are
          causally integrated.
        is_a: BFO_0000040
        meaning: 'RO:0002577'
      ENVO_01000254:
        title: environmental system
        description: A system which has the disposition to environ one or more material
          entities.
        is_a: RO_0002577
        meaning: 'ENVO:01000254'
      ENVO_01001110:
        title: ecosystem
        description: An environmental system which includes both living and non-living
          components.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001110'
      ENVO_01001209:
        title: wetland ecosystem
        description: A terrestrial ecosystem which is inundated or saturated by surface
          or ground water at a frequency and duration sufficient to support, and that
          under normal circumstances does support, a prevalence of vegetation typically
          adapted for life in saturated soil conditions.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001209'
      ENVO_00000035:
        title: marsh
        description: A wetland ecosystem which includes communities of grasses, rushes,
          reeds, typhas, sedges, and other herbaceous plants (possibly with low-growing
          woody plants).
        is_a: ENVO_01001209
        meaning: 'ENVO:00000035'
      ENVO_00000053:
        title: freshwater marsh
        description: A marsh in which soils are saturated with water that contains
          low concentrations of salts.
        is_a: ENVO_00000035
        meaning: 'ENVO:00000053'
      ENVO_00000054:
        title: saline marsh
        description: A marsh whose water contains a considerable quantity of dissolved
          salts.
        is_a: ENVO_00000035
        meaning: 'ENVO:00000054'
      ENVO_00000230:
        title: coastal wetland ecosystem
        description: A wetland ecosystem which overlaps both terrestrial and marine
          ecosystems.
        is_a: ENVO_01001209
        meaning: 'ENVO:00000230'
      ENVO_00000057:
        title: mangrove swamp
        description: A swamp which is located in tropical or subtropical environments
          and is determined by communities of trees and shrubs growing saline coastal
          environments.
        is_a: ENVO_00000230
        meaning: 'ENVO:00000057'
      ENVO_00000192:
        title: mudflat
        description: A wetland that forms when mud is deposited by the tides, rivers,
          sea or oceans.
        is_a: ENVO_00000230
        meaning: 'ENVO:00000192'
      ENVO_00000241:
        title: tidal mudflat
        description: A level tract lying at a small depth below the surface of water,
          or alternately covered and left bare by the tide.
        is_a: ENVO_00000192
        meaning: 'ENVO:00000241'
      ENVO_00000242:
        title: lacustrine mudflat
        description: A wetland that forms when mud is deposited by a stream.
        is_a: ENVO_00000192
        meaning: 'ENVO:00000242'
      ENVO_01001468:
        title: intertidal ecosystem
        description: An ecosystem which overlaps those areas of the foreshore and
          seabed that are exposed to the air at low tide and submerged at high tide.
        is_a: ENVO_00000230
        meaning: 'ENVO:01001468'
      ENVO_00000044:
        title: peatland
        description: A wetland ecosystem which accumulates acidic peat, a deposit
          of dead plant material.
        is_a: ENVO_01001209
        meaning: 'ENVO:00000044'
      ENVO_00000185:
        title: raised mire
        description: Rain-fed, potentially deep peatlands occurring principally in
          lowland areas across much of Northern Europe, as well as in the former USSR,
          North America and parts of the southern hemisphere.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000185'
      ENVO_00000186:
        title: string mire
        description: Flat or concave peatlands with a string-like pattern of hummocks
          (hence the name), found principally in northern Scandinavia but occurring
          in the western parts of the former USSR and in North America. A few examples
          exist in northern Britain.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000186'
      ENVO_00000187:
        title: tundra mire
        description: Peatlands with a shallow peat layer, only about 500 mm thick,
          dominated by sedges and grasses. They form in permafrost areas, covering
          around 110,000 to 160,000 km2 in Alaska, Canada, and the former USSR.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000187'
      ENVO_00000188:
        title: palsa mire
        description: Peatland typified by characteristic high mounds, each with a
          permanently frozen core, with wet depressions between the mounds.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000188'
      ENVO_00000189:
        title: peat swamp
        description: Forested peatlands including both rain- and groundwater-fed types,
          commonly recorded in tropical regions with high rainfall.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000189'
      ENVO_00000232:
        title: fen
        description: A freshwater peat land with chemically basic (which roughly means
          alkaline) ground water.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000232'
      ENVO_00000235:
        title: carr
        description: A fen which has developed to the point where it supports trees.
        is_a: ENVO_00000232
        meaning: 'ENVO:00000235'
      ENVO_00000511:
        title: blanket bog
        description: A peatland whose development is mostly independent of basins
          or topographical features where water collects; it simply covers the landscape
          like a blanket. Peat develops due to a continuous supply of water from rainfall,
          maintaining waterlogged conditions on the ground. Blanket bogs are ombrotrophic
          or rain fed, and as a result their pH lies between 3.5 and 4.2.
        is_a: ENVO_00000044
        meaning: 'ENVO:00000511'
      ENVO_00002268:
        title: sphagnum bog
        description: A peatland dominated by species of the Bryophyte Sphagnum.
        is_a: ENVO_00000044
        meaning: 'ENVO:00002268'
      ENVO_00000243:
        title: freshwater wetland ecosystem
        description: A wetland which is inundated with water that contains low concentrations
          of salts.
        is_a: ENVO_01001209
        meaning: 'ENVO:00000243'
      ENVO_00000231:
        title: moor
        description: A wetland found in upland areas, characterised by acidic soils.
        is_a: ENVO_00000243
        meaning: 'ENVO:00000231'
      ENVO_00000236:
        title: dambo
        description: A class of complex shallow wetlands in central, southern and
          eastern Africa, particularly in Zambia and Zimbabwe. They are generally
          found in higher rainfall flat plateau areas, and have river-like branching
          forms which may be nowhere very large, but common enough to add up to a
          large area.
        is_a: ENVO_00000243
        meaning: 'ENVO:00000236'
      ENVO_00000237:
        title: hydromorphic/phreatic dambo
        description: A danbo associated with a headwater.
        is_a: ENVO_00000236
        meaning: 'ENVO:00000237'
      ENVO_00000238:
        title: fluvial dambo
        description: A dambo associated with a river.
        is_a: ENVO_00000236
        meaning: 'ENVO:00000238'
      ENVO_00000239:
        title: pocasin
        description: A palustrine wetland with deep, acidic, sandy, peat soils. Groundwater
          saturates the soil except during brief seasonal dry spells and during prolonged
          droughts. Pocosin soils are nutrient deficient (oligotrophic), especially
          in phosphorus.
        is_a: ENVO_00000243
        meaning: 'ENVO:00000239'
      ENVO_00000233:
        title: swamp ecosystem
        description: A wetland ecosystem in which land mass is permanently inundated
          by shallow bodies of water, generally with a substantial number of hummocks,
          or dry-land protrusions.
        is_a: ENVO_01001209
        meaning: 'ENVO:00000233'
      ENVO_01000327:
        title: strand swamp
        description: A strand swamp is a swamp that forms linear drainage channels
          on flatlands.
        is_a: ENVO_00000233
        meaning: 'ENVO:01000327'
      ENVO_01000330:
        title: cypress strand swamp
        description: A cypress strand swamp is a strand swamp which has a plant community
          dominated by Cupressaceae, often swamp cypresses. Swamp cypresses typically
          belong to the genus Taxodium or the species Glyptostrobus pensilis and Actinostrobus
          pyramidalis.
        is_a: ENVO_01000327
        meaning: 'ENVO:01000330'
      ENVO_01000328:
        title: dome swamp
        description: A dome swamp is a swamp which occurs in a depression where deeper
          waters at the centre of the swamp allow  trees to grow taller relative to
          those in shallower regions of the depression. This creates a dome-like shape.
        is_a: ENVO_00000233
        meaning: 'ENVO:01000328'
      ENVO_01000329:
        title: cypress dome
        description: A cypress dome swamp is a dome swamp which has a plant community
          dominated by Cupressaceae, often swamp cypresses. Swamp cypresses typically
          belong to the genus Taxodium or the species Glyptostrobus pensilis and Actinostrobus
          pyramidalis.
        is_a: ENVO_01000328
        meaning: 'ENVO:01000329'
      ENVO_01000331:
        title: cypress swamp
        description: A cypress swamp is a swamp which has a plant community dominated
          by Cupressaceae, often swamp cypresses. Swamp cypresses typically belong
          to the genus Taxodium or the species Glyptostrobus pensilis and Actinostrobus
          pyramidalis.
        is_a: ENVO_00000233
        meaning: 'ENVO:01000331'
      ENVO_00000240:
        title: saline wetland
        description: A wetland ecosystem in which soil is saturated with saline water.
        is_a: ENVO_01001209
        meaning: 'ENVO:00000240'
      ENVO_00000389:
        title: intermittent wetland
        description: A wetland ecosystem which is sometimes inundated or saturated
          by surface or ground water sufficient to support, and that under normal
          circumstances do support, a prevalence of vegetation typically adapted for
          life in saturated soil conditions.
        is_a: ENVO_01001209
        meaning: 'ENVO:00000389'
      ENVO_01001828:
        title: anthropised ecosystem
        description: An ecosystem which is formed as a result of human activity or
          impact.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001828'
      ENVO_00000077:
        title: agricultural ecosystem
        is_a: ENVO_01001828
        meaning: 'ENVO:00000077'
      ENVO_00000078:
        title: farm
        description: An area of land which is used for the cultivation of crops or
          grazing of livestock, including any agricultural constructions therein.
        is_a: ENVO_00000077
        meaning: 'ENVO:00000078'
      ENVO_00000117:
        title: plantation
        description: An intentional planting of a crop, on a large scale, usually
          for uses other than cereal production or pasture. The term is currently
          most often used for plantings of trees and shrubs. The term tends also to
          be used for plantings maintained on economic bases other than that of subsistence
          farming.
        is_a: ENVO_00000078
        meaning: 'ENVO:00000117'
      ENVO_00000115:
        title: orchard
        description: An intentional planting of trees or shrubs maintained for food,
          typically fruit, production.
        is_a: ENVO_00000117
        meaning: 'ENVO:00000115'
      ENVO_00000116:
        title: vineyard
        description: A place where grapes are grown for making wine, raisins or table
          grapes.
        is_a: ENVO_00000117
        meaning: 'ENVO:00000116'
      ENVO_00000118:
        title: coconut plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000118'
      ENVO_00000120:
        title: oil palm plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000120'
      ENVO_00000159:
        title: sugar plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000159'
      ENVO_00000160:
        title: sisal plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000160'
      ENVO_00000161:
        title: banana plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000161'
      ENVO_00000162:
        title: tea plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000162'
      ENVO_00000163:
        title: coffee plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000163'
      ENVO_00000164:
        title: rubber plantation
        description: A plantation which is used to grow Hevea brasiliensis or other
          species from which natural latex is harvested.
        is_a: ENVO_00000117
        meaning: 'ENVO:00000164'
      ENVO_00000193:
        title: olive grove
        is_a: ENVO_00000117
        meaning: 'ENVO:00000193'
      ENVO_00000288:
        title: cotton plantation
        is_a: ENVO_00000117
        meaning: 'ENVO:00000288'
      ENVO_00000296:
        title: rice field
        description: A paddy field for the cultivation of rice.
        is_a: ENVO_00000117
        meaning: 'ENVO:00000296'
      ENVO_01001207:
        title: ranch
        description: An area of land used for the herding and grazing of livestock.
        is_a: ENVO_00000078
        meaning: 'ENVO:01001207'
      ENVO_03501120:
        title: dairy farm
        description: A farm which produces milk or products derived from milk.
        is_a: ENVO_00000078
        meaning: 'ENVO:03501120'
      ENVO_03600044:
        title: organic farm
        description: A farm which is managed using practices certified to be organic
          by a competent authority.
        is_a: ENVO_00000078
        meaning: 'ENVO:03600044'
      ENVO_00000266:
        title: pasture
        description: A grassland ecosystem which is used for grazing of ungulate livestock
          as part of a farm or ranch.
        is_a: ENVO_00000077
        meaning: 'ENVO:00000266'
      ENVO_00000294:
        title: fish farm
        description: A facility in which fish are raised commercially in tanks or
          enclosures, usually for food.
        is_a: ENVO_00000077
        meaning: 'ENVO:00000294'
      ENVO_00000519:
        title: agricultural terrace
        description: A terrace which is used for agricultural activities.
        is_a: ENVO_00000077
        meaning: 'ENVO:00000519'
      ENVO_01000576:
        title: apiary
        description: An apiary is a place where beehives of honey bees are kept and
          maintained by beekeepers.
        is_a: ENVO_00000077
        meaning: 'ENVO:01000576'
      ENVO_01000627:
        title: feedlot
        description: A feedlot is a plot of land on which livestock are fattened for
          market
        is_a: ENVO_00000077
        meaning: 'ENVO:01000627'
      ENVO_01000626:
        title: drylot
        description: A drylot is an enclosure of limited size usually bare of vegetation
          and used for fattening livestock.
        is_a: ENVO_01000627
        meaning: 'ENVO:01000626'
      ENVO_01001114:
        title: feed storage space
        description: A physical space, which may or may not be in a construction,
          which is used to store animal feed for agricultural purposes.
        is_a: ENVO_00000077
        meaning: 'ENVO:01001114'
      ENVO_01001115:
        title: manure storage space
        description: A physical space, which may or may not be in a construction,
          which is used to store animal manure for agricultural purposes.
        is_a: ENVO_00000077
        meaning: 'ENVO:01001115'
      ENVO_03600074:
        title: aquaculture farm
        description: An agricultural aquatic ecosystem in which fish, crustaceans,
          mollusks, aquatic plants and algae are cultivated.
        is_a: ENVO_00000077
        meaning: 'ENVO:03600074'
      ENVO_01000219:
        title: anthropogenic terrestrial biome
        description: An anthropogenic terrestrial biome is a terrestrial biome which
          has community structures determined by human activity.
        is_a: ENVO_01001828
        meaning: 'ENVO:01000219'
      ENVO_01000245:
        title: cropland biome
        description: A cropland ecosystem which is undergoing climactic ecological
          succession.
        is_a: ENVO_01000219
        meaning: 'ENVO:01000245'
      ENVO_01000247:
        title: rangeland biome
        description: A rangeland biome is an anthropogenic terrestrial biome which
          is primarily used for the rearing and grazing of livestock.
        is_a: ENVO_01000219
        meaning: 'ENVO:01000247'
      ENVO_01001244:
        title: cropland ecosystem
        description: An ecosystem which 1) is determined by communities of annual
          crops, perennial woody crops, or by actively tilled land, 2) is primarily
          used for agricultural activity, and 3) contains no village or larger human
          settlement.
        is_a: ENVO_01001828
        meaning: 'ENVO:01001244'
      ENVO_01001829:
        title: human settlement
        description: An anthropised ecosystem which is determined by the presence
          of humans and their constructions.
        is_a: ENVO_01001828
        meaning: 'ENVO:01001829'
      ENVO_01000658:
        title: dense settlement
        description: A settlement with a high density of buildings and inhabitants.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000658'
      ENVO_00000856:
        title: city
        description: Incorporated populated place.
        is_a: ENVO_01000658
        meaning: 'ENVO:00000856'
      ENVO_01000248:
        title: dense settlement biome
        description: A dense settlement biome is an anthropogenic terrestrial biome
          which is primarily used for human habitation, recreation, and industry within
          built structures with little other land use.
        is_a: ENVO_01000658
        meaning: 'ENVO:01000248'
      ENVO_01000249:
        title: urban biome
        description: An urban biome is a dense settlement biome which has been urbanised.
        is_a: ENVO_01000248
        meaning: 'ENVO:01000249'
      ENVO_01000653:
        title: slum
        description: 'A slum is a heavily populated urban informal settlement with
          substandard housing in which households lack any one of the following: access
          to improved water, access to improved sanitation, sufficient-living area,
          durability of housing, or security of tenure.'
        is_a: ENVO_01000658
        meaning: 'ENVO:01000653'
      ENVO_01000773:
        title: village
        description: A village is a clustered human settlement or community, larger
          than a hamlet but smaller than a town, with a population ranging from a
          few hundred to a few thousand. Though often located in rural areas, the
          term urban village is also applied to certain urban neighbourhoods. Villages
          are normally permanent, with fixed dwellings; however, transient villages
          can occur. Further, the dwellings of a village are fairly close to one another,
          not scattered broadly over the landscape, as a dispersed settlement.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000773'
      ENVO_01000246:
        title: village biome
        description: A village biome is an anthropogenic terrestrial biome which contains
          settlements such as villages, towns, and/or small cities and which is primarily
          used for agricultural activity.
        is_a: ENVO_01000773
        meaning: 'ENVO:01000246'
      ENVO_01000762:
        title: sparsely populated settlement
        description: A settlement with a low density of buildings and inhabitants.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000762'
      ENVO_01000763:
        title: rural settlement
        description: A settlement which has lower population density than a town,
          city, or other urban environment and is primarily used for agricultural
          or pastoral activity.
        is_a: ENVO_01000762
        meaning: 'ENVO:01000763'
      ENVO_01000764:
        title: formal settlement
        description: A settlement which has been established and is managed through
          officially sanctioned processes and is recognised as legal by a competent
          authority.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000764'
      ENVO_01000765:
        title: informal settlement
        description: A settlement which is not associated with or directed by official
          planning processes and which typically lacks municipal services and infrastructure
          such as sanitation, water services, and waste management services.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000765'
      ENVO_01000784:
        title: illegal informal settlement
        description: A populated place where groups of housing units have been constructed
          on land that the occupants have no legal claim to, or occupy illegally,
          or where dwellings are not in compliance with current planning and building
          regulations.
        is_a: ENVO_01000765
        meaning: 'ENVO:01000784'
      ENVO_01000766:
        title: legal settlement
        description: A settlement on land that the inhabitants have a legal claim
          to.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000766'
      ENVO_01000767:
        title: illegal settlement
        description: A settlement on land that the inhabitants have no legal claim
          to or occupy illegally.
        is_a: ENVO_01001829
        meaning: 'ENVO:01000767'
      ENVO_00000428:
        title: biome
        description: A biome is an ecosystem which is undergoing climactic ecological
          succession.
        is_a: ENVO_01001110
        meaning: 'ENVO:00000428'
      ENVO_00000446:
        title: terrestrial biome
        description: A biome which is  primarily or completely situated on a landmass.
        is_a: ENVO_00000428
        meaning: 'ENVO:00000446'
      ENVO_01000180:
        title: tundra biome
        description: A tundra ecosystem which is undergoing climactic ecological succession.
        is_a: ENVO_00000446
        meaning: 'ENVO:01000180'
      ENVO_01001505:
        title: alpine tundra biome
        description: A tundra biome which exists at high altitudes and where vegetation
          - dominated by a few species of dwarf shrubs, a few grasses, sedges, lichens,
          and mosses - is stunted due to low temperatures and high winds.
        is_a: ENVO_01000180
        meaning: 'ENVO:01001505'
      ENVO_01000174:
        title: forest biome
        description: A forest ecosystem which is undergoing climactic ecological succession.
        is_a: ENVO_00000446
        meaning: 'ENVO:01000174'
      ENVO_01000196:
        title: coniferous forest biome
        description: A coniferous forest biome is a forest biome which contains densely
          packed populations or communities of coniferous trees, strongly limiting
          light penetration to the forest floor.
        is_a: ENVO_01000174
        meaning: 'ENVO:01000196'
      ENVO_01000209:
        title: subtropical coniferous forest biome
        description: A coniferous forest biome which is subject to subtropical climate
          patterns.
        is_a: ENVO_01000196
        meaning: 'ENVO:01000209'
      ENVO_01000210:
        title: tropical coniferous forest biome
        description: A coniferous forest biome which is subject to tropical climate
          patterns.
        is_a: ENVO_01000196
        meaning: 'ENVO:01000210'
      ENVO_01000211:
        title: temperate coniferous forest biome
        description: A coniferous forest biome which is subject to temperate climate
          patterns.
        is_a: ENVO_01000196
        meaning: 'ENVO:01000211'
      ENVO_01000250:
        title: subpolar coniferous forest biome
        description: A  coniferous forest biome which includes communities adapted
          to subpolar conditions.
        is_a: ENVO_01000196
        meaning: 'ENVO:01000250'
      ENVO_01000197:
        title: broadleaf forest biome
        description: A broadleaf forest ecosystem which is undergoing climactic ecological
          succession.
        is_a: ENVO_01000174
        meaning: 'ENVO:01000197'
      ENVO_01000200:
        title: tropical broadleaf forest biome
        description: A tropical broadleaf forest in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_01000197
        meaning: 'ENVO:01000200'
      ENVO_01000227:
        title: tropical dry broadleaf forest biome
        description: A tropical dry broadleaf forest in which dominant ecological
          communities have reached their climax successional state.
        is_a: ENVO_01000200
        meaning: 'ENVO:01000227'
      ENVO_01000228:
        title: tropical moist broadleaf forest biome
        description: A tropical moist broadleaf forest in which dominant ecological
          communities have reached their climax successional state.
        is_a: ENVO_01000200
        meaning: 'ENVO:01000228'
      ENVO_01000201:
        title: subtropical broadleaf forest biome
        description: A subtropical broadleaf forest in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_01000197
        meaning: 'ENVO:01000201'
      ENVO_01000225:
        title: subtropical dry broadleaf forest biome
        description: A subtropical dry broadleaf forest in which dominant ecological
          communities have reached their climax successional state.
        is_a: ENVO_01000201
        meaning: 'ENVO:01000225'
      ENVO_01000226:
        title: subtropical moist broadleaf forest biome
        description: A subtropical moist broadleaf forest in which dominant ecological
          communities have reached their climax successional state.
        is_a: ENVO_01000201
        meaning: 'ENVO:01000226'
      ENVO_01000202:
        title: temperate broadleaf forest biome
        description: A broadleaf forest which is subject to temperate climate patterns.
        is_a: ENVO_01000197
        meaning: 'ENVO:01000202'
      ENVO_01000198:
        title: mixed forest biome
        description: A mixed forest in which dominant ecological communities have
          reached their climax successional state.
        is_a: ENVO_01000174
        meaning: 'ENVO:01000198'
      ENVO_01000212:
        title: temperate mixed forest biome
        description: A temperate mixed forest in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_01000198
        meaning: 'ENVO:01000212'
      ENVO_01001798:
        title: tropical mixed forest biome
        description: A tropical mixed forest in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_01000198
        meaning: 'ENVO:01001798'
      ENVO_01000199:
        title: mediterranean forest biome
        description: A mediterranean forest in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_01000174
        meaning: 'ENVO:01000199'
      ENVO_01000175:
        title: woodland biome
        description: A woodland biome is a terrestrial biome which includes, across
          its entire spatial extent, woody plants spaced sufficiently far apart to
          allow light penetration to support communities of herbaceous plants or shrubs
          living closer to the woodland floor.
        is_a: ENVO_00000446
        meaning: 'ENVO:01000175'
      ENVO_01000178:
        title: savanna biome
        description: A woodland biome which has seasonal water availability and includes
          trees spaced sufficiently far apart to allow an unbroken layer of grass,
          sedge (Cyperaceae) or  rush (Juncaceae) communities to live.
        is_a: ENVO_01000175
        meaning: 'ENVO:01000178'
      ENVO_01000187:
        title: subtropical savanna biome
        description: A savanna biome which is subject to subtropical climate patterns.
        is_a: ENVO_01000178
        meaning: 'ENVO:01000187'
      ENVO_01000229:
        title: mediterranean savanna biome
        description: A savanna biome which is subject to mediterranean climate patterns.
        is_a: ENVO_01000187
        meaning: 'ENVO:01000229'
      ENVO_01000188:
        title: tropical savanna biome
        description: A savanna biome which is subject to tropical climate patterns.
        is_a: ENVO_01000178
        meaning: 'ENVO:01000188'
      ENVO_01000189:
        title: temperate savanna biome
        description: A savanna biome which is subject to temperate climate patterns.
        is_a: ENVO_01000178
        meaning: 'ENVO:01000189'
      ENVO_01000190:
        title: flooded savanna biome
        description: A flooded savanna biome is a savanna biome which has very wet
          to saturated soil moisture content.
        is_a: ENVO_01000178
        meaning: 'ENVO:01000190'
      ENVO_01000223:
        title: montane savanna biome
        description: A montane savanna biome is a savanna biome which occurs in regions
          elevated above sea level and which has community structure determined by
          elevation-dependent environmental conditions.
        is_a: ENVO_01000178
        meaning: 'ENVO:01000223'
      ENVO_01000222:
        title: subtropical woodland biome
        description: A woodland biome which is subject to subtropical climate patterns.
        is_a: ENVO_01000175
        meaning: 'ENVO:01000222'
      ENVO_01000208:
        title: mediterranean woodland biome
        description: A subtropical woodland biome which includes communities adapted
          to hot to warm, dry summers, mild to cold, rainy winters, and the influence
          of large, usually marine, bodies of water.
        is_a: ENVO_01000222
        meaning: 'ENVO:01000208'
      ENVO_01000220:
        title: tropical woodland biome
        description: A woodland biome which is subject to tropical climate patterns.
        is_a: ENVO_01000175
        meaning: 'ENVO:01000220'
      ENVO_01000221:
        title: temperate woodland biome
        description: A woodland biome which is subject to temperate climate patterns.
        is_a: ENVO_01000175
        meaning: 'ENVO:01000221'
      ENVO_01000176:
        title: shrubland biome
        description: A shrubland biome is a terrestrial biome which includes, across
          its entire spatial extent, dense groups of shrubs.
        is_a: ENVO_00000446
        meaning: 'ENVO:01000176'
      ENVO_01000213:
        title: subtropical shrubland biome
        description: A shrubland biome which is subject to subtropical climate patterns.
        is_a: ENVO_01000176
        meaning: 'ENVO:01000213'
      ENVO_01000217:
        title: mediterranean shrubland biome
        description: A mediterranean shrubland biome is a subtropical shrubland biome
          which includes communities adapted to hot to warm, dry summers, mild to
          cold, rainy winters, and the influence of large, usually marine, bodies
          of water.
        is_a: ENVO_01000213
        meaning: 'ENVO:01000217'
      ENVO_01000214:
        title: tropical shrubland biome
        description: A shrubland biome which is subject to tropical climate patterns.
        is_a: ENVO_01000176
        meaning: 'ENVO:01000214'
      ENVO_01000215:
        title: temperate shrubland biome
        description: A shrubland biome which is subject to temperate climate patterns.
        is_a: ENVO_01000176
        meaning: 'ENVO:01000215'
      ENVO_01000216:
        title: montane shrubland biome
        description: A montane shrubland biome is a shrubland biome which occurs in
          regions elevated above sea level and which has community structure determined
          by elevation-dependent environmental conditions.
        is_a: ENVO_01000176
        meaning: 'ENVO:01000216'
      ENVO_01000218:
        title: xeric shrubland biome
        is_a: ENVO_01000176
        meaning: 'ENVO:01000218'
      ENVO_01001369:
        title: tidal mangrove shrubland
        description: A shrubland biome which is densely vegetated by dwarf or short
          mangroves (and associates) that are generally less than 6 meters in height,
          is tidally influenced,  is located in tropical or subtropical areas.
        is_a: ENVO_01000176
        meaning: 'ENVO:01001369'
      ENVO_01000177:
        title: grassland biome
        description: A grassland ecosystem in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_00000446
        meaning: 'ENVO:01000177'
      ENVO_01000191:
        title: subtropical grassland biome
        description: A subtropical grassland in which dominant ecological communities
          have reached their climax successional state.
        is_a: ENVO_01000177
        meaning: 'ENVO:01000191'
      ENVO_01000224:
        title: mediterranean grassland biome
        description: A subtropical grassland biome which includes communities adapted
          to hot to warm, dry summers, mild to cold, rainy winters, and the influence
          of large, usually marine, bodies of water.
        is_a: ENVO_01000191
        meaning: 'ENVO:01000224'
      ENVO_01000192:
        title: tropical grassland biome
        is_a: ENVO_01000177
        meaning: 'ENVO:01000192'
      ENVO_01000193:
        title: temperate grassland biome
        is_a: ENVO_01000177
        meaning: 'ENVO:01000193'
      ENVO_01000194:
        title: montane grassland biome
        description: A montane grassland biome is a grassland biome which occurs in
          regions elevated above sea level and which has community structure determined
          by elevation-dependent environmental conditions.
        is_a: ENVO_01000177
        meaning: 'ENVO:01000194'
      ENVO_01000195:
        title: flooded grassland biome
        is_a: ENVO_01000177
        meaning: 'ENVO:01000195'
      ENVO_01000181:
        title: mangrove biome
        description: A mangrove biome is a terrestrial biome which includes, across
          its spatial extent, mangrove plants (Rhizophoraceae). Mangrove plants are
          able to withstand high levels of salinity as well as regions of anoxia and
          frequent tidal inundation. Mangrove biomes often occur near tropical and
          sub-tropical estuaries and depositional marine coastal environments where
          fine sediments (often with high organic content) collect in areas protected
          from high energy wave action.
        is_a: ENVO_00000446
        meaning: 'ENVO:01000181'
      ENVO_00002030:
        title: aquatic biome
        description: A biome which is determined by a water body and which has ecological
          climax communities adapted to life in or on water.
        is_a: ENVO_00000428
        meaning: 'ENVO:00002030'
      ENVO_00000447:
        title: marine biome
        description: An aquatic biome which is determined by a marine water body.
        is_a: ENVO_00002030
        meaning: 'ENVO:00000447'
      ENVO_01000047:
        title: mediterranean sea biome
        description: The mediterranean sea biome comprises mostly enclosed seas that
          have limited exchange of deep water with outer oceans and where the water
          circulation is dominated by salinity and temperature differences rather
          than winds.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000047'
      ENVO_01000004:
        title: concentration basin mediterranean sea biome
        description: The concentration basin mediterranean sea biome comprises expressions
          of the mediterranean sea biome that have higher salinity than bordering
          oceans due to evaporation. Water exchange consists of inflow of the fresher
          oceanic water in the upper layer and outflow of the saltier mediterranean
          water in the lower layer of the connecting channel.
        is_a: ENVO_01000047
        meaning: 'ENVO:01000004'
      ENVO_01000128:
        title: dilution basin mediterranean sea biome
        description: The dilution basin mediterranean sea biome comprises expressions
          of the mediterranean sea biome with lower salinity than the surrounding
          ocean due to freshwater gains such as rainfall and rivers. Water exchange
          consists of outflow of the fresher mediterranean water in the upper layer
          and inflow of the saltier oceanic water in the lower layer of the channel.
          Renewal of deep water may not be sufficient to supply oxygen to the bottom.
        is_a: ENVO_01000047
        meaning: 'ENVO:01000128'
      ENVO_01000857:
        title: temperate mediterranean sea biome
        description: A mediterranean sea biome which is subject to temperate climate
          patterns.
        is_a: ENVO_01000047
        meaning: 'ENVO:01000857'
      ENVO_01000020:
        title: estuarine biome
        description: Expressions of the estuarine biome occur at wide lower courses
          of a rivers where they flow into a sea. Estuaries experience tidal flows
          and their water is a changing mixture of fresh and salt.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000020'
      ENVO_01000022:
        title: marine salt marsh biome
        description: 'The marine salt marsh biome comprises marshes that are transitional
          intertidals between land and salty or brackish marine water (e.g.: sloughs,
          bays, estuaries). It is dominated by halophytic (salt tolerant) herbaceous
          plants. The daily tidal surges bring in nutrients, which tend to settle
          in roots of the plants within the salt marsh. The natural chemical activity
          of salty (or brackish) water and the tendency of algae to bloom in the shallow
          unshaded water also allow for great biodiversity.'
        is_a: ENVO_00000447
        meaning: 'ENVO:01000022'
      ENVO_01000023:
        title: marine pelagic biome
        description: The marine pelagic biome (pelagic meaning open sea) is that of
          the marine water column, from the surface to the greatest depths.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000023'
      ENVO_01000032:
        title: neritic pelagic zone biome
        description: The neritic epipelagic zone biome comprises the marine water
          column above a continental shelf.
        is_a: ENVO_01000023
        meaning: 'ENVO:01000032'
      ENVO_01000041:
        title: neritic sea surface microlayer biome
        description: The neritic sea surface microlayer (SML) biome comprises the
          top 1000 micrometers of marine surface waters occurring above a continental
          shelf. It is the boundary layer where all exchange occurs between the atmosphere
          and the ocean. The chemical, physical, and biological properties of the
          SML differ greatly from the sub-surface water just a few centimeters beneath.
        is_a: ENVO_01000032
        meaning: 'ENVO:01000041'
      ENVO_01000042:
        title: neritic epipelagic zone biome
        description: The neritic epipelagic zone biome comprises the marine water
          column that occurs above a continental shelf and extends from the surface
          of the ocean to a depth of ca. 200-250m. Throughout the zone the light field
          tends to be asymmetrical vertically, so that the direction and elevation
          of the sun can still be detected. The epipelagic zone encompasses the euphotic
          zone and, where and when it occurs, the seasonal thermocline.
        is_a: ENVO_01000032
        meaning: 'ENVO:01000042'
      ENVO_01000043:
        title: neritic mesopelagic zone biome
        description: The neritic mesopelagic zone biome comprises the marine column
          that occurs above a continental shelf and extends from approximately 200
          to 1000 m depth - the maximal depth of light penetration in all but the
          clearest oligotrophic ocean regions. In comparison to the epipelagic zone,
          dominant forms of pelagic organisms do not change very much; however, there
          are marked changes in species composition and the proportion of smaller-sized
          individuals decreases.
        is_a: ENVO_01000032
        meaning: 'ENVO:01000043'
      ENVO_01000033:
        title: oceanic pelagic zone biome
        description: The oceanic epipelagic zone biome comprises the marine water
          column offshore, beyond a continental shelf.
        is_a: ENVO_01000023
        meaning: 'ENVO:01000033'
      ENVO_01000034:
        title: oceanic sea surface microlayer biome
        description: The oceanic sea surface microlayer (SML) biome comprises the
          top 1000 micrometers of the marine surface waters occurring offshore, away
          from a continental shelf. It is the boundary layer where all exchange occurs
          between the atmosphere and the ocean. The chemical, physical, and biological
          properties of the SML differ greatly from the sub-surface water just a few
          centimeters beneath.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000034'
      ENVO_01000035:
        title: oceanic epipelagic zone biome
        description: The oceanic epipelagic zone biome comprises regions of the marine
          water column that occur offshore, beyond a continental shelf. This biome
          extends from the surface of the ocean to a depth of ca. 200-250m. Throughout
          the zone the light field tends to be asymmetrical vertically, so that the
          direction and elevation of the sun can still be detected. The oceanic epipelagic
          zone biome encompasses the euphotic zone and, where and when it occurs,
          the seasonal thermocline.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000035'
      ENVO_01000036:
        title: oceanic mesopelagic zone biome
        description: The oceanic mesopelagic zone biome comprises regions of the marine
          water column that occur offshore, beyond a continental shelf. This biome
          extends through the water column from approximately 200-1000 m depth - the
          maximal depth of light penetration in all but the clearest oligotrophic
          ocean regions. In comparison to the epipelagic zone, dominant forms of pelagic
          organisms do not change very much; however, there are marked changes in
          species composition and the proportion of smaller-sized individuals decreases.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000036'
      ENVO_01000037:
        title: oceanic bathypelagic zone biome
        description: The bathypelagic zone biome comprises the marine water column
          below approximately 1000 m water depth - the maximum depth to which detectable
          daylight penetrates in all but the clearest oligotrophic waters - and extends
          to about 2500 - 2700 m water depth. In the temperate Atlantic, the beginning
          of the bathypelagic zone biome approximates to the deep oxygen minimum and
          the base of the permanent thermocline.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000037'
      ENVO_01000038:
        title: oceanic abyssopelagic zone biome
        description: The abyssopelagic zone biome comprises the marine water column
          below the bathypelagic zone biome at approximately 2500 -2700 m and extends
          either to the hadal pelagic zone biome (at approximately 6000 m) or to the
          benthopelagic zone biome within ca. 100 m of the seafloor. The depth of
          2700 m may be critical for physiological reasons as the change in hydrostatic
          pressure across this depth may preclude organism migration.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000038'
      ENVO_01000039:
        title: oceanic hadal pelagic zone biome
        description: The oceanic hadal pelagic zone biome comprises the water column
          in oceanic trenches occurring at depths between 6000m and 10,000m.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000039'
      ENVO_01000040:
        title: oceanic benthopelagic zone biome
        description: The benthopelagic zone biome comprises regions of the marine
          water column which usually coincide with the benthic boundary layer (BBL)
          - the layer of isothermal and isohaline water contiguous to the sea floor.
          A general reversal in the declining gradient of pelagic biomass may be observed
          here, perhaps explained by viable nutrition on the sea floor being resuspended
          by bottom currents. This zone typically extends 100 m above the seafloor,
          but may reach upto1000 m during benthic storms.
        is_a: ENVO_01000033
        meaning: 'ENVO:01000040'
      ENVO_01000024:
        title: marine benthic biome
        description: "The marine benthic biome (benthic meaning 'bottom') encompasses\
          \ the seafloor and includes such areas as shores, littoral or intertidal\
          \ areas, marine coral reefs, and the deep seabed."
        is_a: ENVO_00000447
        meaning: 'ENVO:01000024'
      ENVO_01000025:
        title: marine neritic benthic zone biome
        description: The marine neritic zone biome comprises sea floor from the high
          tide mark to a continental shelf break. This zone generally extends to 200
          m below average sea level.
        is_a: ENVO_01000024
        meaning: 'ENVO:01000025'
      ENVO_01000026:
        title: marine bathyal zone biome
        description: The marine bathyal zone biome comprises regions of the marine
          benthic biome between approximately 200 m and 3000 m depth. This zone generally
          coincides with the continental slope.
        is_a: ENVO_01000024
        meaning: 'ENVO:01000026'
      ENVO_01000027:
        title: marine abyssal zone biome
        description: The marine abyssal zone biome comprises regions of the marine
          benthic biome  between approximately 2500 m and 6000 m depth. This zone
          generally coincides with the continental rise and the abyssal plain.
        is_a: ENVO_01000024
        meaning: 'ENVO:01000027'
      ENVO_01000028:
        title: marine hadal zone biome
        description: The marine hadal zone biome describes sea floor deeper than 6000
          m such as that of the oceanic trenches.
        is_a: ENVO_01000024
        meaning: 'ENVO:01000028'
      ENVO_01000029:
        title: marine reef biome
        description: A biome expressed by strips or ridges of rocks, sand, or coral
          that rises to or near the surface of a body of marine water.
        is_a: ENVO_01000024
        meaning: 'ENVO:01000029'
      ENVO_01000049:
        title: marine coral reef biome
        description: The marine coral reef biome comprises constructional wave-resistant
          entities which are primarily built by corals and are often cemented together.
          The growth of these structures is aided by zooxanthellae, algae that are
          symbiotic with the reef-building corals.
        is_a: ENVO_01000029
        meaning: 'ENVO:01000049'
      ENVO_01000854:
        title: tropical marine coral reef biome
        description: A marine coral reef biome which is located in a region with a
          tropical climate.
        is_a: ENVO_01000049
        meaning: 'ENVO:01000854'
      ENVO_01000050:
        title: marine subtidal rocky reef biome
        description: The marine rocky subtidal reef biome comprises regions of the
          marine reef biome composed mainly of rock and which harbour abundant communities
          of algae and invertebrates. These reefs are often very patchy, with alterations
          of rocks dominated by rich invertebrate assemblages and turf-forming calcareous
          red algae.
        is_a: ENVO_01000029
        meaning: 'ENVO:01000050'
      ENVO_01000123:
        title: marine sponge reef biome
        description: The marine sponge reef biome comprises marine reefs primarily
          built by marine sponges. The primary frame-building sponges are all members
          of the order Hexactinosa. They are found only in glacier-scoured troughs
          of low-angle continental shelf. The seafloor is stable and consists of rock,
          coarse gravel, and large boulders.
        is_a: ENVO_01000029
        meaning: 'ENVO:01000123'
      ENVO_01000030:
        title: marine hydrothermal vent biome
        description: "The marine hydrothermal vent biome comprises regions of the\
          \ marine benthic biome where heat generated due to tectonic activity, either\
          \ at divergent plate boundaries or convergent ocean plates where back-arc\
          \ spreading occurs, is released or 'vented' to the surface. The resultant\
          \ high temperature water jets are laden with dissolved metals and minerals."
        is_a: ENVO_01000024
        meaning: 'ENVO:01000030'
      ENVO_01000051:
        title: marine black smoker biome
        description: A marine black smoker biome comprises regions of the marine hydrothermal
          vent biome characterised by a black vent plume. This black plume is a consequence
          of dissolved metals and minerals forming complexes with sulphide and indicates
          polymetallic sulphide mineral deposits beneath the surface.
        is_a: ENVO_01000030
        meaning: 'ENVO:01000051'
      ENVO_01000052:
        title: marine white smoker biome
        description: A marine white smoker biome comprises regions of the marine hydrothermal
          vent biome characterised by lightly hued plumes, typically containing barium,
          calcium, and silicon. These vents tend to have lower temperature plumes
          when compared to black smoker environments.
        is_a: ENVO_01000030
        meaning: 'ENVO:01000052'
      ENVO_01000053:
        title: marine ultramafic hydrothermal vent biome
        description: "A marine ultramafic hydrothermal vent biome comprises regions\
          \ of themarine  hydrothermal vent biome hosted on ultramafic (also referred\
          \ to as ultrabasic) rocks. Ultramafic rocks are igneous and meta-igneous\
          \ rocks with very low silica content (less than 45%), generally >18% MgO,\
          \ high FeO, low potassium, and are composed of usually greater than 90%\
          \ mafic minerals  (dark colored, high magnesium and iron content). The Earth's\
          \ mantle is composed of ultramafic rocks."
        is_a: ENVO_01000030
        meaning: 'ENVO:01000053'
      ENVO_01000054:
        title: marine basaltic hydrothermal vent biome
        description: A marine basaltic hydrothermal vent biome comprises regions of
          the marine hydrothermal vent biome hosted on basaltic rocks. Basalt generally
          has a composition of 45 to 55 wt % SiO2, 2 to 6 wt % total alkalis, 0.5
          to 2.0 wt % TiO2, 5 to 14 wt % FeO and 14 wt % or more Al2O3. Contents of
          CaO are commonly near 10 wt %, those of MgO commonly in the range 5 to 12
          wt %.
        is_a: ENVO_01000030
        meaning: 'ENVO:01000054'
      ENVO_01000127:
        title: marine cold seep biome
        description: A marine benthic biome which is determined by a cold seep.
        is_a: ENVO_01000024
        meaning: 'ENVO:01000127'
      ENVO_01000045:
        title: epeiric sea biome
        description: The epeiric sea (also known as an epicontinental sea) biome comprises
          a shallow seas that extend over part of a continent. Epeiric seas are usually
          associated with the marine transgressions of the geologic  past, which have
          variously been due to either global eustatic sea level changes, local tectonic
          deformation, or both, and are occasionally semi-cyclic.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000045'
      ENVO_01000046:
        title: marginal sea biome
        description: The marginal sea biome comprises parts of an ocean partially
          enclosed by land such as islands, archipelagos, or peninsulas. Unlike mediterranean
          seas, marginal seas have ocean currents caused by ocean winds. Many marginal
          seas are enclosed by island arcs that were formed from the subduction of
          one oceanic plate beneath another.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000046'
      ENVO_01000856:
        title: temperate marginal sea biome
        description: A marginal sea biome which is located in a region with a temperate
          climate.
        is_a: ENVO_01000046
        meaning: 'ENVO:01000856'
      ENVO_01001230:
        title: tropical marginal sea biome
        description: A marginal sea biome which is located in a region with a tropical
          climate.
        is_a: ENVO_01000046
        meaning: 'ENVO:01001230'
      ENVO_01000048:
        title: ocean biome
        description: A marine biome which is determined by an ocean.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000048'
      ENVO_01000858:
        title: marine upwelling biome
        description: A marine biome which contains communities adapted to living in
          an environment determined by an upwelling process.
        is_a: ENVO_00000447
        meaning: 'ENVO:01000858'
      ENVO_01000859:
        title: tropical marine upwelling biome
        description: A marine upwelling biome which is subject to tropical climate
          patterns.
        is_a: ENVO_01000858
        meaning: 'ENVO:01000859'
      ENVO_01000860:
        title: temperate marine upwelling biome
        description: A marine upwelling biome which is located in a region subject
          to temperate climate patterns.
        is_a: ENVO_01000858
        meaning: 'ENVO:01000860'
