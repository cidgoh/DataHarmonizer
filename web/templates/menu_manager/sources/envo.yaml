          or more speices of seagrass typically belonging to the families Posidoniaceae,
          Zosteraceae, Hydrocharitaceae, or Cymodoceaceae.
        is_a: ENVO_01001378
        meaning: 'ENVO:01000059'
      ENVO_01001376:
        title: marine faunal bed
        description: A marine bed which is covered by animals which have benthic habitats,
          including attached, clinging, sessile, infaunal, burrowing, laying, interstitial,
          and slow-moving animals, but not animals that have created substrate.
        is_a: ENVO_01001378
        meaning: 'ENVO:01001376'
      ENVO_01001379:
        title: mussel bed
        description: A marine faunal bed which is dominated by mussels of the Mytilus
          or Modiolus genera either 1) resting on the sediment surface, 2)  partially
          embedded in the sediment, 3) attached to conspecifics (by using their byssal
          threads), or 4) attached to a piece of gravel in slightly gravelly fine
          sediments.
        is_a: ENVO_01001376
        meaning: 'ENVO:01001379'
      ENVO_01001388:
        title: oceanic mussel bed
        description: A mussel bed which is located in benthic regions beyond (offshore
          to) a continental shelf.
        is_a: ENVO_01001379
        meaning: 'ENVO:01001388'
      ENVO_01001390:
        title: Bathymodiolus-dominated oceanic mussel bed
        description: An oceanic mussel bed which has mussel communities dominated
          by members of the genus Bathymodiolus.
        is_a: ENVO_01001388
        meaning: 'ENVO:01001390'
      ENVO_01001389:
        title: neritic mussel bed
        description: A mussel bed which is located in benthic regions that are part
          of a continental shelf.
        is_a: ENVO_01001379
        meaning: 'ENVO:01001389'
      ENVO_00000512:
        title: pond bed
        description: The ground surface that lies beneath a pond.
        is_a: ENVO_00000501
        meaning: 'ENVO:00000512'
      ENVO_00000513:
        title: reservoir bed
        description: The ground surface that lies beneath a reservoir.
        is_a: ENVO_00000501
        meaning: 'ENVO:00000513'
      ENVO_01001785:
        title: land
        description: A surface layer of an astronomical body which is primarily composed
          of solid material and is not covered by oceans or other bodies of water.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001785'
      ENVO_01001782:
        title: landmass
        description: A large continuous area of land, either surrounded by sea or
          contiguous with another landmass.
        is_a: ENVO_01001785
        meaning: 'ENVO:01001782'
      ENVO_01000635:
        title: planetary landmass
        description: A landmass which is part of a planet.
        is_a: ENVO_01001782
        meaning: 'ENVO:01000635'
      ENVO_00000098:
        title: island
        description: Area of dry or relatively dry land surrounded by water or low
          wetland.
        is_a: ENVO_01000635
        meaning: 'ENVO:00000098'
      ENVO_00000099:
        title: artificial island
        description: An island constructed by human effort.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000099'
      ENVO_00000103:
        title: mangrove island
        description: An island formed of trees and shrubs that grow in saline coastal
          habitats in the tropics and subtropics.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000103'
      ENVO_00000222:
        title: oceanic island
        description: An island that does not sit on a continental shelf, and is of
          volcanic origin.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000222'
      ENVO_00000166:
        title: atoll
        description: An oceanic island, often having a characteristic ring-like shape
          surrounding a lagoon. Atolls are formed when coral reef grows around a volcanic
          island that later subsides into the ocean.
        is_a: ENVO_00000222
        meaning: 'ENVO:00000166'
      ENVO_00000221:
        title: continental island
        description: An island that lies on a continental shelf.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000221'
      ENVO_00000269:
        title: land-tied island
        description: A continental island connected to its adjacent land by a natural
          feature, such as a causeway.
        is_a: ENVO_00000221
        meaning: 'ENVO:00000269'
      ENVO_1000749:
        title: microcontinental island
        description: An island created when a continent is rifted.
        is_a: ENVO_00000221
        meaning: 'ENVO:1000749'
      ENVO_00000368:
        title: ephemeral island
        description: An island, usually the consequence of the activity of a submarine
          volcano, that only exists for a short period or short periods of time after
          its formation, then being eroded or otherwise disappearing beneath the surface
          of a body of water.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000368'
      ENVO_00000423:
        title: river island
        description: An island that lies in a river.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000423'
      ENVO_00000424:
        title: lake island
        description: An island that lies in a lake.
        is_a: ENVO_00000098
        meaning: 'ENVO:00000424'
      ENVO_03501240:
        title: skerry
        description: An island which is small, principally composed of rock, and usually
          too small for human habitation.
        is_a: ENVO_00000098
        meaning: 'ENVO:03501240'
      ENVO_03501242:
        title: desert island
        description: An island that is not permanently populated by humans.
        is_a: ENVO_00000098
        meaning: 'ENVO:03501242'
      ENVO_03600034:
        title: cay
        description: An island which is small, low in elevation, sandy, and located
          on the surface of a coral reef.
        is_a: ENVO_00000098
        meaning: 'ENVO:03600034'
      ENVO_1000750:
        title: depositional island
        description: An island formed by deposition of solid material such as sand
          or small rocks where a water current loses some of its carrying capacity.
        is_a: ENVO_00000098
        meaning: 'ENVO:1000750'
      ENVO_1000751:
        title: barrier island
        description: An island formed by the accumulation of sand deposited by sea
          currents on a continental shelves
        is_a: ENVO_1000750
        meaning: 'ENVO:1000751'
      ENVO_03000085:
        title: thermokarst
        description: An irregular land surface which consists of marshy hollows, hummocks,
          thermokarst depressions and thermokarst lakes formed from the erosion of
          ice-rich thawing permafrost areas.
        is_a: ENVO_01000635
        meaning: 'ENVO:03000085'
      ENVO_01001177:
        title: arable land
        description: Land which is regularly manipulated by human activities, such
          as plowing or tilling, in order to grow crops.
        is_a: ENVO_01001785
        meaning: 'ENVO:01001177'
      ENVO_01001178:
        title: pasturable land
        description: Land which hosts a community of herbaceous plants - such as grasses
          and forbs - upon which animals may graze.
        is_a: ENVO_01001785
        meaning: 'ENVO:01001178'
      ENVO_01001182:
        title: tended pasturable land
        description: Pasturable land which is maintained by human activities in order
          to provide grazing oppoturnities for livestock.
        is_a: ENVO_01001178
        meaning: 'ENVO:01001182'
      ENVO_01001183:
        title: arable or pasturable land
        description: Land which either hosts plant communities upon which animals
          may graze has been manipulated by tilling, ploughing, or other human activity
          for the purposes of seed sowing or planting crops.
        is_a: ENVO_01001785
        meaning: 'ENVO:01001183'
      ENVO_01001524:
        title: frozen land
        description: Land which is below the freezing point of water.
        is_a: ENVO_01001785
        meaning: 'ENVO:01001524'
      ENVO_01001582:
        title: forest floor
        description: Land which is present within a forest biome.
        is_a: ENVO_01001785
        meaning: 'ENVO:01001582'
      ENVO_03000145:
        title: snow-covered land
        description: Land which is covered or partially covered by snow.
        is_a: ENVO_01001785
        meaning: 'ENVO:03000145'
      ENVO_03600073:
        title: contaminated land
        description: Land which has elevated levels of some contaminants or substances
          that are potentially hazardous to health or the environment.
        is_a: ENVO_01001785
        meaning: 'ENVO:03600073'
      ENVO_01000324:
        title: planetary surface
        description: A planetary surface is a surface layer where the solid or liquid
          material of a planet comes into contact with an atmosphere or outer space.
        is_a: ENVO_01001483
        meaning: 'ENVO:01000324'
      ENVO_01000636:
        title: liquid planetary surface
        is_a: ENVO_01000324
        meaning: 'ENVO:01000636'
      ENVO_01001193:
        title: water-based planetary surface
        is_a: ENVO_01000636
        meaning: 'ENVO:01001193'
      ENVO_01000486:
        title: building floor
        description: A building floor is a surface layer which is part of a building
          and used for walking.
        is_a: ENVO_01001483
        meaning: 'ENVO:01000486'
      ENVO_01000487:
        title: brick building floor
        description: A brick building floor is a building floor that is composed primarily
          of brick material or is built from bricks.
        is_a: ENVO_01000486
        meaning: 'ENVO:01000487'
      ENVO_01000488:
        title: wooden building floor
        description: A wooden building floor is a building floor that is composed
          primarily of wood.
        is_a: ENVO_01000486
        meaning: 'ENVO:01000488'
      ENVO_01000489:
        title: concrete building floor
        description: A concrete building floor is a building floor that is composed
          primarily of concrete
        is_a: ENVO_01000486
        meaning: 'ENVO:01000489'
      ENVO_01000490:
        title: sandy building floor
        description: A sandy building floor is a building floor that is composed primarily
          of sand.
        is_a: ENVO_01000486
        meaning: 'ENVO:01000490'
      ENVO_01000491:
        title: glass building floor
        description: A glass building floor is a building floor which is composed
          primarily of glass.
        is_a: ENVO_01000486
        meaning: 'ENVO:01000491'
      ENVO_01000492:
        title: dung building floor
        description: A dung building floor is a building floor which is composed primarily
          of dried animal feces.
        is_a: ENVO_01000486
        meaning: 'ENVO:01000492'
      ENVO_01000493:
        title: stone building floor
        description: A stone building floor is a building floor that is composed primarily
          of rock.
        is_a: ENVO_01000486
        meaning: 'ENVO:01000493'
      ENVO_01001783:
        title: liquid surface of an astronomical body
        description: A surface of an astronomical body which is part of a water body
          present on that body.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001783'
      ENVO_01000812:
        title: desert pavement
        description: A desert surface covered with closely packed, interlocking angular
          or rounded rock fragments of pebble and cobble size.
        is_a: ENVO_01001483
        meaning: 'ENVO:01000812'
      ENVO_01000862:
        title: turbulent aquatic surface layer
        description: A turbulent surface layer of a water body maintained by strong
          currents setting over submerged ridges or shoals or by winds opposing a
          current.
        is_a: ENVO_01001483
        meaning: 'ENVO:01000862'
      ENVO_01000910:
        title: soil biocrust
        description: "A biocrust which is formed by photosynthetic microbial assemblages\
          \ colonising the surface layer of a portion of arid soil. Through their\
          \ successional dynamics, these communities reduce the soil surface's albedo,\
          \ impart it with stability against erosion, modify its hydrology, and promote\
          \ its fertility."
        is_a: ENVO_01001483
        meaning: 'ENVO:01000910'
      ENVO_04000010:
        title: soil surface layer
        description: A surface layer which is composed primarily of soil.
        is_a: ENVO_01001483
        meaning: 'ENVO:04000010'
      ENVO_04000011:
        title: bare soil surface layer
        description: A soil surface which is exposed to the troposphere, with no appreciable
          cover from vegetation or other material.
        is_a: ENVO_04000010
        meaning: 'ENVO:04000011'
      ENVO_01001302:
        title: estuarine coastal surface layer
        description: A layer of estuarine water which extends a few centimeters from
          the surface of the water column towards the estuary bed and from the shore
          to a fiat boundary where the estuary bed below the water column reaches
          a depth of 4 meters.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001302'
      ENVO_01001317:
        title: estuarine tidal riverine coastal surface layer
        description: A layer of fresh estuarine water which extends a few centimeters
          from the surface of the water column towards the estuary bed and from the
          land-water interface to a fiat boundary where the estuary bed below the
          water column reaches a depth of 4 meters.
        is_a: ENVO_01001302
        meaning: 'ENVO:01001317'
      ENVO_01001312:
        title: estuarine coastal upper water column
        description: A layer of estuarine water which extends from the surface of
          the water column to the pycnocline or mid-depth and from the shore to a
          fiat boundary where the estuary bed below the water column reaches a depth
          of 4 meters.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001312'
      ENVO_01001318:
        title: estuarine tidal riverine coastal upper water column
        description: A layer of fresh estuarine water which extends from the surface
          of the water column to the pycnocline or mid-depth and from the land-water
          interface to a fiat boundary where the estuary bed below the water column
          reaches a depth of 4 meters.
        is_a: ENVO_01001312
        meaning: 'ENVO:01001318'
      ENVO_01001315:
        title: estuarine open water surface layer
        description: A layer of estuarine water which extends a few centimeters from
          the surface of the water column towards the estuary bed and from a fiat
          boundary where the estuary bed below the water column reaches a depth of
          4 meters until the end of the estuary most distal from the coast.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001315'
      ENVO_01001326:
        title: estuarine tidal riverine open water surface layer
        description: A layer of fresh, tidal estuarine water which extends a few centimeters
          from the surface of the water column towards the estuary bed and from a
          fiat boundary where the estuary bed below the water column reaches a depth
          of 4 meters until the end of the estuary most distal from the coast.
        is_a: ENVO_01001315
        meaning: 'ENVO:01001326'
      ENVO_01001316:
        title: estuarine open water upper water column
        description: A layer of estuarine water which extends from the surface of
          the water column to the pycnocline or mid-depth and from a fiat boundary
          where the estuary bed below the water column reaches a depth of 4 meters
          until the end of the estuary most distal from the coast.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001316'
      ENVO_01001327:
        title: estuarine tidal riverine open water upper water column
        description: A layer of fresh, tidal estuarine water which extends from the
          surface of the water column to the pycnocline or mid-depth and from a fiat
          boundary where the estuary bed below the water column reaches a depth of
          4 meters until the end of the estuary most distal from the coast.
        is_a: ENVO_01001316
        meaning: 'ENVO:01001327'
      ENVO_01001543:
        title: water ice surface layer
        description: An ice surface layer which is primarily composed of water ice.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001543'
      ENVO_01001554:
        title: surface layer of a water body
        description: A water surface that is part of a water body.
        is_a: ENVO_01001483
        meaning: 'ENVO:01001554'
      ENVO_01001581:
        title: sea surface layer
        description: A surface layer which is part of an ocean or sea.
        is_a: ENVO_01001554
        meaning: 'ENVO:01001581'
      ENVO_00000484:
        title: polynya
        description: A sea surface layer which is 1) not covered by ice and 2) laterally
          surrounded by either pack ice or land and pack ice.
        is_a: ENVO_01001581
        meaning: 'ENVO:00000484'
      ENVO_01001551:
        title: ice lead
        description: A surface layer of a water body which has been formed as the
          result of surface ice fracturing and moving apart.
        is_a: ENVO_01001554
        meaning: 'ENVO:01001551'
      ENVO_01001550:
        title: sea-ice lead
        description: An ice lead which occurs in a marine water body and is bounded
          by sea ice.
        is_a: ENVO_01001551
        meaning: 'ENVO:01001550'
      ENVO_01001552:
        title: flaw lead
        description: An ice lead between a mass of fast ice and a mass of pack ice.
        is_a: ENVO_01001551
        meaning: 'ENVO:01001552'
      ENVO_01001553:
        title: shore lead
        description: An ice lead which occurs between the shore and pack ice.
        is_a: ENVO_01001551
        meaning: 'ENVO:01001553'
      ENVO_01001555:
        title: frozen lead
        description: An ice lead within which new, nilas, and young ice has formed.
        is_a: ENVO_01001551
        meaning: 'ENVO:01001555'
      ENVO_06105201:
        title: water table
        description: A surface layer which is 1) part of a phreatic zone in contact
          with a vadose zone and 2) contains interstitial water with a pressure head
          equal to atmospheric pressure.
        is_a: ENVO_01001483
        meaning: 'ENVO:06105201'
      ENVO_01000352:
        title: field
        description: An unbroken expanse (as of ice)
        is_a: ENVO_01000813
        meaning: 'ENVO:01000352'
      ENVO_00000478:
        title: range of mounts
        description: A field which includes at least two mounts connected by high
          ground and arranged in an approximately linear fashion.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000478'
      ENVO_00000080:
        title: mountain range
        description: A range of mounts which is dominated by mountains.
        is_a: ENVO_00000478
        meaning: 'ENVO:00000080'
      ENVO_00000550:
        title: range of seamounts
        description: A mountain range which is submerged under a marine water body.
        is_a: ENVO_00000080
        meaning: 'ENVO:00000550'
      ENVO_00000406:
        title: mid-ocean ridge
        description: An underwater mountain range, formed by plate tectonics. This
          uplifting of the ocean floor occurs when convection currents rise in the
          mantle beneath the oceanic crust and create magma where two tectonic plates
          meet at a divergent boundary. The mid-ocean ridges of the world are connected
          and form a single global mid-oceanic ridge system that is part of every
          ocean.
        is_a: ENVO_00000550
        meaning: 'ENVO:00000406'
      ENVO_00000082:
        title: hill range
        description: A range of mounts which is dominated by hills.
        is_a: ENVO_00000478
        meaning: 'ENVO:00000082'
      ENVO_00000431:
        title: drumlin field
        description: A cluster of dozens to hundreds of similarly shaped, sized and
          oriented drumlins.
        is_a: ENVO_00000082
        meaning: 'ENVO:00000431'
      ENVO_00000114:
        title: agricultural field
        description: A field which is located on land and used for agricultural purposes,
          such as the grazing of livestock or the cultivation of crops.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000114'
      ENVO_00000297:
        title: paddy field
        description: A flooded parcel of arable land used for growing rice and other
          semiaquatic crops.
        is_a: ENVO_00000114
        meaning: 'ENVO:00000297'
      ENVO_01000348:
        title: maize field
        description: A field  used for the cultivation of corn or related crop plants.
        is_a: ENVO_00000114
        meaning: 'ENVO:01000348'
      ENVO_00000146:
        title: snow field
        description: A region of permanent snow in mountainous areas or high latitudes.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000146'
      ENVO_00000257:
        title: flood fringe
        description: Area of a flood plane covered by the flood, but which does not
          experience a strong current.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000257'
      ENVO_00000299:
        title: ice field
        description: A field of ice, formed in regions of perennial frost.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000299'
      ENVO_01001531:
        title: sea ice field
        description: An ice field which is primarily composoed of sea ice floes greater
          than 10 kilometers across.
        is_a: ENVO_00000299
        meaning: 'ENVO:01001531'
      ENVO_01001532:
        title: glacier ice field
        description: An ice field which is constituted by a continuous accumulation
          of snow and glacier ice that completely fills a mountain basin or covers
          a low-relief mountain plateau.
        is_a: ENVO_00000299
        meaning: 'ENVO:01001532'
      ENVO_01001851:
        title: geothermally active field
        description: A field in which geothermal processes occur.
        is_a: ENVO_01000352
        meaning: 'ENVO:01001851'
      ENVO_00000354:
        title: volcanic field
        description: A geothermal field which is prone to localized volcanic activity.
        is_a: ENVO_01001851
        meaning: 'ENVO:00000354'
      ENVO_00000355:
        title: monogenetic volcanic field
        description: A volcanic field of small, scattered volcanic vents. These volcanic
          fields, containing numerous monogenetic volcanoes, are noted for having
          only one short eruptive event. Monogenetic fields occur only where the magma
          supply to the volcano is low or where vents are not close enough or large
          enough to develop plumbing systems for continuous feeding of magma.
        is_a: ENVO_00000354
        meaning: 'ENVO:00000355'
      ENVO_00000462:
        title: polygenetic volcanic field
        description: A volcanic field of scattered volcanic vents. These volcanic
          fields, containing numerous polygenetic volcanoes, are noted for having
          more than one eruptive event from the same vent(s), rather than the more
          common monogenetic volcanic field. Polygenetic volcanic fields generally
          occur where there is a high-level magma chamber. These volcanic fields may
          show lithological discontinuities due to major changes in magma chemistry,
          volcanotectonic events, or long erosional intervals, and may last >10 million
          year period.
        is_a: ENVO_00000354
        meaning: 'ENVO:00000462'
      ENVO_01001854:
        title: hydrothermal field
        description: A geothermally active field within which geothermally heated
          aqueous fluids are discharged from the the surface of a rocky planet.
        is_a: ENVO_01001851
        meaning: 'ENVO:01001854'
      ENVO_00000444:
        title: woodland clearing
        description: A tract of land which has few or no trees and is surrounded by
          more heavily wooded areas.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000444'
      ENVO_03000132:
        title: firebreak
        description: A woodland clearing which is large enough to starve land fires
          of fuel, impeding their progress through wooded areas.
        is_a: ENVO_00000444
        meaning: 'ENVO:03000132'
      ENVO_00000548:
        title: gravel field
        description: A field which is composed primarily of gravel.
        is_a: ENVO_01000352
        meaning: 'ENVO:00000548'
      ENVO_01000353:
        title: marine mesoscale eddy field
        description: A mesoscale eddy field is an expanse of marine water which includes
          coherent vortices, as well as a rich cascade of other structures such as
          filaments, squirts and spirals and is characterized by temperature and salinity
          anomalies with associated flow anomalies that are nearly in geostrophic
          balance. Although only the surface expression of mesoscale eddies is visible
          in satellite images of sea surface height or temperature, they are in fact
          three dimensional structures that reach down into the pycnocline.
        is_a: ENVO_01000352
        meaning: 'ENVO:01000353'
      ENVO_01000437:
        title: lava field
        description: A lava field is an expanse of flat-lying lava flows. Such features
          are generally composed of highly fluid basalt lava, and can extend for tens
          or even hundreds of miles across the underlying terrain.
        is_a: ENVO_01000352
        meaning: 'ENVO:01000437'
      ENVO_02000003:
        title: pockmark field
        description: A pockmark field is an undersea feature formed by shallow seabed
          depressions, typically several tens of metres across and a few metres deep.
          Generally, they are formed in soft, fine-grained seabed sediments by the
          escape of fluids (gas or water, but mainly methane) into the water column.
        is_a: ENVO_01000352
        meaning: 'ENVO:02000003'
      ENVO_00001998:
        title: soil
        description: An environmental material which is primarily composed of minerals,
          varying proportions of sand, silt, and clay, organic material such as humus,
          interstitial gases, liquids, and a broad range of resident micro- and macroorganisms.
        is_a: ENVO_01000813
        meaning: 'ENVO:00001998'
      ENVO_00002871:
        title: alluvial soil
        description: Soil which has been eroded and influenced by flowing water and
          redeposited in a non-marine setting.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002871'
      ENVO_00005758:
        title: alluvial swamp soil
        description: A portion of alluvial soil which is part of a swamp ecosystem.
        is_a: ENVO_00002871
        meaning: 'ENVO:00005758'
      ENVO_00005759:
        title: alluvial paddy field soil
        description: Alluvial soil whichi is part of a paddy field.
        is_a: ENVO_00002871
        meaning: 'ENVO:00005759'
      ENVO_00003082:
        title: enriched soil
        description: A portion of enriched soil is a portion of soil with elevated
          levels of some material entity.
        is_a: ENVO_00001998
        meaning: 'ENVO:00003082'
      ENVO_00002116:
        title: contaminated soil
        description: A portion of contaminated soil is a portion of soil with elevated
          levels of some contaminant.
        is_a: ENVO_00003082
        meaning: 'ENVO:00002116'
      ENVO_00002117:
        title: creosote contaminated soil
        description: Soil which has elevated concentrations of creosote.
        is_a: ENVO_00002116
        meaning: 'ENVO:00002117'
      ENVO_00003081:
        title: metal contaminated soil
        description: Soil which has elevated concentrations of metals.
        is_a: ENVO_00002116
        meaning: 'ENVO:00003081'
      ENVO_00002145:
        title: chromate contaminated soil
        description: Soil which has elevated concentrations of chromate.
        is_a: ENVO_00003081
        meaning: 'ENVO:00002145'
      ENVO_00002146:
        title: xylene contaminated soil
        description: Soil which has elevated concentrations of xylene.
        is_a: ENVO_00002116
        meaning: 'ENVO:00002146'
      ENVO_00002875:
        title: oil contaminated soil
        description: Soil which has elevated concentrations of oil.
        is_a: ENVO_00002116
        meaning: 'ENVO:00002875'
      ENVO_00005775:
        title: salt contaminated soil
        description: Soil which has elevated concentrations of sodium chloride.
        is_a: ENVO_00002116
        meaning: 'ENVO:00005775'
      ENVO_00003083:
        title: sarcosine enriched soil
        description: A portion of sarcosine enriched soil is a portion of soil with
