          \ or interstices."
        is_a: PATO_0000973
        meaning: 'PATO:0000985'
      ENVO_09200009:
        title: structure of soil
        description: The structure of some soil.
        is_a: PATO_0000141
        meaning: 'ENVO:09200009'
      ENVO_09200008:
        title: composition of soil
        description: The composition of some soil.
        is_a: ENVO_09200009
        meaning: 'ENVO:09200008'
      PATO_0000025:
        title: composition
        description: "A single physical entity inhering in an bearer by virtue of\
          \ the bearer's quantities or relative ratios of subparts."
        is_a: PATO_0000141
        meaning: 'PATO:0000025'
      PATO_0001759:
        title: granular
        description: "A composition quality inhering in a bearer by virtue of the\
          \ bearer's containing granules."
        is_a: PATO_0000025
        meaning: 'PATO:0001759'
      ENVO_09200017:
        title: composition of water
        description: The composition of some water.
        is_a: PATO_0000025
        meaning: 'ENVO:09200017'
      PATO_0001447:
        title: calcified
        description: "A composition quality inhering in an bearer by virtue of the\
          \ bearer's being encrusted or impregnated with calcium carbonate (CHEBI:3311)."
        is_a: PATO_0000025
        meaning: 'PATO:0001447'
      PATO_0000642:
        title: fused with
        description: "A structural quality inhering in a bearer by virtue of the bearer's\
          \ being merged with another entity."
        is_a: PATO_0000141
        meaning: 'PATO:0000642'
      PATO_0000970:
        title: permeability
        description: "A structural quality inhering in a bearer by virtue of the bearer's\
          \ disposition to being permeated or pervaded by a gas or liquid (as by osmosis\
          \ or diffusion)."
        is_a: PATO_0000141
        meaning: 'PATO:0000970'
      PATO_0000983:
        title: impermeable
        description: "A permeability quality inhering in a bearer by virtue of the\
          \ bearer's being incapable of being permeated or pervaded by a gas or liquid\
          \ (as by osmosis or diffusion)."
        is_a: PATO_0000970
        meaning: 'PATO:0000983'
      PATO_0000982:
        title: permeable
        description: "A permeability quality inhering in a bearer by virtue of the\
          \ bearer's being capable to be permeated or pervaded by a gas or liquid\
          \ (as by osmosis or diffusion)."
        is_a: PATO_0000970
        meaning: 'PATO:0000982'
      PATO_0001435:
        title: attachment quality
        description: "A structural quality inhering in a bearer by virtue of the bearer's\
          \ having connection or association with another entity."
        is_a: PATO_0000141
        meaning: 'PATO:0001435'
      PATO_0001453:
        title: detached from
        description: "An attachment quality inhering in a bearer by virtue of the\
          \ bearer's lacking connection or association with another entity."
        is_a: PATO_0001435
        meaning: 'PATO:0001453'
      PATO_0001442:
        title: wholeness
        description: A structural quality inhering in a bearer by virtue of whether
          the bearer includes all its components.
        is_a: PATO_0000141
        meaning: 'PATO:0001442'
      PATO_0001444:
        title: broken
        description: "A structural quality inhering in a bearer by virtue of the bearer's\
          \ components no longer being in a single contiguous unit."
        is_a: PATO_0001442
        meaning: 'PATO:0001444'
      PATO_0002080:
        title: broken into two pieces
        description: "A broken quality inhering in a bearer by virtue of the bearer's\
          \ being separated into two contiguous wholes."
        is_a: PATO_0001444
        meaning: 'PATO:0002080'
      PATO_0002014:
        title: structure, cavities
        description: "A structural quality that inheres in a bearer by virtue of the\
          \ bearer's containing hollow areas."
        is_a: PATO_0000141
        meaning: 'PATO:0002014'
      PATO_0002078:
        title: hollow
        description: "A quality inhering in a bearer by virtue of the bearer's having\
          \ an empty space or cavity within."
        is_a: PATO_0002014
        meaning: 'PATO:0002078'
      PATO_0002299:
        title: tubular
        description: A cylindrical shape that is hollow.
        is_a: PATO_0002078
        meaning: 'PATO:0002299'
      PATO_0002103:
        title: infiltrative
        description: "A structural quality inhering in a bearer by virtue of the bearer's\
          \ penetrating or permeating another substance or area."
        is_a: PATO_0000141
        meaning: 'PATO:0002103'
      PATO_0002269:
        title: accumulation
        description: A structural quality of the collection or massing of one physical
          object within another physical object.
        is_a: PATO_0000141
        meaning: 'PATO:0002269'
      PATO_0002270:
        title: increased accumulation
        description: An increased number of physical objects that are accumulated
          within another physical object usually as a result of a failure to break
          down or remove objects in a timely manner.
        is_a: PATO_0002269
        meaning: 'PATO:0002270'
      PATO_0002271:
        title: decreased accumulation
        description: An accumulation which is relative low.
        is_a: PATO_0002269
        meaning: 'PATO:0002271'
      PATO_0002292:
        title: transient
        description: "A structural quality inhering in a bearer by virtue of the bearer's\
          \ underlying structure being capable of change."
        is_a: PATO_0000141
        meaning: 'PATO:0002292'
      PATO_0010001:
        title: disconnected
        description: A structural quality inhering in the bearer by virtue of the
          bearer consisting of multiple structures lacking any physical connection
          to each other.
        is_a: PATO_0000141
        meaning: 'PATO:0010001'
      PATO_0000060:
        title: spatial pattern
        description: "A spatial quality inhering in a bearer by virtue of the bearer's\
          \ exhibiting repetition of placement of its parts."
        is_a: PATO_0000051
        meaning: 'PATO:0000060'
      PATO_0001854:
        title: vertical
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ being situated at right angles to the horizon."
        is_a: PATO_0000060
        meaning: 'PATO:0001854'
      PATO_0000019:
        title: color pattern
        description: A chromatic property that is the relative position of different
          hues or degrees of saturation.
        is_a: PATO_0000060
        meaning: 'PATO:0000019'
      PATO_0000337:
        title: colorless
        description: "A color quality inhering in a bearer by virtue of the bearer's\
          \ lacking color."
        is_a: PATO_0000019
        meaning: 'PATO:0000337'
      PATO_0000330:
        title: irregular spatial pattern
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ magnitude of or the relationships between its repeated parts lack consistency."
        is_a: PATO_0000060
        meaning: 'PATO:0000330'
      PATO_0001629:
        title: aggregated
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ being gathered or tending to gather into a mass or whole."
        is_a: PATO_0000330
        meaning: 'PATO:0001629'
      PATO_0001608:
        title: patchy
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ being marked by, consisting of, or diversified with patches."
        is_a: PATO_0000330
        meaning: 'PATO:0001608'
      PATO_0002121:
        title: trabecular
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ structure resembling an irregular meshwork with cross-linking struts."
        is_a: PATO_0000330
        meaning: 'PATO:0002121'
      PATO_0000440:
        title: regular spatial pattern
        description: "A pattern quality inhering in a bearer by virtue of the bearer's\
          \ having a repeatable or predictable placement."
        is_a: PATO_0000060
        meaning: 'PATO:0000440'
      PATO_0000634:
        title: unilateral
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ involvement of only one part or side."
        is_a: PATO_0000060
        meaning: 'PATO:0000634'
      PATO_0001566:
        title: distributed
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ being spread out or scattered about or divided up."
        is_a: PATO_0000060
        meaning: 'PATO:0001566'
      PATO_0002067:
        title: stratification
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ layered configuration."
        is_a: PATO_0000060
        meaning: 'PATO:0002067'
      PATO_0002068:
        title: stratified
        description: "A spatial pattern inhering in a bearer by virtue of the bearer's\
          \ exhibiting a layered configuration."
        is_a: PATO_0002067
        meaning: 'PATO:0002068'
      PATO_0000052:
        title: shape
        description: "A morphological quality inhering in a bearer by virtue of the\
          \ bearer's ratios of distances between its features (points, edges, surfaces\
          \ and also holes etc)."
        is_a: PATO_0000051
        meaning: 'PATO:0000052'
      PATO_0001199:
        title: linear
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being narrow, with the two opposite margins parallel."
        is_a: PATO_0000052
        meaning: 'PATO:0001199'
      PATO_0001154:
        title: elongated
        description: "A quality inhering in a bearer by virtue of the bearer's length\
          \ being notably higher than its width."
        is_a: PATO_0000052
        meaning: 'PATO:0001154'
      PATO_0002063:
        title: columnar
        description: "A shape inhering in a bearer by virtue of the bearer's being\
          \ elongated and cylindrical."
        is_a: PATO_0000052
        meaning: 'PATO:0002063'
      PATO_0001977:
        title: angular
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having at least one salient angle on the margin."
        is_a: PATO_0000052
        meaning: 'PATO:0001977'
      PATO_0002224:
        title: V-shaped
        description: "An angular shape quality inhering in a bearer by virtue of the\
          \ bearer's having a single angle in its length giving the bearer the form\
          \ of the letter V."
        is_a: PATO_0001977
        meaning: 'PATO:0002224'
      PATO_0002212:
        title: slender
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being small or narrow in circumference or width in proportion to length\
          \ or height."
        is_a: PATO_0000052
        meaning: 'PATO:0002212'
      PATO_0001481:
        title: sloped
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having an oblique or slanted direction."
        is_a: PATO_0000052
        meaning: 'PATO:0001481'
      PATO_0002143:
        title: sloped downward
        is_a: PATO_0001481
        meaning: 'PATO:0002143'
      PATO_0001360:
        title: filamentous
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having thin filamentous extensions at its edge."
        is_a: PATO_0000052
        meaning: 'PATO:0001360'
      PATO_0015030:
        title: plume-shaped
        description: "A shape that ineres in a bearer by virtue of the bearer's mass\
          \ being distributed in a feather-like fashion."
        is_a: PATO_0000052
        meaning: 'PATO:0015030'
      PATO_0002009:
        title: branchiness
        description: A shape quality inhering in a bearer by virtue of the degree
          to which there are subdivisions or offshoots in a bearer entity.
        is_a: PATO_0000052
        meaning: 'PATO:0002009'
      PATO_0000402:
        title: branched
        description: "A branchiness quality inhering in a bearer by virtue of the\
          \ bearer's having branches."
        is_a: PATO_0002009
        meaning: 'PATO:0000402'
      PATO_0001890:
        title: tripartite
        description: "A concave 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's being divided into three branches."
        is_a: PATO_0000402
        meaning: 'PATO:0001890'
      PATO_0001201:
        title: Y-shaped
        description: "A concave 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's being shaped in the form of the letter Y."
        is_a: PATO_0001890
        meaning: 'PATO:0001201'
      PATO_0001794:
        title: coiling
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being wound in a continuous series of loops."
        is_a: PATO_0000052
        meaning: 'PATO:0001794'
      PATO_0000404:
        title: coiled
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being curled or wound (especially in concentric rings or spirals)."
        is_a: PATO_0001794
        meaning: 'PATO:0000404'
      PATO_0000405:
        title: curled
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having parallel chains in undulate fashion on the border."
        is_a: PATO_0000052
        meaning: 'PATO:0000405'
      PATO_0001591:
        title: curvature
        description: "A surface shape quality inhering in a bearer by virtue of the\
          \ bearer's exhibiting a degree of bending."
        is_a: PATO_0000052
        meaning: 'PATO:0001591'
      PATO_0002254:
        title: flattened
        description: "A quality inhering in a bearer by virtue of the bearer's surface\
          \ becoming more extended in a plane."
        is_a: PATO_0001591
        meaning: 'PATO:0002254'
      PATO_0000407:
        title: flat
        description: "A quality inhering in a bearer by virtue of the bearer's having\
          \ a horizontal surface without a slope, tilt, or curvature."
        is_a: PATO_0002254
        meaning: 'PATO:0000407'
      PATO_0002253:
        title: platelike
        description: "A quality inhering in a bearer by virtue of the bearer's being\
          \ roundish, flattish shape, possibly with a slightly angled edge."
        is_a: PATO_0000407
        meaning: 'PATO:0002253'
      PATO_0000406:
        title: curved
        description: "A curvature quality inhering in a bearer by virtue of the bearer's\
          \ having or being marked by a curve or smoothly rounded bend."
        is_a: PATO_0001591
        meaning: 'PATO:0000406'
      PATO_0001789:
        title: domed
        description: "A curvature quality inhering in a bearer by virtue of the bearer's\
          \ having a shape resembling a dome."
        is_a: PATO_0000406
        meaning: 'PATO:0001789'
      PATO_0002006:
        title: 2-D shape
        description: A shape that inheres in a 2 dimensional entity, such as a cross
          section or projection of a 3 dimensional entity.
        is_a: PATO_0000052
        meaning: 'PATO:0002006'
      PATO_0002219:
        title: fan-shaped
        description: A quality inhering in a bearer that is shaped in the form of
          a fan.
        is_a: PATO_0002006
        meaning: 'PATO:0002219'
      PATO_0000946:
        title: oblong
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having a somewhat elongated form with approximately parallel sides."
        is_a: PATO_0002006
        meaning: 'PATO:0000946'
      PATO_0002318:
        title: superelliptic
        description: A shape constituting a transition between a rectangle and a circle;
          a closed curve, of which the circle and ellipse are special cases, whose
          parametric equation is x = a.cos2/rt, y = b.cos2/rt
        is_a: PATO_0002006
        meaning: 'PATO:0002318'
      PATO_0000947:
        title: elliptic
        description: "A spheroid quality inhering in a bearer by virtue of the bearer's\
          \ being oval with two axes of symmetry, as produced by a conical section."
        is_a: PATO_0002318
        meaning: 'PATO:0000947'
      PATO_0000411:
        title: circular
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being such that every part of the surface or the circumference is equidistant\
          \ from the center."
        is_a: PATO_0000947
        meaning: 'PATO:0000411'
      PATO_0001935:
        title: obtuse
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being roundish, a little inclining to be oblong."
        is_a: PATO_0000411
        meaning: 'PATO:0001935'
      PATO_0000967:
        title: undulate
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having a sinuate margin and rippled surface."
        is_a: PATO_0000052
        meaning: 'PATO:0000967'
      PATO_0001925:
        title: surface feature shape
        description: "A surface shape quality inhering in a bearer by virtue of the\
          \ bearer's shape of features present on its surface or outer shell."
        is_a: PATO_0000052
        meaning: 'PATO:0001925'
      PATO_0001367:
        title: lobate
        description: "A surface feature shape quality inhering in a bearer by virtue\
          \ of the bearer's having deeply undulating edges forming lobes."
        is_a: PATO_0001925
        meaning: 'PATO:0001367'
      PATO_0002433:
        title: sculpted surface
        description: A surface feature shape marked by large amounts of relief, often
          with multiple ridges and grooves in close association. Topographically complex.
        is_a: PATO_0001925
        meaning: 'PATO:0002433'
      PATO_0002440:
        title: ornamentation
        description: "A surface feature shape quality inhering in a bearer by virtue\
          \ of the degree of the bearer's highly topographical with ridges, pits,\
          \ rugosity or other surface structures."
        is_a: PATO_0001925
        meaning: 'PATO:0002440'
      PATO_0002441:
        title: ornamented
        description: "A surface feature shape in which the bearer's surface is highly\
          \ topographical with ridges, pits, rugosity or other surface structures."
        is_a: PATO_0002440
        meaning: 'PATO:0002441'
      PATO_0001410:
        title: striated
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being marked by narrow lines or grooves, usually parallel."
        is_a: PATO_0000052
        meaning: 'PATO:0001410'
      PATO_0001799:
        title: ruffled
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ exhibiting disturbance of its smoothness or regularity."
        is_a: PATO_0000052
        meaning: 'PATO:0001799'
      PATO_0002005:
        title: concavity
        description: Surface shape that refers to the inward or outward curvature
          of the surface.
        is_a: PATO_0000052
        meaning: 'PATO:0002005'
      PATO_0001857:
        title: concave
        description: "A shape quality in a bearer by virtue of the bearer's curving\
          \ inward."
        is_a: PATO_0002005
        meaning: 'PATO:0001857'
      PATO_0001594:
        title: arched
        description: "A concave quality inhering in a bearer by virtue of the bearer's\
          \ forming or resembling an arch."
        is_a: PATO_0001857
        meaning: 'PATO:0001594'
      PATO_0001960:
        title: interdigitated
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ parts or projections being interlocked; for example, the fingers of two\
          \ hands that are clasped."
        is_a: PATO_0000052
        meaning: 'PATO:0001960'
      PATO_0002266:
        title: 3-D shape
        description: A shape that inheres in a 3 dimensional entity.
        is_a: PATO_0000052
        meaning: 'PATO:0002266'
      PATO_0002007:
        title: convex 3-D shape
        description: 'A complete three dimensional shape in which for every line connecting
          pair of points on the object is within the object. Or: a shape lacking cavities.
          Contrast: concave.'
        is_a: PATO_0002266
        meaning: 'PATO:0002007'
      PATO_0002021:
        title: conical
        description: "A convex 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's resembling a cone (a 3-D shape with a round cross section\
          \ that tapers)."
        is_a: PATO_0002007
        meaning: 'PATO:0002021'
      PATO_0001873:
        title: cylindrical
        description: "A convex 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's exhibiting a consistently-sized round cross section."
        is_a: PATO_0002007
        meaning: 'PATO:0001873'
      PATO_0001865:
        title: spheroid
        description: "A convex 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's having a quadric surface in three dimensions obtained by\
          \ rotating an ellipse about one of its principal axes. Includes spheres\
          \ and oblate/prolate spheroids."
        is_a: PATO_0002007
        meaning: 'PATO:0001865'
      PATO_0001499:
        title: spherical
        description: "A spheroid quality inhering in a bearer by virtue of the bearer's\
          \ resembling a ball (a sphere whose equatorial diameter is equal to the\
          \ polar diameter)."
        is_a: PATO_0001865
        meaning: 'PATO:0001499'
      PATO_0002008:
        title: concave 3-D shape
        description: 'A complete three dimensional shape in which there is a line
          connecting pair of points on the object that lies outside the object. Or:
          a shape with cavities. Contrast: concave.'
        is_a: PATO_0002266
        meaning: 'PATO:0002008'
      PATO_0001879:
        title: U-shaped
        description: "A concave 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's being shaped in the form of the letter U."
        is_a: PATO_0002008
        meaning: 'PATO:0001879'
      PATO_0002386:
        title: anvil
        description: "A concave 3-D shape that inheres in the bearer by virtue of\
          \ the bearer's shape that is wider at one end and narrow in the middle."
        is_a: PATO_0002008
        meaning: 'PATO:0002386'
      PATO_0040009:
        title: bowl shaped
        description: "A concave 3-D shape quality inhering in a bearer by virtue of\
          \ the bearer's being shaped in the form of a bowl."
        is_a: PATO_0002008
        meaning: 'PATO:0040009'
      PATO_0002165:
        title: drooping
        description: To bent or hang downwards.
        is_a: PATO_0000052
        meaning: 'PATO:0002165'
      PATO_0002180:
        title: straight
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being free of curves, bends, or angles."
        is_a: PATO_0000052
        meaning: 'PATO:0002180'
      PATO_0002215:
        title: falciform
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having the shape of a scythe or sickle."
        is_a: PATO_0000052
        meaning: 'PATO:0002215'
      PATO_0002267:
        title: edge shape
        is_a: PATO_0000052
        meaning: 'PATO:0002267'
      PATO_0040008:
        title: fringed
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ having an ornamental border consisting of short straight or twisted threads\
          \ or strips hanging from cut or raveled edges or from a separate band."
        is_a: PATO_0002267
        meaning: 'PATO:0040008'
      PATO_0002311:
        title: fimbriated
        description: Having a fringe or border of hairlike or fingerlike projections.
        is_a: PATO_0000052
        meaning: 'PATO:0002311'
      PATO_0002335:
        title: tholiform
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ being dome-shaped."
        is_a: PATO_0000052
        meaning: 'PATO:0002335'
      PATO_0002359:
        title: broad
        description: "A quality inhering in a bearer by virtue of the bearer's width\
          \ being notably higher than its length."
        is_a: PATO_0000052
        meaning: 'PATO:0002359'
      PATO_0002521:
        title: funnel-shaped
        description: "A shape quality inhering in a bearer by virtue of the bearer's\
          \ similarity to the appearance of a funnel."
        is_a: PATO_0000052
        meaning: 'PATO:0002521'
      PATO_0005005:
        title: radiating
        description: Shape quality inhering in a bearer expanding outward, or having
          parts expanding outward, from a center point.
        is_a: PATO_0000052
        meaning: 'PATO:0005005'
      PATO_0000117:
        title: size
        description: "A morphology quality inhering in a bearer by virtue of the bearer's\
          \ physical magnitude."
        is_a: PATO_0000051
        meaning: 'PATO:0000117'
      PATO_0000586:
        title: increased size
        description: A size quality which is relatively high.
        is_a: PATO_0000117
        meaning: 'PATO:0000586'
      PATO_0000591:
        title: increased thickness
        description: A thickness which is relatively high.
        is_a: PATO_0000586
        meaning: 'PATO:0000591'
      PATO_0000573:
        title: increased length
        description: A length quality which is relatively large.
        is_a: PATO_0000586
        meaning: 'PATO:0000573'
      PATO_0001712:
        title: increased perimeter
        description: A perimeter which is relatively high.
        is_a: PATO_0000573
        meaning: 'PATO:0001712'
      PATO_0000595:
        title: increased volume
        description: A volume which is relatively high.
        is_a: PATO_0000586
        meaning: 'PATO:0000595'
      PATO_0000600:
        title: increased width
        description: A width which is relatively large.
        is_a: PATO_0000586
        meaning: 'PATO:0000600'
      PATO_0001596:
        title: increased depth
        description: A depth quality which is relatively high.
