      ENVO_01000813:
        title: astronomical body part
        description: A material part of an astronomical body.
        is_a: BFO_0000040
        meaning: 'ENVO:01000813'
      ENVO_00000000:
        title: geographic feature
        description: An astrononmical body part which delimited by physical discontinuities
          with its surroundings.
        is_a: ENVO_01000813
        meaning: 'ENVO:00000000'
      ENVO_00000002:
        title: anthropogenic geographic feature
        description: An anthropogenic geographic feature is a geographic feature resulting
          from the influence of human beings on nature.
        is_a: ENVO_00000000
        meaning: 'ENVO:00000002'
      ENVO_00000011:
        title: garden
        description: An enclosure for displaying selected plant or animal life.
        is_a: ENVO_00000002
        meaning: 'ENVO:00000011'
      ENVO_00005745:
        title: allotment garden
        description: A garden which is made available for individual, non-commercial
          gardening or growing food plants.
        is_a: ENVO_00000011
        meaning: 'ENVO:00005745'
      ENVO_00010624:
        title: botanical garden
        description: A place where a wide variety of plants primarily categorized
          and documented for scientific purposes.
        is_a: ENVO_00000011
        meaning: 'ENVO:00010624'
      ENVO_00010625:
        title: zoological garden
        description: A facility in which animals are confined within enclosures and
          displayed to the public, and in which they may also be bred.
        is_a: ENVO_00000011
        meaning: 'ENVO:00010625'
      ENVO_01000923:
        title: petting zoo
        description: A petting zoo is a zoological garden which contains domesticated
          non-human animals and some wild non-human animals that are docile enough
          for humans to touch and feed.
        is_a: ENVO_00010625
        meaning: 'ENVO:01000923'
      ENVO_01000419:
        title: domestic garden
        description: A garden that is associated with a human house. This association
          is generally one of spatial proximity or parthood.
        is_a: ENVO_00000011
        meaning: 'ENVO:01000419'
      ENVO_00000026:
        title: well
        description: A cylindrical hole, pit, or tunnel drilled or dug down to a depth
          from which water, oil, or gas can be pumped or brought to the surface.
        is_a: ENVO_00000002
        meaning: 'ENVO:00000026'
      ENVO_01000002:
        title: water well
        description: A well which provides access to groundwater held  in an aquifer.
        is_a: ENVO_00000026
        meaning: 'ENVO:01000002'
      ENVO_03600063:
        title: tube well
        description: "A water well in which a long, 100\u2013200 millimetres-wide,\
          \ stainless steel tube or pipe is bored into an underground aquifer to lift\
          \ water using a pump."
        is_a: ENVO_01000002
        meaning: 'ENVO:03600063'
      ENVO_01000003:
        title: oil well
        description: A well which has been drilled in order to extract petroleum oil
          from subterranean reservoirs and bring it to the surface.
        is_a: ENVO_00000026
        meaning: 'ENVO:01000003'
      ENVO_01001870:
        title: gas well
        description: A well which has been drilled in order to extract natrual gas
          from subterranean reservoirs and bring it to the surface.
        is_a: ENVO_00000026
        meaning: 'ENVO:01001870'
      ENVO_00000046:
        title: hedge
        description: A dense growth of shrubbery planted as a fence or boundary.
        is_a: ENVO_00000002
        meaning: 'ENVO:00000046'
      ENVO_00000474:
        title: cut
        description: "An excavation of the Earth's surface to provide passage for\
          \ a road, railway, canal, etc."
        is_a: ENVO_00000002
        meaning: 'ENVO:00000474'
      ENVO_00000515:
        title: road cut
        description: A cut to provide passage for a road.
        is_a: ENVO_00000474
        meaning: 'ENVO:00000515'
      ENVO_00000559:
        title: weapons test site
        description: A region at which weapons, typically military, are tested.
        is_a: ENVO_00000002
        meaning: 'ENVO:00000559'
      ENVO_00000560:
        title: nuclear weapons test site
        description: A weapons test site at which nuclear weapons are, or have been,
          tested.
        is_a: ENVO_00000559
        meaning: 'ENVO:00000560'
      ENVO_00000561:
        title: military training area
        description: A region in which military personnel train.
        is_a: ENVO_00000002
        meaning: 'ENVO:00000561'
      ENVO_00000562:
        title: park
        description: A bounded area of land, or water, usually in its natural or semi-natural
          (landscaped) state and set aside for some purpose, usually to do with recreation
          or conservation.
        is_a: ENVO_00000002
        meaning: 'ENVO:00000562'
      ENVO_03500001:
        title: playground
        description: A park which has been designed for the recreation of children.
        is_a: ENVO_00000562
        meaning: 'ENVO:03500001'
      ENVO_03500002:
        title: public park
        description: A park which is owned by a governmental or state entity and which
          is accessible by its citizenry (i.e. the public).
        is_a: ENVO_00000562
        meaning: 'ENVO:03500002'
      ENVO_00002204:
        title: anthropogenic contamination feature
        description: An anthropogenic geographic feature which has increased levels
          of contaminants in its consituent materials.
        is_a: ENVO_00000002
        meaning: 'ENVO:00002204'
      ENVO_00002061:
        title: oil spill
        description: The result of the unintentional release of liquid petroleum hydrocarbon
          into the environment as a result of human activity.
        is_a: ENVO_00002204
        meaning: 'ENVO:00002061'
      ENVO_01000447:
        title: roadside
        description: An environmental zone of varying area which is adjacent to a
          road.
        is_a: ENVO_00000002
        meaning: 'ENVO:01000447'
      ENVO_00010442:
        title: midden
        description: A dump for domestic waste. A term used to describe any kind of
          feature containing waste products relating to day-to-day human life.
        is_a: ENVO_00000002
        meaning: 'ENVO:00010442'
      ENVO_01000935:
        title: campground
        description: A part of an ecosystem which may be or has been used for one
          or more overnight stays by humans sheltering in tents, camper vans, caravans,
          or improvised shelters.
        is_a: ENVO_00000002
        meaning: 'ENVO:01000935'
      ENVO_01000936:
        title: dedicated campground
        description: A campground which has been modified by humans to provide and
          maintain facilities for camping such as fire pits, road access, latrines,
          and garbage bins.
        is_a: ENVO_01000935
        meaning: 'ENVO:01000936'
      ENVO_01000937:
        title: impromptu campground
        description: A campground which has no pre-existing facilities installed or
          maintained by humans, usually found outside of anthropised ecosystems.
        is_a: ENVO_01000935
        meaning: 'ENVO:01000937'
      ENVO_01000985:
        title: fairground
        description: A part of an ecosystem which has been allocated to host a gathering
          of people for multiple entertainment or commercial activities.
        is_a: ENVO_00000002
        meaning: 'ENVO:01000985'
      ENVO_01000986:
        title: agricultural fairground
        description: A fairground which is used to exhibit agricultural technology,
          livestock, and farm-related activity.
        is_a: ENVO_01000985
        meaning: 'ENVO:01000986'
      ENVO_01000987:
        title: market
        description: A part of an ecosystem where people gather for the purchase and
          sale of provisions, livestock, and other goods.
        is_a: ENVO_00000002
        meaning: 'ENVO:01000987'
      ENVO_03501198:
        title: wet market
        description: A market which is used for the sale and purchase of perishable
          goods.
        is_a: ENVO_01000987
        meaning: 'ENVO:03501198'
      ENVO_03501199:
        title: dry market
        description: A market which is used for the sale and purchase of durable goods.
        is_a: ENVO_01000987
        meaning: 'ENVO:03501199'
      ENVO_03501255:
        title: water trough
        description: An anthropogenic geographic feature consisting of a receptacle
          intended to provide drinking water to animals.
        is_a: ENVO_00000002
        meaning: 'ENVO:03501255'
      ENVO_03600053:
        title: yard
        description: An anthropogenic geographic feature which consists of land immediately
          adjacent to a building or a group of buildings.
        is_a: ENVO_00000002
        meaning: 'ENVO:03600053'
      ENVO_03600033:
        title: residential backyard
        description: A yard which consists of land immediately adjacent to the back
          of a residential building
        is_a: ENVO_03600053
        meaning: 'ENVO:03600033'
      ENVO_00000070:
        title: human construction
        description: A construction that has been assembled by deliberate human effort.
        is_a: ENVO_01000813
        meaning: 'ENVO:00000070'
      ENVO_00000010:
        title: transport feature
        description: A construction which enables the movement of humans, their animals
          or their vehicles.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000010'
      ENVO_01001272:
        title: constructed pavement
        description: A construction which comprises a durable surface layer overlying
          a solid surface intended to sustain vehicular or foot traffic.
        is_a: ENVO_00000010
        meaning: 'ENVO:01001272'
      ENVO_00000064:
        title: road
        description: An open way for the passage of vehicles, persons, or animals
          on land.
        is_a: ENVO_01001272
        meaning: 'ENVO:00000064'
      ENVO_00000122:
        title: track
        description: A small road, generally not paved.
        is_a: ENVO_00000064
        meaning: 'ENVO:00000122'
      ENVO_01000771:
        title: all season road
        description: A road which is usable across all seasons.
        is_a: ENVO_00000064
        meaning: 'ENVO:01000771'
      ENVO_01000780:
        title: public road
        description: A road which is publically accessible.
        is_a: ENVO_00000064
        meaning: 'ENVO:01000780'
      ENVO_01001277:
        title: asphalt road
        description: A road which is primarily composed of asphalt.
        is_a: ENVO_00000064
        meaning: 'ENVO:01001277'
      ENVO_01001278:
        title: concrete road
        description: A road which is primarily composed of concrete.
        is_a: ENVO_00000064
        meaning: 'ENVO:01001278'
      ENVO_01001280:
        title: driveway
        description: A road which is used for local access to one or more structures,
          and is privately owned and maintained by an individual or group.
        is_a: ENVO_00000064
        meaning: 'ENVO:01001280'
      ENVO_01001279:
        title: sidewalk
        description: A constructed pavement which is built on the side of a road and
          intended for foot traffic.
        is_a: ENVO_01001272
        meaning: 'ENVO:01001279'
      ENVO_01001281:
        title: paved parking lot
        description: A constructed pavement which is used for parking vehicles.
        is_a: ENVO_01001272
        meaning: 'ENVO:01001281'
      ENVO_03500004:
        title: bike path
        description: A constructed pavement which is intended for bicycle traffic
        is_a: ENVO_01001272
        meaning: 'ENVO:03500004'
      ENVO_00000065:
        title: railway
        description: A permanent way having one or more rails which provides a track
          for cars.
        is_a: ENVO_00000010
        meaning: 'ENVO:00000065'
      ENVO_00000075:
        title: bridge
        description: A built structure erected over a depression or obstacle to carry
          traffic or some facility such as a pipeline.
        is_a: ENVO_00000010
        meaning: 'ENVO:00000075'
      ENVO_03501244:
        title: Bailey bridge
        description: A bridge which is a truss bridge, pre-fabricated, and portable.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501244'
      ENVO_03501245:
        title: drawbridge
        description: A bridge which is hinged and can be raised.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501245'
      ENVO_03501246:
        title: footbridge
        description: A bridge designed solely for pedestrians.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501246'
      ENVO_03501247:
        title: humpback bridge
        description: A bridge which arches in the center, and has a span which is
          higher than the ramps on either side, forming a hump-like arrangement.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501247'
      ENVO_03501248:
        title: overpass
        description: A bridge which is used for transportaiton, and which crosses
          over another road or railway.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501248'
      ENVO_03501249:
        title: suspension bridge
        description: A bridge which has its deck hung on vertical suspenders via suspension
          cables.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501249'
      ENVO_03501250:
        title: swing bridge
        description: A bridge which is movable and has a vertical locating pin as
          its primary structural support, and a support ring about which it can pivot
          horizontally.
        is_a: ENVO_00000075
        meaning: 'ENVO:03501250'
      ENVO_00000158:
        title: causeway
        description: A road or railway elevated by a bank, usually across a broad
          body of water or wetland.
        is_a: ENVO_00000010
        meaning: 'ENVO:00000158'
      ENVO_00000357:
        title: lock
        description: A device for raising and lowering boats between stretches of
          water of different levels on river and canal waterways. The distinguishing
          feature of a lock is a fixed chamber whose water level can be varied.
        is_a: ENVO_00000010
        meaning: 'ENVO:00000357'
      ENVO_00000411:
        title: ford
        description: The shallow part of a stream which can be easily crossed.
        is_a: ENVO_00000010
        meaning: 'ENVO:00000411'
      ENVO_00000563:
        title: pier
        description: A raised walkway over water, supported by piles or pillars.
        is_a: ENVO_00000010
        meaning: 'ENVO:00000563'
      ENVO_03501282:
        title: hangar
        description: A transport feature consisting of a closed building structure
          to hold aircraft or spacecraft.
        is_a: ENVO_00000010
        meaning: 'ENVO:03501282'
      ENVO_00000377:
        title: artificial lake
        description: A lake purposefully constructed.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000377'
      ENVO_00000025:
        title: reservoir
        description: An artificial body of water, often contained by a dam, constructed
          for the purpose of water storage.
        is_a: ENVO_00000377
        meaning: 'ENVO:00000025'
      ENVO_00000378:
        title: canal head reservoir
        description: A reservoir constructed for the purpose of maintaining water
          levels in a canal or canals.
        is_a: ENVO_00000025
        meaning: 'ENVO:00000378'
      ENVO_00000443:
        title: flood control reservoir
        description: A reservoir constructed for the purpose of containing a flood,
          an overflow of water from a body of water that sumerges land.
        is_a: ENVO_00000025
        meaning: 'ENVO:00000443'
      ENVO_00000448:
        title: hydroelectric reservoir
        description: A reservoir constructed for the purpose of generating electricity.
        is_a: ENVO_00000025
        meaning: 'ENVO:00000448'
      ENVO_00000449:
        title: drinking water reservoir
        description: A reservoir constructed for the purpose of providing drinking
          water.
        is_a: ENVO_00000025
        meaning: 'ENVO:00000449'
      ENVO_00000450:
        title: irrigation reservoir
        description: A reservoir constructed for the purpose of providing water for
          irrigation.
        is_a: ENVO_00000025
        meaning: 'ENVO:00000450'
      ENVO_00000451:
        title: amenity lake
        description: A lake constructed, or modified, for the chief purpose of providing
          an amenity.
        is_a: ENVO_00000377
        meaning: 'ENVO:00000451'
      ENVO_00002226:
        title: borehole
        description: A channel which is constructed by removing materials from land
          or submerged beds.
        is_a: ENVO_00000070
        meaning: 'ENVO:00002226'
      ENVO_00000121:
        title: artificial channel
        description: A channel of a watercource which has been constructed by humans
          or their technologies.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000121'
      ENVO_00000037:
        title: ditch
        description: A small, human-made channel which has been dug for draining or
          irrigating the land.
        is_a: ENVO_00000121
        meaning: 'ENVO:00000037'
      ENVO_00000139:
        title: irrigation ditch
        description: A ditch that supplies water to surrounding land.
        is_a: ENVO_00000037
        meaning: 'ENVO:00000139'
      ENVO_00000140:
        title: drainage ditch
        description: A ditch that collects water from the surrounding land.
        is_a: ENVO_00000037
        meaning: 'ENVO:00000140'
      ENVO_00000544:
        title: leat
        description: A man-made watercourse, or makeshift aqueduct, often an artificial
          channel which supplies water to a watermill or its mill pond, collecting
          water from upstream of the mill so that the natural level of the driving
          water is above the level of the stream at the mill. Alternatively to may
          deliver water for mineral washing and concentration, irrigation or to a
          dye works.
        is_a: ENVO_00000121
        meaning: 'ENVO:00000544'
      ENVO_01000924:
        title: plumbing drain
        description: An artificial channel which transports unwanted water or waste
          liquids away from their source, either to a more useful area, a receptacle,
          or into sewers or stormwater mains as waste discharge to be released or
          processed.
        is_a: ENVO_00000121
        meaning: 'ENVO:01000924'
      ENVO_00000073:
        title: building
        description: A permanent walled and roofed construction.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000073'
      ENVO_00003861:
        title: industrial building
        description: An industrial building is a building within which goods are produced
          and, optionally, stored or within which services are rendered.
        is_a: ENVO_00000073
        meaning: 'ENVO:00003861'
      ENVO_00002272:
        title: waste treatment plant
        is_a: ENVO_00003861
        meaning: 'ENVO:00002272'
      ENVO_00002043:
        title: wastewater treatment plant
        is_a: ENVO_00002272
        meaning: 'ENVO:00002043'
      ENVO_2000002:
        title: industrial wastewate treatment plant
        description: A wastewater treatment plant that treates industrial wastewater.
          Industrial wastewater treatment covers the mechanisms and processes used
          to treat waters that have been contaminated in some way by anthropogenic
          industrial or commercial activities prior to its release into the environment
          or its re-use.
        is_a: ENVO_00002043
        meaning: 'ENVO:2000002'
      ENVO_2000003:
        title: agricultural wastewater treatment plant
        description: A wastewater treatment plant that treats agriculatural wastewater.
          Agricultural wastewater treatment relates to the treatment of wastewaters
          produced in the course of agricultural activities. Agriculture is a highly
          intensified industry in many parts of the world, producing a range of wastewaters
          requiring a variety of treatment technologies and management practices.
        is_a: ENVO_00002043
        meaning: 'ENVO:2000003'
      ENVO_00003043:
        title: sewage plant
        description: A waste treatment plant which equipped to treat sewage such that
          its potential for environmental contamination is reduced.
        is_a: ENVO_00002272
        meaning: 'ENVO:00003043'
      ENVO_00002214:
        title: power plant
        description: A power plant is a building which contains one or more generators
          which convert mechanical energy into electrical energy through the relative
          motion between a magnetic field and a conductor. The energy source harnessed
          to turn the generator varies widely.
        is_a: ENVO_00003861
        meaning: 'ENVO:00002214'
      ENVO_00002215:
        title: geothermal power plant
        description: "A geothermal power plant is a power plant which uses heat generated\
          \ by the decay of radioactive isotopes in the Earth's mantle and crust as\
          \ well as primordial heat left over from the formation of the Earth to drive\
          \ its generators."
        is_a: ENVO_00002214
        meaning: 'ENVO:00002215'
      ENVO_00002271:
        title: nuclear power plant
        description: A nuclear power plant is a power plant which uses heat generated
          by a radioactive decay in a nuclear reactor to convert water into steam
          in order to drive turbines in electrical generators through pressure.
        is_a: ENVO_00002214
        meaning: 'ENVO:00002271'
      ENVO_03501241:
        title: wind farm
        description: A power plant which is a group of wind turbines in the same location
          used to produce electricity.
        is_a: ENVO_00002214
        meaning: 'ENVO:03501241'
      ENVO_2000037:
        title: fossil fuel power plant
        description: A power station which burns a fossil fuel such as coal, natural
          gas, or petroleum to produce electricity.
        is_a: ENVO_00002214
        meaning: 'ENVO:2000037'
      ENVO_2000038:
        title: coal power plant
        is_a: ENVO_2000037
        meaning: 'ENVO:2000038'
      ENVO_2000040:
        title: lignite power plant
        is_a: ENVO_2000038
        meaning: 'ENVO:2000040'
      ENVO_2000039:
        title: gas power station
        is_a: ENVO_2000037
        meaning: 'ENVO:2000039'
      ENVO_2000041:
        title: solar power station
        is_a: ENVO_00002214
        meaning: 'ENVO:2000041'
      ENVO_2000042:
        title: ocean thermal power station
        is_a: ENVO_00002214
        meaning: 'ENVO:2000042'
      ENVO_2000043:
        title: tidal power plant
        is_a: ENVO_00002214
        meaning: 'ENVO:2000043'
      ENVO_00003323:
        title: tannery
        description: A tannery is a building in which the skins of animals are treated
          with chemicals to alter the structure of their constituent proteins, creating
          leather.
        is_a: ENVO_00003861
        meaning: 'ENVO:00003323'
      ENVO_00003862:
        title: dairy
        description: A dairy is a building in which animal milk is harvested and,
          optionally, processed for human consumption.
        is_a: ENVO_00003861
        meaning: 'ENVO:00003862'
      ENVO_00003863:
        title: food processing building
        description: A food processing building is a building in which materials that
          contain or consist of essential body nutrients - such as carbohydrates,
          fats, proteins, vitamins, or minerals - and may be ingested and assimilated
          by an organism to produce energy, stimulate growth, and maintain life are
          converted alternative forms.
        is_a: ENVO_00003861
        meaning: 'ENVO:00003863'
      ENVO_01000928:
        title: fish processing building
        description: A building in which fish are subject to a series of operations
          to prepare them for human consumption.
        is_a: ENVO_00003863
        meaning: 'ENVO:01000928'
      ENVO_00003864:
        title: bakery
        description: A bakery is a building in which raw flour-based food is baked
          in an oven to produce food products such as bread, cakes, pastries, and
          pies. These products are often sold from the bakery itself.
        is_a: ENVO_00003861
        meaning: 'ENVO:00003864'
      ENVO_00003885:
        title: brewery
        description: A brewery is a building in which alcoholic beverages are produced
          by brewing, that is, steeping a starch source (commonly cereal grains) in
          water and fermenting the resulting sweet liquid with yeast. At times, the
          products are also sold from the brewery.
        is_a: ENVO_00003861
        meaning: 'ENVO:00003885'
      ENVO_00003911:
        title: sake brewery
        description: A sake brewery is a brewery which produces rice wine by fermenting
          rice which has been polished to remove the bran.
        is_a: ENVO_00003885
        meaning: 'ENVO:00003911'
      ENVO_00004638:
        title: sawmill
        description: A building within which logs are cut into lumber products.
        is_a: ENVO_00003861
        meaning: 'ENVO:00004638'
      ENVO_01000536:
        title: factory
        description: A factory (previously manufactory) or manufacturing plant is
          an industrial site, usually consisting of buildings and machinery, or more
          commonly a complex having several buildings, where workers manufacture goods
          or operate machines processing one product into another.
        is_a: ENVO_00003861
        meaning: 'ENVO:01000536'
      ENVO_03501294:
        title: preprocessing plant
        description: A factory where raw or preprocessed materials are transformed
          into finished parts or products.
        is_a: ENVO_01000536
        meaning: 'ENVO:03501294'
      ENVO_03501295:
        title: processing plant
        description: A factory where raw materials are treated or prepared for final
          processing.
        is_a: ENVO_01000536
        meaning: 'ENVO:03501295'
      ENVO_03501296:
        title: cheese processing plant
        description: A factory for processing, packaging, labelling, handling, and
          storing cheese.
        is_a: ENVO_03501295
        meaning: 'ENVO:03501296'
      ENVO_03501297:
        title: meat processing plant
        description: A processing plant for slaughtering, processing, packaging, labelling,
          handling, and storing of food animal carcasses, parts of carcasses, and
          meat products.
        is_a: ENVO_03501295
        meaning: 'ENVO:03501297'
      ENVO_01000925:
        title: abattoir
        description: A facility in which non-human animals are slaughtered and processed
          for human consumption.
        is_a: ENVO_00003861
        meaning: 'ENVO:01000925'
      ENVO_01000926:
        title: knackery
        description: A facility in which non-human animals are slaughtered and processed,
          but not for human consumption.
        is_a: ENVO_00003861
        meaning: 'ENVO:01000926'
      ENVO_03501102:
        title: polytunnel
        description: An industrial building made from steel and covered in polyethylene
          used for plant cultivation.
        is_a: ENVO_00003861
        meaning: 'ENVO:03501102'
      ENVO_03501123:
        title: airport terminal
        description: An industrial building in an airport where passengers transfer
          between facilities and vehicles.
        is_a: ENVO_00003861
        meaning: 'ENVO:03501123'
      ENVO_03501124:
        title: airport concourse
        description: An industrial building which provides travelers with access to
          airplanes.
        is_a: ENVO_00003861
        meaning: 'ENVO:03501124'
      ENVO_03501233:
        title: warehouse
        description: An industrial building which is used to store goods.
        is_a: ENVO_00003861
        meaning: 'ENVO:03501233'
      ENVO_03600004:
        title: drinking water treatment plant
        description: An industrial building in which water undergoes a purification
          process to make it fit for human consumption.
        is_a: ENVO_00003861
        meaning: 'ENVO:03600004'
      ENVO_03600075:
        title: oil mill
        description: An industrial building in which oil-bearing seeds or vegetable
          materials are crushed and pressed with a grinding mill in order to extract
          oils.
        is_a: ENVO_00003861
        meaning: 'ENVO:03600075'
      ENVO_03600078:
        title: oil refinery
        description: An industrial building in which crude oil is transformed and
          refined into useful products.
        is_a: ENVO_00003861
        meaning: 'ENVO:03600078'
      ENVO_01001222:
        title: commercial building
        description: A building which is primarily used to facilitate the buying or
          selling of goods or services.
        is_a: ENVO_00000073
        meaning: 'ENVO:01001222'
      ENVO_00002221:
        title: shop
        description: A building in which a business presents a selection of goods
          and offers to trade or sell them to customers for money or other goods.
        is_a: ENVO_01001222
        meaning: 'ENVO:00002221'
      ENVO_00002222:
        title: food shop
        description: A shop in which a business offers food products for sale or trade.
        is_a: ENVO_00002221
        meaning: 'ENVO:00002222'
      ENVO_01000984:
        title: grocery store
        description: A food shop in which food products are the primary offer for
          sale or trade.
        is_a: ENVO_00002222
        meaning: 'ENVO:01000984'
      ENVO_01000970:
        title: delicatessen
        description: A food shop which sells a selection of food products that are
          not typical dietary components of the human population it is co-located
          with.
        is_a: ENVO_01000984
        meaning: 'ENVO:01000970'
      ENVO_03501299:
        title: charcuterie shop
        description: A delicatessen which prepares and sells preserved meat products.
        is_a: ENVO_01000970
        meaning: 'ENVO:03501299'
      ENVO_01000988:
        title: ethnic food shop
        description: "A food shop in which the food products on offer are restricted\
          \ to those produced in a region and cultural setting other than that of\
          \ the shop's locality."
        is_a: ENVO_00002222
        meaning: 'ENVO:01000988'
      ENVO_03501290:
        title: supermarket
        description: A self-service shop offering a wide variety of food, beverages
          and household products, organized into sections.
        is_a: ENVO_00002222
        meaning: 'ENVO:03501290'
      ENVO_03501243:
        title: big-box store
        description: A store which is physically large and is part of a retail chain.
        is_a: ENVO_00002221
        meaning: 'ENVO:03501243'
      ENVO_00003963:
        title: warehouse
        description: A warehouse is a building which is used for the storage of goods.
        is_a: ENVO_01001222
        meaning: 'ENVO:00003963'
      ENVO_00003964:
        title: tobacco warehouse
        description: A tobacco warehouse is a warehouse used to store cured leaves
          of plants from the genus Nicotiana, primarily  N. tabacum and N. rustica.
        is_a: ENVO_00003963
        meaning: 'ENVO:00003964'
      ENVO_01000927:
        title: day care building
        description: "A building which is used to care for a human child during the\
          \ working day by a person, outside the child's immediate family, other than\
          \ that child's legal guardians."
        is_a: ENVO_01001222
        meaning: 'ENVO:01000927'
      ENVO_01000934:
        title: restaurant
        description: A building within which food and drink are prepared and served
          to customers in exchange for money or other goods and/or services.
        is_a: ENVO_01001222
        meaning: 'ENVO:01000934'
      ENVO_01000969:
        title: cafeteria
        description: A building which provides the site for food services with little
          or no waiting staff furnishing table service.
        is_a: ENVO_01000934
        meaning: 'ENVO:01000969'
      ENVO_01000972:
        title: take-out restaurant
        description: A restaurant which provides prepared meals or other food products
          that the purchaser must eat off its premises.
        is_a: ENVO_01000934
        meaning: 'ENVO:01000972'
      ENVO_03501221:
        title: bistro
        description: A restaurant which is of French cultural origin and which has
          a short menu and limited seating space.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501221'
      ENVO_03501222:
        title: brasserie
        description: A type of restaurant which is of French cultural origin and which
          provides more service or food variety than a bistro.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501222'
      ENVO_03501224:
        title: carvery
        description: A restaurant which provides customers with cooked meat freshly
          sliced to order.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501224'
      ENVO_03501225:
        title: coffeehouse
        description: A restaurant which primarily serves coffee.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501225'
      ENVO_03501226:
        title: greasy spoon
        description: A restaurant which is small, inexpensive, and typically specializing
          in fried foods and/or home-cooked meals.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501226'
      ENVO_03501227:
        title: steakhouse
        description: A restaurant which specializes in serving steaks and pork chops.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501227'
      ENVO_03501228:
        title: trattoria
        description: A restaurant which is of Italian cultural origin and which is
          generally less formal than an Italian ristorante, but more formal than an
          osteria.
        is_a: ENVO_01000934
        meaning: 'ENVO:03501228'
      ENVO_01000973:
        title: kiosk
        description: A booth with an open window on one side.
        is_a: ENVO_01001222
        meaning: 'ENVO:01000973'
      ENVO_01000974:
        title: food kiosk
        description: A kiosk from which food products are sold.
        is_a: ENVO_01000973
        meaning: 'ENVO:01000974'
      ENVO_01001221:
        title: office building
        description: A commercial building which contains parts used as workplaces
          primarily for administrative and managerial workers.
        is_a: ENVO_01001222
        meaning: 'ENVO:01001221'
      ENVO_03501234:
        title: town hall
        description: An office building which is the chief administrative building
          of a city, town, or other municipality.
        is_a: ENVO_01001221
        meaning: 'ENVO:03501234'
      ENVO_03501206:
        title: shopping center
        description: A commercial building in which the majority of commerical activity
          occurs in shops occupying parts of the building.
        is_a: ENVO_01001222
        meaning: 'ENVO:03501206'
      ENVO_03501207:
        title: shopping mall
        description: A shopping center in which a large indoor pedestrian promenade
          provides access to stores and other facilities.
        is_a: ENVO_03501206
        meaning: 'ENVO:03501207'
      ENVO_03501232:
        title: movie theater
        description: A commercial building which contains auditoria for viewing films.
        is_a: ENVO_01001222
        meaning: 'ENVO:03501232'
      ENVO_03501275:
        title: corn exchange
        description: A commercial building where merchants trade grains.
        is_a: ENVO_01001222
        meaning: 'ENVO:03501275'
      ENVO_03501276:
        title: oast house
        description: A commercial building designed for kilning (drying) hops.
        is_a: ENVO_01001222
        meaning: 'ENVO:03501276'
      ENVO_01000417:
        title: house
        description: A house is a building that provides a dwelling-place for a living
          entity.
        is_a: ENVO_00000073
        meaning: 'ENVO:01000417'
      ENVO_00003040:
        title: animal house
        description: A house used for sheltering non-human animals.
        is_a: ENVO_01000417
        meaning: 'ENVO:00003040'
      ENVO_00003041:
        title: cow shed
        description: An animal house which is used to shelter cows.
        is_a: ENVO_00003040
        meaning: 'ENVO:00003041'
      ENVO_03501286:
        title: calf shed
        description: A cow shed for baby cows/bulls.
        is_a: ENVO_00003041
        meaning: 'ENVO:03501286'
      ENVO_00003042:
        title: piggery
        description: An animal house which is used to house pigs.
        is_a: ENVO_00003040
        meaning: 'ENVO:00003042'
      ENVO_01000918:
        title: open animal house
        description: An animal house which is only partially surrounded by a building
          envelope.
        is_a: ENVO_00003040
        meaning: 'ENVO:01000918'
      ENVO_01000921:
        title: closed animal house
        description: An animal house which has a complete building envelope.
        is_a: ENVO_00003040
        meaning: 'ENVO:01000921'
      ENVO_03501258:
        title: chicken house
        description: An animal house where fowl are kept.
        is_a: ENVO_00003040
        meaning: 'ENVO:03501258'
      ENVO_03501287:
        title: livestock house
        description: An animal house used for housing livestock.
        is_a: ENVO_00003040
        meaning: 'ENVO:03501287'
      ENVO_03501352:
        title: animal rescue shelter
        description: An animal house which houses stray, lost, abandoned or surrendered
          animals.
        is_a: ENVO_00003040
        meaning: 'ENVO:03501352'
      ENVO_01000418:
        title: human house
        is_a: ENVO_01000417
        meaning: 'ENVO:01000418'
      ENVO_01000933:
        title: residential building
        description: A human house which serves as a long-term shelter for its inhabitants
          and within which they store personal property.
        is_a: ENVO_01000418
        meaning: 'ENVO:01000933'
      ENVO_03501194:
        title: long-term care facility
        description: A residential building which is used to provides long-term care
          for residents.
        is_a: ENVO_01000933
        meaning: 'ENVO:03501194'
      ENVO_03501195:
        title: assisted living facility
        description: A long-term care facility which is used to provide care for people
          with disabilities or for adults who cannot or who choose not to live independently.
        is_a: ENVO_03501194
        meaning: 'ENVO:03501195'
      ENVO_03501196:
        title: group home facility
        description: A long-term care facility which is used to provide care for people
          with complex health needs, and which typically has at least one caregiver
          in attendance twenty four hours a day.
        is_a: ENVO_03501194
        meaning: 'ENVO:03501196'
      ENVO_03501274:
        title: bunkhouse
        description: A residential building containing bunks or beds which are often
          not separated by walls.
        is_a: ENVO_01000933
        meaning: 'ENVO:03501274'
      ENVO_03501279:
        title: tenement
        description: A residential building shared by multiple dwellings, typically
          with flats or apartments on each floor and with shared entrance stairway
          access.
        is_a: ENVO_01000933
        meaning: 'ENVO:03501279'
      ENVO_01001480:
        title: domestic building
        description: A building which is primarily used for the long-term habitation
          of humans.
        is_a: ENVO_00000073
        meaning: 'ENVO:01001480'
      ENVO_01000744:
        title: human dwelling
        description: "A self-contained constructed feature used by one or more households\
          \ as a home, such as a house, apartment, mobile home, houseboat or other\
          \ 'substantial' structure. A dwelling typically includes nearby outbuildings,\
          \ sheds etc. within the curtilage of the property, excluding any 'open fields\
          \ beyond'. It has significance in relation to search and seizure, conveyancing\
          \ of real property, burglary, trespass, and land use planning."
        is_a: ENVO_01001480
        meaning: 'ENVO:01000744'
      ENVO_03501344:
        title: insecure housing
        description: A human dwelling which may be unsustainable over the long term
          for an inhabitant because of financial, livability, overcrowding or other
          factors.
        is_a: ENVO_01000744
        meaning: 'ENVO:03501344'
      ENVO_03501345:
        title: temporary residence
        description: A human dwelling which is provided to one or more persons on
          a short-term basis.
        is_a: ENVO_01000744
        meaning: 'ENVO:03501345'
      ENVO_01000524:
        title: outhouse
        description: An outhouse is a small structure, separate from a main building,
          which covers a pit latrine or a dry toilet.
        is_a: ENVO_00000073
        meaning: 'ENVO:01000524'
      ENVO_01000531:
        title: covered latrine
        description: A covered latrine is a building which comprises a latrine sheltered
          by an outhouse.
        is_a: ENVO_00000073
        meaning: 'ENVO:01000531'
      ENVO_01000532:
        title: covered pit latrine
        description: A covered pit latrine is a building which comprises a pit latrine
          sheltered by an outhouse.
        is_a: ENVO_01000531
        meaning: 'ENVO:01000532'
      ENVO_01000533:
        title: covered pit latrine with slab floor
        description: A covered pit latrine with slab is a building which comprises
          a pit latrine with a slab floor sheltered by an outhouse.
        is_a: ENVO_01000532
        meaning: 'ENVO:01000533'
      ENVO_01000781:
        title: public building
        description: A building which is publically accessible.
        is_a: ENVO_00000073
        meaning: 'ENVO:01000781'
      ENVO_03501126:
        title: church building
        description: A building which is primarily used for Christian religious activities.
        is_a: ENVO_00000073
        meaning: 'ENVO:03501126'
