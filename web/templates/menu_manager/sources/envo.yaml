        meaning: 'PATO:0000366'
      PATO_0000367:
        title: right
        description: "A directional quality inhering in a bearer by virtue of the\
          \ bearer's direction that is similar to the direction of an object to the\
          \ north when it faces west."
        is_a: PATO_0000039
        meaning: 'PATO:0000367'
      PATO_0000370:
        title: up
        description: "A directional quality inhering in a bearer by virtue of the\
          \ bearer's direction from a lower to a higher point."
        is_a: PATO_0000039
        meaning: 'PATO:0000370'
      PATO_0001900:
        title: front
        description: "A directional quality inhering in a bearer by virtue of the\
          \ bearer's direction that is similar to the direction of an object to the\
          \ south when it faces north."
        is_a: PATO_0000039
        meaning: 'PATO:0001900'
      PATO_0001901:
        title: back
        description: "A directional quality inhering in a bearer by virtue of the\
          \ bearer's direction that is similar to the direction of an object to the\
          \ north when it faces south."
