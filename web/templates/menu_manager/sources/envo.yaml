        meaning: 'ENVO:01001803'
      ENVO_01000376:
        title: tropical marine semi-evergreen forest
        description: A semi-evergreen forest is a forest which undergoes a long dry
          season and, as a consequence, has a two-storey layer structure,  a dry canopy,
          a leaf litter layer that only decays during moist periods trees with very
          small leaves or which shed their leaves to conserve water and which flower
          during the dry season and grow during the wet season.
        is_a: ENVO_01001803
        meaning: 'ENVO:01000376'
      ENVO_01000392:
        title: tropical upper montane forest
        description: A montane forest which is located in a region subject to tropical
          climate patterns modulated by sufficient elevation to encounter upper montane
          climate patterns.
        is_a: ENVO_01001803
        meaning: 'ENVO:01000392'
      ENVO_01000393:
        title: tropical lower montane forest
        description: A montane forest which is located in a region subject to tropical
          climate patterns modulated by sufficient elevation to encounter lower montane
          climatic patterns.
        is_a: ENVO_01001803
        meaning: 'ENVO:01000393'
      ENVO_01000394:
        title: tropical freshwater swamp forest
        description: A freshwater swamp forest which is subject to tropical climate
          patterns.
        is_a: ENVO_01001803
        meaning: 'ENVO:01000394'
      ENVO_01000396:
        title: tropical sclerophyllous dry forest
        description: A sclerophyllous forest which is subject to tropical climate
          patterns.
        is_a: ENVO_01001803
        meaning: 'ENVO:01000396'
      ENVO_01000400:
        title: tropical thorn forest
        is_a: ENVO_01001803
        meaning: 'ENVO:01000400'
      ENVO_01000403:
        title: tropical mangrove
        is_a: ENVO_01001803
        meaning: 'ENVO:01000403'
      ENVO_01000435:
        title: montane forest
        is_a: ENVO_01001243
        meaning: 'ENVO:01000435'
      ENVO_01001457:
        title: cloud forest
        description: A montane forest ecosystem which 1) is evergreen, 2) present
          on mountains where there is frequent cloud and mist cover, 3) which has
          a large proportion of ferns and mosses in its plant communities, growing
          on all tree trunks and branches present in the ecosystem, and 3) harvests
          aerosolised water and adds it to the terrestrial water supply.
        is_a: ENVO_01000435
        meaning: 'ENVO:01001457'
      ENVO_01000432:
        title: swamp forest
        is_a: ENVO_01001243
        meaning: 'ENVO:01000432'
      ENVO_01000434:
        title: sclerophyllous forest
        is_a: ENVO_01001243
        meaning: 'ENVO:01000434'
      ENVO_01000768:
        title: primary forest
        description: 'Forest which originally covered a region before changes in the
          environment brought about by people. (Source: PHC)'
        is_a: ENVO_01001243
        meaning: 'ENVO:01000768'
      ENVO_03600038:
        title: experimental forest ecosystem
        description: A forest ecosystem which is designated for research.
        is_a: ENVO_01001243
        meaning: 'ENVO:03600038'
      ENVO_01001370:
        title: tundra ecosystem
        description: An ecosystem which 1) typically has monthly average temperatures
          below 10 degrees Celsius 2) has a low evapotranspiration ratio 3) is dominated
          by treeless terrain, covered by communities of low-growing vegetation such
          as dwarf shrubs, sedges and grasses, mosses, and lichens, 4) contains areas
          of soil underlain by permafrost with a thin active layer and 5) occurs in
          both polar and alpine regions (i.e., both high latitudes and high altitudes),
          and 5) does not have permanent snow or ice cover.
        is_a: ENVO_01001790
        meaning: 'ENVO:01001370'
      ENVO_01001371:
        title: alpine tundra ecosystem
        description: A tundra ecosystem which exists at high altitudes and where vegetation
          is stunted due to low temperatures and high winds.
        is_a: ENVO_01001370
        meaning: 'ENVO:01001371'
      ENVO_01001360:
        title: Paramo
        description: An alpine tundra ecosystem which exists above the continuous
          timberline but below the permanent snowline on elevated land in tropical
          regions.
        is_a: ENVO_01001371
        meaning: 'ENVO:01001360'
      ENVO_01001625:
        title: polar tundra ecosystem
        description: A tundra ecosystem which is subject to polar climatic conditions.
        is_a: ENVO_01001370
        meaning: 'ENVO:01001625'
      ENVO_01001245:
        title: woodland ecosystem
        description: An ecosystem which is determined by communities of plants with
          a tree growth form and in which members of those communities are spaced
          sufficiently far apart to allow sunlight to illuminate the understory.
        is_a: ENVO_01001790
        meaning: 'ENVO:01001245'
      ENVO_01000239:
        title: oak woodland
        description: An oak woodland is a woodland which has a tree community primarily
          composed of oak trees.
        is_a: ENVO_01001245
        meaning: 'ENVO:01000239'
      ENVO_01000240:
        title: conifer woodland
        description: A conifer woodland is a woodland which has a tree community primarily
          composed of coniferous trees, from the Division Pinophyta, also known as
          Coniferophyta or Coniferae.
        is_a: ENVO_01001245
        meaning: 'ENVO:01000240'
      ENVO_01000241:
        title: juniper woodland
        description: A juniper woodland is a woodland which has a tree community primarily
          composed of trees of the genus Juniperus.
        is_a: ENVO_01000240
        meaning: 'ENVO:01000241'
      ENVO_01000244:
        title: pinyon juniper woodland
        description: A pinyon juniper woodland is a conifer woodland which has a tree
          community primarily composed of trees of the subsection Cembroides of the
          genus Pinus and the genus Juniperus.
        is_a: ENVO_01000240
        meaning: 'ENVO:01000244'
      ENVO_01000347:
        title: montane conifer woodland
        description: A montane conifer woodland is a conifer woodland which is located
          within an altitude range that falls between mid-altitude forests and the
          tree line.
        is_a: ENVO_01000240
        meaning: 'ENVO:01000347'
      ENVO_01000949:
        title: lichen woodland
        description: A woodland which has an understory partially covered by lichen
          mats and tundra-like vegetation.
        is_a: ENVO_01000240
        meaning: 'ENVO:01000949'
      ENVO_01000374:
        title: dry woodland
        description: A dry woodland is a woodland which occurs in areas of rain shadow
          in a tropical marine climate,  receives very little rainfall,  typically
          has rapidly draining soils and trees which have adaptations to dry climates
          such as thick bark, small leaves, and the disposition to shed their leaves.
        is_a: ENVO_01001245
        meaning: 'ENVO:01000374'
      ENVO_01001787:
        title: aquatic ecosystem
        is_a: ENVO_01001110
        meaning: 'ENVO:01001787'
      ENVO_01001788:
        title: marine ecosystem
        is_a: ENVO_01001787
        meaning: 'ENVO:01001788'
      ENVO_01001629:
        title: polymetallic nodule ecosystem
        description: An ecosystem which is determined by the presence of rounded mineral
          concretions primarily composed of manganese hydroxides on the seafloor.
        is_a: ENVO_01001788
        meaning: 'ENVO:01001629'
      ENVO_01001789:
        title: freshwater ecosystem
        is_a: ENVO_01001787
        meaning: 'ENVO:01001789'
      ENVO_03605009:
        title: freshwater stream ecosystem
        description: An ecosystem in which the composition, structure, and function
          of resident ecological assemblages are primarily determined by a freshwater
          stream.
        is_a: ENVO_01001789
        meaning: 'ENVO:03605009'
      ENVO_00005801:
        title: rhizosphere
        description: The narrow region of soil that is directly influenced by root
          secretions and associated soil microorganisms.
        is_a: ENVO_01001110
        meaning: 'ENVO:00005801'
      ENVO_01001780:
        title: desert ecosystem
        description: An ecosystem in which the composition, structure, and function
          of resident ecological assemblages are primarily determined by a desert.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001780'
      ENVO_01000445:
        title: disturbed ecosystem
        description: An ecosystem which has been subject to a perturbation, that is,
          the ecosystem has undergone a pronounced change in response to a change
          in environmental conditions or other perturbation.
        is_a: ENVO_01001110
        meaning: 'ENVO:01000445'
      ENVO_01001364:
        title: climate system
        description: A system which consists of an atmosphere, hydrosphere, cryosphere,
          land surface, and  biosphere, forced or influenced by external processes.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001364'
      ENVO_01000739:
        title: habitat
        description: An environmental system which can sustain and allow the growth
          of an ecological population.
        is_a: ENVO_01001110
        meaning: 'ENVO:01000739'
      ENVO_01001452:
        title: Calyptra habitat
        description: A habitat which supports the persistence and growth of a population
          of Calyptra moths and which overlaps mesic meadows and edges and clearings
          in vegetated areas.
        is_a: ENVO_01000739
        meaning: 'ENVO:01001452'
      ENVO_01000930:
        title: ecological corridor
        description: An ecosystem which bridges two or more adjoining ecosystems and
          through which organisms may move or propagate.
        is_a: ENVO_01001110
        meaning: 'ENVO:01000930'
      ENVO_01000931:
        title: migration path
        description: An ecological corridor through which organisms move during a
          migration process.
        is_a: ENVO_01000930
        meaning: 'ENVO:01000931'
      ENVO_01000947:
        title: ecotone
        description: "An envirommental system which bridges two or more biomes and\
          \ which includes ecological communities which blend these biomes' phylogenetic\
          \ and phenotypic compositions."
        is_a: ENVO_01001110
        meaning: 'ENVO:01000947'
      ENVO_01000953:
        title: tree line ecotone
        description: An ecotone which overlaps at least one biome which supports the
          growth and persistence of trees and at least one that does not. Before ceasing
          altogether, tree growth becomes sparse and trees appear stunted as conditions
          become less favourable along this ecotone.
        is_a: ENVO_01000947
        meaning: 'ENVO:01000953'
      ENVO_01000948:
        title: polar tree-line ecotone
        description: An ecotone which bridges a subpolar coniferous forest biome and
          a tundra biome.
        is_a: ENVO_01000953
        meaning: 'ENVO:01000948'
      ENVO_01000954:
        title: alpine tree line ecotone
        description: A tree line ecotone across which trees cease to grow due to the
          low temperatures or duration of snow cover that occur at increased elevations
          above mean sea level.
        is_a: ENVO_01000953
        meaning: 'ENVO:01000954'
      ENVO_01000955:
        title: desert tree line ecotone
        description: A tree line ecotone across which trees cease to grow due to insufficient
          water availability due to a lack of water-based precipitation.
        is_a: ENVO_01000953
        meaning: 'ENVO:01000955'
      ENVO_01000956:
        title: desert-alpine tree line ecotone
        description: A tree line ecotone across which trees cease to grow due to insufficient
          water availability caused by exposure to increased solar radiation and a
          lack of rainfall.
        is_a: ENVO_01000955
        meaning: 'ENVO:01000956'
      ENVO_01000957:
        title: double tree line ecotone
        description: 'A tree line ecotone which contains gaps in tree coverage due
          to decreased biodiversity in tree-forming plant species: gaps are above
          the alpine tree line for some species yet below the desert tree line for
          others, and no species with intermediate tolerances are present.'
        is_a: ENVO_01000953
        meaning: 'ENVO:01000957'
      ENVO_01001032:
        title: environment determined by a biofilm on a plant surface
        description: An environmental system which has its properties and dynamics
          determined by a biofilm on the surface of a plant.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001032'
      ENVO_01001034:
        title: environment determined by a biofilm on an animal surface
        description: An environmental system which has its properties and dynamics
          determined by a biofilm on the surface of a animal.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001034'
      ENVO_01001035:
        title: environment determined by a biofilm on a fungal surface
        description: An environmental system which has its properties and dynamics
          determined by a biofilm on the surface of a fungus.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001035'
      ENVO_01001051:
        title: environment determined by a biofilm on a non-saline surface
        description: An environmental system which has its properties and dynamics
          determined by a biofilm on a surface which is exposed to non-saline materials.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001051'
      ENVO_01001055:
        title: environment associated with an animal part or small animal
        description: An environmental system determined by part of a living or dead
          animal, or a whole small animal.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001055'
      ENVO_01001176:
        title: environment associated with an aquatic invertebrate
        description: An environment which has its properties and composition largely
          determined by the presence of a metazoan which lacks a vetebral column and
          which has a habitat that is found in an aquatic environmental system.
        is_a: ENVO_01001055
        meaning: 'ENVO:01001176'
      ENVO_01001056:
        title: environment determined by a biofilm on a saline surface
        description: An environmental system which has its properties and dynamics
          determined by a biofilm on a surface which is exposed to saline materials.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001056'
      ENVO_01001057:
        title: environment associated with a plant part or small plant
        description: An environmental system determined by part of a living or dead
          plant, or a whole small plant.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001057'
      ENVO_01001058:
        title: environment associated with a fungal tissue
        description: An environmental system determined by part of a living or dead
          fungus.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001058'
      ENVO_01001167:
        title: ecosystem fragment
        description: An ecosystem which has been causally isolated from a larger ecosystem
          within which it was previously embedded, such that the direct exchange of
          materials, resources, and energy between these systems is severely or entirely
          curtailed.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001167'
      ENVO_01001404:
        title: ecological province
        description: An ecosystem which is of larger scale than an ecoregion and which
          includes smaller ecosystems determined by the presence of ecological assemblages
          that have at least some cohesion over evolutionary time frames.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001404'
      ENVO_01000951:
        title: natural environment
        description: "An environmental system in which minimal to no anthropisation\
          \ has occurred and non-human agents are the primary determinants of the\
          \ system's dynamics and composition."
        is_a: ENVO_01000254
        meaning: 'ENVO:01000951'
      ENVO_00000359:
        title: natural monument
        description: A natural environment which has been designated by a competent
          authority as having outstanding or unique value because of its rarity, aesthetic
          qualities, or cultural significance.
        is_a: ENVO_01000951
        meaning: 'ENVO:00000359'
      ENVO_01001226:
        title: terrestrial natural environment
        description: A natural environment which is located on a land mass.
        is_a: ENVO_01000951
        meaning: 'ENVO:01001226'
      ENVO_01001227:
        title: aquatic natural environment
        description: A natural environment which is within a water body.
        is_a: ENVO_01000951
        meaning: 'ENVO:01001227'
      ENVO_01001701:
        title: tropical environment
        description: An environment which has a climate with continually high temperatures
          and with considerable precipitation, at least during part of the year.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001701'
      ENVO_01000303:
        title: endolithic environment
        description: An endolithic environment is an environment that exists within
          solid rock.
        is_a: ENVO_01000254
        meaning: 'ENVO:01000303'
      ENVO_01000997:
        title: environmental system determined by a quality
        description: An environmental system which is determined by materials bearing
          roughly homogeneous qualities.
        is_a: ENVO_01000254
        meaning: 'ENVO:01000997'
      ENVO_01000304:
        title: high pressure environment
        description: A high pressure environment is an environment in which all material
          entities are exposed to a high ratio of force per unit area.
        is_a: ENVO_01000997
        meaning: 'ENVO:01000304'
      ENVO_01000305:
        title: high temperature environment
        description: A high temperature environment is an environment in which material
          entities are exposed to increased levels of heat radiation or which have
          molecules or atoms moving randomly with increased levels of average kinietic
          energy.
        is_a: ENVO_01000997
        meaning: 'ENVO:01000305'
      ENVO_01000318:
        title: extreme high temperature environment
        description: An extreme high temperature environment is a high temperature
          environment in which entities are exposed to temperatures above 80 degrees
          Celsius.
        is_a: ENVO_01000305
        meaning: 'ENVO:01000318'
      ENVO_01000317:
        title: aquatic environment
        description: An environment whose dynamics are strongly influenced by water.
        is_a: ENVO_01000997
        meaning: 'ENVO:01000317'
      ENVO_01000407:
        title: littoral zone
        description: An aquatic environment which is the part of a sea, lake, or river
          that is close to the shore.
        is_a: ENVO_01000317
        meaning: 'ENVO:01000407'
      ENVO_01000125:
        title: marine littoral zone
        description: The marine littoral zone is a littoral zone which extends, approximately,
          from the spray region above the high tide mark to the edge of the coninental
          shelf.
        is_a: ENVO_01000407
        meaning: 'ENVO:01000125'
      ENVO_01000409:
        title: freshwater littoral zone
        description: A freshwater littoral zone is a littoral zone which extends offshore
          from the shore of a freshwater body of water to the limit of occupancy of
          rooted plants.
        is_a: ENVO_01000407
        meaning: 'ENVO:01000409'
      ENVO_01000306:
        title: freshwater environment
        description: An aquatic environment which is determined by freshwater.
        is_a: ENVO_01000317
        meaning: 'ENVO:01000306'
      ENVO_01000307:
        title: saline water environment
        description: An environmental system which has its properties and dynamics
          determined by saline water.
        is_a: ENVO_01000317
        meaning: 'ENVO:01000307'
      ENVO_01000321:
        title: sea water environment
        description: An environmental system determined by seawater.
        is_a: ENVO_01000307
        meaning: 'ENVO:01000321'
      ENVO_01000322:
        title: brackish water environment
        description: An environment determined by the presence of brackish water.
        is_a: ENVO_01000307
        meaning: 'ENVO:01000322'
      ENVO_01001043:
        title: hypersaline water environment
        description: An environmental system which has its properties and dynamics
          determined by hypersaline water.
        is_a: ENVO_01000307
        meaning: 'ENVO:01001043'
      ENVO_01001042:
        title: sterile water environment
        description: An environmental system which has its properties and dynamics
          determined by sterile water.
        is_a: ENVO_01000317
        meaning: 'ENVO:01001042'
      ENVO_01000314:
        title: high osmolarity environment
        description: A high osmolarity environment is an environment in which entities
          are exposed to high concentrations of solutes.
        is_a: ENVO_01000997
        meaning: 'ENVO:01000314'
      ENVO_01001040:
        title: saline environment
        description: An environment which is determined by materials which bear significant
          concentrations of salts.
        is_a: ENVO_01000314
        meaning: 'ENVO:01001040'
      ENVO_01001053:
        title: saline aerosol environment
        description: An environmental system which has its properties and dynamics
          determined by a saline aerosol.
        is_a: ENVO_01001040
        meaning: 'ENVO:01001053'
      ENVO_01000310:
        title: haline environment
        description: A haline environment is an environment in which entities are
          exposed to high concentrations of salt, typically above 2 molar.
        is_a: ENVO_01000314
        meaning: 'ENVO:01000310'
      ENVO_01000315:
        title: acidic environment
        description: An acidic environment is an environment in which material entities
          are exposed to a low pH.
        is_a: ENVO_01000997
        meaning: 'ENVO:01000315'
      ENVO_01000316:
        title: alkaline environment
        description: An alkaline environment is an environment in which entities are
          exposed to high pH, typically greater than a pH of 9.
        is_a: ENVO_01000997
        meaning: 'ENVO:01000316'
      ENVO_01001003:
        title: non-saline environment
        is_a: ENVO_01000997
        meaning: 'ENVO:01001003'
      ENVO_01001044:
        title: soil environment
        description: An environmental system which has its properties and dynamics
          determined by soil.
        is_a: ENVO_01000997
        meaning: 'ENVO:01001044'
      ENVO_01001048:
        title: sediment environment
        description: An environmental system which has its properties and dynamics
          determined by sediment.
        is_a: ENVO_01000997
        meaning: 'ENVO:01001048'
      ENVO_01001049:
        title: non-saline sediment environment
        description: An environmental system which has its properties and dynamics
          determined by sediment permeated by non-saline water.
        is_a: ENVO_01001048
        meaning: 'ENVO:01001049'
      ENVO_01001050:
        title: saline sediment environment
        description: An environmental system which has its properties and dynamics
          determined by sediment permeated by saline water.
        is_a: ENVO_01001048
        meaning: 'ENVO:01001050'
      ENVO_01001052:
        title: aerosol environment
        description: An environmental system which has its properties and dynamics
          determined by an aerosol.
        is_a: ENVO_01000997
        meaning: 'ENVO:01001052'
      ENVO_01001054:
        title: non-saline aerosol environment
        description: An environmental system which has its properties and dynamics
          determined by an aerosol with a low concentration of dissolved solutes.
        is_a: ENVO_01001052
        meaning: 'ENVO:01001054'
      ENVO_01001840:
        title: safe environment
        description: An environment in which material entities have a low likelihood
          of being damaged or destroyed.
        is_a: ENVO_01000997
        meaning: 'ENVO:01001840'
      ENVO_01001839:
        title: safe environment for living organisms
        description: An environment in which living organisms have a low likelihood
          of being harmed or killed
        is_a: ENVO_01001840
        meaning: 'ENVO:01001839'
      ENVO_03500008:
        title: safe environment for human presence
        description: An environment in which humans have a low likelihood of being
          harmed or killed.
        is_a: ENVO_01001839
        meaning: 'ENVO:03500008'
      ENVO_03500007:
        title: noisy environment
        description: An environment in which entities are exposed to either excessive
          or constant sound.
        is_a: ENVO_01000997
        meaning: 'ENVO:03500007'
      ENVO_03500009:
        title: attractive environment
        description: An environment which includes components which are deemed to
          be aesthetically pleasing by a population of humans.
        is_a: ENVO_01000997
        meaning: 'ENVO:03500009'
      ENVO_03500010:
        title: shady environment
        description: An environmental system which is shielded from direct stellar
          irradiation by material entities.
        is_a: ENVO_01000997
        meaning: 'ENVO:03500010'
      ENVO_03500011:
        title: violent environment
        description: An environment in which humans are exposed to regularly occurring
          physical or emotional violence.
        is_a: ENVO_01000997
        meaning: 'ENVO:03500011'
      ENVO_01000308:
        title: extraterrestrial environment
        description: "An environmental system which is located beyond the Earth's\
          \ exosphere and away from the Earth's core."
        is_a: ENVO_01000254
        meaning: 'ENVO:01000308'
      ENVO_01000309:
        title: cold environment
        description: An environment which has a lower temperature than some local
          or global average.
        is_a: ENVO_01000254
        meaning: 'ENVO:01000309'
      ENVO_01000313:
        title: anthropogenic environment
        description: An anthropogenic environment is an environmental system which
          is the product of human activity.
        is_a: ENVO_01000254
        meaning: 'ENVO:01000313'
      ENVO_01000311:
        title: cultivated environment
        description: A cultivated environment is an environment that has been modified
          by humans by the preparation of the land, usually for the purposes of growing
          crops.
        is_a: ENVO_01000313
        meaning: 'ENVO:01000311'
      ENVO_01000312:
        title: culturing environment
        description: A culturing environment is an environment which is maintained
          by humans for the purposes of preparing cell, organ, tissue and plant tissue
          cultures.
        is_a: ENVO_01000313
        meaning: 'ENVO:01000312'
      ENVO_01001405:
        title: laboratory environment
        description: An anthropogenic environment which is bounded by the building
          envelope of a laboratory and in which a system of manufactured products
          exert control on one or more of its environmental conditions.
        is_a: ENVO_01000313
        meaning: 'ENVO:01001405'
      ENVO_03500006:
        title: food desert
        description: An anthropogenic environment in which populations of humans have
          limited acess to affordable and nutritious food.
        is_a: ENVO_01000313
        meaning: 'ENVO:03500006'
      ENVO_03501323:
        title: residential environment
        description: An anthropogenic environment which provides long-term shelter
          for its inhabitants.
        is_a: ENVO_01000313
        meaning: 'ENVO:03501323'
      ENVO_03501331:
        title: healthcare environment
        description: An anthropogenic environment which is bounded by a healthcare
          facility in which health care services are provided by specialized staff
          and equipment.
        is_a: ENVO_01000313
        meaning: 'ENVO:03501331'
      ENVO_03501332:
        title: occupational environment
        description: An anthropogenic environment which is the product of a particular
          human occupational acitivity.
        is_a: ENVO_01000313
        meaning: 'ENVO:03501332'
      ENVO_03501333:
        title: child care environment
        description: An anthropogenic environment which is designed for child care.
        is_a: ENVO_01000313
        meaning: 'ENVO:03501333'
      ENVO_03501339:
        title: household environment
        description: An anthropogenic environment which is bounded by a human dwelling.
        is_a: ENVO_01000313
        meaning: 'ENVO:03501339'
      ENVO_01000998:
        title: environmental system determined by a material
        description: "An environmental system within which an environmental material\
          \ strongly influences the system's composition and properties."
        is_a: ENVO_01000254
        meaning: 'ENVO:01000998'
      ENVO_01001029:
        title: fecal environment
        description: An environmental system which has its properties and dynamics
          determined by feces.
        is_a: ENVO_01000998
        meaning: 'ENVO:01001029'
      ENVO_01000320:
        title: marine environment
        description: A marine environment and enviroment which is determined by a
          marine water body.
        is_a: ENVO_01000254
        meaning: 'ENVO:01000320'
      ENVO_01001703:
        title: polar environment
        description: An environment which is located in a part of an astronomical
          body subject to polar climatic conditions.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001703'
      ENVO_2100000:
        title: anatomical entity environment
        description: An environment which is determined by an anatomical entity.
        is_a: ENVO_01000254
        meaning: 'ENVO:2100000'
      ENVO_01000929:
        title: mushroom environment
        is_a: ENVO_2100000
        meaning: 'ENVO:01000929'
      ENVO_01001030:
        title: environment determined by a metazoan secretion
        description: An environmental system which has its properties and dynamics
          determined by a bodily secretion of a metazoan.
        is_a: ENVO_2100000
        meaning: 'ENVO:01001030'
      ENVO_01001033:
        title: digestive tract environment
        description: An environmental system which has its properties and dynamics
          determined by a digestive tract.
        is_a: ENVO_2100000
        meaning: 'ENVO:01001033'
      ENVO_2100002:
        title: intestine environment
        description: An environmental system determined by an intestine.
        is_a: ENVO_01001033
        meaning: 'ENVO:2100002'
      ENVO_01001041:
        title: fungi-associated environment
        description: An environmental system determined by a fungal structure.
        is_a: ENVO_2100000
        meaning: 'ENVO:01001041'
      ENVO_01001306:
        title: bone element environment
        description: An environment which is determined by a bone element.
        is_a: ENVO_2100000
        meaning: 'ENVO:01001306'
      ENVO_08000002:
        title: mouth environment
        description: An environment that is determined by a mouth.
        is_a: ENVO_2100000
        meaning: 'ENVO:08000002'
      ENVO_2100004:
        title: integumental system environment
        is_a: ENVO_2100000
        meaning: 'ENVO:2100004'
      ENVO_2100003:
        title: skin environment
        description: An environment determined by an area or zone of skin tissue.
        is_a: ENVO_2100004
        meaning: 'ENVO:2100003'
      ENVO_08000001:
        title: axilla skin environment
        description: An environment that is determined by an axilla skin.
        is_a: ENVO_2100003
        meaning: 'ENVO:08000001'
      ENVO_2100005:
        title: face skin environment
        is_a: ENVO_2100003
        meaning: 'ENVO:2100005'
      ENVO_2100006:
        title: feather environment
        is_a: ENVO_2100004
        meaning: 'ENVO:2100006'
      ENVO_01000999:
        title: rhizosphere environment
        description: An environmental system determined by the presence of a plant
          rhizosphere.
        is_a: ENVO_01000254
        meaning: 'ENVO:01000999'
      ENVO_01001000:
        title: environmental system determined by an organism
        description: An environmental system which is determined by a living organism.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001000'
      ENVO_01001001:
        title: plant-associated environment
        description: An environmental system determined by a green plant.
        is_a: ENVO_01001000
        meaning: 'ENVO:01001001'
      ENVO_01001002:
        title: animal-associated environment
        description: An environmental system determined by an animal.
        is_a: ENVO_01001000
        meaning: 'ENVO:01001002'
      ENVO_01001179:
        title: cnidarian-associated environment
        description: An environmental system determined by a cnidarian or part of
          a cnidarian.
        is_a: ENVO_01001002
        meaning: 'ENVO:01001179'
      ENVO_01001031:
        title: environment determined by a plant substance
        description: An environmental system which has its properties and dynamics
          determined by a substance produced by a plant.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001031'
      ENVO_01001046:
        title: planetary subsurface environment
        description: An environmental system which has its properties and dynamics
          determined by the subsurface zone of a planet.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001046'
      ENVO_01001047:
        title: non-saline planetary subsurface environment
        description: An environmental system which has its properties and dynamics
          determined by those parts of a planetary subsurface zone which are not saline.
        is_a: ENVO_01001046
        meaning: 'ENVO:01001047'
      ENVO_01001180:
        title: Bondon cheese environment
        description: An environment which has its properties and composition determined
          by a portion of Bondon cheese.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001180'
      ENVO_01001702:
        title: subtropical environment
        description: An environment which has a climate with warm temperatures and
          with meagre precipitation.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001702'
      ENVO_01001704:
        title: subpolar environment
        description: An environment which is located in a part of an astronomical
          body subject to subpolar climatic conditions.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001704'
      ENVO_01001705:
        title: temperate environment
        description: An environment which is located in a part of an astronomical
          body subject to temperate climatic conditions.
        is_a: ENVO_01000254
        meaning: 'ENVO:01001705'
      ENVO_03501101:
        title: outdoor environment
        description: An environmental system which is not sheltered.
        is_a: ENVO_01000254
        meaning: 'ENVO:03501101'
      ENVO_03501311:
        title: environmental monitoring area
        description: An environmental system where environmental monitoring processes
          are in effect.
        is_a: ENVO_01000254
        meaning: 'ENVO:03501311'
      ENVO_03501312:
        title: environmental monitoring program area
        description: An environmental monitoring area which is under observation by
          humans belonging to organisations with a legislative mandate to monitor
          the area.
        is_a: ENVO_03501311
        meaning: 'ENVO:03501312'
      ENVO_03501313:
        title: food production environmental monitoring zone
        description: An environmental monitoring program area within a food production
          facility.
        is_a: ENVO_03501312
        meaning: 'ENVO:03501313'
      ENVO_03501318:
        title: hygienic food production area
        description: An environmental system which is part of a food production facility
          and whose boundaries are defined by hygienic requirements.
        is_a: ENVO_01000254
        meaning: 'ENVO:03501318'
      ENVO_03501319:
        title: food prossessing non-production area
        description: A hygienic food production area which is not an immediate part
          of a food manufacturing process area.
        is_a: ENVO_03501318
        meaning: 'ENVO:03501319'
      ENVO_03501320:
        title: food production low-risk contamination area
        description: A hygienic food production area containing products having a
          low risk of contamination.
        is_a: ENVO_03501318
        meaning: 'ENVO:03501320'
      ENVO_03501321:
        title: food production medium-risk contamination area
        description: A hygienic food production area in which general food processing
          occurs.
        is_a: ENVO_03501318
        meaning: 'ENVO:03501321'
      ENVO_03501322:
        title: food production high-risk contamination area
        description: A hygienic food production area containing food products that
          are not subjected to subsequent microbial decontamination, and where there
          is a risk of pathogen or microbial spoilage growth.
        is_a: ENVO_03501318
        meaning: 'ENVO:03501322'
      ENVO_00000012:
        title: hydrographic feature
        description: A geographical feature associated with water.
        is_a: RO_0002577
        meaning: 'ENVO:00000012'
      ENVO_00000017:
        title: saline hydrographic feature
        description: A geographical feature associated with water with a halinity
          above 30 ppt (roughly 35 g/L).
        is_a: ENVO_00000012
        meaning: 'ENVO:00000017'
      ENVO_00000104:
        title: undersea feature
        description: A hydrographic feature which is located below the surface of
          a marine water body.
        is_a: ENVO_00000012
        meaning: 'ENVO:00000104'
      ENVO_00000190:
        title: abyssal feature
        description: Feature on the ocean floor at a depth of 3500 - 6000 meters.
        is_a: ENVO_00000104
        meaning: 'ENVO:00000190'
      ENVO_01000058:
        title: kelp forest
        description: Kelp forests are underwater areas with a high density of kelp.
          They are recognized as one of the most productive and dynamic ecosystems
          on Earth. Smaller areas of anchored kelp are called kelp beds.
        is_a: ENVO_00000104
        meaning: 'ENVO:01000058'
      ENVO_01001899:
        title: reef
        is_a: ENVO_00000012
        meaning: 'ENVO:01001899'
      ENVO_00000130:
        title: rocky reef
        description: A ridge of rocks, lying near the surface of the sea, which may
          be visible at low tide, but is usually covered by water.
        is_a: ENVO_01001899
        meaning: 'ENVO:00000130'
      ENVO_01000150:
        title: marine subtidal rocky reef
        description: A rocky reef which is located in the subtidal zone of a marine
          water body.
        is_a: ENVO_00000130
        meaning: 'ENVO:01000150'
      ENVO_00000149:
        title: artificial reef
        description: Chains of rocks or coral at or near the surface of water constructed
          by man.
        is_a: ENVO_01001899
        meaning: 'ENVO:00000149'
      ENVO_01000143:
        title: marine reef
        description: A reef which is located in a marine water body.
        is_a: ENVO_01001899
        meaning: 'ENVO:01000143'
      ENVO_00000150:
        title: coral reef
        description: A marine reef which is composed primarily of aragonite structures
          produced by living organisms, found in shallow, low-nutrient waters.
        is_a: ENVO_01000143
        meaning: 'ENVO:00000150'
      ENVO_01000144:
        title: marine coral reef flat zone
        is_a: ENVO_01000143
        meaning: 'ENVO:01000144'
      ENVO_01000145:
        title: marine coral reef back reef
        is_a: ENVO_01000143
        meaning: 'ENVO:01000145'
      ENVO_01000146:
        title: marine coral reef crest
        is_a: ENVO_01000143
        meaning: 'ENVO:01000146'
      ENVO_01000147:
        title: marine coral reef fore reef
        is_a: ENVO_01000143
        meaning: 'ENVO:01000147'
      ENVO_01000148:
        title: marine coral reef buttress zone
        is_a: ENVO_01000143
        meaning: 'ENVO:01000148'
      ENVO_01000149:
        title: marine coral reef deep fore reef
        is_a: ENVO_01000143
        meaning: 'ENVO:01000149'
      ENVO_01000161:
        title: marine sponge reef
        description: A marine sponge reef is marine reefs primarily built by marine
          sponges. The primary frame-building sponges are all members of the order
          Hexactinosa. They are found only in glacier-scoured troughs of low-angle
          continental shelf. The seafloor is stable and consists of rock, coarse gravel,
          and large boulders.
        is_a: ENVO_01000143
        meaning: 'ENVO:01000161'
      ENVO_01001386:
        title: mussel reef
        description: A marine reef which is primarily composed of self-adhered or
          conglomerated mussel shells.
        is_a: ENVO_01000143
        meaning: 'ENVO:01001386'
      ENVO_01001380:
        title: neritic mussel reef
        description: A marine reef which is located on a shelf (i.e. in the neritic
          zone) and primarily composed of self-adhered or conglomerated mussel shells.
        is_a: ENVO_01001386
        meaning: 'ENVO:01001380'
      ENVO_01001381:
        title: oceanic mussel reef
        description: A marine reef which is present in the depths beyond (offshore
          relative to) the continental shelf and primarily composed of self-adhered
          or conglomerated mussel shells.
        is_a: ENVO_01001386
        meaning: 'ENVO:01001381'
      ENVO_01001385:
        title: Bathymodiolus-dominated oceanic mussel reef
        description: An oceanic mussel reef which is primarily settled by mussels
          of the genus Bathymodiolus and primarily composed of self-adhered or conglomerated
          mussel shells
        is_a: ENVO_01001381
        meaning: 'ENVO:01001385'
      ENVO_00000475:
        title: inlet
        description: An opening of the sea into the land, or of a lake into its shore.
        is_a: ENVO_00000012
        meaning: 'ENVO:00000475'
      ENVO_00000137:
        title: coastal inlet
        description: An opening of the sea into the land.
        is_a: ENVO_00000475
        meaning: 'ENVO:00000137'
      ENVO_00000032:
        title: bay
        description: An area of water bordered by land on three sides.
        is_a: ENVO_00000137
        meaning: 'ENVO:00000032'
      ENVO_00000039:
        title: fjord
        description: A long and narrow sea inlet with high steeply sloped walled sides.
          A fjord is a landform created during a period of glaciation.
        is_a: ENVO_00000137
        meaning: 'ENVO:00000039'
      ENVO_00000138:
        title: cove
        description: A circular or round inlet with a narrow entrance.
        is_a: ENVO_00000137
        meaning: 'ENVO:00000138'
      ENVO_00000393:
        title: sound
        description: A large sea or ocean inlet larger than a bay, deeper than a bight,
          wider than a fjord, or it may identify a narrow sea or ocean channel between
          two bodies of land.
        is_a: ENVO_00000137
        meaning: 'ENVO:00000393'
      ENVO_00000476:
        title: lake inlet
        description: An opening of a lake into its shore.
        is_a: ENVO_00000475
        meaning: 'ENVO:00000476'
      ENVO_00000167:
        title: bar
        description: 'A linear shoaling landform feature within a body of water. Bars
          tend to be long and narrow (linear) and develop where a current (or waves)
          promote deposition of granular material, resulting in localized shallowing
          (shoaling) of the water. Bars can appear in the sea, in a lake, or in a
          river. They are typically composed of sand, although could be of any granular
          matter that the moving water has access to and is capable of shifting around
          (for example, soil, silt, gravel, cobble, shingle, or even boulders). The
          grain size of the material comprising a bar is related: to the size of the
          waves or the strength of the currents moving the material, but the availability
          of material to be worked by waves and currents is also important.'
        is_a: ENVO_00000012
        meaning: 'ENVO:00000167'
      ENVO_00000306:
        title: spit
        description: A deposition landform found off coasts. A spit is a type of bar
          or beach that develops where a re-entrant occurs, such as at a cove, bay,
          ria, or river mouth. Spits are formed by the movement of sediment (typically
          sand) along a shore by a process known as longshore drift. Where the direction
          of the shore turns inland (reenters) the longshore current spreads out or
          dissipates. No longer able to carry the full load, much of the sediment
          is dropped. This causes a bar to build out from the shore, eventually becoming
          a spit.
        is_a: ENVO_00000167
        meaning: 'ENVO:00000306'
      ENVO_00000420:
        title: tombolo
        description: A deposition landform such as a spit or bar which forms a narrow
          piece of land between an island or offshore rock and a mainland shore, or
          between two islands or offshore rocks. They usually form because the island
          causes wave refraction, depositing sand and shingle moved by longshore drift
          in each direction around the island where the waves meet. Eustatic sea level
          rise may also contribute to accretion as material is pushed up with rising
          sea levels.
        is_a: ENVO_00000167
        meaning: 'ENVO:00000420'
      ENVO_00000168:
        title: blowhole
        description: A hole in coastal rock through which sea water is forced by a
          rising tide or waves and spurted through an outlet into the air.
        is_a: ENVO_00000012
        meaning: 'ENVO:00000168'
      ENVO_00000178:
        title: levee
        description: An artificial slope or wall, usually earthen, which parallels
          the course of a river, built for the purpose of containing the river.
        is_a: ENVO_00000012
        meaning: 'ENVO:00000178'
      ENVO_00000272:
        title: confluence
        description: The point where a tributary joins a more major river.
        is_a: ENVO_00000012
        meaning: 'ENVO:00000272'
      ENVO_00000314:
        title: alluvial fan
        description: A fan-shaped deposit formed where a fast flowing stream flattens,
          slows, and spreads typically at the exit of a canyon onto a flatter plain.
        is_a: ENVO_00000012
        meaning: 'ENVO:00000314'
      ENVO_00000315:
        title: bajada
        description: A convergence of neighboring alluvial fans into a single apron
          of deposits against a slope.
        is_a: ENVO_00000314
        meaning: 'ENVO:00000315'
      ENVO_2000004:
        title: algal bloom
        description: A feature that arises from a rapid increase or accumulation in
          the population of algae (typically microscopic) in an aquatic system.
        is_a: ENVO_00000012
        meaning: 'ENVO:2000004'
      ENVO_01000057:
        title: marine algal bloom
        description: A marine algal bloom is a rapid increase or accumulation in the
          population of algae in a marine system. Typically, only one or a small number
          of phytoplankton  species are involved. Although there is no officially
          recognized threshold level, algae can be considered to be blooming at concentrations
          of hundreds to thousands of cells per milliliter, depending on the severity.
        is_a: ENVO_2000004
        meaning: 'ENVO:01000057'
      ENVO_2000005:
        title: freshwater algal bloom
        description: An algal bloom that is located in freshwater. Freshwater algal
          blooms are the result of an excess of nutrients, particularly some phosphates.
        is_a: ENVO_2000004
        meaning: 'ENVO:2000005'
      ENVO_03600071:
        title: cyanobacterial bloom
        description: A feature which arises from a rapid multiplication of cyanobacteria,
          causing marked visible discoloration of the water.
        is_a: ENVO_00000012
        meaning: 'ENVO:03600071'
      ENVO_01001469:
        title: observing system
        description: A system of constructed and manufactured products which are used
          by humans to produce data, information, or knowledge about material, immaterial,
          or processual entities.
        is_a: RO_0002577
        meaning: 'ENVO:01001469'
      ENVO_01001470:
        title: observatory system
        description: An observing system which generates long-term data about one
          or more entities of interest, typically using standardised methodology.
        is_a: ENVO_01001469
        meaning: 'ENVO:01001470'
      ENVO_01001471:
        title: atmospheric observatory system
        is_a: ENVO_01001470
        meaning: 'ENVO:01001471'
      ENVO_01001472:
        title: marine observatory system
        is_a: ENVO_01001470
        meaning: 'ENVO:01001472'
      ENVO_01001473:
        title: terrestrial observatory system
        is_a: ENVO_01001470
        meaning: 'ENVO:01001473'
      ENVO_01001474:
        title: astronomical observatory system
        is_a: ENVO_01001470
        meaning: 'ENVO:01001474'
      ENVO_01001475:
        title: omics observatory system
        description: An observatory system which includes components used to generate
          (meta)genomic, (meta)transcriptomic, (meta)proteomic, metabolomic, and other
          omic data, information, and knowledge.
        is_a: ENVO_01001470
        meaning: 'ENVO:01001475'
      ENVO_01001497:
        title: carbonate system of ocean water
        description: A system which is composed of carbon-based chemical entities
          dissolved in or otherwise part of an ocean or sea and the atmosphere adjacent
          to it, undergoing constant exchange through biogeochemical cycling.
        is_a: RO_0002577
        meaning: 'ENVO:01001497'
      ENVO_03501110:
        title: constructed transport system
        description: A system which has components that have been constructed to allow
          the movement of people or goods.
        is_a: RO_0002577
        meaning: 'ENVO:03501110'
      ENVO_03501111:
        title: public transit system
        description: A constructed transport system which is owned by a government
          or other form of public representation.
        is_a: ENVO_03501110
        meaning: 'ENVO:03501111'
      ENVO_03501116:
        title: rapid transit system
        description: A public transit system which is owned by a government or other
          form of public representation.
        is_a: ENVO_03501111
        meaning: 'ENVO:03501116'
      ENVO_03501351:
        title: ground transport
        description: A constructed transport system which is designed to transport
          people or objects over land, but not water or air.
        is_a: ENVO_03501110
        meaning: 'ENVO:03501351'
      ENVO_03501356:
        title: conveyor system
        description: A system which is composed of one or more machines that can continuously
          transport material from one location to at least one other location.
        is_a: RO_0002577
        meaning: 'ENVO:03501356'
      ENVO_03501362:
        title: belt conveyor system
        description: A conveyor system which uses conveyer belt machines to transport
          material.
        is_a: ENVO_03501356
        meaning: 'ENVO:03501362'
      ENVO_03501365:
        title: bucket conveyor
        description: A conveyor system which is used to transport granular material
          vertically in open containers.
        is_a: ENVO_03501356
        meaning: 'ENVO:03501365'
      ENVO_03501366:
        title: screw conveyor
        description: A conveyor system which consists of a helicoid flight mounted
          in a tube or shaft.
        is_a: ENVO_03501356
        meaning: 'ENVO:03501366'
      ENVO_03501367:
        title: pneumatic conveyor
        description: A conveyor system which transports dry bulk particulate or granular
          material through a pipeline by a stream of gas.
        is_a: ENVO_03501356
        meaning: 'ENVO:03501367'
      ENVO_03501358:
        title: processing line
        description: A system which consists of manufacturing equipment that performs
          manufacturing processes in a linear fashion.
        is_a: RO_0002577
        meaning: 'ENVO:03501358'
      BFO_0000024:
        title: fiat object
        is_a: BFO_0000040
        meaning: 'BFO:0000024'
      ENVO_01003020:
        title: fiat part of an astronomical object
        description: A part of an environmental system whose boundaries are determined
          by fiat.
        is_a: BFO_0000024
        meaning: 'ENVO:01003020'
      ENVO_00000004:
        title: administrative region
        is_a: ENVO_01003020
        meaning: 'ENVO:00000004'
      ENVO_00000005:
        title: first-order administrative region
        description: A primary administrative division of a country, such as a state
          in the United States.
        is_a: ENVO_00000004
        meaning: 'ENVO:00000005'
      ENVO_00000006:
        title: second-order administrative region
        description: A subdivision of a first-order administrative division.
        is_a: ENVO_00000004
        meaning: 'ENVO:00000006'
      ENVO_00000007:
        title: third-order administrative region
        description: A subdivision of a second-order administrative division.
        is_a: ENVO_00000004
        meaning: 'ENVO:00000007'
      ENVO_00000008:
        title: fourth-order administrative region
        description: A subdivision of a third-order administrative division.
        is_a: ENVO_00000004
        meaning: 'ENVO:00000008'
      ENVO_00000135:
        title: buffer zone
        description: A geographical region that serves the purpose of keeping two
          or more other areas (often, but not necessarily, countries) distant from
          one another, for whatever reason.
        is_a: ENVO_00000004
        meaning: 'ENVO:00000135'
      ENVO_00000136:
        title: demilitarized zone
        description: A geographical area, usually the frontier or boundary between
          two or more military powers (or alliances), where military activity is not
          permitted, usually by peace treaty, armistice or other bilateral or multilateral
          agreement.
        is_a: ENVO_00000135
        meaning: 'ENVO:00000136'
      ENVO_01001567:
        title: protected area
        description: An environmental zone which 1) contains ecosystems, constructed
          features, or other entities deemed to be of natural, historical, cultural,
          or other significance and 2) has been afforded legal protections restricting
          one or more forms of use by a competent authority.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001567'
      ENVO_00000358:
        title: area of protected biodiversity
        description: An area of land or of a body of water in which management practices,  through
          legal or other effective means, prioritise the protection and maintenance
          of biological diversity, and of natural and associated cultural resources.
        is_a: ENVO_01001567
        meaning: 'ENVO:00000358'
      ENVO_00000360:
        title: area of national forest
        description: A protected forest or woodland area in the United States. National
          forests are controlled by the federal government and managed by the United
          States Forest Service, under the direction of the United States Department
          of Agriculture.
        is_a: ENVO_00000358
        meaning: 'ENVO:00000360'
      ENVO_00000361:
        title: site of special scientific interest
        description: "A conservation designation denoting a protected area in the\
          \ United Kingdom. SSSIs are the basic 'building block' of nature conservation\
          \ legislation and most other legal nature/geological conservation designations\
          \ are based upon them, including National Nature Reserves, Ramsar Sites,\
          \ Special Protection Areas, and Special Areas of Conservation."
        is_a: ENVO_00000358
        meaning: 'ENVO:00000361'
      ENVO_00000362:
        title: marine park area
        description: A protected area of the sea usually established to preserve a
          specific habitat and ensure the ecosystem is sustained for the organisms
          that exist there. Most marine parks are designated by governments, and organized
          like watery national parks.
        is_a: ENVO_00000358
        meaning: 'ENVO:00000362'
      ENVO_00000363:
        title: area designated as a nature reserve
        description: A protected area of importance for wildlife, flora, fauna or
          features of geological or other special interest, which is reserved and
          managed for conservation and to provide special opportunities for study
          or research. Nature reserves may be designated by government institutions
          in some countries, such as the United Kingdom, or by private landowners,
          such as charities and research institutions, regardless of nationality.
        is_a: ENVO_00000358
        meaning: 'ENVO:00000363'
      ENVO_00000365:
        title: Ramsar site
        description: A wetland protected by the terms of the Ramsar Convention (The
          Convention on Wetlands of International Importance, especially as Waterfowl
          Habitat).
        is_a: ENVO_00000363
        meaning: 'ENVO:00000365'
      ENVO_00000374:
        title: wildlife management area
        description: A protected area with the purpose of protecting and managing
          wild life.
        is_a: ENVO_00000358
        meaning: 'ENVO:00000374'
      ENVO_00000364:
        title: national wildlife refuge
        description: A designation for certain protected areas of the United States
          managed by the United States Fish and Wildlife Service. The National Wildlife
          Refuge system is a network of lands and waters managed to protect wildlife
          and wildlife habitat.
        is_a: ENVO_00000374
        meaning: 'ENVO:00000364'
      ENVO_00000366:
        title: area designated as a national nature reserve
        description: An area of protected biodiversity which is of national significance
          for biological or Earth science interest.
        is_a: ENVO_00000358
        meaning: 'ENVO:00000366'
      ENVO_01001169:
        title: area protected according to IUCN guidelines
        description: A protected area in which management objectives have been declared,
          by a local governing body or authority, to adhere to the guidelines set
          forth by the International Union for the Conservation of Nature (IUCN).
        is_a: ENVO_00000358
        meaning: 'ENVO:01001169'
      ENVO_00000367:
        title: IUCN national park
        description: "An IUCN protected area which 1) primarily consists of ecosystems\
          \ which are able to maintain their natural composition, structure, and function\
          \ at a regional scale and which are deemed to be representative of a region's\
          \ natural bio- and geodiversity, 2) is sufficiently large to allow its constituent\
          \ ecosystems to function, develop, and recover from natural perturbations\
          \ without human intervention, and 3) is managed to preserve natural ecosystem\
          \ integrity and functioning at a regional scale, while allowing human access\
          \ for the purposes of conservation, cultural and spiritural activities,\
          \ research, education, tourism, subsistence use by indigenous communities,\
          \ and recreation."
        is_a: ENVO_01001169
        meaning: 'ENVO:00000367'
      ENVO_01001162:
        title: IUCN strict nature reserve
        description: An IUCN protected area in which human visitation, use and impacts
          are strictly controlled and limited to ensure protection and conservation
          of natural biodiversity and/or geodiversity, natural ecosystem assemblages
          and processes, and any associated cultural and spiritual values.
        is_a: ENVO_01001169
        meaning: 'ENVO:01001162'
      ENVO_01001163:
        title: IUCN wilderness area
        description: An IUCN protected area which 1) is dominated by natural ecosystems,
          2) is sufficiently large to allow those ecosystems to function and develop
          without local anthropogenic perturbation, 3) is  managed to prevent perturbations
          by proximate or local anthropisation, including those caused by local and/or
          indigenous human communities or human visitation.
        is_a: ENVO_01001169
        meaning: 'ENVO:01001163'
      ENVO_01001165:
        title: IUCN natural monument or feature
        description: An IUCN protected area which includes a primarily natural formation
          designated to be of high natural heritage value and the environmental systems
          which it determines (e.g. the spray zone of a waterfall monument).
        is_a: ENVO_01001169
        meaning: 'ENVO:01001165'
      ENVO_01001166:
        title: IUCN habitat/species management area
        description: An IUCN protected area within which the habitats of or ecosystems
          used by floral and faunal species deemed to be of international, national,
          or local importance are maintained, conserved, or restored such that their
          composition and functional integrity are maintained.
        is_a: ENVO_01001169
        meaning: 'ENVO:01001166'
      ENVO_01001172:
        title: IUCN protected landscape/seascape
        description: An IUCN protected area which 1) includes entities that have been
          deemed to be of high scenic quality, 2) is composed of a historically stable
          assemblage of causally interlinked natural and anthropised ecosystems that
          provides cultural ecosystem services, and 3) hosts traditional and sustainable
          human activities.
        is_a: ENVO_01001169
        meaning: 'ENVO:01001172'
      ENVO_01001225:
        title: IUCN protected area with sustainable use of natural resources
        description: "An IUCN protected area within which 1) natural ecosystems and\
          \ their resources are either conserved or used through non-industrial human\
          \ activities, 2) usage activites contribute to conservation goals, ensuring\
          \ inter-generational security for local communities' livelihoods, and 3)\
          \ the majority of benefits derived from the use of ecosystems are received\
          \ by communities living near or in the area."
        is_a: ENVO_01001169
        meaning: 'ENVO:01001225'
      ENVO_00000376:
        title: biosphere reserve
        description: An international conservation designation given by UNESCO under
          its Programme on Man and the Biosphere (MAB).
        is_a: ENVO_00000358
        meaning: 'ENVO:00000376'
      ENVO_01000778:
        title: key biodiversity area
        description: An environmental zone which contains, as determined by an officially
          mandated selection process, one or more ecosystems which include, as parts,
          ecological communities of global significance for conservation due to their
          vulnerability and irreplaceability.
        is_a: ENVO_00000358
        meaning: 'ENVO:01000778'
      ENVO_00000375:
        title: world heritage site
        description: A protected area that is a specific site (such as a forest, mountain,
          lake, desert, monument, building, complex, or city) that has been nominated
          and confirmed for inclusion on the list maintained by the international
          World Heritage Programme administered by the UNESCO World Heritage Committee.
        is_a: ENVO_01001567
        meaning: 'ENVO:00000375'
      ENVO_01001264:
        title: area designated for waste storage
        description: A site which has been designated for the storage of waste material.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001264'
      ENVO_00002156:
        title: Superfund site
        description: "A highly contaminated site designated by the United States of\
          \ America's Comprehensive Environmental Response, Compensation, and Liability\
          \ Act."
        is_a: ENVO_01001264
        meaning: 'ENVO:00002156'
      ENVO_01000666:
        title: area of open water
        description: "An area of a planet's surface which is primarily composed of\
          \ water in contact with an atmospheric column extending from the planetary\
          \ boundary layer to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01003020
        meaning: 'ENVO:01000666'
      ENVO_01000675:
        title: atmospheric column
        description: A fiat part of an atmosphere which is defined as a vertical,
          three-dimensional pillar extending from a unit area on a planetary surface
          and bounded by the top of the atmosphere.
        is_a: ENVO_01003020
        meaning: 'ENVO:01000675'
      ENVO_01000746:
        title: area of perennial ice or snow
        description: "An area of a planet's surface which is primarily composed of\
          \ snow or water ice, present throughout multiple years, in contact with\
          \ an atmospheric column extending from the planetary boundary layer to the\
          \ planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01003020
        meaning: 'ENVO:01000746'
      ENVO_01000740:
        title: area of perennial water ice
        description: "An area of a planet's surface which is primarily composed of\
          \ water ice, present throughout multiple years, in contact with an atmospheric\
          \ column extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01000746
        meaning: 'ENVO:01000740'
      ENVO_01000745:
        title: area of perennial snow
        description: "An area of a planet's surface which is primarily composed of\
          \ snow, present throughout multiple years, in contact with an atmospheric\
          \ column extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01000746
        meaning: 'ENVO:01000745'
      ENVO_01001263:
        title: area designated for human defecation
        description: A site which has been designated as a place where humans may
          defecate.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001263'
      ENVO_01001384:
        title: area of attached faunal communities
        description: An environmental zone within which ecological communities of  animals
          are attached to some substrate.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001384'
      ENVO_01001382:
        title: area of attached mussel assemblages
        description: An area which is dominated by dense accumulations of mussels
          attached to a substrate other than conspecifics, including the associated
          faunal communities and predators present on the mussels (e.g., starfish).
        is_a: ENVO_01001384
        meaning: 'ENVO:01001382'
      ENVO_01001383:
        title: area of attached Modiolus assemblages
        description: An area which is dominated by dense accumulations of mussels,
          of the genus Modiolus, attached to a substrate other than conspecifics,
          including the associated faunal communities and predators present on the
          mussels (e.g., starfish).
        is_a: ENVO_01001382
        meaning: 'ENVO:01001383'
      ENVO_01001519:
        title: area of pack ice
        description: An area in which masses of drift ice aggregate such that they
          cover a minimum of 7/10ths-8/10ths of the surface the water body they are
          floating in.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001519'
      ENVO_01001520:
        title: area of sea ice
        description: An environmental zone that overlaps that part of a water body
          covered or partially covered by sea ice.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001520'
      ENVO_01001521:
        title: area of drift ice
        description: An area in which masses of drift ice aggregate such that they
          cover less than 7/10ths of the surface the water body they are floating
          in.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001521'
      ENVO_01001558:
        title: area of seasonal sea ice
        description: An environmental zone which overlaps that part of an ocean or
          sea within which 1) sea ice is present only part of the year, 2) extends
          from the permanent ice zone to the boundary where winter sea ice extent
          is at a maximum, and 3) primarily overlaps first-year ice when seasonal
          ice is present.
        is_a: ENVO_01003020
        meaning: 'ENVO:01001558'
      ENVO_03400016:
        title: area of ice cover
        description: An environmental zone which is covered or partially covered by
          ice.
        is_a: ENVO_01003020
        meaning: 'ENVO:03400016'
      ENVO_00000123:
        title: political entity
        description: A geographical region whose affairs and population are administered
          by an authority.
        is_a: BFO_0000024
        meaning: 'ENVO:00000123'
      ENVO_00000009:
        title: national geopolitical entity
        description: A political association with effective dominion over a geographic
          area.
        is_a: ENVO_00000123
        meaning: 'ENVO:00000009'
      ENVO_00000124:
        title: supranational geopolitical entity
        description: A political entitity established by more than one state and with
          at least some influence over the affairs of its member states.
        is_a: ENVO_00000123
        meaning: 'ENVO:00000124'
      ENVO_03501343:
        title: first nations reserve
        description: 'A political entity which is defined by contract between the
          Canadian state ("the Crown") and a First Nations people.'
        is_a: ENVO_00000123
        meaning: 'ENVO:03501343'
      ENVO_01000408:
        title: environmental zone
        description: A site which has its extent determined by the presence or influence
          of one or more components of an environmental system or the processes occurring
          therein.
        is_a: BFO_0000024
        meaning: 'ENVO:01000408'
      ENVO_00000062:
        title: populated place
        description: Place or area with clustered or scattered buildings and a permanent
          human population.
        is_a: ENVO_01000408
        meaning: 'ENVO:00000062'
      ENVO_00002178:
        title: iron-reducing zone of petroleum contaminated sediment
        description: A zone within a portion of petroleum contaminated sediment within
          which iron-reducing processes occur.
        is_a: ENVO_01000408
        meaning: 'ENVO:00002178'
      ENVO_01001199:
        title: terrestrial environmental zone
        description: An environmental zone which is bounded by material parts of a
          land mass or the atmosphere or space adjacent to it.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001199'
      ENVO_01001305:
        title: vegetated area
        description: A vegetated area is a geographic feature which has ground cover
          dominated by plant communities.
        is_a: ENVO_01001199
        meaning: 'ENVO:01001305'
      ENVO_00000043:
        title: wetland area
        description: An vegetated area which overlaps a wetland ecosystem.
        is_a: ENVO_01001305
        meaning: 'ENVO:00000043'
      ENVO_01000893:
        title: area of woody wetland
        description: "An area of a planet's surface which is partly covered by forest\
          \ or shrubland vegetation and where the underlying soil or substrate is\
          \ periodically saturated with or covered by water. This area is in contact\
          \ with an atmospheric column extending from the planetary boundary layer\
          \ to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_00000043
        meaning: 'ENVO:01000893'
      ENVO_01000894:
        title: area of emergent herbaceous wetland
        description: "An area of a planet's surface which is primarily covered by\
          \ perennial herbaceous vegetation and where the underlying soil or substrate\
          \ is periodically saturated with or covered by water. This area is in contact\
          \ with an atmospheric column extending from the planetary boundary layer\
          \ to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_00000043
        meaning: 'ENVO:01000894'
      ENVO_01001208:
        title: swamp area
        description: An area of wetland which overlaps a swamp ecosystem.
        is_a: ENVO_00000043
        meaning: 'ENVO:01001208'
      ENVO_00000106:
        title: grassland area
        description: An area in which grasses (Graminae) are a significant component
          of the vegetation.
        is_a: ENVO_01001305
        meaning: 'ENVO:00000106'
      ENVO_00000260:
        title: prairie
        description: An area of land of low topographic relief that historically supported
          grasses and herbs, with few trees, and having generally a mesic (moderate
          or temperate) climate. Dominated by tall grasses (contrast steppe).
        is_a: ENVO_00000106
        meaning: 'ENVO:00000260'
      ENVO_00000261:
        title: savanna
        description: A grassland of the tropics or subtropics with scattered trees.
        is_a: ENVO_00000106
        meaning: 'ENVO:00000261'
      ENVO_00000262:
        title: steppe
        description: A plain without trees (apart from those near rivers and lakes);
          it is similar to a prairie, although a prairie is generally considered as
          being dominated by tall grasses, while short grasses are said to be normal
          in the steppe. It may be semi-desert, or covered with grass or shrubs or
          both, depending on the season and latitude.
        is_a: ENVO_00000106
        meaning: 'ENVO:00000262'
      ENVO_01000888:
        title: area of gramanoid or herbaceous vegetation
        description: "An area of a planet's surface which is primarily covered by\
          \ gramanoid or herbaceous vegetation and which is not subject to intensive\
          \ management by humans. This area is in contact with an atmospheric column\
          \ extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_00000106
        meaning: 'ENVO:01000888'
      ENVO_01000891:
        title: area of pastureland or hayfields
        description: "An area of a planet's surface which is partly covered by planted\
          \ grasses, legumes, or mixtures of grass and legumes and used for livestock\
          \ grazing or the production of seed or hay crops. This area is in contact\
          \ with an atmospheric column extending from the planetary boundary layer\
          \ to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01000888
        meaning: 'ENVO:01000891'
      ENVO_00000107:
        title: heath
        description: An upland moor or sandy area dominated by low shrubby vegetation
          including heather.
        is_a: ENVO_01001305
        meaning: 'ENVO:00000107'
      ENVO_00000109:
        title: woodland area
        description: Land having a cover of trees, shrubs, or both.
        is_a: ENVO_01001305
        meaning: 'ENVO:00000109'
      ENVO_00000111:
        title: forested area
        description: An area with a high density of trees. A small forest may be called
          a wood.
        is_a: ENVO_00000109
        meaning: 'ENVO:00000111'
      ENVO_00000112:
        title: area of tundra
        description: A vegetated area which is part of a tundra ecosystem.
        is_a: ENVO_01001305
        meaning: 'ENVO:00000112'
      ENVO_03400001:
        title: area of alpine tundra
        description: An area of tundra which is present in a region subject to alpine
          conditions.
        is_a: ENVO_00000112
        meaning: 'ENVO:03400001'
      ENVO_03400002:
        title: area of polar tundra
        description: An area of tundra which is present in a region subject to polar
          conditions.
        is_a: ENVO_00000112
        meaning: 'ENVO:03400002'
      ENVO_01001304:
        title: oasis
        description: An oasis is a vegetated area located in a desert, supplied with
          water from a water source which it surrounds, and surrounded by arid soil,
          sand, or rock.
        is_a: ENVO_01001305
        meaning: 'ENVO:01001304'
      ENVO_00000156:
        title: desert oasis
        description: A small, isolated, fertile or green area in a desert region,
          usually having a spring or well.
        is_a: ENVO_01001304
        meaning: 'ENVO:00000156'
      ENVO_00000300:
        title: scrubland area
        description: Area covered with low-growing or stunted perennial vegetation
          and usually not mixed with trees.
        is_a: ENVO_01001305
        meaning: 'ENVO:00000300'
      ENVO_00000301:
        title: chaparral area
        description: A shrubland area found primarily in regions with a Mediterranean
          climate (mid, wet winters and hot dry summers) often shaped by wildfires.
        is_a: ENVO_00000300
        meaning: 'ENVO:00000301'
      ENVO_01000237:
        title: coastal scrubland
        description: A coastal scrubland is a scrubland which is part of a coast.
        is_a: ENVO_00000300
        meaning: 'ENVO:01000237'
      ENVO_01000242:
        title: desert scrubland
        description: A scrubland which is located in a desert.
        is_a: ENVO_00000300
        meaning: 'ENVO:01000242'
      ENVO_01000843:
        title: area of evergreen forest
        description: "An area of a planet's surface which is primarily covered by\
          \ a forest in which the majority of trees maintain their foliage despite\
          \ seasonal change. The surfaces of this area (including the surface of the\
          \ forest canopy) are in contact with an atmospheric column extending from\
          \ the planetary boundary layer to the planet's exosphere with little to\
          \ no physical obstruction."
        is_a: ENVO_01001305
        meaning: 'ENVO:01000843'
      ENVO_01000848:
        title: flower strip
        description: A vegetated area which includes a community of flowering plants
          that provide food for local pollinators.
        is_a: ENVO_01001305
        meaning: 'ENVO:01000848'
      ENVO_01000849:
        title: flower-rich field margin strip
        description: A flower strip which is present at the margins of cultivated
          fields.
        is_a: ENVO_01000848
        meaning: 'ENVO:01000849'
      ENVO_01000855:
        title: area of mixed forest
        description: "An area of a planet's surface which is primarily covered by\
          \ a forest in which the trees are a mixture between those that lose and\
          \ retain their foliage despite seasonal change. The surfaces of this area\
          \ (including the surface of the forest canopy) are in contact with an atmospheric\
          \ column extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01001305
        meaning: 'ENVO:01000855'
      ENVO_01001293:
        title: bush area
        description: A vegetated area which has not been cleared or is sparsely settled,
          usually scrub-covered or forested
        is_a: ENVO_01001305
        meaning: 'ENVO:01001293'
      ENVO_01000861:
        title: area of dwarf scrub
        description: "An area of a planet's surface which is partly covered by shrubs\
          \ with ground-hugging stems or low growth habit, in contact with an atmospheric\
          \ column extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01001293
        meaning: 'ENVO:01000861'
      ENVO_01000869:
        title: area of scrub
        description: "An area of a planet's surface which is primarily covered by\
          \ a shrubs, young trees, or stunted trees.. The surfaces of this area are\
          \ in contact with an atmospheric column extending from the planetary boundary\
          \ layer to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01001293
        meaning: 'ENVO:01000869'
      ENVO_01000887:
        title: area of sedge- and forb-dominated herbaceous vegetation
        description: "An area of a planet's surface which is primarily covered by\
          \ sedges or forbs, possibly interpersed with grasses or grass-like plants.\
          \ This area is in contact with an atmospheric column extending from the\
          \ planetary boundary layer to the planet's exosphere with little to no physical\
          \ obstruction."
        is_a: ENVO_01001305
        meaning: 'ENVO:01000887'
      ENVO_01000889:
        title: area of lichen-dominated vegetation
        description: "An area of a planet's surface which is primarily covered by\
          \ fruticose or foliose lichens and which is in contact with an atmospheric\
          \ column extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01001305
        meaning: 'ENVO:01000889'
      ENVO_01000890:
        title: area of moss-dominated vegetation
        description: "An area of a planet's surface which is primarily covered by\
          \ mosses and which is in contact with an atmospheric column extending from\
          \ the planetary boundary layer to the planet's exosphere with little to\
          \ no physical obstruction."
        is_a: ENVO_01001305
        meaning: 'ENVO:01000890'
      ENVO_01000892:
        title: area of cropland
        description: "An area of a planet's surface which is partly covered either\
          \ by annual crops and perennial woody crops or by actively tilled land.\
          \ This area is in contact with an atmospheric column extending from the\
          \ planetary boundary layer to the planet's exosphere with little to no physical\
          \ obstruction."
        is_a: ENVO_01001305
        meaning: 'ENVO:01000892'
      ENVO_01000752:
        title: area of barren land
        description: "An area of a planet's surface which is primarily composed of\
          \ bedrock, desert pavement, scarp rock, talus, material exposed by slides,\
          \ volcanic material, glacial debris, sand, material exposed during strip\
          \ mining, gravel, and other accumulations of earthen material in contact\
          \ with an atmospheric column extending from the planetary boundary layer\
          \ to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01001199
        meaning: 'ENVO:01000752'
      ENVO_00000097:
        title: desert area
        description: A region rendered barren or partially barren by environmental
          extremes, especially by low rainfall.
        is_a: ENVO_01000752
        meaning: 'ENVO:00000097'
      ENVO_00000172:
        title: sandy desert
        description: A desert plain characterized by a surface veneer of sand.
        is_a: ENVO_00000097
        meaning: 'ENVO:00000172'
      ENVO_00000173:
        title: rocky desert
        description: A desert plain characterized by a surface veneer of rock.
        is_a: ENVO_00000097
        meaning: 'ENVO:00000173'
      ENVO_00000183:
        title: stony desert
        description: A desert plain characterized by a surface veneer of gravel or
          stones.
        is_a: ENVO_00000097
        meaning: 'ENVO:00000183'
      ENVO_01000382:
        title: cold desert
        description: A cold desert is a desert which has hot summers and cold, dry
          winters with temperatures below 0 degrees Celsius
        is_a: ENVO_00000097
        meaning: 'ENVO:01000382'
      ENVO_01001200:
        title: anthropised terrestrial environmental zone
        description: A terrestrial zone which is bounded by constructed, manufactured,
          or other anthropogenic material entities.
        is_a: ENVO_01001199
        meaning: 'ENVO:01001200'
      ENVO_01000772:
        title: rural area
        description: An area which is outside of a town, city, or urban area. Rural
          areas are primarily used for agriculture or pastoralism and may contain
          rural settlements.
        is_a: ENVO_01001200
        meaning: 'ENVO:01000772'
      ENVO_01000883:
        title: area of developed open space
        description: "An area of a planet's surface which is primarily covered by\
          \ cultivated or anthropically maintained vegetation planted for recreation,\
          \ erosion control, or aesthetic purposes interspersed by constructed or\
          \ manufactured objects and materials. This area is in contact with an atmospheric\
          \ column extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01001200
        meaning: 'ENVO:01000883'
      ENVO_01001269:
        title: area of developed space
        description: "An area of a planet's surface which is primarily covered by\
          \ constructed or manufactured objects and materials, possibly interspersed\
          \ with cultivated or anthropically maintained vegetation."
        is_a: ENVO_01001200
        meaning: 'ENVO:01001269'
      ENVO_01000884:
        title: area of developed space with low usage intensity
        description: "An area of a planet's surface which is primarily covered by\
          \ cultivated or anthropically maintained vegetation and by constructed or\
          \ manufactured objects and materials covering up to approximately half its\
          \ extent. Such areas are used for low intensity purposes such as accommodating\
          \ collections of single-family residential units. This area is in contact\
          \ with an atmospheric column extending from the planetary boundary layer\
          \ to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01001269
        meaning: 'ENVO:01000884'
      ENVO_01000885:
        title: area of developed space with medium usage intensity
        description: "An area of a planet's surface which is primarily covered by\
          \ constructed or manufactured objects and materials covering from half to\
          \ three-forths of its extent and by cultivated or anthropically maintained\
          \ vegetation. Such areas are used for medium intensity purposes such as\
          \ accommodating dense collections of single-family residential units. This\
          \ area is in contact with an atmospheric column extending from the planetary\
          \ boundary layer to the planet's exosphere with little to no physical obstruction."
        is_a: ENVO_01001269
        meaning: 'ENVO:01000885'
      ENVO_01000886:
        title: area of developed space with high usage intensity
        description: "An area of developed space used for high intensity purposes\
          \ such as accommodating dense and multi-occupant residential, commercial,\
          \ and industrial units. This area is in contact with an atmospheric column\
          \ extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01001269
        meaning: 'ENVO:01000886'
      ENVO_03501236:
        title: business park
        description: An area of developed space which is reserved for office buildings.
        is_a: ENVO_01001269
        meaning: 'ENVO:03501236'
      ENVO_01000816:
        title: area of deciduous forest
        description: "An area of a planet's surface which is primarily covered by\
          \ a forest in which the majority of trees shed foliage simultaneously in\
          \ response to seasonal change. The surfaces of this area (including the\
          \ surface of the forest canopy) are in contact with an atmospheric column\
          \ extending from the planetary boundary layer to the planet's exosphere\
          \ with little to no physical obstruction."
        is_a: ENVO_01001199
        meaning: 'ENVO:01000816'
      ENVO_03501237:
        title: game reserve
        description: A terrestrial environmental zone where wild animals live safely
          or are hunted in a controlled way for sport.
        is_a: ENVO_01001199
        meaning: 'ENVO:03501237'
      ENVO_01001776:
        title: subsurface zone of an astronomical body
        description: An environmental zone which includes those regions of an astronomical
          body which are not exposed to its atmosphere or space.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001776'
      ENVO_01000941:
        title: planetary subsurface zone
        description: "Regions of a planet which are not exposed to the planet's atmosphere\
          \ or space, often comprising parts of one or more planetary structural layers."
        is_a: ENVO_01001776
        meaning: 'ENVO:01000941'
      ENVO_01000942:
        title: continental subsurface zone
        description: A region which overlaps parts of one or more planetary structural
          layers which are located below a continental landmass.
        is_a: ENVO_01000941
        meaning: 'ENVO:01000942'
      ENVO_01001045:
        title: oceanic subsurface zone
        description: A region which overlaps parts of one or more planetary structural
          layers which are located below an oceanic plate.
        is_a: ENVO_01000941
        meaning: 'ENVO:01001045'
      ENVO_01001098:
        title: tectonic plate boundary
        description: A geomorphological feature which is formed where two or more
          tectonic plates move towards, away from, or along one another, resulting
          in deformation of the lithosphere.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001098'
      ENVO_01001100:
        title: convergent plate boundary
        description: A geomorphological feature which is formed where two or more
          tectonic plates are actively moving towards one another, resulting in deformation
          of the lithosphere that forces one plate below the other where it melts
          in the mantle.
        is_a: ENVO_01001098
        meaning: 'ENVO:01001100'
      ENVO_01001099:
        title: divergent plate boundary
        description: A geomorphological feature which is formed where two or more
          tectonic plates are actively moving away from one another, resulting in
          deformation of the lithosphere that forms rifts or ridges.
        is_a: ENVO_01001098
        meaning: 'ENVO:01001099'
      ENVO_01001101:
        title: transform plate boundary
        description: A geomorphological feature which is formed where two or more
          tectonic plates are actively moving along one another in either a sinistral
          (left lateral) or dextral (right lateral) horizontal direction.
        is_a: ENVO_01001098
        meaning: 'ENVO:01001101'
      ENVO_01001299:
        title: atmospheric zone
        description: An environmental zone which is part of an atmosphere.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001299'
      ENVO_01001348:
        title: material accumulation zone
        description: A zone in which the deposition and accumulation of an environmental
          material occurs.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001348'
      ENVO_01001350:
        title: ice accumulation zone
        description: A material accumulation zone in which the rates of ice formation
          processes exceed those of ice decumulation processes, leading to a net icrease
          in some mass of ice.
        is_a: ENVO_01001348
        meaning: 'ENVO:01001350'
      ENVO_01001352:
        title: glacial ice accumulation zone
        description: An ice accumulation zone which overlaps part of a glacier.
        is_a: ENVO_01001350
        meaning: 'ENVO:01001352'
      ENVO_01001349:
        title: material decumulation zone
        description: A zone in which processes resulting in the removal of one or
          more environmental materials have higher rates than pocesses which result
          in their deposition and accumulation.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001349'
      ENVO_01001351:
        title: ice decumulation zone
        description: A material decumulation zone in which the rates of ice formation
          processes are below those of ice decumulation processes, leading to a net
          decrease in some mass of ice.
        is_a: ENVO_01001349
        meaning: 'ENVO:01001351'
      ENVO_01000914:
        title: ice ablation zone
        description: An environmental zone which overlaps a glacier or an ice sheet,
          and in which ice loss exceeds ice gain.
        is_a: ENVO_01001351
        meaning: 'ENVO:01000914'
      ENVO_03000037:
        title: glacial ice ablation zone
        description: An ablation zone which is part of a glacier.
        is_a: ENVO_01000914
        meaning: 'ENVO:03000037'
      ENVO_01001353:
        title: environmental zone of processual equilibrium
        description: An environmental zone in which the rates of two or more processes
          are roughly equal to one another.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001353'
      ENVO_01001347:
        title: glacial equlibrium line
        description: A zone on a glacier which is roughly linear and where the rates
          of ice ablation and accumulation are approximately equal.
        is_a: ENVO_01001353
        meaning: 'ENVO:01001347'
      ENVO_01001355:
        title: crater zone
        description: The site which is located in a crater.
        is_a: ENVO_01000408
        meaning: 'ENVO:01001355'
      ENVO_01001356:
        title: volcanic crater zone
        description: The site which is located in a volcanic crater.
        is_a: ENVO_01001355
        meaning: 'ENVO:01001356'
      ENVO_00000564:
        title: archeological site
        description: A place (or group of physical sites) in which evidence of past
          activity is preserved (either prehistoric or historic or contemporary),
          and which is, has been, or may be, investigated using the discipline of
          archaeology.
        is_a: BFO_0000024
        meaning: 'ENVO:00000564'
      ENVO_01000907:
        title: feasting pit site
        description: An archeological site which contains holes humans had dug in
          the ground, or their remnants, for the purpose of storing and distributing
          food, drink, and both functional or ritualistic implements during communal
          eating and drinking.
        is_a: ENVO_00000564
        meaning: 'ENVO:01000907'
      ENVO_01001173:
        title: sacred site
        description: A fiat object part which contains entities of high spiritual
          or cultural significance to one or more human groups.
        is_a: BFO_0000024
        meaning: 'ENVO:01001173'
      BFO_0000027:
        title: object aggregate
        is_a: BFO_0000040
        meaning: 'BFO:0000027'
      ENVO_01001564:
        title: rain
        description: An aggregate of raindrops falling to a planetary surface during
          a precipitation process.
        is_a: BFO_0000027
        meaning: 'ENVO:01001564'
      ENVO_01001565:
        title: water-based rain
        description: Rain which is composed of water droplets falling to a planetary
          surface during a rainfall process.
        is_a: ENVO_01001564
        meaning: 'ENVO:01001565'
      ENVO_03000128:
        title: acidic water-based rain
        description: Water-based rain which has increased acidity.
        is_a: ENVO_01001565
        meaning: 'ENVO:03000128'
      ENVO_03400010:
        title: freezing rain
        description: Water-based rain which is composed of supercooled water droplets,
          which freeze on contact with surfaces.
        is_a: ENVO_01001565
        meaning: 'ENVO:03400010'
      ENVO_03400009:
        title: falling sleet
        description: An object aggregate which is primarily composed of particles
          of water in liquid, frozen, or partially frozen states.
        is_a: BFO_0000027
        meaning: 'ENVO:03400009'
      ENVO_03400013:
        title: falling snow
        description: An object aggregate which is composed primarily of snow falling
          through an atmosphere.
        is_a: BFO_0000027
        meaning: 'ENVO:03400013'
      ENVO_03501314:
        title: food production environmental monitoring zone 1
        description: An object aggregate which comprises objects whose surfaces are
          in contact with food during its processing in a food production facility
        is_a: BFO_0000027
        meaning: 'ENVO:03501314'
      ENVO_03501315:
        title: food production environmental monitoring zone 2
        description: An object aggregate which comprises objects whose surfaces are
          not in contact with food during its processing, but which are in close proximity
          to those in food production environmental monitoring zone 1.
        is_a: BFO_0000027
        meaning: 'ENVO:03501315'
      ENVO_03501316:
        title: food production environmental monitoring zone 3
        description: "An object aggregate which comprises a facility's set of more\
          \ remote non-food-processing-contact surfaces that are in or near the processing\
          \ areas (food productions environmental monitoring zones 1 and 2) and could\
          \ lead to their contamination, especially through human movement."
        is_a: BFO_0000027
        meaning: 'ENVO:03501316'
      ENVO_03501317:
        title: food production environmental monitoring zone 4
        description: An object aggregate which comprises objects in proximity to food
          production environmental monitoring zone 3.
        is_a: BFO_0000027
        meaning: 'ENVO:03501317'
      BFO_0000030:
        title: object
        is_a: BFO_0000040
        meaning: 'BFO:0000030'
      ENVO_01000804:
        title: astronomical object
        description: An object which is composed of one or more gravitationally bound
          structures that are associated with a position in space.
        is_a: BFO_0000030
        meaning: 'ENVO:01000804'
      ENVO_01000799:
        title: astronomical body
        description: An object which is naturally occuring, bound together by gravitational
          or electromagnetic forces, and surrounded by space.
        is_a: ENVO_01000804
        meaning: 'ENVO:01000799'
      ENVO_01000800:
        title: planet
        description: A planet is an astronomical body orbiting a star or stellar remnant
          that is massive enough to be rounded by its own gravity, is not massive
          enough to cause thermonuclear fusion, and has cleared its neighbouring region
          of planetesimals.
        is_a: ENVO_01000799
        meaning: 'ENVO:01000800'
      ENVO_01000958:
        title: terrestrial planet
        description: A planet that is composed primarily of silicate rocks or metals.
        is_a: ENVO_01000800
        meaning: 'ENVO:01000958'
      ENVO_01001133:
        title: mega-Earth
        description: A terrestrial exoplanet which is at least ten times the mass
          of Earth.
        is_a: ENVO_01000958
        meaning: 'ENVO:01001133'
      ENVO_01001134:
        title: super-Earth
        description: "A terrestrial planet which has a mass higher than Earth's, but\
          \ substantially below the masses of Uranus and Neptune (15 and 17 Earth\
          \ masses, respectively)."
        is_a: ENVO_01000958
        meaning: 'ENVO:01001134'
      ENVO_01001135:
        title: desert planet
        description: A terrestrial planet which has a surface dominated by hot deserts.
        is_a: ENVO_01000958
        meaning: 'ENVO:01001135'
      ENVO_01001142:
        title: iron planet
        description: A planet which in primarily composed of an iron-rich core with
          little to no mantle
        is_a: ENVO_01000958
        meaning: 'ENVO:01001142'
      ENVO_01001144:
        title: sub-Earth
        description: "A terrestrial planet which has a mass smaller than Earth's,\
          \ such that 1) it lacks a magnetic field strong enough to shield its atmosphere\
          \ from erosion by stellar wind and 2) it has comparatively short periods\
          \ of geological activity unless it is subject to gravitational tidal forces\
          \ from a much more massive object."
        is_a: ENVO_01000958
        meaning: 'ENVO:01001144'
      ENVO_01001122:
        title: gas planet
        description: A planet which is primarily composed of hydrogen and helium.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001122'
      ENVO_01001123:
        title: dwarf gas planet
        description: A gas planet which 1) is considerably smaller than a gas giant
          and 2) has a rocky core around which a thick envelope primarily composed
          of hydrogen, helium, and smaller proportions of volatiles.
        is_a: ENVO_01001122
        meaning: 'ENVO:01001123'
      ENVO_01001124:
        title: giant gas planet
        description: A gas planet which has mass and size comparable to Jupiter and
          Saturn.
        is_a: ENVO_01001122
        meaning: 'ENVO:01001124'
      ENVO_01001131:
        title: hot Jupiter
        description: "A giant gas planet which has a jovian-scale mass (0.36\u2013\
          11.8 Jupiter masses), a short orbital period (1.3\u2013111 Earth days),\
          \ and which is close to the star it orbits, resulting in extreme and exotic\
          \ atmospheric properties."
        is_a: ENVO_01001124
        meaning: 'ENVO:01001131'
      ENVO_01001128:
        title: mini-Neptune
        description: A gas planet which has an atmosphere composed of hydrogen and
          helium  - probably with deep layers of ice, rock or liquid oceans (made
          of water, ammonia, a mixture of both, or heavier volatiles) - and a small
          core made of low-density volatiles.
        is_a: ENVO_01001122
        meaning: 'ENVO:01001128'
      ENVO_01001132:
        title: hot Neptune
        description: A gas planet which has a mass similar to that of Neptune or Uranus
          and which closely orbits its star (normally at a distance less than 1 Astronomical
          Unit).
        is_a: ENVO_01001122
        meaning: 'ENVO:01001132'
      ENVO_01001147:
        title: helium planet
        description: A gas planet which has an atmosphere composed primarily of helium.
        is_a: ENVO_01001122
        meaning: 'ENVO:01001147'
      ENVO_01001127:
        title: ice giant
        description: A giant planet which is primarily composed of elements heavier
          than hydrogen and helium, volatile chemical compounds with freezing points
          above about 100 Kelvin.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001127'
      ENVO_01001136:
        title: ocean planet
        description: A planet which has a surface layer that nearly completely or
          completely covered by water, and which has a substantial portion of its
          mass composed of water.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001136'
      ENVO_01001137:
        title: ice planet
        description: A planet which has a surface layer that nearly completely or
          completely covered by ice, and which has a substantial portion of its mass
          composed of ice.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001137'
      ENVO_01001143:
        title: lava planet
        description: A planet which has a surface layer that nearly completely or
          completely covered by lava, and which has a substantial portion of its mass
          composed of lava.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001143'
      ENVO_01001145:
        title: chthonian planet
        description: "A planet which is formed as a result of a gas giant's hydrogen\
          \ and helium atmosphere, as well as its outer layers, being stripped away\
          \ by a stellar wind through photoevaporation and hydrodynamic escape."
        is_a: ENVO_01000800
        meaning: 'ENVO:01001145'
      ENVO_01001152:
        title: mesoplanet
        description: A planet which is smaller than Mercury but larger than Ceres.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001152'
      ENVO_01001153:
        title: circumbinary planet
        description: A planet which orbits two stars.
        is_a: ENVO_01000800
        meaning: 'ENVO:01001153'
      ENVO_01000801:
        title: star
        description: An astronomical object which is composed primarily of luminous
          plasma held in a spherical form by gravitational forces.
        is_a: ENVO_01000799
        meaning: 'ENVO:01000801'
      ENVO_01000802:
        title: planetary moon
        description: An astronomical body which orbits a planet of comparatively greater
          mass.
        is_a: ENVO_01000799
        meaning: 'ENVO:01000802'
      ENVO_01000809:
        title: minor planet
        description: A minor planet is an astronomical object in direct orbit around
          the Sun that is neither a planet nor exclusively classified as a comet.
          Minor planets can be dwarf planets, asteroids, trojans, centaurs, Kuiper
          belt objects, and other trans-Neptunian objects.
        is_a: ENVO_01000799
        meaning: 'ENVO:01000809'
      ENVO_01000803:
        title: asteroid
        is_a: ENVO_01000809
        meaning: 'ENVO:01000803'
      ENVO_01000808:
        title: dwarf planet
        description: An astronomical body which is in direct orbit of a star and is
          massive enough for its own gravity to compress it into a shape preserved
          by hydrostatic equilibrium (usually a spheroid), but which shares its orbit
          with other bodies, such as asteroids or comets.
        is_a: ENVO_01000809
        meaning: 'ENVO:01000808'
      ENVO_01001068:
        title: meteoroid
        description: An astronomical body which is composed of rocky or metallic materials
          and is considerably smaller than asteroids.
        is_a: ENVO_01000799
        meaning: 'ENVO:01001068'
      ENVO_01001129:
        title: super-Jupiter
        description: An astronomical object which is more massive than the planet
          Jupiter.
        is_a: ENVO_01000799
        meaning: 'ENVO:01001129'
      ENVO_01001148:
        title: planetesimal
        description: An astronomical body which 1) is held together by its own gravity,
          2)  can attract other, similar bodies through mutual gravitational influence,
          and 3) has orbital dynamics that are not significantly affected by gas drag.
        is_a: ENVO_01000799
        meaning: 'ENVO:01001148'
      ENVO_01001149:
        title: protoplanet
        description: An astronomical object that forms within a protoplanetary disc
          when planetesimals and other solid debris aggregate and, due to gravitational
          forces,  fuse and initiate internal melting to produce a differentiated
          interior.
        is_a: ENVO_01000799
        meaning: 'ENVO:01001149'
      ENVO_01001494:
        title: moonmoon
        is_a: ENVO_01000799
        meaning: 'ENVO:01001494'
      ENVO_01000805:
        title: globular star cluster
        description: A group of gravitationally bound stars.
        is_a: ENVO_01000804
        meaning: 'ENVO:01000805'
      ENVO_01000806:
        title: nebula
        description: An interstellar cloud of dust, hydrogen, helium and other ionized
          gases
        is_a: ENVO_01000804
        meaning: 'ENVO:01000806'
      ENVO_01000807:
        title: galaxy
        description: A galaxy is a gravitationally bound system of stars, stellar
          remnants, interstellar gas, dust, and dark matter.
        is_a: ENVO_01000804
        meaning: 'ENVO:01000807'
      ENVO_01001150:
        title: protoplanetary disk
        description: An astronomical object which is composed of dense gas and dust
          rotating around a young newly formed star, a T Tauri star, or a Herbig Ae/Be
          star in a disk-shaped configuration.
        is_a: ENVO_01000804
        meaning: 'ENVO:01001150'
      ENVO_01001151:
        title: proplyd
        description: A protoplanetary disk which is externally illuminated and undergoing
          photoevaporation.
        is_a: ENVO_01001150
        meaning: 'ENVO:01001151'
      ENVO_00010358:
        title: fomite
        description: A fomite is any inanimate object or substance capable of carrying
          infectious organisms (such as germs or parasites) and hence transferring
          them from one individual to another. A fomite can be anything such as a
          cloth or mop heads so when cleaning this is important to remember that this
          could aid when spreading pathogenic organisms.
        is_a: BFO_0000030
        meaning: 'ENVO:00010358'
      ENVO_01000498:
        title: pole
        description: A solid, cylindrical object or column with its length greater
          than its diameter.
        is_a: BFO_0000030
        meaning: 'ENVO:01000498'
      ENVO_03501209:
        title: bedrail
        description: A poll which is attached to the head, foot, or side of a bed
          frame.
        is_a: ENVO_01000498
        meaning: 'ENVO:03501209'
      ENVO_03501212:
        title: handrail
        description: A pole which provides stability or support when grasped by the
          hand.
        is_a: ENVO_01000498
        meaning: 'ENVO:03501212'
      ENVO_01001008:
        title: meteor
        description: A meteor is any matter- or energy-based entity which is located
          in the atmosphere of an astronomical body.
        is_a: BFO_0000030
        meaning: 'ENVO:01001008'
      ENVO_01000760:
        title: cloud
        description: A cloud is a visible mass of aerosolised liquid droplets or frozen
          crystals suspended in an atmosphere above the surface of a planetary body.
        is_a: ENVO_01001008
        meaning: 'ENVO:01000760'
      ENVO_01001428:
        title: water-based cloud
        description: A cloud which is primarily composed of water-based aerosols.
        is_a: ENVO_01000760
        meaning: 'ENVO:01001428'
      ENVO_01000761:
        title: polar stratospheric cloud
        description: "Polar stratospheric clouds are clouds which form in the winter\
          \ polar stratosphere at altitudes of 15,000\u201325,000 metres and which\
          \ support chemical reactions that produce active chlorine and remove gaseous\
          \ nitric acid, catalysing ozone destruction."
        is_a: ENVO_01001428
        meaning: 'ENVO:01000761'
      ENVO_01001160:
        title: cirrus cloud
        description: "A cloud which 1) has been shaped into detached fibrous filaments,\
          \ 2) is almost exclusively composed of ice crystals, 3) is located in the\
          \ high level of the atmosphere (high \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001160'
      ENVO_01001159:
        title: cirrus homogenitus cloud
        description: "A cloud which is cirriform and is formed by condensation events\
          \ centred on an aircraft's contrail."
        is_a: ENVO_01001160
        meaning: 'ENVO:01001159'
      ENVO_01001418:
        title: cirrus fibratus cloud
        description: A cirrus cloud which occurs as a detached unit or a thin veil
          and consists of nearly straight or irregularly curved filaments that do
          not terminate in hooks or tufts.
        is_a: ENVO_01001160
        meaning: 'ENVO:01001418'
      ENVO_01001421:
        title: cirrus uncinus cloud
        description: A cirrus cloud which does not have grey parts and which is often
          shaped like a comma, terminating at its highest point in a hook, or in a
          tuft, the upper part of which is not in the form of a rounded protuberance.
        is_a: ENVO_01001160
        meaning: 'ENVO:01001421'
      ENVO_01001422:
        title: cirrus spissatus cloud
        description: A cirrus cloud which 1) is structurally organised in patches,
          2) is sufficiently dense to appear greyish when viewed towards the local
          star and 3) may veil, the local star, obscure its outline, or even hide
          it entirely.
        is_a: ENVO_01001160
        meaning: 'ENVO:01001422'
      ENVO_01001425:
        title: cirrus castellanus cloud
        description: A cirrus cloud which 1) has linearly arranged cumuliform protuberances
          which resemble crenellated turrets or towers, some of which are taller than
          they are wide in some portion of their upper parts, 2) possess a lower region
          or base which connects these protuberances.
        is_a: ENVO_01001160
        meaning: 'ENVO:01001425'
      ENVO_01001400:
        title: homomutatus cloud
        description: An aeroform which is formed as a result of strong upper winds
          spreading a cirrus homogenitus cloud in the atmosphere and, in turn, causing
          internal tranformations which result in the cloud taking on the appearnce
          of natural cirri-form clouds.
        is_a: ENVO_01001428
        meaning: 'ENVO:01001400'
      ENVO_01001407:
        title: cirrocumulus cloud
        description: "A cloud which 1) has been shaped into structural elements resembling\
          \ grains or ripples, 2) is almost exclusively composed of ice crystals,\
          \ 3) is located in the high level of the atmosphere (high \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001407'
      ENVO_01001426:
        title: cirrocumulus castellanus cloud
        description: A cirrocumulus cloud which 1) has linearly arranged cumuliform
          protuberances which resemble crenellated turrets or towers, some of which
          are taller than they are wide in some portion of their upper parts, 2) possess
          a lower region or base which connects these protuberances.
        is_a: ENVO_01001407
        meaning: 'ENVO:01001426'
      ENVO_01001408:
        title: cirrostratus cloud
        description: "A cloud which 1) occurs in the form of a smooth or fibrous veil,\
          \ 2) is composed of few small ice crystals, 3) is located in the high level\
          \ of the atmosphere (high \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001408'
      ENVO_01001423:
        title: cirrostratus fibratus cloud
        description: A cirrostratus cloud which occurs as a detached unit or a thin
          veil and consists of nearly straight or irregularly curved filaments that
          do not terminate in hooks or tufts.
        is_a: ENVO_01001408
        meaning: 'ENVO:01001423'
      ENVO_01001409:
        title: altocumulus cloud
        description: "A cloud which 1) has been shaped into laminae, rounded masses\
          \ or rolls, 2) is exclusively composed of water droplets, 3) is located\
          \ in the middle level of the atmosphere (middle \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001409'
      ENVO_01001427:
        title: altocumulus castellanus cloud
        description: An altocumulus cloud which 1) has linearly arranged cumuliform
          protuberances which resemble crenellated turrets or towers, some of which
          are taller than they are wide in some portion of their upper parts, 2) possess
          a lower region or base which connects these protuberances.
        is_a: ENVO_01001409
        meaning: 'ENVO:01001427'
      ENVO_01001410:
        title: altostratus cloud
        description: "A cloud which 1) occurs in the form of a striated, fibrous,\
          \ or uniform sheet or layer, 2) is composed of water droplets and ice crystals,\
          \ 3) is located in the middle level of the atmosphere (middle \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001410'
      ENVO_01001411:
        title: nimbostratus cloud
        description: "A cloud which 1) occurs in the form of a layer, 2) is composed\
          \ of water droplets (sometimes supercooled) and raindrops, or snow crystals\
          \ and snowflakes, or of a mixture of these liquid and solid particles, 3)\
          \ is located in the middle level of the atmosphere (middle \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001411'
      ENVO_01001412:
        title: stratocumulus cloud
        description: "A cloud which 1) has been shaped into non-fibrous tessellations,\
          \ rounded masses, or rolls, 2) is primarily composed of water droplets,\
          \ and may contain raindrops or, more rarely, snow pellets, snow crystals\
          \ and snowflakes, 3) is located in the low level of the atmosphere (low\
          \ \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001412'
      ENVO_01001424:
        title: stratocumulus castellanus cloud
        description: A stratocumulus cloud which 1) has linearly arranged cumuliform
          protuberances which resemble crenellated turrets or towers, some of which
          are taller than they are wide in some portion of their upper parts, 2) possess
          a lower region or base which connects these protuberances.
        is_a: ENVO_01001412
        meaning: 'ENVO:01001424'
      ENVO_01001413:
        title: stratus cloud
        description: "A cloud which 1) occurs in the form of a layer with a fairly\
          \ uniform base or, less frequently, ragged patches, 2) is composed of small\
          \ water droplets, 3) is located in the low level of the atmosphere (low\
          \ \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001413'
      ENVO_01001414:
        title: cumulus cloud
        description: "A cloud which 1) has been shaped into rising mounds, domes,\
          \ or towers with a bulging upper part resembling a cauliflower and a near\
          \ horizontal or ragged base, 2) is mainly composed of water droplets, 3)\
          \ is located in the low level of the atmosphere (low \xE9tage)."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001414'
      ENVO_01001415:
        title: homogenitus cloud
        description: A cloud which is formed by condensation events triggered by some
          anthropogenic processes or the outputs thereof, such as aircraft contrails
          or emissions from chimneys.
        is_a: ENVO_01001428
        meaning: 'ENVO:01001415'
      ENVO_01001417:
        title: silvagenitus cloud
        description: A cloud which develop locally over forests as a result of increased
          humidity due to evaporation and evapotranspiration from the tree canopy.
        is_a: ENVO_01001428
        meaning: 'ENVO:01001417'
      ENVO_01001419:
        title: cumulonimbus cloud
        description: "A cloud which 1) has been shaped into dense, mountain-like forms\
          \ or one or more tower-like forms with a flattened upper portion, which\
          \ often spreads out in the shape of an anvil or plume, 2) is composed of\
          \ water droplets and, especially in its upper portion, ice crystals, 3)\
          \ is located in the low level of the atmosphere (low \xE9tage), but can\
          \ extend into the middle and high level of the atmosphere."
        is_a: ENVO_01001428
        meaning: 'ENVO:01001419'
      ENVO_01001009:
        title: photometeor
        description: A meteor that is primarily composed of light.
        is_a: ENVO_01001008
        meaning: 'ENVO:01001009'
      ENVO_01001006:
        title: rainbow
        description: "A rainbow is a photometeor which consists of a spectral separation\
          \ of light, formed as a result of the reflection, refraction, and dispersion\
          \ of light in water droplets suspended in an astronomical body's atmosphere."
        is_a: ENVO_01001009
        meaning: 'ENVO:01001006'
      ENVO_01001005:
        title: lunar rainbow
        description: "A lunar rainbow is a rainbow produced by the refraction of light,\
          \ which has been reflected from a moon's surface, by water droplets in an\
          \ astronomical body's atmosphere."
        is_a: ENVO_01001006
        meaning: 'ENVO:01001005'
      ENVO_01001007:
        title: solar rainbow
        description: A solar rainbow is a rainbow produced by the refraction of light.
          which has been emitted by a star, by water droplets in the atmosphere of
          an astronomical body.
        is_a: ENVO_01001006
        meaning: 'ENVO:01001007'
      ENVO_01001014:
        title: monochrome solar rainbow
        description: A solar rainbow which is formed by a narrow band of wavelengths,
          the rest of the spectrum having been scattered away by an atmosphere.
        is_a: ENVO_01001007
        meaning: 'ENVO:01001014'
      ENVO_01001013:
        title: reflection rainbow
        description: A rainbow which forms from sunlight which has been reflected
          off a body of water prior to its interaction with water droplets in an atmosphere.
        is_a: ENVO_01001006
        meaning: 'ENVO:01001013'
      ENVO_01001015:
        title: fogbow
        description: A rainbow which forms through the interaction of sunlight with
          the water droplets which constitute fog or clouds; light is diffracted by
          these droplets such that the photometeor appears almost white with faint
          reds on the sky-facing side and faint blues on the planet-facing side of
          the bow.
        is_a: ENVO_01001006
        meaning: 'ENVO:01001015'
      ENVO_01001011:
        title: light emitted by lightning
        description: A photometeor which is formed as a result of sudden electrostatic
          discharge in the atmosphere.
        is_a: ENVO_01001009
        meaning: 'ENVO:01001011'
      ENVO_01001016:
        title: glory
        description: "A photometeor which is formed by wave interference of light\
          \ refracted within water droplets which constitute mist or clouds and consists\
          \ of one or more concentric, successively dimmer rings, each of which has\
          \ red wavelengths distant to the glory's centre and blue wavelengths towards\
          \ the centre."
        is_a: ENVO_01001009
        meaning: 'ENVO:01001016'
      ENVO_01001017:
        title: halo
        description: "A photometeor which is produced by light that is reflected,\
          \ refracted, and dispersed by ice crystals, capable of acting as prisms\
          \ and mirrors, suspended in an astronomical body's atmosphere."
        is_a: ENVO_01001009
        meaning: 'ENVO:01001017'
      ENVO_01001010:
        title: hydrometeor
        description: A meteor which is primarily composed of water.
        is_a: ENVO_01001008
        meaning: 'ENVO:01001010'
      ENVO_01001012:
        title: lithometeor
        description: A meteor which is primarily composed of rock.
        is_a: ENVO_01001008
        meaning: 'ENVO:01001012'
      ENVO_01001686:
        title: mass of environmental material
        description: An object which is composed primarily of an environmental material
        is_a: BFO_0000030
        meaning: 'ENVO:01001686'
      ENVO_01001691:
        title: mass of compounded environmental materials
        description: An mass of environmental materials which has appreciable quantities
          of several individual materials, such that the removal of one would convert
          the mass into a different entity.
        is_a: ENVO_01001686
        meaning: 'ENVO:01001691'
      ENVO_00000133:
        title: glacier
        description: An ice mass which is of sufficient mass that the action of gravity
          upon it overcomes the frictional forces holding it in place, causing it
          to deform and flow towards lower elevation.
        is_a: ENVO_01001691
        meaning: 'ENVO:00000133'
      ENVO_00000085:
        title: alpine glacier
        description: A glacier contained in the site of a mountain valley.
        is_a: ENVO_00000133
        meaning: 'ENVO:00000085'
      ENVO_00000132:
        title: ice sheet
        description: A glacier which covers an area of greater than 50,000 square
          kilometers.
        is_a: ENVO_00000133
        meaning: 'ENVO:00000132'
      ENVO_00000458:
        title: valley glacier
        description: A glacier which 1) flows for all or most of its length within
          the walls of a valley, in consequence having a distinct tongue and a well-defined
          outline and 2) descends from either high mountains, from an ice cap on a
          plateau, or from an ice sheet.
        is_a: ENVO_00000133
        meaning: 'ENVO:00000458'
      ENVO_01001539:
        title: branched valley glacier
        description: A valley glacier which has one or more tributary glaciers as
          parts.
        is_a: ENVO_00000458
        meaning: 'ENVO:01001539'
      ENVO_01001540:
        title: simple valley glacier
        description: A valley glacier which does not have any tributary glaciers flowing
          into it.
        is_a: ENVO_00000458
        meaning: 'ENVO:01001540'
      ENVO_00000456:
        title: tidewater glacier
        description: A glacier which terminates in a lake or the sea, with terminus
          either floating or grounded
        is_a: ENVO_00000133
        meaning: 'ENVO:00000456'
      ENVO_00000457:
        title: plateau glacier
        description: A glacier on a plateau or high area, smaller than an ice sheet.
        is_a: ENVO_00000133
        meaning: 'ENVO:00000457'
      ENVO_00000459:
        title: outlet glacier
        description: A glacier fed by an ice sheet.
        is_a: ENVO_00000133
        meaning: 'ENVO:00000459'
      ENVO_00009725:
        title: ice piedmont
        description: A glacier covering a coastal strip of low-lying land backed by
          mountains, and sloping gently seaward over a distance up to 30km or more
          to terminate in ice cliffs or to merge with an ice shelf.
        is_a: ENVO_00000133
        meaning: 'ENVO:00009725'
      ENVO_01001354:
        title: volcanic crater glacier
        description: A glacier which is contained in the site bounded by a volcanic
          crater.
        is_a: ENVO_00000133
        meaning: 'ENVO:01001354'
      ENVO_01001541:
        title: tributary glacier
        description: A glacier which flows into a larger glacier.
        is_a: ENVO_00000133
        meaning: 'ENVO:01001541'
      ENVO_03000013:
        title: cirque glacier
        description: A small glacier contained within a cirque basin.
        is_a: ENVO_00000133
        meaning: 'ENVO:03000013'
      ENVO_01000549:
        title: mass of biological material
        is_a: ENVO_01001691
        meaning: 'ENVO:01000549'
      ENVO_00002034:
        title: biofilm
        description: A complex aggregation of microorganisms marked by the excretion
          of a protective and adhesive matrix; usually adhering to a substratum.
        is_a: ENVO_01000549
        meaning: 'ENVO:00002034'
      ENVO_01000008:
        title: microbial mat
        description: A multi-layered sheet of micro-organisms, mainly bacteria and
          archaea. Microbial mats grow at interfaces between different types of material,
          mostly on submerged or moist surfaces but a few survive in deserts.
        is_a: ENVO_01000549
        meaning: 'ENVO:01000008'
      ENVO_00002157:
        title: stromatolite mat
        is_a: ENVO_01000008
        meaning: 'ENVO:00002157'
      ENVO_01000137:
        title: organic matter fall
        description: An accumulation of organic matter that has fallen to the bottom
          of a body of water.
        is_a: ENVO_01000549
        meaning: 'ENVO:01000137'
      ENVO_01000138:
        title: plant matter fall
        description: A accumulation of plant matter that has fallen to the bottom
          of a body of water.
        is_a: ENVO_01000137
        meaning: 'ENVO:01000138'
      ENVO_01000142:
        title: wood fall
        description: A wood fall describes an accumulation of woody plant material
          that has fallen to the ocean floor.
        is_a: ENVO_01000138
        meaning: 'ENVO:01000142'
      ENVO_03000111:
        title: snow mass
        description: A mass of snow.
        is_a: ENVO_01001691
        meaning: 'ENVO:03000111'
      ENVO_03000112:
        title: snow drift
        description: An accumulation of powdery snow which was transported and deposited
          via a snow drifting process.
        is_a: ENVO_03000111
        meaning: 'ENVO:03000112'
      ENVO_03000113:
        title: snow patch
        description: An accumulation of snow and firn which rests upon land.
        is_a: ENVO_03000111
        meaning: 'ENVO:03000113'
      ENVO_03000114:
        title: seasonal snow patch
        description: A snow patch which forms during a cold season and melts away
          during the succeeding warm season.
        is_a: ENVO_03000113
        meaning: 'ENVO:03000114'
      ENVO_03000115:
        title: perennial snow patch
        description: A snow patch which persists through at least one seasonal cycle.
        is_a: ENVO_03000113
        meaning: 'ENVO:03000115'
      ENVO_03000116:
        title: snowpack
        description: A snow mass which is large enough, and persists long enough,
          to undergo compaction under its own weight, leading to layer-like structural
          differentiation.
        is_a: ENVO_03000111
        meaning: 'ENVO:03000116'
      ENVO_01001687:
        title: mass of solid material
        description: An mass of environmental material which is composed primarily
          of a solid environmental material
        is_a: ENVO_01001686
        meaning: 'ENVO:01001687'
      ENVO_00000339:
        title: piece of rock
        description: A mass of solid material which is composed primarily of rock.
        is_a: ENVO_01001687
        meaning: 'ENVO:00000339'
      ENVO_00002139:
        title: pebble
        description: A piece of rock which is derived from clastic rock and has a
          grain size of 4 to 64 millimeters.
        is_a: ENVO_00000339
        meaning: 'ENVO:00002139'
      ENVO_00002140:
        title: cobble
        description: A piece of rock which has a grain size between 64 and 256 mm.
        is_a: ENVO_00000339
        meaning: 'ENVO:00002140'
      ENVO_00000341:
        title: piece of gravel
        description: A piece of rock which is between two and 64 millimetres in length
          along its largest dimension.
        is_a: ENVO_00000339
        meaning: 'ENVO:00000341'
      ENVO_01000243:
        title: boulder
        description: A piece of rock with a grain size above 300 millimetres in diameter.
        is_a: ENVO_00000339
        meaning: 'ENVO:01000243'
      ENVO_01000136:
        title: drop stone
        description: A piece of rock which fell vertically through the water column
          into finer-grained water-deposited sedimentary rocks.
        is_a: ENVO_00000339
        meaning: 'ENVO:01000136'
      ENVO_01000963:
        title: diatomite particle
        description: 'A piece of rock which is primarily composed of diatomite: the
          fossilized, siliceous remains of diatoms mixed with varying amounts of other
          clays and minerals.'
        is_a: ENVO_00000339
        meaning: 'ENVO:01000963'
      ENVO_01003002:
        title: particle
        description: A mass of solid material which is either 1) a minute fragment
          of a larger mass or 2) one of a collection of small masses composing an
          aggregate.
        is_a: ENVO_01001687
        meaning: 'ENVO:01003002'
      ENVO_00000340:
        title: particle of sand
        description: A particle which 1) is composed primarily of and derived from
          rock or mineral sources and 2) is or was part of a portion of sand.
        is_a: ENVO_01003002
        meaning: 'ENVO:00000340'
      ENVO_00000344:
        title: grain of desert sand
        is_a: ENVO_00000340
        meaning: 'ENVO:00000344'
      ENVO_00000345:
        title: grain of beach sand
        is_a: ENVO_00000340
        meaning: 'ENVO:00000345'
      ENVO_00000346:
        title: grain of acid dune sand
        is_a: ENVO_00000340
        meaning: 'ENVO:00000346'
      ENVO_00000347:
        title: grain of sea sand
        is_a: ENVO_00000340
        meaning: 'ENVO:00000347'
      ENVO_00000348:
        title: grain of rocky sand
        is_a: ENVO_00000340
        meaning: 'ENVO:00000348'
      ENVO_00000343:
        title: particle of silt
        description: A particle which 1) is primarily composed of quartz or feldspar
          and 2) is or was part of a portion of silt.
        is_a: ENVO_01003002
        meaning: 'ENVO:00000343'
      ENVO_01003003:
        title: particle of clay
        description: A particle which 1) is composed primarily of hydrous aluminium
          phyllosilicate minerals, in turn composed of aluminium and silicon ions
          bonded into tiny, thin plates by interconnecting oxygen and hydroxide ions,
          and 2) is or was part of a portion of clay.
        is_a: ENVO_01003002
        meaning: 'ENVO:01003003'
      ENVO_03000138:
        title: particle of snow
        description: A particle which is 1) primarily compposed of water ice, 2) on
          the order of 1 milimeter or less, 3) has a white and opaque appearance,
          and 4) is formed as a result of water droplets freezing during precipitation.
        is_a: ENVO_01003002
        meaning: 'ENVO:03000138'
      ENVO_01000293:
        title: ice mass
        description: A mass of water ice.
        is_a: ENVO_01001687
        meaning: 'ENVO:01000293'
      ENVO_01001547:
        title: land ice mass
        description: An ice mass which has formed over land.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001547'
      ENVO_00000145:
        title: ice cap
        description: A dome-shaped ice mass that covers less than 50,000 km2 of land
          area (usually covering a highland area).
        is_a: ENVO_01001547
        meaning: 'ENVO:00000145'
      ENVO_01001546:
        title: iceberg
        description: An ice mass which has broken away from a larger ice mass on land,
          such as a glacier or ice shelf, and may be either afloat or aground.
        is_a: ENVO_01001547
        meaning: 'ENVO:01001546'
      ENVO_00000298:
        title: marine iceberg
        description: A large mass of detached land ice in the sea or stranded in shallow
          water.
        is_a: ENVO_01001546
        meaning: 'ENVO:00000298'
      ENVO_01001534:
        title: tabular iceberg
        description: An iceberg which 1) has a flat upper surface, 2) is derived from
          an ice shelf, ice tongue, or floating tidewater glacier via detachment.
        is_a: ENVO_00000298
        meaning: 'ENVO:01001534'
      ENVO_00000307:
        title: icefall
        description: A portion of a glacier characterized by rapid flow, a chaotic
          crevassed surface, and a pronounced, at times vertical, slope.
        is_a: ENVO_01001547
        meaning: 'ENVO:00000307'
      ENVO_00000380:
        title: ice shelf
        description: An ice mass which 1) is attached to the coast 2) at least 2 meters
          in thickness 3) forms where a glacier or ice mass flows down to a coastline
          and onto the ocean surface and 4) grows by annual snow accumulation or by
          the seaward extension of land glaciers.
        is_a: ENVO_01001547
        meaning: 'ENVO:00000380'
      ENVO_00000392:
        title: ice tongue
        description: A long and narrow sheet of ice projecting out from the coastline.
          An ice tongue forms when a valley glacier moves very rapidly out into the
          ocean or a lake.
        is_a: ENVO_01001547
        meaning: 'ENVO:00000392'
      ENVO_01000279:
        title: ice lens
        description: An ice mass which is formed when moisture, diffused within soil
          or rock, accumulates and freezes in a localized zone, wedging soil or rock
          apart.
        is_a: ENVO_01001547
        meaning: 'ENVO:01000279'
      ENVO_01001529:
        title: glacier snout
        description: An ice mass which constitutes that part of a glacier which has
          the lowest elevation.
        is_a: ENVO_01001547
        meaning: 'ENVO:01001529'
      ENVO_01001345:
        title: floating ice mass
        description: An ice mass which is suspended in a water body, being sufficiently
          buoyant for part of the mass to breach the surface of that water body.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001345'
      ENVO_01001507:
        title: floating ice calf
        description: An ice calf which is suspended in a water mass, being partially
          exposed to an atmosphere.
        is_a: ENVO_01001345
        meaning: 'ENVO:01001507'
      ENVO_01001517:
        title: drift ice mass
        description: A floating mass of ice which is 1) unattached to land or land-fast
          ice and 2) moved by the action of winds or currents.
        is_a: ENVO_01001345
        meaning: 'ENVO:01001517'
      ENVO_01001556:
        title: pack ice mass
        description: 'A drift ice mass which has an ice concentration above or equal
          to 7/10: which covers 70% or more of a given area of a water body.'
        is_a: ENVO_01001517
        meaning: 'ENVO:01001556'
      ENVO_01001518:
        title: drifting sea ice mass
        description: A drift ice mass which is composed primarily of sea ice.
        is_a: ENVO_01001517
        meaning: 'ENVO:01001518'
      ENVO_03400012:
        title: hail stone
        description: An ice mass which 1) occurs in a ball-shape or irregular lump,
          2) has a minimum diameter of 5 millimeters (or 0.2 inches), and 3) is formed
          within convective clouds.
        is_a: ENVO_01000293
        meaning: 'ENVO:03400012'
      ENVO_01001335:
        title: anchor ice
        description: An ice mass which is attached to a bed underneath a body of water.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001335'
      ENVO_01001337:
        title: riverine anchor ice
        description: Anchor ice which is attached to a riverbed.
        is_a: ENVO_01001335
        meaning: 'ENVO:01001337'
      ENVO_01001344:
        title: freshwater seep riverine anchor ice
        description: "Anchor ice which is attached to a riverbed where a river flows\
          \ into a marine water body and which is formed by the freezing of freshwater\
          \ seeping out of the riverbed's sediments."
        is_a: ENVO_01001337
        meaning: 'ENVO:01001344'
      ENVO_01001506:
        title: ice calf
        description: An ice mass which has calved off an larger mass of ice.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001506'
      ENVO_01001508:
        title: anchored ice calf
        description: An ice calf which is frozen to the bed of an ocean or other water
          body.
        is_a: ENVO_01001506
        meaning: 'ENVO:01001508'
      ENVO_01001509:
        title: terrestrial ice calf
        description: An ice calf which rests on land.
        is_a: ENVO_01001506
        meaning: 'ENVO:01001509'
      ENVO_01001530:
        title: water ice core
        description: An ice mass which has been drilled from an accumulation of snow
          and ice that has built up over many years and that has recrystallized and
          has trapped air bubbles from previous time periods.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001530'
      ENVO_01001536:
        title: sea ice mass
        description: An ice mass which is composed primarily of sea ice.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001536'
      ENVO_01001522:
        title: fast ice
        description: A mass of sea ice which 1) is less than 2 meters in thickness
          and 2) forms along the coast, where it is attached to the shore, to an ice
          wall, to an ice front, or between shoals or grounded icebergs.
        is_a: ENVO_01001536
        meaning: 'ENVO:01001522'
      ENVO_01001535:
        title: floeberg
        description: An ice mass which is composed of a large amount of sea ice in
          the form of a hummock or a group of such hummocks, frozen together and separated
          from any surrounding ice by sea water.
        is_a: ENVO_01001536
        meaning: 'ENVO:01001535'
      ENVO_01001620:
        title: mass of ice and snow
        description: A object which is composed primarily of water-based snow and
          ice.
        is_a: ENVO_01000293
        meaning: 'ENVO:01001620'
      ENVO_03000065:
        title: ice floe
        description: An ice mass which forms a cohesive and contiguous sheet of water
          ice, floating upon the surface of a water body.
        is_a: ENVO_01000293
        meaning: 'ENVO:03000065'
      ENVO_03000066:
        title: sea ice floe
        description: An ice floe which is formed from frozen sea water, and floats
          upon the surface of a marine water body.
        is_a: ENVO_03000065
        meaning: 'ENVO:03000066'
      ENVO_03000067:
        title: pancake ice
        description: A sea ice floe which has a rounded or circular shape and raised
          rims.
        is_a: ENVO_03000066
        meaning: 'ENVO:03000067'
      ENVO_03000068:
        title: nilas
        description: A sea ice floe which is thin, elastic, continuous, and of a transparent
          gray color, which results from the freezing of new ice.
        is_a: ENVO_03000066
        meaning: 'ENVO:03000068'
      ENVO_03000069:
        title: young ice
        description: A sea ice floe which is inflexible and thicker than nilas.
        is_a: ENVO_03000066
        meaning: 'ENVO:03000069'
      ENVO_03400005:
        title: ice pellet
        description: An ice mass which is 1) transparent or translucent, 2) rounded,
          spherically, or cylindrically shaped, and 3) less than 5 milimetres in diameter.
        is_a: ENVO_01000293
        meaning: 'ENVO:03400005'
      ENVO_03400015:
        title: sleet pellet
        description: An ice mass which is primarily composed of frozen or mostly frozen
          raindrops or refrozen partially melted snowflakes.
        is_a: ENVO_01000293
        meaning: 'ENVO:03400015'
      ENVO_00002035:
        title: meteorite
        description: A natural object originating in outer space that survives an
          impact with a planetary surface without being destroyed.
        is_a: ENVO_01001687
        meaning: 'ENVO:00002035'
      ENVO_00002049:
        title: stony meteorite
        is_a: ENVO_00002035
        meaning: 'ENVO:00002049'
      ENVO_00002048:
        title: chondrite
        description: A stony meteorite that have not been modified due to melting
          or differentiation of the parent body.
        is_a: ENVO_00002049
        meaning: 'ENVO:00002048'
      ENVO_00002050:
        title: achondrite
        description: A stony meteorite that is made of material similar to terrestrial
          basalts or plutonic rocks.
        is_a: ENVO_00002049
        meaning: 'ENVO:00002050'
      ENVO_00002051:
        title: stony-iron meteorite
        description: A meteorite that consists of a mixture of iron-nickel metal and
          silicate minerals.
        is_a: ENVO_00002035
        meaning: 'ENVO:00002051'
      ENVO_00002052:
        title: iron meteorite
        description: A meteorite that overwhelmingly of nickel-iron alloys.
        is_a: ENVO_00002035
        meaning: 'ENVO:00002052'
      ENVO_01000776:
        title: piece of plastic
        description: A mass of solid material which is primarily composed of plastic.
        is_a: ENVO_01001687
        meaning: 'ENVO:01000776'
      ENVO_06105010:
        title: plastic pellet
        description: A piece of plastic which is 1) hard, 2) has a smooth external
          surface, and 3) has a roughly spherical or granular shape.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105010'
      ENVO_01000777:
        title: nurdle
        description: A plastic pellet which is produced such that its size allows
          it to be rapidly melted and used as input for further downstream manufacturing
          processes.
        is_a: ENVO_06105010
        meaning: 'ENVO:01000777'
      ENVO_01000944:
        title: microplastic particle
        description: A piece of plastic which has a diameter less than five millimetres.
        is_a: ENVO_01000776
        meaning: 'ENVO:01000944'
      ENVO_01000945:
        title: primary microplastic particle
        description: A microplastic particle which is the direct output of a manufacturing
          process.
        is_a: ENVO_01000944
        meaning: 'ENVO:01000945'
      ENVO_01000946:
        title: secondary microplastic particle
        description: A microplastic particle which is derived from the breakdown of
          larger plastic debris.
        is_a: ENVO_01000944
        meaning: 'ENVO:01000946'
      ENVO_06105006:
        title: piece of plastic foam
        description: A piece of plastic which has a matrix- or sponge-like structure
          with numerous, hollow internal spaces.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105006'
      ENVO_06105026:
        title: granule of plastic foam
        description: A piece of plastic foam which has a near-spherical or granular
          shape.
        is_a: ENVO_06105006
        meaning: 'ENVO:06105026'
      ENVO_06105007:
        title: plastic film
        description: A piece of plastic which is flexible, thin, and planar.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105007'
      ENVO_06105008:
        title: plastic fragment
        description: A piece of plastic which 1) is hard, 2) has an irregular shape,
          and 3) has broken off of a larger piece of plastic.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105008'
      ENVO_06105009:
        title: plastic line
        description: A piece of plastic which is linear and flexible.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105009'
      ENVO_06105102:
        title: megaplastic particle
        description: A piece of plastic which is greater than 1 metre in its longest
          dimension.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105102'
      ENVO_06105103:
        title: macroplastic particle
        description: A piece of plastic which is between 25 and 1000 millimetres in
          its longest dimension.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105103'
      ENVO_06105104:
        title: mesoplastic particle
        description: A piece of plastic which is between 5 and 25 millimetres in its
          longest dimension.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105104'
      ENVO_06105105:
        title: nanoplastic particle
        description: A piece of plastic which has a diameter less than 1 micrometre.
        is_a: ENVO_01000776
        meaning: 'ENVO:06105105'
      ENVO_01001814:
        title: organic object
        description: An object which is formed as a result of one or more biological
          processes and is composed primarily of organic material.
        is_a: ENVO_01001686
        meaning: 'ENVO:01001814'
      ENVO_00002033:
        title: carcass
        description: The dead body of an animal.
        is_a: ENVO_01001814
        meaning: 'ENVO:00002033'
      ENVO_01000139:
        title: animal carcass fall
        description: The carcass of an animal that has fallen to the bottom of a body
          of water.
        is_a: ENVO_00002033
        meaning: 'ENVO:01000139'
      ENVO_01000140:
        title: whale fall
        description: 'Whale fall is the term used for a whale carcass that has fallen
          to the ocean floor. When a whale dies in shallow water, its carcass is typically
          devoured by scavengers over a relatively short period of time: within several
          months. However, in deeper water (depths of 2,000 m/6,600 ft or greater),
          fewer scavenger species exist, and the carcass can provide sustenance for
          a complex localized ecosystem over periods of decades.'
        is_a: ENVO_01000139
        meaning: 'ENVO:01000140'
      ENVO_01000141:
        title: seal fall
        description: Seal fall is the term used for a seal carcass that has fallen
          to the ocean floor.
        is_a: ENVO_01000139
        meaning: 'ENVO:01000141'
      ENVO_01000007:
        title: organic object formed through microbial activity
        description: An organic object which is formed as a result of the biological
          processes mediated by microbial assemblages.
        is_a: ENVO_01001814
        meaning: 'ENVO:01000007'
      ENVO_01000162:
        title: organ
        description: A collection of tissues joined in structural unit to serve a
          common function.
        is_a: ENVO_01001814
        meaning: 'ENVO:01000162'
      ENVO_01000163:
        title: photophore
        description: 'A photophore is a light-emitting organ which appears as luminous
          spots on various marine animals, including fish and cephalopods. The organ
          can be simple, or as complex as the human eye; equipped with lenses, shutters,
          color filters and reflectors. The light can be produced from compounds during
          the digestion of prey, from specialized mitochondrial cells in the organism,
          called photocytes ("light producing" cells) , or, similarly, associated
          with symbiotic  bacteria in the organism.'
        is_a: ENVO_01000162
        meaning: 'ENVO:01000163'
      ENVO_01000164:
        title: root nodule
        description: Root nodules occur on the roots of plants that associate with
          symbiotic nitrogen-fixing bacteria.
        is_a: ENVO_01000162
        meaning: 'ENVO:01000164'
      ENVO_01000167:
        title: determinate root nodule
        description: Determinate nodules are root nodules found on tropical (sub)legumes,
          such as those of the genera Glycine (soybean), Phaseolus  (common bean),
          Lotus, and Vigna. Determinate nodules lose meristematic activity shortly
          after initiation, thus growth is due to cell expansion resulting in mature
          nodules which are spherical in shape.
        is_a: ENVO_01000164
        meaning: 'ENVO:01000167'
      ENVO_01000168:
        title: indeterminate root nodule
        description: 'Indeterminate nodules are found on temperate legumes like Pisum  (pea),
          Medicago (alfalfa), Trifolium (clover), and Vicia (vetch). They earned the
          moniker "indeterminate" because they maintain an active apical meristem
          that produces new cells for growth over the life of the nodule. Because
          they are actively growing, indeterminate nodules manifest zones which demarcate
          different stages of development/symbiosis.'
        is_a: ENVO_01000164
        meaning: 'ENVO:01000168'
      ENVO_01000169:
        title: indeterminate root nodule active meristem
        description: A part of an indeterminate root nodule where new nodule tissue
          is formed which will later differentiate into the other zones of the nodule.
        is_a: ENVO_01000168
        meaning: 'ENVO:01000169'
      ENVO_01000170:
        title: indeterminate root nodule infection zone
        description: A part of an indeterminate root nodule permeated with infection
          threads full of bacteria. The plant cells are larger than in the previous
          zone and cell division is halted.
        is_a: ENVO_01000168
        meaning: 'ENVO:01000170'
      ENVO_01000171:
        title: indeterminate root nodule nitrogen fixation zone
        description: A part of an indeterminate root nodule where each cell contains
          a large, central vacuole and the cytoplasm is filled with fully differentiated
          bacteroids which are actively fixing nitrogen. Typically, the plant provides
          these cells with leghemoglobin, resulting in a distinct pink color.
        is_a: ENVO_01000168
        meaning: 'ENVO:01000171'
      ENVO_01000172:
        title: indeterminate root nodule senescent zone
        description: A part of an indeterminate root nodule where plant cells and
          their bacteroid contents are being degraded. The breakdown of the heme component
          of leghemoglobin results in a visible greening at the base of the nodule.
        is_a: ENVO_01000168
        meaning: 'ENVO:01000172'
      ENVO_01000165:
        title: trophosome
        description: A specialised organ found in deep-sea tube worms populating hydrothermal
          vent environments that is colonised by chemosynthetic bacteria which supply
          the host worm with organic compounds. The term may be applied to similar
          organs in other worms.
        is_a: ENVO_01000162
        meaning: 'ENVO:01000165'
      ENVO_01000166:
        title: mycetome
        description: A specialized organ that is linked to the gut in beetles and
          host to a symbiotic yeast. The yeast cells assist in the digestion of less
          nutritious foods, supply needed B-vitamins and sterols, and provide resistance
          to certain toxins.
        is_a: ENVO_01000162
        meaning: 'ENVO:01000166'
      ENVO_01000912:
        title: cloud condensation nucleus
        description: A solid or liquid particle, usually 0.2 micrometers in diameter,
          on which water vapour condenses, seeding cloud formation.
        is_a: ENVO_01001686
        meaning: 'ENVO:01000912'
      ENVO_01001688:
        title: mass of fluid
        description: An object which is composed primarily of a fluid.
        is_a: ENVO_01001686
        meaning: 'ENVO:01001688'
      ENVO_01001690:
        title: mass of liquid
        description: An object which is composed primarily of a liquid.
        is_a: ENVO_01001688
        meaning: 'ENVO:01001690'
      ENVO_01000831:
        title: droplet
        description: A droplet is a small column of liquid, bounded completely or
          almost completely by free surfaces which maintains its shape due to the
          surface tension of the liquid.
        is_a: ENVO_01001690
        meaning: 'ENVO:01000831'
      ENVO_01000832:
        title: raindrop
        description: A droplet formed by condensation of vapour in an atmosphere and
          which is sufficiently massive to overcome atmospheric resistance and fall
          to a planetary surface due to gravity.
        is_a: ENVO_01000831
        meaning: 'ENVO:01000832'
      ENVO_01000834:
        title: water raindrop
        is_a: ENVO_01000832
        meaning: 'ENVO:01000834'
      ENVO_01000833:
        title: water droplet
        description: A droplet of water
        is_a: ENVO_01000831
        meaning: 'ENVO:01000833'
      ENVO_01000836:
        title: water-based cloud droplet
        description: A cloud droplet composed primarily of water.
        is_a: ENVO_01000833
        meaning: 'ENVO:01000836'
      ENVO_03520006:
        title: supercooled water droplet
        description: "A water droplet which exists at temperatures below 0\xB0C (273.15K)."
        is_a: ENVO_01000833
        meaning: 'ENVO:03520006'
      ENVO_01000835:
        title: cloud droplet
        description: A droplet which is spherical in shape and suspended in an atmosphere,
          being of too small a mass to be pulled to a planetary surface by gravity.
        is_a: ENVO_01000831
        meaning: 'ENVO:01000835'
      ENVO_01001689:
        title: mass of gas
        description: An object which is composed primarily of a gas.
        is_a: ENVO_01001688
        meaning: 'ENVO:01001689'
      ENVO_01001682:
        title: air mass
        description: An object which is composed of a continuous mass of air.
        is_a: ENVO_01001689
        meaning: 'ENVO:01001682'
      ENVO_01001711:
