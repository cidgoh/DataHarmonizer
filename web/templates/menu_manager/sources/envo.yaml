      CHEBI_27027:
        title: micronutrient
        is_a: CHEBI_33284
        meaning: 'CHEBI:27027'
      CHEBI_33937:
        title: macronutrient
        description: Any nutrient required in large quantities by organisms throughout
          their life in order to orchestrate a range of physiological functions. Macronutrients
          are usually chemical elements (carbon, hydrogen, nitrogen, oxygen, phosphorus
          and sulfur) that humans consume in the largest quantities. Calcium, sodium,
          magnesium and potassium are sometimes included as macronutrients because
          they are required in relatively large quantities compared with other vitamins
          and minerals.
        is_a: CHEBI_33284
        meaning: 'CHEBI:33937'
      ENVO_01001496:
        title: inorganic macronutrient dissolved in ocean water
