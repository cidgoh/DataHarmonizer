        description: A quarry from which sand is extracted.
        is_a: ENVO_00000284
        meaning: 'ENVO:00000028'
      ENVO_00000473:
        title: gravel pit
        description: A quarry from which gravel is extracted.
        is_a: ENVO_00000284
        meaning: 'ENVO:00000473'
      ENVO_00002167:
        title: platinum mine
        is_a: ENVO_00000076
        meaning: 'ENVO:00002167'
      ENVO_00002168:
        title: gold mine
        is_a: ENVO_00000076
        meaning: 'ENVO:00002168'
      ENVO_00002169:
        title: coal mine
        is_a: ENVO_00000076
        meaning: 'ENVO:00002169'
      ENVO_02000092:
        title: iron mine
        is_a: ENVO_00000076
        meaning: 'ENVO:02000092'
      ENVO_02000093:
        title: uranium mine
        is_a: ENVO_00000076
        meaning: 'ENVO:02000093'
      ENVO_01001873:
