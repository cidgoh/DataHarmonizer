      ENVO_06105123:
        title: synthetic polymer
        description: A polymer which is the output of a manufacturing process.
        is_a: CHEBI_60027
        meaning: 'ENVO:06105123'
      CHEBI_46662:
        title: mineral
        description: "In general, a mineral is a chemical substance that is normally\
          \ crystalline formed and has been formed as a result of geological processes.\
          \ The term also includes metamict substances (naturally occurring, formerly\
          \ crystalline substances whose crystallinity has been destroyed by ionising\
          \ radiation) and can include naturally occurring amorphous substances that\
          \ have never been crystalline ('mineraloids') such as georgite and calciouranoite\
          \ as well as substances formed by the action of geological processes on\
          \ bigenic compounds ('biogenic minerals')."
        is_a: CHEBI_59999
        meaning: 'CHEBI:46662'
