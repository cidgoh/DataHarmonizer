        description: A hospital is a building in which health care services are  provided
          by specialized staff and equipment.
        is_a: ENVO_03501134
        meaning: 'ENVO:00002173'
      ENVO_03501181:
        title: tertiary referral hospital
        description: A hospital which is used to provide tertiary care.
        is_a: ENVO_00002173
        meaning: 'ENVO:03501181'
      ENVO_01000932:
        title: nursing home
        description: A building in which nursing aides and skilled nurses provide
          care and treatment to residents who have significant difficulty coping with
          the required activities of daily living.
        is_a: ENVO_03501134
        meaning: 'ENVO:01000932'
      ENVO_03501135:
        title: acute care facility
        description: A healthcare facility which is used for short-term patient care.
        is_a: ENVO_03501134
        meaning: 'ENVO:03501135'
      ENVO_03501136:
        title: clinical patient assessment facility
        description: A healthcare facility in which patients are medically assessed.
        is_a: ENVO_03501134
        meaning: 'ENVO:03501136'
      ENVO_03501137:
        title: hospital unit facility
        description: A healthcare facility which 1) is located in part of a hospital
          and 2) is used by an organizational unit within a hospital.
        is_a: ENVO_03501134
        meaning: 'ENVO:03501137'
      ENVO_03501138:
        title: anaesthetics unit facility
        description: A hospital unit facility which is used for anaesthetic service
          provision.
        is_a: ENVO_03501137
        meaning: 'ENVO:03501138'
      ENVO_03501139:
        title: breast screening unit facility
        description: A hospital unit facility which is used for breast cancer screening.
        is_a: ENVO_03501137
        meaning: 'ENVO:03501139'
      ENVO_03501140:
        title: chaplaincy unit facility
        description: A hospital unit facility which is used to provide nondemoninational
          religious services.
        is_a: ENVO_03501137
        meaning: 'ENVO:03501140'
      ENVO_03501141:
        title: coronary care unit facility
        description: A hospital unit facility which is used to provide cardiac patient
          care.
        is_a: ENVO_03501137
        meaning: 'ENVO:03501141'
      ENVO_03501142:
