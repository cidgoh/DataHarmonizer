        description: "A room which is used for patient care during a patient's visit\
          \ or stay in a healthcare facility."
        is_a: ENVO_01000426
        meaning: 'ENVO:03501180'
      ENVO_03501342:
        title: dormitory
        description: A room which contains 1) a number of beds for sleeping and 2)
          often some other furniture and/or residential utilities.
        is_a: ENVO_01000426
        meaning: 'ENVO:03501342'
      ENVO_03600035:
        title: cold room
        description: A room which is maintained at lower than ambient temperatures.
        is_a: ENVO_01000426
        meaning: 'ENVO:03600035'
      ENVO_01000465:
        title: building wall
        description: Building walls are bulding parts which serve to support roofs,
          floors and ceilings; enclose a space as part of the building envelope; give
          buildings form; and to provide shelter and security.
        is_a: ENVO_01000420
        meaning: 'ENVO:01000465'
      ENVO_01000469:
        title: exterior wall
        description: An exterior wall is a building wall which separates the interior
          of a building from the buildings surrounding environment.
        is_a: ENVO_01000465
        meaning: 'ENVO:01000469'
      ENVO_01000494:
        title: thatched exterior wall
        description: A thatched exterior wall is an exterior wall that is composed
          primarily of thatch.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000494'
      ENVO_01000495:
        title: stone exterior wall
        description: A stone exterior wall is an exterior wall that is composed primarily
          of rock.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000495'
      ENVO_01000496:
        title: straw exterior wall
        description: A straw exterior wall is an exterior wall that is composed primarily
          of straw.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000496'
      ENVO_01000497:
        title: mud exterior wall
        description: A mud exterior wall is an exterior wall that is composed primarily
          of mud.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000497'
      ENVO_01000499:
        title: pole-reinforced mud exterior wall
        description: A pole-reinforced mud exterior wall is a mud exterior wall which
          is supported and reinforced by poles.
        is_a: ENVO_01000497
        meaning: 'ENVO:01000499'
      ENVO_01000500:
        title: brick exterior wall
        description: A brick exterior wall is an exterior wall that is built from
          bricks.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000500'
      ENVO_01000503:
        title: burnt-brick exterior wall
        description: A burnt brick exterior wall is an exterior wall that is built
          from burnt bricks.
        is_a: ENVO_01000500
        meaning: 'ENVO:01000503'
      ENVO_01000504:
        title: unburnt-brick exterior wall
        description: An unburnt brick exterior wall is an exterior wall that is built
          from unburnt bricks.
        is_a: ENVO_01000500
        meaning: 'ENVO:01000504'
      ENVO_01000506:
        title: concrete exterior wall
        description: A concrete exterior wall is an exterior wall that is composed
          primarily of concrete.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000506'
      ENVO_01000509:
        title: sheet-iron exterior wall
        description: A sheet-iron exterior wall is an exterior wall that is built
          from sheets of iron.
        is_a: ENVO_01000469
        meaning: 'ENVO:01000509'
      ENVO_01000470:
        title: building envelope
        description: 'A building envelope is a building part composed of those building
          parts which physically separate the interior of a building from its surrounding
          environment.

          The building envelope provides resistance to air, water, heat, light, and
          noise transfer. The three basic elements of a building envelope are a weather
          barrier, air barrier, and thermal barrier.'
        is_a: ENVO_01000420
        meaning: 'ENVO:01000470'
      ENVO_01000472:
        title: building roof
        description: A roof is the covering on the uppermost part of a building which
          provides protection from animals and weather, notably rain, but also heat,
          wind and sunlight. A roof is also the framing or structure which supports
          the covering
        is_a: ENVO_01000420
        meaning: 'ENVO:01000472'
      ENVO_01000510:
        title: sheet-iron building roof
        description: A sheet-iron building roof is a building roof that is built from
          sheets of iron.
        is_a: ENVO_01000472
        meaning: 'ENVO:01000510'
      ENVO_01000511:
        title: thatched building roof
        description: A thatched building roof is a building roof that is built by
          thatching (or out of thatch).
        is_a: ENVO_01000472
        meaning: 'ENVO:01000511'
      ENVO_01000512:
        title: wooden building roof
        description: A wooden building roof is a building roof that is built from
          wood.
        is_a: ENVO_01000472
        meaning: 'ENVO:01000512'
      ENVO_01000513:
        title: asbestos building roof
        description: An asbestos building roof is a building roof that is built from
          asbestos.
        is_a: ENVO_01000472
        meaning: 'ENVO:01000513'
      ENVO_01000515:
        title: tiled building roof
        description: A tile building roof is a building roof that is built using tiles.
        is_a: ENVO_01000472
        meaning: 'ENVO:01000515'
      ENVO_01000471:
        title: ceiling
        is_a: ENVO_01000420
        meaning: 'ENVO:01000471'
      ENVO_01000825:
        title: eaves
        description: A part of a building roof which overhangs the face of a wall
          and, normally, projects beyond the side of a building.
        is_a: ENVO_01000420
        meaning: 'ENVO:01000825'
      ENVO_01000826:
        title: open eaves
        description: Overhanging eaves where the rafters and underside of the roof
          are visible from below.
        is_a: ENVO_01000825
        meaning: 'ENVO:01000826'
      ENVO_01000827:
        title: closed eaves
        description: Eaves in which projecting roof members are not visible, being
          closed from view by boarding.
        is_a: ENVO_01000825
        meaning: 'ENVO:01000827'
      ENVO_01001224:
        title: office
        description: A building part within which administrative work is done by an
          organisations users in order to support and realise the objectives of that
          organization.
        is_a: ENVO_01000420
        meaning: 'ENVO:01001224'
      ENVO_03501121:
        title: building corridor
        description: A building part which is a narrow hall or passage in a building
          with rooms leading off it.
        is_a: ENVO_01000420
        meaning: 'ENVO:03501121'
      ENVO_03501301:
        title: baseboard
        description: A building part consisting of a board covering the joint between
          the lowest part of an interior wall surface and the floor.
        is_a: ENVO_01000420
        meaning: 'ENVO:03501301'
      ENVO_03600000:
        title: cleanroom
        description: A building part which is maintained such that the number of foreign
          particulates within it is controlled.
        is_a: ENVO_01000420
        meaning: 'ENVO:03600000'
      ENVO_03600008:
        title: intensive care unit
        description: A building part which has been constructed to support the provision
          of intensive care medicine to patients with severe or life-threatening illnesses
          and injuries.
        is_a: ENVO_01000420
        meaning: 'ENVO:03600008'
      ENVO_03600067:
        title: neonatal intensive care unit
        description: An intensive care unit (ICU) specializing in the care of ill
          or premature newborn infants.
        is_a: ENVO_03600008
        meaning: 'ENVO:03600067'
      ENVO_01000467:
        title: constructed barrier
        description: A constructed barrier is a freestanding wall, berm, or fence
          built to limit movement of entities across a boundary.
        is_a: ENVO_00000070
        meaning: 'ENVO:01000467'
      ENVO_00000074:
        title: dam
        description: A barrier constructed across a watercourse to control the flow
          or raise the level of water.
        is_a: ENVO_01000467
        meaning: 'ENVO:00000074'
      ENVO_00000468:
        title: hydroelectric dam
        description: A dam constructed for the purpose of generating electricity from
          the water stored behind it.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000468'
      ENVO_00000470:
        title: irrigation dam
        description: A dam constructed for the purpose of holding water in a reservoir
          for irrigation.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000470'
      ENVO_00000471:
        title: flood control dam
        description: A dam constructed for the purpose of controlling flooding.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000471'
      ENVO_00000535:
        title: weir
        description: A low obstruction built across the path of s stream to raise
          its level.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000535'
      ENVO_00000553:
        title: multipurpose dam
        description: A dam constructed for more than one purpose.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000553'
      ENVO_00000554:
        title: saddle dam
        description: An auxiliary dam constructed to confine the reservoir created
          by a primary dam either to permit a higher water elevation and storage or
          to limit the extent of a reservoir for increased efficiency.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000554'
      ENVO_00000555:
        title: check dam
        description: A dam designed to reduce flow velocity and control soil erosion.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000555'
      ENVO_00000556:
        title: wing dam
        description: A dam that only partly restricts a waterway, creating a faster
          channel that resists the accumulation of sediment.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000556'
      ENVO_00000557:
        title: dry dam
        description: A dam designed to control flooding. It normally holds back no
          water and allows the channel to flow freely, except during periods of intense
          flow that would otherwise cause flooding downstream.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000557'
      ENVO_00000558:
        title: diversionary dam
        description: A dam designed to divert all or a portion of the flow of a river
          from its natural course.
        is_a: ENVO_00000074
        meaning: 'ENVO:00000558'
      ENVO_03600032:
        title: embankment dam
        description: A dam which is created by the placement and compaction of a complex
          semi-plastic mound of various compositions of soil, sand, clay, or rock.
        is_a: ENVO_00000074
        meaning: 'ENVO:03600032'
      ENVO_03600031:
        title: earth-filled dam
        description: An embankment dam which is primarily composed of compacted earth.
        is_a: ENVO_03600032
        meaning: 'ENVO:03600031'
      ENVO_03600020:
        title: tailings dam
        description: An earth-filled dam which is used for the storage of mining operations
          byproducts, after separating the ore from the gangue.
        is_a: ENVO_03600031
        meaning: 'ENVO:03600020'
      ENVO_01000466:
        title: boundary wall
        description: A boundary wall is a constructed barrier which is usually opaque,
          constructed from masonry, and of greater structural strength than a fence.
        is_a: ENVO_01000467
        meaning: 'ENVO:01000466'
      ENVO_01000468:
        title: fence
        description: A fence is a constructed barrier which is  generally of lighter
          construction than a wall and used to provide visual sectioning of spaces.
        is_a: ENVO_01000467
        meaning: 'ENVO:01000468'
      ENVO_00000076:
