      ENVO_01000261:
        title: obsolete lysocline
        description: A cline within a marine water body where the rate of calcite
          dissolution changes rapidly with depth. The increase in the rate of calcite
          dissolution with depth is largely due to the concomitant fall in calcite
          saturation.
        status: DEPRECATED
        meaning: 'ENVO:01000261'
      ENVO_01000264:
        title: obsolete vapour
        description: A vapour is an environmental material in the gas phase at a temperature
          lower than its critical point.
        status: DEPRECATED
        meaning: 'ENVO:01000264'
      ENVO_01000351:
        title: obsolete marine mesoscale eddy
        description: A marine mesoscale eddy is a current of marine water which has
          a typical horizontal diameter of less than 100 km and persists for approximately
          one month.
        status: DEPRECATED
        meaning: 'ENVO:01000351'
      ENVO_01000404:
