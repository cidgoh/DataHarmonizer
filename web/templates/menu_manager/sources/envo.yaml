      CHEBI_78616:
        title: carbohydrates and carbohydrate derivatives
        description: Any organooxygen compound that is a polyhydroxy-aldehyde or -ketone,
          or a compound derived from one. Carbohydrates contain only carbon, hydrogen
          and oxygen and usually have an empirical formula Cm(H2O)n; carbohydrate
          derivatives may contain other elements by substitution or condensation.
        is_a: CHEBI_36963
        meaning: 'CHEBI:78616'
      CHEBI_16646:
        title: carbohydrate
        description: Any member of the class of organooxygen compounds that is a polyhydroxy-aldehyde
          or -ketone or a lactol resulting from their intramolecular condensation
          (monosaccharides); substances derived from these by reduction of the carbonyl
          group (alditols), by oxidation of one or more hydroxy groups to afford the
          corresponding aldehydes, ketones, or carboxylic acids, or by replacement
          of one or more hydroxy group(s) by a hydrogen atom; and polymeric products
          arising by intermolecular acetal formation between two or more such molecules
          (disaccharides, polysaccharides and oligosaccharides). Carbohydrates contain
          only carbon, hydrogen and oxygen atoms; prior to any oxidation or reduction,
          most have the empirical formula Cm(H2O)n. Compounds obtained from carbohydrates
          by substitution, etc., are known as carbohydrate derivatives and may contain
          other elements. Cyclitols are generally not regarded as carbohydrates.
        is_a: CHEBI_78616
        meaning: 'CHEBI:16646'
      CHEBI_18154:
        title: polysaccharide
        description: A biomacromolecule consisting of large numbers of monosaccharide
          residues linked glycosidically. This term is commonly used only for those
          containing more than ten monosaccharide residues.
        is_a: CHEBI_16646
        meaning: 'CHEBI:18154'
