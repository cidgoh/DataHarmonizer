      FOODON_00001209:
        title: pulse food product
        description: 'PULSES are annual leguminous crops yielding from one to 12 grains
          or seeds of variable size, shape and colour within a pod. They are used
          for both food and feed. The term "pulses" is limited to crops harvested
          solely for dry grain, thereby excludingcrops harvested green for food (green
          peas, green beans, etc.) which are classified as vegetable crops. Also excluded
          are those crops used mainly for oil extraction (e.g.soybeand and groundnuts)
          and leguminous crops (e.g. seeds of clover and alfalfa) that are used exclusively
