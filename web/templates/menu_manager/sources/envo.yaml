          materials.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000076'
      ENVO_02000110:
        title: open-pit mine
        description: A surface mine that utilizes a technique of extracting rock or
          minerals from the earth by their removal from an open pit or borrow.
        is_a: ENVO_00000076
        meaning: 'ENVO:02000110'
      ENVO_00000284:
        title: quarry
        description: An open-pit mine from which rock or minerals are extracted.
        is_a: ENVO_02000110
        meaning: 'ENVO:00000284'
      ENVO_00000028:
