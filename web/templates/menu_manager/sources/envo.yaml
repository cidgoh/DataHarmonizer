          conservatory, on the grounds of fashionable residences from the 17th to
          the 19th centuries.
        is_a: ENVO_00000073
        meaning: 'ENVO:03501277'
      ENVO_03501278:
        title: skyscraper
        description: A building which historically has at least 10 floors.
        is_a: ENVO_00000073
        meaning: 'ENVO:03501278'
      ENVO_03501280:
        title: mausoleum
        description: A public building constructed as a external, free-standing monument
