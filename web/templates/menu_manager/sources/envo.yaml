      FOODON_03420152:
        title: carbohydrate extract, concentrate, or isolate
        description: Extract, concentrate or isolate high in sugar, oligosaccharide
          or polysaccharide.
        is_a: FOODON_03420228
        meaning: 'FOODON:03420152'
      FOODON_03420108:
        title: sugar
        description: "A broad term that includes the nutritive sweeteners dextrose,\
          \ fructose, galactose, lactose, maltose and sucrose, which are simple carbohydrates\
          \ with molecules composed of one or two saccharide units. Note that on a\
          \ product label or in a recipe, 'sugar' means *SUCROSE* and should be so\
          \ indexed. Use the broad term *SUGAR* only if the specific sugar used is\
          \ not known or not listed in the vocabulary."
        is_a: FOODON_03420152
        meaning: 'FOODON:03420108'
      FOODON_00002454:
