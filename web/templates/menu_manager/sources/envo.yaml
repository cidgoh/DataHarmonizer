      ENVO_00003914:
        title: chalk soil
        description: Soil which has increased levels of chalk.
        is_a: ENVO_00003082
        meaning: 'ENVO:00003914'
      ENVO_00005753:
        title: urea enriched soil
        description: A portion of urea enriched soil is a portion of soil with elevated
          levels of urea.
        is_a: ENVO_00003082
        meaning: 'ENVO:00005753'
      ENVO_00005757:
        title: bacteria enriched soil
        description: A portion of bacteria enriched soil is a portion of soil with
          elevated bacterial abundance.
        is_a: ENVO_00003082
        meaning: 'ENVO:00005757'
      ENVO_00005762:
        title: chloropicrin enriched soil
        description: A portion of chloropicrin enriched soil is a portion of soil
          with elevated levels of chloropicrin.
        is_a: ENVO_00003082
        meaning: 'ENVO:00005762'
      ENVO_00005763:
        title: humus-rich acidic ash soil
        description: Soil which 1) has increased levels of humus, 2) has low pH levels,
          3) has increased levels of mineral ash.
        is_a: ENVO_00003082
        meaning: 'ENVO:00005763'
      ENVO_00005776:
        title: peaty paddy field soil
        description: Paddy field soil which has increased levels of peat.
        is_a: ENVO_00003082
        meaning: 'ENVO:00005776'
      ENVO_01000427:
        title: carbon nanotube enriched soil
        description: A portion of carbon nanotube enriched soil is a portion of soil
          with elevated levels of carbon nanotubes.
        is_a: ENVO_00003082
        meaning: 'ENVO:01000427'
      ENVO_06105274:
        title: sandy loam
        description: Loam which has a high proportion of sand in its composition.
        is_a: ENVO_00003082
        meaning: 'ENVO:06105274'
      ENVO_06105275:
        title: silty loam
        description: Loam which has a high proportion of silt in its composition.
        is_a: ENVO_00003082
        meaning: 'ENVO:06105275'
      ENVO_06105277:
        title: clay loam
        description: Loam which has a high proportion of clay in its composition.
        is_a: ENVO_00003082
        meaning: 'ENVO:06105277'
      ENVO_06105276:
        title: sandy clay loam
        description: Clay loam which has a high proportion of sand in its composition.
        is_a: ENVO_06105277
        meaning: 'ENVO:06105276'
      ENVO_06105278:
        title: silty clay loam
        description: Clay loam which has a high proportion of silt in its composition.
        is_a: ENVO_06105277
        meaning: 'ENVO:06105278'
      ENVO_00002229:
        title: arenosol
        description: Arenosols are sandy soils, including both soils developed in
          residual sands after in situ weathering of usually quartz-rich sediments
          or rock, and soils developed in recently deposited sands such as dunes in
          deserts and beach lands.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002229'
      ENVO_00002230:
        title: anthrosol
        description: Anthrosols comprise soils that have been modified profoundly
          through human activities, such as addition of organic materials or household
          wastes, irrigation and cultivation.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002230'
      ENVO_00002231:
        title: alisol
        description: Alisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Alisols have a low base
          saturation at certain depths and high-activity clays throughout the argic
          horizon. They lack the albeluvic tonguing as in Albeluvisols. They occur
          predominantly in humid tropical, humid subtropical and warm temperate regions.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002231'
      ENVO_00002232:
        title: andosol
        description: Andosols are soils that develop in volcanic ejecta or glasses
          under almost any climate (except under hyperarid climate conditions). However,
          Andosols may also develop in other silicate-rich materials under acid weathering
          in humid and perhumid climates.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002232'
      ENVO_01001841:
        title: volcanic soil
        description: An andosol which derives its silica content from glass and tephra
          ejected during a volcanic eruption.
        is_a: ENVO_00002232
        meaning: 'ENVO:01001841'
      ENVO_00002233:
        title: albeluvisol
        description: Albeluvisols are soils that have, beginning within 1 m of the
          soil surface, a clay illuviation horizon with an irregular or broken upper
          boundary resulting in tonguing of bleached soil material into the illuviation
          horizon.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002233'
      ENVO_01001397:
        title: ultisol
        description: A soil which has high mineral content and which contain no calcareous
          material, have less than 10% weatherable minerals its surface layer, and
          have less than 35% base saturation throughout its volume.
        is_a: ENVO_00001998
        meaning: 'ENVO:01001397'
      ENVO_00002234:
        title: acrisol
        description: Acrisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Acrisols have in certain
          depths a low base saturation and low-activity clays.
        is_a: ENVO_01001397
        meaning: 'ENVO:00002234'
      ENVO_00002235:
        title: cambisol
        description: Cambisols combine soils with at least an incipient subsurface
          soil formation. Transformation of parent material is evident from structure
          formation and mostly brownish discoloration, increasing clay percentage,
          and/or carbonate removal.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002235'
      ENVO_01001526:
        title: frozen soil
        description: Soil which is below the freezing point of water.
        is_a: ENVO_00001998
        meaning: 'ENVO:01001526'
      ENVO_00002236:
        title: cryosol
        description: Cryosols comprise mineral soils formed in a permafrost environment.
          Where water is present, it occurs primarily in the form of ice. Cryogenic
          processes are the dominant soil-forming processes.
        is_a: ENVO_01001526
        meaning: 'ENVO:00002236'
      ENVO_00005765:
        title: frozen compost soil
        description: Compost soil which is frozen.
        is_a: ENVO_01001526
        meaning: 'ENVO:00005765'
      ENVO_01001525:
        title: hard-frozen soil
        description: Frozen soil which is firmly cemented by water ice, is subject
          to brittle failure, and exhibits practically no consolidation under load.
        is_a: ENVO_01001526
        meaning: 'ENVO:01001525'
      ENVO_01001527:
        title: plastic-frozen soil
        description: Frozen soil which is cemented by water ice but has viscous properties
          due to its high, unfrozen water content and therefore will compress and
          deform under load.
        is_a: ENVO_01001526
        meaning: 'ENVO:01001527'
      ENVO_01001528:
        title: friable-frozen soil
        description: Frozen soil which has very low total water content and is not
          cemented by ice; its compressibility is the same as that of unfrozen soils
          having the same composition, total water content and density.
        is_a: ENVO_01001526
        meaning: 'ENVO:01001528'
      ENVO_00002237:
        title: chernozem
        description: Chernozems are soils with a thick black surface layer that is
          rich in organic matter.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002237'
      ENVO_00002238:
        title: durisol
        description: Durisols are associated mainly with old surfaces in arid and
          semi-arid environments and accommodate very shallow to moderately deep,
          moderately well- to well-drained soils that contain cemented secondary silica
          (SiO2) within 100 cm of the soil surface.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002238'
      ENVO_00002239:
        title: calcisol
        description: Calcisols are soils in which there is substantial secondary accumulation
          of lime. Calcisols are common in highly calcareous parent materials and
          widespread in arid and semi-arid environments.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002239'
      ENVO_00002240:
        title: kastanozem
        description: Kastanozems are dry grassland soils, among them the zonal soils
          of the short-grass steppe belt, south of the Eurasian tall-grass steppe
          belt with Chernozems. Kastanozems have a similar profile to that of Chernozems
          but the humus-rich surface horizon is thinner and not as dark as that of
          the Chernozems and they show more prominent accumulation of secondary carbonates.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002240'
      ENVO_00002241:
        title: leptosol
        description: Leptosols are very shallow soils over continuous rock and soils
          that are extremely gravelly and/or stony. Leptosols are azonal soils and
          particularly common in mountainous regions.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002241'
      ENVO_00002242:
        title: lixisol
        description: Lixisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Lixisols have a high base
          saturation and low-activity clays at certain depths.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002242'
      ENVO_00002243:
        title: histosol
        description: Histosols comprise soils formed in organic material. These vary
          from soils developed in predominantly moss peat in boreal, arctic and subarctic
          regions, via moss peat, reeds/ sedge peat (fen) and forest peat in temperate
          regions to mangrove peat and swamp forest peat in the humid tropics. Histosols
          are found at all altitudes, but the vast majority occurs in lowlands.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002243'
      ENVO_00005774:
        title: peat soil
        description: A histosol which is formed by the decomposition of vegetation
          or organic matter.
        is_a: ENVO_00002243
        meaning: 'ENVO:00005774'
      ENVO_00002244:
        title: gleysol
        description: Gleysols are wetland soils that, unless drained, are saturated
          with groundwater for long enough periods to develop a characteristic gleyic
          colour pattern. This pattern is essentially made up of reddish, brownish
          or yellowish colours at ped surfaces and/or in the upper soil layer or layers,
          in combination with greyish/bluish colours inside the peds and/or deeper
          in the soil.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002244'
      ENVO_00002245:
        title: gypsisol
        description: Gypsisols are soils with substantial secondary accumulation of
          gypsum (calcium sulfate). These soils are found in the driest parts of the
          arid climate zone.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002245'
      ENVO_00002246:
        title: ferralsol
        description: Ferralsols represent the classical, deeply weathered, red or
          yellow soils of the humid tropics. These soils have diffuse horizon boundaries,
          a clay assemblage dominated by low-activity clays (mainly kaolinite) and
          a high content of sesquioxides.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002246'
      ENVO_00002247:
        title: nitisol
        description: Nitisols are deep, well-drained, red, tropical soils with diffuse
          horizon boundaries and a subsurface horizon with more than 30 percent clay
          and moderate to strong angular blocky structure elements that easily fall
          apart into characteristic shiny, polyhedric (nutty) elements. Weathering
          is relatively advanced but Nitisols are far more productive than most other
          red, tropical soils.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002247'
      ENVO_00002248:
        title: luvisol
        description: Luvisols are soils that have a higher clay content in the subsoil
          than in the topsoil as a result of pedogenetic processes (especially clay
          migration) leading to an argic subsoil horizon. Luvisols have high-activity
          clays throughout the argic horizon and a high base saturation at certain
          depths.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002248'
      ENVO_00002249:
        title: phaeozem
        description: Phaeozems accommodate soils of relatively wet grassland and forest
          regions in moderately continental climates. Phaeozems are much like Chernozems
          and Kastanozems but are leached more intensively. Consequently, they have
          dark, humus rich surface horizons that, in comparison with Chernozems and
          Kastanozems, are less rich in bases. Phaeozems may or may not have secondary
          carbonates but have a high base saturation in the upper metre of the soil.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002249'
      ENVO_00002250:
        title: plinthosol
        description: Plinthosols are soils with plinthite, petroplinthite or pisoliths.
          Plinthite is an Fe-rich (in some cases also Mn-rich), humus-poor mixture
          of kaolinitic clay (and other products of strong weathering such as gibbsite)
          with quartz and other constituents that changes irreversibly to a layer
          with hard nodules, a hardpan or irregular aggregates on exposure to repeated
          wetting and drying. Petroplinthite is a continuous, fractured or broken
          sheet of connected, strongly cemented to indurated nodules or mottles. Pisoliths
          are discrete strongly cemented to indurated nodules. Both petroplinthite
          and pisoliths develop from plinthite by hardening.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002250'
      ENVO_00002251:
        title: planosol
        description: Planosols are soils with a light-coloured, surface horizon that
          shows signs of periodic water stagnation and abruptly overlies a dense,
          slowly permeable subsoil with significantly more clay than the surface horizon.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002251'
      ENVO_00002252:
        title: solonchak
        description: Solonchaks are soils that have a high concentration of soluble
          salts at some time in the year. Solonchaks are largely confined to the arid
          and semi-arid climate zones and to coastal regions in all climates.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002252'
      ENVO_00002253:
        title: umbrisol
        description: Umbrisols are soils in which organic matter has accumulated within
          the mineral surface soil (in most cases with low base saturation) to the
          extent that it significantly affects the behaviour and utilization of the
          soil.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002253'
      ENVO_00002254:
        title: vertisol
        description: A soil in which there is a high content of expansive clay known
          as montmorillonite that forms deep cracks in drier seasons or years. Alternate
          shrinking and swelling causes self-mulching, where the soil material consistently
          mixes itself, causing vertisols to have an extremely deep A horizon and
          no B horizon.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002254'
      ENVO_00002255:
        title: solonetz
        description: Solonetz are soils with a dense, strongly structured, clayey
          subsurface horizon that has a high proportion of adsorbed Na and/or Mg ions.
          Solonetz that contain free soda (Na2CO3) are strongly alkaline (field pH
          > 8.5).
        is_a: ENVO_00001998
        meaning: 'ENVO:00002255'
      ENVO_00002256:
        title: regosol
        description: Regosols form a taxonomic remnant group containing all soils
          that could not be accommodated in any of the other RSGs. In practice, Regosols
          are very weakly developed mineral soils in unconsolidated materials that
          do not have a mollic or umbric horizon, are not very shallow or very rich
          in gravels (Leptosols), sandy (Arenosols) or with fluvic materials (Fluvisols).
          Regosols are extensive in eroding lands, particularly in arid and semi-arid
          areas and in mountainous terrain.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002256'
      ENVO_00002257:
        title: podzol
        description: Podzols are soils with a typically ash-grey upper subsurface
          horizon, bleached by loss of organic matter and iron oxides, on top of a
          dark accumulation horizon with brown, reddish or black illuviated humus
          and/or reddish Fe compounds. Podzols occur in humid areas in the boreal
          and temperate zones and locally also in the tropics.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002257'
      ENVO_00002258:
        title: loam
        description: A soil which is composed of approximately equal proportions of
          sand and silt, with a smaller proportion of clay.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002258'
      ENVO_00002259:
        title: agricultural soil
        description: Soil which is part of an ecosystem used for agricultural activities.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002259'
      ENVO_00005740:
        title: paddy field soil
        description: Soil which is part of a paddy field.
        is_a: ENVO_00002259
        meaning: 'ENVO:00005740'
      ENVO_00005788:
        title: rubber plantation soil
        is_a: ENVO_00002259
        meaning: 'ENVO:00005788'
      ENVO_00005789:
        title: bluegrass field soil
        description: Bluegrass field soil is a soil which is found in a field of Kentucky
          Bluegrass (Poa pratensis).
        is_a: ENVO_00002259
        meaning: 'ENVO:00005789'
      ENVO_00005786:
        title: upland soil
        description: Soil which is part of some elevated land.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005786'
      ENVO_00002260:
        title: dune soil
        description: Soil which is part of some dune.
        is_a: ENVO_00005786
        meaning: 'ENVO:00002260'
      ENVO_00005769:
        title: mountain forest soil
        description: Soil which is part of a forest growing on a mountain.
        is_a: ENVO_00005786
        meaning: 'ENVO:00005769'
      ENVO_00002261:
        title: forest soil
        description: A portion of soil which is found in a forested area.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002261'
      ENVO_00005770:
        title: beech forest soil
        description: Soil which is part of a forest whose communites of arborescent
          plants are dominated the genus Fagus.
        is_a: ENVO_00002261
        meaning: 'ENVO:00005770'
      ENVO_00005783:
        title: leafy wood soil
        description: Soil which is part of a woodland dominated by leafy trees.
        is_a: ENVO_00002261
        meaning: 'ENVO:00005783'
      ENVO_00005784:
        title: spruce forest soil
        description: Soil which is part of a forest whose communites of arborescent
          plants are dominated the genus Picea.
        is_a: ENVO_00002261
        meaning: 'ENVO:00005784'
      ENVO_00005787:
        title: eucalyptus forest soil
        description: Soil which is part of a forest whose communites of arborescent
          plants are dominated the genus Eucalyptus.
        is_a: ENVO_00002261
        meaning: 'ENVO:00005787'
      ENVO_00002262:
        title: clay soil
        description: Soil which is primarily composed of clay.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002262'
      ENVO_00002263:
        title: garden soil
        description: A portion of soil which is found in a garden.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002263'
      ENVO_00005744:
        title: allotment garden soil
        description: Soil which is part of an allotment garden.
        is_a: ENVO_00002263
        meaning: 'ENVO:00005744'
      ENVO_00005779:
        title: vegetable garden soil
        description: Garden soil which is part of a garden used for the cultivation
          of vegetables.
        is_a: ENVO_00002263
        meaning: 'ENVO:00005779'
      ENVO_00002273:
        title: fluvisol
        description: Fluvisols accommodate genetically young, azonal soils in alluvial
          deposits.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002273'
      ENVO_00002274:
        title: stagnosol
        description: Stagnosols are soils with a perched water table showing redoximorphic
          features caused by surface water. Stagnosols are periodically wet and mottled
          in the topsoil and subsoil, with or without concretions and/or bleaching.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002274'
      ENVO_00002275:
        title: technosol
        description: Technosols are soils whose properties and pedogenesis are dominated
          by their technical origin. They contain a significant amount of artefacts
          (something in the soil recognizably made or extracted from the earth by
          humans), or are sealed by technic hard rock (material created by humans,
          having properties unlike natural rock). They include soils from wastes (landfills,
          sludge, cinders, mine spoils and ashes), pavements with their underlying
          unconsolidated materials, soils with geomembranes and constructed soils
          in human-made materials.
        is_a: ENVO_00001998
        meaning: 'ENVO:00002275'
      ENVO_00005755:
        title: field soil
        description: Soil which is part of an agricultural field.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005755'
      ENVO_00005741:
        title: alpine soil
        description: Soil which is part of an alpine environment.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005741'
      ENVO_00005742:
        title: arable soil
        description: Soil which is capable of supporting the growth of crops.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005742'
      ENVO_00005743:
        title: roadside soil
        description: A portion of soil which is found in a roadside area.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005743'
      ENVO_00005750:
        title: grassland soil
        description: A portion of soil which is found in a grassland.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005750'
      ENVO_00005746:
        title: savanna soil
        description: A portion of soil which is found in a savanna.
        is_a: ENVO_00005750
        meaning: 'ENVO:00005746'
      ENVO_00005777:
        title: steppe soil
        description: A portion of soil which is found in a steppe.
        is_a: ENVO_00005750
        meaning: 'ENVO:00005777'
      ENVO_00005747:
        title: compost soil
        description: Soil which is derived from compost.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005747'
      ENVO_00005748:
        title: dry soil
        description: Soil which has little to no water content and in which minerals
          and other soluble chemical entities have either bonded or become adsorbed
          to sold particles due to insufficient water availability.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005748'
      ENVO_00005749:
        title: farm soil
        description: A portion of soil which is part of a cropland or a rangeland
          biome.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005749'
      ENVO_00005772:
        title: orchard soil
        description: Soil in which trees from an orchard grow.
        is_a: ENVO_00005749
        meaning: 'ENVO:00005772'
      ENVO_00005751:
        title: jungle soil
        description: Soil which is part of a densely forested area subject to tropical
          climate patterns.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005751'
      ENVO_00005752:
        title: sawah soil
        description: Soil which is part of a sawah, a wet or irrigated rice field.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005752'
      ENVO_00005754:
        title: fertilized soil
        description: Soil which has been amended with fertilizers.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005754'
      ENVO_00005756:
        title: lawn soil
        description: Soil which is formulated to promote the growth of grasses or
          other plants used to establish managed areas of vegetation.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005756'
      ENVO_00005760:
        title: burned soil
        description: Soil which has been transformed through a combustion process.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005760'
      ENVO_00005761:
        title: meadow soil
        description: Soil which is part of a meadow.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005761'
      ENVO_00005764:
        title: pond soil
        description: Soil which is adjacent to a pond.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005764'
      ENVO_00005766:
        title: limed soil
        description: Soil which has been amended with mineral additives to increase
          its pH.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005766'
      ENVO_00005767:
        title: manured soil
        description: Soil which has, as a part, a portion of either fresh or processed
          animal manure.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005767'
      ENVO_00005768:
        title: orchid soil
        description: Soil which has properties to which plants in the Family Orchidaceae
          have adapted, including increased levels of aeration and drainage.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005768'
      ENVO_00005771:
        title: muddy soil
        description: Soil which is composed of a large proportion of mud, thus having
          properties resembling mud.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005771'
      ENVO_00005773:
        title: pasture soil
        description: Soil which is found in a pasture and in which vegetation, such
          as the grass used for the grazing of ungulates, grows.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005773'
      ENVO_00005778:
        title: tropical soil
        description: Soil which is part of a tropical environment.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005778'
      ENVO_00005780:
        title: greenhouse soil
        description: A portion of soil which is found in a greenhouse.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005780'
      ENVO_00005781:
        title: heat stressed soil
        description: Soil which is has been heated such that its chemical, physical,
          or biological properties are destabilised.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005781'
      ENVO_00005782:
        title: ornithogenic soil
        description: Soil which is formed from avian fecal matter.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005782'
      ENVO_00005790:
        title: red soil
        description: Soil which has 1) low concentrations of nutrients and humus,
          2) low water retention capacity, 3) textural variation from sand to clay,
          4) a porous and friable structure, and 5) low concentrations of soluble
          salts.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005790'
      ENVO_00005802:
        title: bulk soil
        description: Soil that is not penetrated by the root systems of plants.
        is_a: ENVO_00001998
        meaning: 'ENVO:00005802'
      ENVO_01001185:
        title: acidic soil
        description: Soil which has increased levels of molecules or ions capable
          of donating a hydron (proton or hydrogen ion) to other chemical entities,
          or, alternatively, capable of forming covalent bonds with other chemicals
          via the acceptance of an electron pair, resulting in a bulk pH measurement
          of less than 7.
        is_a: ENVO_00001998
        meaning: 'ENVO:01001185'
      ENVO_01001616:
        title: bare soil
        description: Soil which is directly exposed to the atmosphere - with no intervening
          layer of plant life or other cover - and thus the effects of weathering
          and erosion.
        is_a: ENVO_00001998
        meaning: 'ENVO:01001616'
      ENVO_01001638:
        title: frost-susceptible soil
        description: Soil in which segregated ice will form (causing frost heave)
          under the required conditions of moisture supply and temperature.
        is_a: ENVO_00001998
        meaning: 'ENVO:01001638'
      ENVO_02000059:
        title: surface soil
        description: A soil consisting of the upper layer of soil on the surface consisting
          of loose material capable of supporting life composed of a mixture of mineral
          and organic matter.
        is_a: ENVO_00001998
        meaning: 'ENVO:02000059'
      ENVO_02000138:
        title: mangrove biome soil
        description: Soil which is located in a mangrove biome.
        is_a: ENVO_00001998
        meaning: 'ENVO:02000138'
      ENVO_03600036:
        title: pathogen-suppressive soil
        description: "Soil which has properties that restrict a pathogen's ability\
          \ to establish itself, persist, or cause disease that results in long-term\
          \ harm."
        is_a: ENVO_00001998
        meaning: 'ENVO:03600036'
      ENVO_06105205:
        title: compacted soil
        description: A soil which has a high bulk density and/or a low porosity. A
          compacted soil has a reduced rate of both water infiltration and drainage
        is_a: ENVO_00001998
        meaning: 'ENVO:06105205'
      ENVO_01001784:
        title: compound astronomical body part
        description: A part of an astronomical body which is composed of a continuous
          medium bearing liquid, gaseous, and solid material in variable quantities.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001784'
      ENVO_01001477:
        title: liquid astronomical body part
        description: A part of an astronomical body which is primarily composed of
          liquid material.
        is_a: ENVO_01001784
        meaning: 'ENVO:01001477'
      ENVO_01001308:
        title: hydroform
        description: A liquid astronomical body part which is primarily composed of
          a continuous volume of liquid water and is held in shape or sustained by
          an environmental process.
        is_a: ENVO_01001477
        meaning: 'ENVO:01001308'
      ENVO_00000034:
        title: rapids
        description: An area of broken, fast flowing water in a stream, where the
          slope of the bed increases (but without a prominent break of slope which
          might result in a waterfall), or where a gently dipping bar of harder rock
          outcrops.
        is_a: ENVO_01001308
        meaning: 'ENVO:00000034'
      ENVO_00000040:
        title: waterfall
        description: A sudden descent of water over a step or ledge in the bed of
          a river.
        is_a: ENVO_01001308
        meaning: 'ENVO:00000040'
      ENVO_00000385:
        title: stream mouth
        description: The place where a stream discharges into a lagoon, lake, or the
          sea.
        is_a: ENVO_01001308
        meaning: 'ENVO:00000385'
      ENVO_00000386:
        title: river mouth
        description: The end of a stream where it enters a standing water body such
          as a lake, sea or ocean.
        is_a: ENVO_00000385
        meaning: 'ENVO:00000386'
      ENVO_00000101:
        title: delta
        description: A tract of alluvium formed at the mouth of a river where the
          deposition ofsome of its load exceeds its rate of removal, crossed by the
          divergent channels (distributaries) of the river.
        is_a: ENVO_00000386
        meaning: 'ENVO:00000101'
      ENVO_01000295:
        title: marine layer
        description: A layer that is part of a marine water body.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000295'
      ENVO_00000206:
        title: marine neritic zone
        description: The water mass of an ocean directly above a continental shelf.
        is_a: ENVO_01000295
        meaning: 'ENVO:00000206'
      ENVO_00000207:
        title: oceanic zone
        description: The water mass of an ocean that is not above a continental shelf.
        is_a: ENVO_01000295
        meaning: 'ENVO:00000207'
      ENVO_00000208:
        title: marine pelagic zone
        description: An open ocean region.
        is_a: ENVO_01000295
        meaning: 'ENVO:00000208'
      ENVO_00000209:
        title: marine photic zone
        description: The zone of an ocean from the surface to where photosynthesis
          can occur, due to the penetration of light.
        is_a: ENVO_01000295
        meaning: 'ENVO:00000209'
      ENVO_00000210:
        title: marine aphotic zone
        description: The zone of an ocean below 200m, in which photosynthesis cannot
          occur due to the lack of light.
        is_a: ENVO_01000295
        meaning: 'ENVO:00000210'
      ENVO_00000211:
        title: marine bathypelagic zone
        description: The one of an ocean below the 10degC thermocline down to a temperature
          of 4degC.
        is_a: ENVO_00000210
        meaning: 'ENVO:00000211'
      ENVO_00000212:
        title: marine abyssalpelagic zone
        description: The zone of the ocean below the bathypelagic zone, with its lowest
          boundary at about 6000m.
        is_a: ENVO_00000210
        meaning: 'ENVO:00000212'
      ENVO_00000213:
        title: marine mesopelagic zone
        description: The zone of an ocean immediately below the photic zone down to
          a depth where the water temperature is 10degC (the thermocline).
        is_a: ENVO_00000210
        meaning: 'ENVO:00000213'
      ENVO_00000214:
        title: hadalpelagic zone
        description: The zone of an ocean in oceanic trenches, lying between 6000m
          and 10,000m.
        is_a: ENVO_00000210
        meaning: 'ENVO:00000214'
      ENVO_01000061:
        title: marine wind mixed layer
        description: The upper part of the marine water column with generally uniform
          properties resulting from wind-driven mixing.
        is_a: ENVO_01000295
        meaning: 'ENVO:01000061'
      ENVO_00000369:
        title: brine pool
        description: 'MERGED DEFINITION:

          TARGET DEFINITION: A large area of brine on the ocean basin near cold seep
          vents which release methane into the water. These pools are concentrations
          of water having an extremely high salinity as compared to the surrounding
          ocean, caused by the motion of large salt deposits through salt tectonics.

          --------------------

          SOURCE DEFINITION: Marine brine pools are large areas of brine on the ocean
          basin. These pools are bodies of water that have a salinity three to five
          times greater than the surrounding ocean. For deep-sea brine pools the source
          of the salt is the dissolution of large salt deposits through salt tectonics.
          The brine often contains high concentrations of methane, providing energy
          to chemosynthetic animals that live near the pool.'
        is_a: ENVO_01001308
        meaning: 'ENVO:00000369'
      ENVO_00000483:
        title: plunge pool
        description: A hollow eroded by the force of the falling water at the base
          of a waterfall, particularly by the eddying effect.
        is_a: ENVO_01001308
        meaning: 'ENVO:00000483'
      ENVO_01000283:
        title: lake layer
        description: A layer which is part of a lake.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000283'
      ENVO_00002130:
        title: hypolimnion
        description: The dense, bottom layer of water in a thermally-stratified lake.
          It is the layer that lies below the thermocline.
        is_a: ENVO_01000283
        meaning: 'ENVO:00002130'
      ENVO_00002131:
        title: epilimnion
        description: The top-most layer in a thermally stratified lake, occurring
          above the deeper hypolimnion. It is warmer and typically has a higher pH
          and dissolved oxygen concentration than the hypolimnion.
        is_a: ENVO_01000283
        meaning: 'ENVO:00002131'
      ENVO_01000065:
        title: marine oxygen minimum zone
        description: A marine water mass which is characterized by having much lower
          than normal dissolved oxygen concentrations persistently.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000065'
      ENVO_01001607:
        title: water current
        description: A hydroform which is maintained by a continuous, directed movement
          of water, generated by disequilibria in a water mass.
        is_a: ENVO_01001308
        meaning: 'ENVO:01001607'
      ENVO_01000067:
        title: marine current
        description: "A water current which is maintained by a continuous, directed\
          \ movement of marine water, generated by forces caused by breaking waves,\
          \ wind, Coriolis force, temperature and salinity differences, and tides\
          \ caused by the gravitational pull of astronomical bodies. Depth contours,\
          \ shoreline configurations and interaction with other currents influence\
          \ a current's direction and strength."
        is_a: ENVO_01001607
        meaning: 'ENVO:01000067'
      ENVO_00000147:
        title: ocean current
        description: "The region occupied by any more or less continuous, directed\
          \ movement of ocean water that flows in one of the Earth's oceans. Ocean\
          \ Currents are rivers of hot or cold water within the ocean. The currents\
          \ are generated from the forces acting upon the water like the earth's rotation,\
          \ the wind, the temperature and salinity differences and the gravitation\
          \ of the moon. The depth contours, the shoreline and other movements influence\
          \ the direction and strength of the movements of water that forms a given\
          \ current."
        is_a: ENVO_01000067
        meaning: 'ENVO:00000147'
      ENVO_01000005:
        title: upwelling
        description: 'MERGED DEFINITION:

          TARGET DEFINITION: An oceanographic feature that involves wind-driven motion
          of dense, cooler, and usually nutrient-rich water towards the ocean surface,
          replacing the warmer, usually nutrient-deplete surface water.

          --------------------

          SOURCE DEFINITION: A marine upwelling is a net flow of marine water to the
          surface of the water column from deeper regions. This is often a result
          of surface water displacement off continental coasts by wind action. Localised
          upwellings may also occur along divergent fronts around eddies and along
          some of the major oceanographic features. Deeper waters often have higher
          nutrient content; consequently blooms of primary producers, such as planktonic
          algae, are generally observed around upwelling zones.'
        is_a: ENVO_00000147
        meaning: 'ENVO:01000005'
      ENVO_01000006:
        title: coastal upwelling
        description: An upwelling that is near a coast.
        is_a: ENVO_01000005
        meaning: 'ENVO:01000006'
      ENVO_00000409:
        title: whirlpool
        description: A large, swirling body of water produced by ocean tides.
        is_a: ENVO_01000067
        meaning: 'ENVO:00000409'
      ENVO_00000442:
        title: maelstrom
        description: A very powerful whirlpool.
        is_a: ENVO_00000409
        meaning: 'ENVO:00000442'
      ENVO_01000062:
        title: marine benthic storm
        description: Benthic storms are strong benthic (near bottom) currents transporting
          sediment, created by the input of energy (largely kinetic) to the seabed.
          In regions with high mesoscale eddy activity, benthic storms are frequent
          and can create isohaline and isothermal conditions extending as much as
          1000m above the seafloor.
        is_a: ENVO_01000067
        meaning: 'ENVO:01000062'
      ENVO_01000064:
        title: marine downwelling
        description: A marine downwelling describes a net current of marine surface
          water towards deeper regions of the water column. Marine downwellings are
          usually caused by differences in the density (and hence, temperature and
          salinity) of seawater.
        is_a: ENVO_01000067
        meaning: 'ENVO:01000064'
      ENVO_01000068:
        title: marine streamer
        description: Marine streamers are tongues of cold water that extend > 100
          km offshore from upwelling regions. Enhanced primary productivity may occur
          in these waters as they are typically more nutrient rich than marine surface
          waters.
        is_a: ENVO_01000067
        meaning: 'ENVO:01000068'
      ENVO_01000069:
        title: mesoscale marine eddy
        description: Mesoscale marine eddies are characterized by currents which flow
          in a roughly circular motion around the center of the eddy. The sense of
          rotation of these currents may either be cyclonic or anticyclonic. Ocean
          eddies are also usually made of water masses that are different to those
          outside of the eddy. Marine mesoscale eddies are between about 10 and 500
          km in diameter, and persist for periods of days to months. They may be formed
          when an ocean current develops an instability. This instability grows, causing
          the current to meander, and eventually an eddy is pinched off from the meander.
        is_a: ENVO_01000067
        meaning: 'ENVO:01000069'
      ENVO_01000074:
        title: oceanic gyre
        description: A gyre in oceanography is any large system of rotating ocean
          currents, particularly those involved with large wind movements. Gyres are
          caused by the Coriolis Effect; planetary vorticity  along with horizontal
          and vertical friction, which determine the circulation patterns from the
          wind curl (torque).
        is_a: ENVO_01000067
        meaning: 'ENVO:01000074'
      ENVO_01000098:
        title: deep ocean current
        description: A marine current that generally occurs below the permanent thermocline
          (where it occurs) or below 400 m depth and that is driven by density and
          temperature gradients.
        is_a: ENVO_01000067
        meaning: 'ENVO:01000098'
      ENVO_01000099:
        title: marine surface current
        description: A marine current bordered by the surface of the water column
          and the permanent thermocline, where it occurs. Surface currents are mostly
          wind driven and mostly limited to the top 400 m of the water column. Ocean
          currents are driven by the circulation of wind above surface waters. Frictional
          stress at the interface between the ocean and the wind causes the water
          to move in the direction of the wind. Large ocean currents are a response
          of the atmosphere and ocean to the flow of energy from the tropics to polar
          regions. In some cases, currents are transient features and affect only
          a small area. Other ocean currents are essentially permanent and extend
          over large horizontal distances.
        is_a: ENVO_01000067
        meaning: 'ENVO:01000099'
      ENVO_01000100:
        title: along-front current
        description: A marine surface current that flows along an oceanic front.
        is_a: ENVO_01000099
        meaning: 'ENVO:01000100'
      ENVO_01000101:
        title: warm surface current
        is_a: ENVO_01000099
        meaning: 'ENVO:01000101'
      ENVO_01000103:
        title: western boundary current
        description: A warm water, narrow marine surface current flowing from the
          equator to high latitudes at speeds between 40 and 120 kilometers per day.
          Western boundary currents are the deepest ocean surface flows, usually extending
          1000 meters below the ocean surface.
        is_a: ENVO_01000101
        meaning: 'ENVO:01000103'
      ENVO_01000102:
        title: cold surface current
        is_a: ENVO_01000099
        meaning: 'ENVO:01000102'
      ENVO_01000104:
        title: eastern boundary current
        description: A cold water, broad marine surface current flowing from high
          latitudes to the equator at speeds between 3 and 7 kilometers per day.
        is_a: ENVO_01000102
        meaning: 'ENVO:01000104'
      ENVO_01001336:
        title: marine tidal flow
        description: A marine current which is maintained by a tidal flow process.
        is_a: ENVO_01000067
        meaning: 'ENVO:01001336'
      ENVO_01000077:
        title: marine pycnocline
        description: A pycnocline which is part of a marine water body and composed
          primarily of sea water.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000077'
      ENVO_01000080:
        title: pelagic isothermal surface
        description: A roughly planar, pelagic region characterised by equal water
          temperature.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000080'
      ENVO_01000081:
        title: pelagic isohaline surface
        description: A roughly planar, pelagic region characterised by equal salinity.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000081'
      ENVO_01000083:
        title: pelagic isopycnal surface
        description: A roughly planar, pelagic region characterised by equal water
          density.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000083'
      ENVO_01000130:
        title: marine hydrothermal plume
        description: A marine hydrothermal vent plume, part of a marine hydrothermal
          vent, is a high temperature water jet laden with dissolved metals and minerals
          that is driven by heat generated due to tectonic activity below the vent.
        is_a: ENVO_01001308
        meaning: 'ENVO:01000130'
      ENVO_01001256:
        title: coastal shrimp pond
        description: A shrimp pond which is embedded in a coastal water body.
        is_a: ENVO_01001308
        meaning: 'ENVO:01001256'
      ENVO_01001301:
        title: aquatic estuarine layer
        description: A layer of liquid that is part of an estuary.
        is_a: ENVO_01001308
        meaning: 'ENVO:01001301'
      ENVO_01001313:
        title: estuarine coastal pycnocline
        description: A pycnocline which is part of an estuarine water body, spanning
          from the shore to a fiat boundary where the estuary bed below the water
          column reaches a depth of 4 meters.
        is_a: ENVO_01001301
        meaning: 'ENVO:01001313'
      ENVO_01001324:
        title: estuarine tidal riverine coastal pycnocline
        description: An estuarine coastal pycnocline which is composed primarily of
          fresh tidal water.
        is_a: ENVO_01001313
        meaning: 'ENVO:01001324'
      ENVO_01001314:
        title: estuarine coastal lower water column
        description: A layer of estuarine water which extends from an estuarine pycnocline
          or mid-depth to the estuarine bed and from the shore to a fiat boundary
          where the estuary bed below the water column reaches a depth of 4 meters.
        is_a: ENVO_01001301
        meaning: 'ENVO:01001314'
      ENVO_01001325:
        title: estuarine tidal riverine coastal lower water column
        description: A layer of fresh estuarine water which extends from an estuarine
          pycnocline or mid-depth to the estuarine bed and from the land-water interface
          to a fiat boundary where the estuary bed below the water column reaches
          a depth of 4 meters.
        is_a: ENVO_01001314
        meaning: 'ENVO:01001325'
      ENVO_01001322:
        title: estuarine open water lower water column
        description: A layer of estuarine water which extends from an estuarine pycnocline
          or mid-depth to the estuary bed and from a fiat boundary where the estuary
          bed below the water column reaches a depth of 4 meters to end of the estuary
          most distal from the coast.
        is_a: ENVO_01001301
        meaning: 'ENVO:01001322'
      ENVO_01001323:
        title: estuarine open water pycnocline
        description: A pycnocline which is part of an estuarine water body, spanning
          from a fiat boundary where the estuary bed below the water column reaches
          a depth of 4 meters until the end of the estuary most distal from the coast.
        is_a: ENVO_01001301
        meaning: 'ENVO:01001323'
      ENVO_01001328:
        title: estuarine tidal riverine open water pycnocline
        description: An estuarine open water pycnocline which is composed primarily
          of fresh tidal water.
        is_a: ENVO_01001323
        meaning: 'ENVO:01001328'
      ENVO_01001329:
        title: estuarine tidal riverine open water lower water column
        description: A layer of fresh estuarine water which extends from an estuarine
          pycnocline or mid-depth to the estuary bed and from a fiat boundary where
          the estuary bed below the water column reaches a depth of 4 meters to end
          of the estuary most distal from the coast.
        is_a: ENVO_01001301
        meaning: 'ENVO:01001329'
      ENVO_03600094:
        title: stream pool
        description: A water body which is created in a stream by local scour or impoundment
          and has some structural control.
        is_a: ENVO_01001308
        meaning: 'ENVO:03600094'
      ENVO_03600096:
        title: step pool
        description: A stream pool which is formed as a result of high-gradient, steep
          streams where water cascades over a rock or woody snag.
        is_a: ENVO_03600094
        meaning: 'ENVO:03600096'
      ENVO_03600095:
        title: stream run
        description: A hydroform which is that part of a stream where water flows
          swiftly and uniformly with low surface water agitation.
        is_a: ENVO_01001308
        meaning: 'ENVO:03600095'
      ENVO_01000819:
        title: hydrosphere
        description: An astronomical body part which is composed of the combined mass
          of water found on, under, and over the surface of a planet.
        is_a: ENVO_01001477
        meaning: 'ENVO:01000819'
      ENVO_00000427:
        title: meander
        description: A bend in a stream. A stream flowing through a wide valley or
          flat plain will tend to form a meanders as it alternatively erodes and deposits
          sediments along its course.
        is_a: ENVO_01001477
        meaning: 'ENVO:00000427'
      ENVO_00000497:
        title: rincon
        description: An incised meander on a river.
        is_a: ENVO_00000427
        meaning: 'ENVO:00000497'
      ENVO_00002063:
        title: oil seep
        description: The result of the release of natural hydrocarbons to the surface
          of the earth, including beneath the sea, by natural geological processes.
        is_a: ENVO_01001477
        meaning: 'ENVO:00002063'
      ENVO_01001476:
        title: body of liquid
        description: A liquid astronomical body part which is continuous and is delimited
          by physical discontinuities or non-liquid boundaries.
        is_a: ENVO_01001477
        meaning: 'ENVO:01001476'
      ENVO_01000685:
        title: water mass
        description: A mass of water.
        is_a: ENVO_01001476
        meaning: 'ENVO:01000685'
      ENVO_00000063:
        title: water body
        description: An accumulation of water of varying size.
        is_a: ENVO_01000685
        meaning: 'ENVO:00000063'
      ENVO_01001319:
        title: saline water body
        description: A body of water which is primarily composed of saline water.
        is_a: ENVO_00000063
        meaning: 'ENVO:01001319'
      ENVO_00000015:
        title: ocean
        description: "A marine water body which is constitutes the majority of an\
          \ astronomical body's hydrosphere."
        is_a: ENVO_01001319
        meaning: 'ENVO:00000015'
      ENVO_00000016:
        title: sea
        description: A large expanse of saline water usually connected with an ocean.
        is_a: ENVO_01001319
        meaning: 'ENVO:00000016'
      ENVO_00000219:
        title: landlocked sea
        description: A sea that is not connected with an ocean.
        is_a: ENVO_00000016
        meaning: 'ENVO:00000219'
      ENVO_01001786:
        title: inland sea
        description: A sea which shalowly covers central areas of continents during
          periods of high sea level that result in marine transgressions.
        is_a: ENVO_00000016
        meaning: 'ENVO:01001786'
      ENVO_00000019:
        title: saline lake
        description: A lake whose water contains a considerable concentration of dissolved
          salts.
        is_a: ENVO_01001319
        meaning: 'ENVO:00000019'
      ENVO_00000540:
        title: brackish lake
        description: A lake which is primarily composed of brackish water, having
          a higher salinity than fresh water but a lower salinity than marine water.
        is_a: ENVO_00000019
        meaning: 'ENVO:00000540'
      ENVO_00002121:
        title: alkaline salt lake
        description: A saline lake which has a high pH.
        is_a: ENVO_00000019
        meaning: 'ENVO:00002121'
      ENVO_01001020:
        title: hypersaline lake
        description: A lake which is primarily composed of water with a concentration
          of dissolved salts greater than that of ocean water.
        is_a: ENVO_00000019
        meaning: 'ENVO:01001020'
      ENVO_01001321:
        title: brackish water body
        description: A body of water which is primarily composed of brackish water.
        is_a: ENVO_01001319
        meaning: 'ENVO:01001321'
      ENVO_00000541:
        title: brackish pond
        description: A pond which is composed primarily of brackish water.
        is_a: ENVO_01001321
        meaning: 'ENVO:00000541'
      ENVO_01000617:
        title: lentic water body
        description: A lentic water body is a water body in which the accumulated
          water, in its totality, has very little to no directed flow.
        is_a: ENVO_00000063
        meaning: 'ENVO:01000617'
      ENVO_00001999:
        title: marine water body
        description: A lentic water body which is composed primarily of marine water.
        is_a: ENVO_01000617
        meaning: 'ENVO:00001999'
      ENVO_02000049:
        title: coastal water body
        description: Coastal water is a marine water body bordering a coast.
        is_a: ENVO_00001999
        meaning: 'ENVO:02000049'
      ENVO_00000020:
        title: lake
        description: A body of water or other liquid of considerable size contained
          in a depression on a landmass.
        is_a: ENVO_01000617
        meaning: 'ENVO:00000020'
      ENVO_00000021:
        title: freshwater lake
        description: A lake of whose water contains low concentrations of salts.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000021'
      ENVO_03000082:
        title: thermokarst lake
        description: A freshwater lake which fills a depression formed by the erosion
          of thermokarst caused by permafrost thaw.
        is_a: ENVO_00000021
        meaning: 'ENVO:03000082'
      ENVO_03000083:
        title: methane-releasing thermokarst lake
        description: A thermokarst lake through which methane gas released from thawing
          permafrost, or other methane stores, rises and escapes to the atmosphere.
        is_a: ENVO_03000082
        meaning: 'ENVO:03000083'
      ENVO_01001062:
        title: crater lake
        description: A lake contained within a crater.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001062'
      ENVO_00000052:
        title: volcanic crater lake
        description: A lake contained within a volcanic crater.
        is_a: ENVO_01001062
        meaning: 'ENVO:00000052'
      ENVO_01001061:
        title: caldera lake
        description: A lake which is contained within a caldera.
        is_a: ENVO_00000052
        meaning: 'ENVO:01001061'
      ENVO_01001070:
        title: impact crater lake
        description: A lake which is contained in a crater formed by an impact event.
        is_a: ENVO_01001062
        meaning: 'ENVO:01001070'
      ENVO_01001065:
        title: meteorite lake
        description: A lake which is contained in a crater formed by a meteorite impact.
        is_a: ENVO_01001070
        meaning: 'ENVO:01001065'
      ENVO_00000058:
        title: underground lake
        description: A lake which is formed under the surface of the Earth. Such a
          lake may be associated with caves and aquifers and springs.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000058'
      ENVO_00000165:
        title: asphalt lake
        description: A lake formed of a natural deposit of alphalt, a black, highly
          viscous liquid or semi-solid composed of fossil hydrocarbons.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000165'
      ENVO_00000197:
        title: endorheic lake
        description: A lake from which there is no outflow of water, either on the
          surface as rivers, or underground by flow or diffusion through rock or permeable
          material.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000197'
      ENVO_00000488:
        title: glacial lake
        description: A lake which is primarily composed of glacial meltwater and which
          fills a depression formed as a result of a glacial erosion process.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000488'
      ENVO_00000198:
        title: ice-covered lake
        description: A lake permanently covered by ice.
        is_a: ENVO_00000488
        meaning: 'ENVO:00000198'
      ENVO_03000120:
        title: subglacial lake
        description: A lake which is situated beneath a glacier.
        is_a: ENVO_00000198
        meaning: 'ENVO:03000120'
      ENVO_00000200:
        title: periglacial lake
        description: A lake, part of whose margin is formed by an ice mass, ice cap
          or glacier, the ice having obstructed the natural drainage of the land.
        is_a: ENVO_00000488
        meaning: 'ENVO:00000200'
      ENVO_00000435:
        title: proglacial lake
        description: A lake formed either by the damming action of a moraine or ice
          dam during the retreat of a melting glacier, or one formed by meltwater
          trapped against an ice mass due to isostatic depression of the crust around
          the ice.
        is_a: ENVO_00000488
        meaning: 'ENVO:00000435'
      ENVO_00000487:
        title: paternoster lake
        description: One of a series of glacial lakes connected by a single stream
          or a braided stream system.
        is_a: ENVO_00000488
        meaning: 'ENVO:00000487'
      ENVO_00000199:
        title: meromictic lake
        description: A lake which has layers of water which do not intermix.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000199'
      ENVO_01000285:
        title: holomictic lake
        description: A holomictic lake is a lake which mixes at least once per year.
          Mixing is caused by a uniform temperature distribution from the upper to
          lower layers of the lake.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000285'
      ENVO_01000286:
        title: dimictic lake
        description: "A dimitic lake is a holomictic lake which mixes from top to\
          \ bottom during two mixing periods each year. Mixing typically occurs during\
          \ the spring and autumn, when the lake is \"isothermal\" (i.e., at the same\
          \ temperature from the top to the bottom). At this time the water throughout\
          \ the lake is about 4\xB0C, and, in the absence of any temperature or density\
          \ differences, the lake readily mixes from top to bottom. These lakes are\
          \ common in regions with temperate climates."
        is_a: ENVO_01000285
        meaning: 'ENVO:01000286'
      ENVO_01000287:
        title: polymictic lake
        description: A polymictic lake is a holomictic lake which is too shallow to
          allow thermal stratification and which can mix from top to bottom through
          the ice-free period of the year.
        is_a: ENVO_01000285
        meaning: 'ENVO:01000287'
      ENVO_01000291:
        title: cold polymictic lake
        description: A cold polymictic lake is a polymictic lake which is covered
          by ice in winter.
        is_a: ENVO_01000287
        meaning: 'ENVO:01000291'
      ENVO_01000292:
        title: warm polymictic lake
        description: A warm polymictic lake is a polymictic lake which is not covered
          by ice at any point during the year.
        is_a: ENVO_01000287
        meaning: 'ENVO:01000292'
      ENVO_01000288:
        title: monomictic lake
        description: A monomictic  lake is a holomictic lake which mixes from top
          to bottom during one mixing period each year.
        is_a: ENVO_01000285
        meaning: 'ENVO:01000288'
      ENVO_01000289:
        title: cold monomictic lake
        description: A monomictic lake which is covered by ice throughout much of
          the year and only mixes when its surface ice melts and the lake lacks thermal
          stratification.
        is_a: ENVO_01000288
        meaning: 'ENVO:01000289'
      ENVO_01000290:
        title: warm monomictic lake
        description: A monomictic lake which does not freeze and is thermally stratified
          throughout most of the year, only mixing in winter when cooler temperatures
          ease stratification.
        is_a: ENVO_01000288
        meaning: 'ENVO:01000290'
      ENVO_00000201:
        title: fjord lake
        description: A lake in a glacially eroded valley, which has been eroded below
          sea level.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000201'
      ENVO_00000202:
        title: oxbow lake
        description: A lake which is formed when a wide meander from a stream or a
          river is cut off to form a lake. They are called oxbow lakes due to the
          distinctive curved shape that results from this process.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000202'
      ENVO_00000503:
        title: container of an intermittent oxbow lake
        description: A depression which is continous with one or more abandoned meander
          loops of a river channel.
        is_a: ENVO_00000202
        meaning: 'ENVO:00000503'
      ENVO_01001092:
        title: tectonic lake
        description: A lake which is contained in a depression formed by the deformation
          and resulting lateral and vertical movements of a lithosphere.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001092'
      ENVO_00000203:
        title: rift lake
        description: A lake which fills a depression that has formed as a result of
          subsidence along a a rift zone, an area of extensional tectonics in the
          continental crust.
        is_a: ENVO_01001092
        meaning: 'ENVO:00000203'
      ENVO_00000452:
        title: ribbon lake
        description: A lake that is long, narrow, and finger-shaped, usually found
          in a glacial trough. Its formation begins when a glacier moves over an area
          containing alternate bands of hard and soft bedrock. The sharp-edged boulders
          carried at the bottom of the glacier erode the softer rock more quickly
          by abrasion, thus creating a hollow called a rock basin. On either side
          of the rock basin, the more resistant rock is eroded less and these outcrops
          of harder rock are known as rock bars, which act as dams between which rainwater
          may accumulate after the retreat of the ice age, filling up the rock basin
          and creating a ribbon lake. A ribbon lake may also form behind a terminal
          or recessional moraine, both of which also act as dams, enabling water to
          accumulate behind them. A ribbon lake may also occur if a tributary glacier
          joins a main glacier. The increase in power can create a trough, which is
          filled with water from a river/meltwater to create a ribbon lake.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000452'
      ENVO_00000455:
        title: tarn
        description: A mountain lake that is formed in a cirque excavated by a glacier.
          A moraine may form a natural dam below a tarn.
        is_a: ENVO_00000020
        meaning: 'ENVO:00000455'
      ENVO_01000284:
        title: amictic lake
        description: A lake which is permanently covered by ice, does not mix, and
          exhibit inverse cold water stratification whereby water temperature increases
          with depth below the ice surface.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000284'
      ENVO_01000548:
        title: eutrophic lake
        description: A lake which has nutrient-rich water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000548'
      ENVO_01001019:
        title: hypereutrophic lake
        description: A lake which is composed primarily of water with very high nutrient
          concentrations.
        is_a: ENVO_01000548
        meaning: 'ENVO:01001019'
      ENVO_01000680:
        title: polluted lake
        description: A lake which has concentrations of environmental contaminants
          high enough to harm the ecosystems associated with it.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000680'
      ENVO_01000774:
        title: oligotrophic lake
        description: A lake which has nutrient-poor water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000774'
      ENVO_01000775:
        title: mesotrophic lake
        description: A lake with medium nutrient levels, which allow moderate productivity.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000775'
      ENVO_01000824:
        title: exorheic lake
        description: A lake from which water constantly flows out of under almost
          all climatic circumstances, maintaining low concentrations of dissolved
          solid relative to endorheic lakes.
        is_a: ENVO_00000020
        meaning: 'ENVO:01000824'
      ENVO_01001021:
        title: humic lake
        description: A lake which is composed primarily water with high concentrations
          of humic substances and organic acids, resulting in brown- or tea-coloured
          colouration.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001021'
      ENVO_01001022:
        title: natural lake
        description: A lake which has formed as the result of processes that are not
          or are only minimally driven by human activity.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001022'
      ENVO_01001072:
        title: anoxic lake
        description: A lake which is primarily composed of anoxic water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001072'
      ENVO_01001073:
        title: lake with an anoxic hypolimnion
        description: A lake which has a hypolimnion composed primarily of anoxic water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001073'
      ENVO_01001074:
        title: lake with a hypoxic hypolimnion
        description: A lake which has a hypolimnion composed primarily of hypoxic
          water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001074'
      ENVO_01001075:
        title: hypoxic lake
        description: A lake which is primarily composed of hypoxic water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001075'
      ENVO_01001076:
        title: oxic lake
        description: A lake which is primarily composed of oxic water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001076'
      ENVO_01001077:
        title: lake with an oxic hypolimnion
        description: A lake which has a hypolimnion composed primarily of oxic water.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001077'
      ENVO_01001105:
        title: aeolian lake
        description: A lake which fills a basin that has been dammed by wind-blown
          sand,  formed between sand dunes oriented by winds; or formed by wind action
          under previously arid paleoenvironments.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001105'
      ENVO_01001106:
        title: landslide lake
        description: A lake which fills a depression where drainage is blocked by
          solid material transported by a landslide.
        is_a: ENVO_00000020
        meaning: 'ENVO:01001106'
      ENVO_01001107:
        title: rockslide lake
        description: A lake which fills a depression where drainage is blocked by
          solid material transported by a rockslide.
        is_a: ENVO_01001106
        meaning: 'ENVO:01001107'
      ENVO_03000035:
        title: supraglacial lake
        description: A water body which is located in a depression within the surface
          of a glacier.
        is_a: ENVO_00000020
        meaning: 'ENVO:03000035'
      ENVO_03000053:
        title: intraglacial lake
        description: A lake which is comprised of meltwater located underneath or
          within a glacier.
        is_a: ENVO_00000020
        meaning: 'ENVO:03000053'
      ENVO_03600041:
        title: marine lake
        description: A lake which is connected to a marine water body via tunnels
          or cracks in the soil.
        is_a: ENVO_00000020
        meaning: 'ENVO:03600041'
      ENVO_00000033:
        title: pond
        description: A body of water, usually of smaller size than a lake.
        is_a: ENVO_01000617
        meaning: 'ENVO:00000033'
      ENVO_00000055:
        title: saline evaporation pond
        description: A pond which is 1) shallow, 2) man-made, and 3) designed to produce
          salt from seawater through evaporation.
        is_a: ENVO_00000033
        meaning: 'ENVO:00000055'
      ENVO_00000270:
        title: beaver pond
        description: A pond that has formed as a consequence of the activities of
          beavers, building a beaver dam.
        is_a: ENVO_00000033
        meaning: 'ENVO:00000270'
      ENVO_00000547:
        title: waterhole
        description: A pond, often temporary or seasonal, used as a drinking place
          by mammals and birds.
        is_a: ENVO_00000033
        meaning: 'ENVO:00000547'
      ENVO_01000368:
        title: anchialine pool
        description: An anchialine pool is a landlocked water body with a subterranean
          connection to the ocean and which has fresh water towards its surface with
          saline water in its deeper layers.
        is_a: ENVO_00000033
        meaning: 'ENVO:01000368'
      ENVO_03600037:
        title: eutrophic pond
        description: A pond which has nutrient-rich water.
        is_a: ENVO_00000033
        meaning: 'ENVO:03600037'
      ENVO_03600043:
        title: meromictic pond
        description: A pond which has layers of water that do not intermix.
        is_a: ENVO_00000033
        meaning: 'ENVO:03600043'
      ENVO_03600092:
        title: artificial pond
        description: A pond which has been constructed by humans or their technologies.
        is_a: ENVO_00000033
        meaning: 'ENVO:03600092'
      ENVO_00000056:
        title: fishpond
        description: A pond or lake used for the artificial culture of fish.
        is_a: ENVO_01000617
        meaning: 'ENVO:00000056'
      ENVO_00000317:
        title: tidal pool
        description: Pools formed as a high tide comes in over a rocky shore. Water
          fills depressions in the ground, which turn into isolated pools as the tide
          retreats.
        is_a: ENVO_01000617
        meaning: 'ENVO:00000317'
      ENVO_00000453:
        title: liman
        description: A lake or estuary that is formed at the mouth of a river where
          flow is blocked by a bar of sediments. It can be maritime (the bar being
          created by the current of a sea) or fluvial (the bar being created by the
          flow of a bigger river at the confluence).
        is_a: ENVO_01000617
        meaning: 'ENVO:00000453'
      ENVO_01000871:
        title: puddle of water
        description: A puddle is a small accumulation of water, on a surface. It can
          form either by pooling in a depression on the surface, or by surface tension
          upon a flat surface.
        is_a: ENVO_01000617
        meaning: 'ENVO:01000871'
      ENVO_01000905:
        title: shrimp pond
        description: A lentic water body which is used for the artificial culture
          of shrimp.
        is_a: ENVO_01000617
        meaning: 'ENVO:01000905'
      ENVO_01001320:
        title: fresh water body
        description: A body of water which is primarily composed of freshwater, with
          low solute content.
        is_a: ENVO_00000063
        meaning: 'ENVO:01001320'
      ENVO_01000618:
        title: lotic water body
        description: A lotic water body is a water body in which the accumulated water,
          in its totality, is flowing.
        is_a: ENVO_00000063
        meaning: 'ENVO:01000618'
      ENVO_00000029:
        title: watercourse
        description: A flowing body of water.
        is_a: ENVO_01000618
        meaning: 'ENVO:00000029'
      ENVO_00000014:
        title: canal
        description: Artificial watercourse with no flow or a controlled flow used
          for navigation, drainage or irrigation.
        is_a: ENVO_00000029
        meaning: 'ENVO:00000014'
      ENVO_00000036:
        title: irrigation canal
        description: Artificial watercourse with no flow or a controlled flow used
          irrigation.
        is_a: ENVO_00000014
        meaning: 'ENVO:00000036'
      ENVO_00000505:
        title: underground irrigation canal
        description: A gently inclined underground tunnel bringing water for irrigation
          from an aquifer.
        is_a: ENVO_00000036
        meaning: 'ENVO:00000505'
      ENVO_00000042:
        title: drainage canal
        description: Artificial watercourse with no flow or a controlled flow used
          drainage.
        is_a: ENVO_00000014
        meaning: 'ENVO:00000042'
      ENVO_00000048:
        title: navigation canal
        description: Artificial watercourse with no flow or a controlled flow used
          navigation.
        is_a: ENVO_00000014
        meaning: 'ENVO:00000048'
      ENVO_00000072:
        title: aquaduct
        description: Structure designed to transport water from a remote source, usually
          by gravity.
        is_a: ENVO_00000014
        meaning: 'ENVO:00000072'
      ENVO_00000445:
        title: transvasement
        description: An aquaduct to transport water from one river basin to another
          one, to solve problems of hydrographic imbalance. It can decrease floods,
          moving the water to lands with droughts.
        is_a: ENVO_00000072
        meaning: 'ENVO:00000445'
      ENVO_00000079:
        title: flume
        description: An open artificial water channel, that leads water from a diversion
          dam or weir completely aside a natural flow, often an elevated box structure
          (typically wood) that follows the natural contours of the land.
        is_a: ENVO_00000014
        meaning: 'ENVO:00000079'
      ENVO_00000023:
        title: stream
        description: A watercourse which is linear and flows across the solid portion
          of a planetary surface.
        is_a: ENVO_00000029
        meaning: 'ENVO:00000023'
      ENVO_00000022:
        title: river
        description: A stream which, through permanent or seasonal flow processes,
          moves from elevated land towards lower elevations through a definite channel
          and empties either into a sea, lake, or another river or ends on land as
          bed seepage and evapotranspiration exceed water supply.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000022'
      ENVO_00000059:
        title: underground river
        description: A river that is under the surface of the Earth.
        is_a: ENVO_00000022
        meaning: 'ENVO:00000059'
      ENVO_01000297:
        title: freshwater river
        description: A river where fresh water flows.
        is_a: ENVO_00000022
        meaning: 'ENVO:01000297'
      ENVO_01000908:
        title: geothermally heated river
        description: A river which is heated by geothermal processes such as heat
          exchange with lava or hydrothermal percolation.
        is_a: ENVO_00000022
        meaning: 'ENVO:01000908'
      ENVO_03600015:
        title: polluted river
        description: A river which has elevated levels of contaminants.
        is_a: ENVO_00000022
        meaning: 'ENVO:03600015'
      ENVO_00000060:
        title: underground stream
        description: A stream that is under the surface of the Earth.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000060'
      ENVO_00000069:
        title: distributary
        description: A stream that branches off and flows away from a main stream
          channel. They are a common feature of river deltas.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000069'
      ENVO_00000152:
        title: anabranch
        description: A section of a river or stream that diverts from the main course
          and rejoins later.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000152'
      ENVO_00000234:
        title: bayou
        description: A small, slow-moving stream or creek; usually located in low-lying
          areas.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000234'
      ENVO_00000490:
        title: consequent stream
        description: A stream whose course is a direct consequence of the original
          slope of the surface upon which it developed, i.e., a stream that follows
          the slope of the original land.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000490'
      ENVO_00000491:
        title: subsequent stream
        description: A stream whose course has been determined by selective headward
          erosion along weak strata. These streams have generally developed after
          the original stream. Subsequent streams developed independently of the original
          relief of the land and generally follow paths determined by the weak rock
          belts.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000491'
      ENVO_00000492:
        title: resequent stream
        description: A stream whose course follows the original relief, but at a lower
          level than the original slope (e.g., flows down a course determined by the
          underlying strata in the same direction). These streams develop later and
          are generally a tributary to a subsequent stream.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000492'
      ENVO_00000493:
        title: obsequent stream
        description: A stream flowing in the opposite direction of the consequent
          drainage.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000493'
      ENVO_00000494:
        title: insequent stream
        description: A stream that has an almost random drainage often forming dendritic
          patterns. These are typically tributaries and have developed by a headward
          erosion on a horizontally stratified belt or on homogeneous rocks. These
          streams follow courses that apparently were not controlled by the original
          slope of the surface, its structure or the type of rock.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000494'
      ENVO_00000495:
        title: tributary
        description: A stream or river which flows into another river (a parent river)
          or body of water but which may not flow directly into the sea.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000495'
      ENVO_00000517:
        title: lost stream
        description: A surface stream that disappears into an underground channel,
          or dries up in an arid area.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000517'
      ENVO_00000525:
        title: canalized stream
        description: A stream that has been substantially ditched, diked, or straightened.
        is_a: ENVO_00000023
        meaning: 'ENVO:00000525'
      ENVO_03605007:
        title: freshwater stream
        description: A stream which is composed primarily of fresh water.
        is_a: ENVO_00000023
        meaning: 'ENVO:03605007'
      ENVO_03000018:
        title: englacial stream
        description: A stream which is primarily composed of meltwater and which flows
          within a glacier or ice sheet.
        is_a: ENVO_00000023
        meaning: 'ENVO:03000018'
      ENVO_00000412:
        title: tidal watercourse
        description: A watercourse which has the intensity and direction of its flow
          primarily determined by the tides.
        is_a: ENVO_00000029
        meaning: 'ENVO:00000412'
      ENVO_00000041:
        title: tidal creek
        description: A tidal water channel. Creeks may often dry to a muddy channel
          with little or no flow at low tide, but often with significant depth of
          water at high tide.
        is_a: ENVO_00000412
        meaning: 'ENVO:00000041'
      ENVO_00000479:
        title: mouth
        description: The exit or point of discharge of a stream into another stream,
          lake or sea.
        is_a: ENVO_00000029
        meaning: 'ENVO:00000479'
      ENVO_00000507:
        title: wadi mouth
        description: The lower terminus of a wadi where it widens into an adjoining
          floodplain, depression, or water body.
        is_a: ENVO_00000479
        meaning: 'ENVO:00000507'
      ENVO_00000518:
        title: ditch mouth
        description: The exit or point of discharge of a ditch.
        is_a: ENVO_00000479
        meaning: 'ENVO:00000518'
      ENVO_01000864:
        title: mouth of liquid discharge conduit
        description: A site at the terminus of a liquid conveyance conduit where the
          liquid carried is discharged into the sea or a river.
        is_a: ENVO_00000479
        meaning: 'ENVO:01000864'
      ENVO_00000472:
        title: backwater
        description: An area of calm water unaffected by the current of a stream.
        is_a: ENVO_00000029
        meaning: 'ENVO:00000472'
      ENVO_00001996:
        title: mine drainage
        description: The outflow of water from a mine.
        is_a: ENVO_00000029
        meaning: 'ENVO:00001996'
      ENVO_00001997:
        title: acid mine drainage
        description: A mine drainage with an acidic pH.
        is_a: ENVO_00001996
        meaning: 'ENVO:00001997'
      ENVO_00002195:
        title: pyritic acid mine drainage
        is_a: ENVO_00001997
        meaning: 'ENVO:00002195'
      ENVO_00002112:
        title: gold mine drainage
        description: Mine drainage which is formed as a result of the mining of gold.
        is_a: ENVO_00001996
        meaning: 'ENVO:00002112'
      ENVO_00000045:
        title: estuary
        description: A semi-enclosed coastal body of water with one or more rivers
          or streams flowing into it, and with a free connection to the open sea.
        is_a: ENVO_00000063
        meaning: 'ENVO:00000045'
      ENVO_00000224:
        title: slightly stratified estuary
        description: An estuary in which river output is less than the marine input,
          resulting in the mixing of the whole water column by current-induced turbulence,
          such that salinity varies more longitudinally rather than vertically.
        is_a: ENVO_00000045
        meaning: 'ENVO:00000224'
      ENVO_00000225:
        title: highly stratified estuary
        description: An estuary whose river output and marine input are more even,
          with river flow still dominant; turbulence induces more mixing of salt water
          upward than the reverse.
        is_a: ENVO_00000045
        meaning: 'ENVO:00000225'
      ENVO_00000226:
        title: saline wedge estuary
        description: An estuary in which  river output greatly exceeds marine input,
          resulting in little mixing and thus a sharp contrast between fresh surface
          water and saline bottom water.
        is_a: ENVO_00000045
        meaning: 'ENVO:00000226'
      ENVO_00000228:
        title: inverse estuary
        description: An estuary which is located in regions where evaporation greatly
          exceeds the inflow of fresh water, forming a zone of maximum salinity towards
          which both riverine and marine water masses flow, before sinking and spreading
          along the bottom in both seaward and landward directions.
        is_a: ENVO_00000045
        meaning: 'ENVO:00000228'
      ENVO_00000229:
        title: intermittent estuary
        description: An estuary which varies dramatically in its volume as a result
          of intermittent freshwater input, and is capable of changing from a wholly
          marine embayment to any other type of estuary.
        is_a: ENVO_00000045
        meaning: 'ENVO:00000229'
      ENVO_00002137:
        title: brackish estuary
        description: An estuary which is composed primarily of brackish water.
        is_a: ENVO_00000045
        meaning: 'ENVO:00002137'
      ENVO_01001653:
        title: well-mixed estuary
        description: "An estuary in which mixing by tidal forcing exceeds the force\
          \ of riverine output, resulting in thorough homogenisation of the estuary's\
          \ water column and the disappearance of a vertical salinity gradient and\
          \ the freshwater-seawater boundary."
        is_a: ENVO_00000045
        meaning: 'ENVO:01001653'
      ENVO_00000061:
        title: underground water body
        description: A geographical feature associated with water that is under the
          surface of the earth.
        is_a: ENVO_00000063
        meaning: 'ENVO:00000061'
      ENVO_01000710:
        title: flood
        description: An unusual accumulation of water above the ground caused by high
          tide, heavy rain, melting snow or rapid runoff from paved areas.
        is_a: ENVO_00000063
        meaning: 'ENVO:01000710'
      ENVO_01000711:
        title: coastal flood
        description: A coastal flood is a flood which is formed as a result of large
          amounts of water from marine water bodies or large lakes being transported
          to usually dry land by displacement processes such as high winds or seismic
          activity.
        is_a: ENVO_01000710
        meaning: 'ENVO:01000711'
      ENVO_01000714:
        title: storm surge
        description: A storm surge is a coastal flood which is caused by low-pressure
          weather systems such as tropical cyclones and strong extratropical cyclones,
          the severity of which is affected by the shallowness and orientation of
          the water body relative to storm path, and the timing of tides.
        is_a: ENVO_01000711
        meaning: 'ENVO:01000714'
      ENVO_01000712:
        title: riverine flood
        description: "A riverine flood is a flood which is formed as a result of a\
          \ river's flow rate exceeding the capacity of its channel."
        is_a: ENVO_01000710
        meaning: 'ENVO:01000712'
      ENVO_01000713:
        title: flash flood
        description: A flash flood is a flood formed by the rapid flooding of geomorphic
          low-lying areas. It may be caused by heavy rain associated with a severe
          thunderstorm, hurricane, tropical storm, or meltwater from ice or snow flowing
          over ice sheets or snowfields. Flash floods may also occur after the collapse
          of a natural ice or debris dam, or a human structure such as a man-made
          dam. Flash floods are distinguished from a regular flood by a timescale
          of less than six hours.
        is_a: ENVO_01000710
        meaning: 'ENVO:01000713'
      ENVO_03000040:
        title: melt pond
        description: A water body which forms as a result of localised melting taking
          place on the surface of a glacier or a mass of sea ice and which is contained
          in the cavity formed by such melting.
        is_a: ENVO_00000063
        meaning: 'ENVO:03000040'
      ENVO_03000050:
        title: atmosphere-exposed melt pond
        description: A melt pond which has a surface exposed to the atmosphere.
        is_a: ENVO_03000040
        meaning: 'ENVO:03000050'
      ENVO_03000051:
        title: ice-encased melt pond
        description: A melt pond which is completely encased in ice and thus not directly
          exposed to the atmosphere or underlying water.
        is_a: ENVO_03000040
        meaning: 'ENVO:03000051'
      ENVO_03000118:
        title: atmosphere and water column exposed melt pond
        description: A melt pond which and is exposed to the atmosphere and to a lesser
          degree water underlying the ice mass which contains it.
        is_a: ENVO_03000040
        meaning: 'ENVO:03000118'
      ENVO_03000119:
        title: water column exposed melt pond
        description: A melt pond which is formed close to that part of an ice mass
          which is in contact with some underlying water body, and which has channels
          connecting it to that water body.
        is_a: ENVO_03000040
        meaning: 'ENVO:03000119'
      ENVO_01000686:
        title: marine water mass
        description: A mass of marine water.
        is_a: ENVO_01000685
        meaning: 'ENVO:01000686'
      ENVO_01000073:
        title: marine oligotrophic desert
        description: A marine water mass which is composed primarily of water with
          low concentrations of nutrients.
        is_a: ENVO_01000686
        meaning: 'ENVO:01000073'
      ENVO_01000108:
        title: marine cold-water sphere
        description: The marine cold-water sphere describes a water mass extending
          from the polar seas and across low latitudes at depths of ca. 800 to 1000
          m, which is separated from the marine warm-water sphere by the permanent
          marine thermocline
        is_a: ENVO_01000686
        meaning: 'ENVO:01000108'
      ENVO_01000109:
        title: marine warm-water sphere
        description: The marine warm-water sphere describes a water mass extending
          to depths of ca. 800 to 1000 m in low and middle latitudes. It is separated
          from the marine cold-water sphere by the permanent marine thermocline
        is_a: ENVO_01000686
        meaning: 'ENVO:01000109'
      ENVO_01000438:
        title: lava flow
        description: A lava flow is a moving outpouring of lava, which is created
          during a non-explosive effusive eruption.
        is_a: ENVO_01001476
        meaning: 'ENVO:01000438'
      ENVO_01000644:
        title: liquid planetary core
        description: A liquid planetary core is a planetary core which is primarily
          composed of liquid material.
        is_a: ENVO_01001477
        meaning: 'ENVO:01000644'
      ENVO_06105011:
        title: water column
        description: A liquid astronomical body part which 1) vertically spans a water
          body and 2) has fiat boundaries approximating a columnar shape.
        is_a: ENVO_01001477
        meaning: 'ENVO:06105011'
      ENVO_00000148:
        title: riffle
        description: A shallow stretch of a river or stream, where the current is
          above the average stream velocity and where the water forms small rippled
          waves as a result. It often consists of a rocky bed of gravels or other
          small stones.
        is_a: ENVO_01001784
        meaning: 'ENVO:00000148'
      ENVO_00000153:
        title: headwater
        description: The upper part of a river system, denoting the upper basin and
          source streams of a river.
        is_a: ENVO_01001784
        meaning: 'ENVO:00000153'
      ENVO_00000191:
        title: solid astronomical body part
        description: A part of an astronomical body which is primarily composed of
          solid material.
        is_a: ENVO_01001784
        meaning: 'ENVO:00000191'
      ENVO_01001886:
        title: landform
        description: A solid astronomical body part which has been formed from and
          is composed primarily of the matter of that astronomical body.
        is_a: ENVO_00000191
        meaning: 'ENVO:01001886'
      ENVO_01001884:
        title: surface landform
        description: A landform which occurs on the surface of an astronomical body.
        is_a: ENVO_01001886
        meaning: 'ENVO:01001884'
      ENVO_00000067:
        title: cave
        description: Naturally formed, subterranean open area or chamber.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000067'
      ENVO_00000001:
        title: bedding-plane cave
        description: A cavity developed along a bedding-plane and elongate in cross-section
          as a result.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000001'
      ENVO_00000030:
        title: dead cave
        description: A cave without streams or drips of water.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000030'
      ENVO_00000323:
        title: live cave
        description: A cave containing a stream or active speleothems.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000323'
      ENVO_00000071:
        title: fault cave
        description: A cave developed along a fault or fault zone, either by movement
          of the fault or by preferential solution along it.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000071'
      ENVO_00000263:
        title: fissure cave
        description: A narrow, vertical cave passage, often developed along a joint
          but not necessarily so. Usually due to solution but sometimes to tension.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000263'
      ENVO_00000321:
        title: joint-plane cave
        description: A cavity developed along a joint and elongate in cross-section.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000321'
      ENVO_01000361:
        title: primary cave
        description: A cave formed at the same time as the surrounding rock.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000361'
      ENVO_00000322:
        title: volcanic cave
        description: A cave formed in volcanic rock.
        is_a: ENVO_01000361
        meaning: 'ENVO:00000322'
      ENVO_00000110:
        title: lava tunnel
        description: A tunnel formed by the flow of molten lava, which has subsequently
          drained out.
        is_a: ENVO_00000322
        meaning: 'ENVO:00000110'
      ENVO_01000362:
        title: inflationary cave
        description: A cave that is formed by the action of pressurised lava pushing
          against surrounding rock and then draining away.
        is_a: ENVO_00000322
        meaning: 'ENVO:01000362'
      ENVO_00000324:
        title: outflow cave
        description: A cave from which a stream flows or formerly did so and which
          cannot be followed upstream to the surface.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000324'
      ENVO_00000326:
        title: sea cave
        description: A cave in present-day or emerged sea cliffs, formed by wave attack
          or solution.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000326'
      ENVO_00000440:
        title: rock shelter
        description: A shallow cave-like opening at the base of a bluff or cliff.
        is_a: ENVO_00000067
        meaning: 'ENVO:00000440'
      ENVO_00012411:
        title: karst cave
        description: A cave which is part of a karst formation.
        is_a: ENVO_00000067
        meaning: 'ENVO:00012411'
      ENVO_01000360:
        title: solutional cave
        description: A cave formed by the dissolution of soluble rock or other solid
          material such as limestone, chalk, dolomite, gypsum, salt or marble.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000360'
      ENVO_01000359:
        title: limestone cave
        description: A cave formed in limestone, usually by dissolution of limestone
          by acidic groundwater.
        is_a: ENVO_01000360
        meaning: 'ENVO:01000359'
      ENVO_01000363:
        title: erosional cave
        description: A cave formed by erosion caused by flowing streams carrying rocks
          or sediments.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000363'
      ENVO_01000364:
        title: glacier cave
        description: A glacier cave is a cave formed within or under a glacier.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000364'
      ENVO_01000365:
        title: ice cave
        description: An ice cave is a bedrock cave which contains year-round ice formations.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000365'
      ENVO_01000366:
        title: talus cave
        description: A talus cave is a cave formed by the openings between large boulders
          which have fallen into a random heap.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000366'
      ENVO_01000367:
        title: anchialine cave
        description: An anchialine cave is a cave which contains an anchialine pool.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000367'
      ENVO_01000369:
        title: vadose cave
        description: A cave which is within a vadose zone.
        is_a: ENVO_00000067
        meaning: 'ENVO:01000369'
      ENVO_00000013:
        title: cave system
        description: A collection of caves interconnected by enterable passages or
          linked hydrologically or a cave with an extensive complex of chambers and
          passages.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000013'
      ENVO_00000027:
        title: spring
        description: A surface landform which provides an egress for groundwater or
          steam to flow out of the ground.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000027'
      ENVO_00000051:
        title: hot spring
        description: A spring through which groundwater, heated by geothermal energy,
          flows.
        is_a: ENVO_00000027
        meaning: 'ENVO:00000051'
      ENVO_00000050:
        title: geyser
        description: A hot spring that erupts periodically, ejecting a column of hot
          water and steam into the air.
        is_a: ENVO_00000051
        meaning: 'ENVO:00000050'
      ENVO_00002119:
        title: alkaline hot spring
        description: A alkaline spring through which groundwater, heated by geothermal
          energy, flows.
        is_a: ENVO_00000051
        meaning: 'ENVO:00002119'
      ENVO_00002120:
        title: acidic hot spring
        description: An acidic spring through which groundwater, heated by geothermal
          energy, flows.
        is_a: ENVO_00000051
        meaning: 'ENVO:00002120'
      ENVO_00002181:
        title: neutral hot spring
        description: A neutral spring through which groundwater, heated by geothermal
          energy, flows.
        is_a: ENVO_00000051
        meaning: 'ENVO:00002181'
      ENVO_00000125:
        title: mineral spring
        description: A spring which  water contains a significant amount of dissolved
          minerals, that derive from the rocks through which the water flows.
        is_a: ENVO_00000027
        meaning: 'ENVO:00000125'
      ENVO_00000126:
        title: sulfur spring
        description: A spring through which water with elevated levels of dissolved
          derivatives of sulfur flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:00000126'
      ENVO_00002128:
        title: mesophilic sulfur spring
        description: A sulfur spring through which water at a temperature optimal
          for the growth of mesophillic microorganism (approximately 20 to 45 degrees
          Celsius) flows.
        is_a: ENVO_00000126
        meaning: 'ENVO:00002128'
      ENVO_01001894:
        title: alkaline spring
        description: A mineral spring through which water with a high pH flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001894'
      ENVO_01001888:
        title: calcic spring
        description: A mineral spring through which water with elevated concentrations
          of calcium hydroxide flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001888'
      ENVO_00002143:
        title: calcite hot spring
        description: A calcic spring through which groundwater, heated by geothermal
          energy, flows.
        is_a: ENVO_01001888
        meaning: 'ENVO:00002143'
      ENVO_01001889:
        title: lithia spring
        description: A mineral spring through which water with elevated concentrations
          of lithium salts flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001889'
      ENVO_01001890:
        title: chalybeate spring
        description: A spring through which water with elevated concentrations of
          iron salts flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001890'
      ENVO_01001891:
        title: alum spring
        description: A spring through which water with elevated concentrations of
          hydrated double sulfate aluminium salts flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001891'
      ENVO_01001893:
        title: salt spring
        description: A mineral spring through which water with elevated concentrations
          of sodium, calcium, or magnesium salts flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001893'
      ENVO_01001895:
        title: soda spring
        description: A mineral spring through which water with elevated levels of
          dissolved carbon dioxide gas flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001895'
      ENVO_01001896:
        title: radioactive spring
        description: A mineral spring through which water with elevated levels of
          radioactive material flows.
        is_a: ENVO_00000125
        meaning: 'ENVO:01001896'
      ENVO_00000204:
        title: ephemeral spring
        description: A spring through which fluid intermittently flows.
        is_a: ENVO_00000027
        meaning: 'ENVO:00000204'
      ENVO_00000205:
        title: permanent spring
        description: A spring whose flow is continuous.
        is_a: ENVO_00000027
        meaning: 'ENVO:00000205'
      ENVO_00000215:
        title: hydrothermal vent
        description: "A fissure in the Earths's surface from which geothermally heated\
          \ water issues."
        is_a: ENVO_00000027
        meaning: 'ENVO:00000215'
      ENVO_01000122:
        title: marine hydrothermal vent
        description: "A marine hydrothermal vent is a marine benthic feature where\
          \ heat generated due to tectonic activity, either at divergent plate boundaries\
          \ or convergent ocean plates where back-arc spreading occurs, is released\
          \ or 'vented' to the surface. The resultant high temperature water jets\
          \ are laden with dissolved metals and minerals."
        is_a: ENVO_00000215
        meaning: 'ENVO:01000122'
      ENVO_00000218:
        title: black smoker
        description: "A hydrothermal vent found on the ocean floor. The vents are\
          \ formed in fields hundreds of meters wide when superheated water from below\
          \ the Earth's crust comes through the ocean floor. The superheated water\
          \ is rich in dissolved minerals from the crust, most notably sulfides, which\
          \ crystallize to create a chimney-like structure around each vent. When\
          \ the superheated water in the vent comes in contact with the cold ocean\
          \ water, many minerals are precipitated, creating the distinctive black\
          \ color. The metal sulfides that are deposited can become massive sulfide\
          \ ore deposits in time."
        is_a: ENVO_01000122
        meaning: 'ENVO:00000218'
      ENVO_01000257:
        title: white smoker
        description: A hydrothermal vent found on the ocean floor which emits lighter-hued
          minerals, such as those containing barium, calcium and silicon. These alkaline
          hydrothermal vents also continuously generate acetyl thioesters, providing
          both the starting point for more complex organic molecules and the energy
          needed to produce them.
        is_a: ENVO_01000122
        meaning: 'ENVO:01000257'
      ENVO_01000598:
        title: freshwater spring
        description: A spring through which fresh water flows.
        is_a: ENVO_00000027
        meaning: 'ENVO:01000598'
      ENVO_01001898:
        title: acidic spring
        description: A spring through which water with a low pH flows.
        is_a: ENVO_00000027
        meaning: 'ENVO:01001898'
      ENVO_01001897:
        title: neutral spring
        description: A spring through which water with a neutral pH flows.
        is_a: ENVO_00000027
        meaning: 'ENVO:01001897'
      ENVO_01000262:
        title: seep
        description: A seep is a spring in which water has filtered through permeable
          earth to the surface.
        is_a: ENVO_00000027
        meaning: 'ENVO:01000262'
      ENVO_00002926:
        title: warm seep
        is_a: ENVO_01000262
        meaning: 'ENVO:00002926'
      ENVO_01000263:
        title: cold seep
        description: "MERGED DEFINITION:\nTARGET DEFINITION: A cold seep is a seep\
          \ in which methane and other hydrocarbon-rich fluids rise to the sea floor.\n\
          --------------------\nSOURCE DEFINITION: An area of the ocean floor where\
          \ hydrogen sulfide, methane and other hydrocarbon-rich fluid seepage occurs.\
          \ Cold seeps are distinct from hydrothermal vents: the former's emissions\
          \ are of the same temperature as the surrounding seawater, whereas the latter's\
          \ emissions are super-heated."
        is_a: ENVO_01000262
        meaning: 'ENVO:01000263'
      ENVO_01000265:
        title: hydrothermal seep
        description: A hydrothermal seep is a seep in which diffuse flow of geothermally
          heated fluids with high methane concentrations. This seep has been proposed
          as an intermediate between cold seeps and hydrothermal vents.
        is_a: ENVO_01000262
        meaning: 'ENVO:01000265'
      ENVO_00000304:
        title: shore
        description: That part of the land in immediate contact with a body of water
          including the area between high and low water lines.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000304'
      ENVO_00000485:
        title: sea shore
        description: That part of the land in immediate contact with a sea, including
          the intertidal zone.
        is_a: ENVO_00000304
        meaning: 'ENVO:00000485'
      ENVO_00000382:
        title: lake shore
        description: That part of the land in immediate contact with a lake.
        is_a: ENVO_00000304
        meaning: 'ENVO:00000382'
      ENVO_03501239:
        title: riverfront
        description: A shore along a river.
        is_a: ENVO_00000304
        meaning: 'ENVO:03501239'
      ENVO_00000084:
        title: mountain pass
        description: A lower point that allows easier access through a mountain range.
          A pass has the general form of a saddle between two mountains.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000084'
      ENVO_00000086:
        title: plain
        description: A region of general uniform slope, comparatively level, and of
          considerable extent.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000086'
      ENVO_00000090:
        title: coastal plain
        description: An area of flat, low-lying land adjacent to a coast and separated
          from the interior by other features.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000090'
      ENVO_00000244:
        title: abyssal plain
        description: A flat or very gently sloping areas of the deep ocean basin floor.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000244'
      ENVO_00000253:
        title: scroll plane
        description: A plain where a stream meanders across an area with a very low
          gradient, usually with a fairly continuous discharge. In addition to meanders,
          scroll plains are also characterised by many oxbow lakes.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000253'
      ENVO_00000254:
        title: till plain
        description: An extensive flat plain of glacial till that forms when a sheet
          of ice becomes detached from the main body of a glacier and melts in place
          depositing the sediments it carried.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000254'
      ENVO_00000255:
        title: flood plain
        description: An area which is subject to periodic flooding.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000255'
      ENVO_00000258:
        title: alluvial plain
        description: A relatively flat and gently sloping landform found at the base
          of a range of hills or mountains, formed by the deposition of alluvial soil
          over a long period of time by one or more streams coming from the mountains.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000258'
      ENVO_00000259:
        title: lacustrine plain
        description: A plain that originally formed in a lacustrine environment, that
          is, as the bed of a lake, but from which the water has disappeared, by natural
          drainage, evaporation or other geophysical processes.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000259'
      ENVO_00000312:
        title: sandur
        description: The plain formed by the large amounts of silt and sediment, picked
          up as a glacier erodes the underlying rocks as it moves slowly downhill,
          and at the snout of the glacier, meltwater can carry this sediment away
          from the glacier and deposit it on a broad plain. The material in the outwash
          plain is often size-sorted by the water runoff of the melting glacier with
          the finest materials, like silt, being the most distantly re-deposited,
          whereas larger boulders are the closest to the original terminus of the
          glacier.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000312'
      ENVO_00000434:
        title: outwash fan
        description: A fan-shaped body of sediments deposited by braided streams from
          a melting glacier.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000434'
      ENVO_00000460:
        title: penplain
        description: A region of low topographic relief as a consequence of erosion
          by streams.
        is_a: ENVO_00000086
        meaning: 'ENVO:00000460'
      ENVO_00004683:
        title: karst field
        description: A large flat plain in karst territory with areas usually 5 to
          400 sqaure kilometres.
        is_a: ENVO_00000086
        meaning: 'ENVO:00004683'
      ENVO_00000091:
        title: beach
        description: A landform consisting of loose rock particles such as sand, gravel,
          shingle, pebbles, cobble, or even shell fragments along the shoreline of
          a body of water.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000091'
      ENVO_00000092:
        title: sea beach
        description: A beach which is part of a sea shore.
        is_a: ENVO_00000091
        meaning: 'ENVO:00000092'
      ENVO_00000093:
        title: lacustrine beach
        description: A beach which is part of a lake shore.
        is_a: ENVO_00000091
        meaning: 'ENVO:00000093'
      ENVO_00000415:
        title: raised beach
        description: A beach or wave cut platform raised above the shore line by a
          relative fall in the sea level.
        is_a: ENVO_00000091
        meaning: 'ENVO:00000415'
      ENVO_00000417:
        title: machair
        description: A fertile low-lying raised beach found on the some of the coastlines
          of Ireland and Scotland, in particular in the Outer Hebrides.
        is_a: ENVO_00000415
        meaning: 'ENVO:00000417'
      ENVO_00000545:
        title: shingle beach
        description: A beach which is armoured with pebbles or small to medium sized
          cobbles.
        is_a: ENVO_00000091
        meaning: 'ENVO:00000545'
      ENVO_00002199:
        title: sandy beach
        description: A beach which is primarily composed of sand.
        is_a: ENVO_00000091
        meaning: 'ENVO:00002199'
      ENVO_00000094:
        title: volcanic feature
        description: "A part of an astronomical body associated with a volcano - an\
          \ opening, or rupture, in that body's surface or crust - which allows hot,\
          \ molten rock, ash and gases to escape from deep below the surface."
        is_a: ENVO_01001884
        meaning: 'ENVO:00000094'
      ENVO_00000398:
        title: volcanic cone
        description: Built by fragments (called ejecta) thrown up (ejected) from a
          volcanic vent, piling up around the vent in the shape of a cone with a central
          crater.
        is_a: ENVO_00000094
        meaning: 'ENVO:00000398'
      ENVO_00000356:
        title: pyroclastic cone
        description: A cone made of material ejected from a volcano. The material
          can range from finest particles. In comparison, cinder cones are more uniform.
          They are usually found in or on larger features, such as stratovolcanoes,
          shield volcanoes and can be found inside calderas, however they can also
          be an independent feature. They can range from a few metres in height and
          are usually formed by a single eruption.
        is_a: ENVO_00000398
        meaning: 'ENVO:00000356'
      ENVO_00000399:
        title: ash cone
        description: A cone that is composed of particles of silt to sand size. Explosive
          eruptions from a vent where the magma is interacting with groundwater or
          the sea (as in an eruption off the coast) produce steam and are called phreatic.
          The interaction between the magma, expanding steam, and volcanic gases results
          in the ejection of mostly small particles called ash. Fallen ash has the
          consistency of flour. The unconsolidated ash forms an ash cone which becomes
          a tuff cone or tuff ring once the ash consolidates.
        is_a: ENVO_00000398
        meaning: 'ENVO:00000399'
      ENVO_00000400:
        title: cinder cone
        description: A cone built almost entirely of loose volcanic fragments called
          cinders (pumice, pyroclastics, or tephra). They are built from particles
          and blobs of congealed lava ejected from a single vent. As the gas-charged
          lava is blown violently into the air, it breaks into small fragments that
          solidify and fall as cinders around the vent to form a circular or oval
          cone. Most cinder cones have a bowl-shaped crater at the summit.
        is_a: ENVO_00000398
        meaning: 'ENVO:00000400'
      ENVO_00000401:
        title: spatter cone
        description: A volcanic cone formed of molten lava ejected from a vent somewhat
          like taffy. Expanding gases in the lava fountains tear the liquid rock into
          irregular gobs that fall back to earth, forming a heap around the vent.
          The still partly liquid rock splashed down and over the sides of the developing
          mound is called spatter. Because spatter is not fully solid when it lands,
          the individual deposits are very irregular in shape and weld together as
          they cool, and in this way particularly differ from cinder and ash.
        is_a: ENVO_00000398
        meaning: 'ENVO:00000401'
      ENVO_01000664:
        title: tuff cone
        description: A cone that is composed of consolidated volcanic ash.
        is_a: ENVO_00000398
        meaning: 'ENVO:01000664'
      ENVO_01000731:
        title: igneous extrusion
        description: A mass of igneous rock formed when hot magma flows out (extrudes)
          onto a planetary surface as lava or explodes violently into the atmosphere
          to fall back as pyroclastics or tuff.
        is_a: ENVO_00000094
        meaning: 'ENVO:01000731'
      ENVO_00000127:
        title: badland
        description: An arid terrain with clay-rich soil that has been extensively
          eroded by wind and water.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000127'
      ENVO_00000157:
        title: peat cut
        description: An artificial working of peatland to remove the peat.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000157'
      ENVO_00000174:
        title: isthmus
        description: Narrow section of land in a body of water connecting two larger
          land areas.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000174'
      ENVO_00000391:
        title: land bridge
        description: 'An isthmus or other land connection between what at other times
          are separate land masses which allows animals and plants to cross and colonise
          new lands. Land bridges are commonly created by regression, in which sea
          levels fall exposing previously submerged sections of continental shelf.
          Land bridges are also formed by: (a) upthrust at the edge of continental
          plates; and (b) glacial retreat alleviating pressure on shallow marine formations.'
        is_a: ENVO_00000174
        meaning: 'ENVO:00000391'
      ENVO_00000175:
        title: karst
        description: A surface landform which is formed by the dissolution of a soluble
          layer or layers of bedrock.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000175'
      ENVO_00000333:
        title: subjacent karst
        description: Karst developed in soluble beds underlying other rock formations;
          the surface may or may not be affected by the karst development.
        is_a: ENVO_00000175
        meaning: 'ENVO:00000333'
      ENVO_00000334:
        title: syngenetic karst
        description: Karst developed in eolian calcarenite when the development of
          karst features has taken place at the same time as the lithification of
          dune sand.
        is_a: ENVO_00000175
        meaning: 'ENVO:00000334'
      ENVO_00000335:
        title: polygonal karst
        description: Karst completely pitted by closed depressions so that divides
          between them form a crudely polygonal network.
        is_a: ENVO_00000175
        meaning: 'ENVO:00000335'
      ENVO_00000336:
        title: doline karst
        description: Karst dominated by closed depressions, chiefly dolines, perforating
          a simple surface.
        is_a: ENVO_00000175
        meaning: 'ENVO:00000336'
      ENVO_00000422:
        title: limestone pavement
        description: A natural karst landform consisting of a flat, incised surface
          of exposed limestone that resembles artificial pavement.
        is_a: ENVO_00000175
        meaning: 'ENVO:00000422'
      ENVO_00000177:
        title: moraine
        description: An accumulation of boulders, stones, or other debris carried
          and deposited by a glacier.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000177'
      ENVO_00000249:
        title: lateral moraine
        description: The parallel ridges of till deposited along the sides of an alglacier.
          The unconsolidated debris is deposited on top of the glacier by frost shattering
          of the valley walls and from tributary streams flowing into the valley.
          The till is carried along the glacial margin until the glacier melts.
        is_a: ENVO_00000177
        meaning: 'ENVO:00000249'
      ENVO_00000250:
        title: medial moraine
        description: A moriane formed when the inside lateral moraines of two glaciers
          merge together. They form a ridge down the center of the combined glaciers.
        is_a: ENVO_00000177
        meaning: 'ENVO:00000250'
      ENVO_00000251:
        title: ground moraine
        description: A till covered area with irregular topography and no ridges,
          often forming gently rolling hills or plains. Forms by the accumulation
          of till under the ice by lodgement, but may also be deposited as the glacier
          retreats.
        is_a: ENVO_00000177
        meaning: 'ENVO:00000251'
      ENVO_00000252:
        title: terminal moraine
        description: "Ridges of unconsolidated debris deposited at the snout or end\
          \ of the glacier. They usually reflect the shape of the glacier's terminus."
        is_a: ENVO_00000177
        meaning: 'ENVO:00000252'
      ENVO_00000516:
        title: hummock
        description: A patch of ground, distinct from and slightly above the surrounding
          plain or wetland. Often occurs in groups.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000516'
      ENVO_01001538:
        title: frost-formed hummock
        description: A hummock which is primarily composed of soil that has been pushed
          up by frost action.
        is_a: ENVO_00000516
        meaning: 'ENVO:01001538'
      ENVO_00000195:
        title: sinkhole
        description: A natural depression or hole in the surface topography caused
          by the removal of soil or bedrock, often both, by water. Sinkholes may vary
          in size from less than a meter to several hundred meters both in diameter
          and depth, and vary in form from soil-lined bowls to bedrock-edged chasms.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000195'
      ENVO_00000256:
        title: floodway
        description: The stream channel and adjacent areas that carry flood flows
          in a flood plain.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000256'
      ENVO_00000277:
        title: dry lake
        description: A lake that has either permanently or temporally lost its water.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000277'
      ENVO_00000286:
        title: polder
        description: An area reclaimed from the sea by diking and draining.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000286'
      ENVO_00000289:
        title: horst
        description: "The raised fault block bounded by normal faults. The raised\
          \ block is a portion of the Earth's crust that has remained stationary while\
          \ the land has sunk on either side of it or has been crushed by a mountain\
          \ range against it."
        is_a: ENVO_01001884
        meaning: 'ENVO:00000289'
      ENVO_00000290:
        title: graben
        description: A depressed block of land bordered by parallel faults. A graben
          is the result of a block of land being downthrown producing a valley with
          a distinct scarp on each side. Grabens often occur side-by-side with horsts.
          Horst and graben structures are indicative of tensional forces and crustal
          stretching.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000290'
      ENVO_00000291:
        title: drainage basin
        description: An extent or area of land where surface water from rain and melting
          snow or ice converges to a single point at lower elevation, usually the
          exit of the basin, where the waters join another waterbody.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000291'
      ENVO_00000551:
        title: endorheic basin
        description: A drainage basin from which there is no outflow of water, either
          on the surface as rivers, or underground by flow or diffusion through rock
          or permeable material.
        is_a: ENVO_00000291
        meaning: 'ENVO:00000551'
      ENVO_00000305:
        title: peninsula
        description: A body of land jutting out into and nearly surrounded by water.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000305'
      ENVO_00000311:
        title: kettle
        description: A fluvioglacial landform occurring as the result of blocks of
          ice calving from the front of a receding glacier and becoming partially
          to wholly buried by glacial outwash. Glacial outwash is generated when sediment
          laden streams of meltwater flow away from the glacier and are deposited
          to form broad outwash plains called sandurs. When the ice blocks melt, holes
          are left in the sandur.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000311'
      ENVO_00000313:
        title: blowout
        description: A sandy depression in a sand dune ecosystem (psammosere) caused
          by the removal of sediments by wind.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000313'
      ENVO_00000325:
        title: polje
        description: A large closed depression draining underground, with a flat floor
          across which there may be an intermittent or perennial stream and which
          may be liable to flood and become a lake. The floor makes a sharp break
          with parts of surrounding slopes.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000325'
      ENVO_01000255:
        title: mineral deposit
        description: A mineral deposit is a physiographic feature which has unusually
          high concentrations of one or more minerals.
        is_a: ENVO_01001884
        meaning: 'ENVO:01000255'
      ENVO_00000327:
        title: speleothem
        description: A secondary mineral deposit formed in caves, most commonly calcite.
        is_a: ENVO_01000255
        meaning: 'ENVO:00000327'
      ENVO_00000330:
        title: stalagmite
        description: A speleothem projecting vertically upwards from a cave floor
          and formed by precipitation from drips.
        is_a: ENVO_00000327
        meaning: 'ENVO:00000330'
      ENVO_00000331:
        title: stalactite
        description: A speleothem hanging downwards from a roof or wall, of cylindrical
          or conical form, usually with a central hollow tube.
        is_a: ENVO_00000327
        meaning: 'ENVO:00000331'
      ENVO_02000150:
        title: uranium deposit
        description: A mineral deposit that contains uranium ore.
        is_a: ENVO_01000255
        meaning: 'ENVO:02000150'
      ENVO_02000151:
        title: natural nuclear fission reactor
        description: A uranium deposit where self-sustaining nuclear chain reactions
          have occurred.
        is_a: ENVO_02000150
        meaning: 'ENVO:02000151'
      ENVO_00000342:
        title: ice cap dome
        description: A comparatively elevated area on an icecap.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000342'
      ENVO_00000549:
        title: container of an intermittent water body
        description: A depression which is is periodically filled with water when
          water supply exceeds evapotranspiration and bed seepage.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000549'
      ENVO_00000387:
        title: container of an intermittent lake
        description: A depression which intermittently contains a lake.
        is_a: ENVO_00000549
        meaning: 'ENVO:00000387'
      ENVO_00000454:
        title: turlough
        description: A container of an intermittent lake unique to the limestone areas
          of Ireland, mostly west of the River Shannon. Most turloughs flood in the
          autumn, usually some time in October, and then dry up some time between
          April and July.
        is_a: ENVO_00000387
        meaning: 'ENVO:00000454'
      ENVO_00000502:
        title: container of an intermittent saline lake
        description: A depression that is periodically filled with saline water, forming
          a saline lake.
        is_a: ENVO_00000387
        meaning: 'ENVO:00000502'
      ENVO_00000504:
        title: container of an intermittent pond
        description: A container of an intermittent water body which, when filled
          with water, has a well-illuminated surface layer, is subject to complete
          mixing of the water it holds, and is smaller than the container of a lake.
        is_a: ENVO_00000549
        meaning: 'ENVO:00000504'
      ENVO_00000532:
        title: intermittent saline evaporation pond
        is_a: ENVO_00000504
        meaning: 'ENVO:00000532'
      ENVO_00000506:
        title: intermittently filled reservoir
        description: A reservoir that is not permanently filled with water, at times
          being dry.
        is_a: ENVO_00000549
        meaning: 'ENVO:00000506'
      ENVO_01000980:
        title: channel of an intermittent stream
        description: A channel through which a directional flow of water periodically
          occurs, ceasing when bed seepage or evapotranspiration exceed the available
          water supply.
        is_a: ENVO_00000549
        meaning: 'ENVO:01000980'
      ENVO_01000979:
        title: channel of an intermittent river
        description: A channel of an intermittent stream which contains a river when
          water supply exceeds evapotranspiration and bed seepage.
        is_a: ENVO_01000980
        meaning: 'ENVO:01000979'
      ENVO_00000410:
        title: kipuka
        description: An elevated area such as a hill, ridge or old lava dome inside
          or downslope from an area of active volcanism. New lava flows will cover
          the surrounding land, isolating the kipuka so that it appears as a (usually)
          forested island in a barren lava flow.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000410'
      ENVO_00000413:
        title: pingo
        description: A mound of earth-covered ice found in the Arctic, subarctic,
          and Antarctica that can reach up to 70 metres in height and up to 2 kilometres
          in diameter.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000413'
      ENVO_00000414:
        title: natural arch
        description: A natural formation where a rock arch forms, with a natural passageway
          through underneath.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000414'
      ENVO_00000419:
        title: stack
        description: A geological landform consisting of a steep and often vertical
          column or columns of rock in the sea near a coast.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000419'
      ENVO_00000421:
        title: wave-cut platform
        description: The narrow flat area often seen at the base of a sea cliff caused
          by the action of the waves.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000421'
      ENVO_00000430:
        title: dirt cone
        description: A feature of a glacier, in which dirt, which has fallen into
          a hollow in the ice, forms a coating which insulates the ice below. The
          surrounding ice melts away, leaving the dirt cone.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000430'
      ENVO_00000542:
        title: kame
        description: An irregularly shaped hill or mound composed of sorted or stratified
          sand and gravel that is deposited in contact with the glacial ice. It can
          have an irregular shape. Kames are often associated with kettles, and this
          is referred to as kame and kettle topography. When the ice retreats further,
          the delta kame often collapses. Kame terraces are frequently found along
          the side of a glacial valley and are the deposits of meltwater streams flowing
          between the ice and the adjacent valley side.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000542'
      ENVO_00000508:
        title: terrace
        description: 'A step-like feature between higher and lower ground: a relatively
          flat or gently inclined shelf of earth, backed and fronted by steep slopes
          or manmade detaining walls.'
        is_a: ENVO_01001884
        meaning: 'ENVO:00000508'
      ENVO_00000433:
        title: kame terrace
        description: A terrace associated with a kame.
        is_a: ENVO_00000508
        meaning: 'ENVO:00000433'
      ENVO_00000509:
        title: marine terrace
        description: A terrace which is located in a marine water body.
        is_a: ENVO_00000508
        meaning: 'ENVO:00000509'
      ENVO_00000438:
        title: alas
        description: A steep-sided depression formed by the melting of permafrost;
          it may contain a lake.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000438'
      ENVO_00000463:
        title: harbour
        description: A landform which provides shelter from atmospheric weather and
          marine currents, waves, and other dynamics.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000463'
      ENVO_00000465:
        title: natural harbor
        description: A harbor which is formed by a natural landform where a part of
          a body of water is protected and deep enough to furnish anchorage.
        is_a: ENVO_00000463
        meaning: 'ENVO:00000465'
      ENVO_01001568:
        title: frost heave
        description: An elevation which is formed as an ice mass forms under soil,
          resulting in upwards deformation of the land surface.
        is_a: ENVO_01001884
        meaning: 'ENVO:01001568'
      ENVO_00000489:
        title: palsa
        description: A frost heave which is formed as the result of a perennial ice
          lens forming under soil, pushing a roughly oval portion land surface upwards.
        is_a: ENVO_01001568
        meaning: 'ENVO:00000489'
      ENVO_00000496:
        title: rill
        description: A narrow and shallow incision into soil resulting from erosion
          by overland flow that has been focused into a thin thread by soil surface
          roughness. Rilling, the process of rill formation, is common on agricultural
          land and unvegetated ground.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000496'
      ENVO_00000520:
        title: landslide
        description: A mound of earth material, at the base of a slope and the associated
          scoured area.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000520'
      ENVO_00000521:
        title: rockfall
        description: An irregular mass of fallen rock at the base of a cliff or steep
          slope.
        is_a: ENVO_00000520
        meaning: 'ENVO:00000521'
      ENVO_00000524:
        title: abandoned watercourse
        description: A former stream or distributary no longer carrying flowing water,
          but still evident due to lakes, wetland, topographic or vegetation patterns.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000524'
      ENVO_00000526:
        title: cliff cleft
        description: A deep narrow slot, notch, or groove in a cliff.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000526'
      ENVO_00000527:
        title: interfluve
        description: A relatively undissected upland between adjacent stream valleys.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000527'
      ENVO_00000531:
        title: ice cap depression
        description: A depression which is part of an ice cap.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000531'
      ENVO_00000533:
        title: landfill
        description: A depression which contains objects and materials discarded by
          humans or their technologies.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000533'
      ENVO_00002205:
        title: unexploded-ordnance dump
        description: A dump which contains ammunition, or other material intended
          for use during combat, that still has the potential to explode.
        is_a: ENVO_00000533
        meaning: 'ENVO:00002205'
      ENVO_00000534:
        title: riverine pothole
        is_a: ENVO_01001884
        meaning: 'ENVO:00000534'
      ENVO_00000537:
        title: boulder field
        description: A high altitude or high latitude bare, flat area covered with
          large angular rocks.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000537'
      ENVO_00000538:
        title: arrugado
        description: An undersea area of subdued corrugations.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000538'
      ENVO_00000543:
        title: swale
        description: A depression which comprises a low tract of land, especially
          when moist or marshy.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000543'
      ENVO_00000552:
        title: talik
        description: An area of unfrozen ground surrounded by permafrost.
        is_a: ENVO_01001884
        meaning: 'ENVO:00000552'
      ENVO_01001357:
        title: desert
        description: A landform which has been rendered barren or partially barren
          by environmental extremes, especially by low rainfall, and which loses more
          liquid water by evapotranspiration than is supplied by precipitation.
        is_a: ENVO_01001884
        meaning: 'ENVO:01001357'
      ENVO_00009686:
        title: ice rise
        description: An ice rise is an elevation which is part of an ice shelf, typically
          dome shared, and formed by the ice shelf overriding an obstruction in the
          seabed. An ice rise may be adjacent only to an ice shelf, or to an ice shelf
          and a sea. For some features, properly ice rises, the term island has become
          established through usage.
        is_a: ENVO_01001884
        meaning: 'ENVO:00009686'
      ENVO_01000278:
        title: pingo scar
        description: A depression caused by the collapse of a pingo.
        is_a: ENVO_01001884
        meaning: 'ENVO:01000278'
      ENVO_01000302:
        title: outcrop
        description: A portion of environmental material which protrudes through a
          surface layer.
        is_a: ENVO_01001884
        meaning: 'ENVO:01000302'
      ENVO_01000450:
        title: salt glacier
        description: A mass of salt which has erupted onto a planetary surface, usually
          through sedimentary rock.
        is_a: ENVO_01001884
        meaning: 'ENVO:01000450'
      ENVO_01000505:
        title: salt dome
        description: A dome-shaped mass of salt formed when a thick bed of evaporite
          minerals (mainly salt, or halite) found at depth intrudes vertically into
          surrounding rock strata, forming a diapir.
        is_a: ENVO_01001884
        meaning: 'ENVO:01000505'
      ENVO_01000754:
        title: fumarole-derived ice tower
        description: A hollow tower of ice formed by the freezing of steam escaping
          a fumarole.
        is_a: ENVO_01001884
        meaning: 'ENVO:01000754'
      ENVO_01001467:
        title: UNEP-WCMC class 7 mountain
        description: An elevated inner basin or plateau surrounded by mountains, but
          not - itself - a mountain.
        is_a: ENVO_01001884
        meaning: 'ENVO:01001467'
      ENVO_01001537:
        title: sea ice hummock
        description: An elevation which is formed by pressure at the point of contact
          between ice floes, resulting in a conglomeration of broken ice.
        is_a: ENVO_01001884
        meaning: 'ENVO:01001537'
      ENVO_00000309:
        title: depressed landform
        description: A landform sunken or depressed below the surrounding area.
        is_a: ENVO_01001886
        meaning: 'ENVO:00000309'
      ENVO_00000395:
        title: channel of a watercourse
        description: A depressed landform which physically confines a river, slough
          or ocean strait, and which consists of a bed and banks.
        is_a: ENVO_00000309
        meaning: 'ENVO:00000395'
      ENVO_01000650:
        title: stream channel
        description: A channel of a watercourse which contains a stream.
        is_a: ENVO_00000395
        meaning: 'ENVO:01000650'
      ENVO_01000652:
        title: river channel
        description: A stream channel which contains a river.
        is_a: ENVO_01000650
        meaning: 'ENVO:01000652'
      ENVO_00000278:
        title: dry stream
        description: A stream channel through which no water flows and which has dried,
          containing no appreciable accumulations of water.
        is_a: ENVO_00000395
        meaning: 'ENVO:00000278'
      ENVO_01000995:
        title: dry river
        description: A dry stream channel through which a river had flowed, but now
          contains no appreciable accumulations of water.
        is_a: ENVO_00000278
        meaning: 'ENVO:01000995'
      ENVO_00000394:
        title: strait
        description: A narrow channel of water that connects two larger bodies of
          water, and thus lies between two land masses.
        is_a: ENVO_00000395
        meaning: 'ENVO:00000394'
      ENVO_01000651:
        title: ocean strait
        description: An ocean strait is a strait which connects two oceans.
        is_a: ENVO_00000394
        meaning: 'ENVO:01000651'
      ENVO_00000396:
        title: marine channel
        description: A channel of a watercourse which contains marine water.
        is_a: ENVO_00000395
        meaning: 'ENVO:00000396'
      ENVO_00000397:
        title: lake channel
        description: A channel of a watercourse which contains lake water.
        is_a: ENVO_00000395
        meaning: 'ENVO:00000397'
      ENVO_00000523:
        title: cutoff
        description: A channel formed as a result of a stream cutting through a meander
          neck.
        is_a: ENVO_00000395
        meaning: 'ENVO:00000523'
      ENVO_00000514:
        title: crater
        description: A generally circular saucer or bowl-shaped depression caused
          by explosive action.
        is_a: ENVO_00000309
        meaning: 'ENVO:00000514'
      ENVO_00000246:
        title: volcanic crater
        description: A crater formed by a volcano, within which occurs a vent (or
          vents) from which magma erupts as gases, lava, and ejecta.
        is_a: ENVO_00000514
        meaning: 'ENVO:00000246'
      ENVO_00000096:
        title: caldera
        description: A feature formed by the collapse of land following a volcanic
          eruption.
        is_a: ENVO_00000514
        meaning: 'ENVO:00000096'
      ENVO_00000245:
        title: maar
        description: A broad, low relief crater that results from a phreatic eruption
          or explosion caused by groundwater contact with hot lava or magma. The maar
          typically fills with water to form a relatively shallow crater lake.
        is_a: ENVO_00000514
        meaning: 'ENVO:00000245'
      ENVO_01001071:
        title: impact crater
        description: A crater which was formed as a result of the impact of one astronomical
          body on another.
        is_a: ENVO_00000514
        meaning: 'ENVO:01001071'
      ENVO_00000310:
        title: meteor impact crater
        description: A crater caused by the impact of a meteor.
        is_a: ENVO_01001071
        meaning: 'ENVO:00000310'
      ENVO_00000461:
        title: pseudocrater
        description: A volcanic landform which resembles a true volcanic crater, but
          differs in that it is not an actual vent from which lava has erupted. A
          pseudocrater is characterised by the absence of any magma conduit which
          connects below the surface of the earth. Pseudocraters are formed by steam
          explosions as flowing hot lava crosses over a wet surface, such as a swamp,
          a lake, or a pond. The explosive gases break through the lava surface in
          a manner similar to a phreatic eruption, and the tephra builds up crater-like
          forms which can appear very similar to real volcanic craters.
        is_a: ENVO_00000514
        meaning: 'ENVO:00000461'
      ENVO_01000160:
        title: marine pockmark
        description: Pockmarks are craters in the seabed resulting from the release
          of gas or liquid. Generally, they are formed in soft, fine-grained seabed
          sediments by the escape of fluids (gas or water, but mainly methane) into
          the water column.
        is_a: ENVO_00000514
        meaning: 'ENVO:01000160'
      ENVO_03000089:
        title: permafrost crater derived from a methane explosion
        description: A crater which is found in permafrost and formed as a result
          of an explosion fuelled by methane formerly contained in that permafrost.
        is_a: ENVO_00000514
        meaning: 'ENVO:03000089'
      ENVO_03000015:
        title: geographic basin
        description: A depression which is part of a planetary crust, is of geographic
          scale, and is partially or completely enclosed.
        is_a: ENVO_00000309
        meaning: 'ENVO:03000015'
      ENVO_00000100:
        title: valley
        description: A depression which has been formed as a result of erosion by
          water or ice and which is low-lying, bordered by higher ground, and especially
          elongate.
        is_a: ENVO_03000015
        meaning: 'ENVO:00000100'
      ENVO_00000031:
        title: wadi
        description: A valley or ravine, bounded by relatively steep banks, which
          in the rainy season becomes a watercourse.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000031'
      ENVO_00000248:
        title: glacial valley
        description: A valley that contains, or contained, a glacier and was formed
          by glacial activity. Typically U-shaped in cross-section.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000248'
      ENVO_00000155:
        title: cirque
        description: A depression which is semicircular or crescent-shaped, found
          towards the crest of a mountain, and formed by the erosional processes caused
          by the motion of a glacier.
        is_a: ENVO_00000248
        meaning: 'ENVO:00000155'
      ENVO_00000184:
        title: hanging valley
        description: A tributary valley with the floor at a higher relief than the
          main channel into which it flows. They are most commonly associated with
          U-shaped valleys when a tributary glacier flows into a glacier of larger
          volume.
        is_a: ENVO_00000248
        meaning: 'ENVO:00000184'
      ENVO_00000436:
        title: tunnel valley
        description: "A deep but narrow valley with a 'U' shaped cross-section and\
          \ frequently a 'U' shaped plan which is usually found filled with glacial\
          \ till. It is formed when the edge of an ice mass advances up a slope. Its\
          \ length may be appropriately measured in centimetres or kilometres, depending\
          \ on the circumstances of formation."
        is_a: ENVO_00000248
        meaning: 'ENVO:00000436'
      ENVO_00000437:
        title: Nye channel
        description: A small tunnel valley.
        is_a: ENVO_00000436
        meaning: 'ENVO:00000437'
      ENVO_00000128:
        title: dry valley
        description: A valley which no longer has water flowing or accumulating over
          its surface.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000128'
      ENVO_0010162:
        title: dry stream valley
        description: A dry valley which was formed as a result of erosion due to stream
          formation and flow.
        is_a: ENVO_00000128
        meaning: 'ENVO:0010162'
      ENVO_0010163:
        title: dry river valley
        description: A dry stream valley which was formed as a result of erosion due
          to river formation and flow.
        is_a: ENVO_0010162
        meaning: 'ENVO:0010163'
      ENVO_00000129:
        title: stream valley
        description: A valley that contains, and has been formed by, a stream.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000129'
      ENVO_00000171:
        title: river valley
        description: A valley that contains, and has been formed by, a river.
        is_a: ENVO_00000129
        meaning: 'ENVO:00000171'
      ENVO_00000169:
        title: canyon
        description: Relatively narrow, deep depression with steep sides, the bottom
          of which generally has a continuous slope.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000169'
      ENVO_00000267:
        title: submarine canyon
        description: A steep-sided valley on the sea floor of the continental slope.
          Many submarine canyons are found as extensions to large rivers; however
          there are many that have no such association. Canyons cutting the continental
          slopes have been found at depths greater than 2 km below sea level. Many
          submarine canyons continue as submarine channels across continental rise
          areas and may extend for hundreds of kilometers.
        is_a: ENVO_00000169
        meaning: 'ENVO:00000267'
      ENVO_00000302:
        title: rift valley
        description: "A valley created by the formation of a rift, i.e. place where\
          \ a planet's lithosphere is being pulled apart by tectonic forces."
        is_a: ENVO_00000100
        meaning: 'ENVO:00000302'
      ENVO_00000308:
        title: dune slack
        description: A valley or trough between two dunes.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000308'
      ENVO_00000418:
        title: ria
        description: A submergent coastal landform that forms where sea levels rise
          relative to the land either as a result of eustatic sea level change; where
          the global sea levels rise or isostatic sea level change; where the land
          sinks. When this happens valleys which were previously at sea level become
          submerged.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000418'
      ENVO_00000439:
        title: dell
        description: A small wooded valley, either U- or V-shaped.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000439'
      ENVO_00000567:
        title: calanque
        description: A deep valley with steep sides, typically of limestone, in part
          submerged by the sea.
        is_a: ENVO_00000100
        meaning: 'ENVO:00000567'
      ENVO_01000446:
        title: ravine
        description: A ravine is a small, narrow, steep-sided valley that is larger
          than a gully and smaller than a canyon and that is usually worn by running
          water.
        is_a: ENVO_00000100
        meaning: 'ENVO:01000446'
      ENVO_03000084:
        title: thermokarst depression
        description: A geographic basin which is formed due to the erosion of thermokarst
          by meltwater released from thawing permafrost.
        is_a: ENVO_03000015
        meaning: 'ENVO:03000084'
      ENVO_01000275:
        title: structural basin
        description: A structural basin is a geological depression formed by tectonic
          warping of previously flat lying rock strata.
        is_a: ENVO_00000309
        meaning: 'ENVO:01000275'
      ENVO_00002450:
        title: ocean basin
        description: A structural basin that is below sea level.
        is_a: ENVO_01000275
        meaning: 'ENVO:00002450'
      ENVO_00002277:
        title: back-arc basin
        description: "A depression in the sea floor that results from the collision\
          \ of continental plates; the weight of the sinking plate causes the overlying\
          \ plate to stretch and thin, causing a basin in the overlying plate. Sometimes,\
          \ the Earth's crust in these basins stretches so much it cracks, allowing\
          \ magma through from the mantle beneath. Hence, basins often contain active\
          \ volcanoes and hydrothermal vents."
        is_a: ENVO_01000275
        meaning: 'ENVO:00002277'
      ENVO_01000649:
        title: trench
        description: A trench is a type of excavation or depression in the ground
          that is generally deeper than it is wide (as opposed to a wider gully or
          ditch), and narrow compared to its length (as opposed to a simple hole).
        is_a: ENVO_00000309
        meaning: 'ENVO:01000649'
      ENVO_00000275:
        title: ocean trench
        description: Hemispheric-scale long but narrow topographic depressions of
          the sea floor. They are the deepest parts of the ocean floor.
        is_a: ENVO_01000649
        meaning: 'ENVO:00000275'
      ENVO_00000332:
        title: doline
        description: A closed depression draining underground in karst, of simple
          but variable form, e.g. cylindrical, conical, bowl- or dish-shaped. From
          a few to many hundreds of metres in dimensions.
        is_a: ENVO_00000309
        meaning: 'ENVO:00000332'
      ENVO_00000499:
        title: trough
        description: A linear structural depression that extends laterally over a
          distance, while being less steep than a trench. A trough can be a narrow
          basin or a geologic rift. There are various oceanic troughs, troughs found
          under oceans; examples include the rift along the mid-oceanic ridge and
          the Cayman Trough.
        is_a: ENVO_00000309
        meaning: 'ENVO:00000499'
      ENVO_01000654:
        title: undersea trough
        description: An undersea trough is a trough which is below a marine water
          body.
        is_a: ENVO_00000499
        meaning: 'ENVO:01000654'
      ENVO_00000536:
        title: moatan
        description: An annular depression that may not be continuous, located at
          the base of many seamounts, islands, and other isolated elevations.
        is_a: ENVO_00000309
        meaning: 'ENVO:00000536'
      ENVO_00000539:
        title: geographic sill
        description: The low part of a gap or saddle separating basins.
        is_a: ENVO_00000309
        meaning: 'ENVO:00000539'
      ENVO_01001871:
        title: pit
        description: A depression in the ground resembling a hole or cavity, either
          natural or anthropogenic.
        is_a: ENVO_00000309
        meaning: 'ENVO:01001871'
      ENVO_01001872:
        title: manure pit
        description: A pit which is used for the collection and storage of manure.
        is_a: ENVO_01001871
        meaning: 'ENVO:01001872'
      ENVO_03600091:
        title: clay fermentation pit
        description: A fermentation pit which is constructed from clay.
        is_a: ENVO_01001871
        meaning: 'ENVO:03600091'
      ENVO_00002000:
        title: slope
        description: A solid astronomical body part which is part of the planetary
          surface between the peak of an elevation or the bottom of a depression and
          relatively flat surrounding land.
        is_a: ENVO_01001886
        meaning: 'ENVO:00002000'
      ENVO_00000087:
        title: cliff
        description: A slope which is part of a rocky elevation and which has a high
          degree of steepness.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000087'
      ENVO_00000088:
        title: sea cliff
        description: A cliff that is a margin of a sea or ocean.
        is_a: ENVO_00000087
        meaning: 'ENVO:00000088'
      ENVO_00000089:
        title: inland cliff
        description: A cliff which is not adjacent to a major water body.
        is_a: ENVO_00000087
        meaning: 'ENVO:00000089'
      ENVO_00000141:
        title: bank
        description: The sloping margin of a watercourse, serving to confine it to
          its natural channel.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000141'
      ENVO_00000142:
        title: stream bank
        description: The sloping margin of a stream, serving to confine it to its
          natural channel.
        is_a: ENVO_00000141
        meaning: 'ENVO:00000142'
      ENVO_00000143:
        title: river bank
        description: The sloping margin of a river, serving to confine it to its natural
          channel.
        is_a: ENVO_00000142
        meaning: 'ENVO:00000143'
      ENVO_00000223:
        title: continental shelf
        description: A slope which a) extends the perimeter of a continent, b) is
          covered by a shallow marine water body during interglacial periods, c) has
          a low degree of steepness relative to a continental slope or rise.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000223'
      ENVO_01000298:
        title: continental margin
        description: A slope which is part of the seafloor, descends from the continental
          crust to the oceanic crust, and comprises the continental shelf, continental
          slope, and continental rise.
        is_a: ENVO_00002000
        meaning: 'ENVO:01000298'
      ENVO_00000273:
        title: continental slope
        description: A slope which 1) is part of the seafloor and 2) extends from
          the end of the continental shelf (the shelf break) to the continental rise.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000273'
      ENVO_00000274:
        title: continental rise
        description: A slope which a) bridges, and thus lies between, a continental
          slope and an abyssal plain, b) is formed by the accumulation of sediments
          transported from a continental slope by processes including turbidity currents
          c) has a gradient less than a continental slope yet greater than a continental
          shelf.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000274'
      ENVO_00000280:
        title: escarpment
        description: A slope which separates different physiogeographic provinces
          that are typically composed of rocks of different age and compositoin.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000280'
      ENVO_00000281:
        title: fault escarpment
        description: An escarpment resulting from a fault.
        is_a: ENVO_00000280
        meaning: 'ENVO:00000281'
      ENVO_01001489:
        title: spur
        description: A slope of land descending laterally from a hill, mountain or
          main crest of a ridge.
        is_a: ENVO_00002000
        meaning: 'ENVO:01001489'
      ENVO_00000390:
        title: mountain spur
        description: A spur which is part of a mountain.
        is_a: ENVO_01001489
        meaning: 'ENVO:00000390'
      ENVO_00000530:
        title: apron
        description: A gentle slope, with a generally smooth surface, particularly
          found around groups of islands and seamounts.
        is_a: ENVO_00002000
        meaning: 'ENVO:00000530'
      ENVO_01000319:
        title: rocky slope
        description: A rocky slope is a slope which has a surface primarily composed
          of rock.
        is_a: ENVO_00002000
        meaning: 'ENVO:01000319'
      ENVO_01000332:
        title: gravelly slope
        description: A gravelly slope is a slope which has a surface primarily composed
          of gravel.
        is_a: ENVO_00002000
        meaning: 'ENVO:01000332'
      ENVO_01000333:
        title: hillside
        description: A hillside is a slope that is part of a hill.
        is_a: ENVO_00002000
        meaning: 'ENVO:01000333'
      ENVO_01000334:
        title: talus slope
        description: A talus slope is a slope which has a surface layer composed of
          scree.
        is_a: ENVO_00002000
        meaning: 'ENVO:01000334'
      ENVO_03000117:
        title: channel
        description: A structure which traverses a mass of one or more environmental
          materials, and encloses a roughly tubular site.
        is_a: ENVO_01001886
        meaning: 'ENVO:03000117'
      ENVO_00000068:
        title: tunnel
        description: An underground or underwater passage.
        is_a: ENVO_03000117
        meaning: 'ENVO:00000068'
      ENVO_00000066:
        title: man-made tunnel
        description: A tunnel constructed by human means.
        is_a: ENVO_00000068
        meaning: 'ENVO:00000066'
      ENVO_00000522:
        title: canal tunnel
        description: A tunnel through which a canal passes.
        is_a: ENVO_00000066
        meaning: 'ENVO:00000522'
      ENVO_01000429:
        title: burrow
        description: A burrow is a hole or tunnel excavated into the ground by an
          animal to create a space suitable for habitation, temporary refuge, or as
          a byproduct of locomotion
        is_a: ENVO_00000068
        meaning: 'ENVO:01000429'
      ENVO_01001111:
        title: fossil worm burrow
        description: A channel which was formed as a result of an annelid burrowing
          through soil, where organic residues lining the burrow have subsequently
          initiated fossilization.
        is_a: ENVO_03000117
        meaning: 'ENVO:01001111'
      ENVO_03000041:
        title: brine channel
        description: A channel through which brine flows.
        is_a: ENVO_03000117
        meaning: 'ENVO:03000041'
      ENVO_03000048:
        title: thaw hole
        description: A channel which traverses an ice mass floating on a water body
          and bridges the atmosphere to the underlying water through its internal
          cavity.
        is_a: ENVO_03000117
        meaning: 'ENVO:03000048'
      ENVO_03000039:
        title: cryoconite hole
        description: A vertical thaw hole within an ice mass, formed as a result of
          ice melt associated with local temperature increases, due to increased absorption
          of solar radiation by cryoconite deposits.
        is_a: ENVO_03000048
        meaning: 'ENVO:03000039'
      ENVO_00000176:
        title: elevated landform
        description: A landform elevated above the surrounding area.
        is_a: ENVO_01001886
        meaning: 'ENVO:00000176'
      ENVO_00000477:
        title: mount
        description: A mountain or a hill.
        is_a: ENVO_00000176
        meaning: 'ENVO:00000477'
      ENVO_00000081:
        title: mountain
        description: A landform that extends above the surrounding terrain in a limited
          area.
        is_a: ENVO_00000477
        meaning: 'ENVO:00000081'
      ENVO_00000264:
        title: seamount
        description: "A mountain rising from the ocean seafloor that does not reach\
          \ to the water's surface (sea level), and thus is not an island. Typically\
          \ formed from volcanoes that rise abruptly and are usually found rising\
          \ from a seafloor of 1,000 - 4,000 meters depth. Independent features that\
          \ rise to at least 1,000 meters above the seafloor."
        is_a: ENVO_00000081
        meaning: 'ENVO:00000264'
      ENVO_00000265:
        title: guyot
        description: A flat-topped seamount.
        is_a: ENVO_00000264
        meaning: 'ENVO:00000265'
      ENVO_01001453:
        title: terrestrial mountain
        description: A mountain which is located on land and which is bounded by an
          atmosphere or outer space.
        is_a: ENVO_00000081
        meaning: 'ENVO:01001453'
      ENVO_01001454:
        title: polar mountain
        description: A mountain that is part of a polar environment.
        is_a: ENVO_00000081
        meaning: 'ENVO:01001454'
      ENVO_01001455:
        title: temperate mountain
        description: A mountain that is part of a temperate environment.
        is_a: ENVO_00000081
        meaning: 'ENVO:01001455'
      ENVO_01001456:
        title: tropical mountain
        description: A mountain that is part of a tropical environment.
        is_a: ENVO_00000081
        meaning: 'ENVO:01001456'
      ENVO_01001459:
        title: high-elevation mountain
        description: A mountain which has a maximum elevation greater than 2500 metres
          above sea level.
        is_a: ENVO_00000081
        meaning: 'ENVO:01001459'
      ENVO_01001461:
        title: UNEP-WCMC class 1 mountain
        description: A high-elevation mountain which has a maximum elevation greater
          than 4500 metres above sea level.
        is_a: ENVO_01001459
        meaning: 'ENVO:01001461'
      ENVO_01001462:
        title: UNEP-WCMC class 2 mountain
        description: A high-elevation mountain which has a maximum elevation between
          3500 and 4500 metres above sea level.
        is_a: ENVO_01001459
        meaning: 'ENVO:01001462'
      ENVO_01001463:
        title: UNEP-WCMC class 3 mountain
        description: A high-elevation mountain which has a maximum elevation between
          2500 and 3500 metres above sea level.
        is_a: ENVO_01001459
        meaning: 'ENVO:01001463'
      ENVO_01001460:
        title: mid-elevation mountain
        description: A mountain which has a maximum elevation between 300 and 2499
          metres above sea level and slopes greater than or equal to two degrees of
          inclination.
        is_a: ENVO_00000081
        meaning: 'ENVO:01001460'
      ENVO_01001464:
        title: UNEP-WCMC class 4 mountain
        description: A mid-elevation mountain which has a maximum elevation between
          1500 and 2499 metres above sea level and a slope greater than or equal to
          two degrees.
        is_a: ENVO_01001460
        meaning: 'ENVO:01001464'
      ENVO_01001465:
        title: UNEP-WCMC class 5 mountain
        description: A mid-elevation mountain which has a maximum elevation between
          1000 and 1499 metres above sea level and either 1) a slope greater than
          or equal to five degrees or 2) a local elevation range, within a 7 kilometre
          radius, of greater than 300 metres above sea level.
        is_a: ENVO_01001460
        meaning: 'ENVO:01001465'
      ENVO_01001466:
        title: UNEP-WCMC class 6 mountain
        description: A mid-elevation mountain which has a maximum elevation between
          300 and 999 metres above sea level and a local elevation range, within a
          7 kilometre radius, of greater than 300 metres above sea level.
        is_a: ENVO_01001460
        meaning: 'ENVO:01001466'
      ENVO_00000083:
        title: hill
        description: A rounded elevation of limited extent rising above the surrounding
          land with local relief of less than 300m.
        is_a: ENVO_00000477
        meaning: 'ENVO:00000083'
      ENVO_00000170:
        title: dune
        description: A hill of sand built by eolian processes.
        is_a: ENVO_00000083
        meaning: 'ENVO:00000170'
      ENVO_00000416:
        title: coastal dune
        description: A dune which is part of a coast.
        is_a: ENVO_00000170
        meaning: 'ENVO:00000416'
      ENVO_00000276:
        title: drumlin
        description: An elongated whale-shaped hill formed by glacial action. Its
          long axis is parallel with the movement of the ice, with the blunter end
          facing into the glacial movement. Drumlins are sometimes compared to kames,
          but their formation is distinctively different. A drumlin is not originally
          shaped by meltwater, but by the ice itself and has a quite regular shape.
          It occurs in fine grained material, such as clay or shale, not in sands
          and gravels. And drumlins usually have concentric layers of material, as
          the ice successively plasters new layers in its movement.
        is_a: ENVO_00000083
        meaning: 'ENVO:00000276'
      ENVO_01000943:
        title: vegetated hill
        description: A hill which has a surface that is partially or wholly covered
          by plant communities.
        is_a: ENVO_00000083
        meaning: 'ENVO:01000943'
      ENVO_03501238:
        title: hillock
        description: A hill which is small and usually separated from a larger group
          of hills such as a range.
        is_a: ENVO_00000083
        meaning: 'ENVO:03501238'
      ENVO_00000180:
        title: mound
        description: A rounded elevated area.
        is_a: ENVO_00000477
        meaning: 'ENVO:00000180'
      ENVO_00000432:
        title: monadnock
        description: An isolated hill, knob, ridge, or small mountain that rises abruptly
          from a gently sloping or virtually level surrounding plain.
        is_a: ENVO_00000477
        meaning: 'ENVO:00000432'
      ENVO_01001491:
        title: flattened elevation
        description: An elevation which is flattened across its highest surface.
        is_a: ENVO_00000176
        meaning: 'ENVO:01001491'
      ENVO_00000179:
        title: mesa
        description: An elevated area of land with a flat top and sides that are usually
          steep cliffs. Mesas form in areas where horizontally layered rocks are uplifted
          by tectonic activity.
        is_a: ENVO_01001491
        meaning: 'ENVO:00000179'
      ENVO_00000182:
        title: plateau
        description: An elevated and comparatively level expanse of land.
        is_a: ENVO_01001491
        meaning: 'ENVO:00000182'
      ENVO_00000287:
        title: butte
        description: An isolated hill with steep sides and a small flat top, smaller
          than mesas and plateaus. Buttes are formed by erosion when a cap of hard
          rock, usually of volcanic origin, covers a layer of softer rock that is
          easily worn away. This hard rock avoids erosion while the rock around it
          wears down.
        is_a: ENVO_01001491
        meaning: 'ENVO:00000287'
      ENVO_00000283:
        title: ridge
        description: A long and narrow elevation with steep sides.
        is_a: ENVO_00000176
        meaning: 'ENVO:00000283'
      ENVO_00000282:
        title: esker
        description: A long, winding ridge of stratified sand and gravel which occur
          in glaciated and formerly glaciated regions of Europe and North America.
        is_a: ENVO_00000283
        meaning: 'ENVO:00000282'
      ENVO_00000429:
        title: arete
        description: A ridge which is jagged, narrow and separates glacier valleys
          or cirques.
        is_a: ENVO_00000283
        meaning: 'ENVO:00000429'
      ENVO_00000441:
        title: terracette
        description: A ridge on a hillside formed when saturated soil particles expand,
          then contract as they dry, causing them to move slowly downhill.
        is_a: ENVO_00000283
        meaning: 'ENVO:00000441'
      ENVO_00000528:
        title: ice cap ridge
        description: A linear elevation on an icecap.
        is_a: ENVO_00000283
        meaning: 'ENVO:00000528'
      ENVO_00000529:
        title: beach ridge
        description: A ridge of sand just inland and parallel to the beach, usually
          in series.
        is_a: ENVO_00000283
        meaning: 'ENVO:00000529'
      ENVO_00000381:
        title: massif
        description: "A section of the Earths's crust that is demarcated by faults\
          \ or flexures. In the movement of the crust, a massif tends to retain its\
          \ internal structure while being displaced as a whole."
        is_a: ENVO_00000176
        meaning: 'ENVO:00000381'
      ENVO_00000481:
        title: pinnacle
        description: A tall, slender, spire-shaped rock projecting from a level or
          more gently sloping surface.
        is_a: ENVO_00000176
        meaning: 'ENVO:00000481'
      ENVO_00000480:
        title: peak
        description: The summit of a mount.
        is_a: ENVO_01001886
        meaning: 'ENVO:00000480'
      ENVO_00000181:
        title: nunatak
        description: The exposed summit of a ridge, mountain, or peak not covered
          with ice or snow within an ice field or glacier. The term is typically used
          in areas where a permanent ice mass is present.
        is_a: ENVO_00000480
        meaning: 'ENVO:00000181'
      ENVO_00002184:
        title: subsurface landform
        is_a: ENVO_01001886
        meaning: 'ENVO:00002184'
      ENVO_00002185:
        title: oil reservoir
        description: A subsurface landform which contains fluid hydrocarbons in porous
          or fractured rock formations.
        is_a: ENVO_00002184
        meaning: 'ENVO:00002185'
      ENVO_00000510:
        title: meander neck
        description: A landform which is the narrowest part of a meander.
        is_a: ENVO_01001886
        meaning: 'ENVO:00000510'
      ENVO_01001885:
        title: submerged landform
        description: A landform which is submerged underneath a body of liquid.
        is_a: ENVO_01001886
        meaning: 'ENVO:01001885'
      ENVO_01000129:
        title: marine hydrothermal vent chimney
        description: A column of solid material which has been progressively deposited
          around a hydrothermal vent.
        is_a: ENVO_01001885
        meaning: 'ENVO:01000129'
      ENVO_01000667:
        title: geological fracture
        description: A geological fracture is any separation in a geologic formation,
          such as a joint or a fault that divides a mass of rock into two or more
          pieces.
        is_a: ENVO_00000191
        meaning: 'ENVO:01000667'
      ENVO_00000216:
        title: fumarole
        description: "A hole in the Earth's crust from which steam and gases are emitted."
        is_a: ENVO_01000667
        meaning: 'ENVO:00000216'
      ENVO_00000217:
        title: solfatara
        description: A fumarole that emits sulfurous gases.
        is_a: ENVO_00000216
        meaning: 'ENVO:00000217'
      ENVO_00000247:
        title: volcano
        description: "An opening, or rupture, in the Earth's surface or crust, which\
          \ allows hot, molten rock, ash and gases to escape from deep below the surface."
        is_a: ENVO_01000667
        meaning: 'ENVO:00000247'
      ENVO_00000350:
        title: somma volcano
        description: A volcanic caldera that has been partially filled by a new central
          cone.
        is_a: ENVO_00000247
        meaning: 'ENVO:00000350'
      ENVO_00000370:
        title: tuya
        description: A distinctive, flat-topped, steep-sided volcano formed when lava
          erupts through a thick glacier or ice sheet.
        is_a: ENVO_00000247
        meaning: 'ENVO:00000370'
      ENVO_00000371:
        title: complex volcano
        description: "A volcano with more than one feature. They form because changes\
          \ of their eruptive characteristics or the location of multiple vents in\
          \ an area. Stratovolcanoes may form complex volcanoes, because they may\
          \ overlap another from explosive eruptions, lava flows, pyroclastic flows\
          \ and by repeated eruptions, to make multiple summits and vents. Stratovolcanoes\
          \ could also form a large caldera that gets filled in by multiple small\
          \ cinder cones, lava domes and craters may also develop on the caldera's\
          \ rim."
        is_a: ENVO_00000247
        meaning: 'ENVO:00000371'
      ENVO_00000403:
        title: shield volcano
        description: A large volcano with shallowly-sloping sides.
        is_a: ENVO_00000247
        meaning: 'ENVO:00000403'
      ENVO_00000372:
        title: pyroclastic shield volcano
        description: A shield volcano that is formed mostly of pyroclastic and highly
          explosive eruptions rather than relatively fluid basaltic lava issuing from
          vents or fissures on the surface of the volcano. They typically display
          low-angle flank slopes and have little or no central collapse, although
          a shallow sag in the shield is commonly observed. Lava is commonly extruded
          after the cessation of explosive activity commonly superposes the vent region.
        is_a: ENVO_00000403
        meaning: 'ENVO:00000372'
      ENVO_00000402:
        title: mud volcano
        description: A volcano created by geologically excreted liquids and gases,
          although there are several different processes which may cause such activity.
          Temperatures are much cooler than igneous processes.
        is_a: ENVO_00000247
        meaning: 'ENVO:00000402'
      ENVO_00000404:
        title: stratovolcano
        description: A tall, conical volcano composed of many layers of hardened lava,
          tephra, and volcanic ash. These volcanoes are characterized by a steep profile
          and periodic, explosive eruptions. The lava that flows from them is viscous,
          and cools and hardens before spreading very far. The source magma of this
          rock is classified as acidic, or high in silica to intermediate (rhyolite,
          dacite, or andesite).
        is_a: ENVO_00000247
        meaning: 'ENVO:00000404'
      ENVO_00000407:
        title: subglacial volcano
        description: A volcano produced by subglacial eruptions or eruptions beneath
          the surface of a lake melted into a glacier or ice mass by the rising lava.
        is_a: ENVO_00000247
        meaning: 'ENVO:00000407'
      ENVO_00000408:
        title: volcanic fissure
        description: A linear volcanic vent through which lava erupts, usually without
          any explosive activity. The vent is usually a few meters wide and may be
          many kilometers long. Fissure vents can cause large flood basalts and hannels.
          The volcano can usually be seen as a crack in the ground or on the ocean
          floor. Narrow fissures can be filled in with lava that hardens.
        is_a: ENVO_00000247
        meaning: 'ENVO:00000408'
      ENVO_01000439:
        title: andesitic volcano
        description: A volcano which has been formed as a result of the eruption of
          andesitic lava.
        is_a: ENVO_00000247
        meaning: 'ENVO:01000439'
      ENVO_01000440:
        title: dacitic volcano
        description: A volcano which has been formed as a result of the eruption of
          dacitic lava.
        is_a: ENVO_00000247
        meaning: 'ENVO:01000440'
      ENVO_00000320:
        title: crevasse
        description: A deep fissure in snow or ice.
        is_a: ENVO_01000667
        meaning: 'ENVO:00000320'
      ENVO_01000294:
        title: crevice
        description: A deep fissure in rock.
        is_a: ENVO_01000667
        meaning: 'ENVO:01000294'
      ENVO_00009726:
        title: strand crack
        description: Fissure at the junction between an inland ice sheet, ice piedmont
          or ice rise and an ice shelf, the latter being subject to the rise and fall
          of the tide.
        is_a: ENVO_01000667
        meaning: 'ENVO:00009726'
      ENVO_01000668:
        title: geological fault
        description: A geological fault is a planar fracture or discontinuity in a
          volume of rock, across which there has been significant displacement as
          a result of rock mass movement.
        is_a: ENVO_01000667
        meaning: 'ENVO:01000668'
      ENVO_01000669:
        title: active geological fault
        description: An active fault is a fault that is likely to become the source
          of another earthquake sometime in the future. Geologists commonly consider
          faults to be active if there has been movement observed or evidence of seismic
          activity during the last 10,000 years.
        is_a: ENVO_01000668
        meaning: 'ENVO:01000669'
      ENVO_01001773:
        title: thrust fault
        description: A fault across which older rocks are pushed above (away from
          the core of an astronomical body) younger rocks.
        is_a: ENVO_01000668
        meaning: 'ENVO:01001773'
      ENVO_01001775:
        title: blind thrust fault
        description: A thrust fault which does not breach the surface of an astronomical
          body.
        is_a: ENVO_01001773
        meaning: 'ENVO:01001775'
      ENVO_01000670:
        title: vein
        description: A vein is a geological fracture which is filled with minerals
          precipitated out of an aqueous solution.
        is_a: ENVO_01000667
        meaning: 'ENVO:01000670'
      ENVO_01000672:
        title: geological joint
        description: A joint is a geological fracture which has no measureable shear
          displacement
        is_a: ENVO_01000667
        meaning: 'ENVO:01000672'
      ENVO_01000673:
        title: shear fracture
        description: A geological fracture across which shear displacement has occurred
        is_a: ENVO_01000667
        meaning: 'ENVO:01000673'
      ENVO_01000674:
        title: microfracture
        description: A microfracture is a small fracture which is found in a portion
          of solid material along which further fracturing tends to occur. Microfractures
          are considered imperfections which to pre-exist any fractures formed by
          the application of stress to a material.
        is_a: ENVO_01000667
        meaning: 'ENVO:01000674'
      ENVO_03600068:
        title: ice wedge
        description: A geological fracture which is formed during winter months by
          a narrow or thin piece of ice.
        is_a: ENVO_01000667
        meaning: 'ENVO:03600068'
      ENVO_03600083:
        title: mofetta
        description: A geological fracture, found near volacnoes in the final phase
          of thier activity, chiefly discharging carbon dioxide and possibly other
          vapors.
        is_a: ENVO_01000667
        meaning: 'ENVO:03600083'
      ENVO_00000292:
        title: watershed
        description: The separation between neighbouring drainage basins (catchments).
          In hilly country, the divide lies along topographical peaks and ridges,
          but in flat country or on a high plateau (especially where the ground is
          marshy) the divide may be invisible - just a more or less notional line
          on the ground on either side of which falling raindrops will start a journey
          to different rivers, and even to different sides of a country or continent.
        is_a: ENVO_00000191
        meaning: 'ENVO:00000292'
      ENVO_00000293:
        title: continental divide
        description: A watershed such that water falling on one side of the line eventually
          travels to one ocean or body of water, and water on the other side travels
          to another, generally on the opposite side of the continent.
        is_a: ENVO_00000292
        meaning: 'ENVO:00000293'
      ENVO_03000110:
        title: cryoform
        description: A solid astronomical body part which is primarily composed of
          a continuous mass of snow and/or ice.
        is_a: ENVO_00000191
        meaning: 'ENVO:03000110'
      ENVO_01001276:
        title: water ice layer
        description: A solid layer which is primarily composed of some water-based
          ice.
        is_a: ENVO_03000110
        meaning: 'ENVO:01001276'
      ENVO_01000547:
        title: glaze ice layer
        description: A glaze ice layer is a smooth, transparent and homogeneous ice
          layer which coats some surface and which is formed when freezing rain or
          drizzle hits that surface.
        is_a: ENVO_01001276
        meaning: 'ENVO:01000547'
      ENVO_03000074:
        title: grease ice layer
        description: A layer which consists of a thin aggregate of frazil ice crystals,
          which float upon the surface of a water body.
        is_a: ENVO_01001276
        meaning: 'ENVO:03000074'
      ENVO_03000077:
        title: slush ice layer
        description: A layer which consists of slush ice.
        is_a: ENVO_01001276
        meaning: 'ENVO:03000077'
      ENVO_01001781:
        title: part of a landmass
        description: A solid astronomical body part which is part of the landmass
          of that body.
        is_a: ENVO_00000191
        meaning: 'ENVO:01001781'
      ENVO_01000443:
        title: salt mass
        description: An accumulation of a salt, typically sodium chloride.
        is_a: ENVO_00000191
        meaning: 'ENVO:01000443'
      ENVO_03600066:
        title: halite
        description: A salt mass which consists of isometric crystals of sodium chloride
          (NaCl).
        is_a: ENVO_01000443
        meaning: 'ENVO:03600066'
      ENVO_01001490:
        title: intrusion
        description: A mass of environmental material which has been formed as the
          result of its transport into an existing mass of another material.
        is_a: ENVO_00000191
        meaning: 'ENVO:01001490'
      ENVO_01000525:
        title: rock intrusion
        description: An intrusion which is primarily composed of rock which has been
          formed within a pre-existing fracture in a larger mass of rock.
        is_a: ENVO_01001490
        meaning: 'ENVO:01000525'
      ENVO_01000659:
        title: igneous intrusion
        description: An igneous intrusion is a mass of rock and minerals formed when
          magma cools, solidifies, and undergoes fractional crystallisation without
          reaching the surface.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000659'
      ENVO_00000498:
        title: volcanic dike
        description: An intrusive igneous body. Its thickness is usually much smaller
          than its other two dimensions. Thickness can vary from sub-centimeter scale
          to many meters in thickness and the lateral dimensions can extend over many
          kilometers. A dike is an intrusion into a cross-cutting fissure, meaning
          a dike cuts across other pre-existing layers or bodies of rock, this means
          that a dike is always younger than the rocks that contain it. Dikes are
          usually high angle to near vertical in orientation, but subsequent tectonic
          deformation may rotate the sequence of strata through which the dike lies
          so that the latter becomes horizontal.
        is_a: ENVO_01000659
        meaning: 'ENVO:00000498'
      ENVO_01000521:
        title: batholith
        description: A batholith is an area of mostly continuous plutonic (igneous
          intrusive) rock that covers an area larger than 100 square kilometers, formed
          in the planetary crust, and exposed by erosion. On Earth, Batholiths are
          almost always made mostly of felsic or intermediate rock-types, such as
          granite, quartz monzonite, or diorite.
        is_a: ENVO_01000659
        meaning: 'ENVO:01000521'
      ENVO_01000733:
        title: stock
        description: A stock is a discordant igneous intrusion having a surface exposure
          of less than 100 square kilometres. Stocks differ from batholiths only in
          being smaller.
        is_a: ENVO_01000659
        meaning: 'ENVO:01000733'
      ENVO_01000671:
        title: dike
        description: A sheet of rock that formed in a fracture in a pre-existing rock
          body.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000671'
      ENVO_01000732:
        title: clastic dike
        description: A dike formed when sediment fills a pre-existing fracture in
          a mass of rock.
        is_a: ENVO_01000671
        meaning: 'ENVO:01000732'
      ENVO_01000518:
        title: diapir
        description: A diapir is a type of geologic intrusion in which a more mobile
          and ductily deformable material is forced into brittle overlying rocks due
          to its higher buoyancy.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000518'
      ENVO_01000526:
        title: sedimentary intrusion
        description: A rock intrusion which is composed primarily of sedimentary rock.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000526'
      ENVO_01000632:
        title: chonolith
        description: A chonolith is an igneous rock intrusion of irregular shape with
          a demonstrable base, absent in other types of irregularly-shaped intrusions.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000632'
      ENVO_01000734:
        title: laccolith
        description: A sheet intrusion (or concordant pluton) that has been injected
          between two layers of sedimentary rock. The pressure of the magma is high
          enough that the overlying strata are forced upward, giving the laccolith
          a dome or mushroom-like form with a generally planar base.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000734'
      ENVO_01000735:
        title: lopolith
        description: A large igneous intrusion which is lenticular in shape with a
          depressed central region.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000735'
      ENVO_01000736:
        title: phacolith
        description: A phacolith is an intrusion parallel to the bedding plane or
          foliation of folded country rock. More specifically, it is a typically lens-shaped
          intrusion that occupies either the crest of an anticline or the trough of
          a syncline.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000736'
      ENVO_01000737:
        title: sill
        description: A tabular sheet intrusion that has intruded between older layers
          of sedimentary rock, beds of volcanic lava or tuff, or along the direction
          of foliation in metamorphic rock.
        is_a: ENVO_01000525
        meaning: 'ENVO:01000737'
      ENVO_01000645:
        title: solid planetary core
        description: A solid planetary core is a planetary core which is primarily
          composed of solid material.
        is_a: ENVO_00000191
        meaning: 'ENVO:01000645'
      ENVO_01000646:
        title: lithosphere
        description: A lithosphere is the outermost shell of a terrestrial-type planet
          or natural satellite that is defined by its rigid mechanical properties.
        is_a: ENVO_00000191
        meaning: 'ENVO:01000646'
      ENVO_01001097:
        title: tectonic plate
        description: A part of a lithosphere which is separated by other such parts
          by geographic faults or similar geomorphological discontinuities.
        is_a: ENVO_00000191
        meaning: 'ENVO:01001097'
      ENVO_01001665:
        title: soil cryoturbate
        description: A mass of soil moved or disturbed by frost action.
        is_a: ENVO_00000191
        meaning: 'ENVO:01001665'
      ENVO_06105106:
        title: plastisphere
        description: A part of an astronomical body which includes, as parts, all
          the entities which are composed primarily of plastic and which are within
          the gravitational sphere of influence of that body.
        is_a: ENVO_00000191
        meaning: 'ENVO:06105106'
      ENVO_06105110:
        title: manufactured plastisphere
        description: A plastisphere which is composed primarily of manufactured plastic.
        is_a: ENVO_06105106
        meaning: 'ENVO:06105110'
      ENVO_00000220:
        title: archipelago
        description: A group of geographically or geologically associated islands.
        is_a: ENVO_01001784
        meaning: 'ENVO:00000220'
      ENVO_00000351:
        title: volcanic arc
        description: A chain of volcanic islands or mountains formed by plate tectonics
          as an oceanic tectonic plate subducts under another tectonic plate and produces
          magma.
        is_a: ENVO_00000220
        meaning: 'ENVO:00000351'
      ENVO_00000352:
        title: continental arc
        description: A volcanic arc formed by the subduction of oceanic crust below
          continental crust.
        is_a: ENVO_00000351
        meaning: 'ENVO:00000352'
      ENVO_00000353:
        title: island arc
        description: A volcanic arc formed by the subduction of oceanic crust other
          oceanic crust on an adjacent tectonic plate.
        is_a: ENVO_00000351
        meaning: 'ENVO:00000353'
      ENVO_01000687:
        title: coast
        description: A coast is the area where land meets the sea, ocean, or lake.
        is_a: ENVO_01001784
        meaning: 'ENVO:01000687'
      ENVO_00000303:
        title: sea coast
        description: The general region of indefinite width that extends from the
          sea inland to the first major change in terrain features.
        is_a: ENVO_01000687
        meaning: 'ENVO:00000303'
      ENVO_01000688:
        title: lake coast
        description: The general region of indefinite width that extends from a lake
          inland to the first major change in terrain features.
        is_a: ENVO_01000687
        meaning: 'ENVO:01000688'
      ENVO_00000329:
        title: phreatic zone
        description: A compound astronomical body part which is located beneath the
          land surface and in which all interstices are filled with water that has
          a hydraulic head greater than atmospheric pressure due to the weight of
          overlying groundwater.
        is_a: ENVO_01001784
        meaning: 'ENVO:00000329'
      ENVO_01001478:
        title: gaseous astronomical body part
        description: A part of an astronomical body which is primarily composed of
          gaseous material.
        is_a: ENVO_01001784
        meaning: 'ENVO:01001478'
      ENVO_01000755:
        title: aeroform
        description: A part of an astronomical body which is primarily composed of
          a continuous volume of gaseous or aerosolised material held in shape by
          one or more environmental processes.
        is_a: ENVO_01001478
        meaning: 'ENVO:01000755'
      ENVO_01001482:
        title: tornado
        description: A tornado is an aeroform consisting of at least one rapidly rotating
          column of air that is in contact with both the surface of an astronomical
          body and pendant from within or beneath a cumulonimbus or cumulus cloud.
        is_a: ENVO_01000755
        meaning: 'ENVO:01001482'
      ENVO_01001485:
        title: multiple vortex tornado
        description: A tornado which comprises two or more columns of spinning air
          rotating about their own axis and at the same time around a common center.
        is_a: ENVO_01001482
        meaning: 'ENVO:01001485'
      ENVO_01001486:
        title: landspout
        description: A tornado which a) is not associated with a mesocyclone and is
          thus relatively weak and short-lived, b) is centred on a small, smooth condensation
          funnel which often does not reach the planetary surface, and c) forms a
          distinctively laminar cloud of dust when it makes contact with the land.
        is_a: ENVO_01001482
        meaning: 'ENVO:01001486'
      ENVO_01001487:
        title: waterspout
        description: A tornado which connects a cumulus or cumulonimbus cloud to a
          body of water, often transporting water from that water body along the spiraling
          winds constituting  its vortex.
        is_a: ENVO_01001482
        meaning: 'ENVO:01001487'
      ENVO_01001484:
        title: fire whirl
        description: A fire whirl is a whirlwind induced by the contraction and rotation
          of intense, rising heat and turbulent, eddying air masses resulting from
          a large fire and made up of a core of burning matter surrounded by a rotating
          pocket of air.
        is_a: ENVO_01000755
        meaning: 'ENVO:01001484'
      ENVO_01001645:
        title: gaseous part of an atmosphere
        description: That part of an atmosphere which is composed of gaseous material.
        is_a: ENVO_01001478
        meaning: 'ENVO:01001645'
      ENVO_01001300:
        title: area of low atmospheric pressure
        description: A gaseous part of an atmosphere in which gases have reduced atmospheric
          pressure.
        is_a: ENVO_01001645
        meaning: 'ENVO:01001300'
      ENVO_01001668:
        title: atmospheric frontal zone
        description: Part of an atmosphere which contains a weather front, bounded
          by frontal surfaces.
        is_a: ENVO_01001645
        meaning: 'ENVO:01001668'
      ENVO_01003021:
        title: area of high atmospheric pressure
        description: A gaseous part of an atmosphere in which gases have increased
          atmospheric pressure.
        is_a: ENVO_01001645
        meaning: 'ENVO:01003021'
      ENVO_01001104:
        title: rift zone
        description: A compound astronomical body part in which extensional tectonic
          processes occur and where the lithosphere is being pulled apart.
        is_a: ENVO_01001784
        meaning: 'ENVO:01001104'
      ENVO_03520003:
        title: cloud part
        description: A part of a cloud.
        is_a: ENVO_01001784
        meaning: 'ENVO:03520003'
      ENVO_03520004:
        title: cloud base
        description: A cloud part which is closest to the surface of the astronomical
          body local to the cloud.
        is_a: ENVO_03520003
        meaning: 'ENVO:03520004'
      ENVO_03520005:
        title: cloud top
        description: A cloud part which is furthest from the surface of the astronomical
          body local to the cloud.
        is_a: ENVO_03520003
        meaning: 'ENVO:03520005'
      ENVO_01000822:
        title: planetary photic zone
        description: A planetary part which is exposed, at least periodically, to
          light.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000822'
      ENVO_01001201:
        title: marine environmental zone
        description: An astronomical body part which is part of a marine environment.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001201'
      ENVO_00000316:
        title: intertidal zone
        description: The area of the foreshore and seabed that is exposed to the air
          at low tide and submerged at high tide, i.e., the area between tide marks.
        is_a: ENVO_01001201
        meaning: 'ENVO:00000316'
      ENVO_01000428:
        title: area of rocky shore
        description: A rocky shore is an intertidal area of a seacoast where solid
          rock is the predominant substrate.
        is_a: ENVO_00000316
        meaning: 'ENVO:01000428'
      ENVO_00000318:
        title: high tide zone
        description: The tide zone that is flooded during high tide only, and is a
          highly saline environment.
        is_a: ENVO_01001201
        meaning: 'ENVO:00000318'
      ENVO_00000319:
        title: low tide zone
        description: The tidal zone that is mostly submerged, only being exposed at
          the point of low tide and for a longer period of time during extremely low
          tides.
        is_a: ENVO_01001201
        meaning: 'ENVO:00000319'
      ENVO_01000066:
        title: marine anoxic zone
        description: Marine anoxic zones are areas of marine water that are depleted
          of dissolved oxygen. This condition is generally found in areas that have
          restricted water exchange. In most cases, oxygen is prevented from reaching
          the deeper levels by a physical barrier (sill) as well as by a pronounced
          density stratification. Anoxic conditions will occur if the rate of oxidation
          of organic matter by bacteria is greater than the supply of dissolved oxygen.
        is_a: ENVO_01001201
        meaning: 'ENVO:01000066'
      ENVO_01000124:
        title: marine supra-littoral zone
        description: The supralittoral zone is the area above the spring high tide
          line that is regularly splashed, but not submerged by ocean water. Seawater
          penetrates these elevated areas only during storms with high tides.
        is_a: ENVO_01001201
        meaning: 'ENVO:01000124'
      ENVO_01000410:
        title: marine eulittoral zone
        description: The eulittoral zone extends from the spring high tide line, which
          is rarely inundated, to the spring low tide line, which is rarely not inundated.
          The wave action and turbulence of recurring tides shapes and reforms cliffs,
          gaps, and caves, offering a huge range of habitats for sedentary organisms.
        is_a: ENVO_01001201
        meaning: 'ENVO:01000410'
      ENVO_01000126:
        title: marine sub-littoral zone
        description: The marine sublittoral zone is part of the marine littoral zone
          which is permanently covered by seawater. In physical oceanography, the
          sublittoral zone refers to coastal regions with significant tidal flows
          and energy dissipation, including non-linear flows, internal waves, river
          outflows and oceanic fronts. In practice, this typically extends to the
          edge of the continental shelf, with depths around 200 meters. In marine
          biology, the sublittoral refers to the areas where sunlight reaches the
          ocean floor, that is, where the water is never so deep as to take it out
          of the photic zone.
        is_a: ENVO_01001201
        meaning: 'ENVO:01000126'
      ENVO_01000411:
        title: infralittoral zone
        description: A zone which is part of the sublittoral zone and is dominated
          by algae. This zone usually extends up to five metres below the low water
          mark.
        is_a: ENVO_01001201
        meaning: 'ENVO:01000411'
      ENVO_01000412:
        title: circalittoral zone
        description: A zone which is part of the sublittoral zone and is dominated
          by sessile animals such as oysters. This zone usually begins at a depth
          greater than the infralittoral zone.
        is_a: ENVO_01001201
        meaning: 'ENVO:01000412'
      ENVO_01001341:
        title: marine tidal flow zone
        description: An environmental zone in which varying gravitational forces from
          astronomical bodies, combined with the rotation of the astronomical body
          containing the zone, cause marine waters to undergo periodic depth oscillations
          (tides).
        is_a: ENVO_01001201
        meaning: 'ENVO:01001341'
      ENVO_01001338:
        title: diurnal marine tidal flow zone
        description: A marine zone in which ocean waters undergo a diurnal (once per
          day) tidal oscillation - with one high and one low tide per day - due to
          the supression of a second daily oscillation by the geometry of the ocean
          basin and obstructions presented by land masses.
        is_a: ENVO_01001341
        meaning: 'ENVO:01001338'
      ENVO_01001340:
        title: semi-diurnal marine tidal flow zone
        description: A marine tidal flow zone in which ocean waters undergo a semi-diurnal
          (twice per day) tidal oscillation - with two high and two low tides per
          day of roughly equal amplitude.
        is_a: ENVO_01001341
        meaning: 'ENVO:01001340'
      ENVO_00005800:
        title: desert sand
        description: Sand which is part of a desert.
        is_a: ENVO_01000813
        meaning: 'ENVO:00005800'
      ENVO_00002138:
        title: beach sand
        is_a: ENVO_01000813
        meaning: 'ENVO:00002138'
      ENVO_00002148:
        title: coarse beach sand
        is_a: ENVO_00002138
        meaning: 'ENVO:00002148'
      ENVO_00005798:
        title: acid dune sand
        is_a: ENVO_01000813
        meaning: 'ENVO:00005798'
      ENVO_01000817:
        title: biosphere
        description: An astronomical body part which includes all the living entities
          within the gravitational sphere of influence of that body, as well as the
          non-living and dead entities with which they interact.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000817'
      ENVO_01000820:
        title: pedosphere
        description: An astronomical body part which is composed of soil, subject
          to soil formation processes, and found on the surface of a lithosphere.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000820'
      ENVO_00002132:
        title: metalimnion
        description: A cline which is part of a lake and across which temperature
          changes rapidly with depth.
        is_a: ENVO_01000813
        meaning: 'ENVO:00002132'
      ENVO_00002158:
        title: ditch water
        is_a: ENVO_01000813
        meaning: 'ENVO:00002158'
      ENVO_00002160:
        title: estuarine mud
        description: Mud which is part of an estuary.
        is_a: ENVO_01000813
        meaning: 'ENVO:00002160'
      ENVO_00002206:
        title: coal mine waste material
        is_a: ENVO_01000813
        meaning: 'ENVO:00002206'
      ENVO_00002207:
        title: self-heating coal mine waste material
        is_a: ENVO_00002206
        meaning: 'ENVO:00002207'
      ENVO_00002228:
        title: pond water
        is_a: ENVO_01000813
        meaning: 'ENVO:00002228'
      ENVO_00005795:
        title: marine mud
        description: Mud which is part of a marine ecosystem.
        is_a: ENVO_01000813
        meaning: 'ENVO:00005795'
      ENVO_00005797:
        title: lake bottom mud
        description: Mud which constitutes the bed of a lake.
        is_a: ENVO_01000813
        meaning: 'ENVO:00005797'
      ENVO_04000008:
        title: soil organic matter
        description: Organic material in soil, which consists of plant and animal
          residues at various stages of decomposition, cells and tissues of soil organisms,
          and substances synthesized by soil organisms.
        is_a: ENVO_01000813
        meaning: 'ENVO:04000008'
      ENVO_01000000:
        title: humus
        description: Organic matter in soil which has reached a point of stability,
          where it will break down no further and might, if conditions do not change,
          remain essentially as it is for centuries, or millennia.
        is_a: ENVO_04000008
        meaning: 'ENVO:01000000'
      ENVO_01001479:
        title: fluid astronomical body part
        description: A part of an astronomical body which is primarily composed of
          fluid.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001479'
      ENVO_01000299:
        title: Taylor column
        description: A Taylor column is a column of deflected fluid flow which is
          formed in a perturbed, rotating fluid, is parallel to the axis of rotation,
          and extends above the obstacle perturbing the fluid in a rigid manner.
        is_a: ENVO_01001479
        meaning: 'ENVO:01000299'
      ENVO_01000072:
        title: marine Taylor column
        description: A marine Taylor column is a Taylor column that is formed in a
          marine body of water. Currents flowing over shoaling topography such as
          seamounts are accelerated and destabilised, resulting in Taylor columns.
          Eddies and internal waves are generated downstream of the topological feature
          and may extend 1000 m or so above them. This may result in a localised increase
          in primary production where the Taylor column reaches surface waters.
        is_a: ENVO_01000299
        meaning: 'ENVO:01000072'
      ENVO_01000300:
        title: atmospheric Taylor column
        description: An atmospheric Taylor column is a Taylor column that is formed
          in the atmosphere. Atmospheric Taylor columns often form above islands resulting
          in vortex streets in the atmosphere.
        is_a: ENVO_01000299
        meaning: 'ENVO:01000300'
      ENVO_01001109:
        title: Karman vortex street
        description: A succession of swirling vortices caused by the unsteady separation
          of flow of a fluid around one or more blunt bodies.
        is_a: ENVO_01001479
        meaning: 'ENVO:01001109'
      ENVO_01001743:
        title: plume
        description: A fluid astronomical body part which is plume shaped.
        is_a: ENVO_01001479
        meaning: 'ENVO:01001743'
      ENVO_01001823:
        title: bubble plume
        description: A plume which is composed primarily of bubbles.
        is_a: ENVO_01001743
        meaning: 'ENVO:01001823'
      ENVO_01001676:
        title: marine cline
        description: A cline which is part of a marine water body.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001676'
      ENVO_01000075:
        title: marine thermocline
        description: A thermocline which is part of a marine water body.
        is_a: ENVO_01001676
        meaning: 'ENVO:01000075'
      ENVO_01000106:
        title: permanent marine thermocline
        description: A marine thermocline which separates the marine cold-water sphere
          from the marine warm-water sphere and which does not dissipate seasonally.
        is_a: ENVO_01000075
        meaning: 'ENVO:01000106'
      ENVO_01000107:
        title: seasonal marine thermocline
        description: A marine thermocline which is present below the marine wind mixed
          layer.
        is_a: ENVO_01000075
        meaning: 'ENVO:01000107'
      ENVO_01000076:
        title: marine chemocline
        description: A marine chemocline is a marine cline caused by a strong, vertical
          chemistry gradient within a body of marine water. Chemoclines most commonly
          occur where local conditions favor the formations of anoxic bottom water.
        is_a: ENVO_01001676
        meaning: 'ENVO:01000076'
      ENVO_01000078:
        title: marine nutricline
        description: A nutricline which is part of a marine water body.
        is_a: ENVO_01001676
        meaning: 'ENVO:01000078'
      ENVO_01000260:
        title: nutricline within a water body
        description: A nutricline which is part of a water body.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000260'
      ENVO_03000143:
        title: cryosphere
        description: An astronomical body part which is composed primarily of environmental
          materials in their frozen form.
        is_a: ENVO_01000813
        meaning: 'ENVO:03000143'
      ENVO_03000144:
        title: planetary cryosphere
        description: A cryosphere which is part of a planet.
        is_a: ENVO_03000143
        meaning: 'ENVO:03000144'
      ENVO_01000301:
        title: estuarine water
        description: Brackish water which is part of an estuary.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000301'
      ENVO_03605006:
        title: stream water
        description: Water which is part of a stream.
        is_a: ENVO_01000813
        meaning: 'ENVO:03605006'
      ENVO_01000599:
        title: river water
        is_a: ENVO_03605006
        meaning: 'ENVO:01000599'
      ENVO_01000639:
        title: planetary structural layer
        description: A planetary structural layer is laminar part of a terrestrial
          planet or other rocky body large enough to have differentiation by density.
          Planetary layers have differing physicochemical properties and composition.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000639'
      ENVO_01000748:
        title: continental crust
        description: A layer of igneous, sedimentary, and metamorphic rocks that forms
          continents and the areas of shallow seabed close to their shores, known
          as continental shelves.
        is_a: ENVO_01000639
        meaning: 'ENVO:01000748'
      ENVO_01000638:
        title: planetary crust
        description: A planetary crust is the outermost solid shell of a rocky planet
          or natural satellite, which is chemically distinct from the underlying mantle.
        is_a: ENVO_01000639
        meaning: 'ENVO:01000638'
      ENVO_01000749:
        title: oceanic crust
        description: Oceanic crust is the uppermost layer of the oceanic portion of
          a tectonic plate.
        is_a: ENVO_01000639
        meaning: 'ENVO:01000749'
      ENVO_01000640:
        title: planetary mantle
        description: A planetary mantle is a planetary layer which is an interior
          part of a terrestrial planet or other rocky body large enough to have differentiation
          by density.
        is_a: ENVO_01000639
        meaning: 'ENVO:01000640'
      ENVO_01000641:
        title: planetary core
        description: A planetary core is the innermost structural layer or layers
          of a planet. The core may be entirely liquid, entirely solid, or have both
          liquid and solid parts.
        is_a: ENVO_01000639
        meaning: 'ENVO:01000641'
      ENVO_01000642:
        title: outer planetary core
        is_a: ENVO_01000641
        meaning: 'ENVO:01000642'
      ENVO_01000643:
        title: inner planetary core
        is_a: ENVO_01000641
        meaning: 'ENVO:01000643'
      ENVO_01000647:
        title: asthenosphere
        description: An asthenosphere is a layer of a terrestrial-type planet or natural
          satellite which is highly viscous, mechanically weak, and ductilely deforming.
        is_a: ENVO_01000639
        meaning: 'ENVO:01000647'
      ENVO_01000750:
        title: Mohorovicic discontinuity
        description: "The Mohorovicic discontinuity, usually referred to as the Moho,\
          \ is the boundary between the Earth's crust and the mantle, indicating a\
          \ change in composition."
        is_a: ENVO_01000639
        meaning: 'ENVO:01000750'
      ENVO_03600072:
        title: ophiolites
        description: A planetary structural layer which consists of oceanic crust
          and the underlying upper mantle and has been uplifted and exposed above
          sea level.
        is_a: ENVO_01000639
        meaning: 'ENVO:03600072'
      ENVO_01000782:
        title: utility line
        description: A cable used to trasmit electricity from its point of production
          to its point of consumption.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000782'
      ENVO_01000783:
        title: public utility line
        description: A utility line which services the public power grid.
        is_a: ENVO_01000782
        meaning: 'ENVO:01000783'
      ENVO_01000821:
        title: photosphere
        description: "An astronomical body part which is composed of those parts of\
          \ a star, distal from the star's core, from which light is radiated into\
          \ space."
        is_a: ENVO_01000813
        meaning: 'ENVO:01000821'
      ENVO_01000823:
        title: illuminated biosphere part
        description: An astronomical body part which includes those parts of a biosphere
          that are, at least periodically, illuminated and in which photosynthesis
          may occur.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000823'
      ENVO_01000868:
        title: domestic solar panel array
        description: A solar panel array that is integrated into the power system
          of a human dwelling.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000868'
      ENVO_01001239:
        title: forest canopy
        is_a: ENVO_01000813
        meaning: 'ENVO:01001239'
      ENVO_01001240:
        title: woodland canopy
        description: A canopy which is part of a woodland ecosystem.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001240'
      ENVO_01001241:
        title: crop canopy
        description: A canopy which is composed of the aboveground portion, or crowns,
          of a community of crop plants.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001241'
      ENVO_01001257:
        title: saline shrimp pond water
        description: Saline water which is derived from sea water and used during
          the cultivation of crustaceans.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001257'
      ENVO_01001396:
        title: abyssal clay
        description: Clay which is part of an abyssal plain.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001396'
      ENVO_01001609:
        title: cryospheric layer
        description: A layer which is part of a cryosphere.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001609'
      ENVO_01001559:
        title: cryopeg
        description: A layer which is composed of ground that 1) remains unfrozen
          due to increased solute concentration and 2) is present within a mass of
          permafrost.
        is_a: ENVO_01001609
        meaning: 'ENVO:01001559'
      ENVO_01001610:
        title: active layer in a cryosphere
        description: A layer of environmental material which is subject to freeze-thaw
          cycles.
        is_a: ENVO_01001609
        meaning: 'ENVO:01001610'
      ENVO_04000009:
        title: active permafrost layer
        description: A layer which is composed of ground that is 1) subject to annual
          thawing and freezing and 2) present in areas underlain by permafrost.
        is_a: ENVO_01001610
        meaning: 'ENVO:04000009'
      ENVO_03000141:
        title: snow layer
        description: A cryospheric layer which is primarily composed of snow.
        is_a: ENVO_01001609
        meaning: 'ENVO:03000141'
      ENVO_01001647:
        title: colloid suspended in a hydrosphere
        description: A colloidal suspension which is dispersed through a part of a
          hydrosphere.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001647'
      ENVO_01001648:
        title: suspended colloidal sediment
        description: Colloidal sediment which is suspended in a part of the hydrosphere.
        is_a: ENVO_01001647
        meaning: 'ENVO:01001648'
      ENVO_03501109:
        title: subway train
        description: A passenger train which runs along an undergroud rail system.
        is_a: ENVO_01000813
        meaning: 'ENVO:03501109'
      ENVO_03501115:
        title: public subway train
        description: A subway train which is owned by a government or other form of
          public representation.
        is_a: ENVO_03501109
        meaning: 'ENVO:03501115'
      ENVO_04000007:
        title: lake water
        description: Water which is part of a lake.
        is_a: ENVO_01000813
        meaning: 'ENVO:04000007'
      ENVO_06105107:
        title: marine anthropogenic litter
        description: Anthropogenic litter which is present in the marine environment.
        is_a: ENVO_01000813
        meaning: 'ENVO:06105107'
      ENVO_01001813:
        title: construction
        description: A material entity which has been assembled through the intentional,
          instinctual, or deliberately programmed efforts of an organism or machine.
        is_a: BFO_0000040
        meaning: 'ENVO:01001813'
      ENVO_00005803:
        title: animal habitation
        description: The dwelling of an animal or group of similar animals.
        is_a: ENVO_01001813
        meaning: 'ENVO:00005803'
      ENVO_00000500:
        title: beaver dam
        description: An obstruction in a stream constructed by a beaver.
        is_a: ENVO_00005803
        meaning: 'ENVO:00000500'
      ENVO_00005804:
        title: nest of ant
        description: A pile of earth, sand, pine needles, or clay or a composite of
          these and other materials that build up at the entrances of the subterranean
          dwellings of ant colonies as they are excavated. A colony is built and maintained
          by legions of worker ants, who carry tiny bits of dirt and pebbles in their
          mandibles and deposit them near the exit of the colony. They normally deposit
          the dirt or vegetation at the top of the hill to prevent it from sliding
          back into the colony, but in some species they actively sculpt the materials
          into specific shapes, and may create nest chambers within the mound.
        is_a: ENVO_00005803
        meaning: 'ENVO:00005804'
      ENVO_00005805:
        title: nest of bird
        description: A bird nest is the spot in which a bird lays and incubates its
          eggs and raises its young.
        is_a: ENVO_00005803
        meaning: 'ENVO:00005805'
      ENVO_03600069:
        title: nest of alligator
        description: An animal habitation which is built by alligators from plants
          and decomposing vegetation in order to protect their eggs from predators.
        is_a: ENVO_00005803
        meaning: 'ENVO:03600069'
      ENVO_2000006:
        title: nest of termite
        description: An animal habitation constructed by termites. Termite workers
          build and maintain nests which house the colony. These are elaborate structures
          made using a combination of soil, mud, chewed wood/cellulose, saliva, and
          faeces. A nest has many functions such as providing a protected living space
          and water conservation (through controlled condensation).
        is_a: ENVO_00005803
        meaning: 'ENVO:2000006'
      ENVO_00010483:
        title: environmental material
        description: A material entity which other material entities in an environmental
          system are primarily or partially composed of.
        is_a: BFO_0000040
        meaning: 'ENVO:00010483'
      ENVO_0010001:
        title: anthropogenic environmental material
        description: Anthropogenic material in or on which organisms may live.
        is_a: ENVO_00010483
        meaning: 'ENVO:0010001'
      ENVO_00000003:
        title: mine tailing
        description: Mine tailings are the materials left over after the process of
          separating the valuable fraction from the uneconomic fraction (gangue) of
          an ore.
        is_a: ENVO_0010001
        meaning: 'ENVO:00000003'
      ENVO_00002044:
        title: sludge
        description: The residual semi-solid material left from domestic or industrial
          processes, or wastewater treatment processes.
        is_a: ENVO_0010001
        meaning: 'ENVO:00002044'
      ENVO_00002046:
        title: activated sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00002046'
      ENVO_00002057:
        title: raw primary sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00002057'
      ENVO_00002058:
        title: secondary sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00002058'
      ENVO_00002059:
        title: biosolids
        description: A treated form of sludge, sometimes used as a fertilizer in agriculture.
        is_a: ENVO_00002044
        meaning: 'ENVO:00002059'
      ENVO_00002176:
        title: contaminated sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00002176'
      ENVO_00002060:
        title: oil sludge
        description: A solid or gel in motor oil caused by the oil gelling or solidifying,
          usually at temperatures lower than 100deg C.
        is_a: ENVO_00002176
        meaning: 'ENVO:00002060'
      ENVO_00002177:
        title: 1,4-dioxane contaminated sludge
        is_a: ENVO_00002176
        meaning: 'ENVO:00002177'
      ENVO_00002129:
        title: anaerobic sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00002129'
      ENVO_00003965:
        title: anaerobic digester sludge
        is_a: ENVO_00002129
        meaning: 'ENVO:00003965'
      ENVO_00002212:
        title: thermophilic granular sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00002212'
      ENVO_00005796:
        title: marine sludge
        is_a: ENVO_00002044
        meaning: 'ENVO:00005796'
      ENVO_0010003:
        title: agricultural environmental material
        is_a: ENVO_0010001
        meaning: 'ENVO:0010003'
      ENVO_00002869:
        title: hay
        description: Hay is grass, legumes or other herbaceous plants that have been
          cut, dried, and stored for use as animal fodder, particularly for grazing
          livestock such as cattle, horses, goats, and sheep.
        is_a: ENVO_0010003
        meaning: 'ENVO:00002869'
      ENVO_00003030:
        title: silage
        description: A fermented, high-moisture forage that can be fed to ruminants.
        is_a: ENVO_0010003
        meaning: 'ENVO:00003030'
      ENVO_00003071:
        title: grass silage
        is_a: ENVO_00003030
        meaning: 'ENVO:00003071'
      ENVO_00003900:
        title: rye grass silage
        is_a: ENVO_00003071
        meaning: 'ENVO:00003900'
      ENVO_00003978:
        title: potato silage
        is_a: ENVO_00003030
        meaning: 'ENVO:00003978'
      ENVO_00003869:
        title: straw
        description: An agricultural byproduct, the dry stalk of a cereal plant, after
          the nutrient grain or seed has been removed.
        is_a: ENVO_0010003
        meaning: 'ENVO:00003869'
      ENVO_00003870:
        title: rice straw
        is_a: ENVO_00003869
        meaning: 'ENVO:00003870'
      ENVO_01000473:
        title: thatch
        description: Thatch is material composed of dry vegetation such as straw,
          water reed, sedge (Cladium mariscus), rushes, or heather.
        is_a: ENVO_0010003
        meaning: 'ENVO:01000473'
      ENVO_01001113:
        title: forage material
        description: 'Material which is primarily conposed of the vegetation present
          in tended pastures: mainly grasses, with an interspersion of legumes and
          other forbs.'
        is_a: ENVO_0010003
        meaning: 'ENVO:01001113'
      ENVO_02000053:
        title: hide
        description: A skin obtained from animals for human use typically from deer
          or cattle sources used to produce leather, shoes, fashion accessories, musical
          instruments.
        is_a: ENVO_0010003
        meaning: 'ENVO:02000053'
      ENVO_03000133:
        title: agricultural potting mixture
        description: An agricultural environmental material which 1) is composed of
          a mixture of materials such as peat, composted bark, sand, perlite, or compost,
          and 2) serves as a medium in which to grow plants.
        is_a: ENVO_0010003
        meaning: 'ENVO:03000133'
      ENVO_00002870:
        title: adobe
        description: A natural building material mode from sand, clay, water, and
          some kind of fibrous or organic material (sticks, straw, and/or manure).
        is_a: ENVO_0010001
        meaning: 'ENVO:00002870'
      ENVO_01000458:
        title: concrete
        description: Concrete is a composite material composed of an aggregate bonded
          together with a fluid cement which hardens over time.
        is_a: ENVO_0010001
        meaning: 'ENVO:01000458'
      ENVO_01000459:
        title: asphalt concrete
        description: Asphaltic concrete is a concrete which uses refined asphalt as
          a cement.
        is_a: ENVO_01000458
        meaning: 'ENVO:01000459'
      ENVO_01000462:
        title: masonry cement
        description: Masonry cement is a substance used in construction that has the
          disposition to set and harden and thus may be used to bind materials together.
        is_a: ENVO_0010001
        meaning: 'ENVO:01000462'
      ENVO_01000463:
        title: hydraulic cement
        description: Hydraulic cement is a masonry cement which contains activated
          aluminium silicates or pozzolans, such as fly ash, allowing it to set in
          wet conditions or underwater.
        is_a: ENVO_01000462
        meaning: 'ENVO:01000463'
      ENVO_01000464:
        title: non-hydraulic cement
        description: Non-hydraulic cement is a cement which sets by reacting with
          carbon dioxide in the air and will not set in wet conditions or underwater.
          It is susceptible to attack by aggresive chemicals after setting.
        is_a: ENVO_01000462
        meaning: 'ENVO:01000464'
      ENVO_01000461:
        title: refined asphalt
        description: Refined asphalt is a sticky, black, and highly viscous liquid
          or semi-solid with a boiling point above 500 degrees Celsius, obtained from
          the fractional distillation of crude oil.
        is_a: ENVO_0010001
        meaning: 'ENVO:01000461'
      ENVO_01000474:
        title: brick material
        description: A portion of brick material is a material derived from a brick
          which is composed of  kneaded clay-bearing soil, expanded clay aggregate,
          sand and lime, or concrete that has been fire-hardened or air-dried.
        is_a: ENVO_0010001
        meaning: 'ENVO:01000474'
      ENVO_01000476:
        title: plaster
        description: Plaster is a building material which has the disposition to harden
          when it reacts with water, liberating heat through crystallization. Plaster
          is manufactured as a dry powder and is mixed with water to form a paste
          when used.
        is_a: ENVO_0010001
        meaning: 'ENVO:01000476'
      ENVO_01000477:
        title: gypsum plaster
        description: Gypsum plaster is a plaster which is formed by partially dehydrating
          gypsum by heating it to approximately 150 degrees Celsius and grinding the
          product into a powder. Gypsum anhydride - formed by heating gypsum above
          200 degrees Celsius - may also be used as plaster.
        is_a: ENVO_01000476
        meaning: 'ENVO:01000477'
      ENVO_01000478:
        title: cement plaster
        is_a: ENVO_01000476
        meaning: 'ENVO:01000478'
      ENVO_01000479:
        title: lime plaster
        description: Lime plaster is a plaster which is primarily composed of calcium
          hydroxide and an inert filler (such as sand). Coversion of the calcium hydroxide
          to calcium carbonate through a reaction with carbon dioxide in the air causes
          the plaster to set.
        is_a: ENVO_01000476
        meaning: 'ENVO:01000479'
      ENVO_01001869:
        title: fracking liquid
        description: A liquid environmental material which is composed primarily of
          water ammended with thickening agents and proppants.
        is_a: ENVO_0010001
        meaning: 'ENVO:01001869'
      ENVO_02000123:
        title: paint
        description: Any liquid, liquefiable, or mastic composition that, after application
          to a substrate in a thin layer, converts to a solid film. It is most commonly
          used to protect, color, or provide texture to objects.
        is_a: ENVO_0010001
        meaning: 'ENVO:02000123'
      ENVO_02000124:
        title: lead paint
        description: Paint that contains lead.
        is_a: ENVO_02000123
        meaning: 'ENVO:02000124'
      ENVO_03510029:
        title: primer (paint)
        description: A paint product which adheres to surfaces and forms a binding
          layer, preparing it to receive paint.
        is_a: ENVO_02000123
        meaning: 'ENVO:03510029'
      ENVO_03510031:
        title: oil-based paint
        description: A slow-drying paint that consists of particles of pigment suspended
          in a drying oil, commonly linseed oil.
        is_a: ENVO_02000123
        meaning: 'ENVO:03510031'
      ENVO_03510032:
        title: acrylic paint
        description: A water soluble, fast-drying paint made of pigment suspended
          in acrylic polymer emulsion.
        is_a: ENVO_02000123
        meaning: 'ENVO:03510032'
      ENVO_03510033:
        title: luminescent paint
        description: A paint that exhibits luminescence, giving off visible light
          through fluorescence, phosphorescence, or radioluminescence.
        is_a: ENVO_02000123
        meaning: 'ENVO:03510033'
      ENVO_03501253:
        title: gypsum
        description: A soft sulfate mineral composed of calcium sulfate dihydrate.
        is_a: ENVO_0010001
        meaning: 'ENVO:03501253'
      ENVO_03501324:
        title: latex
        description: A stable dispersion (emulsion) of polymer microparticles in an
          aqueous medium.
        is_a: ENVO_0010001
        meaning: 'ENVO:03501324'
      ENVO_03510055:
        title: rubber cement
        description: An environmental material which is composed of elastic polymers
          mixed in a solvent.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510055'
      ENVO_03510056:
        title: methyl cellulose paste
        description: An environmental material which is 1) composed primarily of methyl
          cellulose and water, and 2) formulated to fix wallpaper to walls.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510056'
      ENVO_03510057:
        title: permanent hair dye
        description: An environmental material which is 1) manufactured and 2) primarily
          composed of hydrogen peroxide and ammonia, and 3) when applied to hair,
          can alter the natural hair pigments for 6-8 weeks.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510057'
      ENVO_03510058:
        title: pharmaceutical ink
        description: A colorant fluid which is 1) manufactured and 2) composed of
          alcohol, titanium dioxide, and propylene glycol.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510058'
      ENVO_03510060:
        title: gel ink
        description: A colorant fluid which is 1) manufactured and 2) composed of
          copper phthalocyanine, iron oxides, water, and biopolymers.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510060'
      ENVO_03510061:
        title: soy ink
        description: A colorant fluid which is 1) manufactured and 2) primarily composed
          of soybean oil, as well as pigment, resin, and wax.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510061'
      ENVO_03510062:
        title: aqueous inkjet printer ink
        description: A colorant fluid which is 1) manufactured, 2) primarily composed
          of water, as well as glycol, and dye, and 3) intended for use in inkjet
          printers.
        is_a: ENVO_0010001
        meaning: 'ENVO:03510062'
      ENVO_01000406:
        title: snow
        description: Snow is an environmental material which is primarily composed
          of flakes of crystalline water ice.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000406'
      ENVO_01001876:
        title: graupel
        description: Snow which is composed of heavily rimed particles typically 2
          to 5 millimeters in diameter (0.1 to 0.2 inch).
        is_a: ENVO_01000406
        meaning: 'ENVO:01001876'
      ENVO_03000000:
        title: neve
        description: Partially compacted granular snow, which has undergone several
          cycles of melting and refreezing while being compacted, usually found on
          the atmosphere-exposed surface of a glacier.
        is_a: ENVO_01000406
        meaning: 'ENVO:03000000'
      ENVO_03000002:
        title: firn
        description: Granular snow which contains a proportion of fused granules formed
          through melting and re-thawing while being compacted by the weight of overlying
          material and which contains interconnected gaseous pores.
        is_a: ENVO_01000406
        meaning: 'ENVO:03000002'
      ENVO_03000027:
        title: powdery snow
        description: Uncompacted snow containing trapped atmospheric gases.
        is_a: ENVO_01000406
        meaning: 'ENVO:03000027'
      ENVO_03000108:
        title: slab snow
        description: Snow which is cohesive, hard and overlies weaker snow.
        is_a: ENVO_01000406
        meaning: 'ENVO:03000108'
      ENVO_00000134:
        title: permafrost
        description: An environmental material which is 1) composed primarily of soil
          or rock and included ice or organic material and 2) at or below the freezing
          point of water for two or more years.
        is_a: ENVO_00010483
        meaning: 'ENVO:00000134'
      ENVO_01001614:
        title: ice-bearing permafrost
        description: Permafrost which contains inclusions of water-based ice.
        is_a: ENVO_00000134
        meaning: 'ENVO:01001614'
      ENVO_03000088:
        title: methane-laden permafrost
        description: Permafrost which contains pockets of trapped methane gas.
        is_a: ENVO_00000134
        meaning: 'ENVO:03000088'
      ENVO_01000814:
        title: solid environmental material
        description: An environmental material which is in a solid state.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000814'
      ENVO_01000018:
        title: gravel
        description: An environmental material which is composed primarily of pieces
          of gravel.
        is_a: ENVO_01000814
        meaning: 'ENVO:01000018'
      ENVO_01001125:
        title: ice
        description: An ice is an environmental material which is either frozen or
          which is maintained in a solid state by gravitational forces or pressure.
        is_a: ENVO_01000814
        meaning: 'ENVO:01001125'
      ENVO_01000277:
        title: water ice
        description: Ice which is formed from water.
        is_a: ENVO_01001125
        meaning: 'ENVO:01000277'
      ENVO_01001557:
        title: water-body-derived ice
        description: Ice which has formed as the result of freezing of water which
          was part of a water body.
        is_a: ENVO_01000277
        meaning: 'ENVO:01001557'
      ENVO_00002200:
        title: sea ice
        description: Water ice which has formed by the freezing of sea water.
        is_a: ENVO_01001557
        meaning: 'ENVO:00002200'
      ENVO_01001190:
        title: brown sea ice
        description: Sea ice which has a brown colouration, either due to 1) the presence
          of pigments which are or were contained in the members of ecological assemblages,
          such as algal communities, living or trapped within the ice or 2) due to
          the presence of trapped sediments.
        is_a: ENVO_00002200
        meaning: 'ENVO:01001190'
      ENVO_01001512:
        title: congelation sea ice
        description: Sea ice which 1) has formed on the submerged surface (i.e. the
          base) of an existing mass of sea ice and 2) is composed of columnar crystals
          due to the downward growth of the crystals into the water.
        is_a: ENVO_00002200
        meaning: 'ENVO:01001512'
      ENVO_03000071:
        title: first year ice
        description: Sea ice which has formed over a single freezing season.
        is_a: ENVO_00002200
        meaning: 'ENVO:03000071'
      ENVO_03000072:
        title: second year ice
        description: Sea ice which is thicker than first year ice, and has survived
          a seasonal melting process.
        is_a: ENVO_00002200
        meaning: 'ENVO:03000072'
      ENVO_03000073:
        title: multiyear ice
        description: Sea ice which is thicker than second year ice, and has survived
          more than two seasonal melting process.
        is_a: ENVO_00002200
        meaning: 'ENVO:03000073'
      ENVO_01000847:
        title: hair ice
        description: A type of water ice that forms on dead wood with the assistance
          of the fungus Exidiopsis effusa and takes the shape of fine, silky hair.
        is_a: ENVO_01000277
        meaning: 'ENVO:01000847'
      ENVO_01001511:
        title: freshwater ice
        is_a: ENVO_01000277
        meaning: 'ENVO:01001511'
      ENVO_01001515:
        title: freshwater congelation ice
        description: Freshwater ice which forms on a solid substrate through the freezing
          of freshwater.
        is_a: ENVO_01001511
        meaning: 'ENVO:01001515'
      ENVO_01001514:
        title: congelation ice in a fresh water body
        description: Freshwater ice which forms downward from the surface of a freshwater
          water body and is transparent due to a reduced number of air bubbles trapped
          in its mass.
        is_a: ENVO_01001515
        meaning: 'ENVO:01001514'
      ENVO_01001516:
        title: ice cave congelation ice
        description: Freshwater congelation ice which has formed on a solid substrate
          in an ice cave.
        is_a: ENVO_01001515
        meaning: 'ENVO:01001516'
      ENVO_01001513:
        title: permafrost congelation ice
        description: Water ice which has formed in a mass of permafrost.
        is_a: ENVO_01000277
        meaning: 'ENVO:01001513'
      ENVO_03000004:
        title: glacial ice
        description: Any water ice that is part of a glacier.
        is_a: ENVO_01000277
        meaning: 'ENVO:03000004'
      ENVO_03000005:
        title: erosionally enriched glacial ice
        description: Glacial ice which contains material liberated during a glacial
          erosion process.
        is_a: ENVO_03000004
        meaning: 'ENVO:03000005'
      ENVO_03000007:
        title: blue ice
        description: Water ice containing little to no air bubbles resulting in a
          reduction of internal light scattering and, given sufficient volume, a blue
          appearance.
        is_a: ENVO_01000277
        meaning: 'ENVO:03000007'
      ENVO_03000025:
        title: erosionally enriched ice
        description: Water ice which contains material liberated during an erosion
          process.
        is_a: ENVO_01000277
        meaning: 'ENVO:03000025'
      ENVO_03000063:
        title: new ice
        description: Water ice which is formed from freezing water and is suspended
          in a water body.
        is_a: ENVO_01000277
        meaning: 'ENVO:03000063'
      ENVO_01001523:
        title: frazil
        description: Small, needle-like (spicules), plate-like, or discoid crystals
          derived from nearly pure fresh water, suspended in a water body.
        is_a: ENVO_03000063
        meaning: 'ENVO:01001523'
      ENVO_03000046:
        title: frazil ice
        description: New ice which is composed frazil which has congealed into a thin
          sheet.
        is_a: ENVO_03000063
        meaning: 'ENVO:03000046'
      ENVO_03000075:
        title: shuga
        description: New ice, which is spongy, lumpy and opaque, and forms from water
          which freezes in an agitated water body.
        is_a: ENVO_03000063
        meaning: 'ENVO:03000075'
      ENVO_01001138:
        title: carbon dioxide ice
        description: Ice which is primarily composed of carbon dioxide.
        is_a: ENVO_01001125
        meaning: 'ENVO:01001138'
      ENVO_01001139:
        title: methane ice
        description: Ice which is primarily composed of methane.
        is_a: ENVO_01001125
        meaning: 'ENVO:01001139'
      ENVO_01001140:
        title: ammonia ice
        description: Ice which is primarily composed of ammonia.
        is_a: ENVO_01001125
        meaning: 'ENVO:01001140'
      ENVO_01001141:
        title: carbon monoxide ice
        description: Ice which is primarily composed of carbon monoxide.
        is_a: ENVO_01001125
        meaning: 'ENVO:01001141'
      ENVO_00001995:
        title: rock
        description: A rock is a naturally occurring solid aggregate of one or more
          minerals or mineraloids.
        is_a: ENVO_01000814
        meaning: 'ENVO:00001995'
      ENVO_00002016:
        title: sedimentary rock
        description: A rock formed by deposition of either clastic sediments, organic
          matter, or chemical precipitates (evaporites), followed by compaction of
          the particulate matter and cementation during diagenesis.
        is_a: ENVO_00001995
        meaning: 'ENVO:00002016'
      ENVO_00002053:
        title: limestone
        description: A sedimentary rock which is composed primarily of calcium carbonate
          in the form of calcite or aragnoite.
        is_a: ENVO_00002016
        meaning: 'ENVO:00002053'
      ENVO_00002054:
        title: chalk
        description: Limestone which is soft, white, and porous.
        is_a: ENVO_00002053
        meaning: 'ENVO:00002054'
      ENVO_00003982:
        title: travertine
        description: Limestone which is deposited from the water of mineral springs
          or streams saturated with calcium carbonate.
        is_a: ENVO_00002053
        meaning: 'ENVO:00003982'
      ENVO_01000273:
        title: lime mudstone
        description: Lime mudstone is a limestone which is primarily composed of either
          clay-size or both silt-size and clay-size detrital (transported) carbonate
          grains.
        is_a: ENVO_00002053
        meaning: 'ENVO:01000273'
      ENVO_01000271:
        title: clastic sedimentary rock
        description: Clastic sedimentary rocks are sedimentary rocks that are composed
          of silicate minerals and rock fragments that were transported by moving
          fluids. Clastic rocks are composed largely of quartz, feldspar, rock (lithic)
          fragments, clay minerals, and mica; numerous other minerals may be present
          as accessories and may be important locally.
        is_a: ENVO_00002016
        meaning: 'ENVO:01000271'
      ENVO_00002055:
        title: sandstone
        description: A sedimentary rock composed mainly of sand-size mineral or rock
          grains.
        is_a: ENVO_01000271
        meaning: 'ENVO:00002055'
      ENVO_00002056:
        title: shale
        description: A fine-grained sedimentary rock whose original constituents were
          clays or muds. It is characterized by thin laminae breaking with an irregular
          curving fracture, often splintery and usually parallel to the often-indistinguishable
          bedding plane.
        is_a: ENVO_01000271
        meaning: 'ENVO:00002056'
      ENVO_02000119:
        title: oil shale
        description: An organic-rich fine-grained sedimentary rock containing kerogen
          from which liquid hydrocarbons called shale oil can be produced.
        is_a: ENVO_00002056
        meaning: 'ENVO:02000119'
      ENVO_01000269:
        title: siltstone
        description: A sedimentary rock which is composed mainly of silt. This rock
          has a grainsize in the silt range, finer than sandstone and coarser than
          claystones.
        is_a: ENVO_01000271
        meaning: 'ENVO:01000269'
      ENVO_01000270:
        title: claystone
        description: A clastic sedimentary rock which is composed primarily of clay
          sized particles.
        is_a: ENVO_01000271
        meaning: 'ENVO:01000270'
      ENVO_01000272:
        title: mudstone
        description: A mudstone is a clastic sedimentary rock which contains a mixture
          of at least one third of silt- and one third of clay-sized particles.
        is_a: ENVO_01000271
        meaning: 'ENVO:01000272'
      ENVO_02000091:
        title: coal
        description: A combustible black or brownish-black sedimentary rock usually
          occurring in rock strata in layers or veins called coal beds or coal seams.
        is_a: ENVO_00002016
        meaning: 'ENVO:02000091'
      ENVO_2000008:
        title: lignite
        description: A soft, brown, combustible, sedimentary rock formed from naturally
          compressed peat.
        is_a: ENVO_02000091
        meaning: 'ENVO:2000008'
      ENVO_2000009:
        title: sub-bitumous coal
        is_a: ENVO_02000091
        meaning: 'ENVO:2000009'
      ENVO_2000010:
        title: bitumous coal
        description: a relatively soft coal containing a tarlike substance called
          bitumen or asphalt. It is of higher quality than lignite coal but of poorer
          quality than anthracite. It is an organic sedimentary rock formed by diagenetic
          and sub metamorphic compression of peat bog material.
        is_a: ENVO_02000091
        meaning: 'ENVO:2000010'
      ENVO_2000011:
        title: anthracite
        description: A hard, compact variety of coal that has a submetallic luster.
          It has the highest carbon content, the fewest impurities, and the highest
          energy density of all types of coal and is the highest ranking of coal.
        is_a: ENVO_02000091
        meaning: 'ENVO:2000011'
      ENVO_2000044:
        title: coke
        description: Coal heated in the absence of air.
        is_a: ENVO_02000091
        meaning: 'ENVO:2000044'
      ENVO_00010623:
        title: dolomite
        description: A sedimentary carbonate rock and a mineral, both composed of
          calcium magnesium carbonate CaMg(CO3)2 found in crystals.
        is_a: ENVO_00002016
        meaning: 'ENVO:00010623'
      ENVO_01000962:
        title: diatomite
        description: A sedimentary rock which is primarily composed of the fossilized,
          siliceous remains of diatoms mixed with varying amounts of other clays and
          minerals.
        is_a: ENVO_00002016
        meaning: 'ENVO:01000962'
      ENVO_03600064:
        title: microbialite
        description: A sedimentary rock which is made of carbonate mud whose formation
          is mediated by microbes in the benthic zone.
        is_a: ENVO_00002016
        meaning: 'ENVO:03600064'
      ENVO_01000662:
        title: scoria
        description: Scoria is a highly vesicular, dark colored volcanic rock that
          may or may not contain crystals.
        is_a: ENVO_00001995
        meaning: 'ENVO:01000662'
      ENVO_01000663:
        title: pumice
        description: Pumice is a volcanic rock that consists of highly vesicular rough
          textured volcanic glass, which may or may not contain crystals.
        is_a: ENVO_00001995
        meaning: 'ENVO:01000663'
      ENVO_00002013:
        title: igneous rock
        description: Rock formed from molten magma.
        is_a: ENVO_00001995
        meaning: 'ENVO:00002013'
      ENVO_00002014:
        title: plutonic rock
        description: An igneous rock that results from the crystallization of a magma
          below the surface of the Earth.
        is_a: ENVO_00002013
        meaning: 'ENVO:00002014'
      ENVO_01000236:
        title: basalt
        description: Basalt is a volcanic rock which is formed by the rapid cooling
          of basaltic lava.
        is_a: ENVO_00002013
        meaning: 'ENVO:01000236'
      ENVO_01000356:
        title: granite
        description: A portion of granite is a portion of igneous  rock which  is
          intrusive, felsic, granular, and phaneritic.
        is_a: ENVO_00002013
        meaning: 'ENVO:01000356'
      ENVO_01000441:
        title: andesite
        description: Andesite is an extrusive igneous, volcanic rock, of intermediate
          composition, with aphanitic to porphyritic texture.
        is_a: ENVO_00002013
        meaning: 'ENVO:01000441'
      ENVO_01000442:
        title: dacite
        description: Dacite is an igneous, volcanic rock. It has an aphanitic to porphyritic
          texture and is intermediate in composition between andesite and rhyolite.  Dacite
          consists mostly of plagioclase feldspar with biotite, hornblende, and pyroxene
          (augite and/or enstatite). It has quartz as rounded, corroded phenocrysts,
          or as an element of the ground-mass. The plagioclase ranges from oligoclase
          to andesine and labradorite. Sanidine occurs, although in small proportions,
          in some dacites, and when abundant gives rise to rocks that form transitions
          to the rhyolites.
        is_a: ENVO_00002013
        meaning: 'ENVO:01000442'
      ENVO_00002015:
        title: volcanic rock
        description: An igneous rock that results from magma reaching the surface
          either as lava or fragmental ejecta.
        is_a: ENVO_00001995
        meaning: 'ENVO:00002015'
      ENVO_00002017:
        title: metamorphic rock
        description: "A rock formed by subjecting any rock type (including previously-formed\
          \ metamorphic rock) to different temperature and pressure conditions than\
          \ those in which the original rock was formed. These temperatures and pressures\
          \ are always higher than those at the Earth's surface and must be sufficiently\
          \ high so as to change the original minerals into other mineral types or\
          \ else into other forms of the same minerals (e.g. by recrystallisation)."
        is_a: ENVO_00001995
        meaning: 'ENVO:00002017'
      ENVO_01000274:
        title: slate
        description: Slate is a metamorphic rock which is fine-grained, foliated,
          homogeneous, Slates are derived from clastic sedimentary rocks.
        is_a: ENVO_00002017
        meaning: 'ENVO:01000274'
      ENVO_01000751:
        title: bedrock
        description: A lithified mass of rock that lies under the loose softer material
          (regolith) at the surface of the Earth or other terrestrial planet.
        is_a: ENVO_00001995
        meaning: 'ENVO:01000751'
      ENVO_01000661:
        title: tuff
        description: Tuff is a type of rock made of volcanic ash ejected from a vent
          during a volcanic eruption.
        is_a: ENVO_00001995
        meaning: 'ENVO:01000661'
      ENVO_01001204:
        title: alluvial deposit
        description: A rock which is formed as a result of the lithification of alluvium.
        is_a: ENVO_00001995
        meaning: 'ENVO:01001204'
      ENVO_02000094:
        title: ore
        description: a type of rock that contains sufficient minerals with important
          elements including metals that can be economically extracted from the rock.
        is_a: ENVO_00001995
        meaning: 'ENVO:02000094'
      ENVO_02000098:
        title: platinum ore
        is_a: ENVO_02000094
        meaning: 'ENVO:02000098'
      ENVO_02000097:
        title: gold ore
        is_a: ENVO_02000094
        meaning: 'ENVO:02000097'
      ENVO_02000095:
        title: uranium ore
        description: Ore which contains uranium.
        is_a: ENVO_02000094
        meaning: 'ENVO:02000095'
      ENVO_02000096:
        title: iron ore
        is_a: ENVO_02000094
        meaning: 'ENVO:02000096'
      ENVO_02000111:
        title: copper ore
        is_a: ENVO_02000094
        meaning: 'ENVO:02000111'
      ENVO_03600016:
        title: saprolite
        description: Rock which is derived from bedrock through chemical weathering
        is_a: ENVO_00001995
        meaning: 'ENVO:03600016'
      ENVO_00000194:
        title: scree
        description: Broken rock that appears at the bottom of crags, mountain cliffs
          or valley shoulders.
        is_a: ENVO_01000814
        meaning: 'ENVO:00000194'
      ENVO_01000660:
        title: tephra
        description: Tephra is fragmental material produced by a volcanic eruption
          regardless of composition, fragment size or emplacement mechanism.
        is_a: ENVO_01000814
        meaning: 'ENVO:01000660'
      ENVO_01000256:
        title: mineral material
        description: A mineral material is an environmental material which is primarily
          composed of some substance that is naturally occurring, solid and stable
          at room temperature, representable by a chemical formula, usually abiogenic,
          and that has an ordered atomic structure.
        is_a: ENVO_01000814
        meaning: 'ENVO:01000256'
      ENVO_01000508:
        title: salt material
        is_a: ENVO_01000256
        meaning: 'ENVO:01000508'
      ENVO_01000681:
        title: sodium chloride salt
        description: A mineral material composed primarily of sodium chloride.
        is_a: ENVO_01000508
        meaning: 'ENVO:01000681'
      ENVO_01000853:
        title: marl
        description: Marl is a mass of calcium carbonate derived from mollusk shells
          and mixed with silt and clay.
        is_a: ENVO_01000256
        meaning: 'ENVO:01000853'
      ENVO_02000100:
        title: mineral dust
        description: Dust which is derived from mineral material.
        is_a: ENVO_01000256
        meaning: 'ENVO:02000100'
      ENVO_01001288:
        title: kaolin dust
        description: Dust which is primarily composed of kaolinite particles.
        is_a: ENVO_02000100
        meaning: 'ENVO:01001288'
      ENVO_00002008:
        title: dust
        description: Particulate environmental material with diameters less than 500
          micrometers.
        is_a: ENVO_01000814
        meaning: 'ENVO:00002008'
      ENVO_01001282:
        title: silica dust
        description: Dust which is composed primarily of slicon dioxide.
        is_a: ENVO_00002008
        meaning: 'ENVO:01001282'
      ENVO_01001283:
        title: aluminium dust
        description: Dust which is primarily composed of aluminium particles.
        is_a: ENVO_00002008
        meaning: 'ENVO:01001283'
      ENVO_01001284:
        title: barium dust
        description: Dust which is primarily composed of barium particles.
        is_a: ENVO_00002008
        meaning: 'ENVO:01001284'
      ENVO_01001285:
        title: talc dust
        description: Dust which is primarily composed of hydrated magnesium silicate
          (talc) particles.
        is_a: ENVO_00002008
        meaning: 'ENVO:01001285'
      ENVO_01001286:
        title: slate dust
        description: Dust which is primarily composed of slate particles.
        is_a: ENVO_00002008
        meaning: 'ENVO:01001286'
      ENVO_02000099:
        title: coal dust
        description: Dust which is derived from coal.
        is_a: ENVO_00002008
        meaning: 'ENVO:02000099'
      ENVO_02000101:
        title: fibrous dust
        description: Dust which is composed of fibrous material.
        is_a: ENVO_00002008
        meaning: 'ENVO:02000101'
      ENVO_02000102:
        title: fibrous glass dust
        is_a: ENVO_02000101
        meaning: 'ENVO:02000102'
      ENVO_02000106:
        title: asbestos dust
        is_a: ENVO_02000101
        meaning: 'ENVO:02000106'
      ENVO_02000103:
        title: metallic dust
        description: Dust which is composed primarily of some metallic material.
        is_a: ENVO_00002008
        meaning: 'ENVO:02000103'
      ENVO_02000104:
        title: cement dust
        is_a: ENVO_00002008
        meaning: 'ENVO:02000104'
      ENVO_02000105:
        title: clay dust
        description: Dust which is derived from clay material.
        is_a: ENVO_00002008
        meaning: 'ENVO:02000105'
      ENVO_02000109:
        title: dust from plant parts
        is_a: ENVO_00002008
        meaning: 'ENVO:02000109'
      ENVO_02000107:
        title: grain dust
        description: Dust that comes from grain and all the other substances associated
          with its cultivation & harvesting.
        is_a: ENVO_02000109
        meaning: 'ENVO:02000107'
      ENVO_02000108:
        title: cotton dust
        is_a: ENVO_02000109
        meaning: 'ENVO:02000108'
      ENVO_03510000:
        title: wood dust
        description: Dust which is 1) generated when wood is processed and 2) composed
          primarily of cellulose, polyoses, and lignin.
        is_a: ENVO_00002008
        meaning: 'ENVO:03510000'
      ENVO_03510036:
        title: rock dust
        description: Dust which is composed of minerals and trace elements, generated
          by  finely crushed rock.
        is_a: ENVO_00002008
        meaning: 'ENVO:03510036'
      ENVO_00002040:
        title: wood
        is_a: ENVO_01000814
        meaning: 'ENVO:00002040'
      ENVO_00002135:
        title: treated wood
        is_a: ENVO_00002040
        meaning: 'ENVO:00002135'
      ENVO_00002136:
        title: arsenate treated wood
        is_a: ENVO_00002135
        meaning: 'ENVO:00002136'
      ENVO_00002164:
        title: fossil material
        description: A solid environmental material which is formed by the replacement
          of organic substances (including those in soils and sediments) with mineral
          material.
        is_a: ENVO_01000814
        meaning: 'ENVO:00002164'
      ENVO_02000090:
        title: ash
        description: An environmental material that is the non-aqueous, non-gaseous
          residues that remain after something is burned.
        is_a: ENVO_01000814
        meaning: 'ENVO:02000090'
      ENVO_01000701:
        title: volcanic ash
        description: Volcanic ash is an environmental material which consists of fragments
          of pulverized rock, minerals, and volcanic glass, created during volcanic
          eruptions and measuring less than 2 millimetres in diameter. Volcanic ash
          is formed during explosive volcanic eruptions, phreatomagmatic eruptions
          and during transport in pyroclastic density currents.
        is_a: ENVO_02000090
        meaning: 'ENVO:01000701'
      ENVO_01001186:
        title: acidic volcanic ash
        description: Volcanic ash which has increased levels of molecules or ions
          capable of donating a hydron (proton or hydrogen ion) to other chemical
          entities, or, alternatively, capable of forming covalent bonds with other
          chemicals via the acceptance of an electron pair, resulting in a bulk pH
          measurement of less than 7.
        is_a: ENVO_01000701
        meaning: 'ENVO:01001186'
      ENVO_02000126:
        title: wood ash
        description: the residue powder that is derived from the combustion of wood.
        is_a: ENVO_02000090
        meaning: 'ENVO:02000126'
      ENVO_02000127:
        title: coal ash
        description: Ash that is produced from the burning of coal.
        is_a: ENVO_02000090
        meaning: 'ENVO:02000127'
      ENVO_02000128:
        title: fly ash
        description: A very fine, powdery material composed mostly of silica made
          from the burning of finely ground coal in a boiler.
        is_a: ENVO_02000127
        meaning: 'ENVO:02000128'
      ENVO_02000129:
        title: bottom ash
        description: a coarse, angular ash particle that is too large to be carried
          up into the smoke stacks so it forms in the bottom of the coal furnace.
        is_a: ENVO_02000127
        meaning: 'ENVO:02000129'
      ENVO_02000130:
        title: boiler slag
        description: molten bottom ash from slag tap and cyclone type furnaces that
          turns into pellets that have a smooth glassy appearance after it is cooled
          with water.
        is_a: ENVO_02000127
        meaning: 'ENVO:02000130'
      ENVO_02000131:
        title: flue gas desulfurization material
        description: a material leftover from the process of reducing sulfur dioxide
          emissions from a coal-fired boiler that can be a wet sludge consisting of
          calcium sulfite or calcium sulfate or a dry powered material that is a mixture
          of sulfites and sulfates.
        is_a: ENVO_02000127
        meaning: 'ENVO:02000131'
      ENVO_01001646:
        title: amorphous solid
        description: A solid material which does not have a regularly organised internal
          structure.
        is_a: ENVO_01000814
        meaning: 'ENVO:01001646'
      ENVO_01000405:
        title: respirable suspended particulate matter
        description: A portion of respirable suspended particulate matter is a form
          of particulate matter composed primarily of solid particles each with a
          diameter of 10 micrometers or less.
        is_a: ENVO_01001646
        meaning: 'ENVO:01000405'
      ENVO_01000415:
        title: fine respirable suspended particulate matter
        description: A portion of fine respirable suspended particulate matter is
          a form of particulate matter composed primarily of solid particles each
          with a diameter of 2.5 micrometers or less.
        is_a: ENVO_01000405
        meaning: 'ENVO:01000415'
      ENVO_01000416:
        title: ultrafine respirable suspended particulate matter
        description: A portion of fine respirable suspended particulate matter is
          a form of particulate matter composed primarily of solid particles each
          with a diameter of  100 nanometers or less.
        is_a: ENVO_01000415
        meaning: 'ENVO:01000416'
      ENVO_01000480:
        title: glass
        description: Glass is an amorphous (non-crystalline) solid which is often
          transparent.
        is_a: ENVO_01000814
        meaning: 'ENVO:01000480'
      ENVO_01000481:
        title: silica-based glass
        description: Silica-based glass is a glass composed primarily of silicon dioxide,
          the primary constituent of sand.
        is_a: ENVO_01000480
        meaning: 'ENVO:01000481'
      ENVO_01000482:
        title: soda-lime glass
        description: Soda-lime glass is a silica-based glass which is composed of
          approximately 75% silicon dioxide, with sodium oxide and calcium oxide consituting
          most of its remaining composition.
        is_a: ENVO_01000481
        meaning: 'ENVO:01000482'
      ENVO_01000483:
        title: flat glass
        description: Flat glass is a soda-lime glass which is composed of approximately
          73% silicon dioxide (silica), 14% sodium oxide, 9% calcium oxide, 4% magnesium
          oxide, 0.15% aluminium oxide, 0.03% potassium oxide, 0.02% titanum dioxide,
          and 0.01% iron III oxide.
        is_a: ENVO_01000482
        meaning: 'ENVO:01000483'
      ENVO_01000484:
        title: container glass
        description: Container glass is a soda-lime glass which is composed of approximately
          74% silicon dioxide (silica), 13% sodium oxide, 10.5% calcium oxide, 1.3%
          aluminium oxide, 0.3% potassium oxide, 0.2% sulphur trioxide, 0.2% magnesium
          oxide,  0.04% iron III oxide, and 0.01%  titanum dioxide.
        is_a: ENVO_01000482
        meaning: 'ENVO:01000484'
      ENVO_01000485:
        title: quartz glass
        description: Quartz glass is a glass which is composed of silica in amorphous
          (non-crystalline) form.
        is_a: ENVO_01000481
        meaning: 'ENVO:01000485'
      ENVO_01000560:
        title: charcoal
        description: Charcoal is a light, black residue, consisting of carbon and
          any remaining ash, obtained by removing water and other volatile constituents
          from animal and vegetation substances. Charcoal is usually produced by slow
          pyrolysis, the heating of wood or other substances in the absence of oxygen.
        is_a: ENVO_01000814
        meaning: 'ENVO:01000560'
      ENVO_2000007:
        title: biochar
        description: charcoal that is used as a soil amendment.
        is_a: ENVO_01000560
        meaning: 'ENVO:2000007'
      ENVO_01000845:
        title: crystal
        description: A solid material whose constituents, such as atoms, molecules
          or ions, are arranged in a highly ordered microscopic structure, forming
          a crystal lattice that extends in all directions.
        is_a: ENVO_01000814
        meaning: 'ENVO:01000845'
      ENVO_01000846:
        title: water ice crystal
        description: A crystal which is primarily composed of water ice.
        is_a: ENVO_01000845
        meaning: 'ENVO:01000846'
      ENVO_03520007:
        title: snow crystal
        description: A water ice crystal which is constituted by water molecules aligned
          in a hexagonal array.
        is_a: ENVO_01000846
        meaning: 'ENVO:03520007'
      ENVO_01001883:
        title: hoar crystal
        description: A water ice crystal which is a part of a deposit of hoarfrost
          and which only grows by desublimation.
        is_a: ENVO_01000846
        meaning: 'ENVO:01001883'
      ENVO_01000850:
        title: clathrate material
        description: A material which is primarily composed of a substance arranged
          as a lattice which can trap or contain other molecules.
        is_a: ENVO_01000845
        meaning: 'ENVO:01000850'
      ENVO_01000851:
        title: methane clathrate
        description: A clathrate material in which a large amount of methane is trapped
          within a crystal structure of water, forming a solid similar to ice.
        is_a: ENVO_01000850
        meaning: 'ENVO:01000851'
      ENVO_01001121:
        title: plant matter
        description: Organic material which is primarily composed of plant structures,
          living or dead.
        is_a: ENVO_01000814
        meaning: 'ENVO:01001121'
      ENVO_03501302:
        title: cork
        description: Plant matter consisting of an impermeable buoyant material, the
          phellem layer of bark tissue.
        is_a: ENVO_01001121
        meaning: 'ENVO:03501302'
      ENVO_01001231:
        title: kerogen
        description: Organic material which is in a solid phase and contained in sedimentary
          rock.
        is_a: ENVO_01000814
        meaning: 'ENVO:01001231'
      ENVO_01001232:
        title: sapropelic kerogen
        description: Kerogen which cotains alginite, amorphous organic matter, cyanobacteria,
          freshwater algae, and land plant resins, thus having a hydrogen to carbon
          ratio above 1.25, and oxygen to carbon ratio below 0.15, readily produces
          liquid hydrocarbons, has reduced concentrations of aromatic structures,
          and primarily derived from proteins and lipids.
        is_a: ENVO_01001231
        meaning: 'ENVO:01001232'
      ENVO_01001233:
        title: labile kerogen
        description: Kerogen from which heavy hydrocarbons (such as oils) are derived
          following chemical break down.
        is_a: ENVO_01001231
        meaning: 'ENVO:01001233'
      ENVO_01001234:
        title: recalcitrant kerogen
        description: Kerogen from which light hydrocarbons (such as hydrocarbon gases)
          are derived following chemical break down.
        is_a: ENVO_01001231
        meaning: 'ENVO:01001234'
      ENVO_01001235:
        title: planktonic kerogen
        description: Kerogen which is enriched in sulfur compounds, has a hydrogen
          to carbon ratio under 1.25, an oxygen to carbon ratio between 0.03 and 0.18,
          derives into mixtures of hydrocarbon gas and oil, and derives from marine
          organic materials (primarily lipids) which are formed in reducing environments.
        is_a: ENVO_01001231
        meaning: 'ENVO:01001235'
      ENVO_01001236:
        title: sulfrous kerogen
        description: Planktonic kerogen which has high concentrations of sulfur compounds.
        is_a: ENVO_01001235
        meaning: 'ENVO:01001236'
      ENVO_01001237:
        title: humic kerogen
        description: Kerogen which derives from land plants, resembles wood or coral
          in structure, has a hydrogen to carbon ratio under 1, an oxygen to carbon
          ratio between 0.03 to 0.3, and which primarily produces coal or hydrocarbon
          gas on degradation.
        is_a: ENVO_01001231
        meaning: 'ENVO:01001237'
      ENVO_01001238:
        title: residual kerogen
        description: Kerogen which has a hydrogen to carbon ratio less than  0.5 and
          primarily composed of polycyclic aromatic hydrocarbons.
        is_a: ENVO_01001231
        meaning: 'ENVO:01001238'
      ENVO_01001561:
        title: gel
        description: An environmental material which is solid, jelly-like, and exhibits
          no flow when in steady state material and which contains liquid dispersed
          in and held in place by cross-linked structures of a solid medium.
        is_a: ENVO_01000814
        meaning: 'ENVO:01001561'
      ENVO_01001562:
        title: hydrogel
        description: A gel which is primarily composed of a network of polymer chains
          that are hydrophilic, sometimes found as a colloidal gel in which water
          is the dispersion medium.
        is_a: ENVO_01001561
        meaning: 'ENVO:01001562'
      ENVO_01001850:
        title: frost
        description: An environmental material which is primarily composed of minute
          ice crystals forming a fuzzy layer over a cold surface by direct deposition
          of water vapor.
        is_a: ENVO_01000814
        meaning: 'ENVO:01001850'
      ENVO_01001845:
        title: hoar
        description: Frost which is composed of interlocking ice crystals formed by
          vapour transfer (sublimation followed by deposition) of water vapour on
          some surface.
        is_a: ENVO_01001850
        meaning: 'ENVO:01001845'
      ENVO_01001846:
        title: depth hoar
        description: Hoar which is usually cup-shaped and facetted and which forms
          within dry, low-density snow beneath the snow surface.
        is_a: ENVO_01001845
        meaning: 'ENVO:01001846'
      ENVO_01001847:
        title: hoarfrost
        is_a: ENVO_01001845
        meaning: 'ENVO:01001847'
      ENVO_01001849:
        title: glaze
        is_a: ENVO_01001845
        meaning: 'ENVO:01001849'
      ENVO_01001882:
        title: surface hoar
        description: Hoar which a) forms on surfaces, b) occurs when the temperature
          of the surface is colder than the air above and colder than the frost point
          of that air.
        is_a: ENVO_01001845
        meaning: 'ENVO:01001882'
      ENVO_01001848:
        title: rime
        description: Water ice which 1) has a white or milky and opaque appearance,
          2) has a granular texture, and 3) is formed as a result of the deposition
          and rapid freezing of supercooled water drops as they make contact with
          an exposed object.
        is_a: ENVO_01001850
        meaning: 'ENVO:01001848'
      ENVO_03501307:
        title: ceramic
        description: A solid environmental material that is hard, brittle, heat-resistant
          and corrosion-resistant, made by shaping and then firing a nonmetallic mineral
          at a high temperature.
        is_a: ENVO_01000814
        meaning: 'ENVO:03501307'
      ENVO_01000001:
        title: mud
        description: An environmental material which is a liquid or semi-liquid mixture
          of water and some combination of soil, silt, and clay particles.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000001'
      ENVO_00002122:
        title: arsenic-rich mud
        description: Mud which has elevated concentrations of arsenic.
        is_a: ENVO_01000001
        meaning: 'ENVO:00002122'
      ENVO_00002133:
        title: anaerobic mud
        description: Mud which has no or neglible concentrations of dissolved oxygen.
        is_a: ENVO_01000001
        meaning: 'ENVO:00002133'
      ENVO_01000155:
        title: organic material
        description: Environmental material derived from living organisms and composed
          primarily of one or more biomacromolecules.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000155'
      ENVO_02000019:
        title: bodily fluid material
        description: An organic material which is primarily composed of some natural
          bodily fluid or secretion such as blood, semen, saliva, blood plasma, intracellular
          and interstitial fluids.
        is_a: ENVO_01000155
        meaning: 'ENVO:02000019'
      ENVO_00000338:
        title: vomit material
        description: A bodily fluid material which is composed primarily of vomit,
          a bodily fluid consisting of the expulsed contents of the stomach of an
          organism disgorged through the mouth or nose.
        is_a: ENVO_02000019
        meaning: 'ENVO:00000338'
      ENVO_02000022:
        title: excreta material
        description: "A bodily fluid material which is composed primarily of excreta,\
          \ bodily fluids consisting of matter which contains the waste products of\
          \ biological processes, including urine or feces, discharged from an organism's\
          \ body."
        is_a: ENVO_02000019
        meaning: 'ENVO:02000022'
      ENVO_00002003:
        title: fecal material
        description: "An excreta material which is composed primarily of feces, an\
          \ excreta consisting of waste products expelled from an animal's digestive\
          \ tract through the anus (or cloaca) during defecation."
        is_a: ENVO_02000022
        meaning: 'ENVO:00002003'
      ENVO_00002047:
        title: urine material
        description: An excreta material which is composed primarily of urine, a liquid
          excreta containing water and waste products made by the kidneys, stored
          in the bladder, and leaves the body through the urethra.
        is_a: ENVO_02000022
        meaning: 'ENVO:00002047'
      ENVO_02000025:
        title: sweat material
        description: An excreta material which is composed primarily of sweat, an
          excreta consisting primarily of water as well as a smaller amount of sodium
          chloride that is excreted by the sweat glands in the skin of mammals.
        is_a: ENVO_02000022
        meaning: 'ENVO:02000025'
      ENVO_02000020:
        title: blood material
        description: "A bodily fluid material which is composed primarily of blood,\
          \ a bodily fluid composed of blood plasma and blood cells suspended within\
          \ the plasma that circulates around the organism's body. Blood performs\
          \ may important functions including the supplying of oxygen and nutrients,\
          \ removal of waste, circulation of white blood cells, detection of antibodes,\
          \ coagulation, transportation of antibodies and the regulation of pH and\
          \ body temperature."
        is_a: ENVO_02000019
        meaning: 'ENVO:02000020'
      ENVO_02000021:
        title: amniotic fluid material
        description: A bodily fluid material which is composed primarily of amniotic
          fluid, a bodily fluid consisting of watery liquid surrounding and cushioning
          a growing fetus within the amnion. It allows the fetus to move freely without
          the walls of the uterus being too tight against its body. Buoyancy is also
          provided.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000021'
      ENVO_02000023:
        title: bile material
        description: A bodily fluid material which is composed primarily of bile,
          a bodily fluid consisting of a bitter, yellow or green alkaline fluid secreted
          by hepatocytes from the liver of most vertebrates. In many species, bile
          is stored in the gallbladder between meals and upon eating is discharged
          into the duodenum where the bile aids the process of digestion of lipids.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000023'
      ENVO_02000024:
        title: aqueous humour material
        description: A bodily fluid material which is composed primarily of aqueous
          humour, a bodily fluid consisting of a thick watery substance that fills
          the space between the lens and the cornea.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000024'
      ENVO_02000026:
        title: chyme material
        description: A bodily fluid material which is composed primarily of chyme,
          a bodily fluid consisting of a liquid substance found in the stomach before
          passing through the pyloric valve and entering the duodenum. It results
          from the mechanical and chemical breakdown of a bolus and consists of partially
          digested food, water, hydrochloric acid, and various digestive enzymes.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000026'
      ENVO_02000027:
        title: blood plasma material
        description: A bodily fluid material which is composed primarily of blood
          plasma, a bodily fluid that comprises the liquid component of blood, in
          which the blood cells are suspended. It makes up about 55% of total blood
          volume.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000027'
      ENVO_02000028:
        title: ear wax material
        description: A bodily fluid material which is composed primarily of ear wax,
          a bodily fluid consisting of a yellowish, waxy substance secreted in the
          ear canal of humans and many other mammals. It plays an important role in
          the human ear canal, assisting in cleaning and lubrication, and also provides
          some protection from bacteria, fungi, and insects.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000028'
      ENVO_02000029:
        title: cerebrospinal fluid material
        description: A bodily fluid material which is composed primarily of cerebrospinal
          fluid, a clear bodily fluid that occupies the subarachnoid space and the
          ventricular system around and inside the brain. CSF is a clear bodily fluid
          that occupies the subarachnoid space and the ventricular system around and
          inside the brain.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000029'
      ENVO_02000030:
        title: chyle material
        description: A bodily fluid material which is composed primarily of chyle,
          a bodily fluid consisting of a milky fluid consisting of lymph and emulsified
          fats; formed in the small intestine during digestion of ingested fats.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000030'
      ENVO_02000031:
        title: breast milk material
        description: "A bodily fluid material which is composed primarily of breast\
          \ milk, is a bodily fluid produced that is secreted from two milk-secreting\
          \ glandular organs on a female's chest."
        is_a: ENVO_02000019
        meaning: 'ENVO:02000031'
      ENVO_02000032:
        title: vitreous humor material
        description: A bodily fluid material which is composed primarily of vitreous
          humor, a bodily fluid consisting of a clear gel that fills the space between
          the lens and the retina of the eyeball of humans and other vertebrates.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000032'
      ENVO_02000033:
        title: pleural effusion material
        description: A bodily fluid material which is composed primarily of a pleural
          effusion, a bodily fluid that is produced in excess and accumulates in the
          pleural cavity, the fluid-filled space that surrounds the lungs. Excessive
          amounts of such fluid can impair breathing by limiting the expansion of
          the lungs during inhalation.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000033'
      ENVO_02000034:
        title: tear material
        description: A bodily fluid material which is composed primarily of a volume
          of tears, a bodily fluid consisting of a drop of the clear salty liquid
          secreted by glands (lacrimal glands) in the eyes. Tears wet the membrane
          covering the eye and help rid the eye of irritating substances.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000034'
      ENVO_02000035:
        title: oronasal secretion material
        description: A bodily fluid material which is composed primarily of an oronasal
          secretion, a bodily fluid secreted from the body via the mouth or nose.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000035'
      ENVO_02000036:
        title: saliva material
        description: A bodily fluid material which is composed primarily of saliva,
          a slightly alkaline secretion of water, mucin, protein, salts, and often
          a starch-splitting enzyme (as ptyalin) that is secreted into the mouth by
          salivary glands, lubricates ingested food, and often begins the breakdown
          of starches.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000036'
      ENVO_02000037:
        title: sebum material
        description: A bodily fluid material which is composed primarily of sebum,
          an oily bodily fluid secreted from the sebaceous glads that is made of fat
          (lipids) and the debris of dead fat-producing cells. In the glands, sebum
          is produced within specialized cells and is released as these cells burst.
          Sebum acts to protect and waterproof hair and skin, and keep them from becoming
          dry, brittle and cracked. It can also inhibit the growth of microorganisms
          on skin.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000037'
      ENVO_02000038:
        title: pus material
        description: A bodily fluid material which is composed primarily of pus, a
          bodily fluid consisting of a whitish-yellow or yellow substance produced
          during inflammatory responses of the body that can be found in regions of
          pyogenic bacterial infections. Pus is produced from the dead and living
          cells which travel into the intercellular spaces around the affected cells.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000038'
      ENVO_02000039:
        title: synovial fluid material
        description: A bodily fluid material which is composed primarily of synovial
          fluid, a bodily fluid secreted by the synovial membrane into the joint cavity
          to form a thin layer at the surface of cartilage.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000039'
      ENVO_02000040:
        title: mucus material
        description: A bodily fluid material which is composed primarily of mucus,
          a bodily fluid consisting of a slippery secretion of the lining of the mucous
          membranes in the body. It is a viscous colloid containing antiseptic enzymes
          (such as lysozyme) and immunoglobulins. Mucus is produced by goblet cells
          in the mucous membranes that cover the surfaces of the membranes. It is
          made up of mucins and inorganic salts suspended in water.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000040'
      ENVO_02000041:
        title: lymph material
        description: A bodily fluid material which is composed primarily of lymph,
          a bodily fluid consisting of a usually clear coagulable fluid that passes
          from intercellular spaces of body tissue into the lymphatic vessels, is
          discharged into the blood by way of the thoracic duct and right lymphatic
          duct, and resembles blood plasma in containing white blood cells and especially
          lymphocytes but normally few red blood cells and no platelets.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000041'
      ENVO_02000042:
        title: interstitial fluid material
        description: A bodily fluid material which is composed primarily of interstitial
          fluid, a bodily fluid consisting of a solution which bathes and surrounds
          the cells of multicellular animals. It is the main component of the extracellular
          fluid, which also includes plasma and transcellular fluid.
        is_a: ENVO_02000019
        meaning: 'ENVO:02000042'
      ENVO_01000063:
        title: planktonic material
        description: A portion of planktonic material is a portion of environmental
          material primarily composed of plankton.
        is_a: ENVO_01000155
        meaning: 'ENVO:01000063'
      ENVO_01000156:
        title: biofilm material
        description: Material derived from a biofilm, an aggregate of microorganisms
          in which cells adhere to each other and/or to a surface. These adherent
          cells are frequently embedded within a self-produced matrix of extracellular
          polymeric substance (EPS). Biofilm EPS, which is also referred to as slime,
          is a polymeric conglomeration generally composed of extracellular DNA, proteins,
          and polysaccharides in various configurations.
        is_a: ENVO_01000155
        meaning: 'ENVO:01000156'
      ENVO_03605000:
        title: periphytic biofilm
        description: Biofilm consisting of a mixture of algae, cyanobacteria, microbes,
          and detritus.
        is_a: ENVO_01000156
        meaning: 'ENVO:03605000'
      ENVO_03605001:
        title: epilithon
        description: Periphyton colonizing rock substrata
        is_a: ENVO_03605000
        meaning: 'ENVO:03605001'
      ENVO_03605002:
        title: epipelon
        description: Periphyton colonizing silt substrata
        is_a: ENVO_03605000
        meaning: 'ENVO:03605002'
      ENVO_03605003:
        title: epiphyton
        description: Periphyton colonizing surface of aquatic plants
        is_a: ENVO_03605000
        meaning: 'ENVO:03605003'
      ENVO_03605004:
        title: epipsammon
        description: Periphyton colonizing sand substrata
        is_a: ENVO_03605000
        meaning: 'ENVO:03605004'
      ENVO_03605005:
        title: epixylon
        description: Periphyton colonizing woody substrata
        is_a: ENVO_03605000
        meaning: 'ENVO:03605005'
      ENVO_01000157:
        title: microbial mat material
        description: Material derived from a microbial mat, a multi-layered sheet
          of micro-organisms, mainly bacteria and archaea. Microbial mats create a
          wide range of internal chemical environments.
        is_a: ENVO_01000155
        meaning: 'ENVO:01000157'
      ENVO_01001103:
        title: detritus
        description: An organic material which is primarily composed of dead particulate
          matter.
        is_a: ENVO_01000155
        meaning: 'ENVO:01001103'
      ENVO_01000158:
        title: marine snow
        description: Marine snow is a continuous shower of mostly organic detritus
          falling from the upper layers of the water column. Its origin lies in activities
          within the productive photic zone.
        is_a: ENVO_01001103
        meaning: 'ENVO:01000158'
      ENVO_01000628:
        title: plant litter
        description: Leaf litter is dead plant material, such as leaves, bark, needles,
          and twigs, that has fallen to the ground.
        is_a: ENVO_01000155
        meaning: 'ENVO:01000628'
      ENVO_01000349:
        title: root matter
        description: An organic material primarily composed of a portion of plant
          root.
        is_a: ENVO_01000155
        meaning: 'ENVO:01000349'
      ENVO_02000008:
        title: cell culture
        description: A cell culture is a growth of cells in vitro in an artificial
          medium for experimental research.
        is_a: ENVO_01000155
        meaning: 'ENVO:02000008'
      ENVO_01001059:
        title: mock community culture
        description: A cell culture which is composed of a microbial community of
          known composition.
        is_a: ENVO_02000008
        meaning: 'ENVO:01001059'
      ENVO_01001060:
        title: single strain cell culture
        description: A cell culture which is composed of a single population of bacterial
          or archaeal cells.
        is_a: ENVO_02000008
        meaning: 'ENVO:01001060'
      ENVO_01001189:
        title: algal material
        is_a: ENVO_01000155
        meaning: 'ENVO:01001189'
      ENVO_01001391:
        title: gill tissue material
        is_a: ENVO_01000155
        meaning: 'ENVO:01001391'
      ENVO_01001392:
        title: mussel gill tissue material
        is_a: ENVO_01001391
        meaning: 'ENVO:01001392'
      ENVO_01001393:
        title: Bathymodiolus gill tissue material
        is_a: ENVO_01001392
        meaning: 'ENVO:01001393'
      ENVO_01001395:
        title: necromass
        description: Biomass which is composed primarily of dead organisms, their
          parts, or their organic derivatives.
        is_a: ENVO_01000155
        meaning: 'ENVO:01001395'
      ENVO_01001820:
        title: cultured organic material
        is_a: ENVO_01000155
        meaning: 'ENVO:01001820'
      ENVO_03501304:
        title: cellophane
        description: A thin, transparent sheet made of regenerated cellulose.
        is_a: ENVO_01000155
        meaning: 'ENVO:03501304'
      ENVO_03600084:
        title: lichen material
        description: An organic material which is derived from lichen mats.
        is_a: ENVO_01000155
        meaning: 'ENVO:03600084'
      ENVO_1000746:
        title: marine mucilage
        description: A gelatinous material primarily composed of exopolymeric compounds
          with colloidal properties, formed through the aggregation of marine snow
          particles, often found in large sheets,  flocs, and clouds.
        is_a: ENVO_01000155
        meaning: 'ENVO:1000746'
      ENVO_00002264:
        title: waste material
        description: A material which is not the desired output of a process and which
          is typically the input of a process which removes it from its producer (e.g.
          a disposal process).
        is_a: ENVO_00010483
        meaning: 'ENVO:00002264'
      ENVO_00002001:
        title: waste water
        description: Water that has been adversely affected in quality by anthropogenic
          influence.
        is_a: ENVO_00002264
        meaning: 'ENVO:00002001'
      ENVO_00002018:
        title: sewage
        description: Wastewater that is contaminated with feces or urine,
        is_a: ENVO_00002001
        meaning: 'ENVO:00002018'
      ENVO_00002193:
        title: pulp-bleaching waste water
        is_a: ENVO_00002001
        meaning: 'ENVO:00002193'
      ENVO_01000964:
        title: industrial wastewater
        description: Wastewater which is produced by industrial activity and which
          contains chemical contaminants other than those associated with urine and
          fecal matter.
        is_a: ENVO_00002001
        meaning: 'ENVO:01000964'
      ENVO_00002267:
        title: industrial waste material
        description: Industrial wastes are liquid, solid and gaseous wastes originating
          from the manufacture of specific products.
        is_a: ENVO_00002264
        meaning: 'ENVO:00002267'
      ENVO_01000371:
        title: agricultural waste material
        description: Agricultural waste is waste produced as a result of various agricultural
          operations. It includes manure and other wastes from farms, poultry houses
          and slaughterhouses; harvest waste; fertilizer run- off from fields; pesticides
          that enter into water, air or soils; and salt and silt drained from fields.
        is_a: ENVO_00002264
        meaning: 'ENVO:01000371'
      ENVO_00002266:
        title: chicken breeding waste material
        is_a: ENVO_01000371
        meaning: 'ENVO:00002266'
      ENVO_00002872:
        title: bagasse
        description: The biomass remaining after sugarcane stalks are crushed to extract
          their juice.
        is_a: ENVO_00002264
        meaning: 'ENVO:00002872'
      ENVO_01000373:
        title: biological waste material
        description: Biological waste is waste containing mostly natural organic materials
          (remains of plants, animal excrement, biological sludge from waste-water
          treatment plants and so forth).
        is_a: ENVO_00002264
        meaning: 'ENVO:01000373'
      ENVO_00002873:
        title: organic waste material
        is_a: ENVO_01000373
        meaning: 'ENVO:00002873'
      ENVO_00002276:
        title: animal waste material
        is_a: ENVO_00002873
        meaning: 'ENVO:00002276'
      ENVO_01000372:
        title: household waste material
        description: Household waste refers to waste material usually generated in
          the residential environment. Waste with similar characteristics may be generated
          in other economic activities and can thus be treated and disposed of together
          with household waste.
        is_a: ENVO_00002264
        meaning: 'ENVO:01000372'
      ENVO_03510070:
        title: toxic waste
        description: Waste which contains toxic components (e.g., heavy metals or
          radiation) which can cause harm to organisms and/or the environment.
        is_a: ENVO_00002264
        meaning: 'ENVO:03510070'
      ENVO_03600006:
        title: food waste
        description: A waste material which is primarily composed of uneaten food
          and removed from the food supply chain.
        is_a: ENVO_00002264
        meaning: 'ENVO:03600006'
      ENVO_01000060:
        title: particulate environmental material
        description: An environmental material which is composed primarily of particles.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000060'
      ENVO_01000017:
        title: sand
        description: Particulate environmental material which is composed primarily
          of particles of sand with only minor proportions of other substances.
        is_a: ENVO_01000060
        meaning: 'ENVO:01000017'
      ENVO_00002118:
        title: sea sand
        is_a: ENVO_01000017
        meaning: 'ENVO:00002118'
      ENVO_00005799:
        title: rocky sand
        is_a: ENVO_01000017
        meaning: 'ENVO:00005799'
      ENVO_01000350:
        title: autoclaved sand
        description: Autoclaved sand is sand that has been sterlised by exposure to
          high pressure saturated steam at at least 121 degrees Celsius.
        is_a: ENVO_01000017
        meaning: 'ENVO:01000350'
      ENVO_06105272:
        title: loamy sand
        description: Soil which is primarily composed of sand with silt and clay in
          progressively smaller proportions.
        is_a: ENVO_01000017
        meaning: 'ENVO:06105272'
      ENVO_06105273:
        title: fine sand
        description: Sand which is composed primarily of fine particles.
        is_a: ENVO_01000017
        meaning: 'ENVO:06105273'
      ENVO_00002007:
        title: sediment
        description: Particulate environmental material which is formed as a result
          of the transport and deposition of particles by flowing liquid.
        is_a: ENVO_01000060
        meaning: 'ENVO:00002007'
      ENVO_00000546:
        title: lake sediment
        description: Lake sediment is sediment which covers the bottom of a lake.
          Lake sediments are comprised mainly of clastic material (sediment of clay,
          silt, and sand sizes), organic debris, chemical precipitates, or combinations
          of these.
        is_a: ENVO_00002007
        meaning: 'ENVO:00000546'
      ENVO_00002147:
        title: coal mine lake sediment
        description: Coal mine lake sediment is lake sediment which covers the bottom
          of a coal mine lake.
        is_a: ENVO_00000546
        meaning: 'ENVO:00002147'
      ENVO_00002209:
        title: saline lake sediment
        description: Saline lake sediment is sediment which covers the bottom of a
          saline lake.
        is_a: ENVO_00000546
        meaning: 'ENVO:00002209'
      ENVO_00002045:
        title: anaerobic sediment
        description: Sediment characterised by the absence of oxygen.
        is_a: ENVO_00002007
        meaning: 'ENVO:00002045'
      ENVO_00002134:
        title: anaerobic stream sediment
        is_a: ENVO_00002045
        meaning: 'ENVO:00002134'
      ENVO_01000135:
        title: nitrate-reducing sediment
        description: Sediment hosting and characterised by active nitrate reducing
          microbial communities.
        is_a: ENVO_00002045
        meaning: 'ENVO:01000135'
      ENVO_01000151:
        title: manganese-reducing sediment
        description: Sediment hosting and characterised by active manganese reducing
          microbial communities.
        is_a: ENVO_00002045
        meaning: 'ENVO:01000151'
      ENVO_01000152:
        title: iron-reducing sediment
        description: Sediment hosting and characterised by active iron reducing microbial
          communities.
        is_a: ENVO_00002045
        meaning: 'ENVO:01000152'
      ENVO_01000153:
        title: sulphate-reducing sediment
        description: Sediment hosting and characterised by active sulphate reducing
          microbial communities.
        is_a: ENVO_00002045
        meaning: 'ENVO:01000153'
      ENVO_01000154:
        title: carbon dioxide-reducing sediment
        description: Sediment hosting and characterised by active carbon dioxide reducing
          microbial communities.
        is_a: ENVO_00002045
        meaning: 'ENVO:01000154'
      ENVO_03000033:
        title: marine sediment
        description: Sediment which has been transported through the marine water
          column, settling on the seafloor.
        is_a: ENVO_00002007
        meaning: 'ENVO:03000033'
      ENVO_00002113:
        title: deep marine sediment
        description: Sediment that accumulates in the flat or very gently sloping
          areas of the deep ocean basin floor. The three main types of deep marine
          sediment, also known as pelagic sediment, are siliceous oozes, calcareous
          oozes, and red clays.
        is_a: ENVO_03000033
        meaning: 'ENVO:00002113'
      ENVO_03000034:
        title: shallow marine sediment
        description: Marine sediment soured from either terrestrial systems, marine
          organisms, seawater and or cosmogeneous sources, which is transported through
          the marine water column, and accumulates within shallow regions of the oceanic
          basin close to continents, such as the continental shelf, or continental
          slope.
        is_a: ENVO_03000033
        meaning: 'ENVO:03000034'
      ENVO_00002114:
        title: chemically enriched sediment
        description: Sediment which has increased levels of one or more chemical compounds.
        is_a: ENVO_00002007
        meaning: 'ENVO:00002114'
      ENVO_00002202:
        title: organically enriched sediment
        description: Chemically-enriched sediment which has increased levels of organic
          compounds.
        is_a: ENVO_00002114
        meaning: 'ENVO:00002202'
      ENVO_00002115:
        title: petroleum enriched sediment
        description: Organically enriched sediment which has increased levels of petroleum.
        is_a: ENVO_00002202
        meaning: 'ENVO:00002115'
      ENVO_00002180:
        title: naphthalene enriched sediment
        description: Organically enriched sediment which has increased levels of naphthalene.
        is_a: ENVO_00002202
        meaning: 'ENVO:00002180'
      ENVO_00002182:
        title: nitrobenzene enriched sediment
        description: Organically enriched sediment which has increased levels of nitrobenzene.
        is_a: ENVO_00002202
        meaning: 'ENVO:00002182'
      ENVO_00002201:
        title: cis-dichloroethane contaminated sediment
        description: Organically enriched sediment which has increased levels of cis-dichloroethane.
        is_a: ENVO_00002202
        meaning: 'ENVO:00002201'
      ENVO_00002154:
        title: radioactive sediment
        is_a: ENVO_00002114
        meaning: 'ENVO:00002154'
      ENVO_00002155:
        title: high-level radioactive sediment
        is_a: ENVO_00002154
        meaning: 'ENVO:00002155'
      ENVO_00002203:
        title: inorganically enriched sediment
        description: Chemically-enriched sediment which has increased levels of inorganic
          compounds.
        is_a: ENVO_00002114
        meaning: 'ENVO:00002203'
      ENVO_03600001:
        title: chemically contaminated sediment
        description: Sediment which contains some chemical contaminant.
        is_a: ENVO_00002114
        meaning: 'ENVO:03600001'
      ENVO_00002127:
        title: stream sediment
        is_a: ENVO_00002007
        meaning: 'ENVO:00002127'
      ENVO_00002179:
        title: intertidal sediment
        is_a: ENVO_00002007
        meaning: 'ENVO:00002179'
      ENVO_01000070:
        title: terrigenous sediment
        description: Sediment comprised of weathered continental rocks, wind blown
          dust, volcanic ash or other terrestrial material.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000070'
      ENVO_01000082:
        title: biogenous sediment
        description: Biogenous sediment is derived from living organisms, typically
          planktonic organisms possessing shells, frustules or coccoliths.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000082'
      ENVO_02000044:
        title: siliceous ooze
        description: 'Siliceous ooze is a marine sediment composed of the debris of
          plankton with silica shells, such as diatoms and radiolaria. This ooze is
          limited to areas with high biological productivity, such as the polar oceans,
          and upwelling zones near the equator. The least common type of sediment,
          it covers only 15% of the ocean floor. It accumulates at a slower rate than
          calcareous ooze: 0.2-1 cm / 1000 yr.'
        is_a: ENVO_01000082
        meaning: 'ENVO:02000044'
      ENVO_02000045:
        title: red clay
        description: 'Red clay, also known as pelagic clay, accumulates in the deepest
          and most remote areas of the ocean. Containing less than 30% biogenic material,
          its composition is a varied mix of very fine quartz and clay minerals, authigenic
          deposits precipitated directly from seawater, and micrometeorites. Though
          called "red" because it sometimes takes the color of oxidized iron minerals,
          it is usually brownish in color. Its ultimate origin is uncertain, but red
          clay seems to be mostly derived from distant rivers, and windblown dust.
          Covering 38% of the ocean floor, it accumulates more slowly than any other
          sediment type, at only 0.1-0.5 cm / 1000 yr.'
        is_a: ENVO_01000082
        meaning: 'ENVO:02000045'
      ENVO_02000046:
        title: calcareous ooze
        description: "Calcareous ooze is a marine sediment composed primarily of the\
          \ shells--also known as tests--of foraminifera, coccolithophores, and pteropods.\
          \ This is the most common pelagic sediment by area, covering 48% of the\
          \ world ocean's floor. This type of ooze is limited to depths above the\
          \ Carbonate Compensation Depth at time of burial. It accumulates more rapidly\
          \ than any other pelagic sediment type, with a rate that varies from 0.3\
          \ - 5 cm / 1000 yr."
        is_a: ENVO_01000082
        meaning: 'ENVO:02000046'
      ENVO_01000110:
        title: hydrogenous sediment
        description: Hydrogenous sediment is derived from solutes that precipitate
          out of sea water by a variety of chemical reactions. These are typically
          less abundant than other sediment types.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000110'
      ENVO_01000112:
        title: polymetallic nodule
        description: Polymetallic nodules, also called manganese nodules, are rock
          concretions on the sea bottom formed of concentric layers of iron and manganese
          hydroxides around a core. Nodules vary in size from tiny particles visible
          only under a microscope to large pellets more than 20 centimetres (8 in)
          across. However, most nodules are between 5 and 10 cm in diameter.
        is_a: ENVO_01000110
        meaning: 'ENVO:01000112'
      ENVO_01000111:
        title: cosmogenous sediment
        description: Cosmogenous sediment is derived from extraterrestrial dust and
          debris in the form of meteorites and similar entities.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000111'
      ENVO_01000113:
        title: suspended sediment
        description: Suspended sediment, or suspended load, is the term for the particles
          settle  slowly enough to be carried in flowing water (such as a stream or
          coastal area) either without touching the bed or while only intermittently
          touching it. These particles are generally of the fine sand, silt and clay
          size, although larger particles may be carried as well depending on the
          intensity of the flow.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000113'
      ENVO_01000114:
        title: boulder sediment
        description: Sediment characterised by an average particle diameter greater
          than 256 mm.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000114'
      ENVO_01000115:
        title: cobble sediment
        description: Sediment characterised by an average particle diameter between
          64 and 256 mm.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000115'
      ENVO_01000116:
        title: pebble sediment
        description: Sediment characterised by an average particle diameter between
          4 and 32 mm.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000116'
      ENVO_01000117:
        title: granular sediment
        description: Sediment characterised by an average particle diameter between
          2 and 4 mm.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000117'
      ENVO_01000118:
        title: sandy sediment
        description: Sediment characterised by an average particle diameter between
          62.5 micrometers and 2 mm.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000118'
      ENVO_01000119:
        title: silty sediment
        description: Sediment characterised by an average particle diameter between
          3.9 and 62.5 micrometers.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000119'
      ENVO_01000120:
        title: clay sediment
        description: Sediment characterised by an average particle diameter between
          1 and 3.9 micrometers.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000120'
      ENVO_01000121:
        title: colloidal sediment
        description: Sediment characterised by an average particle diameter below
          1 micrometer.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000121'
      ENVO_01000131:
        title: mesophilic sediment
        description: Sediment characterised by a temperature of 15-45 degrees Celsius
          and high-to-low oxygenation. Often impacted by hydrothermal fluid flows.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000131'
      ENVO_01000132:
        title: thermophilic sediment
        description: Sediment characterised by a temperature of 45-75 degrees Celsius
          and low to no oxygen content. Often impacted by hydrothermal fluid flows.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000132'
      ENVO_01000133:
        title: hyperthermophilic sediment
        description: Sediment characterised by a temperature of 80-125 degrees Celsius
          and no oxygen content. Often impacted by hydrothermal fluid flows.
        is_a: ENVO_00002007
        meaning: 'ENVO:01000133'
      ENVO_01001028:
        title: sediment permeated by freshwater
        description: Sediment which has its porespace filled by water which has very
          low levels of sodium chloride and/or other salts.
        is_a: ENVO_00002007
        meaning: 'ENVO:01001028'
      ENVO_01001036:
        title: sediment permeated by saline water
        description: Sediment which has its porespace filled by water with increased
          levels of sodium chloride and other salts.
        is_a: ENVO_00002007
        meaning: 'ENVO:01001036'
      ENVO_01001203:
        title: alluvial sediment
        description: Sediment which has been transported by flowing water and redeposited
          in a non-marine setting.
        is_a: ENVO_00002007
        meaning: 'ENVO:01001203'
      ENVO_01001821:
        title: hydrothermally-influenced sediment
        description: Sediment through which hydrothermally modified fluids flow, altering
          its properties through interaction with their own.
        is_a: ENVO_00002007
        meaning: 'ENVO:01001821'
      ENVO_01001563:
        title: quicksand
        description: Particulate environmental material which 1) is primarily composed
          of a fine, granular material such as sand, silt, or clay suspended in and
          saturated by water and 2) readily liquefies when weight is applied, losing
          strength and permitting objects to sink until their weight and buoyancy
          offset the weight of the displaced quicksand.
        is_a: ENVO_01000060
        meaning: 'ENVO:01001563'
      ENVO_01000016:
        title: silt
        description: Particulate environmental material which is primarily composed
          of silt particles.
        is_a: ENVO_01000060
        meaning: 'ENVO:01000016'
      ENVO_00002982:
        title: clay
        description: Particulate environmental material which 1) is composed primarily
          of clay particles, with only minor proportions of other materials, 2) demonstrates
          plasticity when wet, and 3) is capable of hardening when dried or fired.
        is_a: ENVO_01000060
        meaning: 'ENVO:00002982'
      ENVO_06105279:
        title: sandy clay
        description: Clay which has a high proportion of sand in its composition.
        is_a: ENVO_00002982
        meaning: 'ENVO:06105279'
      ENVO_06105280:
        title: silty clay
        description: Clay which has a high proportion of silt in its composition.
        is_a: ENVO_00002982
        meaning: 'ENVO:06105280'
      ENVO_01000436:
        title: waterborne particulate matter
        description: Particulate environmental material in which small portions of
          solid material are surrounded by water.
        is_a: ENVO_01000060
        meaning: 'ENVO:01000436'
      ENVO_01001651:
        title: particulate matter in a hydrosphere
        description: Waterborne particulate matter which is part of a hydrosphere.
        is_a: ENVO_01000436
        meaning: 'ENVO:01001651'
      ENVO_03000021:
        title: soot
        description: Particulate environmental material which is composed primarily
          of carbon particles formed through the incomplete combustion of hydrocarbons.
        is_a: ENVO_01000060
        meaning: 'ENVO:03000021'
      ENVO_03000038:
        title: cryoconite deposit
        description: Particulate environmental material which is composed primarily
          of dust, rock, and soot, as well as the microbial communities associated
          with these materials, deposited on an ice mass by an aeolian process.
        is_a: ENVO_01000060
        meaning: 'ENVO:03000038'
      ENVO_04000012:
        title: particulate organic matter
        description: Particulate environmental material which is composed primarily
          of organic material.
        is_a: ENVO_01000060
        meaning: 'ENVO:04000012'
      ENVO_04000013:
        title: particulate organic carbon
        description: Particulate organic matter which is composed primarily of carbon.
        is_a: ENVO_04000012
        meaning: 'ENVO:04000013'
      ENVO_04000014:
        title: particulate organic nitrogen
        description: Particulate organic matter which is composed primarily of nitrogen.
        is_a: ENVO_04000012
        meaning: 'ENVO:04000014'
      ENVO_03501300:
        title: manure
        description: An environmental material consisting of organic matter from plants
          and/or animals that is used in agriculture as fertilizer.
        is_a: ENVO_00010483
        meaning: 'ENVO:03501300'
      ENVO_00002170:
        title: compost
        description: Manure which has been derived from the aerobically decomposed
          remnants of organic materials.
        is_a: ENVO_03501300
        meaning: 'ENVO:00002170'
      ENVO_00002171:
        title: hay compost
        is_a: ENVO_00002170
        meaning: 'ENVO:00002171'
      ENVO_00003033:
        title: mushroom compost
        description: A compost which generally consists of a combination of wheat
          straw, dried blood, horse manure and ground chalk, composted together and
          is the residual compost waste generated by industrial mushroom production.
        is_a: ENVO_00002170
        meaning: 'ENVO:00003033'
      ENVO_00003031:
        title: animal manure
        description: Manure which is derived from the waste products of animals.
        is_a: ENVO_03501300
        meaning: 'ENVO:00003031'
      ENVO_00003032:
        title: fresh animal manure
        is_a: ENVO_00003031
        meaning: 'ENVO:00003032'
      ENVO_00003859:
        title: horse manure
        is_a: ENVO_00003031
        meaning: 'ENVO:00003859'
      ENVO_00003860:
        title: pig manure
        description: Manure which is primarily composed of pig feces.
        is_a: ENVO_00003031
        meaning: 'ENVO:00003860'
      ENVO_00003884:
        title: farmyard manure
        is_a: ENVO_00003031
        meaning: 'ENVO:00003884'
      ENVO_00003927:
        title: stable manure
        is_a: ENVO_00003031
        meaning: 'ENVO:00003927'
      ENVO_01001116:
        title: bovine dairy liquid manure
        description: Manure which has been collected directly or indirectly from dairy
          cattle, as from flushing of manure from concrete feed lanes, free stalls,
          and milking facilities.
        is_a: ENVO_00003031
        meaning: 'ENVO:01001116'
      ENVO_01001117:
        title: poultry manure
        description: Manure which is composed primarily of the feces of poultry.
        is_a: ENVO_00003031
        meaning: 'ENVO:01001117'
      ENVO_03501252:
        title: chicken manure
        description: Poultry manure made of chicken feces.
        is_a: ENVO_01001117
        meaning: 'ENVO:03501252'
      ENVO_01001118:
        title: heat-treated animal manure
        description: Manure which has been subjected to heat treatment for solidification
          and/or sterilization purposes.
        is_a: ENVO_00003031
        meaning: 'ENVO:01001118'
      ENVO_01001119:
        title: composted animal manure
        description: "Manure which has been subjected to a natural process of 'rotting'\
          \ or decomposition of its organic matter content by microorganisms under\
          \ controlled conditions."
        is_a: ENVO_00003031
        meaning: 'ENVO:01001119'
      ENVO_02000084:
        title: goat manure
        is_a: ENVO_00003031
        meaning: 'ENVO:02000084'
      ENVO_00002191:
        title: animal litter
        description: "Straw or other material strewn in an animal's enclosure (e.g.\
          \ a stable) for it to sleep on and to absorb its faeces and urine."
        is_a: ENVO_00010483
        meaning: 'ENVO:00002191'
      ENVO_00002192:
        title: poultry litter
        is_a: ENVO_00002191
        meaning: 'ENVO:00002192'
      ENVO_00003908:
        title: poultry deep litter
        is_a: ENVO_00002192
        meaning: 'ENVO:00003908'
      ENVO_2000045:
        title: hydrocarbon-based environmental material
        is_a: ENVO_00010483
        meaning: 'ENVO:2000045'
      ENVO_00002985:
        title: oil
        description: A nonpolar, hydrophobic, and lipophilic material which is a viscous
          liquid at ambient temperatures (about 20 degrees Celsius) or slightly warmer.
        is_a: ENVO_2000045
        meaning: 'ENVO:00002985'
      ENVO_00002984:
        title: petroleum
        description: A naturally occurring flammable liquid consisting of a complex
          mixture of hydrocarbons of various molecular weights and other liquid organic
          compounds, that are found in geologic formations beneath the planetary surfaces.
        is_a: ENVO_00002985
        meaning: 'ENVO:00002984'
      ENVO_01000460:
        title: asphalt
        description: Asphalt also known as bitumen is a sticky, black, and highly
          viscous liquid or semi-solid form of petroleum.
        is_a: ENVO_00002984
        meaning: 'ENVO:01000460'
      ENVO_03510006:
        title: diesel fuel
        description: A liquid fuel used in diesel engines, whose fuel ignition takes
          place, without any spark, as a result of compression of the inlet air mixture
          and then injection of fuel.
        is_a: ENVO_00002984
        meaning: 'ENVO:03510006'
      ENVO_03510007:
        title: gasoline
        description: A clear petroleum-derived flammable liquid which is used as fuel
          in most spark-ignited internal combustion engines.
        is_a: ENVO_00002984
        meaning: 'ENVO:03510007'
      ENVO_00002983:
        title: fuel oil
        description: An oil which 1) is liquid at room temperature (approximately
          20 degrees Celsius) 2) is intended to be burned in a furnace or boiler for
          the generation of heat or used in an engine for the generation of power,
          3) is obtained from petroleum distillation, either as a distillate or a
          residue, 4) composed of long hydrocarbon chains, particularly alkanes, cycloalkanes
          and aromatics.
        is_a: ENVO_00002985
        meaning: 'ENVO:00002983'
      ENVO_01000551:
        title: paraffin oil
        description: A fuel oil which is 1) composed primarily of alkanes having between
          5-15 carbon atoms with the general formula CnH2n+2, 2) is generally odorless
          or has only a slight odor, 3) produces only small amounts of soot relative
          to other fuel oils, 4) is highly refined.
        is_a: ENVO_00002983
        meaning: 'ENVO:01000551'
      ENVO_01001608:
        title: kerosene oil
        description: A fuel oil which 1) is derived from petroleum oil, 2) has a strong
          odor, 3) produces large quantities of soot relative to other fuel oils,
          4) is less refined than fuel oils such as paraffin.
        is_a: ENVO_00002983
        meaning: 'ENVO:01001608'
      ENVO_00003903:
        title: aviation fuel
        is_a: ENVO_00002985
        meaning: 'ENVO:00003903'
      ENVO_01000554:
        title: hydrocarbon gas
        description: A gas that is primarily composed of hydrocarbon molecules.
        is_a: ENVO_2000045
        meaning: 'ENVO:01000554'
      ENVO_01000552:
        title: natural gas
        description: Natural gas is a hydrocarbon gas mixture consisting primarily
          of methane, but commonly includes varying amounts of other higher alkanes
          and sometimes a usually lesser percentage of carbon dioxide, nitrogen, and/or
          hydrogen sulfide. Natural gas is a fossil fuel formed when layers of buried
          plants and gases are exposed to intense heat and pressure over thousands
          of years.
        is_a: ENVO_01000554
        meaning: 'ENVO:01000552'
      ENVO_01000555:
        title: compressed natural gas
        description: "Compressed natural gas is a natural gas stored at high pressures,\
          \ typically 20\u201325 Megapascals."
        is_a: ENVO_01000552
        meaning: 'ENVO:01000555'
      ENVO_01000556:
        title: biogas
        description: Biogas is a mixture of different gases produced by the breakdown
          of organic matter in the absence of oxygen,  is primarily composed of methane
          and carbon dioxide, and may have small amounts of hydrogen sulfide, water,
          and siloxanes.
        is_a: ENVO_01000554
        meaning: 'ENVO:01000556'
      ENVO_01000559:
        title: compressed biogas
        description: Compressed biogas is biogas stored at increased pressures.
        is_a: ENVO_01000556
        meaning: 'ENVO:01000559'
      ENVO_01000558:
        title: liquefied hydrocarbon gas
        is_a: ENVO_2000045
        meaning: 'ENVO:01000558'
      ENVO_01000553:
        title: liquefied petroleum gas
        description: Liquified petroleum gas or liquid petroleum gas (LPG or LP gas),
          also referred to as simply propane or butane, are flammable mixtures of
          hydrocarbon gases used as fuel in heating appliances, cooking equipment,
          and vehicles.
        is_a: ENVO_01000558
        meaning: 'ENVO:01000553'
      ENVO_01000557:
        title: liquefied natural gas
        description: Liquefied natural gas (LNG) is natural gas (predominantly methane,
          CH4) that has been converted to liquid form for ease of storage or transport.
          It takes up about 1/600th the volume of natural gas in the gaseous state.
          It is odorless, colorless, non-toxic and non-corrosive. LNG achieves a higher
          reduction in volume than compressed natural gas (CNG) so that the (volumetric)
          energy density of LNG is 2.4 times greater than that of CNG or 60 percent
          of that of diesel fuel.
        is_a: ENVO_01000558
        meaning: 'ENVO:01000557'
      ENVO_00003930:
        title: scum
        description: A layer of impurities that accumulates at the surface of a liquid
          (especially water or molten metal).
        is_a: ENVO_00010483
        meaning: 'ENVO:00003930'
      ENVO_00005794:
        title: water scum
        is_a: ENVO_00003930
        meaning: 'ENVO:00005794'
      ENVO_00005738:
        title: foamy environmental material
        description: An environmental material which has the quality of a foam.
        is_a: ENVO_00010483
        meaning: 'ENVO:00005738'
      ENVO_00005739:
        title: sea foam
        description: A foamy environmental material which 1) is created by the agitation
          of seawater, 2) whose stability depends on the content of the seawater.
        is_a: ENVO_00005738
        meaning: 'ENVO:00005739'
      ENVO_00010505:
        title: aerosol
        description: Airborne solid particles (also called dust or particulate matter
          (PM)) or liquid droplets.
        is_a: ENVO_00010483
        meaning: 'ENVO:00010505'
      ENVO_01001089:
        title: aerosolised solids
        description: An aerosol which has non-gaseous parts that are primarily composed
          of solid particles.
        is_a: ENVO_00010505
        meaning: 'ENVO:01001089'
      ENVO_01001402:
        title: haze
        description: An aersolised mass of dust, smoke, or other dry particulates
          which scatters visible light thus obsscuring visibility through an atmosphere.
        is_a: ENVO_01001089
        meaning: 'ENVO:01001402'
      ENVO_03000139:
        title: ice fog
        description: Fog which is composed of particles of ice.
        is_a: ENVO_01001089
        meaning: 'ENVO:03000139'
      ENVO_01001088:
        title: aerosolised liquids
        description: An aerosol which has non-gaseous parts that are primarily composed
          of liquid droplets.
        is_a: ENVO_00010505
        meaning: 'ENVO:01001088'
      ENVO_01000844:
        title: fog
        description: A visible mass of cloud water droplets or ice crystals suspended
          in the air at or near the surface of an astronomical body.
        is_a: ENVO_01001088
        meaning: 'ENVO:01000844'
      ENVO_01000842:
        title: smog
        description: A fog which is intermixed with smoke or other combustion products
          and their derivatives.
        is_a: ENVO_01000844
        meaning: 'ENVO:01000842'
      ENVO_01001258:
        title: vog
        description: A fog which is composed of liquid aerosols and gases derived
          from volcanic gas emissions (primarily sulfur oxides), formed when sulfur-bearing
          gases react with sunlight, oxygen, and moisture in an atmosphere.
        is_a: ENVO_01000844
        meaning: 'ENVO:01001258'
      ENVO_03000137:
        title: freezing fog
        description: A fog the droplets of which freeze upon contact with exposed
          objects, forming a coating of rime or glaze.
        is_a: ENVO_01000844
        meaning: 'ENVO:03000137'
      ENVO_01001458:
        title: mist
        description: A visible mass of water droplets or ice crystals suspended in
          the air at or near a planetary surface, formed when humid air cools rapidly.
        is_a: ENVO_01001088
        meaning: 'ENVO:01001458'
      ENVO_01000838:
        title: smoke
        is_a: ENVO_00010505
        meaning: 'ENVO:01000838'
      ENVO_01001652:
        title: atmospheric aerosol
        description: An aerosol that is suspended in an atmosphere.
        is_a: ENVO_00010505
        meaning: 'ENVO:01001652'
      ENVO_00010506:
        title: emulsion
        description: A mixture of two immiscible (unblendable) substances. One substance
          (the dispersed phase) is dispersed in the other (the continuous phase).
        is_a: ENVO_00010483
        meaning: 'ENVO:00010506'
      ENVO_02000140:
        title: fluid environmental material
        description: An environmental material which is unable to resist shear forces
          and continuously deforms when subject to them.
        is_a: ENVO_00010483
        meaning: 'ENVO:02000140'
      ENVO_01000797:
        title: gaseous environmental material
        description: A material entity which is composed of one or more chemical entities
          and has neither independent shape nor volume but tends to expand indefinitely.
        is_a: ENVO_02000140
        meaning: 'ENVO:01000797'
      ENVO_00002005:
        title: air
        description: 'The mixture of gases (roughly (by molar content/volume: 78%
          nitrogen, 20.95% oxygen, 0.93% argon, 0.038% carbon dioxide, trace amounts
          of other gases, and a variable amount (average around 1%) of water vapor)
          that surrounds the planet Earth.'
        is_a: ENVO_01000797
        meaning: 'ENVO:00002005'
      ENVO_01000676:
        title: contaminated air
        description: Contaminated air is air which has sufficient concentrations of
          environmental pollutants such that it may adversely affect a given ecosystem.
        is_a: ENVO_00002005
        meaning: 'ENVO:01000676'
      ENVO_01000828:
        title: humid air
        description: Air which has increased levels of water vapour.
        is_a: ENVO_00002005
        meaning: 'ENVO:01000828'
      ENVO_01000829:
        title: water vapour saturated air
        description: Air which has a partial pressure of water vapour equal or near
          equal to its equilibrium vapor pressure at a given temperature.
        is_a: ENVO_01000828
        meaning: 'ENVO:01000829'
      ENVO_01000266:
        title: water vapour
        description: Water vapour is a vapour which is the gas phase of water.
        is_a: ENVO_01000797
        meaning: 'ENVO:01000266'
      ENVO_01000268:
        title: atmospheric water vapour
        description: Atmospheric water vapour is water vapour that is part of an atmosphere.
        is_a: ENVO_01000266
        meaning: 'ENVO:01000268'
      ENVO_01000451:
        title: atmospheric carbon dioxide
        description: Atmospheric carbon dioxide is an environmental material composed
          of carbon dioxide in its gaseous form present in an atmosphere.
        is_a: ENVO_01000797
        meaning: 'ENVO:01000451'
      ENVO_01000770:
        title: carbon dioxide emission
        description: A volume of carbon dioxide gas emitted by a carbon dioxide emission
          process.
        is_a: ENVO_01000451
        meaning: 'ENVO:01000770'
      ENVO_01000537:
        title: atmospheric ozone
        description: Atmospheric ozone is an environmental material primarily composed
          of ozone in its gaseous form and present in an atmosphere.
        is_a: ENVO_01000797
        meaning: 'ENVO:01000537'
      ENVO_01000789:
        title: flame
        description: A portion of gas which is emitted by a fire or other exothermic
          reaction, is of increased temperature, and typically emits light in the
          visible range.
        is_a: ENVO_01000797
        meaning: 'ENVO:01000789'
      ENVO_01000790:
        title: hydrocarbon flame
        description: A flame which is produced by the combustion of hydrocarbon fuel.
        is_a: ENVO_01000789
        meaning: 'ENVO:01000790'
      ENVO_02000112:
        title: fume
        description: A gas, smoke, or vapor that smells strongly or is dangerous to
          inhale.
        is_a: ENVO_01000797
        meaning: 'ENVO:02000112'
      ENVO_02000113:
        title: welding fume
        is_a: ENVO_02000112
        meaning: 'ENVO:02000113'
      ENVO_02000116:
        title: aluminum welding fume
        is_a: ENVO_02000113
        meaning: 'ENVO:02000116'
      ENVO_02000114:
        title: paraffin wax fume
        is_a: ENVO_02000112
        meaning: 'ENVO:02000114'
      ENVO_02000115:
        title: vanadium fume
        description: Respirable vapor of vanadium.
        is_a: ENVO_02000112
        meaning: 'ENVO:02000115'
      ENVO_02000120:
        title: zinc chloride fume
        is_a: ENVO_02000112
        meaning: 'ENVO:02000120'
      ENVO_03510008:
        title: diesel exhaust
        description: A gas which results from the incomplete or complete combustion
          of diesel fuel.
        is_a: ENVO_01000797
        meaning: 'ENVO:03510008'
      ENVO_03510009:
        title: gasoline exhaust
        description: A gas which results from the complete or incomplete combustion
          of gasoline fuel.
        is_a: ENVO_01000797
        meaning: 'ENVO:03510009'
      ENVO_01000815:
        title: liquid environmental material
        description: An environmental material which is in a liquid state.
        is_a: ENVO_02000140
        meaning: 'ENVO:01000815'
      ENVO_00002006:
        title: liquid water
        description: An environmental material primarily composed of dihydrogen oxide
          in its liquid form.
        is_a: ENVO_01000815
        meaning: 'ENVO:00002006'
      ENVO_00002010:
        title: saline water
        description: Water which contains a significant concentration of dissolved
          salts.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002010'
      ENVO_00002149:
        title: sea water
        description: Water which has physicochemical properties that have been determined
          by the processes occuring in a sea or ocean.
        is_a: ENVO_00002010
        meaning: 'ENVO:00002149'
      ENVO_00002150:
        title: coastal sea water
        description: Coastal sea water is sea water that is adjacent to a coast.
        is_a: ENVO_00002149
        meaning: 'ENVO:00002150'
      ENVO_00002019:
        title: brackish water
        description: Water which has a higher salinity than fresh water but a lower
          salinity than marine water.
        is_a: ENVO_00002010
        meaning: 'ENVO:00002019'
      ENVO_00002012:
        title: hypersaline water
        description: Water which contains a highly increased concentration of dissolved
          salts, surpassing the average salinity of seawater.
        is_a: ENVO_00002010
        meaning: 'ENVO:00002012'
      ENVO_00003044:
        title: brine
        description: Water saturated or nearly saturated with salt (NaCl).
        is_a: ENVO_00002012
        meaning: 'ENVO:00003044'
      ENVO_00003045:
        title: bacon curing brine
        is_a: ENVO_00003044
        meaning: 'ENVO:00003045'
      ENVO_01001037:
        title: slightly saline water
        description: Water which contains a slightly increased concentration of dissolved
          salts, relative to their concentration in freshwater.
        is_a: ENVO_00002010
        meaning: 'ENVO:01001037'
      ENVO_01001038:
        title: moderately saline water
        description: Water which contains a moderately increased concentration of
          dissolved salts, relative to their concentration in freshwater.
        is_a: ENVO_00002010
        meaning: 'ENVO:01001038'
      ENVO_01001039:
        title: highly saline water
        description: Water which contains a highly increased concentration of dissolved
          salts, relative to their concentration in freshwater.
        is_a: ENVO_00002010
        meaning: 'ENVO:01001039'
      ENVO_00002011:
        title: fresh water
        description: Water which has a low concentration of dissolved solutes, particularly
          that of sodium chloride.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002011'
      ENVO_00003064:
        title: drinking water
        description: Drinking water is water which may be consumed by humans with
          no adverse effects on their health.
        is_a: ENVO_00002011
        meaning: 'ENVO:00003064'
      ENVO_00003096:
        title: tap water
        is_a: ENVO_00002011
        meaning: 'ENVO:00003096'
      ENVO_01000600:
        title: rainwater
        description: Rainwater is liquid water which has precipitated in the form
          of droplets through the condensation of atmospheric water vapour.
        is_a: ENVO_00002011
        meaning: 'ENVO:01000600'
      ENVO_03600081:
        title: cloud water
        description: Fresh water which is harvested from cloud.
        is_a: ENVO_00002011
        meaning: 'ENVO:03600081'
      ENVO_01000722:
        title: meltwater
        description: Meltwater is the water released by the melting of snow or ice,
          including glacial ice, tabular icebergs and ice shelves over oceans.
        is_a: ENVO_00002006
        meaning: 'ENVO:01000722'
      ENVO_00002186:
        title: contaminated water
        is_a: ENVO_00002006
        meaning: 'ENVO:00002186'
      ENVO_00002042:
        title: surface water
        description: Water that is found on the surface of an astronomical object.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002042'
      ENVO_01000357:
        title: alkaline water
        description: A portion of alkaline water is a portion of water with a pH greater
          than 7.
        is_a: ENVO_00002006
        meaning: 'ENVO:01000357'
      ENVO_01000358:
        title: acidic water
        description: A portion of acidic water is a portion of water with a pH less
          than 7.
        is_a: ENVO_00002006
        meaning: 'ENVO:01000358'
      ENVO_00002141:
        title: leachate
        description: The liquid produced when water percolates through any permeable
          material. It can contain either dissolved or suspended material, or usually
          both.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002141'
      ENVO_00002142:
        title: borax leachate
        is_a: ENVO_00002141
        meaning: 'ENVO:00002142'
      ENVO_01000134:
        title: hydrothermal fluid
        description: High temperature water ejected from hydrothermal vents and laden
          with dissolved metals and minerals as a result of percolation through crustal
          rocks.
        is_a: ENVO_00002141
        meaning: 'ENVO:01000134'
      ENVO_00002159:
        title: drilling bore water
        is_a: ENVO_00002006
        meaning: 'ENVO:00002159'
      ENVO_00002194:
        title: oil field production water
        is_a: ENVO_00002006
        meaning: 'ENVO:00002194'
      ENVO_00002223:
        title: oligotrophic water
        description: Water which has very low concentrations of nutrients.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002223'
      ENVO_00002224:
        title: eutrophic water
        description: Water with a high nutrient level.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002224'
      ENVO_01001018:
        title: hypereutrophic water
        description: Water which has a very high concentration of nutrients.
        is_a: ENVO_00002224
        meaning: 'ENVO:01001018'
      ENVO_00002225:
        title: mesotrophic water
        description: Water with a nutrient level intermediate between eutrophic and
          oligotrophic.
        is_a: ENVO_00002006
        meaning: 'ENVO:00002225'
      ENVO_00003065:
        title: distilled water
        is_a: ENVO_00002006
        meaning: 'ENVO:00003065'
      ENVO_00003097:
        title: bore hole water
        is_a: ENVO_00002006
        meaning: 'ENVO:00003097'
      ENVO_00005791:
        title: sterile water
        description: Sterile water is water which does not contain lliving organisms.
        is_a: ENVO_00002006
        meaning: 'ENVO:00005791'
      ENVO_00005792:
        title: underground water
        description: Water which has physicochemical properties determined by processes
          which occur beneath the planetary crust.
        is_a: ENVO_00002006
        meaning: 'ENVO:00005792'
      ENVO_01001004:
        title: groundwater
        description: Underground water which is located in pore spaces found in rock
          or unconsolidated deposits such as soil, clay, or gravel.
        is_a: ENVO_00005792
        meaning: 'ENVO:01001004'
      ENVO_00005793:
        title: muddy water
        is_a: ENVO_00002006
        meaning: 'ENVO:00005793'
      ENVO_01000173:
        title: anoxic water
        description: Water which lacks dissolved oxygen.
        is_a: ENVO_00002006
        meaning: 'ENVO:01000173'
      ENVO_01000872:
        title: ballast water
        description: Ballast water is water contained in the ballast tanks of sea-going
          vessels.
        is_a: ENVO_00002006
        meaning: 'ENVO:01000872'
      ENVO_01000940:
        title: fissure water
        description: Water which is partially contained within a fissure or a geological
          fracture.
        is_a: ENVO_00002006
        meaning: 'ENVO:01000940'
      ENVO_01001063:
        title: oxic water
        description: Water which has an appreciable concentration of dissolved oxygen.
        is_a: ENVO_00002006
        meaning: 'ENVO:01001063'
      ENVO_01001064:
        title: hypoxic water
        description: Water which has low levels of dissolved oxygen.
        is_a: ENVO_00002006
        meaning: 'ENVO:01001064'
      ENVO_01001267:
        title: stormwater
        description: Water which accumulates on a solid surface during precipitation
          events and snow/ice melt.
        is_a: ENVO_00002006
        meaning: 'ENVO:01001267'
      ENVO_01001268:
        title: urban stormwater
        description: Stormwater which accumulates in an urban ecosystem.
        is_a: ENVO_01001267
        meaning: 'ENVO:01001268'
      ENVO_01001270:
        title: rural stormwater
        description: Stormwater which accumulates in a rural ecosystem.
        is_a: ENVO_01001267
        meaning: 'ENVO:01001270'
      ENVO_03501370:
        title: stagnant water
        description: A liquid water which has no current or flow and is susceptible
          to contamination by pathogens or pathogenic vectors.
        is_a: ENVO_00002006
        meaning: 'ENVO:03501370'
      ENVO_03600002:
        title: cooling water
        description: Liquid water which is a participant in a water cooling process.
        is_a: ENVO_00002006
        meaning: 'ENVO:03600002'
      ENVO_03600009:
        title: interstitial water
        description: Liquid water which occurs naturally within the pores of rocks
          and sediments.
        is_a: ENVO_00002006
        meaning: 'ENVO:03600009'
      ENVO_03600042:
        title: marine lake water
        description: Liquid water which is either part of or was removed from a marine
          lake.
        is_a: ENVO_00002006
        meaning: 'ENVO:03600042'
      ENVO_03600065:
        title: spring water
        description: Water which comes from a spring.
        is_a: ENVO_00002006
        meaning: 'ENVO:03600065'
      ENVO_06105211:
        title: runoff
        description: Liquid water which 1) flows over land and 2) is not absorbed
          or retained by the materials if flows over or through.
        is_a: ENVO_00002006
        meaning: 'ENVO:06105211'
      ENVO_06105238:
        title: residual water in soil
        description: Liquid water which is present in soils as discontinuous volumnes
          of water in contact with solid and gaseous components of the soil.
        is_a: ENVO_00002006
        meaning: 'ENVO:06105238'
      ENVO_06105268:
        title: treated wastewater
        description: Waste water which was converted into an effluent that can be
          either returned to the water cycle with minimal environmental issues or
          reused.
        is_a: ENVO_00002006
        meaning: 'ENVO:06105268'
      ENVO_06105269:
        title: desalinated water
        description: Saline water from which minerals have been removed to produce
          fresh water suitable for human consumption or irrigation.
        is_a: ENVO_00002006
        meaning: 'ENVO:06105269'
      ENVO_03510065:
        title: colorant fluid
        description: A liquid environmental material which 1) contains at least one
          substance which can act as a chemical colorant.
        is_a: ENVO_01000815
        meaning: 'ENVO:03510065'
      ENVO_01000231:
        title: lava
        description: Lava is a mixture of molten or semi-molten rock, volatiles, and
          solids which has extruded beyond a planetary crust.
        is_a: ENVO_02000140
        meaning: 'ENVO:01000231'
      ENVO_01000232:
        title: felsic lava
        description: "Felsic lava is lava which is high in silica (> 69 percent by\
          \ weight), aluminium, potassium, sodium, and calcium, forming a polymerized\
          \ liquid rich in feldspar and quartz. Felsic lava has a  higher viscosity\
          \ than other magma types. Felsic magmas can erupt at temperatures as low\
          \ as 650 to 750 \xB0C. Unusually hot (>950 \xB0C) rhyolite lavas, however,\
          \ may flow for distances of many tens of kilometres"
        is_a: ENVO_01000231
        meaning: 'ENVO:01000232'
      ENVO_01000233:
        title: intermediate lava
        description: Intermediate lava is lava which, relative to felsic lava, is
          lower in aluminium and silica (between 52 and 63 percent by weight), and
          usually somewhat richer in magnesium and iron. The temperature of intermediate
          lava ranges from 750 to 950 degrees Celsius, destroying polymerized bonds
          and promoting more fluid behaviour relative to felsic lavas and also a greater
          tendency to form phenocrysts. Higher iron and magnesium tends to manifest
          as a darker groundmass, and also occasionally amphibole or pyroxene phenocrysts.
        is_a: ENVO_01000231
        meaning: 'ENVO:01000233'
      ENVO_01000234:
        title: mafic lava
        description: Mafic lava is lava which, relative to other lava types other
          than ultramafic lava, has a  high ferromagnesian content and low aluminium
          and silica content, with silca making up between 45 and 52 percent of its
          weight.
        is_a: ENVO_01000231
        meaning: 'ENVO:01000234'
      ENVO_01000235:
        title: ultramafic lava
        description: Lava which, relative to other lava types, has very high magnesium
          oxide content and less than 45 percent silica by weight.
        is_a: ENVO_01000231
        meaning: 'ENVO:01000235'
      ENVO_01000444:
        title: dacitic lava
        description: Lava which is high in silica and low in alkali metal oxides.
        is_a: ENVO_01000231
        meaning: 'ENVO:01000444'
      ENVO_01000648:
        title: magma
        description: Magma is a mixture of molten or semi-molten rock, volatiles,
          and solids that is found beneath the uppermost solid layer of a planetary
          body. Besides molten rock, magma may also contain suspended crystals, dissolved
          gas and sometimes gas bubbles.
        is_a: ENVO_02000140
        meaning: 'ENVO:01000648'
      ENVO_01000798:
        title: plasma
        description: A material entity which is composed of a volume of unbound positive
          and negative particles in roughly equal numbers, conducts electricity, and
          possesses internal magnetic fields.
        is_a: ENVO_02000140
        meaning: 'ENVO:01000798'
      ENVO_03600007:
        title: formation fluid
        description: A fluid environmental material which is contained in geologic
          formations naturally.
        is_a: ENVO_02000140
        meaning: 'ENVO:03600007'
      ENVO_03600082:
        title: crustal fluid
        description: Fluid environmental material which is present in the continental
          crust and dictates the nature and extent of crustal deformation.
        is_a: ENVO_02000140
        meaning: 'ENVO:03600082'
      ENVO_01000637:
        title: outer space
        description: Outer space is a hard vacuum containing a low density of particles,
          predominantly a plasma of hydrogen and helium as well as electromagnetic
          radiation, magnetic fields, neutrinos, dust and cosmic rays that exists
          between celestial bodies.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000637'
      ENVO_01000575:
        title: wax
        description: A wax is an environmental material which is primarily composed
          of lipids or other organic compounds that consist of long alkyl chains.
          Waxes are are malleable near ambient temperatures and melt at approximately
          45 degrees Celsius.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000575'
      ENVO_02000117:
        title: natural wax
        description: A wax that is naturally synthesized by a plant or animal.
        is_a: ENVO_01000575
        meaning: 'ENVO:02000117'
      ENVO_02000118:
        title: paraffin wax
        description: A white or colourless soft solid derivable from petroleum, coal
          or oil shale, that consists of a mixture of hydrocarbon molecules containing
          between twenty and forty carbon atoms.
        is_a: ENVO_01000575
        meaning: 'ENVO:02000118'
      ENVO_01000939:
        title: time crystal
        description: An open system in non-equilibrium with its environment that exhibits
          time translation symmetry breaking.
        is_a: ENVO_00010483
        meaning: 'ENVO:01000939'
      ENVO_01001069:
        title: metallic material
        description: A material which is composed primarily of one or more pure metals
          and which shows their properties.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001069'
      ENVO_01001154:
        title: volatile astrogeological material
        description: A material which is composed primarily of chemical elements and
          compounds with relatively low boiling points, equilibrium condensation temperatures
          below 1300 Kelvin, and which are part of the crust or atmosphere of a moon
          or planet.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001154'
      ENVO_01001155:
        title: astrogeological gas
        description: An astrogeological volatile which is composed primarily of chemical
          compounds with boiling points around those of hydrogen and helium.
        is_a: ENVO_01001154
        meaning: 'ENVO:01001155'
      ENVO_01001126:
        title: astrogeological ice
        description: An astrogeological volatile which is composed primarily of chemical
          compounds with freezing points above an approximate threshold of 100 Kelvin.
        is_a: ENVO_01001154
        meaning: 'ENVO:01001126'
      ENVO_01001156:
        title: refractory astrogeological material
        description: A material which is composed primarily of chemical elements and
          compounds which have equilibrium condensation temperatures above approximately
          1300 Kelvin and which are part of the crust or atmosphere of a moon or planet.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001156'
      ENVO_01001202:
        title: alluvium
        description: Soil or sediment which has been eroded and influenced by flowing
          water and redeposited in a non-marine setting.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001202'
      ENVO_01001560:
        title: colloidal suspension
        description: An environmental material which is primarily composed of a dispersed
          phase of insoluable particles, approximately between 1 nanometer and 1 micrometer
          in maximum dimension, distributed throughout a material acting as a medium
          of suspension.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001560'
      ENVO_01001644:
        title: material primarily composed of biogenic carbonates
        is_a: ENVO_00010483
        meaning: 'ENVO:01001644'
      ENVO_01001649:
        title: heavy fraction material
        description: An environmental material which is denser than bromoform.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001649'
      ENVO_01001650:
        title: light fraction material
        description: An environmental material which is less dense than bromoform.
        is_a: ENVO_00010483
        meaning: 'ENVO:01001650'
      ENVO_02000004:
        title: nesting material
        description: Nesting material is an animal habitation consisting of matierals
          used to cushion, insulate and protect the young of the organism. The adult
          will use the material to form a protective structure to house and raise
          their young. Nests are built primarily by birds, but also by mammals, fish,
          insects and reptiles.
        is_a: ENVO_00010483
        meaning: 'ENVO:02000004'
      ENVO_03000076:
        title: slush ice
        description: A slurry of frazil, snow, and liquid water.
        is_a: ENVO_00010483
        meaning: 'ENVO:03000076'
      ENVO_03501259:
        title: litter
        description: Environmental material consisting of waste products that have
          been discarded at an unsuitable location.
        is_a: ENVO_00010483
        meaning: 'ENVO:03501259'
      ENVO_03501303:
        title: natural-based polymer
        description: Macromolecules that are obtained naturally from plants or animals.
        is_a: ENVO_00010483
        meaning: 'ENVO:03501303'
      ENVO_03501306:
        title: mylar
        description: A polyester film made from stretched polyethylene terephthalate
          (PET).
        is_a: ENVO_00010483
        meaning: 'ENVO:03501306'
      ENVO_03510015:
        title: xanthan gum
        description: A polysaccharide that functions as an emulsifier, stabilizer,
          and thickener in mixtures.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510015'
      ENVO_03510016:
        title: tragacanth
        description: A naturally occurring plant-based gum, which functions as a viscous,
          odorless, tasteless, water-soluble mixture of polysaccharides that absorbs
          water to become a gel/paste.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510016'
      ENVO_03510018:
        title: resin
        description: A solid or highly viscous plant or synthetic based substance
          that is typically convertible into polymers.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510018'
      ENVO_03510023:
        title: shellac
        description: A resin secreted by the female lac bug, which is dissolved in
          alcohol to be used as a brush-on colorant, food glaze, and wood finish.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510023'
      ENVO_03510037:
        title: radioactive material
        description: Any material containing unstable atoms that emit ionizing radiation
          as it decays.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510037'
      ENVO_03510038:
        title: volume of cyanoacrylate
        description: An environmental material which is primarily composed of cyanoacrolate.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510038'
      ENVO_03510064:
        title: emissions from petroleum combustion
        description: An environmental material which is composed primarily of gases
          and particles produced by the combustion of petroleum fuels.
        is_a: ENVO_00010483
        meaning: 'ENVO:03510064'
      ENVO_03600013:
        title: bituminous sand
        description: An environmental material which consists of either loose sands
          or partially consolidated sandstone, containing a naturally occurring mixture
          of sand, clay, and water, soaked with a dense and extremely viscous form
          of petroleum.
        is_a: ENVO_00010483
        meaning: 'ENVO:03600013'
      ENVO_03600017:
        title: slurry
        description: An environmental material which is composed of insoluble solid
          particles suspended in a liquid.
        is_a: ENVO_00010483
        meaning: 'ENVO:03600017'
      FOODON_00002403:
        title: food material
        description: Any substance that can be consumed by an organism to satisfy
          nutritional or other health needs, or to provide a social or organoleptic
          food experience
        is_a: ENVO_00010483
        meaning: 'FOODON:00002403'
      ENVO_02000047:
        title: animal feed
        description: Food material which can be used to meet nutritional requirements
          of animals, particularly livestock such as cattle, goats, sheep, horses,
          chickens and pigs.
        is_a: FOODON_00002403
        meaning: 'ENVO:02000047'
      ENVO_02000048:
        title: contaminated animal feed
        description: Contaminated animal feed is an animal feed that has become contaminated
          with or come contact with microorganisms or toxic chemicals.
        is_a: ENVO_02000047
        meaning: 'ENVO:02000048'
      ENVO_02000055:
        title: plant feed
        description: Food material which can be used to meet nutritional requirements
          of plants.
        is_a: FOODON_00002403
        meaning: 'ENVO:02000055'
      ENVO_02000054:
        title: bone meal
        description: A mixture of crushed and coarsely ground bones that is used as
          an organic fertilizer for plants and formerly in animal feed.
        is_a: ENVO_02000055
        meaning: 'ENVO:02000054'
      FOODON_00001002:
        title: food product
        description: Food material for humans and animals which is processed with
          the intention that it be consumable as a whole or added to other food products.
        is_a: FOODON_00002403
        meaning: 'FOODON:00001002'
      FOODON_00001133:
        title: condiment
        description: A relish, sauce, or seasoning  added to food to impart a particular
          flavour or to complement the dish.
        is_a: FOODON_00001002
        meaning: 'FOODON:00001133'
      FOODON_00001073:
        title: vinegar food product
        description: A liquid produced from the fermentation of ethanol in a process
          that yields its key ingredient, acetic acid.
        is_a: FOODON_00001133
        meaning: 'FOODON:00001073'
      FOODON_00001919:
        title: grain based vinegar food product
        is_a: FOODON_00001073
        meaning: 'FOODON:00001919'
      FOODON_00001074:
        title: barley malt vinegar
        description: Vinegar is made by malting barley, causing the starch in the
          grain to turn to maltose.
        is_a: FOODON_00001919
        meaning: 'FOODON:00001074'
      FOODON_00001613:
        title: apple vinegar food product
        is_a: FOODON_00001073
        meaning: 'FOODON:00001613'
      FOODON_00001083:
        title: sugar condiment
        is_a: FOODON_00001133
        meaning: 'FOODON:00001083'
      FOODON_03420156:
        title: brown sugar
        description: Soft sugar whose crystals are covered by a film of refined dark
          syrup that imparts color, flavor, and moisture.
        is_a: FOODON_00001083
        meaning: 'FOODON:03420156'
      FOODON_00002300:
        title: sweetener
        is_a: FOODON_00001133
        meaning: 'FOODON:00002300'
      FOODON_00001178:
        title: honey food product
        is_a: FOODON_00002300
        meaning: 'FOODON:00001178'
      FOODON_00002450:
        title: multi-component honey product
        is_a: FOODON_00001178
        meaning: 'FOODON:00002450'
      FOODON_03305536:
        title: honey blend table syrup
        is_a: FOODON_00002450
        meaning: 'FOODON:03305536'
      FOODON_00002157:
        title: plant sweetener
        is_a: FOODON_00002300
        meaning: 'FOODON:00002157'
      FOODON_03316271:
        title: sugar product
        is_a: FOODON_00002157
        meaning: 'FOODON:03316271'
      FOODON_03307345:
        title: sugar (refined)
        is_a: FOODON_03316271
        meaning: 'FOODON:03307345'
      FOODON_03301073:
        title: sugar (granulated)
        is_a: FOODON_03307345
        meaning: 'FOODON:03301073'
      FOODON_00001290:
        title: salad dressing
        description: A sauce for a salad.
        is_a: FOODON_00001133
        meaning: 'FOODON:00001290'
      FOODON_00001231:
        title: creamy salad dressing
        description: A salad dressing that is usually mayonnaise-based, but which
          may also contain yogurt, sour cream, or creme fraiche.
        is_a: FOODON_00001290
        meaning: 'FOODON:00001231'
      FOODON_00001234:
        title: mayonnaise food product
        description: A stable emulsion of oil, and vinegar or lemon juice, with many
          options for embellishment with other herbs and spices. Egg yolk is the traditional
          emulsifier.
        is_a: FOODON_00001231
        meaning: 'FOODON:00001234'
      FOODON_00001232:
        title: vinaigrette dressing food product
        description: A salad dressing that is an emulsion of a vegetable oil and vinegar,
          often flavored with herbs, spices, and other ingredients.
        is_a: FOODON_00001290
        meaning: 'FOODON:00001232'
      FOODON_00002262:
        title: soybean condiment
        is_a: FOODON_00001133
        meaning: 'FOODON:00002262'
      FOODON_00001235:
        title: soy sauce food product
        description: A condiment produced by fermenting soybeans with Aspergillus
          oryzae and Aspergillus soyae molds  along with roasted grain, water, and
          salt.
        is_a: FOODON_00002262
        meaning: 'FOODON:00001235'
      FOODON_00001610:
        title: apple condiment
        is_a: FOODON_00001133
        meaning: 'FOODON:00001610'
      FOODON_00002501:
        title: multi-component food
        description: A food product consisting of food material derived from ingredients
          sourced from multiple organisms.
        is_a: FOODON_00001002
        meaning: 'FOODON:00002501'
      FOODON_00001258:
        title: food (fermented)
        description: Food material which has been fermented.
        is_a: FOODON_00002501
        meaning: 'FOODON:00001258'
      FOODON_00001053:
        title: fermented dairy food product
        is_a: FOODON_00001258
        meaning: 'FOODON:00001053'
      FOODON_00001014:
        title: yogurt food product
        description: A dairy product produced by bacterial fermentation of milk.
        is_a: FOODON_00001053
        meaning: 'FOODON:00001014'
      FOODON_00001017:
        title: commercial yogurt
        is_a: FOODON_00001014
        meaning: 'FOODON:00001017'
      FOODON_03303909:
