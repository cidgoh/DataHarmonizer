        description: A hospital unit facility which houses patients ready to leave
          the hospital facility.
        is_a: ENVO_03501137
        meaning: 'ENVO:03501143'
      ENVO_03501144:
        title: emergency unit facility
        description: A hospital unit facility which is used to provide emergency medicine
          services.
