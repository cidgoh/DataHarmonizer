        description: A room in an airport where en-route passengers can wait between
          flights..
        is_a: ENVO_01000426
        meaning: 'ENVO:03501125'
      ENVO_03501128:
        title: conference room
        description: A room which accommodates conferences.
        is_a: ENVO_01000426
        meaning: 'ENVO:03501128'
      ENVO_03501145:
