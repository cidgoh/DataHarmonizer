      ENVO_01000983:
        title: technosphere
        description: A part of an astronomical body which includes, as parts, all
          the entities which have been constructed or manufactured by humans or their
          technology and which are within the gravitational sphere of influence of
          that body.
        is_a: ENVO_01000813
        meaning: 'ENVO:01000983'
      ENVO_01001483:
        title: surface of an astronomical body
        description: A surface layer where the solid or liquid material of an astronomical
          body comes into contact with an atmosphere or outer space.
        is_a: ENVO_01000813
        meaning: 'ENVO:01001483'
      ENVO_00002144:
        title: cave wall
        description: A solid surface layer which 1)  forms part of the boundary between
          the cavity of a cave and its solid container and 2) is roughtly perpendicular
          to the cave floor.
        is_a: ENVO_01001483
        meaning: 'ENVO:00002144'
      ENVO_01000019:
        title: cave floor
        description: A solid surface layer which 1) forms part of the boundary between
          the cavity of a cave and its solid container and 2)  is the closest solid
          boundary to the gravitational centre of the astronomical body of which the
          cave is a part.
        is_a: ENVO_01001483
        meaning: 'ENVO:01000019'
      ENVO_00000105:
        title: lake surface
        is_a: ENVO_01001483
        meaning: 'ENVO:00000105'
      ENVO_01000296:
        title: dry lake bed
        description: A lake bed which is dry. That is, the bed of a dry lake.
        is_a: ENVO_01001483
        meaning: 'ENVO:01000296'
      ENVO_00000196:
        title: alkaline flat
        description: A dry lakebed consisting of fine-grained sediments infused with
          alkali salts. Generally the shore or bed of an endorheic lake.
        is_a: ENVO_01000296
        meaning: 'ENVO:00000196'
      ENVO_00000151:
        title: sabkha
        description: An alkaline flat, in the context of a marine environment.
        is_a: ENVO_00000196
        meaning: 'ENVO:00000151'
      ENVO_00000271:
        title: chott
        description: A dry (salt) lake in the Saharan area of Africa that stays dry
          in the summer, but receive some water in the winter. This water may come
          as a groundwater discharge.
        is_a: ENVO_00000196
        meaning: 'ENVO:00000271'
      ENVO_00000279:
        title: saline pan
        description: A flat expanse of ground covered with salt and other minerals,
          usually shining white under the sun. A salt pan is formed where water pools.
          A saline pan would be a lake or a pond if it were located in a climate where
          the rate of water evaporation were not faster than the rate of water precipitation,
          i.e., if it were not in a desert. If the water is unable to drain into the
          ground, it remains on the surface until it evaporates, leaving behind whatever
          minerals were dissolved. Over thousands of years, the minerals (usually
          salts) accumulate on the surface.
        is_a: ENVO_01000296
        meaning: 'ENVO:00000279'
      ENVO_00000501:
        title: submerged bed
        description: The portion of the ground surface which lies below water.
        is_a: ENVO_01001483
        meaning: 'ENVO:00000501'
      ENVO_00000268:
        title: lake bed
        description: The ground surface that lies beneath a lake.
        is_a: ENVO_00000501
        meaning: 'ENVO:00000268'
      ENVO_00000383:
