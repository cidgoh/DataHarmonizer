        description: A hatchery in which the eggs of fish are hatched under artificial
          conditions.
        is_a: ENVO_01001873
        meaning: 'ENVO:00000295'
      ENVO_01001874:
        title: poultry hatchery
        description: A hatchery in which the eggs of poultry are hatched under artificial
          conditions.
        is_a: ENVO_01001873
        meaning: 'ENVO:01001874'
      ENVO_00000464:
