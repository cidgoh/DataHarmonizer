enums:
  envo:
    permissible_values:
      GO_0008150:
        title: biological_process
        description: A biological process is the execution of a genetically-encoded
          biological module or program. It consists of all the steps required to achieve
          the specific biological objective of the module. A biological process is
          accomplished by a particular set of molecular functions carried out by specific
          gene products (or macromolecular complexes), often in a highly regulated
          manner and in a particular temporal sequence.
        meaning: 'GO:0008150'
      ENVO_01001168:
        title: ecosystem fragmentation process
        description: A process during which one or more parts of an ecosystem become
          causally isolated such that the direct flow or exchange of materials, resources,
          and energy between a given fragment and the remainder of the original system
          is severely curtailed or entirely halted.
        is_a: GO_0008150
        meaning: 'ENVO:01001168'
      ENVO_01001175:
        title: habitat fragmentation process
        description: An ecosystem fragmentation process during which discontinuities
          emerge in the habitats of one or more ecological populations.
        is_a: ENVO_01001168
        meaning: 'ENVO:01001175'
      ENVO_01001205:
        title: lithification
        description: A process during which sediments compact under pressure, expel
          connate fluids, and gradually become solid sedimentary rock.
        is_a: GO_0008150
        meaning: 'ENVO:01001205'
      ENVO_01001498:
        title: thermokarst formation process
        description: A process by which landforms are formed from the thawing of ice-rich
          permafrost or the melting of massive ground ice.
        is_a: GO_0008150
        meaning: 'ENVO:01001498'
      ENVO_01001617:
        title: snow accumulation process
        description: A material accumulation process during which the mass of snow
          on a surface increases.
        is_a: GO_0008150
        meaning: 'ENVO:01001617'
      ENVO_03000104:
        title: snow drift formation
        description: An accumulation process during which a powdery snow carried on
          the wind settles on a solid surface, forming a mound.
        is_a: ENVO_01001617
        meaning: 'ENVO:03000104'
      ENVO_06105014:
        title: biodegradation
        description: A biological process during which a material entity is broken
          down.
        is_a: GO_0008150
        meaning: 'ENVO:06105014'
      ENVO_06105015:
        title: biodegradation of plastic
        description: A biodegradation process during which plastic is broken down.
        is_a: ENVO_06105014
        meaning: 'ENVO:06105015'
