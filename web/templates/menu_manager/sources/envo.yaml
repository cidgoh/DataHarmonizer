      BFO_0000001:
        title: entity
        meaning: 'BFO:0000001'
      BFO_0000002:
        title: continuant
        description: An entity that exists in full at any time in which it exists
          at all, persists through time while maintaining its identity and has no
          temporal parts.
        is_a: BFO_0000001
        meaning: 'BFO:0000002'
      BFO_0000004:
        title: independent continuant
        description: 'b is an independent continuant = Def. b is a continuant which
          is such that there is no c and no t such that b s-depends_on c at t. (axiom
          label in BFO2 Reference: [017-002])'
        is_a: BFO_0000002
        meaning: 'BFO:0000004'
      BFO_0000040:
        title: material entity
        description: An independent continuant that is spatially extended whose identity
          is independent of that of other entities and can be maintained through time.
        is_a: BFO_0000004
        meaning: 'BFO:0000040'
      OBI_0100026:
        title: organism
        description: A material entity that is an individual living system, such as
          animal, plant, bacteria or virus, that is capable of replicating or reproducing,
          growth and maintenance in the right environment. An organism may be unicellular
          or made up, like humans, of many billions of cells divided into specialized
          tissues and organs.
        is_a: BFO_0000040
        meaning: 'OBI:0100026'
      PCO_0000001:
        title: population of organisms
        description: A collection of organisms, all of the same species, that live
          in the same place.
        is_a: OBI_0100026
        meaning: 'PCO:0000001'
