        is_a: ENVO_01001682
        meaning: 'ENVO:01001711'
      ENVO_01001685:
        title: bubble
        description: A mass of gas which is separated from its surroundings by either
          1) a thin liquid layer or 2) a physical or compositional discontinuity.
        is_a: ENVO_01001689
        meaning: 'ENVO:01001685'
      ENVO_01001692:
