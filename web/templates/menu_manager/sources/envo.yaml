        description: A harbor constructed by human agency.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000464'
      ENVO_03501129:
        title: educational facility
        description: A human construction in which people are educated.
        is_a: ENVO_00000070
        meaning: 'ENVO:03501129'
      ENVO_00000467:
        title: university campus
        description: An area of land on which a college or university and related
          institutional buildings are situated.
        is_a: ENVO_03501129
        meaning: 'ENVO:00000467'
      ENVO_03501130:
        title: school building
        description: An institutional building in which students are educated.
        is_a: ENVO_03501129
        meaning: 'ENVO:03501130'
      ENVO_00000469:
        title: research facility
        description: A facility, permanent or temporary, on land, in air, space or
          water, where scientific research or measurements can be undertaken.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000469'
      ENVO_00003919:
        title: research station
        description: A building or collection of co-located buildings constructed
          for the purpose of undertaking scientific research.
        is_a: ENVO_00000469
        meaning: 'ENVO:00003919'
      ENVO_03501119:
        title: agricultural experimental station
        description: A research station in which food production and/or agribusinness
          research is performed.
        is_a: ENVO_00003919
        meaning: 'ENVO:03501119'
      ENVO_00011764:
        title: ocean time series station
        description: A research facility consisting of instruments that measure the
          properties of the oceans over time. Usually of at least approximately fixed
          location.
        is_a: ENVO_00000469
        meaning: 'ENVO:00011764'
      ENVO_01001406:
        title: laboratory facility
        description: A research facility in which systems of manufactured products
          control internal conditions and in which scientific or technological research,
          experiments, and measurement may be performed.
        is_a: ENVO_00000469
        meaning: 'ENVO:01001406'
      ENVO_00000565:
        title: sports facility
        description: A building or region where sports activities can be carried out.
        is_a: ENVO_00000070
        meaning: 'ENVO:00000565'
      ENVO_00000566:
        title: winter sports facility
        description: A sports facility constructed for skiing and allied sports that
          require snow and/or ice.
        is_a: ENVO_00000565
        meaning: 'ENVO:00000566'
      ENVO_03500003:
        title: public sports field
        description: A sports facility which has been constructed for sports that
          require large outdoor spaces and is owned by a governmental or state entity
          and which is accessible by its citizenry (i.e. the public).
        is_a: ENVO_00000565
        meaning: 'ENVO:03500003'
      ENVO_03501281:
        title: bowling alley
        description: A sports facility where bowling is played.
        is_a: ENVO_00000565
        meaning: 'ENVO:03501281'
      ENVO_03501134:
