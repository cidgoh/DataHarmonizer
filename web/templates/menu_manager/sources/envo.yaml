        meaning: 'ENVO:01000430'
      ENVO_01001792:
        title: tropical broadleaf forest
        description: A broadleaf forest which is subject to tropical climate conditions.
        is_a: ENVO_01000430
        meaning: 'ENVO:01001792'
      ENVO_01001799:
        title: tropical dry broadleaf forest
        description: A tropical broadleaf forest which 1) s subject to a year-round
          warm climate 2) may receive several hundred centimeters or rain per year
          and 3) are subject to long dry seasons which last several months.
        is_a: ENVO_01001792
        meaning: 'ENVO:01001799'
      ENVO_01001800:
        title: tropical moist broadleaf forest
        description: A tropical broadleaf forest which 1) has low variability in annual
          temperature, 2) high levels of rainfall (>200 centimeter annually), and
          3) has tree communities dominated by semi-evergreen and evergreen species.
        is_a: ENVO_01001792
        meaning: 'ENVO:01001800'
      ENVO_01000384:
        title: tropical lowland evergreen broadleaf rain forest
        description: A broadleaf forest which is subject to tropical climate patterns
          with high rainfall, is located in a lowland area, and is dominated by plants
          which retain their leaves throughout the year.
        is_a: ENVO_01001800
        meaning: 'ENVO:01000384'
      ENVO_01000391:
