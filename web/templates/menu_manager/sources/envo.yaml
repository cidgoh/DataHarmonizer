          water flow.
        is_a: ENVO_00000501
        meaning: 'ENVO:00000383'
      ENVO_00000384:
        title: river bed
        description: The channel bottom of a river; the physical confine of the normal
          water flow.
        is_a: ENVO_00000383
        meaning: 'ENVO:00000384'
      ENVO_01001378:
