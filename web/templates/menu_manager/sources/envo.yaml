        meaning: 'PATO:0001903'
      PATO_0001904:
        title: circling direction
        description: "A directional quality inhering in a bearer by virtue of the\
          \ bearer's direction approximating the shape of a circle."
        is_a: PATO_0000039
        meaning: 'PATO:0001904'
      PATO_0045090:
        title: cardinal direction
        description: The four cardinal directions or cardinal points are the directions
          north, east, south, and west, commonly denoted by their initials, N, E,
          S, W. East and west are at right angles to north and south, with east being
          in the clockwise direction of rotation from north and west being directly
          opposite east.
        is_a: PATO_0000039
        meaning: 'PATO:0045090'
      PATO_0045091:
        title: north
        description: North is one of the four compass points or cardinal directions.
          It is the opposite of south and is perpendicular to east and west.
        is_a: PATO_0045090
        meaning: 'PATO:0045091'
      PATO_0045092:
        title: east
        description: East is one of the four cardinal directions or points of the
          compass. It is the opposite direction from west.
        is_a: PATO_0045090
        meaning: 'PATO:0045092'
      PATO_0045093:
        title: south
        description: South is one of the four cardinal directions or compass points.
          South is the polar opposite of north and is perpendicular to east and west.
        is_a: PATO_0045090
        meaning: 'PATO:0045093'
      PATO_0045094:
        title: west
        description: West is one of the four cardinal directions or points of the
          compass. It is the opposite direction from east.
        is_a: PATO_0045090
        meaning: 'PATO:0045094'
