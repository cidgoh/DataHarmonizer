      ENVO_01000276:
        title: ecoregion
        description: A large unit of land or water containing a geographically distinct
          assemblage of species, natural communities, and environmental conditions.
        is_a: ENVO_01001110
        meaning: 'ENVO:01000276'
      ENVO_01001570:
        title: terrestrial ecoregion
        description: An ecoregion which is located on a landmass.
        is_a: ENVO_01000276
        meaning: 'ENVO:01001570'
      ENVO_01000280:
        title: ecozone
        description: Ecozones delineate large areas of a planetary surface within
          which organisms have been evolving in relative isolation over long periods
          of time, separated from one another by geographic features, such as oceans,
          broad deserts, or high mountain ranges, that constitute barriers to migration.
        is_a: ENVO_01001110
        meaning: 'ENVO:01000280'
      ENVO_01001790:
        title: terrestrial ecosystem
        description: An ecosystem which primarily occurs on land.
        is_a: ENVO_01001110
        meaning: 'ENVO:01001790'
      ENVO_01001206:
        title: grassland ecosystem
        description: "An ecosystem in which grasses (Graminae) are the dominant form\
          \ of vegetation and determine the system's structure and dynamics."
        is_a: ENVO_01001790
        meaning: 'ENVO:01001206'
      ENVO_00000108:
        title: meadow ecosystem
        description: A grassland ecosystem which contains a variety of annual, biennial
          and perennial plants growing on rolling or flat terrain.
        is_a: ENVO_01001206
        meaning: 'ENVO:00000108'
      ENVO_01000449:
        title: wet meadow ecosystem
        description: A wet meadow is a type of wetland with soils that are saturated
          with water for part or all of the growing season.
        is_a: ENVO_00000108
        meaning: 'ENVO:01000449'
      ENVO_00000154:
        title: flood meadow ecosystem
        description: An area of grassland or pasture beside a river, subject to seasonal
          flooding.
        is_a: ENVO_01000449
        meaning: 'ENVO:00000154'
      ENVO_01001809:
