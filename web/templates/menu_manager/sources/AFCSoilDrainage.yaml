                  \ \xE0 \xE9lev\xE9e (5 \xE0 6 cm) dans la section de contr\xF4le\
                  \ et sont g\xE9n\xE9ralement de texture moyenne \xE0 fine. La pr\xE9\
                  cipitation est la principale source d\u2019eau dans les sols de\
