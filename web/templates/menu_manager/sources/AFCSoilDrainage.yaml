                  \ une forte pente. Les sols ont une tr\xE8s faible capacit\xE9 de\
                  \ r\xE9tention d\u2019eau disponible (g\xE9n\xE9ralement moins de\
                  \ 2,5 cm) dans la section de contr\xF4le et sont habituellement\
                  \ de texture grossi\xE8re, ou peu profonds, ou les deux. La source\
                  \ d\u2019eau est la pr\xE9cipitation."
              R:
                title: "Rapidement drain\xE9"
                description: "L\u2019eau est \xE9vacu\xE9e du sol rapidement par rapport\
                  \ \xE0 l\u2019apport. L\u2019eau en exc\xE8s s\u2019infiltre vers\
                  \ le bas si le mat\xE9riau sous-jacent est perm\xE9able. Un \xE9\
                  coulement souterrain peut se produire sur des pentes abruptes lors\
                  \ de fortes pluies. Les sols ont une faible capacit\xE9 de r\xE9\
                  tention d\u2019eau disponible (2,5 \xE0 4 cm) dans la section de\
                  \ contr\xF4le et sont g\xE9n\xE9ralement de texture grossi\xE8re,\
                  \ ou peu profonds, ou les deux. La source d\u2019eau est la pr\xE9\
