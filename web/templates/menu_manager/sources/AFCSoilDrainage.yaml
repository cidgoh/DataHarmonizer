                  \ une nappe perch\xE9e et que la pr\xE9cipitation d\xE9passe l\u2019\
                  \xE9vapotranspiration. Les sols pr\xE9sentent une large gamme de\
                  \ capacit\xE9s de r\xE9tention, de textures et de profondeurs, et\
                  \ sont soit gleyiques, soit organiques."
              '-':
