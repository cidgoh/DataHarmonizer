              W:
                title: "Bien drain\xE9"
                description: "L\u2019eau est \xE9vacu\xE9e du sol facilement mais\
                  \ non rapidement. L\u2019eau en exc\xE8s s\u2019infiltre facilement\
                  \ dans le mat\xE9riau perm\xE9able sous-jacent ou s\u2019\xE9coule\
                  \ lat\xE9ralement comme \xE9coulement souterrain. Les sols ont une\
                  \ capacit\xE9 de r\xE9tention d\u2019eau disponible interm\xE9diaire\
                  \ (4 \xE0 5 cm) dans la section de contr\xF4le, et sont g\xE9n\xE9\
