        title: fishing
        description: '"Fishing" defines the extent of the activities that should be
          regarded as fishing and include not only the harvesting or catching of fish
          but also any activity undertaken to search for, attract and locate fish
          prior to its being caught. "Fishing" is a general term; therefore it is
          recommended to use specific terms such as "commercial fishing", "experimental
          fishing", "sport fishing", etc. As an adjective is used for example: "fishing
          activity", "fishing boat".'
