  agrovoc:
    name: agrovoc
    title: AGROVOC Multilingual Thesaurus
    version: null
    content_type: OntologyAPI
    file_format: json
    description: AGROVOC is a multilingual, structured thesaurus coordinated by the
      Food and Agriculture Organization (FAO) of the United Nations since the early
      1980s. It acts as a controlled vocabulary covering all areas of interest to
      FAO, such as food, agriculture, fisheries, forestry, and the environment.
    reachable_from:
      api:
        agrovoc:
          type: sparql
      source_nodes:
        - 'agrovoc:c_26950'
      include_self: true
    prefixes:
      agrovoc: http://aims.fao.org/aos/agrovoc/
  AGROVOC_c_26950:
    title: fishing
    name: AGROVOC_c_26950
    version: null
    content_type: OntologyAPI
    file_format: json
    reachable_from:
      api:
        agrovoc:
          type: sparql
      source_nodes:
        - 'agrovoc:c_26950'
      include_self: true
    download_date: '2026-04-22'
    description: '"Fishing" defines the extent of the activities that should be regarded
      as fishing and include not only the harvesting or catching of fish but also
      any activity undertaken to search for, attract and locate fish prior to its
      being caught. "Fishing" is a general term; therefore it is recommended to use
      specific terms such as "commercial fishing", "experimental fishing", "sport
      fishing", etc. As an adjective is used for example: "fishing activity", "fishing
      boat".'
    prefixes:
      agrovoc: http://aims.fao.org/aos/agrovoc/
  AGROVOC_c_2808:
    title: farmland
    name: AGROVOC_c_2808
    version: null
    content_type: OntologyAPI
    file_format: json
    reachable_from:
      api:
        agrovoc:
          type: sparql
      source_nodes:
        - 'agrovoc:c_2808'
      include_self: true
    download_date: '2026-04-24'
    description: Land which is or can be used for agriculture without further clearing
      or draining; for forest land use <24843>
    prefixes:
      agrovoc: http://aims.fao.org/aos/agrovoc/
  envo:
    title: The Environment Ontology
    name: envo
    version: '2025-10-20'
    content_type: OWL
    file_format: owl
    reachable_from:
      source_ontology: https://purl.obolibrary.org/obo/envo.owl
    download_date: '2026-04-16'
    description: ENVO is an ontology which represents knowledge about environments,environmental
      processes, ecosystems, habitats, and related entities
    license: https://creativecommons.org/publicdomain/zero/1.0/
    prefixes:
      BFO: http://purl.obolibrary.org/obo/BFO_
      CHEBI: http://purl.obolibrary.org/obo/CHEBI_
      testing: http://purl.obolibrary.org/testing
