    description: "The Soil Name Table (SNT) describes the general physical and chemical\
      \ characteristics for all of the soils identified in a geographic region.  \n\
      Soil Order, Great Group and Subgroup are listed, along with attributes such\
      \ as mode of deposition, and drainage class."
