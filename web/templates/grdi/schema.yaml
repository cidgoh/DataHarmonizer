    name: taxonomic_identification_process
    slot_uri: GENEPIO:0100583
    title: taxonomic_identification_process
    any_of:
      - range: TaxonomicIdentificationProcessMenu
      - range: NullValueMenu
    recommended: true
    description: The type of planned process by which an organismal entity is associated with a taxon or taxa.
    comments:
