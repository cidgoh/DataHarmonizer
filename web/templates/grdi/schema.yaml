    todos:
      - <={today}
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:cult_isol_date
    comments:
      - Provide the date according to the ISO 8601 standard "YYYY-MM-DD", "YYYY-MM" or "YYYY".
    examples:
      - value: '2020-10-30'
  isolate_received_date:
    name: isolate_received_date
    slot_uri: GENEPIO:0100466
