    title: trimethoprim-sulfamethoxazole_measurement_sign
    any_of:
      - range: AntimicrobialMeasurementSignMenu
      - range: NullValueMenu
    required: true
    description: The qualifier associated with the antimicrobial resistance measurement
    exact_mappings:
      - NCBI_ANTIBIOGRAM:measurement_sign
    comments:
      - Select the comparator sign from the pick list provided. Use the Term Request System to request the addition of other signs if necessary.
    examples:
      - value: greater than (>) [GENEPIO:0001006]
  trimethoprimsulfamethoxazole_laboratory_typing_method:
    name: trimethoprimsulfamethoxazole_laboratory_typing_method
    title: trimethoprim-sulfamethoxazole_laboratory_typing_method
    any_of:
      - range: AntimicrobialLaboratoryTypingMethodMenu
      - range: NullValueMenu
    description: The general method used for antimicrobial susceptibility testing.
    exact_mappings:
      - NCBI_ANTIBIOGRAM:laboratory_typing_method
    comments:
      - Select a typing method from the pick list provided. Use the Term Request System to request the addition of other methods if necessary.
    examples:
      - value: Broth dilution [ARO:3004397]
  trimethoprimsulfamethoxazole_laboratory_typing_platform:
    name: trimethoprimsulfamethoxazole_laboratory_typing_platform
    title: trimethoprim-sulfamethoxazole_laboratory_typing_platform
    any_of:
      - range: AntimicrobialLaboratoryTypingPlatformMenu
      - range: NullValueMenu
    description: The brand/platform used for antimicrobial susceptibility testing.
    exact_mappings:
      - NCBI_ANTIBIOGRAM:laboratory_typing_platform
    comments:
      - Select a typing platform from the pick list provided. Use the Term Request System to request the addition of other platforms if necessary.
    examples:
      - value: Sensitire [ARO:3004402]
  trimethoprimsulfamethoxazole_laboratory_typing_platform_version:
    name: trimethoprimsulfamethoxazole_laboratory_typing_platform_version
    title: trimethoprim-sulfamethoxazole_laboratory_typing_platform_version
    range: WhitespaceMinimizedString
    description: The specific name and version of the plate, panel, or other platform used for antimicrobial susceptibility testing.
    comments:
      - Include any additional information about the antimicrobial susceptibility test such as the drug panel details.
    examples:
      - value: CMV3AGNF
  trimethoprimsulfamethoxazole_vendor_name:
    name: trimethoprimsulfamethoxazole_vendor_name
    title: trimethoprim-sulfamethoxazole_vendor_name
    any_of:
      - range: AntimicrobialVendorNameMenu
      - range: NullValueMenu
    description: The name of the vendor of the testing platform used.
    exact_mappings:
      - NCBI_ANTIBIOGRAM:vendor
    comments:
      - Provide the full name of the company (avoid abbreviations).
    examples:
      - value: Sensititre
  trimethoprimsulfamethoxazole_testing_standard:
    name: trimethoprimsulfamethoxazole_testing_standard
    title: trimethoprim-sulfamethoxazole_testing_standard
    any_of:
      - range: AntimicrobialTestingStandardMenu
      - range: NullValueMenu
    recommended: true
    description: The testing standard used for determination of resistance phenotype
    exact_mappings:
      - NCBI_ANTIBIOGRAM:testing_standard
    comments:
      - Select a testing standard from the pick list provided.
    examples:
      - value: Clinical Laboratory and Standards Institute (CLSI) [ARO:3004366]
  trimethoprimsulfamethoxazole_testing_standard_version:
    name: trimethoprimsulfamethoxazole_testing_standard_version
    title: trimethoprim-sulfamethoxazole_testing_standard_version
    range: WhitespaceMinimizedString
    description: The version number associated with the testing standard used for determination of antimicrobial resistance phenotype. If applicable, include a version number for the testing standard used.
    comments:
      - If applicable, include a version number for the testing standard used.
    examples:
      - value: M100
  trimethoprimsulfamethoxazole_testing_standard_details:
    name: trimethoprimsulfamethoxazole_testing_standard_details
    title: trimethoprim-sulfamethoxazole_testing_standard_details
    range: WhitespaceMinimizedString
    description: Additional details associated with the testing standard used for determination of antimicrobial resistance phenotype
    comments:
      - This information may include the year or location where the testing standard was published. If not applicable, leave blank.
    examples:
      - value: '27th ed. Wayne, PA: Clinical and Laboratory Standards Institute'
      - value: '2017.'
  trimethoprimsulfamethoxazole_susceptible_breakpoint:
    name: trimethoprimsulfamethoxazole_susceptible_breakpoint
    title: trimethoprim-sulfamethoxazole_susceptible_breakpoint
    range: WhitespaceMinimizedString
    description: The maximum measurement, in the units specified in the “antibiotic_measurement_units” field, for a sample to be considered “sensitive” to this antimicrobial.
    comments:
      - This field should only contain a number (either an integer or a number with decimals), since the “<=” qualifier is implied.
    examples:
      - value: '8'
  trimethoprimsulfamethoxazole_intermediate_breakpoint:
    name: trimethoprimsulfamethoxazole_intermediate_breakpoint
    title: trimethoprim-sulfamethoxazole_intermediate_breakpoint
    range: WhitespaceMinimizedString
    description: The intermediate measurement(s), in the units specified in the “AMR_measurement_units” field, where a sample would be considered to have an “intermediate” phenotype for this antimicrobial.
    examples:
      - value: '16'
  trimethoprimsulfamethoxazole_resistant_breakpoint:
    name: trimethoprimsulfamethoxazole_resistant_breakpoint
    title: trimethoprim-sulfamethoxazole_resistant_breakpoint
    range: WhitespaceMinimizedString
    description: The minimum measurement, in the units specified in the “antibiotic_measurement_units” field, for a sample to be considered “resistant” to this antimicrobial.
    comments:
      - This field should only contain a number (either an integer or a number with decimals), since the “>=” qualifier is implied.
    examples:
      - value: '32'
  authors:
    name: authors
    slot_uri: GENEPIO:0001517
    title: authors
    range: WhitespaceMinimizedString
    recommended: true
    description: Names of individuals contributing to the processes of sample collection, sequence generation, analysis, and data submission.
    comments:
      - Include the first and last names of all individuals that should be attributed, separated by a comma.
    examples:
      - value: Tejinder Singh, Fei Hu, Joe Blogs
  dataharmonizer_provenance:
    name: dataharmonizer_provenance
    slot_uri: GENEPIO:0001518
    title: DataHarmonizer provenance
    range: Provenance
    description: The DataHarmonizer software and template version provenance.
    comments:
      - The current software and template version information will be automatically generated in this field after the user utilizes the "validate" function. This information will be generated regardless as to whether the row is valid of not.
    examples:
      - value: DataHarmonizer v1.4.3, GRDI v1.0.0
