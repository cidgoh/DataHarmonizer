    range: WhitespaceMinimizedString
    description: The date on which the isolate was received by the laboratory.
    todos:
      - <={today}
    comments:
      - Provide the date according to the ISO 8601 standard "YYYY-MM-DD", "YYYY-MM" or "YYYY".
    examples:
      - value: '2020-11-15'
  organism:
    name: organism
    slot_uri: GENEPIO:0001191
    title: organism
    any_of:
      - range: OrganismMenu
      - range: NullValueMenu
    required: true
    description: Taxonomic name of the organism.
    multivalued: true
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:organism
      - NCBI_BIOSAMPLE_Enterics:organism
    comments:
      - 'Put the genus and species (and subspecies if applicable) of the bacteria, if known. The standardized term can be sourced from this look-up service: https://www.ebi.ac.uk/ols/ontologies/ncbitaxon. Note: If taxonomic identification was performed using metagenomic approaches, multiple organisms may be included. There is no need to list organisms detected as the result of noise in the data (only a few reads present). Only include organism names that you are confident are present. Also include the taxonomic mapping software and reference database(s) used.'
    examples:
      - value: Salmonella enterica subsp. enterica [NCBITaxon:59201]
