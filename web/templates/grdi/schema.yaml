  environmental_material:
    name: environmental_material
    slot_uri: GENEPIO:0001223
    title: environmental_material
    any_of:
      - range: EnvironmentalMaterialMenu
      - range: NullValueMenu
    recommended: true
    description: A substance obtained from the natural or man-made environment e.g. soil, water, sewage, door handle, bed handrail, face mask.
    multivalued: true
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:isolation_source
      - NCBI_BIOSAMPLE_Pathogen:environmental_material
      - NCBI_BIOSAMPLE_Enterics:isolation_source
    comments:
      - If applicable, select the standardized term and ontology ID for the environmental material from the picklist provided. Multiple values can be provided, separated by a semi-colon.
    examples:
      - value: Soil [ENVO:00001998]
      - value: Water [CHEBI:15377]
      - value: Wastewater [ENVO:00002001]
      - value: Broom [ENVO:03501377]
  environmental_material_constituent:
    name: environmental_material_constituent
    slot_uri: GENEPIO:0101197
