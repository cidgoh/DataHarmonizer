slots:
  specimen_sample_collector_sample_id:
    name: specimen_sample_collector_sample_id
    slot_uri: GENEPIO:0001123
    title: sample_collector_sample_ID
    range: WhitespaceMinimizedString
    required: true
    description: The user-defined name for the sample.
    identifier: true
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:sample_name
      - NCBI_BIOSAMPLE_Enterics:sample_name
      - NCBI_ANTIBIOGRAM:sample_name/biosample_accession
      - NCBI_SRA:sample_name
    comments:
      - The sample_ID should represent the identifier assigned to the sample at time of collection, for which all the descriptive information applies. If the original sample_ID is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: ABCD123
  alternative_sample_id:
    name: alternative_sample_id
    slot_uri: GENEPIO:0100427
    title: alternative_sample_ID
    range: WhitespaceMinimizedString
    required: true
    description: An alternative sample_ID assigned to the sample by another organization.
    comments:
      - "Alternative identifiers assigned to the sample should be tracked along with original IDs to establish chain of custody. Alternative sample IDs should be provided in the in a prescribed format which consists of the ID followed by square brackets (no space in between the ID and bracket) containing the short form of ID provider’s agency name i.e. ID[short organization code]. Agency short forms include the following:\nPublic Health Agency of Canada: PHAC\nCanadian Food Inspection Agency: CFIA\nAgriculture and Agri-Food Canada: AAFC\nFisheries and Oceans Canada: DFO\nEnvironment and Climate Change Canada: ECCC\nHealth Canada: HC \nMultiple identifiers can be provided and separated by semi-colons. If the information is unknown or cannot be provided, leave blank or provide a null value."
    examples:
      - value: ABCD1234[PHAC]
      - value: 12345rev[CFIA]
  sample_collected_by:
    name: sample_collected_by
    slot_uri: GENEPIO:0001153
    title: sample_collected_by
    any_of:
      - range: SampleCollectedByMenu
      - range: NullValueMenu
    required: true
    description: The name of the agency, organization or institution with which the sample collector is affiliated.
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:collected_by
      - NCBI_BIOSAMPLE_Enterics:collected_by
    comments:
      - Provide the name of the agency, organization or institution that collected the sample in full (avoid abbreviations). If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: Public Health Agency of Canada (PHAC) [GENEPIO:0100551]
  sample_collected_by_laboratory_name:
    name: sample_collected_by_laboratory_name
    slot_uri: GENEPIO:0100428
    title: sample_collected_by_laboratory_name
    range: WhitespaceMinimizedString
    description: The specific laboratory affiliation of the sample collector.
    comments:
      - Provide the name of the specific laboratory that collected the sample (avoid abbreviations). If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: Topp Lab
  sample_collection_project_name:
    name: sample_collection_project_name
    slot_uri: GENEPIO:0100429
    title: sample_collection_project_name
    range: WhitespaceMinimizedString
    description: The name of the project/initiative/program for which the sample was collected.
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:project_name
    comments:
      - Provide the name of the project and/or the project ID here. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: Watershed Project (HA-120)
  sample_plan_name:
    name: sample_plan_name
    slot_uri: GENEPIO:0100285
    title: sample_plan_name
    range: WhitespaceMinimizedString
    recommended: true
    description: The name of the study design for a surveillance project.
    comments:
      - Provide the name of the sample plan used for sample collection. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: National Microbiological Baseline Study in Broiler Chicken
  sample_plan_id:
    name: sample_plan_id
    slot_uri: GENEPIO:0100431
    title: sample_plan_ID
    range: WhitespaceMinimizedString
    recommended: true
    description: The identifier of the study design for a surveillance project.
    comments:
      - Provide the identifier of the sample plan used for sample collection. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: 2001_M205
  sample_collector_contact_name:
    name: sample_collector_contact_name
    slot_uri: GENEPIO:0100432
    title: sample_collector_contact_name
    range: WhitespaceMinimizedString
    description: The name or job title of the contact responsible for follow-up regarding the sample.
    comments:
      - Provide the name of an individual or their job title. As personnel turnover may render the contact's name obsolete, it is more preferable to provide a job title for ensuring accuracy of information and institutional memory. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: Enterics Lab Manager
  sample_collector_contact_email:
    name: sample_collector_contact_email
    slot_uri: GENEPIO:0001156
    title: sample_collector_contact_email
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    required: true
    description: The email address of the contact responsible for follow-up regarding the sample.
    comments:
      - Provide the email associated with the listed contact. As personnel turnover may render an individual's email obsolete, it is more preferable to provide an address for a position or lab, to ensure accuracy of information and institutional memory. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: johnnyblogs@lab.ca
  purpose_of_sampling:
    name: purpose_of_sampling
    slot_uri: GENEPIO:0001198
    title: purpose_of_sampling
    any_of:
      - range: PurposeOfSamplingMenu
      - range: NullValueMenu
    required: true
    description: The reason that the sample was collected.
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:purpose_of_sampling
      - NCBI_BIOSAMPLE_Enterics:purpose_of_sampling
    comments:
      - The reason a sample was collected may provide information about potential biases in sampling strategy. Provide the purpose of sampling from the picklist in the template. Most likely, the sample was collected for diagnostic testing. The reason why a sample was originally collected may differ from the reason why it was selected for sequencing, which should be indicated in the "purpose of sequencing" field.
    examples:
      - value: Surveillance [GENEPIO:0100004]
  presampling_activity:
    name: presampling_activity
    slot_uri: GENEPIO:0100433
    title: presampling_activity
    any_of:
      - range: PresamplingActivityMenu
      - range: NullValueMenu
    description: The experimental activities or variables that affected the sample collected.
    comments:
      - If there was experimental activity that would affect the sample prior to collection (this is different than sample processing), provide the experimental activities by selecting one or more values from the template pick list. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: Antimicrobial pre-treatment [GENEPIO:0100537]
  presampling_activity_details:
    name: presampling_activity_details
    slot_uri: GENEPIO:0100434
    title: presampling_activity_details
    range: WhitespaceMinimizedString
    description: The details of the experimental activities or variables that affected the sample collected.
    comments:
      - Briefly describe the experimental details using free text.
    examples:
      - value: Chicken feed containing X amount of novobiocin was fed to chickens for 72 hours prior to collection of litter.
  experimental_protocol:
    name: experimental_protocol
    slot_uri: GENEPIO:0101029
    title: experimental_protocol_field
    range: WhitespaceMinimizedString
    description: The name of the overarching experimental methodology that was used to process the biomaterial.
    comments:
      - Provide the name of the methodology used in your study. If available, provide a link to the protocol.
    examples:
      - value: OneHealth2024_protocol
  experimental_specimen_role_type:
    name: experimental_specimen_role_type
    slot_uri: GENEPIO:0100921
    title: experimental_specimen_role_type
    range: ExperimentalSpecimenRoleTypeMenu
    description: The type of role that the sample represents in the experiment.
    comments:
      - Samples can play different types of roles in experiments. A sample under study in one experiment may act as a control or be a replicate of another sample in another experiment. This field is used to distinguish samples under study from controls, replicates, etc.  If the sample acted as an experimental control or a replicate, select a role type from the picklist. If the sample was not a control, leave blank or select "Not Applicable".
    examples:
      - value: Positive experimental control [GENEPIO:0101018]
  specimen_processing:
    name: specimen_processing
    slot_uri: GENEPIO:0001253
    title: specimen_processing
    any_of:
      - range: SpecimenProcessingMenu
      - range: NullValueMenu
    description: The processing applied to samples post-collection, prior to further testing, characterization, or isolation procedures.
    comments:
      - Provide the sample processing information by selecting a value from the template pick list. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: Samples pooled [OBI:0600016]
  specimen_processing_details:
    name: specimen_processing_details
    slot_uri: GENEPIO:0100311
    title: specimen_processing_details
    range: WhitespaceMinimizedString
    description: The details of the processing applied to the sample during or after receiving the sample.
    comments:
      - Briefly describe the processes applied to the sample.
    examples:
      - value: 25 samples were pooled and further prepared as a single sample during library prep.
  nucleic_acid_extraction_method:
    name: nucleic_acid_extraction_method
    slot_uri: GENEPIO:0100939
    title: nucleic acid extraction method
    range: WhitespaceMinimizedString
    description: The process used to extract genomic material from a sample.
    comments:
      - Briefly describe the extraction method used.
    examples:
      - value: Direct wastewater RNA capture and purification via the "Sewage, Salt, Silica and Salmonella (4S)" method v4 found at https://www.protocols.io/view/v-4-direct-wastewater-rna-capture-and-purification-36wgq581ygk5/v4
  nucleic_acid_extraction_kit:
    name: nucleic_acid_extraction_kit
    slot_uri: GENEPIO:0100772
    title: nucleic acid extraction kit
    range: WhitespaceMinimizedString
    description: The kit used to extract genomic material from a sample
    comments:
      - Provide the name of the genomic extraction kit used.
    examples:
      - value: QIAamp PowerFecal Pro DNA Kit
  geo_loc_name_country:
    name: geo_loc_name_country
    slot_uri: GENEPIO:0001181
    title: geo_loc_name (country)
    any_of:
      - range: GeoLocNameCountryMenu
      - range: NullValueMenu
    required: true
    description: The country of origin of the sample.
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:geo_loc_name
      - NCBI_BIOSAMPLE_Pathogen:geo_loc_name%20%28country%29
      - NCBI_BIOSAMPLE_Enterics:geo_loc_name
    comments:
      - Provide the name of the country where the sample was collected. Use the controlled vocabulary provided in the template pick list.  If the information is unknown or cannot be provided, provide a null value.
    examples:
      - value: Canada [GAZ:00002560]
  geo_loc_name_state_province_territory_region:
    name: geo_loc_name_state_province_territory_region
    slot_uri: GENEPIO:0001185
    title: geo_loc_name (state/province/region)
    any_of:
      - range: GeoLocNameStateProvinceRegionMenu
      - range: NullValueMenu
    required: true
    description: The state/province/territory of origin of the sample.
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:geo_loc_name
      - NCBI_BIOSAMPLE_Pathogen:geo_loc_name%20%28state/province/region%29
      - NCBI_BIOSAMPLE_Enterics:geo_loc_name
    comments:
      - Provide the name of the province/state/region where the sample was collected.  If the information is unknown or cannot be provided, provide a null value.
    examples:
      - value: British Columbia [GAZ:00002562]
  geo_loc_name_site:
    name: geo_loc_name_site
    slot_uri: GENEPIO:0100436
    title: geo_loc_name (site)
    range: WhitespaceMinimizedString
    description: The name of a specific geographical location e.g. Credit River (rather than river).
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:geo_loc_name
      - NCBI_BIOSAMPLE_Pathogen:geo_loc_name%20%28site%29
    comments:
      - Provide the name of the specific geographical site using a specific noun (a word that names a certain place, thing).
    examples:
      - value: Credit River
  food_product_origin_geo_loc_name_country:
    name: food_product_origin_geo_loc_name_country
    slot_uri: GENEPIO:0100437
    title: food_product_origin_geo_loc_name (country)
    any_of:
      - range: GeoLocNameCountryMenu
      - range: NullValueMenu
    description: The country of origin of a food product.
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:food_origin
    comments:
      - If a food product was sampled and the food product was manufactured outside of Canada, provide the name of the country where the food product originated by selecting a value from the template pick list. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: United States of America [GAZ:00002459]
  host_origin_geo_loc_name_country:
    name: host_origin_geo_loc_name_country
    slot_uri: GENEPIO:0100438
    title: host_origin_geo_loc_name (country)
    any_of:
      - range: GeoLocNameCountryMenu
      - range: NullValueMenu
    description: The country of origin of the host.
    comments:
      - If a sample is from a human or animal host that originated from outside of Canada, provide the the name of the country where the host originated by selecting a value from the template pick list. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: South Africa [GAZ:00001094]
  geo_loc_latitude:
    name: geo_loc_latitude
    slot_uri: GENEPIO:0100309
    title: geo_loc latitude
    range: WhitespaceMinimizedString
    description: The latitude coordinates of the geographical location of sample collection.
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:lat_lon
    comments:
      - If known, provide the degrees latitude.  Do NOT simply provide latitude of the institution if this is not where the sample was collected, nor the centre of the city/region where the sample was collected as this falsely implicates an existing geographical location and creates data inaccuracies. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: 38.98 N
  geo_loc_longitude:
    name: geo_loc_longitude
    slot_uri: GENEPIO:0100310
    title: geo_loc longitude
    range: WhitespaceMinimizedString
    description: The longitude coordinates of the geographical location of sample collection.
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:lat_lon
    comments:
      - If known, provide the degrees longitude.  Do NOT simply provide longitude of the institution if this is not where the sample was collected, nor the centre of the city/region where the sample was collected as this falsely implicates an existing geographical location and creates data inaccuracies. If the information is unknown or cannot be provided, leave blank or provide a null value.
    examples:
      - value: 77.11 W
  sample_collection_date:
    name: sample_collection_date
    slot_uri: GENEPIO:0001174
    title: sample_collection_date
    range: date
    required: true
    description: The date on which the sample was collected.
    todos:
      - <={today}
    exact_mappings:
      - NCBI_BIOSAMPLE_Pathogen:sample%20collection%20date
      - NCBI_BIOSAMPLE_Enterics:collection_date
    comments:
      - Provide the date according to the ISO 8601 standard "YYYY-MM-DD", "YYYY-MM" or "YYYY".
    examples:
      - value: '2020-10-30'
  sample_collection_date_precision:
    name: sample_collection_date_precision
    slot_uri: GENEPIO:0001177
    title: sample_collection_date_precision
    any_of:
      - range: SampleCollectionDatePrecisionMenu
      - range: NullValueMenu
    required: true
    description: The precision to which the "sample collection date" was provided.
    comments:
      - Provide the precision of granularity to the "day", "month", or "year" for the date provided in the "sample collection date" field. The "sample collection date" will be truncated to the precision specified upon export; "day" for "YYYY-MM-DD", "month" for "YYYY-MM", or "year" for "YYYY".
    examples:
      - value: day [UO:0000033]
  sample_collection_end_date:
    name: sample_collection_end_date
    slot_uri: GENEPIO:0101071
    title: sample_collection_end_date
    any_of:
      - range: date
      - range: NullValueMenu
    recommended: true
    description: The date on which sample collection ended for a continuous sample.
    todos:
      - '>={sample_collection_date}'
      - <={today}
    comments:
      - Provide the date that sample collection ended in ISO 8601 format i.e. YYYY-MM-DD
    examples:
      - value: '2020-03-18'
  sample_processing_date:
    name: sample_processing_date
    slot_uri: GENEPIO:0100763
    title: sample_processing_date
    any_of:
      - range: date
      - range: NullValueMenu
    description: The date on which the sample was processed.
    todos:
      - '>={sample_collection_date}'
      - <={today}
    comments:
      - Provide the sample processed date in ISO 8601 format, i.e. "YYYY-MM-DD". The sample may be collected and processed (e.g. filtered, extraction) on the same day, or on different dates.
    examples:
      - value: '2020-03-16'
  sample_collection_start_time:
    name: sample_collection_start_time
    slot_uri: GENEPIO:0101072
    title: sample_collection_start_time
    any_of:
      - range: time
      - range: NullValueMenu
    recommended: true
    description: The time at which sample collection began.
    comments:
      - Provide this time in ISO 8601 24hr format, in your local time.
    examples:
      - value: 17:15 PST
  sample_collection_end_time:
    name: sample_collection_end_time
    slot_uri: GENEPIO:0101073
    title: sample_collection_end_time
    any_of:
      - range: time
      - range: NullValueMenu
    recommended: true
    description: The time at which sample collection ended.
    comments:
      - Provide this time in ISO 8601 24hr format, in your local time.
    examples:
      - value: 19:15 PST
  sample_collection_time_of_day:
    name: sample_collection_time_of_day
    slot_uri: GENEPIO:0100765
    title: sample_collection_time_of_day
    any_of:
      - range: SampleCollectionTimeOfDayMenu
      - range: NullValueMenu
    description: The descriptive time of day during which the sample was collected.
    comments:
      - If known, select a value from the pick list. The time of sample processing matters especially for grab samples, as fecal concentration in wastewater fluctuates over the course of the day.
    examples:
      - value: Morning
  sample_collection_time_duration_value:
    name: sample_collection_time_duration_value
    slot_uri: GENEPIO:0100766
    title: sample_collection_time_duration_value
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    recommended: true
    description: The amount of time over which the sample was collected.
    comments:
      - Provide the numerical value of time.
    examples:
      - value: '1900-01-03'
  sample_collection_time_duration_unit:
    name: sample_collection_time_duration_unit
    slot_uri: GENEPIO:0100767
    title: sample_collection_time_duration_unit
    any_of:
      - range: SampleCollectionDurationUnitMenu
      - range: NullValueMenu
    recommended: true
    description: The units of the time duration measurement of sample collection.
    comments:
      - Provide the units from the pick list.
    examples:
      - value: Hour
  sample_received_date:
    name: sample_received_date
    slot_uri: GENEPIO:0001179
    title: sample_received_date
    range: date
    description: The date on which the sample was received.
    todos:
      - '>={sample_collection_date}'
      - <={today}
    comments:
      - Provide the date according to the ISO 8601 standard "YYYY-MM-DD", "YYYY-MM" or "YYYY".
    examples:
      - value: '2020-11-15'
  original_sample_description:
    name: original_sample_description
    slot_uri: GENEPIO:0100439
    title: original_sample_description
    range: WhitespaceMinimizedString
    description: The original sample description provided by the sample collector.
    comments:
      - Provide the sample description provided by the original sample collector. The original description is useful as it may provide further details, or can be used to clarify higher level classifications.
    examples:
      - value: RTE Prosciutto from deli
  environmental_site:
