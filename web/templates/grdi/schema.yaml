  isolate_id:
    name: isolate_id
    slot_uri: GENEPIO:0100456
    title: isolate_ID
    range: WhitespaceMinimizedString
    required: true
    description: The user-defined identifier for the isolate, as provided by the laboratory that originally isolated the isolate.
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:strain
      - NCBI_ANTIBIOGRAM:sample_name/biosample_accession
    comments:
      - Provide the isolate_ID created by the lab that first isolated the isolate (i.e. the original isolate ID). If the information is unknown or cannot be provided, leave blank or provide a null value. If only an alternate isolate ID is known (e.g. the ID from your lab, if your lab did not isolate the isolate from the original sample), make asure to include it in the alternative_isolate_ID field.
    examples:
      - value: SA20131043
  alternative_isolate_id:
    name: alternative_isolate_id
    slot_uri: GENEPIO:0100457
    title: alternative_isolate_ID
    range: WhitespaceMinimizedString
    recommended: true
    description: An alternative isolate_ID assigned to the isolate by another organization.
    exact_mappings:
      - NCBI_BIOSAMPLE_Enterics:isolate_name_alias
    comments:
      - "Alternative isolate IDs should be provided in the in a prescribed format which consists of the ID followed by square brackets (no space in between the ID and bracket) containing the short form of ID provider’s agency name i.e. ID[short organization code]. Agency short forms include the following:\nPublic Health Agency of Canada: PHAC\nCanadian Food Inspection Agency: CFIA\nAgriculture and Agri-Food Canada: AAFC\nFisheries and Oceans Canada: DFO\nEnvironment and Climate Change Canada: ECCC\nHealth Canada: HC \nAn example of a properly formatted alternative_isolate_identifier would be e.g. XYZ4567[CFIA]\nMultiple alternative isolate IDs can be provided, separated by semi-colons."
    examples:
      - value: GHIF3456[PHAC]
      - value: QWICK222[CFIA]
