  ExperimentalDesignMethodType:
    title: Experimental Design Method Type
    description: Computational and statistical methods used for experimental design
      in autonomous laboratory workflows
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      BAYESIAN_OPTIMIZATION:
        description: Probabilistic model-based optimization using Bayesian inference
          to guide experimental selection
        annotations:
          approach: surrogate model with acquisition function
      ACTIVE_LEARNING:
        description: Machine learning approach that iteratively selects the most informative
          experiments to perform
        annotations:
          approach: query-based learning from unlabeled data
      REINFORCEMENT_LEARNING:
        description: Machine learning approach where an agent learns optimal experimental
          strategies through trial and reward
        annotations:
          approach: reward-based sequential decision making
      EVOLUTIONARY_ALGORITHM:
        description: Optimization method inspired by biological evolution using mutation,
          crossover, and selection
        annotations:
          approach: population-based metaheuristic
      RANDOM_SEARCH:
        description: Experimental design using random sampling of the parameter space
        annotations:
          approach: random sampling
      GRID_SEARCH:
        description: Systematic exploration of parameter space using a regular grid
          of experimental conditions
        annotations:
          approach: exhaustive grid evaluation
      LATIN_HYPERCUBE_SAMPLING:
        description: Statistical sampling method that ensures even coverage of each
          parameter dimension
        annotations:
          approach: stratified random sampling
      DESIGN_OF_EXPERIMENTS:
        description: Classical statistical methods for planning experiments including
          factorial and response surface designs
        annotations:
          approaches: full factorial, fractional factorial, Box-Behnken, central composite
      MULTI_OBJECTIVE_OPTIMIZATION:
        description: Optimization approach that simultaneously considers multiple
          competing objectives
        annotations:
          approach: Pareto-optimal solution search
    annotations:
      source_domain: lab_automation
      source_schema: autonomous_labs
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
