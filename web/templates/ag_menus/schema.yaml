enums:
  AccessRights:
    title: Access Rights
    description: 'Information about who can access the resource or an indication of

      its security status. Based on EU Vocabularies Access Rights authority list

      and DCAT recommendations.

      '
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    see_also:
      - https://op.europa.eu/en/web/eu-vocabularies/dataset/-/resource?uri=http://publications.europa.eu/resource/dataset/access-right
      - https://www.w3.org/TR/vocab-dcat-3/#Property:resource_access_rights
    permissible_values:
      PUBLIC:
        description: 'The resource is publicly accessible to everyone without

          restrictions.

          '
        meaning: 'euvoc:access-right/PUBLIC'
        aliases:
          - Open
          - Unrestricted
        annotations:
          dcat_mapping: http://publications.europa.eu/resource/authority/access-right/PUBLIC
      RESTRICTED:
        description: 'The resource is available under certain conditions or to

          authorized users only. Access may require authentication,

          payment, or agreement to terms.

          '
        meaning: 'euvoc:access-right/RESTRICTED'
        aliases:
          - Limited Access
        annotations:
          dcat_mapping: http://publications.europa.eu/resource/authority/access-right/RESTRICTED
      NON_PUBLIC:
        title: Non-Public
        description: 'The resource is not publicly accessible. May include confidential,

          sensitive, or internal-use-only resources.

          '
        meaning: 'euvoc:access-right/NON_PUBLIC'
        aliases:
          - Closed
          - Private
        annotations:
          dcat_mapping: http://publications.europa.eu/resource/authority/access-right/NON_PUBLIC
      EMBARGOED:
        description: 'The resource is temporarily restricted and will become publicly

          available after a specific date or event.

          '
        annotations:
          common_in: academic publishing, research data
      SENSITIVE:
        description: 'The resource contains sensitive information requiring special

          handling or access controls.

          '
        annotations:
          examples: PII, health data, classified information
    annotations:
      source_domain: data_catalog
      source_schema: access
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
  AnalyteTypeEnum:
    title: Analyte Types
    description: Types of analytes that can be extracted from biological specimens
      for molecular analysis.
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    see_also:
      - https://github.com/RTIInternational/NHLBI-BDC-DMC-HM
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      DNA:
        description: Deoxyribonucleic acid
        meaning: 'NCIT:C198567'
        aliases:
          - DNA Specimen
      RNA:
        description: Ribonucleic acid
        meaning: 'NCIT:C198568'
        aliases:
          - RNA Specimen
      TOTAL_RNA:
        description: Total RNA including all RNA species
      FFPE_DNA:
        description: DNA extracted from formalin-fixed paraffin-embedded tissue
        aliases:
          - Formalin-Fixed Paraffin-Embedded DNA
      FFPE_RNA:
        description: RNA extracted from formalin-fixed paraffin-embedded tissue
        aliases:
          - Formalin-Fixed Paraffin-Embedded RNA
      cfDNA:
        description: Cell-free DNA found in blood plasma
        meaning: 'NCIT:C128274'
        aliases:
          - Circulating Cell-Free DNA
          - cell-free DNA
      PROTEIN:
        description: Protein analyte
        meaning: 'NCIT:C17021'
        aliases:
          - Protein
      NUCLEI_RNA:
        description: RNA isolated from cell nuclei
      REPLI_G_DNA:
        description: Whole genome amplified DNA using Repli-G technology
        aliases:
          - Repli-G (Qiagen) DNA
      REPLI_G_X_DNA:
        description: Whole genome amplified DNA using Repli-G X technology
        aliases:
          - Repli-G X (Qiagen) DNA
      REPLI_G_POOLED_DNA:
        description: Pooled whole genome amplified DNA using Repli-G
        aliases:
          - Repli-G Pooled (Qiagen) DNA
      GENOMEPLEX_DNA:
        description: Whole genome amplified DNA using GenomePlex technology
        aliases:
          - GenomePlex (Rubicon) Amplified DNA
      EBV_IMMORTALIZED:
        description: DNA/cells from EBV immortalized cell lines
        aliases:
          - EBV Immortalized Normal
    is_a: SpecimenProcessingSchemaEnum
    annotations:
      source_domain: bio
      source_schema: specimen_processing
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
  AnalyticalControlType:
    title: Analytical Control Type
    description: Types of control samples used in analytical chemistry
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      INTERNAL_STANDARD:
        title: internal standard role
        description: Known amount of standard added to analytical sample
        meaning: 'MSIO:0000005'
      EXTERNAL_STANDARD:
        title: external standard role
        description: Reference standard used as external reference point
        meaning: 'MSIO:0000004'
      POSITIVE_CONTROL:
        title: positive control role
        description: Control providing known positive signal
        meaning: 'MSIO:0000008'
      NEGATIVE_CONTROL:
        title: negative control role
        description: Control providing baseline/no signal reference
        meaning: 'MSIO:0000007'
      LONG_TERM_REFERENCE:
        title: long term reference role
        description: Stable reference for cross-batch comparisons
        meaning: 'MSIO:0000006'
      BLANK:
        description: Sample containing only solvent/matrix without analyte
      QUALITY_CONTROL:
        description: Sample with known composition for system performance monitoring
    annotations:
      source_domain: analytical_chemistry
      source_schema: mass_spectrometry
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
  AngleUnitEnum:
    title: Angle Unit
    description: Units of angle measurement
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      RADIAN:
        description: Radian (SI derived unit)
        meaning: 'UO:0000123'
        annotations:
          symbol: rad
          system: SI
      DEGREE:
        description: Degree
        meaning: 'UO:0000185'
        annotations:
          symbol: "\xB0"
          conversion_to_radian: '0.0174533'
      MINUTE_OF_ARC:
        description: Minute of arc/arcminute
        annotations:
          symbol: ''''
          conversion_to_degree: '0.0166667'
      SECOND_OF_ARC:
        description: Second of arc/arcsecond
        annotations:
          symbol: '"'
          conversion_to_degree: '0.000277778'
      GRADIAN:
        description: Gradian/gon
        annotations:
          symbol: gon
          conversion_to_degree: '0.9'
      TURN:
        description: Turn/revolution
        annotations:
          symbol: turn
          conversion_to_radian: '6.28319'
    annotations:
      source_domain: units
      source_schema: measurements
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
  AquiferType:
    title: Aquifer Type
    description: Classification of aquifer types based on confinement, geology, and
      hydraulic characteristics.
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      UNCONFINED:
        description: An aquifer whose upper boundary is the water table, open to atmospheric
          pressure
      CONFINED:
        description: An aquifer bounded above and below by impermeable layers, under
          pressure greater than atmospheric
      SEMI_CONFINED:
        description: An aquifer partially bounded by layers of lower permeability
          that allow some vertical leakage
      PERCHED:
        description: A localized unconfined aquifer above the regional water table,
          supported by a low-permeability layer
      ARTESIAN:
        description: A confined aquifer in which the hydraulic pressure causes water
          to rise above the top of the aquifer
      FRACTURED_ROCK:
        description: An aquifer in which groundwater flows primarily through fractures
          in otherwise low-permeability rock
      KARST:
        description: An aquifer in soluble rock such as limestone where flow occurs
          through dissolution-enlarged conduits and fractures
        broad_mappings:
          - 'ENVO:00000175'
      ALLUVIAL:
        description: An aquifer composed of unconsolidated alluvial deposits such
          as sand and gravel deposited by rivers
    annotations:
      source_domain: earth_science
      source_schema: hydrogeology
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
  ArchiveFormatEnum:
    title: Archive Format
    description: Archive and compression formats
    status: DRAFT
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      ZIP:
        description: ZIP archive
        annotations:
          extension: .zip
          mime_type: application/zip
          compression: DEFLATE
      TAR:
        description: Tape Archive
        annotations:
          extension: .tar
          mime_type: application/x-tar
          compression: none (archive only)
      GZIP:
        description: GNU zip
        annotations:
          extension: .gz
          mime_type: application/gzip
          compression: DEFLATE
      TAR_GZ:
        description: Gzipped tar archive
        annotations:
          extension: .tar.gz, .tgz
          mime_type: application/x-gtar
          compression: tar + gzip
      BZIP2:
        description: Bzip2 compression
        annotations:
          extension: .bz2
          mime_type: application/x-bzip2
          compression: Burrows-Wheeler
      TAR_BZ2:
        description: Bzip2 compressed tar archive
        annotations:
          extension: .tar.bz2, .tbz2
          mime_type: application/x-bzip2
      XZ:
        description: XZ compression
        annotations:
          extension: .xz
          mime_type: application/x-xz
          compression: LZMA2
      TAR_XZ:
        description: XZ compressed tar archive
        annotations:
          extension: .tar.xz, .txz
          mime_type: application/x-xz
      SEVEN_ZIP:
        description: 7-Zip archive
        annotations:
          extension: .7z
          mime_type: application/x-7z-compressed
          compression: LZMA
      RAR:
        description: RAR archive
        annotations:
          extension: .rar
          mime_type: application/vnd.rar
          proprietary: 'true'
    is_a: FileFormatsSchemaEnum
    annotations:
      source_domain: computing
      source_schema: file_formats
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
  AudioFormatEnum:
