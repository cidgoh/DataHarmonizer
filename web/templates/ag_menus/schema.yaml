          compression: lossless
      AAC:
        description: Advanced Audio Coding
        annotations:
          extension: .aac
          mime_type: audio/aac
          compression: lossy
      OGG:
        description: Ogg Vorbis
        annotations:
          extension: .ogg
          mime_type: audio/ogg
          compression: lossy
      M4A:
        description: MPEG-4 Audio
        annotations:
          extension: .m4a
          mime_type: audio/mp4
          compression: lossy or lossless
      WMA:
        description: Windows Media Audio
        annotations:
