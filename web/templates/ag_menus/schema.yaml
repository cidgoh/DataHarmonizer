  NSDB_HZN_MAS:
    name: HZN_MAS
    title: Horizon Master Code
    description: Identifies the master horizon, as per Chapter 2 of the Canadian System
      of Soil Classification, third edition.
    permissible_values:
      A:
        text: A
        title: Surface mineral horizon
        description: This mineral horizon forms at or near the surface in the zone
          of leaching or eluviation of materials in solution or suspension, or of
          maximum in situ accumulation of organic matter or both. The accumulated
          organic matter is usually expressed morphologically by a darkening of the
          surface soil (Ah). Conversely, the removal of organic matter is usually
          expressed by a lightening of the soil color usually in the upper part of
          the solum (Ae). The removal of clay from the upper part of the solum (Ae)
          is expressed by a coarser soil texture relative to the underlying subsoil
          layers. The removal of iron is indicated usually by a paler or less red
          soil color in the upper part of the solum (Ae) relative to the lower part
          of the subsoil.
      AB:
        text: AB
        title: Surface transitional horizon
        description: Gradual transition. The dominance of horizons in the transitional
          zone may be shown by order, AB or BA, etc. Lower case suffixes may also
          be added in some instances, e.g., ABg, ABgj, etc.
      AC:
        text: AC
        title: Surface transitional horizon
        description: Gradual transition. The dominance of horizons in the transitional
          zone may be shown by order, AC or BC, etc. Lower case suffixes may also
          be added in some instances, e.g., ACg, ACgj, etc.
      B:
        text: B
        title: Subsurface mineral horizon
        description: This mineral horizon is characterized by enrichment in organic
          matter, sesquioxides, or clay; or by the development of soil structure;
          or by a change of color denoting hydrolysis, reduction, or oxidation. In
          B horizons, accumulated organic matter (Bh) is evidenced usually by dark
          colors relative to the C horizon. Clay accumulation is indicated by finer
          soil textures and by clay cutans coating peds and lining pores (Bt). Soil
          structure developed in B horizons includes prismatic or columnar units with
          coatings or stainings and significant amounts of exchangeable sodium (Bn)
          and other changes of structure (Bm) from that of the parent material. Color
          changes include relatively uniform browning due to oxidation of iron (Bm),
          and mottling and gleying of structurally altered material associated with
          periodic reduction (Bg).
      BA:
        text: BA
        title: Subsurface Transitional Horizon
        description: Gradual transition. The dominance of horizons in the transitional
          zone may be shown by order, AB or BA, etc. Lower case suffixes may also
          be added in some instances, e.g., BAg, BAgj, etc.
      BC:
        text: BC
        title: Subsurface Transitional Horizon
        description: Gradual transition. The dominance of horizons in the transitional
          zone may be shown by order, AC or BC, etc. Lower case suffixes may also
          be added in some instances, e.g., BCg, BCgj, etc.
      C:
        text: C
        title: Parent mineral horizon
        description: "This mineral horizon is comparatively unaffected by the pedogenic\
          \ processes operating in A and B horizons, except the process of gleying\
          \ (Cg), and the accumulation of calcium and magnesium carbonates (Cca) and\
          \ more soluble salts (Cs, Csa). Marl, diatomaceous earth, and rock with\
          \ a hardness \u22643 on Mohs' scale are considered to be C horizons."
      CA:
        text: CA
        title: ''
        description: ''
      CB:
        text: CB
        title: ''
        description: ''
      F:
        text: F
        title: Organic horizon partially decomposed
        description: This organic horizon is characterized by an accumulation of partly
          decomposed organic matter. Some of the original structures are difficult
          to recognize. The material may be partly comminuted by soil fauna as in
          moder, or it may be a partly decomposed mat permeated by fungal hyphae as
          in mor.
      FH:
        text: FH
        title: ''
        description: ''
      H:
        text: H
        title: Organic horizon of indiscernible origin
        description: This organic horizon is characterized by an accumulation of decomposed
          organic matter in which the original structures are indiscernible. This
          horizon differs from the F by having greater humification due chiefly to
          the action of organisms. It is frequently intermixed with mineral grains,
          especially near the junction with a mineral horizon.
      L:
        text: L
        title: Organic horizon poorly decomposed
        description: This organic horizon is characterized by an accumulation of organic
          matter in which the original structures are easily discernible.
      LF:
        text: LF
        title: ''
        description: ''
      LFH:
        text: LFH
        title: ''
        description: ''
      LH:
        text: LH
        title: ''
        description: ''
      O:
        text: O
        title: Organic horizon from mosses, rushes and woody materials
        description: This organic horizon is developed mainly from mosses, rushes,
          and woody materials.
      R:
        text: R
        title: Rock
        description: This consolidated bedrock layer is too hard to break with the
          hands (>3 on Mohs' scale) or to dig with a spade when moist. It does not
          meet the requirements of a C horizon. The boundary between the R layer and
          any overlying unconsolidated material is called a lithic contact.
      W:
        text: W
        title: Water
        description: This layer of water may occur in Gleysolic, Organic, or Cryosolic
          soils. Hydric layers in Organic soils are a kind of W layer as is segregated
          ice formation in Cryosolic soils.
      '-':
        text: '-'
        title: Not applicable
        description: ''
    annotations:
      imported_from: NSDBSoilNameAndLayerV2
      source_file: sources/NSDBSoilNameAndLayerV2.yaml
  NSDB_KIND:
