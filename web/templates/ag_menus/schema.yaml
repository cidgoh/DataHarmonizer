  ExtremeWeatherEventEnum:
    title: Extreme Weather Event
    description: Types of extreme weather events relevant to health outcomes and environmental
      epidemiology. Used for characterizing weather-related health impacts in the
      NIH Health and Extreme Weather (HEW) program.
    status: STANDARD
    contributors:
      - 'orcid:0000-0002-6601-2165'
      - https://github.com/anthropics/claude-code
    instantiates:
      - valuesets_meta:ValueSetEnumDefinition
    annotations:
      program: NIH HEW Data Accelerator
      use_case: GB-EDoH classification
      source_domain: environmental_health
      source_schema: gb_edoh
      imported_from: linkml_valuesets
      source_file: sources/linkml_valuesets.yaml
    permissible_values:
      HEAT_WAVE:
        title: Heat wave
        description: Prolonged period of excessively hot weather relative to the expected
          conditions for a given area. Associated with increased mortality, heat stroke,
          and cardiovascular events.
        annotations:
          health_impacts: heat stroke, cardiovascular events, mortality
          nws_threshold: 2+ days of heat index >= 105F
      COLD_WAVE:
        title: Cold wave
        description: Prolonged period of excessively cold weather relative to the
          expected conditions for a given area. Associated with hypothermia and cardiovascular
          events.
        annotations:
          health_impacts: hypothermia, cardiovascular events, frostbite
      WILDFIRE:
        title: wildfire
        description: Uncontrolled fire in vegetated areas producing smoke containing
          particulate matter and hazardous air pollutants. Major source of PM2.5 exposure.
        meaning: 'ENVO:01000787'
        annotations:
          health_impacts: respiratory illness, cardiovascular events, mental health
          exposure_agent: PM2.5, CO, VOCs
      FOREST_FIRE:
        title: forest fire
        description: Wildfire occurring primarily in forested areas, producing dense
          smoke plumes that can travel long distances.
        meaning: 'ENVO:01000791'
        is_a: WILDFIRE
      TROPICAL_STORM:
        title: tropical storm
        description: Atmospheric storm originating over tropical waters with organized
          circulation and sustained winds 39-73 mph. Precursor to hurricanes.
        meaning: 'ENVO:01001296'
        annotations:
          health_impacts: injuries, drowning, displacement, mental health
      HURRICANE:
        title: Hurricane/Typhoon/Cyclone
        description: Intense tropical cyclone with sustained winds of 74 mph or greater.
          Called hurricane (Atlantic/E. Pacific), typhoon (W. Pacific), or cyclone
          (Indian Ocean).
        annotations:
          saffir_simpson: Category 1-5
          health_impacts: traumatic injuries, drowning, displacement, infectious disease
          related: 'ENVO:01001297'
      TORNADO:
        title: tornado
        description: Violently rotating column of air extending from a thunderstorm
          to the ground. Characterized by extreme winds and path of destruction.
        meaning: 'ENVO:01001482'
        annotations:
          ef_scale: EF0-EF5
          health_impacts: traumatic injuries, death, mental health
      FLOOD:
        title: flood
        description: Unusual accumulation of water above ground caused by high tide,
          heavy rain, melting snow, or dam failure.
        meaning: 'ENVO:01000710'
        annotations:
          health_impacts: drowning, waterborne disease, injuries, displacement
      RIVERINE_FLOOD:
        title: riverine flood
        description: Flood occurring when river flow exceeds channel capacity, typically
          developing over hours to days.
        meaning: 'ENVO:01000712'
        is_a: FLOOD
      COASTAL_FLOOD:
        title: coastal flood
        description: Flood caused by storm surge, high tides, or sea level rise affecting
          coastal areas.
        meaning: 'ENVO:01000711'
        is_a: FLOOD
      FLASH_FLOOD:
        title: flash flood
        description: Rapid flooding of low-lying areas within 6 hours of heavy rainfall
          or dam failure. Particularly dangerous due to sudden onset.
        meaning: 'ENVO:01000713'
        is_a: FLOOD
      DROUGHT:
        title: drought
        description: Extended period of deficient precipitation resulting in water
          shortage. Affects water quality, food security, and mental health.
        meaning: 'ENVO:1000745'
        annotations:
          health_impacts: water quality, food insecurity, mental health
          indices: PDSI, SPI, USDM
      BLIZZARD:
        title: blizzard
        description: Severe snowstorm with sustained winds >= 35 mph and reduced visibility
          for 3+ hours. Creates dangerous travel conditions and cold exposure risk.
        meaning: 'ENVO:01000903'
        annotations:
          health_impacts: hypothermia, injuries, carbon monoxide poisoning
      WINTER_STORM:
        title: Winter storm
        description: Storm producing significant snow, ice, or sleet. Includes ice
          storms, nor'easters, and lake-effect snow events.
        annotations:
          health_impacts: injuries, hypothermia, carbon monoxide poisoning
      SEVERE_THUNDERSTORM:
        title: convective storm
        description: Thunderstorm producing hail >= 1 inch, wind gusts >= 58 mph,
          or a tornado. Source of lightning, flash flooding, and wind damage.
        meaning: 'ENVO:01001294'
        annotations:
          health_impacts: lightning injuries, wind injuries, flash flooding
      DUST_STORM:
        title: Dust storm
        description: Meteorological event with strong winds lifting large amounts
          of sand and dust into the atmosphere. Reduces visibility and air quality.
        annotations:
          health_impacts: respiratory illness, traffic accidents
          related: haboob, sandstorm
      EXTREME_PRECIPITATION:
        title: Extreme precipitation
        description: Precipitation event exceeding historical norms for intensity
          or duration. Often precedes flooding events.
        annotations:
          health_impacts: flooding, infrastructure damage
      STORM_SURGE:
        title: storm surge
        description: Abnormal rise in sea level during a storm, caused by wind pushing
          water toward shore. Major cause of hurricane-related deaths.
        meaning: 'ENVO:01000714'
        annotations:
          health_impacts: drowning, injuries
      LANDSLIDE:
        title: Landslide
        description: Mass movement of rock, debris, or earth down a slope. Often triggered
          by extreme precipitation or earthquakes.
        annotations:
          health_impacts: traumatic injuries, burial, displacement
      AIR_QUALITY_EVENT:
        title: Air quality event
        description: Period of degraded air quality due to pollution accumulation,
          typically during temperature inversions or stagnant air conditions.
        annotations:
          health_impacts: respiratory illness, cardiovascular events
          indices: AQI, PM2.5, ozone
    is_a: GbEdohSchemaEnum
