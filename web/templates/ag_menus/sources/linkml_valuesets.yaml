  TransplantationSchemaEnum:
    description: Schema-level enum for transplantation in bio
    is_a: BioDomainEnum
    abstract: true
    annotations:
      source_file: bio/transplantation.yaml
  TransplantationTypeEnum:
    title: Transplantation Types
    description: Classification of transplants based on the genetic relationship between donor and recipient organisms.
    status: DRAFT
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    see_also:
    - https://nf-osi.github.io/nf-metadata-dictionary/
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    permissible_values:
      XENOGRAFT:
        description: Transplantation of cells, tissues, or organs between animals of different species
        meaning: NCIT:C12932
        aliases:
        - xenotransplant
        - heterograft
        annotations:
          donor_recipient: different species
          example: human tumor in mouse
      ALLOGRAFT:
        description: Transplantation of cells, tissues, or organs between genetically different individuals of the same species
        meaning: SNOMED:7970006
        aliases:
        - allogeneic transplant
        - homograft
        annotations:
          donor_recipient: same species, different individual
          example: bone marrow transplant
      AUTOGRAFT:
        description: Transplantation of tissue from one body location to another within the same individual
        meaning: NCIT:C40997
        aliases:
        - autologous transplant
        - autotransplant
        annotations:
          donor_recipient: same individual
          example: skin graft, autologous stem cell transplant
      ISOGRAFT:
        description: Transplantation of cells, tissues, or organs between genetically identical individuals (e.g., identical
          twins, inbred strains)
        meaning: NCIT:C41000
        aliases:
        - syngeneic transplant
        - isogeneic transplant
        annotations:
          donor_recipient: genetically identical
          example: transplant between identical twins
    is_a: TransplantationSchemaEnum
    annotations:
