  TumorMorphology:
    title: Tumor Morphology
    description: Major histological types for tumor classification based on ICD-O morphology codes. These represent the cell
      type and histological pattern of neoplasms.
    status: STANDARD
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    annotations:
      source: ICD-O-3
      axis: morphology
      source_domain: medical
      source_schema: icdo
    permissible_values:
      CARCINOMA_NOS:
        title: Carcinoma
        description: Malignant epithelial neoplasm, not otherwise specified. General term for cancers arising from epithelial
          cells.
        meaning: NCIT:C2916
        annotations:
          icdo_code: 8010
      ADENOCARCINOMA_NOS:
        title: Adenocarcinoma
        description: Malignant glandular epithelial neoplasm. Cancer arising from glandular epithelium.
        meaning: NCIT:C2852
        annotations:
          icdo_code: 8140
        is_a: CARCINOMA_NOS
      SQUAMOUS_CELL_CARCINOMA:
        title: Squamous Cell Carcinoma
        description: Malignant neoplasm arising from squamous epithelium. Common in skin, lung, esophagus, and cervix.
        meaning: NCIT:C2929
        annotations:
          icdo_code: 8070
        is_a: CARCINOMA_NOS
      TRANSITIONAL_CELL_CARCINOMA:
        title: Transitional Cell Carcinoma
        description: Malignant neoplasm arising from transitional epithelium (urothelium). Most common in bladder and urinary
          tract.
        meaning: NCIT:C2930
        annotations:
          icdo_code: 8120
        is_a: CARCINOMA_NOS
      SMALL_CELL_CARCINOMA:
        title: Small Cell Neuroendocrine Carcinoma
        description: Highly malignant neuroendocrine carcinoma with small cells. Most common in lung.
        meaning: NCIT:C3915
        annotations:
          icdo_code: 8041
        is_a: CARCINOMA_NOS
      LARGE_CELL_CARCINOMA:
        title: Large cell carcinoma
        description: Undifferentiated carcinoma with large cells.
        annotations:
          icdo_code: 8012
        is_a: CARCINOMA_NOS
      SARCOMA_NOS:
        title: Sarcoma
        description: Malignant mesenchymal neoplasm, not otherwise specified. Cancers arising from connective tissue, bone,
          cartilage, fat, muscle, or blood vessels.
        meaning: NCIT:C9118
        annotations:
          icdo_code: 8800
      OSTEOSARCOMA:
        title: Osteosarcoma
        description: Malignant bone-forming tumor. Most common primary malignant bone tumor.
        meaning: NCIT:C9145
        annotations:
          icdo_code: 9180
        is_a: SARCOMA_NOS
      CHONDROSARCOMA:
        title: Chondrosarcoma
        description: Malignant cartilage-forming tumor.
        meaning: NCIT:C2946
        annotations:
          icdo_code: 9220
        is_a: SARCOMA_NOS
      LIPOSARCOMA:
        title: Liposarcoma
        description: Malignant tumor arising from adipose tissue.
        meaning: NCIT:C3194
        annotations:
          icdo_code: 8850
        is_a: SARCOMA_NOS
      LEIOMYOSARCOMA:
        title: Leiomyosarcoma
        description: Malignant tumor arising from smooth muscle.
        meaning: NCIT:C3158
        annotations:
          icdo_code: 8890
        is_a: SARCOMA_NOS
      RHABDOMYOSARCOMA:
        title: Rhabdomyosarcoma
        description: Malignant tumor arising from skeletal muscle.
        meaning: NCIT:C3359
        annotations:
          icdo_code: 8900
        is_a: SARCOMA_NOS
      LYMPHOMA_NOS:
        title: Lymphoma
        description: Malignant neoplasm of lymphoid tissue, not otherwise specified. Includes Hodgkin and non-Hodgkin lymphomas.
        meaning: NCIT:C3208
        annotations:
          icdo_code: 9590
      HODGKIN_LYMPHOMA:
        title: Hodgkin Lymphoma
        description: Lymphoma characterized by presence of Reed-Sternberg cells and specific histological patterns.
        meaning: NCIT:C9357
        annotations:
          icdo_code: 9650
        is_a: LYMPHOMA_NOS
      NON_HODGKIN_LYMPHOMA:
        title: Non-Hodgkin Lymphoma
        description: All lymphomas other than Hodgkin lymphoma. Includes B-cell and T-cell lymphomas.
        meaning: NCIT:C3211
        annotations:
          icdo_codes: 9591, 9670-9729
        is_a: LYMPHOMA_NOS
      DIFFUSE_LARGE_B_CELL_LYMPHOMA:
        title: Diffuse large B-cell lymphoma
        description: Most common type of non-Hodgkin lymphoma.
        meaning: NCIT:C8851
        annotations:
          icdo_code: 9680
        is_a: NON_HODGKIN_LYMPHOMA
      LEUKEMIA_NOS:
        title: Leukemia
        description: Malignant neoplasm of blood-forming tissues, not otherwise specified.
        meaning: NCIT:C3161
        annotations:
          icdo_code: 9800
      ACUTE_LYMPHOBLASTIC_LEUKEMIA:
        title: Acute lymphoblastic leukemia
        description: Acute leukemia of lymphoid precursor cells.
        meaning: NCIT:C3167
        annotations:
          icdo_code: 9811
        is_a: LEUKEMIA_NOS
      ACUTE_MYELOID_LEUKEMIA:
        title: Acute myeloid leukemia
        description: Acute leukemia of myeloid precursor cells.
        meaning: NCIT:C3171
        annotations:
          icdo_code: 9861
        is_a: LEUKEMIA_NOS
      CHRONIC_LYMPHOCYTIC_LEUKEMIA:
        title: Chronic lymphocytic leukemia
        description: Chronic leukemia of mature B lymphocytes.
        meaning: NCIT:C3163
        annotations:
          icdo_code: 9823
        is_a: LEUKEMIA_NOS
      CHRONIC_MYELOID_LEUKEMIA:
        title: Chronic myeloid leukemia
        description: Chronic leukemia characterized by BCR-ABL1 fusion gene.
        meaning: NCIT:C3174
        annotations:
          icdo_code: 9875
        is_a: LEUKEMIA_NOS
      MELANOMA:
        title: Melanoma
        description: Malignant neoplasm arising from melanocytes.
        meaning: NCIT:C3224
        annotations:
          icdo_code: 8720
      MESOTHELIOMA:
        title: Mesothelioma
        description: Malignant tumor arising from mesothelial cells lining pleura, peritoneum, or pericardium. Strongly associated
          with asbestos exposure.
        meaning: NCIT:C3234
        annotations:
          icdo_code: 9050
      GERM_CELL_TUMOR:
        title: Germ cell tumor
        description: Tumor arising from germ cells. Includes seminoma, teratoma, etc.
        meaning: NCIT:C3708
        annotations:
          icdo_codes: 9060-9110
      NEUROENDOCRINE_TUMOR:
        title: Neuroendocrine tumor
        description: Tumor arising from neuroendocrine cells.
        annotations:
          icdo_codes: 8240-8249
    is_a: IcdoSchemaEnum
  TumorBehavior:
    title: Tumor Behavior
    description: Biological behavior codes used in ICD-O morphology (5th digit). Indicates whether a neoplasm is benign, uncertain,
      in situ, or malignant.
    status: STANDARD
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    annotations:
      source: ICD-O-3
      source_domain: medical
      source_schema: icdo
    permissible_values:
      BENIGN:
        title: Benign Neoplasm
        description: Non-cancerous neoplasm that does not invade surrounding tissue or metastasize.
        meaning: NCIT:C3677
        annotations:
          icdo_behavior: /0
      UNCERTAIN_BORDERLINE:
        title: Uncertain whether benign or malignant
        description: Neoplasm with borderline malignancy or uncertain behavior. May recur but typically does not metastasize.
        annotations:
          icdo_behavior: /1
      IN_SITU:
        title: Carcinoma In Situ
        description: Malignant cells confined to epithelium without invasion through basement membrane. Pre-invasive cancer.
        meaning: NCIT:C2917
        annotations:
          icdo_behavior: /2
      MALIGNANT_PRIMARY:
        title: Malignant, primary site
        description: Invasive malignant neoplasm at primary site. Cancer that has invaded through basement membrane.
        annotations:
          icdo_behavior: /3
      MALIGNANT_METASTATIC:
        title: Malignant, metastatic site
        description: Malignant neoplasm that has spread from primary site to secondary (metastatic) site.
        annotations:
          icdo_behavior: /6
      MALIGNANT_UNCERTAIN_PRIMARY_METASTATIC:
        title: Malignant, uncertain whether primary or metastatic
        description: Malignant neoplasm where it is uncertain if this is the primary site or a metastatic site.
        annotations:
          icdo_behavior: /9
    is_a: IcdoSchemaEnum
  TumorGrade:
    title: Tumor Grade
    description: Histological grade/differentiation codes used in ICD-O (6th digit). Indicates how abnormal the tumor cells
      appear compared to normal cells.
    status: STANDARD
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    annotations:
      source: ICD-O-3
      source_domain: medical
      source_schema: icdo
    permissible_values:
      GRADE_1:
        title: Grade I - Well differentiated
        description: Tumor cells closely resemble normal cells. Typically slow-growing with better prognosis.
        annotations:
          icdo_grade: 1
          differentiation: well differentiated
      GRADE_2:
        title: Grade II - Moderately differentiated
        description: Tumor cells show moderate resemblance to normal cells. Intermediate behavior.
        annotations:
          icdo_grade: 2
          differentiation: moderately differentiated
      GRADE_3:
        title: Grade III - Poorly differentiated
        description: Tumor cells show little resemblance to normal cells. More aggressive with poorer prognosis.
        annotations:
          icdo_grade: 3
          differentiation: poorly differentiated
      GRADE_4:
        title: Grade IV - Undifferentiated/Anaplastic
        description: Tumor cells bear no resemblance to normal cells. Most aggressive with poorest prognosis.
        annotations:
          icdo_grade: 4
          differentiation: undifferentiated, anaplastic
      GRADE_NOT_DETERMINED:
        title: Grade not determined
        description: Histological grade has not been assessed or is not applicable.
        annotations:
          icdo_grade: 9
      T_CELL:
        title: T-cell
        description: Lymphoma/leukemia of T-cell origin.
        annotations:
          icdo_grade: 5
          use: lymphomas/leukemias
      B_CELL:
        title: B-cell
        description: Lymphoma/leukemia of B-cell origin.
        annotations:
          icdo_grade: 6
          use: lymphomas/leukemias
      NULL_CELL:
        title: Null cell (non-T, non-B)
        description: Lymphoma/leukemia of neither T-cell nor B-cell origin.
        annotations:
          icdo_grade: 7
          use: lymphomas/leukemias
      NK_CELL:
        title: NK cell
        description: Lymphoma/leukemia of natural killer cell origin.
        annotations:
          icdo_grade: 8
          use: lymphomas/leukemias
    is_a: IcdoSchemaEnum
  DiagnosisCategoriesSchemaEnum:
    description: Schema-level enum for diagnosis_categories in medical
    is_a: MedicalDomainEnum
    abstract: true
    annotations:
      source_file: medical/pediatric_oncology/diagnosis_categories.yaml
  PediatricOncologyDiagnosisCategory:
    title: Pediatric Oncology Diagnosis Category
    description: High-level groupings for pediatric cancer diagnoses per CCDI CDE 16607972. Designed for cohort aggregation
      across federated data resources. Each diagnosis maps to a single dominant category.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://github.com/CBIIT/ccdi-federation-api/discussions/160
    - https://docs.stjude.cloud/cc4k
    annotations:
      caDSR_CDE: '16607972'
      source: CCDI Federation API
      alignment: WHO CNS5, WHO-HAEM5, WHO Pediatric Blue Book
      source_domain: medical
      source_schema: diagnosis_categories
    permissible_values:
      ATYPICAL_TERATOID_RHABDOID_TUMOR:
        title: Atypical Teratoid/Rhabdoid Tumor
        description: Highly malignant embryonal CNS tumor characterized by loss of SMARCB1 (INI1) or SMARCA4 expression. Predominantly
          occurs in young children.
        meaning: NCIT:C6906
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      CHOROID_PLEXUS_TUMOR:
        title: Choroid Plexus Neoplasm
        description: Neoplasms arising from the choroid plexus epithelium, including papilloma, atypical papilloma, and carcinoma.
        meaning: NCIT:C3473
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      CNS_GERM_CELL_TUMOR:
        title: Central Nervous System Germ Cell Tumor
        description: Germ cell tumors arising within the central nervous system, including germinoma and non-germinomatous
          germ cell tumors.
        meaning: NCIT:C5461
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      CNS_SARCOMA:
        title: Central Nervous System Sarcoma
        description: Sarcomas arising primarily in the central nervous system, including Ewing sarcoma and rhabdomyosarcoma
          of CNS.
        meaning: NCIT:C5153
        annotations:
          category: brain_tumor
      CRANIOPHARYNGIOMA:
        title: Craniopharyngioma
        description: Benign epithelial tumors arising from remnants of Rathke pouch, including adamantinomatous and papillary
          subtypes.
        meaning: NCIT:C2964
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      EPENDYMOMA:
        title: Ependymoma
        description: Glial tumors arising from ependymal cells lining the ventricular system and central canal. Includes molecular
          subtypes defined by WHO CNS5.
        meaning: NCIT:C3017
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      GLIONEURONAL_AND_NEURONAL_TUMOR:
        title: Glioneuronal and Neuronal Tumors
        description: Tumors with neuronal differentiation including ganglioglioma, dysembryoplastic neuroepithelial tumor
          (DNET), and central neurocytoma.
        meaning: NCIT:C4747
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      HIGH_GRADE_GLIOMA:
        title: Malignant Glioma
        description: Aggressive glial tumors including pediatric-type diffuse high-grade gliomas (H3 K27-altered, H3 G34-mutant,
          and H3/IDH-wildtype), as well as glioblastoma.
        meaning: NCIT:C4822
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
          grade: high
      LOW_GRADE_GLIOMA:
        title: Low Grade Glioma
        description: Indolent glial tumors including pilocytic astrocytoma and pediatric-type diffuse low-grade gliomas (MYB/MYBL1-altered,
          MAPK pathway-altered).
        meaning: NCIT:C132067
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
          grade: low
      MEDULLOBLASTOMA:
        title: Medulloblastoma
        description: Embryonal tumor of the cerebellum, classified by molecular subgroups (WNT-activated, SHH-activated, Group
          3, Group 4) per WHO CNS5.
        meaning: NCIT:C3222
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      OTHER_CNS_EMBRYONAL_TUMOR:
        title: Central Nervous System Embryonal Tumor
        description: Embryonal tumors of the CNS other than medulloblastoma and ATRT, including embryonal tumor with multilayered
          rosettes (ETMR), CNS neuroblastoma, and pineoblastoma.
        meaning: NCIT:C6990
        aliases:
        - CNS Embryonal Tumor, NOS
        annotations:
          category: brain_tumor
          who_classification: WHO CNS5
      OTHER_GLIOMA:
        title: Glioma
        description: Glial tumors not classified as high-grade or low-grade glioma, including angiocentric glioma and astroblastoma.
        meaning: NCIT:C3059
        annotations:
          category: brain_tumor
      OTHER_BRAIN_TUMOR:
        title: Brain Neoplasm
        description: CNS tumors not fitting other brain tumor categories, including meningioma, schwannoma, and hemangioblastoma.
        meaning: NCIT:C2907
        annotations:
          category: brain_tumor
      LYMPHOBLASTIC_LEUKEMIA:
        title: Lymphoblastic Leukemia
        description: Acute lymphoblastic leukemia (ALL) including B-ALL and T-ALL with all molecular subtypes (BCR::ABL1,
          ETV6::RUNX1, KMT2A-r, DUX4, MEF2D, etc.).
        meaning: NCIT:C3167
        aliases:
        - ALL
        - Acute Lymphoblastic Leukemia
        annotations:
          category: hematologic
          who_classification: WHO-HAEM5
      MYELOID_LEUKEMIA:
        title: Myeloid Leukemia
        description: Acute myeloid leukemia (AML) and related myeloid neoplasms including AML with defining genetic abnormalities,
          therapy-related AML, and juvenile myelomonocytic leukemia (JMML).
        meaning: NCIT:C3171
        aliases:
        - AML
        - Acute Myeloid Leukemia
        annotations:
          category: hematologic
          who_classification: WHO-HAEM5
      HODGKIN_LYMPHOMA:
        title: Hodgkin Lymphoma
        description: Lymphoid neoplasm characterized by Reed-Sternberg cells, including classical Hodgkin lymphoma and nodular
          lymphocyte predominant Hodgkin lymphoma.
        meaning: NCIT:C9357
        annotations:
          category: hematologic
          who_classification: WHO-HAEM5
      NON_HODGKIN_LYMPHOMA:
        title: Non-Hodgkin Lymphoma
        description: Lymphoid neoplasms other than Hodgkin lymphoma, including Burkitt lymphoma, diffuse large B-cell lymphoma,
          anaplastic large cell lymphoma, and lymphoblastic lymphoma.
        meaning: NCIT:C3211
        aliases:
        - NHL
        annotations:
          category: hematologic
          who_classification: WHO-HAEM5
      LYMPHOPROLIFERATIVE_DISEASE:
        title: Lymphoproliferative Disorder
        description: Disorders characterized by abnormal lymphocyte proliferation, including post-transplant lymphoproliferative
          disorder (PTLD) and hemophagocytic lymphohistiocytosis (HLH).
        meaning: NCIT:C9308
        annotations:
          category: hematologic
      OTHER_HEME_TUMOR:
        title: Hematopoietic and Lymphoid Cell Neoplasm
        description: Hematologic malignancies not classified elsewhere, including histiocytic disorders, myelodysplastic syndromes,
          and myeloproliferative neoplasms.
        meaning: NCIT:C27134
        annotations:
          category: hematologic
      NEUROBLASTOMA:
        title: Neuroblastoma
        description: Embryonal tumor of the peripheral sympathetic nervous system, arising from neural crest cells. Includes
          ganglioneuroblastoma and ganglioneuroma.
        meaning: NCIT:C3270
        annotations:
          category: solid_tumor
          who_classification: WHO Pediatric Blue Book
      OSTEOSARCOMA:
        title: Osteosarcoma
        description: Primary malignant bone tumor characterized by osteoid production, including conventional, telangiectatic,
          and small cell variants.
        meaning: NCIT:C9145
        annotations:
          category: solid_tumor
          who_classification: WHO Bone/Soft Tissue
      EWING_SARCOMA:
        title: Ewing Sarcoma
        description: Small round cell sarcoma typically harboring EWSR1 rearrangements, arising in bone or soft tissue. Includes
          Ewing sarcoma family of tumors.
        meaning: NCIT:C4817
        annotations:
          category: solid_tumor
          who_classification: WHO Bone/Soft Tissue
      RHABDOMYOSARCOMA:
        title: Rhabdomyosarcoma
        description: Malignant soft tissue tumor with skeletal muscle differentiation, including embryonal, alveolar, and
          spindle cell/sclerosing subtypes.
        meaning: NCIT:C3359
        annotations:
          category: solid_tumor
          who_classification: WHO Bone/Soft Tissue
      SOFT_TISSUE_TUMOR:
        title: Soft Tissue Sarcoma
        description: Soft tissue neoplasms other than rhabdomyosarcoma and Ewing sarcoma, including synovial sarcoma, fibrosarcoma,
          and other sarcomas. Also includes non-sarcomatous soft tissue tumors.
        meaning: NCIT:C9306
        aliases:
        - Soft Tissue Sarcoma
        annotations:
          category: solid_tumor
      RHABDOID_TUMOR:
        title: Rhabdoid Tumor
        description: Highly aggressive tumors characterized by SMARCB1 loss, occurring outside the CNS (extracranial rhabdoid
          tumor). Includes malignant rhabdoid tumor of kidney.
        meaning: NCIT:C3808
        annotations:
          category: solid_tumor
      RENAL_TUMOR:
        title: Malignant Kidney Neoplasm
        description: Kidney tumors including Wilms tumor (nephroblastoma), clear cell sarcoma of kidney, renal cell carcinoma,
          and congenital mesoblastic nephroma.
        meaning: NCIT:C7548
        aliases:
        - Kidney Tumor
        - Wilms Tumor
        - Renal Tumors
        annotations:
          category: solid_tumor
          who_classification: WHO Pediatric Blue Book
      RETINOBLASTOMA:
        title: Retinoblastoma
        description: Malignant neoplasm of the retina arising from developing retinal cells, associated with RB1 mutations.
        meaning: NCIT:C7541
        annotations:
          category: solid_tumor
          who_classification: WHO Pediatric Blue Book
      GERM_CELL_TUMOR:
        title: Germ Cell Tumors
        description: Tumors arising from primordial germ cells, occurring in gonadal or extragonadal sites. Includes teratoma,
          yolk sac tumor, germinoma, choriocarcinoma, and mixed germ cell tumors. Excludes CNS germ cell tumors.
        meaning: NCIT:C3708
        annotations:
          category: solid_tumor
      ENDOCRINE_AND_NEUROENDOCRINE_TUMOR:
        title: Endocrine Neoplasm
        description: Tumors of endocrine glands and neuroendocrine cells, including thyroid carcinoma, adrenocortical carcinoma,
          pheochromocytoma, and paraganglioma.
        meaning: NCIT:C3010
        annotations:
          category: solid_tumor
      OTHER_SOLID_TUMOR:
        title: Childhood Solid Neoplasm
        description: Solid tumors not classified elsewhere, including hepatoblastoma, pleuropulmonary blastoma, nasopharyngeal
          carcinoma, melanoma, and carcinomas.
        meaning: NCIT:C9107
        annotations:
          category: solid_tumor
    is_a: DiagnosisCategoriesSchemaEnum
  Iccc3SchemaEnum:
    description: Schema-level enum for iccc3 in medical
    is_a: MedicalDomainEnum
    abstract: true
    annotations:
      source_file: medical/pediatric_oncology/iccc3.yaml
  ICCC3MainGroup:
    title: ICCC-3 Main Diagnostic Group
    description: The 12 main diagnostic groups of the International Classification of Childhood Cancer, Third Edition. Based
      on tumor morphology and primary site with emphasis on morphology.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://seer.cancer.gov/iccc/
    - https://seer.cancer.gov/iccc/iccc3.html
    - https://pubmed.ncbi.nlm.nih.gov/15712273/
    annotations:
      source: SEER/IARC
      version: ICCC-3
      coding_system: ICD-O-3
      source_domain: medical
      source_schema: iccc3
    permissible_values:
      I_LEUKEMIAS_MYELOPROLIFERATIVE_MYELODYSPLASTIC:
        title: Leukemia
        description: Includes lymphoid leukemias, acute myeloid leukemias, chronic myeloproliferative diseases, myelodysplastic
          syndrome and other myeloproliferative diseases, and unspecified and other specified leukemias.
        meaning: NCIT:C3161
        annotations:
          iccc_code: I
          subgroup_count: 5
      II_LYMPHOMAS_RETICULOENDOTHELIAL:
        title: Lymphoma
        description: Includes Hodgkin lymphomas, non-Hodgkin lymphomas (except Burkitt lymphoma), Burkitt lymphoma, and miscellaneous
          lymphoreticular neoplasms.
        meaning: NCIT:C3208
        annotations:
          iccc_code: II
          subgroup_count: 4
      III_CNS_INTRACRANIAL_INTRASPINAL:
        title: Brain Neoplasm
        description: Includes ependymomas and choroid plexus tumor, astrocytomas, intracranial and intraspinal embryonal tumors,
          other gliomas, other specified intracranial and intraspinal neoplasms, and unspecified intracranial and intraspinal
          neoplasms. Also includes nonmalignant CNS tumors.
        meaning: NCIT:C2907
        annotations:
          iccc_code: III
          subgroup_count: 6
          includes_nonmalignant: true
      IV_NEUROBLASTOMA_PERIPHERAL_NERVOUS:
        title: Neuroblastoma
        description: Includes neuroblastoma and ganglioneuroblastoma, and other peripheral nervous cell tumors.
        meaning: NCIT:C3270
        annotations:
          iccc_code: IV
          subgroup_count: 2
      V_RETINOBLASTOMA:
        title: Retinoblastoma
        description: Malignant neoplasm of the retina. Single group with no subgroups.
        meaning: NCIT:C7541
        annotations:
          iccc_code: V
          subgroup_count: 1
      VI_RENAL_TUMORS:
        title: Malignant Kidney Neoplasm
        description: Includes nephroblastoma and other nonepithelial renal tumors, renal carcinomas, and unspecified malignant
          renal tumors.
        meaning: NCIT:C7548
        annotations:
          iccc_code: VI
          subgroup_count: 3
      VII_HEPATIC_TUMORS:
        title: Liver Carcinoma
        description: Includes hepatoblastoma, hepatic carcinomas, and unspecified malignant hepatic tumors.
        meaning: NCIT:C7927
        annotations:
          iccc_code: VII
          subgroup_count: 3
      VIII_MALIGNANT_BONE_TUMORS:
        title: Malignant Bone Neoplasm
        description: Includes osteosarcomas, chondrosarcomas, Ewing tumor and related sarcomas of bone, other specified malignant
          bone tumors, and unspecified malignant bone tumors.
        meaning: NCIT:C4016
        annotations:
          iccc_code: VIII
          subgroup_count: 5
      IX_SOFT_TISSUE_SARCOMAS:
        title: Soft Tissue Sarcoma
        description: Includes rhabdomyosarcomas, fibrosarcomas/peripheral nerve sheath tumors/other fibrous neoplasms, Kaposi
          sarcoma, other specified soft tissue sarcomas, and unspecified soft tissue sarcomas.
        meaning: NCIT:C9306
        annotations:
          iccc_code: IX
          subgroup_count: 5
      X_GERM_CELL_GONADAL:
        title: Germ Cell Tumor
        description: Includes intracranial and intraspinal germ cell tumors, malignant extracranial and extragonadal germ
          cell tumors, malignant gonadal germ cell tumors, gonadal carcinomas, and other and unspecified malignant gonadal
          tumors.
        meaning: NCIT:C3708
        annotations:
          iccc_code: X
          subgroup_count: 5
      XI_EPITHELIAL_MELANOMA:
        title: Epithelial Neoplasm
        description: Includes adrenocortical carcinomas, thyroid carcinomas, nasopharyngeal carcinomas, malignant melanomas,
          skin carcinomas, and other and unspecified carcinomas.
        meaning: NCIT:C3709
        annotations:
          iccc_code: XI
          subgroup_count: 6
      XII_OTHER_UNSPECIFIED:
        title: Neoplasm
        description: Includes other specified malignant tumors and other unspecified malignant tumors not classifiable in
          groups I-XI.
        meaning: NCIT:C3262
        annotations:
          iccc_code: XII
          subgroup_count: 2
    is_a: Iccc3SchemaEnum
  ICCC3Subgroup:
    title: ICCC-3 Diagnostic Subgroup
    description: The 47 diagnostic subgroups of the International Classification of Childhood Cancer, Third Edition. These
      provide more detailed classification within each of the 12 main groups.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://seer.cancer.gov/iccc/iccc3.html
    - https://seer.cancer.gov/iccc/iccc3_ext.html
    annotations:
      source: SEER/IARC
      version: ICCC-3
      source_domain: medical
      source_schema: iccc3
    permissible_values:
      Ia_LYMPHOID_LEUKEMIAS:
        title: Acute Lymphoblastic Leukemia
        description: Precursor cell lymphoblastic leukemia, NOS; precursor cell lymphoblastic leukemia, B-cell; precursor
          cell lymphoblastic leukemia, T-cell; Burkitt cell leukemia; and other lymphoid leukemias.
        meaning: NCIT:C3167
        annotations:
          main_group: I
          icdo3_codes: 9820-9827, 9835-9837
      Ib_ACUTE_MYELOID_LEUKEMIAS:
        title: Acute Myeloid Leukemia
        description: Acute myeloid leukemia and variants including AML with maturation, acute promyelocytic leukemia, acute
          myelomonocytic leukemia, acute monoblastic leukemia, acute megakaryoblastic leukemia, etc.
        meaning: NCIT:C3171
        annotations:
          main_group: I
          icdo3_codes: 9840, 9861, 9866-9867, 9870-9874, 9891, 9895-9897, 9910, 9920, 9931
      Ic_CHRONIC_MYELOPROLIFERATIVE:
        title: Myeloproliferative Neoplasm
        description: Chronic myeloid leukemia, NOS; juvenile myelomonocytic leukemia; and other chronic myeloproliferative
          diseases.
        meaning: NCIT:C4345
        annotations:
          main_group: I
          icdo3_codes: 9863, 9875-9876, 9945-9946, 9950, 9960-9964
      Id_MYELODYSPLASTIC_OTHER_MYELOPROLIFERATIVE:
        title: Myelodysplastic Syndrome
        description: Myelodysplastic syndrome, NOS; refractory anemia; refractory anemia with ringed sideroblasts; refractory
          anemia with excess blasts.
        meaning: NCIT:C3247
        annotations:
          main_group: I
          icdo3_codes: 9945, 9980, 9982-9983, 9985-9989
      Ie_UNSPECIFIED_OTHER_LEUKEMIAS:
        title: Leukemia
        description: Leukemia, NOS and other specified leukemias not elsewhere classified.
        meaning: NCIT:C3161
        annotations:
          main_group: I
          icdo3_codes: 9800-9801, 9805-9809, 9860, 9930
      IIa_HODGKIN_LYMPHOMAS:
        title: Hodgkin Lymphoma
        description: Classical Hodgkin lymphoma and nodular lymphocyte predominant Hodgkin lymphoma.
        meaning: NCIT:C9357
        annotations:
          main_group: II
          icdo3_codes: 9650-9655, 9659, 9661-9665, 9667
      IIb_NON_HODGKIN_LYMPHOMAS:
        title: Non-Hodgkin Lymphoma
        description: Diffuse large B-cell lymphoma, follicular lymphoma, peripheral T-cell lymphoma, anaplastic large cell
          lymphoma, and other non-Hodgkin lymphomas.
        meaning: NCIT:C3211
        annotations:
          main_group: II
          icdo3_codes: 9591, 9670-9686, 9689-9691, 9695, 9698-9702, 9705, 9708-9709, 9714-9719, 9727-9729
      IIc_BURKITT_LYMPHOMA:
        title: Burkitt Lymphoma
        description: Burkitt lymphoma and Burkitt-like lymphoma.
        meaning: NCIT:C2912
        annotations:
          main_group: II
          icdo3_codes: '9687'
      IId_MISC_LYMPHORETICULAR:
        title: Hematopoietic and Lymphoid Cell Neoplasm
        description: Lymphoreticular neoplasms not elsewhere classified including lymphomatoid granulomatosis and post-transplant
          lymphoproliferative disorder.
        meaning: NCIT:C27134
        annotations:
          main_group: II
          icdo3_codes: 9740-9742, 9750, 9754-9758, 9930, 9970
      IIIa_EPENDYMOMAS:
        title: Ependymoma
        description: Ependymoma, anaplastic ependymoma, myxopapillary ependymoma, and choroid plexus papilloma and carcinoma.
        meaning: NCIT:C3017
        annotations:
          main_group: III
          icdo3_codes: 9383, 9390-9394
      IIIb_ASTROCYTOMAS:
        title: Astrocytoma
        description: Pilocytic astrocytoma, diffuse astrocytoma, anaplastic astrocytoma, glioblastoma, and other astrocytic
          tumors.
        meaning: NCIT:C60781
        annotations:
          main_group: III
          icdo3_codes: 9380, 9384, 9400-9411, 9420, 9424
      IIIc_INTRACRANIAL_EMBRYONAL:
        title: Central Nervous System Embryonal Tumor
        description: Medulloblastoma, primitive neuroectodermal tumor, medulloepithelioma, atypical teratoid/rhabdoid tumor,
          and other embryonal tumors.
        meaning: NCIT:C6990
        annotations:
          main_group: III
          icdo3_codes: 9470-9474, 9480, 9490, 9500-9508
      IIId_OTHER_GLIOMAS:
        title: Glioma
        description: Oligodendroglioma, anaplastic oligodendroglioma, mixed glioma, and other gliomas not elsewhere classified.
        meaning: NCIT:C3059
        annotations:
          main_group: III
          icdo3_codes: 9380-9382, 9430, 9440-9460
      IIIe_OTHER_INTRACRANIAL_INTRASPINAL:
        title: Brain Neoplasm
        description: Pituitary adenoma, craniopharyngioma, pineal tumors, and other specified intracranial neoplasms.
        meaning: NCIT:C2907
        annotations:
          main_group: III
      IIIf_UNSPECIFIED_INTRACRANIAL:
        title: Brain Neoplasm
        description: Intracranial and intraspinal neoplasms, NOS.
        meaning: NCIT:C2907
        annotations:
          main_group: III
          icdo3_codes: 8000-8005
      IVa_NEUROBLASTOMA_GANGLIONEUROBLASTOMA:
        title: Neuroblastoma
        description: Neuroblastoma, NOS and ganglioneuroblastoma.
        meaning: NCIT:C3270
        annotations:
          main_group: IV
          icdo3_codes: 9490, 9500
      IVb_OTHER_PERIPHERAL_NERVOUS:
        title: Peripheral Nervous System Neoplasm
        description: Other peripheral nerve tumors including ganglioneuroma and peripheral nerve sheath tumors.
        meaning: NCIT:C3321
        annotations:
          main_group: IV
          icdo3_codes: 9501-9504, 9520-9523
      V_RETINOBLASTOMA:
        title: Retinoblastoma
        description: Retinoblastoma.
        meaning: NCIT:C7541
        annotations:
          main_group: V
          icdo3_codes: 9510-9514
      VIa_NEPHROBLASTOMA:
        title: Wilms Tumor
        description: Wilms tumor (nephroblastoma), clear cell sarcoma of kidney, rhabdoid tumor of kidney, and other nonepithelial
          renal tumors.
        meaning: NCIT:C3267
        annotations:
          main_group: VI
          icdo3_codes: 8960, 8963-8964
      VIb_RENAL_CARCINOMAS:
        title: Renal Cell Carcinoma
        description: Renal cell carcinoma and other renal carcinomas.
        meaning: NCIT:C9385
        annotations:
          main_group: VI
      VIc_UNSPECIFIED_RENAL:
        title: Malignant Kidney Neoplasm
        description: Malignant renal tumors, NOS.
        meaning: NCIT:C7548
        annotations:
          main_group: VI
      VIIa_HEPATOBLASTOMA:
        title: Hepatoblastoma
        description: Hepatoblastoma.
        meaning: NCIT:C3728
        annotations:
          main_group: VII
          icdo3_codes: '8970'
      VIIb_HEPATIC_CARCINOMAS:
        title: Hepatocellular Carcinoma
        description: Hepatocellular carcinoma, cholangiocarcinoma, and other hepatic carcinomas.
        meaning: NCIT:C3099
        annotations:
          main_group: VII
      VIIc_UNSPECIFIED_HEPATIC:
        title: Liver Carcinoma
        description: Malignant hepatic tumors, NOS.
        meaning: NCIT:C7927
        annotations:
          main_group: VII
      VIIIa_OSTEOSARCOMAS:
        title: Osteosarcoma
        description: Osteosarcoma, NOS and variants including chondroblastic, fibroblastic, telangiectatic, and small cell
          osteosarcoma.
        meaning: NCIT:C9145
        annotations:
          main_group: VIII
          icdo3_codes: 9180-9187, 9191-9195
      VIIIb_CHONDROSARCOMAS:
        title: Chondrosarcoma
        description: Chondrosarcoma, NOS and variants.
        meaning: NCIT:C2946
        annotations:
          main_group: VIII
          icdo3_codes: 9220-9231, 9240-9243
      VIIIc_EWING_TUMOR_BONE:
        title: Ewing Sarcoma
        description: Ewing sarcoma of bone and peripheral primitive neuroectodermal tumor of bone.
        meaning: NCIT:C4817
        annotations:
          main_group: VIII
          icdo3_codes: 9260, 9364
      VIIId_OTHER_BONE:
        title: Malignant Bone Neoplasm
        description: Other specified malignant bone tumors including giant cell tumor of bone, malignant and adamantinoma.
        meaning: NCIT:C4016
        annotations:
          main_group: VIII
      VIIIe_UNSPECIFIED_BONE:
        title: Malignant Bone Neoplasm
        description: Malignant bone tumors, NOS.
        meaning: NCIT:C4016
        annotations:
          main_group: VIII
      IXa_RHABDOMYOSARCOMAS:
        title: Rhabdomyosarcoma
        description: Rhabdomyosarcoma, NOS; embryonal rhabdomyosarcoma; alveolar rhabdomyosarcoma; and other rhabdomyosarcomas.
        meaning: NCIT:C3359
        annotations:
          main_group: IX
          icdo3_codes: 8900-8905, 8910, 8912, 8920
      IXb_FIBROSARCOMAS:
        title: Fibrosarcoma
        description: Fibrosarcoma, NOS; infantile fibrosarcoma; dermatofibrosarcoma; and malignant peripheral nerve sheath
          tumor.
        meaning: NCIT:C3043
        annotations:
          main_group: IX
          icdo3_codes: 8810-8815, 8820-8823, 8830, 8832-8833, 9540, 9560-9561
      IXc_KAPOSI_SARCOMA:
        title: Kaposi Sarcoma
        description: Kaposi sarcoma.
        meaning: NCIT:C9087
        annotations:
          main_group: IX
          icdo3_codes: '9140'
      IXd_OTHER_SOFT_TISSUE:
        title: Soft Tissue Sarcoma
        description: Includes liposarcoma, leiomyosarcoma, synovial sarcoma, hemangiosarcoma, and other specified soft tissue
          sarcomas.
        meaning: NCIT:C9306
        annotations:
          main_group: IX
      IXe_UNSPECIFIED_SOFT_TISSUE:
        title: Soft Tissue Sarcoma
        description: Soft tissue sarcomas, NOS.
        meaning: NCIT:C9306
        annotations:
          main_group: IX
      Xa_INTRACRANIAL_GERM_CELL:
        title: Central Nervous System Germ Cell Tumor
        description: CNS germ cell tumors including germinoma, teratoma, and nongerminomatous germ cell tumors.
        meaning: NCIT:C5461
        annotations:
          main_group: X
          icdo3_codes: 9060-9102
      Xb_EXTRACRANIAL_EXTRAGONADAL_GERM_CELL:
        title: Malignant Extragonadal Germ Cell Tumor
        description: Extracranial germ cell tumors not involving the gonads including sacrococcygeal, retroperitoneal, and
          mediastinal germ cell tumors.
        meaning: NCIT:C8881
        annotations:
          main_group: X
      Xc_GONADAL_GERM_CELL:
        title: Germ Cell Tumor
        description: Germ cell tumors of the ovary and testis including dysgerminoma, yolk sac tumor, embryonal carcinoma,
          and mixed germ cell tumors.
        meaning: NCIT:C3708
        annotations:
          main_group: X
      Xd_GONADAL_CARCINOMAS:
        title: Epithelial Neoplasm
        description: Carcinomas arising in the ovary and testis.
        meaning: NCIT:C3709
        annotations:
          main_group: X
      Xe_OTHER_GONADAL:
        title: Germ Cell Tumor
        description: Other specified and unspecified gonadal tumors.
        meaning: NCIT:C3708
        annotations:
          main_group: X
      XIa_ADRENOCORTICAL_CARCINOMAS:
        title: Adrenal Cortical Carcinoma
        description: Adrenocortical carcinoma.
        meaning: NCIT:C9325
        annotations:
          main_group: XI
          icdo3_codes: '8370'
      XIb_THYROID_CARCINOMAS:
        title: Malignant Thyroid Gland Neoplasm
        description: Papillary thyroid carcinoma, follicular thyroid carcinoma, and medullary thyroid carcinoma.
        meaning: NCIT:C7510
        annotations:
          main_group: XI
      XIc_NASOPHARYNGEAL_CARCINOMAS:
        title: Nasopharyngeal Carcinoma
        description: Nasopharyngeal carcinoma and related carcinomas.
        meaning: NCIT:C3871
        annotations:
          main_group: XI
      XId_MALIGNANT_MELANOMAS:
        title: Melanoma
        description: Cutaneous and non-cutaneous malignant melanomas.
        meaning: NCIT:C3224
        annotations:
          main_group: XI
      XIe_SKIN_CARCINOMAS:
        title: Skin Neoplasm
        description: Basal cell carcinoma, squamous cell carcinoma of skin, and other skin carcinomas.
        meaning: NCIT:C3372
        annotations:
          main_group: XI
      XIf_OTHER_CARCINOMAS:
        title: Epithelial Neoplasm
        description: Carcinomas at other sites and carcinomas, NOS.
        meaning: NCIT:C3709
        annotations:
          main_group: XI
      XIIa_OTHER_SPECIFIED:
        title: Neoplasm
        description: Malignant tumors not classifiable in groups I-XI but with specified histology.
        meaning: NCIT:C3262
        annotations:
          main_group: XII
      XIIb_OTHER_UNSPECIFIED:
        title: Neoplasm
        description: Malignant tumors, NOS not classifiable in groups I-XI.
        meaning: NCIT:C3262
        annotations:
          main_group: XII
    is_a: Iccc3SchemaEnum
  NeuroblastomaSchemaEnum:
    description: Schema-level enum for neuroblastoma in medical
    is_a: MedicalDomainEnum
    abstract: true
    annotations:
      source_file: medical/pediatric_oncology/staging/neuroblastoma.yaml
  INRGSSStage:
    title: INRGSS Stage
    description: International Neuroblastoma Risk Group Staging System (INRGSS) stages. A clinical staging system based on
      imaging and image-defined risk factors (IDRFs), effective for diagnosis years 2024+. Allows staging before any treatment,
      unlike the surgical INSS system.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://staging.seer.cancer.gov/pediatric/input/1.0/neuroblastoma/inrgss/
    - https://pmc.ncbi.nlm.nih.gov/articles/PMC2650389/
    annotations:
      source: SEER/INRG Task Force
      effective_year: 2024
      staging_basis: imaging
      source_domain: medical
      source_schema: neuroblastoma
    permissible_values:
      L1:
        title: INRG Stage L1
        description: Localized tumor not involving vital structures as defined by the list of image-defined risk factors and
          confined to one body compartment (neck, chest, abdomen, or pelvis).
        meaning: NCIT:C133428
        annotations:
          localized: true
          idrfs_present: false
      L2:
        title: INRG Stage L2
        description: Locoregional tumor with presence of one or more image-defined risk factors. The tumor has not spread
          far from where it started but has at least one IDRF.
        meaning: NCIT:C133429
        annotations:
          localized: true
          idrfs_present: true
      M:
        title: INRG Stage M
        description: Distant metastatic disease (except as defined for MS). The tumor has spread (metastasized) to distant
          parts of the body.
        meaning: NCIT:C133430
        annotations:
          metastatic: true
      MS:
        title: INRG Stage MS
        description: Metastatic disease in children younger than 18 months with metastases confined to skin, liver, and/or
          bone marrow (bone marrow involvement limited to <10% tumor cells). This stage has a favorable prognosis despite
          metastatic disease.
        meaning: NCIT:C133431
        aliases:
        - Stage 4S equivalent
        annotations:
          metastatic: true
          special_category: true
          age_restriction: <18 months
          favorable_prognosis: true
    is_a: NeuroblastomaSchemaEnum
  INSSStage:
    title: INSS Stage
    description: International Neuroblastoma Staging System (INSS) stages. A post-surgical staging system based on extent
      of tumor resection, lymph node involvement, and metastatic spread. This is the legacy system; INRGSS is now preferred
      for diagnosis years 2024+.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://www.ncbi.nlm.nih.gov/books/NBK65747.5/table/CDR0000062786__725/
    - https://www.cancer.org/cancer/types/neuroblastoma/detection-diagnosis-staging/staging.html
    annotations:
      source: INSS Consensus Conference
      staging_basis: surgical
      legacy_system: true
      source_domain: medical
      source_schema: neuroblastoma
    permissible_values:
      STAGE_1:
        title: INSS Stage 1
        description: Localized tumor with complete gross excision, with or without microscopic residual disease; representative
          ipsilateral lymph nodes negative for tumor microscopically.
        meaning: NCIT:C85417
        annotations:
          localized: true
          resection: complete
      STAGE_2A:
        title: INSS Stage 2A
        description: Localized tumor with incomplete gross excision; representative ipsilateral nonadherent lymph nodes negative
          for tumor microscopically.
        meaning: NCIT:C85418
        annotations:
          localized: true
          resection: incomplete
          lymph_nodes: negative
      STAGE_2B:
        title: INSS Stage 2B
        description: Localized tumor with or without complete gross excision, with ipsilateral nonadherent lymph nodes positive
          for tumor. Enlarged contralateral lymph nodes must be negative microscopically.
        meaning: NCIT:C85419
        annotations:
          localized: true
          lymph_nodes: ipsilateral_positive
      STAGE_3:
        title: INSS Stage 3
        description: Unresectable unilateral tumor infiltrating across the midline, with or without regional lymph node involvement;
          or localized unilateral tumor with contralateral regional lymph node involvement; or midline tumor with bilateral
          extension by infiltration (unresectable) or by lymph node involvement.
        meaning: NCIT:C85420
        annotations:
          localized: false
          crosses_midline: true
      STAGE_4:
        title: INSS Stage 4
        description: Any primary tumor with dissemination to distant lymph nodes, bone, bone marrow, liver, skin, and/or other
          organs (except as defined for stage 4S).
        meaning: NCIT:C85421
        annotations:
          metastatic: true
      STAGE_4S:
        title: INSS Stage 4S
        description: Localized primary tumor (as defined for stage 1, 2A, or 2B) with dissemination limited to skin, liver,
          and/or bone marrow (limited to infants <1 year of age). Marrow involvement should be minimal (<10% of total nucleated
          cells).
        meaning: NCIT:C85422
        aliases:
        - Special stage 4
        annotations:
          metastatic: true
          special_category: true
          age_restriction: <12 months
          favorable_prognosis: true
    is_a: NeuroblastomaSchemaEnum
  NeuroblastomaRiskGroup:
    title: Neuroblastoma Risk Group
    description: International Neuroblastoma Risk Group (INRG) pretreatment risk classification groups. Combines INRGSS stage
      with tumor histology, MYCN status, ploidy, and other prognostic factors.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://pmc.ncbi.nlm.nih.gov/articles/PMC2650388/
    annotations:
      source: INRG Task Force
      source_domain: medical
      source_schema: neuroblastoma
    permissible_values:
      VERY_LOW:
        title: Very Low Risk
        description: Very low risk neuroblastoma with excellent prognosis. Typically includes L1 tumors and MS without MYCN
          amplification.
        annotations:
          expected_efs: '>85%'
      LOW:
        title: Low Risk
        description: Low risk neuroblastoma with favorable prognosis. Treatment may include surgery alone or observation.
        annotations:
          expected_efs: '>75%'
      INTERMEDIATE:
        title: Intermediate Risk
        description: Intermediate risk neuroblastoma requiring multimodal treatment including chemotherapy.
        annotations:
          expected_efs: 50-75%
      HIGH:
        title: High Risk Neuroblastoma
        description: High risk neuroblastoma with poor prognosis. Requires intensive multimodal therapy including high-dose
          chemotherapy with autologous stem cell rescue, surgery, radiation, and immunotherapy.
        meaning: NCIT:C150281
        annotations:
          expected_efs: <50%
          mycn_amplified: often
    is_a: NeuroblastomaSchemaEnum
  ImageDefinedRiskFactor:
    title: Image-Defined Risk Factor
    description: Image-defined risk factors (IDRFs) used in INRGSS staging to determine surgical risk. Presence of any IDRF
      upgrades a tumor from L1 to L2.
    status: RELEASED
    contributors:
    - orcid:0000-0002-6601-2165
    - https://github.com/anthropics/claude-code
    instantiates:
    - valuesets_meta:ValueSetEnumDefinition
    see_also:
    - https://pmc.ncbi.nlm.nih.gov/articles/PMC2650389/
    annotations:
      source: INRG Task Force
      source_domain: medical
      source_schema: neuroblastoma
    permissible_values:
      IPSILATERAL_TUMOR_EXTENSION_TO_BODY_CAVITIES:
        title: Ipsilateral tumor extension within two body compartments
        description: Tumor extension from neck to chest, chest to abdomen, or abdomen to pelvis.
      NECK_ENCASING_CAROTID_OR_VERTEBRAL:
        title: Neck - Tumor encasing carotid and/or vertebral artery
        description: Tumor encasing carotid artery and/or vertebral artery.
      NECK_ENCASING_JUGULAR:
        title: Neck - Tumor encasing internal jugular vein
        description: Tumor encasing internal jugular vein.
      NECK_EXTENDING_TO_SKULL_BASE:
        title: Neck - Tumor extending to base of skull
        description: Tumor extending to base of skull.
      NECK_COMPRESSING_TRACHEA:
        title: Neck - Tumor compressing trachea
        description: Tumor compressing the trachea.
      CERVICOTHORACIC_ENCASING_BRACHIAL_PLEXUS:
        title: Cervico-thoracic junction - Tumor encasing brachial plexus roots
        description: Tumor encasing brachial plexus roots (C5-T1).
      CERVICOTHORACIC_ENCASING_SUBCLAVIAN:
        title: Cervico-thoracic junction - Tumor encasing subclavian vessels
        description: Tumor encasing subclavian vessels and/or vertebral artery and/or carotid artery.
      CERVICOTHORACIC_COMPRESSING_TRACHEA:
        title: Cervico-thoracic junction - Tumor compressing trachea
        description: Tumor compressing the trachea.
      THORAX_ENCASING_AORTA:
        title: Thorax - Tumor encasing aorta and/or major branches
        description: Tumor encasing aorta and/or major branches.
      THORAX_COMPRESSING_TRACHEA_BRONCHI:
        title: Thorax - Tumor compressing trachea and/or principal bronchi
        description: Tumor compressing trachea and/or principal bronchi.
      THORAX_LOWER_MEDIASTINUM_INFILTRATING:
        title: Thorax - Lower mediastinal tumor infiltrating costo-vertebral junction
        description: Lower mediastinal tumor infiltrating the costo-vertebral junction between T9 and T12.
      THORACOABDOMINAL_ENCASING_AORTA_CELIAC:
        title: Thoraco-abdominal - Tumor encasing aorta and/or vena cava
        description: Tumor encasing the aorta and/or vena cava.
      ABDOMEN_PELVIS_ENCASING_CELIAC_SMA:
        title: Abdomen/pelvis - Tumor encasing celiac axis and/or SMA
        description: Tumor encasing celiac axis and/or superior mesenteric artery.
      ABDOMEN_PELVIS_ENCASING_RENAL_VESSELS:
        title: Abdomen/pelvis - Tumor encasing origin of renal vessels
        description: Tumor encasing origin of renal vessels.
      ABDOMEN_PELVIS_ENCASING_AORTA_IVC:
        title: Abdomen/pelvis - Tumor encasing aorta and/or IVC
        description: Tumor encasing aorta and/or inferior vena cava.
      ABDOMEN_PELVIS_ENCASING_ILIAC_VESSELS:
        title: Abdomen/pelvis - Tumor encasing iliac vessels
        description: Tumor encasing iliac vessels.
      ABDOMEN_PELVIS_PELVIC_CROSSING_SCIATIC_NOTCH:
        title: Abdomen/pelvis - Pelvic tumor crossing sciatic notch
        description: Pelvic tumor crossing the sciatic notch.
      INTRASPINAL_EXTENSION:
        title: Intraspinal tumor extension
        description: Intraspinal tumor extension provided that more than one third of the spinal canal in the axial plane
          is invaded and/or the perimedullary leptomeningeal spaces are not visible and/or spinal cord signal is abnormal.
      ADJACENT_ORGAN_INFILTRATION:
        title: Infiltration of adjacent organs/structures
        description: Infiltration of adjacent organs/structures such as pericardium, diaphragm, kidney, liver, duodeno-pancreatic
          block, and mesentery.
    is_a: NeuroblastomaSchemaEnum
