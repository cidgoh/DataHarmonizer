    examples:
      - value: Blood
  anatomical_part:
    name: anatomical_part
    slot_uri: GENEPIO:0001214
    title: anatomical part
    any_of:
      - range: AnatomicalPartMenu
      - range: NullValueMenu
    required: true
    description: An anatomical part of an organism e.g. oropharynx.
    multivalued: true
    exact_mappings:
