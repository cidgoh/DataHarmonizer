  collection_method:
    name: collection_method
    slot_uri: GENEPIO:0001241
    title: collection method
    any_of:
      - range: CollectionMethodMenu
      - range: NullValueMenu
    required: true
    description: The process used to collect the sample e.g. phlebotomy, necropsy.
    multivalued: true
    exact_mappings:
