  body_product:
    name: body_product
    slot_uri: GENEPIO:0001216
    title: body product
    any_of:
      - range: BodyProductMenu
      - range: NullValueMenu
    required: true
    description: A substance excreted/secreted from an organism e.g. feces, urine, sweat.
    multivalued: true
    exact_mappings:
      - GISAID:Specimen%20source
      - CNPHI:Body%20Product
