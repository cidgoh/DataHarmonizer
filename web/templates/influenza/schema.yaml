    examples:
      - value: '30'
  authors:
    name: authors
    slot_uri: GENEPIO:0001517
    title: authors
    range: WhitespaceMinimizedString
    recommended: true
    description: Names of individuals contributing to the processes of sample collection, sequence generation, analysis, and data submission.
    exact_mappings:
      - GISAID:Authors
      - CNPHI:Authors
