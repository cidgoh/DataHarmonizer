    permissible_values:
      Whole genome sequencing assay [OBI:0002117]:
        text: Whole genome sequencing assay [OBI:0002117]
        title: Whole genome sequencing assay [OBI:0002117]
        meaning: OBI:0002117
        description: A DNA sequencing assay that intends to provide information about the sequence of an entire genome of an organism.
      Whole metagenome sequencing assay [OBI:0002623]:
        text: Whole metagenome sequencing assay [OBI:0002623]
        title: Whole metagenome sequencing assay [OBI:0002623]
        meaning: OBI:0002623
        description: A DNA sequencing assay that intends to provide information on the DNA sequences of multiple genomes (a metagenome) from different organisms present in the same input sample.
      16S ribosomal gene sequencing assay [OBI:0002763]:
        text: 16S ribosomal gene sequencing assay [OBI:0002763]
        title: 16S ribosomal gene sequencing assay [OBI:0002763]
        meaning: OBI:0002763
        description: An amplicon sequencing assay in which the amplicon is derived from universal primers used to amplify the 16S ribosomal RNA gene from isolate bacterial genomic DNA or metagenomic DNA from a microbioal community. Resulting sequences are compared to reference 16S sequence databases to identify or classify bacteria present within a given sample.
      PCR assay [OBI:0002740]:
        text: PCR assay [OBI:0002740]
        title: PCR assay [OBI:0002740]
        meaning: OBI:0002740
        description: An organism identification assay that is based on PCR.
      Comparative phenotypic assessment [OBI:0001546]:
        text: Comparative phenotypic assessment [OBI:0001546]
        title: Comparative phenotypic assessment [OBI:0001546]
        meaning: OBI:0001546
        description: Interpreting data from assays that evaluate the qualities or dispositions inhering in an organism or organism part and comparing it to data from other organisms to make a conclusion about a phenotypic difference
