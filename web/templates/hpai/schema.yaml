slots:
  specimen_sample_collector_sample_id:
    name: specimen_sample_collector_sample_id
    slot_uri: GENEPIO:0001123
    title: specimen_collector_sample_ID
    range: WhitespaceMinimizedString
    required: true
    description: The user-defined name for the sample.
    identifier: true
    exact_mappings:
      - BIOSAMPLE_Enterics:sample_name
    comments:
      - Store the collector sample ID. If this number is considered identifiable information, provide an alternative ID. Be sure to store the key that maps between the original and alternative IDs for traceability and follow up if necessary. Every collector sample ID from a single submitter must be unique. It can have any format, but we suggest that you make it concise, unique and consistent within your lab.
    examples:
      - value: ASDFG123
  specimen_collector_subsample_id:
    name: specimen_collector_subsample_id
    slot_uri: GENEPIO:0100752
    title: specimen_collector_subsample_ID
    range: WhitespaceMinimizedString
    description: The user-defined identifier assigned to a portion of the original sample.
    comments:
      - Store the ID for the subsample/aliquot.
    examples:
      - value: ASDFG123_12
  pooled_sample_id:
    name: pooled_sample_id
    slot_uri: GENEPIO:0100996
    title: pooled_sample_ID
    range: WhitespaceMinimizedString
    description: The user-defined identifier assigned to a combined (pooled) set of samples.
    comments:
      - If the sample being analyzed is the result of pooling individual samples, rename the pooled sample with a new identifier. Store the pooled sample ID.
    examples:
      - value: 12345AYZ
  sampling_site_id:
    name: sampling_site_id
    slot_uri: GENEPIO:0100760
    title: sampling_site_ID
    range: WhitespaceMinimizedString
    recommended: true
    description: The user-defined identifier assigned to a specific location from which samples are taken.
    comments:
      - Store the ID for the site from which a sample was taken. The "site" is user defined (e.g. it may be a building and its environs, a specific entity within an environment). Please use the same site ID for all samples from a given site, regardless of when these samples were taken. Any important changes in site location, should be represented with a new site ID.
    examples:
      - value: Site 12A
  sampling_event_id:
    name: sampling_event_id
    slot_uri: GENEPIO:0100761
    title: sampling_event_ID
    range: WhitespaceMinimizedString
    recommended: true
    description: The user-defined identifier assigned to a specific event during which one or more samples are taken, from one or more sites.
    comments:
      - Store the ID for the event during which a sample or samples were taken. For example, an event could be one person taking samples from multiple sites, or multiple people taking samples from one site.
    examples:
      - value: Event 120522.1
  bioproject_accession:
    name: bioproject_accession
    slot_uri: GENEPIO:0001136
    title: BioProject_accession
    range: WhitespaceMinimizedString
    description: The INSDC (i.e., ENA, NCBI, or DDBJ) accession number of the BioProject(s) to which the BioSample belongs.
    pattern: '{UPPER_CASE}'
    structured_pattern:
      syntax: '{UPPER_CASE}'
      partial_match: false
      interpolated: true
    exact_mappings:
      - BIOSAMPLE_Enterics:bioproject_accession
    comments:
      - Store the BioProject accession number. BioProjects are an organizing tool that links together raw sequence data, assemblies, and their associated metadata. Each province will be assigned a different bioproject accession number by the National Microbiology Lab. A valid NCBI BioProject accession has prefix PRJN e.g., PRJNA12345, and is created once at the beginning of a new sequencing project.
    examples:
      - value: PRJNA608651
  biosample_accession:
    name: biosample_accession
    slot_uri: GENEPIO:0001139
    title: BioSample_accession
    range: WhitespaceMinimizedString
    recommended: true
    description: The identifier assigned to a BioSample in INSDC (i.e., ENA, NCBI, or DDBJ) archives.
    pattern: '{UPPER_CASE}'
    structured_pattern:
      syntax: '{UPPER_CASE}'
      partial_match: false
      interpolated: true
    comments:
      - Store the accession returned from the BioSample submission. NCBI BioSamples will have the prefix SAMN, ENA have the prefix SAMEA, DDBJ have SAMD
    examples:
      - value: SAMN14180202, SAMD00000001
  insdc_sequence_read_accession:
    name: insdc_sequence_read_accession
    slot_uri: GENEPIO:0101203
    title: INSDC sequence read accession
    range: WhitespaceMinimizedString
    description: The identifier assigned to a sequence in one of the International Nucleotide Sequence Database Collaboration (INSDC) repositories.
    pattern: '{UPPER_CASE}'
    structured_pattern:
      syntax: '{UPPER_CASE}'
      partial_match: false
      interpolated: true
    comments:
      - Store the accession assigned to the submitted sequence. European Nucleotide Archive (ENA) sequence accessions start with ERR, NCBI-SRA accessions start with SRR,  DNA Data Bank of Japan (DDBJ) accessions start with DRR and Genome Sequence Archive (GSA) accessions start with CRR.
    examples:
      - value: ERR123456, DRR123456, CRR123456
  insdc_assembly_accession:
    name: insdc_assembly_accession
    slot_uri: GENEPIO:0101204
    title: INSDC assembly accession
    range: WhitespaceMinimizedString
    description: The versioned identifier assigned to an assembly or consensus sequence in  one of the International Nucleotide Sequence Database Collaboration (INSDC) repositories.
    pattern: '{UPPER_CASE}'
    structured_pattern:
      syntax: '{UPPER_CASE}'
      partial_match: false
      interpolated: true
    comments:
      - Store the versioned accession assigned to the submitted sequence e.g. the GenBank accession version.
    examples:
      - value: LZ986655.1
  sample_collection_data_steward_name:
    name: sample_collection_data_steward_name
    slot_uri: GENEPIO:0100762
    title: sample_collection_data_steward_name
    range: WhitespaceMinimizedString
    description: The name of the individual responsible for the data governance, (meta)data usage and distribution of the sample.
    comments:
      - Provide the name of the sample collection data steward.
    examples:
      - value: Joe Bloggs
  sample_collection_data_steward_contact_email:
    name: sample_collection_data_steward_contact_email
    slot_uri: GENEPIO:0101107
    title: sample_collection_data_steward_contact_email
    range: WhitespaceMinimizedString
    description: The email address of the individual responsible for the data governance, (meta)data usage and distribution of the sample.
    comments:
      - Provide the email address of the sample collection data steward. This may or may not be the same individual/organization that collected the sample. If the contact is the same, provide the same address as the "sample collector contact email".
    examples:
      - value: bloggsj@aglab.ca
  sample_collected_by:
    name: sample_collected_by
    slot_uri: GENEPIO:0001153
    title: sample_collected_by
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    required: true
    description: The name of the organization with which the sample collector is affiliated.
    exact_mappings:
      - BIOSAMPLE_Enterics:collected_by
    comments:
      - The name of the agency should be written out in full, (with minor exceptions) and be consistent across multiple submissions.
    examples:
      - value: Public Health Agency of Canada
  sample_collector_contact_email:
    name: sample_collector_contact_email
    slot_uri: GENEPIO:0001156
    title: sample_collector_contact_email
    range: WhitespaceMinimizedString
    description: The email address of the contact responsible for follow-up regarding the sample.
    pattern: ^\S+@\S+\.\S+$
    comments:
      - The email address can represent a specific individual or lab e.g. johnnyblogs@lab.ca, or RespLab@lab.ca
    examples:
      - value: WaterTester@facility.ca
  geo_loc_name_country:
    name: geo_loc_name_country
    slot_uri: GENEPIO:0001181
    title: geo_loc_name_(country)
    any_of:
      - range: GeoLocNameCountryMenu
      - range: NullValueMenu
    required: true
    description: The country of origin of the sample.
    exact_mappings:
      - BIOSAMPLE_Enterics:geo_loc_name
    comments:
      - If known, select a value from the pick list.
    examples:
      - value: Canada
  geo_loc_name_state_province_territory_region:
    name: geo_loc_name_state_province_territory_region
    slot_uri: GENEPIO:0001185
    title: geo_loc_name_(state/province/territory)
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    required: true
    description: The state/province/territory of origin of the sample.
    exact_mappings:
      - BIOSAMPLE_Enterics:geo_loc_name
    comments:
      - 'Provide the state/province/territory name from the GAZ geography ontology. Search for geography terms here: https://www.ebi.ac.uk/ols/ontologies/ga'
    examples:
      - value: Western Cape
  geo_loc_name_county_region:
    name: geo_loc_name_county_region
    slot_uri: GENEPIO:0100280
    title: geo_loc_name_(county/region)
    range: WhitespaceMinimizedString
    description: The county/region of origin of the sample.
    comments:
      - 'Provide the county/region name from the GAZ geography ontology. Search for geography terms here: https://www.ebi.ac.uk/ols/ontologies/gaz'
    examples:
      - value: Derbyshire
  geo_loc_name_city:
    name: geo_loc_name_city
    slot_uri: GENEPIO:0001189
    title: geo_loc_name_(city)
    range: WhitespaceMinimizedString
    description: The city of origin of the sample.
    comments:
      - 'Provide the city name from the GAZ geography ontology. Search for geography terms here: https://www.ebi.ac.uk/ols/ontologies/gaz'
    examples:
      - value: Vancouver
  geo_loc_name_site:
    name: geo_loc_name_site
    slot_uri: GENEPIO:0100436
    title: geo_loc_name_(site)
    range: WhitespaceMinimizedString
    description: The name of a specific geographical location e.g. Credit River (rather than river).
    comments:
      - Provide the name of the specific geographical site using a specific noun (a word that names a certain place, thing).
    examples:
      - value: Credit River
  geo_loc_latitude:
    name: geo_loc_latitude
    slot_uri: GENEPIO:0100309
    title: geo_loc_latitude
    range: WhitespaceMinimizedString
    description: The latitude coordinates of the geographical location of sample collection.
    exact_mappings:
      - BIOSAMPLE_Enterics:lat_lon
    comments:
      - Provide latitude coordinates if available. Do not use the centre of the city/region/province/state/country or the location of your agency as a proxy, as this implicates a real location and is misleading. Specify as degrees latitude in format "d[d.dddd] N|S".
    examples:
      - value: 38.98 N
  geo_loc_longitude:
    name: geo_loc_longitude
    slot_uri: GENEPIO:0100310
    title: geo_loc_longitude
    range: WhitespaceMinimizedString
    description: The longitude coordinates of the geographical location of sample collection.
    exact_mappings:
      - BIOSAMPLE_Enterics:lat_lon
    comments:
      - Provide longitude coordinates if available. Do not use the centre of the city/region/province/state/country or the location of your agency as a proxy, as this implicates a real location and is misleading. Specify as degrees longitude in format "d[dd.dddd] W|E".
    examples:
      - value: 77.11 W
  organism:
    name: organism
    slot_uri: GENEPIO:0001191
    title: organism
    any_of:
      - range: OrganismMenu
      - range: NullValueMenu
    required: true
    description: Taxonomic name of the organism.
    multivalued: true
    exact_mappings:
      - BIOSAMPLE_Enterics:organism
    comments:
      - 'Provide the official nomenclature for the organism(s) present in the sample. Multiple organisms can be entered, separated by semicolons. Avoid abbreviations. Search for taxonomic names here: ncbi.nlm.nih.gov/taxonomy.'
    examples:
      - value: Vibrio cholerae
  influenza_subtype:
    name: influenza_subtype
    slot_uri: GENEPIO:0101108
    title: influenza_subtype
    range: InfluenzaSubtypeMenu
    required: true
    multivalued: true
  influenza_subtyping_scheme_name:
    name: influenza_subtyping_scheme_name
    slot_uri: GENEPIO:0101109
    title: influenza_subtyping_scheme_name
    range: InfluenzaSubtypingSchemeNameMenu
  taxonomic_identification_process:
    name: taxonomic_identification_process
    slot_uri: GENEPIO:0100583
    title: taxonomic_identification_process
    range: TaxonomicIdentificationProcessMenu
  virus_identifier:
    name: virus_identifier
    slot_uri: GENEPIO:0101110
    title: virus_identifier
    range: WhitespaceMinimizedString
  who_oie_fao_h5_clade:
    name: who_oie_fao_h5_clade
    slot_uri: GENEPIO:0101111
    title: WHO/OIE/FAO_H5_clade
    range: WhitespaceMinimizedString
  sample_collection_date:
    name: sample_collection_date
    slot_uri: GENEPIO:0001174
    title: sample_collection_date
    any_of:
      - range: date
      - range: NullValueMenu
    required: true
    description: The date on which the sample was collected, or sampling began for a continuous sample.
    todos:
      - <={today}
    exact_mappings:
      - BIOSAMPLE_Enterics:collection_date
    comments:
      - If your sample is a continuous sample please use this field to capture your start date. Sample collection date is critical for surveillance and many types of analyses. Required granularity includes year, month and day. The date should be provided in ISO 8601 standard format "YYYY-MM-DD".
    examples:
      - value: '2020-03-16'
  sample_collection_end_date:
    name: sample_collection_end_date
    slot_uri: GENEPIO:0101071
    title: sample_collection_end_date
    any_of:
      - range: date
      - range: NullValueMenu
    recommended: true
    description: The date on which sample collection ended for a continuous sample.
    todos:
      - '>={sample_collection_date}'
      - <={today}
    comments:
      - Provide the date that sample collection ended in ISO 8601 format i.e. YYYY-MM-DD
    examples:
      - value: '2020-03-18'
  sample_collection_start_time:
    name: sample_collection_start_time
    slot_uri: GENEPIO:0101072
    title: sample_collection_start_time
    any_of:
      - range: time
      - range: NullValueMenu
    recommended: true
    description: The time at which sample collection began.
    comments:
      - Provide this time in ISO 8601 24hr format, in your local time.
    examples:
      - value: 17:15 PST
  sample_collection_end_time:
    name: sample_collection_end_time
    slot_uri: GENEPIO:0101073
    title: sample_collection_end_time
    any_of:
      - range: time
      - range: NullValueMenu
    recommended: true
    description: The time at which sample collection ended.
    comments:
      - Provide this time in ISO 8601 24hr format, in your local time.
    examples:
      - value: 19:15 PST
  sample_collection_time_of_day:
    name: sample_collection_time_of_day
    slot_uri: GENEPIO:0100765
    title: sample_collection_time_of_day
    any_of:
      - range: SampleCollectionTimeOfDayMenu
      - range: NullValueMenu
    description: The descriptive time of day during which the sample was collected.
    comments:
      - If known, select a value from the pick list. The time of sample processing matters especially for grab samples, as fecal concentration in wastewater fluctuates over the course of the day.
    examples:
      - value: Morning
  sample_collection_time_duration_value:
    name: sample_collection_time_duration_value
    slot_uri: GENEPIO:0100766
    title: sample_collection_time_duration_value
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    recommended: true
    description: The amount of time over which the sample was collected.
    comments:
      - Provide the numerical value of time.
    examples:
      - value: '4'
  sample_collection_time_duration_unit:
    name: sample_collection_time_duration_unit
    slot_uri: GENEPIO:0100767
    title: sample_collection_time_duration_unit
    any_of:
      - range: SampleCollectionDurationUnitMenu
      - range: NullValueMenu
    recommended: true
    description: The units of the time duration measurement of sample collection.
    comments:
      - Provide the units from the pick list.
    examples:
      - value: Hour
  sample_received_date:
    name: sample_received_date
    slot_uri: GENEPIO:0001179
    title: sample received date
    any_of:
      - range: date
      - range: NullValueMenu
    description: The date on which the sample was received.
    todos:
      - <={today}
    comments:
      - Provide the sample received date in ISO 8601 format, i.e. "YYYY-MM-DD".
    examples:
      - value: '2020-03-28'
  sample_processing_date:
    name: sample_processing_date
    slot_uri: GENEPIO:0100763
    title: sample processing date
    any_of:
      - range: date
      - range: NullValueMenu
    description: The date on which the sample was processed.
    todos:
      - <={today}
