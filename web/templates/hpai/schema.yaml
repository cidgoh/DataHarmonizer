    title: quality_control_issues menu
    permissible_values:
      Low quality sequence [GENEPIO:0100568]:
        text: Low quality sequence [GENEPIO:0100568]
        title: Low quality sequence [GENEPIO:0100568]
        meaning: GENEPIO:0100568
        description: Sequence data that does not meet quality control thresholds.
      Sequence contaminated [GENEPIO:0100569]:
        text: Sequence contaminated [GENEPIO:0100569]
        title: Sequence contaminated [GENEPIO:0100569]
        meaning: GENEPIO:0100569
        description: Sequence data that contains reads from unintended targets (e.g. other organisms, other samples) due to contamination so that it does not faithfully represent the genetic information from the biological source.
      Low average genome coverage [GENEPIO:0100570]:
        text: Low average genome coverage [GENEPIO:0100570]
        title: Low average genome coverage [GENEPIO:0100570]
        meaning: GENEPIO:0100570
        description: Sequence data in which the entire length of the genome is not sufficiently sequenced (low breadth of coverage), or particular positions of the genome are not sequenced a prescribed number of times (low depth of coverage).
      Low percent genome captured [GENEPIO:0100571]:
        text: Low percent genome captured [GENEPIO:0100571]
        title: Low percent genome captured [GENEPIO:0100571]
        meaning: GENEPIO:0100571
        description: Sequence data in which the entire length of the genome is not sufficiently sequenced (low breadth of coverage).
      Read lengths shorter than expected [GENEPIO:0100572]:
        text: Read lengths shorter than expected [GENEPIO:0100572]
        title: Read lengths shorter than expected [GENEPIO:0100572]
        meaning: GENEPIO:0100572
        description: Average sequence read lengths that are below the expected size range given a particular sequencing instrument, reagents and conditions.
      Sequence amplification artifacts [GENEPIO:0100573]:
        text: Sequence amplification artifacts [GENEPIO:0100573]
        title: Sequence amplification artifacts [GENEPIO:0100573]
        meaning: GENEPIO:0100573
        description: Sequence data containing errors generated during the PCR amplification process during library generation (e.g. mutations, altered read distribution, amplicon dropouts).
      Low signal to noise ratio [GENEPIO:0100574]:
        text: Low signal to noise ratio [GENEPIO:0100574]
        title: Low signal to noise ratio [GENEPIO:0100574]
        meaning: GENEPIO:0100574
        description: Sequence data containing more errors or undetermined bases (noise) than sequence representing the biological source (signal).
      Low coverage of characteristic mutations [GENEPIO:0100575]:
        text: Low coverage of characteristic mutations [GENEPIO:0100575]
        title: Low coverage of characteristic mutations [GENEPIO:0100575]
        meaning: GENEPIO:0100575
        description: Sequence data that contains a lower than expected number of mutations that are usually observed in the reference sequence.
