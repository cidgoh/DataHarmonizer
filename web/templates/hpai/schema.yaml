    examples:
      - value: Hybrid selection method (bait-capture) [GENEPIO:0001950]
  genomic_target_enrichment_method_details:
    name: genomic_target_enrichment_method_details
    slot_uri: GENEPIO:0100967
    title: genomic_target_enrichment_method_details
    range: WhitespaceMinimizedString
    description: Details that provide additional context to the molecular technique used to selectively capture and amplify specific regions of interest from a genome.
    comments:
      - 'Provide details that are applicable to the method you used. Note: If bait-capture methods were used for enrichment, provide the panel name and version number (or a URL providing that information).'
    examples:
      - value: "enrichment was done using Twist's respiratory virus research panel: https://www.twistbioscience.com/products/ngs/fixed-panels/respiratory-virus-research-panel"
  amplicon_pcr_primer_scheme:
    name: amplicon_pcr_primer_scheme
    slot_uri: GENEPIO:0001456
    title: amplicon_pcr_primer_scheme
    range: WhitespaceMinimizedString
    description: The specifications of the primers (primer sequences, binding positions, fragment size generated etc) used to generate the amplicons to be sequenced.
    comments:
      - Provide the name and version of the primer scheme used to generate the amplicons for sequencing.
    examples:
      - value: artic v3
  amplicon_size:
    name: amplicon_size
    slot_uri: GENEPIO:0001449
    title: amplicon_size
    range: Integer
    description: The length of the amplicon generated by PCR amplification.
    comments:
      - Provide the amplicon size expressed in base pairs.
    examples:
      - value: '300'
  sequencing_flow_cell_version:
    name: sequencing_flow_cell_version
    slot_uri: GENEPIO:0101102
    title: sequencing_flow_cell_version
    range: WhitespaceMinimizedString
    description: The version number of the flow cell used for generating sequence data.
    comments:
      - Flow cells can vary in terms of design, chemistry, capacity, etc. The version of the flow cell used to generate sequence data can affect sequence quantity and quality. Record the version of the flow cell used to generate sequence data. Do not include "version" or "v" in the version number.
    examples:
      - value: R.9.4.1
  sequencing_protocol:
    name: sequencing_protocol
    slot_uri: GENEPIO:0001454
    title: sequencing_protocol
    range: WhitespaceMinimizedString
    description: The protocol or method used for sequencing.
    comments:
      - Provide the name and version of the procedure or protocol used for sequencing. You can also provide a link to a protocol online.
    examples:
      - value: https://www.protocols.io/view/ncov-2019-sequencing-protocol-bbmuik6w?version_warning=no
  r1_fastq_filename:
    name: r1_fastq_filename
    slot_uri: GENEPIO:0001476
    title: r1_fastq_filename
    range: WhitespaceMinimizedString
    description: The user-specified filename of the r1 FASTQ file.
    comments:
      - Provide the r1 FASTQ filename.
    examples:
      - value: ABC123_S1_L001_R1_001.fastq.gz
  r2_fastq_filename:
    name: r2_fastq_filename
    slot_uri: GENEPIO:0001477
    title: r2_fastq_filename
    range: WhitespaceMinimizedString
    description: The user-specified filename of the r2 FASTQ file.
    comments:
      - Provide the r2 FASTQ filename.
    examples:
      - value: ABC123_S1_L001_R2_001.fastq.gz
  fast5_filename:
    name: fast5_filename
    slot_uri: GENEPIO:0001480
    title: fast5_filename
    range: WhitespaceMinimizedString
    description: The user-specified filename of the FAST5 file.
    comments:
      - Provide the FAST5 filename.
    examples:
      - value: batch1a_sequences.fast5
  genome_sequence_file_name:
    name: genome_sequence_file_name
    slot_uri: GENEPIO:0101715
    title: genome sequence file name
    range: WhitespaceMinimizedString
    description: The name of the sequence file.
    comments:
      - Provide the name and version number, with the file extension, of the processed genome sequence file e.g. a consensus sequence FASTA file or a genome assembly file.
    examples:
      - value: mpxvassembly.fasta
  assembly_filename:
    name: assembly_filename
    slot_uri: GENEPIO:0001461
    title: assembly_filename
    range: WhitespaceMinimizedString
    description: The user-defined filename of the FASTA file.
    comments:
      - Provide the FASTA filename.
    examples:
      - value: pathogenassembly123.fasta
  quality_control_method_name:
    name: quality_control_method_name
    slot_uri: GENEPIO:0100557
    title: quality control method name
    range: WhitespaceMinimizedString
    description: The name of the method used to assess whether a sequence passed a predetermined quality control threshold.
    comments:
      - Providing the name of the method used for quality control is very important for interpreting the rest of the QC information. Method names can be provided as the name of a pipeline or a link to a GitHub repository. Multiple methods should be listed and separated by a semi-colon. Do not include QC tags in other fields if no method name is provided.
    examples:
      - value: ncov-tools
  quality_control_method_version:
    name: quality_control_method_version
    slot_uri: GENEPIO:0100558
    title: quality control method version
    range: WhitespaceMinimizedString
    description: The version number of the method used to assess whether a sequence passed a predetermined quality control threshold.
    comments:
      - Methods updates can make big differences to their outputs. Provide the version of the method used for quality control. The version can be expressed using whatever convention the developer implements (e.g. date, semantic versioning). If multiple methods were used, record the version numbers in the same order as the method names. Separate the version numbers using a semi-colon.
    examples:
      - value: 1.2.3
  quality_control_determination:
    name: quality_control_determination
    slot_uri: GENEPIO:0100559
    title: quality control determination
    any_of:
      - range: QualityControlDeterminationMenu
      - range: NullValueMenu
    description: The determination of a quality control assessment.
    multivalued: true
    comments:
      - Select a value from the pick list provided. If a desired value is missing, submit a new term request to the PHA4GE QC Tag GitHub issuetracker using the New Term Request form.
    examples:
      - value: sequence failed quality control
  quality_control_issues:
    name: quality_control_issues
    slot_uri: GENEPIO:0100560
    title: quality control issues
    any_of:
      - range: QualityControlIssuesMenu
      - range: NullValueMenu
    description: The reason contributing to, or causing, a low quality determination in a quality control assessment.
    multivalued: true
    comments:
      - Select a value from the pick list provided. If a desired value is missing, submit a new term request to the PHA4GE QC Tag GitHub issuetracker using the New Term Request form.
    examples:
      - value: low average genome coverage
  quality_control_details:
    name: quality_control_details
    slot_uri: GENEPIO:0100561
    title: quality control details
    range: WhitespaceMinimizedString
    description: The details surrounding a low quality determination in a quality control assessment.
    comments:
      - Provide notes or details regarding QC results using free text.
    examples:
      - value: CT value of 39. Low viral load. Low DNA concentration after amplification.
  raw_sequence_data_processing_method:
    name: raw_sequence_data_processing_method
    slot_uri: GENEPIO:0001458
    title: raw sequence data processing method
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    recommended: true
    description: The method used for raw data processing such as removing barcodes, adapter trimming, filtering etc.
    comments:
      - Raw data processing can have a significant impact on data quality and how it can be used. Provide the names and version numbers of software used for trimming adaptors, quality filtering, etc (e.g. Trimmomatic v. 0.38, Porechop v. 0.2.3), or a link to a GitHub protocol.
    examples:
      - value: Porechop 0.2.3
  dehosting_method:
    name: dehosting_method
    slot_uri: GENEPIO:0001459
    title: dehosting method
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    recommended: true
    description: The method used to remove host reads from the pathogen sequence.
    comments:
      - Provide the name and version number of the software used to remove host reads.
    examples:
      - value: Nanostripper
  sequence_assembly_software_name:
    name: sequence_assembly_software_name
    slot_uri: GENEPIO:0100825
    title: sequence assembly software name
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    description: The name of the software used to assemble a sequence.
    comments:
      - Provide the name of the software used to assemble the sequence.
    examples:
      - value: SPAdes Genome Assembler, Canu, wtdbg2, velvet
  sequence_assembly_software_version:
    name: sequence_assembly_software_version
    slot_uri: GENEPIO:0100826
    title: sequence assembly software version
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    description: The version of the software used to assemble a sequence.
    comments:
      - Provide the version of the software used to assemble the sequence.
    examples:
      - value: 3.15.5
  consensus_sequence_software_name:
    name: consensus_sequence_software_name
    slot_uri: GENEPIO:0001463
    title: consensus sequence software name
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    description: The name of the software used to generate the consensus sequence.
    comments:
      - Provide the name of the software used to generate the consensus sequence.
    examples:
      - value: iVar
  consensus_sequence_software_version:
    name: consensus_sequence_software_version
    slot_uri: GENEPIO:0001469
    title: consensus sequence software version
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    description: The version of the software used to generate the consensus sequence.
    comments:
      - Provide the version of the software used to generate the consensus sequence.
    examples:
      - value: '1.3'
  breadth_of_coverage_value:
    name: breadth_of_coverage_value
    slot_uri: GENEPIO:0001472
    title: breadth of coverage value
    range: WhitespaceMinimizedString
    description: The percentage of the reference genome covered by the sequenced data, to a prescribed depth.
    comments:
      - Provide value as a percent.
    examples:
      - value: '95'
  depth_of_coverage_value:
    name: depth_of_coverage_value
    slot_uri: GENEPIO:0001474
    title: depth of coverage value
    range: WhitespaceMinimizedString
    description: The average number of reads representing a given nucleotide in the reconstructed sequence.
    comments:
      - Provide value as a fold of coverage.
    examples:
      - value: '400'
  depth_of_coverage_threshold:
    name: depth_of_coverage_threshold
    slot_uri: GENEPIO:0001475
    title: depth of coverage threshold
    range: WhitespaceMinimizedString
    description: The threshold used as a cut-off for the depth of coverage.
    comments:
      - Provide the threshold fold coverage.
    examples:
      - value: '100'
  genome_completeness:
    name: genome_completeness
    slot_uri: GENEPIO:0100844
    title: genome completeness
    range: WhitespaceMinimizedString
    description: The percentage of expected genes identified in the genome being sequenced. Missing genes indicate missing genomic regions (incompleteness) in the data.
    comments:
      - Provide the genome completeness as a percent (no need to include units).
    examples:
      - value: '85'
  number_of_base_pairs_sequenced:
    name: number_of_base_pairs_sequenced
    slot_uri: GENEPIO:0001482
    title: number of base pairs sequenced
    range: integer
    description: The number of total base pairs generated by the sequencing process.
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '387566'
  number_of_total_reads:
    name: number_of_total_reads
    slot_uri: GENEPIO:0100827
    title: number of total reads
    range: integer
    description: The total number of non-unique reads generated by the sequencing process.
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '423867'
  number_of_unique_reads:
    name: number_of_unique_reads
    slot_uri: GENEPIO:0100828
    title: number of unique reads
    range: integer
    description: The number of unique reads generated by the sequencing process.
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '248236'
  minimum_posttrimming_read_length:
    name: minimum_posttrimming_read_length
    slot_uri: GENEPIO:0100829
    title: minimum post-trimming read length
    range: integer
    description: The threshold used as a cut-off for the minimum length of a read after trimming.
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '150'
  number_of_contigs:
    name: number_of_contigs
    slot_uri: GENEPIO:0100937
    title: number of contigs
    range: integer
    description: The number of contigs (contiguous sequences) in a sequence assembly.
    comments:
      - Provide a numerical value.
    examples:
      - value: '10'
  percent_ns_across_total_genome_length:
    name: percent_ns_across_total_genome_length
    slot_uri: GENEPIO:0100830
    title: percent Ns across total genome length
    range: integer
    description: The percentage of the assembly that consists of ambiguous bases (Ns).
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '2'
  ns_per_100_kbp:
    name: ns_per_100_kbp
    slot_uri: GENEPIO:0001484
    title: Ns per 100 kbp
    range: integer
    description: The number of ambiguous bases (Ns) normalized per 100 kilobasepairs (kbp).
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '342'
  n50:
    name: n50
    slot_uri: GENEPIO:0100938
    title: N50
    range: integer
    description: The length of the shortest read that, together with other reads, represents at least 50% of the nucleotides in a set of sequences.
    comments:
      - Provide the N50 value in Mb.
    examples:
      - value: '150'
  percent_read_contamination:
    name: percent_read_contamination
    slot_uri: GENEPIO:0100845
    title: percent read contamination
    range: integer
    description: The percent of the total number of reads identified as contamination (not belonging to the target organism) in a sequence dataset.
    comments:
      - Provide the percent contamination value (no need to include units).
    examples:
      - value: '2'
  sequence_assembly_length:
    name: sequence_assembly_length
    slot_uri: GENEPIO:0100846
    title: sequence assembly length
    range: integer
    description: The length of the genome generated by assembling reads using a scaffold or by reference-based mapping.
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '34272'
  consensus_genome_length:
    name: consensus_genome_length
    slot_uri: GENEPIO:0001483
    title: consensus genome length
    range: integer
    description: The length of the genome defined by the most common nucleotides at each position.
    comments:
      - Provide a numerical value (no need to include units).
    examples:
      - value: '38677'
  reference_genome_accession:
    name: reference_genome_accession
    slot_uri: GENEPIO:0001485
    title: reference genome accession
    range: WhitespaceMinimizedString
    description: A persistent, unique identifier of a genome database entry.
    comments:
      - Provide the accession number of the reference genome.
    examples:
      - value: NC_045512.2
  deduplication_method:
    name: deduplication_method
    slot_uri: GENEPIO:0100831
    title: deduplication method
    range: WhitespaceMinimizedString
    description: The method used to remove duplicated reads in a sequence read dataset.
    comments:
      - Provide the deduplication software name followed by the version, or a link to a tool or method.
    examples:
      - value: DeDup 0.12.8
  bioinformatics_protocol:
    name: bioinformatics_protocol
    slot_uri: GENEPIO:0001489
    title: bioinformatics protocol
    range: WhitespaceMinimizedString
    description: A description of the overall bioinformatics strategy used.
    comments:
      - Further details regarding the methods used to process raw data, and/or generate assemblies, and/or generate consensus sequences can. This information can be provided in an SOP or protocol or pipeline/workflow. Provide the name and version number of the protocol, or a GitHub link to a pipeline or workflow.
    examples:
      - value: https://github.com/phac-nml/ncov2019-artic-nf
  read_mapping_software_name:
    name: read_mapping_software_name
    slot_uri: GENEPIO:0100832
    title: read mapping software name
    range: WhitespaceMinimizedString
    description: The name of the software used to map sequence reads to a reference genome or set of reference genes.
    comments:
      - Provide the name of the read mapping software.
    examples:
      - value: Bowtie2, BWA-MEM, TopHat
  read_mapping_software_version:
    name: read_mapping_software_version
    slot_uri: GENEPIO:0100833
    title: read mapping software version
    range: WhitespaceMinimizedString
    description: The version of the software used to map sequence reads to a reference genome or set of reference genes.
    comments:
      - Provide the version number of the read mapping software.
    examples:
      - value: 2.5.1
  taxonomic_reference_database_name:
    name: taxonomic_reference_database_name
    slot_uri: GENEPIO:0100834
    title: taxonomic reference database name
    range: WhitespaceMinimizedString
    description: The name of the taxonomic reference database used to identify the organism.
    comments:
      - Provide the name of the taxonomic reference database.
    examples:
      - value: NCBITaxon
  taxonomic_reference_database_version:
    name: taxonomic_reference_database_version
    slot_uri: GENEPIO:0100835
    title: taxonomic reference database version
    range: WhitespaceMinimizedString
    description: The version of the taxonomic reference database used to identify the organism.
    comments:
      - Provide the version number of the taxonomic reference database.
    examples:
      - value: '1.3'
  taxonomic_analysis_report_filename:
    name: taxonomic_analysis_report_filename
    slot_uri: GENEPIO:0101074
    title: taxonomic analysis report filename
    range: WhitespaceMinimizedString
    description: The filename of the report containing the results of a taxonomic analysis.
    comments:
      - Provide the filename of the report containing the results of the taxonomic analysis.
    examples:
      - value: WWtax_report_Feb1_2024.doc
  taxonomic_analysis_date:
    name: taxonomic_analysis_date
    slot_uri: GENEPIO:0101075
    title: taxonomic analysis date
    range: date
    description: The date a taxonomic analysis was performed.
    todos:
      - <={today}
    comments:
      - Providing the date that an analyis was performed can help provide context for tool and reference database versions. Provide the date that the taxonomic analysis was performed in ISO 8601 format, i.e. "YYYY-MM-DD".
    examples:
      - value: '2024-02-01'
  read_mapping_criteria:
    name: read_mapping_criteria
    slot_uri: GENEPIO:0100836
    title: read mapping criteria
    range: WhitespaceMinimizedString
    description: A description of the criteria used to map reads to a reference sequence.
    comments:
      - Provide a description of the read mapping criteria.
    examples:
      - value: Phred score >20
  genetic_target_name:
    name: genetic_target_name
    slot_uri: GENEPIO:0101116
    title: genetic target name
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    description: The name of the genetic marker used for testing.
    comments:
      - 'Provide the full name of the gene used in the test. Standardized gene names can be found in the Gene Ontology using this look-up service: https://bit.ly/2Sq1LbI'
    examples:
      - value: gyrase A
  genetic_target_region:
    name: genetic_target_region
    slot_uri: GENEPIO:0101117
    title: genetic target region
    range: WhitespaceMinimizedString
    description: The specific region or segment of a genetic sequence used for testing or analysis.
  genetic_target_region_reference_genome:
    name: genetic_target_region_reference_genome
    slot_uri: GENEPIO:0101118
    title: genetic target region reference genome
    range: WhitespaceMinimizedString
    description: The reference genome version used to determine the coordinates or identity of the genetic target region in testing or analysis.
  diagnostic_target_presence:
    name: diagnostic_target_presence
    slot_uri: GENEPIO:0100962
    title: diagnostic target presence
    any_of:
      - range: DiagnosticTargetPresenceMenu
      - range: NullValueMenu
    description: The binary value of the result from a diagnostic test.
    comments:
      - Select a value from the pick list provided, to describe whether a target was determined to be present or absent within a sample.
    examples:
      - value: diagnostic target present
  diagnostic_measurement_value:
    name: diagnostic_measurement_value
    slot_uri: GENEPIO:0100963
    title: diagnostic measurement value
    range: WhitespaceMinimizedString
    description: The value of the result from a diagnostic test.
    comments:
      - Provide the numerical result of a diagnostic test (no need to include units).
    examples:
      - value: '1000'
  diagnostic_measurement_unit:
    name: diagnostic_measurement_unit
    slot_uri: GENEPIO:0100964
    title: diagnostic measurement unit
    any_of:
      - range: DiagnosticMeasurementUnitMenu
      - range: NullValueMenu
    description: The unit of the result from a diagnostic test.
    comments:
      - Select a value from the pick list provided, to describe the units of the given diagnostic test.
    examples:
      - value: cycle threshold (Ct)
  diagnostic_measurement_method:
    name: diagnostic_measurement_method
    slot_uri: GENEPIO:0100965
    title: diagnostic measurement method
    any_of:
      - range: DiagnosticMeasurementMethodMenu
      - range: NullValueMenu
    description: The method by which a diagnostic result was determined.
    comments:
      - Select a value from the pick list provided to describe the method used for a given diagnostic test.
    examples:
      - value: qPCR
  diagnostic_testing_threshold_value:
    name: diagnostic_testing_threshold_value
    slot_uri: GENEPIO:0101104
    title: diagnostic testing threshold value
    range: integer
    description: The numerical value which represents the threshold above/below which interpretation can be drawn on the diagnostic test
  diagnostic_testing_threshold_units:
    name: diagnostic_testing_threshold_units
    slot_uri: GENEPIO:0101105
    title: diagnostic testing threshold units
    range: WhitespaceMinimizedString
    description: The unit which are attributed to the threshold above/below which interpretation can be drawn on the diagnostic test
  diagnostic_testing_details:
    name: diagnostic_testing_details
    slot_uri: GENEPIO:0101106
    title: diagnostic testing details
    range: WhitespaceMinimizedString
    description: Describe any details of the diagnsotic testing.
  prevalence_metrics:
    name: prevalence_metrics
    slot_uri: GENEPIO:0100480
    title: prevalence_metrics
    range: WhitespaceMinimizedString
    recommended: true
    description: Metrics regarding the prevalence of the pathogen of interest obtained from a surveillance project.
    comments:
      - Risk assessment requires detailed information regarding the quantities of a pathogen in a specified location, commodity, or environment. As such, it is useful for risk assessors to know what types of information are available through documented methods and results. Provide the metric types that are available in the surveillance project sample plan by selecting them from the pick list. The metrics of interest are " Number of total samples collected", "Number of positive samples", "Average count of hazard organism", "Average count of indicator organism". You do not need to provide the actual values, just indicate that the information is available.
    examples:
      - value: Number of total samples collected, Number of positive samples
  prevalence_metrics_details:
    name: prevalence_metrics_details
    slot_uri: GENEPIO:0100481
    title: prevalence_metrics_details
    range: WhitespaceMinimizedString
    recommended: true
    description: The details pertaining to the prevalence metrics from a surveillance project.
    comments:
      - If there are details pertaining to samples or organism counts in the sample plan that might be informative, provide details using free text.
    examples:
      - value: Hazard organism counts (i.e. Salmonella) do not distinguish between serovars.
  stage_of_production:
    name: stage_of_production
    slot_uri: GENEPIO:0100482
    title: stage_of_production
    any_of:
      - range: WhitespaceMinimizedString
      - range: NullValueMenu
    recommended: true
    description: The stage of food production.
    comments:
      - Provide the stage of food production as free text.
    examples:
      - value: Abattoir [ENVO:01000925]
  experimental_intervention:
    name: experimental_intervention
    slot_uri: GENEPIO:0100483
    title: experimental_intervention
    any_of:
      - range: ExperimentalInterventionMenu
      - range: NullValueMenu
    recommended: true
    description: The category of the experimental intervention applied in the food production system.
    multivalued: true
    comments:
      - In some surveys, a particular intervention in the food supply chain in studied. If there was an intervention specified in the sample plan, select the intervention category from the pick list provided.
    examples:
      - value: Vaccination [NCIT:C15346]
  experiment_intervention_details:
    name: experiment_intervention_details
    slot_uri: GENEPIO:0100484
    title: experiment_intervention_details
    range: WhitespaceMinimizedString
    recommended: true
    description: The details of the experimental intervention applied in the food production system.
    comments:
      - If an experimental intervention was applied in the survey, provide details in this field as free text.
    examples:
      - value: 2% cranberry solution mixed in feed
enums:
  NullValueMenu:
    name: NullValueMenu
    title: null value
    permissible_values:
      Not Applicable [GENEPIO:0001619]:
        text: Not Applicable [GENEPIO:0001619]
        title: Not Applicable [GENEPIO:0001619]
        meaning: GENEPIO:0001619
        description: A categorical choice recorded when a datum does not apply to a given context.
      Missing [GENEPIO:0001618]:
        text: Missing [GENEPIO:0001618]
        title: Missing [GENEPIO:0001618]
        meaning: GENEPIO:0001618
        description: A categorical choice recorded when a datum is not included for an unknown reason.
      Not Collected [GENEPIO:0001620]:
        text: Not Collected [GENEPIO:0001620]
        title: Not Collected [GENEPIO:0001620]
        meaning: GENEPIO:0001620
        description: A categorical choice recorded when a datum was not measured or collected.
      Not Provided [GENEPIO:0001668]:
        text: Not Provided [GENEPIO:0001668]
        title: Not Provided [GENEPIO:0001668]
        meaning: GENEPIO:0001668
        description: A categorical choice recorded when a datum was collected but is not currently provided in the information being shared. This value indicates the information may be shared at the later stage.
