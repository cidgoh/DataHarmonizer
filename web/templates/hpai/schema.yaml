      Organic food claim or use [FOODON:03510128]:
        text: Organic food claim or use [FOODON:03510128]
        title: Organic food claim or use [FOODON:03510128]
        meaning: FOODON:03510128
        description: "USA: The 1990 Farm Act specifies that a food labeled 'organic' must meet four requirements: 1) the food must be raised by specified methods to replenish and maintain the fertility of the soil; 2) the food must be certified as having been produced with a nationally approved list of materials and practices; 3) to be eligible for certification at least three years must have elapsed between the first organic harvest and first use of nationally approved materials on land and crops;and 4) organic foods must meet all local, state and federal regulations governing the quality and safety of the food supply. Europe: Foods produced in accordance with Council Regulation (EC) No 834/2007 of 28 June 2007 on organic production and labelling of organic products and repealing Regulation (EEC) No 2092/91. [http://eur-lex.europa.eu/LexUriServ/LexUriServ.do?uri=OJ:L:2007:189:0001:0023:EN:PDF]"
