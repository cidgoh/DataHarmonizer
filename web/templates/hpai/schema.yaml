        is_a: Cloudy/Overcast [ENVO:03501418]
      Drizzle [ENVO:03501420]:
        text: Drizzle [ENVO:03501420]
        title: Drizzle [ENVO:03501420]
        meaning: ENVO:03501420
        description: An aggregate of water drops smaller than those of rain which falls on a planetary surface during a precipitation process.
      Fog [ENVO:01000844]:
        text: Fog [ENVO:01000844]
        title: Fog [ENVO:01000844]
        meaning: ENVO:01000844
        description: A visible mass of cloud water droplets or ice crystals suspended in the air at or near the surface of an astronomical body.
      Rain [ENVO:01001564]:
        text: Rain [ENVO:01001564]
        title: Rain [ENVO:01001564]
        meaning: ENVO:01001564
        description: An aggregate of raindrops falling to a planetary surface during a precipitation process.
      Snow [ENVO:01000406]:
        text: Snow [ENVO:01000406]
        title: Snow [ENVO:01000406]
        meaning: ENVO:01000406
        description: Snow is an environmental material which is primarily composed of flakes of crystalline water ice.
      Storm [ENVO:01000876]:
        text: Storm [ENVO:01000876]
        title: Storm [ENVO:01000876]
        meaning: ENVO:01000876
        description: A storm is an environmental process in which an environmental system and the processes it participates in are strongly perturbed by external forcings. These forcings typically increase the rates of processes unfolding in the system, relative to their normal rates.
      Sunny/Clear [ENVO:03501421]:
        text: Sunny/Clear [ENVO:03501421]
        title: Sunny/Clear [ENVO:03501421]
        meaning: ENVO:03501421
        description: Atmospheric weather in which the sun can be seen to shine brightly.
