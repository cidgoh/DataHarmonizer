
  <div id="field-description-modal" class="modal" tabindex="-1" role="dialog">

  <div id="multiselect-modal" class="modal" tabindex="-1" role="dialog">

      <div class="modal-content">

          <div class="container-fluid">
            <div class="row">
              <div class="col" id="multiselect-text"></div>

  <!-- Empty Parent Key Warning -->
  <div
    class="modal fade"
    id="empty-parent-key-modal"
    tabindex="-1"
    role="dialog"
  >
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-body">
          <div class="container-fluid">
            <div class="row">
              <div class="col text-danger">
                Before new records can be inserted here, you need to select a
                parent table (tab) record so that it is linked by the
                appropriate key field value(s) below.
              </div>
            </div>
            <div class="row">
              <div class="col"><ul id="empty-parent-key-modal-info"></ul></div>
            </div>
            <div class="row mt-3">
              <div class="col d-flex justify-content-end">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-dismiss="modal"
                  data-i18n="template-ok"
                >
                  OK
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="translate-modal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-body">
          <div class="container-fluid">
            <div class="row">
              <div class="col">
                <div id="translate-modal-inner">
                  <label
                      data-i18n="translate-local"
                      id="translate-local"
                      >Locale Translations</label>
                  <div id="translate-modal-content">

                  </div>
                  <div style="display:flex; justify-content:flex-end; gap:0.75rem; padding:0.5rem 0;">
                    <button
                      type="button"
                      class="btn btn-secondary"
                      data-dismiss="modal"
                      data-i18n="template-cancel"
                    >
                      Cancel
                    </button>
                    <button
                      type="button"
                      class="btn btn-primary"
                      id="translation-save"
                      data-i18n="template-save"
                    >
                      Save
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Generic dialog — replaces browser alert() and confirm() -->
  <div class="modal fade" id="dh-dialog-modal" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header" id="dh-dialog-header" style="display:none">
          <h5 class="modal-title" id="dh-dialog-title"></h5>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
          <div id="dh-dialog-body"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="dh-dialog-cancel">Cancel</button>
          <button type="button" class="btn btn-primary" id="dh-dialog-ok">OK</button>
        </div>
      </div>
    </div>
  </div>
